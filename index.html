  ["채권총론_P008", "2023다221885; 2016다259769", "중도상환수수료는 이자제한법의 간주이자 X （법 4조 1항에서 ‘이자’", "[大判全合2025] 중도상환수수료는 이자제한법의 간주이자 X （법 4조 1항에서 ‘이자’\n는 예금, 수수료 … 명칭 불구 금전 대차 관련하여 채권자가 받은 것） ••• 중도상환수\n\n수료는 중도상환 시 손해배상액 예정이고 본래 의미 금전대차 대가 X（153조 2항,\n\n468조 따른 기한 전 변제 손해배상인데 종합 고려 개별적 판단하며 손해가 언제나\n‘중도상환 시점으로부터 변제기까지의 약정이자’와 일치하진 않음）, 형사처벌（법 8조\n\n1항） 직결되어 중도상환수수료의 간주이자 해당 여부 엄격 해석해야, 간주이자 아니\n더라도 법 6조로 감액하거나 약관규제법 • 대부업법 등 규제되어 채무자 보호 가능,\n\n대법원이 중도상환수수료를 대부업법의 간주이자로 본 것은 대부업법 특수성 반영한\n것이므로 원용 X [2023다221885]\n正辯 : 당시 3인 반대의견은 손해배상액 예정인 중도상환수수료도 간주이자로 보아 최고이자율\n적용하자는 입장인데, 그 설시과정에서 ‘소비대차 손해배상액 예정은 이자제한법 간주이자가\n\n아니라는 대법원 1964. 6. 9. 선고 63다1212 판결은 그 후의 대법원 2018. 6. 28. 선고 2018다\n\n22350 판결과 모순 • 저촉되어 변경되어야 한다’는 입장을 밝혔는데 이 자체는 타당함（私見）\n[判例] 이자제한법 최고이자율은 금전대차 계약상 ‘이자’에만 적용, ‘위약벌’에는 적\n\n용 X [2016다259769]\n‘선이자’를 사전공제한 경우는 채무자 실제 수령 금액을 원본으로 최고이자율보다 공\n\n제액이 크면 초과부분이 원본 충당（동법 3조）\n\n正辯 : 가령 100만 원 중 선이자 연 30%를 공제하고 대여일에 70만 원을 인도했다면, 70만 원에", "", [], 0, "채권목적", 6, "미분류"],
  ["채권총론_P009", "2012다86895", "임대차 목적물이 화재로 소멸되어 임차인의 목적물반환의무가 이행", "[大判全合] 임대차 목적물이 화재로 소멸되어 임차인의 목적물반환의무가 이행\n\n불능 된 경우, 임차인은 귀책사유 없음 입증 못하는 한 이행불능 손해배상책임（화재\n의 구체적 발생원인 밝혀지지 않은 경우도 마찬가지） 一 그러나 화재가 임대인의\n\n지배 •관리 영역 존재 하자로 발생 추단되면, 임차인이 하자 미리 알았거나 알 수 있\n었다는등특별한사정 없는 한, 임차인은 이행불능손해배상책임 X\n건물 일부 임대차에서 임차건물 부분에 화재 발생하여 ‘임차 외 건물’ 부분까지 불에\n\n타 발생한 손해에 관해 임차인에게 채무불이행책임 물으려면, “① 화재 발생에 임차\n\n인의 계약상 의무 위반 있고, ② 의무 위반과 임차 외 건물 부분 손해 사이 상당인과\n\n관계 있으며, ③ 임차 외 건물 부분의 손해가 의무 위반에 따른 통상손해 혹은 임차\n인이 알았거나 알 수 있는 특별손해의 범위에 해당하는 사실 등을 모두 임대인이 주\n장 • 증명해야” [2012다86895]\n\n正辯 : 종래의 대법원은 ‘구조상 불가분 일체’이면 임차인이 귀책사유 없음을 증명하지 못하는 한\n임차 외 건물 부분도 채무불이행에 따른 손해배상책임 진다는 견해였으나 변경 • 폐기됨", "", [], 0, "채무불이행", 8, "미분류"],
  ["채권총론_P010", "2023다244895; 2017다275447; 94다22446", "위 법리（임차인 귀책사유 없는 점 증명책임）는 목적물 반환의무가 불능은", "[判例2023] 위 법리（임차인 귀책사유 없는 점 증명책임）는 목적물 반환의무가 불능은\n아니지만 훼손되어 손해배상 구할 때도 마찬가지\n\n623조（임차인에게 인도）, 374조（선관주의의무）, 654-615조（원상회복의무）에 따라 인도\n받아 사용.수익하는 동안 임차인이 목적물 직접 지배로 추단 o\n\n그러나 숙박계약에는 위 법리 적용 X, 숙박계약 고객이 객실 사용수익하던 중 원인\n미상 화재로 객실에 발생한 손해는 특별한 사정 없는 한 숙박업자 부담으로 귀속\n•.• 숙박계약은 ‘일시사용 임대차계약’으로 임대차와 유사하면서 다른 요소, 숙박업자\n\n는 고객 안전배려 보호의무나 공법적 의무 부담, 고객에게 객실 제공한 숙박기간 중\n에도 고객이 아닌 숙박업자가 객실 비롯한 숙박시설 점유 지배 O [2023다244895]\n\n2. 이행보조자（제391조）\n- @ 채무자의 법정대리인이 채무자를 위하여, © 채무자가 타인을 사용하여, 채무를\n이행하는 경우 법정대리인 • 피용자의 고의 • 과실 = 채무자의 고의 • 과실 간주 一 채\n\n무자의 채무불이행 책임을 묻기 위한 제도\n- [判例] “391조의 피용자는 채무자의 의사관여 있으면 충분, 지시감독관계 • 종속성\n불문” —► 임대인이 임차인과의 약정 이행 위하여 제3자에 도급주어 시설물설치 중\n\n수급인 과실로 화재 발생하면 임대인이 임차인에 채무불이행책임 O [2001 다44338]\n[判例] 제3자가 단순히 호의로 행위한 경우에도 채무자 용인 아래 이뤄졌으면 이행\n\n보조자 O [2017다275447]\n- [判例] 임대인의 관리인이 임차인의 임차점포 출입 봉쇄하여 사용• 수익 못하게 한\n경우 임대인은 채무불이행책임（391조）, 이행보조자는 불법행위책임（750조） -> 양자\n의 책임은 부진정연대채무관계 [94다22446]", "", ["제391조"], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P011", "", "이행보조자가 채무 이행 위하여 제3자를 ‘복이행보조자’로서 사용하는 경우", "[判例] 이행보조자가 채무 이행 위하여 제3자를 ‘복이행보조자’로서 사용하는 경우\n\n채무자가 묵시적 승낙.동의했다면 391조에 의해 복이행보조자의 고의 •과실에 관하\n여 채무자가 책임 부담 o [2011 다133이\n\n- 동의 있는 전대차에서 전차인을 임차인의 이행보조자로 볼 것인지 : 이행보조자로\n보는 견해 v. 선임 • 감독 귀책사유 있는 경우만 책임진다는 견해\n\nPART 1\n\n채권총론 • 채무불이행 • 9", "", [], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P012", "", "매매계약 목적물상 담보권설정등기 말소할 의무와 잔대금 지급의무는", "[判例] 매매계약 목적물상 담보권설정등기 말소할 의무와 잔대금 지급의무는\n특별한 사정 없는 한 동시이행관계 ■— 쌍방이 이행기에 이행하지 않으면 그 이후\n\n쌍방 채무는 기한의 정함 없는 동시이행 관계 [80다 1037] - 확정기한부 채권도\n쌍방 이행기 경과하면 모두 기한 정함 없는 채무로 되어 일방이 자기 채무 이행제공\n\n하면서 이행 최고해야 상대방이 그 다음날부터 지체책임", "", [], 0, "채무불이행", 10, "미분류"],
  ["채권총론_P013", "74다1393; 2015다239508; 2015다207044", "불법행위 손해배상채무는 불법행위일 ‘당일’부터 지체책임 [74다1393]", "[判例] 불법행위 손해배상채무는 불법행위일 ‘당일’부터 지체책임 [74다1393]\n[判例] 628조 차임증액청구에 협의 불성립하여 법원이 차임 결정한 경우, 증액된 차\n임은 증액청구 도달시가 이행기 （법원결정시 X）[2015다239508]\n【判例] 기한 정하지 않은 채무에 정지조건 있다면, 정지조건 성취 후 채권자가 이행\n\n청구하면 지체책임 발생 / 청구금액 불확정이어도 지체책임 O [2015다207044]\n- [判例] 추심명령 송달된 경우 제3채무자가 압류채권자에 대하여 지체책임 지는 것\n\n은 압류채권자로부터 추심금 청구 받은 다음날부터 O （추심명령 송달받은 때 X）\n\nV 추심명령은 추심 권능 수여에 그칠 뿐, 지급 명하거나 기한 정하는 것 X [2010다\n\n47117]", "", [], 0, "채무불이행", 10, "미분류"],
  ["채권총론_P014", "2009다22778; 93다11203; 2009다69692", "보증인의 보증금 지급의무에 지급금지가처분결정 있었더라도 이행기 도래하", "[判例] 보증인의 보증금 지급의무에 지급금지가처분결정 있었더라도 이행기 도래하\n면 보증인은 지체책임 O V 가처분으로 지급거절권능 생기는 것은 X - 채권자의\n수령불능 이유로 변제공탁 O, 지체책임 면함 [2009다22778]\n\n- 【判例] 원인채무 이행과 어음•수표 반환이 동시이행 관계 있다 하더라도 원인채무\n이행기 도래하면 원칙적 지체책임 O, 어음•수표 반환받지 않았음을 이유로 항변권\n행사해야 ■•• 쌍무계약상 대가관계 X [93다11203]\n\n【判例] 원인채권과 어음채권 병존할 경우, 채권자가 원인채권 행사하면 채무자는\n원칙적으로 어음상환 항변 O —* 그러나 이러한 거절은 이중지급 위험 면할 목적,\n\n원인채권 이행 청구권과 어음반환청구권 사이 536조 쌍무계약상 채권채무관계나\n유사한 대가관계는 X — 어음상 권리 시효소멸로 이중지급 위험 없고 채무자가\n\n다른 어음상 채무자에 대해 권리 행사할 수도 없는 경우, 채권자의 원인채권 행사에\n채무자 어음상환 동이항 X [2009다69692]\n- [判例] 신원보증인의 채무는 채권자로부터 이행청구를 받아야 지체책임 o ••• 이는\n\n피보증인의 불법행위로 인한 손해배상채무 자체가 아니고 신원보증계약에 기하여\n\n발생한 채무로서 이행기 정함이 없는 채무이므로 [2009다59671]\n— [判例2022] 지연손해금은 금전채무 이행지체 따른 손해배상으로 기한 없는 채무 —\n\n확정된 지연손해금을 채권자가 청구하면 채무자 지체책임, 이행판결 확정된 지연손\n해금도 이행청구로 지체책임 v 판결로 권리 실체적 내용 바뀌지 않으므로\n\n당해 사건에서 지연손해금의 발생원인인 원본의 이행판결 선고하지 않는 경우에는\n소촉법 3조 법정이율 적용 X V 소촉법 3조는 1 心항 규정이나 입법취지 비추어 금\n\n전채무 원본 이행청구가 소송물일 때 그 이행 명하면서 동시에 덧붙는 지연손해금에\n\n적용되는 규정 [2021Q232331]\n\n正辯 : ‘지연손해금’ 채권을 양수한 채권양수인이 지급명령으로 양수금（지연손해금） 구하다가 소송\n으로 이행된 후 양수금 원금 부분 취하하고 원금의 연 12% 비율 지연손해금（지연손해금의 지연손\n해금） 부분만 청구 一 지급명령 송달일 다음날부터 계산한 지연손해금 인용하되 원금의 연 5% 비\n\n율만 인용해야\n\nPART 1\n\n채권총론 • 채무불이행 • 11", "", [], 0, "채무불이행", 11, "미분류"],
  ["채권총론_P015", "65다947", "부동산 이중매매로 매도인이 1인에게 먼저 소유권명의 이전해주면 특별한", "[判例] 부동산 이중매매로 매도인이 1인에게 먼저 소유권명의 이전해주면 특별한\n사정이 없는 한 다른 1인에 대한 소유권이전등기의무는 이행불능 [65다947]", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P016", "66다1565", "이중매도인의 배임행위에 적극 가담하여 매수한 매매행위는 사회정의관념에", "[判例] 이중매도인의 배임행위에 적극 가담하여 매수한 매매행위는 사회정의관념에\n위배된 반사회적 법률행위로서 무효 [66다1565]\n— ‘ 이중매매 후 제2매수인에게 등기 이전되면 제1매매에 이행불능 O — 그러나\n제2매수인 적극가담인 경우는 예외적으로 제2매매계약 및 제2매수인 등기 무효,\n제 1매수인은 ’채권자대위’ 방법으로 제2매수인 등기 말소한 후 매매 소이등 O", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P017", "2005다39211; 93다37977; 94다54641", "매매목적물에 가등기 • 가압류 • 가처분만으로는 이행불능 X — 그러나 매도인", "[判例] 매매목적물에 가등기 • 가압류 • 가처분만으로는 이행불능 X — 그러나 매도인\n이 변제자력 없거나 강제집행으로 소유권 잃은 경우는 이행불능 O [91 다8104, 99다\n\n11045, 2000Q47361]\n[判例] 미등기전매 에서 매도인의 소유권이전등기 청구권이 가압류 • 처분금지 가처분\n\n된 경우에 매도인이 무자력이면 이행불능 O [2005다39211]\n[判例] 瓦0 제3자에게 지상권설정등기 및 저당권설정등기를 한 경우 매도인의 소유\n권이전등기의무는 이행불능 O [73다 1133]\n-【判例] 임대인의 소유권 상실이 바로 이행불능은 X [93다37977] — 그러나 임차인이\n\n진실한 소유자로부터 목적물 반환청구나 차임 상당액 지급청구 받으면 이행불능 O\n\n— 임차인은 임대차 당연종료 이유로 차임지급 거절 O [94다54641]\n- [判例] 강박으로 소유권이전등기 마친 후 제3자에게 이전등기 -‘ 말소 환원 여부\n가 결정될 사정 있으므로 아직 이행불능 X - 그러나 피강박자가 등기명의인 상대\n로 말소등기청구소송 제기하여 패소확정된 때 이행불능 O （이때 등기명의인의 등기\n부 취득시효 인정으로 패소된 것이라도 이행불능 시점이 취득시효 완성 당시 X ）\n\n[2005다29474] 羊 2010다28604 전원합의체 판례 （후술）\n\nPART 1\n\n채권총론 • 채무불이행 • 13", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P018", "95다2074; 99다23901; 92다4581", "취득시효 완성된 토지가 수용된 경우 완성자는 대상청구권 행사로서 수용보", "[判例] 취득시효 완성된 토지가 수용된 경우 완성자는 대상청구권 행사로서 수용보\n상금의 공탁금출급청구권 양도 청구 O — 그러나 수용보상금의 수령권자가 자신이\n\n라는 확인 X [95다2074]\n[判例] 그러나 어떤 사유로 채권자가 직접 자기 명의로 대상청구 대상인 보상금을\n지급받았더라도 채무자에 대한 관계에서 바로 부당이득이 되지는 X [99다23901]\n\n- 행사범위 : 채권자의 손해 한도로 제한될 것인지 여부의 논의\n\n1）무제한설 V. 2）제한설\n[判例] “매매 목적물이 화재 소실되어 매도인이 받는 화재보험금• 화재공제금 ‘전부’\n에 대하여 매수인은 대상청구권 O, 이행불능 당시 매수인이 지급했거나 지급하기로\n약정한 ‘매매대금’ 상당액 한도 내로 범위 제한 X” [2013Q7769]\n\n正辯 : 기존 학설대립은 ‘손해’를 한도로 할 것인지 여부이므로 불능 당시 ‘시가’ 상당액에 한정되지\n않는다는 표현이면 명확했을 것이나, 결론적으로 대법원은 무제한설의 입장에 가까움\n\n- 대상청구권 유형별 [判例]\n@ 토지수용 : 매매 토지 수용된 경우 보상금에 대상청구권 행사 O [92다4581]\n\n— 수용 사안에 대상청구권 행사 인정함으로써 537조 위험부담 법리 적용 배제 O\n— 채권자의 선택에 따르며, 채권자가 대상청구권 행사할 경우는 반대급부 이행의무 존속\n\n正辯 : 대상청구권을 인정한 최초의 대법원 판례는 채무자에게 귀책사유가 없는 토지수용 사건（위\n험부담）이었으며, 이후 이중매매（협의매매 포함）와 같은 채무자 귀책사유 있는 ‘이행불능’ 사건에서\n도 당연히 대상청구권을 인정하고 있음\n\n© 취득시효 완성된 토지 : 수용 혹은 이행불능 된 경우 완성자는 대상청구권 O “단,\n\n불능 전에 취득시효 권리주장 혹은 등기청구 했어야” [94다25025, 94443825]\n© 교환계약 : 당사자 쌍방이 각 협의매도 하여 각각 이행불능 된 경우에 그 중 일방은\n\n대상청구권 행사 X ••• 반대급부 이행 가능하여야 [95다6601]\n© 근저당권설정 사해행위취소 : 사해행위취소 및 근저당권등기말소 승소 확정되었으\n\n나 임의경매 진행으로 경락되어 근저당권등기말소의무가 이행불능으로 된 경우에\n대상청구권 행사로서 수익자가 받은 배당금반환청구 O [2010다71431]\n\n正辯 : 애초 배당금청구권의 양도（양도통지의 상대방은 대한민국, 측 경매법원）를 구하다가 피고가\n\n배당금을 수령하자 배당금반환청구로 청구취지를 변경한 사안（원상회복인 가액배상 청구 안에 대\n상청구 포함된 것으로 선해함）\n\nPART 1\n\n채권총론 • 채무불이행 • 15", "", [], 0, "채무불이행", 15, "미분류"],
  ["채권총론_P019", "2022다262209", "국민건강보험법에 따라 보험급여 받은 피해자가 불법행위의 가해자를", "[判例2022] 국민건강보험법에 따라 보험급여 받은 피해자가 불법행위의 가해자를\n상대로 손해배상청구 할 경우, 손해 발생에 피해자 과실 경합되거나 기왕증 책임\n제한 된다면 전체 기왕치료비 손해액에서 먼저 국민건강보험공단의 부담금 공제\n후 과실상계 혹은 책 임 제한 산정 [2022다262209]\n\n正辯 : 그 논거를 보면, 공단이 불법행위 피해자에게 보험급여를 한 다음 가해자에 대해 국민건강\n\n보험법에 따라 손해배상채권을 대위할 경우 가해자 손해배상액 한도로 공단부담금 전액이 아니라\n그중 가해자 책임비율 금액으로 제한, 나머지 금액（공단부담금 중 피해자 과실비율 금액）에 대해서\n\n는 피해자를 대위할 수 x — 보험급여 후 여전히 손해 전보받지 못한 피해자를 위해 공단이 최종\n적부담", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P020", "2013다34143; 95다49554", "과실상계 적용 X : 손해배상액 예정 [72다 108], 해제 원상회복 [2013다34143],", "[判例] 과실상계 적용 X : 손해배상액 예정 [72다 108], 해제 원상회복 [2013다34143],\n피해자 부주의 이용한 고의 불법행위（=사기 • 횡령 • 배임 등 영득행위, 위조행위 등\n“가해자가 불법행위의 이익 최종 보유하면 공평 • 신의칙에 반하는 경우에 한하여”）\n\n[99다50538, 2007다36445, 2012다 1146],\n\n표현대리 [95다49554],\n\n본래의 급부이행\n\n[96^8468], 673조 책임 [2000^37296]\n- [判例] 무과실책임과 과실상계 : “580, 581조（667조） 소정의 매도인（수급인）의 하자\n담보책임은 법정 무과실책임으로서 3%조 과실상계 규정이 준용될 수는 없다 하더\n\nPART 1\n\n채권총론 • 손해배상 • 21", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P021", "98다31868; 98다23232", "타인 물건 매매에서 매수인이 매도인 소유에 속하지 않음을 알지 못한 것이", "[判例] 타인 물건 매매에서 매수인이 매도인 소유에 속하지 않음을 알지 못한 것이\n매수인의 과실에 기 인했다면 매도인 배상액을 산정함에 참작하여야 [기 다218]\n\n正辯 : 타인 권리 매매 담보책임에도 과실상계 유추 긍정된다는 판례이긴 하나, 통상 매수인 측의\n‘잘못’. 즉 ‘타인 권리를 이전해주지 못한 것’에 대한 ‘귀책사유’로서 ‘고의나 과실’이 잘못으로 참작\n되는 법리라는 점 고려할 때, 단순히 매수인의 ‘인식’에 있어서의 과실, 즉, ‘악의나 과실’에서의 과\n\n실로서 ‘알 수 있었던 사실’을 가지고 배상액에 참작한다는 것은 법리상 의문임（私見）\n[判例] 손해담보계약상 담보권리자의 청구권에 과실상계 준용 X, 유추적용 X\n••• 손해배상청구권 X, 이행청구권 O — 다만 담보권리자 고의 •과실로 손해 야기\n\n되는 등 구체적 사정에 비춰 담보권리자의 권리행사가 신의칙 •형평 원칙에 반한다\n\n면 그 권리행사 전부. 일부가 제한될 수 O [2000472572]\n- [判例] 과실상계의 유추적용 O : ⑪ 가해행위로 인한 손해의 발생 • 확대에 피해자의\n심인적 • 체질적 소인이 기여했다면 법원은 공평의 원칙상 과실상계 법리 유추적용\n\n[91 다2977, 98다50586], © [判例] 통상적 의학적 • 법적 조치 취하지 않은 잘못\n正辯 : 판결문 실무에서는 이 경우 ‘책임제한’이라는 용어를 사용함\n- 피해자측 과실이론 : [判例] 공평 원칙상 “신분상• 사회생활상 일체를 이루는 관계”\n에 있는 자의 과실도 피해자의 과실로 인정 [98다31868] — 각종 차량 동승 사건 운\n\n전자의 과실을 동승 피해자의 과실로 인정 一 다만 다방 종업원 차 배달 사건에서는\n\n부정 [98다23232]\n\n正辯 : 사용자（다방주인） 운전, 피용자 피해 구조였기 때문인 것으로 해석됨", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P022", "97다35344; 2017다16747", "오로지 호의동승 차량 ‘운전자’ 과실로 동승자가 손해입어 동승차량 ‘운행자’", "[判例] 오로지 호의동승 차량 ‘운전자’ 과실로 동승자가 손해입어 동승차량 ‘운행자’\n상대로 손해배상 구할 때 一 운전자의 과실은 오로지 동승차량 운행자의 손해배상\n\n채무의 성 립요건일 뿐 피해자측 과실로 참작할 수 X [97다35344]\n- [判例2022] 공동불법행위에서 과실상계는 피해자의 가해자 각인에 대한 과실비율\n\n서로 달라도 전원에 대해 전체적 평가 ’.• 공동불법행위는 가해자들이 공동으로 가\n한 불법행위에 대한 책임 추궁 一 그러나 공동불법행위자 관계 아니면서 서로 별개\n원인 발생한 독립 채무가 동일한 경제적 목적 가져서 부진정연대채무 관계 인정될\n\n경우는 과실상계를 채무자 전원에 대해 전체적 평가 X [2017다16747]\n\n正辯 : 원고가 甲으로부터 공급받아 心에게 임대한 부두용 크레인의 붐（boom）이 붕괴한 사건에서\n甲의 크레인 제작상 과실（채무불이행 or 하자담보 책임）과 己의 크레인 관리상 과실（불법행위 or\n\n임대차계약상 채무불이행 책임）이 함께 원인이 된 부진정연대채무", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P023", "2009다85342", "397조 1항 단서는 약정이율이 법정이율 이상인 경우만 적용, 법정이율보다", "[判例] 397조 1항 단서는 약정이율이 법정이율 이상인 경우만 적용, 법정이율보다\n\n낮은 경우는 본문으로 돌아가 법정이율로 지연손해금 산정 '•• 무이자약정인 경우도\n이행지체 지연손해금은 법정이율로 청구할 수 있으므로 [2009다85342]", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P024", "99다57126; 2000다35771; 99다38637", "그러나 지연손해금률 자체를 따로 약정했다면 법정이율보다 낮더라도 약정", "[判例] 그러나 지연손해금률 자체를 따로 약정했다면 법정이율보다 낮더라도 약정\n지연손해금률을 그대로 적용 [2011 다50509]\n\n- 제2항 채권자 손해증명 불요, 채무자 과실 없음 항변 불가（=무과실책임）\n\n- 금전=가치 자체, 개성 없음 ••• 특정 X, 이행불능 X, 점유=소유\n\n5. 손해배상액의 예정（제398조）\n가. 규정 및 판례\n\n- 제1항 : 채무불이행 손해배상액 예정할 수 있다.\n- 제2항 : 부당히 과다하면 법원은 적당히 감액할 수 있다.\n\n0 [判例] 채권자의 과실을 들어 따로 감경할 필요 X •/ 과실상계 X [99다57126]\n©【判例] 과다 여부, 감액 범위에 관한 판단 기준시기는 사실심 변론종결 당시\n\n[2000다35771]\n© [判例] 법원은 당사자 주장 없더 라도 직 권 감액 O [99다38637]\n\n@ [判例] 법원은 실제 손해액을 구체적으로 심리 •확정할 필요는 없고, 다만 채무자\n\n는 실제 손해액이 예정액에 미치지 못함을 입증할 （실제상） 필요 있음 [95다33658]\n\n@【判例] 법원이 감액한 부분은 처음부터 무효 [91 다1149이\n® [判例2023] 부당성은 채권자• 채무자 지위, 계약 목적 • 내용, 손해배상액 예정한\n\n동기 • 경위 등 모든 사정 참작하여 일반 사회관념상 예정액 지급이 경제적 약자인\n채무자에게 부당한 압박 가하여 공정성 잃는 결과 초래하는 경우에 인정 一 기록상\n\n실제 （예상） 손해액 알 수 있다면 대비해 볼 필요 O, 단지 예정액 자체가 크다거나\n해제 시까지 단기라고 감액해서는 X — 배상액 예정이 없더라도 채권자가 받을 수\n있던 금액보다 적은 금액으로 감액하면 X — 사실심의 전권 사항 O, 다만 형평의\n원칙에 비추어 현저히 불합리하면 불허 [2017다8876, 20224227619]\n\n正辯 : 2017다8876 판결은 손해배상 예정액이 손해액의 10배이더라도 부당히 과다한 것은 아니라\n고 하였고, 2022다227619 판결은 투자금의 2배를 지급하는 약정을 투자금으로 감액한 원심의 감\n\n액이 위법하다고 보았음\n\nPART 1\n\n채권총론 • 손해배상 • 23", "", ["제398조"], 0, "손해배상", 23, "미분류"],
  ["채권총론_P025", "92다46905; 2018다248855; 2012다65973", "위약금이 위약벌（=실손해 배상과는 별도로 받는 제재금）로 되려면 특별한 사", "[判例] 위약금이 위약벌（=실손해 배상과는 별도로 받는 제재금）로 되려면 특별한 사\n정 주장 ■ 입증해야 하고, 위약벌의 경우 398조 2항의 감액 X — 다만 과도하게 무거\n\n운 경우는 103조 공서양속에 반하여 일부• 전부 무효일 여지 O [92다46905]\n- [大判全合2022] 위약금 약정이 손해배상액 예정인지 위약벌인지는, 계약서 내용,\n\n체결 경위, 목적 등 종합하여 구체적 • 개별적 판단해야 一 손해배상액 예정 추정되\n지만（398조 4항）, “하나의 계약에 채무불이행 손해배상에 관해 손해배상액 예정 조\n\n항 따로 있거나 실손해 배상 전제로 조항 있고 별도로 위약금 조항 있다면 위약벌로\n보아야” V 손해배상액 예정으로 해석하면 이중배상\n위약벌은 398조 2항 유추적용으로 감액 X, 현재 판례 유지 •/ 위약벌（이행 확보）과\n손배예정（증명곤란 해결, 분쟁 방지, 이행 확보）은 성질 • 기능 본질적으로 다름, 398\n\n조 4항 문언상 손배예정과 구별되는 것 존재 전제, 위약벌 약정 사적 자치 존중하여\n법원 개입 최소화, 103조 위반 무효로 통제 가능 [2018다248855]\n\n正辯 : 당시 6°!〈반대의견〉은 손배예정과 위약벌의 기능 유사하고 위약벌의 103조 통제는 불필요\n한 우회로라는 이유로 위약벌도 398조 2항 유추적용 감액 긍정하는 의견\n\n【判例] 매수인 책임으로 해제시 이행보증금은 ‘위약벌’로 매도인에 귀속된다는 규정\n\n있어도 다른 손해배상 배제하고 모든 금전적 문제를 오직 이행보증금 몰취로 해결하\n려는 것이면 배상액 예정 [2012다65973]", "", [], 0, "손해배상", 24, "미분류"],
  ["채권총론_P026", "92다41719; 2006다9408", "江이 지급의무 위반하면 甲에 대한 채권을 포기하기로 하는 위약금", "[判例2020] 江이 지급의무 위반하면 甲에 대한 채권을 포기하기로 하는 위약금\n\n약정 一 甲은 채권포기 주장 외에 따로 손해배상 구하기 어렵고, 약정금 지급 강제\n및 의무위반 제재 수단이기도 하면 一 위약금약정은 손해배상액 예정 및 위약벌의\n\n성격 함께 O — 법원은 당사자 주장 없더라도 직권으로 398조 2항 감액 O, 채권 전\n액 포기 가 부당하게 과다하다면 감액 O [2017다27527이\n\n나. 예정배상액의 청구\n\n- 채권자가 예정배상액 청구하려면, 손해 발생 및 금액 입증할 필요 없지만, 적어도\n‘채무불이행’ 사실 및 ‘배상액 예정의 존재 • 내용’은 입증하여야\n\n- ① 손해발생 불요설 [통판] : [判例] 손해 발생사실 및 손해액 입증곤란 구제가 제도의\n\n목적 [92다41719]\n② 귀책사유 필요설 [통판] : [判例] “채무자의 귀책사유를 불문한다는 약정이 없는 한,\n\n채무자는 귀책사유 없음을 주장• 입증하여 예정배상액의 지급책임 면할 수 O”\n무과실책임 약정의 존재는 엄격하게 해석 [2006다9408]", "", [], 0, "손해배상", 24, "미분류"],
  ["채권총론_P027", "97다36996; 2019다292736", "유동적 무효인 매매계약 체결 당시 일방이 토지거래허가 협력의무 불이행을", "[判例] 유동적 무효인 매매계약 체결 당시 일방이 토지거래허가 협력의무 불이행을\n할 경우에 대한 손해배상액 예정 O — 일방의 협력의무 불이행, 매매계약 일방적\n\n철회로 확정적 무효가 되는 경우 포함 O [97다36996]\n\n다. 관련 판례\n\n— [判例2022] 채권자가 채무불이행 이유로 계약 해제 해지해도 원칙적으로 손해배상액\n예정은 실효되지 X, 전보배상도 손해배상 예정액으로 결정 V 398조 13항, 551조\n문언 • 내용, 계약당사자 일반적 의사 一 다만 계약 유지를 전제로 정한 약정이라는 등\n특별한 사정이 있다면 해제 해지로 실효 O [2019다292736]\n\n正辯 : 甲이 주최하는 공연의 티켓을 己이 대량구매 및 판매대행 하는 계약에서 ‘공연이 취소된 경\n우 甲은 己에게 판매대금 전액을 지급해야 하고, 己의 귀책으로 계약이 불이행되면 구매대금은 반\n환하지 않는다’는 조항의 경우, 공연의 정상적 진행은 계약 목적 달성에 중요한 사항으로서 甲과\n己은 공연이 취소되면 계약이 유지될 수 없어 해제될 수 있음을 인식한 것이므로, 위 조항이 계약\n유지를 전제로 한 것이라고 단정한 원심판단은 잘못", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P028", "98다48033", "일방의 귀책사유로 해제될 경우만 위약금약정을 둔 경우（=일방 위약금약정） 상", "[判例] 일방의 귀책사유로 해제될 경우만 위약금약정을 둔 경우（=일방 위약금약정） 상\n대방 귀책사유로 해제될 경우에는 적용 X [2007Q40765]\n\n- 【判1列] 매매 당사자 모두 매매목적물이 타인 소유인 사실 모르고 계약 체결한 경우\n위약금 약정은 타인 권리매매 담보책임까지 예상하여 그 배상액 예정한 것 X [76다\n\n1699]\n- [判例] 계약 당시 손해배상액 예정을 한 경우 그 계약과 관련된 불법행위상 손해까\n지 예정한 것은 X [98다48033] — 잔금불이행으로 토지매매계약 해제된 경우 매수\n\n인의 건물철거 불이행으로 인한 차임 상당 손해는 배상액 예정과 별도 청구 O", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P029", "2016다274270", "계약 관련 손해배상액 예정한 채무불이행과 별도의 행위를 원인으로 손해 발", "[判例] 계약 관련 손해배상액 예정한 채무불이행과 별도의 행위를 원인으로 손해 발\n생하여 불법행위 • 부당이득 성립하면 손해는 예정액에서 제외 一 그러나 계약 당시\n채무불이행으로 인한 손해로 예정했다면 손해 발생 원인행위의 법적 성격 불문하고\n\n그 손해는 예정액 포함, 별도 배상 • 반환청구 X [2016다274270]\n- [判例] 매매당사자 사이 수수된 계약금에 대하여 매수인 위약시 몰취하고, 매도인\n\n위약시 배액상환하는 ‘약정’ 있는 경우 그 계약금은 398조 손해배상액의 예정의 성질\n뿐 아니라 565조 해약금의 성질도 겸유한 것 [91 다2151]\n\nPART 1\n\n채권총론 • 손해배상 • 25", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P030", "2020다300893; 94다4806", "피대위자인 채무자가 실존인물 아니거나 사망한 사람이면 대위소송은", "[判例2021] 피대위자인 채무자가 실존인물 아니거나 사망한 사람이면 대위소송은\n\n당사자적격 없어 부적법 각하 ••• 피보전채권 X [2020다300893]\n正辯 : 국가를 상대로 토지소유권확인 구하는 대위소송에서 채무자（소유자） 사망하고 그 상속인은\n\n누구인지 알 수 없는 사안\n— [判例] 토지거래허가신청절차 협력의무 이행청구권 O - 이를 피보전채권으로 제3\n자 명의 불법등기 말소청구 대위 O [94다4806]\n\nPART 1\n\n채권총론 • 채권자대위권 • 27", "", [], 0, "채권자대위", 27, "미분류"],
  ["채권총론_P031", "68다663; 88다카4253; 2019다229202", "채권자대위 요건 ‘무자력’은 변제자력 없음 의미, 임의변제 기대할 수 없다면", "[判例] 채권자대위 요건 ‘무자력’은 변제자력 없음 의미, 임의변제 기대할 수 없다면\n\n강제집행 통한 변제 고려 一 부동산에 이미 제3자의 소유권이전청구권보전 가등기\n마쳐있다면 강제집행 통한 변제 사실상 불가능하여, 가담법에 정한 담보가등기로서\n\n강제집행 통한 매각 가능하다는 등 특별한 사정 없는 한, 위 부동산은 실질적 재산\n\n가치 없고 적극재산에서 제외【2008다76556]\n- [判例] 금전채권임에도 예외적 무자력 불요 : “밀 • 현 • 간 인정된다면”\n\n@ 국가배상법 : 국가배상 피해자를 치료한 의료인이 피해자를 대위 [80다 1351]\n© 유실물법 : 실제 습득자가 법률상 습득자를 대위 [68다663]\n© 임대차보증금반환채권 양수인 : 양수금청구에 대하여 임대인이 동시이행항변 권\n\n행사하므로（v 채권양도의 동일성） 양수인이 임대인을 대위하여 임차인에 대해 임대차\n\n목적물 인도청구 할 때 임대인（채무자）의 무자력은 불요 ••• 피보전채권과 피대위권\n리가 동시이행관계이므로 밀 • 현 • 간 O, 임대인 자력 무관하므로 [88다카4253]\n\n@ 수임인의 대변제청구권（688조 2항） : A회사의 이사 甲이 업무로 인하여 B에 대한\n\n대출채무를 부담하게 되어 甲이 A의 상계권을 대위행사할 때 A 무자력 불요 •/ 대변\n제청구권은 통상의 금전채권과는 다름 [2001 다52506]\n- [大判全合2022] 보험금 지급사유 아닌 경우, 보험자가 피보험자에 대한 금전채권인\n부당이득반환채권 보전하기 위해 피보험자（채무자）를 대위하여 요양기관（제3채무자）\n\n을 상대로 진료비 상당 부당이득반환채권 행사할 때 채무자 자력 있다면 보전의 필\n\n요성 x •.• 대위 않으면 피보전채권 만족 못 받을 위험 X, 밀접한 관련성도 X, 다\n른 채권자보다 우선하여 채권자평등 위배, 피보험자 자유로운 재산관리 부당한 간섭\n\n[2019다229202]\n正辯 : 당시 5인의〈반대의견〉은 밀접한 관련성과 현실적 이행 유효 적절 수단이며 부당한 간섭 아\n니라면서 채무자 무자력 필요 없이 대위 가능하다는 의견\n\n- 【大判全合202이 공유물분할청구권은 일신전속권 아니고 피대위권리 O —> 그러나\n금전채권 보전 위한 부동산 공유물분할청구권 대위행사는 보전 필요성 X •/ 책임\n\n재산 보전과 직접적 관련 X, 현실적 이행 유효• 적절 확보 필요 X, 부당한 간섭 —\n극히 예외적으로만 인정 一 채무자 지분이 다른 지분과 함께 공동근저당권 목적이고\n피담보채권이 채무자 지분 초과하여 채무자 지분만 경매하면 남을 가망 없어 경매\n취소（민집법 102조）, 공유물분할 방법으로 전부 경매하면 368조 1항 의해 채무자 지\n\n분에서 피담보채권 분담액 변제하고 남을 가망 있더라도 마찬가지 [2018다879]\n\n正辯 : 위 전합에는 남을 가망 없다면 보전의 필요성 인정하자는〈반대의견〉이 있었음\n\nPART 1\n\n채권총론 • 채권자대위권 • 29", "", [], 0, "채권자대위", 29, "미분류"],

  ["채권총론_P033", "92다32876; 2018다210539", "대위소송이 피보전채권 ©의 부존재 이유로 각하 확정 - 채권자가 채무자", "[判例] 대위소송이 피보전채권 ©의 부존재 이유로 각하 확정 - 채권자가 채무자\n상대로 @ 이행청구 후소에 기판력 X v “대위소송의 기판력은 채무자가 알았을 때\n\n대위소송의 소송물인 피대위권리 존부에 관하여 채무자에게 미친다는 것이지, 대위\n소송의 소송요건인 피보전채권의 존부에 관하여 당사자가 아닌 채무자에게 기판력\n이 미치는 것은 X ” [2011 다108095]\n\n다. 채무자의 권리 불행사\n- [判例] 채무자가 부적당한 소송으로 패소（기각） 확정돼도 대위소송은 당사자적 격 없\n\n으므로 각하 [92다32876]\n\n— [判例] 비법인사단이 사원총회 결의 없이 제기한 총유재산에 관한 소는 소제기 특별\n수권 결하여 부적법, 비법인사단의 소제기 의사결정 없음 一 각하 확정된다면 채무\n\n자（비법인사단） 스스로 권리 행사한 것 X — 비법인사단의 채권자의 대위소송은 적\n법 O [2018다210539]\n\n正辯 : 채무자가 기각으로 패소확정 된 경우와 구별할 것\n\n— 그러나 채무자의 동의를 얻을 필요는 없고 채무자가 반대한 경우도 대위권 행사 O\n라. 피대위권리\n\n— 행사상 일신전속권이 아닐 것 : 가족법상 권리 X\n친생부인권 • 이혼청구권 • 부양청구권 • 상속의 승인 • 포기 一 모두 X", "", [], 0, "채권자대위", 30, "미분류"],

  ["채권총론_P037", "67다2440; 2000다73049; 2012다75239", "청약 X, 승낙 X （채무자에게 이미 확정적 의사 있는 특별한 사정 없는 한）", "[判例] 청약 X, 승낙 X （채무자에게 이미 확정적 의사 있는 특별한 사정 없는 한）\n... 일신전속적 인 것은 아니나 새로운 권리의무관계 발생 [2011 다10052刀\n\n- 채권적 청구권에 한하지 않고, [判例] 형성권 0（상계권, 해제 • 해지권 [2006다8270이.\n환매권, 공유물분할청구）,\n\n물권적 청구권,\n\n채권자대위권 [67다2440],\n\n채권자취소권\n\n（“제소기간 준수는 대위의 목적인 권리의 채권자인 채무자를 기준으로 그가 안 날로\n\n부터 1년 내에 행사하여야” [2000다73049]）, 조합 탈퇴권 O [2005마113이\n[判例] 소송법상 권리 O — 그러나 채무자• 제3채무자 사이 소송 계속된 이후의 소\n송수행 관련 개개의 소송상 행위 x ••• 소송당사자인 채무자의 의사\n\n상소제기 X, 재심의 소 제기 X [2012다75239]", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P038", "93마1655", "본안의 제소명령 신청권, 제소기간 도과 의한 가압류.가처분 취소신청권 o", "[判例] 본안의 제소명령 신청권, 제소기간 도과 의한 가압류.가처분 취소신청권 o\n••• 가압류• 가처분 절차와 별개 독립된 소송절차 개시 권리 [93마1655]", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P039", "2008다75072; 2022다230165", "채권자는 채무자의 이행인수인에 대한 청구권을 대위행사 O [2008다75072]", "[判例] 채권자는 채무자의 이행인수인에 대한 청구권을 대위행사 O [2008다75072]\n[判例] 채무자의 일반 채권자는 독자적으로 소멸시효 주장 X, 그러나 자기 채권을 보\n전하기 위해 필요 한도에서 채무자를 대위하여 소멸시효 주장 O [2011 다10950이\n\n正辯 : 배당이의 소송에서 소멸시효 원용권을 대위한 사안\n[判例2022] 채권자가 대출금 지체 이유로 임차인을 대위하여 공공임대주택 임대차\n계약 해지 x ••• 헌법 35조 3항과 주거기본법 2조, 공공주택 특별법의 경제적 약자\n\n주거권 보장 취지, 공공주택 특별법 해지사유는 강행규정이므로 중도 해지 및 인도\n\n약정은 무효, 특별법 적용되는 임대차에서 임차인의 중도 해지권은 행사상 일신전속\n권,[2022다230165]\n\n2. 행사\n가. 행사방법\n\n- 채권자는 자기 이름으로 채무자의 권리를 행사\n- [判例2024] 채권자대위권은 제3채무자에 대해 채무자에게 일정한 급부행위를 하라\n고 청구함이 원칙 — 다만 급부수령 필요한 금전지급 • 물건인도나 등기말소의 경우에\n는 채권자에게도 급부 수령권한 O, 채권자에게 행한 급부 효과가 채무자에게 귀속\n\nO, 예외적으로 채권자가 제3채무자에 대해 직접 자신에게 급부행위 하도록 청구 O\n그러나 채무자가 제3채무자에게 채권양도 구할 권리 있고 채권자가 이를 대위행사할\n경우는 직접청구 예외 X, 채권자는 제3채무자에 대해 ‘채무자에게’ 채권양도절차 이\n행하도록 청구해야 O, 직접 ‘자신에게’ 채권양도 이행할 것 청구 X V 채무자에게\n\nPART 1\n\n채권총론 • 채권자대위권 • 31", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P040", "95다18741; 94다39369; 2017다228618", "채권자의 채무자에 대한 소송에서 채무자 인낙 一 대위소송에서 제3채무자는", "[判例] 채권자의 채무자에 대한 소송에서 채무자 인낙 一 대위소송에서 제3채무자는\n채무자가 인낙하여 증명된 피보전채권 존재 다툴 수 X [95다18741]\n[判例] 대위소송에서 채권자는 피보전채권 존재, 보전 필요성, 기한도래 증명 -\n\n피보전채권의 발생원인 X, 제3채무자에게 대항할 수 있는 사실 X [94다39369]\n— [判例] 채권자가 채무자 상대로 피보전채권 이행청구 승소판결 확정됐다면, 특별한\n\n사정 없는 한 제3채무자에 대한 관계에서도 피보전채권 발생원인인 사실관계 증명\n된 것 O — 그러나 대위소송을 주목적으로 확정판결 •화해조서 이뤄졌고 강행법규\n\n위반 무효라면. 판결 • 화해가 （준）재심으로 취소되지 않았더라도, 대위소송의 제3채\n\n무자에 대한 관계에서는 피보전권리 존재 않는 것 一 제3채무자는 피보전권리 부존\n\n재 주장 O, 당사자적격 없는 대위소송은 각하 [2017다228618]\n\n正辯 : 혹정판결 등은 그 내용이 강행법규 위반이어도 （준）재심으로 취소되지 않는 한 기판력 있으\n\n나, 제3채무자는 피보전채권 소송의 기판력 당사자가 아니기 때문인 것으로 보임. 한편 위 판결은\n토지거래허가구역 내 토지에 관하여 처음부터 허가 배제 • 잠탈하는 내용으로 매매계약 체결한 사\n안（체결 후 허가구역 지정해제 되어도 이미 혹너정적 무효일 뿐）\n\n— [判例] “채권자는 자기와 제3채무자 사이의 독자적 사정에 기한 사유 주장 X ’ — 채\n무자와 제3채무자 사이 무효 가등기 유용합의에 따른 부기등기 하기 전에 부동산에\n\n가압류 등기한 채권자가 채무자를 대위하여 제3채무자에게 말소 X [2009다4787]\n正辯 : 제3채무자가 채무자에게 유용합의로써 대항할 수 있으니 대위채권자에게도 대항할 수 있다\n는 취지이므로 대위소송은 ‘기각’될 것으로 보임（환송 후 판결은 강제조정되었음）.", "", [], 0, "채권자대위", 34, "미분류"],
  ["채권총론_P041", "2020다223781", "임대차보증금반환채권의 근질권자가 갱신 없는 임대차 종료 주장하며", "[判例2020] 임대차보증금반환채권의 근질권자가 갱신 없는 임대차 종료 주장하며\n\n임대인（한국토지주택공사）을 대위하여 임차인 상대로 아파트 인도청구 一 임대인\n은 갱신거절 의사표시 없고 갱신 존속 중임을 전제로 임차인에게 증액보증금 납부\n\n청구하여 임차인이 이행했다면, 임대인은 갱신거절 주장 X — 근질권설정계약상\n\n‘임대차계약 갱신은 채권자 동의 필요’ 규정은 채권자와 제3채무자 사이 독자적 사정\n이므로 주장 x •■• 채권자대위는 채무자가 주장할 사유 내에서만 주장해야, 임대인\n갱신거절 않아 묵시적 갱신된 것은 질권 목적인 보증금반환채권 자체가 아닌 이를 발\n\n생시킨 기본적 계약관계에 관한 사유로서 질권설정자（임차인）가 채권 자체 소멸\n\n시키거나 질권자 이익 해하는 변경\n\nx（352조 X）— 근질권자 인도 대위청구 기각\n\n[2020다223781]\n正辯 : 보증금반환채권 질권자가 임대인에 대한 직접청구권（353조）을 보전하기 위해 임대인의\n인도청구 대위행사하는 사안이며, 통상 채권질권 사안은 채권양수인과 유사한 구조 一 채권질권", "", [], 0, "채권자대위", 34, "미분류"],
  ["채권총론_P042", "2016다1045; 95다27905; 97다34334", "@9 사해행위 당시 액수• 범위 구체적 확정되지 않았어도 피보전채권 o", "[判例] @9 사해행위 당시 액수• 범위 구체적 확정되지 않았어도 피보전채권 o\n\n[2016다1045] - 가령 불법행위 손해배상채권\n- 예외 : [判例] 장래의 채권도 “사해행위 당시 이미 채권성립 기초 발생, 가까운 장래\n\n채권이 성립되리라는 고도의 개연성, 실제로 채권이 성립한 경우에는 채권자취소권\n의 피보전채권 O” [95다27905]\n\n@ 구상보증 사건 : [判例] 사해행위 당시 아직 보증인이 보증채무 이행하지 않아\n구상권 • 구상보증채권 발생하지 않았으나 당시 주채무자 재정 악화로 그가 보증채무\n\n이행할 개연성 높았다면 장래의 구상보증채권을 해치는 것 O [97다34334]\n® 연대보증서류 사건 : [判例] 2~3일 간격으로 은행에 연대보증서류 제출 一 사해\n\n행위 一 연대보증 서명을 하였다면 개연성 O [2002다42957]\n© 계속적 물품공급 사건 : [判例2023] 계속적 물품공급계약 자체로 당사자의 채권이\n바로 성립\n\nX, 주문자가 구체적 물품공급 의뢰하고 상대방도 공급하는 별개 법률관계\n\n성립해야 채권 성립 - 사해행위 당시 계속적 물품거래관계 존재했다는 사정만으로\n\n채권 성립 기초 법률관계\n\nX\n\n（물품 수량•단가 등을 구체적으로 미리 정했거나 일정\n\n한도에서 공급자 외상 물품 공급 의무 규정하지 않은 이상） [2022다272046]\n\n正辯 : A와 B 사이에 구체적 수량 단가 거래시기 정하지 않고 물품공급계약 체결한 상태에서 b가\n\n4. 1. e에게 부동산 매각하는 계약 체결 후 6. 1. 소유권이전등기 경료 一 A가 B에게 5월에 공급한\n물품대금채권（변제기 6. 30.）을 피보전채권으로 위 매매계약을 사해행위취소 X\n@ 신용카드 사건 : [判例] 신용카드가입계약 체결로 카드 발급받고 사해행위 후 카\n\n드 사용하여 카드대금 연체한 경우는\n\n[2004다40955]\n\n\nx\n\n••• 신용카드가입계약만으로 기초관계\n\nX", "", [], 0, "사해행위취소", 36, "미분류"],
  ["채권총론_P043", "2025다211379; 2018다260855", "피보전채권에 보증인 등 인적 담보 붙어 있더라도, 주채무자 법률행위의", "[判例2025] 피보전채권에 보증인 등 인적 담보 붙어 있더라도, 주채무자 법률행위의\n\n사해성 판단에 보증인 등의 변제자력은 고려 X, 법률 근거한 보증기금의 신용보증\n이더라도 마찬가지, 오로지 주채무자 자신의 자력만 고려 [2025다211379]\n\n— 재산권 목적 : 가족법상 행위는 사해행위 X\n[判例] 상속의 승인 • 포기 X V 순수한 재산적 행위는 X, 인정하면 법률관계 복잡,\n상속인 재산 현재보다 악화는 아님 [2011 다29307]\n[判例] 유증의 포기 X V 유언자 사망 후 언제든 유증의 승인 • 포기 자유 및 그 소급\n\n효（1074조）, 재산 현재보다 악화는 아님 [2018다260855]", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P044", "2013다84162; 2019다281156", "영업양도를 사해행위취소 O - 영업 동일성 유지한 채 회복이 어려우면 영", "[判例] 영업양도를 사해행위취소 O - 영업 동일성 유지한 채 회복이 어려우면 영\n업재산• 영업권 포함된 일체로서의 영업의 가액반환 O [2013다84162]\n\n- 사해성 : [判例] “채무자 일반재산이 감소하여 채권 공동담보에 부족이 생겨 완전한\n변제 할 수 없게 되는 것” = “채무초과（무자력） 상태 초래되거나 이미 빠져있던 채무\n초과（무자력） 상태가 악화되는 경우”\n\n- 무자력은 사해행위 당시 기준 （다만, 변론종결시까지 유지되어야）\n— 【判例2022] ‘사해행위’의 채무초과 판단의 소극재산은 사해행위 전에 발생되어야\n\n— 그러나 사해행위 당시 이미 채무 성립 기초 법률관계 성립, 가까운 장래 채무 성\n립 고도 개연성, 실제로 채무 성립했다면 그 채무도 채무자의 소극재산 포함 O\n\n— 채무 성립 기초 법률관계는 약정뿐 아니라 준법률관계•사실관계 O, 계약 교섭\n상당 진행으로 계약체결 고도 개연성 단계도 포함 O [2019다281156]\n\n正辯 : 사해행위로 주장되는 토지 • 건물 양도에 대한 양도소득세 • 지방소득세 채무는 통상적으로 매\n매대금 완납 이후 비로소 발생하여 사해행위 당시 발생 X, 채무 성립 기초가 이미 성립되지도 X,\n채무 성립 고도 개연성도 X, 양도계약 교섭 진행되었어도 양도소득세 • 지방소득세 채무 성립 위한\n\n교섭은 X - 양도소득세 • 지방소득세는 소극재산 X", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P045", "2023다237804", "재산처분 당시 적극재산 산정에서 실질적 재산가치 없어 공동담보 역할", "[判例2023] 재산처분 당시 적극재산 산정에서 실질적 재산가치 없어 공동담보 역할\n할 수 없는 재산은 제외, 재산이 채권이면 용이하게 변제받을 확실성 긍정될 경우만\n\n적극재산 포함 스 어떤 채권의 존부. 범위 증명 있다면, 변제받을 확실성 없어 실질\n\n적 재산가치 없다는 점을 취소채권자가 주장•증명책임\n채무자가 여러 채권자 중 일부에게만 채무 이행과 관련하여 채무보다 적은 가액의\n\n다른 채권 기타 적극재산을 양도하여 채무초과 유발되었는지 판단함에 있어 양도된\n\n재산을 적극재산에서 제외했다면, 위 채무 중 양도된 재산과 같은 금액에 해당하는\n부분도 소극재산에서 제외하여야 [2023다237804]", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P046", "2007다54849", "처분행위 당시 무자력이었으나 그 후 채무자가 자력 회복하여 사실심 변론종", "[判例] 처분행위 당시 무자력이었으나 그 후 채무자가 자력 회복하여 사실심 변론종\n결시에 해하지 않게 된 사정변경은 채권자취소소송의 피고가 입증해야 一 자력회복\n되면 보전의 필요성 X, 채권자취소권 소멸 [2007다54849] ■— 기각", "", [], 0, "사해행위취소", 39, "미분류"],
  ["채권총론_P047", "2014다230894; 2019다266409", "공유지분에 담보가등기 설정했다가 공유물분할로 단독소유가 된 부동산에", "[判例] 공유지분에 담보가등기 설정했다가 공유물분할로 단독소유가 된 부동산에\n‘전사’된 담보가등기에 관하여 사해행위취소 할 경우 특별한 사정이 없는 한 공유지\n분에 대한 담보가등기 설정 당시를 기준으로 사해행위 해당 여부 판단해야\n\nV 공유물분할은 형식적으로는 공유자 상호간 지분의 교환• 매매지만, 실질적으로는\n분산된 지분을 취득하는 특정 부분에 집중시 켜 소유형 태 변경한 것에 불과\n공유물분할 후 당초 지분에 담보가등기 설정한 공유자의 단독소유로 귀속된 부동산\n에 종전 담보가등기 대체하는 새로운 담보가등기 설정하고 다른 공유자 소유로 분할\n\n된 부동산에 전사된 담보가등기는 모두 말소한 경우 - 담보권설정자에 대한 채권자\n\n가 채권자취소권 행사하려면 공유물분할 자체가 사해행위라는 특별한 사정 없는 한,\n분할로 단독소유가 된 부동산에의 （새로운） 담보가등기설정계약을 취소하고 그 담보\n가등기의 말소를 구하는 방'법으로 [2014다230894]\n正辯 : 결국 사해행위 여부는 제1 담보계약 설정 당시를 기준으로 판단하되, 취소 대상인 사해행위\n는 제2담보계약으로 해야 하고（V 제1담보계약은 이미 해제됨, 제2담보계약은 제1담보계약을 대\n\n체한 것에 불과하여 실질적으로 동일）, 원상회복도 제2담보계약에 따른 등기 말소를 구해야 함（기\n록형 청구취지 대비）. 한편 1심은 애초 대법원과 동일한 취지, 항소심이 제2담보계약 취소청구를\n배척했다가 위와 같은 이유로 파기되었는데, 환송 후 원심이 환송판결의 기속력에 반하는 판단을\n\n하여 재상고심에서 다시 파기되었음\n— [判例2021] W 가등기 원인 법률행위와 본등기 원인 법률행위가 다르지 않다면,\n\n사해행위 요건 구비 여부는 가등기 원인 법률행위 기준으로 판단해야 一\n\n그러나\n\n각 원인 법률행위가 다르면 사해행위 요건 구비는 본등기 원인 법률행위 기준으로\n\n판단해야, 제척기간도 본등기 원인 법률행위가 사해행위임을 안 때 一 채무자가\n유일한 재산인 부동산의 가등기 효력 소멸 상태에서 새로 매매계약 체결하고 말소\n\n해야 할 가등기를 기초로 본등기 마친 행위는 가등기 원인 법률행위와 별개로 일반\n채권자 공동담보 감소시키는 사해행위 O — 본등기 원인인 새로운 매매계약을 기\n준으로 사해행위 여부나 제척기간 준수 여부 판단해야 [2019다266409]\n\n正辯 : 자력이 있는 A는 B와 X부동산의 매매예약 체결하여 B에게 가등기 경료해주고 매매예약\n완결일로부터 10년 지나 가등기 원인 소유권이전등기청구권 소멸시효 완성 一 그 후 무자력인\n\nA는 e에게 X부동산을 매도하면서 원인무효인 B 명의 가등기 유용하여 부기등기 마쳐주고 본등\n기 하기로 합의하여 부기등기 및 본등기 경료함 스 A의 채권자 K가 A와 C 사이의 매매계약을\n사해행위로 취소할 때 종전 매매예약이 아닌 새로운 매매계약을 기준으로 사해행위 요건 및 제\n\n척기간 판단해야\n이때 K는 사해행위취소 원상회복으로 매매계약에 따른 본등기말소청구 O, 그러나 가등기는 위 원\n\nPART 1\n\n채권총론 • 채권자취소권 • 39", "", [], 0, "사해행위취소", 39, "미분류"],
  ["채권총론_P048", "2012다118334", "•‘임대차보증금반환채권은, 장차 임대차 종료로 실제 성립하는 때 선순위권리", "[判例] •‘임대차보증금반환채권은, 장차 임대차 종료로 실제 성립하는 때 선순위권리\n존재나 연체차임 등으로 임차인의 현실적 반환 불가능이 합리적 예측되는 특별한 사\n\n정 없는 한, 애초의 보증금액 상당 가치대로 적극재산에 포함” [2012다118334]", "", [], 0, "사해행위취소", 40, "미분류"],
  ["채권총론_P049", "2004다58963; 2013다60661", "압류금지재산은 적극재산에 포함시키지 X [2004다58963]", "[判例] 압류금지재산은 적극재산에 포함시키지 X [2004다58963]\n[判例] 연속한 수개의 처분행위는 각 행위마다 사해성을 개별적으로 판단 [2002다\n\n23857]\nO - [判例] “채권자에게 근저당권 설정되고, 담보물 가액 및 채권최고액이 당해 채무액\n을 초과（=채무 전액 우선변제권 확보）한다면, 채무자의 처분행위는 유일한 재산의\n\n처분이라 해도 사해행위 X, 그러나 만일 채무액이 부동산 가액 및 최고액을 초과한다\n면 우선변제받을 금액 공제한 나머지 채권액에 대해서만 채권자취소권 o - 피보전\n채권이 자신의 우선변제권의 범위 밖이라는 점은 취소채권자가 입증책임, 우선변제\n\n받을 금액은 처분행위 당시의 담보물 시가 기준으로 산정” [2013다60661]\n[判例2021] EM 이때 담보물로부터 우선변제받을 금액은 사해행위 당시 기준으\n\n로 담보물 가액에서 취소채권자에 앞서는 선순위 담보물권자가 변제받을 금액을 먼\n저 공제한 다음 산정해야 ― 취소채권자가 채무자 소유 부동산에 근저당권 설정했는\n데 사해행위 당시 채무자에 대해 근로기준법상 최우선변제권 있는 임금채권 이미 성\n\n립하여 임금채권자가 그에 기해 그 담보물에 압류• 가압류 등기 마치는 등 가까운 장래\n우선변제권 행사할 고도의 개연성 있고 실제로 그 개연성이 현실화된 경우, 취소채권\n\n자는 사해행위 당시 담보물로부터 우선변제 받을 수 없는 일반채권 발생할 고도의\n\n개연성이 가까운 장래 현실화된 것 一 그 일반채권도 채권자취소권 행사할 피보전\n채권 O - 사해행위 당시 기준 담보물 가액에서 우선변제권 있는 임금채권액을 먼\n\n저 공제한 다음 취소채권자가 우선변제받을 금액을 산정 一 취소채권자 채권액에서\n\n그 우선변제받을 금액을 공제한 나머지 채권액에 대해서만 채권자취소권 O [2016\n다263355]\n\n正辯 : 장래의 피보전채권에 관한 기 • 개 실 법리가 ‘물적 담보권자가 채권자취소권을 행사할 수 있\n는 피보전채권액의 범위’를 결정할 때도 적용되는 것（위 판결이 명시적 언급함）\n[判例] 채권자가 전액 우선변제권 확보하고 있다면 보증인도 사전구상권을 피보전권", "", [], 0, "사해행위취소", 40, "미분류"],
  ["채권총론_P050", "2009다47852; 2000다42618; 2003다39989", "근저당권 설정된 주택의 경매개시 직전 보증금 최우선변제 임대차계약 체결", "[判例] 근저당권 설정된 주택의 경매개시 직전 보증금 최우선변제 임대차계약 체결\n\n— 근저당권자 피담보채 권액과 임대차보증금반환채무액이 경매절차 주택 감정가를\n초과하지 않고（=채무초과 X）, 소액보증금 최우선변제를 감안해도 근저당권자 채권\n\n전액 우선변제권 확보된다면, 임대차계약체결행위는 사해행위 X [2009다47852]\n正辯 : 만일 그렇지 않다면, 임대차계약체결행위가 선순위 저당권자에게도 사해행위가 될 수 있다\n는의미\nO - [判例] 저당권 설정된 부동산 매각할 경우 사해행위는 부동산 시가에서 채권최고액\n\n이 아닌 실제 발생해 있는 피담보채권액을 공제한 잔액 범위 내에서 성립 一 만일\n\n피담보채권액이 부동산 가액을 초과한다면 부동산양도는 사해행위 X [2000다42618]\n[判例] 만일 공동저당권이 설정된 수 개의 부동산 중 일부가 양도된 경우라면, 피담\n\n보채권액은 특별한 사정이 없는 한 공동저당권의 목적인 각 부동산의 가액에 비례하\n여 피담보채권액을 안분한 금액 ••- 368조 규정 취지 [2003다39989]", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P051", "", "그러나 공동저당권 목적인 수 개 부동산 중 일부 부동산 혹은 공유부동산 중", "[判例] 그러나 공동저당권 목적인 수 개 부동산 중 일부 부동산 혹은 공유부동산 중\n일부 지분이 물상보증인 또는 제3취득자의 소유인 경우라면, 채무자 소유 부동산의\n\n피담보채권액은 공동저당권의 피담보채권액 전액 O V 물상보증인•제3취득자는\n\n481조, 482조 변제자대위 O [2008다25671, 2007478234, 2012다5643]\n©", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P052", "2007다23081; 2016다208792", "담보권 설정된 부동산에 대한 새로운 담보권 설정행위의 사해행위취소에서", "[判例] 담보권 설정된 부동산에 대한 새로운 담보권 설정행위의 사해행위취소에서\n만일 선순위 담보권 설정행위가 사해행위로 인정된다면（이미 취소 및 말소되었거나\n\n혹은 2개 담보권 사해행위취소 사건에서 선순위가 사해행위로 인정된 경우） 후순위\n\n담보권 설정행위의 사해행위 여부 판단에 있어 선순위 담보권 피담보채무액은 당해\n부동산에 설정된 담보권 피담보채무액에 포함시킬 수 X [2007다23081]\n- [判例] 저당권 피담보채권액이 시가를 초과했더라도 채무자가 목적물 양도에 앞서\n“자신의 출재로” 피담보채무 일부 변제하여 다시 초과하지 않게 되었다면 목적물 양\n도는 시가에서 잔존 피담보채권액 공제한 잔액 범위 내 사해행위 O. 변제가 양도계\n\n약 체결 후 등기 과정에서 이뤄졌어도 마찬가지 [2016다208792]\n正辯 : ‘사해행위’ 개념은 등기와 상관없는 ‘계약체결행위’로 볼 수 있는데, 판례는 일부 변제로 목\n적물 가치가 올라간 경우만큼은 실질적 관점에서 등기 시점을 기준으로 보았다고 해석됨", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P053", "", "W 근저당권 피담보채권액 • 채권최고액이 모두 시가를 초과한다면 일반 채", "[判例] W 근저당권 피담보채권액 • 채권최고액이 모두 시가를 초과한다면 일반 채\n권자들의 공동담보인 책임재산 없으므로 부동산 양도는 사해행위 X — 채무자가 근\n저당권 설정된 부동산을 처분하면서 “매 매대금으로” 우선변제 권자인 근저당권자의\n피담보채무액 중 일부 변제하고 근저당권 말소한 경우 특별한 사정 없는 한 부동산\n\nPART 1\n\n채권총론 • 채권자취소권 • 41", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P054", "2017다254891; 2003다1205", "ED 신탁부동산에 대한 위탁자의 신탁계약상 수익권은 일반채권자들의", "[判例2021] ED 신탁부동산에 대한 위탁자의 신탁계약상 수익권은 일반채권자들의\n공동담보（책임재산） O - 신탁 존속 동안 위탁자가 언제든지 신탁계약 종료시키고\n\n절차에 따라 소유권이전등기 마칠 수 있는 경우는 위탁자의 신탁부동산에 관한 소유\n\n권이 전등기 청구권이 책임재산 O - 그러나 신탁계약상 신탁부동산 처분에 수익권\n자 동의 받도록 정했다면 수익권자 동의 받거나 받을 수 있는 등 특별한 사정 없는\n한 실질적 재산가치 없어 적극재산 X — 신탁재산에 대한 후순위 수익권의 가치는\n\n장차 신탁 종료시 예상되는 신탁재산 가액에서 소요비용, 신탁보수, 우선수익자들에\n대한 채무를 공제한 나머지 금액을 사해행위 당시의 현가로 할인하는 방식으로 평가\n해야 O, 단순히 사해행위 당시 신탁재산 시가 X [2017다254891]\n\n正辯 : 위탁자 겸 후순위 수익권자에게 신탁부동산이나 그 소유권이전등기청구권이 재산가치 없다\n면（부동산 가액보다 선순위 채권액이 훨씬 컸음） 그 매각행위는 사해행위 X\n— 행위유형별 사해행위 성립 가부\n\nO 변제 X ： 다만 특히 일부 채권자와 통모하여 다른 채권자 해할 의사 있다면 O\n[判例] 채무자가 채무초과 상태에서 특정채권자에게 채무 본지에 따른 변제를 함\n으로써 다른 채권자의 공동담보 감소 결과 되어도, 채무자가 특히 일부의 채권자\n와 통모하여 다른 채권자 해할 의사로 변제한 경우가 아닌 한, 변제는 원칙적으로\n\n사해행위 X V 채무 변제 구하는 것은 채권자의 당연한 권리행사, 채무자도 다른\n채권자 있다는 이유로 채무이행 거절 X - 기존 금전채무 변제에 갈음하여 다른\n금전채권 양도해도 사해행위 X [2003다1205]\n\n正辯 : 기존 금전채무에 대해 다른 금전채권으로 대물변제하는 채권양도는 사해행위 x", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P055", "2012다14975; 2007다18218", "기존채무 변제 위해 소비대차계약을 체결하고 강제집행 승낙의 공정증서 작", "[判例] 기존채무 변제 위해 소비대차계약을 체결하고 강제집행 승낙의 공정증서 작\n성해도 사해행위 X — 매매계약 사해행위취소 • 원상회복으로 수익자가 채무자에게\n가지게 된 부당이득반환채권을 가지고 위 원상회복된 재산 강제경매절차에서 수익\n\n자는 배당요구 X ■•• 사해행위 이후 취득한 채권 [2012다14975]\n© 대물변제 O ： [判例] 채무초과 상태 채무자가 재산을 특정 채권자에게 대물변제나\n담보조로 제공하면 유일한 재산 아니 어도 원칙적 사해행위 O [2007다18218]", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P056", "2006다33357", "다만 우선변제권 있는 채권자에 대한 대물변제는 원칙적으로 사해행위 X", "[判例] 다만 우선변제권 있는 채권자에 대한 대물변제는 원칙적으로 사해행위 X\n\n[2006다33357]\n© 물적 담보 제공 O ： [判例2022] 채무초과상태 채무자가 소유 재산을 채권자 중 한", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P057", "2018다295103; 66다1535", "위 경우 채무자에게 사업 갱생이나 계속 추진의 의도가 있더라도 신규자", "[判例2022] 위 경우 채무자에게 사업 갱생이나 계속 추진의 의도가 있더라도 신규자\n\n금 융통 없이 단지 기존채무 이행 유예받기 위해 채권자 중 한 사람에게 담보 제공한\n행위는특별한사정 없는한 사해행위 O [2018다295103]\n\n正辯 : 의료병원 운영자 甲이 채무초과 상태에서 己저축은행으로부터 대출 받으면서 이에 대한 담\n\n보로 甲의 국민건강보험공단에 대한 현재 • 장래의 요양급여채권을 양도, 대출금 상당 부분을 內저\n축은행에 대한 기존 대출금 채무 변제에 사용한 사안에서 담보 목적 채권양도는 사해행위 O\n\n@ 매각 O : [判例] “유일한 재산인 부동산 매각하여 소비하기 쉬운 금전으로 바꾸는\n행위는, 정당한 변제에 충당하기 위해 상당한 매각으로 이뤄지는 등 특별한 사정이\n없는 한, 사해행위 O, 채무자 사해의사추정 O [66다1535]", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P058", "2013다83992; 2018다223023; 2000다63516", "다만, 매각 목적이 변제나 변제자력 얻기 위함이고, 부당한 염가가 아니며,", "[判例] 다만, 매각 목적이 변제나 변제자력 얻기 위함이고, 부당한 염가가 아니며,\n실제로 변제에 사용하거나 변제자력을 유지한다면 一\n\nX （일부 채권자와 통모하여\n\n다른 채권자 해할 의사 아닌 한） [2013다83992]\n[判例2021] EM 위와 같은 법리는 유일한 재산인 영업재산•영업권이 유기적 결합\n된 일체로서 영업양도 할 경우도 마찬가지 [2018다223023]\n\n正辯 : 영업양도계약이 채무변제 목적으로 충분한 대가 받고 이뤄져 실제로 채무 변제에 사용된 경\n우 영업양도계약은 사해행위가 아니라는 판결\n@ 이혼 재산분할 : [判例] “채무초과 상태에서 이혼 재산분할로 재산을 양도함으로써\n\n공동담보 감소되었더라도, 839조의2 취지 따른 상당한 정도 벗어나 과대하다는 특\n별한 사정 없는 한 사해행위\n\nX, 단 상당 정도 초과부분은 사해행위 O, 여기서 상당\n\n정도 벗어난 과대한 재산분할 사실은 ‘채권자’ 입증책임” [2000다63516]", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P059", "2013다7936", "협의 •심판으로 구체화되지 않은 이혼 재산분할청구권의 포기는 사해행위", "[判例] 협의 •심판으로 구체화되지 않은 이혼 재산분할청구권의 포기는 사해행위\n\nX\n\nV 이혼 성립해야 비로소 발생하고 구체적 내용 형성 전에는 불명확•불확정하여\n채무자의 책임재산 X [2013다7936]\n® 상속재산 분할협의 : [判例] “상속재산 분할협의는 상속재산 귀속 확정하는 재산권\n\n목적 법률행위로서 사해행위취소 O - 채무초과인 채무자가 상속재산 분할협의 에서\n\n상속재산 권리를 포기함으로써 공동담보 감소되 었더 라도, 재산분할결과가 채무자의\n\nPART 1\n\n채권총론 • 채권자취소권 - 43", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P060", "2007다73765; 2002다69358", "유일한 상속재산의 상속분 포기하고 대신 소비하기 쉬운 현금을 지급받기로", "[判例] 유일한 상속재산의 상속분 포기하고 대신 소비하기 쉬운 현금을 지급받기로\n\n한 상속분할협의는 사해행위 O •/ 매각과 유사 [2007다73765]\n© 명의신탁행위 O : [判例] 채무초과상태에서 매수한 부동산의 등기명의를 아들에게\n신탁하고 등기 마친 경우 명의신탁약정은 사해행위 O — 채권자는 수익자（아들） 및\n전득자를 상대로 사해행위취소 및 등기말소 O. 채무자를 대위하여 매도인을 상대\n\n로 소유권이전등기청구 O [2002다69358]\n\n正辯 : ① 3자간 명의신탁약정은 실명법상 무효임에도 사해행위 취소 긍정한 점（통정허위표시를\n\n사해행위 취소한 97다50985 판결과 동일 맥락）, ② 통상적이라면 신탁자（매수인）의 매도인에 대한\n소이등청구권, 이를 보전하기 위한 수탁자에 대한 등기말소 채권자대위권을 각각 대위했을 것인데\n（이때 신탁자는 변론종결 당시 무자력일 것）, 사안은 수탁자로부터 다시 매수한 자가 실명법 4조 3\n\n항에 의해 보호되어 수탁자나 전득자에 대한 등기말소 채권자대위권 행사가 기각될 사안이었기에,\n수탁자（수익자） 및 전득자에 대하여 각각 사해행위취소 및 원상회복으로서 등기말소를 구한 사안\n\n이라는 점（이때 신탁자는 명의신탁 당시 무자력이고 변론종결시까지 유지될 것） 등이 매우 중요함", "", [], 0, "사해행위취소", 44, "미분류"],
  ["채권총론_P061", "2006다79704; 2007다77446; 2009다90047", "유효한 부부간 명의신탁에서 수탁자가 반환의무이행으로서 신탁자에게 등기", "[判例] 유효한 부부간 명의신탁에서 수탁자가 반환의무이행으로서 신탁자에게 등기\n를 마쳐주는 것은 사해행위 X V 기존채무 이행 [2006다79704]\n@ [判例] 부동산에 가압류등기 먼저 되고 근저당권설정등기 마친 경우 가압류채권자는\n근저당권설정 행위를 사해행위 취소 X •/ 근저당권자는 선순위 가압류채권자에 대\n하여는 “우선변제권 주장 못하여 평등배당 받으므로 불이 익 無”\n\n다만 가압류채권자의 실제 채권액이 가압류 채권금액보다 많은 경우는 초과 부분에\n관하여는 가압류 효력 없으므로 그 범위 내에서 사해행위 취소 O [2007다77446]\n\n한편 위 근저당권이 타인을 위한 ‘물상보증’이었다면 가압류채권자는 저당권설정행\n\n위를 사해행위 취소 O V “책임재산이 새로이 감소”, 불이익 有 [2009다90047]\n© [判例] 수익자가 채무초과 채무자의 부동산에 설정된 선순위 담보가등기의 피담보\n\n채무를 변제하여 가등기 말소하는 대신 동일한 금액을 피담보채무로 한 새로운 담보\n가등기 설정하는 것은 사해행위 X V 공동담보 부족하게 하는 것 X\n\n그러나 선순위 담보가등기 말소시킨 후 그 부동산에 관한 매매예약을 하고 소유권\n이전등기청구권 보전의 가등기를 마쳤다면, 시가에서 피담보채무액을 공제한 잔액\n범위 내에서 사해행위 O\n\n소유권이전등기청구권 보전 위한 가등기가 사해행위라면 매매예약 취소, 원상회복\n으로 가등기말소 O — 가등기 후 기존 저당권 말소됐거나, 그 피담보채무 일부 변제", "", [], 0, "사해행위취소", 44, "미분류"],
  ["채권총론_P062", "2024다312566; 2015다56086; 2017다237186, 2018다27226", "전세권 성립 후 전세목적물 소유권 일부 지분 이전받은 새로운 공유자도", "[判例2025] 전세권 성립 후 전세목적물 소유권 일부 지분 이전받은 새로운 공유자도\n전세권자에 대해 공동전세 권설정자 지위에서 전세금반환의무 부담 O\n\n채권자취소권 행사는 사해행위 하지 않았다면 있었을 책임재산 회복, 더 많은 책임\n\n재산 회복 결과 초래는 불허, 일반채권자 공동담보 제공되지 않은 책임재산은 취소\n범위에서 제외되어야 一 공유물 주택에 주택임대차보호법 따라 임차보증금 우선변제\n권 가진 임차인 있고 공유자들 불가분채무인 임차보증금반환의무 부담하는 경우 공\n유자 1인인 채무자가 처분한 지분 중 일반채권자들 공동담보인 책임재산은 우선변제\n\n권 있는 임차보증금반환채권 ‘전액’ 공제한 나머지 부분\n전세목적물 일부 지분 이전되어 공유자들이 불가분채무인 전세금반환의무를 부담하\n\n게 된 이후 공유자 1인이 자기 지분 처분하여 사해행위 문제된 경우도 위 법리가 마\n\n찬가지로 적용 [2024다312566]\n® [判例] 신탁자가 부부간 유효한 명의신탁약정을 해지함을 전제로 다시 제3자에게 처\n\n분하며 3자간 합의로 중간생략하고 곧바로 제3자에게 등기 마쳐준 경우, 사해행위\n\nO ••• 명의신탁 해지로 인한 신탁자의 소유권이전등기청구권도 책임재산인데, 제3\n자에게 등기함으로써 소멸하였으므로 [2015다56086]\n부동산 실명법과 부동산 매각행위의 사해행위 해당 여부 （후술）\n®【判例] 채무자가 제3자로부터 자금 차용하여 부동산 매수하고 그 부동산을 차용금\n\n채무의 담보로 제공하거나, 채무자가 제3자로부터 부동산 매수하여 대금 지급 전에\n\n등기 마치고 해당 부동산을 매매대금채무의 담보로 제공한 경우에는 사해행위\n\nX\n\nv 공동담보 부족 생기지 X — 부동산매수와 담보제공이 한꺼번에 이뤄지지 않고\n단기간 순차로 이뤄졌어도 마찬가지 [2017다237186, 2018다27226]\n@ 그 밖의 사해행위 여부 :\n[判例] 채무초과 상태에서 유일한 주택에 주임법 8조 해당 주택임차권설정\n\nO •/\n\n주임법 8조 소액보증금 최우선변제권은 일종의 법정담보물권 부여 [2003다50771]\n\nPART 1\n\n채권총론 • 채권자취소권 • 45", "", [], 0, "사해행위취소", 45, "미분류"],
  ["채권총론_P063", "", "소멸시효이익 포기행위 O V 부담하지 않아도 될 채무 새롭게 부담 [2012마", "[判例] 소멸시효이익 포기행위 O V 부담하지 않아도 될 채무 새롭게 부담 [2012마\n\n712]\n[判例] 채권양도가 사해행위 아닌데 양도통지만 따로 사해행위는 X V 대항요건에\n불과 [2011 다32785]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P064", "2015다19827; 2016다279206", "666조 저당권 설정청구에 따른 저당권설정행위 X [2015다19827]", "[判例] 666조 저당권 설정청구에 따른 저당권설정행위 X [2015다19827]\n[判例2021] 도급인이 수급인과 하수급인에게 공사대금 지급 못하자 리모델링 건물\n에 관하여 미지급 공사대금을 채권최고액으로 근저당권설정 一 근저당권 피담보채\n\n권액이 공사대금채권과 같은 액수, 도급인•수급인•하수급인 합의한 것인데 수급인\n이 저당권설정청구권의 행사 주체 一 666조 저당권설정청구권 행사에 따른 근저당\n\n권설정이므로사해행위 X [2017Q225268]\n[判例】 건물 양도 위한 건축주명의변경 행위 O V 재산감소 [2016다279206]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P065", "2016다204783", "무자력의 채무자가 수익자가 제기한 소송에서 자백하는 등의 방법으로 패소", "[判例] 무자력의 채무자가 수익자가 제기한 소송에서 자백하는 등의 방법으로 패소\n\n판결 • 화해권고결정 확정시킴에 따라 소유권이전등기 마쳐준 경우, 소송절차 통해\n책임재산 이전한다는 채무자와 수익자 사이 이전합의 O [2016다204783]\n\n[ 判例] @0 유일한 재산에 관하여 매매예약의 예약완결권 제척기간 경과 임박하자\n제척기간 연장 위한 새로운 매매예약 O v 채무자가 부담하지 않아도 될 채무를 새\n\n롭게 부담하게 되므로 [2017다24719이\n\n다. 사해의사（악의）\n— 【判例] 채무자 악의는 채권자 입증책임, 그러나 유일한 재산 매각은 추정 [95다\n\n51908, 66다1535]\n[判例] 채무자 악의 입증되면 수익자• 전득자 악의 추정 O —> 수익자• 전득자가\n자신의 선의 입증책임 [66다1535, 2006다5기이", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P066", "2023다234553", "특정 채권자 해칠 의사 필요 없고 “공동담보 부족 생긴다는 인식”이면 충분", "[判例] 특정 채권자 해칠 의사 필요 없고 “공동담보 부족 생긴다는 인식”이면 충분\n\n[97457320]\n— [判例2023] 사해행위취소소송에서 수익자의 선의 여부는 채무자와 수익자의 관계,\n채무자.수익자 사이 처분행위의 내용•경위 •동기, 정상적 거래관계라는 자료 여부,\n처분행위 이후 정황 등 여러 사정 종합적 고려하여 합리적 판단해야\n\n사해행위취소소송에서는 수익자의 선의 여부만 문제 되고 수익자의 선의에 ‘과실’\n\n이 있는지 여부는 묻지 않음, 사해행위취소소송과 실질을 같이하는 채무자 회생\n및 파산에 관한 법률 391조 1호 고의부인의 행사도 마찬가지 [2023다234553]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P067", "", "가령 수익자가 채무자와 친인척관계 등 채무자 재산 상황 구체적 알 수", "[判例2025] 가령 수익자가 채무자와 친인척관계 등 채무자 재산 상황 구체적 알 수\n\n4B", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P068", "", "수익자는 사해행위 당시에, 전득자는 전득행위 당시에 ‘채무자-수익자 사이", "[判例] 수익자는 사해행위 당시에, 전득자는 전득행위 당시에 ‘채무자-수익자 사이\n\n법률행위’의 사해성을 인식하는 것 一 전득행위의 사해성은 X [2004다6128이\n\n2. 행사\n— 자기 이름으로, 재판상 행사해야", "", [], 0, "사해행위취소", 47, "미분류"],
  ["채권총론_P069", "2018다277785", "回9 사해행위취소소송은 형성의 소로서 판결 확정되어야 권리변동 효력", "[判例] 回9 사해행위취소소송은 형성의 소로서 판결 확정되어야 권리변동 효력\n생기지만 406조 1항은 취소판결 미확정 상태에서도 취소 효력 전제로 원상회복청구\n병합 제기 허용 •一 원고가 매매계약 등 법률행위에 기하여 소유권 취득했음을 전제\n로 피고를 상대로 일정한 청구하면, 피고는 원고의 소유권취득 원인인 법률행위가\n\n사해행위로 취소돼야 한다고 다투며 ‘반소’로써 사해취소 및 원상회복청구 O — 법\n\n원이 반소청구 이유 있다 판단하여 사해행위취소•원상회복 선고하면서 （사해행위\n\n판결 확정되지 않았어도） 원고 소유권취득이 취소되었음을 전제로 본소 심리 •판단\n하여 기각 O V 사해행위취소 여부는 반소 청구원인 + 본소청구에 대한 방어방법\n\n+ 본소청구 인용 여부의 선결문제, 본소• 반소가 동일절차 내에서 함께 심리 •판단되\n어 소송경제 •모순저촉회피 [2018다277785]\n\n正辯 : A가 B에게 금전 대여하고 B 소유 벤츠에 근저당권등록 一 브로부터 벤츠를 매수하여 소유\n권이전등록 한 C가 소유권자로서 A에게 근저당권등록 말소청구 스 A가 반소로 e를 상대로 B-C\n\n사이 벤츠매매를 사해행위 취소하고 C 명의 소유권이전등록 말소 구하여 반소인용, 본소기각 됨\n- 각하 사유 : ① 제척기간 도과한 경우,\n\n② 채무자를 피고로 한 경우\n\n③ 전득행위의 취소를 구할 경우, ④ 원상회복이 마쳐진 경우\n- ③, ④의 경우 권리보호이익 없음\n\nPART 1\n\n채권총론 • 채권자취소권 • 47", "", [], 0, "사해행위취소", 47, "미분류"],
  ["채권총론_P070", "2000다3262; 2013다50435; 2018다222747", "유일한 부동산 처분 사실을 알았다면 사해의사도 안 것 O [2000다3262]", "[判例] 유일한 부동산 처분 사실을 알았다면 사해의사도 안 것 O [2000다3262]\n[判例2022] 가까운 장래 채권 성립 고도 개연성 있어 예외적으로 피보전채권 인정\n하는 사안에서도 단기 제척기간 기산일은 취소원인 안 날\n\n사실 안 날\n\nO, 유일한 재산 처분\n\nO, 피보전채권 성립 시점 X — 추징금 납부의무자의 납부 피하려는\n\n재산처분행위도 사해행위취소•원상회복 O — 피고인에게 추징 명한 형사판결이\n\n확정되어 피보전채권 비로소 현실적 성립한 경우도 마찬가지 [2021Q288020]\n正辯 : 사해행위취소 기산일은 추징보전명령 결정일 X, 유죄판결 확정일 x - 유죄 1심 판결 선\n고된 후 추징보전명령 청구일 무렵 0（공동담보 부족 알았음） 一 청구일로부터 1 년이 지났다면 유\n\n죄판결 확정일로부터 1 년 내이더라도 각하\n[判例] 법인의 대표자가 법인에 대해 불법행위를 한 경우에 불법행위 손해배상청구권\n의 소멸시효 기산점과 마찬가지로 이를 피보전권리로 하는 사해행위 취소의 제척기\n\n간 기산점인 ‘취소원인을 안 날’도 “법인 이익 정당하게 보전할 다른 대표자나 임직\n\n원이 취소원인을 안 날” 기준 [2013다50435]\n[判例] 예금보험공사가 채권자취소권 행사하는 경우 피보전채권 추심 및 보전 등\n에 관한 업무담당 직원의 인식을 기준으로 사해행위 제척기간 판단해야 一 예보\n가 파산관재인으로서 대리인 선임하였더라도 피보전채권 추심 •보전에 관하여 직접\n\n조사. 지시하는 경우에는 마찬가지 적용 [2018다222747]", "", [], 0, "사해행위취소", 49, "미분류"],
  ["채권총론_P071", "2000다73049", "채권자가 채무자의 채권자취소권을 대위행사 하는 경우 제소기간은 대위의", "[判例] 채권자가 채무자의 채권자취소권을 대위행사 하는 경우 제소기간은 대위의\n목적인 권리의 채권자인 채무자를 기준으로 해야 - 대위채권자가 취소원인을 안 지\n\n1년이 지났더라도, 채무자가 안 날로부터 1년, 법률행위 있은 날로부터 5년 내라면\n채권자취소의 소 제기 O [2000다73049]\n\nPART 1\n\n채권총론 • 채권자취소권 • 49", "", [], 0, "사해행위취소", 49, "미분류"],
  ["채권총론_P072", "", "여러 부양의무자 중 부양의무 이행한 의무자 1인이 다른 의무자 상대로 가지는", "[判例] 여러 부양의무자 중 부양의무 이행한 의무자 1인이 다른 의무자 상대로 가지는\n과거의 부양료청구권에 대한 침해 이유로 채권자취소권 행사하는 제척기간 기산점\n\n은 취소원인 안 날 1년 법률행위 있은 날 5년 O, 부양료청구권이 협의 • 심판으로 구\n\n체적 권리 성립한 시기\n\nX [2013다7987이", "", [], 0, "사해행위취소", 50, "미분류"],
  ["채권총론_P073", "2020다265808", "법률행위 있은 날부터 5년 제소기간 도과 여부는 법원이 직권 조사해야", "[判例2021] 법률행위 있은 날부터 5년 제소기간 도과 여부는 법원이 직권 조사해야\n\n- 상속재산분할협의를 사해행위로 취소하는 소의 제소기간 기산점은 특별한 사정\n없는 한 등기부상 등기원인일자 O\n\nV 처분문서에 기초 [2020다265808]\n\n正辯 : 상속재산분할협의 원인 소유권이전등기는 등기 예규상 피상속인 사망일을 등기원인일자로\n하고, 특히 본 사건은 등기접수일자가 등기원인일자보다 약 2년 뒤였던 점을 고려하면, 위 판결은\n\n취소채권자에게 지나치게 불리하다는 비판 여지 있음\n\n나. 상대방\n\n— 수익자 또는 전득자 （채무자는 피고적격\n\nX）\n\n① 악의一악의\n\n수익자에 대한 가액배상청구 or 수익자 및 전득자에 대한 각 원물반환청구（부동산인\n경우 전득자, 수익자 등기 순차말소）\n\n② 악의一선의\n수익자에 대한 가액배상청구 or ‘전득자에게 영향 없는’ 원물반환청구\n[\n\n判例] 사해행위 후 목적물에 제3자가 저당권 • 지상권 취득한 경우에는 수익자 싱대\n\n로 가액배상 O V 제한 없는 상태로 회복 어렵다면 원물반환 불가능 • 현저곤란\n그러나 “채권자 스스로 위험 • 불이익 감수하면서 원물반환 O - 수익자 등기의 말소\n혹은 채무자 앞 직접 소유권이전등기 O” [2000457139]\n\n正辯: 저당권을 취득한 전득자가 선의인 경우 말소 구할 수 없으나 수익자 명의 소유권이전등기 말\n\n소나 채무자 앞으로의 소유권이전등기는 전득자에 영향 없으므로 승소 가능, 다만 이 중 말소등기\n는 집행과정에서 등기법상 저당권자 승낙이 필요한데 선의여서 승낙의무 없으므로, 최종 집행까지\n고려한다면 진정명의회복 원인으로 직접 채무자 앞으로 소유권이전등기 구함이 타당\n\n③ 선의一악의\n전득자에 대한 원물반환청구\n\n그런데 수익자 등기는 말소할 수 없으므로 결국 전득자로부터 직접 채무자 앞으로\n진정 명 의 회복 소유권이 전등기 청구가 타당\n\n正辯 : 전득자를 상대로 채무자에의 진명소이등을 명시적으로 허용한 대법원 판례는 아직 없으나,\n수익자를 상대로 채무자에의 진명소이등을 긍정한 판례는 있음 一 [99453704]", "", [], 0, "사해행위취소", 50, "미분류"],
  ["채권총론_P074", "74다2114", "W 동일인 소유 토지와 지상건물 처분행위를 사해행위 취소할 경우 대지 가", "[判例] W 동일인 소유 토지와 지상건물 처분행위를 사해행위 취소할 경우 대지 가\n액이 채권액보다 다액이어도 전부 취소해야 •/ 하나만 취소하면 소유자 달라져서 효\n용 현저히 감소 [74다2114]", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P075", "2006다1442", "가액배상인 경우 취소채권자는 자기 ‘채권액’ 표준 초과 X — ‘일부’ 취소 V", "[判例] 가액배상인 경우 취소채권자는 자기 ‘채권액’ 표준 초과 X — ‘일부’ 취소 V\n\n취소채권자가 직접 자기에게 지급할 것 청구하여 지급받은 가액배상금의 분배 방\n법 • 절차는 현행법상 규정 없어 다른 채권자들이 배당요구를 할 수 없으므로\n\n채권자가 어느 수익자에 대해 사해행위취소• 원상회복청구 승소 확정했어도 회복 마\n치지 않은 이상 피보전채권에 기해 다른 수익자에 대해 별도로 사해행위취소•원상\n회복청구 O — 여러 수익자 상대로 청구하면 각 소송에서 사해행위취소•원상회복\n\n판결 선고해야 一 가액배상인 경우 다른 소송 결과 참작하지 않고 반환할 범위 내에\n서 피보전채권 전액 반환 명해야 一 여러 수익자들을 공동피고로 사해행위취소•원\n\n상회복 구하여 각 수익자들 부담하는 원상회복의무 대상인 책임재산 가액 합산액이\n채권자의 피보전채권액 초과할 경우도 마찬가지 [2006다1442]\n\n- 실무상 취소 범위보다 오히려 원상회복 방법을 먼저 살피고 가액배상인 경우에 취소\n\n범위와 가액배상 범위를 동일 기준으로 한꺼번에 판단하여 일치시키는 방식\n\n라. 원상회복 방법\n- 원물반환 （원칙）, 가액배상 （원물반환이 불가능하거나 현저히 곤란한 경우）", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P076", "99다23468", "목적물이 동산인 경우 이를 소유 • 점유하는 수익자• 전득자를 상대로 취소채권", "[判例] 목적물이 동산인 경우 이를 소유 • 점유하는 수익자• 전득자를 상대로 취소채권\n자가 직접 자기에게 인도해줄 것을 청구 O [99다23468]", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P077", "2007다84352", "원상회복을 가액배상으로 할 경우 이행상대방은 취소채권자이어야 •/ 채권자", "[判例] 원상회복을 가액배상으로 할 경우 이행상대방은 취소채권자이어야 •/ 채권자\n취소권은 상대적 취소로 책임재산 일탈 회복 및 강제집행이 본질 [2007다84352]\n- [判例2024] 사해행위취소 확정판결 원상회복 대체물 인도의무의 불이행만을 이유로\n취소채권자가 수익자에 대해 395조에 따라 이행지체로 인한 전보배상청구 X\n그러나 대체물 인도 강제집행이 불가능 또는 현저 곤란이라면 전보배상청구 O\n\nPART 1\n\n채권총론 • 채권자취소권 • 51", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P078", "99다20612; 2000다66416", "전부취소 및 원물반환 구하는 청구취지 속에 일부취소 및 가액배상 구하는", "[判例] 전부취소 및 원물반환 구하는 청구취지 속에 일부취소 및 가액배상 구하는\n취지 포함 O — 청구취지 변경 없이 바로 가액배상 명할 수 O [99다20612]\n- 판례는 수익자 및 전득자에 대해 가액배상 구할 경우 ‘부진정연대’ 관계로 봄 一\n\n[2000466416] 판결은 원심이 공동하여（각자）로 판시한 것을 수용\n- @0 가액배상은 @ 피보전채권액, @ 목적물 공동담보가액, © 수익자 • 전득자 취득\n이 익액 중 가장 적은 금액을 한도로 （모두 변론종결 당시 기준）\n\n正辯 : 다만 피보전채권의 ‘원본’은 사해행위 당시 기준으로 확정되고, 여기서는 그 이자 및 지연손\n해금 합계액이 사실심 변론종결시까지 포함된다는 의미로 해석해야（私見）\n[判例] @0 전득자가 근저당권을 설정받았다면 취득이익액은 그 피담보채권액 이유 中 : 기존 근저당권 모두 말소된 후 근저당권을 취득한 전득자는 그 피담보채무\n\n액 4억 원 상당 이익 얻었고, 원심 변론종결시 부동산 가액에서 말소된 근저당권 피\n\n담보채무액을 공제한 금액도 1.2억 원으로서 피보전채권액 3천만 원을 상회하므로,\n채권자는 피보전채권액 전액에 대하여 채권자취소 O, 가액배상 O [2000다66416]", "", [], 0, "사해행위취소", 52, "미분류"],
  ["채권총론_P079", "", "사해행위 후에 기존 근저당권 말소되어 그 피담보채무액 공제한 나머지 금액", "[判例] 사해행위 후에 기존 근저당권 말소되어 그 피담보채무액 공제한 나머지 금액\n한도로 취소 및 가액배상 명할 경우 一 사해행위 후 부동산 취득한 전득자에 대하여\n\n는 변론종결시 부동산 가액에서 말소된 근저당권 피담보채무액 공제한 금액, 변론종\n\n결시 취소채권자의 채권액 중 적은 금액의 한도 내에서, 그가 취득한 이익에 대해서\n만 가액배상 가능 [20184203715]\n\n正辯 ： 판결이유를 보면, 근저당권자인 전득자의 취득이익을 단순히 ‘채권최고액’으로 판단한 원심\n을 파기하면서 실제의 피담보채권액을 심리했어야 한다는 취지의 판시로 해석됨（私見）\n- [大判全合] 사해행위인 매매예약으로 수익자 앞으로 가등기 마친 후, 전득자에게 가\n\n등기 이전의 부기등기 마치고 나아가 본등기 마친 경우 一 채권자는 수익자를 상대", "", [], 0, "사해행위취소", 52, "미분류"],
  ["채권총론_P080", "97다6711; 2002다41589; 97다6711", "이 경우 부동산 가액 산정은 “사실심 변론종결시” 기준 [97다6711]", "[判例] 이 경우 부동산 가액 산정은 “사실심 변론종결시” 기준 [97다6711]\n[判例] 이 경우 피담보채무 전액이 소멸된 이상 그 소멸 원인이 무엇인지, 변제라면\n\n실제 자금 출연주체가 누구인지 여부는 불문 [2002다41589]\n正辯 : 전액 변제되었다면 저당권등기의 말소 여부는 불문하는 것이 실무례 ••• 부종성, 당연소멸\n[判例] 사해행위 목적 부동산에 수 개의 저당권이 설정되어 있다가 사해행위 후 그\n\n중 일부 저당권만 말소된 경우도 마찬가지, 이때는 부동산 가액에서 말소된 저당권\n및 말소되지 않은 저당권의 각 피담보채권액을 모두 공제하여 산정 [97다6711]\n[判例] 回Q 피담보채무액의 증감과 공제할 금액 一 ® 사해행위시보다 변종시에\n증가하면 : 변종시 금액 모두 공제 ,\n\n® 변종시에 감소하면 : 사해행위시 금액 모두\n\n공제 v 당초 공동담보 아닌 부분까지 회복은 불공평 [2003다60891]\n\n正辯 : 판례는 피담보채무액의 증감할 경우 결과적으로 더 큰 금액으로 많이 공제함. 다만 아무리\n\n많이 공제해도 채권최고액을 넘는 금액을 공제할 수는 없음을 주의. 한편 변종시에 감소된 이유가\n수익자 등의 변제인 경우 그는 어차피 근저당권에 변제자대위를 할 것이므로 위와 같은 피담보채\n\n무액 공제 후에 그의 변제금액을 다시 공제해서는 안 됨（이상 모두 위 판결 설시 내용）", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P081", "2018다215756", "사해행위 이전에 임대차계약 체결되었고 임차보증금 우선변제권 있다면 이처", "[判例] 사해행위 이전에 임대차계약 체결되었고 임차보증금 우선변제권 있다면 이처\n럼 임차보증금액 공제 O, 그러나 사해행위 이후 채무자가 부동산 임대했다면 공제\n\nX\n\n••• 부동산 가액 중 임차보증금 해당 부분도 공동담보였음 [2018다215756]", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P082", "2007다28819", "위 법리는 미완공 건물을 매수한 수익자가 나머지 공사로 완공시킨 경우도", "[判例] 위 법리는 미완공 건물을 매수한 수익자가 나머지 공사로 완공시킨 경우도\n마찬가지 [2007다28819]", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P083", "2013다1105", "위 법리는 ‘유치권’의 목적인 부동산이 사해행위로 처분된 후 변제 등으로 유", "[判例] 위 법리는 ‘유치권’의 목적인 부동산이 사해행위로 처분된 후 변제 등으로 유\n치권이 소멸된 경우도 마찬가지 一 부동산 가액에서 유치권의 피담보채무액을 공제\n\n한 잔액 한도에서 사해행위취소 및 가액배상 [2013다1105]\n正辯 : 유치권 피담보채무액과 다른 채권자들이 사해행위취소 소송에서 조정 결과 수익자로부터\n지급받은 가액배상 금액의 합계액이 부동산 시가 초과하여 기각된 사안", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P084", "", "위 법리는 이후 （말소된） 저당권설정행위에 대하여 사해행위 취소소송 인용", "[判例] 위 법리는 이후 （말소된） 저당권설정행위에 대하여 사해행위 취소소송 인용\n판결이 확정되었더라도 마찬가지로 적용（즉, 일부취소 및 피담보채무 공제한 잔액\n\nPART 1\n\n채권총론 • 채권자취소권 • 53", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P085", "", "사해행위 ‘후’ 그 부동산에 제3자가 저당권 취득한 경우 그 피담보채권액", "[判例2023] 사해행위 ‘후’ 그 부동산에 제3자가 저당권 취득한 경우 그 피담보채권액\n은 사해행위 당시 일반 채권자들의 공동담보 부분 O, 원상회복 범위에서 공제 X —\n\n채무자 부동산이 증여 등 사해행위로 수익자에게 소유권 이전된 후 경매 실행으로\n배당절차 진행된 경우도 마찬가지 一 부동산 가액 중 수익자의 채권자가 배당 참여\n\n하여 취득한 배당액 상당은 사해행위 당시 공동담보 O, 가액배상 등 원상회복에서\n\n공제 X — 설령 수익자의 채권자가 채무자의 일반채권자 지위를 겸해도 마찬가지\n\n[2022Q244928]\n正辯 : 저당권 설정된 부동산 증여（사해행위） 후 저당권 실행, 수익자（수증자）의 배당금청구권은\n지급금지가처분 一 원상회복은 수익자의 배당금청구권을 채무자에게 양도, 채권 양도 통지하도록\n\n— 수익자의 일반채권자가 경매에서 배당받는 금액은 가액배상（혹은 채권양도） 범위에서 공제 x\n\n- 89다카35421 판결, 2004다49532 판결은 수익자의 채권자에게 상대적 효력에 의해 채권자취\n소 효력이 미치지 않아 그도 배당을 받을 수 있다는 취지일 뿐", "", [], 0, "사해행위취소", 54, "미분류"],
  ["채권총론_P086", "2024다242223", "경매개시결정등기 및 배당요구 종기 이후의 부동산 양도행위가 사해행위", "[判例2025] 경매개시결정등기 및 배당요구 종기 이후의 부동산 양도행위가 사해행위\n로 취소되면, 확정된 배당표의 배당금 상당액 및 집행비용은 특별한 사정이 없는 한\n\n가액배상에서 공제 O ••• 배당요구 채권자는 종기까지 배당요구해야 배당（집행법 88\n\n조 1항, 148조 2호）, 배당요구 않은 일반채권자는 배당 불가, 집행비용은 우선적 변상\n（집행법 53조 1항）, 확정된 배당금•집행비용은 배당요구 종기까지 지난 일반채권자에\n\n대한 관계에서 공동담보 X, 일반채권자 ‘공동담보’로서 사해행위 성립 범위 내 가액\n\n배상 명하므로 공동담보 아닌 부분은 배상에서 제외해야 [2024다242223]\n\n正辯 : 취소채권자가 배당요구 종기까지 배당요구를 하지 않았던 사안", "", [], 0, "사해행위취소", 54, "미분류"],
  ["채권총론_P087", "2007다37837; 2005다14595", "사해행위 취소와 원상회복은 모든 채권자의 이익을 위하여 효력 0（제407조）,", "[判例] 사해행위 취소와 원상회복은 모든 채권자의 이익을 위하여 효력 0（제407조）,\n\n채무자에게 회복된 재산에 취소채권자 우선변제권 X, 다른 채권자도 총채권액 중\n\n자기 채권 해당 안분액 변제받을 수 O — 그러나 민사집행법 등 법률상 절차 거치\n지 않고 직접 취소채권자에게 안분액 지급청구 X, 취소채권자의 분배의무 X — 결\n\n국 가액배상금 수령한 취소채권자의 사•실상 우선변제 결과는 불가피 [2007다37837]\n[判例] 사해행위취소•원상회복은 모든 채권자 이익 위해 효력（407조） 一 수익자 소\n\n유 부동산 경매절차에서 취소채권자가 가액배상판결에 기해 배당요구 하여 받은 배\n당액은 취소채권자에 그대로 귀속 X, 채무자 책임재산으로 회복 O ~ 채무자에 대\n\n한 채권자들은 채권만족에 관한 일반원칙에 따라 채권 내용 실현 [2005다14595]", "", ["제407조"], 0, "사해행위취소", 57, "미분류"],
  ["채권총론_P088", "2017마499; 99다23468, 2007다84352", "사해행위취소 소송에서 가액배상 할 경우, 수익자 자신도 채권자라는 이유로", "[判例] 사해행위취소 소송에서 가액배상 할 경우, 수익자 자신도 채권자라는 이유로\n\n전술한 상계 X, 공제 X - 그러나 수익자의 취소채권자에 대한 별개의 다른 채권\n\n을 집행하기 위해 취소채권자의 수익자에 대한 가액배상채권에 대하여 압류 및 전부\n\n명령 O v 상계 ■ 공제와 성질 다름, 제3채무자가 채권자 자신인 경우도 채권압류 금\n지되지 않음 [2017마499]\n\n— [判例] 사해행위 목적물이 동산•금전 • 가액배상인 경우 취소채권자는 직접 자기에\n게 인도 • 지급청구 O, “가액배상을 명할 경우 그 이행 상대방은 채권자여야 한다.”\n••• 일탈 책임재산 회복 및 강제집행이 본질\n\n여러 채권자 사해행위취소•원상회복 소 제기하면 각 모두 승소판결 선고해야 一\n수익자（전득자） 가액배상은 채권자별 비례 안분 금액 X, 반환해야 할 가액 범위 내\n\n에서 각 채권자 피보전채권액 ‘전액’ 반환 명해야 [99다23468, 2007다84352]\n\nPART 1\n\n채권총론 • 채권자취소권 - 57", "", [], 0, "사해행위취소", 57, "미분류"],
  ["채권총론_P089", "2018다202774; 2009다18502; 2013다84995", "여러 사해행위취소소송에서 각 가액배상 명하는 판결 확정된 경우, 각", "[判例2022] 여러 사해행위취소소송에서 각 가액배상 명하는 판결 확정된 경우, 각\n\n채권자의 피보전채권액 합한 금액이 공동담보가액（목적물 가액에서 일반채권자들\n공동담보 아닌 부분 공제한 잔액）을 초과한다면 수익자는 채권자들에게 공동담보가\n\n액만 반환 一 공동담보가액 초과 범위 이중반환 위험 一 각 판결에서 산정한 공동담\n보가액 액수가 서로 다른 경우, 특별한 사정이 없는 한 최다액으로 산정한 공동담보\n가액에서 수익자가 어느 채권자에게 반환한 가액을 공제한 금액을 초과하는 범위에\n\n서 다른 채권자에게 청구이의로 집행력 배제 구해야 V 채권자취소권의 취지, 변론\n주의 [2018다202774]\n\n— [判例] 사해행위 이후 채권을 취득한 채권자는 407조의 채권자\n\nX — 배당 제외\n\n[2009다18502]\n- [判例] 사해행위취소 판결은 채무자• 다른 채권자에게 효력 미치지 않으므로 사해행\n\n위취소 판결을 받지 않은 채권자가 채무자 대위하여 말소등기 청구 X, 그러나 이미\n\n말소등기를 마쳤다면 유효 ••• 407조 모든 채권자 이익, 회복되어도 어차피 말소 여\n지, 실체관계에 부합 [2013다84995]", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P090", "", "채권자 중 1인이 수익자로서 대물변제 받은 것이 사해행위 취소 및 원상회복", "[判例] 채권자 중 1인이 수익자로서 대물변제 받은 것이 사해행위 취소 및 원상회복\n확정되면 그의 채권이 부활하여 채권자 지위 회복하므로 407조의 채권자에 포함되\n\n고 강제집행 절차에서 배당요구 O [2003다 15907]", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P091", "2007다54849", "사해행위취소소송에서 피고인 수익자는 피보전채권의 소멸시효 완성 주장 O", "[判例] 사해행위취소소송에서 피고인 수익자는 피보전채권의 소멸시효 완성 주장 O\n— 인정되면 기각 [2007다54849] 羊 채권자대위소송에서 제3채무자는 피보전채권\n의 소멸시효 주장 X\n\n, 예외적으로 인정될 경우 대위소송 각하", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P092", "2016다204783", "채무자와 수익자 사이 확정판결로 마쳐진 등기라 해도 사해행위취소로 인한", "[判例] 채무자와 수익자 사이 확정판결로 마쳐진 등기라 해도 사해행위취소로 인한\n\n원상회복으로 말소 O V 사해행위취소 및 원상회복 판결은 수익자가 채권자에 대하여\n\n원상회복의무 부담하는 것일 뿐, 채권자 • 채무자 사이에서 법률관계 형성\n\nX — 사해\n\n행위취소 • 원상회복 청구가 전소 확정판결에 저촉되지 X [2016다204783]\n\n58\n\n로스쿨민법의 정석", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P093", "2006다9446", "제3자의 행위가 채권을 침해하여 ‘불법행위’에 해당하려면 제3자가 채권자를", "[判例] 제3자의 행위가 채권을 침해하여 ‘불법행위’에 해당하려면 제3자가 채권자를\n해한다는 사정을 알면서도 법규나 공서양속 위반하는 행위를 하여 채권자의 이익을\n침해하였음이 인정되어야 [2006다9446]", "", [], 0, "제3자채권침해", 59, "미분류"],
  ["채권총론_P094", "99다38699; 2016다10827", "독립한 경제주체 사이 경쟁적 계약관계에서 단순히 제3자가 채무자• 채권자", "[判例] 독립한 경제주체 사이 경쟁적 계약관계에서 단순히 제3자가 채무자• 채권자\n\n사이 계약 내용을 알면서 그에 위반되는 내용의 계약을 체결한 것만으로는 제3자의\n고의 • 과실 및 위법성 인정하기 부족 一 제3자가 채무자와 적극 공모했다거나 제3자가\n기망• 협박 등 사회상규에 반하는 수단 사용하거나, 채권자를 해할 의사로 채무자와\n계약체결 하는 등 특별한 사정이 있는 경우에 한하여 제3자의 고의 • 과실 및 위법성\n\n을 인정 O [99다38699]\n[\n\n判例2021] 제3자가 채권 침해했다고 바로 불법행위\n\nX V 채권은 배타적 효력 X,\n\n채권자 상호 간 및 채권자와 제3자 사이 자유경쟁 허용 一 그러나 자유경쟁 원칙은\n법질서 허용 범위에서 공정하고 건전한 경쟁 一 제3자가 채권자 해치는 사정 알면서\n\n도 법규•공서양속 위반 등 위법행위로 채권 실현 방해하여 채권자 이익 침해하면\n불법행위 O [2016다10827]", "", [], 0, "제3자채권침해", 59, "미분류"],
  ["채권총론_P095", "2020다208997; 2017다239311", "3자간 등기명의신탁에서 수탁자가 부동산을 처분하면 형사상 횡령죄로", "[判例2022] 3자간 등기명의신탁에서 수탁자가 부동산을 처분하면 형사상 횡령죄로\n\n처벌되지 않더라도 민법상 불법행위 O — 신탁자의 채권（소유권이전등기청구권）을\n침해하는 제3자 채권침해 O （상세 논거는 후술） [2020다208997]\n- [判例] 제3자가 채무자에 대한 채권자 존재 및 그 채권 침해사실 알면서 채무자와\n\n적극 공모하거나 채권행사 방해 의도로 사회상규 반하는 부정 수단 사용하는 등\n으로 채무자의 책임재산을 감소시키는 행위를 함으로써 채권의 실행 • 만족을 불가능 .\n곤란하게 한 경우 채권자에 대한 불법행위 O — 제3자가 채무자 재산을 은닉할\n\n당시 채무자가 다액의 채무 보유하여 제3자 채권침해 없었더라도 채권자가 일정액\n\n이상으로 채권을 회수할 가능성이 없었다면, 위 초과 부분 손해와 제3자 채권침해로\n인한 불법행위 사이에는 상당인과관계 X [2017다239311]\n\nPART 1\n\n채권총론 • 제3자에 의한 채권침해 • 59", "", [], 0, "제3자채권침해", 59, "미분류"],
  ["채권총론_P096", "2000다51216; 2018다280316; 2015다36167", "= 매매로 인한 소유권이전등기청구권은 성질상 양도 제한되고 양도에 채", "[判例] = 매매로 인한 소유권이전등기청구권은 성질상 양도 제한되고 양도에 채\n무자 동의 •승낙 요하며 양도통지만으로 채무자에게 대항 X V “매매 소이등청구\n\n권은 이행과정에 신뢰관계 따르므로” [2000다51216]\n[判例2021] 명의신탁 해지 원인 소이등청구권도 양도에 명의수탁자가 동의 •승낙 않\n\n았다면 양수인은 수탁자에 대해 직접 소유권이전등기청구 X V 중간생략등기 합의\n에 전원 동의 요하는 법리 적용 [2018다280316]\n\n그러나 [判例] 취득시효 완성으로 인한 소유권이전등기청구권은 양도에 채무자 동\n의 •승낙 불필요（= 통상의 채권양도） V “채권자•채무자 사이 아무런 계약관계 • 신뢰\n\n관계나 반대급부의무 없음” [2015다36167]\n- 가압류된 채권 : [判例] “가압류된 채권도 양도에 아무 제한 無, 다만 가압류된 채권\n\n을 양수받은 양수인은 가압류로 권리 제한된 상태의 채권을 양수 一 가압류 채권자가\n\n본안승소 등 집행권원 취득하면 가압류로 제한된 상태의 채권양도는 무효로 확정됨”\n••• 채권가압류의 처분금지효력은 집행권원을 얻는 등 피보전권리의 존재 확정을\n\n조건으로 발생 = 이는 채권양도 받았으나 확정일자 있는 통지 • 승낙 대항요건 갖추\n지 않은 사이 양도된 채권이 가압류된 경우도 동일 [2001 다59033]\n\n正辯 : 가압류된 채권이 양도되고 가압류채권자가 집행권원 얻은 후 양수인의 양수금청구에 대한\n판결에 관해, 위 판례는 채권양도가 무효로 확정된다고 하였으니 기각판결로 볼 여지가 있으나（이\n\n에 기반한 법전협 모의시험 출제도 있었음）. 위 판례가 말하는 무효는 가압류채권자에 대한 ‘상대\n\n효’일 것인 점, 위 판례는 집행력 배제를 구한 청구이의 사건이었던 점 등을 고려하면, 양수금 인용\n판결이 타당（私見. 이에 관한 논의는 활발하지 않음）", "", [], 0, "채권양도", 61, "미분류"],
  ["채권총론_P097", "", "제3채무자에게 채권가압류결정 송달된 상태에서 채권 양수하여 확정일", "[判例2022] 제3채무자에게 채권가압류결정 송달된 상태에서 채권 양수하여 확정일\n\n자 있는 통지 등 대항요건 갖춘 채권양수인은 가압류집행취소통지서가 제3채무자에\n게 송달된 이후에는 더 이상 처분금지효 제한 없이 아무런 부담 없는 채권취득 효력\n\n을 가압류 채권자에게 대항\n\nO\n\n•/ 가압류집행 취소통지서 송달은 가압류취소 결정의\n\n집행으로서 확정적 효력 一 이후 항고심이 가압류취소결정을 취소하여 가압류결정\n\n인가했어도 마찬가지 ••• 이미 취소된 가압류집행이 소급 부활하지는 X\n\nPART 1\n\n채권총론 • 채권양도 • 61", "", [], 0, "채권양도", 61, "미분류"],
  ["채권총론_P098", "2018다265911", "", "[判例2021]\n\n하도급거래 공정화에 관한 법률 14조 1항 직접지급요청 있으면 수급인\n\n의 도급인에 대한 공사대금채권이 동일성 유지한 채 하수급인에 이전 一 도급인은\n\n직접지급요청 있기 전에 수급인에 대항할 사유로 하수급인에게 대항 O\n도급인의 수급인에 대한 자동채권이 수동채권인 수급인의 공사대금채권과 동시이행\n\n관계 등 밀접한 관계 있다면 하수급인의 직접청구권 생긴 후 자동채권 발생했더라도\n\n도급인은 그 채권으로 상계하여 하수급인에게 대항 O V 자동채권 발생 기초 원인\n은 하수급인이 직접 지급 요청하기 전에 이미 성립 존재 一 자동채권은 도급인이 직\n접 지급 요청 후에 취득한 채권 X\n\n동시이행항변권은 당사자 쌍방이 부담하는 각 채무가 고유 대가관계에 있는 쌍무\n\n계약상 채무가 아니더라도 구체적 계약관계에서 당사자 쌍방 부담하는 채무 사이\n대가적 의미 있어 이행상 견련관계 인정할 사정 있어도 O [2018다265911]\n\n正辯 : 레미콘대금채무를 대위변제하여 취득한 구상금채권은 공사완성의무가 변형된 것으로 공사\n대금채무와 여전히 대가적 의미 O, 이행상 견련관계 O — 동시이행관계 O\n\n— 구상금채권이\n\n원고의 직접 청구권 생긴 후에 발생했더라도 피고는 구상금채권을 자동채권으로 상계하여 원고에\n\n게 대항 O\n\n© 해제 : 매매대금채권 양도통지 ‘후’에 매매 해제사유（채무불이행） 생기거나 법정해제 •\n\n합의해제가 이뤄져도 채무자는 양수인에게 해제로 대항 O\n••• ① 해제는 원래 쌍무계약에 내재된 고유 속성 내지 위험이므로\n\n正辯: 결국 © 유형으로 분류한 불성립 •무효 • 취소 •동이항은 모두 계약에 내재된 것이므로 실질적\n으로 ‘통지를 받은 때’라는 기준시점은 별다른 의미 없음（私見） 一 채무자는 시점 상관없이 언제나\n\n대항 가능 一 다만 양수인의 고유 항변권 있다면 대항할 수 x ex. 허위표시 무효, 착오 취소\n\n••• ② 한편 해제 제3자 보호 법리로도 설명 가능\n[判例] 계약상 채권의 양수인은 548조 1항 단서 제3자 X, 해제 효과에 반하여 자신\n의 권리 주장 X •/ 새로운 이해관계 뿐 아니라 등기 • 인도 등 완전한 권리를 취득해\n\n야 보호 - （이미 양수금을 이행받았다면） 채권양수인은 채무자로부터 받은 급부를\n\n직접 원상회복할 의무 O [95다49882, 2000422850]\n\n正辯 : 제3자를 위한 계약에서 수익자도 해제 제3자로 보호되지 않지만 이미 이행받은 경우 그는\n해제로 인한 원상회복의무를 부담하지 않는다는 판례（후술. 요약자가 원상회복의무）와 구별\n\n한편 95다49882 판결은 ‘합의해제’의 경우도 채권양수인이 해제 제3자로 보호될 수 없다는 명시적\n판례라는 해석이 다수설 및 사견인데 2023년 변호사시험 선택형에 출제되어 공인되었음\n어쨌든 ‘채권양도와 해제’ 쟁점에서 판례는 451조는 논외로 한 채 548조만 명확히 설시함\n\nPART 1\n\n채권총론 • 채권양도 - B5", "", [], 0, "채권양도", 65, "미분류"],
  ["채권총론_P099", "2019다272855; 2014다52933; 2003다37426", "“양도된 채권이 이미 변제 등으로 소멸한 ‘후’에 채권압류 및 추심명 령 송달되", "[判例] “양도된 채권이 이미 변제 등으로 소멸한 ‘후’에 채권압류 및 추심명 령 송달되\n더라도 압류 • 추심명령은 무효 V 450조 2항은 양도된 채권이 존속하는 동안에 양립할 수\n없는 법률상 지위 취득한 제3자 있어야 적용, 소멸한 채권에 대한 압류• 추심명령은\n\n무효, 450조 2항 대항요건의 문제 발생 여지 X” [2003Q37426]\n[判例2022] 지명채권 양수인이 ‘양도되는 채권의 채무자’여서 507조 본문에 따라\n\n채권이 혼동으로 소멸한 ‘후’에 채권 압류• 가압류 송달되면 압류 가압류는 무효,\n\n이때 압류• 가압류채권자는 450조 2항 제3자 X ••• 450조 2항의 제3자 대항요건은\n양도된 채권이 존속하는 동안에 양립할 수 없는 제3자 있어야 적용, 존재 않는 채\n\n권에 대한 압류•가압류는 무효, 채권양도는 대항요건 갖추지 못해도 양수인에게\n채권 이전, 채권양도에 따른 처분행위 시 혼동으로 소멸한 것 [2019다272855]\n\n— [判例] “임대차계약상 지위 및 권리의무 포괄적 양도가 있는 경우에도 임대차보증\n\n금반환채권의 양도 부분은 확정일자 있어야（포괄적 양도계약에 확정일자 있거나 보\n\n증금반환채권 양도의 통지 • 승낙에 확정일자 있어야） 보증금반환채권에 가압류 등을\n\n받은 채권자에게 대항 가능 [2014다52933] — A의 주택을 B가 보증금 1.8억에 임차\n\n하였는데 임대차기간 중 A와 C（B의 처） 사이 보증금 1.5억으로 임대차계약 체결되었고\n（확정일자는 없었고, 차액 3,000만원은 C의 계좌로 입금됨, B＜는 계속 함께 거주）,\n\nD는 B를 채무자, A를 제3채무자로 임대차보증금반환채권에 가압류결정 一 이미 반환\n한 차액 3,000만원 부분은 채권가압류 무효（[2003다37426] 판례 법리）, 나머지 1.5억\n부분은 확정 일자 없으므로 C는 D에게 대항 X\n\n5. 채권에 대한 가압류 • 압류와 이행청구, 양수금청구의 관계\n- [判例] 채권에 가압류 있어도 현실 추심만 금지할 뿐 채무자는 제3채무자를 상대로\n이행청구소송 O, 법원도 가압류 이유로 배척 X — 인용 V 집행권원 취득 필요,\n\n집행단계에서 저지 가능, 가압류 취소 후 다시 소제기 불편, 시효중단 필요\n⑪ [判例] 이러한 법리는 가압류된 채권을 양수받은 자의 양수금청구소송에도 마찬가\n지로 적용 [2001 다59033],\n\n© [大判全合] 소유권이전등기청구권이 가압류된 경우라면 一 가압류집행 해제를 조건\n\n으로 인용 V 등기를 명하는 판결은 의사의 진술을 명하는 판결로서 일방적인 등기 신\n\n청이 가능하여 제3채무자의 집행단계 저지 불가능 [92다468이", "", [], 0, "채권양도", 68, "미분류"],
  ["채권총론_P100", "2009다32409; 2020다245958", "“중첩적 채무인수가 채무자의 부탁 없이 채권자와의 계약으로 채무를 인수하", "[判例] “중첩적 채무인수가 채무자의 부탁 없이 채권자와의 계약으로 채무를 인수하\n는 것은 매우 드문 일이므로, 원칙적으로 주관적 공동관계가 있는 연대채무관계 一\n\n부탁이 없어 주관적 공동관계 없다면 부진정 연대관계” [2009다32409]\n\n正辯 : 판례 학습과정에서 ‘연대채무’, ‘부진정연대채무’ 등의 최종 결론이 나오면 항상 그 이후, 가\n\n령 소멸시효와 시효중단, 상계의 절대효, 외측설 등과 연결시키는 습관이 필요함\n\n3. 계약인수\n- 계약당사자 지위 자체가 포괄적으로 이전되는 것으로서, 당사자 전원의 합의 내지\n\n잔류 당사자의 승낙 필요\n- [判例2020] 계약인수는 계약당사자 지위 승계, 계약에서 생기는 채권•채무, 해제권\n등 포괄적 권리의무 양도, 양도인은 계약관계 탈퇴, 특별한 사정 없는 한 잔류당사자\n\n와 양도인 사이 계약관계 X, 채권채무 소멸 - 계약인수는 당사자 3인 관여 있어야\n효력 발생（통상 양도인•양수인•잔류당사자 합의 삼면계약, 2인 합의가 선행하면 나\n\n머지 동의 .승낙 있어야 효력 발생）, 개별 채권양도는 양도인 • 양수인 2인 관여로 효력\n발생 - 채권양도에서 채무자 보호 위한 대항요건은 계약인수에서는 별도 요구 X,\n\n상법상 영업양도 수반 계약인수도 마찬가지 [2020다245958]\n正辯 : 甲회사와 己회사 사이 영업양도계약 체결하며 근로자（內 등）에 대한 사용자의 모든 권리의\n무 이전, 內도 己회사와 동일조건 근로계약（종전 근로기간 소급 작성） — 영업양도 전 內이 甲회사\n업무 관련 고객 돈 횡령한 경우, 甲회사의 內에 대한 손해배상채권도 己회사가 승계취득 o •■• 잔\n\n류당사자 內이 영업양도 인식하고 근로계약 인수 승낙, 인수인 己회사에 사용자 지위뿐 아니라 근\n로계약 기초로 이미 발생한 손해배상채권도 이전 一 이는 채권양도 대항요건 불필요", "", [], 0, "채권양도", 72, "미분류"],
  ["채권총론_P101", "2012다41359; 2014다52933", "채권 압류는 지급금지 명하지만 채권 발생원인인 법률관계에 대한 처분까지 구", "[判例] 채권 압류는 지급금지 명하지만 채권 발생원인인 법률관계에 대한 처분까지 구\n속 X — 계약인수 O, 양도인 탈퇴하지만 양도인이 계약관계로 가지던 권리의무 동일\n\n성 유지한 채 양수인에 승계, 양수인은 압류로 권리 제한된 상태의 채권 이전받음 一\n\n제3채무자는 계약인수 내세워 압류채권자에게 대항 X [2012다41359]\n- 【判例] 임대차계약에서 계약인수 있더라도 임대차보증금반환채권의 양도 부분은 확정\n\n일자 있어야 그에 대하여 가압류 등 받은 채권자에게 대항 O [2014다52933]", "", [], 0, "채권양도", 72, "미분류"],
  ["채권총론_P102", "92다23193", "“부동산 매수인이 매매목적물의 근저당권 피담보채무, 가압류채무, 임대차보", "[判例] “부동산 매수인이 매매목적물의 근저당권 피담보채무, 가압류채무, 임대차보\n증금반환채무를 인수하는 한편 그 채무액을 매매대금에서 공제하기로 약정한 경우,\n특별한 약정이 없는 이상 이행인수 （면책적 채무인수 X）” [92다23193]", "", [], 0, "채권양도", 73, "미분류"],
  ["채권총론_P103", "2007다8464", "부동산 매수인이 부동산에 결부된 채무를 인수하고 채무액만큼 매매대금을", "[判例] 부동산 매수인이 부동산에 결부된 채무를 인수하고 채무액만큼 매매대금을\n\n공제받기로 약정한 경우, 이행인수인지 병존적 채무인수（제3자를 위한 계약）인지 구\n별기준 : 계약당사자에게 제3자（채권자）가 계약당사자 일방 또는 채무인수인에 대하\n여 직접 채권을 취득케 할 의사가 있는지 여부 一 인수 대상 채무의 책임을 구성하는\n권리관계도 함께 양도하거나 인수인이 채무부담에 상응하는 대가 얻는 경우는 원칙\n\n적으로 병존적 채무인수 O, 이행인수 X [2007454627]\n\n— 매도인이 변제하면 매수인에 구상권 O, 매수인이 변제하면 매도인에 구상권 X\n- [判例] 이때 채권자에 대한 관계에서는 여전히 매도인이 채무 부담하지만, 매도\n인•매수인 사이에서는 매수인이 변제할 책임 一 매수인이 변제 게을리하여 근저당\n\n권 실행됨으로써 매도인이 소유권 상실했다면 오로지 매수인 귀책사유 O — 538조\n적용. 매도인은 매수인에 대하여 여전히 매매대금청구 O [2007다8464] — 다만, 경\n매로 채무 소멸하거나 남는 금액 교부받은 것은 538조 2항 소정의 이익이므로 매수\n\n인에게 상환해야\n\nPART 1\n\n채권총론 - 채무인수 • 73", "", [], 0, "채권양도", 73, "미분류"],
  ["채권총론_P104", "2020다294516", "이행인수계약 불이행으로 인한 손해배상 범위는 채무자가 이행 않음으", "[判例2021] 이행인수계약 불이행으로 인한 손해배상 범위는 채무자가 이행 않음으\n\n로써 생긴 통상 손해 한도로 一 매수인이 인수채무 변제 않아 원리금 늘어났다면 그\n원리금이 통상 손해 O [2020다294516]", "", [], 0, "채권양도", 74, "미분류"],
  ["채권총론_P105", "76다2218", "460조는 수령거절의 번의가능성을 고려하여 구두제공을 규정한 취지, “변제를", "[判例] 460조는 수령거절의 번의가능성을 고려하여 구두제공을 규정한 취지, “변제를\n수령하지 않을 의사가 명백하여 번의가능성 없다면 구두제공도 불필요 一 채무자는\n채무불이행 책임\n\nX” [76다2218]\n\n正辯 : 판례는 예전부터 461조 면책의 효과를 강조해왔고, 후술하는 ‘위험부담’에서는 [2001 다\n\n79013] 판결에서 538조 1항 2문의 반대급부 청구를 주장하려면 ‘영구적 불수령’의 경우라고 해도\n최소한 구두제공은 필요하다고 판시함", "", [], 0, "채권소멸변제", 76, "미분류"],
  ["채권총론_P106", "2018다252014", "채권자 수령거절 의사 명백히 표시하고 의사 뒤집을 가능성 안 보이면", "[判例2021] 채권자 수령거절 의사 명백히 표시하고 의사 뒤집을 가능성 안 보이면\n채무자는 채무 이행 • 이행제공 않더라도 채무불이행 면책, 그렇지 않다면 채무자는\n채무내용 좇은 이행제공해야 채무불이행 면책 [2018다252014]\n- 효과 @ 채무불이행 책임 면하고（제461조. ‘영구적 불수령’은 구두제공조차 불필요）,\n® 공탁 가능（제487조, 변제제공만 하였으므로 채무는 존속）\n\n- 채권자지체에 관한 법정책임설 [통판] 취하면 ‘변제제공=채권자지체’ 되어 변제제\n공으로 채권자지체의 효과 발생 : © 주의의무 경감（제401조）, @ 이자 지급의무 면\n\n제（제402조）, © 증가비용 부담（제403조）, © 쌍무계약 위험 이전（제538조 제1항 2문）\n\n3. 변제의 당사자\n- 제3자의 변제（제469조） : 가능 O, 성질 • 의사표시로 불허, ‘이해관계 없는 제3자’는\n\n채무자 의사에 反하여 변제\n\nX （= 채무인수, 경개）\n\nex. 공동채무자, 보증인, 물상보증인, 제3취득자, 후순위담보권자 （=법정대위권자）", "", ["제461조", "제487조", "제401조", "제402조", "제403조", "제538조 제1항"], 0, "채권소멸변제", 76, "미분류"],
  ["채권총론_P107", "", "“469조 2항의 ‘이해관계’나 481조의 ‘변제할 정당한 이익’이 있는 자는 변제하", "[判例] “469조 2항의 ‘이해관계’나 481조의 ‘변제할 정당한 이익’이 있는 자는 변제하\n지 않으면 채권자로부터 집행을 받거나 채무자에 대한 자기 권리 잃게 되는 지위이\n기 때문에 변제함으로써 당연히 대위의 보호 받아야 할 법률상 이익 있는 자”를 말하\n\n며, 단지 사실상 이해관계 가진 자 X\n공동 저당에서 물상보증인 소유 후순 위담보권자는 공동 저당권자가 물보 소유물에서\n\n배당받고 남은 채무를 채무자 의사에 反하여 대위변제할 이해관계\n\nX •/ 물상보증인\n\n이 대위취득한 채무자 소유 부동산에 대한 공동저당권자의 저당권을 후순위담보권\n자가 물상대위할 수 있으므로 집행 받거나 권리 잃을 지위 없음 [2008마10이\n\n正辯 : 물보 소유 부동산의 후순위 담보가등기를 마친 자가 위 상황에서 채무자 소유 부동산에 대\n\n하여 직접 경매신청하겠다는 이유로 공동저당권자의 잔액 채무를 변제공탁하는 것은 수리 X", "", [], 0, "채권소멸변제", 76, "미분류"],
  ["채권총론_P108", "90다17774; 87다카1644; 2009다71558", "담보 가등기 경료된 부동산을 시효취득하여 소유권이전등기권 취득한 자가", "[判例] 담보 가등기 경료된 부동산을 시효취득하여 소유권이전등기권 취득한 자가\n\n등기 경료 못하던 중 채권자가 청산절차 거치지 않고 가등기에 기해 본등기 경료했\n다면 소유자에 대한 소이등청구권 보전하기 위해 소유자를 대위하여 그 채권자에게\n\n채무 변제할 법률상 권한 및 이해관계 있는 제3자 O [90다17774]\n\n[ 判例] 이해관계 없는 제3자의 변제가 채무자 의사에 반하는지 여부는 제3자 변제\n당시의 객관적 제반 사정에 비추어 명확하게 인식될 수 있어야, 함부로 채무자의 반\n대의사추정 X [87다카1644]\n\n[ 判例] 제3자의 변제로 타인 채무 소멸시키려면 제3자가 타인 채무 변제하는 의사를\n변제지정 통해 표시해야 一 채권자가 변제 수령하면서 제3자가 타인 채무 변제함을\n\n인식했다면 제3자의 타인 채무변제 지정 있는 것 O [2009다71558]\n- 제3자의 변제 O,\n\n제3자의 상계 X [통판] 수동채권은 반드시 피상계자의 상계자에\n\n대한 채권이어야 하고, 피상계자의 제3자에 대한 채권이면 X\n- 단축된 급부 혹은 제3자방 이행 : [判例] “계약의 일방이 상대방의 지시에 좇아\n\n급부과정 단축하여 상대방과 다른 계약관계 맺은 제3자에게 직접 급부하면 이로써\n급부한 자의 상대방에 대한 급부뿐 아니라 상대방의 제3자에 대한 급부도 이뤄짐\n\n（‘C …> A’ = ‘C …> B’ + ‘B •••► A’） — B-C 사이 계약이 무효 - 취소 • 해제된 경우 C는\n\nA가 아닌 B 상대로 부당이득반환• 원상회복 청구 V A에 대한 반환청구를 긍정하면\n자기 책임으로 체결된 계약 위험을 제3자에게 전가하여 계약법 원리 위반, 제3자가\n상대방에 대해 가지는 항변권 침해” - 이 경우 A가 급부 수령 당시 B-C 사이 원인\n관계에 무효 등 흠이 있음을 알고 있었다고 하더라도 마찬가지 [2006다46278]\n- 표현수령권자에 대한 변제 : 준점유자, 영수증소지자\n\nO 채권의 준점유자에 대한 변제（제470조） : 채권을 사실상 행사하고 진정한 채권자라 믿\n게 할 외관을 갖춘 자에 대하여 변제자가 선의 • 무과실로 변제하면 변제 유효", "", ["제470조"], 0, "채권소멸변제", 77, "미분류"],
  ["채권총론_P109", "2004다41194; 98다61593", "선의• 무과실은변제자가 입증책임 [2004다41194]", "[判例] 선의• 무과실은변제자가 입증책임 [2004다41194]\n[判例] 채권의 준점유자 변제 유효 요건인 ‘선의’는 변제수령 권한 없음 알지 못한\n것뿐만 아니라 적극적으로 진정한 권리자라고 믿었음을 필요로 [98다61593]", "", [], 0, "채권소멸변제", 77, "미분류"],
  ["채권총론_P110", "87다카2015; 78다1292, 87다카546", "채권 압류나 가압류가 경합된 경우 1인 전부명령은 무효, 그러나 제3채무자", "[判例] 채권 압류나 가압류가 경합된 경우 1인 전부명령은 무효, 그러나 제3채무자\n가 선의 • 무과실로 전부채권자에게 변제하면 채권의 준점유자에 대한 변제로 유효\n\n（이 경우 일반적으로 선의 • 무과실） [87다카2015] — 제3채무자는 다른 압류채권자에\n대하여 이중변제 의무 X — 제3채무자가 전부채권자에 대하여 전부명령의 무효를\n주장하여 부당이 득반환청구 X, 경합압류채권자는 전부채권자에 대하여 자기가 배당\n\n받을 범위 안에서 부당이득반환청구 O, 이러한 경합압류채권자의 배당받을 금액에\n대하여 제3채무자는 변제할 이해관계 X [78다1292, 87다카546]\n\nPART 1\n\n채권총론 • 변제 • 77", "", [], 0, "채권소멸변제", 77, "미분류"],
  ["채권총론_P111", "", "혼인 외 子의 생부가 사망하고 혼인 외 자가 인지청구 소를 제기하였더라도", "[判例] 혼인 외 子의 생부가 사망하고 혼인 외 자가 인지청구 소를 제기하였더라도\n인지판결 확정 전에 당시의 정당한 상속인이 채무자에 대하여 승소판결 받았다면 채\n무자의 표현상속인에 대한 변제는 특별한 사정이 없는 한 선의 • 무과실이고 채권의\n준점유자에 대한 변제로 유효 O V 인지판결 확정되면 소급하여 지위 상실함을 들\n어 권리행사 거부할 수는 X [93Q32200]\n© 영수증소지자에 대한 변제（제4기조） : 영수증은 위조되지 않은 진정한 것이어야, 악\n의 • 과실 없을 것（변제의 무효를 주장하는 자가 변제자의 악의 • 과실 입증할 것）\n\n- 권한 없는 자에 대한 변제（제472조） : 채권자가 ‘이익을 받은 한도’에서 효력", "", ["제472조"], 0, "채권소멸변제", 78, "미분류"],
  ["채권총론_P112", "2010다32214, 2013다17117, 2017다278729", "‘이익을 받은 경우’란 @ 수령자가 채권자에게 전달, ® 채권자가 사후", "[判例2021] ‘이익을 받은 경우’란 @ 수령자가 채권자에게 전달, ® 채권자가 사후\n추인, © 수령자가 채권자의 자신 • 제3자에 대한 채무에 충당 • 변제하여 기존 채무\n\n소멸시킨 경우 포함 O, 그러나 수령자가 자신의 채권자에 대한 채무 변제한 경우는 X\n\nV 채권자에게 실질적 이익 X [2010다32214, 2013다17117, 2017다278729]\n正辯 : [2021 년 선고 2017다278729 판결 사안] A가 B에 대한 채권®를 집행채권으로 B의 으에\n대한 물품대금채권에 압류 및 전부명령 서 C는 이를 간과한 채 B에게 물품대금채권을 변제함 一\n\nB는 C로부터 수령한 변제금을 충당 지정 없이 A에게 변제, A는 수령 당시 b에 대한 다른 채권\n\n0에 충당 지정함 一 A는 C에 대한 전부금소송에서 전부명령 무효（압류 경합）로 인해 패소 후 다\n시 자신이 받은 압류명령에 기초하여 추심명령 받고 e에 대해 추심금청구 一 A 승소, C는 472조\n주장 X V B가 C로부터 받은 돈을 A에게 전달한 것으로 보이나 A의 지정으로 채권⑭에 충당되\n었으므로 이는 B가 자신의 채권자에 대한 다른 채무 변제한 것일 뿐임. 전부명령이 민집법 229\n조 5항으로 무효이더라도 압류명령은 유효하므로 e가 압류명령 받은 후 압류채무자 B에게 변제\n하여 스스로 이중지급 위험 감수해야\n\n4. 변제의 충당\n— 의의 : 동일한 채권자에 대하여 동종의 수개 채무 부담하거나（제476조） 1개 채무에\n서 수개의 급부를 해야 할 경우（제478조）, 변제의 제공이 채무 전부를 소멸시키기에\n\n부족하면 어느 채무부터 변제에 충당할 것인가의 문제 一 상계충당（제499조）\n\n그러나 변제자가 복수의 채무 중 단순히 특정채무를 ‘지정’하여 ‘변제’하는 것은 지정\n‘충당’이 아님을 유의해야", "", ["제476조", "제478조", "제499조"], 0, "채권소멸변제", 78, "미분류"],
  ["채권총론_P113", "2024다258921", "동일 당사자 사이에 수 개의 채권관계가 성립되어 있는 경우, 채무자가", "[判例2021] 동일 당사자 사이에 수 개의 채권관계가 성립되어 있는 경우, 채무자가\n\n특정채무 지정하여 변제하면 그 변제액수가 지정한 특정채무 액수를 초과하더라도,\n초과액수 상당의 채권이 부당이득관계에 따라 다른 채권에 대한 상계의 자동채권이\n\n될 수 있음은 별론, 당사자 사이에 다른 채권 변제에 충당 • 공제 대상으로 삼는 합의\n가 있는 등 특별한 사정이 없는 한, 초과액수가 다른 채권의 변제에 당연 충당\n공제\n\nX,\n\nX [20204261776]\n\n正辯 : 그간 편의상 변제자의 ‘지정’이라는 용어를 항상 변제충당의 ‘지정충당’을 의미하는 것으로\n사용하기도 했으나, 위 판결 선고 이후에는 변제자의 단순한 ‘지정’은 특정 채무만을 변제하겠다는\n\n의사일 수도 있다는 점에 유의해야 하고, 출제자의 입장에서도 ‘지정’을 변제충당에서의 ‘지정충당’\n의 의미로 사용하려면 여러 채무 중 특정 채무를 ‘먼저（우선）’ 소멸시키겠다는 의사가 명확하게 드\n\n러나는 표현을 명시하는 것이 타당할 것임（私見）\n- 합의충당 一 비용 • 이자 ■ 원본충당 一 지정충당 一 법정충당 順\n[判例2024] ‘변제’의 증명책임 있는 채무자는 채권자에게 ① 급부한 점, ② 급부가\n\n특정채무의 변제로서 이뤄졌다는 점 증명해야 一 채무자가 객관적으로 특정채무 내\n용에 적합한 급부 했다면 특별한 사정 없는 한 그 채무 변제로 인정\n\n여러 채무 부담하는 채무자의 급부가 동시에 여러 채무 내용 적합하나 채무 전부\n소멸시키기 부족한 경우 ‘변제충당’ 문제됨 一 채무자가 그중 특정채무 ‘변제’로서\n\n급부했다고 주장함에 대해, 채권자가 수령한 사실 인정하면서 다른 채무 변제에\n‘충당’했다고 주장할 경우, 채권자는 ① 다른 채권 존재 사실, ② 다른 채권에 변제\n\n충당 합의, 지정, 법정충당 우선순위 있었던 사실 주장•증명해야 [2024다258921]", "", [], 0, "채권소멸변제", 79, "미분류"],
  ["채권총론_P114", "2002다12871", "回겨 477조 4호의 안분비례 법정충당과 달리 그 법률효과 이상으로", "[判例2021] 回겨 477조 4호의 안분비례 법정충당과 달리 그 법률효과 이상으로\n자신에게 유리한 합의충당 또는 지정충당 또는 우선적 법정충당으로 특정 채무에\n\n전액 변제충당 되었다고 주장하는 자는 이를 주장•증명할 책임 부담 一 주장자가\n합의, 지정, 우선적 법정충당 부분 증명 못하면 각 채무액 안분비례 법정충당 •••\n법정충당 순위 동일하면 477조 4호 적용 [2007다77712, 2021 다247937]\n\n正辯 : 피고의 변제항변에 대한 원고의 변제충당 재항변과 관련된 판결로서, 원고가 별개의 채권\n존재는 증명했으나 합의 등 우선충당 사유를 증명하지 못한 경우에는 청구 전부기각이 아닌 일부\n\n인용판결 여지 O ••• 4호에 의해 소구채권과 별개채권에 안분비례 충당됨\n\n① 합의충당 : 476〜479조는 임의규정, 합의충당은 비 • 이 • 원 순서도 변경 가능\n[判例] 합의 없는 상태에서 비 • 이 • 원 법정 순서와 다르게 당사자가 일방적 지정함에\n\n대하여 상대방이 지체없이 이의 아니했다면 묵시적 합의 충당 O [2002다12871]", "", [], 0, "채권소멸변제", 79, "미분류"],
  ["채권총론_P115", "", "경매에서는 합의충당", "[判例] 경매에서는 합의충당\n\nX— 획일적으로 가장 공평 타당한 477조 법정충당 O\n\n[95 다55504]\n\nPART 1\n\n채권총론 • 변제 • 79", "", [], 0, "채권소멸변제", 79, "미분류"],
  ["채권총론_P116", "99다68652", "보증인으로서 부담하는 보증채무（연대보증채무 포함）는 변제자 자신의 채무", "[判例] 보증인으로서 부담하는 보증채무（연대보증채무 포함）는 변제자 자신의 채무\n에 비하여 변제이익이 적음 [99다68652]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P117", "2013다8250", "보증인이 있는 채무와 없는 채무, 물상보증인 제공 물적 담보가 있는 채무와", "[判例] 보증인이 있는 채무와 없는 채무, 물상보증인 제공 물적 담보가 있는 채무와\n없는 채무는 변제이익 차이가 없고 동일함 [2013다8250]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P118", "99다22281", "제3자가 담보로 발행 or 배서한 약속어음 교부된 채무와 다른 채무 사이에", "[判例] 제3자가 담보로 발행 or 배서한 약속어음 교부된 채무와 다른 채무 사이에\n\n변제이익 차이 없고 동일 一 그러나 변제하는 자가 발행 or 배서한 어음으로 담보\n되는 채무는 다른 채무보다 변제이익 많음 [99다22281]\n\n正辯 : 채무자가 자기 소유 부동산을 담보로 제공한 채무와 그렇지 않은 채무 사이 변제이익에 관\n한 명시적인 판례는 없음（물보 소유라면 변제이익 차이 없고, 부동산이 아니라 약속어음이라면 담\n\n보 제공한 채무의 변제이익이 큼） 一 약속어음에 관한 판례를 부동산까지 확장할 것인지의 문제됨\n（법전협 기록형에서 변제이익 더 크다고 출제된 적 있음）", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P119", "2014다71712; 94다38106; 97다1556, 2013다214970", "법정변제충당의 순서는 변제제공 당시를 기준으로 판단 [2014다71712]", "[判例] 법정변제충당의 순서는 변제제공 당시를 기준으로 판단 [2014다71712]\n\n5. 변제자대위\n가. 의의\n\n— 제3자나 공동채무자 중 1인이 채무자를 위하여 변제한 경우 그 구상권의 범위에서\n채권자가 가졌던 채권 및 담보에 관한 권리가 당연히 이전되는 것 혹은 이를 행사하\n\n는 것 一 변제자대위는 구상권 확보를 위한 것\n[判例] 변제에 의한 대위（대위변제）는 제3자나 공동채무자 1인이 채무자나 다른\n공동채무자에 대해 가지는 구상권의 실현 확보를 목적으로 하는 제도 一 구상권이\n\n없으면 대위는 성립 X — 불가채무자 • 연대채무자 • 보증인 • 물상보증인 • 제3취득자 •\n후순위담보권자의 구상권은 규정상 명백, 채무자 부탁으로 제3자가 채무자를 위해\n\n변제한 경우는 688조（위임 비용상환청구권） 규정에 의해, 제3자가 사무관리에 의해\n채무자를 위해 변제한 경우는 739조（사무관리 비용상환청구권） 규정에 의해 각각 구\n\n상권 취득 O [94다38106]\n[判例] 물상보증인（연대채무자 1인）이 채무자（다른 연대채무자）를 위해 변제한 경\n\n우 구상권을 가짐과 동시에 당연히 채권자를 대위 一 구상권과 변제자대위권은 원\n\n본• 변제기 • 이자• 지연손해금 유무 등에 있어 내용이 다른 별개의 권리, 행사자 선택\n의 자유 [97다1556, 2013다214970]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P120", "", "변제자대위에 의한 원채권 및 담보권 행사 범위는 구상권 범위로 한정됨", "[判例2020] 변제자대위에 의한 원채권 및 담보권 행사 범위는 구상권 범위로 한정됨\n\n‘•• 변제자대위는 제3자•공동채무자의 구상권 확보 위한 제도 [2019Q270217]\n\nPART 1\n\n채권총론 • 변제 • 81", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P121", "", "“469조 2항의 ‘이해관계’나 481조의 ‘변제할 정당한 이익’이 있는 자는 변제", "[判例] “469조 2항의 ‘이해관계’나 481조의 ‘변제할 정당한 이익’이 있는 자는 변제\n\n하지 않으면 채권자로부터 집행을 받거나 채무자에 대한 자기 권리 잃게 되는 지위\n이기 때문에 변제함으로써 당연히 대위의 보호 받아야 할 법률상 이익 있는 자”를 말\n하며, 단지 사실상 이해관계 가진 자 X [2008마 109]\n\n[\n\n判例] 매도인이 제3자에게 먼저 양도담보로 소유권이전등기 마쳐주면 매수인 O —\n\n피담보채무 변제하고 매도인을 대위하여 말소등기청구 O [기 다1888]\n\n- 임의대위（제480조） : 변제와 동시에 채권자의 승낙을 얻어 대위 一 채권양도에 관한\n\n450〜452조 준용하므로 채권자의 통지나 채무자의 승낙이 대항요건이고 제3자에 대\n하여는 확정일자를 갖춰야\n\n다. 대위자와 채무자 사이 효과（제482조 제1 항）\n\n- 구상권 범위 내에서 채권 및 담보에 관한 권리 당연 이전\n법정대위 • 임의대위 불문하고 가령 저당권은 등기 없이도 당연히 이전됨（187조）", "", ["제480조", "제482조"], 0, "채권소멸변제", 82, "미분류"],
  ["채권총론_P122", "2016다232597", "채무자 위해 변제한 자는 변제와 동시에 채권자 승낙 얻어 채권자를", "[判例2021] 채무자 위해 변제한 자는 변제와 동시에 채권자 승낙 얻어 채권자를\n\n대위（480조 1항） 一 취득한 구상권 범위 내에서 종래 채권자가 가지던 채권 및 그\n담보 관한 권리는 동일성 유지한 채 법률상 당연히 변제자에게 이전 一 종래의\n\n채권자가 배당요구 없이 당연히 배당받을 수 있었던 경우는 대위변제자는 따로\n배당요구 없이 배당 O [2016다232597]\n\n正辯 : 담보가등기권자가 청산절차 없이 본등기 마쳤고, 제3자가 채권자의 승낙 얻어 가등기의 피\n\n담보채권 대위변제 一 그 후 위 임야에 소유권이전등기, 근저당권설정등기가 마쳐지고 근저당권\n에 기해 임의경매절차 개시 一 변제자가 경매법원에 ‘담보가등기권리자의 권리신고서’ 제출하면\n\n배당요구 없이도 배당받을 수 O V 대위변제 당시 담보가등기에 기한 본등기는 원인무효였고 담\n보가등기는 유효했0므루 대위변제자는 담보가등기와 그 피담보채권을 법률상 당연히 이전받음,\n\n경매개시결정 전에 담보가등기 경료됨\n— 채권에 관한 권리 : 손해배상청구권 • 채권자대위권 • 채권자취소권\n\n담보에 관한 권리 : 인적 담보（보증채권）, 물적 담보（질권, 저당권）", "", [], 0, "채권소멸변제", 82, "미분류"],
  ["채권총론_P123", "2015다65042; 99다13669; 2009다60527", "물상보증인의 면책은 피담보채무에 관한 물상보증인의 책임 소멸 의미, 채무", "[判例] 물상보증인의 면책은 피담보채무에 관한 물상보증인의 책임 소멸 의미, 채무\n자의 피담보채무 자체 소멸 의미\n\nx [2015다65042]\n\n【判例] 485조의 ‘담보’는 인적 •물적 담보 포함 O, 담보의 상실 • 감소의 예시는\n보증채무 면제, 담보물권의 포기나 불리한 순위로의 변경, 담보물의 훼손 • 반환 등이\n\n모두 포함 O [99다13669]\n[判例] 약정한 가등기담보권의 설정의 보전 • 집행 조치 취하지 않다가 제3자가 당해\n\n부동산을 압류 • 가압류하여 권리 확보 못한 경우도 O [2009다60527]\n[判例] 담보권 행사는 채권자의 선택이므로, 법정대위자가 있다고 하더라도 채권자가\n\n자신의 채권이나 담보권을 성실히 행사할 의무 X, 채권 • 담보권의 불행사• 포기가 485\n\n조 면책이 적용되는 것은 별론으로 해도 불법행위는 X [2001 다42677]\n[判例2022] 그러나 채권자가 제3자에 대해 담보권 성실 보존•행사 의무 부담하는\n\n특별한 사정 있다면 담보권 포기 행위가 예외적 불법행위\n\nO\n\n물상보증인 甲, 채무자 江, 그 공유토지에 공동근저당권자 因 一 甲 지분 먼저 경매\n\n개시되어 경락인 완납 - 因이 江 지분의 근저당권등기 말소해줌 一 위 경매 배당절\n차에서 內의 신고채권액 전부 배당받는 배당표 작성 一 內은 甲에 대해 자신의 담보\n권 성실 보존• 행사할 의무 부담함에도 곧 변제자대위 대상이 될 채무자 지분의 근저\n\n당권설정등기 말소해준 저당권 포기행위는 750조 불법행위 O ••• 변제자대위로 취\n득한 권리 침해에 준함, 因에게 배당 이뤄지면 물상보증인 甲은 481조*2조 변제자\n\n대위 할 수 있는 정당한 기대 [2017다261882]\n正辯 : 공동저당과 485조 문제 정리 : ① 채무자 소유물 저당권 말소해주고 물보 소유물 경매되면\n\n485조 면츠먹（2017다292756）, ② 물보 소유물 경매로 배당받고 채무자 소유물 저당권 말소해주면\n750조 불법행위（2011 다30666）, ③ 물보 소유물 경매대금 완납된 후에 채무자 소유물 저당권 말소\n해주고 물보 소유물에서 배당 받아버리면 750조 불법행위（2017다261882）\n\n③의 경우는 ‘완납 후 말소’ 사안으로서 공동저당권자가 물보 소유물로부터 배당받기는 전이어서\n말소 당시 아직 채무자 소유물의 저당권이 물보에게 귀속되지 않았고, 물보로서는 배당절차에서\n\n485조 면책 주장으로 배당이의를 할 수도 있었을 것이나（私見）, 이를 놓쳐 배당이의를 못한 상태에\n서 공동저당권자가 물보 소유물로부터 배당을 받아버리면, ‘배당받은 후 말소’ 사안과 마찬가지로\n\n750조 불법행위 손해배상을 인정한 것임（私見）. 한편 485조 면책 주장으로 배당이의를 못한 상태\n에서 배당이 이뤄지면 물보로서는 부당이득반환청구도 가능할 것이니. 결론적으로 두 가지 권리의\n\n경합으로 볼 수 있을 것임（私見）.", "", [], 0, "채권소멸변제", 84, "미분류"],
  ["채권총론_P124", "96다35774; 2010다11651", "채권자가 일부 대위변제자에게 그 변제 비율을 넘어 근저당권 전부 이전해준", "[判例] 채권자가 일부 대위변제자에게 그 변제 비율을 넘어 근저당권 전부 이전해준\n경우, 다른 보증인은 보증채무 이행하면 저당권 실행으로 배당받을 수 있었던 금액\n\n범위에서 보증채무 면함 [96다35774]\n[判例] 연대보증인 A의 변제 기타 출재로 공동면책 된 경우 그에게 자기 부담부분에\n관하여 상환하는 다른 연대보증인 B는 상환액을 다시 주채무자에 대하여 구상할 수\n\n있고 이 구상권 범위 내에서 공동면책시킨 연대보증인 A가 당초 채권자를 대위하여\n가지는 권리를 다시 대위취득 一 공동면책시킨 연대보증인 A가 주채무에 대한 담보\n를 상실 • 감소시키면 다른 연대보증인 B는 485조를 들어 상환받을 수 없는 한도 내\n\n에서 A에 대한 구상채무 면함 V 485조의 채권자는 당초 채권자뿐 아니라 장래 대위\n로 채권자로 되는 자 포함 O, 연대보증인 상호간에도 485조 ‘채권자’와 ‘법정대위할\n자’의 관계가 될 수 O [2010다11651]", "", [], 0, "채권소멸변제", 85, "미분류"],
  ["채권총론_P125", "2017다292756; 2019다222041", "485조의 법정대위자 면책 여부는 담보가 상실•감소된 시점을 표준시점으로", "[判例] 485조의 법정대위자 면책 여부는 담보가 상실•감소된 시점을 표준시점으로\n\n— 그 이후 시점 고려\n\nX —> 제2근저당권 말소 당시 그 담보가치가 전혀 없었다면\n\n485조 적용 X [2001 다42677], 반대로 제2근저당권 말소 당시 저당물 시가로 제1근\n저당권 배당받고도 충분했다면, 설령 그 후 실제 경매에서 저가 낙찰되어 말소된 제\n\n2근저당권에 기해 어차피 배당받을 수 없었더라도 485조 적용 O [2007다6659이\n[判例] 채무자 및 물상보증인 각 소유 부동산의 공동근저당권자가 채무자 소유 부동\n\n산 담보를 상실 • 감소케 하면, 물상보증인은 그로 인해 상환받을 수 없는 한도에서\n면책 O （••• 물상보증인의 변제자대위 기대권은 485조로 보호되어야） —\n\n물보 소유 부동산 경매절차에서, 공동근저당권자는 위 물보의 면책 주장 한도에서\n물보 소유 부동산의 후순위 근저당권자에 우선하여 배당 X [2017다292756]\n正辯 : 결국 물보 소유 부동산 경매에서 위와 같은 점을 고려하지 않고 공동근저당권자에게 전액\n우선 배당된 것에 대하여 그 후순위저당권자는 배당이의 주장 o\n\n마. 법정대위자 상호간（제482조 제2항）\n① 보증인은 미리 대위의 부기등기 해야 제3취득자에 대하여 대위 （제1호）\n② 제3취득자는 보증인에 대하여 대위\n\nX （제2호）\n\n- 1호 ‘미리’는 ‘변제 후’ 제3취득자 등기 전을 의미（즉, 제3취득자 등기 후에 보증인이\n변제를 한 경우에는 대위 부기등기 없이 대위 O）\n[判例2020] 제3취득자가 목적부동산 권리 취득한 ‘후’ 채무 변제한 보증인은 대위\n의 부기등기 없이도 대위 O ••• 482조 2항 1호는 제3취득자를 예측 불허 손해로부터\n\n보호, 보증인 변제 전 권리 취득한 제3자는 등기부상 저당권 존재 알고 권리 취득하\n여 불측 손해 염려\n\nX [2019다222041]\nPART 1\n\n채권총론 - 변제 - 85", "", ["제482조 제2항"], 0, "채권소멸변제", 85, "미분류"],
  ["채권총론_P126", "", "482조 2항에 ‘물상보증인’과 ‘제3취득자’ 상호간 변제자대위에 관하여", "[大判全合] 482조 2항에 ‘물상보증인’과 ‘제3취득자’ 상호간 변제자대위에 관하여\n\n규정 無.\n\n물상보증인이 채무 변제나 담보권 실행으로 소유권 잃은 때에는 보증인과\n\n마찬가지로 제3취득자에 대하여 구상권 범위 내 채권자를 대위 O, 그러나 제3취득자는\n채무 변제나 담보권 실행으로 소유권 잃더라도 물상보증인에 대하여 채권자를 대위\n\nX\n\nV 370조 .341 조는 물상보증인에게 보증인의 구상권 준용 인정, 482조 2항 5호는 보증\n인 •물상보증인을 인원수 비례로 대위하게 하여 우열 X, 만일 물상보증인 • 제3취득자\n\n상호간 각 부동산 가액 비례로 대위하게 하면 우연한 사정으로 뜻밖의 손해 • 이익을\n주어 부당, 482조 2항 1, 2호 [2011 다50233]\n正辯 : 이 경우에도 물상보증인은 미리 대위의 부기등기 해두어야 제3취득자에 대하여 채권자를 대위 O", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P127", "", "저당 부동산에 대하여 후순위 저당권을 취득한 제3자는 제3취득자 X —‘ 보증", "[判例] 저당 부동산에 대하여 후순위 저당권을 취득한 제3자는 제3취득자 X —‘ 보증\n\n인은 미리 대위 부기 등기 없었어도 후순위 저당권자에 대하여 대위 O, 후순위 저당\n권자도 보증인에 대하여 대위 O V 저당부동산에 소유권 • 지상권 • 전세권을 취득한\n제3취득자는 364조, 367조 등 이 익 보호 규정 있으므로 482조 2항 1, 2호가 제3취득\n\n자보다 보증인을 보호한 취지 였는데, 후순위저당권자는 이익 보호 규정 無 [2012다\n\n48855]\n다만 [判例]는 예외적으로 선순위 저당권등기 ‘불법 말소’ 후 새로 저당권 취득한 자\n는 제3취득자에 포함시키는 해석을 하였음 [2011 다30666] （후술）\n\n③④ 제3취득자 상호간, 물상보증인 상호간에는 각 부동산 가액 비례 대위 （제3, 4호）", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P128", "", "공동저당 목적 수인의 물상보증인 소유 부동산 중 일부 먼저 경매될 경우도,", "[判例] 공동저당 목적 수인의 물상보증인 소유 부동산 중 일부 먼저 경매될 경우도,\n채무자 및 물보 소유 사안에서 물보 소유 부동산 먼저 경매되어 물상보증인이 변제\n자대위권（481•482조） 취득하고 물보 소유 부동산 후순위 저당권자가 물상대위하는\n\n법리가 마찬가지로 적용 - 물상보증인들 사이 변제자대위 관계는 482조 2항 4호, 3\n\n호（부동산 가액 비례 대위） - 경매되지 않은 부동산의 1번 저당권등기에 대해서는\n말소청구 X [2001 다21854]", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P129", "", "수인의 물상보증인 또는 그로부터 목적물 소유권 등 취득한 제3취득자", "[判例2024] 수인의 물상보증인 또는 그로부터 목적물 소유권 등 취득한 제3취득자\n중 1인이 채무 변제하거나 담보권 실행으로 소유권 잃으면 다른 물상보증인 또는\n\n그로부터의 제3취득자에 대해 구상권 범위 내에서 채권자를 대위하여 채권 및 그\n\n담보권 행사 O, 물상보증인 상호 간 대위 규정한 482조 2항 3호, 4호에 따라 각\n부동산 가액 비례 O ••• 481조, 482조 1항, 2항（3, 4호） 규정 종합 [2023다26642이\n\n正辯 : 법정대위자 상호간 관계에서 ‘제3취득자 from 물상보증인’의 지위는 ‘물상보증인’과 동일하\n게 보아야 하고, 482조 2항 1. 2호 등 제3취득자 규정은 대부분 ‘제3취득자 from 채무자’만을 의미", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P130", "90다카10305; 2007다61113", "공동저당에서 자기 소유 부동산이 먼저 경매된 물상보증인이 다른 부동산에", "[判例] 공동저당에서 자기 소유 부동산이 먼저 경매된 물상보증인이 다른 부동산에\n미리 대위의 부기등기를 하지 않은 사이에 제3취득자가 부동산을 취득하면 482조 2항\n\n5호 단서가 적용되어 대위 X [90다카10305]\n正辯 : 판례는 5호의 보증인에도 물상보증인을 포함시키는 해석을 하고 있음\n- [判例] 보증인, 물상보증인이 여럿 있고 이 중 보증인 •물상보증인 지위를 겸하는 자\n\n가 있는 경우 인원수 산정에 있어 1인으로 O ••• 482조 2항 4, 5호가 보증인과 물상보\n증인 상호간에는 자력이나 재산 가액 일체 고려하지 않고 형식적으로 인원수 비례 평\n\n등 대위를 규정한 것은 서로 성질이 달라 합리적 기준 결정 곤란하고 공평하고 간명\n한 법률관계 처리 위한 것이므로\n\n正辯 : 여기서 겸하는 자를 1 인으로 보더라도 그를 다시 물상보증인으로 볼 것인지（물상보증인설 :\n다시 재산 가액 비례）, 보증인으로 볼 것인지（보증인설 : 재산 가액 무관하게 인원수로 1：1 계산） 견\n\n해가 대립되나, 위 판례는 물상보증인 1인, 연대보증인 겸 물상보증인 3인이 있는 사안에서 모두\n\n1：1：1：1로 계산하여 보증인설을 취함\n한편 보증인과 물상보증인이 여럿 있는 경우 누구라도 위 방식으로 산정한 각자의\n부담 부분을 ‘넘는’ 대위변제 하지 않으면 다른 보증인 • 물상보증인 상대로 대위 X\n\n••• 미달한 대위변제자가 대위하게 하면 먼저 대위한 자의 부당한 이득 취득, 상호간 대\n\n위 계속 반복 우려 있어 5호의 취지에 반함 [2007다61113]", "", [], 0, "채권소멸변제", 87, "미분류"],
  ["채권총론_P131", "2017다278187", "채무자 아닌 제3자인 위탁자가 채권자를 우선수익자로 부동산담보신탁", "[判例2022] 채무자 아닌 제3자인 위탁자가 채권자를 우선수익자로 부동산담보신탁\n한 경우에 채권자의 우선수익권이 481조, 482조 1항으로 보증채무 이행한 보증인이\n\n법정대위할 ‘담보에 관한 권리’에 해당한다고 하더라도, 우선수익권에 대한 보증인\n의 변제자대위는 보증인과 물상보증인 상호간 관계와 마찬가지로 인원수 비례 O,\n\n전액 X •/ 대위자 상호간 합리적 •통상적 기대에 부합, 482조 4호•5호가 자력 • 가액\n고려 없이 형식적 인원수 비례 평등하게 한 취지 [2017다278187]\n\n正辯 : 신탁법상 부동산 담보신탁에서 우선수익권은 금전채권과 독립한 별개 권리로 담보물권 X,\n제3자인 위탁자는 물상보증인 x — 단, 보증인이 우선수익권에 대하여 변제자대위를 할 경우는\n\n물상보증인과의 관계와 마찬가지로 인원수 비례\n\n※ 법정대위자 상호간 대위하는 금액 계산 방법 일독 • 이해\n\nPART 1\n\n채권총론 • 변제 • 87", "", [], 0, "채권소멸변제", 87, "미분류"],
  ["채권총론_P132", "2022다276789", "대물변제는 본래 채무 이행 갈음하여 다른 급여를 현실적으로 한 때 성립하는", "[判例] 대물변제는 본래 채무 이행 갈음하여 다른 급여를 현실적으로 한 때 성립하는\n요물계약, 다른 급여가 부동산 소유권이전이면 등기 완료되어야 대물변제 성립되어\n기존채무 소멸 一 대물변제계약 효력 발생 전에 채무 본지 따른 이행으로 기존채무\n\n소멸하고 나면, 대물변제 예약 당사자간 예약된 대물변제계약으로 소이등청구 X [86\n다카1755]\n[判例2023] 대물변제도 유상계약 O, 목적물에 흐＞자 있다면 매도인의 담보책임 규\n정 준용 O [2022다276789]\n\n正辯 : 甲회사가 다세대주택 신축공사 전기공사를 己회사에 하도급 주면서 공사대금을 다세대주\n\n택 구분건물로 대물변제하기로 약정 一 己회사에게 구분건물 소유권이전등기 마쳐줌 一 아직 구분\n건물 사용승인 못 받았거나 대지지분에 제한물권 설정된 사정은 대물변제 목적물 하자의 담보책임\n물을 사유 o, 대물변제는 이행 완료 o", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P133", "95다25060", "대물변제 하였으나 본래의 채무 부존재였다면 대물변제는 무효, 소유권이전", "[判例] 대물변제 하였으나 본래의 채무 부존재였다면 대물변제는 무효, 소유권이전\n효과생기지 x [91 다9503]\n- [判例] 기존 채무 이행에 관해 채무자가 채권자에게 어음 교부했다면 당사자 의사는\n기존 원인채무의 @ ‘지급에 갈음하여’（기존 원인채무 소멸）, ® ‘지급을 위하여’, ©\n‘담보를 위하여’ — 특별한 의사표시 없으면 ‘지급을 위하여’나 ‘담보를 위하여’ 교부\n된 것 추정, 기존 원인채무 소멸 X, 어음상 채무와 병존 O [95다25060]", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P134", "95다13371", "채무자가 채권자에게 채무변제와 관련하여 다른 채권을 양도하는 것은 특단", "[判例] 채무자가 채권자에게 채무변제와 관련하여 다른 채권을 양도하는 것은 특단\n의 사정이 없는 한 채무변제를 위한 담보 또는 변제의 방법으로 양도되는 것으로 추\n\n정, 채무변제에 갈음한 것 X, 원래의 채권 소멸 X [95다13371]\n[判例] 채무 관련하여 채무자 소유 부동산이 채권자 앞으로 소유권이전등기 마쳐진 경\n\n우, 대물변제조로 이전된 것인지 담보를 위한 것（양도담보）인지 당사자 의사해석 문제\n\n이나, 담보 목적임을 주장하는 측에 입증책임 [92다1988이", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P135", "2020다239366", "일부만 변제공탁 했으나 그 후 부족분을 추가로 공탁하면 그때부터는", "[判例2022] 일부만 변제공탁 했으나 그 후 부족분을 추가로 공탁하면 그때부터는\n\n모든 채무액에 유효한 공탁 O [2020다239366]\n— 조건부 공탁 X, 그러나 동시이행의 항변권 있으면 반대급부 제공을 수령 조건\n\nO\n\n（제491조 참조） - 선이행하라는 조건 붙이 면 무효\n[判例] 건물인도와 동시이행관계인 임차보증금의 변제공탁을 하면서 건물 인도했\n다는 확인서 첨부를 반대급부조건으로 붙이면 변제공탁은 변제 효력\n\nx ••• 인도의\n\n선이행을 조건으로 하였으므로 [91 다27594]", "", ["제491조"], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P136", "2014다29971; 2018마5697", "수인의 공탁자가 공탁하면서 각자의 공탁금액을 나누어 기재하지 않고 공동", "[判例] 수인의 공탁자가 공탁하면서 각자의 공탁금액을 나누어 기재하지 않고 공동\n으로 하나의 공탁금액 기재한 경우 공탁자들은 균등 비율로 공탁한 것, 그들 내부 실\n\n질적 분담금액 달라도 그것은 내부 문제 V 공탁의 내용은 공탁의 기재에 의하여 형\n식적으로 결정 [2014다29971]\n\n— [判例2020] 변제공탁 적법하면 채권자 출급 여부 관계없이 공탁한 때 변제 효력 발\n생 一 그러나 제3자（피공탁자 포함）가 공탁자에 대해 가지는 별도 채권의 집행권원\n\n으로써 공탁자의 공탁물 회수청구권에 대해 압류•추심명령 받아 그 집행으로 공탁\n물 회수하면 채권소멸 효력은 소급하여 없어짐\n\n부적법 변제공탁으로 변제 효력 발생 않았더라도 피공탁자는 수락하여 출급청구 하는\n대신 공탁자에 대한 다른 채권에 기해 공탁자의 회수청구권에 압류•추심명령 받아\n그 집행으로 공탁물 회수 O\n\n출급청구권에 대한 압류는 회수청구권에 아무런 영향 x\n\n••• 공탁물 ‘출급청구권’과\n\n‘회수청구권’은 서로 독립한 별개 청구권 [2018마5697]", "", [], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P137", "2012다52526; 96다2583", "공탁은 반드시 법령에 근거해야 하고, 집행법상 집행공탁 요건 구비 여부를", "[判例] 공탁은 반드시 법령에 근거해야 하고, 집행법상 집행공탁 요건 구비 여부를\n불문하고 당사자의 ‘약정’에 기한 공탁청구는 불허 [2012다52526]\n- [判例] 변제공탁 및 집행공탁 사유가 모두 있는 공탁을 하였다면 변제공탁 관련 채\n\n권양수인에 대해서는 ‘변제공탁’으로서, 집행공탁에 관련된 압류채권자에 대해서는\n‘집행공탁’으로서 각 효력 O [96다2583]\n\n※ 488조（채무이행지의 공탁소）, 4이0조（자조매각금의 공탁）\n\n3. 경개（제500조）\n— 의의 : 채무의 중요한 부분（채권자, 채무자, 내용）을 변경함으로써 신채무를 성립시\n킴과 동시에 구채무를 소멸시키는 계약 - 동일성 상실", "", ["제500조"], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P138", "2002다31803", "채권양도인지 경개인지 불분명한 경우 채권양도로 [96다 16612]", "[判例] 채권양도인지 경개인지 불분명한 경우 채권양도로 [96다 16612]\n[判例] 준소비대차인지 경개인지 불분명한 경우 준소비대차로 [2002다31803]\n••• 동일성 상실하며 채권자 담보 잃고 채무자 항변권 잃는 불이익 초래 X\n\n— 구채무가 무효라면 경개도 무효 / 구채무 발생원인에 취소사유 있는 경우에는 경개\n가 법정추인（145조 3호）이므로 확정적 유효가 됨\n- 신채무가 성 립하지 않으면 구채무도 소멸하지 않음 （제504조）\n\n— [判例] 경개계약은 신채권 성립, 구채권 소멸시키는 처분행위 - 신채권 성립되면\n효과 완결, 경개계약 자체 이행 문제 발생 X — 신채무 불이행을 이유로 경개계약\n\n해제 X — 그러나 경개계약 성립 후 당사자 사이 합의해제 O ••• 계약자유 [2002다\n\n62333]\n\n4. 면제（제506조）\n— 채권자의 단독행위.\n\n처분권한 있어야\n\n— 채권자대위권 행사의 통지가 있거나, 채권（가）압류, 채권입질의 경우에 제3채무\n자 • 채무자 • 질권설정자는 채무 면제 행위를 들어 대항 X •.• 처분행위\n\n5. 혼동（제507조）\n- 의의 : 채권과 채무가 동일한 주체에 귀속하는 것 一 그러나 채권이 제3자의 권리의\n\n목적 인 때 에는소멸하지 X （단서）\n[判例] 증여받은 자가 소이등 않던 중 소유자 사망으로 상속 개시된 후 점유자 취\n득시효 완성 一 점유자는 상속인들에 대해 각 상속지분 따라 취득시효 완성 원인\n소이등청구권 취득 一 그러나 취득시효 완성 후 수증자 앞으로 증여 원인 소이등\n되면 완성 후 새로운 이해관계인 O —> 다만 수증자가 상속인 중 1인이라면, 그의\n\n피상속인에 대한 증여 원인 소이등청구권은 상속지분 범위에서 상속 의한 혼동으\n\n로 소멸, 점유자에 대해 취득시효 완성 원인 소이등의무 부담 一 그 상속인이 부동\n\n산 전체 증여 원인 소이등 마쳤더라도 적어도 자기 상속지분 범위 내에서는 새로\n운 이해관계인 X, 점유자에 대해 취시 소이등의무 부담 [2011 다59445]\n\nPART 1\n\n채권총론 • 대물변제•공탁•경개 •면제•혼동 •\n\n91", "", ["제504조", "제506조", "제507조"], 0, "채권소멸기타", 91, "미분류"],
  ["채권총론_P139", "2019다272855", "지명채권 양수인이 ‘양도되는 채권의 채무자’인 경우 채권양도에 따른 처", "[判例2022] 지명채권 양수인이 ‘양도되는 채권의 채무자’인 경우 채권양도에 따른 처\n분행위 시에 507조 본문에 따라 채권이 혼동으로 소멸함 [2019다272855]\n- [判例] 자동차 운행 교통사고와 상속 사안의 혼동 여부\n자동차 운행 중 교통사고로 운행자나 동승한 친족이 사망하여 자배법 3조에 의한\n\n손해배상채권과 채무가 상속으로 동일인에게 귀속된 경우에 피해자의 보험회사\n에 대한 직접청구권의 전제인 자배법 3조 피해자의 운행자에 대한 손해배상청구권은\n\n상속에 의한 혼동에 의해 소멸되지 X ••• 피해자에게 책임보험 혜택 부여하여 보호할\n\n사회적 필요성 동일, 보험자는 이미 보험료를 받았고 혼동이라는 자신과 무관한\n우연한 사정으로 보상책임 면할 합리적 이유 無 / But 가해자가 피해자의 상속인이\n\n되는 등 특별한 경우에는 피해자의 상속인에 대한 손해배상청구권은 혼동으로 소멸 O\n\n[93448373, 2000다41653] — 운행자 父의 차량을 가해자 母가 운전하다가 동승한\n피해자 子가 사망한 경우, 父가 子로부터 상속한 직접청구권을 보험회사에 대하여 행\n\n사하는 것은 O（v 운행자책임과는 혼동으로 소멸 X）, 그러나 母는 상속한 子의 직접\n청구권을 행사 X（v 가해자로서 운전자의 일반불법행위책임과는 혼동으로 소멸 O）\n••• 父가 상속한 子의 직접청구권의 1/2만 행사 O", "", [], 0, "채권소멸기타", 92, "미분류"],
