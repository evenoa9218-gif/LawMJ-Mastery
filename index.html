]

const 채권총론_CONCEPT = [
  ["채권총론_C001", "제1 장서설", "제1 장서설\n\n씬 일반론 슈\n\n1 .채권 일반\n- 채권은 특정인이 다른 특정인에게 특정의 행위를 청구할 수 있는 권리\n- 채권은 채무자의 행위를 목적으로 하며, 청구를 하였으나 이행하지 않으면 강제적으\n로 실현할 수 있음\n\n2 . 채무의 분류\n- ① 급부의무 : 0 주된 급부의무, © 종된 급부의무\n② 부수적 주의의무 : 급부 제대로 실현하기 위해 신의칙상 요구되는 부수적 의무\n\n③ 보호의무 : 채무의 범주에 넣을 것인지 논의 있으나 불법행위로 해결 [통]", [], 0, "채권일반서론", 3],
  ["채권총론_C002", "제2장 채권의 목적", "제2장 채권의 목적\n\n쓰 채권의 목적 슈\n\n1. 특정물채권\n- 특정물 채무자는 인도하기까지 선관주의의무（제374조）\n\n추상적 과실 의미하며 위반하면 채무불이행.\n\n실제로 ‘인도하기까지’ 의미［통］\n\n이행기 이후는 통상 이행지체나 수령지체로 책임 가중（392조） 혹은 감경（401조）되므\n로, ‘이행기 이후이면서 실제 인도할 때까지’ 선관주의의무 부담하려면 이행지체도 수\n\n령지체도 아닌 경우에 해당해야 一 ex. 유치권 • 동이항 행사\n— 특정물 채무자는 이행기의 현상대로 인도하여야（제462조）\n‘이행기’는 ‘실제 인도할 때’의미［통］\n\n변질 • 훼손돼도 그 상태로 인도하면 되고（채권자가 거절하면 수령지체）, 동일성 상실\n되면 인도의무 소멸 一 채무불이행 문제는 아니며, 멸실 등이 채무자 과실（선관의무\n\n위반）이면 채무불이행 책임은 별개 문제\n\n2. 불특정물채권（종류채권）\n- ［判例］ 주식반환의무는 종류채무이므로 보유하던 주식이 제3자에게 매도되어 보유\n하고 있지 않다는 사정만으로 주식반환의무가 이행불능 X ［2014다37040］\n\n가. 종류채권의 특정（제375조 제2항）\nO ‘채권자 동의 얻어 지정’ : ［判例］ 합의가 없고 채무자가 지정권 행사하지 않을 경우\n선택채권 규정（381조） 준용하여 지정권이 채권자에 이전 ［2000다24856］\n© ‘채무자가 이행에 필요한 행위를 완료’ 느 변제제공（제460조） 기준으로 판단\n\n@ 지참채무 一 현실제공 : 채권자 주소에 도달하여 채권자가 언제든지 수령할 수 있\n는 상태에 놓인 때 （다만, 미리 받기를 거절한다면 구두제공으로 족함）\n\n® 추심채무 一 구두제공 : 목적물 분리하여 변제준비 완료를 통지하고 수령을 최고\n한때\n\n正辯 : 구두제공은 준• 통 수이고, 특정은 거기에 분리까지 요한다는 것이 일반적", ["제374조", "제462조", "제375조 제2항", "제460조"], 0, "채권목적", 4],
  ["채권총론_C003", "나. 특정의 효과", "나. 특정의 효과\n\n- 특정으로 ‘물건의 위험’이 채권자에 이전:\n\n특정 이전 멸실 一 채무자는 조달의무 O\n\n특정 이후 멸실 一 채무자는 채무 소멸 （다만 채무불이행책임은 별개）\n\n3. 외화채권\n- 대용급부권（제378조） : ‘지급할 때’ 있어서의 이행지의 환금시가에 의하여 우리나라 통\n\n화로 변제할 수 있음\n- ‘지급할 때’（환산시기）\n\n@ 채무자가 대용권 행사할 경우", ["제378조"], 0, "채권목적", 5],
  ["채권총론_C004", "- ‘약정지연이자’에 대해서도 이자제한법 적용 [2020다300473]", "- ‘약정지연이자’에 대해서도 이자제한법 적용 [2020다300473]\n\n正辯 : 약정 지연손해는 이자 개념과 다르고 동법 6조가 감액 규정한 점을 들어 동법상의 최고이\n자율은 적용이 없다는 견해도 있으나（63다1212 판결）, 그 후 대법원은 약정 지연손해에도 최고이\n자율을 적용한다고 명시함. 이에 따르면 동법 6조는 구법 당시 약정이 그 당시 최고이자율（가령\n\n2014년 이전으로서 연 30%）을 초과하지 않더라도 감액하는 실익이 있을 것（私見）", [], 0, "채권목적", 6],
  ["채권총론_C005", "대한 최고이자율 연 20% 적용한 14만 원이 최고 이자이므로, 공제액 30만 원이 최고 이자에서 16", "대한 최고이자율 연 20% 적용한 14만 원이 최고 이자이므로, 공제액 30만 원이 최고 이자에서 16\n만 원을 초과한 것이고, 그 초과된 16만 원을 원본 100만 원에 충당시키면, 원본으로 84만 원이 남\n\n게 되어, 이것이 변제기에 채무자가 변제할 금액이 됨\n\n- 금전채무 이행청구 소 제기한 경우는 소장 송달 다음 날부터 연 12%（소송촉진 등에\n관한 특례법 제3조 제1 항 등, 2019. 6. 1. 시행） — 부칙 : 2019. 6. 1. 당시 계속 중인\n사건으로서 ① 제1심 변론종결 된 사건은 종전의 연 15%를, ② 제1심 변론종결 되지\n\n않은 사건은 2019. 5. 31.까지는 연 15'石를, 2019. 6. 1.부터는 연 12%를 적용\n\n- 기본적 이자채권은 발생 • 소멸 • 처분에 있어 원본채권과 운명을 같이하는 반면,\n지분적 이자채권（변제기 도래）은 독립성 있어 분리 양도 가능하고（원본채권 양도 시에\n당연히 같이 양도되는 것은 아님）, 소멸시효 기간도 별도로 163조 1호 단기 3년 O\n\n다만 원본채권이 시효로 소멸되면 소급 소멸하므로 지분적 이자채권도 소멸 O\n\n5. 선택채권\n— 무권대리인의 책임, 유익비상환청구권, 주채무자의 면책청구권\n— 규정이나 약정 없으면 채무자가 선택권（제380조）\n- 선택권의 이전（제381조, 제384조） : 선택권 행사기간 내 선택권자가 행사 않으면 상\n\n대방이 상당기간 최고하고 경과시 상대방에게 이전 / 선택권 행사기간 없는 경우,\n채권 기한 도래 후 상대방이 상당기간 최고하고 경과시 상대방에게 이전 /\n\n선택권자가 제3자인 경우, 제3자가 선택할 수 없거나, 선택하지 않아서 채권자• 채\n\n무자가 상당기간 최고하고 경과시 ‘채무자’에게 이전\n- 선택권 행사 후 상대방 동의 없이 철회 불가（제382조 제2항）\n\n- 선택의 효력은 소급효（제386조）\n\n- 불능으로 인한 선택채권의 특정（제385조） : 처음부터 불능이었던 급부가 있었거나\n선택권자의 과실로 급부불능 되면 잔존급부로 특정\n그러나 선택권 없는 자의 과실로 불능이 되면 선택권 존속 :\n\n甲이 ZL과 매매계약 체결하며 甲 소유 물건 A or B 중 하나를 매도인 甲이 선택하기\n로 했는데 매수인 江의 과실로 A가 멸실되면 — 甲은 A를 선택할 수도 — 매매는 A\n에 관하여 성립, 甲은 江에게 매매대금청구 O V 채권자 귀책사유로 불능되었음（538\n\n조 1항 1문）\n\nPART 1\n\n채권총론 • 채권의 목적 • 7", ["제3조", "제380조", "제381조", "제384조", "제382조 제2항", "제386조"], 0, "채권목적", 7],
  ["채권총론_C006", "제3장 채권의 효력", "제3장 채권의 효력\n제3절 채무불이행과 그 구제\n제2관 채무불이행의 유형\n\n씨 채무불이행 슈\n\n1. 채무불이행의 공통요건, 입증책임\n- 두 가지 공통요건\n\n① 귀책사유 : 고의 • 과실（추상적 경과실）\n② 위법성 : 주로 위법성조각사유가 문제됨（동시이행 항변권, 유치권）\n— 입증책임\n\n① 채권자 : ‘채무 내용에 좇은 이행이 아닌 사실’을 입증해야\n② 채무자 : ‘귀책사유 없음’을 입증해야\n\n<3 羊불법행위 : 피해자（채권자）가 가해자의 고의 • 과실을 입증해야\n© 금전채무불이행은 무과실 입증해도 면책 X •/ 무과실책임（제397조 제2항）", ["제397조 제2항"], 0, "채무불이행", 8],
  ["채권총론_C007", "3. 이행지체", "3. 이행지체\n가. 요건\n\n- ① 이행기에 ② 이행이 가능함에도 ③ 이행을 게을리 ④ 귀책사유 ⑤ 위법성\n\n- 이행지체의 시점（제387조）\n\n: 엄밀히는 그 ‘다음 날’부터 지체책임\n\n@ 확정기한 : 기한 도래한 때\n\n© 불확정기한 : 기한 도래함을 안 때 O소멸시효 : 기한 객관적 도래한 때）\n© 기한 정함 없는 채무 : 이행청구를 받은 때 （羊소멸시효 : 채권 발생한 때）\n아. 부당이득반환채무, 지 연손해금채무（손해배상채무）\n\n@ 반환시기 정함 없는 소비대차 : 상당 기간 정하여 최고 후 상당 기간 경과한 때\n\n（••• 603조 2항）\n- 채권자취소소송• 이혼소송（형성판결）의 가액배상• 재산분할 : 판결확정일 다음 날부\n터 민법이 정한 연 5% 지체책임\n\n— [判例2022] 상행위로 인한 원본채권 및 그 지연손해금 지급 명하는 이행판결 확정된\n\n경우, 채권자가 그 ‘지연손해금’을 이행청구 하면 채무자는 상법 54조 상사법정이율\n연 6%의 지연손해금 O ••• 원본채권이 상행위로 인한 채권이면 지연손해도 상행위\n\n로 인한 채권 O, 판결로 그러한 실체적 내용 바뀌지는 않음, 채권자의 확정된 지연\n\n손해금 이행청구로 지체책임 발생 [2022다258248]", ["제387조"], 0, "채무불이행", 10],
  ["채권총론_C008", "— [大判全合] 채권 가압류가 있어도 이행기 도래하면 제3채무자 지체책임 O", "— [大判全合] 채권 가압류가 있어도 이행기 도래하면 제3채무자 지체책임 O\n\nV 가압류는 제3채무자에 대해 지급금지할 뿐 채무 그 자체 면하게 하는 것 X 제3채무자는 487조 공탁으로 지체책임 면 O\n\nV 이중변제 위험, 채권 가압류되면\n\n‘채권자가 변제를 받을 수 없는 때’ O - 공탁금출급청구권에 가압류 존재 [93다\n\n9 51] — EM 다만 2002. 7. 1. 시행 민집법 248조 1항에 의하여 현재는 압류의 경합\n없어도 ‘집행공탁’으로 가능", [], 0, "채무불이행", 11],
  ["채권총론_C009", "［判例2022］ 판결 확정된 채권자가 시효중단 위한 신소 제기하며 확정판결에 따른", "［判例2022］ 판결 확정된 채권자가 시효중단 위한 신소 제기하며 확정판결에 따른\n원금과 원금에 대한 확정 지연손해금 및 이에 대한 지연손해금을 청구 一 채무자\n는 확정 지연손해금에 대하여도 청구받은 다음날부터 지연손해금을 별도로 지급\n해야 하고, 그 이율은 신소에 적용되는 법정이율을 적용해야 ••• 확정 지연손해금\n에 대한 지연손해금채권은 채권자가 신소로써 확정 지연손해금을 청구함에 따라\n\n비로소 발생하는 채권으로서 전소 소송물인 원금채권이나 확정 지연손해금채권과\n는 별개 소송물이므로 ［2020다26876이\n\n正辯 : 시효중단 위한 신소 제기에서 기존 확정된 판결금 중 지연손해금채권（당시 소촉법상 이율\n인 연 20%가 적용되어서 계산한 금액）에 대해서는 신소의 소장 부본 송달일（혹은 판결 선고일） 다\n\n음날부터 연 12%의 현행 소촉법이 적용된다는 핀t례. 그러나 확정된 판결금 중 원금 부분은 여전히\n\n과거 당시의 소촉법 연 20%가 적용됨.\n\n가령 소장 부본 송달일까지의 지연손해금에 대하여 이행청구를 하는 경우, （d 원금 및 소장 부본\n송달일 다음날부터 연 20% 지연손해, ② 원금에 대한 소장 부본 송달일까지의 지연손해금 합계액\n\n및 소장 부본 송달일 다음날부터 연 12% 지연손해를 승소할 수 있음.\n- ［判例］ 기한 정함 없는 채권 양도되고 양수인이 양수금청구하여 소송계속 중에 양도\n\n통지가 채무자에 도달하면 통지 도달 다음 날부터 지체책임 ［2012다29557］\n\n- 기한의 이익 상실 0 법정 상실사유（388조） : 담보 손상• 감소 • 멸실 • 제공불이행\n© 특약 : ［判例］ 기한이익 상실 특약이 ‘정지조건부’인지 ‘형성권적’인지 불분명한 경\n\n우 채권자에게 유리한 형성권적 기한이익 상실특약으로 추정 ［97다1299이\n나. 효과\n\n① 강제이행\n② 손해배상 : 지연배상. 단, 예외적 전보배상（제395조） — ® 지체 후 상당기간 최고해\n\n도 기간 내 이행 않는 경우,\n\n® 지체 후의 이행이 채권자에게 이익 없는 때\n\n［判例］ 매도 위해 출고한 자동차의 수치인이 차량 분실하여 임치인이 매수인에게 이\n미 새 차 출고 • 인도하였는데 수치인이 차량 되찾은 경우, 임치 인은 차량을 반환받고\n지연배상을 구할 것이 아니라 차량 시가인 전보배상 구할 수 있음 ［90다카27129］\n\n③ 해제（제544조） 요건 : 지 ■ 최 • 아 （후술）\n④ 책임가중（제392조） : 채무자는 이행지체 중에 생긴 손해는 과실이 없어도 배상책임\n（본문） = 이행불능책임 ［통］ — 그러나 이행기에 이행했어도 손해 면할 수 없는\n\n경우는 배상책임 X （단서）\n\n正辯 : 이것은 물건의 채무자가 ‘이행지체’하다가 멸실된 경우의 문제인 것에 대비하여, 물건의 채\n권자가 ‘수령지체’하다가 멸실된 경우는 538조 1 항의 문제임", ["제395조", "제544조", "제392조"], 0, "채무불이행", 12],
  ["채권총론_C010", "4. 이행불능", "4. 이행불능\n가. 개념\n\n- 이행불능 : 채권성립 후에 채무자 귀책사유로 불능하게 된 경우\n\n- 후발적 불능, 사회통념상 불능 [判例] “채무의 이행불능이라는 것은 단순히 절대\n적 •물리적 불능 아니라 사회생활 경험법칙이나 거래상 관념에 비추어 채권자가 채무\n\n자의 이행의 실현을 기대할 수 없는 경우” [96다 14616]\n正辯 : 원시적 불능과 후발적 불능을 구별하고, 원시적 불능에서는 객관적/주관적 불능에 따라, 그\n리고 후발적 불능에서는 각 귀책사유에 따라 각 어떤 법리가 전개되는지 개관할 수 있어야", [], 0, "채무불이행", 13],
  ["채권총론_C011", "나. 효과", "나. 효과\n① 전보배상: 본래 급부청구권 소멸하고 그에 갈음한 손해배상청구권 - 원채권의 변\n\n경으로서 동일성, 해제 않는 한 동시이행 항변권이나 담보도 존속 O\n일부 이행불능 : 잔존급부 청구, 불능 부분 일부 전보배상 O\n\n그러나 ［判例］ “쌍무계약에서 일부 이행불능 있는 때 불능 부분 제외한 나머지 부분\n만의 이행으로는 계약 목적 달성할 수 없다면 전부 이행불능으로 보아야 一 채권자\n는 전부 해제 혹은 전부 전보배상 O, 이행 가능 부분만의 급부청구 X”\n\n— 신축 예정 상가건물 중 특정점포 분양계약 체결 후 착공 않은 채 부도 및 해외 도\n피로 분양점포 소유권이전등기 이행불능이면 대지지분권 이전도 이행불능 ••• “일반\n\n적으로 토지와 지상건물 매매한 경우 토지와 지상건물은 특별한 사정이 없는 한 법\n\n률적 운명 같이하는 것이 거래 관행, 당사자 의사, 경제관념 합치, 특히 집합건물에\n서 대지지분권은 불가분 관계” ［95다5929］ — 지분권 소이등만 이행 구할 수는 X\n\n② 해제（제546조） ： 최고 • 이행제공 없이 곧바로 해제 O\n③ 대상청구권\n\n다. 대상청구권\n— 인정 여부 : 명문 규정이 없어 논의（일반적 인정설 ［통판］ r. 제한적 인정설） 있으나\n\n일반적 법원칙, 계약의 구속력 등을 근거로 인정함이 타당\n\n［判例］ “우리 민법에 대상청구권 규정 없으나, 해석상 부정할 이유가 없다.” ［92다4581］\n- 대상 : 손해배상금, 수용보상금, 보험금청구권, 매매대금채권 포함 O\n- 요건 : ① 급부의무가, ② 후발적 불능 되고, ③ 채무자가 대상 취득했는데, ④ 불능 • 대\n상취득 사이 상당인과관계 있을 것, （⑤ 반대급부 이행 가능할 것 : 교환계약）\n\n［判例］ 원인무효 등기 마친 자가 제3자에 매도하고 제3자가 등기부 취득시효 완성\n한 사건에서 진정한 소유자는 원인무효 등기 마친 매도인에 대하여 매수인으로부터\n받은 매매대금을 대상청구권 행사 X V 불능과 대상취득 사이에 상당인과관계 X\n\n［2003435482］\n正辯 : 후술하는 부당이득•불법행위 단원에서 2019다272275 판결이 부당이득의 ‘인과관계’ 부정\n한 것. 2007다36445 판결이 불법행위의 ‘인과관계’ 긍정한 것과 비교할 것\n\n한편 위 판결은 2010다28604 판결의 취지로 보면 인과관계라는 요건이 문제가 아니라 이때는 대\n상청구권 개념 자체가 성립할 수 없다는 비판도 유력함\n\n— 성질 : 대상청구권 행사는 계약 ‘유지’ 의사 一 계약 해제되거나 무효라면 X\n［判例］ 토지거래허가구역 내 유동적 무효 토지 매매에서 토지 수용되어 확정적 무효\n로 된 경우 대상청구권 X V 대상청구권은 매매계약 유효함을 전제로 이행불능의", ["제546조"], 0, "채무불이행", 14],
  ["채권총론_C012", "효과로서 인정되는 권리 - 원심판단의 정당성 인정 [2008다54877]", "효과로서 인정되는 권리 - 원심판단의 정당성 인정 [2008다54877]\n- 효과•행사방법 : 채권적 청구권. 행사해야 효력 발생\n\n채무자가 취득한 권리의 양도（채권양도）나 얻은 이익의 반환（금전지급） 구하는 것", [], 0, "채무불이행", 15],
  ["채권총론_C013", "5. 이행거절", "5. 이행거절\n- 개념 : 채무자가 채무 이행이 가능함에도 이행할 의사가 없음을 진지하고 종국적으\n로 위법하게 표시하여 채무자의 임의 이행을 더 이상 기대할 수 없는 상태\n\n- 이행기 후의 이행거절（제544조 단서） : 544조는 이행지체를 전제로 하므로 여기서의\n이행거절은 이행기 후의 이행거절이며 명문의 규정상 최고 없이 해제 O\n\n［判例］ 쌍무계약인 부동산 매매계약에서 매수인이 이행기일 도과 후 매도인에 대해\n\n계약상 의무 없는 과다한 채무 이행 요구하는 경우 매도인으로서는 자기 채무 이행\n제공이나 최고 없이도 계약 해제 o ••• 매수인이 이미 자기 채무 이행의사 없음을\n\n표시한 것 ［92다9463］\n正辯 : 이행기 ‘후’ 이행거절이므로 544조 단서를 적용한 판례\n\n- 이행기 전의 이행거절 : 명문의 규정이 없어 독자적 채무불이행 인정 여부 논의\n\n1） 부정설 : 이행지체 하부유형, 544조 단서 유추적용으로\n\n2）긍정설 ［통판］ : 이행 가능하므로 불능과 다르고 이행기 도래 전이므로 이행지체\n와 다름, 390조 일반 • 포괄조항을 근거로 인정\n［判例］ 채무자가 이행하지 않을 의사 명백히 표시한 경우 채권자는 신의칙상 이행기\n\n전에도 최고 없이 해제 •손해배상청구 O 단, “이행거절이라는 채무불이행”이 인정\n되려면 채무자의 이행 거절 표시가 위법해야 ［2014다227225］\n\n［判例2021］ 回S 390조는 채무불이행에 관한 일반조항주의 채택, 544조에 따라\n이행지체 상태에서 이행거절의사 표시하면 최고 없이 해제 O - 이행 않을 의사\n\n명백히 표시하면 채권자는 이행기 ‘전’이라도 최고 없이 이행거절 이유로 해제 O,\n손해배상 O — 이행거절의사는 명백하고 종국적이어야 •/ 최고•이행제공 필요\n없는 등 해제요건 완화 ［2018다21421 이\n\n正辯 : 오피스텔 임대차에서 바닥 난방공사 특약사항 一 임대인이 카펫이나 전기패널 방식 제안 一\n임차인이 ‘최종적으로 카펏। • 전기패널 아니면 공사 안 되는 거죠?’라고 문자 보낸 직후 해제 통보\n\n스 임대인이 즉시 답변하지 않았다는 사실만으로 바닥 난방공사 이행거절 의사 분명한 것은 X\n\n- ‘쌍무계약’에서, 자기 채무 이행기 도래 않은 시점에, @ 근거 없는 계약의 불성립 •\n\n무효 주장, ® 채권자로서의 수령거절 一 모두 자기 채무 이행거절 O\n［判例］ 매도인이 중도금 수령 회피한 후 오히려 중도금 미지급을 들어 ‘해제 통지’한\n경우 ［89다카29］", ["제544조"], 0, "채무불이행", 16],
  ["채권총론_C014", "— 효과: ① 강제이행, ② 전보배상, ③ 해제", "— 효과: ① 강제이행, ② 전보배상, ③ 해제\n［判例］ “부동산 매도인이 중도금 수령 거절하면서 계약 이행하지 않을 의사 명백히\n\n표시한 경우, 매수인이 잔금 지급기일까지 기다려 이행제공 하고 해제하도록 하면\n불필요한 절차•손해 강요하여 신의칙 위배되므로, 매수인은 소유권이전등기의무의\n\n이행기일까지 기다릴 필요 없이 바로 계약 해제 O” ［93다 11821］\n\n正辯 : 중도금 기일에 일어난 일이므로 이행기 ‘전’ 이행거절 사안임을 찾아내어 논의 써야\n— ［判例］ 이행거절이 있었어도 ‘철회’되면 이행거절 종료되어 그 후는 이행지체 법리로\n\n만 해제（544조에 의하여 자기 채무 이행 제공, 최고） ［88다 1516］\n\n6. 불완전이행\n- 개념 : 이행을 했으나 채무 내용 따르지 않아 불완전한 경우（적극적 채권침해）\n\n— 모습 : 이행이 불완전한 경우, 불완전 이행으로 부가적 손해 준 경우（확대손해）\n— 효과 : ① 완전이행청구권（추완청구권）, ② 손해배상청구권, ③ 해제\n- ［判例］ 숙박계약은 일시사용 위한 임대차계약, 통상의 임대차와 같이 단순히 여관의\n객실 • 관련시설 제공하여 사용수익하게 할 의무에 더하여 “신의칙상 부수적 의무로\n서 고객에게 안전 • 편안한 객실 • 관련시설 제공하여 고객의 안전을 배려할 보호의무”를\n\n부담 O （羊통상의 임대차 : 안전배려의무 X）— 숙박업자가 이를 위반하여 고객의\n생명 • 신체 침해하여 손해 입히면 “불완전이행의 채무불이행책임 O” ［93다4359이\n\n正辯 : 성질상 확대손해이며, 여기에 불법행위책임도 경합할 수 있음\n\n- 매도인 • 수급인의 담보책임과 불완전이행의 경합 판례 （후술）\n\nPART 1\n\n채권총론 • 채무불이행 - 17", [], 0, "채무불이행", 17],
  ["채권총론_C015", "제3관 채무불이행에 대한 구제", "제3관 채무불이행에 대한 구제\n\n써 손해배상 竹\n\n1. 채무불이행에 대한 구제\n① 강제이행 :（9 주는 채무는 직접강제,\n공, 운송）는 대체집행,\n\n© 대체적 작위채무（건물철거, 단순노무의 제\n\n© 부대체적 작위채무（증권 서명, 감정, 정정보도문 게재）는\n\n간접강제（단, 자유의사 압박한다면 X）,\n\n@ 의사표시할 의무（채권양도통지）의 집행\n\n은 판결문을 상대방에게 도달하게 함으로써\n② 손해배상\n\n③ 해제 • 해지\n\n2. 손해의 개념 • 분류\n— 개념 : “위법행위 없었다면 존재했을 이익과 위법행위 있은 후 현재 이익의 차이”\n［통판, 차액설］\n\n正辯 : 채무불이행과 불법행위 공히 차액설을 취하지만. 채무불이행은 이행해야 할 채무를 이행하\n지 않았으니 이행되었다면 누릴 이익을 기준으로 ‘이행이익’ 개념이 생겼고, 그에 비해 불법행위는\n\n이행의 문제가 아닌 단순한 위법행위로 발생한 손해이므로 ‘이행이익’ 개념 x\n\n- 손해배상의 발생원인 : 법률행위（계약）, 법률의 규정（채무불이행, 불법행위 등）\n\n— 재산적 손해 中 ① 적극적 손해（=기존재산 멸실 • 감소）, ② 소극적 손해（=장래 얻을 이익\n얻지 못한 것, 일실이 익） / ③ 정신적 손해（=위자료） 一 손해 3분설 ［통판］\n\n［判例］ 채무불이행 •불법행위로 재산적 손해 발생한 경우, 그로 인한 정신적 고통은\n재산적 손해의 배상 이뤄지면 회복 O — 재산적 손해 배상만으로 회복될 수 없는\n\n정신적 고통 입었다는 특별한 사정 있고 상대방이 알았거나 알 수 있었을 경우에 한\n\n하여 위자료 인정 ［2005다213］\n\n— O 이행이익 : 채무가 이행되었으면 있었을 이익 ex. 전매차익\n© 신뢰이익 : 일정한 사태에 대한 신뢰에 기하여 행한 재산적 결정이 그대로 적절\n\n한 것이 되는 이익 一 ® 계약의 ‘유효’를 믿음으로 인한 （계약준비비용）,\n\n® 계약의\n\n‘체결’을 믿음으로 인한 （계약교섭의 부당파기 一 ［判例］는 불법행위로 구성\n\nO）,", [], 0, "손해배상", 18],
  ["채권총론_C016", "© 계약의 ‘이행’을 믿음으로 인한 （채무불이행 이유 해제하며 이행이익에 갈음하여", "© 계약의 ‘이행’을 믿음으로 인한 （채무불이행 이유 해제하며 이행이익에 갈음하여\n\n이행 믿고 지출한 비용청구 O ［통판］）,\n\n@ 목적물의 ‘하자 없음’을 믿음으로 인한\n\n（하자담보책임, ‘매수대금 - 하자 있는 상태의 시가’）\n— 신뢰이익은 이행이익을 한도로 함 ［통판］ ••• 535조 1항 단서가 근거\n- ［判例2023］ 일방 당사자가 상대방 이행을 믿고 지출한 비용도 지출사실을 상대방이\n알았거나 알 수 있었고 통상적 지출비용 범위 내에 속한다면 이행이익 한도 내에서\n배상청구 O — 일실이익 손해와 신뢰이익 배상을 함께 청구할 경우에 일실이익은\n\n제반비용 공제한 순이익에 한정 •■• 중복배상 방지 ［2023다223171, 2023다223188］\n\n- Q 통상손해 : 채무불이행 있으면 일반적으로 발생하는 손해\n\n© 특별손해 : 통상손해가 아닌 특별한 손해\n\nex 전매차익\n\n- 손해배상청구권 : 본래의 채권과 동일성（확장 또는 변경） 있으므로, 본래의 채권과\n소멸시효 기간 동일, 다만 기산점은 채무불이행시부터 진행 ［통판］\n\n- ［判例］ 정신적 손해 정기금배상 규정（751조 2항） 있으나 재산적 손해에도 법원이 재\n\n량으로 정기금배상 명할 수 O ［93다51874］ — 식물인간의 장래 치료비 ■ 개호비\n— ［判例］ 계약 일방이 계약 체결이 관련 법령에 위반되지 않는 점 및 계약 이행을 진\n술 보장했는데도 이행 못하여 상대방에게 손해 입히면 계약상 의무 이행하지 않은\n\n채무불이행책임 O - 그러나 체결된 계약이 강행법규 위반하여 손해배상채무 이행\n\n하는 것이 강행법규가 금지하는 결과 가져온다면 손해배상청구 X ［2016다203551］\n\n3. 손해배상의 범위（제393조）\n- 393조 1항 통상손해 / 2항 특별손해는 채무자 알았거나 알 수 있어야 배상\n- ［判例］ 불법행위로 물건이 훼손되면 통상손해 : @ 수리 가능한 경우는 수리비, ® 수\n리 불가능한 경우는 교환가치 감소액,\n\n© 수리한 후에도 일부 수리 불가능한 부분\n\n남은 경우에는 수리비 + 수리불능 교환가치 감소액 O ［2016다248806］\n［判例］ 불법행위로 건물 훼손되어 사용 수리 불가능한 경우 위 통상손해인 교환가치\n（시가）에는 철거비용 포함 X ［2009다91828］\n\n- 특별손해 채무자 예견가능성 기준시기 : 1） 계약체결시설, 2） 채무불이행시설 ［통판］\n\n［判例］ 393조 2항 특별손해 배상에 있어 채무자가 그 사정을 알았거나 알 수 있었는\n지 여부 기준 시기는 계약체결당시가 아니라 채무 이행기까지를 기준으로 판단해야\n\n［84 三日 H 532］\n\nPART 1\n\n채권총론 • 손해배상 • 19", ["제393조"], 0, "손해배상", 19],
  ["채권총론_C017", "［判例］ 매도인의 소유권이전등기의무 이행불능으로 매수인이 입는 손해액은 원칙적", "［判例］ 매도인의 소유권이전등기의무 이행불능으로 매수인이 입는 손해액은 원칙적\n\n으로 이행불능 당시 시가 상당액 O, 그 이후 목적물 가격 등귀했어도 그로 인한 손\n해는 특별손해이므로 매도인이 ‘이행불능 당시’ 그러한 특수한 사정을 알았거나 알\n\n수 있었을 때에 한하여 손해배상 O ［94다61359］\n— ［判例］ 매수인이 배추장수인 사실, 서울로 실어간다는 사실을 알던 매도인은 매수인의\n\n전매차익 발생을 알 수 있었으므로 특별손해인 전매차익 배상해야 ［67다466］\n— 판례는 상대방이 제3자와 별도의 계약을 체결하였거나 그 특약 등에 의해 배상하는\n\n손해는 대부분 특별손해로 보고 있음\n- ［判例］ 토지매도인이 매수인의 건물신축 사실 알았다면 그 후 토지 소유권이전의무\n\n가 이행불능으로 된 경우에 매도인은 토지 人］가（통상손해） 외에 건물철거로 인한 손\n해（특별손해）도 배상할 의무 O ［92Q2028］\n\n- ［大判全合］ 휴업손해는 통상손해 O, “영업용 물건이 멸실되면 ‘대체 물건 마련’에,\n\n일부 손괴되면 ‘수리’에 각 합리적으로 필요한 기간 동안 영업을 계속했다면 얻을 수\n있었던 이익” ［2001 다82507］\n- ［判例］ 수리 가능한 경우 수리비가 통상 손해이나, 수리비가 건물 교환가치를 넘는\n\n경우（=경제적 수리불능）에는 건물 교환가치 범위 내로 제한되어야 ［90다카7569］\n\n［判例］ 그러나 높은 수리비로 수리함이 시인될 특별한 사정 있다면 예외적으로 수리\n비 전액 배상 ［98다7735］\n\n4. 손해배상액의 산정\n가. 이행지체, 이행불능, 이행거절의 각 손해\n\n— 이행지체 一 지연배상\n\n이행불능, 이행거절 -* 전보배상\n\n［判例］ 물건 인도의무의 이행지체로 인한 손해배상은 그 물건을 사용•수익함으로써\n얻는 이익, 차임 상당액이 통상손해 一 건물건축공사 도급계약에서 공사 지체로 인\n\n한 완성 - 인도의무 지체 손해배상도 차임 상당액 배상 ［94다44774］\n\n- ［判例］ 손해액 산정 시기는 ① 이행지체로 인한 전보배상（395조）은 본래 의무이행\n\n최고했던 상당 기간 경과한 당시의 시가, ② 이행불능으로 인한 전보배상액은 이행\n불능 당시의 시가, ③ 이행거절로 인한 전보배상액은 이행거절 당시의 시가를 각 표\n준으로 산정함 ［2005다63337］\n\n［判例］ “매도인 및 매수인의 소유권이전등기 말소의무가 원소유자의 말소등기절차", [], 0, "손해배상", 20],
  ["채권총론_C018", "이행 청구소송에서 확정되었다면, 매도인의 이행불능으로 인한 손해배상액의 산정", "이행 청구소송에서 확정되었다면, 매도인의 이행불능으로 인한 손해배상액의 산정\n은 그 패소확정시 기준 O, 등기말소시 X” [80다417]\n\n나. 과실상계（제396조, 제763조）\n- 요건 : ① 채권자（피해자）의 과실 존재, ② 과실능력 있을 것（통상 7~8세 정도）\n\n③ 그 과실이 손해 발생 • 확대에 인과관계 있을 것\n\n- 효과 :【判例] 법원은 직권으로 판단하여 반드시 참작하여야 [96다30113]\n\n- 일부청구와 과실상계 : [判例] “손해 전액에서 과실비율 감액하고 그 잔액이 청구액\n을 초과할 경우는 청구 전액을 / 잔액이 청구액을 초과 않을 경우는 잔액을” 각 인용\n\n하는 것이 일부청구 당사자의 의사 [75다819] — 외측설 [통판] v. 안분설\n\n= 일부청구와 상계 : [判例] 소구채권 전액에서 인정되는 반대채권액으로 상계를 하\n고 —잔. 청. 초. 청 / 잔. 청. 않. 잔 [83 다323]\n— [判例] 과실상계 먼저 하고 손익상계 I 一 人 [80다3277]\n\n손익상계 : 위법행위 없었다면 채권자가 지출했을 비용을 손해배상액에서 공제하는\n것（인과관계 필요）\nex. 의료과오로 사망한 환자의 생활비 공제 O, 사망자의 유족이 받은 부의금 X", ["제396조", "제763조"], 0, "손해배상", 21],
  ["채권총론_C019", "라도, 담보책임 입각한 공평의 원칙상 하자 발생 •확대에 가공한 매수인（도급인）의", "라도, 담보책임 입각한 공평의 원칙상 하자 발생 •확대에 가공한 매수인（도급인）의\n\n잘못을 참작하여 손해배상 범위 정함이 상당” [94다23920, 80다923]\n正辯 :대체로 유추적용 인정한 것으로 해석하나, 판례 표현이 다소 불명확하고 ‘준용’과 ‘유추적용’\n의 용어들은 구별실익 적으므로. ‘사례형’에서는 두 표현 다 자제하고 ‘잘못을 참작한다’는 표현을\n사용할것", [], 0, "손해배상", 22],
  ["채권총론_C020", "다. 금전채무불이행 특칙（제397조）", "다. 금전채무불이행 특칙（제397조）\n— 제1항 법정이율, 그러나 법령 제한 내 약정이율 먼저", ["제397조"], 0, "손해배상", 23],
  ["채권총론_C021", "- 제3항 : 손해배상액 예정은 이행청구 • 해제에 영향 없다.", "- 제3항 : 손해배상액 예정은 이행청구 • 해제에 영향 없다.\n\n— 제4항 : 위약금 약정은 손해배상액 예정으로 추정한다.", [], 0, "손해배상", 24],
  ["채권총론_C022", "正辯: 손해배상액 예정 적용하려면 모든 ‘손해배상’이 원칙적으로 과실책임인 점에 비추어 귀책", "正辯: 손해배상액 예정 적용하려면 모든 ‘손해배상’이 원칙적으로 과실책임인 점에 비추어 귀책\n사유 필요 一 단, 금전채무 불이행에 대한 손해배상액 예정이라면 금전은 원래 예외적 무과실책\n\n임이므로（397조 2항） 그 손배 예정도 귀책사유 불요라고 보아야\n\n③ 특별손해 포함설 [86다카2375]\n④ 과실상계 적용 부정설 [72다 108]", [], 0, "손해배상", 25],
  ["채권총론_C023", "제4절 채권자지체", "제4절 채권자지체\n\n씬 채권자지체 슈\n\n- 채권자지체（제400조） : 채권자가 이행 받을 수 없거나 받지 아니한 때는 이행 제공\n있는 때로부터 지체책임\n\n- 법적 성질\n\n1） 채무불이행설 ［소］ : 채권자 귀책사유를 요함, 효과는 손해배상• 해제 O\n\n2）법정책임설 ［통판］ : 채권자 귀책사유는 불요, 효과는 401~403조, 538조 1항 2문\n만 적용되고 손해배상• 해제 X V 채권자 개념상 권리자\n\n— 쌍무계약이면 채권자지체는 동시에 채무불이행일 수 있어 법정책임설 타당\n- 법정책임설 따르면 ‘변제제공’ = ‘채권자지체’ 효과 동일하게\n\n［判例2021］ 400조 채권자지체 성립에 채권자 귀책사유 필요 X — 채권자지체 효과\n는 원칙적으로 민법 규정 따른 401조, 402조, 403조, 538조 1항만 인정, 채무불이\n행 같은 손해배상 X, 해제 X — 그러나 계약 당사자가 채권자의 급부수령의무나\n\n이행협력의무 명시적 •묵시적 약정했거나 구체적 사안에서 신의칙상 그러한 채권자\n\n의무 인정될 특별한 사정 있다면, 의무위반에 따른 채권자 책임 O — 채권자의\n수령의무•협력의무 불이행으로 계약 목적 달성 불능하면 채무자는 해제 O ［2019다\n\n293036］\n正辯 : 이러한 최근의 판결은 채권자지체에 관하여 원칙적으로 통설인 법정책임설을 취한 것으로\n\n해석됨 （私見）\n- 요건 : ① 채권자 협력 있어야 변제결과 나오는 채무일 것,\n\n행제공 있을 것,\n\n② 채무 내용에 좇은 이\n\n③ 채권자 수령불능 • 수령 거 절\n\n- 효과 : @ ‘변제제공’의 효과 : @ 채무불이행 책임 면하고（제461조. ‘영구적 불수령’\n의 경우 구두제공조차 불필요）, ® 공탁 가능（제487조）\n\n© ‘채권자지체’ 자체의 효과 : © 주의의무 경감（제4이조, 경과실 불능책임 면책）,\n\n@ 이자 지급의무 면제（제402조）, © 증가비용 부담（제403조）, © 대가 위험 이전\n（제538조 제1 항 2문, 수령지체 中 쌍방 귀책없는 불능시 반대급부 청구 O）\n\n- ［判例］ 채권자지체 위한 변제제공 관련, 채권자 ‘영구적 불수령’의 경우는 구두제공조\n차 필요 없으나 이는 채무불이행 면하기 위한 측면（461조）, 수령지체 중 쌍방 책임 없\n는 불능 이유로 반대급부 청구하는 측면（538조 1항 2문）에서는 이러한 영구적 불수령\n의 경우에도 현실제공이나 구두제공 있었어야 ［2001 다79013］ （후술）", ["제400조", "제461조", "제487조", "제402조", "제403조", "제538조"], 0, "채권자지체", 26],
  ["채권총론_C024", "제5절 책임재산의 보전", "제5절 책임재산의 보전\n- 책임재산 = 일반재산 = 채권자들의 공동담보 = 모든 채권의 만족을 담보하는\n\n수단 = 자력 = 잠재적 집행의 대상 재산\n\n제2관 채권자대위권\n\n씨 채권자대위권 슈\n\n1. 요건（제404조）\n\n- ① 피보전채권（이행기） 존재, ② 보전의 필요성, ③ 채무자 권리 불행사 一 각하사유\n④ 피대위권리（비일신전속성） 존재 一 기각사유\n\n正辯: 피대위권리의 문제라 하더라도 가령 등기말소청구를 등기명의자 아닌 자에게 청구하는 대위\n소송이 라면 대위소송 각하가 결론임을 주의\n\n가. 피보전채권\n\n- 이행기 도래할 것 （미도래 예외적 허용 :（9 법원 허가, © 피대위권리가 보존행위）\n- 원칙적으로 채권일 것 一 그러나 [判例] “물권적 청구권 보전을 위한 채권자대위\n\n권 행사 o” — 토지 소유권에 근거하여 지상 건물의 임차인 상대로 ‘건물퇴거’ 청구\n할수 있더라도, 건물 임대인을 대위하여 임차인에게 임대차 ‘해지통고’ 및 ‘건물인도’\n청구 O v 퇴거청구와 해지통고 • 건물인도 대위청구는 요건 • 효과 달라 퇴거청구 가\n\n능성이 보전 필요성 부정되지 않음, 임대차계약 해지권은 행사상 일신전속권 X\n\n[2006482700]\n正辯 : 피보전권리가 물권적 청구권인 건물철거청구권이었음", ["제404조"], 0, "채권자대위", 27],
  ["채권총론_C025", "— 【判例］ 협의 • 심판으로 구체화되기 전의 이혼 재산분할청구권 X ［98다58016］", "— 【判例］ 협의 • 심판으로 구체화되기 전의 이혼 재산분할청구권 X ［98다58016］\n\n正辯 : ‘이혼 재산분할청구권’은 채권자대위권 행사의 ① 피보전권리로, ② 피대위권리로 각 가능한\n지, 또한 사해행위취소의 ① 피보전권리로, ② 취소 대상으로 각 가능한지 모두 정리해야 함\n— ［判例］ 임대인 동의 없는 임차권 양도 一 임차권 양수인은 임대인을 대위할 수 X,\n\n（인도청구 X）••• 양수인은 임대인에게 임차권 양도로 대항 X ［84다카 188］\n正辯 : 대위소송은 피보전채권 부존재로 각하될 것으로 생각됨\n\n나. 보전의 필요성\n— ［判例］ “피보전채권과 피대위권리가 밀접한 관련 있고, 피보전채권의 현실적 이행의\n유효 • 적절한 확보 위해 대위행사가 필요하면（적극적 요건）, 채무자 재산관리 자유에\n부당한 간섭되는 등 특별한 사정 없는 한（소극적 요건）” ［2013다71784］\n\n① 비금전채권 : 비금전채권은 통상 보전의 필요성 인정되고 무자력은 문제되지 않음\n\n- ［判例］ 여관 • 상가 교환계약 해제 사건은 밀접한 관련 없음이 명백하여 각하 ［93다289］\n\n- ‘피보전채권一피대위권리’ 구조 ［判例］\n\n@ 소이—소이등 ex. 순차매도, 시효완성자로부터의 매수인\n© 소이—말소\n\nex. 반사회적 이중매매, 중간생략등기형 명의신탁의 명의신탁자,\n\n매매 • 취시완성 목적물에 불법등기\n© 인도一인도 ex 임차인 • 미등기매수인 • 취시완성자가 불법점유자 상대로\n\n철거一인도,\n\n인도一철거\n\n- ［判例］ 공동매수인 1인이 매도인에 대한 소유권이전등기청구권을 피보전채권으로 원매\n도인 상대로 소유권이전등기청구권을 대위행사할 경우, 자기 매수지분 범위 내에서만\n\n대위 O, 자기 지분 초과 부분은 보전의 필요성 X （일부각하） ［2010다4359刀\n［判例］ 부동산 취득시효 완성자의 공동상속인 1인이 소유자에 대한 소유권이전등기\n청구권을 피보전채권으로 무효등기 명 의자를 상대로 소유자의 말소등기 청구권을\n\n대위행사할 경우, “자신의 지분 범위 내에서만 대위 O, 자기 지분 초과 부분은 보전\n의 필요성 X （일부각하）” ［2013다25217］ 단, 법원 석명의무는 있음\n\n② 금전채권 : 채무자 무자력 요건［통판］\n\n— ［判例］ 피보전채권이 금전채권이라면 변론종결 당시 채무자 무자력 사실을 채권자가\n주장 • 입증해야 ［75다1086］\n\n正辯 : 금전채권자는 채무자의 일반재산으로 만족을 받을 것인데 채무자의 특정한 권리 행사에 간\n섭하는 것은 원칙적으로 보전의 필요성이 없으므로, 채무자가 무자력인 경우만 허용한 것", [], 0, "채권자대위", 28],
  ["채권총론_C026", "이행하면 채무자에게 채권이 귀속되어 별도 급부수령 불필요, 채권자에게 양도하면", "이행하면 채무자에게 채권이 귀속되어 별도 급부수령 불필요, 채권자에게 양도하면\n채권이 이전되어 대위행사 효과가 채무자 아닌 채권자에게 귀속 ［2023다301682］\n\n- ［통판］ 반사회적 이중매매계약은 절대적 무효이므로, 그 부동산을 제2매수인으로부\n터 다시 취득한 제3자는 설사 제2매수인의 유효한 소유권 취득으로 믿었더라도 이중\n\n매매 유효를 주장할 수 X\n— ［判例］ 금전채권 보전하기 위해 채무자의 금전채권을 대위행사하는 채권자는 제3채\n무자로 하여금 직접 대위채권자 자신에게 지급의무 이행하도록 청구할 수 있고\n제3채무자로부터 변제 수령할 수 O ■— 대위소송에서 제3채무자로부터 직접 금전\n\n지급받는 판결 확정되어도 （대위채권자의 채권자가） 이러한 채권에 대하여 받은\n압류명령은 무효 ••• 피대위채권이 대위채권자에게 이전•귀속 X, 추심권능 내지\n변제수령권능은 자체로서 독립적 처분•환가 X, 압류 X ［2015다236547］\n\n나. 대위권행사의 통지（제405조 제2항）\n\n- 채무자가 대위권 행사 통지 받거나 ‘알았다면’ ［통판］ 그 후 피대위권리를 ‘처분’해도\n채권자에게 대항 X — 대위소송에서는 실질적으로 ‘제3채무자’의 대항 문제\n\n- O 채권포기, 합의해제, 채권양도, 추인 一 처분이므로 대항 X — 대위소송 인용\n© 변제수령, 법정해제 一 처분이 아니므로 대항 O —‘ 대위소송 기각\n\n- ［判例］ W 채무자가 채권자의 소유권이전등기말소청구권 대위행사 사실을 안 때에\n\n는 그 소유권이전등기의 원인된 매매계약을 추인하더라도 405조 2항에 의하여 그\n추인의 유효 주장 X ［73다1086］\n\n正辯 ： 무권리자의 처분행위 혹은 무권대리에 대하여 추인하는 것도 405조 2항의 ‘처분’ O\n［大判全合］ 채무불이행으로 법정해제 되게 한 것은 405조 2항의 ‘처분’ 아니므로 통\n지받은 후 채무 불이행함으로써 약정 자동해제되거나 제3채무자가 법정해제한 경우\n제3채무자는 해제로써 채권자에게 대항 O V ® 채무불이행 사실 자체가 채권 소멸\n\n시키는 적극적 행위 X, ® 법정해제는 채무불이행에 대한 정당한 법적 대응, © 채\n권 압류 • 가압류된 경우도 채권 발생원인인 기본계약 해제 인정한 판례\n\n그러나 실질적으로 합의해제이면서 형식적으로만 법정해제처럼 보이거나 외관을 만\n든 특별한 사정 있다면 처분이므로 대항 X ［2011 다87235］\n\n- ［判例］ 대위소송에서 제3채무자로부터 직접 대위채권자에게 금전지급 판결 확정되\n더라도 변제 등으로 소멸되기 전에는 채무자의 다른 채권자가 （가）압류 O\n\nV 채권자는 채무자를 대위하여 피대위채권（집행채권）에 대한 변제를 수령할 뿐이며", ["제405조 제2항"], 0, "채권자대위", 32],
  ["채권총론_C027", "자신의 채권에 대한 변제로서 수령하는 것 X", "자신의 채권에 대한 변제로서 수령하는 것 X\n\nBut 채무자가 대위소송 사실 통지 받거나 알게 된 후 피대위채권에 대한 전부명령\n은, 우선권 있는 채권에 기한 것이라는 특별한 사정이 없는 한, 무효 V 민집법 229조\n\n5항 유추적용（전부명 령 송달 전에 다른 채권자가 압류 • 가압류 • 배당요구한 경우 전부\n명령은 무효）, 추심소송과 공통점 있는 대위소송의 무익화, 대위채권자의 압류 • 가압\n류 • 배당요구 등 채권배당절차 참여할 기회 박탈, 405조 2항 채권자대위권 실질 효\n과 확보 취지 ［2015다236547］\n\n正辯 : 실제로 압류가 경합되지 않았음에도 ‘대위소송 제기 사실을 채무자가 아는 상황’을 그에 준\n하는 것으로 보아 민집법 229조 5항을 유추적용한 판결 — 이 경우에도 전부명령만 무효가 되고\n\n압류명령은 유효 - 압류채권자의 집행채권에 대한 시효중단효는 O\n\n- ［判例］ 매수인의 소이등청구권 보전 처분금지가처분신청을 매수인의 채권자가 대위행\n\n사해도 처분금지가처분의 피보전권리인 소이등청구권 행사한 것이므로 매수인이 이\n러한 대위행사 알고 매매 합의해제한 후 해제로 대항 X ［2006다85921］\n\n다. 행사의 효과\n- 채무자에게 귀속 一 소멸시효도 피대위권리가 중단됨\n- 채권자와 채무자 법정위임 : 선관의무 ［判例］ 688조 준용으로 비용상환청구 O ［96그8］\n- 대위소송의 기판력은 채무자가 안 경우에만 미침. 중복소송 금지는 알았는지 불문.\n\n라. 제3채무자의 지위\n- 제3채무자는 ‘자신의 채무자에 대한 항변사유’로 채권자에 대항 O ［통판］\n제3채무자도 405조 2항의 적용받음 O ［통판］\n\n- 제3채무자는 ‘채무자의 채권자에 대한 항변사유’로 대항 X\n\n［判例］ 대위소송에서 제3채무자는 피보전채권의 소멸시효 주장 X ••• 소멸시효 원용\n은 직접수익자만 가능하기 때문이기도 ［92다35899］\n\n［判例］ 그러나 채권자가 채무자 상대로도 피보전채권의 이행청구소송 제기했고 그\n절차에서 채무자가 소멸시효 항변한 것이 대위소송에 현출되어 법원이 심리한 결과\n\n소멸시효 완성으로 판단되면 채권자는 대위할 권한 X — 각하 ［2007다64471］\n- ［判例］ “대위소송에서 제3채무자는 채무자의 채권자에 대한 항변권 • 형성권 등과 같이\n권리자에 의한 행사를 필요로 하는 사유로 다툴 수 X, 그러나 피보전채권의 발생\n\n원인인 법률행위가 무효라거나 피보전채권이 변제 등으로 소멸했다는 사실로 다툴\n\nPART 1\n\n채권총론 • 채권자대위권 • 33", [], 0, "채권자대위", 33],
  ["채권총론_C028", "수 O, 이 경우 법원은 제3채무자의 주장 고려하여 피보전채권 인정 여부를 직권 심", "수 O, 이 경우 법원은 제3채무자의 주장 고려하여 피보전채권 인정 여부를 직권 심\n\n리 • 판단하여야” — 각하 [2013다5530이", [], 0, "채권자대위", 34],
  ["채권총론_C029", "자•양수인의 직접청구권 •양수금채권 보전을 위한 인도청구 대위행사는 채무자인 임대인의 무자력", "자•양수인의 직접청구권 •양수금채권 보전을 위한 인도청구 대위행사는 채무자인 임대인의 무자력\n\n불요 一 그런데 양수금청구 사안（88다카4253）에서는 묵시갱신이 양도통지보다 늦었다면 ‘임대인’\n\n이 갱신으로 대항할 수 없다고 판시 - 위 2020다223781 판결 역시 묵시갱신이 질권설정통지보\n다 늦은 사안이어서 ‘임차인’이 갱신으로 대항할 수 있는 점에 의문 생길 수 있음 一‘ 그러나 전자는\n\n양수금청구, 후자는 대위소송에 의한 인도청구로서, 후자의 판결이 설시한 것처럼 ‘대위소송’은 ‘채\n무자（임대인）’의 권리를 대위행사하는 것이기 때문에 차이 생긴 것으로 이해해야（私見, 다만 평석\n\n중에는 채권양도와 채권질권설정의 차이로 해석하는 견해 있음） 一 이러한 私見의 논리에 따르면,\n\n채권질권 사안에서도 대위소송이 아닌 임대인에 대한 직접청구권을 행사할 경우에는 집행은 별론\n으로 하고 인용판결（혹은 상환이행판결）이 선고될 것임（私見, 채권양도와 동일 논리 적용）\n\nPART 1\n\n채권총론 • 채권자대위권 • 35", [], 0, "채권자대위", 35],
  ["채권총론_C030", "제3관 채권자취소권", "제3관 채권자취소권\n\n씨 채권자취소권 슈\n\n1. 요건（제406조）\n- ① 피보전채권（사해행위 이전, 금전채권）, ② 사해행위, ③ 악의 一 기각사유\n\n正辯: 사해행위취소소송에서는 피보전채권의 부존재도 기각 o, 각하 x （十 채권자대위소송）\n\n가. 피보전채권\n@ 사해행위 이전에 성립 •존재할 것\n— 사해행위는 매매계약 체결 시점 O, 그로 인한등기 시점 X", ["제406조"], 0, "사해행위취소", 36],
  ["채권총론_C031", "- ［判例］ 사해행위 이전에 성립된 채권이 사해행위 이후에 채권양도 있거나 대항요건", "- ［判例］ 사해행위 이전에 성립된 채권이 사해행위 이후에 채권양도 있거나 대항요건\n\n을 갖추더라도 양수인의 채권자취소권의 피보전채권 O ［2004다5822］\n［判例］ 사해행위 후 채권자가 취소원인 알면서 피보전채권 양도하고 양수인이 채권\n\n자취소권을 행사할 경우 제척기간은 ‘양도인’이 안 날 기준 ［2016다272311］\n\n正辯 : 양도인이 ‘알면서’ 양도한 경우에 양도를 계기로 제척기간이 새로 진행하는 것은 아니라는\n취지로서 이는 채권양도의 동일성 때문으로 보이며（私見）, 해당 판결을 가지고 항상 ‘양도인’의 인\n\n식을 기준으로 한다고 단정할 수 없음. 가령 양도인이 ‘모르는’ 상태에서 채권양도 및 통지가 이뤄\n\n졌다면, 그 후에는 당연히 양도인이 아니라 현재 채권의 귀속주체인 ‘양수인’이 안 날을 기준으로\n할 것으로 생각됨（私見）\n\n［判例2025］ 채무자 사해행위 이후에 보증인이 보증책임 이행하여 변제자대위 법리로\n\n보증인에게 피보전채권 이전되었어도 보증인은 종래 채권자의 채권자취소권 행사 O,\n채권 이전 시점에 피보전채권 새로 발생한 것 아님 ［2025다211379］ = 채권양도\n\n- ［判例］ @31 피보전채권 추가 • 변경은 공방 변경 一 제척기간 무관 ［2001 다13532］\n- ［判例］ 旦31 사해취소 • 원상회복 확정되어도 피보전채권 소멸하면 청구이의 O ［2015\n\n다224469］\n© 금전채권일 것\n\n- 비금전채권（특정물채권）의 보전 위해 사해행위취소 X\n- ［判例］ 이중매매 : 제1매수인은 제2매수인을 상대로 채권자취소권 X ［98다5669이\n@ 매매 소유권이전등기청구권을 피보전채권으로 x ••• 금전채권 아니므로 “채권자취\n\n소권을 특정물에 대한 소유권이전등기 청구권을 보전하기 위해 행사 X”\n® 이행불능으로 인한 손해배상채권을 피보전채권으로 X ••• 사해행위 이후에 발생,\n“기 • 개 • 실 예외에 해당하지 X\n\n- 이혼 재산분할청구권 O （제839조의3） : 부부 일방이 다른 일방의 재산분할청구권\n행사를 해함을 알면서 재산권 목적 법률행위 한 경우 다른 일방은 406조 준용으로\n\n취소 및 원상회복을 가정법원에 청구 O\n\n나. 사해행위\n- 사해행위 : 채무자가 채권자를 해함을 알고 재산권 목적으로 한 법률행위\n- ［判例］ 통정허위표시로서 무효인 법률행위도 채권자취소 O ［97다50985］\n正辯 : 허위표시 제3자가 선의여도（108조 2항） 전득자로서 사해행위에 악의인 것은 별개\n— 채무자 : 보증인 • 연대보증인의 행위 O, 물상보증인 X\n\n［判例］ 연대보증인의 법률행위 사해성 판단에는 주채무자의 일반적 자력 고려 X\n\nPART 1\n\n채권총론 • 채권자취소권 • 37", ["제839조의3"], 0, "사해행위취소", 37],
  ["채권총론_C032", "연대보증인의 유일한 재산 처분은 사해행위 X [2000다21017]", "[2003다13246] cf.【判例] 주채무에 관하여 근저당권으로 우선변제권 확보되었다면\n연대보증인의 유일한 재산 처분은 사해행위 X [2000다21017]", [], 0, "사해행위취소", 38],
  ["채권총론_C033", "상회복으로 말소할 수 없고, 따라서 K는 A를 대위하여 양수인 C를 상대로 B 명의의 주등기 말소", "상회복으로 말소할 수 없고, 따라서 K는 A를 대위하여 양수인 C를 상대로 B 명의의 주등기 말소\n청구 O — 이에 C는 무효등기 유용합의 내세웠으나, 사해행위취소로 매매계약이 취소되면서 그\n\n이행방법의 합의에 불과한 무효등기 유용합의도 함께 취소되었으므로 C의 항변 배척됨\n그러나 사해행위취소의 상대적 효력과 K는 ‘A의 으에 대한 권리’를 대위하는 것임을 고려하면, K C\n\n사이에 사해행위가 취소되었어도 A에게 효력이 미치지 않는 이상 A C 사이에 유용합의가 취소되\n었다고 보기는 어려워 위 판결의 대위청구 부분은 법리적으로 동의하기 어렵고（私見）, 다만 우의 최\n종적인 책임재산 보전을 위한 구체적 타당성으로 이해（私見）", [], 0, "사해행위취소", 40],
  ["채권총론_C034", "리로 사해행위취소 X V 변제자대위 가능 [2009다549]", "리로 사해행위취소 X V 변제자대위 가능 [2009다549]", [], 0, "사해행위취소", 41],
  ["채권총론_C035", "처분행위는사해행위 X [2017다287891]", "처분행위는사해행위 X [2017다287891]\n\n正辯 : 채무자가 사해행위인 부동산 매각에 앞서 근저당권을 말소한 재원이 별도 자금인지 그 매각\n대금인지에 따라 결론 달라진 것으로 보임. 사해행위 후 수익자 등이 변제한 사안과 구별", [], 0, "사해행위취소", 42],
  ["채권총론_C036", "사람에게 채권담보로 제공하는 행위는 특별한 사정이 없는 한 다른 채권자들에 대해", "사람에게 채권담보로 제공하는 행위는 특별한 사정이 없는 한 다른 채권자들에 대해\n사해행위 O — 다만 채무자가 자금난으로 사업 계속 어려운 상황에서 자금 융통하\n여 사업 계속 추진하는 것이 채무 변제력 갖는 최선이라 생각하여 부득이 특정 채권\n\n자에게 담보로 제공하고 신규자금 융통받았다면 사해행위 아닐 수 있음 — 전체 책\n\n임재산 중 해당 재산의 비율, 무자력 정도, 불가피 •유효적절 수단인지, 실제 변제나\n\n사업 계속 위해 사용되어 변제자력 생겼는지, 일부 채권자 통모하여 다른 채권자 해\n칠 의사 있었는지 등 종합적 고려해야 [20174264072]", [], 0, "사해행위취소", 43],
  ["채권총론_C037", "구체적 상속분에 상당 정도 미달하는 과소한 것 아닌 한 사해행위 X — 구체적 상", "구체적 상속분에 상당 정도 미달하는 과소한 것 아닌 한 사해행위 X — 구체적 상\n\n속분에 상당 정도 미달부분은 사해행위 O” （이유 中 : 기여분 등 구체적 상속분이\n법정상속분과 다르다는 사정은 ‘채무자’ 입증책임） [2000다51797]", [], 0, "사해행위취소", 44],
  ["채권총론_C038", "됐거나, 사실상 담보가등기였어도 마찬가지 [2003다19435]", "됐거나, 사실상 담보가등기였어도 마찬가지 [2003다19435]\n正辯 : 사해행위 후 기존 저당권이 변제로 말소되었어도 소유권이전등기가 확정적으로 넘어간 경\n우와 달리（후술） 사해행위로 가등기만 된 것이라면 가등기말소라는 원물반환이 적절\n@ [判例] 건물공유자가 공동으로 건물 임대하고 상가건물 임대차보호법상 대항력 및\n우선변제권 갖춘 임차인으로부터 임차보증금 수령한 경우, 건물공유자 중 1인이 처\n분한 지분 중 ‘책임재산’은 우선변제권 있는 임차보증금반환채권 ‘전액’을 공제한 나\n\n머지 부분 -,• 공유자의 임대는 각 지분 임대가 아니라 목적물을 다수 당사자로서 공\n동임대한 것, 임차보증금반환채무는 성질상 불가분채무 O [20174205073]", [], 0, "사해행위취소", 45],
  ["채권총론_C039", "있는 특수한 관계 아닌 점, 수익자•채무자 거래관계가 정상적 범위 내이고 수익자가", "있는 특수한 관계 아닌 점, 수익자•채무자 거래관계가 정상적 범위 내이고 수익자가\n상당한 대가를 실제 지급하는 등 현저히 비합리적 •이례적 사정 없는 점, 물적 담보\n\n제공의 경우 ‘기존’ 채권에 관해 다른 일반채권보다 우선적 만족 얻기 위하여 담보\n\n제공 이뤄졌다고 볼 사정이 없는 점을 수익자가 증명하면, 특별한 사정이 없는 한\n\n수익자 선의 O [2024Q305384]\n正辯 : 위 판결은 해당 거래관계 구체적 경위 •특성 고려 않은 채 일반적 거래관행과 어느 정도\n다르다는 사정만으로 현저히 비합리적 • 이례적 단정할 수 없고, 수익자가 사해행위 당시 채무자\n\n재산 상황 적극 조사하지 않았음을 이유로 수익자 선의 주장 쉽게 배척할 수 없고（수익자 과실은\n문제되지 않음）, 수익자가 담보물 객관적 담보가치 신뢰하여 담보가액 범위 내 금전 제공한 사정\n은 수익자 선의 판단에 유리한 사정이나, 반대로 담보가치가 수익자 채권액에 미달한다는 사정만\n\n으로 수익자 선의 주장 쉽게 배척할 수는 없다고 판시함. 기존 채권이 아닌 ‘신규 자금’ 대출인 사\n정은 물적 담보 제공받은 수익자 선의 판단에 유리한 사정이 됨（私見）.", [], 0, "사해행위취소", 47],
  ["채권총론_C040", "［判例］ 여러 채권자가 동시 • 이시에 사해행위취소 구해도 증복제소 X, 한 채권자가", "［判例］ 여러 채권자가 동시 • 이시에 사해행위취소 구해도 증복제소 X, 한 채권자가\n\n승소판결 확정되었어도 그 후 다른 채권자의 동일한 청구는 권리보호이익 有 （••• 채\n권자취소권 요건 갖춘 각 채권자는 ‘고유의 권리’로서 사해행위취소 • 원상회복 구할\n수 있으므로） / 이미 원상회복까지 마친 경우 비로소 중첩 범위에 권리보호이익 無\n（=채무자.수익자 사이에 사해행위가 ‘해제’되어 원상회복 마친 경우도 마찬가지）\n\n여러 채권자의 사해행위취소 및 원상회복청구 소 제기로 여러 개 소송이 계속 중\n인 경우 각 소송에서 각 채권자 청구에 따라 사해행위의 취소 및 원상회복 선고 O,\n“가액배상인 경우에 가액을 채권액 비례하여 채권자별 안분 반환 X, 반환 가액 범위\n\n에서 각 채권자 피보전채권액 전액 반환 명해야 O” ［2005다5145刀\n正辯 : 이중지급 위험 있지만 수익자는 청구이의로 구제 가능\n\n가. 제척기간\n\n- 취소원인 안 날 1년, 법률행위 5년（제406조 제2항）\n\n— ［判例］ 사해행위 취소만을 먼저 기간 내 제기하였다면 원상회복은 기간 경과하여 제\n\n기해도 적법 O ［20이다 14108］\n［判例］ 수익자를 피고로 사해행위취소 승소 확정되었어도 전득자에 대하여 취소 및\n원상회복 구하려면 제척기간 안에 소 제기해야 V 수익자에 대한 판결의 효력은 소\n\n송의 피고가 아닌 전득자에게 미칠 수 X ［2004Q17535］\n正辯 : 제척기간 도과 후에 권리이전 받은 전득자 등장한 경우에도 마찬가지라는 것이 판례의 태도\n\n- 사해행위취소소송 제기 없이 원상회복만 청구 一 1） 기각설 ［통판］, 2）각하설\n［判例］ 이유 中 : 원상회복의 전제인 사해행위 취소가 없는 이상 원상회복청구권은\n\n인정되지 않으므로 사해행위취소 없이 원상회복만 구할 수는 X ［2007다69162］\n— 다만 원상회복청구가 사해행위취소 제척기간 도과하여 제기되면 각하판결이 실무\n••• 청구권원이 사해행위 취소이므로 사해행위 취소소송, 소송요건 심리의 선순위성\n\n- ［判例2021］ 채권자가 수익자• 전득자 공동피고로 채권자취소의 소 제기하며 청구취\n지로 ‘채무자.수익자 사이 사해행위취소’ 구하는 취지 명시 一 사해행위취소 청구취\n지를 수익자와 전득자로 분리하여 각각 기재하지 않았더라도 전득자에게도 사해행\n\n위취소 행사한 것 O ［2018다271909］\n\n正辯 : 채권자 甲이 채무자 己. 수익자 內, 전득자 T. 전득자 프를 상대로 사해행위취소 소 제기하\n\n며 청구취지로 “Z,•內，內•丁 사이 각 매매계약, 丁•成 사이 신탁계약을 취소하고, 각각 소유권이\n전등기 말소절차 이행하라.” — 內에 대해서는 주소보정명령 불이행으로 소장각하명령 확정, 제1\n\n심은 T. 成에 대한 취소청구 각하 一 甲이 항소한 후 항소심에서 “己 0 사이 매매계약 취소하고,\n丁과 成는 각 소유권이전등기 말소절차 이행하라.”고 항소취지 변경 - 소장 기재에 전득자들 T,", ["제406조 제2항"], 0, "사해행위취소", 48],
  ["채권총론_C041", "프에게 도 己 0 사이 매매계약 취소 구하는 청구 포함 O. 內에 대한 소장 각하되었어도 마찬가", "프에게 도 己 0 사이 매매계약 취소 구하는 청구 포함 O. 內에 대한 소장 각하되었어도 마찬가\n\n지, 항소취지변경은 종전 청구취지 범위에서 己 內 사이 매매계약 취소 부분 유지 및 나머지 계약\n취소 부분 취하한 것 O — 항소심에서 청구취지 변경한 때 비로소 T, 파를 상대로 사해행위취소\n\n소 제기한 것으로 보아 제척기간 경과했다고 할 수는 X — 이로써 기존 기록형 강의에서 이미 설\n명했던 실무의 청구취지 기재례의 타당성이 최근 대법원에 의해 어느 정도 확인된 것임\n\n- 취소원인을 안 날 : [判例2023] “사해의 객관적 사실 안 것만으로는 X （등기를 열람\n\n한 것만으로는 X）, 채무자가 채권자를 해함을 알면서 사해행위 한 사실, 즉 사해의\n사 있는 사실을 안 날 O” 사해행위 객관적 사실 알았다고 취소원인 안 것 추정\n\nX,\n\n제척기간 도과 증명책임은 피고（수익자• 전득자）에게 [2002다23857, 2021 다309231]\n\n그러나 수익자나 전득자의 악의까지 알 필요는 없으며, 이미 채무자 재산상태 파악하\n고 있었다면 가압류하는 과정에서 제3자 명의 근저당권설정등기 마쳐진 사실을 확인\n\n함으로써 안날 O [2011 다82384]", [], 0, "사해행위취소", 49],
  ["채권총론_C042", "다. 취소 범위", "다. 취소 범위\n\n- 취소권 행사하는 채권자의 사해행위 당시 존재하던 채권 기준 （다만, 이자 • 지연손해\n금은 변론종결시까지 포함） 一 채권액 한도 ‘일부’ 취소\n\n- 그러나 [判例] 사해행위 취소 범위는 다른 채권자가 배당요구 할 것이 명백하거나 목\n\n적물이 불가분인 경우처럼 특별한 사정 있다면 취소채권자 채권액 넘어서도 취소 O\n\n[97 다10864]", [], 0, "사해행위취소", 51],
  ["채권총론_C043", "正辯 : 위 판결은 그 논거로. ① 사해행위 원상회복은 모든 채권자 이익 위하여 효력 있으므로（407", "[2019다238640]\n正辯 : 위 판결은 그 논거로. ① 사해행위 원상회복은 모든 채권자 이익 위하여 효력 있으므로（407\n조） 원상회복의무 불이행은 일반적 채무불이행과 의미 다름, ② ‘본래 채무 이행’과 395조 전보배\n상은 규범적 의미 동등하나, 사해행위취소에서의 ‘원물반혼Kto 채무자）’과 395조 전보배상（to 취소\n\n채권자）은 규범적 의미 다를 수 있음, ③ 원물반환 불능 •곤란 시의 가액배상과 원물반환에 갈음한\n\n395조 금전지급은 소송물 다르지만 ‘쉽게 허용하면 원물반환 • 채권자평등 원칙 약화 우려 있는 점’\n공통되어 제한적 허용 필요, ④ 전보배상에 따른 사실상 우선변제 결과는 가액배상과 마찬가지로\n\n불가피하고 수익자가 사해행위로 인한 이익을 책임재산으로 환원해야 한다는 요청이 원물반환 원\n칙 요청보다 더 상위인 점을 들고 있음\n원상회복이 ‘주식양도’인 사안으로서, 원심이 주식양도의무 이행지체로 인한 전보배상이 일반적 허\n\n용된다는 전제 아래 전보배상청구 인정함은 잘못이지만, 피고가 주식을 보유하고 있지 않고 자력\n도 부족하여 주식양도의무 임의 이행하지 않으며 인도할 주식 총수 • 가액 등에 비추어 주식양도의\n\n무 강제집행이 불가능 또는 현저히 곤란한 상황이므로, 결과적으로 전보배상 결론 O", [], 0, "사해행위취소", 52],
  ["채권총론_C044", "로 사해행위인 매매예약의 취소 및 가액배상 0", "로 사해행위인 매매예약의 취소 및 가액배상 0\n가 소멸하는 것은 X,\n\n••• 부기등기를 통해 수익자의 지위\n\n말소청구소송에서 가등기 •본등기의 피고적격이 전득자에게\n\n만 있다고 하여 수익자가 가액배상 의무까지 없는 것은 X [2012다952]\n\n® — [判例] 저당권 설정된 부동산에 관한 사해행위 있은 후 수익자 또는 제3자 등의 변제\n로 저당권설정등기가 말소된 경우, 부동산 가액에서 저당권의 피담보채권액을 공제\n\n한 잔액의 한도에서 일부취소 및 가액배상 명해야 •/ “부동산 자체의 회복 명하는 것\n은 당초 일반채권자의 공동담보가 아닌 부분까지 회복시켜 공평에 반하므로” [96다\n\n23207, 2002다41589]", [], 0, "사해행위취소", 53],
  ["채권총론_C045", "범위 가액배상 해야） V 위 저당권설정에 대한 사해행위취소 판결의 효력은 상대적", "범위 가액배상 해야） V 위 저당권설정에 대한 사해행위취소 판결의 효력은 상대적\n효력만 있고 그 부동산의 소유권 취득자에게 효력 미치지 X [2018다214319]\ncf. [判例] 가압류된 부동산에 관한 사해행위 있은 후 수익자 등이 가압류 청구채권\n\n을 변제하여 가압류 해제되거나 집행 취소되었더라도 원물반환 O, （기존 저당권도\n변제로 말소되는 등 다른 사유로 인하여） 가액배상을 명하는 경우도 가압류 청구채\n\n권의 변제액은 공제 X V 부동산 가압류는 채권자평등원칙상 공동담보로서 부동산\n가치에 아무런 영향 無, 가압류 여부나 청구채권액 다과 관계없이 부동산 전부에 사\n해행위 성립 [2002다37474]\n\ncf. [判例] 사해행위 ‘후’ 목적물에 선의 제3자가 저당권 취득하여 가액배상 명할 人],\n공동담보 가액 전부 배상 O, 제3자 저당권 피담보채권액 공제 X •■• 일반채권자들\n\n‘공동담보’로서 사해행위 성립 범위 내 가액배상 명해야【2003다40286]\n\n正辯 : 사해행위 ‘후’ 설정된 저당권 피담보채권은 ‘공동담보’였던 부분이므로 공제하지 않는다는\n\n의미이며, 전술한 것처럼 가액배상 또는 원물반환（위험 감수） 모두 가능한 사안. 한편 가액배상\n명할 때 수익자에게 부과된 증여세액 • 취득세액 공제하지 않는다고 판시함", [], 0, "사해행위취소", 54],
  ["채권총론_C046", "— ［判例］ 제1근저당권 설정 후에 채무초과인 상태로 최고액 20억의 제2근저당권 설정", "— ［判例］ 제1근저당권 설정 후에 채무초과인 상태로 최고액 20억의 제2근저당권 설정\n（사해행위）하면서 받은 차용금 중 일부로 제1근저당권의 피담보채무 4억 변제하여\n\n제1근저당권을 말소시킨 경우 一 원상회복은 근저당권변경등기 절차 이행청구로 O\n\n가액배상 X （판결이유 中 : 제2근저당권설정행위 채권최고액 20억 원 중 채무자가\n선순위 근저당권 피담보채무 4억 원 변제한 부분을 제외한 나머지, 즉 16억 부분만\n사해행위 一 그 한도에서 일부취소, 채권최고액 20억 원을 선순위 피담보채무액 4억\n\n원으로 감축하는 ‘근저당권변경등기절차 이행’ 명해야） ［2006Q43620］\n\n— ［判例］ 채권자가 일단 사해행위취소 및 원물반환 청구 승소확정된 경우라면, 그 후\n\n어떤 사유로 원물반환 목적 달성 불가능해도 다시 원상회복으로 가액배상 청구 X\n\n- 각하 V 권리보호이익 X, 원물반환과 가액배상 중의 선택은 사실심 변론종결시\n에 둘 중 하나로 확정 ［2004다54978］\n\n正辯 : 위 사안은 수익자가 사해행위로 매수하여 소유권이전등기를 한 후 저당권을 설정해준 사안\n\n으로서, 원고는 가액배상 또는 원물반환 선택할 수 있었으나 원물반환（소이등말소）을 선택하여\n승소 확정된 이상, 그 후 저당권 실행되어 원물반환 불가능해져도 다시 가액배상 구할 수 없다는\n\n판결 一 수익자가 사해행위로 저당권설정 받은 사안（전술한 2010다71431 판결）에서는 원물반환\n\n승소 확정된 채권자가 그 후 저당권 실행되자 가액배상 구한 것을 ‘대상청구권’ 행사로 법원이\n\n선해하여 준 것과 구별 一 2004다54978 판결은 ‘대상청구권’ 개념을 생각 못했거나 소이등말소에\n대한 대상 취득 개념이 불분명했기 때문（저당권자가 경매로 취득한 代償은 정확히 배당금이지만,\n소유자가 경매로 따로 취득한 代償은 파악하기 어려움）인 것으로 생각됨（私見） 一 이런 측면에서\n법전협 사례형 모의시험（19년 10모 제1문의 4）은 다소 부정확한 출제로 생각됨（私見）\n\n— ［判例］ 채권양도가 사해행위로 취소되는 경우 수익자가 제3채무자에게서 아직 채권\n을 추심하지 않았다면 원상회복은 수익자가 제3채무자에게 채권양도가 취소되었다\n는 통지를 하도록 청구 O,\n\n이 경우 통지 이루어진 후에도 채권자는 채무자를 대위\n\n하여 제3채무자에 대하여 지급 청구 X ［2012다2743］ — 대위소송 기각\n\n® — ［判例］ 可S 근저당권설정계약을 사해행위 취소한 경우 경매 진행 및 근저당권등기\n말소되었다면, 가액배상 받아야 （원물반환 불가능） 一 @ 배당 종료되고 수익자가 배\n\n당금 수령했다면 배당금반환 명함, ® 배당표 확정되었으나 지급금지가처분 등으로\n수익자 배당금 지급받지 못했다면 배당금지급채권의 양도 및 채권양도 통지 명함,\n© 채권자가 배당기일 출석하여 배당에 이의했다면 채권자는 사해행위취소의 소와\n\n원상회복으로서 배당이의 소를 병합하여 제기 O ［2003Q6200］\n- ［判例］ 출연자와 예금주（명의인） 사이 예금주 명의신탁계약이 사해행위로 취소 一\n원상회복은 수탁자인 명의인이 금융회사에 대한 예금채권을 출연자에게 양도하\n\n고 금융회사에게 양도통지 하도록 명하는 방법으로 一 그러나 예금이 인출•사용된\n\n경우는 가액배상만 — 수탁자（피고, 수익자）는 신탁자가 사실상 계좌를 지배 •관리한\n\nPART 1\n\n채권총론 • 채권자취소권 • 55", [], 0, "사해행위취소", 55],
  ["채권총론_C047", "사실을 증명하지 못하는 한 수탁자가 인출•사용한 것으로서 가액배상해야 V 예금", "사실을 증명하지 못하는 한 수탁자가 인출•사용한 것으로서 가액배상해야 V 예금\n인출. 이체에 명의자 본인 확인• 인증 필요하므로 ［2017다290057］\n\n- ［判例］ 공동저당권 설정된 수 개 부동산 전부의 매매계약이 사해행위일 때 그 중\n\n일부 부동산만 사해행위로 취소할 경우에도 가액배상액 산정은 피담보채권 총액을\n변론종결 당시 기준으로 한 각 목적물 가액 비례 안분 ［2012다77891］\n\n3. 채권자취소권 행사의 효과\n- 상대적 효력 ［통판］ : 소송의 당사자 사이에서만 （채권자와 수익자• 전득자 사이）\n\n- 원상회복한 재산에 대한 강제집행 후에 남는 것은 수익자에게 반환해야\n또한 강제집행된 부분에 대하여 수익자는 채무자에게 부당이득반환청구 O\n\n［判例］ 사해행위취소 및 원상회복이 이뤄진 경우 채무자는 수익자 • 전득자에게 부당\n이득반환의무 O — 그러나 채무자의 다른 공동채무자는 채무 소멸 이익 얻더라도\n수익자• 전득자에게 직접 부당이득반환의무 X （채무자와 구상관계 성립 별론） 一 공\n\n동채무자가 수익자•전득자의 가액배상의무 대위변제했다면 수익자.전득자에게 구\n상 O ［2015다3891이\n\n［判例］ 사해행위 취소된 경우 수익자. 전득자가 사해행위 이후 그 부동산을 사용하\n여 얻은 사용이익이나 임대하여 받은 임료상당액은 원상회복으로 반환할 필요 X •••\n\n사해행위취소 및 원상회복은 책임재산 보전 필요 범위 내로 한정되어야, 사용이익은\n\n당초 채권자의 공동담보 책임재산 X ［2007다69162］\n\n- ［判例］ 사해행위로 취득한 부동산을 가압류한 자에게는 사해행위취소 판결 효력 X\n— 가압류한 자는 강제집행 O ［89다카35421］\n\n— ［判例］ 사해행위 취소의 원상회복으로서 채무자에게 회복된 재산은 취소채권자나\n\n407조로 효력을 받는 채권자와 수익자 사이에서 채무자의 책임재산으로 취급될 뿐,\n“채무자가 직접 권리를 취득하는 것은 아니다.” — 이하 논거로 하는 판례들\n\n① ［判例］ 채무자가 사해행위 취소로 등기 회복한 부동산을 제3자에게 처분하더라도\n‘무권리자의 처분’으로 무효, 제3자 혹은 순차로 마쳐진 소유권이전등기 등은 모\n\n두 원인무효 - 취소채권자나 407조로 효력을 받는 채권자는 ‘강제집행’을 위하여\n\n원인무효 등기 말소청구 O ［2015다21798이\n② ［判例］ 수익자가 가액배상을 할 때 자신의 채무자에 대한 반대채권으로 상계 X\n\nV 채권자취소권은 모든 채권자를 위한 책임재산 보전 제도 취지, 상계 허용하\n면 사해행위로 이익받은 수익자 보호하고 다른 채권자 이익 무시하는 결과", [], 0, "사해행위취소", 56],
  ["채권총론_C048", "수익자는 채무자에게 가액배상금 명목으로 금전 지급했다는 점을 들어 취소채", "수익자는 채무자에게 가액배상금 명목으로 금전 지급했다는 점을 들어 취소채\n권자에 대하여 가액배상에서 공제 주장 X ••■ 제도 취지, 상대적 효력, 채권자\n\n취소권 행사로 채무자가 수익자에 대해 권리 취득 X [99다63183]\n正辯 : 수익자가 ‘채무자’가 아닌 ‘취소채권자’에 대한 채권으로 가액배상채권과 상계할 수 있는\n지 여부는 판시하지 않았으나. 판례 취지로 보아 가액배상채권은 상계금지채권으로 이해해야\n\n하고, 따라서 그러한 경우도 불허될 것임（私見）\n\n③ [判例] 채권양도가 사해행위로 취소되고 수익자가 원상회복으로서 제3채무자에\n게 그 취지를 통지한 경우에도, 채권자는 채무자를 대위하여 제3채무자에게 그\n\n채권에 관한 지급을 청구 X [2012다2743] —‘ 대위소송 기각\n④ [判例] 토지와 지상건물 함께 양도되고 건물양도만 사해행위로 취소되어 등기\n\n말소된 경우, 채무자는 관습상 법정지상권 x ••• ‘동일인 소유 속하던 토지 • 지상\n건물이 매매 등으로 소유자 달라진 경우’ X [2012다73158] （후술）", [], 0, "사해행위취소", 57],
  ["채권총론_C049", "제6절 제3자에 의한 채권침해", "제6절 제3자에 의한 채권침해\n\n써 제3자에 의한 채권침해 슈\n- 유형 : @ 채권 자체의 상실,\n\n© 채권은 존속하나 그 급부의 침해,\n\n© 채무자의 일\n\n반재산의 감소 등 一 결국 불법행위（제750조）의 문제 （고의 한정하는 견해 있음）", ["제750조"], 0, "제3자채권침해", 59],
  ["채권총론_C050", "제4장 채권양도와 채무인수", "제4장 채권양도와 채무인수\n\n제2절 채권의 양도\n\n제2관 지명채권의 양도\n\n싸 채권양도 슈\n\n1 .서설\n- 채권양도는 계약（채무자 동의 불요）이면서 동시에 준물권행위 O - 처분행위이므로\n\n처분권한 있는 채권자가 아니라면 채권양도는 무효\n\n正辯 : 채권의 이전 원인들 ① 단독행위 ex. 유언, ② 법률의 규정 ex. 상속, 변제자대위\n③ 법원의 결정（강제집행） ex. 전부명령, ④ 계약 ex. 채권양도\n\n- 채권의 ‘동일성’ 유지 一 채권에 부착된 동시이행항변권 등 모두 존속\n\ncf. ［判例］ 주택의 임대차보증금반환채권 양도한 경우 양수인은 우선변제권 X\n\n- ［判例］ 채권양도 의무 발생시키는 ‘원인행위’（=양도의무계약, ex. 매매 • 추심위임 •\n대물변제약정 • 채권양도담보）는 의무부담행위, 한편 ‘채권양도계약’은 준물권행위\n\n로서 처분행위 一 양자는 구별되는 별개 독립한 행위 一 매매 - 위임 등의 민법 규정이\n\n채권양도계약에 적용 X — 채권양도 원인인 위임이 해지로 소멸되면 이로써 채권은\n양도인에게 복귀되고 양수인은 양도의무계약의 해지로 부담하는 원상회복의무의 한\n내용으로 채무자에게 통지할 의무 O ［2010다100711］\n\n正辯 : 독립성, 유인성\n\n［判例］ 채권양도가 다른 채무 담보 조로 이뤄진 경우 그 채무 변제돼도 채무자는 이\n를 이유로 양수금청구 거절 X V 채무 변제나 소멸 여부는 양도인 • 양수인 간의 문\n\n제일 뿐 채무자는 양수인에게 변제해야 ［99다23093］\n正辯 : 유인성 인정함에도 불구하고 ‘채무자’ 입장에서는 통지를 기준으로 하면 됨\n\n2. 양도성과 제한\nO 성질에 의한 양도 제한（제449조 제1 항 단서）\n- 장래 채권 :\n\n［判例］ “장래의 채권도 양도 당시 기본적 채권관계 확정되어 권리 특정\n\n가능하고 가까운 장래 발생이 상당한 정도 기대되면 양도 O” ［95다7932］\n［判例］ 장래 채권의 압류• 가압류도 동일 법리 적용 O ［82다카508］", ["제449조"], 0, "채권양도", 60],
  ["채권총론_C051", "- 전세금반환채권: [判例] “전세권 존속 중에는 전세금반환채권만 분리하여 확정적으", "- 전세금반환채권: [判例] “전세권 존속 중에는 전세금반환채권만 분리하여 확정적으\n\n로 양도 X , 다만 전세권 소멸하는 경우 전세금반환채권 발생을 조건으로 그 장래\n의 조건부 채권 양도는 O” [2001 다69122]\n전세권이 존속기간 만료로 소멸, 합의해지, 특약 등에 의해 전세금반환채권의 처분\n\n에도 불구하고 전세권 처분이 따르지 않는 특별한 사정이 있다면 채권양수인은 무담\n\n보 채권을 양수한 것 [97다33997]\n\n— 소유권이전등기청구권:", [], 0, "채권양도", 61],
  ["채권총론_C052", "채무자가 압류•가압류 대상 채권을 양도하고 확정일자 통지 대항요건 갖췄다면,", "채무자가 압류•가압류 대상 채권을 양도하고 확정일자 통지 대항요건 갖췄다면,\n\n그 후 채무자의 다른 채권자가 양도된 채권에 압류• 가압류 하여도 무효 ••• 채권압\n류 효력 발생 전 채권 처분하면 먼저 압류한 채권자 있어 그에게 대항 못하여도\n처분 후 집행 참가한 채권자에게는 처분으로 대항 0（상대적 효력）, 압류•가압류 당\n시 피압류채권은 이미 존재 X ［2017다256378］\n\n正辯 : A가 B의 C에 대한 보증금반환채권을 가압류 一 D가 B로부터 위 채권 양수하고 확정일자\n통지 도달 一 E의 압류•추심명령 송달 一 가압류취소결정의 집행취소통지서 송달 - 항고심에서\n가압류결정 인가결정 - A의 압류•추심명령 송달\n\n‘a의 가압류 집행취소통지 송달 전에 E가 압류 •추심명령 받았0므루 A의 가압류 효력 계속된다’는\n\nA의 주장은 부당 V A의 압류•추심명령 및 E의 압류•추심명령은 모두 무효\n© 의사표시에 의한 양도 제한（제449조 제2항）\n\n- 449조 2항 단서는 채권양도금지특약으로 ‘선의의 제3자’에게 대항할 수 없다고 규정\n하지만 판례는 중과실을 악의과 같이 보아 선의 • 무중과실一악의나 중과실\n［判例］ 채권양도금지특약에 반하여 채권양도 이뤄진 경우, 양수인이 양도금지특약의\n\n존재를 알았거나 중과실로 알지 못한 경우는 채권양도 무효,\n\n중과실 없이 알지 못했\n\n다면 채권양도 유효 一 양수인의 악의나 중과실에 대한 입증책임은 채무자 부담 一‘\n채무자는 487조 후단 채권자 불확지 변제공탁 O ［2000다55904］\n\n［判例］ 449조 2항 단서는 전득자 포함 O, 악의 양수인으로부터 선의로 양수한 전득자 O,\n선의 양수인으로부터 악의로 양수한 전득자 O ［2012다11802이\n- ［大判全合］ 양도금지특약으로 채권 양도성 상실, 양도금지특약 위반한 채권양도\n는 무효 V 통설•판례, 실무 안정, 449조 2항 단서는 무효를 전제로 거래안전\n\n보호 규정, 물권법정주의와 달리 채권은 당사자 합의로 내용 자유 결정, 채권양도의\n\n동일성 ［2016다24284］\n\n正辯 : 위 전합에는, 채권양도 자유 및 증명책임 분배와의 관계를 들어. 양도금지특약 위반해도 당\n사자 사이 채무불이행책임만 발생할 뿐 채권양도는 원칙적 유효이고 채무자는 양수인에게 이행해\n야 한다는 이른바 ‘채권적 효력설’을 취한〈반대의견〉이 있었음\n［判例］ 당사자 사이 양도금지특약 있더라도 전부명령 O, 집행채권자의 선악의 불문,\n\n전부채권자로부터 다시 양수한 자가 악의라 하여도 채권양도 유효 ［200143771］\n［判例］ 악의 • 중과실의 채권양수인에 대해 채무자가 사후승낙하면 무효인 채권양도\n\n행위가 추인되어 승낙시부터 유효 O （소급효 X）［2009다47685］ v 139조 무효행위의\n\n추인은 소급효 X\n\n62\n\n로스쿨 민법의 정석\n\n正辯 : 해당 판례의 참조조문에 139조가 명시되어 있음", ["제449조 제2항"], 0, "채권양도", 62],
  ["채권총론_C053", "3. 채무자에 대한 대항요건", "3. 채무자에 대한 대항요건\n가. 통지, 승낙（제450조 제1항）\n\n— 통지 : 관념의 통지,\n\n조건 • 기한 X,\n\n사전통지 X, 양도인이 해야 （양수인은 X）\n\n다만 ［判例］ ‘양수인’이 양도인의 사자나 대리인으로서 채권양도 통지\n\nO ••• 법률\n\n행위 대리 규정은 양도통지와 같은 관념의 통지에 유추적용 O ［94다19242］\n正辯 : 양도인이 양수인에게 양도통지 권한 위임하면 ‘대리’ O, 통설은 ‘대위’ 통지 X\n— ［判例2022］ 양수인은 채권자에게 채권양도통지절차 이행 청구 O ［2017다243143］\n\n［判例］ 주채무자에 대하여 채권양도통지 등 대항요건 갖추면 보증인에게 효력 O\n（즉, 보증인에 대하여 따로 대항요건 갖춰줄 필요 없음） ［75다110이\n\n- 승낙 : 관념의 통지,\n\n조건 • 이의 O,\n\n사전승낙 O\n\n채무자가 양도인 • 양수인 누구에게 해도 무방\n\n— 이의를 보류하지 않은 승낙（제451조 제1 항） : 항변권 상실 =양도인에게 대항할 수 있\n\n는 사유로써 양수인에게 대항 X\n\n（羊451조 2항 통지 •一 항변 O = 동일성）\n\nex. 변제 • 상계 등 채권소멸사유, 채권발생 원인인 기본계약의 무효 • 취소 - 해제\n正辯 : 판례는 채무자가 자동채권 발생을 예상 못한 상태에서 이의無보류승낙을 했다면 상계항변\n\n권이 상실되지 않을 것임을 전제로 판단하고 있음\n［判例］ 채무자가 이의無보류승낙 할 때 채권 성립 •소멸 사정을 양수인에 알려줄 신\n\n의칙상 의무 X, 설명 없었어도 불법행위 X •/ 양수인 자신 책임 ［2014다49241］\n\n［判例］ “451조 1항 ‘양도인에게 대항할 수 있는 사유’란 채권의 성립 • 존속 • 행사를\n저지 • 배척하는 사유를 말할 뿐, 채권의 귀속（=이미 타인에게 양도된 사실）은 X •/ 채\n\n권 귀속 우열은 오로지 확정일자 있는 통지 • 승낙의 유무와 선후로써만 결정” ［93다\n\n35551］ - 이의無보류승낙은 채권의 귀속 • 우열에 아무 영향 X\n［判例］ 임대차보증금반환채권을 양도함에 임대인이 이의 보류 없는 승낙하였어도 인\n도시까지 생긴 연체차임, 임차인의 원상복구비용 상당의 손해배상액 등 임차인의 모\n\n든 채무 공제 O（V 보증금의 속성） 一 그러나 임대인 • 임차인 사이 약정한 원상복구비\n\n용의 약정 보증금은 451조 1항 이의無보류승낙의 항변권 상실 효과 O（V 약정에 기\n해 비로소 발생한 채무에 불과하여 당연 공제 속성 문제 X）［2002다52657］\n\n［判例］ 이의 보류 없는 승낙을 하였더라도 양수인이 악의나 중과실인 경우라면 채무\n자는 승낙 당시까지 양도인에 대해 생긴 사유로 양수인에게 대항 O ［99다18039］\n\n- 통지 = 이의보류 승낙 = 이의무보류승낙+양수인 악의 • 중과실 一 동일성, 항변 O\n\nPART 1\n\n채권총론 • 채권양도 • 63", ["제450조 제1항", "제451조"], 0, "채권양도", 63],
  ["채권총론_C054", "- ［判例］ 채권양도 후 대항요건 구비 전이라면 ‘양도인’은 채무자의 제3채무자에 대한", "- ［判例］ 채권양도 후 대항요건 구비 전이라면 ‘양도인’은 채무자의 제3채무자에 대한\n채권에 대하여 가압류 o, 가압류에 기한 배당 유효 o •■• 채무자에 대한 관계에서\n\n는 여전히 채권자의 지위 ［2008두20109, 2016다8589］\n正辯 : 채권양도 대항요건 구비 전의 ‘양수인’은 채무자의 제3채무자에 대한 채권 가압류 x\n\n나. 동일성（제451조 제2항）\n- ‘통지를 받은 때까지 양도인에 대해 생긴 사유’로써 양수인에게 대항 O\n반대해석상 ‘통지 이후 생긴 사유’로 대항 x\n\n［判例］ 임대차보증금반환채권 양도 통지 후 임대차계약 갱신 • 연장의 명시적 • 묵시적\n\n합의는 양수인에 효력 X ［88다카4253］\n- ‘통지를 받은 때까지’ = ‘승낙 당시까지’\n\n［判例］ 채권양도에서 채무자가 양도인에게\n\n‘이의 보류 없는 승낙’을 했다는 사정이 없거나, ‘이의 보류 없는 승낙（단순승낙）’을 했\n더라도 양수인이 악의 • 중과실인 경우, 채무자는 승낙 당시까지 양도인에 대하여 생\n\n긴 사유로써 양수인에게 대항 O ［99다18039］\n\n正辯 : 통지 •승낙 자체의 효력은 모두 도달시에 발생하겠지만, 채권양도 대항요건의 중요한 기준\n은 ‘채무자의 인식’이므로 통지는 ‘도달시’, 승낙은 ‘승낙행위시’가 그 기준시점이 됨\n\n- 생긴 사유 ：（3 변제 / © 상계 / © 불성립, 무효, 취소, 해제, 동시이행항변권\n\n⑪ 변제 : 양도 통지 받은 때를 기준으로 판단\n© 상계: ［判例］ 채무자가 “통지를 받은 당시 이미 상계할 수 있는 원인이 있었던 경우\n는 아직 상계적상에 있지 않더라도 그 후 상계적상에 이르면 채무자는 양수인에 대\n\n하여 상계로 대항 O” ［2017다222962］\n［判例］ 채무자의 “승낙 당시 이미 상계할 수 있는 원인이 있던 경우는 아직 상계적상에\n\n있지 않더라도 그 후 상계적상이 생기면 채무자는 양수인에 대하여 상계로 대항 O”\n\n［99다18039］\n正辯 : 판례의 “이미 상계할 수 있는 원인”이라는 표현은 기준시점까지 ‘자동채권 취득’으로 충분하\n다는 견해가 다수설로 보임（‘자동채권 취득 및 변제기 선도래’까지 필요하다며 498조에 관한 판례\n\n와 일관된 법리로 설명하려는 소수설도 있음）. 시험에서는 판례 워딩을 그대로 쓰고 변제기에 대해\n서는 단정적이지 않게 기재해야 （법전협 모의시험은 소수설 소개 없이 다수설을 취한 바 있음）\n\n［判例］ 채권양도의 동일성과 451조 2항을 고려하면 “채무자의 양도인에 대한 자\n동채권의 발생 기초 원인이 양도 전에 이미 성립하여 존재하고, 자동채권과\n\n수동채권이 서로 동시이행 관계에 있는 경우에는, 양도통지가 채무자에게 도달하여\n\nB", ["제451조 제2항"], 0, "채권양도", 64],
  ["채권총론_C055", "대항요건이 갖춰진 후에 자동채권이 발생했더라도 채무자는 동시이행항변권을 주장", "대항요건이 갖춰진 후에 자동채권이 발생했더라도 채무자는 동시이행항변권을 주장\n할 수 있고 따라서 상계로 대항 O” [2014다80945] — 도급계약의 공사대금채권의\n\n양도통지 후에 도급인에게 하자로 인한 손해배상청구권 발생한 경우임에도 도급인\n\n（채무자）은 양수인에 대하여 상계 O V 667조 3항", [], 0, "채권양도", 65],
  ["채권총론_C056", "다. 금반언（제452조 제1 항）", "다. 금반언（제452조 제1 항）\n- 채권양도 통지했으면 양도하지 않았거나 양도가 무효인 경우에도 선의의 채무자는\n\n양수인에게 대항할 수 있는 사유로서 양도인에게 대항 O\n- ［判例］ 452조 1항은 채권양도가 해제 • 합의해제로 소급해서 무효로 되는 경우에도\n유추적용 O —> 통지 후 해제 • 합의해제된 경우 양도인이 해제를 이유로 채무자에게\n\n대항하려면 양수인의 동의를 받아 통지를 철회하거나 양수인이 채무자에게 해제 사실\n통지하여야 一 선의 채무자는 해제 통지 후에도 양수인에 대한 반대채권으로 양도인\n에 대하여 상계 O （해제 통지 전에 상계적상 있는 반대채권 존재한 사안） ［2011 다\n\n17953］\n- 채권양도계약이 불성립 • 무효 • 해제인 경우 최초 채권양도 통지를 철회하려면 양수인\n의 동의 필요（제452조 제2항） 혹은 양수인이 직접 해제 등의 통지를 해야\n\n4. 제3자에 대한 대항요건\n- 채무자 이외의 제3자에 대하여서는 통지 ■승낙은 ‘확정일자’ 있는 증서에 의하여서만\n대항 가능（제450조 제2항）\n\n- 제3자 : 채권에 관하여 양수인의 지위와 양립할 수 없는 법률상 지위를 가진 자\n\n이중양수인, 채권질권자, 채권을 압류 • 가압류한 자 O\n채무자의 채권자 X,\n\n［判例］ 후순위 저 당권자 X — 선순위 저 당권자로서 ① 대항요\n\n건 못 갖춘 채권양수인, ② 채권양도 해제되었으나 해제통지 못 갖춘 양도인 등에 대\n\n하여 후순위저당권자는 배당이의 X ［2004다29279, 2011 다10935刀\n\n- 확정일자 : ［判例］ “작성일자에 대해 완전한 증거가 될 수 있는 것으로 법률상 인정\n된 일자”\n\nO : 공증인• 법원서기 확정일자印 있는 사문서, 공정증서, 내용증명우편, 확정판결,\n가압류 등 결정정본, 원본이 아닌 사본에 확정일자\n\nX : 배달증명, 저당권 • 전세권 이전의 부기등기\n［判例】 존속기간 경과로 용익물권적 권능 소멸, 담보물권적 권능만 남은 전세권은\n피담보채권인 전세금반환채권과 함께 양도 O — 그러나 450조 2항 확정일자 갖추\n지 않으면 전세금반환채권의 압류• 전부채권자 등 제3자에게 채권양도로 대항 X\n- 전세기간 만료 후 전세권양도계약 및 전세권이전 부기등기 이뤄진 것만으로는\n\n전세금반환채권 양도에 확정일자 통지 •승낙 X ［2003Q356591\n\nB", ["제452조", "제452조 제2항", "제450조 제2항"], 0, "채권양도", 66],
  ["채권총론_C057", "- 통지 • 승낙 • 단순승낙 여하에 불구하고 ‘확정일자’ 있는 자 > 없는 자", "- 통지 • 승낙 • 단순승낙 여하에 불구하고 ‘확정일자’ 있는 자 > 없는 자\n둘 다 확정일자 없다면 통지 도달이나 승낙 일시의 선후에 따라 ［통판］\n- ［大判全合］ “이중양도에서 모두 확정일자 갖춘 경우는, 채권양도에 대한 채무자의\n\n인식, 즉 확정일자 통지의 도달 일시 또는 확정일자 승낙 일시의 선후로 결정해야（확\n정일자의 선후 X）” = 가압류결정정본의 제3채무자（=채권양도에서 채무자） 도달과\n\n선후 비교\n“양도통지, （가）압류명령 등이 제3채무자에게 동시에 도달되어 상호 우열 없다면\n각자 전액 청구 O - 채무자는 누구에게 전액 변제해도 유효 면책 O, 다만 이중지\n급 위험 있으므로 채권자 불확지로 공탁 O - 변제 받은 양수인 등 상호간 내부적\n\n으로 각 채권액에 안분하여 정산의무 O” ［93다24223］\n正辯 : 위 판결만 놓고 보면 가압류 • 채권양도, 이중양도 사안에서（확정일자 구비 전제） 각 결정 •통\n\n지의 도달 선후만 비교하면 될 것처럼 보이나, 이처럼 ‘인식의 선후’ 비교로 ‘우열’을 결정할 사안\n은 결론적으로 ① 동시도달 사안, ② 이중양도 이뤄진 후에 순차로 각 대항요건 갖춘 사안에 한정\n\n하는 것이 타당하고（私見）, 오히려 일반론으로는 2001다59033（전술）, 2015다46119（후술）, 2010다\n\n57213（후술） 판결들에서 보는 것처럼 가압류의 처분금지효나 무권리자의 처분행위 등의 법리에 따\n라 한쪽이 ‘무효’가 되어버리는 경우가 많으므로 주의를 요함\n\n— ［判例］ “양도인이 지명채권을 제1양수인에게 양도하고 확정일자 있는 증서로 대항요\n건을 갖춘 ‘후’ 양도인이 동일한 채권을 제2양수인에게 양도해도 제2양수인은 채권\n\n취득\n\nX” V “지명채권 양도는 준물권행위 • 처분행위, 유효하려면 양도인 처분권한\n\n있어야 하는데 제1양수인이 확정일자까지 적법하게 갖춤으로써 양도인은 채권 처분\n\n권한 상실” 正辯 : 제2양도행위는 ‘무권리자의 처분행위’로서 무효라는 취지\n（제1차 채권양도가 양도담보인 경우도 마찬가지 V 대외적으로 제1양수인에 이전）\n그 후 제1차 양도계약이 합의해지되고 통지함으로써 채권이 다시 양도인에게 귀속되\n\n었어도 특별한 사정 없는 한 제2차 양도계약이 채권양도로서 유효하게 될 수는\n\nX,\n\n제2양수인이 당연히 채권 취득 X ［2015다46119］\n\n- ［判例］ “채권양도 후 확정일자 있는 통지 갖추었다면, 그 후 양도인의 다른 채권자가\n양도된 채권에 대하여 압류 • 가압류하더라도 압류 • 가압류 무효 ••• 압류 ’ 가압류 당시\n피압류채권은 이미 존재\n\nX — 채권양도보다 먼저 압류한 채권자가 있어 채권에 대\n\n한 집행이 되더라도 채권양도 확정일자 통지 이후에 압류• 가압류한 채권자는 그 집\n\n행절차에 참여\n\nX ［2010다57213］\n\n［判例2022］ 압류 및 추심명령 당시 피압류채권이 이미 대항요건 갖춰 양도되어 그\n명령이 무효로 되었다면, 그 후 사해행위취소소송에서 채권양도계약이 취소되어\n\n채권이 원채권자에게 복귀하였더라도 이미 무효로 된 압류 및 추심명령이 다시\n\nPART 1\n\n채권총론\n\n• 채권양도 • B7", [], 0, "채권양도", 67],
  ["채권총론_C058", "유효로 될 수는 X", "유효로 될 수는 X\n\n사해행위취소의 상대효 및 비소급효 [2019다235702, 2022다\n\n247521]", [], 0, "채권양도", 68],
  ["채권총론_C059", "- 채권에 대한 압류 • 가압류와 채무자의 제3채무자에 대한 이행청구소송 :", "- 채권에 대한 압류 • 가압류와 채무자의 제3채무자에 대한 이행청구소송 :\n\n① 가압류 • 압류 • 가처분 一 ‘인용’ （단, 소유권이전등기청구는 해제조건부인용）\n② 압류 • 추심명령 一 ‘인용’ ••• 당사자적격 유지（2025년 판례변경）\n③ 압류 • 전부명령 一 ‘기각’ ••• 이행의 소의 당사자적격 문제（본안 판단에 흡수）\n나 위 법리는 채권 가압류나 압류 있은 후 그 채권을 양수한 자의 양수금청구에도\n동일 적용（가령 [99다23888]） — 전술한 2001다59033 판결의 법 리 포함\n\nPART 1\n\n채권총론 • 채권양도 • B9", [], 0, "채권양도", 69],
  ["채권총론_C060", "제3 절 채무의 인수", "제3 절 채무의 인수\n\n쏘 채무인수 슈\n\n1. 면책적 채무인수\n— 채무인수는 계약이면서 동시에 준물권행위 O\n— 채무의 ‘동일성’ 유지 一 연대 • 불가분채무 성질 유지, 소멸시효‘기간’ 동일 O\n（羊경개, 준소비대차 : ［判例］ 노임채권도 회사와 준소비대차 5년으로 ［80다1363］）,\n\n［判例］ 면책적 채무인수는 채무 동일성 유지하면서 종래 채무자로부터 인수인에게\n이전하는 계약, 인수인은 종래 채무자와 교체하여 새로이 당사자로서 동일한 채무\n부담 - 인수채무가 원래 5년 상사시효 적용받았다면 채무인수 후에도 소멸시효\n\n기간은 여전히 5년 상사시효 O — 면책적 채무인수와 동시에 이뤄진 시효중단 사유\n인 승인에 따라 채무인수일로부터 시효기간 새로이 진행 O ［99다12376］\n\n— 채무인수의 원인된 법률관계와 채무인수 사이 무인성 : O ‘매매’의 대금지급 갈음하\n여 다른 채무 인수, © ‘증여’ 차원에서 채무인수 一 ‘채무인수의 원인관계’에 해당하\n는 ‘매매’ • ‘증여’가 무효 • 취소되더라도 채무인수에 영향 無\n\ncf. 매매대금채무 인수한 후 매매계약 취소 一 ‘인수한 채무의 발생원인’이 되는 계약\n\n이 무효 • 취소된 것이므로 인수채무도 소급 소멸\n\n- 채권자와 제3자 사이 인수계약（제453조） : 성질상 불허되거나 이해관계 없는 제3자\n가 채무자 의사에 반하는 경우（=변제, 경개）에는 X\n\n- 채무자와 제3자 사이 인수계약（제454조） : 채권자의 승낙이 효력요건\n채권자가 승낙하면 인수시에 소급하여 효력, 그러나 제3자 권리 침해 X （제457조）\n\n正辯 : 133조 단서, 457조 단서, 548조 1 항 단서, 1015조 단서의 ‘제3자 보호’ 규정에서의 제3자는\n‘배타적’ 권리를 취득한 자에 한정한다고 보는 것이 일반적임\n\n［判例］ 채권자가 승낙 거절한 후 다시 승낙해도 채무인수 효력 X ［98다33765］\n\n［判例］ “금전채무는 상속개시와 동시에 당연히 법정상속분에 따라 분할 귀속되므로\n소극재산은 상속재산분할 여지 X — 상속인 1인이 초과 부담하기로 분할협의하면\n\n면책적 채무인수 실질 가지므로 채권자가 승낙해야 효력 O — 승낙해도 상속재산분\n\n할의 소급효 규정인 1015조 적용 X, 상속개시시로 소급 X ’ ［97다8809］\n正辯 : 다만 인수시로 볼 수 있는 분할협의시로는 소급할 것으로 보임（457조 참조）", ["제453조", "제454조", "제457조"], 0, "채권양도", 70],
  ["채권총론_C061", "- 승낙 여부 최고（제455조） : 제3자• 채무자가 상당기간 정하여 승낙 여부 확답 최고", "- 승낙 여부 최고（제455조） : 제3자• 채무자가 상당기간 정하여 승낙 여부 확답 최고\n\n- 채권자가 기간 내 확답 발송 없으면 채무인수 거절 간주\n- 인수인의 항변（제458조） : 전 채무자가 항변할 수 있는 사유로 채권자에게 대항 O\n\nBut 취소권 • 해제권은 행사 X（V 계약당사자 지위 전제）, 종전 채무자의 채권자에 대\n\n한 채권으로 상계 X ［통］, 전 채무자에게 대항할 수 있는 사유로 X（V 무인성）\n\n- 보증 • 담보의 존속 여부（제459조） : 보증 및 제3자 제공 담보 소멸, 그러나 보증인 • 제\n\n3자 동의하면 존속\n［判例］ 물상보증인이 면책적 채무인수에 동의하거나 스스로 면책적 인수인이 된\n경우 제공한 담보는 소멸하지 X — 그러나 인수한 채무만 담보 O, 신 채무자（인\n수인）가 다른 원인으로 부담한 새로운 채무까지 담보하지는 X •/ 동의는 새로운\n\n담보설정 의사표시 X, 기존 담보를 인수인을 위해 계속 유지하는 의사표시 O, 유\n지된 담보는 기존 담보와 동일한 내용이어야 ［2000다56204, 98다40657］\n\n［判例］ ‘면책적 채무인수로 채무 소멸 및 부종성으로 저당권 당연 소멸’ 법리는 x •••\n면책적 채무인수는 인수인이 새로이 당사자로 종래와 동일 채무 부담하고 동시 에 종\n래 채무자는 탈퇴 • 면책되는 것일 뿐 종래 채무 소멸 아니므로 ［96다27476］\n\n正辯 : 459조 규정과는 별개의 문제임\n\n2. 병존적 채무인수（=중첩적 채무인수）\n- 의의 : 기존 채무관계를 그대로 유지하면서 제3자가 채무자로 들어와 종래 채무자와\n더불어 동일한 내용의 채무를 부담하는 것\n\n- ［判例］ 채무인수가 면책적인지 병존적인지 불분명할 경우 병존적 채무인수로 해석\n\n［4294민상1087］\n- 채권자• 인수인 사이 계약은 ‘보증’ 성질 一 이해관계 없는 제3자가 채무자의 의사에\n반하여 병존적 채무인수 O\n\n채무자• 인수인 사이 계약은 ‘제3자를 위한 계약’의 성질 一 채권자 수익 의사표시 있\n어야 채권 취득\n\n【判例］ 채무자 인수인 합의 의한 중첩적 채무인수는 채권자가 수익 거절 의사표시\n후 번복 X - 그러나 인수인이 승낙 여부 최고하며 채권자에게 중첩적 채무인수라\n\n고 알리지 않아 채권자가 면책적 채무인수로 잘못 알고 거절했다면 그 후 중첩적 채\n무인수계약 유효 존속하는 한 다시 수익 의사표시 O ［2011 다56033］\n\nPART 1\n\n채권총론 • 채무인수 • 71", ["제455조", "제458조", "제459조"], 0, "채권양도", 71],
  ["채권총론_C062", "- 효과 : 종전 채무 존속하므로 담보도 존속（羊면책적）,", "- 효과 : 종전 채무 존속하므로 담보도 존속（羊면책적）,\n\n인수인은 채무자가 채권자에\n\n게 가지는 항변사유로써 채권자에게 대항 0（=면책적）\n\n- 채무자와 중첩적 채무인수인의 관계 : [判例] 중첩적 채무인수인이 자신의 채권자에\n대한 채권으로 상계하면 418조 1항의 규정에 의하여 원채무자의 채무도 소멸 [96다\n\n56443] 正辯 : 중첩적 채무인수인과 채무자의 관계를 연대채무로 본 판례", [], 0, "채권양도", 72],
  ["채권총론_C063", "4. 이행인수", "4. 이행인수\n가. 의의 및 효과\n\n— 의의 : 채무자와 인수인 사이 계약으로 인수인이 그 채무를 채권자에게 이행할 의무\n를 채무자에 대해 부담하는 것\n\n- 효과 : [判例] “이행인수인은 채무자에 대하여 ‘채권자에게 채무를 이행’할 의무 o\n그러나 채권자에 대해서는 인수인이 채무부담 X, 불이행해도 그에게 채무불이행 X\n\n채권자는 인수인에게 직접 채무 이행청구 X — 채권자는 채무자의 인수인에 대한 청\n구권을 대위행사 O ••• 채무자의 인수인에 대한 이행청구권은 일신전속권이 아닌 재\n\n산권 O” [2008475072]\n正辯 : 이 경우에는 피보전채권 ■ 피대위권리가 물건인도•금전지급에 관한 채권인지 여부를 불문하고\n\nA는 B를 대위하여 으에 대하여 어차피 ‘a에게 이행할 것’이라는 B의 권리를 행사하는 형태가 될 것\n임 （私見）\n\n나. 매매계약과 매수인의 이행인수", [], 0, "채권양도", 73],
  ["채권총론_C064", "- 인수채무의 불이행과 매매계약의 해제 가부", "- 인수채무의 불이행과 매매계약의 해제 가부\n@ [判例] “매수인은 현실적으로 당장 변제할 의무 X, 이행인수 약정하였으므로, 매매대\n금에서 채무액 공제한 나머지를 지급함으로써 잔금지급의무 다한 것 O, 인수인이\n인수채무를 현실적으로 변제 않았다는 사정만으로 매도인은 매매계약 해제 X” [93\n다19108]\n© [判例] “부동산매매계약• 이행인수계약이 함께 이뤄진 경우, ® 매수인의 인수채무\n\n불이행으로 말미암아 또는 ® 임의로, 매도인이 인수채무를 대신 변제했다면, 그\n로 인한 ® 손해배상채무 또는 © 구상채무는 인수채무의 변형（=매매대금지급채무\n에 갈음한 것의 변형）이므로 매도인의 소유권이전등기의무와 동시이행 O” — 인수\n\n인이 인수채무 변제 게을리 하여 경매가 개시되고 매도인이 경매 막고자 변제했다면\n매도인은 손해배상채권 취득 O, 이를 들어 매매 해제 O” [92다23193]\n正辯 : 위 판결은 매도인이 대신 변제했음을 들어 매매 해제가 가능하지만. 해제를 위해서는 자신\n\n의 소유권이전등기의무를 이행제공하여 매수인을 지체에 빠뜨렸어야 한다는 취지로 해석됨（私見）\n\n한편 사안과 달리 매도인이 매매 목적 부동산에 근저당권을 ‘새로이’ 설정함으로써 차용한 돈으로\n인수채무를 대신 변제한 것이라면 그 구상권을 내세워 동시이행 항변 X, 해제 x ••• 매수인이 소\n\n유권이전등기 하면 그 피담보채무액은 결국 매수인의 부담이 되므로", [], 0, "채권양도", 74],
  ["채권총론_C065", "제5장 채권의 소멸", "제5장 채권의 소멸\n\n제2절 변제\n\n씨 변제 슈\n\n1. 서설\n— 채권의 소멸사유 : 변제 • 대물변제 • 공탁 • 상계 • 경개 . 면제 • 혼동\n채권의 목적인 급부 실현 : 변제 • 대물변제 • 공탁 • 상계\n\n계약 : 대물변제 • 경개 / 단독행위 : 상계 • 면제 / 사실행위 : 변제 / 사건 : 혼동\n\n— 변제의 장소（제467조） : 채무 성질 • 당사자 의사표시로 변제장소를 정하지 아니한 때\n특정물 인도는 채권성립 당시 물건 있던 장소에서, 그 외는 채권자의 현주소에서, 영\n\n업에 관한 채무 변제는 채권자의 현영업소에서\n\n※ 463조（변제로서의 타인 물건 인도）, 461조（양도능력 없는 소유자의 물건인도）, 465조（채\n권자의 선의소비, 양도와 구상권, 468조（변제기 전 변제）, 473조（변제비용의 부담）\n\n2. 변제제공\n— 급부 결과가 채무자의 이행만으로 실현되는 경우는 변제제공이 문제되지 않으나,\n\n채권자의 수령 등 일정한 협력이 있어야 급부 결과가 실현되는 경우라면, 채무자는\n‘채권자의 협력이 있으면 급부 결과가 생길 수 있는 상태’까지 이행을 해야 하고 또\n\n그것으로 족한데, 이것이 ‘변제제공’ 개념\n\n— 변제제공의 방법（제460조） = 종류물의 특정 시점 판단기준\n@ 현실제공（본문, 원칙） : 채권자가 언제든지 수령할 수 있는 상태에 놓는 것\n\nex. 급부 목적물을 들고 채권자의 주소에 갔으나 부재 중인 경우, 부동산 매도인이\n이행기일에 등기 소요 서류를 들고 이행장소에 나온 때\n© 구두제공（단서, 예외） : 변제준비 완료를 통지하고 수령을 최고하는 것\n\n채권자가 미리 받기 거절하거나 채무 이행에 채권자 행위 요할 경우는 구두제공\n\nPART 1\n\n채권총론 • 변제 • 75", ["제467조", "제460조"], 0, "채권소멸변제", 75],
  ["채권총론_C066", "© 구두제공조차 불필요한 경우:", "© 구두제공조차 불필요한 경우:\n\n@ 회귀적 분할채무에서 1회분의 이행 제공을 거절한 경우\n® 영구적 불수령", [], 0, "채권소멸변제", 76],
  ["채권총론_C067", "그러나 [判例] 제3채무자가 전부금 변제함에 선의 • 무과실이 아니었다면 변제 무효,", "그러나 [判例] 제3채무자가 전부금 변제함에 선의 • 무과실이 아니었다면 변제 무효,\n\n경합압류채권자에 대한 불법행위 O [87다카546] — 이미 甲의 압류 • 전부명령을\n송달받은 상태에서 江의 전부명령이 송달되었음에도 江의 전부금청구에 다투지 않\n\n아 자백간주로 승소판결 선고되게 하고 8일 만에 변제해버린 사안", [], 0, "채권소멸변제", 78],
  ["채권총론_C068", "［判例］ 약관규제법 위반한 충당합의는 무효 ［99다25938］ —»可Q 피고의 재재항변", "［判例］ 약관규제법 위반한 충당합의는 무효 ［99다25938］ —»可Q 피고의 재재항변\n［判例］ 미리 채권자• 채무자 사이에 ‘채권자가 적당하다고 인정하는 순서 • 방법에 의\n하여 충당하기로’ 약정했다면, 변제수령권자 스스로 정한 순서 - 방법으로 변제충당 O\n\n— 이 경우 채무자가 변제하면서 지정충당 X ［98다27517］\n② 비용 • 이자 • 원본（제479조） : 합의충당이 없는 한 지정충당보다 우선 적용\n\n［判例202이 비용•이자•원본 충당 법정순서（479조）와 달리 당사자 일방적 지정\n\nX\n\n••• 479조에는 476조 지정충당 준용 X — 479조 변제충당에서 지연손해금은 이자와\n같이 보아 원본보다 먼저 충당 ［2018다204787］\n［判例］ 비용에는 변제비용 • 집행비용 • 소송비용 O ［2004재다818］\n\n— ［判例2024］ 가집행선고로 인한 강제집행 면하기 위해 채무자가 지급한 가지급금의\n액수가 정당한 금원（최종적 확정 금원）인 원본 및 지연손해금 합계액에 미치지 못\n했다면, 특별한 사정 없는 한, 민법 소정 변제충당 법리에 따라 지연손해금, 원본\n의 순서로 충당되어야 一 가집행 근거 판결 소송물이 복수의 금전청구가 객관적 병\n\n합된 것인 경우에도 마찬가지 ［2024다257812］\n［判例2024］ 부진정연대채무자 중 소액채무자가 일부 변제하면, 다액채무자와 공동\n\n부담 부분에 변제충당 일반원칙에 따라 지연손해금, 원본 순서로 소멸하고, 부진정\n연대채무에서 변제의 절대효에 따라 다액채무자 채무도 지연손해금과 원금이 같은\n\n범위에서 소멸 ［2019다29013］\n正辯 : 소액채무자가 원금 70, 지연손해 70| 있고. 다액채무자가 원금 100. 지연손해 10이 있는 경\n우에, 소액채무자가 “17”을 변제하면, 소액채무자는 먼저 “지연손해 7”을 소멸시키고 나머지 10으\n\n로 “원금 10”을 소멸시켜 “원금 60”이 남는데, 이때 다액채무자는 지연손해의 경우 소액채무자에\n\n게서 소멸한 “지연손해 7”과 동일 금액이 공동부담 부분으로 소멸하여 “지연손해 3”이 남고, 원금\n의 경우도 소액채무자에게서 소멸한 “원금 10”과 동일 금액이 공동부담 부분으로 소멸하여 “원금\n\n90”이 남게 됨\n［判例］ 여러 연대채무자• 연대보증인에 대하여 따로따로 소송 제기되어 판결로 확정\n\n된 원본 • 지연손해금의 금액 • 이율 서로 다른 경우 1인의 채무자가 일부 변제하면 공\n\n동 부담 부분이 아닌 채무부터 우선 충당\n③ 지정충당（제476조） : 변제자 一 수령자 一 （변제자 즉시 이의하면） 법정충당 ［통］\n\n④ 법정충당（제477조） : 도래한（제1호） 一 변제이익 많은（제2호） 一 먼저 도래（제3호）\n\n— 채무액 비례（제4호） 順\n변제기 관하여 기한의 정함이 없는 채무는 채권이 성립한 때 도래한 것 ［통］\n\n［判例］ 법정충당 순위 정함에 있어 변제 유예가 있는 채무는 유예기까지 변제기가\n도래하지 않은 것으로 보아야 （유예기=변제기） ［99다22281］", ["제479조", "제476조", "제477조"], 0, "채권소멸변제", 80],

  ["채권총론_C070", "나. 요건", "나. 요건\n① 변제 기타 출재로 채무자 채무 면하게 할 것: 대물변제 • 공탁 • 상계 포함\n② 변제자가 채무자에 대하여 구상권을 가질 것\n③ 변제할 정당한 이익 있거나（법정대위） 채권자승낙 있을 것（임의대위）\n- 법정대위（제481조） : 변제할 정당한 이익 = 이해관계（469조） （전술）\n\n공동채무자 • 보증인 • 물상보증인 • 제3취득자 • 후순위담보권자 • 이행 인수인\n\nO", ["제481조"], 0, "채권소멸변제", 82],
  ["채권총론_C071", "라. 대위자와 채권자 사이 효과", "라. 대위자와 채권자 사이 효과\n\n- 일부대위（제483조 제1 항） : 일부 대위변제 있으면 대위자는 변제한 가액에 비례하여 채\n권자와 함께 권리 행사一 공동행사설 ［통판］, 채권자우선설 ［통판］\n\n［判例］ 변제할 정당한 이익이 있는 자가 채무자를 위하여 일부를 대위변제한 경우\n채권자는 대위변제자에게 저당권 일부이전의 부기등기 해주어야 하나, 이 경우에도\n채권자는 일부 대위변제자보다 우선변제권 ［88다카1797］\n\n［判例］ 다만 일부 대위변제자와 채권자 사이 변제 순위를 따로 약정（우선회수특약）\n을 했다면 그에 따르고, 그러나 일부 대위변제자의 채무자에 대한 구상채권에 대해 보\n\n증한 자가 보증채무 변제하여 다시 대위할 경우에는 우선회수특약상의 권리까지 당연히\n대위 • 이전하지\n\nX V 채권 및 담보에 관한 권리만 이전될 뿐 ［2009다80460］\n\n［判例］ 우선회수특약은 부수적 약정으로서 일부 대위변제자는 자신을 다시 대위하는\n변제자가 특약을 승계 받도록 절차를 해줄 의무가 있고, 이를 위반하면 손해배상책\n\n임 O V 484조, 485조의 협조 • 보존의무 ［2015다206973］\n\n［判例］ 수인이 시기 달리하여 채권 일부씩 대위변제하면 각 일부 대위변제자로서 변\n\n제한 가액에 비례하여 근저당권 준공유 O, 이때 채권자는 일부 대위변제자들에 대\n하여 우선변제권 o. 그 후 일부 대위변제자들끼리 남은 한도액 안분배당, 여기서 채\n권자와 특정 일부 대위변제자 사이 변제 순위 따로 약정할 수 있으나 일부 대위변제\n자들 사이 안분 배당받을 권리는 침해\n\nX — 먼저 채권자 근저당권 최고액 범위 내에\n\n서 채권자에게 잔존 채권액 우선 배당 一 나머지 한도액을 일부 대위변제자들에게\n각 대위변제액에 비례하여 안분 배당 — 약정 당사자인 채권자와 일부 대위변제자\n\n사이에 배당액 조정 ［2011 다9013］\n［判例］ ‘근저당권’의 피담보채권 확정 전（=거래관계 종료 전）에 그 채권의 일부를\n\n양도 • 대위변제한 경우 근저당권이 양수인 • 대위변제자에게 이전할 여지\n\nX, 그러나\n\n피담보채권 확정되면 최고액 초과하지 않는 한 ‘근저당권’이나 ‘경락대금에 대한 권리’\n\n중 그 피담보채권액을 담보하고 남는 부분은 저당권의 일부이전 부기등기의 경료 여부\n와 관계없이 대위변제자에게 법률상 당연히 이전 O ［20이다53929］\n- ［判例2024］ 법정대위권자가 근저당권 피담보채무 일부를 대위변제한 경우 채권자\n가 대위변제자에 대해 가지는 우선변제권은 피담보채권액 한도로 보유 잔존 채권액\n\n전액에 o •- 이는 채무자에 대한 회생절차개시 전 채무자의 근저당권 피담보채무\n중 일부를 대위변제한 자와 채권자 사이도 마찬가지 O - 채무자 회생절차에서도\n채권자는 잔존 채권액 및 피담보채권액 한도에서 일부 대위변제자보다 우선하여\n\n회생담보권 행사 O, 일부 대위변제자는 후순위 회생담보권 ［2021 다262189］\n\nPART 1\n\n채권총론 • 변제 • 83", ["제483조"], 0, "채권소멸변제", 83],
  ["채권총론_C072", "- 법정대위자의 면책（제485조） : 법정대위자가 있는 상황에서 채권자의 고의 •과실로", "- 법정대위자의 면책（제485조） : 법정대위자가 있는 상황에서 채권자의 고의 •과실로\n\n담보 상실 - 감소된 때에 대위할 자는 상환 받을 수 없는 한도에서 면책\n\n면책 : ① 보증인• 연대채무자 등과 같은 채무자는 채무 면제 의미, ② 물상보증\n인.제3취득자등은 책임 소멸（근저당권의 소멸） 의미", ["제485조"], 0, "채권소멸변제", 84],
  ["채권총론_C073", "- 1, 2호 등의 ‘보증인’에는 물상보증인 포함 O", "- 1, 2호 등의 ‘보증인’에는 물상보증인 포함 O", [], 0, "채권소멸변제", 86],
  ["채권총론_C074", "한다는 설명（단. 미리 대위 부기 등기 필요하다는 점은 두 유형 공통임）이 이번 판례에서 직접적으", "한다는 설명（단. 미리 대위 부기 등기 필요하다는 점은 두 유형 공통임）이 이번 판례에서 직접적으\n\n로 명시되었음（기존 판례에서도 해석상 도출되는 법리）\n\n⑤ 물상보증인과 보증인 사이에는 인원수 비례 대위, 여기서 물상보증인 상호간에는 각\n부동산 가액 비례 대위, 보증인은 미리 대위의 부기등기 해야 제3취득자에 대하여\n\n대위 （제5호）", [], 0, "채권소멸변제", 87],
  ["채권총론_C075", "제3〜8절 대물변제, 공탁, 상계, 경개, 면제, 혼동", "제3〜8절 대물변제, 공탁, 상계, 경개, 면제, 혼동\n\n씨 대물변제 ■공탁■ 경개 • 면제 -혼동 슈\n\n1. 대물변제（제466조）\n- 의의 : 채무자가 채권자의 승낙을 받아 본래의 급부에 갈음하여 다른 급부를 함으로\n써 채권을 소멸시키는 계약\n\n- 유상계약.\n\n요물계약（현실적인 대물급부가 이루어져야 성립하는 계약）", ["제466조"], 0, "채권소멸기타", 88],
  ["채권총론_C076", "正辯 : 소유권이전등기는 ‘대물변제’로 추정한다는 취지로 보이며. 다만 본 사안은 채무가 3.000만", "正辯 : 소유권이전등기는 ‘대물변제’로 추정한다는 취지로 보이며. 다만 본 사안은 채무가 3.000만\n원임에 비하여 등기를 마친 부동산의 총 시가가 2억 원이 넘는 상황이어서 대물변제가 아닌 양도\n담보로 보았음\n\n- 대물변제의 예약（제607, 608조） : 채무자가 본래 급부에 갈음하여 대물변제를 할 것을\n\n이행기 전에 미리 약정하는 것 一 차용물의 반환에 갈음하여 다른 재산권 이전을 예\n\n약한 경우 예약당시 재산 가액이 차용액 • 이자 합산액 초과 금지（607조）\n위반 약정 무효（608조） 一 단. ［判例］ 607, 608조 위반하면 대물변제 예약으로서는 무효\n\n이나, ‘약한 의미의 양도담보’ 설정 약정으로는 유효, 채권자는 양도담보 약정을 원\n인으로 소유권이전등기청구 O, 아직 등기 마치지 않았다면 가담법은 적용 X ［98다\n\n5122이 羊 가담법\n（준）소비대차로 인한 채무일 것（=가담법） 一 매매 등 대금채무 담보라면 적용 X\n\n2. 공탁（제487조）\n— 변제공탁의 원인 : ① 채권자가 변제 받지 않거나 받을 수 없는 때, ② 변제자가 과실\n\n없이 채권자를 알 수 없는 때 ex 동일 채권에 채권양도• 가압류 • 압류가 동시에 도\n달한 경우,\n\n채권양도금지특약에 위반한 채권양도\n\n［判例］ 487조 후단 채권자 불확지의 ‘과실 없이 채권자 알 수 없는 경우’는 객관적\n으로 채권자• 변제수령권자 존재하나 채무자가 선량한 관리자 주의 다해도 채권자\n\n가 누구인지 알 수 없는 경우 一 채권양도금지특약이 붙은 채권이 양도된 경우 O\n\nV 양수인의 선악의 • 중과실 등에 따라 채권양도 효력 좌우 ［2000다55904］\n［判例］ 채권자 태도로 보아 채무자가 설사 채무 이행제공 했더라도 수령 거절했을\n것이 명백한 경우, 채무자는 이행제공 없이 바로 변제공탁 O ［93다42276］\n\n正辯 : 영구적 불수령의 경우 변제제공 없이도 채무불이행 면츠取460조）, 곧바로 공탁（487조） 가능,\n그러나 변제제공 하지 않은 상태에서 이후 쌍방 귀책사유 없이 불능이 된 경우 반대급부청구（538\n\n조 1항 2문）는 불가\n［判例］ 공탁은 현존 확정채무여야, 장래 채무 X, 불확정채무 X ［20144207245］\n\n正辯 : 일부공탁이 무효임을 생각하면 금액도 확정되지 않은 채무가 공탁 불허됨은 당연\n- ［判例］ = 일부공탁 X — 전부무효 O, 채무 일부소멸 효과도 없음 ［2005다\n\n37208］ — ［判例］ 그러나 금액 다툼 있는 채권에 대하여 채무자가 전액임을 밝히고\n공탁했는데 채권자가 일부로서 수령한다는 명시 •묵시적 유보 의사표시 없이 수령했\n다면 전부공탁 효력 O, 채무 전부소멸 O ［83다카88］ / 일부수령이라 유보했다면\n\n채무 일부소멸 O\n\nPART 1\n\n채권총론 • 대물변제•공탁•경개•면제•혼동 • 89", ["제487조"], 0, "채권소멸기타", 89],
  ["채권총론_C077", "채무자 변경 경개는 채권자• 신채무자간 계약으로, 구채무자 의사 反하면 X （501조）", "채무자 변경 경개는 채권자• 신채무자간 계약으로, 구채무자 의사 反하면 X （501조）\n채권자 변경 경개는 확정일자 증서로 제3자 대항 O, 451조 1항 준용（502조, 503조）", [], 0, "채권소멸기타", 91],
  ["채권총론_C078", "제5절 상계", "제5절 상계\n\n싸 상계 슈\n\n1 .서설\n— 채무자의 단독행위.\n\n조건 • 기한 X. 수동채권의 존재 자체가 담보적 기능\n\n‘상계계약’은 상계금지사유 등 요건 적용 X （당사자 합의로 결정）", [], 0, "상계", 93],
  ["채권총론_C079", "제도상 예외 : @ ‘타인이 가지는’ 채권으로 인정한 경우（연대채무 418조 2항, 보증", "제도상 예외 : @ ‘타인이 가지는’ 채권으로 인정한 경우（연대채무 418조 2항, 보증\n인 434조）, ® ‘타인에 대한’ 채권으로 인정한 경우（연대채무 426조 1항, 주채무자 445\n조 1항, 채권양도 451조 2항）", [], 0, "상계", 94],
  ["채권총론_C080", "의 행위가 불법행위 및 채무불이행을 구성하여 양 손해배상채권이 경합한 경우는 고", "[判例」] 496조는 고의의 불법행위에 적용, 고의 채무불이행에는 적용 X — 그러나 고\n의 행위가 불법행위 및 채무불이행을 구성하여 양 손해배상채권이 경합한 경우는 고\n의 채무불이행으로 인한 손해배상채권을 수동채권으로 해도 유추적용 O, 채무자의\n\n상계 X V 손해배상채권이 현실적 만족 받아야 하는 취지 동일 [2014다19783]\n\nPART 1\n\n채권총론 • 상계 • 95", [], 0, "상계", 95],
  ["채권총론_C081", "6）지급금지명 령 송달 당시 상계적상 갖춰야 하는지", "6）지급금지명 령 송달 당시 상계적상 갖춰야 하는지\n［大判全合］ 가압류명령 받은 제3채무자가 가압류채무자에 대한 반대채권을 가지고\n\n있는 경우 상계로써 가압류채권자에게 대항하려면, “® 가압류 효력 발생 당시에 양\n\n채권이 상계적상 있거나, ® 당시 자동채권이 변제기에 이르지 않았다면 수동채권\n\n（피압류채권）의 변제기와 동시에 또는 보다 먼저 변제기 도달하는 경우여야” ［82다카\n\n200, 2011 다45521］ —소위 ‘변제기 선도래설’\n正辯 : 판례는 결국 지급금지명령 송달 당시까지 자동채권 변제기가 반드시 도래할 필요는 없다\n는 취지임. 관련하여 ① 송달 당시 자동채권 변제기가 이미 도래한 상태였다면 변제기를 비교할 필\n\n요가 없다는 점, ② 위 전원합의체판결 ‘반대의견’（=틀린 지문）은 ‘자동채권의 변제기가 수동채권\n보다 늦게 도래하더라도 그 후 어느 시점에 결국 양 채권의 이행기가 도래했고 아직 채무자에 의하\n\n여 피압류채권이 추심되지 않았다면 제3채무자가 상계할 수 있다’는 입장인 점 등을 주의할 것\n\n［判例］ 수탁보증인에게 （면책행위로） 사후구상권 발생한 후에도 사전구상권은 소멸\n하지 않고 병존 （목적달성으로 일방 소멸하면 타방 소멸하는 관계）\n수탁보증인의 주채무자에 대한 사전구상권（442조）에는 담보제공청구권（443조）이 항\n\n변권으로 부착되어 있으므로 이를 자동채권으로 상계 원칙적 불허\n제3채무자（수탁보증인）가 압류채무자에 대한 사전구상권을 가지고 있는 경우에\n상계로써 압류채권자에게 대항하려면, ① 압류 효력 발생 당시 사전구상권에 부착된\n\n담보제공청구 항변권이 소멸（=보증채무 변제）하여 피압류채권과 상계적상에 있거\n나, ② 압류 당시 여전히 사전구상권에 항변권이 부착돼 있다면 제3채무자의 면책행\n위 등으로 항변권 소멸시켜 사전구상권을 통한 상계가 가능하게 된 시점이 피압류채\n\n권의 변제기보다 먼저 도래해야 ［2017다274703］\n正辯 : 498조에 관한 기존 판례 법리（변제기 선도래설）가 채권압류명령 받은 제3채무자 겸 보증인\n\n이 사전구상권으로 상계하는 경우에도 적용된다는 판례이며, 다만 ① ‘상계적상’의 의미에 ‘항변권\n소멸’을 포함시켜 해석하는 점, ② 항변권 소멸 시점이 수동채권의 변제기보다 ‘먼저’ 도래하여야\n한다고 표현한 점에 특색이 있음（私見으로, 소멸행위는 특정 시점에 일어나는 것이므로 ‘동시에’라\n\n는 표현이 없어진 것이라 생각됨）\n© 자동채권 취득 시점의 예외적 완화\n\n［判例］ 금전채권에 대한 가압류가 본압류로 전이하는 압류•추심명령 있는 때에는\n\n제3채무자는 채권 가압류 전에 압류채무자에게 대항할 수 있는 사유로 압류채권자\n\n에게 대항 O - 제3채무자의 압류채무자에 대한 자동채권이 수동채권（피압류채권）과\n서로 동시이행 관계면 가압류명령 송달（=가압류 효력 발생） 이후 생긴 자동채권이어\n\n도 제3채무자는 동시이행 항변 O - 그 상계로써 압류채권자에게 대항 O\n••• 이 경우 “자동채권 발생 기초 원인은 수동채권 가압류 전에 이미 성립 •존재하\n\n고 있었으므로, 그 자동채권은 498조의 ‘지급금지명령을 받은 후에 취득한 채권’ X”\n\nPART 1\n\n채권총론 • 상계 • 97", [], 0, "상계", 97],
  ["채권총론_C082", "— 매매잔금채권에 대한 가압류 ‘후’ 매수인이 매매부동산의 경매진행을 막고자", "[2000다43819] （= ‘채권양도’ 451조 2항과 상계도 같은 법리）\n— 매매잔금채권에 대한 가압류 ‘후’ 매수인이 매매부동산의 경매진행을 막고자\n\n부동산에 마쳐진 가압류의 집행채권을 변제공탁함으로써 매도인에 대하여 취득한\n구상금채권을 자동채권으로, 매도인의 매매 잔금채권에 대한 가압류로부터 본압류\n\n및 추심명령을 받은 채권자에게 상계로 대항 O V “매수인의 매매잔금지급의무와\n\n매도인의 가압류기 입등기말소의무는 동시이행관계 O, 매수인의 대위 변제로 인해\n\n매도인이 부담하는 구상채무는 가압류기 입등기 말소의무의 변형으로서 매수인의 매매\n잔금지급의무와 여전히 서로 동시이행 관계 O”\n\nX", [], 0, "상계", 98],
  ["채권총론_C083", "임차인의 부속물매수청구 후에 임대인의 상계로 부속물매 매대금채권이 상계적상일", "임차인의 부속물매수청구 후에 임대인의 상계로 부속물매 매대금채권이 상계적상일\n（부속물매매대금채권의 발생일）로 소급하여 소멸하더라도 상계적상 시점부터 부속물\n\n매매대금채무와 동시이행관계 소멸하여 임차인이 이행지체 •불법점유로 되는 것은 X\n\n[2024다317332]\n正辯 : 임대차 단원에서 추가 서술하는 내용 참조", [], 0, "상계", 99],
  ["채권총론_C084", "6. 상계와 소멸시효（제495조）", "6. 상계와 소멸시효（제495조）\n— 시효 완성된 （자동）채권이 완성 전 상계적상이었다면 채권자는 상계 O （제495조）\n\n【判例] BD 매도인 •수급인의 담보책임 기초한 매수인 •도급인의 손해배상채권이\n제척기간 지난 경우도 495조 유추적용 O — 매수인•도급인은 제척기간 경과 전에\n\n상대방 채권과 상계할 수 있었다면 제척기간 경과 후에도 상계 O V 당사자들이 채\n권 • 채무 정산을 기대한 신뢰보호 필요는 소멸시효와 동일 [2018다255648]", ["제495조"], 0, "상계", 100],
  ["채권총론_C085", "제6장 수인의 채권자와 채무자", "제6장 수인의 채권자와 채무자\n제2절 분할채권관계\n\n제3절 불가분채권관계\n\n“ 서론, 분할채권관계, 불가분채권관계 슈\n\n1. 수인의 채권자 채무자 서론\n- 공통 목차 : 9 대외관계 / © 1인에게 생긴 사유의 효력 / © 대내적 효력\n\n- ©의 절대효 • 상대효 판단할 9가지 사항\n채권소멸사유（변제 • 대물변제 • 공탁• 상계 • 경개 . 면제 • 혼동） / 시효완성 / 이행청구\n\n— 변제 -” 변제제공 ’ 채권자지체\n\n이행청구 一 시효중단 • 이행지체 （‘이행청구’ 사유로 인한 경우만 관련됨）\n- 절대효 범위가 넓으면 채무자에게 유리（단, 이행청구는 채권자에게 유리）\n\n2. 분할채권관계\n- 가분급부에서 채권자• 채무자가 여럿이고 다른 의사표시 없는 경우의 원칙（제408조）\n\n- 분할채권 ［判例］ : ① 공동매수인이 지분권에 기해 가지는 소유권이전등기청구권,\n② 공유물에 대한 제3자의 불법행위 • 부당이득에 관한 공유자들의 손해배상청구권 우\n\n부당이득반환청구권（각자 지분 비율로 가지는 채권을 행사하게 됨）\n\n- 분할채무 ［判例］ : ① 공동불법행위자 1인에게 복수의 공동불법행위자들이 부담하\n는 구상채무（다만 구상권자인 공동불법행위자의 과실비율 0인 경우는 부진정연대채\n무）,\n\n②금전채무가 상속된경우\n\nPART 1\n\n채권총론 • 서론. 분할채권관계. 불가분채권관계 •\n\n101", ["제408조"], 0, "상계", 101],
  ["채권총론_C086", "3. 불가분채권관계", "3. 불가분채권관계\n가. 불가분채권（제409, 410조）\n- 절대효 : 청구, 이행 （그에 의한 시효중단• 이행지체, 변제 • 변제제공 • 채권자지체 O）\n\n- 불가분채권자 중 1인과 채무자간 경개 • 면제 一 전부 이행받은 다른 채권자는 그 1인\n이 권리 잃지 않았으면 분급할 이익을 채무자에게 상환해야（410조 2항）", [], 0, "다수당사자채권", 102],
  ["채권총론_C087", "있거나 수익 비율이 다르면 그에 따라 부담부분 결정 ••• 411조, 425조 1항, 424조, 연", "있거나 수익 비율이 다르면 그에 따라 부담부분 결정 ••• 411조, 425조 1항, 424조, 연\n대채무자 사이에 관한 2012다97420 판결 [2020다208195]\n\n正辯 : 위 판결을 근거로 ‘공유물매매의 계약금반환의무는 불가분채무’라 보는 견해가 있으나（가령\n\n2023년 8모 채점기준）, 위 대법원 판결은 계약금반환의무를 불가분채무로 본 1심의 판단을 전제\n로 법리만 판단한 것이고, 1 심은 ‘0| 사건 매매계약이 단순한 부동산 매매가 아닌 △호텔 사업권을\n\n포함한 사업 일체의 매매로서 그 소유권이전의무, 대금지급의무 불가분적이고, 해제 원상회복의무\n\n역시 불가분채무’라고 본 것에 불과하므로, 위와 같은 일반화는 부당함（私見）.", [], 0, "다수당사자채권", 103],
  ["채권총론_C088", "제4절 연대채무", "제4절 연대채무\n\n쏘 연대채무 슈\n\n1. 서설, 대외관계\n- 수인이 전부를 각자 이행할 의무, 1인의 이행으로 다른 채무자 의무 면함（제413조）\n— 각 채무 독립성 : 조건 • 기한 • 이행기 • 이행지 • 보증인유무 다를 수 있음\n어느 연대채무자의 법률행위 무효 • 취소는 다른 연대채무자에게 영향 無（제415조）\n\n- 성립 : 법률행위（계약）, 법률의 규정 一 제616조. 제654조（수인의 사용차주, 수인의\n\n임차인）, 상법 제57조 제1항（수인이 1인 • 전원에게 상행위 되는 행위로 인하여 채무를\n부담한 때）, 제832조（부부 일상가사 연대책임）. 병존적 채무인수（부탁에 의한 원칙적\n인 경우） 正辯 : 연대채무는 언제나 소멸시효 규정과 연계성 숙지（제416조, 제421조）\n\n— 어느 연대채무자 or 동시 • 순차로 모든 연대채무자에 전부 • 일부 이행청구（제414조）\n\n2. 1 인에게 생긴 사유의 효력 一 절대적 효력（제416〜422조）\n— 변제 • 대물변제 • 공탁 • 상계 • 경개 • 면제 • 혼동, 소멸시효완성（제421 조）, 이행청구（제416조）\n청구에 의한 시효중단• 이행지체 O, 변제 • 변제제공 • 채권자지체\n\nO\n\n正辯 : 연대채무에서 ‘청구’에 의한 시효중단의 절대효에 관하여, 불완전한 최고만 포함하는 견해도\n\n있으나, 법전협 출제기준 및 실무를 종합하여. ‘재판상 청구’도 포함하는 견해로 정리할 것（즉, 연대\n채무자 1 인에 대해 소를 제기 하면 다른 연대채무자도 완전한 시효중단 효력 있는 것）.\n\n— 상계（제418조） : 제1항 절대효\n\n제2항 자동채권 가진 연대채무자의 부담부분에 한하여 다른 연대채무자가 상계 O\n\n— 부담부분 한정 절대효 : 소멸시효 완성, 면제, 혼동", ["제413조", "제415조", "제616조", "제654조", "제57조 제1항", "제832조"], 0, "다수당사자채권", 104],
  ["채권총론_C089", "- 상대적 효력 : 승인 •압류 •가압류 •가처분에 의한 시효중단, 시효이익 포기, 확정판결", "- 상대적 효력 : 승인 •압류 •가압류 •가처분에 의한 시효중단, 시효이익 포기, 확정판결\n에 의한 시효기간 연장（=보증인）, 채권양도 통지（手보증인）\n\n- 연대의 면제 : 해당 채무자의 채무액을 부담부분 범위로 제한해주는 것\n1인에게만 ‘연대의 면제’ 해주면 그만이 채무 감축 （다른 연대채무자에 영향 無）\n연대의 면제 받은 채무자라고 하여 내부적 구상의무가 없는 것은 아님\n연대채무자 전원에게 ‘연대의 면제’ 해주면 분할채무로 변경\n\n3. 대내관계\n\n- 구상권의 범위（제425조） : 다른 연대채무자의 ‘부담부분’에 대하여 구상하며\n출재액 + 면책일 이후 법정이자 + 피할 수 없는 비용 + 손해\n\n— 준용 : 수탁보증인, 분별이 익無 공동보증인간（불가분, 연대보증, 보증연대）\n\n［判例］ 공동불법행위자간（응소의 소송비용 포함） ［94다4825刀\n\n［判例2022］ 조합채무 변제한 조합원이 다른 조합원에게 구상 ［2022다211416］\n— 출재 : 자기 재산 감소 요하므로 면제\n\nX, 시효완성 X\n\n- 구상의 요건 관련 : 출재액이 자기 부담부분 넘지 않아도 바로 구상 O ［통판］\n\n（羊 부진정연대채무, 공동보증인간 : 자기 부담부분 넘어야 구상）\n\n- 통지의무（제426조） : 구상요건 혹은 구상권 제한 의미\n제1항 사전통지 게을리 : 다른 연대채무자는 채권자에게 대항할 사유로 부담부분에\n한하여 대항 O, 상계였다면 자동채권이 면책시킨 연대채무자에게 이전됨\n\n제2항 사후통지 게을리 : 다른 연대채무자가 ‘사전통지 하고［통］’ 선의로 면책행위 하\n면 면책행위 유효 주장 O （다른 연대채무자도 사전통지 안했다면 먼저 이뤄진 변제\n만 유효 •/ 이중변제의 일반원칙 = 주채무자 • 수탁보증인 사안 판례 有）\n\n제2항의 유효 주장은 사후통지 게을리한 연대채무자에 대해서만 상대적 효력 ［통］\n正辯 : A, B 사이에서는 B의 甲에 대한 90만원 변제만 유효하므로 B는 A에게 30만원 구상 O.\n그러나 상대효이므로 C에 대하여는 A만이 30만원 구상 O, 이때 B는 A가 C로부터 받은 30만원에\n\n대하여 부당이득반환청구 O, 한편 므는 甲에 대하여는 90만원 부당이득반환청구 O, 다만 위와 같\n\n이 A로부터 구상•부당이득반환 받은 한도에서 이러한 B의 甲에 대한 채권이 A에게 이전\n- 상환무자력자（제427조） : 구상권의 확장 의미\n\n제1항 양적 확장 : 상환무자력자의 부담부분은 구상권자와 다른 채무자가 부담부분\n에 비례하여 분담, 다만 구상권자 무과실일 것\n\n제2항 인적 확장 : 다른 채무자가 ‘연대의 면제’ 받았다면 위 다른 채무자가 분담할\n부분을 채권자가 부담\n\nPART 1\n\n채권총론 • 연대채무 • 105", ["제425조", "제426조", "제427조"], 0, "다수당사자채권", 105],
  ["채권총론_C090", "소 부진정연대채무 슈", "소 부진정연대채무 슈\n\n1. 의의\n- 의의\n\n［判例］: “서로 별개 원인으로 발생한 독립된 채무라 하더라도 동일한 경제적\n\n목적 가지는 채무”, 양 채무의 발생원인 • 액수 등이 다를 수 있음 ［2006다47677］\n- 불법행위책임자 상호간 : 35조 법인과 대표자, 756조 사용자와 피용자,\n\n755조 책임무능력자의 감독자와 대리감독자, 760조 공동불법행위자 사이\n- 채무불이행책임과 불법행위책임 : ［判例］ 채무자와 391조 이행보조자 사이\n\n［判例］ 도난사건에서 경비용역 업체와도둑 ［2005다19378］\n- ［判例］ 병존적 채무인수가 ‘부탁 없이’ 이루어진 경우 채무자와 인수인 사이 ［2009다\n32409］\n\n- ［判例2022］ 回9 미등기건물의 원시취득자와 양수인（사실상 처분권자）의 부지\n점유 • 사용 부당이득반환채무 ［2018다243133］\n\n2. 1 인에게 생긴 사유의 효력\n- 절대적 효력 : 변제 • 대물변제 • 공탁 • 상계 ［통판］\n［大判全合］ “부진정연대채무자 중 1인이 채권자에 대한 반대채권으로 상계한 경우\n채무소멸 효력은 다른 부진정연대채무자에게 미침（절대효） v 변제 • 대물변제 • 공탁과\n동일하게 채권은 현실적 만족 얻어 목적 달성” - 다른 채무자의 악의 여부 불문, 1인\n이 ‘상계계약’한 경우도 마찬가지 ［2008다97218］\n\n［判例］ 부진정연대채무에서 1인의 상계가 다른 부진정연대채무자에게 절대적 효력\n있는 것과는 별론으로, 부진정연대채무자 1인이 채권자와 상계할 채권 가지고 있음\n\n에도 상계하지 않음을 이유로 다른 부진정연대채무자가 그 채권으로 상계할 수 X,\n\n418조 2항은 부진정연대채무에는 적용 X ••• 부진정연대채무자 사이에는 고유 의미\n의 부담부분 없으므로（418조 2항은 부담부분 존재를 전제로） ［93다21521］\n\n- 부진정연대채무에서 다액 채무자의 일부 변제 등으로 채무가 소멸하는 순서\n학설 : 1） 외측설（단독 부담 부분부터 소멸）, 2）내측설（공동 부담 부분부터 소멸）, 3）\n\n과실비율설（채무액 혹은 과실의 비율로 소멸）\n\n正辯 : 안분설은 학설적으로 ‘채무액’ 비율로 소멸하는 것인데 판례는 ‘과실비율설’이라는 용어로\n‘소액채무자의 과실비율에 상응하는 만큼 소멸한다’는 표현을 쓰고 있음. 판례가 쓰는 표현으로 답안\n\n을 작성하되, 엄밀히는 전자가 정확한 용어가 아닐까 생각됨（私見）", [], 0, "다수당사자채권", 106],
  ["채권총론_C091", "3. 대내관계", "3. 대내관계\n- 부진정연대채무는 주관적 공동관계가 없어 부담부분을 생각하기 어려우나, 법률의\n\n규정 내지 판례이론을 통해 구상권 유사의 법률관계 성립 O\n자기 부담부분 이상을 변제하여야 구상 o ［통판］ （羊 연대채무）\n- 법률의 규정 : 35조와 61 65조 해석상, 756조 3항\n\n【判例］ 공동불법행위자는 내부관계에서 과실 정도에 따라 일정한 부담부분이 있고,\n공동불법행위자 중 1인이 자기 부담부분 이상을 변제하여 공동면책 얻게 했다면 다\n른 공동불법행위자에게 그 부담부분 비율에 따라 구상권 O ［96다50896］\n\n［判例］ 부진정연대채무의 내부관계도 형평의 원칙상 일정한 부담부분 있을 수 있고\n각자 고의 • 과실 정도에 따라 결정, 부진정 연대채무자 1인이 자기 부담부분 이상을\n\n변제하여 공동면책 얻게 했다면 다른 부진정연대채무자에게 부담부분 비율에 따라\n구상권 O ［2005다19378］ — （공동불법행위 사안이 아님） 경비용역업체（채무불이\n행）와 도둑（불법행위） 사이에서도 구상권 인정\n\n- ［判例］ 부진정연대채무에 있어서는 상호간 통지의무 X, 426조 유추적용 X V 426조\n는 연대채무자 상호간 주관적 연관관계에서 기인한 것인데 부진정 연대채무에서는 주\n\n관적 연관관계 없이 단지 채권만족이라는 목적만 공통 ［98다5777］", [], 0, "다수당사자채권", 108],
  ["채권총론_C092", "제 5절 보증채무", "제 5절 보증채무\n\n싸 보증채무 슈\n\n1 .서설\n가. 법적 성질\n\n— 독립성（소멸시효기간 따로 결정）, 동일성, 부종성, 보충성\n- 부종성\n© 성 립상 : 주채무 무효 • 취소 • 소멸하면 보증채무도 무효 • 소멸", [], 0, "다수당사자채권", 109],
  ["채권총론_C093", "© 채권자의 의무（제436조의2）", "© 채권자의 의무（제436조의2）\n\n: 보증계약 체결 • 갱신할 때 내용에 영향 미칠 주채무\n\n자의 신용정보 있으면 알려야,\n\n체결 후에 지체없이 보증인에게 알려야 할 사유 :\n\n주채무 • 종속채무를 3개월 이상 이행 아니할 경우, 이행기에 이행할 수 없음을 미리\n\n안 경우, 주채무자 신용정보에 중대한 변화 생겼음을 안 경우\n— 채권자 의무 위반으로 보증인 손해 생기면 법원이 보증채무 감경 • 면제 가능\n\n© 제436조 삭제 : 취소원인 있는 채무의 보증인이 보증계약 당시 취소원인 알았다면\n주채무 불이행 • 취소시 주채무와 동일한 목적 독립채무 부담한 것 一 X\n@ 근보증（제428조의3） ： 불확정 다수 채무에 대해서 보증 O, 이때 최고액을 보증인의\n기명날인 • 서명 있는 서면으로 특정하지 아니하면 보증계약 무효\n\n［判例］ BH 428조의2 1항 ‘보증은 그 의사가 보증인의 기명날인 또는 서명\n있는 서면으로 표시돼야 효력 발생’ 규정의 ‘보증인 서명’은 타인이 대신할 수\n\nX,\n\n그러나 ‘보증인 기명날인’은 타인 대행 방법으로도 O — 428조의3 1항에서 불확\n\n정한 다수 채무에 대한 보증은 ‘채무 최고액을 서면으로 특정’해야 한다는 규정\n은 입법취지상 최고액 명시 기재 않더라도 얼마인지 객관적으로 알 수 있을 만큼\n\n구체적 기재 필요 一 현재 및 장래 부담할 레미콘 대금지급채무 연대보증에서 단가\n등은 기재되었으나 공급량• 최고액 기재 없으면 최고액 특정\n\nX ［2018다282473］\n\n다. 범위\n\n- 이자 . 위약금 • 손해배상 • 기타 종속 채무 담보（제429조 제1 항）\n\n［判例］ 타인간 계약 보증한 보증인은 피보증인 채무불이행으로 계약 해제되었음으로\n인한 피보증인의 원상회복의무도 책임 O ［기다1474］\n\n［判例］ 연대보증인이 주채무자 채무 중 일정 범위를 보증을 한 경우（일부보증）, 주채무\n자가 일부변제를 하면 주채무자 채무 전부를 대상으로 변제충당 일반원칙에 따라 충\n당되고, 충당 후 주채무가 남아있는 한 연대보증인은 보증채무 면할 수 없고 보증 범\n위 내에서 보증책임 부담 ［2016다2840, 2002다34017］ = 외측설\n\n［判例］ 보증채무는 주채무와 별개 채무 一 보증채무 자체의 이행지체로 인한 지연손\n해금은 보증한도액과 별도로 부담 O — 보증채무 연체이율의 특별한 약정 있으면\n약정에 따라, 특별한 약정 없으면 거래행위 성질에 따라 상법 • 민법 법정이율 적용,\n\n주채무에 약정 연체이율 당연 적용은 X ［2001 다29803］\n- 목적 • 형태상의 부종성 （제430조） : 주채무의 목적 • 형태보다 보증인 부담이 중하면 주\n채무 한도로 감축\n\n［判例］ 채권자 고의로 채권 추심을 하지 않아 채권이 확대된 경우 보증안은 확대된\n부분에 대하여는 보증책임\n\nX ［77다796］", ["제436조의2", "제436조", "제428조의3", "제429조", "제430조"], 0, "다수당사자채권", 110],
  ["채권총론_C094", "2. 보증인의 권리", "2. 보증인의 권리\n가. 주채무자 항변권의 행사（제433조）\n\n제1항 : 주채무자의 항변으로 채권자에게 대항 O\n\n제2항 : 주채무자의 항변포기는 보증인에게 효력 X\n주채무의 무효 • 취소（된 사실） • 동시이행관계 - 변제기미도래 • 변제 등 사유 주장\n\n주채무자의 기한이익 포기, 소멸시효이익 포기는 보증인에게 효력\n\nO\n\nX\n\n［判例］ 보증채무 시효 중단되었더라도 주채무 소멸시효 완성하면 주채무 당연 소멸하\n고 부종성에 따라 보증채무 역시 당연 소멸 O — 주채무 소멸시효가 완성되어 보증채\n무 소멸된 상태에서 “보증인이 보증채무 이행 • 승인하였더라도 주채무자가 아닌 보증인\n의 행위로 주채무 소멸시효 이익 포기 효과 X, 주채무 시효소멸에도 불구하고 보증채무\n\n이행하겠다는 의사표시 등 부종성 부정할 특별한 사정이 없는 한, 보증인은 여전히 주\n\n채무 시효소멸 이유로 보증채무 소멸 주장 O” ［2010다51192］\n\n正辯 : 주채무 시효완성 소멸된 상태에서 채권자가 보증인 소유 부동산에 강제경매 신청하여 배당\n받음에 보증인이 아무런 이의 않았어도 부종성 부정할 특별한 이유 없다는 판결\n\n［判例］ 특별한 사정 인정하여 보증채무 본질인 부종성을 부정하려면 보증인이 주\n채무 시효소멸에 불구하고 보증채무 이행하겠다는 의사를 표시하거나 채권자와\n\n그러한 약정했어야 一 단지 보증인이 주채무 시효소멸에 원인을 제공한 것만으로는\n부종성 부정\n\nX ［2016다21162이\n\n나. 주채무자 상계권의 행사（제434조）\n보증인은 주채무자의 채권에 의한 상계로 채권자에게 대항 O\n\n보증인 자신의 채권자에 대한 채권으로는 당연히 상계\n\nO\n\n［判例］ 채권자가 주채무자와 상계적상에 있음에도 상계하지 않았다고 보증인이 이를\n이유로 보증채무 이행 거절할 수 X\n\n••• 상계자 의사 자유 ［2015다209347］\n\n正辯 : 434조는 주채무자의 상계적상 갖춘 상계권을 보증인이 대신 행사하는 것이고, 위 판례는 채\n권자가 상계적상 갖춘 상계권을 행사하지 않는 상황（즉, 434조와는 무관한 상황으로 주채무자가\n\n상계적상 아닌 상황일 가능성이 큼）이므로 구별해야 함\n\n다. 채무이행의 거절（제435조）\n주채무자가 채권자에 대해 취소권 • 해제 • 해지권 있는 동안 보증인은 이행을 거절\n\nO\n\n계약당사자 아닌 보증인이 직접 행사는 못하지만 이행을 거절하도록 한 것\n\nPART 1\n\n채권총론 • 보증채무\n\n.111", ["제433조", "제434조", "제435조"], 0, "다수당사자채권", 111],
  ["채권총론_C095", "라. 최고 • 검색 항변권（제437조）", "라. 최고 • 검색 항변권（제437조）\n주채무자의 변제자력 및 집행 용이함 증명하여 먼저 주채무자에게 청구 • 집행할 것\n항변 O — 보충성, 이행지체책임 면제 효과 / 연대보증인은 보충성\n\nX （단서）\n\n3. 주채무자 • 보증인에게 생긴 사유의 효력\n가. 주채무자에게 생긴 사유 一 절대적 효력\n- 그러나 주채무 부담을 가중하는 것은 보증인에 효력\n\nX\n\n［判例］ 보증인은 주채무자의 채무불이행 손해배상채무도 보증책임 지지만 보증인의\n관여 없이 채무자와 채권자 사이 합의한 손해배상 예정액에 대하여 보증인으로서는\n채무자 부담 손해배상 책임 범위 초과 않는 한도에서만 보증책임 •■• 보증인 의무는\n\n보증계약 후 채무자의 법률행위로 확장 • 가중될 수 X ［94다3825이\n\n［判例］ 보증인이 임대인의 임대차보증금반환채무를 보증한 후 임대인과 임차인 간에\n임대차계약과 관계없는 다른 채권으로써 연체차임 상계 약정하는 것은 보증인에게\n\n불리한 것으로 보증인에게 효력\n\nX ［98다22918］\n\n正辯 : 보증금은 그 ‘속성상’ 연체차임이 ‘당연히’ 공제되어야 하는데 연체차임채권이 전혀 상관없\n는 채권과 상계됨으로써 보증인이 부담하는 보증금반환채무에서 당연공제될 기회 박탈되어 결과\n\n적으로 보증인 부담 가중으로 본 판례\n\n— ［判例］ 주채무 변제기 연장은 보증인에게 효력 O V 보증인 책임 가중 아님 ［95다49141］\n- 주채무자에 대한 시효 중단은 보증인에 효력 （제440조） : 169조, 176조의 예외\n\n［判例］ 주채무자에 대한 압류 • 가압류 • 가처분이라고 하더라도 보증인에게 통지 없이\n보증인 시효 중단 O ［2005다35554］\n\n440조는 부종성에서 비롯된 규정 X （［判例］ 회사정리법이 보증채무의 부종성을 배\n제하고 있으나 440조는 적용 ［93다47431］）\n\n［判例］ 주채무자 상대로 승소판결 확정되어 시효기간 10년으로 연장되어도（165조） 보\n증인에게 시효기간 연장효과 X ［86다카1569］\n나. 보증인에게 생긴 사유 一상대적 효력\n- 그러나 보증인의 변 • 대 • 공 • 상 사유（채권 만족）는 주채무자에 채무소멸 효력 O", ["제437조", "제440조"], 0, "다수당사자채권", 112],
  ["채권총론_C096", "［判例2023］ 수탁보증인이 주채무자의 443조 담보제공청구에 응하여 구상금액 상당", "［判例2023］ 수탁보증인이 주채무자의 443조 담보제공청구에 응하여 구상금액 상당\n한 담보 특정하여 제공할 의사 표시하면 법원은 주채무자가 수탁보증인으로부터 그\n\n특정한 담보 제공받음과 동시에 442조 사전구상의무 이행해야 한다고 판결해야 一\n수탁보증인이 주채무자의 담보제공청구 거절하거나 상당한 담보 제공 의사를 표시하\n지 않는다면 법원은 수탁보증인의 사전구상금 청구 기각 판결 ［2020다283578］\n\n- ［判例］ 사후구상권과 사전구상권의 소멸시효는 각각 별도 진행, 사후구상권의 소멸\n시효는 사전구상권 발생 여부 상관없이 사후구상권이 발생하여 행사할 수 있는 때로\n\n부터 진행 ••• 양자는 발생원인 • 법적 성질 달리하는 별개 독립 권리 ［91 다37553］\n나. 비수탁보증인의 구상권\n\n— 면책행위 당시 이 익을 얻은 한도（제444조 제1항）\n의사에 反하여 보증했다면 （구상권 행사 당시） 현존이 익의 한도（제444조 제2항）\n\n다. 통지의무 : 구상권 제한\n- 보증인의 통지의무（제445조） : 사전 • 사후 두 번의 통지의무 有\n\n제1항 사전통지 게을리 : 주채무자는 채권자에게 대항할 사유로 보증인에 대항 O,\n상계였다면 자동채권이 보증인에게 이전됨\n\n제2항 사후통지 게을리 : 주채무자가 선의로 면책행위 하면 면책행위 유효 주장 O\n正辯 : 이때는 주채무자가 사전통지 할 필요는 없음（주채무자는 애초에 사전통지의무 없음）\n\n［判例］ 수탁보증인은 주채무 변제기 연장 불문 본래 변제기 도래하면 사전구상권 O\n（442조 2항） 一 수탁보증인이 본래 변제기 도래 후 과실 없이 변제 기타 출재로\n주채무 소멸시킨 후 주채무자에 통지했다면 주채무자는 통지 받은 후 채권자와의\n변제기 연장 합의로서 수탁보증인의 사후구상권에 대항 X（445조 1항） ［2006다22715］\n正辯 : 442조 2항에 의해 주채무자는 채권자와의 변제기 연장 합의로 수탁보증인의 사전구상권\n에 대항할 수 없는데, 나아가 수탁보증인의 ‘사후통지’를 받은 주채무자는 그 후 채권자와 변제기\n연장 합의했더라도 이로써 수탁보증인의 ‘사후구상권’에도 대항할 수 없다고 판시한 판례\n\n- 주채무자의 통지의무（제446조） : 수탁보증인에게 사후통지만 （비수탁 X, 사전통지 X）\n사후통지 게을리 : 보증인이 ‘사전통지 하고［통판］’ 선의로 면책행위 하면 주채무자에\n게 면책행위 유효 주장 O\n\n少 보증인은 사전 • 사후 두 번의 통지의무 有\n\n【判例］ 수탁보증에서 주채무자가 면책행위 하고도 보증인에게 사후통지 않던 중에\n보증인도 사전통지 아니하고 이중의 면책행위 한 경우, 보증인은 주채무자에 대해\n\n446조에 의한 자기 면책행위 유효 주장 X - “이중변제의 기본 원칙으로 돌아가", ["제444조 제1항", "제444조 제2항", "제445조", "제446조"], 0, "다수당사자채권", 114],
  ["채권총론_C097", "먼저 이뤄진 주채무자의 면책행위 유효, 보증인의 면책행위 무효, 보증인은 주채무자", "먼저 이뤄진 주채무자의 면책행위 유효, 보증인의 면책행위 무효, 보증인은 주채무자\n에게 구상권 X ••• 446조는 445조 1항을 전제로, 사전통지 않은 보증인까지 보호하려는\n취지\n\nX ’ [95446265] - 보증인은 채권자를 상대로 부당이득반환청구 O\n\n라. 주채무자 수인인 경우\n- 주채무가 연대채무 • 불가분채무일 때 그 중 1인을 위한 보증인이 변제하면 다른\n\n연대 • 불가분채무자에 대해 그 부담부분에 한하여 구상 O （제447조） : 결제 간편 취지", ["제447조"], 0, "다수당사자채권", 115],
  ["채권총론_C098", "분별의 이익 없는 공동보증인（제448조 제2항 참조） :", "분별의 이익 없는 공동보증인（제448조 제2항 참조） :\n@ 주채무가 불가분급부인 경우, ® 연대보증인, © 보증연대를 한 경우\n- 보증인 각자가 주채무 전액 채무 부담", ["제448조 제2항"], 0, "다수당사자채권", 116],
  ["채권총론_C099", "그 부담부분 초과하면 그 초과부분은 ‘주채무자의 구상채무’와 ‘다른 연대보증인들의", "그 부담부분 초과하면 그 초과부분은 ‘주채무자의 구상채무’와 ‘다른 연대보증인들의\n각 부담비율 상응한 구상채무’를 동시에 감소시킴 [2009다46873]\n\n— 주채무자 명의 사용 허락한 자와 연대보증인 사이의 법률관계", [], 0, "다수당사자채권", 117]
