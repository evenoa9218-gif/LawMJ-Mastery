  ["채권총론_C008", "3. 이행지체", "3. 이행지체\n가. 요건\n\n- ① 이행기에 ② 이행이 가능함에도 ③ 이행을 게을리 ④ 귀책사유 ⑤ 위법성\n\n- 이행지체의 시점（제387조）\n\n: 엄밀히는 그 ‘다음 날’부터 지체책임\n\n@ 확정기한 : 기한 도래한 때\n\n© 불확정기한 : 기한 도래함을 안 때 O소멸시효 : 기한 객관적 도래한 때）\n© 기한 정함 없는 채무 : 이행청구를 받은 때 （羊소멸시효 : 채권 발생한 때）\n아. 부당이득반환채무, 지 연손해금채무（손해배상채무）\n\n@ 반환시기 정함 없는 소비대차 : 상당 기간 정하여 최고 후 상당 기간 경과한 때\n\n（••• 603조 2항）\n- 채권자취소소송• 이혼소송（형성판결）의 가액배상• 재산분할 : 판결확정일 다음 날부\n터 민법이 정한 연 5% 지체책임\n\n— 확정기한부 채권도\n쌍방 이행기 경과하면 모두 기한 정함 없는 채무로 되어 일방이 자기 채무 이행제공\n\n하면서 이행 최고해야 상대방이 그 다음날부터 지체책임", ["제387조"], 0, "채무불이행", 10],
  ["채권총론_C009", "—  EM 다만 2002. 7. 1. 시행 민집법 248조 1항에 의하여 현재는 압류의 경합", "—  EM 다만 2002. 7. 1. 시행 민집법 248조 1항에 의하여 현재는 압류의 경합\n없어도 ‘집행공탁’으로 가능\n\n용해야\n\nPART 1\n\n채권총론 • 채무불이행 • 11", [], 0, "채무불이행", 11],
  ["채권총론_C010", "음날부터 연 12%의 현행 소촉법이 적용된다는 핀t례. 그러나 확정된 판결금 중 원금 부분은 여전히", "음날부터 연 12%의 현행 소촉법이 적용된다는 핀t례. 그러나 확정된 판결금 중 원금 부분은 여전히\n\n과거 당시의 소촉법 연 20%가 적용됨.\n\n가령 소장 부본 송달일까지의 지연손해금에 대하여 이행청구를 하는 경우, （d 원금 및 소장 부본\n송달일 다음날부터 연 20% 지연손해, ② 원금에 대한 소장 부본 송달일까지의 지연손해금 합계액\n\n및 소장 부본 송달일 다음날부터 연 12% 지연손해를 승소할 수 있음.\n- - 기한의 이익 상실 0 법정 상실사유（388조） : 담보 손상• 감소 • 멸실 • 제공불이행\n© 특약 :  해제（제544조） 요건 : 지 ■ 최 • 아 （후술）\n④ 책임가중（제392조） : 채무자는 이행지체 중에 생긴 손해는 과실이 없어도 배상책임\n（본문） = 이행불능책임 [통] — 그러나 이행기에 이행했어도 손해 면할 수 없는\n\n경우는 배상책임 X （단서）", ["제544조", "제392조"], 0, "채무불이행", 12],
  ["채권총론_C011", "4. 이행불능", "4. 이행불능\n가. 개념\n\n- 이행불능 : 채권성립 후에 채무자 귀책사유로 불능하게 된 경우\n\n- 후발적 불능, 사회통념상 불능  이중매매 후 제2매수인에게 등기 이전되면 제1매매에 이행불능 O — 그러나\n제2매수인 적극가담인 경우는 예외적으로 제2매매계약 및 제2매수인 등기 무효,\n제 1매수인은 ’채권자대위’ 방법으로 제2매수인 등기 말소한 후 매매 소이등 O\n\n- 0다28604 전원합의체 판례 （후술）\n\nPART 1\n\n채권총론 • 채무불이행 • 13", [], 0, "채무불이행", 13],
  ["채권총론_C012", "나. 효과", "나. 효과\n① 전보배상: 본래 급부청구권 소멸하고 그에 갈음한 손해배상청구권 - 원채권의 변\n\n경으로서 동일성, 해제 않는 한 동시이행 항변권이나 담보도 존속 O\n일부 이행불능 : 잔존급부 청구, 불능 부분 일부 전보배상 O\n\n그러나  지분권 소이등만 이행 구할 수는 X\n\n② 해제（제546조） ： 최고 • 이행제공 없이 곧바로 해제 O\n③ 대상청구권\n\n다. 대상청구권\n— 인정 여부 : 명문 규정이 없어 논의（일반적 인정설 [통판] r. 제한적 인정설） 있으나\n\n일반적 법원칙, 계약의 구속력 등을 근거로 인정함이 타당\n\n 대상 : 손해배상금, 수용보상금, 보험금청구권, 매매대금채권 포함 O\n- 요건 : ① 급부의무가, ② 후발적 불능 되고, ③ 채무자가 대상 취득했는데, ④ 불능 • 대\n상취득 사이 상당인과관계 있을 것, （⑤ 반대급부 이행 가능할 것 : 교환계약）\n\n한편 위 판결은 2010다28604 판결의 취지로 보면 인과관계라는 요건이 문제가 아니라 이때는 대\n상청구권 개념 자체가 성립할 수 없다는 비판도 유력함\n\n— 성질 : 대상청구권 행사는 계약 ‘유지’ 의사 一 계약 해제되거나 무효라면 X", ["제546조"], 0, "채무불이행", 14],
  ["채권총론_C013", "효과로서 인정되는 권리 - 원심판단의 정당성 인정 [2008다54877]", "효과로서 인정되는 권리 - 원심판단의 정당성 인정 [2008다54877]\n- 효과•행사방법 : 채권적 청구권. 행사해야 효력 발생\n\n채무자가 취득한 권리의 양도（채권양도）나 얻은 이익의 반환（금전지급） 구하는 것\n\n 행사범위 : 채권자의 손해 한도로 제한될 것인지 여부의 논의\n\n1）무제한설 V. 2）제한설\n당금을 수령하자 배당금반환청구로 청구취지를 변경한 사안（원상회복인 가액배상 청구 안에 대\n상청구 포함된 것으로 선해함）\n\nPART 1\n\n채권총론 • 채무불이행 • 15", [], 0, "채무불이행", 15],
  ["채권총론_C014", "5. 이행거절", "5. 이행거절\n- 개념 : 채무자가 채무 이행이 가능함에도 이행할 의사가 없음을 진지하고 종국적으\n로 위법하게 표시하여 채무자의 임의 이행을 더 이상 기대할 수 없는 상태\n\n- 이행기 후의 이행거절（제544조 단서） : 544조는 이행지체를 전제로 하므로 여기서의\n이행거절은 이행기 후의 이행거절이며 명문의 규정상 최고 없이 해제 O\n\n- 이행기 전의 이행거절 : 명문의 규정이 없어 독자적 채무불이행 인정 여부 논의\n\n1） 부정설 : 이행지체 하부유형, 544조 단서 유추적용으로\n\n2）긍정설 [통판] : 이행 가능하므로 불능과 다르고 이행기 도래 전이므로 이행지체\n와 다름, 390조 일반 • 포괄조항을 근거로 인정\n 임대인이 즉시 답변하지 않았다는 사실만으로 바닥 난방공사 이행거절 의사 분명한 것은 X\n\n- ‘쌍무계약’에서, 자기 채무 이행기 도래 않은 시점에, @ 근거 없는 계약의 불성립 •\n\n무효 주장, ® 채권자로서의 수령거절 一 모두 자기 채무 이행거절 O", ["제544조"], 0, "채무불이행", 16],
  ["채권총론_C015", "— 효과: ① 강제이행, ② 전보배상, ③ 해제", "— 효과: ① 강제이행, ② 전보배상, ③ 해제\n. 불완전이행\n- 개념 : 이행을 했으나 채무 내용 따르지 않아 불완전한 경우（적극적 채권침해）\n\n— 모습 : 이행이 불완전한 경우, 불완전 이행으로 부가적 손해 준 경우（확대손해）\n— 효과 : ① 완전이행청구권（추완청구권）, ② 손해배상청구권, ③ 해제\n- - 매도인 • 수급인의 담보책임과 불완전이행의 경합 판례 （후술）\n\nPART 1\n\n채권총론 • 채무불이행 - 17", [], 0, "채무불이행", 17],
  ["채권총론_C016", "제3관 채무불이행에 대한 구제", "제3관 채무불이행에 대한 구제\n\n써 손해배상 竹\n\n1. 채무불이행에 대한 구제\n① 강제이행 :（9 주는 채무는 직접강제,\n공, 운송）는 대체집행,\n\n© 대체적 작위채무（건물철거, 단순노무의 제\n\n© 부대체적 작위채무（증권 서명, 감정, 정정보도문 게재）는\n\n간접강제（단, 자유의사 압박한다면 X）,\n\n@ 의사표시할 의무（채권양도통지）의 집행\n\n은 판결문을 상대방에게 도달하게 함으로써\n② 손해배상\n\n③ 해제 • 해지\n\n2. 손해의 개념 • 분류\n— 개념 : “위법행위 없었다면 존재했을 이익과 위법행위 있은 후 현재 이익의 차이”\n[통판, 차액설]\n이행의 문제가 아닌 단순한 위법행위로 발생한 손해이므로 ‘이행이익’ 개념 x\n\n- 손해배상의 발생원인 : 법률행위（계약）, 법률의 규정（채무불이행, 불법행위 등）\n\n— 재산적 손해 中 ① 적극적 손해（=기존재산 멸실 • 감소）, ② 소극적 손해（=장래 얻을 이익\n얻지 못한 것, 일실이 익） / ③ 정신적 손해（=위자료） 一 손해 3분설 [통판]\n\n— O 이행이익 : 채무가 이행되었으면 있었을 이익 ex. 전매차익\n© 신뢰이익 : 일정한 사태에 대한 신뢰에 기하여 행한 재산적 결정이 그대로 적절\n\n한 것이 되는 이익 一 ® 계약의 ‘유효’를 믿음으로 인한 （계약준비비용）,\n\n® 계약의\n\n‘체결’을 믿음으로 인한 （계약교섭의 부당파기 一", [], 0, "손해배상", 18],
  ["채권총론_C017", "© 계약의 ‘이행’을 믿음으로 인한 （채무불이행 이유 해제하며 이행이익에 갈음하여", "© 계약의 ‘이행’을 믿음으로 인한 （채무불이행 이유 해제하며 이행이익에 갈음하여\n\n이행 믿고 지출한 비용청구 O [통판]）,\n\n@ 목적물의 ‘하자 없음’을 믿음으로 인한\n\n（하자담보책임, ‘매수대금 - 하자 있는 상태의 시가’）\n— 신뢰이익은 이행이익을 한도로 함 [통판] ••• 535조 1항 단서가 근거\n- - Q 통상손해 : 채무불이행 있으면 일반적으로 발생하는 손해\n\n© 특별손해 : 통상손해가 아닌 특별한 손해\n\nex 전매차익\n\n- 손해배상청구권 : 본래의 채권과 동일성（확장 또는 변경） 있으므로, 본래의 채권과\n소멸시효 기간 동일, 다만 기산점은 채무불이행시부터 진행 [통판]\n\n-  식물인간의 장래 치료비 ■ 개호비\n— 3. 손해배상의 범위（제393조）\n- 393조 1항 통상손해 / 2항 특별손해는 채무자 알았거나 알 수 있어야 배상\n-  특별손해 채무자 예견가능성 기준시기 : 1） 계약체결시설, 2） 채무불이행시설 [통판]", ["제393조"], 0, "손해배상", 19],
  ["채권총론_C018", "판례는 상대방이 제3자와 별도의 계약을 체결하였거나 그 특약 등에 의해 배상하는", "판례는 상대방이 제3자와 별도의 계약을 체결하였거나 그 특약 등에 의해 배상하는\n\n손해는 대부분 특별손해로 보고 있음\n- 손해배상액의 산정\n가. 이행지체, 이행불능, 이행거절의 각 손해\n\n— 이행지체 一 지연배상\n\n이행불능, 이행거절 -* 전보배상", [], 0, "손해배상", 20],
  ["채권총론_C019", "이행 청구소송에서 확정되었다면, 매도인의 이행불능으로 인한 손해배상액의 산정", "이행 청구소송에서 확정되었다면, 매도인의 이행불능으로 인한 손해배상액의 산정\n은 그 패소확정시 기준 O, 등기말소시 X” [80다417]\n\n나. 과실상계（제396조, 제763조）\n- 요건 : ① 채권자（피해자）의 과실 존재, ② 과실능력 있을 것（통상 7~8세 정도）\n\n③ 그 과실이 손해 발생 • 확대에 인과관계 있을 것\n\n- 효과 :외측설 [통판] v. 안분설\n\n= 일부청구와 상계 : 익상계 : 위법행위 없었다면 채권자가 지출했을 비용을 손해배상액에서 공제하는\n것（인과관계 필요）\nex. 의료과오로 사망한 환자의 생활비 공제 O, 사망자의 유족이 받은 부의금 X\n\n- 보험법에 따라 손해배상채권을 대위할 경우 가해자 손해배상액 한도로 공단부담금 전액이 아니라\n그중 가해자 책임비율 금액으로 제한, 나머지 금액（공단부담금 중 피해자 과실비율 금액）에 대해서\n\n는 피해자를 대위할 수 x — 보험급여 후 여전히 손해 전보받지 못한 피해자를 위해 공단이 최종\n적부담\n\n- \n본래의 급부이행\n\n[96^8468], 673조 책임 [2000^37296]\n-", ["제396조", "제763조"], 0, "손해배상", 21],
  ["채권총론_C020", "라도, 담보책임 입각한 공평의 원칙상 하자 발생 •확대에 가공한 매수인（도급인）의", "라도, 담보책임 입각한 공평의 원칙상 하자 발생 •확대에 가공한 매수인（도급인）의\n\n잘못을 참작하여 손해배상 범위 정함이 상당” [94다23920, 80다923]\n실로서 ‘알 수 있었던 사실’을 가지고 배상액에 참작한다는 것은 법리상 의문임（私見）\n상 채무불이행 책임）이 함께 원인이 된 부진정연대채무", [], 0, "손해배상", 22],
  ["채권총론_C021", "다. 금전채무불이행 특칙（제397조）", "다. 금전채무불이행 특칙（제397조）\n— 제1항 법정이율, 그러나 법령 제한 내 약정이율 먼저\n\n 제2항 채권자 손해증명 불요, 채무자 과실 없음 항변 불가（=무과실책임）\n\n- 금전=가치 자체, 개성 없음 ••• 특정 X, 이행불능 X, 점유=소유\n\n5. 손해배상액의 예정（제398조）\n가. 규정 및 판례\n\n- 제1항 : 채무불이행 손해배상액 예정할 수 있다.\n- 제2항 : 부당히 과다하면 법원은 적당히 감액할 수 있다.\n\n0 하다고 보았음\n\nPART 1\n\n채권총론 • 손해배상 • 23", ["제397조", "제398조"], 0, "손해배상", 23],
  ["채권총론_C022", "- 제3항 : 손해배상액 예정은 이행청구 • 해제에 영향 없다.", "- 제3항 : 손해배상액 예정은 이행청구 • 해제에 영향 없다.\n\n— 제4항 : 위약금 약정은 손해배상액 예정으로 추정한다.", [], 0, "손해배상", 24],
  ["채권총론_C023", "제4절 채권자지체", "제4절 채권자지체\n\n씬 채권자지체 슈\n\n- 채권자지체（제400조） : 채권자가 이행 받을 수 없거나 받지 아니한 때는 이행 제공\n있는 때로부터 지체책임\n\n- 법적 성질\n\n1） 채무불이행설 [소] : 채권자 귀책사유를 요함, 효과는 손해배상• 해제 O\n\n2）법정책임설 [통판] : 채권자 귀책사유는 불요, 효과는 401~403조, 538조 1항 2문\n만 적용되고 손해배상• 해제 X V 채권자 개념상 권리자\n\n— 쌍무계약이면 채권자지체는 동시에 채무불이행일 수 있어 법정책임설 타당\n- 법정책임설 따르면 ‘변제제공’ = ‘채권자지체’ 효과 동일하게\n\n해석됨 （私見）\n- 요건 : ① 채권자 협력 있어야 변제결과 나오는 채무일 것,\n\n행제공 있을 것,\n\n② 채무 내용에 좇은 이\n\n③ 채권자 수령불능 • 수령 거 절\n\n- 효과 : @ ‘변제제공’의 효과 : @ 채무불이행 책임 면하고（제461조. ‘영구적 불수령’\n의 경우 구두제공조차 불필요）, ® 공탁 가능（제487조）\n\n© ‘채권자지체’ 자체의 효과 : © 주의의무 경감（제4이조, 경과실 불능책임 면책）,\n\n@ 이자 지급의무 면제（제402조）, © 증가비용 부담（제403조）, © 대가 위험 이전\n（제538조 제1 항 2문, 수령지체 中 쌍방 귀책없는 불능시 반대급부 청구 O）\n\n- 후술）", ["제400조", "제461조", "제487조", "제402조", "제403조", "제538조"], 0, "채권자지체", 26],
  ["채권총론_C024", "제5절 책임재산의 보전", "제5절 책임재산의 보전\n- 책임재산 = 일반재산 = 채권자들의 공동담보 = 모든 채권의 만족을 담보하는\n\n수단 = 자력 = 잠재적 집행의 대상 재산\n\n제2관 채권자대위권\n\n씨 채권자대위권 슈\n\n1. 요건（제404조）\n\n- ① 피보전채권（이행기） 존재, ② 보전의 필요성, ③ 채무자 권리 불행사 一 각하사유\n④ 피대위권리（비일신전속성） 존재 一 기각사유\n가. 피보전채권\n\n- 이행기 도래할 것 （미도래 예외적 허용 :（9 법원 허가, © 피대위권리가 보존행위）\n- 원칙적으로 채권일 것 一 그러나 RT 1\n\n채권총론 • 채권자대위권 • 27", ["제404조"], 0, "채권자대위", 27],
  ["채권총론_C025", "— 비금전채권 : 비금전채권은 통상 보전의 필요성 인정되고 무자력은 문제되지 않음", "— 비금전채권 : 비금전채권은 통상 보전의 필요성 인정되고 무자력은 문제되지 않음\n\n- - ‘피보전채권一피대위권리’ 구조 법원 석명의무는 있음\n\n② 금전채권 : 채무자 무자력 요건[통판]\n\n—", [], 0, "채권자대위", 28],
  ["채권총론_C026", "- 러나 채무자의 동의를 얻을 필요는 없고 채무자가 반대한 경우도 대위권 행사 O", "- 러나 채무자의 동의를 얻을 필요는 없고 채무자가 반대한 경우도 대위권 행사 O\n라. 피대위권리\n\n— 행사상 일신전속권이 아닐 것 : 가족법상 권리 X\n친생부인권 • 이혼청구권 • 부양청구권 • 상속의 승인 • 포기 一 모두 X\n\n료청구권은 귀속상 일신전속권이 아니므로 상속 O\n\n러나 위자료청구권은 전적으로 피해자 의사에 따르고 내용 불확정적이어서 행사상\n\n일신전속권이므로 대위 X — 다만 합의 • 판결로 내용 구체적 확정되면 대위 O [통]", [], 0, "채권자대위", 30],
  ["채권총론_C027", "조합 탈퇴권 O [2005마113이", "조합 탈퇴권 O [2005마113이\n사\n가. 행사방법\n\n- 채권자는 자기 이름으로 채무자의 권리를 행사\n-", [], 0, "채권자대위", 31],
  ["채권총론_C028", "이행하면 채무자에게 채권이 귀속되어 별도 급부수령 불필요, 채권자에게 양도하면", "이행하면 채무자에게 채권이 귀속되어 별도 급부수령 불필요, 채권자에게 양도하면\n채권이 이전되어 대위행사 효과가 채무자 아닌 채권자에게 귀속 [2023다301682]\n\n- [통판] 반사회적 이중매매계약은 절대적 무효이므로, 그 부동산을 제2매수인으로부\n터 다시 취득한 제3자는 설사 제2매수인의 유효한 소유권 취득으로 믿었더라도 이중\n\n매매 유효를 주장할 수 X\n— 나. 대위권행사의 통지（제405조 제2항）\n\n- 채무자가 대위권 행사 통지 받거나 ‘알았다면’ [통판] 그 후 피대위권리를 ‘처분’해도\n채권자에게 대항 X — 대위소송에서는 실질적으로 ‘제3채무자’의 대항 문제\n\n- O 채권포기, 합의해제, 채권양도, 추인 一 처분이므로 대항 X — 대위소송 인용\n© 변제수령, 법정해제 一 처분이 아니므로 대항 O —‘ 대위소송 기각\n\n-", ["제405조 제2항"], 0, "채권자대위", 32],
  ["채권총론_C029", "자신의 채권에 대한 변제로서 수령하는 것 X", "자신의 채권에 대한 변제로서 수령하는 것 X\n\nBut 채무자가 대위소송 사실 통지 받거나 알게 된 후 피대위채권에 대한 전부명령\n은, 우선권 있는 채권에 기한 것이라는 특별한 사정이 없는 한, 무효 V 민집법 229조\n\n5항 유추적용（전부명 령 송달 전에 다른 채권자가 압류 • 가압류 • 배당요구한 경우 전부\n명령은 무효）, 추심소송과 공통점 있는 대위소송의 무익화, 대위채권자의 압류 • 가압\n류 • 배당요구 등 채권배당절차 참여할 기회 박탈, 405조 2항 채권자대위권 실질 효\n과 확보 취지 [2015다236547]\n압류명령은 유효 - 압류채권자의 집행채권에 대한 시효중단효는 O\n\n- 다. 행사의 효과\n- 채무자에게 귀속 一 소멸시효도 피대위권리가 중단됨\n- 채권자와 채무자 법정위임 : 선관의무  대위소송의 기판력은 채무자가 안 경우에만 미침. 중복소송 금지는 알았는지 불문.\n\n라. 제3채무자의 지위\n- 제3채무자는 ‘자신의 채무자에 대한 항변사유’로 채권자에 대항 O [통판]\n제3채무자도 405조 2항의 적용받음 O [통판]\n\n- 제3채무자는 ‘채무자의 채권자에 대한 항변사유’로 대항 X", [], 0, "채권자대위", 33],
  ["채권총론_C030", "수 O, 이 경우 법원은 제3채무자의 주장 고려하여 피보전채권 인정 여부를 직권 심", "수 O, 이 경우 법원은 제3채무자의 주장 고려하여 피보전채권 인정 여부를 직권 심\n\n리 • 판단하여야” — 각하 [2013다5530이\n\n-  제3채무자는 피보전채권 소송의 기판력 당사자가 아니기 때문인 것으로 보임. 한편 위 판결은\n토지거래허가구역 내 토지에 관하여 처음부터 허가 배제 • 잠탈하는 내용으로 매매계약 체결한 사\n안（체결 후 허가구역 지정해제 되어도 이미 혹너정적 무효일 뿐）\n\n—", [], 0, "채권자대위", 34],
  ["채권총론_C031", "자•양수인의 직접청구권 •양수금채권 보전을 위한 인도청구 대위행사는 채무자인 임대인의 무자력", "자•양수인의 직접청구권 •양수금채권 보전을 위한 인도청구 대위행사는 채무자인 임대인의 무자력\n\n불요 一 그런데 양수금청구 사안（88다카4253）에서는 묵시갱신이 양도통지보다 늦었다면 ‘임대인’\n\n이 갱신으로 대항할 수 없다고 판시 - 위 2020다223781 판결 역시 묵시갱신이 질권설정통지보\n다 늦은 사안이어서 ‘임차인’이 갱신으로 대항할 수 있는 점에 의문 생길 수 있음 一‘ 그러나 전자는\n\n양수금청구, 후자는 대위소송에 의한 인도청구로서, 후자의 판결이 설시한 것처럼 ‘대위소송’은 ‘채\n무자（임대인）’의 권리를 대위행사하는 것이기 때문에 차이 생긴 것으로 이해해야（私見, 다만 평석\n\n중에는 채권양도와 채권질권설정의 차이로 해석하는 견해 있음） 一 이러한 私見의 논리에 따르면,\n\n채권질권 사안에서도 대위소송이 아닌 임대인에 대한 직접청구권을 행사할 경우에는 집행은 별론\n으로 하고 인용판결（혹은 상환이행판결）이 선고될 것임（私見, 채권양도와 동일 논리 적용）\n\nPART 1\n\n채권총론 • 채권자대위권 • 35", [], 0, "채권자대위", 35],
  ["채권총론_C032", "제3관 채권자취소권", "제3관 채권자취소권\n\n씨 채권자취소권 슈\n\n1. 요건（제406조）\n- ① 피보전채권（사해행위 이전, 금전채권）, ② 사해행위, ③ 악의 一 기각사유\n가. 피보전채권\n@ 사해행위 이전에 성립 •존재할 것\n— 사해행위는 매매계약 체결 시점 O, 그로 인한등기 시점 X\n-  가령 불법행위 손해배상채권\n- 예외 : 1. e에게 부동산 매각하는 계약 체결 후 6. 1. 소유권이전등기 경료 一 A가 B에게 5월에 공급한\n물품대금채권（변제기 6. 30.）을 피보전채권으로 위 매매계약을 사해행위취소 X\n@ 신용카드 사건 : \n\n••• 신용카드가입계약만으로 기초관계\n\nX", ["제406조"], 0, "사해행위취소", 36],
  ["채권총론_C033", "- 을 기준으로 한다고 단정할 수 없음. 가령 양도인이 ‘모르는’ 상태에서 채권양도 및 통지가 이뤄", "- 을 기준으로 한다고 단정할 수 없음. 가령 양도인이 ‘모르는’ 상태에서 채권양도 및 통지가 이뤄\n\n졌다면, 그 후에는 당연히 양도인이 아니라 현재 채권의 귀속주체인 ‘양수인’이 안 날을 기준으로\n할 것으로 생각됨（私見）\n\n전채권일 것\n\n- 비금전채권（특정물채권）의 보전 위해 사해행위취소 X\n-", [], 0, "사해행위취소", 37],
  ["채권총론_C034", "X - 양도소득세 • 지방소득세는 소극재산 X", "[2003다13246] cf. 재산권 목적 : 가족법상 행위는 사해행위 X\nX - 양도소득세 • 지방소득세는 소극재산 X", [], 0, "사해행위취소", 38],
  ["채권총론_C035", "한 것에 불과하여 실질적으로 동일）, 원상회복도 제2담보계약에 따른 등기 말소를 구해야 함（기", "한 것에 불과하여 실질적으로 동일）, 원상회복도 제2담보계약에 따른 등기 말소를 구해야 함（기\n록형 청구취지 대비）. 한편 1심은 애초 대법원과 동일한 취지, 항소심이 제2담보계약 취소청구를\n배척했다가 위와 같은 이유로 파기되었는데, 환송 후 원심이 환송판결의 기속력에 반하는 판단을\n\n하여 재상고심에서 다시 파기되었음\n— A는 e에게 X부동산을 매도하면서 원인무효인 B 명의 가등기 유용하여 부기등기 마쳐주고 본등\n기 하기로 합의하여 부기등기 및 본등기 경료함 스 A의 채권자 K가 A와 C 사이의 매매계약을\n사해행위로 취소할 때 종전 매매예약이 아닌 새로운 매매계약을 기준으로 사해행위 요건 및 제\n\n척기간 판단해야\n이때 K는 사해행위취소 원상회복으로 매매계약에 따른 본등기말소청구 O, 그러나 가등기는 위 원\n\nPART 1\n\n채권총론 • 채권자취소권 • 39", [], 0, "사해행위취소", 39],
  ["채권총론_C036", "상회복으로 말소할 수 없고, 따라서 K는 A를 대위하여 양수인 C를 상대로 B 명의의 주등기 말소", "상회복으로 말소할 수 없고, 따라서 K는 A를 대위하여 양수인 C를 상대로 B 명의의 주등기 말소\n청구 O — 이에 C는 무효등기 유용합의 내세웠으나, 사해행위취소로 매매계약이 취소되면서 그\n\n이행방법의 합의에 불과한 무효등기 유용합의도 함께 취소되었으므로 C의 항변 배척됨\n그러나 사해행위취소의 상대적 효력과 K는 ‘A의 으에 대한 권리’를 대위하는 것임을 고려하면, K C\n\n사이에 사해행위가 취소되었어도 A에게 효력이 미치지 않는 이상 A C 사이에 유용합의가 취소되\n었다고 보기는 어려워 위 판결의 대위청구 부분은 법리적으로 동의하기 어렵고（私見）, 다만 우의 최\n종적인 책임재산 보전을 위한 구체적 타당성으로 이해（私見）\n\n-", [], 0, "사해행위취소", 40],
  ["채권총론_C037", "리로 사해행위취소 X V 변제자대위 가능 [2009다549]", "리로 사해행위취소 X V 변제자대위 가능 [2009다549]", [], 0, "사해행위취소", 41],
  ["채권총론_C038", "처분행위는사해행위 X [2017다287891]", "처분행위는사해행위 X [2017다287891]\n- O 변제 X ： 다만 특히 일부 채권자와 통모하여 다른 채권자 해할 의사 있다면 O", [], 0, "사해행위취소", 42],
  ["채권총론_C039", "사람에게 채권담보로 제공하는 행위는 특별한 사정이 없는 한 다른 채권자들에 대해", "사람에게 채권담보로 제공하는 행위는 특별한 사정이 없는 한 다른 채권자들에 대해\n사해행위 O — 다만 채무자가 자금난으로 사업 계속 어려운 상황에서 자금 융통하\n여 사업 계속 추진하는 것이 채무 변제력 갖는 최선이라 생각하여 부득이 특정 채권\n\n자에게 담보로 제공하고 신규자금 융통받았다면 사해행위 아닐 수 있음 — 전체 책\n\n임재산 중 해당 재산의 비율, 무자력 정도, 불가피 •유효적절 수단인지, 실제 변제나\n\n사업 계속 위해 사용되어 변제자력 생겼는지, 일부 채권자 통모하여 다른 채권자 해\n칠 의사 있었는지 등 종합적 고려해야 [2017다4264072]\n보로 甲의 국민건강보험공단에 대한 현재 • 장래의 요양급여채권을 양도, 대출금 상당 부분을 內저\n축은행에 대한 기존 대출금 채무 변제에 사용한 사안에서 담보 목적 채권양도는 사해행위 O\n\n@ 매각 O :", [], 0, "사해행위취소", 43],
  ["채권총론_C040", "구체적 상속분에 상당 정도 미달하는 과소한 것 아닌 한 사해행위 X — 구체적 상", "구체적 상속분에 상당 정도 미달하는 과소한 것 아닌 한 사해행위 X — 구체적 상\n\n속분에 상당 정도 미달부분은 사해행위 O” （이유 中 : 기여분 등 구체적 상속분이\n법정상속분과 다르다는 사정은 ‘채무자’ 입증책임） [2000다51797]\n\n해행위 취소한 97다50985 판결과 동일 맥락）, ② 통상적이라면 신탁자（매수인）의 매도인에 대한\n소이등청구권, 이를 보전하기 위한 수탁자에 대한 등기말소 채권자대위권을 각각 대위했을 것인데\n（이때 신탁자는 변론종결 당시 무자력일 것）, 사안은 수탁자로부터 다시 매수한 자가 실명법 4조 3\n\n항에 의해 보호되어 수탁자나 전득자에 대한 등기말소 채권자대위권 행사가 기각될 사안이었기에,\n수탁자（수익자） 및 전득자에 대하여 각각 사해행위취소 및 원상회복으로서 등기말소를 구한 사안\n\n이라는 점（이때 신탁자는 명의신탁 당시 무자력이고 변론종결시까지 유지될 것） 등이 매우 중요함", [], 0, "사해행위취소", 44],
  ["채권총론_C041", "됐거나, 사실상 담보가등기였어도 마찬가지 [2003다19435]", "됐거나, 사실상 담보가등기였어도 마찬가지 [2003다19435]\n채권총론 • 채권자취소권 • 45", [], 0, "사해행위취소", 45],
  ["채권총론_C042", "@0 유일한 재산에 관하여 매매예약의 예약완결권 제척기간 경과 임박하자", "@0 유일한 재산에 관하여 매매예약의 예약완결권 제척기간 경과 임박하자\n제척기간 연장 위한 새로운 매매예약 O v 채무자가 부담하지 않아도 될 채무를 새\n\n롭게 부담하게 되므로 [2017다24719이\n\n다. 사해의사（악의）\n—", [], 0, "사해행위취소", 46],
  ["채권총론_C043", "있는 특수한 관계 아닌 점, 수익자•채무자 거래관계가 정상적 범위 내이고 수익자가", "있는 특수한 관계 아닌 점, 수익자•채무자 거래관계가 정상적 범위 내이고 수익자가\n상당한 대가를 실제 지급하는 등 현저히 비합리적 •이례적 사정 없는 점, 물적 담보\n\n제공의 경우 ‘기존’ 채권에 관해 다른 일반채권보다 우선적 만족 얻기 위하여 담보\n\n제공 이뤄졌다고 볼 사정이 없는 점을 수익자가 증명하면, 특별한 사정이 없는 한\n\n수익자 선의 O [2024다305384]\n재산 상황 적극 조사하지 않았음을 이유로 수익자 선의 주장 쉽게 배척할 수 없고（수익자 과실은\n문제되지 않음）, 수익자가 담보물 객관적 담보가치 신뢰하여 담보가액 범위 내 금전 제공한 사정\n은 수익자 선의 판단에 유리한 사정이나, 반대로 담보가치가 수익자 채권액에 미달한다는 사정만\n\n으로 수익자 선의 주장 쉽게 배척할 수는 없다고 판시함. 기존 채권이 아닌 ‘신규 자금’ 대출인 사\n정은 물적 담보 제공받은 수익자 선의 판단에 유리한 사정이 됨（私見）.\n\n- 이 벤츠매매를 사해행위 취소하고 C 명의 소유권이전등록 말소 구하여 반소인용, 본소기각 됨\n- 각하 사유 : ① 제척기간 도과한 경우,\n\n② 채무자를 피고로 한 경우\n\n③ 전득행위의 취소를 구할 경우, ④ 원상회복이 마쳐진 경우\n- ③, ④의 경우 권리보호이익 없음\n\nPART 1\n\n채권총론 • 채권자취소권 • 47", [], 0, "사해행위취소", 47],
  ["채권총론_C044", "가. 제척기간", "가. 제척기간\n\n- 취소원인 안 날 1년, 법률행위 5년（제406조 제2항）\n\n—  사해행위취소소송 제기 없이 원상회복만 청구 一 1） 기각설 [통판], 2）각하설\n 다만 원상회복청구가 사해행위취소 제척기간 도과하여 제기되면 각하판결이 실무\n••• 청구권원이 사해행위 취소이므로 사해행위 취소소송, 소송요건 심리의 선순위성\n\n- 며 청구취지로 “Z,•內，內•丁 사이 각 매매계약, 丁•成 사이 신탁계약을 취소하고, 각각 소유권이\n전등기 말소절차 이행하라.” — 內에 대해서는 주소보정명령 불이행으로 소장각하명령 확정, 제1\n\n심은 T. 成에 대한 취소청구 각하 一 甲이 항소한 후 항소심에서 “己 0 사이 매매계약 취소하고,\n丁과 成는 각 소유권이전등기 말소절차 이행하라.”고 항소취지 변경 - 소장 기재에 전득자들 T,", ["제406조 제2항"], 0, "사해행위취소", 48],
  ["채권총론_C045", "프에게 도 己 0 사이 매매계약 취소 구하는 청구 포함 O. 內에 대한 소장 각하되었어도 마찬가", "프에게 도 己 0 사이 매매계약 취소 구하는 청구 포함 O. 內에 대한 소장 각하되었어도 마찬가\n\n지, 항소취지변경은 종전 청구취지 범위에서 己 內 사이 매매계약 취소 부분 유지 및 나머지 계약\n취소 부분 취하한 것 O — 항소심에서 청구취지 변경한 때 비로소 T, 파를 상대로 사해행위취소\n\n소 제기한 것으로 보아 제척기간 경과했다고 할 수는 X — 이로써 기존 기록형 강의에서 이미 설\n명했던 실무의 청구취지 기재례의 타당성이 최근 대법원에 의해 어느 정도 확인된 것임\n\n- 취소원인을 안 날 : 결 확정일로부터 1 년 내이더라도 각하\nRT 1\n\n채권총론 • 채권자취소권 • 49", [], 0, "사해행위취소", 49],
  ["채권총론_C046", "나 채무자 앞으로의 소유권이전등기는 전득자에 영향 없으므로 승소 가능, 다만 이 중 말소등기", "나 채무자 앞으로의 소유권이전등기는 전득자에 영향 없으므로 승소 가능, 다만 이 중 말소등기\n는 집행과정에서 등기법상 저당권자 승낙이 필요한데 선의여서 승낙의무 없으므로, 최종 집행까지\n고려한다면 진정명의회복 원인으로 직접 채무자 앞으로 소유권이전등기 구함이 타당\n\n③ 선의一악의\n전득자에 대한 원물반환청구\n\n그런데 수익자 등기는 말소할 수 없으므로 결국 전득자로부터 직접 채무자 앞으로\n진정 명 의 회복 소유권이 전등기 청구가 타당", [], 0, "사해행위취소", 50],
  ["채권총론_C047", "다. 취소 범위", "다. 취소 범위\n\n- 취소권 행사하는 채권자의 사해행위 당시 존재하던 채권 기준 （다만, 이자 • 지연손해\n금은 변론종결시까지 포함） 一 채권액 한도 ‘일부’ 취소\n\n- 그러나 실무상 취소 범위보다 오히려 원상회복 방법을 먼저 살피고 가액배상인 경우에 취소\n\n범위와 가액배상 범위를 동일 기준으로 한꺼번에 판단하여 일치시키는 방식\n\n라. 원상회복 방법\n- 원물반환 （원칙）, 가액배상 （원물반환이 불가능하거나 현저히 곤란한 경우）", [], 0, "사해행위취소", 51],
  ["채권총론_C048", "[2019다238640]", "[2019다238640]\n채권자）은 규범적 의미 다를 수 있음, ③ 원물반환 불능 •곤란 시의 가액배상과 원물반환에 갈음한\n\n395조 금전지급은 소송물 다르지만 ‘쉽게 허용하면 원물반환 • 채권자평등 원칙 약화 우려 있는 점’\n공통되어 제한적 허용 필요, ④ 전보배상에 따른 사실상 우선변제 결과는 가액배상과 마찬가지로\n\n불가피하고 수익자가 사해행위로 인한 이익을 책임재산으로 환원해야 한다는 요청이 원물반환 원\n칙 요청보다 더 상위인 점을 들고 있음\n원상회복이 ‘주식양도’인 사안으로서, 원심이 주식양도의무 이행지체로 인한 전보배상이 일반적 허\n\n용된다는 전제 아래 전보배상청구 인정함은 잘못이지만, 피고가 주식을 보유하고 있지 않고 자력\n도 부족하여 주식양도의무 임의 이행하지 않으며 인도할 주식 총수 • 가액 등에 비추어 주식양도의\n\n무 강제집행이 불가능 또는 현저히 곤란한 상황이므로, 결과적으로 전보배상 결론 O\n\n- 결은 원심이 공동하여（각자）로 판시한 것을 수용\n- @0 가액배상은 @ 피보전채권액, @ 목적물 공동담보가액, © 수익자 • 전득자 취득\n이 익액 중 가장 적은 금액을 한도로 （모두 변론종결 당시 기준）", [], 0, "사해행위취소", 52],
  ["채권총론_C049", "로 사해행위인 매매예약의 취소 및 가액배상 0", "로 사해행위인 매매예약의 취소 및 가액배상 0\n가 소멸하는 것은 X,\n\n••• 부기등기를 통해 수익자의 지위\n\n말소청구소송에서 가등기 •본등기의 피고적격이 전득자에게\n\n만 있다고 하여 수익자가 가액배상 의무까지 없는 것은 X [2012다952]\n\n® — 제해도 채권최고액을 넘는 금액을 공제할 수는 없음을 주의. 한편 변종시에 감소된 이유가\n수익자 등의 변제인 경우 그는 어차피 근저당권에 변제자대위를 할 것이므로 위와 같은 피담보채\n\n무액 공제 후에 그의 변제금액을 다시 공제해서는 안 됨（이상 모두 위 판결 설시 내용）", [], 0, "사해행위취소", 53],
  ["채권총론_C050", "범위 가액배상 해야） V 위 저당권설정에 대한 사해행위취소 판결의 효력은 상대적", "범위 가액배상 해야） V 위 저당권설정에 대한 사해행위취소 판결의 효력은 상대적\n효력만 있고 그 부동산의 소유권 취득자에게 효력 미치지 X [2018다214319]\ncf. 미이며, 전술한 것처럼 가액배상 또는 원물반환（위험 감수） 모두 가능한 사안. 한편 가액배상\n명할 때 수익자에게 부과된 증여세액 • 취득세액 공제하지 않는다고 판시함\n— 수익자의 일반채권자가 경매에서 배당받는 금액은 가액배상（혹은 채권양도） 범위에서 공제 x\n\n- 89다카35421 판결, 2004다49532 판결은 수익자의 채권자에게 상대적 효력에 의해 채권자취\n소 효력이 미치지 않아 그도 배당을 받을 수 있다는 취지일 뿐", [], 0, "사해행위취소", 54],
  ["채권총론_C051", "— 로서, 원고는 가액배상 또는 원물반환 선택할 수 있었으나 원물반환（소이등말소）을 선택하여", "— 로서, 원고는 가액배상 또는 원물반환 선택할 수 있었으나 원물반환（소이등말소）을 선택하여\n승소 확정된 이상, 그 후 저당권 실행되어 원물반환 불가능해져도 다시 가액배상 구할 수 없다는\n\n판결 一 수익자가 사해행위로 저당권설정 받은 사안（전술한 2010다71431 판결）에서는 원물반환\n\n승소 확정된 채권자가 그 후 저당권 실행되자 가액배상 구한 것을 ‘대상청구권’ 행사로 법원이\n\n선해하여 준 것과 구별 一 2004다54978 판결은 ‘대상청구권’ 개념을 생각 못했거나 소이등말소에\n대한 대상 취득 개념이 불분명했기 때문（저당권자가 경매로 취득한 代償은 정확히 배당금이지만,\n소유자가 경매로 따로 취득한 代償은 파악하기 어려움）인 것으로 생각됨（私見） 一 이런 측면에서\n법전협 사례형 모의시험（19년 10모 제1문의 4）은 다소 부정확한 출제로 생각됨（私見）\n\n—", [], 0, "사해행위취소", 55],
  ["채권총론_C052", "사실을 증명하지 못하는 한 수탁자가 인출•사용한 것으로서 가액배상해야 V 예금", "사실을 증명하지 못하는 한 수탁자가 인출•사용한 것으로서 가액배상해야 V 예금\n인출. 이체에 명의자 본인 확인• 인증 필요하므로 [2017다290057]\n\n- 3. 채권자취소권 행사의 효과\n- 상대적 효력 [통판] : 소송의 당사자 사이에서만 （채권자와 수익자• 전득자 사이）\n\n- 원상회복한 재산에 대한 강제집행 후에 남는 것은 수익자에게 반환해야\n또한 강제집행된 부분에 대하여 수익자는 채무자에게 부당이득반환청구 O", [], 0, "사해행위취소", 56],
  ["채권총론_C053", "수익자는 채무자에게 가액배상금 명목으로 금전 지급했다는 점을 들어 취소채", "수익자는 채무자에게 가액배상금 명목으로 금전 지급했다는 점을 들어 취소채\n권자에 대하여 가액배상에서 공제 주장 X ••■ 제도 취지, 상대적 효력, 채권자\n\n취소권 행사로 채무자가 수익자에 대해 권리 취득 X [99다63183]\n하고, 따라서 그러한 경우도 불허될 것임（私見）\n\n③ 1\n\n채권총론 • 채권자취소권 - 57", [], 0, "사해행위취소", 57],

  ["채권총론_C058", "채무자가 압류•가압류 대상 채권을 양도하고 확정일자 통지 대항요건 갖췄다면,", "채무자가 압류•가압류 대상 채권을 양도하고 확정일자 통지 대항요건 갖췄다면,\n\n그 후 채무자의 다른 채권자가 양도된 채권에 압류• 가압류 하여도 무효 ••• 채권압\n류 효력 발생 전 채권 처분하면 먼저 압류한 채권자 있어 그에게 대항 못하여도\n처분 후 집행 참가한 채권자에게는 처분으로 대항 0（상대적 효력）, 압류•가압류 당\n시 피압류채권은 이미 존재 X [2017다256378]\n‘a의 가압류 집행취소통지 송달 전에 E가 압류 •추심명령 받았0므루 A의 가압류 효력 계속된다’는\n\nA의 주장은 부당 V A의 압류•추심명령 및 E의 압류•추심명령은 모두 무효\n© 의사표시에 의한 양도 제한（제449조 제2항）\n\n- 449조 2항 단서는 채권양도금지특약으로 ‘선의의 제3자’에게 대항할 수 없다고 규정\n하지만 판례는 중과실을 악의과 같이 보아 선의 • 무중과실一악의나 중과실\n조 무효행위의\n\n추인은 소급효 X\n\n62\n\n로스쿨 민법의 정석", ["제449조 제2항"], 0, "채권양도", 62],
  ["채권총론_C059", "3. 채무자에 대한 대항요건", "3. 채무자에 대한 대항요건\n가. 통지, 승낙（제450조 제1항）\n\n— 통지 : 관념의 통지,\n\n조건 • 기한 X,\n\n사전통지 X, 양도인이 해야 （양수인은 X）\n\n다만  상실되지 않을 것임을 전제로 판단하고 있음\n이의無보류승낙은 채권의 귀속 • 우열에 아무 영향 X\n 통지 = 이의보류 승낙 = 이의무보류승낙+양수인 악의 • 중과실 一 동일성, 항변 O\n\nPART 1\n\n채권총론 • 채권양도 • 63", ["제450조 제1항"], 0, "채권양도", 63],
  ["채권총론_C060", "- 나. 동일성（제451조 제2항）", "- 나. 동일성（제451조 제2항）\n- ‘통지를 받은 때까지 양도인에 대해 생긴 사유’로써 양수인에게 대항 O\n반대해석상 ‘통지 이후 생긴 사유’로 대항 x\n\n ‘통지를 받은 때까지’ = ‘승낙 당시까지’\n\n- 생긴 사유 ：（3 변제 / © 상계 / © 불성립, 무효, 취소, 해제, 동시이행항변권\n\n⑪ 변제 : 양도 통지 받은 때를 기준으로 판단\n© 상계:  일관된 법리로 설명하려는 소수설도 있음）. 시험에서는 판례 워딩을 그대로 쓰고 변제기에 대해\n서는 단정적이지 않게 기재해야 （법전협 모의시험은 소수설 소개 없이 다수설을 취한 바 있음）", ["제451조 제2항"], 0, "채권양도", 64],
  ["채권총론_C061", "대항요건이 갖춰진 후에 자동채권이 발생했더라도 채무자는 동시이행항변권을 주장", "대항요건이 갖춰진 후에 자동채권이 발생했더라도 채무자는 동시이행항변권을 주장\n할 수 있고 따라서 상계로 대항 O” [2014다80945] — 도급계약의 공사대금채권의\n\n양도통지 후에 도급인에게 하자로 인한 손해배상청구권 발생한 경우임에도 도급인\n\n（채무자）은 양수인에 대하여 상계 O V 667조 3항\n— 구상금채권이\n\n원고의 직접 청구권 생긴 후에 발생했더라도 피고는 구상금채권을 자동채권으로 상계하여 원고에\n\n게 대항 O\n\n© 해제 : 매매대금채권 양도통지 ‘후’에 매매 해제사유（채무불이행） 생기거나 법정해제 •\n\n합의해제가 이뤄져도 채무자는 양수인에게 해제로 대항 O\n••• ① 해제는 원래 쌍무계약에 내재된 고유 속성 내지 위험이므로\n대항 가능 一 다만 양수인의 고유 항변권 있다면 대항할 수 x ex. 허위표시 무효, 착오 취소\n\n••• ② 한편 해제 제3자 보호 법리로도 설명 가능\n한편 95다49882 판결은 ‘합의해제’의 경우도 채권양수인이 해제 제3자로 보호될 수 없다는 명시적\n판례라는 해석이 다수설 및 사견인데 2023년 변호사시험 선택형에 출제되어 공인되었음\n어쨌든 ‘채권양도와 해제’ 쟁점에서 판례는 451조는 논외로 한 채 548조만 명확히 설시함\n\nPART 1\n\n채권총론 • 채권양도 - B5", [], 0, "채권양도", 65],
  ["채권총론_C062", "다. 금반언（제452조 제1 항）", "다. 금반언（제452조 제1 항）\n- 채권양도 통지했으면 양도하지 않았거나 양도가 무효인 경우에도 선의의 채무자는\n\n양수인에게 대항할 수 있는 사유로서 양도인에게 대항 O\n-  채권양도계약이 불성립 • 무효 • 해제인 경우 최초 채권양도 통지를 철회하려면 양수인\n의 동의 필요（제452조 제2항） 혹은 양수인이 직접 해제 등의 통지를 해야\n\n4. 제3자에 대한 대항요건\n- 채무자 이외의 제3자에 대하여서는 통지 ■승낙은 ‘확정일자’ 있는 증서에 의하여서만\n대항 가능（제450조 제2항）\n\n- 제3자 : 채권에 관하여 양수인의 지위와 양립할 수 없는 법률상 지위를 가진 자\n\n이중양수인, 채권질권자, 채권을 압류 • 가압류한 자 O\n채무자의 채권자 X,", ["제452조", "제452조 제2항", "제450조 제2항"], 0, "채권양도", 66],
  ["채권총론_C063", "- 통지 • 승낙 • 단순승낙 여하에 불구하고 ‘확정일자’ 있는 자 > 없는 자", "- 통지 • 승낙 • 단순승낙 여하에 불구하고 ‘확정일자’ 있는 자 > 없는 자\n둘 다 확정일자 없다면 통지 도달이나 승낙 일시의 선후에 따라 [통판]\n- 지의 도달 선후만 비교하면 될 것처럼 보이나, 이처럼 ‘인식의 선후’ 비교로 ‘우열’을 결정할 사안\n은 결론적으로 ① 동시도달 사안, ② 이중양도 이뤄진 후에 순차로 각 대항요건 갖춘 사안에 한정\n\n하는 것이 타당하고（私見）, 오히려 일반론으로는 2001다59033（전술）, 2015다46119（후술）, 2010다\n\n57213（후술） 판결들에서 보는 것처럼 가압류의 처분금지효나 무권리자의 처분행위 등의 법리에 따\n라 한쪽이 ‘무효’가 되어버리는 경우가 많으므로 주의를 요함\n\n—", [], 0, "채권양도", 67],
  ["채권총론_C064", "유효로 될 수는 X", "유효로 될 수는 X\n\n사해행위취소의 상대효 및 비소급효 [2019다235702, 2022다\n\n247521]\n- 법리）, 나머지 1.5억\n부분은 확정 일자 없으므로 C는 D에게 대항 X\n\n5. 채권에 대한 가압류 • 압류와 이행청구, 양수금청구의 관계\n-", [], 0, "채권양도", 68],
  ["채권총론_C065", "- 채권에 대한 압류 • 가압류와 채무자의 제3채무자에 대한 이행청구소송 :", "- 채권에 대한 압류 • 가압류와 채무자의 제3채무자에 대한 이행청구소송 :\n\n① 가압류 • 압류 • 가처분 一 ‘인용’ （단, 소유권이전등기청구는 해제조건부인용）\n② 압류 • 추심명령 一 ‘인용’ ••• 당사자적격 유지（2025년 판례변경）\n③ 압류 • 전부명령 一 ‘기각’ ••• 이행의 소의 당사자적격 문제（본안 판단에 흡수）\n나 위 법리는 채권 가압류나 압류 있은 후 그 채권을 양수한 자의 양수금청구에도\n동일 적용（가령 [99다23888]） — 전술한 2001다59033 판결의 법 리 포함\n\nPART 1\n\n채권총론 • 채권양도 • B9", [], 0, "채권양도", 69],
  ["채권총론_C066", "제3 절 채무의 인수", "제3 절 채무의 인수\n\n쏘 채무인수 슈\n\n1. 면책적 채무인수\n— 채무인수는 계약이면서 동시에 준물권행위 O\n— 채무의 ‘동일성’ 유지 一 연대 • 불가분채무 성질 유지, 소멸시효‘기간’ 동일 O\n（羊경개, 준소비대차 :  채무인수의 원인된 법률관계와 채무인수 사이 무인성 : O ‘매매’의 대금지급 갈음하\n여 다른 채무 인수, © ‘증여’ 차원에서 채무인수 一 ‘채무인수의 원인관계’에 해당하\n는 ‘매매’ • ‘증여’가 무효 • 취소되더라도 채무인수에 영향 無\n\ncf. 매매대금채무 인수한 후 매매계약 취소 一 ‘인수한 채무의 발생원인’이 되는 계약\n\n이 무효 • 취소된 것이므로 인수채무도 소급 소멸\n\n- 채권자와 제3자 사이 인수계약（제453조） : 성질상 불허되거나 이해관계 없는 제3자\n가 채무자 의사에 반하는 경우（=변제, 경개）에는 X\n\n- 채무자와 제3자 사이 인수계약（제454조） : 채권자의 승낙이 효력요건\n채권자가 승낙하면 인수시에 소급하여 효력, 그러나 제3자 권리 침해 X （제457조）", ["제453조", "제454조", "제457조"], 0, "채권양도", 70],
  ["채권총론_C067", "- 승낙 여부 최고（제455조） : 제3자• 채무자가 상당기간 정하여 승낙 여부 확답 최고", "- 승낙 여부 최고（제455조） : 제3자• 채무자가 상당기간 정하여 승낙 여부 확답 최고\n\n- 채권자가 기간 내 확답 발송 없으면 채무인수 거절 간주\n- 인수인의 항변（제458조） : 전 채무자가 항변할 수 있는 사유로 채권자에게 대항 O\n\nBut 취소권 • 해제권은 행사 X（V 계약당사자 지위 전제）, 종전 채무자의 채권자에 대\n\n한 채권으로 상계 X [통], 전 채무자에게 대항할 수 있는 사유로 X（V 무인성）\n\n- 보증 • 담보의 존속 여부（제459조） : 보증 및 제3자 제공 담보 소멸, 그러나 보증인 • 제\n\n3자 동의하면 존속\n. 병존적 채무인수（=중첩적 채무인수）\n- 의의 : 기존 채무관계를 그대로 유지하면서 제3자가 채무자로 들어와 종래 채무자와\n더불어 동일한 내용의 채무를 부담하는 것\n\n-  채권자• 인수인 사이 계약은 ‘보증’ 성질 一 이해관계 없는 제3자가 채무자의 의사에\n반하여 병존적 채무인수 O\n\n채무자• 인수인 사이 계약은 ‘제3자를 위한 계약’의 성질 一 채권자 수익 의사표시 있\n어야 채권 취득\n\nPART 1\n\n채권총론 • 채무인수 • 71", ["제455조", "제458조", "제459조"], 0, "채권양도", 71],
  ["채권총론_C068", "- 효과 : 종전 채무 존속하므로 담보도 존속（羊면책적）,", "- 효과 : 종전 채무 존속하므로 담보도 존속（羊면책적）,\n\n인수인은 채무자가 채권자에\n\n게 가지는 항변사유로써 채권자에게 대항 0（=면책적）\n\n- 채무자와 중첩적 채무인수인의 관계 :  소멸시효와 시효중단, 상계의 절대효, 외측설 등과 연결시키는 습관이 필요함\n\n3. 계약인수\n- 계약당사자 지위 자체가 포괄적으로 이전되는 것으로서, 당사자 전원의 합의 내지\n\n잔류 당사자의 승낙 필요\n- 류당사자 內이 영업양도 인식하고 근로계약 인수 승낙, 인수인 己회사에 사용자 지위뿐 아니라 근\n로계약 기초로 이미 발생한 손해배상채권도 이전 一 이는 채권양도 대항요건 불필요\n\n-", [], 0, "채권양도", 72],
  ["채권총론_C069", "4. 이행인수", "4. 이행인수\n가. 의의 및 효과\n\n— 의의 : 채무자와 인수인 사이 계약으로 인수인이 그 채무를 채권자에게 이행할 의무\n를 채무자에 대해 부담하는 것\n\n- 효과 : A는 B를 대위하여 으에 대하여 어차피 ‘a에게 이행할 것’이라는 B의 권리를 행사하는 형태가 될 것\n임 （私見）\n\n나. 매매계약과 매수인의 이행인수\n\n-  매도인이 변제하면 매수인에 구상권 O, 매수인이 변제하면 매도인에 구상권 X\n-  다만, 경\n매로 채무 소멸하거나 남는 금액 교부받은 것은 538조 2항 소정의 이익이므로 매수\n\n인에게 상환해야\n\nPART 1\n\n채권총론 - 채무인수 • 73", [], 0, "채권양도", 73],
  ["채권총론_C070", "- 인수채무의 불이행과 매매계약의 해제 가부", "- 인수채무의 불이행과 매매계약의 해제 가부\n@  소유권이전등기의무를 이행제공하여 매수인을 지체에 빠뜨렸어야 한다는 취지로 해석됨（私見）\n\n한편 사안과 달리 매도인이 매매 목적 부동산에 근저당권을 ‘새로이’ 설정함으로써 차용한 돈으로\n인수채무를 대신 변제한 것이라면 그 구상권을 내세워 동시이행 항변 X, 해제 x ••• 매수인이 소\n\n유권이전등기 하면 그 피담보채무액은 결국 매수인의 부담이 되므로", [], 0, "채권양도", 74],
  ["채권총론_C071", "제5장 채권의 소멸", "제5장 채권의 소멸\n\n제2절 변제\n\n씨 변제 슈\n\n1. 서설\n— 채권의 소멸사유 : 변제 • 대물변제 • 공탁 • 상계 • 경개 . 면제 • 혼동\n채권의 목적인 급부 실현 : 변제 • 대물변제 • 공탁 • 상계\n\n계약 : 대물변제 • 경개 / 단독행위 : 상계 • 면제 / 사실행위 : 변제 / 사건 : 혼동\n\n— 변제의 장소（제467조） : 채무 성질 • 당사자 의사표시로 변제장소를 정하지 아니한 때\n특정물 인도는 채권성립 당시 물건 있던 장소에서, 그 외는 채권자의 현주소에서, 영\n\n업에 관한 채무 변제는 채권자의 현영업소에서\n\n※ 463조（변제로서의 타인 물건 인도）, 461조（양도능력 없는 소유자의 물건인도）, 465조（채\n권자의 선의소비, 양도와 구상권, 468조（변제기 전 변제）, 473조（변제비용의 부담）\n\n2. 변제제공\n— 급부 결과가 채무자의 이행만으로 실현되는 경우는 변제제공이 문제되지 않으나,\n\n채권자의 수령 등 일정한 협력이 있어야 급부 결과가 실현되는 경우라면, 채무자는\n‘채권자의 협력이 있으면 급부 결과가 생길 수 있는 상태’까지 이행을 해야 하고 또\n\n그것으로 족한데, 이것이 ‘변제제공’ 개념\n\n— 변제제공의 방법（제460조） = 종류물의 특정 시점 판단기준\n@ 현실제공（본문, 원칙） : 채권자가 언제든지 수령할 수 있는 상태에 놓는 것\n\nex. 급부 목적물을 들고 채권자의 주소에 갔으나 부재 중인 경우, 부동산 매도인이\n이행기일에 등기 소요 서류를 들고 이행장소에 나온 때\n© 구두제공（단서, 예외） : 변제준비 완료를 통지하고 수령을 최고하는 것\n\n채권자가 미리 받기 거절하거나 채무 이행에 채권자 행위 요할 경우는 구두제공\n\nPART 1\n\n채권총론 • 변제 • 75", ["제467조", "제460조"], 0, "채권소멸변제", 75],
  ["채권총론_C072", "© 구두제공조차 불필요한 경우:", "© 구두제공조차 불필요한 경우:\n\n@ 회귀적 분할채무에서 1회분의 이행 제공을 거절한 경우\n® 영구적 불수령\n\n결에서 538조 1항 2문의 반대급부 청구를 주장하려면 ‘영구적 불수령’의 경우라고 해도\n최소한 구두제공은 필요하다고 판시함\n\n 효과 @ 채무불이행 책임 면하고（제461조. ‘영구적 불수령’은 구두제공조차 불필요）,\n® 공탁 가능（제487조, 변제제공만 하였으므로 채무는 존속）\n\n- 채권자지체에 관한 법정책임설 [통판] 취하면 ‘변제제공=채권자지체’ 되어 변제제\n공으로 채권자지체의 효과 발생 : © 주의의무 경감（제401조）, @ 이자 지급의무 면\n\n제（제402조）, © 증가비용 부담（제403조）, © 쌍무계약 위험 이전（제538조 제1항 2문）\n\n3. 변제의 당사자\n- 제3자의 변제（제469조） : 가능 O, 성질 • 의사표시로 불허, ‘이해관계 없는 제3자’는\n\n채무자 의사에 反하여 변제\n\nX （= 채무인수, 경개）\n\nex. 공동채무자, 보증인, 물상보증인, 제3취득자, 후순위담보권자 （=법정대위권자）\n\n하여 직접 경매신청하겠다는 이유로 공동저당권자의 잔액 채무를 변제공탁하는 것은 수리 X", ["제461조", "제487조", "제401조", "제402조", "제403조", "제538조 제1항"], 0, "채권소멸변제", 76],
  ["채권총론_C073", "제3자의 변제 O,", "제3자의 변제 O,\n\n제3자의 상계 X [통판] 수동채권은 반드시 피상계자의 상계자에\n\n대한 채권이어야 하고, 피상계자의 제3자에 대한 채권이면 X\n- 단축된 급부 혹은 제3자방 이행 :  표현수령권자에 대한 변제 : 준점유자, 영수증소지자\n\nO 채권의 준점유자에 대한 변제（제470조） : 채권을 사실상 행사하고 진정한 채권자라 믿\n게 할 외관을 갖춘 자에 대하여 변제자가 선의 • 무과실로 변제하면 변제 유효\n\nRT 1\n\n채권총론 • 변제 • 77", ["제470조"], 0, "채권소멸변제", 77],
  ["채권총론_C074", "그러나  이미 甲의 압류 • 전부명령을", "그러나  이미 甲의 압류 • 전부명령을\n송달받은 상태에서 江의 전부명령이 송달되었음에도 江의 전부금청구에 다투지 않\n\n아 자백간주로 승소판결 선고되게 하고 8일 만에 변제해버린 사안\n\n 영수증소지자에 대한 변제（제4기조） : 영수증은 위조되지 않은 진정한 것이어야, 악\n의 • 과실 없을 것（변제의 무효를 주장하는 자가 변제자의 악의 • 과실 입증할 것）\n\n- 권한 없는 자에 대한 변제（제472조） : 채권자가 ‘이익을 받은 한도’에서 효력\n\nB는 C로부터 수령한 변제금을 충당 지정 없이 A에게 변제, A는 수령 당시 b에 대한 다른 채권\n\n0에 충당 지정함 一 A는 C에 대한 전부금소송에서 전부명령 무효（압류 경합）로 인해 패소 후 다\n시 자신이 받은 압류명령에 기초하여 추심명령 받고 e에 대해 추심금청구 一 A 승소, C는 472조\n주장 X V B가 C로부터 받은 돈을 A에게 전달한 것으로 보이나 A의 지정으로 채권⑭에 충당되\n었으므로 이는 B가 자신의 채권자에 대한 다른 채무 변제한 것일 뿐임. 전부명령이 민집법 229\n조 5항으로 무효이더라도 압류명령은 유효하므로 e가 압류명령 받은 후 압류채무자 B에게 변제\n하여 스스로 이중지급 위험 감수해야\n\n4. 변제의 충당\n— 의의 : 동일한 채권자에 대하여 동종의 수개 채무 부담하거나（제476조） 1개 채무에\n서 수개의 급부를 해야 할 경우（제478조）, 변제의 제공이 채무 전부를 소멸시키기에\n\n부족하면 어느 채무부터 변제에 충당할 것인가의 문제 一 상계충당（제499조）\n\n그러나 변제자가 복수의 채무 중 단순히 특정채무를 ‘지정’하여 ‘변제’하는 것은 지정\n‘충당’이 아님을 유의해야", ["제472조", "제476조", "제478조", "제499조"], 0, "채권소멸변제", 78],
  ["채권총론_C075", "의사일 수도 있다는 점에 유의해야 하고, 출제자의 입장에서도 ‘지정’을 변제충당에서의 ‘지정충당’", "의사일 수도 있다는 점에 유의해야 하고, 출제자의 입장에서도 ‘지정’을 변제충당에서의 ‘지정충당’\n의 의미로 사용하려면 여러 채무 중 특정 채무를 ‘먼저（우선）’ 소멸시키겠다는 의사가 명확하게 드\n\n러나는 표현을 명시하는 것이 타당할 것임（私見）\n- 합의충당 一 비용 • 이자 ■ 원본충당 一 지정충당 一 법정충당 順\n용판결 여지 O ••• 4호에 의해 소구채권과 별개채권에 안분비례 충당됨\n\n① 합의충당 : 476〜479조는 임의규정, 합의충당은 비 • 이 • 원 순서도 변경 가능\nART 1\n\n채권총론 • 변제 • 79", [], 0, "채권소멸변제", 79],
  ["채권총론_C076", "금 10”을 소멸시켜 “원금 60”이 남는데, 이때 다액채무자는 지연손해의 경우 소액채무자에", "금 10”을 소멸시켜 “원금 60”이 남는데, 이때 다액채무자는 지연손해의 경우 소액채무자에\n\n게서 소멸한 “지연손해 7”과 동일 금액이 공동부담 부분으로 소멸하여 “지연손해 3”이 남고, 원금\n의 경우도 소액채무자에게서 소멸한 “원금 10”과 동일 금액이 공동부담 부분으로 소멸하여 “원금\n\n90”이 남게 됨", [], 0, "채권소멸변제", 80],
  ["채권총론_C077", "변제이익 : 이자부 O, 고이율 O,", "변제이익 : 이자부 O, 고이율 O,\n\n단순채무＞연대채무, 주채무＞보증채무\n\n제공한 채무의 변제이익이 큼） 一 약속어음에 관한 판례를 부동산까지 확장할 것인지의 문제됨\n（법전협 기록형에서 변제이익 더 크다고 출제된 적 있음）\n\n5. 변제자대위\n가. 의의\n\n— 제3자나 공동채무자 중 1인이 채무자를 위하여 변제한 경우 그 구상권의 범위에서\n채권자가 가졌던 채권 및 담보에 관한 권리가 당연히 이전되는 것 혹은 이를 행사하\n\n는 것 一 변제자대위는 구상권 확보를 위한 것\nRT 1\n\n채권총론 • 변제 • 81", [], 0, "채권소멸변제", 81],
  ["채권총론_C078", "나. 요건", "나. 요건\n① 변제 기타 출재로 채무자 채무 면하게 할 것: 대물변제 • 공탁 • 상계 포함\n② 변제자가 채무자에 대하여 구상권을 가질 것\n③ 변제할 정당한 이익 있거나（법정대위） 채권자승낙 있을 것（임의대위）\n- 법정대위（제481조） : 변제할 정당한 이익 = 이해관계（469조） （전술）\n\n공동채무자 • 보증인 • 물상보증인 • 제3취득자 • 후순위담보권자 • 이행 인수인\n\nO\n\n[\n\n判例] 매도인이 제3자에게 먼저 양도담보로 소유권이전등기 마쳐주면 매수인 O —\n\n피담보채무 변제하고 매도인을 대위하여 말소등기청구 O [기 다1888]\n\n- 임의대위（제480조） : 변제와 동시에 채권자의 승낙을 얻어 대위 一 채권양도에 관한\n\n450〜452조 준용하므로 채권자의 통지나 채무자의 승낙이 대항요건이고 제3자에 대\n하여는 확정일자를 갖춰야\n\n다. 대위자와 채무자 사이 효과（제482조 제1 항）\n\n- 구상권 범위 내에서 채권 및 담보에 관한 권리 당연 이전\n법정대위 • 임의대위 불문하고 가령 저당권은 등기 없이도 당연히 이전됨（187조）\n\n담보채권 대위변제 一 그 후 위 임야에 소유권이전등기, 근저당권설정등기가 마쳐지고 근저당권\n에 기해 임의경매절차 개시 一 변제자가 경매법원에 ‘담보가등기권리자의 권리신고서’ 제출하면\n\n배당요구 없이도 배당받을 수 O V 대위변제 당시 담보가등기에 기한 본등기는 원인무효였고 담\n보가등기는 유효했0므루 대위변제자는 담보가등기와 그 피담보채권을 법률상 당연히 이전받음,\n\n경매개시결정 전에 담보가등기 경료됨\n— 채권에 관한 권리 : 손해배상청구권 • 채권자대위권 • 채권자취소권\n\n담보에 관한 권리 : 인적 담보（보증채권）, 물적 담보（질권, 저당권）", ["제481조", "제480조", "제482조"], 0, "채권소멸변제", 82],
  ["채권총론_C079", "라. 대위자와 채권자 사이 효과", "라. 대위자와 채권자 사이 효과\n\n- 일부대위（제483조 제1 항） : 일부 대위변제 있으면 대위자는 변제한 가액에 비례하여 채\n권자와 함께 권리 행사一 공동행사설 [통판], 채권자우선설 [통판]\n\n1\n\n채권총론 • 변제 • 83", ["제483조"], 0, "채권소멸변제", 83],
  ["채권총론_C080", "- 법정대위자의 면책（제485조） : 법정대위자가 있는 상황에서 채권자의 고의 •과실로", "- 법정대위자의 면책（제485조） : 법정대위자가 있는 상황에서 채권자의 고의 •과실로\n\n담보 상실 - 감소된 때에 대위할 자는 상환 받을 수 없는 한도에서 면책\n\n면책 : ① 보증인• 연대채무자 등과 같은 채무자는 채무 면제 의미, ② 물상보증\n인.제3취득자등은 책임 소멸（근저당권의 소멸） 의미\n\n 면츠먹（2017다292756）, ② 물보 소유물 경매로 배당받고 채무자 소유물 저당권 말소해주면\n750조 불법행위（2011 다30666）, ③ 물보 소유물 경매대금 완납된 후에 채무자 소유물 저당권 말소\n해주고 물보 소유물에서 배당 받아버리면 750조 불법행위（2017다261882）\n\n③의 경우는 ‘완납 후 말소’ 사안으로서 공동저당권자가 물보 소유물로부터 배당받기는 전이어서\n말소 당시 아직 채무자 소유물의 저당권이 물보에게 귀속되지 않았고, 물보로서는 배당절차에서\n\n485조 면책 주장으로 배당이의를 할 수도 있었을 것이나（私見）, 이를 놓쳐 배당이의를 못한 상태에\n서 공동저당권자가 물보 소유물로부터 배당을 받아버리면, ‘배당받은 후 말소’ 사안과 마찬가지로\n\n750조 불법행위 손해배상을 인정한 것임（私見）. 한편 485조 면책 주장으로 배당이의를 못한 상태\n에서 배당이 이뤄지면 물보로서는 부당이득반환청구도 가능할 것이니. 결론적으로 두 가지 권리의\n\n경합으로 볼 수 있을 것임（私見）.", ["제485조"], 0, "채권소멸변제", 84],
  ["채권총론_C081", "로 제2근저당권 말소 당시 저당물 시가로 제1근", "로 제2근저당권 말소 당시 저당물 시가로 제1근\n저당권 배당받고도 충분했다면, 설령 그 후 실제 경매에서 저가 낙찰되어 말소된 제\n\n2근저당권에 기해 어차피 배당받을 수 없었더라도 485조 적용 O [2007다6659이\n마. 법정대위자 상호간（제482조 제2항）\n① 보증인은 미리 대위의 부기등기 해야 제3취득자에 대하여 대위 （제1호）\n② 제3취득자는 보증인에 대하여 대위\n\nX （제2호）\n\n- 1호 ‘미리’는 ‘변제 후’ 제3취득자 등기 전을 의미（즉, 제3취득자 등기 후에 보증인이\n변제를 한 경우에는 대위 부기등기 없이 대위 O）\nART 1\n\n채권총론 - 변제 - 85", ["제482조 제2항"], 0, "채권소멸변제", 85],
  ["채권총론_C082", "- 1, 2호 등의 ‘보증인’에는 물상보증인 포함 O", "- 1, 2호 등의 ‘보증인’에는 물상보증인 포함 O\n）\n\n③④ 제3취득자 상호간, 물상보증인 상호간에는 각 부동산 가액 비례 대위 （제3, 4호）\n\n-", [], 0, "채권소멸변제", 86],
  ["채권총론_C083", "한다는 설명（단. 미리 대위 부기 등기 필요하다는 점은 두 유형 공통임）이 이번 판례에서 직접적으", "한다는 설명（단. 미리 대위 부기 등기 필요하다는 점은 두 유형 공통임）이 이번 판례에서 직접적으\n\n로 명시되었음（기존 판례에서도 해석상 도출되는 법리）\n\n⑤ 물상보증인과 보증인 사이에는 인원수 비례 대위, 여기서 물상보증인 상호간에는 각\n부동산 가액 비례 대위, 보증인은 미리 대위의 부기등기 해야 제3취득자에 대하여\n\n대위 （제5호）\n\n- 보증인과의 관계와 마찬가지로 인원수 비례\n\n※ 법정대위자 상호간 대위하는 금액 계산 방법 일독 • 이해\n\nPART 1\n\n채권총론 • 변제 • 87", [], 0, "채권소멸변제", 87],
  ["채권총론_C084", "제3〜8절 대물변제, 공탁, 상계, 경개, 면제, 혼동", "제3〜8절 대물변제, 공탁, 상계, 경개, 면제, 혼동\n\n씨 대물변제 ■공탁■ 경개 • 면제 -혼동 슈\n\n1. 대물변제（제466조）\n- 의의 : 채무자가 채권자의 승낙을 받아 본래의 급부에 갈음하여 다른 급부를 함으로\n써 채권을 소멸시키는 계약\n\n- 유상계약.\n\n요물계약（현실적인 대물급부가 이루어져야 성립하는 계약）\n\n 구분건물로 대물변제하기로 약정 一 己회사에게 구분건물 소유권이전등기 마쳐줌 一 아직 구분\n건물 사용승인 못 받았거나 대지지분에 제한물권 설정된 사정은 대물변제 목적물 하자의 담보책임\n물을 사유 o, 대물변제는 이행 완료 o", ["제466조"], 0, "채권소멸기타", 88],
  ["채권총론_C085", "조건부 공탁 X, 그러나 동시이행의 항변권 있으면 반대급부 제공을 수령 조건", "조건부 공탁 X, 그러나 동시이행의 항변권 있으면 반대급부 제공을 수령 조건\n\nO\n\n（제491조 참조） - 선이행하라는 조건 붙이 면 무효\n8조（채무이행지의 공탁소）, 4이0조（자조매각금의 공탁）\n\n3. 경개（제500조）\n— 의의 : 채무의 중요한 부분（채권자, 채무자, 내용）을 변경함으로써 신채무를 성립시\n킴과 동시에 구채무를 소멸시키는 계약 - 동일성 상실", ["제491조", "제500조"], 0, "채권소멸기타", 90],
  ["채권총론_C086", "채무자 변경 경개는 채권자• 신채무자간 계약으로, 구채무자 의사 反하면 X （501조）", "채무자 변경 경개는 채권자• 신채무자간 계약으로, 구채무자 의사 反하면 X （501조）\n채권자 변경 경개는 확정일자 증서로 제3자 대항 O, 451조 1항 준용（502조, 503조）\n\n- • 동일성 상실하며 채권자 담보 잃고 채무자 항변권 잃는 불이익 초래 X\n\n— 구채무가 무효라면 경개도 무효 / 구채무 발생원인에 취소사유 있는 경우에는 경개\n가 법정추인（145조 3호）이므로 확정적 유효가 됨\n- 신채무가 성 립하지 않으면 구채무도 소멸하지 않음 （제504조）\n\n— 4. 면제（제506조）\n— 채권자의 단독행위.\n\n처분권한 있어야\n\n— 채권자대위권 행사의 통지가 있거나, 채권（가）압류, 채권입질의 경우에 제3채무\n자 • 채무자 • 질권설정자는 채무 면제 행위를 들어 대항 X •.• 처분행위\n\n5. 혼동（제507조）\n- 의의 : 채권과 채무가 동일한 주체에 귀속하는 것 一 그러나 채권이 제3자의 권리의\n\n목적 인 때 에는소멸하지 X （단서）\nPART 1\n\n채권총론 • 대물변제•공탁•경개 •면제•혼동 •\n\n91", ["제504조", "제506조", "제507조"], 0, "채권소멸기타", 91],
  ["채권총론_C087", "행사 X（v 가해자로서 운전자의 일반불법행위책임과는 혼동으로 소멸 O）", "행사 X（v 가해자로서 운전자의 일반불법행위책임과는 혼동으로 소멸 O）\n••• 父가 상속한 子의 직접청구권의 1/2만 행사 O", [], 0, "채권소멸기타", 92],
  ["채권총론_C088", "제5절 상계", "제5절 상계\n\n싸 상계 슈\n\n1 .서설\n— 채무자의 단독행위.\n\n조건 • 기한 X. 수동채권의 존재 자체가 담보적 기능\n\n‘상계계약’은 상계금지사유 등 요건 적용 X （당사자 합의로 결정）\n\n-  상계금지특약一 선의 제3자에게는 대항 X （제492조 제2항）\n\n2 . 요건（제492조） = 상계적상\n① 동종 채권 서로 대립,\n\n② 양 채권 변제기 도래\n\n③ 상계의 허용성\n① 동종의 채권이 서로 대립할 것\n\n@ 자동채권 : 채무자（상계자）가 채권자（피상계자）에 대하여 가지는 채권\n\nPART 1\n\n채권총론 • 상계 • 93", ["제492조 제2항", "제492조"], 0, "상계", 93],
  ["채권총론_C089", "제도상 예외 : @ ‘타인이 가지는’ 채권으로 인정한 경우（연대채무 418조 2항, 보증", "제도상 예외 : @ ‘타인이 가지는’ 채권으로 인정한 경우（연대채무 418조 2항, 보증\n인 434조）, ® ‘타인에 대한’ 채권으로 인정한 경우（연대채무 426조 1항, 주채무자 445\n조 1항, 채권양도 451조 2항）\n\n- 심채권자에 대한 채권과 상계하는 것이 불허될 수 있음（私見）. 이와 달리 압류 및 ‘전부명령’이 있\n다면 전부채권자의 이러한 상계가 허용될 것임（私見）\n© 수동채권 : 채권자（피상계자）가 채무자（상계자）에 대하여 가지는 채권\n\n‘제3자의 상계’ X （=수동채권의 예외는 인정할 수 X）\n\n 쌍방 채무의 변제기가 도래할 것\n— 자동채권만 변제기 도래하면 상계자는 수동채권의 기한의 이익 포기하고 상계 O\n\n다만 최근 판례는 ‘상계의 의사표시’를 해야 기한 이익 포기하여 상계적상이 성립하\n는 것으로 해석", [], 0, "상계", 94],
  ["채권총론_C090", "계가 허용될 것 = 상계금지사유가 없을 것", "계가 허용될 것 = 상계금지사유가 없을 것\n\n- 자동채권에 항변권 붙어 있으면 X（항변 소멸 후에는 상계 O）\n동시이행 항변권이 대표적 예시 一 매매계약에서 ‘매도인’의 상계 금지 여부 검토\n\nW 실무에서 피고가 상계항변 제출한 자동채권이 가령 매매대금채권인 경우 그\n자체로 동이항 부착 드러나므로 피고는 이행제공 사실까지 함께 주장 수 입증해야\n단, 자동•수동 양 채권이 ‘서로’ 동시이행 관계이면 상계 O - 매매 •도급계약에서\n\n담보책임인 손해배상채권과 대금채권 사이\n3. 상계금지사유\n가. 고의 불법행위로 인한 손해배상채권（제496조）\n\n— 취지 [통판] : 고의 불법행위 피해자가 현실 변제 받도록, 불법행위 유발 방지\n가해자가 수동채권으로 하는 상계 금지（그 채무자는 상계 대항 X）, 피해자가 이를\n자동채권으로 상계하는 것은 허용\n\nART 1\n\n채권총론 • 상계 • 95", ["제496조"], 0, "상계", 95],
  ["채권총론_C091", "-  압류금지채권（제497조）", "-  압류금지채권（제497조）\n- 압류금지채권（급여채권• 상여금 • 퇴직금 • 퇴직연금의 1/2 상당액, 주임법 8조 소액\n\n보증금, 자배법상 피해자의 손해배상청구권 등）을 수동채권으로 상계금지\n- 다. 지급 금지된 채권（제498조）\n- （수동채권에） 지급금지명령 받은 제3채무자는 그 후 취득한 （자동）채권으로 상계 X\n\n채권에 대한 압류 • 가압류가 있을 경우 제3채무자의 상계 가부 문제\n압류 • 가압류 효력 발생 전에 이미 제3채무자의 채권이 ‘성립’하면 반대해석상 상계 가능", ["제497조", "제498조"], 0, "상계", 96],
  ["채권총론_C092", "6）지급금지명 령 송달 당시 상계적상 갖춰야 하는지", "6）지급금지명 령 송달 당시 상계적상 갖춰야 하는지\n요가 없다는 점, ② 위 전원합의체판결 ‘반대의견’（=틀린 지문）은 ‘자동채권의 변제기가 수동채권\n보다 늦게 도래하더라도 그 후 어느 시점에 결국 양 채권의 이행기가 도래했고 아직 채무자에 의하\n\n여 피압류채권이 추심되지 않았다면 제3채무자가 상계할 수 있다’는 입장인 점 등을 주의할 것\n\n이 사전구상권으로 상계하는 경우에도 적용된다는 판례이며, 다만 ① ‘상계적상’의 의미에 ‘항변권\n소멸’을 포함시켜 해석하는 점, ② 항변권 소멸 시점이 수동채권의 변제기보다 ‘먼저’ 도래하여야\n한다고 표현한 점에 특색이 있음（私見으로, 소멸행위는 특정 시점에 일어나는 것이므로 ‘동시에’라\n\n는 표현이 없어진 것이라 생각됨）\n© 자동채권 취득 시점의 예외적 완화", [], 0, "상계", 97],
  ["채권총론_C093", "— 매매잔금채권에 대한 가압류 ‘후’ 매수인이 매매부동산의 경매진행을 막고자", "[2000다43819] （= ‘채권양도’ 451조 2항과 상계도 같은 법리）\n— 매매잔금채권에 대한 가압류 ‘후’ 매수인이 매매부동산의 경매진행을 막고자\n\n부동산에 마쳐진 가압류의 집행채권을 변제공탁함으로써 매도인에 대하여 취득한\n구상금채권을 자동채권으로, 매도인의 매매 잔금채권에 대한 가압류로부터 본압류\n\n및 추심명령을 받은 채권자에게 상계로 대항 O V “매수인의 매매잔금지급의무와\n\n매도인의 가압류기 입등기말소의무는 동시이행관계 O, 매수인의 대위 변제로 인해\n\n매도인이 부담하는 구상채무는 가압류기 입등기 말소의무의 변형으로서 매수인의 매매\n잔금지급의무와 여전히 서로 동시이행 관계 O”\n\n- - 자동채권 원금에서 압류 이후 발생한 이자채권도 자동채권으로 상계\n\nO\n\n4. 상계의 방법（제493조 제1 항）\n— 5. 상계의 효과（제493조 제2항）\n— 상계적상 시점에 소급하여 대등액만큼 채권 소멸\n@ 수동 변제기 一 자동 변제기 一 상계 의사표시 :\n\n상계적상일 = 자동채권 변제기\n\n 자동 변제기 一 수동 변제기 一 상계 의사표시 :\n\n상계적상일 = 수동채권 변제기\n\n© 자동 변제기 一 상계 의사표시 一 수동 변제기 :\n\n상계적상일 = 자동채권 변제기\n\nv. 상계의사표시일로 견해 대립 一 결국은 의사해석의 문제\n-", ["제493조", "제493조 제2항"], 0, "상계", 98],
  ["채권총론_C094", "임차인의 부속물매수청구 후에 임대인의 상계로 부속물매 매대금채권이 상계적상일", "임차인의 부속물매수청구 후에 임대인의 상계로 부속물매 매대금채권이 상계적상일\n（부속물매매대금채권의 발생일）로 소급하여 소멸하더라도 상계적상 시점부터 부속물\n\n매매대금채무와 동시이행관계 소멸하여 임차인이 이행지체 •불법점유로 되는 것은 X\n\n[2024다317332]\n- - 상계충당（제499조） : 변제충당 규정 준용 一 변제충당의 연장선에서는 수동채권이\n여러 개 중 어느 것부터 소각시킬 것인지 혹은 수동채권의 비용• 이자• 원본 소각\n\n순서 문제 一 그러나 판례는 자동채권이 여러 개인 경우에도 상계충당 법리 적용 O\n\n익 반환채권을 자동채권으로 상계항변 一 수동채권（매매대금반환채권）은 해제된 날 발생, 자동채\n권（사용이익반환채권）은 매매계약 해제 무렵부터 차례로 발생 — 각각의 자동채권이 발생한 때 양\n\n채권 모두 이행기에 이르러 상계적상, 자동채권으로 상계적상일 기준 발생한 수동채권의 이자• 지\n\n연손해금 먼저 소멸시키고, 잔액 있으면 원금 소멸시켜야 一 수동채권 원금 일부 소멸된 부분은 상\n\n계적상일 다음날부터 548조 2항 이자 발생 X. 잔존 원금에만 이자 발생 一 상계적상일 기준으로\n수동채권（매매대금반환채권）의 원금 소멸 여부 심리하지 않은 채 매매대금반환채권 원리금에서 자\n동채권 합계액을 빼는 방식으로 상계한 원심법원은 잘못\n\nPART 1\n\n채권총론 • 상계 • 99", ["제499조"], 0, "상계", 99],
  ["채권총론_C095", "6. 상계와 소멸시효（제495조）", "6. 상계와 소멸시효（제495조）\n— 시효 완성된 （자동）채권이 완성 전 상계적상이었다면 채권자는 상계 O （제495조）\n\n장을 ‘공제’ 주장으로 선해했어야 한다는 취지로 보임（‘주장 포함’ 법리, 私見）\n\n기 도래할 것을 요함（통상 자동채권만 도래해도 상계적상으로 보는 것은 적어도 상계자의 상계 의\n\n사표시, 즉 기한의 이익 포기의 실제 의사표시가 있는 경우이므로） — 다만 2016다211309 판결의\n\n경우에는 보증금과 차임에 대한 당사자들의 의사 고려하여 상계가 아닌 ‘공제’를 인정한 것이어서\n\n495조가 ‘유추적용’이 된 것임", ["제495조"], 0, "상계", 100],
  ["채권총론_C096", "제6장 수인의 채권자와 채무자", "제6장 수인의 채권자와 채무자\n제2절 분할채권관계\n\n제3절 불가분채권관계\n\n“ 서론, 분할채권관계, 불가분채권관계 슈\n\n1. 수인의 채권자 채무자 서론\n- 공통 목차 : 9 대외관계 / © 1인에게 생긴 사유의 효력 / © 대내적 효력\n\n- ©의 절대효 • 상대효 판단할 9가지 사항\n채권소멸사유（변제 • 대물변제 • 공탁• 상계 • 경개 . 면제 • 혼동） / 시효완성 / 이행청구\n\n— 변제 -” 변제제공 ’ 채권자지체\n\n이행청구 一 시효중단 • 이행지체 （‘이행청구’ 사유로 인한 경우만 관련됨）\n- 절대효 범위가 넓으면 채무자에게 유리（단, 이행청구는 채권자에게 유리）\n\n2. 분할채권관계\n- 가분급부에서 채권자• 채무자가 여럿이고 다른 의사표시 없는 경우의 원칙（제408조）\n\n- 분할채권", ["제408조"], 0, "상계", 101],
  ["채권총론_C097", "3. 불가분채권관계", "3. 불가분채권관계\n가. 불가분채권（제409, 410조）\n- 절대효 : 청구, 이행 （그에 의한 시효중단• 이행지체, 변제 • 변제제공 • 채권자지체 O）\n\n- 불가분채권자 중 1인과 채무자간 경개 • 면제 一 전부 이행받은 다른 채권자는 그 1인\n이 권리 잃지 않았으면 분급할 이익을 채무자에게 상환해야（410조 2항）\n\n- 2021다238650 판결은 공동임차인과의 약정으로 ‘분할채권’이 될 수도 있고 이때는 불가분채권으\n로 볼 수 없다는 취지를 간접적으로 설시했음（私見）\n\n나. 불가분채무（제411조）\n— 절대효 : 변제 （변제제공 • 채권자지체）, 대물변제, 공탁 一 대체로 연대채무 준용\n\nX\n\n— 대내관계 : 연대채무 준용\n\n-", ["제411조"], 0, "다수당사자채권", 102],
  ["채권총론_C098", "있거나 수익 비율이 다르면 그에 따라 부담부분 결정 ••• 411조, 425조 1항, 424조, 연", "있거나 수익 비율이 다르면 그에 따라 부담부분 결정 ••• 411조, 425조 1항, 424조, 연\n대채무자 사이에 관한 2012다97420 판결 [2020다208195]\n2023년 8모 채점기준）, 위 대법원 판결은 계약금반환의무를 불가분채무로 본 1심의 판단을 전제\n로 법리만 판단한 것이고, 1 심은 ‘0| 사건 매매계약이 단순한 부동산 매매가 아닌 △호텔 사업권을\n\n포함한 사업 일체의 매매로서 그 소유권이전의무, 대금지급의무 불가분적이고, 해제 원상회복의무\n\n역시 불가분채무’라고 본 것에 불과하므로, 위와 같은 일반화는 부당함（私見）.", [], 0, "다수당사자채권", 103],
  ["채권총론_C099", "제4절 연대채무", "제4절 연대채무\n\n쏘 연대채무 슈\n\n1. 서설, 대외관계\n- 수인이 전부를 각자 이행할 의무, 1인의 이행으로 다른 채무자 의무 면함（제413조）\n— 각 채무 독립성 : 조건 • 기한 • 이행기 • 이행지 • 보증인유무 다를 수 있음\n어느 연대채무자의 법률행위 무효 • 취소는 다른 연대채무자에게 영향 無（제415조）\n\n- 성립 : 법률행위（계약）, 법률의 규정 一 제616조. 제654조（수인의 사용차주, 수인의\n\n임차인）, 상법 제57조 제1항（수인이 1인 • 전원에게 상행위 되는 행위로 인하여 채무를\n부담한 때）, 제832조（부부 일상가사 연대책임）. 병존적 채무인수（부탁에 의한 원칙적\n인 경우）\n— 어느 연대채무자 or 동시 • 순차로 모든 연대채무자에 전부 • 일부 이행청구（제414조）\n\n2. 1 인에게 생긴 사유의 효력 一 절대적 효력（제416〜422조）\n— 변제 • 대물변제 • 공탁 • 상계 • 경개 • 면제 • 혼동, 소멸시효완성（제421 조）, 이행청구（제416조）\n청구에 의한 시효중단• 이행지체 O, 변제 • 변제제공 • 채권자지체\n\nO\n\n있으나, 법전협 출제기준 및 실무를 종합하여. ‘재판상 청구’도 포함하는 견해로 정리할 것（즉, 연대\n채무자 1 인에 대해 소를 제기 하면 다른 연대채무자도 완전한 시효중단 효력 있는 것）.\n\n— 상계（제418조） : 제1항 절대효\n\n제2항 자동채권 가진 연대채무자의 부담부분에 한하여 다른 연대채무자가 상계 O\n\n— 부담부분 한정 절대효 : 소멸시효 완성, 면제, 혼동\n 외측설", ["제413조", "제415조", "제616조", "제654조", "제57조 제1항", "제832조"], 0, "다수당사자채권", 104],
  ["채권총론_C100", "- 상대적 효력 : 승인 •압류 •가압류 •가처분에 의한 시효중단, 시효이익 포기, 확정판결", "- 상대적 효력 : 승인 •압류 •가압류 •가처분에 의한 시효중단, 시효이익 포기, 확정판결\n에 의한 시효기간 연장（=보증인）, 채권양도 통지（手보증인）\n\n- 연대의 면제 : 해당 채무자의 채무액을 부담부분 범위로 제한해주는 것\n1인에게만 ‘연대의 면제’ 해주면 그만이 채무 감축 （다른 연대채무자에 영향 無）\n연대의 면제 받은 채무자라고 하여 내부적 구상의무가 없는 것은 아님\n연대채무자 전원에게 ‘연대의 면제’ 해주면 분할채무로 변경\n\n3. 대내관계\n\n- 구상권의 범위（제425조） : 다른 연대채무자의 ‘부담부분’에 대하여 구상하며\n출재액 + 면책일 이후 법정이자 + 피할 수 없는 비용 + 손해\n\n— 준용 : 수탁보증인, 분별이 익無 공동보증인간（불가분, 연대보증, 보증연대）\n\n출재 : 자기 재산 감소 요하므로 면제\n\nX, 시효완성 X\n\n- 구상의 요건 관련 : 출재액이 자기 부담부분 넘지 않아도 바로 구상 O [통판]\n\n（羊 부진정연대채무, 공동보증인간 : 자기 부담부분 넘어야 구상）\n\n- 통지의무（제426조） : 구상요건 혹은 구상권 제한 의미\n제1항 사전통지 게을리 : 다른 연대채무자는 채권자에게 대항할 사유로 부담부분에\n한하여 대항 O, 상계였다면 자동채권이 면책시킨 연대채무자에게 이전됨\n\n제2항 사후통지 게을리 : 다른 연대채무자가 ‘사전통지 하고[통]’ 선의로 면책행위 하\n면 면책행위 유효 주장 O （다른 연대채무자도 사전통지 안했다면 먼저 이뤄진 변제\n만 유효 •/ 이중변제의 일반원칙 = 주채무자 • 수탁보증인 사안 판례 有）\n\n제2항의 유효 주장은 사후통지 게을리한 연대채무자에 대해서만 상대적 효력 [통]\n대하여 부당이득반환청구 O, 한편 므는 甲에 대하여는 90만원 부당이득반환청구 O, 다만 위와 같\n\n이 A로부터 구상•부당이득반환 받은 한도에서 이러한 B의 甲에 대한 채권이 A에게 이전\n- 상환무자력자（제427조） : 구상권의 확장 의미\n\n제1항 양적 확장 : 상환무자력자의 부담부분은 구상권자와 다른 채무자가 부담부분\n에 비례하여 분담, 다만 구상권자 무과실일 것\n\n제2항 인적 확장 : 다른 채무자가 ‘연대의 면제’ 받았다면 위 다른 채무자가 분담할\n부분을 채권자가 부담\n\nPART 1\n\n채권총론 • 연대채무 • 105", ["제425조", "제426조", "제427조"], 0, "다수당사자채권", 105],
  ["채권총론_C101", "소 부진정연대채무 슈", "소 부진정연대채무 슈\n\n1. 의의\n- 의의\n\n 불법행위책임자 상호간 : 35조 법인과 대표자, 756조 사용자와 피용자,\n\n755조 책임무능력자의 감독자와 대리감독자, 760조 공동불법행위자 사이\n- 채무불이행책임과 불법행위책임 : 1 인에게 생긴 사유의 효력\n- 절대적 효력 : 변제 • 대물변제 • 공탁 • 상계 [통판]\n 부진정연대채무에서 다액 채무자의 일부 변제 등으로 채무가 소멸하는 순서\n학설 : 1） 외측설（단독 부담 부분부터 소멸）, 2）내측설（공동 부담 부분부터 소멸）, 3）\n\n과실비율설（채무액 혹은 과실의 비율로 소멸）\n을 작성하되, 엄밀히는 전자가 정확한 용어가 아닐까 생각됨（私見）", [], 0, "다수당사자채권", 106],
  ["채권총론_C102", "물론 이와 별개로", "물론 이와 별개로\n고의 불법행위자는 상계가 금지되는데（496조）, 법전협 모의고사에서는 다른 불법행위자가 상계할\n\n경우 다른 고의 불법행위자도 상계 절대효 받음을 전제로 출제된 적이 있음\n\n으로 서류 위조 제출 - 甲회사의 보증계약은 무효（무권대리）. 甲회사는 사용자책임 o, 內회사\n의 50억 대출금채무와 부진정연대채무 — 丁은행은 대출금 50억 손해 있으나 30% 과실상계로\n甲회사 사용자책임 손해배상채무는 35억 원 一 다액채무자 內이 丁에게 ① 대출금 일부 2억 변\n\n제, ② 丁에 대한 예금채권으로 대출금 일부 2억과 상계 一 일부 변제 • 상계 금액은 內회사 단독\n\n부담 부분 15억부터 소멸（외측설） 一 甲회사의 35억 손해배상채무는 전혀 소멸하지 x（금액은\n실제 사안에서 변형함） 一 대법원은 사용자책임이 아닌 사안에서는 2018년 전원합의체 이전부터\n\n도 외측설을 취해옴\n\nPART 1\n\n채권총론 • 부진정연대채무 •\n\n107", [], 0, "다수당사자채권", 107],
  ["채권총론_C103", "3. 대내관계", "3. 대내관계\n- 부진정연대채무는 주관적 공동관계가 없어 부담부분을 생각하기 어려우나, 법률의\n\n규정 내지 판례이론을 통해 구상권 유사의 법률관계 성립 O\n자기 부담부분 이상을 변제하여야 구상 o [통판] （羊 연대채무）\n- 법률의 규정 : 35조와 61 65조 해석상, 756조 3항\n\n（공동불법행위 사안이 아님） 경비용역업체（채무불이\n행）와 도둑（불법행위） 사이에서도 구상권 인정\n\n-", [], 0, "다수당사자채권", 108],
  ["채권총론_C104", "제 5절 보증채무", "제 5절 보증채무\n\n싸 보증채무 슈\n\n1 .서설\n가. 법적 성질\n\n— 독립성（소멸시효기간 따로 결정）, 동일성, 부종성, 보충성\n- 부종성\n© 성 립상 : 주채무 무효 • 취소 • 소멸하면 보증채무도 무효 • 소멸\n\n 내용상 : 430조, 433조, 434조, 435조\n© 이전상 : 채권 양도하면 함께 이전\n\nART 1\n\n채권총론 • 보증채무 •\n\n109", [], 0, "다수당사자채권", 109],
  ["채권총론_C105", "© 채권자의 의무（제436조의2）", "© 채권자의 의무（제436조의2）\n\n: 보증계약 체결 • 갱신할 때 내용에 영향 미칠 주채무\n\n자의 신용정보 있으면 알려야,\n\n체결 후에 지체없이 보증인에게 알려야 할 사유 :\n\n주채무 • 종속채무를 3개월 이상 이행 아니할 경우, 이행기에 이행할 수 없음을 미리\n\n안 경우, 주채무자 신용정보에 중대한 변화 생겼음을 안 경우\n— 채권자 의무 위반으로 보증인 손해 생기면 법원이 보증채무 감경 • 면제 가능\n\n© 제436조 삭제 : 취소원인 있는 채무의 보증인이 보증계약 당시 취소원인 알았다면\n주채무 불이행 • 취소시 주채무와 동일한 목적 독립채무 부담한 것 一 X\n@ 근보증（제428조의3） ： 불확정 다수 채무에 대해서 보증 O, 이때 최고액을 보증인의\n기명날인 • 서명 있는 서면으로 특정하지 아니하면 보증계약 무효\n\n다. 범위\n\n- 이자 . 위약금 • 손해배상 • 기타 종속 채무 담보（제429조 제1 항）\n\n적 • 형태상의 부종성 （제430조） : 주채무의 목적 • 형태보다 보증인 부담이 중하면 주\n채무 한도로 감축", ["제436조의2", "제436조", "제428조의3", "제429조", "제430조"], 0, "다수당사자채권", 110],
  ["채권총론_C106", "2. 보증인의 권리", "2. 보증인의 권리\n가. 주채무자 항변권의 행사（제433조）\n\n제1항 : 주채무자의 항변으로 채권자에게 대항 O\n\n제2항 : 주채무자의 항변포기는 보증인에게 효력 X\n주채무의 무효 • 취소（된 사실） • 동시이행관계 - 변제기미도래 • 변제 등 사유 주장\n\n주채무자의 기한이익 포기, 소멸시효이익 포기는 보증인에게 효력\n\nO\n\nX\n\n적상 아닌 상황일 가능성이 큼）이므로 구별해야 함\n\n다. 채무이행의 거절（제435조）\n주채무자가 채권자에 대해 취소권 • 해제 • 해지권 있는 동안 보증인은 이행을 거절\n\nO\n\n계약당사자 아닌 보증인이 직접 행사는 못하지만 이행을 거절하도록 한 것\n\nPART 1\n\n채권총론 • 보증채무\n\n.111", ["제433조", "제435조"], 0, "다수당사자채권", 111],
  ["채권총론_C107", "라. 최고 • 검색 항변권（제437조）", "라. 최고 • 검색 항변권（제437조）\n주채무자의 변제자력 및 집행 용이함 증명하여 먼저 주채무자에게 청구 • 집행할 것\n항변 O — 보충성, 이행지체책임 면제 효과 / 연대보증인은 보충성\n\nX （단서）\n\n3. 주채무자 • 보증인에게 생긴 사유의 효력\n가. 주채무자에게 생긴 사유 一 절대적 효력\n- 그러나 주채무 부담을 가중하는 것은 보증인에 효력\n\nX\n\n으로 보증인 부담 가중으로 본 판례\n\n—  주채무자에 대한 시효 중단은 보증인에 효력 （제440조） : 169조, 176조의 예외\n\n440조는 부종성에서 비롯된 규정 X （ 보증인에게 생긴 사유 一상대적 효력\n- 그러나 보증인의 변 • 대 • 공 • 상 사유（채권 만족）는 주채무자에 채무소멸 효력 O", ["제437조", "제440조"], 0, "다수당사자채권", 112],
  ["채권총론_C108", "4. 대내관계", "4. 대내관계\n-  수탁보증인의 구상권\n\n- 구상권 범위（제441조） : 연대채무 425조 （출 • 이 • 비 • 손） 준용,\n\n원칙적 사후구상\n\n— 예외적 사전구상（제442조） -- 주채무자의 면책청구권이 항변권\n제1호 보증인이 과실 없이 채권자에게 변제할 재판\n\n제2호 주채무자 파산선고 및 채권자 미가입\n제3호 이행기 • 최장기 미확정에 보증계약 후 5년 경과\n제4호 이행기 도래（제2항 보증계약 후 채권자의 주채무자 변제기 연장으로 대항 X）\n\n 주채무자의 면책청구권（제443조） : 자기를 면책하게 하거나 자기에게 담보를 제공할\n것을 청구 / 배상금공탁 • 담보제공 • 보증인면책으로 배상의무 면할 수 있음\n\nPART 1\n\n채권총론 • 보증채무 •\n\n113", ["제441조", "제442조", "제443조"], 0, "다수당사자채권", 113],
  ["채권총론_C109", "비수탁보증인의 구상권", "비수탁보증인의 구상권\n\n— 면책행위 당시 이 익을 얻은 한도（제444조 제1항）\n의사에 反하여 보증했다면 （구상권 행사 당시） 현존이 익의 한도（제444조 제2항）\n\n다. 통지의무 : 구상권 제한\n- 보증인의 통지의무（제445조） : 사전 • 사후 두 번의 통지의무 有\n\n제1항 사전통지 게을리 : 주채무자는 채권자에게 대항할 사유로 보증인에 대항 O,\n상계였다면 자동채권이 보증인에게 이전됨\n\n제2항 사후통지 게을리 : 주채무자가 선의로 면책행위 하면 면책행위 유효 주장 O\n- 주채무자의 통지의무（제446조） : 수탁보증인에게 사후통지만 （비수탁 X, 사전통지 X）\n사후통지 게을리 : 보증인이 ‘사전통지 하고[통판]’ 선의로 면책행위 하면 주채무자에\n게 면책행위 유효 주장 O\n\n少 보증인은 사전 • 사후 두 번의 통지의무 有", ["제444조 제1항", "제444조 제2항", "제445조", "제446조"], 0, "다수당사자채권", 114],
  ["채권총론_C110", "먼저 이뤄진 주채무자의 면책행위 유효, 보증인의 면책행위 무효, 보증인은 주채무자", "먼저 이뤄진 주채무자의 면책행위 유효, 보증인의 면책행위 무효, 보증인은 주채무자\n에게 구상권 X ••• 446조는 445조 1항을 전제로, 사전통지 않은 보증인까지 보호하려는\n취지\n\nX ’ [95446265] - 보증인은 채권자를 상대로 부당이득반환청구 O\n\n라. 주채무자 수인인 경우\n- 주채무가 연대채무 • 불가분채무일 때 그 중 1인을 위한 보증인이 변제하면 다른\n\n연대 • 불가분채무자에 대해 그 부담부분에 한하여 구상 O （제447조） : 결제 간편 취지\n\n. 연대보증, 보증연대\n- 연대보증 : 주채무자와 연대한 보증인 一 보충성\n\nX, 분별의 이익 X （수인인 경우）\n\n- 보증연대 : 수인의 보증인끼리 상호 연대 — 보충성\n\nO, 분별의 이익 X\n\n6 .공동보증\n- 공동보증에서 각 보증인은 분별의 이익 有 원칙 （제439조, 제408조）\n\n분별의 이익 : 공동보증에서 각 보증인이 주채무를 균등비율로 분할한 부분에 대해\n\n서만 보증채무 부담하는 이 익\nPART 1\n\n채권총론 • 보증채무 .115", ["제447조", "제439조", "제408조"], 0, "다수당사자채권", 115],
  ["채권총론_C111", "분별의 이익 없는 공동보증인（제448조 제2항 참조） :", "분별의 이익 없는 공동보증인（제448조 제2항 참조） :\n@ 주채무가 불가분급부인 경우, ® 연대보증인, © 보증연대를 한 경우\n- 보증인 각자가 주채무 전액 채무 부담\n\n연대채무 유사한 관계, 즉 보증연대가 있을 것을 요한다는 의미로 보임（私見）\n- 공동보증인 중 1인이 변제한 경우 구상권 : ① 주채무자에 구상할 수 있음은 물론,\n\n② 자기 부담부분 넘어서 변제한 경우는 다른 공동보증인에게 구상（제448조 제2항）\n\n— 다른 공동보증인에 대한 구상 : ® 분별이익有 : 444조 준용（당시 얻은 이익）,\n® 분별이 익無 : 425〜427조 준용（출 • 이 • 비 • 손）\n\n-  공동연대보증인 중 1인이 전액 변제하고 주채무자로부터 구상채무 일부를 변제받은\n경우의 법률관계", ["제448조 제2항"], 0, "다수당사자채권", 116],
  ["채권총론_C112", "그 부담부분 초과하면 그 초과부분은 ‘주채무자의 구상채무’와 ‘다른 연대보증인들의", "그 부담부분 초과하면 그 초과부분은 ‘주채무자의 구상채무’와 ‘다른 연대보증인들의\n각 부담비율 상응한 구상채무’를 동시에 감소시킴 [2009다46873]\n\n— 주채무자 명의 사용 허락한 자와 연대보증인 사이의 법률관계\n\n• 구상은 공동면책을 요건으로\n\n7. 계속적 보증\n- 보증인 기명날인 • 서명한 서면으로 최고액 특정 않으면 보증계약 무효（제428조의3）\n\n— 법 개정 전 판례 법리\n\nART 1\n\n채권총론 • 보증채무 .117", ["제428조의3"], 0, "다수당사자채권", 117],
  ["채권총론_C113", "는 불법행위로 구성", "[判例]는 불법행위로 구성\nO）,\n\n© 계약의 ‘이행’을 믿음으로 인한 （채무불이행 이유 해제하며 이행이익에 갈음하여\n\n이행 믿고 지출한 비용청구 O [통판]）,\n\n@ 목적물의 ‘하자 없음’을 믿음으로 인한\n\n（하자담보책임, ‘매수대금 - 하자 있는 상태의 시가’）\n— 신뢰이익은 이행이익을 한도로 함 [통판] ••• 535조 1항 단서가 근거\n-\n\n正辯 : 채무불이행과 불법행위 공히 차액설을 취하지만. 채무불이행은 이행해야 할 채무를 이행하\n지 않았으니 이행되었다면 누릴 이익을 기준으로 ‘이행이익’ 개념이 생겼고, 그에 비해 불법행위는", [], 0, "손해배상", 18],
  ["채권총론_C114", "통상적 의학적 • 법적 조치 취하지 않은 잘못", "[判例] 통상적 의학적 • 법적 조치 취하지 않은 잘못\n\n正辯 : 판결문 실무에서는 이 경우 ‘책임제한’이라는 용어를 사용함\n- 피해자측 과실이론 :", [], 0, "손해배상", 22],
  ["채권총론_C115", "@ 소이—소이등 ex. 순차매도, 시효완성자로부터의 매수인", "[判例]\n\n@ 소이—소이등 ex. 순차매도, 시효완성자로부터의 매수인\n© 소이—말소\n\nex. 반사회적 이중매매, 중간생략등기형 명의신탁의 명의신탁자,\n\n매매 • 취시완성 목적물에 불법등기\n© 인도一인도 ex 임차인 • 미등기매수인 • 취시완성자가 불법점유자 상대로\n\n철거一인도,\n\n인도一철거\n\n-", [], 0, "채권자대위", 28],
  ["채권총론_C116", "“채무자 일반재산이 감소하여 채권 공동담보에 부족이 생겨 완전한", "[判例] “채무자 일반재산이 감소하여 채권 공동담보에 부족이 생겨 완전한\n변제 할 수 없게 되는 것” = “채무초과（무자력） 상태 초래되거나 이미 빠져있던 채무\n초과（무자력） 상태가 악화되는 경우”\n\n- 무자력은 사해행위 당시 기준 （다만, 변론종결시까지 유지되어야）\n—", [], 0, "사해행위취소", 38],
  ["채권총론_C117", "주택의 임대차보증금반환채권 양도한 경우 양수인은 우선변제권 X", "[判例] 주택의 임대차보증금반환채권 양도한 경우 양수인은 우선변제권 X\n\n-", [], 0, "채권양도", 60],

  ["채권총론_P009", "2006다72765", "이때 채무자만 항소하였고 항소이유 없더라도 법원은 항소심", "[判例] 이때 채무자만 항소하였고 항소이유 없더라도 법원은 항소심\n변론종결 당시 기준으로 다시 환산하여 불이익변경금지 위반하지 않는 한 채무자의\n\n항소 일부 인용해야 [2006다72765]", "", [], 0, "채권목적", 5, "미분류"],
  ["채권총론_P010", "2020다300473", "금전대차계약상 이자의 이자제한법 최고이자율 초과 부분은 무효（동", "[判例2023] 금전대차계약상 이자의 이자제한법 최고이자율 초과 부분은 무효（동\n법 2조 3항）, 채무자가 초과 이자 임의 지급하면 초과분은 원본 충당（4항）, 원본 소\n\n멸하면 반환청구 0（4항）, 초과 지급한 부분에 준소비대차계약 체결해도 마찬가지\n\nPART 1\n\n채권총론 • 채권의 목적 • 5\n\n- ‘약정지연이자’에 대해서도 이자제한법 적용 [2020다300473]\n\n正辯 : 약정 지연손해는 이자 개념과 다르고 동법 6조가 감액 규정한 점을 들어 동법상의 최고이\n자율은 적용이 없다는 견해도 있으나（63다1212 판결）, 그 후 대법원은 약정 지연손해에도 최고이\n자율을 적용한다고 명시함. 이에 따르면 동법 6조는 구법 당시 약정이 그 당시 최고이자율（가령", "", [], 0, "채권목적", 5, "미분류"],
  ["채권총론_P011", "2023다272289", "이자제한법에서는 예금•할인금•수수료•공제금 체당금 기타 명칭에 불", "[判例2024] 이자제한법에서는 예금•할인금•수수료•공제금 체당금 기타 명칭에 불\n구하고 금전 대차와 관련하여 채권자가 받은 것은 이자로 규정（동법 4조 1항）, 초과\n\n하는 이자를 받으면 형사처벌 규정 있음（8조 1항）\n금전 이전받는 상대방이 받은 금전 원금 전액 반환을 보장하는 약정을 하지 않았다\n\n면 금전소비대차계약 X, 이자제한법 적용 여지 X ••' 민법 598조（그와 같은 수량으\n로 반환할 것을 약정）\n\n이자제한법 적용받는 금전소비대차계약인지 여부는 계약 해석 문제로서 당사자의\n관계, 경위, 약정 이익의 성질•제공방법, 거래관념 등 종합적 고려 一 원금 전액의\n반환과 아울러 추가로 상대방 사업성공•이익발생 등 조건 충족 결부시키지 않은 일\n\n정한 금전 지급을 약정 내용 자체에서 확정적 보장했다면 금전소비대차계약으로서\n\n이자제한법 적용될 가능성 높음 [2023다272289]", "", [], 0, "채권목적", 6, "미분류"],
  ["채권총론_P012", "2023다221885", "중도상환수수료는 이자제한법의 간주이자 X （법 4조 1항에서 ‘이자’", "[大判全合2025] 중도상환수수료는 이자제한법의 간주이자 X （법 4조 1항에서 ‘이자’\n는 예금, 수수료 … 명칭 불구 금전 대차 관련하여 채권자가 받은 것） ••• 중도상환수\n\n수료는 중도상환 시 손해배상액 예정이고 본래 의미 금전대차 대가 X（153조 2항,\n\n468조 따른 기한 전 변제 손해배상인데 종합 고려 개별적 판단하며 손해가 언제나\n‘중도상환 시점으로부터 변제기까지의 약정이자’와 일치하진 않음）, 형사처벌（법 8조\n\n1항） 직결되어 중도상환수수료의 간주이자 해당 여부 엄격 해석해야, 간주이자 아니\n더라도 법 6조로 감액하거나 약관규제법 • 대부업법 등 규제되어 채무자 보호 가능,\n\n대법원이 중도상환수수료를 대부업법의 간주이자로 본 것은 대부업법 특수성 반영한\n것이므로 원용 X [2023다221885]\n\n正辯 : 당시 3인 반대의견은 손해배상액 예정인 중도상환수수료도 간주이자로 보아 최고이자율\n적용하자는 입장인데, 그 설시과정에서 ‘소비대차 손해배상액 예정은 이자제한법 간주이자가", "", [], 0, "채권목적", 6, "미분류"],
  ["채권총론_P013", "2016다259769", "이자제한법 최고이자율은 금전대차 계약상 ‘이자’에만 적용, ‘위약벌’에는 적", "[判例] 이자제한법 최고이자율은 금전대차 계약상 ‘이자’에만 적용, ‘위약벌’에는 적\n\n용 X [2016다259769]\n\n正辯 : 약정 지연손해는 이자 개념과 다르고 동법 6조가 감액 규정한 점을 들어 동법상의 최고이\n자율은 적용이 없다는 견해도 있으나（63다1212 판결）, 그 후 대법원은 약정 지연손해에도 최고이\n자율을 적용한다고 명시함. 이에 따르면 동법 6조는 구법 당시 약정이 그 당시 최고이자율（가령\n\n正辯 : 가령 100만 원 중 선이자 연 30%를 공제하고 대여일에 70만 원을 인도했다면, 70만 원에", "", [], 0, "채권목적", 6, "미분류"],
  ["채권총론_P014", "2012다86895", "임대차 목적물이 화재로 소멸되어 임차인의 목적물반환의무가 이행", "[大判全合] 임대차 목적물이 화재로 소멸되어 임차인의 목적물반환의무가 이행\n\n불능 된 경우, 임차인은 귀책사유 없음 입증 못하는 한 이행불능 손해배상책임（화재\n의 구체적 발생원인 밝혀지지 않은 경우도 마찬가지） 一 그러나 화재가 임대인의\n\n지배 •관리 영역 존재 하자로 발생 추단되면, 임차인이 하자 미리 알았거나 알 수 있\n었다는등특별한사정 없는 한, 임차인은 이행불능손해배상책임 X\n건물 일부 임대차에서 임차건물 부분에 화재 발생하여 ‘임차 외 건물’ 부분까지 불에\n\n타 발생한 손해에 관해 임차인에게 채무불이행책임 물으려면, “① 화재 발생에 임차\n\n인의 계약상 의무 위반 있고, ② 의무 위반과 임차 외 건물 부분 손해 사이 상당인과\n\n관계 있으며, ③ 임차 외 건물 부분의 손해가 의무 위반에 따른 통상손해 혹은 임차\n인이 알았거나 알 수 있는 특별손해의 범위에 해당하는 사실 등을 모두 임대인이 주\n장 • 증명해야” [2012다86895]\n\n正辯 : 종래의 대법원은 ‘구조상 불가분 일체’이면 임차인이 귀책사유 없음을 증명하지 못하는 한\n임차 외 건물 부분도 채무불이행에 따른 손해배상책임 진다는 견해였으나 변경 • 폐기됨", "", [], 0, "채무불이행", 8, "미분류"],
  ["채권총론_P015", "2023다244895", "위 법리（임차인 귀책사유 없는 점 증명책임）는 목적물 반환의무가 불능은", "[判例2023] 위 법리（임차인 귀책사유 없는 점 증명책임）는 목적물 반환의무가 불능은\n아니지만 훼손되어 손해배상 구할 때도 마찬가지\n\n623조（임차인에게 인도）, 374조（선관주의의무）, 654-615조（원상회복의무）에 따라 인도\n받아 사용.수익하는 동안 임차인이 목적물 직접 지배로 추단 o\n\n그러나 숙박계약에는 위 법리 적용 X, 숙박계약 고객이 객실 사용수익하던 중 원인\n미상 화재로 객실에 발생한 손해는 특별한 사정 없는 한 숙박업자 부담으로 귀속\n•.• 숙박계약은 ‘일시사용 임대차계약’으로 임대차와 유사하면서 다른 요소, 숙박업자\n\n는 고객 안전배려 보호의무나 공법적 의무 부담, 고객에게 객실 제공한 숙박기간 중\n에도 고객이 아닌 숙박업자가 객실 비롯한 숙박시설 점유 지배 O [2023다244895]", "", [], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P016", "2001다44338", "“391조의 피용자는 채무자의 의사관여 있으면 충분, 지시감독관계 • 종속성", "[判例] “391조의 피용자는 채무자의 의사관여 있으면 충분, 지시감독관계 • 종속성\n불문” —► 임대인이 임차인과의 약정 이행 위하여 제3자에 도급주어 시설물설치 중\n\n수급인 과실로 화재 발생하면 임대인이 임차인에 채무불이행책임 O [2001다44338]", "", [], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P017", "2017다275447", "제3자가 단순히 호의로 행위한 경우에도 채무자 용인 아래 이뤄졌으면 이행", "[判例] 제3자가 단순히 호의로 행위한 경우에도 채무자 용인 아래 이뤄졌으면 이행\n\n보조자 O [2017다275447]\n-", "", [], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P018", "94다22446", "임대인의 관리인이 임차인의 임차점포 출입 봉쇄하여 사용• 수익 못하게 한", "[判例] 임대인의 관리인이 임차인의 임차점포 출입 봉쇄하여 사용• 수익 못하게 한\n경우 임대인은 채무불이행책임（391조）, 이행보조자는 불법행위책임（750조） -> 양자\n의 책임은 부진정연대채무관계 [94다22446]\n\n-", "", [], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P019", "2011다133", "이행보조자가 채무 이행 위하여 제3자를 ‘복이행보조자’로서 사용하는 경우", "[判例] 이행보조자가 채무 이행 위하여 제3자를 ‘복이행보조자’로서 사용하는 경우\n\n채무자가 묵시적 승낙.동의했다면 391조에 의해 복이행보조자의 고의 •과실에 관하\n여 채무자가 책임 부담 o [2011다133이\n\n- 동의 있는 전대차에서 전차인을 임차인의 이행보조자로 볼 것인지 : 이행보조자로\n보는 견해 v. 선임 • 감독 귀책사유 있는 경우만 책임진다는 견해\n\nPART 1\n\n채권총론 • 채무불이행 • 9\n\n3. 이행지체\n가. 요건\n\n- ① 이행기에 ② 이행이 가능함에도 ③ 이행을 게을리 ④ 귀책사유 ⑤ 위법성\n\n- 이행지체의 시점（제387조）\n\n: 엄밀히는 그 ‘다음 날’부터 지체책임\n\n@ 확정기한 : 기한 도래한 때\n\n© 불확정기한 : 기한 도래함을 안 때 O소멸시효 : 기한 객관적 도래한 때）\n© 기한 정함 없는 채무 : 이행청구를 받은 때 （羊소멸시효 : 채권 발생한 때）\n아. 부당이득반환채무, 지 연손해금채무（손해배상채무）\n\n@ 반환시기 정함 없는 소비대차 : 상", "", ["제387조"], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P020", "2022다258248", "상행위로 인한 원본채권 및 그 지연손해금 지급 명하는 이행판결 확정된", "[判例2022] 상행위로 인한 원본채권 및 그 지연손해금 지급 명하는 이행판결 확정된\n\n경우, 채권자가 그 ‘지연손해금’을 이행청구 하면 채무자는 상법 54조 상사법정이율\n연 6%의 지연손해금 O ••• 원본채권이 상행위로 인한 채권이면 지연손해도 상행위\n\n로 인한 채권 O, 판결로 그러한 실체적 내용 바뀌지는 않음, 채권자의 확정된 지연\n\n손해금 이행청구로 지체책임 발생 [2022다258248]\n-", "", [], 0, "채무불이행", 10, "미분류"],
  ["채권총론_P021", "80다1037", "매매계약 목적물상 담보권설정등기 말소할 의무와 잔대금 지급의무는", "[判例] 매매계약 목적물상 담보권설정등기 말소할 의무와 잔대금 지급의무는\n특별한 사정 없는 한 동시이행관계 ■— 쌍방이 이행기에 이행하지 않으면 그 이후\n\n쌍방 채무는 기한의 정함 없는 동시이행 관계 [80다1037]", "", [], 0, "채무불이행", 10, "미분류"],
  ["채권총론_P022", "74다1393", "불법행위 손해배상채무는 불법행위일 ‘당일’부터 지체책임 [74다1393]", "[判例] 불법행위 손해배상채무는 불법행위일 ‘당일’부터 지체책임 [74다1393]", "", [], 0, "채무불이행", 10, "미분류"],
  ["채권총론_P023", "2015다239508", "628조 차임증액청구에 협의 불성립하여 법원이 차임 결정한 경우, 증액된 차", "[判例] 628조 차임증액청구에 협의 불성립하여 법원이 차임 결정한 경우, 증액된 차\n임은 증액청구 도달시가 이행기 （법원결정시 X）[2015다239508]", "", [], 0, "채무불이행", 10, "미분류"],
  ["채권총론_P024", "2015다207044", "기한 정하지 않은 채무에 정지조건 있다면, 정지조건 성취 후 채권자가 이행", "[判例] 기한 정하지 않은 채무에 정지조건 있다면, 정지조건 성취 후 채권자가 이행\n\n청구하면 지체책임 발생 / 청구금액 불확정이어도 지체책임 O [2015다207044]\n-", "", [], 0, "채무불이행", 10, "미분류"],
  ["채권총론_P025", "2010다47117", "추심명령 송달된 경우 제3채무자가 압류채권자에 대하여 지체책임 지는 것", "[判例] 추심명령 송달된 경우 제3채무자가 압류채권자에 대하여 지체책임 지는 것\n\n은 압류채권자로부터 추심금 청구 받은 다음날부터 O （추심명령 송달받은 때 X）\n\nV 추심명령은 추심 권능 수여에 그칠 뿐, 지급 명하거나 기한 정하는 것 X [2010다47117]\n\n—", "", [], 0, "채무불이행", 10, "미분류"],
  ["채권총론_P026", "93다951", "채권 가압류가 있어도 이행기 도래하면 제3채무자 지체책임 O", "[大判全合] 채권 가압류가 있어도 이행기 도래하면 제3채무자 지체책임 O\n\nV 가압류는 제3채무자에 대해 지급금지할 뿐 채무 그 자체 면하게 하는 것 X 제3채무자는 487조 공탁으로 지체책임 면 O\n\nV 이중변제 위험, 채권 가압류되면\n\n‘채권자가 변제를 받을 수 없는 때’ O - 공탁금출급청구권에 가압류 존재 [93다951]", "", [], 0, "채무불이행", 11, "미분류"],
  ["채권총론_P027", "2009다22778", "보증인의 보증금 지급의무에 지급금지가처분결정 있었더라도 이행기 도래하", "[判例] 보증인의 보증금 지급의무에 지급금지가처분결정 있었더라도 이행기 도래하\n면 보증인은 지체책임 O V 가처분으로 지급거절권능 생기는 것은 X - 채권자의\n수령불능 이유로 변제공탁 O, 지체책임 면함 [2009다22778]\n\n-", "", [], 0, "채무불이행", 11, "미분류"],
  ["채권총론_P028", "93다11203", "원인채무 이행과 어음•수표 반환이 동시이행 관계 있다 하더라도 원인채무", "[判例] 원인채무 이행과 어음•수표 반환이 동시이행 관계 있다 하더라도 원인채무\n이행기 도래하면 원칙적 지체책임 O, 어음•수표 반환받지 않았음을 이유로 항변권\n행사해야 ■•• 쌍무계약상 대가관계 X [93다11203]", "", [], 0, "채무불이행", 11, "미분류"],
  ["채권총론_P029", "2009다69692", "원인채권과 어음채권 병존할 경우, 채권자가 원인채권 행사하면 채무자는", "[判例] 원인채권과 어음채권 병존할 경우, 채권자가 원인채권 행사하면 채무자는\n원칙적으로 어음상환 항변 O —* 그러나 이러한 거절은 이중지급 위험 면할 목적,\n\n원인채권 이행 청구권과 어음반환청구권 사이 536조 쌍무계약상 채권채무관계나\n유사한 대가관계는 X — 어음상 권리 시효소멸로 이중지급 위험 없고 채무자가\n\n다른 어음상 채무자에 대해 권리 행사할 수도 없는 경우, 채권자의 원인채권 행사에\n채무자 어음상환 동이항 X [2009다69692]\n-", "", [], 0, "채무불이행", 11, "미분류"],
  ["채권총론_P030", "2009다59671", "신원보증인의 채무는 채권자로부터 이행청구를 받아야 지체책임 o ••• 이는", "[判例] 신원보증인의 채무는 채권자로부터 이행청구를 받아야 지체책임 o ••• 이는\n\n피보증인의 불법행위로 인한 손해배상채무 자체가 아니고 신원보증계약에 기하여\n\n발생한 채무로서 이행기 정함이 없는 채무이므로 [2009다59671]\n—", "", [], 0, "채무불이행", 11, "미분류"],
  ["채권총론_P031", "2021다232331", "지연손해금은 금전채무 이행지체 따른 손해배상으로 기한 없는 채무 —", "[判例2022] 지연손해금은 금전채무 이행지체 따른 손해배상으로 기한 없는 채무 —\n\n확정된 지연손해금을 채권자가 청구하면 채무자 지체책임, 이행판결 확정된 지연손\n해금도 이행청구로 지체책임 v 판결로 권리 실체적 내용 바뀌지 않으므로\n\n당해 사건에서 지연손해금의 발생원인인 원본의 이행판결 선고하지 않는 경우에는\n소촉법 3조 법정이율 적용 X V 소촉법 3조는 1 心항 규정이나 입법취지 비추어 금\n\n전채무 원본 이행청구가 소송물일 때 그 이행 명하면서 동시에 덧붙는 지연손해금에\n\n적용되는 규정 [2021다232331]\n\n正辯 : ‘지연손해금’ 채권을 양수한 채권양수인이 지급명령으로 양수금（지연손해금） 구하다가 소송\n으로 이행된 후 양수금 원금 부분 취하하고 원금의 연 12% 비율 지연손해금（지연손해금의 지연손\n해금） 부분만 청구 一 지급명령 송달일 다음날부터 계산한 지연손해금 인용하되 원금의 연 5% 비", "", [], 0, "채무불이행", 11, "미분류"],
  ["채권총론_P032", "2020다26876", "판결 확정된 채권자가 시효중단 위한 신소 제기하며 확정판결에 따른", "[判例2022] 판결 확정된 채권자가 시효중단 위한 신소 제기하며 확정판결에 따른\n원금과 원금에 대한 확정 지연손해금 및 이에 대한 지연손해금을 청구 一 채무자\n는 확정 지연손해금에 대하여도 청구받은 다음날부터 지연손해금을 별도로 지급\n해야 하고, 그 이율은 신소에 적용되는 법정이율을 적용해야 ••• 확정 지연손해금\n에 대한 지연손해금채권은 채권자가 신소로써 확정 지연손해금을 청구함에 따라\n\n비로소 발생하는 채권으로서 전소 소송물인 원금채권이나 확정 지연손해금채권과\n는 별개 소송물이므로 [2020다26876이\n\n正辯 : 시효중단 위한 신소 제기에서 기존 확정된 판결금 중 지연손해금채권（당시 소촉법상 이율\n인 연 20%가 적용되어서 계산한 금액）에 대해서는 신소의 소장 부본 송달일（혹은 판결 선고일） 다", "", [], 0, "채무불이행", 12, "미분류"],
  ["채권총론_P033", "2012다29557", "기한 정함 없는 채권 양도되고 양수인이 양수금청구하여 소송계속 중에 양도", "[判例] 기한 정함 없는 채권 양도되고 양수인이 양수금청구하여 소송계속 중에 양도\n\n통지가 채무자에 도달하면 통지 도달 다음 날부터 지체책임 [2012다29557]", "", [], 0, "채무불이행", 12, "미분류"],
  ["채권총론_P034", "97다1299", "기한이익 상실 특약이 ‘정지조건부’인지 ‘형성권적’인지 불분명한 경", "[判例] 기한이익 상실 특약이 ‘정지조건부’인지 ‘형성권적’인지 불분명한 경\n\n우 채권자에게 유리한 형성권적 기한이익 상실특약으로 추정 [97다1299이\n나. 효과\n\n① 강제이행\n② 손해배상 : 지연배상. 단, 예외적 전보배상（제395조） — ® 지체 후 상당기간 최고해\n\n도 기간 내 이행 않는 경우,\n\n® 지체 후의 이행이 채권자에게 이익 없는 때", "", ["제395조"], 0, "채무불이행", 12, "미분류"],
  ["채권총론_P035", "90다카27129", "매도 위해 출고한 자동차의 수치인이 차량 분실하여 임치인이 매수인에게 이", "[判例] 매도 위해 출고한 자동차의 수치인이 차량 분실하여 임치인이 매수인에게 이\n미 새 차 출고 • 인도하였는데 수치인이 차량 되찾은 경우, 임치 인은 차량을 반환받고\n지연배상을 구할 것이 아니라 차량 시가인 전보배상 구할 수 있음 [90다카27129]\n\n正辯 : 이것은 물건의 채무자가 ‘이행지체’하다가 멸실된 경우의 문제인 것에 대비하여, 물건의 채\n권자가 ‘수령지체’하다가 멸실된 경우는 538조 1 항의 문제임", "", [], 0, "채무불이행", 12, "미분류"],
  ["채권총론_P036", "96다14616", "“채무의 이행불능이라는 것은 단순히 절대", "[判例] “채무의 이행불능이라는 것은 단순히 절대\n적 •물리적 불능 아니라 사회생활 경험법칙이나 거래상 관념에 비추어 채권자가 채무\n\n자의 이행의 실현을 기대할 수 없는 경우” [96다14616]\n\n正辯 : 원시적 불능과 후발적 불능을 구별하고, 원시적 불능에서는 객관적/주관적 불능에 따라, 그\n리고 후발적 불능에서는 각 귀책사유에 따라 각 어떤 법리가 전개되는지 개관할 수 있어야\n\n-", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P037", "65다947", "부동산 이중매매로 매도인이 1인에게 먼저 소유권명의 이전해주면 특별한", "[判例] 부동산 이중매매로 매도인이 1인에게 먼저 소유권명의 이전해주면 특별한\n사정이 없는 한 다른 1인에 대한 소유권이전등기의무는 이행불능 [65다947]", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P038", "66다1565", "이중매도인의 배임행위에 적극 가담하여 매수한 매매행위는 사회정의관념에", "[判例] 이중매도인의 배임행위에 적극 가담하여 매수한 매매행위는 사회정의관념에\n위배된 반사회적 법률행위로서 무효 [66다1565]", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P039", "91다8104; 2000다47361", "매매목적물에 가등기 • 가압류 • 가처분만으로는 이행불능 X — 그러나 매도인", "[判例] 매매목적물에 가등기 • 가압류 • 가처분만으로는 이행불능 X — 그러나 매도인\n이 변제자력 없거나 강제집행으로 소유권 잃은 경우는 이행불능 O [91다8104, 99다\n\n11045, 2000다47361]", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P040", "2005다39211", "미등기전매 에서 매도인의 소유권이전등기 청구권이 가압류 • 처분금지 가처분", "[判例] 미등기전매 에서 매도인의 소유권이전등기 청구권이 가압류 • 처분금지 가처분\n\n된 경우에 매도인이 무자력이면 이행불능 O [2005다39211]", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P041", "73다1133", "瓦0 제3자에게 지상권설정등기 및 저당권설정등기를 한 경우 매도인의 소유", "[判例] 瓦0 제3자에게 지상권설정등기 및 저당권설정등기를 한 경우 매도인의 소유\n권이전등기의무는 이행불능 O [73다1133]\n-", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P042", "93다37977; 94다54641", "임대인의 소유권 상실이 바로 이행불능은 X [93다37977] — 그러나 임차인이", "[判例] 임대인의 소유권 상실이 바로 이행불능은 X [93다37977] — 그러나 임차인이\n\n진실한 소유자로부터 목적물 반환청구나 차임 상당액 지급청구 받으면 이행불능 O\n\n— 임차인은 임대차 당연종료 이유로 차임지급 거절 O [94다54641]\n-", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P043", "2005다29474", "강박으로 소유권이전등기 마친 후 제3자에게 이전등기 -‘ 말소 환원 여부", "[判例] 강박으로 소유권이전등기 마친 후 제3자에게 이전등기 -‘ 말소 환원 여부\n가 결정될 사정 있으므로 아직 이행불능 X - 그러나 피강박자가 등기명의인 상대\n로 말소등기청구소송 제기하여 패소확정된 때 이행불능 O （이때 등기명의인의 등기\n부 취득시효 인정으로 패소된 것이라도 이행불능 시점이 취득시효 완성 당시 X ）\n\n[2005다29474]", "", [], 0, "채무불이행", 13, "미분류"],
  ["채권총론_P044", "95다5929", "“쌍무계약에서 일부 이행불능 있는 때 불능 부분 제외한 나머지 부분", "[判例] “쌍무계약에서 일부 이행불능 있는 때 불능 부분 제외한 나머지 부분\n만의 이행으로는 계약 목적 달성할 수 없다면 전부 이행불능으로 보아야 一 채권자\n는 전부 해제 혹은 전부 전보배상 O, 이행 가능 부분만의 급부청구 X”\n\n— 신축 예정 상가건물 중 특정점포 분양계약 체결 후 착공 않은 채 부도 및 해외 도\n피로 분양점포 소유권이전등기 이행불능이면 대지지분권 이전도 이행불능 ••• “일반\n\n적으로 토지와 지상건물 매매한 경우 토지와 지상건물은 특별한 사정이 없는 한 법\n\n률적 운명 같이하는 것이 거래 관행, 당사자 의사, 경제관념 합치, 특히 집합건물에\n서 대지지분권은 불가분 관계” [95다5929]", "", [], 0, "채무불이행", 14, "미분류"],
  ["채권총론_P045", "92다4581", "“우리 민법에 대상청구권 규정 없으나, 해석상 부정할 이유가 없다.” [92다4581]", "[判例] “우리 민법에 대상청구권 규정 없으나, 해석상 부정할 이유가 없다.” [92다4581]", "", [], 0, "채무불이행", 14, "미분류"],
  ["채권총론_P046", "2003다435482", "원인무효 등기 마친 자가 제3자에 매도하고 제3자가 등기부 취득시효 완성", "[判例] 원인무효 등기 마친 자가 제3자에 매도하고 제3자가 등기부 취득시효 완성\n한 사건에서 진정한 소유자는 원인무효 등기 마친 매도인에 대하여 매수인으로부터\n받은 매매대금을 대상청구권 행사 X V 불능과 대상취득 사이에 상당인과관계 X\n\n[2003다435482]\n\n正辯 : 후술하는 부당이득•불법행위 단원에서 2019다272275 판결이 부당이득의 ‘인과관계’ 부정\n한 것. 2007다36445 판결이 불법행위의 ‘인과관계’ 긍정한 것과 비교할 것", "", [], 0, "채무불이행", 14, "미분류"],
  ["채권총론_P047", "2008다54877", "토지거래허가구역 내 유동적 무효 토지 매매에서 토지 수용되어 확정적 무효", "[判例] 토지거래허가구역 내 유동적 무효 토지 매매에서 토지 수용되어 확정적 무효\n로 된 경우 대상청구권 X V 대상청구권은 매매계약 유효함을 전제로 이행불능의\n\n효과로서 인정되는 권리 - 원심판단의 정당성 인정 [2008다54877]", "", [], 0, "채무불이행", 14, "미분류"],
  ["채권총론_P048", "95다2074", "취득시효 완성된 토지가 수용된 경우 완성자는 대상청구권 행사로서 수용보", "[判例] 취득시효 완성된 토지가 수용된 경우 완성자는 대상청구권 행사로서 수용보\n상금의 공탁금출급청구권 양도 청구 O — 그러나 수용보상금의 수령권자가 자신이\n\n라는 확인 X [95다2074]", "", [], 0, "채무불이행", 15, "미분류"],
  ["채권총론_P049", "99다23901", "그러나 어떤 사유로 채권자가 직접 자기 명의로 대상청구 대상인 보상금을", "[判例] 그러나 어떤 사유로 채권자가 직접 자기 명의로 대상청구 대상인 보상금을\n지급받았더라도 채무자에 대한 관계에서 바로 부당이득이 되지는 X [99다23901]", "", [], 0, "채무불이행", 15, "미분류"],
  ["채권총론_P050", "2013다7769", "“매매 목적물이 화재 소실되어 매도인이 받는 화재보험금• 화재공제금 ‘전부’", "[判例] “매매 목적물이 화재 소실되어 매도인이 받는 화재보험금• 화재공제금 ‘전부’\n에 대하여 매수인은 대상청구권 O, 이행불능 당시 매수인이 지급했거나 지급하기로\n약정한 ‘매매대금’ 상당액 한도 내로 범위 제한 X” [2013다7769]\n\n正辯 : 기존 학설대립은 ‘손해’를 한도로 할 것인지 여부이므로 불능 당시 ‘시가’ 상당액에 한정되지\n않는다는 표현이면 명확했을 것이나, 결론적으로 대법원은 무제한설의 입장에 가까움\n\n- 대상청구권 유형별", "", [], 0, "채무불이행", 15, "미분류"],
  ["채권총론_P051", "92다4581; 95다6601; 2010다71431", "@ 토지수용 : 매매 토지 수용된 경우 보상금에 대상청구권 행사 O [92다4581]", "[判例]\n@ 토지수용 : 매매 토지 수용된 경우 보상금에 대상청구권 행사 O [92다4581]\n\n— 수용 사안에 대상청구권 행사 인정함으로써 537조 위험부담 법리 적용 배제 O\n— 채권자의 선택에 따르며, 채권자가 대상청구권 행사할 경우는 반대급부 이행의무 존속\n\n正辯 : 대상청구권을 인정한 최초의 대법원 판례는 채무자에게 귀책사유가 없는 토지수용 사건（위\n험부담）이었으며, 이후 이중매매（협의매매 포함）와 같은 채무자 귀책사유 있는 ‘이행불능’ 사건에서\n도 당연히 대상청구권을 인정하고 있음\n\n© 취득시효 완성된 토지 : 수용 혹은 이행불능 된 경우 완성자는 대상청구권 O “단,\n\n불능 전에 취득시효 권리주장 혹은 등기청구 했어야” [94다25025, 94443825]\n© 교환계약 : 당사자 쌍방이 각 협의매도 하여 각각 이행불능 된 경우에 그 중 일방은\n\n대상청구권 행사 X ••• 반대급부 이행 가능하여야 [95다6601]\n© 근저당권설정 사해행위취소 : 사해행위취소 및 근저당권등기말소 승소 확정되었으\n\n나 임의경매 진행으로 경락되어 근저당권등기말소의무가 이행불능으로 된 경우에\n대상청구권 행사로서 수익자가 받은 배당금반환청구 O [2010다71431]\n\n正辯 : 애초 배당금청구권의 양도（양도통지의 상대방은 대한민국, 측 경매법원）를 구하다가 피고가", "", [], 0, "채무불이행", 15, "미분류"],
  ["채권총론_P052", "92다9463", "쌍무계약인 부동산 매매계약에서 매수인이 이행기일 도과 후 매도인에 대해", "[判例] 쌍무계약인 부동산 매매계약에서 매수인이 이행기일 도과 후 매도인에 대해\n\n계약상 의무 없는 과다한 채무 이행 요구하는 경우 매도인으로서는 자기 채무 이행\n제공이나 최고 없이도 계약 해제 o ••• 매수인이 이미 자기 채무 이행의사 없음을\n\n표시한 것 [92다9463]\n\n正辯 : 이행기 ‘후’ 이행거절이므로 544조 단서를 적용한 판례", "", [], 0, "채무불이행", 16, "미분류"],
  ["채권총론_P053", "2014다227225", "채무자가 이행하지 않을 의사 명백히 표시한 경우 채권자는 신의칙상 이행기", "[判例] 채무자가 이행하지 않을 의사 명백히 표시한 경우 채권자는 신의칙상 이행기\n\n전에도 최고 없이 해제 •손해배상청구 O 단, “이행거절이라는 채무불이행”이 인정\n되려면 채무자의 이행 거절 표시가 위법해야 [2014다227225]", "", [], 0, "채무불이행", 16, "미분류"],
  ["채권총론_P054", "2018다21421", "回S 390조는 채무불이행에 관한 일반조항주의 채택, 544조에 따라", "[判例2021] 回S 390조는 채무불이행에 관한 일반조항주의 채택, 544조에 따라\n이행지체 상태에서 이행거절의사 표시하면 최고 없이 해제 O - 이행 않을 의사\n\n명백히 표시하면 채권자는 이행기 ‘전’이라도 최고 없이 이행거절 이유로 해제 O,\n손해배상 O — 이행거절의사는 명백하고 종국적이어야 •/ 최고•이행제공 필요\n없는 등 해제요건 완화 [2018다21421 이\n\n正辯 : 오피스텔 임대차에서 바닥 난방공사 특약사항 一 임대인이 카펫이나 전기패널 방식 제안 一\n임차인이 ‘최종적으로 카펏। • 전기패널 아니면 공사 안 되는 거죠?’라고 문자 보낸 직후 해제 통보", "", [], 0, "채무불이행", 16, "미분류"],
  ["채권총론_P055", "89다카29", "매도인이 중도금 수령 회피한 후 오히려 중도금 미지급을 들어 ‘해제 통지’한", "[判例] 매도인이 중도금 수령 회피한 후 오히려 중도금 미지급을 들어 ‘해제 통지’한\n경우 [89다카29]", "", [], 0, "채무불이행", 16, "미분류"],
  ["채권총론_P056", "93다11821", "“부동산 매도인이 중도금 수령 거절하면서 계약 이행하지 않을 의사 명백히", "[判例] “부동산 매도인이 중도금 수령 거절하면서 계약 이행하지 않을 의사 명백히\n\n표시한 경우, 매수인이 잔금 지급기일까지 기다려 이행제공 하고 해제하도록 하면\n불필요한 절차•손해 강요하여 신의칙 위배되므로, 매수인은 소유권이전등기의무의\n\n이행기일까지 기다릴 필요 없이 바로 계약 해제 O” [93다11821]\n\n正辯 : 중도금 기일에 일어난 일이므로 이행기 ‘전’ 이행거절 사안임을 찾아내어 논의 써야\n—", "", [], 0, "채무불이행", 17, "미분류"],
  ["채권총론_P057", "88다1516", "이행거절이 있었어도 ‘철회’되면 이행거절 종료되어 그 후는 이행지체 법리로", "[判例] 이행거절이 있었어도 ‘철회’되면 이행거절 종료되어 그 후는 이행지체 법리로\n\n만 해제（544조에 의하여 자기 채무 이행 제공, 최고） [88다1516]", "", [], 0, "채무불이행", 17, "미분류"],
  ["채권총론_P058", "93다4359", "숙박계약은 일시사용 위한 임대차계약, 통상의 임대차와 같이 단순히 여관의", "[判例] 숙박계약은 일시사용 위한 임대차계약, 통상의 임대차와 같이 단순히 여관의\n객실 • 관련시설 제공하여 사용수익하게 할 의무에 더하여 “신의칙상 부수적 의무로\n서 고객에게 안전 • 편안한 객실 • 관련시설 제공하여 고객의 안전을 배려할 보호의무”를\n\n부담 O （羊통상의 임대차 : 안전배려의무 X）— 숙박업자가 이를 위반하여 고객의\n생명 • 신체 침해하여 손해 입히면 “불완전이행의 채무불이행책임 O” [93다4359이\n\n正辯 : 성질상 확대손해이며, 여기에 불법행위책임도 경합할 수 있음", "", [], 0, "채무불이행", 17, "미분류"],
  ["채권총론_P059", "2005다213", "채무불이행 •불법행위로 재산적 손해 발생한 경우, 그로 인한 정신적 고통은", "[判例] 채무불이행 •불법행위로 재산적 손해 발생한 경우, 그로 인한 정신적 고통은\n재산적 손해의 배상 이뤄지면 회복 O — 재산적 손해 배상만으로 회복될 수 없는\n\n정신적 고통 입었다는 특별한 사정 있고 상대방이 알았거나 알 수 있었을 경우에 한\n\n하여 위자료 인정 [2005다213]", "", [], 0, "손해배상", 18, "미분류"],
  ["채권총론_P060", "", "는 불법행위로 구성", "[判例]는 불법행위로 구성\nO）,\n\n© 계약의 ‘이행’을 믿음으로 인한 （채무불이행 이유 해제하며 이행이익에 갈음하여\n\n이행 믿고 지출한 비용청구 O [통판]）,\n\n@ 목적물의 ‘하자 없음’을 믿음으로 인한\n\n（하자담보책임, ‘매수대금 - 하자 있는 상태의 시가’）\n— 신뢰이익은 이행이익을 한도로 함 [통판] ••• 535조 1항 단서가 근거\n-\n\n正辯 : 채무불이행과 불법행위 공히 차액설을 취하지만. 채무불이행은 이행해야 할 채무를 이행하\n지 않았으니 이행되었다면 누릴 이익을 기준으로 ‘이행이익’ 개념이 생겼고, 그에 비해 불법행위는", "", [], 0, "손해배상", 18, "미분류"],
  ["채권총론_P061", "2023다223171,2023다223188", "일방 당사자가 상대방 이행을 믿고 지출한 비용도 지출사실을 상대방이", "[判例2023] 일방 당사자가 상대방 이행을 믿고 지출한 비용도 지출사실을 상대방이\n알았거나 알 수 있었고 통상적 지출비용 범위 내에 속한다면 이행이익 한도 내에서\n배상청구 O — 일실이익 손해와 신뢰이익 배상을 함께 청구할 경우에 일실이익은\n\n제반비용 공제한 순이익에 한정 •■• 중복배상 방지 [2023다223171, 2023다223188]", "", [], 0, "손해배상", 19, "미분류"],
  ["채권총론_P062", "93다51874", "정신적 손해 정기금배상 규정（751조 2항） 있으나 재산적 손해에도 법원이 재", "[判例] 정신적 손해 정기금배상 규정（751조 2항） 있으나 재산적 손해에도 법원이 재\n\n량으로 정기금배상 명할 수 O [93다51874]", "", [], 0, "손해배상", 19, "미분류"],
  ["채권총론_P063", "2016다203551", "계약 일방이 계약 체결이 관련 법령에 위반되지 않는 점 및 계약 이행을 진", "[判例] 계약 일방이 계약 체결이 관련 법령에 위반되지 않는 점 및 계약 이행을 진\n술 보장했는데도 이행 못하여 상대방에게 손해 입히면 계약상 의무 이행하지 않은\n\n채무불이행책임 O - 그러나 체결된 계약이 강행법규 위반하여 손해배상채무 이행\n\n하는 것이 강행법규가 금지하는 결과 가져온다면 손해배상청구 X [2016다203551]", "", [], 0, "손해배상", 19, "미분류"],
  ["채권총론_P064", "2016다248806", "불법행위로 물건이 훼손되면 통상손해 : @ 수리 가능한 경우는 수리비, ® 수", "[判例] 불법행위로 물건이 훼손되면 통상손해 : @ 수리 가능한 경우는 수리비, ® 수\n리 불가능한 경우는 교환가치 감소액,\n\n© 수리한 후에도 일부 수리 불가능한 부분\n\n남은 경우에는 수리비 + 수리불능 교환가치 감소액 O [2016다248806]", "", [], 0, "손해배상", 19, "미분류"],
  ["채권총론_P065", "2009다91828", "불법행위로 건물 훼손되어 사용 수리 불가능한 경우 위 통상손해인 교환가치", "[判例] 불법행위로 건물 훼손되어 사용 수리 불가능한 경우 위 통상손해인 교환가치\n（시가）에는 철거비용 포함 X [2009다91828]", "", [], 0, "손해배상", 19, "미분류"],
  ["채권총론_P066", "84다532", "393조 2항 특별손해 배상에 있어 채무자가 그 사정을 알았거나 알 수 있었는", "[判例] 393조 2항 특별손해 배상에 있어 채무자가 그 사정을 알았거나 알 수 있었는\n지 여부 기준 시기는 계약체결당시가 아니라 채무 이행기까지를 기준으로 판단해야\n\n[84 三日 H 532]\n\nPART 1\n\n채권총론 • 손해배상 • 19", "", [], 0, "손해배상", 19, "미분류"],
  ["채권총론_P067", "94다61359", "매도인의 소유권이전등기의무 이행불능으로 매수인이 입는 손해액은 원칙적", "[判例] 매도인의 소유권이전등기의무 이행불능으로 매수인이 입는 손해액은 원칙적\n\n으로 이행불능 당시 시가 상당액 O, 그 이후 목적물 가격 등귀했어도 그로 인한 손\n해는 특별손해이므로 매도인이 ‘이행불능 당시’ 그러한 특수한 사정을 알았거나 알\n\n수 있었을 때에 한하여 손해배상 O [94다61359]\n—", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P068", "67다466", "매수인이 배추장수인 사실, 서울로 실어간다는 사실을 알던 매도인은 매수인의", "[判例] 매수인이 배추장수인 사실, 서울로 실어간다는 사실을 알던 매도인은 매수인의\n\n전매차익 발생을 알 수 있었으므로 특별손해인 전매차익 배상해야 [67다466]", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P069", "92다2028", "토지매도인이 매수인의 건물신축 사실 알았다면 그 후 토지 소유권이전의무", "[判例] 토지매도인이 매수인의 건물신축 사실 알았다면 그 후 토지 소유권이전의무\n\n가 이행불능으로 된 경우에 매도인은 토지 人]가（통상손해） 외에 건물철거로 인한 손\n해（특별손해）도 배상할 의무 O [92다2028]\n\n-", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P070", "2001다82507", "휴업손해는 통상손해 O, “영업용 물건이 멸실되면 ‘대체 물건 마련’에,", "[大判全合] 휴업손해는 통상손해 O, “영업용 물건이 멸실되면 ‘대체 물건 마련’에,\n\n일부 손괴되면 ‘수리’에 각 합리적으로 필요한 기간 동안 영업을 계속했다면 얻을 수\n있었던 이익” [2001다82507]\n-", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P071", "90다카7569", "수리 가능한 경우 수리비가 통상 손해이나, 수리비가 건물 교환가치를 넘는", "[判例] 수리 가능한 경우 수리비가 통상 손해이나, 수리비가 건물 교환가치를 넘는\n\n경우（=경제적 수리불능）에는 건물 교환가치 범위 내로 제한되어야 [90다카7569]", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P072", "98다7735", "그러나 높은 수리비로 수리함이 시인될 특별한 사정 있다면 예외적으로 수리", "[判例] 그러나 높은 수리비로 수리함이 시인될 특별한 사정 있다면 예외적으로 수리\n비 전액 배상 [98다7735]", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P073", "94다44774", "물건 인도의무의 이행지체로 인한 손해배상은 그 물건을 사용•수익함으로써", "[判例] 물건 인도의무의 이행지체로 인한 손해배상은 그 물건을 사용•수익함으로써\n얻는 이익, 차임 상당액이 통상손해 一 건물건축공사 도급계약에서 공사 지체로 인\n\n한 완성 - 인도의무 지체 손해배상도 차임 상당액 배상 [94다44774]\n\n-", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P074", "2005다63337", "손해액 산정 시기는 ① 이행지체로 인한 전보배상（395조）은 본래 의무이행", "[判例] 손해액 산정 시기는 ① 이행지체로 인한 전보배상（395조）은 본래 의무이행\n\n최고했던 상당 기간 경과한 당시의 시가, ② 이행불능으로 인한 전보배상액은 이행\n불능 당시의 시가, ③ 이행거절로 인한 전보배상액은 이행거절 당시의 시가를 각 표\n준으로 산정함 [2005다63337]", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P075", "80다417", "“매도인 및 매수인의 소유권이전등기 말소의무가 원소유자의 말소등기절차", "[判例] “매도인 및 매수인의 소유권이전등기 말소의무가 원소유자의 말소등기절차\n\n이행 청구소송에서 확정되었다면, 매도인의 이행불능으로 인한 손해배상액의 산정\n은 그 패소확정시 기준 O, 등기말소시 X” [80다417]", "", [], 0, "손해배상", 20, "미분류"],
  ["채권총론_P076", "96다30113", "법원은 직권으로 판단하여 반드시 참작하여야 [96다30113]", "[判例] 법원은 직권으로 판단하여 반드시 참작하여야 [96다30113]\n\n- 일부청구와 과실상계 :", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P077", "75다819", "“손해 전액에서 과실비율 감액하고 그 잔액이 청구액", "[判例] “손해 전액에서 과실비율 감액하고 그 잔액이 청구액\n을 초과할 경우는 청구 전액을 / 잔액이 청구액을 초과 않을 경우는 잔액을” 각 인용\n\n하는 것이 일부청구 당사자의 의사 [75다819]", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P078", "83다323", "소구채권 전액에서 인정되는 반대채권액으로 상계를 하", "[判例] 소구채권 전액에서 인정되는 반대채권액으로 상계를 하\n고 —잔. 청. 초. 청 / 잔. 청. 않. 잔 [83다323]\n—", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P079", "80다3277", "과실상계 먼저 하고 손익상계 I 一 人 [80다3277]", "[判例] 과실상계 먼저 하고 손익상계 I 一 人 [80다3277]", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P080", "2022다262209", "국민건강보험법에 따라 보험급여 받은 피해자가 불법행위의 가해자를", "[判例2022] 국민건강보험법에 따라 보험급여 받은 피해자가 불법행위의 가해자를\n상대로 손해배상청구 할 경우, 손해 발생에 피해자 과실 경합되거나 기왕증 책임\n제한 된다면 전체 기왕치료비 손해액에서 먼저 국민건강보험공단의 부담금 공제\n후 과실상계 혹은 책 임 제한 산정 [2022다262209]\n\n正辯 : 그 논거를 보면, 공단이 불법행위 피해자에게 보험급여를 한 다음 가해자에 대해 국민건강", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P081", "72다108; 2013다34143; 95다49554", "과실상계 적용 X : 손해배상액 예정 [72다108], 해제 원상회복 [2013다34143],", "[判例] 과실상계 적용 X : 손해배상액 예정 [72다108], 해제 원상회복 [2013다34143],\n피해자 부주의 이용한 고의 불법행위（=사기 • 횡령 • 배임 등 영득행위, 위조행위 등\n“가해자가 불법행위의 이익 최종 보유하면 공평 • 신의칙에 반하는 경우에 한하여”）\n\n[99다50538, 2007다36445, 2012다 1146],\n\n표현대리 [95다49554]", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P082", "94다23920,80다923", "무과실책임과 과실상계 : “580, 581조（667조） 소정의 매도인（수급인）의 하자", "[判例] 무과실책임과 과실상계 : “580, 581조（667조） 소정의 매도인（수급인）의 하자\n담보책임은 법정 무과실책임으로서 3%조 과실상계 규정이 준용될 수는 없다 하더\n\nPART 1\n\n채권총론 • 손해배상 • 21\n\n라도, 담보책임 입각한 공평의 원칙상 하자 발생 •확대에 가공한 매수인（도급인）의\n\n잘못을 참작하여 손해배상 범위 정함이 상당” [94다23920, 80다923]\n\n正辯 :대체로 유추적용 인정한 것으로 해석하나, 판례 표현이 다소 불명확하고 ‘준용’과 ‘유추적용’\n의 용어들은 구별실익 적으므로. ‘사례형’에서는 두 표현 다 자제하고 ‘잘못을 참작한다’는 표현을\n사용할것", "", [], 0, "손해배상", 21, "미분류"],
  ["채권총론_P083", "기다218", "타인 물건 매매에서 매수인이 매도인 소유에 속하지 않음을 알지 못한 것이", "[判例] 타인 물건 매매에서 매수인이 매도인 소유에 속하지 않음을 알지 못한 것이\n매수인의 과실에 기 인했다면 매도인 배상액을 산정함에 참작하여야 [기 다218]\n\n正辯 : 타인 권리 매매 담보책임에도 과실상계 유추 긍정된다는 판례이긴 하나, 통상 매수인 측의\n‘잘못’. 즉 ‘타인 권리를 이전해주지 못한 것’에 대한 ‘귀책사유’로서 ‘고의나 과실’이 잘못으로 참작\n되는 법리라는 점 고려할 때, 단순히 매수인의 ‘인식’에 있어서의 과실, 즉, ‘악의나 과실’에서의 과", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P084", "2000다472572", "손해담보계약상 담보권리자의 청구권에 과실상계 준용 X, 유추적용 X", "[判例] 손해담보계약상 담보권리자의 청구권에 과실상계 준용 X, 유추적용 X\n••• 손해배상청구권 X, 이행청구권 O — 다만 담보권리자 고의 •과실로 손해 야기\n\n되는 등 구체적 사정에 비춰 담보권리자의 권리행사가 신의칙 •형평 원칙에 반한다\n\n면 그 권리행사 전부. 일부가 제한될 수 O [2000다472572]\n-", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P085", "91다2977,98다50586", "과실상계의 유추적용 O : ⑪ 가해행위로 인한 손해의 발생 • 확대에 피해자의", "[判例] 과실상계의 유추적용 O : ⑪ 가해행위로 인한 손해의 발생 • 확대에 피해자의\n심인적 • 체질적 소인이 기여했다면 법원은 공평의 원칙상 과실상계 법리 유추적용\n\n[91다2977, 98다50586], ©", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P086", "", "통상적 의학적 • 법적 조치 취하지 않은 잘못", "[判例] 통상적 의학적 • 법적 조치 취하지 않은 잘못\n\n正辯 : 판결문 실무에서는 이 경우 ‘책임제한’이라는 용어를 사용함\n- 피해자측 과실이론 :", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P087", "98다31868; 98다23232", "공평 원칙상 “신분상• 사회생활상 일체를 이루는 관계”", "[判例] 공평 원칙상 “신분상• 사회생활상 일체를 이루는 관계”\n에 있는 자의 과실도 피해자의 과실로 인정 [98다31868] — 각종 차량 동승 사건 운\n\n전자의 과실을 동승 피해자의 과실로 인정 一 다만 다방 종업원 차 배달 사건에서는\n\n부정 [98다23232]\n\n正辯 : 사용자（다방주인） 운전, 피용자 피해 구조였기 때문인 것으로 해석됨", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P088", "97다35344", "오로지 호의동승 차량 ‘운전자’ 과실로 동승자가 손해입어 동승차량 ‘운행자’", "[判例] 오로지 호의동승 차량 ‘운전자’ 과실로 동승자가 손해입어 동승차량 ‘운행자’\n상대로 손해배상 구할 때 一 운전자의 과실은 오로지 동승차량 운행자의 손해배상\n\n채무의 성 립요건일 뿐 피해자측 과실로 참작할 수 X [97다35344]\n-", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P089", "2017다16747", "공동불법행위에서 과실상계는 피해자의 가해자 각인에 대한 과실비율", "[判例2022] 공동불법행위에서 과실상계는 피해자의 가해자 각인에 대한 과실비율\n\n서로 달라도 전원에 대해 전체적 평가 ’.• 공동불법행위는 가해자들이 공동으로 가\n한 불법행위에 대한 책임 추궁 一 그러나 공동불법행위자 관계 아니면서 서로 별개\n원인 발생한 독립 채무가 동일한 경제적 목적 가져서 부진정연대채무 관계 인정될\n\n경우는 과실상계를 채무자 전원에 대해 전체적 평가 X [2017다16747]\n\n正辯 : 원고가 甲으로부터 공급받아 心에게 임대한 부두용 크레인의 붐（boom）이 붕괴한 사건에서\n甲의 크레인 제작상 과실（채무불이행 or 하자담보 책임）과 己의 크레인 관리상 과실（불법행위 or\n\n正辯 :대체로 유추적용 인정한 것으로 해석하나, 판례 표현이 다소 불명확하고 ‘준용’과 ‘유추적용’\n의 용어들은 구별실익 적으므로. ‘사례형’에서는 두 표현 다 자제하고 ‘잘못을 참작한다’는 표현을\n사용할것", "", [], 0, "손해배상", 22, "미분류"],
  ["채권총론_P090", "2009다85342", "397조 1항 단서는 약정이율이 법정이율 이상인 경우만 적용, 법정이율보다", "[判例] 397조 1항 단서는 약정이율이 법정이율 이상인 경우만 적용, 법정이율보다\n\n낮은 경우는 본문으로 돌아가 법정이율로 지연손해금 산정 '•• 무이자약정인 경우도\n이행지체 지연손해금은 법정이율로 청구할 수 있으므로 [2009다85342]", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P091", "2011다50509", "그러나 지연손해금률 자체를 따로 약정했다면 법정이율보다 낮더라도 약정", "[判例] 그러나 지연손해금률 자체를 따로 약정했다면 법정이율보다 낮더라도 약정\n지연손해금률을 그대로 적용 [2011다50509]", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P092", "99다57126", "채권자의 과실을 들어 따로 감경할 필요 X •/ 과실상계 X [99다57126]", "[判例] 채권자의 과실을 들어 따로 감경할 필요 X •/ 과실상계 X [99다57126]\n©", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P093", "2000다35771", "과다 여부, 감액 범위에 관한 판단 기준시기는 사실심 변론종결 당시", "[判例] 과다 여부, 감액 범위에 관한 판단 기준시기는 사실심 변론종결 당시\n\n[2000다35771]\n©", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P094", "99다38637", "법원은 당사자 주장 없더 라도 직 권 감액 O [99다38637]", "[判例] 법원은 당사자 주장 없더 라도 직 권 감액 O [99다38637]\n\n@", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P095", "95다33658", "법원은 실제 손해액을 구체적으로 심리 •확정할 필요는 없고, 다만 채무자", "[判例] 법원은 실제 손해액을 구체적으로 심리 •확정할 필요는 없고, 다만 채무자\n\n는 실제 손해액이 예정액에 미치지 못함을 입증할 （실제상） 필요 있음 [95다33658]\n\n@", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P096", "91다1149", "법원이 감액한 부분은 처음부터 무효 [91다1149이", "[判例] 법원이 감액한 부분은 처음부터 무효 [91다1149이\n®", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P097", "2017다8876; 2017다8876; 2022다227619", "부당성은 채권자• 채무자 지위, 계약 목적 • 내용, 손해배상액 예정한", "[判例2023] 부당성은 채권자• 채무자 지위, 계약 목적 • 내용, 손해배상액 예정한\n\n동기 • 경위 등 모든 사정 참작하여 일반 사회관념상 예정액 지급이 경제적 약자인\n채무자에게 부당한 압박 가하여 공정성 잃는 결과 초래하는 경우에 인정 一 기록상\n\n실제 （예상） 손해액 알 수 있다면 대비해 볼 필요 O, 단지 예정액 자체가 크다거나\n해제 시까지 단기라고 감액해서는 X — 배상액 예정이 없더라도 채권자가 받을 수\n있던 금액보다 적은 금액으로 감액하면 X — 사실심의 전권 사항 O, 다만 형평의\n원칙에 비추어 현저히 불합리하면 불허 [2017다8876, 20224227619]\n\n正辯 : 2017다8876 판결은 손해배상 예정액이 손해액의 10배이더라도 부당히 과다한 것은 아니라\n고 하였고, 2022다227619 판결은 투자금의 2배를 지급하는 약정을 투자금으로 감액한 원심의 감", "", [], 0, "손해배상", 23, "미분류"],
  ["채권총론_P098", "92다46905", "위약금이 위약벌（=실손해 배상과는 별도로 받는 제재금）로 되려면 특별한 사", "[判例] 위약금이 위약벌（=실손해 배상과는 별도로 받는 제재금）로 되려면 특별한 사\n정 주장 ■ 입증해야 하고, 위약벌의 경우 398조 2항의 감액 X — 다만 과도하게 무거\n\n운 경우는 103조 공서양속에 반하여 일부• 전부 무효일 여지 O [92다46905]\n-", "", [], 0, "손해배상", 24, "미분류"],
  ["채권총론_P099", "2018다248855", "위약금 약정이 손해배상액 예정인지 위약벌인지는, 계약서 내용,", "[大判全合2022] 위약금 약정이 손해배상액 예정인지 위약벌인지는, 계약서 내용,\n\n체결 경위, 목적 등 종합하여 구체적 • 개별적 판단해야 一 손해배상액 예정 추정되\n지만（398조 4항）, “하나의 계약에 채무불이행 손해배상에 관해 손해배상액 예정 조\n\n항 따로 있거나 실손해 배상 전제로 조항 있고 별도로 위약금 조항 있다면 위약벌로\n보아야” V 손해배상액 예정으로 해석하면 이중배상\n위약벌은 398조 2항 유추적용으로 감액 X, 현재 판례 유지 •/ 위약벌（이행 확보）과\n손배예정（증명곤란 해결, 분쟁 방지, 이행 확보）은 성질 • 기능 본질적으로 다름, 398\n\n조 4항 문언상 손배예정과 구별되는 것 존재 전제, 위약벌 약정 사적 자치 존중하여\n법원 개입 최소화, 103조 위반 무효로 통제 가능 [2018다248855]\n\n正辯 : 당시 6°!〈반대의견〉은 손배예정과 위약벌의 기능 유사하고 위약벌의 103조 통제는 불필요\n한 우회로라는 이유로 위약벌도 398조 2항 유추적용 감액 긍정하는 의견", "", [], 0, "손해배상", 24, "미분류"],
  ["채권총론_P100", "2012다65973", "매수인 책임으로 해제시 이행보증금은 ‘위약벌’로 매도인에 귀속된다는 규정", "[判例] 매수인 책임으로 해제시 이행보증금은 ‘위약벌’로 매도인에 귀속된다는 규정\n\n있어도 다른 손해배상 배제하고 모든 금전적 문제를 오직 이행보증금 몰취로 해결하\n려는 것이면 배상액 예정 [2012다65973]", "", [], 0, "손해배상", 24, "미분류"],
  ["채권총론_P101", "2017다27527", "江이 지급의무 위반하면 甲에 대한 채권을 포기하기로 하는 위약금", "[判例2020] 江이 지급의무 위반하면 甲에 대한 채권을 포기하기로 하는 위약금\n\n약정 一 甲은 채권포기 주장 외에 따로 손해배상 구하기 어렵고, 약정금 지급 강제\n및 의무위반 제재 수단이기도 하면 一 위약금약정은 손해배상액 예정 및 위약벌의\n\n성격 함께 O — 법원은 당사자 주장 없더라도 직권으로 398조 2항 감액 O, 채권 전\n액 포기 가 부당하게 과다하다면 감액 O [2017다27527이\n\n나. 예정배상액의 청구\n\n- 채권자가 예정배상액 청구하려면, 손해 발생 및 금액 입증할 필요 없지만, 적어도\n‘채무불이행’ 사실 및 ‘배상액 예정의 존재 • 내용’은 입증하여야\n\n- ① 손해발생 불요설 [통판] :", "", [], 0, "손해배상", 24, "미분류"],
  ["채권총론_P102", "92다41719", "손해 발생사실 및 손해액 입증곤란 구제가 제도의", "[判例] 손해 발생사실 및 손해액 입증곤란 구제가 제도의\n\n목적 [92다41719]\n② 귀책사유 필요설 [통판] :", "", [], 0, "손해배상", 24, "미분류"],
  ["채권총론_P103", "2006다9408; 86다카2375; 72다108", "“채무자의 귀책사유를 불문한다는 약정이 없는 한,", "[判例] “채무자의 귀책사유를 불문한다는 약정이 없는 한,\n\n채무자는 귀책사유 없음을 주장• 입증하여 예정배상액의 지급책임 면할 수 O”\n무과실책임 약정의 존재는 엄격하게 해석 [2006다9408]\n\n正辯: 손해배상액 예정 적용하려면 모든 ‘손해배상’이 원칙적으로 과실책임인 점에 비추어 귀책\n사유 필요 一 단, 금전채무 불이행에 대한 손해배상액 예정이라면 금전은 원래 예외적 무과실책\n\n임이므로（397조 2항） 그 손배 예정도 귀책사유 불요라고 보아야\n\n③ 특별손해 포함설 [86다카2375]\n④ 과실상계 적용 부정설 [72다108]\n\n-", "", [], 0, "손해배상", 24, "미분류"],
  ["채권총론_P104", "97다36996", "유동적 무효인 매매계약 체결 당시 일방이 토지거래허가 협력의무 불이행을", "[判例] 유동적 무효인 매매계약 체결 당시 일방이 토지거래허가 협력의무 불이행을\n할 경우에 대한 손해배상액 예정 O — 일방의 협력의무 불이행, 매매계약 일방적\n\n철회로 확정적 무효가 되는 경우 포함 O [97다36996]\n\n다. 관련 판례\n\n—", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P105", "2019다292736", "채권자가 채무불이행 이유로 계약 해제 해지해도 원칙적으로 손해배상액", "[判例2022] 채권자가 채무불이행 이유로 계약 해제 해지해도 원칙적으로 손해배상액\n예정은 실효되지 X, 전보배상도 손해배상 예정액으로 결정 V 398조 13항, 551조\n문언 • 내용, 계약당사자 일반적 의사 一 다만 계약 유지를 전제로 정한 약정이라는 등\n특별한 사정이 있다면 해제 해지로 실효 O [2019다292736]\n\n正辯 : 甲이 주최하는 공연의 티켓을 己이 대량구매 및 판매대행 하는 계약에서 ‘공연이 취소된 경\n우 甲은 己에게 판매대금 전액을 지급해야 하고, 己의 귀책으로 계약이 불이행되면 구매대금은 반\n환하지 않는다’는 조항의 경우, 공연의 정상적 진행은 계약 목적 달성에 중요한 사항으로서 甲과\n己은 공연이 취소되면 계약이 유지될 수 없어 해제될 수 있음을 인식한 것이므로, 위 조항이 계약\n유지를 전제로 한 것이라고 단정한 원심판단은 잘못\n\n-", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P106", "2007다40765; 76다1699", "일방의 귀책사유로 해제될 경우만 위약금약정을 둔 경우（=일방 위약금약정） 상", "[判例] 일방의 귀책사유로 해제될 경우만 위약금약정을 둔 경우（=일방 위약금약정） 상\n대방 귀책사유로 해제될 경우에는 적용 X [2007다40765]\n\n- [判1列] 매매 당사자 모두 매매목적물이 타인 소유인 사실 모르고 계약 체결한 경우\n위약금 약정은 타인 권리매매 담보책임까지 예상하여 그 배상액 예정한 것 X [76다1699]\n-", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P107", "98다48033", "계약 당시 손해배상액 예정을 한 경우 그 계약과 관련된 불법행위상 손해까", "[判例] 계약 당시 손해배상액 예정을 한 경우 그 계약과 관련된 불법행위상 손해까\n지 예정한 것은 X [98다48033]", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P108", "2016다274270", "계약 관련 손해배상액 예정한 채무불이행과 별도의 행위를 원인으로 손해 발", "[判例] 계약 관련 손해배상액 예정한 채무불이행과 별도의 행위를 원인으로 손해 발\n생하여 불법행위 • 부당이득 성립하면 손해는 예정액에서 제외 一 그러나 계약 당시\n채무불이행으로 인한 손해로 예정했다면 손해 발생 원인행위의 법적 성격 불문하고\n\n그 손해는 예정액 포함, 별도 배상 • 반환청구 X [2016다274270]\n-", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P109", "91다2151", "매매당사자 사이 수수된 계약금에 대하여 매수인 위약시 몰취하고, 매도인", "[判例] 매매당사자 사이 수수된 계약금에 대하여 매수인 위약시 몰취하고, 매도인\n\n위약시 배액상환하는 ‘약정’ 있는 경우 그 계약금은 398조 손해배상액의 예정의 성질\n뿐 아니라 565조 해약금의 성질도 겸유한 것 [91다2151]", "", [], 0, "손해배상", 25, "미분류"],
  ["채권총론_P110", "2019다293036", "400조 채권자지체 성립에 채권자 귀책사유 필요 X — 채권자지체 효과", "[判例2021] 400조 채권자지체 성립에 채권자 귀책사유 필요 X — 채권자지체 효과\n는 원칙적으로 민법 규정 따른 401조, 402조, 403조, 538조 1항만 인정, 채무불이\n행 같은 손해배상 X, 해제 X — 그러나 계약 당사자가 채권자의 급부수령의무나\n\n이행협력의무 명시적 •묵시적 약정했거나 구체적 사안에서 신의칙상 그러한 채권자\n\n의무 인정될 특별한 사정 있다면, 의무위반에 따른 채권자 책임 O — 채권자의\n수령의무•협력의무 불이행으로 계약 목적 달성 불능하면 채무자는 해제 O [2019다293036]\n\n正辯 : 이러한 최근의 판결은 채권자지체에 관하여 원칙적으로 통설인 법정책임설을 취한 것으로", "", [], 0, "채권자지체", 26, "미분류"],
  ["채권총론_P111", "2001다79013", "채권자지체 위한 변제제공 관련, 채권자 ‘영구적 불수령’의 경우는 구두제공조", "[判例] 채권자지체 위한 변제제공 관련, 채권자 ‘영구적 불수령’의 경우는 구두제공조\n차 필요 없으나 이는 채무불이행 면하기 위한 측면（461조）, 수령지체 중 쌍방 책임 없\n는 불능 이유로 반대급부 청구하는 측면（538조 1항 2문）에서는 이러한 영구적 불수령\n의 경우에도 현실제공이나 구두제공 있었어야 [2001다79013]", "", [], 0, "채권자지체", 26, "미분류"],
  ["채권총론_P112", "2006다482700", "“물권적 청구권 보전을 위한 채권자대위", "[判例] “물권적 청구권 보전을 위한 채권자대위\n\n권 행사 o” — 토지 소유권에 근거하여 지상 건물의 임차인 상대로 ‘건물퇴거’ 청구\n할수 있더라도, 건물 임대인을 대위하여 임차인에게 임대차 ‘해지통고’ 및 ‘건물인도’\n청구 O v 퇴거청구와 해지통고 • 건물인도 대위청구는 요건 • 효과 달라 퇴거청구 가\n\n능성이 보전 필요성 부정되지 않음, 임대차계약 해지권은 행사상 일신전속권 X\n\n[2006다482700]\n\n正辯 : 피보전권리가 물권적 청구권인 건물철거청구권이었음\n\n-", "", [], 0, "채권자대위", 27, "미분류"],
  ["채권총론_P113", "2020다300893", "피대위자인 채무자가 실존인물 아니거나 사망한 사람이면 대위소송은", "[判例2021] 피대위자인 채무자가 실존인물 아니거나 사망한 사람이면 대위소송은\n\n당사자적격 없어 부적법 각하 ••• 피보전채권 X [2020다300893]\n\n正辯 : 국가를 상대로 토지소유권확인 구하는 대위소송에서 채무자（소유자） 사망하고 그 상속인은\n\n누구인지 알 수 없는 사안\n—", "", [], 0, "채권자대위", 27, "미분류"],
  ["채권총론_P114", "94다4806", "토지거래허가신청절차 협력의무 이행청구권 O - 이를 피보전채권으로 제3", "[判例] 토지거래허가신청절차 협력의무 이행청구권 O - 이를 피보전채권으로 제3\n자 명의 불법등기 말소청구 대위 O [94다4806]\n\n正辯: 피대위권리의 문제라 하더라도 가령 등기말소청구를 등기명의자 아닌 자에게 청구하는 대위\n소송이 라면 대위소송 각하가 결론임을 주의", "", [], 0, "채권자대위", 27, "미분류"],
