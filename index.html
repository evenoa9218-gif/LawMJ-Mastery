  ["채권총론_P140", "", "유사한 사안에서 母가 ‘상속을 포기’한 경우에는 신의칙에 반한다 할 수 없고,", "[判例] 유사한 사안에서 母가 ‘상속을 포기’한 경우에는 신의칙에 반한다 할 수 없고,\n결국 父는 보험회사에 대하여 子의 직접청구권 전부를 행사 o ••• 상속포기는 소급효\n\n있으므로 소급하여 소멸하지 않았던 것으로, ‘가해자가 피해자의 상속인이 되는 등\n특별한 경우’에 해당하지 않는 것으로 되므로", "", [], 0, "채권소멸기타", 92, "미분류"],
  ["채권총론_P141", "2017다225978; 2024다227699", "상계계약은 당사자 사이 서로 대립하는 채권 유효 존재 전제로 서로 채무", "[判例] 상계계약은 당사자 사이 서로 대립하는 채권 유효 존재 전제로 서로 채무\n\n를 대등액 또는 대등 평가액에 관해 면제시키는 계약 一 두 채권의 소멸은 서로 인과\n\n관계 一 한쪽 채권 불성립. 무효로서 그 면제 무효라면 상대방의 면제도 당연 무효\n— 상대방 채권 유효 존재하는 한 그 채무자는 이행의무 0, 이행하지 않고 있더라\n도 법률상 원인 없이 채무 면하는 이익 얻은 것은 X —‘ 그러나 상대방 채권도 불성\n립 •무효로서 역시 그 면제가 무효라면 채무자는 이행의무 X, 채무 면하는 이익\n\nX\n\n[2017다225978]\n— [判例2024] 복수 채권• 채무 상호 정산을 내용으로 하는 채권소멸 원인이라는 점에\n서 ‘공제’와 ‘상계’는 유사 一 그러나 공제는 상계적상, 상계금지 • 제한, 상계 기판력\n\n등 상계 법률 규정이 원칙적으로 적용되지 않는 점, 임대차관계 등 특정 법률관계에\n서는 일정 사유가 발생하면 원칙적 공제 의사표시 없이도 당연히 공제 이뤄진다고\n\n보는 점 등에서 상계와 구별, 제3자에 우선하여 채권 실질적 만족 얻게 하는 점에서\n상계보다 강한 담보적 효력 ■— 공제 •상계 요건 설정, 시점, 의사표시 요부 등은 자유\n\n롭게 약정 O [2024다227699]\n\n- 상계금지특약一 선의 제3자에게는 대항 X （제492조 제2항）\n\n2 . 요건（제492조） = 상계적상\n① 동종 채권 서로 대립,\n\n② 양 채권 변제기 도래\n\n③ 상계의 허용성\n① 동종의 채권이 서로 대립할 것\n\n@ 자동채권 : 채무자（상계자）가 채권자（피상계자）에 대하여 가지는 채권\n\nPART 1\n\n채권총론 • 상계 • 93", "", ["제492조 제2항", "제492조"], 0, "상계", 93, "미분류"],
  ["채권총론_P142", "2022다254154; 2022다218271", "상속채권자가 상속인에 대해 채무 부담하는데 상속 개시되면 상계적상 O", "[判例2022] 상속채권자가 상속인에 대해 채무 부담하는데 상속 개시되면 상계적상 O\n— 한정승인 하면 상속개시된 때부터 상속재산과 고유재산 분리되므로（1031조） 상속\n채권자의 피상속인에 대한 채권과 상속인에 대한 채무 사이 상계는 제3자의 상계로\n서 상계 X — 상계 후 한정승인 있으면 상계는 소급하여 효력 상실, 자동채권 및\n\n수동채권 부활 [2022다254154]\n\n正辯 : 한정승인은 상속포기와 달리 권리 의무 자체는 포괄적 승계하지만（주의） 한정승인 제도의\n상속재산 •고유재산 분리 취지를 고려하여 상계를 불허한 것이고. ‘자동채권의 예외’ 부정한 것\n- [判例2022] 국세징수법에 의한 채권압류 후 압류채권자는 피압류채권을 자동채권\n\n으로 제3채무자의 압류채권자에 대한 채권과 상계 X, 이중압류.배분요구 등 없더\n라도 마찬가지 V 법률규정 등 특별한 사정 없는 한 자동채권은 상계자가 상대방에\n\n대해 가지는 채권이어야（제3자가 상대방에 대해 가지는 채권은 X）, 압류채권자는\n\n추심권 취득할 뿐 피압류채권이 압류채권자에게 이전 • 귀속되지 않으므로 이는 압류\n\n채권자가 제3채무자에 대해 가지는 채권 X, 상계적상 X [2022다218271]\n正辯 : 자동채권의 예외는 규정이 있어야 인정되기 때문. 본 판결은 체납처분압류 사안이지만 통상\n의 압류 및 ‘추심명령’의 경우도 같은 논리가 적용되어 추심채권자가 피압류채권으로 제3채무자의\n\n추심채권자에 대한 채권과 상계하는 것이 불허될 수 있음（私見）. 이와 달리 압류 및 ‘전부명령’이 있\n다면 전부채권자의 이러한 상계가 허용될 것임（私見）\n© 수동채권 : 채권자（피상계자）가 채무자（상계자）에 대하여 가지는 채권\n\n‘제3자의 상계’ X （=수동채권의 예외는 인정할 수 X）", "", [], 0, "상계", 94, "미분류"],
  ["채권총론_P143", "2010다101394", "유치권자 있는 아파트의 경락인은 유치권자에 대한 차임 상당 부당이득반환", "[判例] 유치권자 있는 아파트의 경락인은 유치권자에 대한 차임 상당 부당이득반환\n\n채권을 자동채권으로 하고 유치권자의 종전 소유자에 대한 유익비상환채권（피담보\n\n채권）을 수동채권으로 하여 상계 X V 수동채권으로 상대방의 상계자에 대한 채권\n이 아닌 제3자에 대한 채권을 허용하면 상대방이 제3자로부터 현실급부 받을 이익\n\n침해, 상계자만 독점 만족을 주어 부당 [2010다101394]\n② 쌍방 채무의 변제기가 도래할 것\n— 자동채권만 변제기 도래하면 상계자는 수동채권의 기한의 이익 포기하고 상계 O\n\n다만 최근 판례는 ‘상계의 의사표시’를 해야 기한 이익 포기하여 상계적상이 성립하\n는 것으로 해석 正辯 : 요건을 ‘자동채권의 변제기가 도래할 것’으로 쓰지 않을 것을 권함", "", [], 0, "상계", 94, "미분류"],
  ["채권총론_P144", "2015다252501", "임대차보증금반환채무는 임대차계약종료시점에 이행기 도달, 임대인은 임대차계", "[判例] 임대차보증금반환채무는 임대차계약종료시점에 이행기 도달, 임대인은 임대차계\n\n약 존속 중 그 기한 이 익 포기하고 차임채권 등과 상계 O [2015다252501]\n— [判例2022] 이행기 정함 없는 채권（부당이득반환채권）은 그 성립과 동시에 이행기\n\n- 채권 성립 일에 상계적상의 ‘이행기’ 도래한 것 [67다1166, 2021 다287515]\n\n- 【判例] 492조 1항 ‘이행기가 도래한 때’라 함은 이행지체 의미 X [81 다카 10]\n③ 상계가 허용될 것 = 상계금지사유가 없을 것\n\n- 자동채권에 항변권 붙어 있으면 X（항변 소멸 후에는 상계 O）\n동시이행 항변권이 대표적 예시 一 매매계약에서 ‘매도인’의 상계 금지 여부 검토\n\nW 실무에서 피고가 상계항변 제출한 자동채권이 가령 매매대금채권인 경우 그\n자체로 동이항 부착 드러나므로 피고는 이행제공 사실까지 함께 주장 수 입증해야\n단, 자동•수동 양 채권이 ‘서로’ 동시이행 관계이면 상계 O - 매매 •도급계약에서\n\n담보책임인 손해배상채권과 대금채권 사이\n\n正辯 : 상계금지사유 예외로 작용함", "", [], 0, "상계", 95, "미분류"],
  ["채권총론_P145", "", "수탁보증인은 W조 사전구상권을 자동채권으로 상계 X V 사전구상권에는", "[判例] 수탁보증인은 W조 사전구상권을 자동채권으로 상계 X V 사전구상권에는\n주채무자의 443조 면책청구권이 항변권으로 부착 [2001 다81245]\n\n3. 상계금지사유\n가. 고의 불법행위로 인한 손해배상채권（제496조）\n\n— 취지 [통판] : 고의 불법행위 피해자가 현실 변제 받도록, 불법행위 유발 방지\n가해자가 수동채권으로 하는 상계 금지（그 채무자는 상계 대항 X）, 피해자가 이를\n자동채권으로 상계하는 것은 허용", "", ["제496조"], 0, "상계", 95, "미분류"],
  ["채권총론_P146", "93다52808", "496조를 ‘중과실’ 불법행위 손해배상채권에 유추•확장 적용 X V 496조 입법", "[判例] 496조를 ‘중과실’ 불법행위 손해배상채권에 유추•확장 적용 X V 496조 입법\n취지는 사회적 정의관념 , 상계 허용하면 보복적 불법행위 유발 우려, 피해자가 현실\n\n변제 받도록 하려는 것이므로 대법원 [93다52808]\n— [判例] 부당이득의 원인이 고의 불법행위에 기인, 불법행위로 인한 손해배상채권과\n부당이 득반환채권이 경합한 경우, 피해자가 부당이 득반환채권만 청구한 경우에도\n\n496조 유추적용 O, 수익자（가해자）의 상계 X ■■• 청구의 실질적 이유는 고의 불법\n행위, 손해배상채권이 현실적 만족 받아야 한다는 취지 동일 [2001 다52506]", "", [], 0, "상계", 95, "미분류"],
  ["채권총론_P147", "2024다204696", "상대방 기망으로 소비대차계약 체결한 자가 불법행위 손해배상청구 하", "[判例2024] 상대방 기망으로 소비대차계약 체결한 자가 불법행위 손해배상청구 하\n지 않고 계약상 채권 따른 대여금•이자 지급 구하면 4%조 유추적용 X V 계약상\n\n채권은 기망행위 아닌 쌍방 계약 기초 발생 권리로서 급부이행이 지향하는 경제적\n이익이 불법행위 손해배상채권과 달라 양자 경합 X, 496조 취지（보복적 불법행위\n\n지양, 피해자 현실 변제받도록, 고의 불법행위자 제재로 발생 억지, 사회적 정의 관\n념）, 실질적 고의 불법행위 채권과 마찬가지로 볼 수 X [2024다204696]\n\n正辯 : ‘유추적용’은 법적 규율 없는 사안에 유사한 사안 법규범 적용하는 것이어서 사안 사이에 공\n통점•유사점 있어야 하나 이것만으로 유추적용 X. 법규범 체계와 입법 의도•목적에 비추어 유추\n적용 정당하다고 평가되는 경우에 비로소 유추적용 O", "", [], 0, "상계", 96, "미분류"],
  ["채권총론_P148", "", "고의 불법행위로 인한 손해배상채권이 양도되어도 채무자는 양수인에 대하여", "[判例] 고의 불법행위로 인한 손해배상채권이 양도되어도 채무자는 양수인에 대하여\n상계로 대항 X（496조, 451조 2항）, 그러나 채권양도가 사해행위 해당하면 불법행\n\n위 손해배상채권의 채무자（가해자）도 양도인에 대한 별도의 채권자 지위에서 양수인\n에 대하여 채권자취소권 행사 O, 사해행위 취소 및 직접 가액배상 O, 이것 자체는\n\n496조 취지 반하지 X [2011 다898이\n正辯 : 채권양수인（수익자）이 이미 양수금채권을 집행하여 채무자（불법행위자）의 특정 채권을 압\n류•추심하여 추심을 받았기에, 채무자가 별도 채권을 보전하기 위해 채권양도를 사해행위로 취소\n하면서 양수인（수익자）로부터 직접 가액배상（원물반환 불능）을 받았던 사건", "", [], 0, "상계", 96, "미분류"],
  ["채권총론_P149", "2004다63019; 2015다51968", "피용자의 고의 불법행위로 인하여 사용자책임 성립하는 경우 사용자에게도", "[判例] 피용자의 고의 불법행위로 인하여 사용자책임 성립하는 경우 사용자에게도\n\n4%조 적용 O, 사용자도 상계 X V 756조 사용자책임은 대체적 책임, 단서를 봐도\n사용자의 과실은 직접 가해행위 아닌 선임 • 감독 관련 과실 [2004다63019]\n\n正辯 : 피용자가 피해자의 부주의 이용한 고의 불법행위한 경우, 사용자의 ‘과실상계’ 주장을 허용\n하는 법리와 구별해야 함\n\n나. 압류금지채권（제497조）\n- 압류금지채권（급여채권• 상여금 • 퇴직금 • 퇴직연금의 1/2 상당액, 주임법 8조 소액\n\n보증금, 자배법상 피해자의 손해배상청구권 등）을 수동채권으로 상계금지\n- [判例] 이사• 대표이사의 보수청구권 • 퇴직연금채권은 합리적 범위 내의 것만 상계\n\n금지 [2015다51968]\n\n다. 지급 금지된 채권（제498조）\n- （수동채권에） 지급금지명령 받은 제3채무자는 그 후 취득한 （자동）채권으로 상계 X\n\n채권에 대한 압류 • 가압류가 있을 경우 제3채무자의 상계 가부 문제\n압류 • 가압류 효력 발생 전에 이미 제3채무자의 채권이 ‘성립’하면 반대해석상 상계 가능", "", ["제497조", "제498조"], 0, "상계", 96, "미분류"],
  ["채권총론_P150", "2007다35152; 2000다50596", "도급인 소유 토지에 수급인 자금 대출받도록 근저당권설정 했다가 도급인이", "[判例] 도급인 소유 토지에 수급인 자금 대출받도록 근저당권설정 했다가 도급인이\n대신 변제하여 발생한 구상금채권도 그 발생 전 가압류된 공사대금채권과 “고유한\n대가관계 아니나 이행상 견련관계” — 도급인 동이항 O, 상계 O [2007다35152]\n\n- 자동채권 원금에서 압류 이후 발생한 이자채권도 자동채권으로 상계\n\nO\n\n4. 상계의 방법（제493조 제1 항）\n— [判例] 채권의 일부양도 있으면 각 분할된 부분에 독립한 분할채권 성립 一 채무자\n\n는 양도인에 대한 반대채권으로 양도인을 비롯한 각 분할채권자 누구든 상대방으로\n삼아 상계 o — 분할채권자인 양수인이 대항요건을 갖추었다고 하더라도 다른 부분\n에 먼저 상계 혹은 비율에 따라 상계되어야 한다는 이의 X [2000다50596]\n\n正辯 : 채권의 일부에 압류 • 전부명령 있는 경우에도 동일한 판례 있음\n\n5. 상계의 효과（제493조 제2항）\n— 상계적상 시점에 소급하여 대등액만큼 채권 소멸\n@ 수동 변제기 一 자동 변제기 一 상계 의사표시 :\n\n상계적상일 = 자동채권 변제기", "", ["제493조", "제493조 제2항"], 0, "상계", 98, "미분류"],
  ["채권총론_P151", "2005다8125", "상계적상 시점까지 수동채권의 약정이자 • 지연손해금 계산하여 자동채권으로써", "[判例] 상계적상 시점까지 수동채권의 약정이자 • 지연손해금 계산하여 자동채권으로써\n\n먼저 수동채권의 약정이자 • 지 연손해금 소각하고 잔액으로 원본 소각 [2005다8125]\n© 자동 변제기 一 수동 변제기 一 상계 의사표시 :\n\n상계적상일 = 수동채권 변제기\n\n© 자동 변제기 一 상계 의사표시 一 수동 변제기 :\n\n상계적상일 = 자동채권 변제기\n\nv. 상계의사표시일로 견해 대립 一 결국은 의사해석의 문제\n- 【判例2025] 상계의 소급효（493조 2항）는 양 채권 및 이자• 지연손해금 정산 기준시기\n\n를 소급하는 것일 뿐, 상계 의사표시 전 이미 발생한 사실 복멸시키지", "", [], 0, "상계", 98, "미분류"],
  ["채권총론_P152", "", "채권양수인이 양수채권을 자동채권으로 채무자가 채권양수인에 대해", "[判例2022] 채권양수인이 양수채권을 자동채권으로 채무자가 채권양수인에 대해\n가진 기존 채권과 상계한 경우, 상계적상일은 채권양도 전에 이미 도래한 양 채권\n의 변제기\n\nX, 채권양도 대항요건 갖춘 시점 O ••• 493조 2항 ‘각 채무가 상계할\n\n수 있는 때’에 비추어 상계적상은 자동채권과 수동채권이 상호 대립하는 때에 비로\n소 발생, 채권양수인은 채권양도 대항요건이 갖춰진 때 비로소 자동채권 행사 가능\n\n[2022Q200089]\n正辯 : 채권양도 아닌 전부명령이었다면 제3채무자 송달일이 상계적상일（私見）. 한편 본 판결 사안\n은 기존의 ‘채권양도와 상계（451조 2항）’ 논의와 명백히 다름에 유의\n\n- 상계충당（제499조） : 변제충당 규정 준용 一 변제충당의 연장선에서는 수동채권이\n여러 개 중 어느 것부터 소각시킬 것인지 혹은 수동채권의 비용• 이자• 원본 소각\n\n순서 문제 一 그러나 판례는 자동채권이 여러 개인 경우에도 상계충당 법리 적용 O\n\n【判例] 자동채권이 여러 개이고 수동채권 원리금이 자동채권 원리금 합계에 못 미칠\n경우, 우선 자동채권의 채권자（=상계자, ‘채무자’）가 상계 대상인 자동채권을 지정\n\n— 다음으로 자동채권의 채무자（=피상계자, ‘채권자’）가 지정 一 모두 지정하지 않으\n면 법정충당 [2011 다24814]", "", ["제499조"], 0, "상계", 99, "미분류"],
  ["채권총론_P153", "2018다25946", "492조 1항 ‘채무 이행기 도래한 때’는 채권자가 청구를 할 수 있는 시기", "[判例2021] 492조 1항 ‘채무 이행기 도래한 때’는 채권자가 청구를 할 수 있는 시기\n도래했음 의미 O, 채무자 이행지체에 빠지는 시기\n\nX [2018다25946]\n\n正辯 : 매매대금반환채권에 압류• 전부명령 받은 후 전부금 지급 구하자 제3채무자（매도인）가 사용\n\n이익 반환채권을 자동채권으로 상계항변 一 수동채권（매매대금반환채권）은 해제된 날 발생, 자동채\n권（사용이익반환채권）은 매매계약 해제 무렵부터 차례로 발생 — 각각의 자동채권이 발생한 때 양\n\n채권 모두 이행기에 이르러 상계적상, 자동채권으로 상계적상일 기준 발생한 수동채권의 이자• 지\n\n연손해금 먼저 소멸시키고, 잔액 있으면 원금 소멸시켜야 一 수동채권 원금 일부 소멸된 부분은 상\n\n계적상일 다음날부터 548조 2항 이자 발생 X. 잔존 원금에만 이자 발생 一 상계적상일 기준으로\n수동채권（매매대금반환채권）의 원금 소멸 여부 심리하지 않은 채 매매대금반환채권 원리금에서 자\n동채권 합계액을 빼는 방식으로 상계한 원심법원은 잘못\n\nPART 1\n\n채권총론 • 상계 • 99", "", [], 0, "상계", 99, "미분류"],
  ["채권총론_P154", "", "임대차보증금반환채무는 임대차계약 종료된 때 이행기 도달 一 임대차", "[判例2025] 임대차보증금반환채무는 임대차계약 종료된 때 이행기 도달 一 임대차\n존속 중 차임채권 소멸시효 완성된 경우, 시효완성 전 임대인이 보증금반환채권의\n\n기한 이익 실제로 포기했다는 등 특별한 사정 없는 한 상계적상 X — 임대인은 495조\n\n의한 상계 X — 다만, “495조 유추적용 의한 공제 O” ••' 임대인 신뢰, 임차인 묵시\n의사 [2016다211309, 2024Q302217]\n\n正辯 : 2025년 판례는 기존 법리 재확인 후 원심이 임대인 ‘상계’ 주장을 불허하면서도 ‘공제’ 여부\n를 판단하지 않은 것을 위법으로 봄 一 상계와 공제는 다르지만 유사성에 비추어 당사자의 ‘상계’\n\n주장을 ‘공제’ 주장으로 선해했어야 한다는 취지로 보임（‘주장 포함’ 법리, 私見）", "", [], 0, "상계", 100, "미분류"],
  ["채권총론_P155", "", "@0 유익비상환채권은 임대차계약 종료한 때 비로소 발생 一 임대차 존", "[判例2021] @0 유익비상환채권은 임대차계약 종료한 때 비로소 발생 一 임대차 존\n속 중 임대인 구상금채권（약정상 임차인이 내기로 한 공과금을 임대인이 대신 납부）\n\n소멸시효 완성된 경우, 구상금채권과 유익비상환채권은 상계적상 X - 임대인은\n\n495조 의한상계 X [2017Q258787]\n正辯 : 판례는 495조의 ‘상계적상’ 판단에 있어 시효소멸 당시 자동채권뿐 아니라 수동채권도 변제\n\n기 도래할 것을 요함（통상 자동채권만 도래해도 상계적상으로 보는 것은 적어도 상계자의 상계 의\n\n사표시, 즉 기한의 이익 포기의 실제 의사표시가 있는 경우이므로） — 다만 2016다211309 판결의\n\n경우에는 보증금과 차임에 대한 당사자들의 의사 고려하여 상계가 아닌 ‘공제’를 인정한 것이어서\n\n495조가 ‘유추적용’이 된 것임", "", [], 0, "상계", 100, "미분류"],
  ["채권총론_P156", "", "불가분채권자 중 1인을 집행채무자로 압류•전부명령 있어도 다른 불가", "[判例2023] 불가분채권자 중 1인을 집행채무자로 압류•전부명령 있어도 다른 불가\n분채권자는 모든 채권자 위해 불가분채권 전부의 이행청구 O, 채무자도 모든 채권\n\n자 위해 다른 불가분채권자에게 전부를 이행 O, 이는 금전채권 일부에만 압류• 전부\n\n명령 내려져도 마찬가지 O V 전부명 령으로 집행채무자인 불가분채권자의 채권은\n\n전부채권자에게 이전되나 다른 불가분채권자에게는 효력\n\nX [2021 다264253]\n\n正辯 : 2011다95861 판결과 마찬가지로 ‘공동임차인’의 ‘임대차보증금반환채권’이 원칙적으로\n‘불가분채권’이라는 취지의 판시（조합을 결성한 준합유로 보기 힘들다는 이유） 一 다만 후술하는\n\n2021다238650 판결은 공동임차인과의 약정으로 ‘분할채권’이 될 수도 있고 이때는 불가분채권으\n로 볼 수 없다는 취지를 간접적으로 설시했음（私見）\n\n나. 불가분채무（제411조）\n— 절대효 : 변제 （변제제공 • 채권자지체）, 대물변제, 공탁 一 대체로 연대채무 준용\n\nX\n\n— 대내관계 : 연대채무 준용", "", ["제411조"], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P157", "80다2587; 80다756", "불가분채무로 인정한 3가지", "[判例] 불가분채무로 인정한 3가지\n① 건물공유자가 공동임대（공동전세권설정）하고 수령한 보증금（전세금） 반환채무 [98다\n\n43137, 2024다312566]\n② 수인이 공동으로 법률상 원인 없이 타인 재산 사용 부당이득반환채무 [80다2587]\n③ 공동상속인들의 건물철거의무 “각자 그 지분의 한도 내에서 건물 전체에 대한 철거\n\n의무” [80다756] 正辯 : 금전채무（①, ②）와 달리 필공 아니라는 의미\n\n（/[判例] 직접점유자• 간접점유자의 점유 • 사용 부당이득반환채무는 부진정연대채무\n[2011 다76747]", "", [], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P158", "2018다243133", "페 미등기건물의 원시취득자와 양수인（사실상 처분권자）의 부지", "[判例2022] 페 미등기건물의 원시취득자와 양수인（사실상 처분권자）의 부지\n점유 • 사용 부당이득반환채무는 부진정 연대채무 [2018다243133]", "", [], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P159", "", "불가분채무자가 변제 기타 자기 출재로 공동면책 얻으면 다른 불가분채", "[判例2020] 불가분채무자가 변제 기타 자기 출재로 공동면책 얻으면 다른 불가분채\n무자의 부담부분에 대해 구상권 행사 O, 이때 부담부분은 균등 추정 원칙이나 특약", "", [], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P160", "", "상가임대차법 3조 1, 2항으로 임대인 지위 공동승계한 ‘공동임대인들’의", "[判例2024] 상가임대차법 3조 1, 2항으로 임대인 지위 공동승계한 ‘공동임대인들’의\n임차보증금반환채무는 ‘불가분 채무’ — 불가분 채무자인 공동상속인 1인의 변제 등\n\n으로 공동면책 얻어 부담부분에 구상할 때 다른 공동상속인을 상대로 ‘법정상속분’\n에 따라 구상 O '.' 1007조（각자의 상속분에 응하여 피상속인 권리 • 의무 승계）에서\n\n상속분은 법정상속분을 의미 [2023다31885刀\n\nPART 1\n\n채권총론 - 서론. 분할채권관계. 불가분채권관계 • 103", "", [], 0, "다수당사자채권", 103, "미분류"],
  ["채권총론_P161", "2019다216435", "채권자가 연대채무자 중 1인 채무를 ‘일부’ 면제한 경우도 특별한 사정", "[判例] 채권자가 연대채무자 중 1인 채무를 ‘일부’ 면제한 경우도 특별한 사정\n이 없는 한 면제된 부담부분에 한하여 419조 면제 절대적 효력 O — 피면제자의 잔존\n채무액이 부담부분 초과한다면 다른 연대채무자는 채무 전액 부담 •/ 피면제자\n\n의 부담부분 감소 없으므로 / 피면제자의 잔존 채무액이 부담부분보다 적다면 그\n\n차액（= 부담부분 - 잔존 채무액） 범위에서 면제의 절대적 효력 발생하여 다른 연대\n채무자의 채무가 차액만큼 감소 O [2019다216435] = 외측설", "", [], 0, "다수당사자채권", 104, "미분류"],
  ["채권총론_P162", "2012다74236; 99다67376", "“금액이 서로 다른 부진정연대채무에서 다액채무자가 일부 변제할 경우", "[大判全合] “금액이 서로 다른 부진정연대채무에서 다액채무자가 일부 변제할 경우\n\n먼저 소멸하는 부분은 다액채무자 단독 부담 부분（외측설） ••• 당사자의 의사와 채무\n전액 지급 확실히 확보하려는 부진정연대채무 제도의 취지에 비추어” - 이는 사용\n자책임에서 피용자가 일부 변제할 경우（사용자 손해배상액이 피해자 과실 참작한 과\n실상계로 피용자 손해배상액과 달라진 경우）, 공동불법행위자들 중 다액채무자가 일\n부 변제할 경우（피해자에 대한 과실비율이 달라 손해배상액이 달라진 경우）에도 모두\n\n적용 O [2012다74236]\n\n正辯 : 종래 대법원은 사안에 따라 외측설 혹은 과실비율설（사용자책임 사안）의 입장이었으나, 본\n전원합의체 판결로 과실비율설은 모두 폐기되고 외측설로 통일되었음.\n\n한편 이 쟁점은 변제가 부진정연대채무에서 절대효를 가지는 것을 전제로만 논의할 수 있고. 결국\n다액채무자가 일부를 ‘상계’한 경우 동일한 논의가 가능할 것으로 생각됨（私見）. 실제 기존 판례 중\n다액채무자가 일부 채무에 대하여 변제 및 상계를 한사안이 있음[99다67376]. 물론 이와 별개로\n고의 불법행위자는 상계가 금지되는데（496조）, 법전협 모의고사에서는 다른 불법행위자가 상계할\n\n경우 다른 고의 불법행위자도 상계 절대효 받음을 전제로 출제된 적이 있음", "", [], 0, "다수당사자채권", 107, "미분류"],
  ["채권총론_P163", "99다67376", "회사 자금 입출금 업무 담당 재무과장이 제3자를 위한 회사 명의 근보증서", "[判例] 회사 자금 입출금 업무 담당 재무과장이 제3자를 위한 회사 명의 근보증서\n등 서류 위조하여 금융기관에 제출하고 이를 믿은 금융기관이 제3자에게 대출함으\n\n로써 손해 입었다면, 회사의 사용자책임\n\nO, 금융기관도 대출규정 지키지 않았고\n\n보증계약 진위를 회사에 직접 확인하지 않은 30% 과실상계 O\n\n금액이 다른 부진정연대 관계에서 다액채무 일부가 변제 등으로 소멸하면 그 중\n\n먼저 소멸하는 부분은 단독 부담 부분（외측설） [99다67376]\n正辯 : 甲회사 재무과장 己이 內회사가 丁은행으로부터 대출받음에 있어 甲회사가 보증하는 것\n\n으로 서류 위조 제출 - 甲회사의 보증계약은 무효（무권대리）. 甲회사는 사용자책임 o, 內회사\n의 50억 대출금채무와 부진정연대채무 — 丁은행은 대출금 50억 손해 있으나 30% 과실상계로\n甲회사 사용자책임 손해배상채무는 35억 원 一 다액채무자 內이 丁에게 ① 대출금 일부 2억 변\n\n제, ② 丁에 대한 예금채권으로 대출금 일부 2억과 상계 一 일부 변제 • 상계 금액은 內회사 단독\n\n부담 부분 15억부터 소멸（외측설） 一 甲회사의 35억 손해배상채무는 전혀 소멸하지 x（금액은\n실제 사안에서 변형함） 一 대법원은 사용자책임이 아닌 사안에서는 2018년 전원합의체 이전부터\n\n도 외측설을 취해옴", "", [], 0, "다수당사자채권", 107, "미분류"],
  ["채권총론_P164", "2016다236131", "금융기관 임직원이 채무자에 대한 신용조사 거치지 않고 규정 위반하여 충분", "[判例] 금융기관 임직원이 채무자에 대한 신용조사 거치지 않고 규정 위반하여 충분\n한 담보 없이 대출 一 임직원의 금융기관에 대한 손해배상채무와 대출금채무자의 금\n\n융기관에 대한 대출금채무는 서로 동일한 내용의 급부에 각자 독립하여 전부를 급부\n할 의무 부담하는 부진정 연대채무 一 외측설 적용 [2016다236131]\n\nPART 1\n\n채권총론 • 부진정연대채무 •\n\n107", "", [], 0, "다수당사자채권", 107, "미분류"],
  ["채권총론_P165", "2004다20265", "보증채무 이행 당시에는 주채무 유효하게 존속했더라도 그 후 주계약 해제", "[判例] 보증채무 이행 당시에는 주채무 유효하게 존속했더라도 그 후 주계약 해제\n로 소급적 소멸하면 보증인은 변제 수령한 채권자를 상대로 부당이득반환청구 O\n\n••• 보증인의 주채무 소멸 행위는 주채무의 존재를 전제로 하므로 [2004다20265]", "", [], 0, "다수당사자채권", 109, "미분류"],
  ["채권총론_P166", "2005다50041", "주채무 발생원인 기본계약이 반드시 보증계약보다 먼저 체결될 필요 없고,", "[判例] 주채무 발생원인 기본계약이 반드시 보증계약보다 먼저 체결될 필요 없고,\n보증계약 체결 당시 보증 대상 될 주채무 발생원인 • 내용 어느 정도 확정되어 있다\n면 ‘장래 채무’에 대해서도 유효하게 보증계약 O [2005다50041]\n\n© 내용상 : 430조, 433조, 434조, 435조\n© 이전상 : 채권 양도하면 함께 이전", "", [], 0, "다수당사자채권", 109, "미분류"],
  ["채권총론_P167", "", "주채무자에 대한 채권양도 통지 갖추면 보증인에게도 효력 O [75다110이", "[判例] 주채무자에 대한 채권양도 통지 갖추면 보증인에게도 효력 O [75다110이\n나. 보증인 관련 2016년 개정 시행 내용 - 보증인 보호\n@ 방식（제428조의2） : 보증은 보증인 기명날인 • 서명 있는 서면으로 표시되어야 효력,\n\n전자적 형태 X,\n\n보증인에게 불리한 변경도 마찬가지,\n\n이미 이행한 부분은 서면이\n\n아니 라고 무효 주장 X", "", ["제428조의2"], 0, "다수당사자채권", 109, "미분류"],
  ["채권총론_P168", "", "근저당권설정계약서가 보증인보호법상 ‘보증의사 표시된 서면’인지 여부", "[判例2022] 근저당권설정계약서가 보증인보호법상 ‘보증의사 표시된 서면’인지 여부\n는 엄격 판단해야 ••• 보증인보호법 및 민법 428조의2 규정의 입법목적 • 경과, 보증인\n의 기명날인•서명 있는 서면으로 보증의사 표시되지 않으면 무효로 하는 강행규정,\n\n근저당권설정 계약서는 근저당권설정등기의 등기 원인 증명서면, 등기 신청서에 첨부\n\n하기 위해 작성 , 물상보증으로서 근저당권설정 계약과 인적 보증으로서 연대보증계약\n은 별개의 계약 [2021 다29612이\n\n正辯 : 부동산을 담보로 제공한 자（채무자 A의 아내 B）에게 따로 각서 등 어떠한 문서도 요구하지\n않은 점을 들어 B의 보증 사실을 부정한 사안\n\nPART 1\n\n채권총론 • 보증채무 •\n\n109", "", [], 0, "다수당사자채권", 109, "미분류"],
  ["채권총론_P169", "", "채권자와 보증인 사이에 보증인이 주채무 중첩적 인수하는 약정하더라도 종", "[判例] 채권자와 보증인 사이에 보증인이 주채무 중첩적 인수하는 약정하더라도 종\n전 보증인 지위 유지되므로 주채무자와 보증인 사이 구상관계 동일 [2003다3773이\n\n正辯 : 수탁보증인이었다면 사전구상권도 여전히 행사할 수 있음", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P170", "2017다206922", "주채무자의 부탁으로 보증인이 된 경우 양자는 위임관계, 이러한 보증의 위임", "[判例] 주채무자의 부탁으로 보증인이 된 경우 양자는 위임관계, 이러한 보증의 위임\n은묵시적 O [2017다206922]\n가. 수탁보증인의 구상권\n\n- 구상권 범위（제441조） : 연대채무 425조 （출 • 이 • 비 • 손） 준용,\n\n원칙적 사후구상", "", ["제441조"], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P171", "2024다252305", "수탁보증인（물상보증인 포함）의 구상권이 발생하기 위한 변제 기타 출재", "[判例2024] 수탁보증인（물상보증인 포함）의 구상권이 발생하기 위한 변제 기타 출재\n는 반드시 주채무 변제기 도래 후에 면책행위 할 것 요구되지 않고, 이해관계 있는\n제3자인 수탁보증인도 468조에 따라 변제기 전에 변제 O, 다만 이때는 주채무의\n\n변제기 도래할 때까지 주채무자에 대해 사후구상권 행사할 수 X, 수탁보증인 출재\n\n에 과실 있다면 그와 인과관계 있는 범위만 구상권 발생 X\n\n보증인이 주채무자에게 통지하지 않고 변제 기타 출재로 주채무 소멸하게 한 경우\n주채무자가 채권자에게 대항할 사유 있었다면 보증인에게 대항하는데（445조 1항）,\n\n구체적 대항 효과는 주채무자의 채권자에 대한 대항사유로 결정 [2024다252305]\n\n— 예외적 사전구상（제442조） -- 주채무자의 면책청구권이 항변권\n제1호 보증인이 과실 없이 채권자에게 변제할 재판\n\n제2호 주채무자 파산선고 및 채권자 미가입\n제3호 이행기 • 최장기 미확정에 보증계약 후 5년 경과\n제4호 이행기 도래（제2항 보증계약 후 채권자의 주채무자 변제기 연장으로 대항 X）", "", ["제442조"], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P172", "2003다46758", "사전구상권 범위는 주채무 원금, 사전구상 응할 때까지 이미 발생한 이자 및", "[判例] 사전구상권 범위는 주채무 원금, 사전구상 응할 때까지 이미 발생한 이자 및\n지연손해금, 피할 수 없는 비용 기타 손해\n\nO — 주채무 원금 완제일까지 지연손해\n\n금 X, 수탁보증인이 아직 지출 않은금원의 지연손해금 X [2003다46758]", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P173", "", "사전구상권은 수탁보증인 자신의 부담 확정된 채무 전액 O — 면책비용에", "[判例] 사전구상권은 수탁보증인 자신의 부담 확정된 채무 전액 O — 면책비용에\n대한 법정이자 X , 장래 도래할 이행기까지 이자 X [2004466834]\n\n- 주채무자의 면책청구권（제443조） : 자기를 면책하게 하거나 자기에게 담보를 제공할\n것을 청구 / 배상금공탁 • 담보제공 • 보증인면책으로 배상의무 면할 수 있음", "", ["제443조"], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P174", "", "수탁보증인은 사전구상권을 자동채권으로 주채무자와 상계 X V 사전구상권에", "[判例] 수탁보증인은 사전구상권을 자동채권으로 주채무자와 상계 X V 사전구상권에\n는 443조 주채무자의 면책청구권이 항변권으로 부착 [2001 다55222]\n\nPART 1\n\n채권총론 • 보증채무 •\n\n113", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P175", "95다47176", "공동불법행위자 1인 위한 보증인이 손해배상채무 변제한 경우, 그 보증인은", "[判例] 공동불법행위자 1인 위한 보증인이 손해배상채무 변제한 경우, 그 보증인은\n피보증인 아닌 다른 공동불법행위자에 대하여 그 부담부분에 한하여 구상 O, 다만\n다른 공동불법행위자 부담부분 없으면 구상 • 부당이득반환청구 X [95다47176]\n正辯 : 위 판결은 부진정연대채무임에도 참조조문에 447조가 명시되어 있음", "", [], 0, "다수당사자채권", 115, "미분류"],
  ["채권총론_P176", "", "공동불법행위에서 손해배상책임은 부진정연대 채무이나 구상권 행사 있어서", "[判例] 공동불법행위에서 손해배상책임은 부진정연대 채무이나 구상권 행사 있어서\n연대채무 규정 준용 O — 425조 1항 구상권 행사 상대방은 공동면책된 다른 연대채\n무자에 한함, 다른 연대채무자의 채무에 대한 연대보증인을 상대로 구상\n\nX [90다\n\n20244]\n正辯 : 그러나 변제한 공동불법행위자가 결국 채권자의 채권을 변제자대위로 취득하여 행사하게\n되면' 여지 O", "", [], 0, "다수당사자채권", 115, "미분류"],
  ["채권총론_P177", "", "연대채무자 수인 모두를 위한 연대보증인은 모두에 대해 구상권 O, 반대로", "[判例] 연대채무자 수인 모두를 위한 연대보증인은 모두에 대해 구상권 O, 반대로\n연대채무자 중 1인이 채무 변제한 경우는 자신의 연대보증인도 겸한 연대보증인에\n\n대하여 대위\n\nX [91 다3062]\n\n5 . 연대보증, 보증연대\n- 연대보증 : 주채무자와 연대한 보증인 一 보충성\n\nX, 분별의 이익 X （수인인 경우）\n\n- 보증연대 : 수인의 보증인끼리 상호 연대 — 보충성\n\nO, 분별의 이익 X\n\n6 .공동보증\n- 공동보증에서 각 보증인은 분별의 이익 有 원칙 （제439조, 제408조）\n\n분별의 이익 : 공동보증에서 각 보증인이 주채무를 균등비율로 분할한 부분에 대해\n\n서만 보증채무 부담하는 이 익\n正辯 : 각 보증인이 채권자에게 부담하는 채무액의 문제 一 분별의 이익은 ‘대외관계’의 문제\n\nPART 1\n\n채권총론 • 보증채무 .115", "", ["제439조", "제408조"], 0, "다수당사자채권", 115, "미분류"],
  ["채권총론_P178", "", "채권자가 연대보증인 1인의 채무를 면제하여도, 연대보증인들 사이 연대관계", "[判例] 채권자가 연대보증인 1인의 채무를 면제하여도, 연대보증인들 사이 연대관계\n의 특약이 없는 한, 다른 연대보증인에 효력 X [91 다37553]\n\n正辯 : ‘연대보증인들 사이 연대관계의 특약’이란 ‘보증연대’를 의미하는 것으로 보이며, 연대보증은\n어디까지나 주채무자와의 연대이므로, 연대채무에서 면제의 절대효에 관한 규정은 보증인들 사이에\n\n연대채무 유사한 관계, 즉 보증연대가 있을 것을 요한다는 의미로 보임（私見）\n- 공동보증인 중 1인이 변제한 경우 구상권 : ① 주채무자에 구상할 수 있음은 물론,\n\n② 자기 부담부분 넘어서 변제한 경우는 다른 공동보증인에게 구상（제448조 제2항）\n\n— 다른 공동보증인에 대한 구상 : ® 분별이익有 : 444조 준용（당시 얻은 이익）,\n® 분별이 익無 : 425〜427조 준용（출 • 이 • 비 • 손）", "", ["제448조 제2항"], 0, "다수당사자채권", 116, "미분류"],
  ["채권총론_P179", "2007다70155,\n\n2024다232066", "연대보증인은 분별의 이 익 없으나, 연대보증인들 상호 내부관계는 주채무", "[判例2024] 연대보증인은 분별의 이 익 없으나, 연대보증인들 상호 내부관계는 주채무\n에 대한 출재 분담의 일정 부담부분 O, 특약 없으면 평등 비율 一 연보 1인이 자기\n\n부담부분 초과 변제하면 다른 연보에게 구상, 그러나 연보 중 이미 자기 부담부분\n\n변제한 사람에게는 구상 X - 변제한 연대보증인의 구상 가부 및 부담부분은 일단\n연대보증 성립 당시 주채무액 분담비율 적용하여 산출한 금액으로 정하되, 그 후\n\n주채무자의 변제（각 연보는 부담부분 비율로 소멸）나 다른 연보의 변제（변제액만큼\n그의 부담부분 소멸） 있다면 고려해야 -‘ ① 연보 A의 변제시까지 발생한 주채무\n총액에 분담비율 적용하여 A의 부담부분 총액 산출, ② 주채무자 변제 등으로 감\n소한 부담부분 있다면 공제하여 A의 부담부분 확정, ③ 변제액이 확정된 부담부분\n\n을 초과하는지 여부로 판단하여야 一 연보 B가 A의 구상권 행사 대상에서 제외되는\n지 여부도 같은 방식으로 확정된 B의 부담부분을 기준으로 판단해야 [2007다70155,\n\n2024다232066]\n— 공동연대보증인 중 1인이 전액 변제하고 주채무자로부터 구상채무 일부를 변제받은\n경우의 법률관계", "", [], 0, "다수당사자채권", 116, "미분류"],
  ["채권총론_P180", "", "연대보증인 1인이 전액 대위변제하고 주채무자로부터 일부만 구상받은 경우,", "[判例] 연대보증인 1인이 전액 대위변제하고 주채무자로부터 일부만 구상받은 경우,\n\n자기 부담부분은 다른 연대보증인들로부터는 구상받을 수 X, 오로지 주채무자로부\n\n터만 구상받아야 하므로 주채무자의 변제금을 자기 부담부분에 먼저 충당할 정당한\n이익 有 一 주채무자의 구상금 일부 변제액은 대위변제한 연대보증인 부담부분에 상\n\n응하는 주채무자의 구상채무를 먼저 감소시킴, 그 부담부분 넘을 때까지 다른 연대보\n증인들이 부담하는 구상채무는 감소되지 않음 •一 주채무자의 구상금 일부 변제액이", "", [], 0, "다수당사자채권", 116, "미분류"],
  ["채권총론_P181", "2002다47631", "금융기관 대출받음에 제3자가 자기 명의 사용을 허락한 경우 그가 채권자에", "[判例] 금융기관 대출받음에 제3자가 자기 명의 사용을 허락한 경우 그가 채권자에\n대해 주채무자로서 책임지는 여부와 관계없이 ‘내부관계’에서는 연대보증책임 이행\n한 연대보증인에 대하여 당연히 주채무자로서의 구상의무 부담하는 것은 X, 그 연대\n\n보증인이 제3자가 실질적 주채무자라고 믿고 보증 혹은 이행했고 그 믿은 데에 제3자\n에게 귀책사유 있는 경우에 한하여 주채무자로서 전액 구상의무 부담 一 다만 제3자\n가 실질적 주채무자 아닌 걸 알면서 연대보증인이 보증 혹은 이행한 경우에도, 제3자\n가 실질상의 주채무자를 연대보증한 것으로 인정된다면（주채무자 명의 사용을 허락\n했다면 최소한 연대보증 의사는 인정될 것임） 제3자는 이행한 연대보증인에 대하여\n공동보증인 간 구상의무는 부담 O [2002다47631]\n\n- 공동보증인과 일부보증", "", [], 0, "다수당사자채권", 117, "미분류"],
  ["채권총론_P182", "", "각 연대보증인 일부보증 한 경우 연대보증인 1인 변제로 주채무 감소시켰더", "[判例] 각 연대보증인 일부보증 한 경우 연대보증인 1인 변제로 주채무 감소시켰더\n라도 주채무 남은 금액이 다른 연대보증인 책임한도 초과하면 그 다른 연대보증인은\n\n한도금액 전부 보증책임 그대로 O 면책된 부분 X — 채무 변제한 연대보증인이 다\n른 연대보증인에게 구상 X [2001 다59071] ••• 구상은 공동면책을 요건으로", "", [], 0, "다수당사자채권", 117, "미분류"],
  ["채권총론_P183", "2004다42104", "위 경우 보증인 1인이 자기 부담부분 이상 변제하여 다른 보증인 책임한도 줄", "[判例] 위 경우 보증인 1인이 자기 부담부분 이상 변제하여 다른 보증인 책임한도 줄\n어들어 공동면책 되면 부담부분에 한하여 구상 O 이때 부담부분은 다른 특약 없으\n\n면 각자 보증한도액 비율 [2004다42104]\n\n7. 계속적 보증\n- 보증인 기명날인 • 서명한 서면으로 최고액 특정 않으면 보증계약 무효（제428조의3）\n\n— 법 개정 전 판례 법리", "", ["제428조의3"], 0, "다수당사자채권", 117, "미분류"],

const STORE = 'lawmj_v1';
let P = {};
function loadP(){try{P=JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){P={}}}
function saveP(){localStorage.setItem(STORE,JSON.stringify(P))}
function getP(tk){return P[tk]||(P[tk]={ox_ok:[],ox_ng:[],mcq_ok:[],mcq_ng:[],blank_ok:[],blank_ng:[],con_done:[],cas_done:[],fla_done:[]}),P[tk]}

function recordOx(id,ok){const p=getP(S.topicKey);if(ok){p.ox_ok=[...new Set([...p.ox_ok,id])];p.ox_ng=p.ox_ng.filter(x=>x!==id)}else{p.ox_ng=[...new Set([...p.ox_ng,id])]};saveP()}
function recordMcq(id,ok){const p=getP(S.topicKey);if(ok){p.mcq_ok=[...new Set([...p.mcq_ok,id])];p.mcq_ng=p.mcq_ng.filter(x=>x!==id)}else{p.mcq_ng=[...new Set([...p.mcq_ng,id])]};saveP()}
function recordBlank(id,ok){const p=getP(S.topicKey);if(ok){p.blank_ok=[...new Set([...p.blank_ok,id])];p.blank_ng=p.blank_ng.filter(x=>x!==id)}else{p.blank_ng=[...new Set([...p.blank_ng,id])]};saveP()}

function modPct(mod){
  let tot=0,done=0;
  mod.topics.forEach(t=>{
    const p=getP(t.key);
    const ox=mod.qui.filter(q=>q[5]===t.key&&q[1]==='OX');
    const mcq=mod.qui.filter(q=>q[5]===t.key&&q[1]==='MCQ');
    tot+=ox.length+mcq.length;
    done+=p.ox_ok.filter(id=>ox.find(q=>q[0]===id)).length+p.mcq_ok.filter(id=>mcq.find(q=>q[0]===id)).length;
  });
  return tot===0?0:Math.min(100,Math.round(done/tot*100));
}
function topicPct(mod,tk){
  const p=getP(tk);
  const items=mod.qui.filter(q=>q[5]===tk);
  if(!items.length)return 0;
  const done=[...p.ox_ok,...p.mcq_ok,...p.blank_ok].filter(id=>items.find(q=>q[0]===id)).length;
  return Math.min(100,Math.round(done/items.length*100));
}
function allWrong(){
  const w=[];
  MODULES.forEach(m=>m.qui.forEach(q=>{
    const p=getP(q[5]);
    const ng=q[1]==='OX'?p.ox_ng:q[1]==='MCQ'?p.mcq_ng:p.blank_ng;
    if(ng.includes(q[0]))w.push({q,mod:m});
  }));
  return w;
}

function renderTopic(){
  const m=MODULES.find(x=>x.key===S.modKey);
  const t=m.topics.find(x=>x.key===S.topicKey);
  const nC=m.con.filter(x=>x[5]===S.topicKey).length;
  const nP=m.cas.filter(x=>x[7]===S.topicKey).length;
  const nOx=m.qui.filter(x=>x[5]===S.topicKey&&x[1]==='OX').length;
  const nMcq=m.qui.filter(x=>x[5]===S.topicKey&&x[1]==='MCQ').length;
  const nCase=m.qui.filter(x=>x[5]===S.topicKey&&x[1]==='CASE').length;
  const nBlank=m.qui.filter(x=>x[5]===S.topicKey&&x[1]==='BLANK').length;
  const nFlash=m.fla.filter(x=>x[4]===S.topicKey).length;
  const TABS=[
    {k:'concept',label:`📖 개념 (${nC})`},
    {k:'case',   label:`⚖️ 판례 (${nP})`},
    {k:'ox',     label:`🔘 OX (${nOx})`},
    {k:'mcq',    label:`📋 객관식 (${nMcq})`},
    {k:'case_q', label:`📝 사례 (${nCase})`},
    {k:'blank',  label:`✏️ 빈칸 (${nBlank})`},
    {k:'flash',  label:`🃏 플래시카드 (${nFlash})`},
  ];
  const tabBar=TABS.map(tb=>`<button class="tab-btn ${S.tab===tb.k?'active':''}" data-tab="${tb.k}" onclick="switchTab('${tb.k}')">${tb.label}</button>`).join('');
  document.getElementById('content').innerHTML=`
    <div class="topic-title">${t.label}</div>
    <div class="topic-meta">${m.name} · 개념 ${nC} · 판례 ${nP} · 문제 ${nOx+nMcq+nCase+nBlank}</div>
    <div class="tabs">${tabBar}</div>
    <div id="tc"></div>`;
  renderTC();
}
function switchTab(k){
  S.tab=k;S.qIdx=0;S.qAnswered=null;S.fIdx=0;S.fFlipped=false;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===k));
  renderTC();
}
function renderTC(){
  const m=MODULES.find(x=>x.key===S.modKey);
  const tc=document.getElementById('tc');
  if(!tc)return;
  if(S.tab==='concept')tc.innerHTML=renderConTab(m);
  else if(S.tab==='case')tc.innerHTML=renderCaseTab(m);
  else if(S.tab==='flash')tc.innerHTML=renderFlashTab(m);
  else tc.innerHTML=renderQuizTab(m,TAB_TYPE[S.tab]||'OX');
}

function renderConTab(m){
  const items=m.con.filter(x=>x[5]===S.topicKey);
  if(!items.length)return empty('📖','개념 정리 준비 중','교과서 아카이빙 후 이 단원의 개념이 표시됩니다.');
  const IL={3:'★★★ 핵심',2:'★★ 중요',1:'★ 기본'};
  const IC={3:'b3',2:'b2',1:'b1'};
  return '<div class="concept-list">'+items.map(c=>`
    <div class="ccard">
      <div class="ccard-hdr">
        <div class="ccard-title">${esc(c[1])}</div>
        <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
          ${pageBadge(c[6])}
          <span class="badge ${IC[c[4]]||'b1'}">${IL[c[4]]||''}</span>

function fmtBody(s){
  if(!s)return'';
  return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code style="background:var(--bg2);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12.5px">$1</code>')
    .replace(/^&gt; (.+)/gm,'<blockquote style="border-left:3px solid var(--primary);padding:7px 12px;margin:6px 0;background:var(--bg2);border-radius:0 5px 5px 0;color:var(--text2)">$1</blockquote>');
}

function getQList(m,type){
  const all=m.qui.filter(q=>q[5]===S.topicKey&&q[1]===type);
  if(S.qFilter==='star')return all.filter(q=>q[2].startsWith('★')||q[2].includes('§★'));
  if(S.qFilter==='wrong'){
    const p=getP(S.topicKey);
    const ng=[...p.ox_ng,...p.mcq_ng,...p.blank_ng];
    return all.filter(q=>ng.includes(q[0]));
  }
  return all;
}
function renderQuizTab(m,type){
  const all=m.qui.filter(q=>q[5]===S.topicKey&&q[1]===type);
  const labels={OX:'OX 퀴즈',MCQ:'객관식',CASE:'사례문제',BLANK:'빈칸채우기'};
  if(!all.length)return empty('📝',`${labels[type]} 준비 중`,'이 단원의 문제가 곧 추가됩니다.');
  const list=getQList(m,type);
  const p=getP(S.topicKey);
  const ngAll=[...p.ox_ng,...p.mcq_ng,...p.blank_ng].filter(id=>all.find(q=>q[0]===id));
  const starAll=all.filter(q=>q[2].startsWith('★')||q[2].includes('§★'));
  const ctrl=`<div class="qcontrols">
    <button class="fbtn ${S.qFilter==='all'?'active':''}" onclick="setQF('all','${type}')">전체 (${all.length})</button>
    ${starAll.length?`<button class="fbtn ${S.qFilter==='star'?'active':''}" onclick="setQF('star','${type}')">⭐ 중요 (${starAll.length})</button>`:''}
    ${ngAll.length?`<button class="fbtn ${S.qFilter==='wrong'?'active':''}" onclick="setQF('wrong','${type}')">❌ 오답 (${ngAll.length})</button>`:''}
    <span class="qprogress">${Math.min(S.qIdx+1,list.length||1)} / ${list.length}</span>
  </div>`;
  if(!list.length)return ctrl+empty('✅','해당 조건의 문제 없음','다른 필터를 선택해보세요.');
  const idx=Math.min(S.qIdx,list.length-1);
  const q=list[idx];
  let card='';
  if(type==='OX')card=renderOX(q);
  else if(type==='MCQ')card=renderMCQ(q);
  else if(type==='CASE')card=renderCASE(q);
  else if(type==='BLANK')card=renderBLANK(q);
  return `<div class="qwrap">${ctrl}${card}
    <div class="qnav">
      <button class="nbtn" onclick="prevQ()" ${idx===0?'disabled':''}>← 이전</button>
      <span style="font-size:11.5px;color:var(--text3)">${idx+1} / ${list.length}</span>
      <button class="nbtn" onclick="nextQ('${type}')" ${idx>=list.length-1?'disabled':''}>다음 →</button>
    </div>
  </div>`;
}

function renderOX(q){
  const starM=q[2].match(/^(★+)/); const starN=starM?starM[1].length:0;
  let fact='',qtext=q[2];
  if(q[2].includes('§')){const p=q[2].split('§');fact=`<div class="qfact">${esc(p[0])}</div>`;qtext=p.slice(1).join('§')}
  const ans=S.qAnswered;
  const cor=q[3];
  return `<div class="qcard">
    <div class="qcard-top"><span class="qbadge qb-ox">OX</span>${starN>0?`<span class="qstar">${'★'.repeat(starN)}</span>`:''}<span style="flex:1"></span>${pageBadge(q[6])}</div>
    ${fact}<div class="qquestion">${esc(qtext.replace(/^★+\s*/,''))}</div>
    <div class="ox-row">
      <button class="oxbtn obtn ${ans!==null?(cor===true?'ans-ok':(ans===true?'ans-ng':'')):'sel-o'}" onclick="${ans===null?`ansOx(true,${q[3]},'${escA(q[0])}')`:''}">○</button>
      <button class="oxbtn xbtn ${ans!==null?(cor===false?'ans-ok':(ans===false?'ans-ng':'')):'sel-x'}" onclick="${ans===null?`ansOx(false,${q[3]},'${escA(q[0])}')`:''}">✕</button>
    </div>
    ${ans!==null?`<div class="qexp show"><div class="qres ${ans===cor?'ok':'ng'}">${ans===cor?'✓ 정답':'✗ 오답'} · 정답: ${cor?'O':'X'}</div><div>${esc(q[4])}</div></div>`:''}
  </div>`;
}
function ansOx(sel,cor,id){S.qAnswered=sel;recordOx(id,sel===cor);renderTC()}

function renderMCQ(q){
  const starM=(q[2].startsWith('★')||q[2].includes('§★'))?q[2].replace(/§.*/,'').match(/^(★+)/):null;
  const starN=starM?starM[1].length:0;
  const pts=q[2].split('§');
  let fact='',qline,opts;
  // 두 번째 요소가 선지(①로 시작)이면 첫 요소가 질문. 아니면 첫 요소가 사실관계.
  if(pts.length>1&&pts[1].trim().startsWith('①')){
    qline=pts[0].replace(/^★\s*/,'');opts=pts.slice(1);
  } else {
    fact=pts.length>1?`<div class="qfact">${esc(pts[0])}</div>`:'';
    qline=(pts[1]||pts[0]).replace(/^★\s*/,'');opts=pts.slice(pts.length>1?2:1);
  }
  const SYMS=['①','②','③','④','⑤'];
  const ans=S.qAnswered;
  const cor=q[3];
  const optH=opts.map((o,i)=>{
    const sym=SYMS[i];
    let cls='';
    if(ans!==null){if(sym===cor)cls='m-correct';else if(sym===ans)cls='m-wrong'}
    return`<div class="mopt ${cls}" onclick="${ans===null?`ansMcq('${sym}','${cor}','${escA(q[0])}')`:''}"><span class="mopt-n">${sym}</span><span>${esc(o.replace(/^[①②③④⑤]\s*/,''))}</span></div>`;
  }).join('');
  return `<div class="qcard">
    <div class="qcard-top"><span class="qbadge qb-mcq">객관식</span>${starN>0?`<span class="qstar">${'★'.repeat(starN)}</span>`:''}<span style="flex:1"></span>${pageBadge(q[6])}</div>
    ${fact}<div class="qquestion">${esc(qline)}</div>
    <div class="mcq-opts">${optH}</div>
    ${ans!==null?`<div class="qexp show"><div class="qres ${ans===cor?'ok':'ng'}">${ans===cor?'✓ 정답':`✗ 오답 · 정답: ${cor}`}</div><div>${esc(q[4])}</div></div>`:''}
  </div>`;
}
function ansMcq(sel,cor,id){S.qAnswered=sel;recordMcq(id,sel===cor);renderTC()}

function renderCASE(q){
  const starM=q[2].match(/§(★+)/)||q[2].match(/^(★+)/);
  const starN=starM?starM[1].length:0;
  const pts=q[2].replace(/§★+\s*/g,'§').split('§');
  const fact=pts.length>1?`<div class="case-facts">${esc(pts[0])}</div>`:'';
  const qtext=pts.length>1?pts.slice(1).join('\n'):pts[0];
  return `<div class="qcard">
    <div class="qcard-top"><span class="qbadge qb-case">사례</span>${starN>0?`<span class="qstar">${'★'.repeat(starN)}</span>`:''}<span style="flex:1"></span>${pageBadge(q[6])}</div>
    ${fact}<div class="case-q">${esc(qtext.replace(/^★+\s*/,''))}</div>
    <button class="case-ans-btn" onclick="toggleAns(this)">📋 모범답안 보기</button>
    <div class="case-ans" id="cans">${esc(q[4])}</div>
  </div>`;
}
function toggleAns(btn){const el=document.getElementById('cans');el.classList.toggle('show');btn.textContent=el.classList.contains('show')?'📋 모범답안 숨기기':'📋 모범답안 보기'}

function renderBLANK(q){
  const starM=q[2].match(/^(★+)/); const starN=starM?starM[1].length:0;
  const ans=S.qAnswered;
  return `<div class="qcard">
    <div class="qcard-top"><span class="qbadge qb-blank">빈칸</span>${starN>0?`<span class="qstar">${'★'.repeat(starN)}</span>`:''}<span style="flex:1"></span>${pageBadge(q[6])}</div>
    <div class="qquestion">${esc(q[2])}</div>
    <div class="blank-row">
      <input class="blank-inp ${ans===null?'':(ans?'ok':'ng')}" id="binp" placeholder="정답 입력 후 Enter..." ${ans!==null?'disabled':''}
        onkeydown="if(event.key==='Enter')submitBlank('${escA(q[3])}','${escA(q[0])}')">
      ${ans===null?`<button class="nbtn pri" onclick="submitBlank('${escA(q[3])}','${escA(q[0])}')">확인</button>`:''}
    </div>
    ${ans!==null?`<div class="qexp show"><div class="qres ${ans?'ok':'ng'}">${ans?'✓ 정답':`✗ 오답 · 정답: ${esc(q[3])}`}</div><div>${esc(q[4])}</div></div>`:''}
  </div>`;
}
function submitBlank(cor,id){
  const el=document.getElementById('binp');if(!el)return;
  const ok=el.value.trim().replace(/\s/g,'')===cor.replace(/\s/g,'');
  S.qAnswered=ok;recordBlank(id,ok);renderTC();
}

function setQF(f,type){S.qFilter=f;S.qIdx=0;S.qAnswered=null;renderTC()}
function prevQ(){if(S.qIdx>0){S.qIdx--;S.qAnswered=null;renderTC()}}
function nextQ(type){
  const m=MODULES.find(x=>x.key===S.modKey);
  const list=getQList(m,type);
  if(S.qIdx<list.length-1){S.qIdx++;S.qAnswered=null;renderTC()}
}

function flipCard(){S.fFlipped=!S.fFlipped;const el=document.getElementById('fi');if(el)el.classList.toggle('flipped',S.fFlipped)}
function prevF(){if(S.fIdx>0){S.fIdx--;S.fFlipped=false;renderTC()}}
function nextF(){
  const m=MODULES.find(x=>x.key===S.modKey);
  const items=m.fla.filter(x=>x[4]===S.topicKey);
  if(S.fIdx<items.length-1){S.fIdx++;S.fFlipped=false;renderTC()}
}
function shuffleF(){
  const m=MODULES.find(x=>x.key===S.modKey);
  const items=m.fla.filter(x=>x[4]===S.topicKey);
  S.fIdx=Math.floor(Math.random()*items.length);S.fFlipped=false;renderTC();
}

// ⑬ SEARCH
// ================================================================
function openSearch(){document.getElementById('soverlay').classList.add('show');setTimeout(()=>document.getElementById('sinput').focus(),40)}
function closeSOverlay(e){if(e.target===document.getElementById('soverlay'))closeSearch()}
function closeSearch(){document.getElementById('soverlay').classList.remove('show');document.getElementById('sinput').value='';document.getElementById('sresults').innerHTML='<div class="sempty">검색어를 입력하세요</div>'}
function searchByAtag(a){openSearch();document.getElementById('sinput').value=a;doSearch(a)}

function doSearch(q){
  q=q.trim();
  const r=document.getElementById('sresults');
  if(!q){r.innerHTML='<div class="sempty">검색어를 입력하세요</div>';return}
  const lq=q.toLowerCase();
  const res=[];

  // ── 페이지 번호 검색 패턴 감지
  // 지원 형식: "p.145" / "p145" / "pp.123" / "123페이지" / "145p" / 순수 숫자(50 이상)
  const pgPat=/^(?:pp?\.?\s*|페이지\s*)?(\d{2,4})\s*(?:페이지|p|쪽)?$/i;
  const pgMatch=q.match(pgPat);
  const pageTarget=pgMatch?parseInt(pgMatch[1]):null;

  MODULES.forEach(m=>{
    // ── CONCEPT 검색
    m.con.forEach(c=>{
      const hit=
        (c[1]+c[2]).toLowerCase().includes(lq)||
        c[3].some(a=>a.replace(/[§\s]/g,'').includes(q.replace(/[§\s]/g,'')))||
        (pageTarget!==null&&pageInRange(c[6],pageTarget));
      if(hit)res.push({type:'개념',title:c[1],sub:c[3].join(' · ')||'',mk:m.key,tk:c[5],page:c[6],mod:m.name});
    });
    // ── CASE 검색 (사건번호, 쟁점, 판시, 조문, 페이지)
    m.cas.forEach(c=>{
      const hit=
        (c[1]+c[2]+c[3]).toLowerCase().includes(lq)||
        c[5].some(a=>a.replace(/[§\s]/g,'').includes(q.replace(/[§\s]/g,'')))||
        (pageTarget!==null&&pageInRange(c[8],pageTarget));
      if(hit)res.push({type:'판례',title:c[2],sub:c[1],mk:m.key,tk:c[7],page:c[8],stars:c[6],mod:m.name});
    });
    // ── QUIZ 검색 (문제 본문, 페이지)
    m.qui.forEach(c=>{
      const hit=
        c[2].toLowerCase().includes(lq)||c[4].toLowerCase().includes(lq)||
        (pageTarget!==null&&pageInRange(c[6],pageTarget));
      if(hit){
        const tl={OX:'OX',MCQ:'객관식',CASE:'사례',BLANK:'빈칸'}[c[1]]||c[1];
        const titleRaw=c[2].replace(/§.*$/,'').replace(/^★\s*/,'');
        res.push({type:tl,title:titleRaw.length>60?titleRaw.substring(0,60)+'…':titleRaw,sub:'',mk:m.key,tk:c[5],page:c[6],mod:m.name});
      }
    });
  });

  if(!res.length){
    const hint=pageTarget?`교과서 ${pageTarget}페이지 근처 내용이 없습니다. 아직 아카이빙되지 않은 범위일 수 있습니다.`:`"${esc(q)}"에 대한 결과 없음`;
    r.innerHTML=`<div class="sempty">${hint}</div>`;
    return;
  }

  // 페이지 검색이면 페이지 오름차순 정렬, 아니면 판례 > 개념 > 문제 순
  if(pageTarget){
    res.sort((a,b)=>{
      const pa=a.page==null?9999:(Array.isArray(a.page)?a.page[0]:a.page);
      const pb=b.page==null?9999:(Array.isArray(b.page)?b.page[0]:b.page);
      return pa-pb;
    });
  }

  const typeIcon={개념:'📖',판례:'⚖️',OX:'🔘',객관식:'📋',사례:'📝',빈칸:'✏️'};
  r.innerHTML=res.slice(0,30).map(x=>{
    const pt=pageText(x.page);
    const starsHtml=x.stars?`<span style="color:var(--star);font-size:10px">${'★'.repeat(x.stars)}</span>`:'';
    return`<div class="sri" onclick="goTopic('${x.mk}','${x.tk}');closeSearch()">
      <div class="sri-type">${typeIcon[x.type]||''} ${x.type} &nbsp;·&nbsp; ${x.mod}</div>
      <div class="sri-title">${esc(x.title)} ${starsHtml}</div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap">
        ${x.sub?`<span class="sri-sub">${esc(x.sub)}</span>`:''}
        ${pt?`<span class="sri-page">📄 ${pt}</span>`:''}
      </div>
    </div>`;
  }).join('');

  if(res.length>30){
    r.innerHTML+=`<div class="sempty" style="font-size:11px;padding:10px">외 ${res.length-30}건 더 있음 — 검색어를 더 구체적으로 입력하세요</div>`;
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function escA(s){return String(s||'').replace(/'/g,"\\'")}
function empty(ico,ttl,sub){return`<div class="empty"><div class="empty-ico">${ico}</div><div class="empty-ttl">${ttl}</div><div class="empty-sub">${sub}</div></div>`}

// page: 숫자(123) 또는 배열([123,125]) 또는 null
function pageText(p){
  if(p==null||p===undefined)return null;
  return Array.isArray(p)?`pp.${p[0]}–${p[1]}`:`p.${p}`;
}
// pageBadge → PDF 팝업 JS 섹션으로 이동
// 페이지 범위 포함 여부: 검색 target 페이지가 항목의 page 범위 내에 있는지
function pageInRange(itemPage, target){
  if(itemPage==null||itemPage===undefined)return false;
  if(Array.isArray(itemPage))return target>=itemPage[0]&&target<=itemPage[1];
  return Math.abs(itemPage-target)<=2; // ±2 페이지 허용
}

// ================================================================
// PDF 단일 페이지 팝업 + IndexedDB 영구 저장
// ================================================================
const PDF_IDB='lawmj_pdf_v1', PDF_STORE='pdf', PDF_KEY='book';
let pgDoc=null, pgCurPage=1, pgAnchor=1, pgRendering=false, pgPending=null, pgTargetAfterLoad=null;
const PG_RANGE=20;

// ── IndexedDB 헬퍼
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(PDF_IDB,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(PDF_STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=rej;
  });
}
async function idbSave(buf){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(PDF_STORE,'readwrite');
    tx.objectStore(PDF_STORE).put(buf,PDF_KEY);
    tx.oncomplete=res; tx.onerror=rej;
  });
}
async function idbLoad(){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(PDF_STORE,'readonly');
    const r=tx.objectStore(PDF_STORE).get(PDF_KEY);
    r.onsuccess=()=>res(r.result||null); r.onerror=rej;
  });
}

// ── PDF.js 초기화 + IDB에서 자동 로드
async function pgInit(){
  if(typeof pdfjsLib==='undefined')return;
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  try{
    const buf=await idbLoad();
    if(buf){await pgLoadBuf(buf);}
  }catch(e){}
}

async function pgLoadBuf(buf){
  pgDoc=await pdfjsLib.getDocument({data:buf}).promise;
  document.getElementById('pg-prev').disabled=false;
  document.getElementById('pg-next').disabled=false;
}

// ── 파일 선택 시
async function pgFileSelected(input){
  const file=input.files[0]; if(!file)return;
  pgSetState('status','⏳ PDF 저장 중...');
  const buf=await file.arrayBuffer();
  await idbSave(buf.slice(0)); // IDB 저장
  await pgLoadBuf(buf);        // 문서 로드
  if(pgTargetAfterLoad!=null){
    pgRender(pgTargetAfterLoad);
    pgTargetAfterLoad=null;
  } else {
    pgRender(pgCurPage);
  }
}

// ── 팝업 열기 (페이지 번호 지정)
function openPage(pageNum){
  document.getElementById('pg-overlay').classList.add('show');
  pgCurPage=parseInt(pageNum)||1;
  pgAnchor=pgCurPage; // 앵커 설정 — 이 페이지 기준 ±20
  document.getElementById('pg-title').textContent=`📄 교과서 p.${pgCurPage}`;
  if(!pgDoc){
    pgTargetAfterLoad=pgCurPage;
    pgSetState('pick');
  } else {
    pgRender(pgCurPage);
  }
}

function closePg(){
  document.getElementById('pg-overlay').classList.remove('show');
}
function pgOverlayClick(e){
  if(e.target===document.getElementById('pg-overlay'))closePg();
}

// ── 페이지 렌더
async function pgRender(num){
  if(!pgDoc)return;
  num=Math.min(Math.max(1,num),pgDoc.numPages);
  if(pgRendering){pgPending=num;return}
  pgRendering=true;
  pgCurPage=num;
  pgSetState('status','⏳ 렌더링 중...');
  document.getElementById('pg-title').textContent=`📄 교과서 p.${num}`;
  const page=await pgDoc.getPage(num);
  const modal=document.getElementById('pg-body');
  const w=Math.min(modal.clientWidth-28,680);
  const vp0=page.getViewport({scale:1});
  const scale=Math.max(0.6,Math.min(2.5,w/vp0.width));
  const vp=page.getViewport({scale});
  const canvas=document.getElementById('pg-canvas');
  const ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(vp.width*dpr);
  canvas.height=Math.floor(vp.height*dpr);
  canvas.style.width=Math.floor(vp.width)+'px';
  canvas.style.height=Math.floor(vp.height)+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  pgSetState('page');
  // 버튼 활성화 상태 업데이트
  pgUpdateNav();
  pgRendering=false;
  if(pgPending!==null){const q=pgPending;pgPending=null;pgRender(q)}
}

function pgUpdateNav(){
  const minP=Math.max(1, pgAnchor-PG_RANGE);
  const maxP=Math.min(pgDoc?pgDoc.numPages:9999, pgAnchor+PG_RANGE);
  document.getElementById('pg-prev').disabled = pgCurPage<=minP;
  document.getElementById('pg-next').disabled = pgCurPage>=maxP;
  // 푸터에 범위 표시
  const foot=document.getElementById('pg-foot');
  const rangeEl=document.getElementById('pg-range');
  if(rangeEl) rangeEl.textContent=`p.${minP} — p.${maxP} 범위 (현재 p.${pgCurPage})`;
}

function pgMove(d){
  if(!pgDoc)return;
  const minP=Math.max(1, pgAnchor-PG_RANGE);
  const maxP=Math.min(pgDoc.numPages, pgAnchor+PG_RANGE);
  const n=Math.min(Math.max(pgCurPage+d, minP), maxP);
  if(n!==pgCurPage) pgRender(n);
}

// ── UI 상태 전환
function pgSetState(state,msg){
  const ids=['pg-pick','pg-status','pg-body','pg-foot'];
  ids.forEach(id=>document.getElementById(id).style.display='none');
  if(state==='pick'){
    document.getElementById('pg-pick').style.display='flex';
  } else if(state==='status'){
    const el=document.getElementById('pg-status');
    el.textContent=msg||'⏳';
    el.style.display='block';
  } else if(state==='page'){
    document.getElementById('pg-body').style.display='flex';
    document.getElementById('pg-foot').style.display='flex';
  }
}

// ── pageBadge 클릭 가능하게 (openPage 연동)
function pageBadge(p,lg){
  const t=pageText(p);
  if(!t)return'';
  const pg=Array.isArray(p)?p[0]:p;
  return`<span class="pbadge${lg?' pbadge-lg':''}" onclick="openPage(${pg})" title="교과서 ${t} 보기">📄 ${t}</span>`;
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('pg-overlay').classList.contains('show')){
    closePg();
  }
});

  '유치권':      ['성립요건(견련성·채권 변제기)','유치권과 경매','유치권과 동시이행항변권'],
  '질권':        ['동산질권','권리질권'],
  '저당권':      ['성립·효력범위(§356~360)','저당권과 용익권','근저당권(§357)','공동저당(§368)'],
  '비전형담보':  ['가등기담보(가담법)','양도담보','동산담보권·채권담보권'],
};

// ================================================================
// 목차 맵 + D-day
// ================================================================
const EXAM_DATE_KEY = 'lawmj_examdate';
const DEFAULT_EXAM  = '2027-01-12'; // 제16회 변호사시험
let mapFilter = 'all';

function calcDday(dateStr) {
  const exam = new Date(dateStr || localStorage.getItem(EXAM_DATE_KEY) || DEFAULT_EXAM);
  const today = new Date(); today.setHours(0,0,0,0); exam.setHours(0,0,0,0);
  return Math.ceil((exam - today) / (1000*60*60*24));
}
function updateDdayChip() {
  const d = calcDday();
  const el = document.getElementById('dday-chip');
  if(!el) return;
  el.textContent = d > 0 ? `D-${d}` : d === 0 ? 'D-Day' : `D+${Math.abs(d)}`;
}

function goMap() {
  S.modKey=null; S.topicKey=null;
  renderSB(); renderBC('map');
  renderMap();
}

function renderMap() {
  const d = calcDday();
  const examDateVal = localStorage.getItem(EXAM_DATE_KEY) || DEFAULT_EXAM;
  const examDate = new Date(examDateVal);
  const examStr = `${examDate.getFullYear()}.${String(examDate.getMonth()+1).padStart(2,'0')}.${String(examDate.getDate()).padStart(2,'0')}`;

  let html = `
    <div class="map-top">
      <div class="map-dday-row">
        <span class="map-dday-big">${d>0?'D-'+d:d===0?'D-Day':'D+'+ Math.abs(d)}</span>
        <div>
          <div class="map-dday-exam">변호사시험 ${examStr}</div>
          <div class="map-dday-info">로스쿨 민법의 정석 9판 · 채권총론 → 채권각론 → 민법총칙 → 물권법</div>
        </div>
      </div>
      <div class="map-examdate-row">
        시험 날짜 변경:
        <input class="map-examdate-inp" type="date" value="${examDateVal}"
          onchange="localStorage.setItem('${EXAM_DATE_KEY}',this.value);updateDdayChip();renderMap()">
      </div>
    </div>
    <div class="map-search-row">
      <input class="map-sinp" id="map-sinp" placeholder="쟁점·조문 검색 (예: 상계, 366, 포현대리)" oninput="mapSearch(this.value)">
      <div class="map-filters">
        <button class="fbtn ${mapFilter==='all'?'active':''}" onclick="setMapFilter('all')">전체</button>
        <button class="fbtn ${mapFilter==='star'?'active':''}" onclick="setMapFilter('star')">★ 약점</button>
        <button class="fbtn ${mapFilter==='done'?'active':''}" onclick="setMapFilter('done')">✓ 완료</button>
        <button class="fbtn ${mapFilter==='none'?'active':''}" onclick="setMapFilter('none')">미학습</button>
      </div>
    </div>
    <div id="map-body">`;

  MODULES.forEach((mod, mi) => {
    html += `
      <div class="map-part-hdr">
        <span class="map-part-dot" style="background:${mod.color}"></span>
        Part ${mi+1} · ${mod.name}
      </div>
      <div class="map-grid">`;

    mod.topics.forEach(t => {
      const cons  = mod.con.filter(c => c[5]===t.key);
      const cases = mod.cas.filter(c => c[7]===t.key);
      const quizs = mod.qui.filter(q => q[5]===t.key);
      const pct   = topicPct(mod, t.key);
      const total = cons.length + cases.length + quizs.length;

      // 필터 적용
      if(mapFilter==='none' && total>0) return;
      if(mapFilter==='done' && pct<100) return;
      if(mapFilter==='star') {
        const p=getP(t.key);
        const hasWrong=[...p.ox_ng,...p.mcq_ng,...p.blank_ng].some(id=>quizs.find(q=>q[0]===id));
        if(!hasWrong) return;
      }

      // 태그: TOPIC_TAGS 소제목 우선, 없으면 아카이빙 예정
      const topicTagList = TOPIC_TAGS[t.key] || [];
      const tagHtml = topicTagList.length > 0
        ? topicTagList.map(tag => {
            const hasData = cons.some(c=>c[1].includes(tag.replace(/\(.*?\)/g,'').trim().substring(0,6)))
                         || cases.some(c=>c[2].includes(tag.replace(/\(.*?\)/g,'').trim().substring(0,6)));
            return `<span class="mtag ${total>0?'has':'empty'}" onclick="event.stopPropagation();goTopic('${mod.key}','${t.key}')">${esc(tag)}</span>`;
          }).join('')
        : `<span class="mtag empty">소제목 미등록</span>`;

      const borderColor = total > 0 ? mod.color : 'var(--border)';
      html += `
        <div class="mcard2" style="border-left-color:${borderColor}" onclick="goTopic('${mod.key}','${t.key}')">
          <div class="mcard2-title">
            ${esc(t.label)}
            <span class="mcard2-counts">개념${cons.length}·판례${cases.length}·문제${quizs.length}</span>
          </div>
          ${pct>0?`<div class="map-pbar"><div class="map-pbar-fill" style="width:${pct}%;background:${mod.color}"></div></div>`:''}
          <div class="map-tags">${tagHtml}</div>
        </div>`;
    });
    html += '</div>';
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function setMapFilter(f) {
  mapFilter = f;
  renderMap();
}

function mapSearch(q) {
  q = q.trim().toLowerCase();
  if(!q) { renderMap(); return; }
  // 맵에서 검색: 매칭 카드만 하이라이트 (간단 구현 — 전체 검색창과 별개)
  document.querySelectorAll('.mcard2').forEach(card => {
    const txt = card.textContent.toLowerCase();
    card.style.opacity = txt.includes(q) ? '1' : '0.25';
  });
}

// breadcrumb에 맵 상태 추가
function renderBC(mode) {
  const bc = document.getElementById('breadcrumb');
  if(mode==='map'||(!S.modKey&&!S.topicKey)) {
    bc.innerHTML='<span class="bc-link" onclick="goMap()">🗺️ 목차</span>';
    return;
  }
  if(!S.modKey) {
    bc.innerHTML='<span class="bc-link" onclick="goMap()">🗺️ 목차</span>';
    return;
  }
  const m=MODULES.find(x=>x.key===S.modKey);
  const t=m&&m.topics.find(x=>x.key===S.topicKey);
  bc.innerHTML=`
    <span class="bc-link" onclick="goMap()">🗺️ 목차</span>
    <span class="bc-sep">›</span>
    <span class="bc-link" onclick="goTopic('${m.key}','${m.topics[0].key}')">${m.name}</span>
    ${t?`<span class="bc-sep">›</span><strong>${t.label}</strong>`:''}`;
}

  loadP();
  const theme=localStorage.getItem('lawmj_theme')||'light';
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('theme-btn').textContent=theme==='dark'?'☀️':'🌙';
  updateDdayChip();
  renderSB(); renderBC('map'); renderMap();
  pgInit();
})();
</script>
