<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LawMJ Mastery</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Backgrounds — Linen + Cloud Dancer ── */
  --bg:#f3f1ee;          /* warm linen */
  --bg2:#e8ecee;         /* cloud dancer */
  --card:#ffffff;
  --border:#cdd8de;      /* powder blue border */
  /* ── Text — Deep Slate ── */
  --text:#243237;        /* deep slate (#243237) */
  --text2:#4e6e7a;       /* steel text */
  --text3:#90b0ba;       /* mist */
  /* ── Primary — Steel Blue ── */
  --primary:#5a8fa0;     /* between #7296a4 & #67869a */
  --primary-light:#e0edf1;
  /* ── Semantic ── */
  --accent:#a07070;      /* dusty rose (for wrong/error) */
  --success:#5a8c7a;     /* sage (for correct) */
  --warning:#9a8060;     /* warm sand */
  --star:#6a9aaa;        /* star = warm caramel */
  /* ── Sidebar — Deep Slate ── */
  --sb-bg:#1c2b34;       /* #243237 darker */
  --sb-text:#9ebecb;     /* sea glass */
  --sb-active:#6fa0b5;   /* steel blue active */
  --sb-hover:#243542;
  --topbar:#ffffff;
  --shadow:0 2px 12px rgba(90,143,160,0.10);
  --radius:10px;
}
[data-theme="dark"] {
  --bg:#1b2830;
  --bg2:#21303a;
  --card:#273542;
  --border:#324858;
  --text:#d5e5ea;
  --text2:#7aacb8;
  --text3:#3d6878;
  --primary:#78b5ca;
  --primary-light:#1a3545;
  --accent:#d09090;
  --success:#6db89e;
  --warning:#c8a878;
  --star:#78b0c5;
  --sb-bg:#141e25;
  --sb-text:#6a9aaa;
  --sb-active:#78b0c5;
  --sb-hover:#1b2830;
  --topbar:#1f2e38;
  --shadow:0 2px 12px rgba(0,0,0,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:252px;min-width:252px;background:var(--sb-bg);display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#2c4552;border-radius:3px}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.sb-logo-sub{font-size:10px;color:#5a6a8a;margin-top:3px}
.sb-module-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;color:var(--sb-text);font-size:10.5px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;transition:background 0.15s}
.sb-module-header:hover{background:var(--sb-hover)}
.sb-module-header .chv{transition:transform 0.2s;font-size:9px;opacity:0.6}
.sb-module-header.open .chv{transform:rotate(90deg)}
.sb-topics{}
.sb-topic{display:flex;align-items:center;gap:7px;padding:7px 16px 7px 26px;cursor:pointer;color:#7080a0;font-size:12px;transition:all 0.15s;border-left:2px solid transparent}
.sb-topic:hover{background:var(--sb-hover);color:#bbc8e8}
.sb-topic.active{background:rgba(90,143,160,0.12);color:#9ebecb;border-left-color:var(--sb-active)}
.sb-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0.5;flex-shrink:0}
.sb-topic.active .sb-dot{opacity:1;background:var(--sb-active)}
.sb-pct{margin-left:auto;font-size:10px;opacity:0.5}
.sb-stats{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);font-size:11px;color:#5a6a8a}
.sb-stats strong{color:#8898bb}

/* MAIN */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--topbar);border-bottom:1px solid var(--border);padding:0 22px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.breadcrumb{flex:1;font-size:12.5px;color:var(--text2);display:flex;align-items:center;gap:5px;overflow:hidden}
.breadcrumb .bc-link{color:var(--primary);cursor:pointer;white-space:nowrap}
.breadcrumb .bc-link:hover{text-decoration:underline}
.breadcrumb .bc-sep{color:var(--text3)}
.breadcrumb strong{color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbtn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:all 0.15s;flex-shrink:0}
.tbtn:hover{background:var(--bg2);color:var(--primary)}
.content{flex:1;overflow-y:auto;padding:22px 24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* HUB */
.hub-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;margin-bottom:5px}
.hub-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.hub-stats{display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap}
.hstat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;min-width:90px;text-align:center;flex:1}
.hstat-num{font-size:22px;font-weight:700;color:var(--primary);font-family:'Noto Serif KR',serif}
.hstat-label{font-size:10.5px;color:var(--text3);margin-top:2px}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mcard:nth-child(1)::before{background:#5a8fa0}
.mcard:nth-child(2)::before{background:#7aa8b8}
.mcard:nth-child(3)::before{background:#86b4ae}
.mcard:nth-child(4)::before{background:#6888a0}
.mcard:nth-child(5)::before{background:#8098b0}
.mcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary)}
.mcard-icon{font-size:26px;margin-bottom:8px}
.mcard-name{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;margin-bottom:4px}
.mcard-topics{font-size:11px;color:var(--text3);margin-bottom:12px}
.mpbar{height:4px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:5px}
.mpbar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.mpbar-text{font-size:10.5px;color:var(--text3)}
.mcard-stats{display:flex;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.mcs{font-size:10.5px;color:var(--text3)}
.mcs strong{color:var(--text2);font-weight:600}

/* TOPIC */
.topic-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;margin-bottom:3px}
.topic-meta{font-size:11.5px;color:var(--text3);margin-bottom:18px}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:9px;padding:3px;margin-bottom:18px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text2);white-space:nowrap;transition:all 0.15s}
.tab-btn:hover{background:var(--card);color:var(--text)}
.tab-btn.active{background:var(--card);color:var(--primary);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1)}

/* CONCEPT */
.concept-list{display:flex;flex-direction:column;gap:14px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.ccard-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.ccard-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b3{background:#f0e3e3;color:#905050}
.b2{background:#ede9e0;color:#9a7050}
.b1{background:#e0edf1;color:#4a8090}
[data-theme="dark"] .b3{background:#3a1818;color:#d09090}
[data-theme="dark"] .b2{background:#302510;color:#c8a870}
[data-theme="dark"] .b1{background:#1a3545;color:#7eb5ca}
.ccard-body{font-size:13.5px;line-height:1.9;color:var(--text2);white-space:pre-wrap}
.atags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.atag{padding:2px 9px;background:var(--primary-light);color:var(--primary);border-radius:4px;font-size:10.5px;font-weight:600;cursor:pointer}
.atag:hover{opacity:0.75}

/* CASE */
.case-filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:11.5px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all 0.15s}
.fbtn:hover{border-color:var(--primary);color:var(--primary)}
.fbtn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.case-grid{display:flex;flex-direction:column;gap:12px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:box-shadow 0.2s}
.pcard:hover{box-shadow:var(--shadow)}
.pcard-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.pcard-no{font-size:11.5px;color:var(--text3);font-family:monospace}
.pcard-stars{color:var(--star);font-size:11px;letter-spacing:-1px}
.pcard-issue{font-weight:700;font-size:14.5px;margin-bottom:9px}
.pcard-sec{margin-bottom:7px}
.pcard-sec-lbl{font-size:9.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.pcard-sec-txt{font-size:13px;line-height:1.75;color:var(--text2)}
.pcard-sig{margin-top:9px;padding:7px 11px;background:#e8f2f5;border-radius:6px;font-size:12px;color:#4a8090;border-left:2px solid var(--primary)}

/* QUIZ */
.qcontrols{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.qprogress{font-size:12px;color:var(--text3);margin-left:auto}
.qwrap{max-width:680px;margin:0 auto}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px 26px;min-height:180px;margin-bottom:14px}
.qcard-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.qbadge{padding:2px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.qb-ox{background:#e0edf1;color:#4a8090}
.qb-mcq{background:#f0e8ea;color:#9a6070}
.qb-case{background:#e0eeea;color:#4a8070}
.qb-blank{background:#ede9e0;color:#8a7050}
[data-theme="dark"] .qb-ox{background:#1a3545;color:#7eb5ca}
[data-theme="dark"] .qb-mcq{background:#381525;color:#d08090}
[data-theme="dark"] .qb-case{background:#153528;color:#7eb5a0}
[data-theme="dark"] .qb-blank{background:#302510;color:#c8a870}
.qstar{color:#6a9aaa;font-size:13px;letter-spacing:1px}
.qfact{background:var(--bg2);border-left:3px solid var(--primary);padding:10px 14px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:14px}
.qquestion{font-size:14.5px;line-height:1.85;color:var(--text);margin-bottom:18px}

/* OX */
.ox-row{display:flex;gap:14px;justify-content:center;margin:4px 0}
.oxbtn{width:76px;height:76px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-size:28px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.oxbtn:hover{transform:scale(1.07)}
.obtn:hover,.obtn.sel-o{border-color:var(--success);background:rgba(90,140,122,0.09)}
.xbtn:hover,.xbtn.sel-x{border-color:var(--accent);background:rgba(160,112,112,0.09)}
.oxbtn.ans-ok{border-color:var(--success)!important;background:rgba(90,140,122,0.13)!important}
.oxbtn.ans-ng{border-color:var(--accent)!important;background:rgba(160,112,112,0.13)!important}

/* MCQ */
.mcq-opts{display:flex;flex-direction:column;gap:7px}
.mopt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:13.5px;line-height:1.7;color:var(--text2);background:var(--card);transition:all 0.15s}
.mopt:hover{border-color:var(--primary);color:var(--text);background:var(--primary-light)}
.mopt.m-correct{border-color:var(--success);background:rgba(90,140,122,0.08);color:var(--text)}
.mopt.m-wrong{border-color:var(--accent);background:rgba(160,112,112,0.08);color:var(--text)}
.mopt-n{font-weight:700;color:var(--primary);flex-shrink:0;width:18px}

/* Explanation */
.qexp{margin-top:12px;padding:12px 14px;background:var(--bg2);border-radius:7px;border-left:3px solid var(--primary);font-size:13px;line-height:1.8;color:var(--text2);display:none}
.qexp.show{display:block}
.qres{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:4px;font-size:11.5px;font-weight:700;margin-bottom:7px}
.qres.ok{background:rgba(90,140,122,0.13);color:var(--success)}
.qres.ng{background:rgba(160,112,112,0.13);color:var(--accent)}

/* BLANK */
.blank-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.blank-inp{flex:1;padding:9px 13px;border:1.5px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);font-size:13.5px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s}
.blank-inp:focus{border-color:var(--primary)}
.blank-inp.ok{border-color:var(--success)}
.blank-inp.ng{border-color:var(--accent)}

/* CASE PROB */
.case-facts{background:var(--bg2);border-left:3px solid #0ca678;padding:12px 15px;border-radius:0 7px 7px 0;margin-bottom:12px;font-size:13.5px;line-height:1.8;color:var(--text2)}
.case-q{font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:14px}
.case-ans-btn{padding:9px 18px;border:1.5px solid var(--success);border-radius:7px;background:transparent;color:var(--success);font-size:12.5px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s}
.case-ans-btn:hover{background:rgba(90,140,122,0.09)}
.case-ans{margin-top:12px;padding:14px 16px;background:rgba(90,140,122,0.07);border:1px solid rgba(90,140,122,0.25);border-radius:7px;font-size:13.5px;line-height:1.85;color:var(--text2);display:none}
.case-ans.show{display:block}

/* NAV */
.qnav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px}
.nbtn{padding:8px 18px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text2);font-size:12.5px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s}
.nbtn:hover{border-color:var(--primary);color:var(--primary)}
.nbtn:disabled{opacity:0.35;cursor:not-allowed}
.nbtn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.nbtn.pri:hover{opacity:0.9;color:#fff}

/* FLASHCARD */
.flash-wrap{max-width:580px;margin:0 auto}
.flash-ctr{font-size:12.5px;color:var(--text3);text-align:center;margin-bottom:6px}
.flash-hint{font-size:11px;color:var(--text3);text-align:center;margin-bottom:14px}
.flash-scene{perspective:1200px;height:270px;margin-bottom:18px;cursor:pointer}
.flash-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.48s cubic-bezier(0.4,0,0.2,1)}
.flash-inner.flipped{transform:rotateY(180deg)}
.flash-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;border:1px solid var(--border);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.flash-front{background:var(--card)}
.flash-back{background:#5a8fa0;transform:rotateY(180deg)}
[data-theme="dark"] .flash-back{background:#1c3a4f}
.flash-face-lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.45;margin-bottom:14px}
.flash-front-text{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;color:var(--text);line-height:1.5}
.flash-back-text{font-size:13.5px;line-height:1.9;color:rgba(255,255,255,0.92);white-space:pre-wrap}
.flash-cat{position:absolute;top:10px;right:12px;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--primary-light);color:var(--primary)}
.flash-back .flash-cat{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.75)}

/* SEARCH */
.soverlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:70px}
.soverlay.show{display:flex}
.sbox{width:580px;max-width:92vw;background:var(--card);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.25);overflow:hidden}
.sinput-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:10px}
.sinput{flex:1;border:none;background:transparent;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none}
.sinput::placeholder{color:var(--text3)}
.sresults{max-height:380px;overflow-y:auto}
.sri{padding:11px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s}
.sri:hover{background:var(--bg2)}
.sri:last-child{border-bottom:none}
.sri-type{font-size:9.5px;color:var(--text3);margin-bottom:2px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase}
.sri-title{font-size:13.5px;color:var(--text);font-weight:500}
.sri-sub{font-size:11.5px;color:var(--text2);margin-top:1px}
.sempty{padding:28px;text-align:center;color:var(--text3);font-size:13px}

/* WRONG NOTE FAB */
.fab{position:fixed;bottom:22px;right:22px;width:50px;height:50px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:18px;box-shadow:0 4px 16px rgba(90,143,160,0.30);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.fab:hover{transform:scale(1.1)}
.fab-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--accent);border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none}
.fab-badge.show{display:flex}

/* EMPTY */
.empty{text-align:center;padding:56px 20px;color:var(--text3)}
.empty-ico{font-size:38px;margin-bottom:10px}
.empty-ttl{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12.5px}

/* PAGE BADGE */
.pbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:4px;background:var(--primary-light);color:var(--primary);font-size:10.5px;font-weight:600;white-space:nowrap;cursor:default;flex-shrink:0}
[data-theme="dark"] .pbadge{background:var(--primary-light);color:var(--primary)}
.pbadge-lg{font-size:12.5px;padding:4px 11px}
.sri-page{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:3px;background:var(--primary-light);color:var(--primary);font-size:10px;font-weight:600;margin-top:3px}
[data-theme="dark"] .sri-page{background:#101830;color:#7a9eff}

/* WRONG NOTE PAGE */
.wn-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.wn-meta{font-size:10.5px;color:var(--text3);margin-bottom:6px}
.wn-q{font-size:13.5px;color:var(--text);margin-bottom:8px;line-height:1.7}
.wn-exp{font-size:12.5px;color:var(--text2);line-height:1.75;padding:8px 11px;background:var(--bg2);border-radius:6px}

/* ── 교과서 페이지 팝업 ── */
.pg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.pg-overlay.show{display:flex}
.pg-modal{background:var(--card);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;max-width:min(720px,96vw);max-height:92vh;box-shadow:0 24px 64px rgba(0,0,0,0.45);width:100%}
.pg-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.pg-hdr-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.pg-hdr-nav{display:flex;align-items:center;gap:6px}
.pg-nbtn{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.15s}
.pg-nbtn:hover{border-color:var(--primary);color:var(--primary)}
.pg-nbtn:disabled{opacity:0.3;cursor:not-allowed}
.pg-body{overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:14px;background:#555;flex:1;min-height:200px}
.pg-body canvas{max-width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.pg-foot{padding:8px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;font-size:11.5px;color:var(--text3)}
/* 파일 선택 상태 */
.pg-pick{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:36px 24px;flex:1}
.pg-pick-lbl{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:24px 32px;border:2px dashed var(--border);border-radius:12px;color:var(--text2);transition:all 0.2s;text-align:center}
.pg-pick-lbl:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.pg-status{font-size:13px;color:var(--text3);text-align:center;padding:40px}
.pbadge{cursor:pointer!important}
.pbadge:hover{opacity:0.78}

/* ── 목차 맵 페이지 ── */
.dday-chip{padding:3px 11px;background:#e0edf1;color:#3a7080;border-radius:6px;font-size:13px;font-weight:700;font-family:'Noto Serif KR',serif;white-space:nowrap;flex-shrink:0;letter-spacing:-0.5px}
[data-theme="dark"] .dday-chip{background:#1a3545;color:#78b5ca}
.map-top{margin-bottom:18px}
.map-dday-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.map-dday-big{font-family:'Noto Serif KR',serif;font-size:36px;font-weight:700;color:#3a7080;letter-spacing:-2px;line-height:1}
[data-theme="dark"] .map-dday-big{color:#78b5ca}
.map-dday-info{font-size:12.5px;color:var(--text2)}
.map-dday-exam{font-weight:700;color:var(--text)}
.map-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;margin-bottom:3px}
.map-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.map-search-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.map-sinp{flex:1;min-width:200px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s}
.map-sinp:focus{border-color:var(--primary)}
.map-filters{display:flex;gap:5px;flex-wrap:wrap}
.map-part-hdr{display:flex;align-items:center;gap:8px;margin:22px 0 10px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.6px;text-transform:uppercase}
.map-part-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.map-part-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:10px}
.mcard2{background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;padding:13px 15px;cursor:pointer;transition:all 0.18s}
.mcard2:hover{border-color:var(--primary);border-left-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-1px)}
.mcard2-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:5px;line-height:1.4}
.mcard2-counts{margin-left:auto;font-size:9.5px;color:var(--text3);font-weight:400;white-space:nowrap;flex-shrink:0}
.map-pbar{height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-bottom:7px}
.map-pbar-fill{height:100%;border-radius:2px;transition:width 0.4s}
.map-tags{display:flex;flex-wrap:wrap;gap:4px}
.mtag{padding:2px 8px;border-radius:4px;font-size:10.5px;cursor:pointer;transition:all 0.13s;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.mtag.has{background:var(--primary-light);color:var(--primary)}
.mtag.has:hover{opacity:0.8}
.mtag.empty{background:var(--bg2);color:var(--text3);font-style:italic;cursor:default}
.map-examdate-row{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11.5px;color:var(--text3)}
.map-examdate-inp{padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);font-size:11.5px;outline:none;width:110px}
.map-examdate-inp:focus{border-color:var(--primary)}

@media(max-width:780px){
  .sidebar{width:220px;min-width:220px;position:fixed;z-index:90;transform:translateX(-100%);transition:transform 0.28s}
  .sidebar.open{transform:translateX(0)}
  .hub-stats{flex-wrap:wrap}
  .hstat{min-width:calc(50% - 6px)}
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-logo" onclick="goMap()" style="cursor:pointer">
    <div class="sb-logo-title">⚖️ LawMJ Mastery</div>
    <div class="sb-logo-sub">민법 교과서 완전학습 플랫폼</div>
  </div>
  <div id="sb-nav"></div>
  <div class="sb-stats" id="sb-stats"></div>
</aside>

<div class="main-wrap">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <span class="dday-chip" id="dday-chip" onclick="goMap()" title="변호사시험 D-day · 클릭하면 목차로" style="cursor:pointer">D-...</span>
    <button class="tbtn" onclick="goMap()" title="목차 맵">🗺️</button>
    <button class="tbtn" onclick="openSearch()" title="검색 (⌘K)">🔍</button>
    <button class="tbtn" onclick="toggleTheme()" id="theme-btn" title="테마 전환">🌙</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="soverlay" id="soverlay" onclick="closeSOverlay(event)">
  <div class="sbox">
    <div class="sinput-row">
      <span style="font-size:16px;color:var(--text3)">🔍</span>
      <input class="sinput" id="sinput" placeholder="조문(§750), 판례번호, 개념, 키워드, 또는 페이지 번호(예: p.145, 200페이지)" oninput="doSearch(this.value)">
      <button class="tbtn" style="border:none" onclick="closeSearch()">✕</button>
    </div>
    <div class="sresults" id="sresults"><div class="sempty">검색어를 입력하세요</div></div>
  </div>
</div>

<button class="fab" id="fab" onclick="showWrongNote()" title="오답노트">📕
  <div class="fab-badge" id="fab-badge">0</div>
</button>



<div class="pg-overlay" id="pg-overlay" onclick="pgOverlayClick(event)">
  <div class="pg-modal" id="pg-modal">
    <div class="pg-hdr">
      <span class="pg-hdr-title" id="pg-title">📄 교과서 페이지</span>
      <div class="pg-hdr-nav">
        <button class="pg-nbtn" id="pg-prev" onclick="pgMove(-1)" disabled>◀ 이전</button>
        <button class="pg-nbtn" id="pg-next" onclick="pgMove(1)" disabled>다음 ▶</button>
        <button class="pg-nbtn" onclick="closePg()">✕</button>
      </div>
    </div>
    <!-- 상태: 파일 미선택 -->
    <div class="pg-pick" id="pg-pick" style="display:none">
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">교과서 PDF를 한 번 선택하면 이후 자동으로 기억합니다</div>
      <label class="pg-pick-lbl" for="pg-file-inp">
        <span style="font-size:36px">📂</span>
        <span style="font-size:14px;font-weight:600">로스쿨 민법의 정석.pdf 선택</span>
        <span style="font-size:11.5px;color:var(--text3)">선택 후 이 브라우저에 영구 저장됩니다</span>
      </label>
      <input type="file" id="pg-file-inp" accept=".pdf" style="display:none" onchange="pgFileSelected(this)">
    </div>
    <!-- 상태: 로딩/렌더링 -->
    <div class="pg-status" id="pg-status" style="display:none">⏳ 로딩 중...</div>
    <!-- 상태: 페이지 표시 -->
    <div class="pg-body" id="pg-body" style="display:none">
      <canvas id="pg-canvas"></canvas>
    </div>
    <div class="pg-foot" id="pg-foot" style="display:none">
      <span id="pg-range" style="flex:1">—</span>
      <label for="pg-file-inp" style="color:var(--primary);cursor:pointer;flex-shrink:0">📂 파일 변경</label>
    </div>
  </div>
</div>

<script>
// ================================================================
// ① 데이터 배열 (아카이빙 시 순차적으로 채움)
// 포맷:
//  CONCEPT:   [id, title, body, article_refs[], importance(1-3), topic, page]
//  CASE:      [id, case_no, issue, holding, significance, article_refs[], stars(1-3), topic, page]
//  QUIZ:      [id, type, question, answer, explanation, topic, page]
//             type → "OX"(answer:true/false) | "MCQ"(answer:"①"~"⑤") | "CASE"(answer:"OPEN") | "BLANK"(answer:string)
//             MCQ question 형식: "질문§①선지1§②선지2§③선지3§④선지4§⑤선지5"
//             공통사실 있을 시: "사실관계§질문§①선지1§..."  / OX: "사실관계§★지문"
//  FLASHCARD: [id, front, back, category, topic, page]
//             category → "concept"|"case"|"article"|"compare"
//
//  page 필드:
//    단일 페이지 → 숫자:       123
//    페이지 범위 → 배열:       [123, 125]
//    페이지 미상 → null 또는 생략
//  예시: ["총칙_C001","법률행위의 의의","...본문...",["§105","§107"],3,"법률행위",145]
// ================================================================

const 채권각론_CONCEPT = [
  ["채권각론_C001","계약의 종류","- 소비대차·위임·임치·종신정기금은 유상인 경우 **쌍무계약**\n- 쌍무계약은 모두 **유상계약**\n- 현상광고는 **편무계약** + 유상계약\n- **요물계약**: 현상광고, 대물변제계약, 계약금계약, 보증계약",["§§527-535"],0,"계약총론"],
  ["채권각론_C002","계약의 성립 — 합의 (객관적 합치·주관적 합치·숨은 불합의)","- 계약 성립요건인 '합의'는 **객관적 합치**(내용의 일치) + **주관적 합치**(당사자의 일치)\n- **숨은 불합의**: 규범적 해석을 통해서도 의사 합치가 없는 경우 → 계약 불성립\n- 착오는 규범적 해석을 통해 합의 성립 인정된 다음 단계의 문제",["§527"],0,"계약총론"],
  ["채권각론_C003","청약과 승낙 — 구속력·존속기간·격지자간 성립시기 (제527조~제534조)","**청약의 구속력(제527조)**: 철회 금지\n\n**청약의 존속기간(제528조, 제529조)** = 구속력 존속기간 = 승낙적격 = 승낙기간\n- 제1항: 승낙기간 정한 청약은 청약자가 그 기간 내 승낙 통지 받지 못하면 실효\n- 제2항: 승낙 통지가 기간 후 도달했지만 보통 기간 내 도달할 발송이라면 청약자는 지체 없이 상대방에게 연착 통지해야 (미리 연착 통지한 것 아닌 이상)\n- 제3항: 청약자가 연착 통지를 지체 없이 하지 않았다면 연착되지 않은 것으로 간주 → 승낙 통지 발송시 계약성립(531조)\n- 제529조: 승낙기간 정하지 않은 청약은 상당한 기간\n\n**격지자간 계약성립시기(제531조)**: 승낙 통지를 발송한 때 성립\n\n**기타 규정**\n- 연착된 승낙(제530조): 새 청약으로 볼 수 있음\n- 변경 가한 승낙(제534조): 승낙자가 청약에 조건·변경 가하여 승낙하면 청약 거절과 동시에 새 청약한 것 간주\n- 의사실현에 의한 계약성립(제532조): 의사표시·관습에 의해 승낙 통지 필요 없다면 승낙 의사표시로 인정되는 사실이 있는 때 성립\n- 교차청약(제533조): 동일 내용의 청약이 상호교차된 경우는 양 청약이 도달한 때 계약성립",["§527","§528","§529","§530","§531","§532","§533","§534"],0,"계약총론"],
  ["채권각론_C004","계약체결상의 과실 (제535조)","**요건**: **원시적·객관적·전부** 불능(=법률행위 내용의 불능)이어서 계약이 무효인 경우 적용\n\n**효과**: 불능에 악의·과실 있는 자는 상대방이 계약의 유효를 믿었음으로 인한 손해배상(=**신뢰이익**의 배상). 그러나 유효함으로 인하여 생길 이익(=이행이익)을 넘을 수 없고, 이때 상대방은 선의·무과실 요함\n\n**535조 확대적용론 부정설** [통판] ∵ 불법행위 일반규정이 있는 우리 민법",["§535"],0,"계약총론"],
  ["채권각론_C005","계약교섭의 부당파기","- 불법행위 성립 요건: 일방이 계약 교섭단계에서 확실히 체결되리라는 정당한 기대·신뢰 부여하여 상대방이 그 신뢰에 따라 행동하였음에도 상당한 이유 없이 계약 체결 거부하여 손해 입힌 경우 → 신의칙에 비추어 계약자유원칙 한계 넘는 불법행위 성립\n- **손해의 범위**: 계약이 유효하게 체결된다고 믿었던 것에 의하여 입은 손해(=**신뢰손해**)에 한정\n  - 신뢰손해란 계약의 성립을 기대하고 지출한 계약준비비용처럼 그러한 신뢰가 없었더라면 통상 지출하지 않았을 비용상당 손해\n  - 아직 계약체결에 확고한 신뢰 부여되기 이전에 계약교섭 당사자가 계약체결이 좌절되더라도 어쩔 수 없다고 생각하고 지출한 비용(경쟁입찰에 참가하기 위해 지출한 제안서·견적서 작성비용) 등은 포함 X\n- 침해행위·피해법익의 유형에 따라 계약교섭 파기의 불법행위가 인격적 법익 침해함으로써 정신적 고통 초래 인정되면 별도로 위자료 배상 O",[],0,"계약총론"],
  ["채권각론_C006","동시이행의 항변권 — 서설 (성질·명문 규정·법정 동시이행관계)","**쌍무계약의 이행상 견련성**에서 유래. 성질: 연기적 항변권, 임의규정.\n\n**명문으로 동시이행 인정되는 규정**\n- **전세권**: 목적물인도·전세권설정등기말소와 전세금반환(§317)\n- **계약해제**: 원상회복(§549)\n- **도급**: 완성된 목적물의 하자로 인한 손해배상과 보수지급(§667조 제3항)\n- **가등기담보**: 청산금지급과 본등기·인도의무(가담법 §4조 제3항)\n\n**법정 동시이행관계 (판례)**\n- 계약이 무효 또는 취소된 경우 상호간 부당이득반환의무 [95다54693]\n- 임대차계약 종료 시: 목적물 인도의무와 '보증금 중 연체차임 등 임대차 관련하여 인도시까지 생긴 임차인의 모든 채무를 공제한 나머지'의 반환의무 [77다1241]\n- 도급에서 하자확대손해로 인한 손해배상채무와 공사대금채무 [2004다37676]\n\n**채권증서 반환·영수증 교부**\n- 변제자는 변제받는 자에게 영수증 청구(§474), 변제자가 채무 전부 변제한 때는 채권증서 반환청구(§475)\n- 전부 변제해야 채권증서 반환 청구 인정, 변제와 동시이행관계 X ≠ 영수증교부의무는 변제와 동시이행관계 O [2003다22042]",["§536","§317","§474","§475","§549","§667"],0,"계약총론"],
  ["채권각론_C007","동시이행의 항변권 — 요건 (제536조 제1항·제2항)","**① 쌍무계약에서 발생한 대가적 채무일 것**\n- 쌍방 부담 각 채무가 고유 대가관계 있는 쌍무계약상 채무 아니더라도 구체적 계약관계의 채무 사이 대가적 의미 있어 이행상 견련관계 인정되면 O [2019다215791]\n- 임의경매 무효인 경우 채권자(=근저당권자)가 채무자를 대위하여 경락인에게 하는 소유권이전등기 말소청구와 경락인이 배당금을 수령한 채권자에게 하는 배당금반환청구는 동시이행 X ∵ 서로 이행의 상대방 다름 [2006다24049]\n- 채권양도·채무인수, 이행불능으로 인한 손해배상채무로 변경, 급부 불능으로 인한 대상청구권 발생 → 동일성 있으므로 여전히 동시이행 O\n\n**② 상대방 채무가 변제기에 있을 것**\n- 매매에서 중도금 지급의무, 도급에서 일의 완성의무처럼 선이행의무인 경우 매수인·수급인은 이러한 의무에 관하여 동이항 X\n- **예외**: 선이행의무자도 이행의 거절 O\n  ⓐ 선이행의무자 이행하지 않는 동안 상대방 채무도 변제기가 도래한 경우\n  ⓑ 선이행의무도 이행기 경과 후에는 동시이행관계 → 설령 어느 의무가 선이행의무라 해도 이행기 지나면, 이행기 후에도 선이행하기로 약정하는 등 특별한 사정 없는 한 동시이행관계 O [2017다3222]\n\n**ⓑ 불안의 항변권(제536조 제2항)**: 상대방의 이행이 곤란할 현저한 사유 있는 경우\n- '상대방 이행이 곤란할 현저한 사유'는 상대방의 신용불안이나 재산상태 악화 등 사정변경 생기고 당초 계약 내용 따른 선이행의무 이행케 하는 것이 공평·신의칙 반하게 되는 경우 → 상대방 채무가 아직 이행기에 이르지 않아도 O [2019다215791, 2023다269139]\n\n**③ 상대방이 채무 이행·이행제공이 없을 것**\n- **가분 v. 가분**: 상응하는 범위만 동이항 행사 O\n  - 도급계약: 도급인이 ⓐ '하자보수(불가분)' 청구하면 공사대금(가분) 전액 거절 O, ⓑ '하자보수에 갈음하는 손해배상(가분)' 청구한다면 공사대금(가분) 중 그에 상응하는 범위만 지급 거절 O, 전액 거절 X\n- **동시이행항변권 상실과 계속적 이행제공설**: 쌍무계약 당사자 일방이 먼저 한 번 현실 제공을 하고 상대방을 수령지체에 빠지게 했더라도 그 이행제공이 계속되지 않는 경우에는 과거 한 번 이행제공 사실만으로 상대방의 동시이행 항변권 소멸 X [66다1174] → **계속적 이행제공설** [통판]\n- 채권자가 미리 받기를 거절한 경우에도 채무자는 구두 제공은 해야 하므로 채권자는 여전히 동시이행항변권 O. 그러나 채권자의 '영구적 불수령'은 구두 제공조차 필요 없으므로 채권자는 동시이행항변권 상실",["§536"],0,"계약총론"],
  ["채권각론_C008","동시이행의 항변권 — 효력 (이행거절·존재효·상환이행판결·상계금지)","**이행거절의 연기적 항변권**\n\n**소송 처리**: 변론주의 → 피고가 항변으로 주장해야 → 인정되면 **상환이행판결**(일부승소) → **집행개시요건** + 집행기관이 심사 [통판] (v. 집행문부여요건 + 법원이 심사)\n- 동시이행판결의 반대의무 이행·이행제공은 집행개시 요건으로서 채권자의 증명방법에 제한 없음 → 동시이행판결 하는 법원으로서는 반대의무 내용 명확하게 특정해야 ∵ 특정되지 않아 반대의무 이행·이행제공 증명 못할 경우 채권자는 강제집행을 할 수 없어 다시 무익한 소 제기해야 [2020다290804]\n- 채권자의 반대의무 이행·제공이 없었다는 주장은 동시이행판결에 대한 청구이의사유 X ∵ 집행개시 요건 O, '집행에 관한 이의신청' 절차에서 주장·심리할 사항 O [2024다231391]\n\n**존재효**: 이행지체 불성립 → 그로 인한 손해배상 X, 해제 X\n- 지체책임 없다고 주장하는 자가 반드시 동시이행항변권 행사해야 발생하는 건 아님 [97다54604]\n\n正辯: 기록형에서 지연손해금청구의 요건사실에 '원고의 반대채무 이행제공 사실'이 있는 것이 바로 존재효 때문이며, 결국 원고는 지연손해금을 청구하기 위해 피고의 항변이 있기 전부터 '동이항을 깨뜨린 사실'을 주장·증명해야 함\n\n**상계금지**: 자동채권에 동시이행 항변권 붙어있는 경우 상계금지(존재효)\n- 다만 자동채권·수동채권이 서로 동시이행 관계면 상계 허용 O\n- 자동채권과 수동채권이 동시이행관계 있어도 서로 현실적으로 이행할 필요 없는 경우라면 특별한 사정 없는 한 상계 허용 O ∵ 상계로 인한 불이익 발생의 우려 없고 오히려 채권채무관계 간명하게 해소하는 상계제도의 목적 부합\n\n**동시이행항변권 포기**: 묵시적 O, 묵시적 포기 인정은 엄격·신중해야 [2025다209893]",["§536"],0,"계약총론"],
  ["채권각론_C009","위험부담 — 의의 (물건의 위험·대가의 위험)","**위험**: 쌍방의 책임 없는 사유로 급부가 후발적 불능이 된 경우의 불이익\n\n**'물건의 위험'**: 불능이 된 급부 자체를 받지 못하는 불이익 → 특정물이거나 종류물이 특정된 이후에는 상대방(채권자) 부담, 해당 채무 소멸\n\n**'대가의 위험'**: 쌍무계약에서 불능이 된 급부의 반대급부도 받지 못하는 불이익 → 채무자 부담, 불능된 급부와 함께 상대방 채무도 소멸하는 것(=존속상 견련성). 쌍무계약에서 '위험부담'은 통상 '대가의 위험' 부담 문제",["§537","§538"],0,"계약총론"],
  ["채권각론_C010","채무자위험부담주의(제537조) — 요건·효과·대상청구권","**요건**: 쌍무계약에서 일방의 채무가 특정 이후 쌍방의 귀책사유 없이 후발적 불능\n\n**효과**: 상대방 채무 소멸 = 채무자는 이행청구 X → 상대방이 이미 이행한 경우는 **제741조** 부당이득반환청구 O → 결국 계약 소멸(해소)\n\n**대상청구권**: 토지수용과 같은 위험부담 법리를 적용할 사안에서도 대상청구권을 인정함으로써 채권자의 대상청구권 행사에 의한 537조 배제 효과 인정 [통판]",["§537","§741"],0,"계약총론"],
  ["채권각론_C011","채권자 귀책사유로 인한 급부불능 (제538조)","**제538조 제1항 제1문**: 채권자의 귀책사유로 불능\n**제538조 제1항 제2문**: 채권자의 수령지체 중에 쌍방 귀책사유 없이 불능\n\n- 수령지체 중 채무자는 고의·중과실 없으면 면책되는 401조를 538조 1항 2문과 통일적 해석 [통] → 수령지체 중 채무자 경과실로 불능되어도 '쌍방 귀책 없는 경우'로 보아 538조 1항 2문 적용 O, 반대급부 청구 O\n\n**제2항**: 채무자가 채무 면함으로써 얻은 **이익**은 채권자에게 **상환**\n- '얻은 이익'은 급부 불능과 인과관계 있어야 하며, ① 운송비·포장비 등 절약된 비용처럼 소극적 이익, ② 불능이 됨으로써 취득한 보상금 등 대체물과 같은 적극적 이익이 있음",["§538","§401"],0,"계약총론"],
  ["채권각론_C012","제3자를 위한 계약 — 서설·성립요건·구조 (제539조~제542조)","**본질**: 제3자에게 계약상 채권을 취득하게 하는 것\n\n**예**: 제3자 명의 예금, 타인을 위한 보험, 변제를 위한 공탁\n- 채무자·인수인 사이의 병존적 채무인수 O, 면책적 채무인수 X, 이행인수 X\n- 구별기준: 제3자에게 직접 채권을 취득하게 할 의사가 있는지 여부\n\n**성립요건**\n- 제3자는 계약 체결 당시 현존 불요 → 태아 O, [判例] 성립 전 법인 O\n- 제3자에게 의무를 지우는 약정 X\n- 제3자 채무를 면제해주는 약정 O\n\n**구조 (3면 관계)**\n- 요약자-수익자: **원**인관계(대가관계)\n- 요약자-낙약자: **보**상관계(기본관계)\n- 낙약자-수익자: 수익관계\n\n**제3자(수익자)의 지위**\n- 수익의 의사표시(형성권)는 채권 취득 요건\n- 계약당사자 X (취소권·해제권 X), 의사표시·해제 규정 보호되는 제3자 X\n- 채무자의 제3자에 대한 최고권(제540조): 확답 없으면 거절 간주\n- 낙약자는 기본관계 기한 항변으로 (수익 의사표시 한) 수익자에게 대항 O(제542조), 이때 수익자는 제3자 보호 규정 주장 X (∵ 보호 규정의 '제3자' X)\n- 낙약자는 요약자에 대한 채권으로 수익자의 급부청구권과 상계 X [통]",["§539","§540","§541","§542"],0,"계약총론"],
  ["채권각론_C013","제3자를 위한 계약 — 효력 (제3자 권리 확정·해제·청산)","**제3자 권리 확정(제541조)**: 수익의 의사표시 이후에 당사자는 권리 변경·소멸 금지 (다만, 당사자 미리 유보했거나 수익자 동의 있으면 가능 [통판])\n- 요약자·낙약자의 기본계약 합의해제 X ∵ 합의해제='변경·소멸' [통]\n- 요약자 혹은 낙약자가 상대방의 채무불이행 이유로 기본계약 법정해제 O [통판] ∵ 법정해제≠'변경·소멸'\n\n正辯: 판례는 수익자의 수익의 의사표시 후에도 요약자나 낙약자의 법정해제를 당연히 인정하면서도 541조의 '변경·소멸' 여부 언급 없음\n\n**해제**\n- 낙약자의 귀책사유로 이행불능·이행지체 시 요약자는 제3자의 동의 없이 계약당사자로서 계약을 해제 O [69다1410]\n- 요약자는 낙약자에 대하여 수익자에게 이행할 것을 청구 O\n- 수익의 의사표시 후 낙약자의 채무불이행으로 인한 손해배상청구권은 수익자에게 귀속, 그러나 해제권은 요약자에게만 귀속 [통판]\n\n**청산 (기본관계 무효·해제 시)**\n- 낙약자가 이미 제3자에게 급부한 것에 관하여서는 요약자를 상대로 원상회복청구나 부당이득반환청구 O, 제3자를 상대로 X ∵ 계약관계의 청산은 계약당사자인 낙약자와 요약자 사이에 이루어져야, 계약상의 위험을 제3자에게 전가시키면 X [2005다7566, 2010다31860]\n\n**대가관계·기본관계 독립성**\n- '대가관계'의 효력은 제3자를 위한 계약 자체 및 '기본관계'의 성립이나 효력에 영향 미치지 X → 대가관계에 관한 항변을 가지고, '낙약자가 수익자에게' 혹은 '요약자가 낙약자에게' 대항 X [2003다49771]",["§539","§541","§542","§548"],0,"계약총론"],
  ["채권각론_C014","이행지체를 이유로 한 해제 (제544조) — 요건·최고 불요 예외","**요건**: ① 이행지체 성립, ② 상당기간 정한 최고, ③ 최고기간 내 이행 아니할 것\n\n**① 이행지체 성립**: 이·가·게·귀·위 검토, 주로 동시이행항변권 문제됨\n\n**② 상당기간을 정한 최고**\n- 과소최고: 최고에 표시된 범위에서만 효력\n- 과대최고: 본래 급부와 차이 적거나 착오에 기한 것이면 본래 급부 범위 내에서 유효. 그러나 과다한 정도가 현저하고 청구한 금액을 제공하지 않으면 수령하지 않을 의사가 분명하면 최고 부적법하고 이에 터잡은 해제 무효 [93다47615]\n- 기간이 상당한 기간보다 짧거나 기간을 정하지 않은 경우에는 상당한 기간이 지나면 해제권 발생 [89다카14110]\n- 소장 부본 송달로 최고 효력 인정 가능 [2002다24942]\n- 해제하겠다는 통지도 특별히 급부수령 거부 취지 포함되지 않은 한 최고로서의 효력 O [2020다290804]\n- 동시이행관계인 반대의무 지는 채권자는 채무자의 변제제공 없음을 이유로 해제하기 위해 자기 채무 변제제공 하여야 [2022다238053]\n\n**③ 최고기간 내 이행하지 아니할 것**\n- 최고기간 동안 이행의 제공이 계속되어야 하는지 → **불요설** [통판]\n- 단, 상대방이 최고기간 내 이행·이행제공을 하면 해제권 소멸하므로 상대방 이행을 수령하고 자신의 채무를 이행할 정도의 준비는 필요 [96다35590]\n\n**최고 불요 예외**\nⓐ 이행기 도래 후 최고 전의 이행거절(제544조 단서). 그러나 '이행기 전 이행거절'은 독자적 채무불이행 유형으로 최고 없이 해제 O\nⓑ 정기행위(제545조): 성질상 일정한 시일 또는 기간 내 이행하지 않으면 목적 달성할 수 없는 경우, 그 시기에 이행 않으면 최고 없이 해제 O\nⓒ 자동해제약정(실권조항)\n- 중도금을 기일에 지급 못하면 자동해제된다는 약정은 그대로 O [88다카132]\n- 잔금을 기일에 지급하지 못하면 자동해제된다는 약정이 있더라도, 매도인이 잔금지급기일에 소유권이전등기 필요 서류 이행제공을 하여 매수인을 '이행지체에 빠지게 하였을 때 비로소 자동해제' O [88다카28891]\n- 자동해제 약정을 계약금 포기·배액상환 약정과 결합한 경우에는 자동해제 효과 부정 → 최고·통지 없는 자동해제 X [79다1595]\n- 자동해제 약정하고 채무불이행 하면 별도 최고나 해제 의사표시 없이 불이행 자체로써 자동해제 O → 그러나 당사자들이 계약 여전히 유효 전제로 논의 계속하고 이행을 촉구하며 상대방이 이의 없이 급부 일부 수령하는 등 특별한 사정 없는 한 계약당사자들 사이 자동해제약정 효력 상실시키고 자동해제된 계약 부활시키는 합의 O → 채무이행 못 받은 상대방은 새로운 최고 없이 바로 해제 X [2019다216817]",["§544","§545","§543"],0,"계약총론"],
  ["채권각론_C015","기타 이유 해제 — 이행불능·사정변경·부수적 채무 불이행","**이행불능(제546조)**: 이행기 기다리거나 반대급부 이행제공·최고 없이 즉시 해제 O\n= **이행거절**: 제544조 단서 혹은 '신의칙'에 근거한 [判例]\n\n**사정변경 의한 해제·해지**\n- 해제: 일정 요건 하에 인정되되, 실제 인정 사례 없음\n- 해지: 계속적 보증, 임대차계약에서 사정변경 해지 인정\n- 요건: ① 계약 성립 당시 당사자 예견할 수 없던 계약 기초인 객관적 사정(주관적 사정 X)의 현저한 사정 변경, ② 해제권 취득 당사자 귀책사유 없을 것, ③ 구속력 인정이 신의칙 현저히 반하는 결과 [2004다31302]\n- 계속적 계약에서 사정변경 이유로 계약 효력 소멸시키려면 특별한 사정 없는 한 소멸 효과를 장래에 향하여 발생시키는 550조 '해지'만 가능 O, 548조 '해제'는 X [2020다297430]\n\n**부수적 채무의 불이행은 해제 X**\n- 분묘이장, 시사회, 전대차 근저당권 사건\n- 주된 채무와 부수적 채무 구별: 급부의 독립된 가치와 관계없이, 계약 체결할 때 표명되었거나 당시 상황으로 분명하게 객관적으로 나타난 당사자 합리적 의사로 결정, 계약의 내용·목적·불이행결과 등 여러 사정 고려 [2022다203804]",["§544","§546","§550"],0,"계약총론"],
  ["채권각론_C016","해제권의 행사 — 불가분성·조건부 의사표시 (제543조·제547조)","**행사 방법**: 상대방에 대한 의사표시로, 철회 X (제543조) / 형성권, 조건·기한 X\n- 단, '특정 기일 내에 이행하지 않을 경우 계약은 당연히 해제된 것으로 한다'는 이행청구는 이행청구와 동시에 기일 내 이행 없는 것을 정지조건으로 하여 미리 해제의 의사표시를 한 것 O [80다2381]\n\n**해제권 불가분성(제547조)**: 당사자 일방·쌍방이 수인인 경우 계약의 해지·해제는 그 전원으로부터 또는 전원에 대하여 하여야",["§543","§547"],0,"계약총론"]
]

  ["채권각론_P001","99다55601, 2005다5812","분양광고와 청약의 유인 — 선분양·후시공 방식에서 광고 내용의 계약 편입 범위","선분양·후시공 방식 아파트 분양에서 분양광고에 온천, 원목마루 바닥재, 유실수단지, 테마공원, 콘도회원권 등 내용 및 첨단 오락타운 조성, 전문경영인의 위탁경영 통한 일정액 이상 수익 보장, 서울대학교 이전, 도로확장, 전철복선화 등의 내용 포함. 분양계약서에는 외형·재질 등의 구체적 기재 없이 체결됨","상가·아파트 분양광고 내용은 통상 청약의 유인에 불과. '청약'은 이에 대응하는 승낙과 결합하여 일정 내용의 계약을 성립시킬 것을 목적으로 하는 확정적 의사표시지만, '청약의 유인'은 합의 구성하는 의사표시 X → 피유인자가 그에 대응하여 의사표시 하더라도 계약 성립 X, 다시 유인한 자가 승낙 의사표시 해야 계약 성립 O.\n\n단, 선분양·후시공 방식에서 분양계약서에 외형·재질 등 구체적 기재 없으므로 이것이 특정되지 않고 체결된 분양계약은 미완결 상태 → 광고 내용이나 설명 중 구체적 거래조건에 관한 것은 분양계약 내용 O (수분양자가 이행청구 가능).\n\n온천, 원목마루 바닥재, 유실수단지, 테마공원, 콘도회원권 등 광고는 분양계약 내용 O (∵ 아파트 외형·재질, 부대시설이므로).\n\n첨단 오락타운 조성, 전문경영인의 위탁경영 통한 일정액 이상 수익 보장, 서울대학교 이전, 도로확장, 전철복선화 등의 광고는 분양계약 내용 X, 청약의 유인에 불과 (∵ 사회통념상 분양자 이행 기대 X).",["§527"],0,"계약총론","대판 99다55601, 2005다5812","미분류"],
  ["채권각론_P002","2012다29601","선시공·후분양 방식에서 분양광고 내용의 분양계약 편입 여부","선시공·후분양 방식으로 아파트를 분양하면서 준공 전 분양광고를 하고, 실제 시공이 광고 내용과 다르게 이루어진 사안","선시공·후분양 방식에서는 수분양자가 실제 완공된 아파트의 외형·재질 등을 직접 확인하고 분양계약 체결 → 완공된 아파트 자체가 분양계약의 목적물 → 비록 준공 전 분양광고 했고 그 광고내용과 달리 시공되었더라도 분양광고에 표현된 아파트의 외형·재질 등 사항은 분양계약의 내용 X.",["§527"],0,"계약총론","대판 2012다29601","미분류"],
  ["채권각론_P003","2017다275447","광고 내용이 계약 내용이 되는 경우 — 청약의 유인이 청약으로 전환","광고 내용 전제로 청약이 이루어지고 광고주가 승낙하여 계약이 체결된 사안","광고는 통상 '청약의 유인'이지만, 내용이 명확·확정적이고 광고주가 그 내용대로 계약에 구속될 의사가 명백하면 '청약'이 됨 → 청약의 유인에 불과하더라도 이후 광고 내용을 전제로 청약하고, 광고주가 승낙하여 계약이 체결되면 광고 내용이 계약 내용 O.",["§527"],0,"계약총론","대판 2017다275447","미분류"],
  ["채권각론_P004","98다48903","청약자가 기간 내 이의 없으면 승낙 간주한다는 표시의 효력 — 청약의 구속력","청약자가 정한 기간 내에 이의하지 않으면 승낙한 것으로 간주한다는 표시를 한 사안","이는 상대방을 구속하지 못함. 단지 승낙기간의 의미만 있을 뿐. ∴ 상법 53조(상거래관계 영업부류)의 적용 사안이 아닌 이상 청약 상대방에게 청약 회답의무 X.",["§527"],0,"계약총론","대판 98다48903","미분류"],
  ["채권각론_P005","72다384","원시적 불능 — 국가가 타인 소유 농지를 매도한 매매계약과 제535조 신뢰이익 배상","국가가 타인 소유 농지를 목적물로 하는 매매계약을 체결한 사안. 매수인이 원시적 불능을 알았거나 알 수 있었음","국가가 타인 소유 농지를 매도하는 매매계약은 원시적 불능으로 무효. 이때 매수인이 알았거나 알 수 있었다면 제535조에 기한 신뢰이익 배상청구 X.",["§535"],0,"계약총론","대판 72다384","미분류"],
  ["채권각론_P006","2015다10929","의사 불합치로 계약 불성립한 경우 제535조 유추적용 가부","의사 불합치로 계약이 불성립한 경우, 손해를 입은 당사자가 상대방의 계약 불성립에 대한 악의·과실을 이유로 제535조 유추적용을 주장한 사안","의사 불합치로 계약 불성립한 경우, 손해 입은 당사자가 부당이득반환이나 불법행위 손해배상을 구함은 별론, 상대방의 계약 불성립에 대한 악의·과실을 이유로 제535조를 유추적용할 수 없고, 계약체결상 과실책임에 기한 손해배상 X.",["§535"],0,"계약총론","대판 2015다10929","미분류"],
  ["채권각론_P007","2001다53059","계약교섭의 부당파기와 신뢰손해의 범위","계약교섭 단계에서 일방이 정당한 이유 없이 계약 체결을 거부하여 상대방에게 손해가 발생한 사안. 이유 中: 추정 총 제작비 20% 상당 창작비 3억 원 손해배상 청구가 문제됨","일방이 계약 교섭단계에서 확실히 체결되리라는 정당한 기대·신뢰를 부여하여 상대방이 그 신뢰에 따라 행동하였음에도 상당한 이유 없이 계약 체결을 거부하여 손해를 입히면 신의칙에 비추어 계약자유원칙의 한계를 넘는 불법행위 O.\n\n이 경우 '손해'는 계약이 유효하게 체결된다고 믿었던 것에 의하여 입은 손해(=신뢰손해)에 한정됨. 신뢰손해란 계약의 성립을 기대하고 지출한 계약준비비용처럼 그러한 신뢰가 없었더라면 통상 지출하지 않았을 비용상당 손해. 아직 계약체결에 확고한 신뢰가 부여되기 이전에 계약교섭 당사자가 계약체결이 좌절되더라도 어쩔 수 없다고 생각하고 지출한 비용(경쟁입찰에 참가하기 위해 지출한 제안서·견적서 작성비용) 등은 포함 X.\n\n침해행위·피해법익의 유형에 따라 계약교섭 파기의 불법행위가 인격적 법익을 침해함으로써 정신적 고통을 초래한 것이 인정되면 별도로 위자료 배상 O.\n\n추정 총 제작비 20% 상당 창작비 3억 원 손해배상 X ∵ 계약이 정당하게 체결되어 그 이행 결과 얻게 될 이익을 상실한 손해는 계약교섭 중도파기로 인해 결과적으로 계약 체결되지 않은 사안에서 청구할 법적 지위 X.",[],0,"계약총론","대판 2001다53059","미분류"],
  ["채권각론_P008","95다54693","계약 무효·취소 시 상호간 부당이득반환의무의 동시이행관계","계약이 무효 또는 취소된 경우","계약이 무효 또는 취소된 경우에 상호간 부당이득반환의무는 동시이행관계 O.",["§536"],0,"계약총론","대판 95다54693","미분류"],
  ["채권각론_P009","77다1241","임대차계약 종료 시 목적물 인도의무와 보증금 반환의무의 동시이행","임대차계약 종료 후 목적물 인도의무와 보증금 반환의무의 동시이행 여부","임대차계약 종료 시 임차인의 목적물 인도의무와 임대인의 보증금 반환의무는 동시이행관계. 이때 반환되는 보증금의 범위는 '보증금 중 연체차임 등 임대차 관련하여 인도시까지 생긴 임차인의 모든 채무를 공제한 나머지'임.",["§536","§317"],0,"계약총론","대판 77다1241","미분류"],
  ["채권각론_P010","2004다37676","도급에서 하자확대손해 손해배상채무와 공사대금채무의 동시이행","도급계약에서 하자로 인한 확대손해 배상채무와 공사대금채무의 동시이행 여부","도급에서 하자확대손해로 인한 손해배상채무와 공사대금채무는 동시이행관계 O.",["§536","§667"],0,"계약총론","대판 2004다37676","미분류"],
  ["채권각론_P011","2003다22042","전부변제와 채권증서 반환·영수증교부의무의 동시이행 여부","채무자가 채무 전부를 변제한 경우 채권증서 반환청구와의 동시이행관계, 및 영수증교부의무와 변제의 동시이행관계 여부","전부 변제하면 채권증서 반환 청구 가능(제475조). 다만 전부 변제해야 인정됨. 채권증서 반환과 변제는 동시이행관계 X. ≠ 영수증교부의무는 변제와 동시이행관계 O.",["§474","§475","§536"],0,"계약총론","대판 2003다22042","미분류"],
  ["채권각론_P012","2019다215791","동시이행항변권의 대가적 채무 범위 확장 및 불안의 항변권 적용","쌍방 부담 채무가 고유 대가관계 있는 쌍무계약상 채무가 아닌 경우 동시이행항변권 인정 여부, 및 해당 법리가 불안의 항변권(536조 2항)에도 적용되는지","동시이행항변권은 쌍방 부담 각 채무가 고유 대가관계 있는 쌍무계약상 채무 아니더라도 구체적 계약관계의 채무 사이 대가적 의미 있어 이행상 견련관계 인정되면 O. 이러한 법리는 제536조 1항뿐만 아니라 2항의 '불안의 항변권'도 마찬가지로 적용 O.",["§536"],0,"계약총론","대판 2019다215791","미분류"],
  ["채권각론_P013","2006다24049","임의경매 무효 시 소유권이전등기말소청구와 배당금반환청구의 동시이행 여부","임의경매가 무효인 경우 채권자(=근저당권자)가 채무자를 대위하여 경락인에게 하는 소유권이전등기 말소청구와, 경락인이 배당금을 수령한 채권자에게 하는 배당금반환청구가 동시이행관계인지","임의경매 무효인 경우 채권자(=근저당권자)가 채무자를 대위하여 경락인에게 하는 소유권이전등기 말소청구와 경락인이 배당금을 수령한 채권자(=근저당권자)에게 하는 배당금반환청구는 동시이행 X ∵ 서로 이행의 상대방 다름.",["§536"],0,"계약총론","대판 2006다24049","미분류"],
  ["채권각론_P014","2000다8533","매도인 소유권이전등기의무·인도의무와 매수인 잔금지급의무의 동시이행 — 가압류등기말소의무 포함","매매목적물에 가압류등기가 있는 경우 매도인의 가압류등기말소의무와 매수인의 대금지급의무의 동시이행 여부","매도인의 소유권이전등기 및 인도의무와 매수인의 잔금지급의무는 동시이행관계 원칙. 매도인은 제한·부담 없는 완전한 소유권이전등기의무를 부담하는 것이 원칙 → 매매목적물에 가압류등기 있다면 매도인의 가압류등기말소의무도 매수인의 대금지급의무와 동시이행 O.\n\n正辯: 498조 관련, 매도인의 가압류등기말소의무가 구상채무로 변형되어도 여전히 매수인의 매매대금채무와 동시이행관계로서 매수인의 예외적 상계 허용되는 [2000다43819] 판례의 기초법리.",["§536"],0,"계약총론","대판 2000다8533","미분류"],
  ["채권각론_P015","97다30066","이행불능으로 발생한 손해배상채무의 동시이행관계 유지","동시이행관계 쌍방 채무 중 1개가 이행불능이 되어 손해배상채무로 변경된 경우 여전히 동시이행관계인지","동시이행관계 쌍방 채무 중 1개 이행불능 되어 발생한 손해배상채무도 여전히 다른 채무와 동시이행관계 O.",["§536"],0,"계약총론","대판 97다30066","미분류"],
  ["채권각론_P016","91다6368","선이행의무자(중도금) 미이행 후 잔금기일 도과 시 동시이행관계 성립 여부 및 특별한 사정이 있는 경우 예외","[사안①] 매수인이 선이행의무인 중도금을 이행하지 않은 상태에서 계약 해제 없이 잔금기일이 도과된 경우. [사안②] 매도인이 매수인으로부터 중도금을 지급받아 원매도인에게 잔대금 지급하지 않고서는 소유권이전등기서류 제공이 어려운 특별한 사정을 매수인도 알고 계약 체결한 경우","[사안①] 매수인이 선이행의무인 중도금을 이행하지 않았더라도 계약 해제되지 않은 상태에서 잔금과 동시이행관계인 매도인의 등기서류 제공 없이 잔금기일 도과되면, '매수인의 중도금 및 잔금 지급과 매도인의 소유권이전등기 서류 제공은 동시이행관계 O' → 그때부터는 매수인은 중도금에 이행지체 책임 X.\n\n[사안②] 매도인이 매수인으로부터 중도금을 지급받아 원매도인에게 잔대금 지급하지 않고서는 소유권이전등기서류 제공이 어려운 특별한 사정을 매수인도 알고 매매계약 체결했던 경우, 매수인의 중도금 지급의무는 잔금지급기일 도과하더라도 소유권이전등기서류 제공과 동시이행 X.\n\n正辯: 위 사안은 매도인이 등기서류 제공 없더라도 매수인의 중도금 지체는 계속된다는 예외적 판례이며, 매도인이 중도금 수차례 최고하다가 늦춰준 기일까지도 매수인이 지급하지 않은 사안임.",["§536"],0,"계약총론","대판 91다6368","미분류"],
  ["채권각론_P017","90다19930","중도금 미지급 후 잔대금기일 경과 시 중도금·지연손해금과 소유권이전등기의무의 동시이행","매수인이 선이행 할 중도금 지급 않은 채 잔대금기일이 경과한 경우","매수인이 선이행 할 중도금 지급 않은 채 잔대금기일 경과하면, 매수인의 중도금 및 이에 대한 지급일 다음날부터 잔대금기일까지의 지연손해금과 잔대금의 지급채무는 매도인의 소유권이전등기의무와 동시이행관계 O.",["§536"],0,"계약총론","대판 90다19930","미분류"],
  ["채권각론_P018","2017다3222","선이행의무도 이행기 경과 후에는 동시이행관계 성립","매매계약에서 소유권이전의무와 대금지급의무의 관계 — 어느 하나가 선이행의무인 경우","매매계약에서 대가적 의미인 소유권이전의무와 대금지급의무는 다른 약정 없는 한 동시이행관계. 설령 어느 의무가 선이행의무라 해도 이행기 지나면, 이행기 후에도 선이행하기로 약정하는 등 특별한 사정 없는 한, 그 의무 포함하여 매도인·매수인 쌍방 의무는 동시이행관계 O.",["§536"],0,"계약총론","대판 2017다3222","미분류"],
  ["채권각론_P019","2019다215791, 2023다269139","불안의 항변권(제536조 제2항) — 상대방 이행 곤란할 현저한 사유의 의미","아파트 매매계약 당시 임차인이 갱신요구 없이 인도할 것이라 했는데, 잔금 지급일 직전 임차인이 갱신요구권을 행사한 사안 외 재산상태 악화 등 사정변경 사안","제536조 2항 '상대방 이행이 곤란할 현저한 사유'는 상대방의 신용불안이나 재산상태 악화 등 사정변경 생기고 당초 계약 내용 따른 선이행의무 이행케 하는 것이 공평·신의칙 반하게 되는 경우 → 상대방 채무가 아직 이행기에 이르지 않아도 O.\n\n正辯(2023다269139): 아파트 매매계약 당시 임차인이 갱신요구 없이 인도할 것이라 했는데 잔금 지급일 직전 갱신요구권 행사했다면 현실인도의무보다 잔금지급의무가 선이행의무였어도 매수인은 지급 거절 O ∵ 현실인도의무 이행 곤란할 현저한 사정 O, 공평·신의칙.",["§536"],0,"계약총론","대판 2019다215791, 2023다269139","미분류"],
  ["채권각론_P020","2020다290804","동시이행판결 시 반대의무 내용 특정 필요 — 집행개시 요건으로서의 반대의무 이행","동시이행판결의 반대의무 이행·이행제공 방법 및 법원의 특정 의무","동시이행판결의 반대의무 이행·이행제공은 집행개시 요건으로서 채권자의 증명방법에 제한 없음 → 동시이행판결 하는 법원으로서는 반대의무 내용 명확하게 특정해야 ∵ 특정되지 않아 반대의무 이행·이행제공 증명 못할 경우 채권자는 강제집행을 할 수 없어 다시 무익한 소 제기해야.",["§536"],0,"계약총론","대판 2020다290804","미분류"],
  ["채권각론_P021","2024다231391","채권자의 반대의무 이행제공 없음 주장은 동시이행판결에 대한 청구이의사유 아님","동시이행판결에서 채권자의 반대의무 이행·제공이 없었다는 주장을 청구이의의 소로 다툴 수 있는지","채권자의 반대의무 이행·제공이 없었다는 주장은 동시이행판결에 대한 청구이의사유 X ∵ 동시이행판결의 반대의무 이행·제공은 집행개시 요건 O, '집행에 관한 이의신청' 절차에서 주장·심리할 사항 O, 청구이의는 집행권원에 표시된 '청구권'에 관하여 생긴 이의를 주장해야.",["§536"],0,"계약총론","대판 2024다231391","미분류"],
  ["채권각론_P022","2001다9304","도급 하자보수청구권 행사 시 동시이행 항변 가능한 기성공사대금 범위","미지급 공사대금에 비해 하자보수비 등이 매우 적은 편이고 하자보수공사가 완성되어도 공사대금 지급 여부가 불확실한 사안","도급인이 하자보수청구권을 행사하여 동시이행 항변을 할 수 있는 기성공사대금 범위는, 미지급 공사대금에 비해 하자보수비 등이 매우 적은 편이고 하자보수공사가 완성되어도 공사대금 지급 여부가 불확실하다면, 하자 및 손해에 상응하는 금액으로 한정하는 것이 공평과 신의칙 부합.\n\n正辯: 하자 '보수'를 청구하였음에도 특수한 사정이 있으므로 상응하는 부분만 동시이행항변을 긍정한 사안(私見).",["§536","§667"],0,"계약총론","대판 2001다9304","미분류"],
  ["채권각론_P023","66다1174","동시이행항변권 상실을 위한 이행제공 — 계속적 이행제공설","쌍무계약 당사자 일방이 먼저 한 번 현실 제공을 하고 상대방을 수령지체에 빠지게 했으나 이행제공이 계속되지 않은 경우, 상대방의 동시이행항변권 소멸 여부","쌍무계약 당사자 일방이 먼저 한 번 현실 제공을 하고 상대방을 수령지체에 빠지게 했더라도 그 이행제공이 계속되지 않는 경우에는 과거 한 번 이행제공 사실만으로 상대방의 동시이행 항변권 소멸 X → **계속적 이행제공설** [통판].",["§536"],0,"계약총론","대판 66다1174","미분류"],
  ["채권각론_P024","97다54604","동시이행 존재효 — 이행지체 불성립 요건으로 반드시 항변권 행사 요하지 않음","쌍무계약 쌍방 채무가 동시이행관계에 있는 경우 이행지체 성립 여부 및 지체책임을 부정하기 위해 동시이행항변권을 반드시 행사해야 하는지","쌍무계약 쌍방 채무가 동시이행관계 있다면 일방 채무 이행기 도래하여도 상대방 채무 이행제공 있기까지는 이행 않아도 이행지체 X → 지체책임 없다고 주장하는 자가 반드시 동시이행항변권 행사해야 발생하는 건 아님.\n\n正辯: 기록형에서 지연손해금청구의 요건사실에 '원고의 반대채무 이행제공 사실'이 있는 것이 바로 존재효 때문이며, 결국 원고는 지연손해금을 청구하기 위해 피고의 항변이 있기 전부터 '동이항을 깨뜨린 사실'을 주장·증명해야 함.",["§536"],0,"계약총론","대판 97다54604","미분류"],
  ["채권각론_P025","90다카24076","동시이행항변권 행사 중 임차인 점유는 불법점유 아님","임대차 종료 후 임차인이 동시이행항변권 행사하여 임차건물을 계속 점유해 온 경우","임대차 종료 후 임차인이 동시이행항변권 행사하여 임차건물 계속 점유해 온 것이면, 임대인이 보증금반환의무 이행·이행제공 하여 임차인의 건물인도의무가 지체에 빠져 동시이행항변권 상실했다는 주장·입증 없는 이상, 임차인 점유는 불법점유 X (불법행위 X).",["§536"],0,"계약총론","대판 90다카24076","미분류"],
  ["채권각론_P026","95다54693, 2022다228667","동시이행항변권 상실 후 목적물 반환 계속 거부 점유 — 불법행위 성립","임대인이 보증금반환의무 이행·이행제공하여 임차인이 동시이행항변권을 상실했는데도 목적물 반환을 계속 거부하며 점유하는 경우","임대인이 보증금반환의무 이행·이행제공하여 임차인이 동시이행항변권 상실했는데도 목적물 반환 계속 거부하며 점유하면 특별한 사정이 없는 한 임차인은 적어도 과실에 의한 불법행위 → 임대차에 관한 임차인 채무 공제 등으로 동시이행항변권 상실해도 마찬가지, 임차인이 동이항 상실 알 수 있는 때부터의 점유는 과실에 의한 불법행위 O.\n\n正辯(2022다228667): 임대차 종료 직후 보증금반환에 기한 동이항으로 임차인의 점유가 불법행위가 되지 않았더라도, 그 후 계속 발생하는 차임 상당 부당이득금을 공제하다가 보증금 금액이 소진하게 된 순간부터는 사용·수익 멈춰도 불법행위가 될 수 있다는 취지로 보임(私見).",["§536"],0,"계약총론","대판 95다54693, 2022다228667","미분류"],
  ["채권각론_P027","98다15545","동시이행항변권 행사 중 사용·수익으로 얻은 이익은 부당이득반환 의무","임차인이 동시이행항변권에 기하여 임차목적물을 점유 사용·수익한 경우","임차인이 동시이행항변권에 기하여 임차목적물을 점유 사용·수익한 경우 불법점유로 인한 손해배상청구 X → 그러나 사용·수익으로 인하여 실질적으로 얻은 이익 있으면 부당이득반환 O.",["§536"],0,"계약총론","대판 98다15545","미분류"],
  ["채권각론_P028","2025다209893","동시이행항변권의 묵시적 포기 — 잔금 연체료 약정과 이행제공 정도","매수인 매매대금 연체료 약정 및 잔금 지급준비 미비 상태에서 매도인의 이행준비 정도가 문제된 사안","동시이행항변권 포기는 묵시적 O, 묵시적 포기 인정은 엄격·신중해야. 매수인 매매대금 연체료 약정은 손해배상 예정, 지체책임 발생해야 지급의무 발생. 쌍무계약에서 이행제공 정도는 시기와 구체적 상황에 따라 신의성실 원칙 어긋나지 않게 합리적으로 정해야 → 매수인 잔대금 지급준비 되지 않아 소유권이전등기서류 수령할 준비 안 했다면 매도인도 그에 상응한 이행 준비로 족함.\n\n正辯: 잔금지급 지체 시 연체료 발생한다는 약정만으로 매수인이 동시이행항변권 묵시적 포기했다고 볼 수 X → 다만 매수인이 분양계약 해제 통지 및 원상회복 요구, 소 제기하고 그 기간에 잔금 상당액이나 피담보채무 인수하여 잔금과 차액 마련하거나 지급 준비했다는 등 잔금 지급 노력했다고 볼 자료 없고 오히려 잔금지급 자체 거부하면서 매도인의 소이등서류 등을 수령하지 않겠다는 의사를 표시했다면, 매도인도 이에 상응하는 이행 준비로 족하고, 매도인의 이행제공 여부·정도를 살펴 인정된다면 매수인의 연체료 지급의무 인정해야.",["§536"],0,"계약총론","대판 2025다209893","미분류"],
  ["채권각론_P029","2008다98655","쌍방 귀책 없이 매매목적물이 경매매각되어 매매계약 종료된 경우 — 위험부담 법리와 부당이득반환","쌍방 귀책사유 없이 매매목적물이 경매절차에서 매각되어 매매계약이 종료된 사안","쌍방 귀책사유 없이 매매목적물이 경매절차에서 매각되어 매매계약이 종료된 경우 → 매도인은 받은 계약금을, 매수인은 목적물 차임 상당 부당이득을 반환할 의무 O ∵ 위험부담 법리, 537조, 741조.\n\n正辯: 매매목적물을 매수인이 인도받아 점유·사용한 사안에서는 매수인(채권자)도 부당이득반환을 하여야 한다는 점을 숙지해야 함. 한편 매매와 같은 일시적 계약은 통상 '종료'라는 표현을 사용하지 않으나 계속적 채무인 차임 상당 부당이득반환의무가 문제되어 사용한 것으로 보임(私見).",["§537","§741"],0,"계약총론","대판 2008다98655","미분류"],
  ["채권각론_P030","2024다293580","기간 정한 임대차계약에서 일정기간 급부불능의 종국성과 제537조 적용 — 코로나 면세점 사안","코로나 확산으로 국토교통부의 국제선 운항 중단 및 국제공항 국제선 청사 폐쇄에 따라 면세점 운영이 중단된 사안에서 한국공항공사가 해당 기간의 차임을 청구한 경우","제623조 '사용·수익 적합 상태'는 목적물 통상 사용방법, 물리적 사용·수익 가능성뿐 아닌 임대차 목적·유형, 관행, 계약내용, 당사자 의사 종합적 고려해야. 쌍방 귀책사유 없이 채무 이행 불능되면 채무자는 537조로 자기 채무이행의무 면함과 더불어 상대방 이행도 청구 X, 이미 이행한 급부는 부당이득 반환청구 O. '채무 이행 불능'은 절대적·물리적 불능뿐 아니라 사회생활상 경험칙, 거래관념 비춰 채무자 이행 실현 기대 불가한 경우 포함 → 기간 정한 임대차계약 등 계속적 계약에서 어떤 사유로 일정기간 채무 이행 불능인 경우, 계약 목적·유형, 급부 내용·특성·이행방법 등에 따라 채무자 이행 기대할 수 없다면, 해당 기간 급부불능은 일시적 아닌 종국적이므로 537조 적용 O (계약의 존속 여부는 영향 없음).\n\n正辯: 코로나 확산으로 국토교통부의 국제선 운항 중단 및 국제공항 국제선 청사 폐쇄에 따라 면세점 운영 중단 → 해당 기간 한국공항공사가 임대차 목적물을 면세점 용도 사용·수익 가능 상태 유지시킬 의무는 당사자 쌍방 책임 없는 사유로 이행이 불능해짐(임차인의 물리적 점유·사용은 가능했더라도) → 공사는 위 기간의 차임 청구 X, 지급한 차임은 부당이득반환 O (급부불능이 일정 기간 한정된 것이라도 해당 기간은 종국적 불능 O, 임대차계약 종료되지 않았더라도 마찬가지, 537조 적용에 있어 임대차계약 종료·소멸은 필수 전제가 아님).",["§537","§623"],0,"계약총론","대판 2024다293580","미분류"],
  ["채권각론_P031","2001다79013","채권자의 영구적 불수령과 제538조 1항 적용을 위한 이행제공의 필요","A, B가 A의 토지에 매매계약 체결하고 B가 계약금과 1차 중도금 지급한 상태에서 A가 2차 중도금을 청구하자 B는 근거 없이 매매계약 실효 주장하며 대금반환 요청. 몇 년 뒤 토지가 수용된 경우. A가 B의 수령지체 중 귀책사유 없는 불능을 이유로 2차 중도금 및 잔금 청구","채권자지체(400조) 성립 위하여 변제제공(460조) 있어야 하는데 채권자의 수령거절 의사가 확고한 이른바 '영구적 불수령'의 경우 구두 제공조차 필요 없으나 이는 그로써 채무불이행을 면한다는 것에 불과하고(461조), 538조 1항 2문 '수령지체' 중 쌍방 책임 없는 불능을 이유로 채무자가 반대급부를 청구하기 위해서는 현실제공이나 구두제공이 있었어야.\n\nⓐ 구두제공조차 없었다면 538조 1항 X → 537조 적용 → A는 B로부터 받은 계약금·1차 중도금을 B에게 부당이득반환 하여야(741조)\nⓑ 구두제공이라도 했었다면 538조 1항 O → A는 B에 대해 2차 중도금 및 잔금 지급청구 O, 다만 이 경우 538조 2항에 의하여 보상금은 공제되어야.",["§538","§400","§460","§461","§537"],0,"계약총론","대판 2001다79013","미분류"],
  ["채권각론_P032","2008다25824","매수인 귀책으로 낙찰대금 미납 후 제3자 낙찰 — 제538조 1항·2항 적용","甲이 낙찰받을 토지를 乙에게 매도하되 乙이 낙찰대금 대신 납부하기로 했는데 납부하지 않아 丙이 낙찰 받은 경우","타인 권리 매매 담보책임이 문제되나 그렇게 된 것이 오로지 매수인의 귀책사유이므로 甲은 담보책임 부담 X. 이때 乙은 甲에게 매매대금을 지급해야 하고(538조 1항), 다만 대신 납부하려던 낙찰대금은 공제(538조 2항).",["§538"],0,"계약총론","대판 2008다25824","미분류"],
  ["채권각론_P033","2007다8464","부동산 매수인의 근저당 피담보채무 이행인수 후 근저당 실행으로 매도인 소유권 상실 — 제538조 적용","부동산 매수인이 목적물에 설정된 근저당권의 피담보채무를 이행인수한 경우, 매수인이 변제 게을리하여 근저당권 실행됨으로써 매도인이 소유권 상실","매수인이 변제 게을리하여 근저당권 실행됨으로써 매도인이 소유권 상실했다면 오로지 매수인의 귀책사유 O → 538조 적용, 매도인은 매수인에 대해 매매대금청구 O. 다만, 경매로 자신의 채무 소멸하거나 남는 금액 교부받은 것은 538조 2항 소정의 이익이므로 매수인에게 상환해야.\n\n正辯: 576조 담보책임은 포기한 것 ∵ 이행인수.",["§538","§576"],0,"계약총론","대판 2007다8464","미분류"],
  ["채권각론_P034","2002다37405","보증인이 주채무자의 사전구상의무를 면제하는 약정 — 제3자를 위한 계약에 준함","채권자와 보증인이 보증계약을 체결하면서 보증인(낙약자)이 주채무자(제3자)에 대한 사전구상권을 포기함으로써 주채무자의 사전구상의무를 면제해주는 사안","보증인(낙약자)이 주채무자(제3자)에 대한 사전구상권을 포기함으로써 주채무자의 사전구상의무를 면제해주는 것도 제3자를 위한 계약에 준함.",["§539"],0,"계약총론","대판 2002다37405","미분류"],
  ["채권각론_P035","2003다49771","제3자를 위한 계약에서 대가관계와 기본관계의 독립성","제3자를 위한 계약에서 요약자와 수익자 사이 대가관계의 하자가 기본관계에 영향을 미치는지 여부","제3자를 위한 계약의 체결 원인인 요약자와 수익자 사이의 법률관계(이른바 '대가관계')의 효력은 제3자를 위한 계약 자체는 물론 그에 기한 요약자와 낙약자 사이의 법률관계(이른바 '기본관계')의 성립이나 효력에 영향 미치지 X → 대가관계에 관한 항변을 가지고, '낙약자가 수익자에게' 혹은 '요약자가 낙약자에게' 대항 X.",["§539"],0,"계약총론","대판 2003다49771","미분류"],
  ["채권각론_P036","69다1410","낙약자 귀책사유로 이행불능·이행지체 시 요약자의 단독 해제권","제3자를 위한 계약에서 낙약자의 귀책사유로 이행불능·이행지체가 있는 경우","제3자를 위한 계약에서 낙약자의 귀책사유로 인한 이행불능·이행지체가 있을 때 요약자는 제3자의 동의 없이 계약당사자로서 계약을 해제 O.",["§539","§541","§543"],0,"계약총론","대판 69다1410","미분류"],
  ["채권각론_P037","2005다7566, 2010다31860","기본관계 계약 무효·해제 시 낙약자의 원상회복·부당이득반환 청산 상대방 — 요약자 O, 제3자 X","제3자를 위한 계약에서 기본관계(낙약자-요약자)를 이루는 계약이 무효이거나 해제된 경우 낙약자가 이미 제3자에게 급부한 것의 반환 상대방","낙약자가 이미 제3자에게 급부한 것에 관하여서는 요약자를 상대로 원상회복청구나 부당이득반환청구 O, 제3자를 상대로 X ∵ 계약관계의 청산은 계약당사자인 낙약자와 요약자 사이에 이루어져야, 계약상의 위험을 제3자에게 전가시키면 X.\n\n이유 中: 제3자를 위한 계약에서의 제3자는 548조 1항 단서 제3자에 해당 X, 그렇다고 계약해제로 인한 원상회복의무 부담 X, 낙약자가 미지급급부에 대해 지급 거절할 수 있으나(542조), 이는 이미 지급한 급부의 원상회복과는 다른 문제.\n\n正辯: 이 판례들은 수익 의사표시 후에도 요약자의 채무불이행이 있다면 낙약자가 계약을 해제할 수 있음을 전제로 하고 있음.",["§539","§541","§542","§548"],0,"계약총론","대판 2005다7566, 2010다31860","미분류"],
  ["채권각론_P038","2016다255125","생명보험·상해보험 무효·해제 시 보험자의 보험수익자에 대한 반환청구 가부","타인을 위한 생명보험·상해보험이 무효·해제된 경우, 보험자가 보험수익자에게 이미 지급한 보험금의 반환을 보험수익자에게 직접 청구한 사안","타인을 위한 생명보험·상해보험은 '제3자를 위한 계약'의 성질을 가지더라도 보험자는 보험수익자에 대한 자신의 고유한 채무를 이행한 것이므로 보험계약이 무효·해제된 경우 보험자는 보험수익자를 상대로 그에게 이미 급부한 것의 반환청구 O.",["§539"],0,"계약총론","대판 2016다255125","미분류"],
  ["채권각론_P039","2018다244976","제3자를 위한 계약에서 수익자가 548조 1항 단서 제3자에 해당하는 경우","제3자를 위한 계약(기본관계: 함포납품계약)에서 수익자가 요약자와 대가관계(현물변상계약)를 맺고 함포를 인도받아 소유권을 취득한 사안에서 기본관계 해제 시 수익자 보호 여부","제3자를 위한 계약에서 낙약자·요약자 사이 법률관계(기본관계)에 기하여 수익자가 요약자와 원인관계(대가관계) 맺음으로써 해제 전에 새로운 이해관계 갖고 그에 따라 등기·인도 등 완전한 권리 취득했다면 수익자는 548조 1항 단서의 제3자 O.\n\n正辯: 제3자를 위한 계약의 '수익자'는 원칙적으로 해제에서 보호되는 '제3자' 아니지만, 기본관계(함포납품계약)를 '기초로' 대가관계(현물변상계약) 맺고 함포 인도받아(간접점유) 소유권 취득한 수익자는 함포납품계약 해제에 보호되는 548조 1항 단서 제3자 O. 금전이 아닌 동산 인도였으므로 낙약자가 요약자가 아닌 수익자에게도 원상회복 구한 것으로 보이며, 다만 간접점유이므로 만일 인용되었다면 목반청 양도 방식(私見).",["§539","§548"],0,"계약총론","대판 2018다244976","미분류"],
  ["채권각론_P040","92다41559","수익의 의사표시를 한 수익자의 요약자 계약해제 시 낙약자에 대한 손해배상청구권","수익의 의사표시를 한 수익자가 요약자가 계약을 해제한 경우 낙약자에게 손해배상을 청구한 사안","수익의 의사표시를 한 수익자는 요약자가 계약을 해제한 경우에 낙약자에게 하자로 인한 손해배상청구 O.",["§539","§541"],0,"계약총론","대판 92다41559","미분류"],
  ["채권각론_P041","2000다50688","근저당·가압류 있는 부동산 매도인 이행지체 — 이행불능 아니고 최고 필요","매매목적물 부동산에 근저당권설정등기·가압류등기가 있는 경우 매도인 이행의무의 성질","매매목적물 부동산에 근저당권설정등기·가압류등기가 있다면 매도인이 말소하여 완전한 소유권이전등기해줘야 하지만, 말소되지 아니하였더라도 바로 매도인의 소유권이전등기의무가 이행불능으로 되는 것은 X → 매도인이 미리 이행하지 아니할 의사를 표시한 경우가 아닌 한, 매수인이 매도인에게 상당한 기간을 정하여 이행 최고하고 그 기간 내 이행하지 아니한 때 한하여 해제 O.",["§544"],0,"계약총론","대판 2000다50688","미분류"],
  ["채권각론_P042","2001다6053","매도인의 이행장소 서류 보관·계속 수령 최고와 이행제공의 계속성","매도인이 이행장소인 법무사사무실에 서류를 계속 보관시키면서 수령 최고를 반복한 경우 이행제공의 계속성 충족 여부","매도인이 매수인을 이행지체로 되게 하려면 소유권이전등기 필요 서류 등을 현실 제공하거나 그렇지 않더라도 이행장소에 그 서류 등을 준비해두고 매수인에게 그 뜻을 통지하고 수령해갈 것 최고하면 O → 이행장소인 법무사사무실에 그 서류 등 계속 보관시키면서 언제든지 잔금과 상환으로 서류들을 수령할 수 있음을 통지하고 신의칙상 요구되는 상당한 시간 간격 두고 거듭 수령 최고하면 이행 제공을 다한 것 O → 그런 상태가 계속된 기간 동안 매수인은 이행지체 O.\n\n正辯: 판례는 '동시이행 항변권 소멸을 위한 이행제공'에 관하여 '계속적 이행제공설'의 입장인데 이처럼 이행장소에 서류를 계속 보관시키고 어느 정도 간격으로 계속 수령 최고하면 이행제공이 계속되었다고 보는 입장임.",["§544","§536"],0,"계약총론","대판 2001다6053","미분류"],
  ["채권각론_P043","93다47615","과대최고의 효력 — 현저히 과다하고 불수령 의사 분명한 경우 최고 부적법","최고한 금액이 본래 급부보다 현저히 과다하고 청구한 금액 제공하지 않으면 수령하지 않을 의사가 분명한 경우","과대최고는 본래 급부와 차이 적거나 착오에 기한 것이면 본래 급부 범위 내에서 유효. 그러나 과다한 정도가 현저하고 청구한 금액을 제공하지 않으면 수령하지 않을 의사가 분명하면 최고 부적법하고 이에 터잡은 해제 무효.",["§544"],0,"계약총론","대판 93다47615","미분류"],
  ["채권각론_P044","89다카14110","최고기간이 부당히 짧거나 기간을 정하지 않은 경우 — 상당기간 경과 후 해제권 발생","최고기간이 상당한 기간보다 짧거나 기간을 정하지 않은 경우","기간이 상당한 기간보다 짧거나 기간을 정하지 않은 경우에는 상당한 기간이 지나면 해제권 발생.",["§544"],0,"계약총론","대판 89다카14110","미분류"],
  ["채권각론_P045","2002다24942","소장 부본 송달로 최고 효력 인정 — 상당기간 경과 후 해제 가능","매도인이 매수인의 매매대금 미지급 이유로 약정 취소 주장하며 원상회복 구하는 소를 제기한 경우 소장 부본 송달이 최고로서의 효력을 갖는지","매도인이 매수인의 매매대금 미지급 이유로 약정 취소 주장하며 원상회복 구하는 소 제기했다면, 특히 대금수령 거부 취지 포함되지 않은 한, 소장 부본 송달로 매매대금지급 최고 있었던 것 O → 상당기간 경과하도록 대금 지급 않으면 매도인은 매매계약 해제 O.",["§544"],0,"계약총론","대판 2002다24942","미분류"],
  ["채권각론_P046","2020다290804","채무불이행을 이유로 해제하겠다는 통지의 최고로서의 효력","채무자의 급부불이행 사정을 들어 계약 해제하겠다는 통지가 최고로서의 효력을 갖는지","채무자 급부불이행 사정 들어 계약 해제하겠다는 통지했다면, 특별히 급부수령 거부 취지 포함되지 않은 한, 그로써 최고 있었던 것 O → 상당기간 경과하도록 이행되지 않았다면 채권자는 계약 해제 O.",["§544"],0,"계약총론","대판 2020다290804","미분류"],
  ["채권각론_P047","2022다238053","동시이행관계에서 해제를 위해 채권자의 자기 채무 변제제공 필요","동시이행관계인 반대의무를 지는 채권자가 채무자의 변제제공 없음을 이유로 해제할 때 자기 채무를 변제제공 해야 하는지","동시이행관계인 반대의무 지는 채권자는 채무자의 변제제공 없음을 이유로 해제하기 위해 자기 채무 변제제공 하여야.\n\n正辯: 甲회사와 乙은 부동산 매매계약 체결하며 잔금지급과 소이등 동시에 하기로, 의무 이행하지 않으면 서면으로 최고 후 해제할 수 있도록 약정 → 甲이 잔금 지급하지 않자 乙이 다음 날 甲에게 잔금 미지급 이유로 해제한다는 문자메시지 전송. 乙은 잔금기일 이전에 소유권이전등기에 필요한 서류 준비 마치고 공인중개사에게 통지했으며 인도를 위한 준비 마치는 등 甲에게 이행제공 O → 甲은 잔금 지급기일 무렵 이행지체 상태 O → 乙의 문자메시지 해제 통지는 그에 앞선 서면에 의한 이행 최고가 없어 해제 통지 효력 X, 약정사항인 '서면'에 의한 것이 아니어서 최고 효력도 X → 乙의 답변서에 의한 해제 통지는 해제 통지 효력 X, 그러나 특별히 잔금 수령 거부 취지 포함되지 않은 이상 이행 최고 효력 O → 乙의 준비서면이 甲에게 송달된 날 적법하게 해제 O.",["§544","§536"],0,"계약총론","대판 2022다238053","미분류"],
  ["채권각론_P048","88다카132","중도금 자동해제 약정의 효력","중도금을 기일에 지급 못하면 자동해제된다는 약정이 있는 경우","중도금을 기일에 지급 못하면 자동해제된다는 약정은 그대로 O.",["§544"],0,"계약총론","대판 88다카132","미분류"],
  ["채권각론_P049","88다카28891","잔금 자동해제 약정과 동시이행항변권 — 이행지체에 빠진 때 비로소 자동해제","잔금을 기일에 지급하지 못하면 자동해제된다는 약정이 있더라도 매도인이 소유권이전등기 필요 서류 이행제공을 하지 않은 경우","잔금을 기일에 지급하지 못하면 자동해제된다는 약정이 있더라도, 매도인이 잔금지급기일에 소유권이전등기 필요 서류 이행제공을 하여 매수인을 '이행지체에 빠지게 하였을 때 비로소 자동해제' O.\n\n正辯: 중도금 미지급 자동해제 약정은 그대로 효과, 잔금 미지급 자동해제 약정은 동이항을 깨야 효과 → 이를 두고 단순히 '잔금의 경우 판례가 자동해제 부정'했다는 평가는 부당함(私見). 이는 의사해석 문제로, 일반거래에서 '잔금 미지급'이라는 조건은 '잔금 지체'로 해석해야 하고, 잔금에는 통상 등기서류 교부가 동이항으로 붙어있으니 동이항이 깨져야 '채무불이행(이행지체)'이 성립해야 한다는 의미(즉, 동이항만 깨면 '자동해제' O) → 애초 동이항을 배제했거나 가령 중도금 지급 시 이미 등기서류 교부했다면 잔금기일 도과만으로 자동해제 O.",["§544","§536"],0,"계약총론","대판 88다카28891","미분류"],
  ["채권각론_P050","2022다255614","잔금기일 도과로 자동해제되는 특별한 사정 — 매수인의 확약과 자동해제 감수 약정","매도인의 등기서류 구비 불문하고 매수인의 지급기일 도과사실 자체만으로 계약 실효되는 특약을 한 경우 또는 매수인이 자동해제 감수하겠다는 약정을 한 경우","매도인의 등기서류 구비 불문하고 매수인의 지급기일 도과사실 자체만으로 계약 실효되는 특약했거나, 매수인이 여러 번 채무불이행에 책임 느껴 잔금기일 연기 요청하며 새로운 약정기일까지는 반드시 이행할 것 확약하고 자동해제 감수하겠다는 약정했다고 볼 특별한 사정 있다면, 잔금지급기일 도과함으로써 매매계약 자동적 실효 O.",["§544"],0,"계약총론","대판 2022다255614","미분류"],
  ["채권각론_P051","79다1595","위약금·계약금 조항과 자동해제 구분 — 해제권 유보조항으로 해석","매매계약에서 '매도인 위약 시 계약금 배액 배상, 매수인 위약 시 계약금 포기하며 자동 해제된다'는 조항이 있는 경우","매매계약에서 '매도인 위약 시 계약금 배액 배상, 매수인 위약 시 계약금 포기하며 자동 해제된다'는 조항은 위약 당사자가 배액 상환이나 포기하여 계약을 해제할 수 있다는 해제권 유보조항 O → 최고·통지 없는 자동해제 X.\n\n正辯: 자동해제 약정을 계약금의 포기 및 배액상환 약정과 결합한 경우에는 자동해제 효과 부정하는데, 이는 그 문언에도 불구하고 자동해제에 초점을 둔 것이 아니라 채무불이행 시 위약금 약정과 해제권의 부여에 초점을 둔 것으로 해석하는 것임.",["§544","§543"],0,"계약총론","대판 79다1595","미분류"],
  ["채권각론_P052","2019다216817","자동해제 약정 후 계약 부활 합의 — 자동해제약정 효력 상실","자동해제 약정 하에 채무불이행이 있었으나 당사자들이 계약이 여전히 유효함을 전제로 논의를 계속한 경우","자동해제 약정하고 일방 채무불이행 하면 별도 최고나 해제 의사표시 없이 불이행 자체로써 자동해제 O → 그러나 당사자들이 계약 여전히 유효 전제로 논의 계속, 해제 법률효과 주장 않은 채 계약 내용 이행 촉구, 온전한 이행 못 받은 상대방이 이의 없이 급부 중 일부 수령 → 특별한 사정 없는 한 계약당사자들 사이 자동해제약정 효력 상실시키고 자동해제된 계약 부활시키는 합의 O → 채무이행 못 받은 상대방은 새로운 최고 없이 바로 해제 X.",["§544"],0,"계약총론","대판 2019다216817","미분류"],
  ["채권각론_P053","96다35590","최고기간 내 이행 제공의 계속 불필요 — 이행 준비는 필요","이행기에 한 번 이행제공 하여 상대방 지체에 빠뜨린 후 해제 최고를 하는 경우, 최고기간 내 이행제공 계속 필요 여부","'일방이 이행기에 한 번 이행제공 하여 상대방 지체 빠지게 한 경우, 신의칙상 최고하며 최고기간 내 이행제공 계속할 필요 없더라도, 상대방이 최고기간 내에 이행·이행제공을 하면 해제권은 소멸하므로, 상대방 이행을 수령하고 자신의 채무를 이행할 정도의 준비는 필요.' → 매수인이 잔금 이행제공 했음에도 매도인이 이행지체 빠져 매수인이 정지조건부 해제 의사표시 및 최고하면서 현실 제공했던 잔금으로 양도성예금증서 구입·보관하면 이행 준비 O, 적법한 최고 O.\n\n正辯: 판례는 상대방의 동시이행 항변권 상실(=지체책임 계속적 발생)을 위해 계속적 이행제공설을 취했으나, 해제를 위한 최고기간 내에는 계속적 이행제공이 불필요하다는 입장임. 다만 전자의 경우 법무사 사무실에 서류를 맡겨두고 일정 간격 최고로 충분하다는 등 이행제공 행위의 계속이 아닌 일정 상태의 지속만을 요구하고, 후자의 경우 이행제공의 계속은 필요 없으나 이행의 준비는 되어있어야 한다면서 양도성 예금증서(매수인)나 등기서류 일체(매도인)의 준비 상태를 요구하므로, 결국 양자는 실제에 있어서 큰 차이는 없는 상황이라 볼 수도 있음(私見).",["§544","§536"],0,"계약총론","대판 96다35590","미분류"],
  ["채권각론_P054","92다5713","매도인 해제 최고 시 이행제공 정도 — 소유권이전등기 필요 일체 서류 준비","매도인이 매수인의 잔금 지체를 이유로 해제하기 위한 이행제공의 정도","매도인이 매수인의 지체 이유로 해제하려면 매수인의 잔금 미지급만으로는 부족하고, 매도인이 소유권이전등기신청 필요 일체 서류를 수리할 수 있을 정도로 준비하여 그 뜻을 상대방에게 통지하여 수령을 최고해야 → 소유권이전등기신청에 필요한 일체의 서류라 함은 등기권리증·위임장·인감증명서 등 등기신청에 필요한 모든 구비서류 → 매도인은 일체 서류를 발급받아 인감도장·등기권리증과 자신의 집에 소지하고 있음으로써 충분.",["§544","§536"],0,"계약총론","대판 92다5713","미분류"],
  ["채권각론_P055","2012다65867","인감증명서 미발급 상태에서의 이행제공 충분 여부","매도인이 정지조건부 해제 의사표시와 최고를 함에 있어 소유권이전등기 필요 서류를 모두 준비하되 인감증명서만 발급받지 않은 경우","인감증명서는 언제라도 발급받을 수 있으므로 매수인의 불이행 정도에 비추어 매도인은 이행 제공 마친 것이고 해제는 적법 O.\n\n正辯: 판례는 상대방의 동시이행 항변권 상실(=지체책임 계속적 발생)을 위해 계속적 이행제공설을 취했으나, 해제를 위한 최고기간 내에는 계속적 이행제공이 불필요하다는 입장임. 다만 이행제공의 계속은 필요 없으나 이행의 준비는 되어있어야 한다면서 양도성 예금증서(매수인)나 등기서류 일체(매도인)의 준비 상태를 요구하므로, 결국 양자는 실제에 있어서 큰 차이는 없는 상황이라 볼 수도 있음(私見).",["§544","§536"],0,"계약총론","대판 2012다65867","미분류"],
  ["채권각론_P056","80다2381","이행기간 내 vs 이행기일 최고 시 이행제공 계속 여부, 정지조건부 해제 의사표시","[쟁점①] 동시이행관계에서 일방이 상대방 이행지체 이유로 해제권 취득하기 위한 이행청구의 방법. [쟁점②] 기일 내 이행 않으면 해제한다는 이행청구의 법적 성질","[쟁점①] 동시이행관계에서 일방이 상대방 이행지체 이유로 해제권 취득하기 위해, 그 이행청구에 표시된 이행기가 ① 일정 '기간 내'라면 기간 중 이행제공 계속해야, ② 일정한 일시 등 '기일'로 정했다면 그 기일에 이행제공으로 충분 → 상대방 이행제공 없이 위 기간·기일 도과함으로써 해제권 발생.\n\n[쟁점②] '특정 기일 내에 이행하지 않을 경우 계약은 당연히 해제된 것으로 한다'는 이행청구는 이행청구와 동시에 기일 내 이행 없는 것을 정지조건으로 하여 미리 해제의 의사표시를 한 것 O.\n\n正辯: 전술한 것처럼 판례는 한 번 이행제공으로 이미 지체에 빠진 상대방에게 해제를 할 경우 최고기간 내 이행제공 계속할 필요가 없다는 입장 → 위 판결의 쟁점①은 아직 상대방이 '지체에 빠지지 않은 상태(가령 기한 정함 없는 채무)'에서 이행청구를 통해 지체에 빠뜨림(동이항 깨기)과 동시에 해제요건으로서의 최고를 하려는 사안으로 보임. 쟁점②에 대해서는 판례는 최고기간 내 불이행을 정지조건으로 하는 해제 의사표시를 인정 O(私見).",["§544","§543","§536"],0,"계약총론","대판 80다2381","미분류"],
  ["채권각론_P057","2004다31302","사정변경을 이유로 한 해제·해지의 요건","사정변경을 이유로 계약을 해제하는 경우의 요건","사정변경 인한 해제는 ① 계약 성립 당시 당사자 예견할 수 없던 계약 기초인 객관적 사정(주관적 사정 X)의 현저한 사정 변경, ② 해제권 취득 당사자 귀책사유 없을 것, ③ 구속력 인정이 신의칙 현저히 반하는 결과일 것을 요건으로 함.",["§544"],0,"계약총론","대판 2004다31302","미분류"],
  ["채권각론_P058","89다카1381","회사 임원·직원이 퇴사한 경우 계속적 보증계약 사정변경 해지","회사 임원·직원 지위 때문에 회사 요구로 부득이 회사·제3자 사이 계속적 거래에 따른 회사 채무에 보증인이 된 자가 그 후 퇴사한 경우","보증기간 정했더라도 사정변경 이유로 보증계약 해지 O ∵ 계약성립 당시 사정 현저한 변경.",["§544"],0,"계약총론","대판 89다카1381","미분류"],
  ["채권각론_P059","94다46008","특정된 확정채무 보증인의 사임 — 사정변경 해지 불가","특정된 확정채무를 보증한 이사가 사임한 경우","특정된 확정채무 보증한 이사는 사임해도 사정변경 해지 X.",["§544"],0,"계약총론","대판 94다46008","미분류"],
  ["채권각론_P060","2020다254846","견본주택 건축 불능으로 인한 토지 임대차계약 사정변경 해지 인정","甲이 주택건설사업 위한 견본주택 건설 목적으로 임대인 乙과 토지 임대차계약 체결하며 해당 목적을 특약사항에 명시했는데, 지자체장의 축조신고 반려통보로 토지에 견본주택 건축이 불가능하게 된 경우","甲은 임대차계약 해지 및 보증금반환청구 O ∵ 견본주택 건축은 임대차계약 성립 기초사정 O, 甲은 임대차계약 체결 목적 달성 X, 계약을 유지하면 甲·乙 사이에 중대한 불균형 초래.",["§544"],0,"계약총론","대판 2020다254846","미분류"],
  ["채권각론_P061","2020다297430","계속적 계약에서 사정변경 이유 계약 소멸 — 해지만 가능, 해제 불가","임대차계약·고용계약·위임계약 등 계속적 계약에서 일방의 업무 중 여러 부분이 이미 이행되고 상당 기간 흐른 경우 사정변경 이유로 계약 효력을 소멸시키는 방법","임대차계약·고용계약·위임계약 등 계약으로부터 생기는 급부가 일정 기간 계속하여 행해지는 계속적 계약에서 일방의 업무 중 여러 부분이 이미 이행되고 상당 기간 흐른 경우, 상대방이 사정변경 이유로 계약 효력 소멸시키려면 특별한 사정 없는 한 소멸 효과를 장래에 향하여 발생시키는 550조 '해지'만 가능 O, 548조 '해제'는 X.\n\n正辯: 해외이주 알선업체와 미국 비숙련 취업이민 위한 알선업무계약 체결한 사안.",["§544","§548","§550"],0,"계약총론","대판 2020다297430","미분류"],
  ["채권각론_P062","2022다203804","부수적 채무의 불이행으로 계약 해제 불가 — 주된 채무와 부수적 채무 구별","채무불이행을 이유로 계약 해제 시 주된 채무와 부수적 채무의 구별 기준","채무불이행을 이유로 544조에 따라 계약 해제하려면, 당해 채무가 계약목적 달성에 필요불가결하고 이행하지 않으면 계약 목적이 달성되지 않아 체결하지 않았으리라 여겨질 정도의 주된 채무여야. 부수적 채무의 불이행으로 계약 해제 X → 주된 채무와 부수적 채무 구별함에 급부의 독립된 가치와 관계없이, 계약 체결할 때 표명되었거나 당시 상황으로 분명하게 객관적으로 나타난 당사자 합리적 의사로 결정, 계약의 내용·목적·불이행결과 등 여러 사정 고려.\n\n正辯: 甲 회사가 乙에게 휴양 콘도미니엄 분양계약 체결하며 인근 고압선을 지하로 매립하기로 하는 특약 후 특약 이행 X → 주된 채무 여지 O, 해제 O ∵ 분양계약서 명시 등 제반사정.",["§544"],0,"계약총론","대판 2022다203804","미분류"]

const 채권각론_QUIZ = [
  ["채권각론_Q001","CASE","[제10회 2문3-1] 甲이 A회사의 여행패키지 광고 이메일에 '승마체험 무료'가 포함된 것으로 보고 계약 체결. 그러나 계약서·확인서에는 해당 내용 없음. 이 경우 광고 내용이 계약에 편입되는지 甲과 A회사가 주장할 수 있는 논거를 서술하시오. (15점)",[],0,"甲 측 논거: 광고가 청약의 유인이더라도 광고 내용이 계약의 내용으로 편입될 수 있음. 광고 이메일이 계약 체결을 유도하는 수단으로서 구체적·확정적 조건을 제시했고 甲이 이를 믿고 계약 체결 → 계약 내용으로 편입(사기적 광고의 경우 취소도 가능). A회사 측 논거: 최종 계약서·확인서에 해당 내용 없으므로 계약서가 최종 의사표시 → 광고는 계약 내용 아님. 계약 체결 시 계약서 확인 의무 있음.","",2,"계약총론"],
  ["채권각론_Q002","CASE","[제14회 2문1-1] 甲이 乙을 상대로 '乙의 수령지체 중 X건물이 강제수용되어 이행불능이 된 것은 ① 乙의 귀책사유, 또는 ② 수령지체 중 쌍방 귀책 없는 사유로 발생'이라며 매매잔대금 1억 7천만 원(잔금 6억 - 수용보상금 4억 3천만) 청구. 인용 가부? (10점)",[],0,"① 乙의 귀책사유로 인한 이행불능: 乙이 잔금 지급을 거부하고 계약이 실효됐다고 주장 → 이행 거절에 가까우나 수령지체 성립 여부 선결. 수령지체는 채권자가 협력의무 불이행 시 성립. 甲이 소유권이전서류 제공 없이 잔금만 청구했으므로 동시이행 항변 가능 → 수령지체 불성립. ② 수령지체 중 쌍방 귀책 없는 사유: 수령지체 불성립 → 이 주장도 배척. 결론: 甲의 이행불능은 甲측 귀책(동시이행의무 불이행) → 대상청구권 행사 가능하나 잔대금 청구는 기각. 단, 수용보상금에 대한 대상청구권 검토.","",3,"계약총론"],
  ["채권각론_Q003","CASE","[제14회 2문1-2] 乙이 '매매계약이 강제수용으로 종료되었다'며 계약금 1억+중도금 3억 반환청구. 법원은 어떤 판단을 해야 하는가? (결론+근거) (10점)",[],0,"강제수용은 매매계약의 이행불능 사유. 이행불능이 누구의 귀책인지 또는 쌍방 귀책 없는 사유인지에 따라 위험부담(민§537) 적용. 甲의 협력의무(병원 용도변경) 불이행이 인과관계 있으면 甲 귀책. 甲 귀책 이행불능 시: 乙은 해제권 행사 + 기지급 계약금·중도금 반환 청구 가능(민§546). 해제 없이 반환 청구만 하면: 위험부담(민§537) 적용 → 채권자(乙)의 반대급부(잔금 지급) 의무 소멸 + 이미 지급한 계약금·중도금 반환 청구 가능(부당이득). 결론: 계약금 1억+중도금 3억 반환 인용.","",2,"계약총론"],
  ["채권각론_Q004","CASE","[제14회 2문1-3] 丙이 乙을 대위하여 甲을 상대로 X건물 소유권이전등기 및 인도 청구. 甲은 '乙이 공탁금을 공탁 취지에 따라 수령하여 계약이 적법 해제됐다'고 항변. 타당한가? (10점)",[],0,"공탁금 수령과 해제 합의: 甲이 '원상회복 이유로 중도금만 공탁'했고 乙이 이의 없이 수령 → 이는 해제에 대한 묵시적 합의(합의해제)로 볼 수 있음. 그러나 가처분이 있는 경우 가처분 채권자의 동의 없이 임의로 해제할 수 없음(채권자취소 유사 논리). 丙이 乙을 대위하여 가처분까지 받은 상황 → 甲과 乙의 합의해제는 丙에게 대항 불가. 결론: 甲의 항변 부당 → 丙의 청구 인용.","",2,"채권자대위"],
  ["채권각론_Q005","CASE","[제13회 2문3] 甲이 2012년 乙로부터 X토지 매수 후 점유. 2023년 굴착공사 중 乙이 1995년에 매립한 쓰레기·오염물질 발견. 甲이 변호사에게 ① 소유권에 기한 방해배제, ② 하자담보·불법행위 손해배상 구제수단 각각의 인용 가능성 검토 요청. (30점)",[],0,"① 소유권에 기한 방해배제(민§214): 소유자가 방해자에게 방해 제거 청구. 乙이 매립 행위의 주체이나 이미 소유권 이전 → 甲이 소유자. 현재 오염 물질이 X토지에 존재하는 것 자체가 방해. 乙에게 방해배제 청구 가능. 소멸시효 없음(물권적 청구권). | ② 하자담보(민§580): 매매 시 하자가 숨어 있어 甲이 알 수 없었던 경우 담보책임. 매수 2012년 → 담보책임 제척기간 1년(안 날부터). 2023년에 발견 → 제척기간 기산 가능. 단, 하자 있음을 몰랐고 알 수 없었던 경우 → 해제 또는 손해배상. | ③ 불법행위(민§750): 乙의 쓰레기 매립 행위 자체가 불법행위. 소멸시효 3년(안 날부터)/10년(행위일부터). 1995년 행위일로부터 10년 → 2005년 시효 완성 가능. 甲이 2012년 매수 당시 몰랐다면 3년 시효 기산은 2023년부터.","",3,"매매"],
  ["채권각론_Q006","CASE","[제10회 2문1-1] 甲이 乙 소유 X토지를 임차하여 Y건물 신축+소유권보존등기. 乙이 5기 차임 연체로 토지임대차 해지. ① 乙의 철거+인도 청구에 甲이 민§643+§283의 매수청구권 행사. ② 乙이 丙(Y건물 임차인)에게 퇴거+부당이득 청구. 각 주장의 타당성은? (20점)",[],0,"① 지상물 매수청구권(민§643+§283): 임대차가 기간만료 또는 해지로 종료된 경우 지상물 소유자인 토지임차인이 임대인에게 지상물 매수 청구 가능. 이행지체로 인한 해지의 경우에도 임차인에게 귀책이 있어도 매수청구권 인정 여부 → 귀책 있는 해지의 경우 인정 가능(판례 인정). 매수청구권 행사 시 乙의 철거+인도 청구는 기각(동시이행). | ② 乙→丙 퇴거 청구+부당이득: 丙은 Y건물의 임차인으로 건물 임차권자. 乙은 Y건물 소유자(甲)에게 퇴거 청구해야 함. Y건물을 통한 X토지 사용에 대한 부당이득은 X토지 소유자 乙이 Y건물 소유자 甲에게 청구하는 것이 원칙. 丙에게 직접 청구는 부당(丙은 정당 권원인 건물임차권 보유).","",3,"임대차"],
  ["채권각론_Q007","CASE","[제10회 2문1-2] 乙이 임대차 종료 후 Y건물 인도. 乙이 임대차기간 만료일에 보증금 1억 반환 요구. 甲의 주장: ① 乙이 미인도(잠금)로 3개월분 차임 공제, ② Y건물 인도와 동시에 공제 후 8,500만 지급. 丙의 청구 및 甲의 주장은 타당한가? (20점)",[],0,"① 임대차 종료 후 임차물 미반환시 부당이득 또는 차임 상당 손해배상 공제 가능. 乙이 창고 문 잠그고 물건 방치 → 미반환 상태. ② 동시이행: 보증금반환채무와 임차물반환의무는 동시이행관계(판례). 甲의 주장 ②는 타당. | 2020.10.1.~2021.1.1. 3개월간 차임 100만×3=300만 공제 → 9,700만 인용. 甲의 동시이행항변도 인정.","",2,"임대차"],
  ["채권각론_Q008","CASE","[제15회 2문3] 甲과 乙이 丙으로부터 X토지 공동 임차(보증금 5억, 월 차임 240만). 2019.7.부터 차임 미납. 丙이 甲에 한해 월 160만 면제. 乙이 丙에게 보증금 5억+지연이자 청구. 丙의 주장: ① 丁의 전부명령, ② 차임 상계, ③ 차임 당연 공제. 예상 판결은? (30점)",[],0,"공동임차인의 보증금: 연대채무 or 분할채무. 판례는 보증금반환채권을 원칙적 분할채권으로 봄(지분=1/2씩). | ① 丁의 전부명령: 甲 지분(2.5억)에만 효력 → 乙 지분(2.5억)은 乙이 직접 청구 가능. | ② 연체 차임 상계: 丙의 甲·乙에 대한 차임채권이 자동채권. 丙이 甲에 대해 160만 면제 → 연대채무 면제는 그 채무자 부분에 한해 효력(민§419): 甲 면제분이 다른 공동채무자(乙)에게 영향 없음(분할채무 시 독립). 乙에 대한 차임: 총 차임 중 乙 부담 비율 산정 후 상계. | ③ 당연 공제: 보증금에서 차임 당연 공제 불가 → 상계 의사표시 필요. | 예상: 乙 지분 2.5억에서 乙의 연체차임 상계분 공제 후 인용.","",3,"임대차"],
  ["채권각론_Q009","CASE","[제13회 1문4-2] 하자보수에 갈음하는 손해배상청구(민§667②)를 채무불이행 손해배상에 선택적 병합. 항소심이 임의로 하자보수 청구를 선택하여 심리하고 제1심과 같은 결론에 이르러 항소 기각. 이 판결이 타당한가? (10점)",[],0,"선택적 청구 병합 시 법원의 심리 방법: 선택적 병합에서 법원은 어느 청구를 먼저 심리할지 선택 재량 있음. 한 청구가 이유 있으면 다른 청구 판단 불요. 그러나 항소심에서 새로 추가된 선택적 청구를 심리하면서 제1심과 동일한 결론(항소 기각)에 이른 경우 → 실질적으로 乙에게 불이익한 판단이 아니면 문제 없음. 단, 항소심이 법원 주도로 청구 선택 → 처분권주의 위반 여부 검토 필요. 결론: 선택적 병합에서 법원의 임의 선택은 허용되나, 선택한 청구만 판단하고 나머지 누락 시 판결 누락 여부 문제.","",2,"도급"],
  ["채권각론_Q010","CASE","[제13회 2문1-1] 乙이 甲의 X토지에 대한 서류를 위조하여 소유권이전등기(2002). 丙이 乙로부터 매수(2004)+등기. 16년 이상 점유. 甲이 2020년 사실 알고 2024.1. 乙에게 '丙으로부터 받은 매매대금 1억'에 대한 부당이득반환 청구. 법원의 판단은? (15점)",[],0,"등기부취득시효 완성 여부(민§245②): 丙이 2004년부터 평온·공연·선의·무과실로 점유 → 10년 경과(2014년) 시 등기부취득시효 완성. 따라서 X토지 소유권은 丙에게 귀속. | 甲의 乙에 대한 부당이득반환청구: 乙이 무권리자로서 丙에게 매도한 대가(1억)는 甲의 손실에 기한 부당이득에 해당. 그러나 丙의 취득시효 완성으로 甲의 소유권 상실 확정 후 乙의 이득은 甲 손실과 인과관계 있는가 → 인과관계 인정. 단, 소멸시효(10년, 또는 3년) 완성 여부 확인. 결론: 청구 인용 또는 시효 완성 여부에 따라 기각.","",2,"부당이득"],
  ["채권각론_Q011","CASE","[제14회 1문4-2] 甲이 乙과 甲 소유 X토지 매매계약 체결에 대리권 표시(민§125). 乙이 甲의 이익을 위해 저가(시가 2억→1억)로 매각. 乙이 대금 1억을 甲에게 전달 않고 채권자 戊에게 변제. 甲이 乙·戊에 대해 금전지급을 청구할 수 있는 모든 권원과 근거는? (단, 이 설문에서는 丙이 乙의 배임 사실 모름) (20점)",[],0,"丙이 선의인 경우(배임 사실 모름) 표현대리 유효 → 매매계약 유효. | 甲의 乙에 대한 청구: ① 수임인의 수취금 인도의무(위임민§683): 1억 원. ② 배임행위로 인한 손해배상(민§681 수임인 주의의무 위반): 시가 1억 손해. ③ 불법행위 손해배상(민§750): 乙의 고의 배임행위. | 甲의 戊에 대한 청구: ① 부당이득반환(민§741): 戊가 자신의 채무 변제 받음 = 乙이 甲에게 전달해야 할 돈. 단, 戊가 乙의 배임 사실 알았으면 악의의 수익자(민§748②) → 이자까지 반환. ② 불법행위 손해배상(민§750): 戊가 배임 사실 알고 수령.","",3,"부당이득"],
  ["채권각론_Q012","CASE","[제10회 2문3-2] 甲이 A회사의 여행패키지에서 승마체험 신청. A회사가 독립적 승마업자 乙에게 위탁. 乙의 안전조치 불이행으로 甲이 말에서 떨어져 부상. 甲이 A에게 채무불이행+불법행위로 손해배상 청구 가능한가? (20점)",[],0,"① 채무불이행(이행보조자 민§391): A가 여행계약에 따른 승마체험 이행을 乙에게 맡겼으므로 乙은 A의 이행보조자. 乙의 안전조치 해태는 A의 채무불이행. A는 이행보조자 과실에 대해 책임. | ② 불법행위 사용자책임(민§756): 乙이 A의 사용관계에 있는지 여부. 독립사업자인 乙은 A의 지시·감독 아래 있지 않으므로 사용자 관계 부정 가능성. | 결론: 채무불이행으로는 청구 가능. 불법행위 사용자책임은 乙의 독립성에 따라 판단.","",2,"불법행위"],
  ["채권각론_Q013","CASE","[제11회 2문1-2] A종중의 신임 대표 乙이 2019.10.1. 전 대표 甲의 비위(공사대금 부풀리기, 뒷돈 수수) 사실 발견. A종중이 2021.10.1. 甲에게 불법행위 손해배상 청구. 甲은 5년 전 발생한 것이어서 시효 소멸 주장. 법원의 판단은? (15점)",[],0,"불법행위 소멸시효(민§766): 피해자 또는 법정대리인이 '손해 및 가해자를 안 날'부터 3년. 법인의 경우 '법인이 안 날' = 대표기관이 안 날. 전임 대표 甲이 가해자인 경우 → 종중의 인식은 비위 사실을 정상적으로 알 수 있는 다른 기관(현임 대표 또는 이사)이 안 날. 신임 대표 乙이 2019.10.1. 발견 → 2022.10.1.까지 소멸시효(3년). 2021.10.1. 소 제기는 기간 내 → 시효 미완성. 결론: 甲의 항변 배척, 청구 인용.","",2,"불법행위"],
  ["채권각론_Q014","CASE","[제13회 1문5] 甲(골프장 운영)이 乙에게 상호 사용+회원권 판매 허락. 乙이 丙에게 매대금 2억 편취. 丙이 甲에게 사용자책임(민§756) 주장. ① 甲의 사용자책임 부정 논거를 甲 변호사 입장에서 서술. ② 화해권고결정 후 甲의 乙에 대한 구상금청구에서 乙이 '불법행위책임을 인정할 수 없어 구상 응할 수 없다'는 주장의 타당성. (10점+10점)",[],0,"① 사용자책임 부정 논거: i) 고용관계 없고 수수료 기반 독립 중개인. ii) 甲의 지시·감독 없음. iii) 계약서 이례적 조항(회원권 특정 없음, 고율 위약금)으로 일반인이 주의하면 의심 가능. iv) 丙이 매대금을 시가보다 40% 낮게 지급하고 명의개서 전 전액 개인계좌로 → 丙의 과실. v) 乙이 수사에서 비자금 목적 고지 주장. | ② 구상금 청구에서 乙의 항변: 甲이 丙에게 화해권고결정으로 배상 → 소송고지로 乙에게 참가 기회 부여. 乙이 불참 → 소송고지의 효력으로 乙은 화해권고결정의 내용이 잘못됐다는 주장 제한됨(민소§84). 따라서 乙의 항변 배척.","",3,"불법행위"],
  ["채권각론_Q015","CASE","[제13회 2문1-2] 甲과 丁이 '甲 사망 시 甲의 모든 재산을 丁에게 준다'는 증여계약서 체결. 甲이 이를 일방적으로 해제·철회하고자 함. 가능한가? (10점)",[],0,"사인증여(민§562): 증여자의 사망으로 효력이 발생하는 증여. 유증(§1065 이하)에 관한 규정을 준용(민§562 단서). | 해제 가능성: 일반 증여의 경우 이행 전에는 해제 가능(민§555). 사인증여는 이미 계약이 성립했으나 효력 발생이 사망시로 미뤄진 것 → 이행 전이므로 해제 가능(§555). | 철회 가능성: 유언 준용 → 유언 철회 자유(§1108). 단, 사인증여는 계약이므로 상대방 있는 행위 → 유언 철회 조항 그대로 적용할지 논의 있음. 다수설: 사인증여도 계약이므로 일방적 철회 원칙적 불가, 다만 해제 가능(§555). 결론: 이행 전이므로 해제 가능.","",2,"기타계약"]

const 총칙_QUIZ = [
  ["총칙_Q001","CASE","[제11회 1문1] 乙이 甲의 인장·서류를 이용해 위임장 만들고 甲의 대리인으로서 X건물을 丙에게 매도. 법원이 乙의 장기 관리+서류 보관 사실을 들어 甲에게 표현대리(민§125) 인정. ① 丙의 피고추가신청(乙 추가) 적법성, ② 법원의 판결은? (20점)",[],0,"① 피고추가신청: 표현대리 책임(甲 주위적)+무권대리인 책임(乙 §135 예비적) → 예비적 공동소송으로 피고추가 가능. 원고가 예비적 공동소송 취지를 밝히면 적법. | ② 판결: 甲에 대해 표현대리 성립 → 소유권이전등기 청구 인용. 乙에 대한 §135 예비적 청구는 주위적 청구 인용으로 기각.","",3,"대리"],
  ["총칙_Q002","CASE","[제12회 2문3-2] 乙이 甲(남편) 부재 중 甲의 인감도장 무단 사용하여 X토지를 丁에게 매도. 丁은 '乙과 중개인이 남편 인감도장+등기필정보 소지' 설명 들음. 丁의 주장: ① 일상가사대리(민§827), ② 표현대리(민§125). 타당한가? (25점)",[],0,"① 일상가사대리(민§827): 부동산 처분은 일상가사 범위 초과 → 부정. | ② 표현대리(민§125): 甲이 乙에게 대리권 수여 표시를 해야 함. 인감도장·등기필정보 보관 + 중개인 설명 → 대리권 표시의 외관 형성. 丁이 과실 없이 대리권 있다고 믿었는가 검토: 甲에게 직접 확인하지 않은 점 등 고려. 과실 없으면 표현대리 인정, 과실 있으면 부정.","",3,"대리"],
  ["총칙_Q003","CASE","[제14회 1문4-1] 甲이 乙에게 X토지 매도 위임(대리권 추단할 수 있는 직함 허락 → 민§125). 乙이 甲의 이익에 반하여 저가(시가 2억→1억)로 丙에게 매각. 丙은 乙의 배임 의도 알았음. 甲이 丙·丁(선의 전득자) 명의 등기 각 말소 청구. 법원의 판단? (25점)",[],0,"① 丙 명의 등기: 甲→乙 대리권 표시(민§125) → 표현대리 성립 가능. 그러나 乙의 배임적 대리 + 丙이 배임 의도 인지 → 대리행위 효력 부인(권리남용 또는 공서양속 위반). 甲→丙 계약 무효 → 丙 등기 말소 인용. | ② 丁 명의 등기: 丁은 선의·무과실. 丙→丁 양도는 甲→丙 무효에도 불구하고 丁 보호 필요. 부동산에서 선의취득 없음 → 원칙적으로 丁 등기도 말소. 단, 甲의 표현대리 효과가 丁까지 미친다면 보호 가능. 결론: 丁의 선의+무과실 인정 시 표현대리 효과로 丁 명의 등기 유효 → 말소 청구 기각.","",3,"대리"],
  ["총칙_Q004","CASE","[제10회 1문1] 甲회사 30억 공사대금 확정판결(2007.3.10.) 취득. 강제집행 없이 2017.3.15. 후소 제기. 乙이 2017.2.10. 30억 전액 변제(증명됨). ① 후소가 시효완성 후 재소라 부적법 항변, ② 변제로 채권 소멸 항변. 후소 법원의 판단? (15점)",[],0,"확정판결 채권의 소멸시효: 10년(민§165②). 2007.3.10.~2017.3.10. = 딱 10년 → 2017.3.15. 소 제기는 시효 완성(2017.3.10.) 후. | 시효완성 후 재소의 소의 이익: 확정판결 후 재소가 소의 이익 있는지. 판례는 확정판결 채권의 시효중단 위한 재소는 소의 이익 있음. 시효 완성 후라도 소의 이익 인정(채무자의 변제 등 본안 항변 판단 위해). | 乙의 변제 항변: 시효완성 이전(2017.2.10.)에 변제로 채권 소멸 → 본안 판단에서 청구 기각.","",2,"소멸시효"],
  ["총칙_Q005","CASE","[제12회 1문4-1] 甲이 乙에게 공사잔대금 3억 청구 소 제기(2021.11.1.) → 乙의 답변서 제출 전 소취하(2021.11.25.). 소취하서 乙에게 송달(2021.12.5.). 甲이 2022.5.28. 재소 제기. 乙이 공사잔대금 시효 소멸 항변. 타당한가? (15점)",[],0,"소취하와 시효중단(민§170): 소취하 시 소급하여 시효중단 효력 소멸. 단, 소취하 후 6개월 내 재소 제기 시 최초 소 제기 시에 시효중단 효력 인정(민§170②). | 기산: 소취하서 송달일(2021.12.5.)? vs 소취하서 제출일(2021.11.25.)? → 소취하의 효력 발생은 소취하서 제출 시. 6개월 = 2022.5.25. 재소 제기: 2022.5.28. → 6개월(2022.5.25.) 경과 → 시효중단 효력 없음. 결론: 乙의 시효 완성 항변 타당 → 공사잔대금채권(상사 3년 or 민 10년) 완성 여부 확인.","",3,"소멸시효"],
  ["총칙_Q006","CASE","[제14회 1문1] 甲이 불법행위(2020.5.1.) 손해 900만 중 600만 소 제기(2022.4.1.). '나머지에 관하여는 일부청구임을 명백히' 했음. 2024.6.1. 소극적 손해 200만 추가 청구. 乙의 소멸시효 완성 항변. 법원의 판단? (25점)",[],0,"불법행위 소멸시효 3년(민§766). 2020.5.1. 사건 → 2023.5.1. 만료. | 일부청구와 시효중단: 일부청구 소 제기 시 나머지 부분에 대한 시효중단 효력 인정되려면 소장에 '전체 청구의 일부임을 명백히' 해야 함. 이 사건은 명백히 일부 청구임을 표시 → 판례상 나머지 부분(포함된 소극적 손해 200만)에도 시효중단 효력 인정 가능. 따라서 2022.4.1. 소 제기로 나머지 손해에도 시효중단. 2024.6.1. 청구변경 적법. 결론: 시효 완성 항변 배척 → 추가 청구 인용.","",3,"소멸시효"],
  ["총칙_Q007","CASE","[제15회 2문1-1,2] 甲이 乙에게 1억 2천만 원 대여(2012.5.1., 변제기 2013.5.1.). 丙 소유 X토지에 근저당권 설정(2013.6.1.). 乙이 2013.7~2015.6 매월 200만 변제. 2024.4.28. 근저당권 경매신청. 丙이 소멸시효 완성 주장. 甲의 반박: ① 선행 소송 승소 판결로 시효중단, ② 乙의 일부변제+경매신청으로 시효중단. (각 10점)",[],0,"① 선행 소송 승소(2021.6.): 확정판결 → 시효중단+10년 재기산. 그러나 선행 소송 당사자: 甲과 丙(물상보증인). 물상보증인에 대한 판결은 주채무자(乙)의 시효에 영향 없음. 물상보증인 丙에 대해서는 판결로 시효중단+재기산 → 丙에 대한 시효는 미완성. | ② 乙의 일부변제(2013.7~2015.6.): 채무 승인 → 시효중단. 2015.6.1.부터 재기산. 10년: 2025.6.1. 아직 미완성. 경매신청(2024.4.28.): 강제집행에 준하는 시효중단(민§174). 乙에 대해 시효중단 효력. 물상보증인 丙에 대해서도 효력? → 근저당권 실행 경매는 피담보채무 존재 전제 → 丙에게도 시효중단 효력 인정(판례). 결론: 두 주장 모두 인정 → 丙의 항변 배척.","",3,"소멸시효"],
  ["총칙_Q008","CASE","[제13회 2문1-3] 甲이 丁과 혼인(2012.). 丁이 혼인 전 성폭력 피해로 자녀 A 출산(입양 보내 관계 단절). 甲에게 고지 안 함. 甲이 혼인취소(민§816③ 사기) 주장. 타당한가? (10점)",[],0,"민§816③: 사기에 의한 혼인취소. '사기'는 혼인 의사표시에 영향을 미치는 적극적 기망 또는 고지의무 있는 사항의 침묵. | 고지의무 범위: 혼인생활에 직접 영향을 미치는 중요 사항에 한함. A는 입양 보내 관계 단절 → 혼인생활에 직접 영향 미치지 않음. 성폭력 피해 경위는 정상참작 가능. | 고지의무 없는 사정의 침묵 → 사기 불성립. 결론: 혼인취소 사유 해당 않음.","",2,"의사표시"]

const 물권_QUIZ = [
  ["물권_Q001","CASE","[제12회 2문1] 甲이 A로부터 Y토지 매수 시 乙 명의로 등기(3자간 계약명의신탁). 이후 甲의 채권자 丙이 甲→乙→丙 약정으로 乙로부터 직접 이전등기. A가 丙에게 진정명의회복 소유권이전등기 청구. 丙 항변: ① 부동산실명법§4③의 '제3자', ② 실체관계 부합. (25점)",[],0,"3자간 명의신탁(계약명의신탁): A-乙 매매계약 + 甲·乙간 명의신탁약정. A가 명의신탁 사실 모른 경우 → A-乙 매매계약 유효 → 乙이 Y토지 소유권 취득. | 丙의 ① §4③ 제3자 주장: 乙로부터 취득한 丙은 '명의신탁약정에 따른 등기'의 무효를 알지 못한 제3자에 해당. 그러나 이 사건에서 乙→丙 이전은 甲→丙 약정(甲이 대물변제로 丙에게 Y토지 이전)에 기한 것 → 丙은 甲의 명의신탁 사정을 알고 있음 → 선의의 제3자 아님. | 甲에게 소유권 없으므로 '실체관계 부합' 항변도 불성립. A의 청구 인용.","",3,"물권변동"],
  ["물권_Q002","CASE","[제14회 2문3] 甲·乙 간 명의신탁약정(2004.) + 반환약정. 乙이 丙으로부터 甲 자금으로 X토지 매수+乙 명의 등기(2004.9.). 추가1: 丙은 명의신탁 사실 모름. 甲이 ① X토지 반환약정에 기한 이전등기 청구, ② 간접점유 20년으로 취득시효 완성 주장. (20점)",[],0,"① 반환약정 유효성: 명의신탁약정(부동산실명법§4①) 무효. 반환약정은 명의신탁약정의 이행약정에 불과 → 별도 효력 없음. 반환약정에 기한 소유권이전등기 청구 기각. | ② 취득시효(간접점유): 甲이 乙의 직접점유를 통해 X토지를 간접점유. 취득시효는 자주점유 요건 → 명의신탁자의 경우 소유 의사 인정 가능. 2004.9.9.~2024.9.9. = 20년 → 취득시효 완성. 甲이 乙에게 취득시효 완성 원인으로 소유권이전등기 청구 가능. 단, 등기청구의 상대방은 현재 등기명의인.","",3,"물권변동"],
  ["물권_Q003","CASE","[제11회 1문2] 甲이 2000.3.3. 乙로부터 X토지 매수+점유 이전, 미등기. 乙 사망(2018.) → 丙·丁 상속. 丙이 위조 분할합의서로 전체 단독 등기(2018.9.). 甲이 2021.12. 주위적 매매/예비적 취득시효 소유권이전등기 청구. 매매 미증명, 점유 증명. (20점)",[],0,"① 주위적 청구(매매) 기각: 乙로부터 매수 미증명 → 기각. | ② 예비적 청구(점유취득시효): 2000.3.3. 점유 개시. 20년 경과일: 2020.3.3. 甲은 소유 의사로 평온·공연 점유. 취득시효 완성. 등기청구 상대방: 현재 등기명의인 丙. 丙이 위조 분할합의서로 취득했더라도 현재 등기명의인이므로 甲은 丙에게 이전등기 청구. 결론: 취득시효 완성 원인 소유권이전등기 청구 인용.","",2,"소유권"],
  ["물권_Q004","CASE","[제13회 2문1-1] 乙이 甲의 X토지 서류 위조하여 2002.2. 이전등기. 丙이 乙로부터 X토지 매수(2004.5.)+등기(선의). 현재까지 소유 의사로 평온·공연·선의·무과실 점유. 甲이 2024.1. 乙에게 '丙으로부터 받은 매매대금 1억 부당이득' 청구. (15점)",[],0,"등기부취득시효(민§245②): 丙이 2004.5. 등기 취득 후 10년(2014.5.) 이상 선의·무과실 점유 → 취득시효 완성, 丙이 X토지 소유권 취득. | 甲의 乙에 대한 부당이득: 乙의 위조행위로 甲이 소유권 상실, 乙이 丙으로부터 1억 취득 → 부당이득 성립. 단, 소멸시효: 甲이 사실 안 날(2020.4.23.)부터 3년 = 2023.4.23. 소멸. 소 제기(2024.1.) → 시효 완성 후. 결론: 소멸시효 완성 → 청구 기각.","",2,"소유권"],
  ["물권_Q005","CASE","[제15회 2문2] 丁이 X토지 등기서류 위조 후 자기 명의 등기(2021.2.). 乙이 丁으로부터 매수+이전등기(2022.2.). 乙이 3천만 원 투입하여 상업용지 개발+Y건물 신축. Y건물 경매→丙이 경락. 甲이 乙에게 X토지 진정명의회복 소유권이전등기+인도 청구(제1소송). 乙이 甲에게 유익비 3천만 청구(제2소송). (15점)",[],0,"제1소송: 甲이 真正所有者. 乙은 丁(무권리자)으로부터 취득 → 소유권 취득 불가. 甲의 진정명의회복 소유권이전등기 청구 인용. X토지 인도청구도 인용. | 제2소송(유익비): 乙은 점유자(선의: 소유권 취득 신뢰). 유익비 상환청구권(민§203②): 현재 가치 증가분 존재 시 甲이 상환 의무. 단, 동시이행 항변(민§320 유추): 甲의 인도청구와 乙의 유익비 청구는 동시이행관계. 제1소송과 제2소송은 별도이나 결과적으로 甲이 인도받음과 동시에 유익비 지급.","",2,"점유권"],
  ["물권_Q006","CASE","[제14회 2문3-2(추가2)] 甲(2004.9.9.~X토지 실제 점유)이 2024.10. 사망. 아들 丁이 단독상속+X토지 계속 점유. 丁이 '甲의 점유취득시효 완성 → 丁이 소유권 취득' 주장. 丙이 명의신탁 사실 알았는지 불명. (10점)",[],0,"甲의 취득시효 완성: 2004.9.9. 점유 개시, 20년 경과: 2024.9.9. 甲 사망(2024.10.10.) 이전 → 취득시효 완성. | 丁의 상속: 甲의 취득시효 완성에 기한 소유권이전등기청구권(채권)을 상속. 丁이 乙에게 이전등기 청구 가능. | 명의신탁자의 취득시효: 부동산실명법의 무효 효과와 무관하게 독립적으로 취득시효 완성 인정(판례). 결론: 丁의 주장 타당.","",2,"소유권"],
