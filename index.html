  ["채권총론_P116", "84다카188", "임대인 동의 없는 임차권 양도 一 임차권 양수인은 임대인을 대위할 수 X,", "[判例] 임대인 동의 없는 임차권 양도 一 임차권 양수인은 임대인을 대위할 수 X,\n\n（인도청구 X）••• 양수인은 임대인에게 임차권 양도로 대항 X [84다카188]\n\n正辯 : 대위소송은 피보전채권 부존재로 각하될 것으로 생각됨\n\n나. 보전의 필요성\n—", "", [], 0, "채권자대위", 28, "미분류"],
  ["채권총론_P117", "2013다71784", "“피보전채권과 피대위권리가 밀접한 관련 있고, 피보전채권의 현실적 이행의", "[判例] “피보전채권과 피대위권리가 밀접한 관련 있고, 피보전채권의 현실적 이행의\n유효 • 적절한 확보 위해 대위행사가 필요하면（적극적 요건）, 채무자 재산관리 자유에\n부당한 간섭되는 등 특별한 사정 없는 한（소극적 요건）” [2013다71784]", "", [], 0, "채권자대위", 28, "미분류"],
  ["채권총론_P118", "93다289", "여관 • 상가 교환계약 해제 사건은 밀접한 관련 없음이 명백하여 각하 [93다289]", "[判例] 여관 • 상가 교환계약 해제 사건은 밀접한 관련 없음이 명백하여 각하 [93다289]", "", [], 0, "채권자대위", 28, "미분류"],
  ["채권총론_P119", "", "@ 소이—소이등 ex. 순차매도, 시효완성자로부터의 매수인", "[判例]\n\n@ 소이—소이등 ex. 순차매도, 시효완성자로부터의 매수인\n© 소이—말소\n\nex. 반사회적 이중매매, 중간생략등기형 명의신탁의 명의신탁자,\n\n매매 • 취시완성 목적물에 불법등기\n© 인도一인도 ex 임차인 • 미등기매수인 • 취시완성자가 불법점유자 상대로\n\n철거一인도,\n\n인도一철거\n\n-", "", [], 0, "채권자대위", 28, "미분류"],
  ["채권총론_P120", "2010다4359", "공동매수인 1인이 매도인에 대한 소유권이전등기청구권을 피보전채권으로 원매", "[判例] 공동매수인 1인이 매도인에 대한 소유권이전등기청구권을 피보전채권으로 원매\n도인 상대로 소유권이전등기청구권을 대위행사할 경우, 자기 매수지분 범위 내에서만\n\n대위 O, 자기 지분 초과 부분은 보전의 필요성 X （일부각하） [2010다4359刀", "", [], 0, "채권자대위", 28, "미분류"],
  ["채권총론_P121", "2013다25217", "부동산 취득시효 완성자의 공동상속인 1인이 소유자에 대한 소유권이전등기", "[判例] 부동산 취득시효 완성자의 공동상속인 1인이 소유자에 대한 소유권이전등기\n청구권을 피보전채권으로 무효등기 명 의자를 상대로 소유자의 말소등기 청구권을\n\n대위행사할 경우, “자신의 지분 범위 내에서만 대위 O, 자기 지분 초과 부분은 보전\n의 필요성 X （일부각하）” [2013다25217]", "", [], 0, "채권자대위", 28, "미분류"],
  ["채권총론_P122", "75다1086", "피보전채권이 금전채권이라면 변론종결 당시 채무자 무자력 사실을 채권자가", "[判例] 피보전채권이 금전채권이라면 변론종결 당시 채무자 무자력 사실을 채권자가\n주장 • 입증해야 [75다1086]\n\n正辯 : 금전채권자는 채무자의 일반재산으로 만족을 받을 것인데 채무자의 특정한 권리 행사에 간\n섭하는 것은 원칙적으로 보전의 필요성이 없으므로, 채무자가 무자력인 경우만 허용한 것", "", [], 0, "채권자대위", 28, "미분류"],
  ["채권총론_P123", "2008다76556", "채권자대위 요건 ‘무자력’은 변제자력 없음 의미, 임의변제 기대할 수 없다면", "[判例] 채권자대위 요건 ‘무자력’은 변제자력 없음 의미, 임의변제 기대할 수 없다면\n\n강제집행 통한 변제 고려 一 부동산에 이미 제3자의 소유권이전청구권보전 가등기\n마쳐있다면 강제집행 통한 변제 사실상 불가능하여, 가담법에 정한 담보가등기로서\n\n강제집행 통한 매각 가능하다는 등 특별한 사정 없는 한, 위 부동산은 실질적 재산\n\n가치 없고 적극재산에서 제외[2008다76556]\n-", "", [], 0, "채권자대위", 29, "미분류"],
  ["채권총론_P124", "80다1351; 68다663; 88다카4253", "금전채권임에도 예외적 무자력 불요 : “밀 • 현 • 간 인정된다면”", "[判例] 금전채권임에도 예외적 무자력 불요 : “밀 • 현 • 간 인정된다면”\n\n@ 국가배상법 : 국가배상 피해자를 치료한 의료인이 피해자를 대위 [80다1351]\n© 유실물법 : 실제 습득자가 법률상 습득자를 대위 [68다663]\n© 임대차보증금반환채권 양수인 : 양수금청구에 대하여 임대인이 동시이행항변 권\n\n행사하므로（v 채권양도의 동일성） 양수인이 임대인을 대위하여 임차인에 대해 임대차\n\n목적물 인도청구 할 때 임대인（채무자）의 무자력은 불요 ••• 피보전채권과 피대위권\n리가 동시이행관계이므로 밀 • 현 • 간 O, 임대인 자력 무관하므로 [88다카4253]\n\n@ 수임인의 대변제청구권（688조 2항） : A회사의 이사 甲이 업무로 인하여 B에 대한\n\n대출채무를 부담하게 되어 甲이 A의 상계권을 대위행사할 때 A 무자력 불요 •/ 대변\n제청구권은 통상의 금전채권과는 다름 [2001다52506]\n-", "", [], 0, "채권자대위", 29, "미분류"],
  ["채권총론_P125", "2019다229202; 2018다879", "보험금 지급사유 아닌 경우, 보험자가 피보험자에 대한 금전채권인", "[大判全合2022] 보험금 지급사유 아닌 경우, 보험자가 피보험자에 대한 금전채권인\n부당이득반환채권 보전하기 위해 피보험자（채무자）를 대위하여 요양기관（제3채무자）\n\n을 상대로 진료비 상당 부당이득반환채권 행사할 때 채무자 자력 있다면 보전의 필\n\n요성 x •.• 대위 않으면 피보전채권 만족 못 받을 위험 X, 밀접한 관련성도 X, 다\n른 채권자보다 우선하여 채권자평등 위배, 피보험자 자유로운 재산관리 부당한 간섭\n\n[2019다229202]\n\n正辯 : 당시 5인의〈반대의견〉은 밀접한 관련성과 현실적 이행 유효 적절 수단이며 부당한 간섭 아\n니라면서 채무자 무자력 필요 없이 대위 가능하다는 의견\n\n- [大判全合202이 공유물분할청구권은 일신전속권 아니고 피대위권리 O —> 그러나\n금전채권 보전 위한 부동산 공유물분할청구권 대위행사는 보전 필요성 X •/ 책임\n\n재산 보전과 직접적 관련 X, 현실적 이행 유효• 적절 확보 필요 X, 부당한 간섭 —\n극히 예외적으로만 인정 一 채무자 지분이 다른 지분과 함께 공동근저당권 목적이고\n피담보채권이 채무자 지분 초과하여 채무자 지분만 경매하면 남을 가망 없어 경매\n취소（민집법 102조）, 공유물분할 방법으로 전부 경매하면 368조 1항 의해 채무자 지\n\n분에서 피담보채권 분담액 변제하고 남을 가망 있더라도 마찬가지 [2018다879]\n\n正辯 : 위 전합에는 남을 가망 없다면 보전의 필요성 인정하자는〈반대의견〉이 있었음", "", [], 0, "채권자대위", 29, "미분류"],
  ["채권총론_P126", "2000다55171", "채권자가 채무자 상대로 @ 이행청구 패소 확정 一 채권자가 ④를 보전하기", "[判例] 채권자가 채무자 상대로 @ 이행청구 패소 확정 一 채권자가 ④를 보전하기\n위하여 제3채무자에 대해 대위소송하면 보전의 필요성 X — 각하 V 피보전채권에\n기판력 생겨 더 이상 청구 X [2000다55171]", "", [], 0, "채권자대위", 30, "미분류"],
  ["채권총론_P127", "2011다108095", "대위소송이 피보전채권 ©의 부존재 이유로 각하 확정 - 채권자가 채무자", "[判例] 대위소송이 피보전채권 ©의 부존재 이유로 각하 확정 - 채권자가 채무자\n상대로 @ 이행청구 후소에 기판력 X v “대위소송의 기판력은 채무자가 알았을 때\n\n대위소송의 소송물인 피대위권리 존부에 관하여 채무자에게 미친다는 것이지, 대위\n소송의 소송요건인 피보전채권의 존부에 관하여 당사자가 아닌 채무자에게 기판력\n이 미치는 것은 X ” [2011다108095]\n\n다. 채무자의 권리 불행사\n-", "", [], 0, "채권자대위", 30, "미분류"],
  ["채권총론_P128", "92다32876", "채무자가 부적당한 소송으로 패소（기각） 확정돼도 대위소송은 당사자적 격 없", "[判例] 채무자가 부적당한 소송으로 패소（기각） 확정돼도 대위소송은 당사자적 격 없\n\n으므로 각하 [92다32876]\n\n—", "", [], 0, "채권자대위", 30, "미분류"],
  ["채권총론_P129", "2018다210539", "비법인사단이 사원총회 결의 없이 제기한 총유재산에 관한 소는 소제기 특별", "[判例] 비법인사단이 사원총회 결의 없이 제기한 총유재산에 관한 소는 소제기 특별\n수권 결하여 부적법, 비법인사단의 소제기 의사결정 없음 一 각하 확정된다면 채무\n\n자（비법인사단） 스스로 권리 행사한 것 X — 비법인사단의 채권자의 대위소송은 적\n법 O [2018다210539]\n\n正辯 : 채무자가 기각으로 패소확정 된 경우와 구별할 것", "", [], 0, "채권자대위", 30, "미분류"],
  ["채권총론_P130", "2022스613", "이혼 재산분할청구권은 채권자대위 X, 파산재단 X •Z 권리자 인격적", "[判例2022] 이혼 재산분할청구권은 채권자대위 X, 파산재단 X •Z 권리자 인격적\n이익 위하여 자유로운 의사결정에 전적으로 맡겨진 행사상 일신전속성, 순전한 재산\n\n법적 행위 X, 채무자 재산 현재보다 악화 X, 협의-심판으로 구체적 내용 형성 전\n에는 구체적 권리 아니어서 책임재산 X [2022스613]", "", [], 0, "채권자대위", 30, "미분류"],
  ["채권총론_P131", "2009다93992", "유류분반환청구권은 권리자에게 확정적 권리행사 의사 인정되지 않는 한", "[判例] 유류분반환청구권은 권리자에게 확정적 권리행사 의사 인정되지 않는 한\n채권자대위 X •.• 권리자 인격적 이익 위하여 자유로운 의사결정에 전적으로 맡겨\n\n진 행사상 일신전속성 [2009다93992]", "", [], 0, "채권자대위", 30, "미분류"],
  ["채권총론_P132", "69다268", "피해자가 즉사하여도 위자료청구권은 상속 O [69다268]", "[判例] 피해자가 즉사하여도 위자료청구권은 상속 O [69다268]", "", [], 0, "채권자대위", 30, "미분류"],
  ["채권총론_P133", "2011다10052", "청약 X, 승낙 X （채무자에게 이미 확정적 의사 있는 특별한 사정 없는 한）", "[判例] 청약 X, 승낙 X （채무자에게 이미 확정적 의사 있는 특별한 사정 없는 한）\n... 일신전속적 인 것은 아니나 새로운 권리의무관계 발생 [2011다10052刀\n\n- 채권적 청구권에 한하지 않고,", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P134", "67다2440; 2000다73049", "형성권 0（상계권, 해제 • 해지권 [2006다8270이.", "[判例] 형성권 0（상계권, 해제 • 해지권 [2006다8270이.\n환매권, 공유물분할청구）,\n\n물권적 청구권,\n\n채권자대위권 [67다2440],\n\n채권자취소권\n\n（“제소기간 준수는 대위의 목적인 권리의 채권자인 채무자를 기준으로 그가 안 날로\n\n부터 1년 내에 행사하여야” [2000다73049]", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P135", "2012다75239", "소송법상 권리 O — 그러나 채무자• 제3채무자 사이 소송 계속된 이후의 소", "[判例] 소송법상 권리 O — 그러나 채무자• 제3채무자 사이 소송 계속된 이후의 소\n송수행 관련 개개의 소송상 행위 x ••• 소송당사자인 채무자의 의사\n\n상소제기 X, 재심의 소 제기 X [2012다75239]", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P136", "93마1655", "본안의 제소명령 신청권, 제소기간 도과 의한 가압류.가처분 취소신청권 o", "[判例] 본안의 제소명령 신청권, 제소기간 도과 의한 가압류.가처분 취소신청권 o\n••• 가압류• 가처분 절차와 별개 독립된 소송절차 개시 권리 [93마1655]", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P137", "2008다75072", "채권자는 채무자의 이행인수인에 대한 청구권을 대위행사 O [2008다75072]", "[判例] 채권자는 채무자의 이행인수인에 대한 청구권을 대위행사 O [2008다75072]", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P138", "2011다10950", "채무자의 일반 채권자는 독자적으로 소멸시효 주장 X, 그러나 자기 채권을 보", "[判例] 채무자의 일반 채권자는 독자적으로 소멸시효 주장 X, 그러나 자기 채권을 보\n전하기 위해 필요 한도에서 채무자를 대위하여 소멸시효 주장 O [2011다10950이\n\n正辯 : 배당이의 소송에서 소멸시효 원용권을 대위한 사안", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P139", "2022다230165", "채권자가 대출금 지체 이유로 임차인을 대위하여 공공임대주택 임대차", "[判例2022] 채권자가 대출금 지체 이유로 임차인을 대위하여 공공임대주택 임대차\n계약 해지 x ••• 헌법 35조 3항과 주거기본법 2조, 공공주택 특별법의 경제적 약자\n\n주거권 보장 취지, 공공주택 특별법 해지사유는 강행규정이므로 중도 해지 및 인도\n\n약정은 무효, 특별법 적용되는 임대차에서 임차인의 중도 해지권은 행사상 일신전속\n권,[2022다230165]", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P140", "2023다301682", "채권자대위권은 제3채무자에 대해 채무자에게 일정한 급부행위를 하라", "[判例2024] 채권자대위권은 제3채무자에 대해 채무자에게 일정한 급부행위를 하라\n고 청구함이 원칙 — 다만 급부수령 필요한 금전지급 • 물건인도나 등기말소의 경우에\n는 채권자에게도 급부 수령권한 O, 채권자에게 행한 급부 효과가 채무자에게 귀속\n\nO, 예외적으로 채권자가 제3채무자에 대해 직접 자신에게 급부행위 하도록 청구 O\n그러나 채무자가 제3채무자에게 채권양도 구할 권리 있고 채권자가 이를 대위행사할\n경우는 직접청구 예외 X, 채권자는 제3채무자에 대해 ‘채무자에게’ 채권양도절차 이\n행하도록 청구해야 O, 직접 ‘자신에게’ 채권양도 이행할 것 청구 X V 채무자에게\n\nPART 1\n\n채권총론 • 채권자대위권 • 31\n\n이행하면 채무자에게 채권이 귀속되어 별도 급부수령 불필요, 채권자에게 양도하면\n채권이 이전되어 대위행사 효과가 채무자 아닌 채권자에게 귀속 [2023다301682]", "", [], 0, "채권자대위", 31, "미분류"],
  ["채권총론_P141", "2015다236547", "금전채권 보전하기 위해 채무자의 금전채권을 대위행사하는 채권자는 제3채", "[判例] 금전채권 보전하기 위해 채무자의 금전채권을 대위행사하는 채권자는 제3채\n무자로 하여금 직접 대위채권자 자신에게 지급의무 이행하도록 청구할 수 있고\n제3채무자로부터 변제 수령할 수 O ■— 대위소송에서 제3채무자로부터 직접 금전\n\n지급받는 판결 확정되어도 （대위채권자의 채권자가） 이러한 채권에 대하여 받은\n압류명령은 무효 ••• 피대위채권이 대위채권자에게 이전•귀속 X, 추심권능 내지\n변제수령권능은 자체로서 독립적 처분•환가 X, 압류 X [2015다236547]", "", [], 0, "채권자대위", 32, "미분류"],
  ["채권총론_P142", "73다1086", "W 채무자가 채권자의 소유권이전등기말소청구권 대위행사 사실을 안 때에", "[判例] W 채무자가 채권자의 소유권이전등기말소청구권 대위행사 사실을 안 때에\n\n는 그 소유권이전등기의 원인된 매매계약을 추인하더라도 405조 2항에 의하여 그\n추인의 유효 주장 X [73다1086]\n\n正辯 ： 무권리자의 처분행위 혹은 무권대리에 대하여 추인하는 것도 405조 2항의 ‘처분’ O", "", [], 0, "채권자대위", 32, "미분류"],
  ["채권총론_P143", "2011다87235", "채무불이행으로 법정해제 되게 한 것은 405조 2항의 ‘처분’ 아니므로 통", "[大判全合] 채무불이행으로 법정해제 되게 한 것은 405조 2항의 ‘처분’ 아니므로 통\n지받은 후 채무 불이행함으로써 약정 자동해제되거나 제3채무자가 법정해제한 경우\n제3채무자는 해제로써 채권자에게 대항 O V ® 채무불이행 사실 자체가 채권 소멸\n\n시키는 적극적 행위 X, ® 법정해제는 채무불이행에 대한 정당한 법적 대응, © 채\n권 압류 • 가압류된 경우도 채권 발생원인인 기본계약 해제 인정한 판례\n\n그러나 실질적으로 합의해제이면서 형식적으로만 법정해제처럼 보이거나 외관을 만\n든 특별한 사정 있다면 처분이므로 대항 X [2011다87235]\n\n-", "", [], 0, "채권자대위", 32, "미분류"],
  ["채권총론_P144", "2015다236547", "대위소송에서 제3채무자로부터 직접 대위채권자에게 금전지급 판결 확정되", "[判例] 대위소송에서 제3채무자로부터 직접 대위채권자에게 금전지급 판결 확정되\n더라도 변제 등으로 소멸되기 전에는 채무자의 다른 채권자가 （가）압류 O\n\nV 채권자는 채무자를 대위하여 피대위채권（집행채권）에 대한 변제를 수령할 뿐이며\n\n자신의 채권에 대한 변제로서 수령하는 것 X\n\nBut 채무자가 대위소송 사실 통지 받거나 알게 된 후 피대위채권에 대한 전부명령\n은, 우선권 있는 채권에 기한 것이라는 특별한 사정이 없는 한, 무효 V 민집법 229조\n\n5항 유추적용（전부명 령 송달 전에 다른 채권자가 압류 • 가압류 • 배당요구한 경우 전부\n명령은 무효）, 추심소송과 공통점 있는 대위소송의 무익화, 대위채권자의 압류 • 가압\n류 • 배당요구 등 채권배당절차 참여할 기회 박탈, 405조 2항 채권자대위권 실질 효\n과 확보 취지 [2015다236547]\n\n正辯 : 실제로 압류가 경합되지 않았음에도 ‘대위소송 제기 사실을 채무자가 아는 상황’을 그에 준\n하는 것으로 보아 민집법 229조 5항을 유추적용한 판결 — 이 경우에도 전부명령만 무효가 되고", "", [], 0, "채권자대위", 32, "미분류"],
  ["채권총론_P145", "2006다85921", "매수인의 소이등청구권 보전 처분금지가처분신청을 매수인의 채권자가 대위행", "[判例] 매수인의 소이등청구권 보전 처분금지가처분신청을 매수인의 채권자가 대위행\n\n사해도 처분금지가처분의 피보전권리인 소이등청구권 행사한 것이므로 매수인이 이\n러한 대위행사 알고 매매 합의해제한 후 해제로 대항 X [2006다85921]", "", [], 0, "채권자대위", 33, "미분류"],
  ["채권총론_P146", "96그8", "688조 준용으로 비용상환청구 O [96그8]", "[判例] 688조 준용으로 비용상환청구 O [96그8]", "", [], 0, "채권자대위", 33, "미분류"],
  ["채권총론_P147", "92다35899", "대위소송에서 제3채무자는 피보전채권의 소멸시효 주장 X ••• 소멸시효 원용", "[判例] 대위소송에서 제3채무자는 피보전채권의 소멸시효 주장 X ••• 소멸시효 원용\n은 직접수익자만 가능하기 때문이기도 [92다35899]", "", [], 0, "채권자대위", 33, "미분류"],
  ["채권총론_P148", "2007다64471", "그러나 채권자가 채무자 상대로도 피보전채권의 이행청구소송 제기했고 그", "[判例] 그러나 채권자가 채무자 상대로도 피보전채권의 이행청구소송 제기했고 그\n절차에서 채무자가 소멸시효 항변한 것이 대위소송에 현출되어 법원이 심리한 결과\n\n소멸시효 완성으로 판단되면 채권자는 대위할 권한 X — 각하 [2007다64471]\n-", "", [], 0, "채권자대위", 33, "미분류"],
  ["채권총론_P149", "2013다5530", "“대위소송에서 제3채무자는 채무자의 채권자에 대한 항변권 • 형성권 등과 같이", "[判例] “대위소송에서 제3채무자는 채무자의 채권자에 대한 항변권 • 형성권 등과 같이\n권리자에 의한 행사를 필요로 하는 사유로 다툴 수 X, 그러나 피보전채권의 발생\n\n원인인 법률행위가 무효라거나 피보전채권이 변제 등으로 소멸했다는 사실로 다툴\n\nPART 1\n\n채권총론 • 채권자대위권 • 33\n\n수 O, 이 경우 법원은 제3채무자의 주장 고려하여 피보전채권 인정 여부를 직권 심\n\n리 • 판단하여야” — 각하 [2013다5530이\n\n-\n\n正辯 : 실제로 압류가 경합되지 않았음에도 ‘대위소송 제기 사실을 채무자가 아는 상황’을 그에 준\n하는 것으로 보아 민집법 229조 5항을 유추적용한 판결 — 이 경우에도 전부명령만 무효가 되고", "", [], 0, "채권자대위", 33, "미분류"],
  ["채권총론_P150", "95다18741", "채권자의 채무자에 대한 소송에서 채무자 인낙 一 대위소송에서 제3채무자는", "[判例] 채권자의 채무자에 대한 소송에서 채무자 인낙 一 대위소송에서 제3채무자는\n채무자가 인낙하여 증명된 피보전채권 존재 다툴 수 X [95다18741]", "", [], 0, "채권자대위", 34, "미분류"],
  ["채권총론_P151", "94다39369", "대위소송에서 채권자는 피보전채권 존재, 보전 필요성, 기한도래 증명 -", "[判例] 대위소송에서 채권자는 피보전채권 존재, 보전 필요성, 기한도래 증명 -\n\n피보전채권의 발생원인 X, 제3채무자에게 대항할 수 있는 사실 X [94다39369]\n—", "", [], 0, "채권자대위", 34, "미분류"],
  ["채권총론_P152", "2017다228618", "채권자가 채무자 상대로 피보전채권 이행청구 승소판결 확정됐다면, 특별한", "[判例] 채권자가 채무자 상대로 피보전채권 이행청구 승소판결 확정됐다면, 특별한\n\n사정 없는 한 제3채무자에 대한 관계에서도 피보전채권 발생원인인 사실관계 증명\n된 것 O — 그러나 대위소송을 주목적으로 확정판결 •화해조서 이뤄졌고 강행법규\n\n위반 무효라면. 판결 • 화해가 （준）재심으로 취소되지 않았더라도, 대위소송의 제3채\n\n무자에 대한 관계에서는 피보전권리 존재 않는 것 一 제3채무자는 피보전권리 부존\n\n재 주장 O, 당사자적격 없는 대위소송은 각하 [2017다228618]\n\n正辯 : 혹정판결 등은 그 내용이 강행법규 위반이어도 （준）재심으로 취소되지 않는 한 기판력 있으", "", [], 0, "채권자대위", 34, "미분류"],
  ["채권총론_P153", "2009다4787", "“채권자는 자기와 제3채무자 사이의 독자적 사정에 기한 사유 주장 X ’ — 채", "[判例] “채권자는 자기와 제3채무자 사이의 독자적 사정에 기한 사유 주장 X ’ — 채\n무자와 제3채무자 사이 무효 가등기 유용합의에 따른 부기등기 하기 전에 부동산에\n\n가압류 등기한 채권자가 채무자를 대위하여 제3채무자에게 말소 X [2009다4787]\n\n正辯 : 제3채무자가 채무자에게 유용합의로써 대항할 수 있으니 대위채권자에게도 대항할 수 있다\n는 취지이므로 대위소송은 ‘기각’될 것으로 보임（환송 후 판결은 강제조정되었음）.", "", [], 0, "채권자대위", 34, "미분류"],
  ["채권총론_P154", "2020다223781", "임대차보증금반환채권의 근질권자가 갱신 없는 임대차 종료 주장하며", "[判例2020] 임대차보증금반환채권의 근질권자가 갱신 없는 임대차 종료 주장하며\n\n임대인（한국토지주택공사）을 대위하여 임차인 상대로 아파트 인도청구 一 임대인\n은 갱신거절 의사표시 없고 갱신 존속 중임을 전제로 임차인에게 증액보증금 납부\n\n청구하여 임차인이 이행했다면, 임대인은 갱신거절 주장 X — 근질권설정계약상\n\n‘임대차계약 갱신은 채권자 동의 필요’ 규정은 채권자와 제3채무자 사이 독자적 사정\n이므로 주장 x •■• 채권자대위는 채무자가 주장할 사유 내에서만 주장해야, 임대인\n갱신거절 않아 묵시적 갱신된 것은 질권 목적인 보증금반환채권 자체가 아닌 이를 발\n\n생시킨 기본적 계약관계에 관한 사유로서 질권설정자（임차인）가 채권 자체 소멸\n\n시키거나 질권자 이익 해하는 변경\n\nx（352조 X）— 근질권자 인도 대위청구 기각\n\n[2020다223781]\n\n正辯 : 보증금반환채권 질권자가 임대인에 대한 직접청구권（353조）을 보전하기 위해 임대인의\n인도청구 대위행사하는 사안이며, 통상 채권질권 사안은 채권양수인과 유사한 구조 一 채권질권\n\n자•양수인의 직접청구권 •양수금채권 보전을 위한 인도청구 대위행사는 채무자인 임대인의 무자력", "", [], 0, "채권자대위", 34, "미분류"],
  ["채권총론_P155", "2016다1045", "@9 사해행위 당시 액수• 범위 구체적 확정되지 않았어도 피보전채권 o", "[判例] @9 사해행위 당시 액수• 범위 구체적 확정되지 않았어도 피보전채권 o\n\n[2016다1045]", "", [], 0, "사해행위취소", 36, "미분류"],
  ["채권총론_P156", "95다27905", "장래의 채권도 “사해행위 당시 이미 채권성립 기초 발생, 가까운 장래", "[判例] 장래의 채권도 “사해행위 당시 이미 채권성립 기초 발생, 가까운 장래\n\n채권이 성립되리라는 고도의 개연성, 실제로 채권이 성립한 경우에는 채권자취소권\n의 피보전채권 O” [95다27905]\n\n@ 구상보증 사건 :", "", [], 0, "사해행위취소", 36, "미분류"],
  ["채권총론_P157", "97다34334", "사해행위 당시 아직 보증인이 보증채무 이행하지 않아", "[判例] 사해행위 당시 아직 보증인이 보증채무 이행하지 않아\n구상권 • 구상보증채권 발생하지 않았으나 당시 주채무자 재정 악화로 그가 보증채무\n\n이행할 개연성 높았다면 장래의 구상보증채권을 해치는 것 O [97다34334]\n® 연대보증서류 사건 :", "", [], 0, "사해행위취소", 36, "미분류"],
  ["채권총론_P158", "2002다42957", "2~3일 간격으로 은행에 연대보증서류 제출 一 사해", "[判例] 2~3일 간격으로 은행에 연대보증서류 제출 一 사해\n\n행위 一 연대보증 서명을 하였다면 개연성 O [2002다42957]\n© 계속적 물품공급 사건 :", "", [], 0, "사해행위취소", 36, "미분류"],
  ["채권총론_P159", "2022다272046", "계속적 물품공급계약 자체로 당사자의 채권이", "[判例2023] 계속적 물품공급계약 자체로 당사자의 채권이\n바로 성립\n\nX, 주문자가 구체적 물품공급 의뢰하고 상대방도 공급하는 별개 법률관계\n\n성립해야 채권 성립 - 사해행위 당시 계속적 물품거래관계 존재했다는 사정만으로\n\n채권 성립 기초 법률관계\n\nX\n\n（물품 수량•단가 등을 구체적으로 미리 정했거나 일정\n\n한도에서 공급자 외상 물품 공급 의무 규정하지 않은 이상） [2022다272046]\n\n正辯 : A와 B 사이에 구체적 수량 단가 거래시기 정하지 않고 물품공급계약 체결한 상태에서 b가", "", [], 0, "사해행위취소", 36, "미분류"],
  ["채권총론_P160", "2004다40955", "신용카드가입계약 체결로 카드 발급받고 사해행위 후 카", "[判例] 신용카드가입계약 체결로 카드 발급받고 사해행위 후 카\n\n드 사용하여 카드대금 연체한 경우는\n\n[2004다40955]\n\n正辯: 사해행위취소소송에서는 피보전채권의 부존재도 기각 o, 각하 x （十 채권자대위소송）", "", [], 0, "사해행위취소", 36, "미분류"],
  ["채권총론_P161", "2004다5822", "사해행위 이전에 성립된 채권이 사해행위 이후에 채권양도 있거나 대항요건", "[判例] 사해행위 이전에 성립된 채권이 사해행위 이후에 채권양도 있거나 대항요건\n\n을 갖추더라도 양수인의 채권자취소권의 피보전채권 O [2004다5822]", "", [], 0, "사해행위취소", 37, "미분류"],
  ["채권총론_P162", "2016다272311", "사해행위 후 채권자가 취소원인 알면서 피보전채권 양도하고 양수인이 채권", "[判例] 사해행위 후 채권자가 취소원인 알면서 피보전채권 양도하고 양수인이 채권\n\n자취소권을 행사할 경우 제척기간은 ‘양도인’이 안 날 기준 [2016다272311]\n\n正辯 : 양도인이 ‘알면서’ 양도한 경우에 양도를 계기로 제척기간이 새로 진행하는 것은 아니라는\n취지로서 이는 채권양도의 동일성 때문으로 보이며（私見）, 해당 판결을 가지고 항상 ‘양도인’의 인", "", [], 0, "사해행위취소", 37, "미분류"],
  ["채권총론_P163", "2025다211379", "채무자 사해행위 이후에 보증인이 보증책임 이행하여 변제자대위 법리로", "[判例2025] 채무자 사해행위 이후에 보증인이 보증책임 이행하여 변제자대위 법리로\n\n보증인에게 피보전채권 이전되었어도 보증인은 종래 채권자의 채권자취소권 행사 O,\n채권 이전 시점에 피보전채권 새로 발생한 것 아님 [2025다211379] = 채권양도\n\n-", "", [], 0, "사해행위취소", 37, "미분류"],
  ["채권총론_P164", "2001다13532", "@31 피보전채권 추가 • 변경은 공방 변경 一 제척기간 무관 [2001다13532]", "[判例] @31 피보전채권 추가 • 변경은 공방 변경 一 제척기간 무관 [2001다13532]\n-", "", [], 0, "사해행위취소", 37, "미분류"],
  ["채권총론_P165", "2015다224469", "旦31 사해취소 • 원상회복 확정되어도 피보전채권 소멸하면 청구이의 O [2015다224469]", "[判例] 旦31 사해취소 • 원상회복 확정되어도 피보전채권 소멸하면 청구이의 O [2015다224469]", "", [], 0, "사해행위취소", 37, "미분류"],
  ["채권총론_P166", "98다5669", "이중매매 : 제1매수인은 제2매수인을 상대로 채권자취소권 X [98다5669이", "[判例] 이중매매 : 제1매수인은 제2매수인을 상대로 채권자취소권 X [98다5669이\n@ 매매 소유권이전등기청구권을 피보전채권으로 x ••• 금전채권 아니므로 “채권자취\n\n소권을 특정물에 대한 소유권이전등기 청구권을 보전하기 위해 행사 X”\n® 이행불능으로 인한 손해배상채권을 피보전채권으로 X ••• 사해행위 이후에 발생,\n“기 • 개 • 실 예외에 해당하지 X\n\n- 이혼 재산분할청구권 O （제839조의3） : 부부 일방이 다른 일방의 재산분할청구권\n행사를 해함을 알면서 재산권 목적 법률행위 한 경우 다른 일방은 406조 준용으로\n\n취소 및 원상회복을 가정법원에 청구 O\n\n나. 사해행위\n- 사해행위 : 채무자가 채권자를 해함을 알고 재산권 목적으로 한 법률행위\n-", "", ["제839조의3"], 0, "사해행위취소", 37, "미분류"],
  ["채권총론_P167", "97다50985", "통정허위표시로서 무효인 법률행위도 채권자취소 O [97다50985]", "[判例] 통정허위표시로서 무효인 법률행위도 채권자취소 O [97다50985]\n\n正辯 : 허위표시 제3자가 선의여도（108조 2항） 전득자로서 사해행위에 악의인 것은 별개\n— 채무자 : 보증인 • 연대보증인의 행위 O, 물상보증인 X", "", [], 0, "사해행위취소", 37, "미분류"],
  ["채권총론_P168", "2003다13246", "연대보증인의 법률행위 사해성 판단에는 주채무자의 일반적 자력 고려 X", "[判例] 연대보증인의 법률행위 사해성 판단에는 주채무자의 일반적 자력 고려 X\n\nPART 1\n\n채권총론 • 채권자취소권 • 37\n\n[2003다13246] cf.", "", [], 0, "사해행위취소", 37, "미분류"],
  ["채권총론_P169", "2000다21017", "주채무에 관하여 근저당권으로 우선변제권 확보되었다면", "[判例] 주채무에 관하여 근저당권으로 우선변제권 확보되었다면\n연대보증인의 유일한 재산 처분은 사해행위 X [2000다21017]", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P170", "2025다211379", "피보전채권에 보증인 등 인적 담보 붙어 있더라도, 주채무자 법률행위의", "[判例2025] 피보전채권에 보증인 등 인적 담보 붙어 있더라도, 주채무자 법률행위의\n\n사해성 판단에 보증인 등의 변제자력은 고려 X, 법률 근거한 보증기금의 신용보증\n이더라도 마찬가지, 오로지 주채무자 자신의 자력만 고려 [2025다211379]", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P171", "2011다29307", "상속의 승인 • 포기 X V 순수한 재산적 행위는 X, 인정하면 법률관계 복잡,", "[判例] 상속의 승인 • 포기 X V 순수한 재산적 행위는 X, 인정하면 법률관계 복잡,\n상속인 재산 현재보다 악화는 아님 [2011다29307]", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P172", "2018다260855", "유증의 포기 X V 유언자 사망 후 언제든 유증의 승인 • 포기 자유 및 그 소급", "[判例] 유증의 포기 X V 유언자 사망 후 언제든 유증의 승인 • 포기 자유 및 그 소급\n\n효（1074조）, 재산 현재보다 악화는 아님 [2018다260855]", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P173", "2013다84162", "영업양도를 사해행위취소 O - 영업 동일성 유지한 채 회복이 어려우면 영", "[判例] 영업양도를 사해행위취소 O - 영업 동일성 유지한 채 회복이 어려우면 영\n업재산• 영업권 포함된 일체로서의 영업의 가액반환 O [2013다84162]\n\n- 사해성 :", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P174", "", "“채무자 일반재산이 감소하여 채권 공동담보에 부족이 생겨 완전한", "[判例] “채무자 일반재산이 감소하여 채권 공동담보에 부족이 생겨 완전한\n변제 할 수 없게 되는 것” = “채무초과（무자력） 상태 초래되거나 이미 빠져있던 채무\n초과（무자력） 상태가 악화되는 경우”\n\n- 무자력은 사해행위 당시 기준 （다만, 변론종결시까지 유지되어야）\n—", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P175", "2019다281156", "‘사해행위’의 채무초과 판단의 소극재산은 사해행위 전에 발생되어야", "[判例2022] ‘사해행위’의 채무초과 판단의 소극재산은 사해행위 전에 발생되어야\n\n— 그러나 사해행위 당시 이미 채무 성립 기초 법률관계 성립, 가까운 장래 채무 성\n립 고도 개연성, 실제로 채무 성립했다면 그 채무도 채무자의 소극재산 포함 O\n\n— 채무 성립 기초 법률관계는 약정뿐 아니라 준법률관계•사실관계 O, 계약 교섭\n상당 진행으로 계약체결 고도 개연성 단계도 포함 O [2019다281156]\n\n正辯 : 사해행위로 주장되는 토지 • 건물 양도에 대한 양도소득세 • 지방소득세 채무는 통상적으로 매\n매대금 완납 이후 비로소 발생하여 사해행위 당시 발생 X, 채무 성립 기초가 이미 성립되지도 X,\n채무 성립 고도 개연성도 X, 양도계약 교섭 진행되었어도 양도소득세 • 지방소득세 채무 성립 위한", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P176", "2023다237804", "재산처분 당시 적극재산 산정에서 실질적 재산가치 없어 공동담보 역할", "[判例2023] 재산처분 당시 적극재산 산정에서 실질적 재산가치 없어 공동담보 역할\n할 수 없는 재산은 제외, 재산이 채권이면 용이하게 변제받을 확실성 긍정될 경우만\n\n적극재산 포함 스 어떤 채권의 존부. 범위 증명 있다면, 변제받을 확실성 없어 실질\n\n적 재산가치 없다는 점을 취소채권자가 주장•증명책임\n채무자가 여러 채권자 중 일부에게만 채무 이행과 관련하여 채무보다 적은 가액의\n\n다른 채권 기타 적극재산을 양도하여 채무초과 유발되었는지 판단함에 있어 양도된\n\n재산을 적극재산에서 제외했다면, 위 채무 중 양도된 재산과 같은 금액에 해당하는\n부분도 소극재산에서 제외하여야 [2023다237804]", "", [], 0, "사해행위취소", 38, "미분류"],
  ["채권총론_P177", "2007다54849", "처분행위 당시 무자력이었으나 그 후 채무자가 자력 회복하여 사실심 변론종", "[判例] 처분행위 당시 무자력이었으나 그 후 채무자가 자력 회복하여 사실심 변론종\n결시에 해하지 않게 된 사정변경은 채권자취소소송의 피고가 입증해야 一 자력회복\n되면 보전의 필요성 X, 채권자취소권 소멸 [2007다54849] ■— 기각\n\n-", "", [], 0, "사해행위취소", 39, "미분류"],
  ["채권총론_P178", "2014다230894", "공유지분에 담보가등기 설정했다가 공유물분할로 단독소유가 된 부동산에", "[判例] 공유지분에 담보가등기 설정했다가 공유물분할로 단독소유가 된 부동산에\n‘전사’된 담보가등기에 관하여 사해행위취소 할 경우 특별한 사정이 없는 한 공유지\n분에 대한 담보가등기 설정 당시를 기준으로 사해행위 해당 여부 판단해야\n\nV 공유물분할은 형식적으로는 공유자 상호간 지분의 교환• 매매지만, 실질적으로는\n분산된 지분을 취득하는 특정 부분에 집중시 켜 소유형 태 변경한 것에 불과\n공유물분할 후 당초 지분에 담보가등기 설정한 공유자의 단독소유로 귀속된 부동산\n에 종전 담보가등기 대체하는 새로운 담보가등기 설정하고 다른 공유자 소유로 분할\n\n된 부동산에 전사된 담보가등기는 모두 말소한 경우 - 담보권설정자에 대한 채권자\n\n가 채권자취소권 행사하려면 공유물분할 자체가 사해행위라는 특별한 사정 없는 한,\n분할로 단독소유가 된 부동산에의 （새로운） 담보가등기설정계약을 취소하고 그 담보\n가등기의 말소를 구하는 방'법으로 [2014다230894]\n\n正辯 : 결국 사해행위 여부는 제1 담보계약 설정 당시를 기준으로 판단하되, 취소 대상인 사해행위\n는 제2담보계약으로 해야 하고（V 제1담보계약은 이미 해제됨, 제2담보계약은 제1담보계약을 대", "", [], 0, "사해행위취소", 39, "미분류"],
  ["채권총론_P179", "2019다266409", "W 가등기 원인 법률행위와 본등기 원인 법률행위가 다르지 않다면,", "[判例2021] W 가등기 원인 법률행위와 본등기 원인 법률행위가 다르지 않다면,\n\n사해행위 요건 구비 여부는 가등기 원인 법률행위 기준으로 판단해야 一\n\n그러나\n\n각 원인 법률행위가 다르면 사해행위 요건 구비는 본등기 원인 법률행위 기준으로\n\n판단해야, 제척기간도 본등기 원인 법률행위가 사해행위임을 안 때 一 채무자가\n유일한 재산인 부동산의 가등기 효력 소멸 상태에서 새로 매매계약 체결하고 말소\n\n해야 할 가등기를 기초로 본등기 마친 행위는 가등기 원인 법률행위와 별개로 일반\n채권자 공동담보 감소시키는 사해행위 O — 본등기 원인인 새로운 매매계약을 기\n준으로 사해행위 여부나 제척기간 준수 여부 판단해야 [2019다266409]\n\n正辯 : 자력이 있는 A는 B와 X부동산의 매매예약 체결하여 B에게 가등기 경료해주고 매매예약\n완결일로부터 10년 지나 가등기 원인 소유권이전등기청구권 소멸시효 완성 一 그 후 무자력인", "", [], 0, "사해행위취소", 39, "미분류"],
  ["채권총론_P180", "2012다118334", "•‘임대차보증금반환채권은, 장차 임대차 종료로 실제 성립하는 때 선순위권리", "[判例] •‘임대차보증금반환채권은, 장차 임대차 종료로 실제 성립하는 때 선순위권리\n존재나 연체차임 등으로 임차인의 현실적 반환 불가능이 합리적 예측되는 특별한 사\n\n정 없는 한, 애초의 보증금액 상당 가치대로 적극재산에 포함” [2012다118334]", "", [], 0, "사해행위취소", 40, "미분류"],
  ["채권총론_P181", "2004다58963", "압류금지재산은 적극재산에 포함시키지 X [2004다58963]", "[判例] 압류금지재산은 적극재산에 포함시키지 X [2004다58963]", "", [], 0, "사해행위취소", 40, "미분류"],
  ["채권총론_P182", "2002다23857", "연속한 수개의 처분행위는 각 행위마다 사해성을 개별적으로 판단 [2002다23857]", "[判例] 연속한 수개의 처분행위는 각 행위마다 사해성을 개별적으로 판단 [2002다23857]\nO -", "", [], 0, "사해행위취소", 40, "미분류"],
  ["채권총론_P183", "2013다60661", "“채권자에게 근저당권 설정되고, 담보물 가액 및 채권최고액이 당해 채무액", "[判例] “채권자에게 근저당권 설정되고, 담보물 가액 및 채권최고액이 당해 채무액\n을 초과（=채무 전액 우선변제권 확보）한다면, 채무자의 처분행위는 유일한 재산의\n\n처분이라 해도 사해행위 X, 그러나 만일 채무액이 부동산 가액 및 최고액을 초과한다\n면 우선변제받을 금액 공제한 나머지 채권액에 대해서만 채권자취소권 o - 피보전\n채권이 자신의 우선변제권의 범위 밖이라는 점은 취소채권자가 입증책임, 우선변제\n\n받을 금액은 처분행위 당시의 담보물 시가 기준으로 산정” [2013다60661]", "", [], 0, "사해행위취소", 40, "미분류"],
  ["채권총론_P184", "2016다263355", "EM 이때 담보물로부터 우선변제받을 금액은 사해행위 당시 기준으", "[判例2021] EM 이때 담보물로부터 우선변제받을 금액은 사해행위 당시 기준으\n\n로 담보물 가액에서 취소채권자에 앞서는 선순위 담보물권자가 변제받을 금액을 먼\n저 공제한 다음 산정해야 ― 취소채권자가 채무자 소유 부동산에 근저당권 설정했는\n데 사해행위 당시 채무자에 대해 근로기준법상 최우선변제권 있는 임금채권 이미 성\n\n립하여 임금채권자가 그에 기해 그 담보물에 압류• 가압류 등기 마치는 등 가까운 장래\n우선변제권 행사할 고도의 개연성 있고 실제로 그 개연성이 현실화된 경우, 취소채권\n\n자는 사해행위 당시 담보물로부터 우선변제 받을 수 없는 일반채권 발생할 고도의\n\n개연성이 가까운 장래 현실화된 것 一 그 일반채권도 채권자취소권 행사할 피보전\n채권 O - 사해행위 당시 기준 담보물 가액에서 우선변제권 있는 임금채권액을 먼\n\n저 공제한 다음 취소채권자가 우선변제받을 금액을 산정 一 취소채권자 채권액에서\n\n그 우선변제받을 금액을 공제한 나머지 채권액에 대해서만 채권자취소권 O [2016다263355]\n\n正辯 : 장래의 피보전채권에 관한 기 • 개 실 법리가 ‘물적 담보권자가 채권자취소권을 행사할 수 있\n는 피보전채권액의 범위’를 결정할 때도 적용되는 것（위 판결이 명시적 언급함）", "", [], 0, "사해행위취소", 40, "미분류"],
  ["채권총론_P185", "2009다549", "채권자가 전액 우선변제권 확보하고 있다면 보증인도 사전구상권을 피보전권", "[判例] 채권자가 전액 우선변제권 확보하고 있다면 보증인도 사전구상권을 피보전권\n\n리로 사해행위취소 X V 변제자대위 가능 [2009다549]", "", [], 0, "사해행위취소", 40, "미분류"],
  ["채권총론_P186", "2009다47852", "근저당권 설정된 주택의 경매개시 직전 보증금 최우선변제 임대차계약 체결", "[判例] 근저당권 설정된 주택의 경매개시 직전 보증금 최우선변제 임대차계약 체결\n\n— 근저당권자 피담보채 권액과 임대차보증금반환채무액이 경매절차 주택 감정가를\n초과하지 않고（=채무초과 X）, 소액보증금 최우선변제를 감안해도 근저당권자 채권\n\n전액 우선변제권 확보된다면, 임대차계약체결행위는 사해행위 X [2009다47852]\n\n正辯 : 만일 그렇지 않다면, 임대차계약체결행위가 선순위 저당권자에게도 사해행위가 될 수 있다\n는의미\nO -", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P187", "2000다42618", "저당권 설정된 부동산 매각할 경우 사해행위는 부동산 시가에서 채권최고액", "[判例] 저당권 설정된 부동산 매각할 경우 사해행위는 부동산 시가에서 채권최고액\n\n이 아닌 실제 발생해 있는 피담보채권액을 공제한 잔액 범위 내에서 성립 一 만일\n\n피담보채권액이 부동산 가액을 초과한다면 부동산양도는 사해행위 X [2000다42618]", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P188", "2003다39989", "만일 공동저당권이 설정된 수 개의 부동산 중 일부가 양도된 경우라면, 피담", "[判例] 만일 공동저당권이 설정된 수 개의 부동산 중 일부가 양도된 경우라면, 피담\n\n보채권액은 특별한 사정이 없는 한 공동저당권의 목적인 각 부동산의 가액에 비례하\n여 피담보채권액을 안분한 금액 ••- 368조 규정 취지 [2003다39989]", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P189", "2008다25671; 2012다5643", "그러나 공동저당권 목적인 수 개 부동산 중 일부 부동산 혹은 공유부동산 중", "[判例] 그러나 공동저당권 목적인 수 개 부동산 중 일부 부동산 혹은 공유부동산 중\n일부 지분이 물상보증인 또는 제3취득자의 소유인 경우라면, 채무자 소유 부동산의\n\n피담보채권액은 공동저당권의 피담보채권액 전액 O V 물상보증인•제3취득자는\n\n481조, 482조 변제자대위 O [2008다25671, 2007478234, 2012다5643]\n©", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P190", "2007다23081", "담보권 설정된 부동산에 대한 새로운 담보권 설정행위의 사해행위취소에서", "[判例] 담보권 설정된 부동산에 대한 새로운 담보권 설정행위의 사해행위취소에서\n만일 선순위 담보권 설정행위가 사해행위로 인정된다면（이미 취소 및 말소되었거나\n\n혹은 2개 담보권 사해행위취소 사건에서 선순위가 사해행위로 인정된 경우） 후순위\n\n담보권 설정행위의 사해행위 여부 판단에 있어 선순위 담보권 피담보채무액은 당해\n부동산에 설정된 담보권 피담보채무액에 포함시킬 수 X [2007다23081]\n-", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P191", "2016다208792", "저당권 피담보채권액이 시가를 초과했더라도 채무자가 목적물 양도에 앞서", "[判例] 저당권 피담보채권액이 시가를 초과했더라도 채무자가 목적물 양도에 앞서\n“자신의 출재로” 피담보채무 일부 변제하여 다시 초과하지 않게 되었다면 목적물 양\n도는 시가에서 잔존 피담보채권액 공제한 잔액 범위 내 사해행위 O. 변제가 양도계\n\n약 체결 후 등기 과정에서 이뤄졌어도 마찬가지 [2016다208792]\n\n正辯 : ‘사해행위’ 개념은 등기와 상관없는 ‘계약체결행위’로 볼 수 있는데, 판례는 일부 변제로 목\n적물 가치가 올라간 경우만큼은 실질적 관점에서 등기 시점을 기준으로 보았다고 해석됨", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P192", "2017다287891", "W 근저당권 피담보채권액 • 채권최고액이 모두 시가를 초과한다면 일반 채", "[判例] W 근저당권 피담보채권액 • 채권최고액이 모두 시가를 초과한다면 일반 채\n권자들의 공동담보인 책임재산 없으므로 부동산 양도는 사해행위 X — 채무자가 근\n저당권 설정된 부동산을 처분하면서 “매 매대금으로” 우선변제 권자인 근저당권자의\n피담보채무액 중 일부 변제하고 근저당권 말소한 경우 특별한 사정 없는 한 부동산\n\nPART 1\n\n채권총론 • 채권자취소권 • 41\n\n처분행위는사해행위 X [2017다287891]\n\n正辯 : 채무자가 사해행위인 부동산 매각에 앞서 근저당권을 말소한 재원이 별도 자금인지 그 매각\n대금인지에 따라 결론 달라진 것으로 보임. 사해행위 후 수익자 등이 변제한 사안과 구별\n\n-", "", [], 0, "사해행위취소", 41, "미분류"],
  ["채권총론_P193", "2017다254891", "ED 신탁부동산에 대한 위탁자의 신탁계약상 수익권은 일반채권자들의", "[判例2021] ED 신탁부동산에 대한 위탁자의 신탁계약상 수익권은 일반채권자들의\n공동담보（책임재산） O - 신탁 존속 동안 위탁자가 언제든지 신탁계약 종료시키고\n\n절차에 따라 소유권이전등기 마칠 수 있는 경우는 위탁자의 신탁부동산에 관한 소유\n\n권이 전등기 청구권이 책임재산 O - 그러나 신탁계약상 신탁부동산 처분에 수익권\n자 동의 받도록 정했다면 수익권자 동의 받거나 받을 수 있는 등 특별한 사정 없는\n한 실질적 재산가치 없어 적극재산 X — 신탁재산에 대한 후순위 수익권의 가치는\n\n장차 신탁 종료시 예상되는 신탁재산 가액에서 소요비용, 신탁보수, 우선수익자들에\n대한 채무를 공제한 나머지 금액을 사해행위 당시의 현가로 할인하는 방식으로 평가\n해야 O, 단순히 사해행위 당시 신탁재산 시가 X [2017다254891]\n\n正辯 : 위탁자 겸 후순위 수익권자에게 신탁부동산이나 그 소유권이전등기청구권이 재산가치 없다\n면（부동산 가액보다 선순위 채권액이 훨씬 컸음） 그 매각행위는 사해행위 X\n— 행위유형별 사해행위 성립 가부", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P194", "2003다1205", "채무자가 채무초과 상태에서 특정채권자에게 채무 본지에 따른 변제를 함", "[判例] 채무자가 채무초과 상태에서 특정채권자에게 채무 본지에 따른 변제를 함\n으로써 다른 채권자의 공동담보 감소 결과 되어도, 채무자가 특히 일부의 채권자\n와 통모하여 다른 채권자 해할 의사로 변제한 경우가 아닌 한, 변제는 원칙적으로\n\n사해행위 X V 채무 변제 구하는 것은 채권자의 당연한 권리행사, 채무자도 다른\n채권자 있다는 이유로 채무이행 거절 X - 기존 금전채무 변제에 갈음하여 다른\n금전채권 양도해도 사해행위 X [2003다1205]\n\n正辯 : 기존 금전채무에 대해 다른 금전채권으로 대물변제하는 채권양도는 사해행위 x", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P195", "2012다14975", "기존채무 변제 위해 소비대차계약을 체결하고 강제집행 승낙의 공정증서 작", "[判例] 기존채무 변제 위해 소비대차계약을 체결하고 강제집행 승낙의 공정증서 작\n성해도 사해행위 X — 매매계약 사해행위취소 • 원상회복으로 수익자가 채무자에게\n가지게 된 부당이득반환채권을 가지고 위 원상회복된 재산 강제경매절차에서 수익\n\n자는 배당요구 X ■•• 사해행위 이후 취득한 채권 [2012다14975]\n© 대물변제 O ：", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P196", "2007다18218", "채무초과 상태 채무자가 재산을 특정 채권자에게 대물변제나", "[判例] 채무초과 상태 채무자가 재산을 특정 채권자에게 대물변제나\n담보조로 제공하면 유일한 재산 아니 어도 원칙적 사해행위 O [2007다18218]", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P197", "2006다33357", "다만 우선변제권 있는 채권자에 대한 대물변제는 원칙적으로 사해행위 X", "[判例] 다만 우선변제권 있는 채권자에 대한 대물변제는 원칙적으로 사해행위 X\n\n[2006다33357]\n© 물적 담보 제공 O ：", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P198", "2017다4264072", "채무초과상태 채무자가 소유 재산을 채권자 중 한", "[判例2022] 채무초과상태 채무자가 소유 재산을 채권자 중 한\n\n사람에게 채권담보로 제공하는 행위는 특별한 사정이 없는 한 다른 채권자들에 대해\n사해행위 O — 다만 채무자가 자금난으로 사업 계속 어려운 상황에서 자금 융통하\n여 사업 계속 추진하는 것이 채무 변제력 갖는 최선이라 생각하여 부득이 특정 채권\n\n자에게 담보로 제공하고 신규자금 융통받았다면 사해행위 아닐 수 있음 — 전체 책\n\n임재산 중 해당 재산의 비율, 무자력 정도, 불가피 •유효적절 수단인지, 실제 변제나\n\n사업 계속 위해 사용되어 변제자력 생겼는지, 일부 채권자 통모하여 다른 채권자 해\n칠 의사 있었는지 등 종합적 고려해야 [2017다4264072]\n\n正辯 : 채무자가 사해행위인 부동산 매각에 앞서 근저당권을 말소한 재원이 별도 자금인지 그 매각\n대금인지에 따라 결론 달라진 것으로 보임. 사해행위 후 수익자 등이 변제한 사안과 구별", "", [], 0, "사해행위취소", 42, "미분류"],
  ["채권총론_P199", "2018다295103", "위 경우 채무자에게 사업 갱생이나 계속 추진의 의도가 있더라도 신규자", "[判例2022] 위 경우 채무자에게 사업 갱생이나 계속 추진의 의도가 있더라도 신규자\n\n금 융통 없이 단지 기존채무 이행 유예받기 위해 채권자 중 한 사람에게 담보 제공한\n행위는특별한사정 없는한 사해행위 O [2018다295103]\n\n正辯 : 의료병원 운영자 甲이 채무초과 상태에서 己저축은행으로부터 대출 받으면서 이에 대한 담", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P200", "66다1535", "“유일한 재산인 부동산 매각하여 소비하기 쉬운 금전으로 바꾸는", "[判例] “유일한 재산인 부동산 매각하여 소비하기 쉬운 금전으로 바꾸는\n행위는, 정당한 변제에 충당하기 위해 상당한 매각으로 이뤄지는 등 특별한 사정이\n없는 한, 사해행위 O, 채무자 사해의사추정 O [66다1535]", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P201", "2013다83992", "다만, 매각 목적이 변제나 변제자력 얻기 위함이고, 부당한 염가가 아니며,", "[判例] 다만, 매각 목적이 변제나 변제자력 얻기 위함이고, 부당한 염가가 아니며,\n실제로 변제에 사용하거나 변제자력을 유지한다면 一\n\nX （일부 채권자와 통모하여\n\n다른 채권자 해할 의사 아닌 한） [2013다83992]", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P202", "2018다223023", "EM 위와 같은 법리는 유일한 재산인 영업재산•영업권이 유기적 결합", "[判例2021] EM 위와 같은 법리는 유일한 재산인 영업재산•영업권이 유기적 결합\n된 일체로서 영업양도 할 경우도 마찬가지 [2018다223023]\n\n正辯 : 영업양도계약이 채무변제 목적으로 충분한 대가 받고 이뤄져 실제로 채무 변제에 사용된 경\n우 영업양도계약은 사해행위가 아니라는 판결\n@ 이혼 재산분할 :", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P203", "2000다63516", "“채무초과 상태에서 이혼 재산분할로 재산을 양도함으로써", "[判例] “채무초과 상태에서 이혼 재산분할로 재산을 양도함으로써\n\n공동담보 감소되었더라도, 839조의2 취지 따른 상당한 정도 벗어나 과대하다는 특\n별한 사정 없는 한 사해행위\n\nX, 단 상당 정도 초과부분은 사해행위 O, 여기서 상당\n\n정도 벗어난 과대한 재산분할 사실은 ‘채권자’ 입증책임” [2000다63516]", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P204", "2013다7936", "협의 •심판으로 구체화되지 않은 이혼 재산분할청구권의 포기는 사해행위", "[判例] 협의 •심판으로 구체화되지 않은 이혼 재산분할청구권의 포기는 사해행위\n\nX\n\nV 이혼 성립해야 비로소 발생하고 구체적 내용 형성 전에는 불명확•불확정하여\n채무자의 책임재산 X [2013다7936]\n® 상속재산 분할협의 :", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P205", "2000다51797", "“상속재산 분할협의는 상속재산 귀속 확정하는 재산권", "[判例] “상속재산 분할협의는 상속재산 귀속 확정하는 재산권\n\n목적 법률행위로서 사해행위취소 O - 채무초과인 채무자가 상속재산 분할협의 에서\n\n상속재산 권리를 포기함으로써 공동담보 감소되 었더 라도, 재산분할결과가 채무자의\n\nPART 1\n\n채권총론 • 채권자취소권 - 43\n\n구체적 상속분에 상당 정도 미달하는 과소한 것 아닌 한 사해행위 X — 구체적 상\n\n속분에 상당 정도 미달부분은 사해행위 O” （이유 中 : 기여분 등 구체적 상속분이\n법정상속분과 다르다는 사정은 ‘채무자’ 입증책임） [2000다51797]", "", [], 0, "사해행위취소", 43, "미분류"],
  ["채권총론_P206", "2007다73765", "유일한 상속재산의 상속분 포기하고 대신 소비하기 쉬운 현금을 지급받기로", "[判例] 유일한 상속재산의 상속분 포기하고 대신 소비하기 쉬운 현금을 지급받기로\n\n한 상속분할협의는 사해행위 O •/ 매각과 유사 [2007다73765]\n© 명의신탁행위 O :", "", [], 0, "사해행위취소", 44, "미분류"],
  ["채권총론_P207", "2002다69358", "채무초과상태에서 매수한 부동산의 등기명의를 아들에게", "[判例] 채무초과상태에서 매수한 부동산의 등기명의를 아들에게\n신탁하고 등기 마친 경우 명의신탁약정은 사해행위 O — 채권자는 수익자（아들） 및\n전득자를 상대로 사해행위취소 및 등기말소 O. 채무자를 대위하여 매도인을 상대\n\n로 소유권이전등기청구 O [2002다69358]\n\n正辯 : ① 3자간 명의신탁약정은 실명법상 무효임에도 사해행위 취소 긍정한 점（통정허위표시를", "", [], 0, "사해행위취소", 44, "미분류"],
  ["채권총론_P208", "2006다79704", "유효한 부부간 명의신탁에서 수탁자가 반환의무이행으로서 신탁자에게 등기", "[判例] 유효한 부부간 명의신탁에서 수탁자가 반환의무이행으로서 신탁자에게 등기\n를 마쳐주는 것은 사해행위 X V 기존채무 이행 [2006다79704]\n@", "", [], 0, "사해행위취소", 44, "미분류"],
  ["채권총론_P209", "2007다77446; 2009다90047", "부동산에 가압류등기 먼저 되고 근저당권설정등기 마친 경우 가압류채권자는", "[判例] 부동산에 가압류등기 먼저 되고 근저당권설정등기 마친 경우 가압류채권자는\n근저당권설정 행위를 사해행위 취소 X •/ 근저당권자는 선순위 가압류채권자에 대\n하여는 “우선변제권 주장 못하여 평등배당 받으므로 불이 익 無”\n\n다만 가압류채권자의 실제 채권액이 가압류 채권금액보다 많은 경우는 초과 부분에\n관하여는 가압류 효력 없으므로 그 범위 내에서 사해행위 취소 O [2007다77446]\n\n한편 위 근저당권이 타인을 위한 ‘물상보증’이었다면 가압류채권자는 저당권설정행\n\n위를 사해행위 취소 O V “책임재산이 새로이 감소”, 불이익 有 [2009다90047]\n©", "", [], 0, "사해행위취소", 44, "미분류"],
  ["채권총론_P210", "2003다19435", "수익자가 채무초과 채무자의 부동산에 설정된 선순위 담보가등기의 피담보", "[判例] 수익자가 채무초과 채무자의 부동산에 설정된 선순위 담보가등기의 피담보\n\n채무를 변제하여 가등기 말소하는 대신 동일한 금액을 피담보채무로 한 새로운 담보\n가등기 설정하는 것은 사해행위 X V 공동담보 부족하게 하는 것 X\n\n그러나 선순위 담보가등기 말소시킨 후 그 부동산에 관한 매매예약을 하고 소유권\n이전등기청구권 보전의 가등기를 마쳤다면, 시가에서 피담보채무액을 공제한 잔액\n범위 내에서 사해행위 O\n\n소유권이전등기청구권 보전 위한 가등기가 사해행위라면 매매예약 취소, 원상회복\n으로 가등기말소 O — 가등기 후 기존 저당권 말소됐거나, 그 피담보채무 일부 변제\n\n됐거나, 사실상 담보가등기였어도 마찬가지 [2003다19435]\n\n正辯 : 사해행위 후 기존 저당권이 변제로 말소되었어도 소유권이전등기가 확정적으로 넘어간 경\n우와 달리（후술） 사해행위로 가등기만 된 것이라면 가등기말소라는 원물반환이 적절\n@", "", [], 0, "사해행위취소", 44, "미분류"],
  ["채권총론_P211", "2017다4205073", "건물공유자가 공동으로 건물 임대하고 상가건물 임대차보호법상 대항력 및", "[判例] 건물공유자가 공동으로 건물 임대하고 상가건물 임대차보호법상 대항력 및\n우선변제권 갖춘 임차인으로부터 임차보증금 수령한 경우, 건물공유자 중 1인이 처\n분한 지분 중 ‘책임재산’은 우선변제권 있는 임차보증금반환채권 ‘전액’을 공제한 나\n\n머지 부분 -,• 공유자의 임대는 각 지분 임대가 아니라 목적물을 다수 당사자로서 공\n동임대한 것, 임차보증금반환채무는 성질상 불가분채무 O [2017다4205073]", "", [], 0, "사해행위취소", 45, "미분류"],
  ["채권총론_P212", "2024다312566", "전세권 성립 후 전세목적물 소유권 일부 지분 이전받은 새로운 공유자도", "[判例2025] 전세권 성립 후 전세목적물 소유권 일부 지분 이전받은 새로운 공유자도\n전세권자에 대해 공동전세 권설정자 지위에서 전세금반환의무 부담 O\n\n채권자취소권 행사는 사해행위 하지 않았다면 있었을 책임재산 회복, 더 많은 책임\n\n재산 회복 결과 초래는 불허, 일반채권자 공동담보 제공되지 않은 책임재산은 취소\n범위에서 제외되어야 一 공유물 주택에 주택임대차보호법 따라 임차보증금 우선변제\n권 가진 임차인 있고 공유자들 불가분채무인 임차보증금반환의무 부담하는 경우 공\n유자 1인인 채무자가 처분한 지분 중 일반채권자들 공동담보인 책임재산은 우선변제\n\n권 있는 임차보증금반환채권 ‘전액’ 공제한 나머지 부분\n전세목적물 일부 지분 이전되어 공유자들이 불가분채무인 전세금반환의무를 부담하\n\n게 된 이후 공유자 1인이 자기 지분 처분하여 사해행위 문제된 경우도 위 법리가 마\n\n찬가지로 적용 [2024다312566]\n®", "", [], 0, "사해행위취소", 45, "미분류"],
  ["채권총론_P213", "2015다56086", "신탁자가 부부간 유효한 명의신탁약정을 해지함을 전제로 다시 제3자에게 처", "[判例] 신탁자가 부부간 유효한 명의신탁약정을 해지함을 전제로 다시 제3자에게 처\n\n분하며 3자간 합의로 중간생략하고 곧바로 제3자에게 등기 마쳐준 경우, 사해행위\n\nO ••• 명의신탁 해지로 인한 신탁자의 소유권이전등기청구권도 책임재산인데, 제3\n자에게 등기함으로써 소멸하였으므로 [2015다56086]", "", [], 0, "사해행위취소", 45, "미분류"],
  ["채권총론_P214", "2017다237186,2018다27226", "채무자가 제3자로부터 자금 차용하여 부동산 매수하고 그 부동산을 차용금", "[判例] 채무자가 제3자로부터 자금 차용하여 부동산 매수하고 그 부동산을 차용금\n\n채무의 담보로 제공하거나, 채무자가 제3자로부터 부동산 매수하여 대금 지급 전에\n\n등기 마치고 해당 부동산을 매매대금채무의 담보로 제공한 경우에는 사해행위\n\nX\n\nv 공동담보 부족 생기지 X — 부동산매수와 담보제공이 한꺼번에 이뤄지지 않고\n단기간 순차로 이뤄졌어도 마찬가지 [2017다237186, 2018다27226]\n@ 그 밖의 사해행위 여부 :", "", [], 0, "사해행위취소", 45, "미분류"],
  ["채권총론_P215", "2003다50771", "채무초과 상태에서 유일한 주택에 주임법 8조 해당 주택임차권설정", "[判例] 채무초과 상태에서 유일한 주택에 주임법 8조 해당 주택임차권설정\n\nO •/\n\n주임법 8조 소액보증금 최우선변제권은 일종의 법정담보물권 부여 [2003다50771]\n\n正辯 : 사해행위 후 기존 저당권이 변제로 말소되었어도 소유권이전등기가 확정적으로 넘어간 경\n우와 달리（후술） 사해행위로 가등기만 된 것이라면 가등기말소라는 원물반환이 적절\n@  실명법과 부동산 매각행위의 사해행위 해당 여부 （후술）\n®ART 1", "", [], 0, "사해행위취소", 45, "미분류"],
  ["채권총론_P216", "2012마712", "소멸시효이익 포기행위 O V 부담하지 않아도 될 채무 새롭게 부담 [2012마712]", "[判例] 소멸시효이익 포기행위 O V 부담하지 않아도 될 채무 새롭게 부담 [2012마712]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P217", "2011다32785", "채권양도가 사해행위 아닌데 양도통지만 따로 사해행위는 X V 대항요건에", "[判例] 채권양도가 사해행위 아닌데 양도통지만 따로 사해행위는 X V 대항요건에\n불과 [2011다32785]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P218", "2015다19827", "666조 저당권 설정청구에 따른 저당권설정행위 X [2015다19827]", "[判例] 666조 저당권 설정청구에 따른 저당권설정행위 X [2015다19827]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P219", "2017다225268", "도급인이 수급인과 하수급인에게 공사대금 지급 못하자 리모델링 건물", "[判例2021] 도급인이 수급인과 하수급인에게 공사대금 지급 못하자 리모델링 건물\n에 관하여 미지급 공사대금을 채권최고액으로 근저당권설정 一 근저당권 피담보채\n\n권액이 공사대금채권과 같은 액수, 도급인•수급인•하수급인 합의한 것인데 수급인\n이 저당권설정청구권의 행사 주체 一 666조 저당권설정청구권 행사에 따른 근저당\n\n권설정이므로사해행위 X [2017다225268]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P220", "2016다279206", "건물 양도 위한 건축주명의변경 행위 O V 재산감소 [2016다279206]", "[判例] 건물 양도 위한 건축주명의변경 행위 O V 재산감소 [2016다279206]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P221", "2016다204783", "무자력의 채무자가 수익자가 제기한 소송에서 자백하는 등의 방법으로 패소", "[判例] 무자력의 채무자가 수익자가 제기한 소송에서 자백하는 등의 방법으로 패소\n\n판결 • 화해권고결정 확정시킴에 따라 소유권이전등기 마쳐준 경우, 소송절차 통해\n책임재산 이전한다는 채무자와 수익자 사이 이전합의 O [2016다204783]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P222", "95다51908,66다1535", "채무자 악의는 채권자 입증책임, 그러나 유일한 재산 매각은 추정 [95다51908, 66다1535]", "[判例] 채무자 악의는 채권자 입증책임, 그러나 유일한 재산 매각은 추정 [95다51908, 66다1535]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P223", "66다1535", "채무자 악의 입증되면 수익자• 전득자 악의 추정 O —> 수익자• 전득자가", "[判例] 채무자 악의 입증되면 수익자• 전득자 악의 추정 O —> 수익자• 전득자가\n자신의 선의 입증책임 [66다1535, 2006다5기이\n\n-", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P224", "97다57320", "특정 채권자 해칠 의사 필요 없고 “공동담보 부족 생긴다는 인식”이면 충분", "[判例] 특정 채권자 해칠 의사 필요 없고 “공동담보 부족 생긴다는 인식”이면 충분\n\n[97457320]\n—", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P225", "2023다234553", "사해행위취소소송에서 수익자의 선의 여부는 채무자와 수익자의 관계,", "[判例2023] 사해행위취소소송에서 수익자의 선의 여부는 채무자와 수익자의 관계,\n채무자.수익자 사이 처분행위의 내용•경위 •동기, 정상적 거래관계라는 자료 여부,\n처분행위 이후 정황 등 여러 사정 종합적 고려하여 합리적 판단해야\n\n사해행위취소소송에서는 수익자의 선의 여부만 문제 되고 수익자의 선의에 ‘과실’\n\n이 있는지 여부는 묻지 않음, 사해행위취소소송과 실질을 같이하는 채무자 회생\n및 파산에 관한 법률 391조 1호 고의부인의 행사도 마찬가지 [2023다234553]", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P226", "2024다305384", "가령 수익자가 채무자와 친인척관계 등 채무자 재산 상황 구체적 알 수", "[判例2025] 가령 수익자가 채무자와 친인척관계 등 채무자 재산 상황 구체적 알 수\n\n4B\n\n로스쿨민법의정석\n\n있는 특수한 관계 아닌 점, 수익자•채무자 거래관계가 정상적 범위 내이고 수익자가\n상당한 대가를 실제 지급하는 등 현저히 비합리적 •이례적 사정 없는 점, 물적 담보\n\n제공의 경우 ‘기존’ 채권에 관해 다른 일반채권보다 우선적 만족 얻기 위하여 담보\n\n제공 이뤄졌다고 볼 사정이 없는 점을 수익자가 증명하면, 특별한 사정이 없는 한\n\n수익자 선의 O [2024다305384]\n\n正辯 : 위 판결은 해당 거래관계 구체적 경위 •특성 고려 않은 채 일반적 거래관행과 어느 정도\n다르다는 사정만으로 현저히 비합리적 • 이례적 단정할 수 없고, 수익자가 사해행위 당시 채무자", "", [], 0, "사해행위취소", 46, "미분류"],
  ["채권총론_P227", "2004다6128", "수익자는 사해행위 당시에, 전득자는 전득행위 당시에 ‘채무자-수익자 사이", "[判例] 수익자는 사해행위 당시에, 전득자는 전득행위 당시에 ‘채무자-수익자 사이\n\n법률행위’의 사해성을 인식하는 것 一 전득행위의 사해성은 X [2004다6128이\n\n2. 행사\n— 자기 이름으로, 재판상 행사해야\n\n-", "", [], 0, "사해행위취소", 47, "미분류"],
  ["채권총론_P228", "2018다277785", "回9 사해행위취소소송은 형성의 소로서 판결 확정되어야 권리변동 효력", "[判例] 回9 사해행위취소소송은 형성의 소로서 판결 확정되어야 권리변동 효력\n생기지만 406조 1항은 취소판결 미확정 상태에서도 취소 효력 전제로 원상회복청구\n병합 제기 허용 •一 원고가 매매계약 등 법률행위에 기하여 소유권 취득했음을 전제\n로 피고를 상대로 일정한 청구하면, 피고는 원고의 소유권취득 원인인 법률행위가\n\n사해행위로 취소돼야 한다고 다투며 ‘반소’로써 사해취소 및 원상회복청구 O — 법\n\n원이 반소청구 이유 있다 판단하여 사해행위취소•원상회복 선고하면서 （사해행위\n\n판결 확정되지 않았어도） 원고 소유권취득이 취소되었음을 전제로 본소 심리 •판단\n하여 기각 O V 사해행위취소 여부는 반소 청구원인 + 본소청구에 대한 방어방법\n\n+ 본소청구 인용 여부의 선결문제, 본소• 반소가 동일절차 내에서 함께 심리 •판단되\n어 소송경제 •모순저촉회피 [2018다277785]\n\n正辯 : A가 B에게 금전 대여하고 B 소유 벤츠에 근저당권등록 一 브로부터 벤츠를 매수하여 소유\n권이전등록 한 C가 소유권자로서 A에게 근저당권등록 말소청구 스 A가 반소로 e를 상대로 B-C\n\n正辯 : 위 판결은 해당 거래관계 구체적 경위 •특성 고려 않은 채 일반적 거래관행과 어느 정도\n다르다는 사정만으로 현저히 비합리적 • 이례적 단정할 수 없고, 수익자가 사해행위 당시 채무자", "", [], 0, "사해행위취소", 47, "미분류"],
  ["채권총론_P229", "2005다5145", "여러 채권자가 동시 • 이시에 사해행위취소 구해도 증복제소 X, 한 채권자가", "[判例] 여러 채권자가 동시 • 이시에 사해행위취소 구해도 증복제소 X, 한 채권자가\n\n승소판결 확정되었어도 그 후 다른 채권자의 동일한 청구는 권리보호이익 有 （••• 채\n권자취소권 요건 갖춘 각 채권자는 ‘고유의 권리’로서 사해행위취소 • 원상회복 구할\n수 있으므로） / 이미 원상회복까지 마친 경우 비로소 중첩 범위에 권리보호이익 無\n（=채무자.수익자 사이에 사해행위가 ‘해제’되어 원상회복 마친 경우도 마찬가지）\n\n여러 채권자의 사해행위취소 및 원상회복청구 소 제기로 여러 개 소송이 계속 중\n인 경우 각 소송에서 각 채권자 청구에 따라 사해행위의 취소 및 원상회복 선고 O,\n“가액배상인 경우에 가액을 채권액 비례하여 채권자별 안분 반환 X, 반환 가액 범위\n\n에서 각 채권자 피보전채권액 전액 반환 명해야 O” [2005다5145刀\n\n正辯 : 이중지급 위험 있지만 수익자는 청구이의로 구제 가능", "", [], 0, "사해행위취소", 48, "미분류"],
  ["채권총론_P230", "20이다14108", "사해행위 취소만을 먼저 기간 내 제기하였다면 원상회복은 기간 경과하여 제", "[判例] 사해행위 취소만을 먼저 기간 내 제기하였다면 원상회복은 기간 경과하여 제\n\n기해도 적법 O [20이다14108]", "", [], 0, "사해행위취소", 48, "미분류"],
  ["채권총론_P231", "2004다17535", "수익자를 피고로 사해행위취소 승소 확정되었어도 전득자에 대하여 취소 및", "[判例] 수익자를 피고로 사해행위취소 승소 확정되었어도 전득자에 대하여 취소 및\n원상회복 구하려면 제척기간 안에 소 제기해야 V 수익자에 대한 판결의 효력은 소\n\n송의 피고가 아닌 전득자에게 미칠 수 X [2004다17535]\n\n正辯 : 제척기간 도과 후에 권리이전 받은 전득자 등장한 경우에도 마찬가지라는 것이 판례의 태도", "", [], 0, "사해행위취소", 48, "미분류"],
  ["채권총론_P232", "2007다69162", "이유 中 : 원상회복의 전제인 사해행위 취소가 없는 이상 원상회복청구권은", "[判例] 이유 中 : 원상회복의 전제인 사해행위 취소가 없는 이상 원상회복청구권은\n\n인정되지 않으므로 사해행위취소 없이 원상회복만 구할 수는 X [2007다69162]", "", [], 0, "사해행위취소", 48, "미분류"],
  ["채권총론_P233", "2018다271909", "채권자가 수익자• 전득자 공동피고로 채권자취소의 소 제기하며 청구취", "[判例2021] 채권자가 수익자• 전득자 공동피고로 채권자취소의 소 제기하며 청구취\n지로 ‘채무자.수익자 사이 사해행위취소’ 구하는 취지 명시 一 사해행위취소 청구취\n지를 수익자와 전득자로 분리하여 각각 기재하지 않았더라도 전득자에게도 사해행\n\n위취소 행사한 것 O [2018다271909]\n\n正辯 : 채권자 甲이 채무자 己. 수익자 內, 전득자 T. 전득자 프를 상대로 사해행위취소 소 제기하", "", [], 0, "사해행위취소", 48, "미분류"],
  ["채권총론_P234", "2011다82384", "“사해의 객관적 사실 안 것만으로는 X （등기를 열람", "[判例2023] “사해의 객관적 사실 안 것만으로는 X （등기를 열람\n\n한 것만으로는 X）, 채무자가 채권자를 해함을 알면서 사해행위 한 사실, 즉 사해의\n사 있는 사실을 안 날 O” 사해행위 객관적 사실 알았다고 취소원인 안 것 추정\n\nX,\n\n제척기간 도과 증명책임은 피고（수익자• 전득자）에게 [2002다23857, 2021 다309231]\n\n그러나 수익자나 전득자의 악의까지 알 필요는 없으며, 이미 채무자 재산상태 파악하\n고 있었다면 가압류하는 과정에서 제3자 명의 근저당권설정등기 마쳐진 사실을 확인\n\n함으로써 안날 O [2011다82384]", "", [], 0, "사해행위취소", 49, "미분류"],
  ["채권총론_P235", "2000다3262", "유일한 부동산 처분 사실을 알았다면 사해의사도 안 것 O [2000다3262]", "[判例] 유일한 부동산 처분 사실을 알았다면 사해의사도 안 것 O [2000다3262]", "", [], 0, "사해행위취소", 49, "미분류"],
  ["채권총론_P236", "2021다288020", "가까운 장래 채권 성립 고도 개연성 있어 예외적으로 피보전채권 인정", "[判例2022] 가까운 장래 채권 성립 고도 개연성 있어 예외적으로 피보전채권 인정\n하는 사안에서도 단기 제척기간 기산일은 취소원인 안 날\n\n사실 안 날\n\nO, 유일한 재산 처분\n\nO, 피보전채권 성립 시점 X — 추징금 납부의무자의 납부 피하려는\n\n재산처분행위도 사해행위취소•원상회복 O — 피고인에게 추징 명한 형사판결이\n\n확정되어 피보전채권 비로소 현실적 성립한 경우도 마찬가지 [2021다288020]\n\n正辯 : 사해행위취소 기산일은 추징보전명령 결정일 X, 유죄판결 확정일 x - 유죄 1심 판결 선\n고된 후 추징보전명령 청구일 무렵 0（공동담보 부족 알았음） 一 청구일로부터 1 년이 지났다면 유", "", [], 0, "사해행위취소", 49, "미분류"],
  ["채권총론_P237", "2013다50435", "법인의 대표자가 법인에 대해 불법행위를 한 경우에 불법행위 손해배상청구권", "[判例] 법인의 대표자가 법인에 대해 불법행위를 한 경우에 불법행위 손해배상청구권\n의 소멸시효 기산점과 마찬가지로 이를 피보전권리로 하는 사해행위 취소의 제척기\n\n간 기산점인 ‘취소원인을 안 날’도 “법인 이익 정당하게 보전할 다른 대표자나 임직\n\n원이 취소원인을 안 날” 기준 [2013다50435]", "", [], 0, "사해행위취소", 49, "미분류"],
  ["채권총론_P238", "2018다222747", "예금보험공사가 채권자취소권 행사하는 경우 피보전채권 추심 및 보전 등", "[判例] 예금보험공사가 채권자취소권 행사하는 경우 피보전채권 추심 및 보전 등\n에 관한 업무담당 직원의 인식을 기준으로 사해행위 제척기간 판단해야 一 예보\n가 파산관재인으로서 대리인 선임하였더라도 피보전채권 추심 •보전에 관하여 직접\n\n조사. 지시하는 경우에는 마찬가지 적용 [2018다222747]", "", [], 0, "사해행위취소", 49, "미분류"],
  ["채권총론_P239", "2000다73049", "채권자가 채무자의 채권자취소권을 대위행사 하는 경우 제소기간은 대위의", "[判例] 채권자가 채무자의 채권자취소권을 대위행사 하는 경우 제소기간은 대위의\n목적인 권리의 채권자인 채무자를 기준으로 해야 - 대위채권자가 취소원인을 안 지\n\n1년이 지났더라도, 채무자가 안 날로부터 1년, 법률행위 있은 날로부터 5년 내라면\n채권자취소의 소 제기 O [2000다73049]", "", [], 0, "사해행위취소", 49, "미분류"],
  ["채권총론_P240", "2013다7987", "여러 부양의무자 중 부양의무 이행한 의무자 1인이 다른 의무자 상대로 가지는", "[判例] 여러 부양의무자 중 부양의무 이행한 의무자 1인이 다른 의무자 상대로 가지는\n과거의 부양료청구권에 대한 침해 이유로 채권자취소권 행사하는 제척기간 기산점\n\n은 취소원인 안 날 1년 법률행위 있은 날 5년 O, 부양료청구권이 협의 • 심판으로 구\n\n체적 권리 성립한 시기\n\nX [2013다7987이\n\n-", "", [], 0, "사해행위취소", 50, "미분류"],
  ["채권총론_P241", "2020다265808; 2000다457139", "법률행위 있은 날부터 5년 제소기간 도과 여부는 법원이 직권 조사해야", "[判例2021] 법률행위 있은 날부터 5년 제소기간 도과 여부는 법원이 직권 조사해야\n\n- 상속재산분할협의를 사해행위로 취소하는 소의 제소기간 기산점은 특별한 사정\n없는 한 등기부상 등기원인일자 O\n\nV 처분문서에 기초 [2020다265808]\n\n正辯 : 상속재산분할협의 원인 소유권이전등기는 등기 예규상 피상속인 사망일을 등기원인일자로\n하고, 특히 본 사건은 등기접수일자가 등기원인일자보다 약 2년 뒤였던 점을 고려하면, 위 판결은\n\n취소채권자에게 지나치게 불리하다는 비판 여지 있음\n\n나. 상대방\n\n— 수익자 또는 전득자 （채무자는 피고적격\n\nX）\n\n① 악의一악의\n\n수익자에 대한 가액배상청구 or 수익자 및 전득자에 대한 각 원물반환청구（부동산인\n경우 전득자, 수익자 등기 순차말소）\n\n② 악의一선의\n수익자에 대한 가액배상청구 or ‘전득자에게 영향 없는’ 원물반환청구\n[\n\n判例] 사해행위 후 목적물에 제3자가 저당권 • 지상권 취득한 경우에는 수익자 싱대\n\n로 가액배상 O V 제한 없는 상태로 회복 어렵다면 원물반환 불가능 • 현저곤란\n그러나 “채권자 스스로 위험 • 불이익 감수하면서 원물반환 O - 수익자 등기의 말소\n혹은 채무자 앞 직접 소유권이전등기 O” [2000다457139]\n\n正辯: 저당권을 취득한 전득자가 선의인 경우 말소 구할 수 없으나 수익자 명의 소유권이전등기 말\n\n正辯 : 전득자를 상대로 채무자에의 진명소이등을 명시적으로 허용한 대법원 판례는 아직 없으나,\n수익자를 상대로 채무자에의 진명소이등을 긍정한 판례는 있음 一 [99453704]", "", [], 0, "사해행위취소", 50, "미분류"],
  ["채권총론_P242", "97다10864", "사해행위 취소 범위는 다른 채권자가 배당요구 할 것이 명백하거나 목", "[判例] 사해행위 취소 범위는 다른 채권자가 배당요구 할 것이 명백하거나 목\n\n적물이 불가분인 경우처럼 특별한 사정 있다면 취소채권자 채권액 넘어서도 취소 O\n\n[97다10864]", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P243", "74다2114", "W 동일인 소유 토지와 지상건물 처분행위를 사해행위 취소할 경우 대지 가", "[判例] W 동일인 소유 토지와 지상건물 처분행위를 사해행위 취소할 경우 대지 가\n액이 채권액보다 다액이어도 전부 취소해야 •/ 하나만 취소하면 소유자 달라져서 효\n용 현저히 감소 [74다2114]\n\n-", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P244", "2006다1442", "가액배상인 경우 취소채권자는 자기 ‘채권액’ 표준 초과 X — ‘일부’ 취소 V", "[判例] 가액배상인 경우 취소채권자는 자기 ‘채권액’ 표준 초과 X — ‘일부’ 취소 V\n\n취소채권자가 직접 자기에게 지급할 것 청구하여 지급받은 가액배상금의 분배 방\n법 • 절차는 현행법상 규정 없어 다른 채권자들이 배당요구를 할 수 없으므로\n\n채권자가 어느 수익자에 대해 사해행위취소• 원상회복청구 승소 확정했어도 회복 마\n치지 않은 이상 피보전채권에 기해 다른 수익자에 대해 별도로 사해행위취소•원상\n회복청구 O — 여러 수익자 상대로 청구하면 각 소송에서 사해행위취소•원상회복\n\n판결 선고해야 一 가액배상인 경우 다른 소송 결과 참작하지 않고 반환할 범위 내에\n서 피보전채권 전액 반환 명해야 一 여러 수익자들을 공동피고로 사해행위취소•원\n\n상회복 구하여 각 수익자들 부담하는 원상회복의무 대상인 책임재산 가액 합산액이\n채권자의 피보전채권액 초과할 경우도 마찬가지 [2006다1442]", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P245", "99다23468", "목적물이 동산인 경우 이를 소유 • 점유하는 수익자• 전득자를 상대로 취소채권", "[判例] 목적물이 동산인 경우 이를 소유 • 점유하는 수익자• 전득자를 상대로 취소채권\n자가 직접 자기에게 인도해줄 것을 청구 O [99다23468]", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P246", "2007다84352", "원상회복을 가액배상으로 할 경우 이행상대방은 취소채권자이어야 •/ 채권자", "[判例] 원상회복을 가액배상으로 할 경우 이행상대방은 취소채권자이어야 •/ 채권자\n취소권은 상대적 취소로 책임재산 일탈 회복 및 강제집행이 본질 [2007다84352]\n-", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P247", "2019다238640", "사해행위취소 확정판결 원상회복 대체물 인도의무의 불이행만을 이유로", "[判例2024] 사해행위취소 확정판결 원상회복 대체물 인도의무의 불이행만을 이유로\n취소채권자가 수익자에 대해 395조에 따라 이행지체로 인한 전보배상청구 X\n그러나 대체물 인도 강제집행이 불가능 또는 현저 곤란이라면 전보배상청구 O\n\nPART 1\n\n채권총론 • 채권자취소권 • 51\n\n[2019다238640]\n\n正辯 : 위 판결은 그 논거로. ① 사해행위 원상회복은 모든 채권자 이익 위하여 효력 있으므로（407\n조） 원상회복의무 불이행은 일반적 채무불이행과 의미 다름, ② ‘본래 채무 이행’과 395조 전보배\n상은 규범적 의미 동등하나, 사해행위취소에서의 ‘원물반혼Kto 채무자）’과 395조 전보배상（to 취소", "", [], 0, "사해행위취소", 51, "미분류"],
  ["채권총론_P248", "99다20612; 2000다466416", "전부취소 및 원물반환 구하는 청구취지 속에 일부취소 및 가액배상 구하는", "[判例] 전부취소 및 원물반환 구하는 청구취지 속에 일부취소 및 가액배상 구하는\n취지 포함 O — 청구취지 변경 없이 바로 가액배상 명할 수 O [99다20612]\n- 판례는 수익자 및 전득자에 대해 가액배상 구할 경우 ‘부진정연대’ 관계로 봄 一\n\n[2000다466416]", "", [], 0, "사해행위취소", 52, "미분류"],
  ["채권총론_P249", "2000다66416", "@0 전득자가 근저당권을 설정받았다면 취득이익액은 그 피담보채권액 이유 中 : 기존 근저당권 모두 말소된 후 근저당권을 취득한 전득자는 그 피담", "[判例] @0 전득자가 근저당권을 설정받았다면 취득이익액은 그 피담보채권액 이유 中 : 기존 근저당권 모두 말소된 후 근저당권을 취득한 전득자는 그 피담보채무\n\n액 4억 원 상당 이익 얻었고, 원심 변론종결시 부동산 가액에서 말소된 근저당권 피\n\n담보채무액을 공제한 금액도 1.2억 원으로서 피보전채권액 3천만 원을 상회하므로,\n채권자는 피보전채권액 전액에 대하여 채권자취소 O, 가액배상 O [2000다66416]", "", [], 0, "사해행위취소", 52, "미분류"],
  ["채권총론_P250", "2018다4203715", "사해행위 후에 기존 근저당권 말소되어 그 피담보채무액 공제한 나머지 금액", "[判例] 사해행위 후에 기존 근저당권 말소되어 그 피담보채무액 공제한 나머지 금액\n한도로 취소 및 가액배상 명할 경우 一 사해행위 후 부동산 취득한 전득자에 대하여\n\n는 변론종결시 부동산 가액에서 말소된 근저당권 피담보채무액 공제한 금액, 변론종\n\n결시 취소채권자의 채권액 중 적은 금액의 한도 내에서, 그가 취득한 이익에 대해서\n만 가액배상 가능 [2018다4203715]\n\n正辯 ： 판결이유를 보면, 근저당권자인 전득자의 취득이익을 단순히 ‘채권최고액’으로 판단한 원심\n을 파기하면서 실제의 피담보채권액을 심리했어야 한다는 취지의 판시로 해석됨（私見）\n-", "", [], 0, "사해행위취소", 52, "미분류"],
  ["채권총론_P251", "2012다952", "사해행위인 매매예약으로 수익자 앞으로 가등기 마친 후, 전득자에게 가", "[大判全合] 사해행위인 매매예약으로 수익자 앞으로 가등기 마친 후, 전득자에게 가\n\n등기 이전의 부기등기 마치고 나아가 본등기 마친 경우 一 채권자는 수익자를 상대\n\n로 사해행위인 매매예약의 취소 및 가액배상 0\n가 소멸하는 것은 X,\n\n••• 부기등기를 통해 수익자의 지위\n\n말소청구소송에서 가등기 •본등기의 피고적격이 전득자에게\n\n만 있다고 하여 수익자가 가액배상 의무까지 없는 것은 X [2012다952]\n\n® —\n\n正辯 : 위 판결은 그 논거로. ① 사해행위 원상회복은 모든 채권자 이익 위하여 효력 있으므로（407\n조） 원상회복의무 불이행은 일반적 채무불이행과 의미 다름, ② ‘본래 채무 이행’과 395조 전보배\n상은 규범적 의미 동등하나, 사해행위취소에서의 ‘원물반혼Kto 채무자）’과 395조 전보배상（to 취소\n\n正辯 : 다만 피보전채권의 ‘원본’은 사해행위 당시 기준으로 확정되고, 여기서는 그 이자 및 지연손\n해금 합계액이 사실심 변론종결시까지 포함된다는 의미로 해석해야（私見）", "", [], 0, "사해행위취소", 52, "미분류"],
  ["채권총론_P252", "96다23207,2002다41589", "저당권 설정된 부동산에 관한 사해행위 있은 후 수익자 또는 제3자 등의 변제", "[判例] 저당권 설정된 부동산에 관한 사해행위 있은 후 수익자 또는 제3자 등의 변제\n로 저당권설정등기가 말소된 경우, 부동산 가액에서 저당권의 피담보채권액을 공제\n\n한 잔액의 한도에서 일부취소 및 가액배상 명해야 •/ “부동산 자체의 회복 명하는 것\n은 당초 일반채권자의 공동담보가 아닌 부분까지 회복시켜 공평에 반하므로” [96다23207, 2002다41589]", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P253", "97다6711", "이 경우 부동산 가액 산정은 “사실심 변론종결시” 기준 [97다6711]", "[判例] 이 경우 부동산 가액 산정은 “사실심 변론종결시” 기준 [97다6711]", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P254", "2002다41589", "이 경우 피담보채무 전액이 소멸된 이상 그 소멸 원인이 무엇인지, 변제라면", "[判例] 이 경우 피담보채무 전액이 소멸된 이상 그 소멸 원인이 무엇인지, 변제라면\n\n실제 자금 출연주체가 누구인지 여부는 불문 [2002다41589]\n\n正辯 : 전액 변제되었다면 저당권등기의 말소 여부는 불문하는 것이 실무례 ••• 부종성, 당연소멸", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P255", "97다6711", "사해행위 목적 부동산에 수 개의 저당권이 설정되어 있다가 사해행위 후 그", "[判例] 사해행위 목적 부동산에 수 개의 저당권이 설정되어 있다가 사해행위 후 그\n\n중 일부 저당권만 말소된 경우도 마찬가지, 이때는 부동산 가액에서 말소된 저당권\n및 말소되지 않은 저당권의 각 피담보채권액을 모두 공제하여 산정 [97다6711]", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P256", "2003다60891", "回Q 피담보채무액의 증감과 공제할 금액 一 ® 사해행위시보다 변종시에", "[判例] 回Q 피담보채무액의 증감과 공제할 금액 一 ® 사해행위시보다 변종시에\n증가하면 : 변종시 금액 모두 공제 ,\n\n® 변종시에 감소하면 : 사해행위시 금액 모두\n\n공제 v 당초 공동담보 아닌 부분까지 회복은 불공평 [2003다60891]\n\n正辯 : 판례는 피담보채무액의 증감할 경우 결과적으로 더 큰 금액으로 많이 공제함. 다만 아무리", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P257", "2018다215756", "사해행위 이전에 임대차계약 체결되었고 임차보증금 우선변제권 있다면 이처", "[判例] 사해행위 이전에 임대차계약 체결되었고 임차보증금 우선변제권 있다면 이처\n럼 임차보증금액 공제 O, 그러나 사해행위 이후 채무자가 부동산 임대했다면 공제\n\nX\n\n••• 부동산 가액 중 임차보증금 해당 부분도 공동담보였음 [2018다215756]", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P258", "2007다28819", "위 법리는 미완공 건물을 매수한 수익자가 나머지 공사로 완공시킨 경우도", "[判例] 위 법리는 미완공 건물을 매수한 수익자가 나머지 공사로 완공시킨 경우도\n마찬가지 [2007다28819]", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P259", "2013다1105", "위 법리는 ‘유치권’의 목적인 부동산이 사해행위로 처분된 후 변제 등으로 유", "[判例] 위 법리는 ‘유치권’의 목적인 부동산이 사해행위로 처분된 후 변제 등으로 유\n치권이 소멸된 경우도 마찬가지 一 부동산 가액에서 유치권의 피담보채무액을 공제\n\n한 잔액 한도에서 사해행위취소 및 가액배상 [2013다1105]\n\n正辯 : 유치권 피담보채무액과 다른 채권자들이 사해행위취소 소송에서 조정 결과 수익자로부터\n지급받은 가액배상 금액의 합계액이 부동산 시가 초과하여 기각된 사안", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P260", "2018다214319", "위 법리는 이후 （말소된） 저당권설정행위에 대하여 사해행위 취소소송 인용", "[判例] 위 법리는 이후 （말소된） 저당권설정행위에 대하여 사해행위 취소소송 인용\n판결이 확정되었더라도 마찬가지로 적용（즉, 일부취소 및 피담보채무 공제한 잔액\n\nPART 1\n\n채권총론 • 채권자취소권 • 53\n\n범위 가액배상 해야） V 위 저당권설정에 대한 사해행위취소 판결의 효력은 상대적\n효력만 있고 그 부동산의 소유권 취득자에게 효력 미치지 X [2018다214319]\ncf.", "", [], 0, "사해행위취소", 53, "미분류"],
  ["채권총론_P261", "2002다37474", "가압류된 부동산에 관한 사해행위 있은 후 수익자 등이 가압류 청구채권", "[判例] 가압류된 부동산에 관한 사해행위 있은 후 수익자 등이 가압류 청구채권\n\n을 변제하여 가압류 해제되거나 집행 취소되었더라도 원물반환 O, （기존 저당권도\n변제로 말소되는 등 다른 사유로 인하여） 가액배상을 명하는 경우도 가압류 청구채\n\n권의 변제액은 공제 X V 부동산 가압류는 채권자평등원칙상 공동담보로서 부동산\n가치에 아무런 영향 無, 가압류 여부나 청구채권액 다과 관계없이 부동산 전부에 사\n해행위 성립 [2002다37474]\n\ncf.", "", [], 0, "사해행위취소", 54, "미분류"],
  ["채권총론_P262", "2003다40286", "사해행위 ‘후’ 목적물에 선의 제3자가 저당권 취득하여 가액배상 명할 人],", "[判例] 사해행위 ‘후’ 목적물에 선의 제3자가 저당권 취득하여 가액배상 명할 人],\n공동담보 가액 전부 배상 O, 제3자 저당권 피담보채권액 공제 X •■• 일반채권자들\n\n‘공동담보’로서 사해행위 성립 범위 내 가액배상 명해야[2003다40286]\n\n正辯 : 사해행위 ‘후’ 설정된 저당권 피담보채권은 ‘공동담보’였던 부분이므로 공제하지 않는다는", "", [], 0, "사해행위취소", 54, "미분류"],
  ["채권총론_P263", "2022다244928", "사해행위 ‘후’ 그 부동산에 제3자가 저당권 취득한 경우 그 피담보채권액", "[判例2023] 사해행위 ‘후’ 그 부동산에 제3자가 저당권 취득한 경우 그 피담보채권액\n은 사해행위 당시 일반 채권자들의 공동담보 부분 O, 원상회복 범위에서 공제 X —\n\n채무자 부동산이 증여 등 사해행위로 수익자에게 소유권 이전된 후 경매 실행으로\n배당절차 진행된 경우도 마찬가지 一 부동산 가액 중 수익자의 채권자가 배당 참여\n\n하여 취득한 배당액 상당은 사해행위 당시 공동담보 O, 가액배상 등 원상회복에서\n\n공제 X — 설령 수익자의 채권자가 채무자의 일반채권자 지위를 겸해도 마찬가지\n\n[2022다244928]\n\n正辯 : 저당권 설정된 부동산 증여（사해행위） 후 저당권 실행, 수익자（수증자）의 배당금청구권은\n지급금지가처분 一 원상회복은 수익자의 배당금청구권을 채무자에게 양도, 채권 양도 통지하도록", "", [], 0, "사해행위취소", 54, "미분류"],
  ["채권총론_P264", "2024다242223", "경매개시결정등기 및 배당요구 종기 이후의 부동산 양도행위가 사해행위", "[判例2025] 경매개시결정등기 및 배당요구 종기 이후의 부동산 양도행위가 사해행위\n로 취소되면, 확정된 배당표의 배당금 상당액 및 집행비용은 특별한 사정이 없는 한\n\n가액배상에서 공제 O ••• 배당요구 채권자는 종기까지 배당요구해야 배당（집행법 88\n\n조 1항, 148조 2호）, 배당요구 않은 일반채권자는 배당 불가, 집행비용은 우선적 변상\n（집행법 53조 1항）, 확정된 배당금•집행비용은 배당요구 종기까지 지난 일반채권자에\n\n대한 관계에서 공동담보 X, 일반채권자 ‘공동담보’로서 사해행위 성립 범위 내 가액\n\n배상 명하므로 공동담보 아닌 부분은 배상에서 제외해야 [2024다242223]\n\n正辯 : 취소채권자가 배당요구 종기까지 배당요구를 하지 않았던 사안\n\n—", "", [], 0, "사해행위취소", 54, "미분류"],
  ["채권총론_P265", "2006다43620", "제1근저당권 설정 후에 채무초과인 상태로 최고액 20억의 제2근저당권 설정", "[判例] 제1근저당권 설정 후에 채무초과인 상태로 최고액 20억의 제2근저당권 설정\n（사해행위）하면서 받은 차용금 중 일부로 제1근저당권의 피담보채무 4억 변제하여\n\n제1근저당권을 말소시킨 경우 一 원상회복은 근저당권변경등기 절차 이행청구로 O\n\n가액배상 X （판결이유 中 : 제2근저당권설정행위 채권최고액 20억 원 중 채무자가\n선순위 근저당권 피담보채무 4억 원 변제한 부분을 제외한 나머지, 즉 16억 부분만\n사해행위 一 그 한도에서 일부취소, 채권최고액 20억 원을 선순위 피담보채무액 4억\n\n원으로 감축하는 ‘근저당권변경등기절차 이행’ 명해야） [2006다43620]\n\n—", "", [], 0, "사해행위취소", 55, "미분류"],
  ["채권총론_P266", "2004다54978", "채권자가 일단 사해행위취소 및 원물반환 청구 승소확정된 경우라면, 그 후", "[判例] 채권자가 일단 사해행위취소 및 원물반환 청구 승소확정된 경우라면, 그 후\n\n어떤 사유로 원물반환 목적 달성 불가능해도 다시 원상회복으로 가액배상 청구 X\n\n- 각하 V 권리보호이익 X, 원물반환과 가액배상 중의 선택은 사실심 변론종결시\n에 둘 중 하나로 확정 [2004다54978]\n\n正辯 : 위 사안은 수익자가 사해행위로 매수하여 소유권이전등기를 한 후 저당권을 설정해준 사안", "", [], 0, "사해행위취소", 55, "미분류"],
  ["채권총론_P267", "2012다2743", "채권양도가 사해행위로 취소되는 경우 수익자가 제3채무자에게서 아직 채권", "[判例] 채권양도가 사해행위로 취소되는 경우 수익자가 제3채무자에게서 아직 채권\n을 추심하지 않았다면 원상회복은 수익자가 제3채무자에게 채권양도가 취소되었다\n는 통지를 하도록 청구 O,\n\n이 경우 통지 이루어진 후에도 채권자는 채무자를 대위\n\n하여 제3채무자에 대하여 지급 청구 X [2012다2743] — 대위소송 기각\n\n® —", "", [], 0, "사해행위취소", 55, "미분류"],
  ["채권총론_P268", "2003다6200", "可S 근저당권설정계약을 사해행위 취소한 경우 경매 진행 및 근저당권등기", "[判例] 可S 근저당권설정계약을 사해행위 취소한 경우 경매 진행 및 근저당권등기\n말소되었다면, 가액배상 받아야 （원물반환 불가능） 一 @ 배당 종료되고 수익자가 배\n\n당금 수령했다면 배당금반환 명함, ® 배당표 확정되었으나 지급금지가처분 등으로\n수익자 배당금 지급받지 못했다면 배당금지급채권의 양도 및 채권양도 통지 명함,\n© 채권자가 배당기일 출석하여 배당에 이의했다면 채권자는 사해행위취소의 소와\n\n원상회복으로서 배당이의 소를 병합하여 제기 O [2003다6200]\n-", "", [], 0, "사해행위취소", 55, "미분류"],
  ["채권총론_P269", "2017다290057", "출연자와 예금주（명의인） 사이 예금주 명의신탁계약이 사해행위로 취소 一", "[判例] 출연자와 예금주（명의인） 사이 예금주 명의신탁계약이 사해행위로 취소 一\n원상회복은 수탁자인 명의인이 금융회사에 대한 예금채권을 출연자에게 양도하\n\n고 금융회사에게 양도통지 하도록 명하는 방법으로 一 그러나 예금이 인출•사용된\n\n경우는 가액배상만 — 수탁자（피고, 수익자）는 신탁자가 사실상 계좌를 지배 •관리한\n\nPART 1\n\n채권총론 • 채권자취소권 • 55\n\n사실을 증명하지 못하는 한 수탁자가 인출•사용한 것으로서 가액배상해야 V 예금\n인출. 이체에 명의자 본인 확인• 인증 필요하므로 [2017다290057]\n\n-", "", [], 0, "사해행위취소", 55, "미분류"],
  ["채권총론_P270", "2012다77891", "공동저당권 설정된 수 개 부동산 전부의 매매계약이 사해행위일 때 그 중", "[判例] 공동저당권 설정된 수 개 부동산 전부의 매매계약이 사해행위일 때 그 중\n\n일부 부동산만 사해행위로 취소할 경우에도 가액배상액 산정은 피담보채권 총액을\n변론종결 당시 기준으로 한 각 목적물 가액 비례 안분 [2012다77891]", "", [], 0, "사해행위취소", 56, "미분류"],
  ["채권총론_P271", "2015다3891", "사해행위취소 및 원상회복이 이뤄진 경우 채무자는 수익자 • 전득자에게 부당", "[判例] 사해행위취소 및 원상회복이 이뤄진 경우 채무자는 수익자 • 전득자에게 부당\n이득반환의무 O — 그러나 채무자의 다른 공동채무자는 채무 소멸 이익 얻더라도\n수익자• 전득자에게 직접 부당이득반환의무 X （채무자와 구상관계 성립 별론） 一 공\n\n동채무자가 수익자•전득자의 가액배상의무 대위변제했다면 수익자.전득자에게 구\n상 O [2015다3891이", "", [], 0, "사해행위취소", 56, "미분류"],
  ["채권총론_P272", "2007다69162", "사해행위 취소된 경우 수익자. 전득자가 사해행위 이후 그 부동산을 사용하", "[判例] 사해행위 취소된 경우 수익자. 전득자가 사해행위 이후 그 부동산을 사용하\n여 얻은 사용이익이나 임대하여 받은 임료상당액은 원상회복으로 반환할 필요 X •••\n\n사해행위취소 및 원상회복은 책임재산 보전 필요 범위 내로 한정되어야, 사용이익은\n\n당초 채권자의 공동담보 책임재산 X [2007다69162]\n\n-", "", [], 0, "사해행위취소", 56, "미분류"],
  ["채권총론_P273", "89다카35421", "사해행위로 취득한 부동산을 가압류한 자에게는 사해행위취소 판결 효력 X", "[判例] 사해행위로 취득한 부동산을 가압류한 자에게는 사해행위취소 판결 효력 X\n— 가압류한 자는 강제집행 O [89다카35421]\n\n—", "", [], 0, "사해행위취소", 56, "미분류"],
  ["채권총론_P274", "99다63183", "사해행위 취소의 원상회복으로서 채무자에게 회복된 재산은 취소채권자나", "[判例] 사해행위 취소의 원상회복으로서 채무자에게 회복된 재산은 취소채권자나\n\n407조로 효력을 받는 채권자와 수익자 사이에서 채무자의 책임재산으로 취급될 뿐,\n“채무자가 직접 권리를 취득하는 것은 아니다.” — 이하 논거로 하는 판례들\n\n①", "", [], 0, "사해행위취소", 56, "미분류"],
  ["채권총론_P275", "2015다21798", "채무자가 사해행위 취소로 등기 회복한 부동산을 제3자에게 처분하더라도", "[判例] 채무자가 사해행위 취소로 등기 회복한 부동산을 제3자에게 처분하더라도\n‘무권리자의 처분’으로 무효, 제3자 혹은 순차로 마쳐진 소유권이전등기 등은 모\n\n두 원인무효 - 취소채권자나 407조로 효력을 받는 채권자는 ‘강제집행’을 위하여\n\n원인무효 등기 말소청구 O [2015다21798이\n②", "", [], 0, "사해행위취소", 56, "미분류"],
  ["채권총론_P276", "99다63183", "수익자가 가액배상을 할 때 자신의 채무자에 대한 반대채권으로 상계 X", "[判例] 수익자가 가액배상을 할 때 자신의 채무자에 대한 반대채권으로 상계 X\n\nV 채권자취소권은 모든 채권자를 위한 책임재산 보전 제도 취지, 상계 허용하\n면 사해행위로 이익받은 수익자 보호하고 다른 채권자 이익 무시하는 결과\n\n수익자는 채무자에게 가액배상금 명목으로 금전 지급했다는 점을 들어 취소채\n권자에 대하여 가액배상에서 공제 주장 X ••■ 제도 취지, 상대적 효력, 채권자\n\n취소권 행사로 채무자가 수익자에 대해 권리 취득 X [99다63183]\n\n正辯 : 수익자가 ‘채무자’가 아닌 ‘취소채권자’에 대한 채권으로 가액배상채권과 상계할 수 있는\n지 여부는 판시하지 않았으나. 판례 취지로 보아 가액배상채권은 상계금지채권으로 이해해야", "", [], 0, "사해행위취소", 56, "미분류"],
  ["채권총론_P277", "2012다2743", "채권양도가 사해행위로 취소되고 수익자가 원상회복으로서 제3채무자에", "[判例] 채권양도가 사해행위로 취소되고 수익자가 원상회복으로서 제3채무자에\n게 그 취지를 통지한 경우에도, 채권자는 채무자를 대위하여 제3채무자에게 그\n\n채권에 관한 지급을 청구 X [2012다2743] —‘ 대위소송 기각\n④", "", [], 0, "사해행위취소", 57, "미분류"],
  ["채권총론_P278", "2012다73158", "토지와 지상건물 함께 양도되고 건물양도만 사해행위로 취소되어 등기", "[判例] 토지와 지상건물 함께 양도되고 건물양도만 사해행위로 취소되어 등기\n\n말소된 경우, 채무자는 관습상 법정지상권 x ••• ‘동일인 소유 속하던 토지 • 지상\n건물이 매매 등으로 소유자 달라진 경우’ X [2012다73158] （후술）\n-", "", [], 0, "사해행위취소", 57, "미분류"],
  ["채권총론_P279", "2007다37837", "사해행위 취소와 원상회복은 모든 채권자의 이익을 위하여 효력 0（제407조）,", "[判例] 사해행위 취소와 원상회복은 모든 채권자의 이익을 위하여 효력 0（제407조）,\n\n채무자에게 회복된 재산에 취소채권자 우선변제권 X, 다른 채권자도 총채권액 중\n\n자기 채권 해당 안분액 변제받을 수 O — 그러나 민사집행법 등 법률상 절차 거치\n지 않고 직접 취소채권자에게 안분액 지급청구 X, 취소채권자의 분배의무 X — 결\n\n국 가액배상금 수령한 취소채권자의 사•실상 우선변제 결과는 불가피 [2007다37837]", "", ["제407조"], 0, "사해행위취소", 57, "미분류"],
  ["채권총론_P280", "2005다14595", "사해행위취소•원상회복은 모든 채권자 이익 위해 효력（407조） 一 수익자 소", "[判例] 사해행위취소•원상회복은 모든 채권자 이익 위해 효력（407조） 一 수익자 소\n\n유 부동산 경매절차에서 취소채권자가 가액배상판결에 기해 배당요구 하여 받은 배\n당액은 취소채권자에 그대로 귀속 X, 채무자 책임재산으로 회복 O ~ 채무자에 대\n\n한 채권자들은 채권만족에 관한 일반원칙에 따라 채권 내용 실현 [2005다14595]\n\n-", "", [], 0, "사해행위취소", 57, "미분류"],
  ["채권총론_P281", "2017마499", "사해행위취소 소송에서 가액배상 할 경우, 수익자 자신도 채권자라는 이유로", "[判例] 사해행위취소 소송에서 가액배상 할 경우, 수익자 자신도 채권자라는 이유로\n\n전술한 상계 X, 공제 X - 그러나 수익자의 취소채권자에 대한 별개의 다른 채권\n\n을 집행하기 위해 취소채권자의 수익자에 대한 가액배상채권에 대하여 압류 및 전부\n\n명령 O v 상계 ■ 공제와 성질 다름, 제3채무자가 채권자 자신인 경우도 채권압류 금\n지되지 않음 [2017마499]\n\n—", "", [], 0, "사해행위취소", 57, "미분류"],
  ["채권총론_P282", "99다23468,2007다84352", "사해행위 목적물이 동산•금전 • 가액배상인 경우 취소채권자는 직접 자기에", "[判例] 사해행위 목적물이 동산•금전 • 가액배상인 경우 취소채권자는 직접 자기에\n게 인도 • 지급청구 O, “가액배상을 명할 경우 그 이행 상대방은 채권자여야 한다.”\n••• 일탈 책임재산 회복 및 강제집행이 본질\n\n여러 채권자 사해행위취소•원상회복 소 제기하면 각 모두 승소판결 선고해야 一\n수익자（전득자） 가액배상은 채권자별 비례 안분 금액 X, 반환해야 할 가액 범위 내\n\n에서 각 채권자 피보전채권액 ‘전액’ 반환 명해야 [99다23468, 2007다84352]\n\n正辯 : 수익자가 ‘채무자’가 아닌 ‘취소채권자’에 대한 채권으로 가액배상채권과 상계할 수 있는\n지 여부는 판시하지 않았으나. 판례 취지로 보아 가액배상채권은 상계금지채권으로 이해해야", "", [], 0, "사해행위취소", 57, "미분류"],
  ["채권총론_P283", "2018다202774", "여러 사해행위취소소송에서 각 가액배상 명하는 판결 확정된 경우, 각", "[判例2022] 여러 사해행위취소소송에서 각 가액배상 명하는 판결 확정된 경우, 각\n\n채권자의 피보전채권액 합한 금액이 공동담보가액（목적물 가액에서 일반채권자들\n공동담보 아닌 부분 공제한 잔액）을 초과한다면 수익자는 채권자들에게 공동담보가\n\n액만 반환 一 공동담보가액 초과 범위 이중반환 위험 一 각 판결에서 산정한 공동담\n보가액 액수가 서로 다른 경우, 특별한 사정이 없는 한 최다액으로 산정한 공동담보\n가액에서 수익자가 어느 채권자에게 반환한 가액을 공제한 금액을 초과하는 범위에\n\n서 다른 채권자에게 청구이의로 집행력 배제 구해야 V 채권자취소권의 취지, 변론\n주의 [2018다202774]\n\n—", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P284", "2009다18502", "사해행위 이후 채권을 취득한 채권자는 407조의 채권자", "[判例] 사해행위 이후 채권을 취득한 채권자는 407조의 채권자\n\nX — 배당 제외\n\n[2009다18502]\n-", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P285", "2013다84995", "사해행위취소 판결은 채무자• 다른 채권자에게 효력 미치지 않으므로 사해행", "[判例] 사해행위취소 판결은 채무자• 다른 채권자에게 효력 미치지 않으므로 사해행\n\n위취소 판결을 받지 않은 채권자가 채무자 대위하여 말소등기 청구 X, 그러나 이미\n\n말소등기를 마쳤다면 유효 ••• 407조 모든 채권자 이익, 회복되어도 어차피 말소 여\n지, 실체관계에 부합 [2013다84995]\n\n-", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P286", "2003다15907", "채권자 중 1인이 수익자로서 대물변제 받은 것이 사해행위 취소 및 원상회복", "[判例] 채권자 중 1인이 수익자로서 대물변제 받은 것이 사해행위 취소 및 원상회복\n확정되면 그의 채권이 부활하여 채권자 지위 회복하므로 407조의 채권자에 포함되\n\n고 강제집행 절차에서 배당요구 O [2003다15907]\n\n-", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P287", "2007다54849", "사해행위취소소송에서 피고인 수익자는 피보전채권의 소멸시효 완성 주장 O", "[判例] 사해행위취소소송에서 피고인 수익자는 피보전채권의 소멸시효 완성 주장 O\n— 인정되면 기각 [2007다54849]", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P288", "2016다204783", "채무자와 수익자 사이 확정판결로 마쳐진 등기라 해도 사해행위취소로 인한", "[判例] 채무자와 수익자 사이 확정판결로 마쳐진 등기라 해도 사해행위취소로 인한\n\n원상회복으로 말소 O V 사해행위취소 및 원상회복 판결은 수익자가 채권자에 대하여\n\n원상회복의무 부담하는 것일 뿐, 채권자 • 채무자 사이에서 법률관계 형성\n\nX — 사해\n\n행위취소 • 원상회복 청구가 전소 확정판결에 저촉되지 X [2016다204783]", "", [], 0, "사해행위취소", 58, "미분류"],
  ["채권총론_P289", "2006다9446", "제3자의 행위가 채권을 침해하여 ‘불법행위’에 해당하려면 제3자가 채권자를", "[判例] 제3자의 행위가 채권을 침해하여 ‘불법행위’에 해당하려면 제3자가 채권자를\n해한다는 사정을 알면서도 법규나 공서양속 위반하는 행위를 하여 채권자의 이익을\n침해하였음이 인정되어야 [2006다9446]\n\n-", "", [], 0, "제3자채권침해", 59, "미분류"],
  ["채권총론_P290", "99다38699; 2016다10827", "독립한 경제주체 사이 경쟁적 계약관계에서 단순히 제3자가 채무자• 채권자", "[判例] 독립한 경제주체 사이 경쟁적 계약관계에서 단순히 제3자가 채무자• 채권자\n\n사이 계약 내용을 알면서 그에 위반되는 내용의 계약을 체결한 것만으로는 제3자의\n고의 • 과실 및 위법성 인정하기 부족 一 제3자가 채무자와 적극 공모했다거나 제3자가\n기망• 협박 등 사회상규에 반하는 수단 사용하거나, 채권자를 해할 의사로 채무자와\n계약체결 하는 등 특별한 사정이 있는 경우에 한하여 제3자의 고의 • 과실 및 위법성\n\n을 인정 O [99다38699]\n[\n\n判例2021] 제3자가 채권 침해했다고 바로 불법행위\n\nX V 채권은 배타적 효력 X,\n\n채권자 상호 간 및 채권자와 제3자 사이 자유경쟁 허용 一 그러나 자유경쟁 원칙은\n법질서 허용 범위에서 공정하고 건전한 경쟁 一 제3자가 채권자 해치는 사정 알면서\n\n도 법규•공서양속 위반 등 위법행위로 채권 실현 방해하여 채권자 이익 침해하면\n불법행위 O [2016다10827]\n\n-", "", [], 0, "제3자채권침해", 59, "미분류"],
  ["채권총론_P291", "2020다208997", "3자간 등기명의신탁에서 수탁자가 부동산을 처분하면 형사상 횡령죄로", "[判例2022] 3자간 등기명의신탁에서 수탁자가 부동산을 처분하면 형사상 횡령죄로\n\n처벌되지 않더라도 민법상 불법행위 O — 신탁자의 채권（소유권이전등기청구권）을\n침해하는 제3자 채권침해 O （상세 논거는 후술） [2020다208997]\n-", "", [], 0, "제3자채권침해", 59, "미분류"],
  ["채권총론_P292", "2017다239311", "제3자가 채무자에 대한 채권자 존재 및 그 채권 침해사실 알면서 채무자와", "[判例] 제3자가 채무자에 대한 채권자 존재 및 그 채권 침해사실 알면서 채무자와\n\n적극 공모하거나 채권행사 방해 의도로 사회상규 반하는 부정 수단 사용하는 등\n으로 채무자의 책임재산을 감소시키는 행위를 함으로써 채권의 실행 • 만족을 불가능 .\n곤란하게 한 경우 채권자에 대한 불법행위 O — 제3자가 채무자 재산을 은닉할\n\n당시 채무자가 다액의 채무 보유하여 제3자 채권침해 없었더라도 채권자가 일정액\n\n이상으로 채권을 회수할 가능성이 없었다면, 위 초과 부분 손해와 제3자 채권침해로\n인한 불법행위 사이에는 상당인과관계 X [2017다239311]", "", [], 0, "제3자채권침해", 59, "미분류"],
  ["채권총론_P293", "", "주택의 임대차보증금반환채권 양도한 경우 양수인은 우선변제권 X", "[判例] 주택의 임대차보증금반환채권 양도한 경우 양수인은 우선변제권 X\n\n-", "", [], 0, "채권양도", 60, "미분류"],
  ["채권총론_P294", "2010다100711", "채권양도 의무 발생시키는 ‘원인행위’（=양도의무계약, ex. 매매 • 추심위임 •", "[判例] 채권양도 의무 발생시키는 ‘원인행위’（=양도의무계약, ex. 매매 • 추심위임 •\n대물변제약정 • 채권양도담보）는 의무부담행위, 한편 ‘채권양도계약’은 준물권행위\n\n로서 처분행위 一 양자는 구별되는 별개 독립한 행위 一 매매 - 위임 등의 민법 규정이\n\n채권양도계약에 적용 X — 채권양도 원인인 위임이 해지로 소멸되면 이로써 채권은\n양도인에게 복귀되고 양수인은 양도의무계약의 해지로 부담하는 원상회복의무의 한\n내용으로 채무자에게 통지할 의무 O [2010다100711]\n\n正辯 : 독립성, 유인성", "", [], 0, "채권양도", 60, "미분류"],
  ["채권총론_P295", "99다23093", "채권양도가 다른 채무 담보 조로 이뤄진 경우 그 채무 변제돼도 채무자는 이", "[判例] 채권양도가 다른 채무 담보 조로 이뤄진 경우 그 채무 변제돼도 채무자는 이\n를 이유로 양수금청구 거절 X V 채무 변제나 소멸 여부는 양도인 • 양수인 간의 문\n\n제일 뿐 채무자는 양수인에게 변제해야 [99다23093]\n\n正辯 : 유인성 인정함에도 불구하고 ‘채무자’ 입장에서는 통지를 기준으로 하면 됨", "", [], 0, "채권양도", 60, "미분류"],
  ["채권총론_P296", "95다7932", "“장래의 채권도 양도 당시 기본적 채권관계 확정되어 권리 특정", "[判例] “장래의 채권도 양도 당시 기본적 채권관계 확정되어 권리 특정\n\n가능하고 가까운 장래 발생이 상당한 정도 기대되면 양도 O” [95다7932]", "", [], 0, "채권양도", 60, "미분류"],
  ["채권총론_P297", "82다카508", "장래 채권의 압류• 가압류도 동일 법리 적용 O [82다카508]", "[判例] 장래 채권의 압류• 가압류도 동일 법리 적용 O [82다카508]\n\n- 전세금반환채권:\n\n正辯 : 채권의 이전 원인들 ① 단독행위 ex. 유언, ② 법률의 규정 ex. 상속, 변제자대위\n③ 법원의 결정（강제집행） ex. 전부명령, ④ 계약 ex. 채권양도", "", [], 0, "채권양도", 60, "미분류"],
  ["채권총론_P298", "2001다69122; 97다33997", "“전세권 존속 중에는 전세금반환채권만 분리하여 확정적으", "[判例] “전세권 존속 중에는 전세금반환채권만 분리하여 확정적으\n\n로 양도 X , 다만 전세권 소멸하는 경우 전세금반환채권 발생을 조건으로 그 장래\n의 조건부 채권 양도는 O” [2001다69122]\n전세권이 존속기간 만료로 소멸, 합의해지, 특약 등에 의해 전세금반환채권의 처분\n\n에도 불구하고 전세권 처분이 따르지 않는 특별한 사정이 있다면 채권양수인은 무담\n\n보 채권을 양수한 것 [97다33997]\n\n— 소유권이전등기청구권:", "", [], 0, "채권양도", 61, "미분류"],
  ["채권총론_P299", "2000다51216", "= 매매로 인한 소유권이전등기청구권은 성질상 양도 제한되고 양도에 채", "[判例] = 매매로 인한 소유권이전등기청구권은 성질상 양도 제한되고 양도에 채\n무자 동의 •승낙 요하며 양도통지만으로 채무자에게 대항 X V “매매 소이등청구\n\n권은 이행과정에 신뢰관계 따르므로” [2000다51216]", "", [], 0, "채권양도", 61, "미분류"],
  ["채권총론_P300", "2018다280316", "명의신탁 해지 원인 소이등청구권도 양도에 명의수탁자가 동의 •승낙 않", "[判例2021] 명의신탁 해지 원인 소이등청구권도 양도에 명의수탁자가 동의 •승낙 않\n\n았다면 양수인은 수탁자에 대해 직접 소유권이전등기청구 X V 중간생략등기 합의\n에 전원 동의 요하는 법리 적용 [2018다280316]\n\n그러나", "", [], 0, "채권양도", 61, "미분류"],
  ["채권총론_P301", "2015다36167", "취득시효 완성으로 인한 소유권이전등기청구권은 양도에 채무자 동", "[判例] 취득시효 완성으로 인한 소유권이전등기청구권은 양도에 채무자 동\n의 •승낙 불필요（= 통상의 채권양도） V “채권자•채무자 사이 아무런 계약관계 • 신뢰\n\n관계나 반대급부의무 없음” [2015다36167]\n- 가압류된 채권 :", "", [], 0, "채권양도", 61, "미분류"],
  ["채권총론_P302", "2001다59033", "“가압류된 채권도 양도에 아무 제한 無, 다만 가압류된 채권", "[判例] “가압류된 채권도 양도에 아무 제한 無, 다만 가압류된 채권\n\n을 양수받은 양수인은 가압류로 권리 제한된 상태의 채권을 양수 一 가압류 채권자가\n\n본안승소 등 집행권원 취득하면 가압류로 제한된 상태의 채권양도는 무효로 확정됨”\n••• 채권가압류의 처분금지효력은 집행권원을 얻는 등 피보전권리의 존재 확정을\n\n조건으로 발생 = 이는 채권양도 받았으나 확정일자 있는 통지 • 승낙 대항요건 갖추\n지 않은 사이 양도된 채권이 가압류된 경우도 동일 [2001다59033]\n\n正辯 : 가압류된 채권이 양도되고 가압류채권자가 집행권원 얻은 후 양수인의 양수금청구에 대한\n판결에 관해, 위 판례는 채권양도가 무효로 확정된다고 하였으니 기각판결로 볼 여지가 있으나（이", "", [], 0, "채권양도", 61, "미분류"],
  ["채권총론_P303", "2017다256378", "제3채무자에게 채권가압류결정 송달된 상태에서 채권 양수하여 확정일", "[判例2022] 제3채무자에게 채권가압류결정 송달된 상태에서 채권 양수하여 확정일\n\n자 있는 통지 등 대항요건 갖춘 채권양수인은 가압류집행취소통지서가 제3채무자에\n게 송달된 이후에는 더 이상 처분금지효 제한 없이 아무런 부담 없는 채권취득 효력\n\n을 가압류 채권자에게 대항\n\nO\n\n•/ 가압류집행 취소통지서 송달은 가압류취소 결정의\n\n집행으로서 확정적 효력 一 이후 항고심이 가압류취소결정을 취소하여 가압류결정\n\n인가했어도 마찬가지 ••• 이미 취소된 가압류집행이 소급 부활하지는 X\n\nPART 1\n\n채권총론 • 채권양도 • 61\n\n채무자가 압류•가압류 대상 채권을 양도하고 확정일자 통지 대항요건 갖췄다면,\n\n그 후 채무자의 다른 채권자가 양도된 채권에 압류• 가압류 하여도 무효 ••• 채권압\n류 효력 발생 전 채권 처분하면 먼저 압류한 채권자 있어 그에게 대항 못하여도\n처분 후 집행 참가한 채권자에게는 처분으로 대항 0（상대적 효력）, 압류•가압류 당\n시 피압류채권은 이미 존재 X [2017다256378]\n\n正辯 : A가 B의 C에 대한 보증금반환채권을 가압류 一 D가 B로부터 위 채권 양수하고 확정일자\n통지 도달 一 E의 압류•추심명령 송달 一 가압류취소결정의 집행취소통지서 송달 - 항고심에서\n가압류결정 인가결정 - A의 압류•추심명령 송달", "", [], 0, "채권양도", 61, "미분류"],
  ["채권총론_P304", "2000다55904", "채권양도금지특약에 반하여 채권양도 이뤄진 경우, 양수인이 양도금지특약의", "[判例] 채권양도금지특약에 반하여 채권양도 이뤄진 경우, 양수인이 양도금지특약의\n\n존재를 알았거나 중과실로 알지 못한 경우는 채권양도 무효,\n\n중과실 없이 알지 못했\n\n다면 채권양도 유효 一 양수인의 악의나 중과실에 대한 입증책임은 채무자 부담 一‘\n채무자는 487조 후단 채권자 불확지 변제공탁 O [2000다55904]", "", [], 0, "채권양도", 62, "미분류"],
  ["채권총론_P305", "2012다11802", "449조 2항 단서는 전득자 포함 O, 악의 양수인으로부터 선의로 양수한 전득자 O,", "[判例] 449조 2항 단서는 전득자 포함 O, 악의 양수인으로부터 선의로 양수한 전득자 O,\n선의 양수인으로부터 악의로 양수한 전득자 O [2012다11802이\n-", "", [], 0, "채권양도", 62, "미분류"],
  ["채권총론_P306", "2016다24284", "양도금지특약으로 채권 양도성 상실, 양도금지특약 위반한 채권양도", "[大判全合] 양도금지특약으로 채권 양도성 상실, 양도금지특약 위반한 채권양도\n는 무효 V 통설•판례, 실무 안정, 449조 2항 단서는 무효를 전제로 거래안전\n\n보호 규정, 물권법정주의와 달리 채권은 당사자 합의로 내용 자유 결정, 채권양도의\n\n동일성 [2016다24284]\n\n正辯 : 위 전합에는, 채권양도 자유 및 증명책임 분배와의 관계를 들어. 양도금지특약 위반해도 당\n사자 사이 채무불이행책임만 발생할 뿐 채권양도는 원칙적 유효이고 채무자는 양수인에게 이행해\n야 한다는 이른바 ‘채권적 효력설’을 취한〈반대의견〉이 있었음", "", [], 0, "채권양도", 62, "미분류"],
  ["채권총론_P307", "2001다43771", "당사자 사이 양도금지특약 있더라도 전부명령 O, 집행채권자의 선악의 불문,", "[判例] 당사자 사이 양도금지특약 있더라도 전부명령 O, 집행채권자의 선악의 불문,\n\n전부채권자로부터 다시 양수한 자가 악의라 하여도 채권양도 유효 [200143771]", "", [], 0, "채권양도", 62, "미분류"],
  ["채권총론_P308", "2009다47685", "악의 • 중과실의 채권양수인에 대해 채무자가 사후승낙하면 무효인 채권양도", "[判例] 악의 • 중과실의 채권양수인에 대해 채무자가 사후승낙하면 무효인 채권양도\n\n행위가 추인되어 승낙시부터 유효 O （소급효 X）[2009다47685]\n\n正辯 : A가 B의 C에 대한 보증금반환채권을 가압류 一 D가 B로부터 위 채권 양수하고 확정일자\n통지 도달 一 E의 압류•추심명령 송달 一 가압류취소결정의 집행취소통지서 송달 - 항고심에서\n가압류결정 인가결정 - A의 압류•추심명령 송달\n\n正辯 : 해당 판례의 참조조문에 139조가 명시되어 있음", "", [], 0, "채권양도", 62, "미분류"],
  ["채권총론_P309", "94다19242", "‘양수인’이 양도인의 사자나 대리인으로서 채권양도 통지", "[判例] ‘양수인’이 양도인의 사자나 대리인으로서 채권양도 통지\n\nO ••• 법률\n\n행위 대리 규정은 양도통지와 같은 관념의 통지에 유추적용 O [94다19242]\n\n正辯 : 양도인이 양수인에게 양도통지 권한 위임하면 ‘대리’ O, 통설은 ‘대위’ 통지 X\n—", "", [], 0, "채권양도", 63, "미분류"],
  ["채권총론_P310", "2017다243143", "양수인은 채권자에게 채권양도통지절차 이행 청구 O [2017다243143]", "[判例2022] 양수인은 채권자에게 채권양도통지절차 이행 청구 O [2017다243143]", "", [], 0, "채권양도", 63, "미분류"],
  ["채권총론_P311", "75다110", "주채무자에 대하여 채권양도통지 등 대항요건 갖추면 보증인에게 효력 O", "[判例] 주채무자에 대하여 채권양도통지 등 대항요건 갖추면 보증인에게 효력 O\n（즉, 보증인에 대하여 따로 대항요건 갖춰줄 필요 없음） [75다110이\n\n- 승낙 : 관념의 통지,\n\n조건 • 이의 O,\n\n사전승낙 O\n\n채무자가 양도인 • 양수인 누구에게 해도 무방\n\n— 이의를 보류하지 않은 승낙（제451조 제1 항） : 항변권 상실 =양도인에게 대항할 수 있\n\n는 사유로써 양수인에게 대항 X\n\n（羊451조 2항 통지 •一 항변 O = 동일성）\n\nex. 변제 • 상계 등 채권소멸사유, 채권발생 원인인 기본계약의 무효 • 취소 - 해제\n\n正辯 : 판례는 채무자가 자동채권 발생을 예상 못한 상태에서 이의無보류승낙을 했다면 상계항변", "", ["제451조"], 0, "채권양도", 63, "미분류"],
  ["채권총론_P312", "2014다49241", "채무자가 이의無보류승낙 할 때 채권 성립 •소멸 사정을 양수인에 알려줄 신", "[判例] 채무자가 이의無보류승낙 할 때 채권 성립 •소멸 사정을 양수인에 알려줄 신\n\n의칙상 의무 X, 설명 없었어도 불법행위 X •/ 양수인 자신 책임 [2014다49241]", "", [], 0, "채권양도", 63, "미분류"],
  ["채권총론_P313", "93다35551", "“451조 1항 ‘양도인에게 대항할 수 있는 사유’란 채권의 성립 • 존속 • 행사를", "[判例] “451조 1항 ‘양도인에게 대항할 수 있는 사유’란 채권의 성립 • 존속 • 행사를\n저지 • 배척하는 사유를 말할 뿐, 채권의 귀속（=이미 타인에게 양도된 사실）은 X •/ 채\n\n권 귀속 우열은 오로지 확정일자 있는 통지 • 승낙의 유무와 선후로써만 결정” [93다35551]", "", [], 0, "채권양도", 63, "미분류"],
  ["채권총론_P314", "2002다52657", "임대차보증금반환채권을 양도함에 임대인이 이의 보류 없는 승낙하였어도 인", "[判例] 임대차보증금반환채권을 양도함에 임대인이 이의 보류 없는 승낙하였어도 인\n도시까지 생긴 연체차임, 임차인의 원상복구비용 상당의 손해배상액 등 임차인의 모\n\n든 채무 공제 O（V 보증금의 속성） 一 그러나 임대인 • 임차인 사이 약정한 원상복구비\n\n용의 약정 보증금은 451조 1항 이의無보류승낙의 항변권 상실 효과 O（V 약정에 기\n해 비로소 발생한 채무에 불과하여 당연 공제 속성 문제 X）[2002다52657]", "", [], 0, "채권양도", 63, "미분류"],
  ["채권총론_P315", "99다18039", "이의 보류 없는 승낙을 하였더라도 양수인이 악의나 중과실인 경우라면 채무", "[判例] 이의 보류 없는 승낙을 하였더라도 양수인이 악의나 중과실인 경우라면 채무\n자는 승낙 당시까지 양도인에 대해 생긴 사유로 양수인에게 대항 O [99다18039]", "", [], 0, "채권양도", 63, "미분류"],
  ["채권총론_P316", "2008두20109,2016다8589", "채권양도 후 대항요건 구비 전이라면 ‘양도인’은 채무자의 제3채무자에 대한", "[判例] 채권양도 후 대항요건 구비 전이라면 ‘양도인’은 채무자의 제3채무자에 대한\n채권에 대하여 가압류 o, 가압류에 기한 배당 유효 o •■• 채무자에 대한 관계에서\n\n는 여전히 채권자의 지위 [2008두20109, 2016다8589]\n\n正辯 : 채권양도 대항요건 구비 전의 ‘양수인’은 채무자의 제3채무자에 대한 채권 가압류 x", "", [], 0, "채권양도", 64, "미분류"],
  ["채권총론_P317", "88다카4253", "임대차보증금반환채권 양도 통지 후 임대차계약 갱신 • 연장의 명시적 • 묵시적", "[判例] 임대차보증금반환채권 양도 통지 후 임대차계약 갱신 • 연장의 명시적 • 묵시적\n\n합의는 양수인에 효력 X [88다카4253]", "", [], 0, "채권양도", 64, "미분류"],
  ["채권총론_P318", "99다18039", "채권양도에서 채무자가 양도인에게", "[判例] 채권양도에서 채무자가 양도인에게\n\n‘이의 보류 없는 승낙’을 했다는 사정이 없거나, ‘이의 보류 없는 승낙（단순승낙）’을 했\n더라도 양수인이 악의 • 중과실인 경우, 채무자는 승낙 당시까지 양도인에 대하여 생\n\n긴 사유로써 양수인에게 대항 O [99다18039]\n\n正辯 : 통지 •승낙 자체의 효력은 모두 도달시에 발생하겠지만, 채권양도 대항요건의 중요한 기준\n은 ‘채무자의 인식’이므로 통지는 ‘도달시’, 승낙은 ‘승낙행위시’가 그 기준시점이 됨", "", [], 0, "채권양도", 64, "미분류"],
  ["채권총론_P319", "2017다222962", "채무자가 “통지를 받은 당시 이미 상계할 수 있는 원인이 있었던 경우", "[判例] 채무자가 “통지를 받은 당시 이미 상계할 수 있는 원인이 있었던 경우\n는 아직 상계적상에 있지 않더라도 그 후 상계적상에 이르면 채무자는 양수인에 대\n\n하여 상계로 대항 O” [2017다222962]", "", [], 0, "채권양도", 64, "미분류"],
  ["채권총론_P320", "99다18039", "채무자의 “승낙 당시 이미 상계할 수 있는 원인이 있던 경우는 아직 상계적상에", "[判例] 채무자의 “승낙 당시 이미 상계할 수 있는 원인이 있던 경우는 아직 상계적상에\n\n있지 않더라도 그 후 상계적상이 생기면 채무자는 양수인에 대하여 상계로 대항 O”\n\n[99다18039]\n\n正辯 : 판례의 “이미 상계할 수 있는 원인”이라는 표현은 기준시점까지 ‘자동채권 취득’으로 충분하\n다는 견해가 다수설로 보임（‘자동채권 취득 및 변제기 선도래’까지 필요하다며 498조에 관한 판례", "", [], 0, "채권양도", 64, "미분류"],
  ["채권총론_P321", "2014다80945", "채권양도의 동일성과 451조 2항을 고려하면 “채무자의 양도인에 대한 자", "[判例] 채권양도의 동일성과 451조 2항을 고려하면 “채무자의 양도인에 대한 자\n동채권의 발생 기초 원인이 양도 전에 이미 성립하여 존재하고, 자동채권과\n\n수동채권이 서로 동시이행 관계에 있는 경우에는, 양도통지가 채무자에게 도달하여\n\nB\n\n대항요건이 갖춰진 후에 자동채권이 발생했더라도 채무자는 동시이행항변권을 주장\n할 수 있고 따라서 상계로 대항 O” [2014다80945]", "", [], 0, "채권양도", 64, "미분류"],
  ["채권총론_P322", "2018다265911", "하도급거래 공정화에 관한 법률 14조 1항 직접지급요청 있으면 수급인", "[判例2021]\n\n하도급거래 공정화에 관한 법률 14조 1항 직접지급요청 있으면 수급인\n\n의 도급인에 대한 공사대금채권이 동일성 유지한 채 하수급인에 이전 一 도급인은\n\n직접지급요청 있기 전에 수급인에 대항할 사유로 하수급인에게 대항 O\n도급인의 수급인에 대한 자동채권이 수동채권인 수급인의 공사대금채권과 동시이행\n\n관계 등 밀접한 관계 있다면 하수급인의 직접청구권 생긴 후 자동채권 발생했더라도\n\n도급인은 그 채권으로 상계하여 하수급인에게 대항 O V 자동채권 발생 기초 원인\n은 하수급인이 직접 지급 요청하기 전에 이미 성립 존재 一 자동채권은 도급인이 직\n접 지급 요청 후에 취득한 채권 X\n\n동시이행항변권은 당사자 쌍방이 부담하는 각 채무가 고유 대가관계에 있는 쌍무\n\n계약상 채무가 아니더라도 구체적 계약관계에서 당사자 쌍방 부담하는 채무 사이\n대가적 의미 있어 이행상 견련관계 인정할 사정 있어도 O [2018다265911]\n\n正辯 : 레미콘대금채무를 대위변제하여 취득한 구상금채권은 공사완성의무가 변형된 것으로 공사\n대금채무와 여전히 대가적 의미 O, 이행상 견련관계 O — 동시이행관계 O", "", [], 0, "채권양도", 65, "미분류"],
  ["채권총론_P323", "95다49882", "계약상 채권의 양수인은 548조 1항 단서 제3자 X, 해제 효과에 반하여 자신", "[判例] 계약상 채권의 양수인은 548조 1항 단서 제3자 X, 해제 효과에 반하여 자신\n의 권리 주장 X •/ 새로운 이해관계 뿐 아니라 등기 • 인도 등 완전한 권리를 취득해\n\n야 보호 - （이미 양수금을 이행받았다면） 채권양수인은 채무자로부터 받은 급부를\n\n직접 원상회복할 의무 O [95다49882, 2000422850]\n\n正辯 : 제3자를 위한 계약에서 수익자도 해제 제3자로 보호되지 않지만 이미 이행받은 경우 그는\n해제로 인한 원상회복의무를 부담하지 않는다는 판례（후술. 요약자가 원상회복의무）와 구별\n\n正辯: 결국 © 유형으로 분류한 불성립 •무효 • 취소 •동이항은 모두 계약에 내재된 것이므로 실질적\n으로 ‘통지를 받은 때’라는 기준시점은 별다른 의미 없음（私見） 一 채무자는 시점 상관없이 언제나", "", [], 0, "채권양도", 65, "미분류"],
  ["채권총론_P324", "2011다17953", "452조 1항은 채권양도가 해제 • 합의해제로 소급해서 무효로 되는 경우에도", "[判例] 452조 1항은 채권양도가 해제 • 합의해제로 소급해서 무효로 되는 경우에도\n유추적용 O —> 통지 후 해제 • 합의해제된 경우 양도인이 해제를 이유로 채무자에게\n\n대항하려면 양수인의 동의를 받아 통지를 철회하거나 양수인이 채무자에게 해제 사실\n통지하여야 一 선의 채무자는 해제 통지 후에도 양수인에 대한 반대채권으로 양도인\n에 대하여 상계 O （해제 통지 전에 상계적상 있는 반대채권 존재한 사안） [2011다17953]", "", [], 0, "채권양도", 66, "미분류"],
  ["채권총론_P325", "2004다29279", "후순위 저 당권자 X — 선순위 저 당권자로서 ① 대항요", "[判例] 후순위 저 당권자 X — 선순위 저 당권자로서 ① 대항요\n\n건 못 갖춘 채권양수인, ② 채권양도 해제되었으나 해제통지 못 갖춘 양도인 등에 대\n\n하여 후순위저당권자는 배당이의 X [2004다29279, 2011 다10935刀\n\n- 확정일자 :", "", [], 0, "채권양도", 66, "미분류"],
  ["채권총론_P326", "", "“작성일자에 대해 완전한 증거가 될 수 있는 것으로 법률상 인정", "[判例] “작성일자에 대해 완전한 증거가 될 수 있는 것으로 법률상 인정\n된 일자”\n\nO : 공증인• 법원서기 확정일자印 있는 사문서, 공정증서, 내용증명우편, 확정판결,\n가압류 등 결정정본, 원본이 아닌 사본에 확정일자\n\nX : 배달증명, 저당권 • 전세권 이전의 부기등기", "", [], 0, "채권양도", 66, "미분류"],
  ["채권총론_P327", "2003다356591", "존속기간 경과로 용익물권적 권능 소멸, 담보물권적 권능만 남은 전세권은", "[判例] 존속기간 경과로 용익물권적 권능 소멸, 담보물권적 권능만 남은 전세권은\n피담보채권인 전세금반환채권과 함께 양도 O — 그러나 450조 2항 확정일자 갖추\n지 않으면 전세금반환채권의 압류• 전부채권자 등 제3자에게 채권양도로 대항 X\n- 전세기간 만료 후 전세권양도계약 및 전세권이전 부기등기 이뤄진 것만으로는\n\n전세금반환채권 양도에 확정일자 통지 •승낙 X [2003다356591\n\nB\n\n- 통지 • 승낙 • 단순승낙 여하에 불구하고 ‘확정일자’ 있는 자 > 없는 자\n둘 다 확정일자 없다면 통지 도달이나 승낙 일시의 선후에 따라 [통판]\n-", "", [], 0, "채권양도", 66, "미분류"],
  ["채권총론_P328", "93다24223", "“이중양도에서 모두 확정일자 갖춘 경우는, 채권양도에 대한 채무자의", "[大判全合] “이중양도에서 모두 확정일자 갖춘 경우는, 채권양도에 대한 채무자의\n\n인식, 즉 확정일자 통지의 도달 일시 또는 확정일자 승낙 일시의 선후로 결정해야（확\n정일자의 선후 X）” = 가압류결정정본의 제3채무자（=채권양도에서 채무자） 도달과\n\n선후 비교\n“양도통지, （가）압류명령 등이 제3채무자에게 동시에 도달되어 상호 우열 없다면\n각자 전액 청구 O - 채무자는 누구에게 전액 변제해도 유효 면책 O, 다만 이중지\n급 위험 있으므로 채권자 불확지로 공탁 O - 변제 받은 양수인 등 상호간 내부적\n\n으로 각 채권액에 안분하여 정산의무 O” [93다24223]\n\n正辯 : 위 판결만 놓고 보면 가압류 • 채권양도, 이중양도 사안에서（확정일자 구비 전제） 각 결정 •통", "", [], 0, "채권양도", 67, "미분류"],
  ["채권총론_P329", "2015다46119", "“양도인이 지명채권을 제1양수인에게 양도하고 확정일자 있는 증서로 대항요", "[判例] “양도인이 지명채권을 제1양수인에게 양도하고 확정일자 있는 증서로 대항요\n건을 갖춘 ‘후’ 양도인이 동일한 채권을 제2양수인에게 양도해도 제2양수인은 채권\n\n취득\n\nX” V “지명채권 양도는 준물권행위 • 처분행위, 유효하려면 양도인 처분권한\n\n있어야 하는데 제1양수인이 확정일자까지 적법하게 갖춤으로써 양도인은 채권 처분\n\n권한 상실” 正辯 : 제2양도행위는 ‘무권리자의 처분행위’로서 무효라는 취지\n（제1차 채권양도가 양도담보인 경우도 마찬가지 V 대외적으로 제1양수인에 이전）\n그 후 제1차 양도계약이 합의해지되고 통지함으로써 채권이 다시 양도인에게 귀속되\n\n었어도 특별한 사정 없는 한 제2차 양도계약이 채권양도로서 유효하게 될 수는\n\nX,\n\n제2양수인이 당연히 채권 취득 X [2015다46119]\n\n-", "", [], 0, "채권양도", 67, "미분류"],
  ["채권총론_P330", "2010다57213", "“채권양도 후 확정일자 있는 통지 갖추었다면, 그 후 양도인의 다른 채권자가", "[判例] “채권양도 후 확정일자 있는 통지 갖추었다면, 그 후 양도인의 다른 채권자가\n양도된 채권에 대하여 압류 • 가압류하더라도 압류 • 가압류 무효 ••• 압류 ’ 가압류 당시\n피압류채권은 이미 존재\n\nX — 채권양도보다 먼저 압류한 채권자가 있어 채권에 대\n\n한 집행이 되더라도 채권양도 확정일자 통지 이후에 압류• 가압류한 채권자는 그 집\n\n행절차에 참여\n\nX [2010다57213]", "", [], 0, "채권양도", 67, "미분류"],
  ["채권총론_P331", "2019다235702", "압류 및 추심명령 당시 피압류채권이 이미 대항요건 갖춰 양도되어 그", "[判例2022] 압류 및 추심명령 당시 피압류채권이 이미 대항요건 갖춰 양도되어 그\n명령이 무효로 되었다면, 그 후 사해행위취소소송에서 채권양도계약이 취소되어\n\n채권이 원채권자에게 복귀하였더라도 이미 무효로 된 압류 및 추심명령이 다시\n\nPART 1\n\n채권총론\n\n• 채권양도 • B7\n\n유효로 될 수는 X\n\n사해행위취소의 상대효 및 비소급효 [2019다235702, 2022다\n\n247521]\n-", "", [], 0, "채권양도", 67, "미분류"],
  ["채권총론_P332", "2003다37426", "“양도된 채권이 이미 변제 등으로 소멸한 ‘후’에 채권압류 및 추심명 령 송달되", "[判例] “양도된 채권이 이미 변제 등으로 소멸한 ‘후’에 채권압류 및 추심명 령 송달되\n더라도 압류 • 추심명령은 무효 V 450조 2항은 양도된 채권이 존속하는 동안에 양립할 수\n없는 법률상 지위 취득한 제3자 있어야 적용, 소멸한 채권에 대한 압류• 추심명령은\n\n무효, 450조 2항 대항요건의 문제 발생 여지 X” [2003다37426]", "", [], 0, "채권양도", 68, "미분류"],
  ["채권총론_P333", "2019다272855", "지명채권 양수인이 ‘양도되는 채권의 채무자’여서 507조 본문에 따라", "[判例2022] 지명채권 양수인이 ‘양도되는 채권의 채무자’여서 507조 본문에 따라\n\n채권이 혼동으로 소멸한 ‘후’에 채권 압류• 가압류 송달되면 압류 가압류는 무효,\n\n이때 압류• 가압류채권자는 450조 2항 제3자 X ••• 450조 2항의 제3자 대항요건은\n양도된 채권이 존속하는 동안에 양립할 수 없는 제3자 있어야 적용, 존재 않는 채\n\n권에 대한 압류•가압류는 무효, 채권양도는 대항요건 갖추지 못해도 양수인에게\n채권 이전, 채권양도에 따른 처분행위 시 혼동으로 소멸한 것 [2019다272855]\n\n—", "", [], 0, "채권양도", 68, "미분류"],
  ["채권총론_P334", "2014다52933; 2003다37426", "“임대차계약상 지위 및 권리의무 포괄적 양도가 있는 경우에도 임대차보증", "[判例] “임대차계약상 지위 및 권리의무 포괄적 양도가 있는 경우에도 임대차보증\n\n금반환채권의 양도 부분은 확정일자 있어야（포괄적 양도계약에 확정일자 있거나 보\n\n증금반환채권 양도의 통지 • 승낙에 확정일자 있어야） 보증금반환채권에 가압류 등을\n\n받은 채권자에게 대항 가능 [2014다52933] — A의 주택을 B가 보증금 1.8억에 임차\n\n하였는데 임대차기간 중 A와 C（B의 처） 사이 보증금 1.5억으로 임대차계약 체결되었고\n（확정일자는 없었고, 차액 3,000만원은 C의 계좌로 입금됨, B＜는 계속 함께 거주）,\n\nD는 B를 채무자, A를 제3채무자로 임대차보증금반환채권에 가압류결정 一 이미 반환\n한 차액 3,000만원 부분은 채권가압류 무효（[2003다37426]", "", [], 0, "채권양도", 68, "미분류"],
  ["채권총론_P335", "", "채권에 가압류 있어도 현실 추심만 금지할 뿐 채무자는 제3채무자를 상대로", "[判例] 채권에 가압류 있어도 현실 추심만 금지할 뿐 채무자는 제3채무자를 상대로\n이행청구소송 O, 법원도 가압류 이유로 배척 X — 인용 V 집행권원 취득 필요,\n\n집행단계에서 저지 가능, 가압류 취소 후 다시 소제기 불편, 시효중단 필요\n⑪", "", [], 0, "채권양도", 68, "미분류"],
  ["채권총론_P336", "2001다59033", "이러한 법리는 가압류된 채권을 양수받은 자의 양수금청구소송에도 마찬가", "[判例] 이러한 법리는 가압류된 채권을 양수받은 자의 양수금청구소송에도 마찬가\n지로 적용 [2001다59033],\n\n©", "", [], 0, "채권양도", 68, "미분류"],
  ["채권총론_P337", "99다23888", "소유권이전등기청구권이 가압류된 경우라면 一 가압류집행 해제를 조건", "[大判全合] 소유권이전등기청구권이 가압류된 경우라면 一 가압류집행 해제를 조건\n\n으로 인용 V 등기를 명하는 판결은 의사의 진술을 명하는 판결로서 일방적인 등기 신\n\n청이 가능하여 제3채무자의 집행단계 저지 불가능 [92다468이\n\n- 채권에 대한 압류 • 가압류와 채무자의 제3채무자에 대한 이행청구소송 :\n\n① 가압류 • 압류 • 가처분 一 ‘인용’ （단, 소유권이전등기청구는 해제조건부인용）\n② 압류 • 추심명령 一 ‘인용’ ••• 당사자적격 유지（2025년 판례변경）\n③ 압류 • 전부명령 一 ‘기각’ ••• 이행의 소의 당사자적격 문제（본안 판단에 흡수）\n나 위 법리는 채권 가압류나 압류 있은 후 그 채권을 양수한 자의 양수금청구에도\n동일 적용（가령 [99다23888]", "", [], 0, "채권양도", 68, "미분류"],
  ["채권총론_P338", "80다1363", "노임채권도 회사와 준소비대차 5년으로 [80다1363]）,", "[判例] 노임채권도 회사와 준소비대차 5년으로 [80다1363]）,", "", [], 0, "채권양도", 70, "미분류"],
  ["채권총론_P339", "99다12376", "면책적 채무인수는 채무 동일성 유지하면서 종래 채무자로부터 인수인에게", "[判例] 면책적 채무인수는 채무 동일성 유지하면서 종래 채무자로부터 인수인에게\n이전하는 계약, 인수인은 종래 채무자와 교체하여 새로이 당사자로서 동일한 채무\n부담 - 인수채무가 원래 5년 상사시효 적용받았다면 채무인수 후에도 소멸시효\n\n기간은 여전히 5년 상사시효 O — 면책적 채무인수와 동시에 이뤄진 시효중단 사유\n인 승인에 따라 채무인수일로부터 시효기간 새로이 진행 O [99다12376]", "", [], 0, "채권양도", 70, "미분류"],
  ["채권총론_P340", "98다33765", "채권자가 승낙 거절한 후 다시 승낙해도 채무인수 효력 X [98다33765]", "[判例] 채권자가 승낙 거절한 후 다시 승낙해도 채무인수 효력 X [98다33765]", "", [], 0, "채권양도", 70, "미분류"],
  ["채권총론_P341", "97다8809", "“금전채무는 상속개시와 동시에 당연히 법정상속분에 따라 분할 귀속되므로", "[判例] “금전채무는 상속개시와 동시에 당연히 법정상속분에 따라 분할 귀속되므로\n소극재산은 상속재산분할 여지 X — 상속인 1인이 초과 부담하기로 분할협의하면\n\n면책적 채무인수 실질 가지므로 채권자가 승낙해야 효력 O — 승낙해도 상속재산분\n\n할의 소급효 규정인 1015조 적용 X, 상속개시시로 소급 X ’ [97다8809]\n\n正辯 : 다만 인수시로 볼 수 있는 분할협의시로는 소급할 것으로 보임（457조 참조）\n\n- 승낙 여부 최고（제455조） : 제3자• 채무자가 상당기간 정하여 승낙 여부 확답 최고\n\n正辯 : 133조 단서, 457조 단서, 548조 1 항 단서, 1015조 단서의 ‘제3자 보호’ 규정에서의 제3자는\n‘배타적’ 권리를 취득한 자에 한정한다고 보는 것이 일반적임", "", ["제455조"], 0, "채권양도", 70, "미분류"],
  ["채권총론_P342", "2000다56204,98다40657", "물상보증인이 면책적 채무인수에 동의하거나 스스로 면책적 인수인이 된", "[判例] 물상보증인이 면책적 채무인수에 동의하거나 스스로 면책적 인수인이 된\n경우 제공한 담보는 소멸하지 X — 그러나 인수한 채무만 담보 O, 신 채무자（인\n수인）가 다른 원인으로 부담한 새로운 채무까지 담보하지는 X •/ 동의는 새로운\n\n담보설정 의사표시 X, 기존 담보를 인수인을 위해 계속 유지하는 의사표시 O, 유\n지된 담보는 기존 담보와 동일한 내용이어야 [2000다56204, 98다40657]", "", [], 0, "채권양도", 71, "미분류"],
  ["채권총론_P343", "96다27476", "‘면책적 채무인수로 채무 소멸 및 부종성으로 저당권 당연 소멸’ 법리는 x •••", "[判例] ‘면책적 채무인수로 채무 소멸 및 부종성으로 저당권 당연 소멸’ 법리는 x •••\n면책적 채무인수는 인수인이 새로이 당사자로 종래와 동일 채무 부담하고 동시 에 종\n래 채무자는 탈퇴 • 면책되는 것일 뿐 종래 채무 소멸 아니므로 [96다27476]\n\n正辯 : 459조 규정과는 별개의 문제임", "", [], 0, "채권양도", 71, "미분류"],
  ["채권총론_P344", "4294민상1087", "채무인수가 면책적인지 병존적인지 불분명할 경우 병존적 채무인수로 해석", "[判例] 채무인수가 면책적인지 병존적인지 불분명할 경우 병존적 채무인수로 해석\n\n[4294민상1087]", "", [], 0, "채권양도", 71, "미분류"],
  ["채권총론_P345", "2011다56033", "채무자 인수인 합의 의한 중첩적 채무인수는 채권자가 수익 거절 의사표시", "[判例] 채무자 인수인 합의 의한 중첩적 채무인수는 채권자가 수익 거절 의사표시\n후 번복 X - 그러나 인수인이 승낙 여부 최고하며 채권자에게 중첩적 채무인수라\n\n고 알리지 않아 채권자가 면책적 채무인수로 잘못 알고 거절했다면 그 후 중첩적 채\n무인수계약 유효 존속하는 한 다시 수익 의사표시 O [2011다56033]", "", [], 0, "채권양도", 71, "미분류"],
  ["채권총론_P346", "96다56443", "중첩적 채무인수인이 자신의 채권자에", "[判例] 중첩적 채무인수인이 자신의 채권자에\n대한 채권으로 상계하면 418조 1항의 규정에 의하여 원채무자의 채무도 소멸 [96다56443] 正辯 : 중첩적 채무인수인과 채무자의 관계를 연대채무로 본 판례", "", [], 0, "채권양도", 72, "미분류"],
  ["채권총론_P347", "2009다32409", "“중첩적 채무인수가 채무자의 부탁 없이 채권자와의 계약으로 채무를 인수하", "[判例] “중첩적 채무인수가 채무자의 부탁 없이 채권자와의 계약으로 채무를 인수하\n는 것은 매우 드문 일이므로, 원칙적으로 주관적 공동관계가 있는 연대채무관계 一\n\n부탁이 없어 주관적 공동관계 없다면 부진정 연대관계” [2009다32409]\n\n正辯 : 판례 학습과정에서 ‘연대채무’, ‘부진정연대채무’ 등의 최종 결론이 나오면 항상 그 이후, 가", "", [], 0, "채권양도", 72, "미분류"],
  ["채권총론_P348", "2020다245958", "계약인수는 계약당사자 지위 승계, 계약에서 생기는 채권•채무, 해제권", "[判例2020] 계약인수는 계약당사자 지위 승계, 계약에서 생기는 채권•채무, 해제권\n등 포괄적 권리의무 양도, 양도인은 계약관계 탈퇴, 특별한 사정 없는 한 잔류당사자\n\n와 양도인 사이 계약관계 X, 채권채무 소멸 - 계약인수는 당사자 3인 관여 있어야\n효력 발생（통상 양도인•양수인•잔류당사자 합의 삼면계약, 2인 합의가 선행하면 나\n\n머지 동의 .승낙 있어야 효력 발생）, 개별 채권양도는 양도인 • 양수인 2인 관여로 효력\n발생 - 채권양도에서 채무자 보호 위한 대항요건은 계약인수에서는 별도 요구 X,\n\n상법상 영업양도 수반 계약인수도 마찬가지 [2020다245958]\n\n正辯 : 甲회사와 己회사 사이 영업양도계약 체결하며 근로자（內 등）에 대한 사용자의 모든 권리의\n무 이전, 內도 己회사와 동일조건 근로계약（종전 근로기간 소급 작성） — 영업양도 전 內이 甲회사\n업무 관련 고객 돈 횡령한 경우, 甲회사의 內에 대한 손해배상채권도 己회사가 승계취득 o •■• 잔", "", [], 0, "채권양도", 72, "미분류"],
  ["채권총론_P349", "2012다41359", "채권 압류는 지급금지 명하지만 채권 발생원인인 법률관계에 대한 처분까지 구", "[判例] 채권 압류는 지급금지 명하지만 채권 발생원인인 법률관계에 대한 처분까지 구\n속 X — 계약인수 O, 양도인 탈퇴하지만 양도인이 계약관계로 가지던 권리의무 동일\n\n성 유지한 채 양수인에 승계, 양수인은 압류로 권리 제한된 상태의 채권 이전받음 一\n\n제3채무자는 계약인수 내세워 압류채권자에게 대항 X [2012다41359]\n-", "", [], 0, "채권양도", 72, "미분류"],
  ["채권총론_P350", "2014다52933", "임대차계약에서 계약인수 있더라도 임대차보증금반환채권의 양도 부분은 확정", "[判例] 임대차계약에서 계약인수 있더라도 임대차보증금반환채권의 양도 부분은 확정\n\n일자 있어야 그에 대하여 가압류 등 받은 채권자에게 대항 O [2014다52933]", "", [], 0, "채권양도", 72, "미분류"],
  ["채권총론_P351", "2008다475072", "“이행인수인은 채무자에 대하여 ‘채권자에게 채무를 이행’할 의무 o", "[判例] “이행인수인은 채무자에 대하여 ‘채권자에게 채무를 이행’할 의무 o\n그러나 채권자에 대해서는 인수인이 채무부담 X, 불이행해도 그에게 채무불이행 X\n\n채권자는 인수인에게 직접 채무 이행청구 X — 채권자는 채무자의 인수인에 대한 청\n구권을 대위행사 O ••• 채무자의 인수인에 대한 이행청구권은 일신전속권이 아닌 재\n\n산권 O” [2008다475072]\n\n正辯 : 이 경우에는 피보전채권 ■ 피대위권리가 물건인도•금전지급에 관한 채권인지 여부를 불문하고", "", [], 0, "채권양도", 73, "미분류"],
  ["채권총론_P352", "92다23193", "“부동산 매수인이 매매목적물의 근저당권 피담보채무, 가압류채무, 임대차보", "[判例] “부동산 매수인이 매매목적물의 근저당권 피담보채무, 가압류채무, 임대차보\n증금반환채무를 인수하는 한편 그 채무액을 매매대금에서 공제하기로 약정한 경우,\n특별한 약정이 없는 이상 이행인수 （면책적 채무인수 X）” [92다23193]", "", [], 0, "채권양도", 73, "미분류"],
  ["채권총론_P353", "2007다454627", "부동산 매수인이 부동산에 결부된 채무를 인수하고 채무액만큼 매매대금을", "[判例] 부동산 매수인이 부동산에 결부된 채무를 인수하고 채무액만큼 매매대금을\n\n공제받기로 약정한 경우, 이행인수인지 병존적 채무인수（제3자를 위한 계약）인지 구\n별기준 : 계약당사자에게 제3자（채권자）가 계약당사자 일방 또는 채무인수인에 대하\n여 직접 채권을 취득케 할 의사가 있는지 여부 一 인수 대상 채무의 책임을 구성하는\n권리관계도 함께 양도하거나 인수인이 채무부담에 상응하는 대가 얻는 경우는 원칙\n\n적으로 병존적 채무인수 O, 이행인수 X [2007다454627]", "", [], 0, "채권양도", 73, "미분류"],
  ["채권총론_P354", "2007다8464", "이때 채권자에 대한 관계에서는 여전히 매도인이 채무 부담하지만, 매도", "[判例] 이때 채권자에 대한 관계에서는 여전히 매도인이 채무 부담하지만, 매도\n인•매수인 사이에서는 매수인이 변제할 책임 一 매수인이 변제 게을리하여 근저당\n\n권 실행됨으로써 매도인이 소유권 상실했다면 오로지 매수인 귀책사유 O — 538조\n적용. 매도인은 매수인에 대하여 여전히 매매대금청구 O [2007다8464]", "", [], 0, "채권양도", 73, "미분류"],
  ["채권총론_P355", "93다19108", "“매수인은 현실적으로 당장 변제할 의무 X, 이행인수 약정하였으므로, 매매대", "[判例] “매수인은 현실적으로 당장 변제할 의무 X, 이행인수 약정하였으므로, 매매대\n금에서 채무액 공제한 나머지를 지급함으로써 잔금지급의무 다한 것 O, 인수인이\n인수채무를 현실적으로 변제 않았다는 사정만으로 매도인은 매매계약 해제 X” [93다19108]\n©", "", [], 0, "채권양도", 74, "미분류"],
  ["채권총론_P356", "92다23193", "“부동산매매계약• 이행인수계약이 함께 이뤄진 경우, ® 매수인의 인수채무", "[判例] “부동산매매계약• 이행인수계약이 함께 이뤄진 경우, ® 매수인의 인수채무\n\n불이행으로 말미암아 또는 ® 임의로, 매도인이 인수채무를 대신 변제했다면, 그\n로 인한 ® 손해배상채무 또는 © 구상채무는 인수채무의 변형（=매매대금지급채무\n에 갈음한 것의 변형）이므로 매도인의 소유권이전등기의무와 동시이행 O” — 인수\n\n인이 인수채무 변제 게을리 하여 경매가 개시되고 매도인이 경매 막고자 변제했다면\n매도인은 손해배상채권 취득 O, 이를 들어 매매 해제 O” [92다23193]\n\n正辯 : 위 판결은 매도인이 대신 변제했음을 들어 매매 해제가 가능하지만. 해제를 위해서는 자신", "", [], 0, "채권양도", 74, "미분류"],
  ["채권총론_P357", "2020다294516", "이행인수계약 불이행으로 인한 손해배상 범위는 채무자가 이행 않음으", "[判例2021] 이행인수계약 불이행으로 인한 손해배상 범위는 채무자가 이행 않음으\n\n로써 생긴 통상 손해 한도로 一 매수인이 인수채무 변제 않아 원리금 늘어났다면 그\n원리금이 통상 손해 O [2020다294516]", "", [], 0, "채권양도", 74, "미분류"],
  ["채권총론_P358", "76다2218; 2001다79013", "460조는 수령거절의 번의가능성을 고려하여 구두제공을 규정한 취지, “변제를", "[判例] 460조는 수령거절의 번의가능성을 고려하여 구두제공을 규정한 취지, “변제를\n수령하지 않을 의사가 명백하여 번의가능성 없다면 구두제공도 불필요 一 채무자는\n채무불이행 책임\n\nX” [76다2218]\n\n正辯 : 판례는 예전부터 461조 면책의 효과를 강조해왔고, 후술하는 ‘위험부담’에서는 [2001다79013]", "", [], 0, "채권소멸변제", 76, "미분류"],
  ["채권총론_P359", "2018다252014", "채권자 수령거절 의사 명백히 표시하고 의사 뒤집을 가능성 안 보이면", "[判例2021] 채권자 수령거절 의사 명백히 표시하고 의사 뒤집을 가능성 안 보이면\n채무자는 채무 이행 • 이행제공 않더라도 채무불이행 면책, 그렇지 않다면 채무자는\n채무내용 좇은 이행제공해야 채무불이행 면책 [2018다252014]", "", [], 0, "채권소멸변제", 76, "미분류"],
  ["채권총론_P360", "", "“469조 2항의 ‘이해관계’나 481조의 ‘변제할 정당한 이익’이 있는 자는 변제하", "[判例] “469조 2항의 ‘이해관계’나 481조의 ‘변제할 정당한 이익’이 있는 자는 변제하\n지 않으면 채권자로부터 집행을 받거나 채무자에 대한 자기 권리 잃게 되는 지위이\n기 때문에 변제함으로써 당연히 대위의 보호 받아야 할 법률상 이익 있는 자”를 말하\n\n며, 단지 사실상 이해관계 가진 자 X\n공동 저당에서 물상보증인 소유 후순 위담보권자는 공동 저당권자가 물보 소유물에서\n\n배당받고 남은 채무를 채무자 의사에 反하여 대위변제할 이해관계\n\nX •/ 물상보증인\n\n이 대위취득한 채무자 소유 부동산에 대한 공동저당권자의 저당권을 후순위담보권\n자가 물상대위할 수 있으므로 집행 받거나 권리 잃을 지위 없음 [2008마10이\n\n正辯 : 물보 소유 부동산의 후순위 담보가등기를 마친 자가 위 상황에서 채무자 소유 부동산에 대", "", [], 0, "채권소멸변제", 76, "미분류"],
  ["채권총론_P361", "90다17774; 87다카1644; 2009다71558", "담보 가등기 경료된 부동산을 시효취득하여 소유권이전등기권 취득한 자가", "[判例] 담보 가등기 경료된 부동산을 시효취득하여 소유권이전등기권 취득한 자가\n\n등기 경료 못하던 중 채권자가 청산절차 거치지 않고 가등기에 기해 본등기 경료했\n다면 소유자에 대한 소이등청구권 보전하기 위해 소유자를 대위하여 그 채권자에게\n\n채무 변제할 법률상 권한 및 이해관계 있는 제3자 O [90다17774]\n\n[ 判例] 이해관계 없는 제3자의 변제가 채무자 의사에 반하는지 여부는 제3자 변제\n당시의 객관적 제반 사정에 비추어 명확하게 인식될 수 있어야, 함부로 채무자의 반\n대의사추정 X [87다카1644]\n\n[ 判例] 제3자의 변제로 타인 채무 소멸시키려면 제3자가 타인 채무 변제하는 의사를\n변제지정 통해 표시해야 一 채권자가 변제 수령하면서 제3자가 타인 채무 변제함을\n\n인식했다면 제3자의 타인 채무변제 지정 있는 것 O [2009다71558]", "", [], 0, "채권소멸변제", 77, "미분류"],
