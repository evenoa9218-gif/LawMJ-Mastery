  ["채권각론_C058","상임법 — 권리금 회수방해 손해배상 (제10조의4 제2항·제3항)","**제2항 3호 '1년 6개월 이상 영리목적 미사용'의 정당한 사유 판단**\n- 상임법 10조의4 2항 3호 '상가건물을 1년 6개월 이상 영리목적으로 사용하지 않은 경우'로 정당한 사유 있으려면, 임대인이 임대차 종료 시 임차인이 주선한 자와 신규 임대차계약 체결을 그 사유로 거절하고 실제 1년 6개월 동안 영리목적 사용하지 않아야 → 다른 사유로 거절하고 사후적으로 1년 6개월 동안 영리목적 사용하지 않았다는 사정은 정당한 사유 X [2019다285257]\n- 종전소유자 임대인이 임대차 종료 후 상가건물을 영리목적으로 사용하지 않은 기간이 1년 6개월에 미달한 사이에 소유권 변동되어도, 임대인이 영리목적 사용 않는 상태가 새로운 소유자 소유기간에도 계속 유지될 것 전제로 처분하고, 실제 새로운 소유자가 그 기간 중 영리목적 사용 않으며, 임대인과 새로운 소유자의 비영리 사용기간을 합쳐서 1년 6개월 이상 되는 경우라면, 위 3호의 정당한 사유 O [2021다272346]\n\n**제2항 4호 '정당한 사유'**\n- 임대인 스스로 영업할 계획이라는 이유만으로 임차인이 주선한 신규임차인 되려는 자와 임대차계약 체결을 거절하는 것은 4호 '정당한 사유' X [2018다252441, 2024다305605]\n- 임차인이 신규임차인을 주선하지 않았더라도 임대인이 정당한 사유 없이 신규 임차인 주선하여도 임대차계약 체결하지 않겠다는 의사를 확정적으로 표시했다면 임차인이 실제로 신규 임차인 주선하지 않았더라도 위 손해배상책임 O [2018다284226, 2022다202498, 2024다305605]\n- 손해배상책임을 위해 반드시 임차인과 신규임차인 되려는 자 사이 권리금계약이 미리 체결돼 있을 필요 X ∵ 규정 문언상 권리금계약 체결을 전제로 하지 않음, 3항은 '임대차종료 당시 권리금'으로 손해배상 정할 수 있도록, 임대인이 권리금계약 체결에 이르지 못하게 하는 방해행위도 포함되므로 [2018다239608]\n\n**손해배상과 동시이행 / 소멸시효**\n- 동시이행관계는 쌍무계약 고유 대가관계 채무 아니더라도 대가적 의미 있거나 공평의 관점에서 인정 가능 → 임차목적물반환의무와 권리금 회수 방해로 인한 손해배상의무는 공평 관점에서도 동시이행관계 X ∵ 전자는 임대차계약 종료로, 후자는 상임법의 권리금 회수기회 보호의무 위반으로 발생 [2018다242727]\n- 상임법상 임대인의 권리금 회수기회 방해로 인한 손해배상채무는 특별한 법정책임이며, 임대차 종료한 날 이행기 도래 O, 그 다음날부터 지체책임 O ∵ 손해배상이 종료 당시 권리금 넘지 않도록 규정한 점, 그 소멸시효 기산일이 임대차 종료한 날인 점 등 [2022다260586]\n\n正辯: 결국 임대차 종료하면 임차인의 목적물반환 여부와 상관없이 그 다음날부터 지체책임 발생. 한편 목적물 미반환 상태에서도 권리금 회수 방해 손배채권을 자동채권으로 상계 O.",["§상임법10"],0,"상임법"],
  ["채권각론_C059","도급 — 서설·제작물공급계약·턴키계약·수급인 일완성의무 (제664조)","**도급(제664조)**: 일방이 일을 완성, 상대방이 일의 결과에 대하여 보수 지급\n\n**제작물공급계약**: 일방이 상대방의 주문에 따라 자기 소유 재료를 사용하여 만든 '물건'을 공급하기로 하고 대가를 지급하기로 하는 계약 → 매매인가 도급인가\n- [判例] 제작물공급계약은 제작 측면은 도급, 공급 측면은 매매 → 매매·도급 성질을 함께 가짐 → 대체물이면 매매로, 부대체물이면 도급으로 보아 각 규정을 적용\n  ⓐ '주문에서 제시한 도안·규격에 맞는 茶의 자동포장기 제작·공급계약' → 도급 → 상법 69조 1항 적용 X [86다카2446]\n  ⓑ '신축 건물에 맞추어 일정 사양으로 특정된 승강기 제작설치 공사계약' → 도급 → 승강기제작자의 대금채권은 163조 3호 공사 관한 채권 3년 단기시효 [2010다56685]\n\n**설계시공일괄입찰(턴키베이스)방식 도급계약**: 도급인이 전문적 지식 없어 수급인에게 원하는 목적 설명하고 수급인은 목적 충분히 이해한 후 그의 판단에 설계부터 시공까지 일괄하여 책임지는 도급계약 (주로 입찰방식으로)\n- 난지도 쓰레기처리장 건설공사 완공 후 도급계약 해제된 경우, 기계 및 전기공사부분에만 효력 미치고, 토목 및 건축공사 기성고부분에는 해제 효력 X ∵ 668조 단서 취지, 신의칙, 수급인 과대 손실, 사회경제적 손실 [92다41559]\n\n**수급인의 일을 완성할 의무, 목적물인도의무**\n- 일을 완성할 의무는 보수지급의무보다 선이행의무 O, 동시이행관계 X\n- 완성물의 인도의무는 보수지급의무와 동시이행관계 O (제665조 제1항)\n- 공사도급계약에서 특약 있거나 일의 성질상 수급인 자신이 해야 할 경우 등 특별한 사정 없는 한 반드시 수급인 자신이 직접 일 완성해야 하는 것은 아님 → 이행보조자·이행대행자 사용하더라도 계약불이행 X [2001다82545]",["§664","§665"],0,"도급"],
  ["채권각론_C060","도급 — 지체상금 약정","**지체상금 발생 시기와 종기**\n- 지체상금 발생 始期는 약정 준공일, 終期는 건물준공시까지 무한 계속 X → '공사중단 등 해제사유로 도급인이 해제할 수 있었을 때(실제로 해제한 때 X)부터 도급인이 다른 업자에 의뢰하여 같은 건물을 완성할 수 있었던 시점까지'로 제한(수급인 책임질 수 없는 사유로 공사 지연된 경우는 그 기간만큼 공제) [95다18376, 95다11436]\n\n**398조 2항 감액과 산정 기준**\n- 이로써 산정된 지체상금액이 부당히 과다 인정되면 법원은 398조 2항에 의하여 적당히 감액 O\n- '지체상금 = 계약 총액 × 지체상금률'로 산출할 경우 398조 2항 따른 감액은 지체상금 '총액' 기준 O ∵ 손해배상 예정은 문언상 예정액의 총액 의미 → '지체상금률' 자체는 과다하지 않은데 단순히 지체일수 증가로 인하여 지체상금 '총액' 증가한 경우도 총액 기준 감액 O\n\n**지연손해금의 발생 원인 — 도급인 자신의 이행지체**\n- 분양한 아파트의 하자와 관련하여 도급인이 구분소유자에게 손해배상금 및 지연손해금 지급 → 지연손해금은 수급인의 도급계약상 채무불이행과 인과관계 X, 도급인 자신의 이행지체에 따라 발생한 것 [2011다67323]\n\n**동시이행관계 부정**\n- 지체상금채권과 공사대금채권은 특별한 사정 없는 한 동시이행 X [2013다81224]\n正辯: 본 사안은 하도급법에 따른 직접지급청구권의 발생시기와 상계 가부에 관한 것인데, 민법에서는 공사대금채권의 채권양도·지급금지명령이 있고 그 통지도달일·명령송달일보다 늦게 지체상금채권이 발생한 사례로 변형 가능 → 451조2항·498조 규정상 상계 요건 갖추지 못함 → 서로 동이항 관계면 예외적 허용되나 동이항 관계 아니므로 최종적으로 상계 불허\n\n**기한 도래 전 해제 — 최고 요건**\n- 공사도급계약에서 수급인의 공사중단·공사지연으로 약정된 기한 내의 공사 완공 불가능함이 명백해졌다면 도급인은 기한 도래 전에도 해제 O, 단 그에 앞서 수급인에 대해 공사기한으로부터 상당 기간 내 완공할 것을 '최고'해야 → 예외적으로 수급인이 미리 이행하지 않을 의사 표시했다면 최고 불요 [96다21393]\n- 공사 도중 도급계약 해제되어 수급인이 공사 중단하면 지체상금 논할 여지 X [88다카15901]",["§398"],0,"도급"],
  ["채권각론_C061","도급 — 신축건물의 소유권 귀속관계","**원칙**: 수급인이 자기 재료·노력으로 건물 건축하면 특별한 의사표시 없는 한 도급인이 대금 지급하고 건물 인도 받기까지는 소유권은 수급인에게 [80다1014]\n- 수급인의 재료·노력으로 건축된 독립한 건물 기성부분에 수급인은 유치권 X ∵ 건물은 수급인 소유이고 유치권은 타물권이므로 [91다14116]\n\n**도급인 귀속 합의가 있는 경우**\n- 도급계약에서 수급인이 자기 노력·재료 들여 건물 완성해도 도급인 명의로 건축허가 받아 소유권보존등기 하기로 하는 등 건물 소유권 도급인 귀속 합의 있다면 도급인 원시취득 O\n\n**채무담보 목적의 건축허가명의**\n- 단지 채무담보 위해 채무자가 자기 비용·노력으로 신축하는 건물의 건축허가명의를 채권자 명의로 한 경우, 이는 완성될 건물의 담보제공 합의 O → 완성된 건물의 소유권은 일단 채무자가 원시취득한 후, 채권자 명의로 소유권보존등기를 마침으로써 담보목적 범위 내에서 채권자에게 소유권 이전 O [91다25505]\n正辯: 매매대금채무 담보 사안이었으며, 가담법 적용되는 대여금채무 담보 목적인 경우에 관하여는 비전형담보에서 후술하는 최신판례 참조\n\n**건축허가서상 건축주와 무관하게 소유권 원시취득**\n- 자기 비용·노력으로 건물 신축한 자는 건축허가의 타인 명의 여부에 관계없이 소유권 원시취득 ∵ 건축허가는 일반적 금지 해제, 건축허가서는 실체적 권리득실변경 공시방법 X, 추정력 X, 건축허가서상 건축주가 건물 소유권 취득 X\n→ 건축주 사정으로 공사 중단된 미완성 건물 인도받아 나머지 공사 마쳐 완공한 경우, 공사 중단된 시점에서 이미 사회통념상 독립한 건물(지붕·주벽·기둥)이라면 원래의 건축주가 건물 소유권 원시취득 O [2000다16350]",["§664","§320"],0,"도급"],
  ["채권각론_C062","수급인의 담보책임 — 하자보수청구권·손해배상청구권 (제667조)","**구조**: ① 하자보수청구권, ② 손해배상청구권, ③ 해제권\n\n**① 하자보수청구권(제667조 제1항)**: 완성된 목적물, 완성 전 성취부분에 하자 있으면 상당 기간 정하여 보수 청구. 그러나 하자 중요하지 않고 과다 비용 요하면 X\n\n**② 손해배상청구권(제667조 제2항)**: 하자보수청구 갈음하여·함께 손해배상 청구. 손해배상청구와 보수지급은 동시이행관계(제3항)\n\n**미완성과 하자의 구별**\n- 건물 신축공사의 '미완성'과 '하자'를 구별 기준은, 공사가 도중에 중단되어 예정된 최후 공정 종료하지 못한 경우는 '미완성', 당초 예정된 최후 공정까지 일단 종료하고 그 주요 구조 부분이 약정대로 시공되어 사회통념상 건물로서 완성되고 다만 불완전하여 보수 필요하면 완성되었으나 '하자' → 당해 신축공사 도급계약의 구체적 내용과 신의성실 원칙에 비추어 객관적으로 판단해야 [97다44768]\n- 하자보수비는 하자보수청구시 또는 보수 갈음 손해배상청구시를 기준으로 산정하여야 [80다923]\n\n**667조 1항 단서 — 하자 중요하지 않고 보수 과다 비용**\n- 667조 1항 단서 하자가 중요하지 않고 보수 과다 비용 요하면 하자 보수 X, 보수 갈음 손해배상 X, '하자로 인해 입은' 손해배상 O = 하자 없이 시공한 목적물 교환가치와 하자 있는 현재 상태 '교환가치 차액', 다만 교환가치 차액 산출 불가능한 경우 두 경우의 '시공비용 차액'으로 배상 [97다54376]\n- 하자가 중요하다면 보수에 과다한 비용 들더라도 보수에 갈음하는 비용, 즉 실제로 보수에 필요한 비용 모두 손해배상 포함 O [95다30345]\n- 완성된 건물에 중대한 하자가 있어 무너질 위험성 있고 보수 불가능하여 다시 건축할 수밖에 없다면 철거 및 재건축 비용 상당액 손해배상 O [2014다31691]",["§667"],0,"도급"],
  ["채권각론_C063","수급인 담보책임 — 동시이행관계의 범위 및 채무불이행책임과의 경합","**동시이행관계의 범위와 행사방법**\n- 완성된 목적물 하자 있을 경우 하자보수청구권, 갈음·함께 손해배상청구권 있는데 이들은 특별한 사정 없는 한 보수지급청구권과 동시이행 O → 목적물 하자 있다는 이유로 도급인이 하자보수나 손해배상 청구 없이 막바로 보수지급 거절 X → 도급인이 보수지급 거절하려면 먼저 하자보수청구권, 손해배상청구권, 함께 청구 등 명료하게 해야 [91다33056]\n\n**기성고 분할지급 약정과 동시이행 범위**\n- 기성고에 따른 공사대금 분할지급 약정을 한 경우라도 특별한 사정 없는 한 '하자보수의무'와 동시이행관계에 있는 '공사대금지급채무'는 당해 하자 발생 부분의 기성공사대금에 한정되지 X ∵ 도급인이 하자발생사실을 모른 채 하자 발생 부분의 기성공사대금 지급하고 난 후 뒤늦게 하자 발견하면 공평에 반함\n- 미지급 공사대금(약 54억)에 비해 하자보수비(약 7억) 매우 적고, 하자보수공사가 완성되어도 공사대금 지급 여부 불확실한 경우(도급인이 기성공사대금 전혀 지급하지 않았고 현재 무자력), 도급인이 '하자보수청구권'으로 동시이행항변 할 수 있는 기성공사대금 범위는 하자 및 손해 상응 금액 한정 ∵ 공평, 신의칙 [2001다9304]\n\n**손해배상청구와 동시이행 범위 한정**\n- 완성된 목적물 하자로 도급인이 하자보수 갈음 '손해배상청구'를 한 경우에 도급인은 그 손해배상액 상응하는 보수액만 지급 거절 O, 나머지는 지급 거절 X → 공사대금채권 중 손해배상채권과 동액의 채권만 동시이행관계 [95다12798]\n正辯: 한편 '하자보수청구권과 갈음·함께 손해배상청구권은 공사대금채권과 동시이행관계로서, 도급인이 위 권리 보유·행사하는 한 공사대금채무는 이행지체 빠지지 않고, 손해배상채권(자동채권)으로 공사잔금채권(수동채권)과 상계 의사표시를 한 다음날 비로소 지체'라는 96다7250 판결은, 위 95다12798 판결과 모순되는 측면이 있으나 따로 익혀둘 것\n\n**확대손해(하자담보책임 vs 채무불이행책임)**\n- 액젓 저장탱크 제작·설치공사 도급계약에서 완성된 저장탱크에 균열 발생한 경우 → ⓐ 보수비용은 667조 2항 수급인의 하자담보책임 중 하자보수에 갈음하는 손해배상, ⓑ 액젓 변질로 인한 손해배상은 '위 하자담보책임을 넘어서 수급인이 도급계약상 의무를 제대로 이행하지 못함으로써 도급인의 신체·재산에 발생한 손해에 대한 배상' → 양자는 별개 권원에 의하여 경합적 인정 [2001다70337]\n正辯: '보수비용'은 담보책임으로 물을 수 있으나, '액젓변질손해(확대손해)'는 담보책임으로 물을 수 없어 채무불이행책임(불완전이행)으로 구성한 판례이며, 위 각 손해는 별개로 모두 배상받아야 하는 것이므로 위 판례가 '경합적'으로 인정한다고 표현한 것은 잘못으로 생각됨(私見)\n\n**완성물 하자 vs 채무불이행책임 경합 — 부가가치세·소멸시효**\n- 도급계약의 완성물에 하자 있는 경우, 수급인의 하자담보책임과 채무불이행책임은 별개 권원에 의해 경합적 인정 O → 도급인은 하자보수비용을 667조 2항 하자담보책임으로도, 390조 채무불이행으로도 구할 수 O → 채무불이행으로 구할 경우 이행보조자 규정 적용 O, 계약특수조건에 하자보수보증기간 경과했어도 채무불이행책임(불완전이행) 손해배상책임 주장 O [2020다201156]\n- 도급인이 보수공사에 부가가치세 부담해야 한다면 수급인에 대한 하자보수 갈음 손해배상청구에 포함시켜 청구 O → 그러나 도급인이 부가가치세 과세사업자로서 매출세액에서 공제·환급받을 수 있다면 부가가치세 상당 손해배상청구 X\n- 건설공사 도급계약이 상행위라면 수급인의 하자담보책임은 상법 64조 본문에 의해 소멸시효기간 5년, 민법 166조 1항에 따라 하자 발생 시점부터 진행함이 원칙 → 그러나 하자가 건물 인도 당시부터 이미 존재하고 있었다면 하자보수 갈음 손해배상채권의 소멸시효는 건물 인도한 날부터 진행 [2021다210195]",["§667","§390"],0,"도급"],
  ["채권각론_C064","수급인의 해제권 (제668조) — 완성 건물·공작물 해제금지","**해제권(제668조)**: 완성된 목적물 하자로 목적 달성 불능시 해제 O. 그러나 '건물 기타 토지 공작물'은 (완성된 경우) 해제 X\n\n**의미 이해**: '완성된' 목적물은 목적달성 불능한 경우 해제 가능한데, 반대로 '건물 기타 공작물'이라면 '완성된' 경우에는 아무리 하자가 중대하여도 해제 X\n\n**완성 건물·공작물 해제금지 규정(제668조 단서)**: 강행규정 [통]\nⓐ 도급인은 하자보수·손해배상만 청구 O\nⓑ 공작물 완성 전에는 가령 수급인 채무불이행 있으면 도급인은 해제 O → 미완성이므로 수급인은 이론상 보수청구 X → 그러나 판례는 정도에 따라 보수청구 인정\n\n**미완성부분이 있어도 해제 시 기성부분은 보수청구 인정**\n- 건축도급계약에서 '미완성부분 있더라도 공사가 상당 정도 진척되어 그 원상회복이 중대한 사회·경제적 손실 초래하고 완성된 부분이 도급인에게 이익이 되는 경우, 수급인의 채무불이행을 이유로 도급인이 도급계약 해제해도 미완성부분만 도급계약 실효' → 수급인은 해제한 때 상태로 도급인에게 인도, 도급인은 완성부분 상당한 보수(약정총공사비에 중단 당시 공사기성고비율 곱한 금액) 지급해야 O, 수급인이 실제로 지출한 비용 X → 여기서 '기성고비율'은 완성된 부분 소요비용에 미시공 부분 소요비용을 합친 전체공사비 중 완성된 부분 소요비용이 차지하는 비율 → 도급인의 채무불이행으로 해제된 경우도 마찬가지 O [93다25080, 91다42630, 88다카32470] → 합의해제 사안에도 같은 법리 적용\n\n**보수지급의 인도 동시이행과 해제 전 보수청구권 부정**\n- 도급계약에서 보수는 완성물 인도와 동시에 지급해야, 인도 요하지 않는 경우 완성 후 지체없이 지급해야 → 도급인은 완성물 인도제공이나 완성 있을 때까지 보수지급 거절 O → 일의 완성 전에 계약 해제된 경우는 수급인 보수청구 X\n- 다만 수급인 일부 미완성 부분 있더라도 해제 이유로 전부 원상회복함이 신의칙 등에 비추어 공평·타당하지 않은 특별한 경우는 예외적으로 완성된 부분에 수급인의 보수청구권 인정 O → 도급인·수급인 관계, 도급계약 목적·성질, 도급인 관여 여부, 이행 결과 정도 및 그로 인해 도급인 얻을 실질적 이익 존부, 해제 따른 원상회복 시 사회적·경제적 손실 발생 여부 등을 종합적 고려해야 [2022다289174]\n正辯: 기존 판례의 '공사가 상당 정도 진척되어 원상회복이 중대한 사회·경제적 손실 초래하고 완성 부분이 도급인에게 이익되는 경우'와 유사한 판결\n\n**설계·사양 변경 시 기성고 비율 적용 기준**\n- 미완공 상태로 해제되어 기성고 공사비 정산할 경우, 설계·사양 '변경' 있으면 공사대금 변경하는 특약 있었고, 변경된 설계·사양으로 공사 진행되다가 중단되었다면, 변경된 공사대금에 기성고 비율 적용 [2020다210860]",["§668"],0,"도급"],
  ["채권각론_C065","도급인의 의무 — 보수지급(선급금)·해제권·도급의 종료 (제673조·제674조)","**보수지급의무**: 일의 완성이 선이행의무, 그러나 인도와는 동시이행의무. 수급인은 보수지급채권으로 유치권 O [통판]\n\n**선급금의 성격과 충당**\n- 공사도급계약에서 수수되는 '선급금'은 수급인 자금사정 고려하여 도급인이 장차 지급할 공사대금 미리 지급하는 것 → 전체 공사에 대한 공사대금 O, 구체적 기성고 공사대금 X → 해제·해지로 도중에 선급금 반환하게 되면 특별한 사정 없는 한 별도 상계 의사표시 없이 선급금이 그때까지 기성고 해당 미지급 공사대금에 충당 O, 도급인은 나머지 공사대금 있다면 그 금액만 지급의무 부담\n- 선급금 충당 대상은 당사자 약정에 따르고, '도급인이 하수급인에게 하도급대금 직접 지급하는 사유' 발생할 경우 그 금원을 선급금 충당 대상인 기성공사대금 내역에서 제외하기로 예외적 정산약정 했다면, 도급인은 미정산 선급금이 기성공사대금에 충당되었다며 하수급인에게 하도급대금 지급의무 면할 수 X → 예외적 정산약정의 존재 인정은 신중해야\n- 선급금반환 보증계약 체결한 보증인의 책임 범위도 도급계약 당사자 사이 약정에 따라 결정하되 보증계약 체결 당시의 도급계약상 약정을 기준으로 판단해야 → 선급금 보증계약 체결 '후' 도급인 직접 지급 합의하고 하도급대금을 선급금 충당 대상에서 제외하는 예외적 정산약정을 하여 선급금 보증인의 책임 가중된다면 그 범위 내에서는 보증 효력 X [2016다267067]\n正辯: 직접 지급사유 발생한 하도급대금을 선급금 충당 대상인 기성공사대금 내역에서 제외하는 예외적 정산약정 → 건설공제조합이 선급금 보증계약 체결 → 하도급법상 직불합의 → 직불합의에 직불합의 대상(하도급대금)을 선급금 충당 대상 기성공사대금 내역에서 제외하는 예외적 정산약정도 포함된 것 O → 보증계약 체결 '이후' 이뤄진 발주자·수급인·하수급인 사이 직불합의에 따른 예외적 정산약정은 그들 사이에서만 효력, 선급금 보증인에게는 효력 X → 도급인은 보증인에게 직접지급사유 발생한 하도급대금의 선급금 충당 제외 항변 X, 건설공제조합(보증인)은 하도급대금을 선급금으로 충당하고 남은 선급금만 보증책임\n\n**수급인의 목적부동산에 대한 저당권설정청구권(제666조)**: 부동산공사의 수급인이 보수채권 담보 위하여 그 부동산을 목적으로 한 저당권설정을 청구 O. 채권적 청구권으로서 등기가 되었을 때 비로소 저당권자\n- 666조 저당권설정청구권의 소멸시효기간은 3년 ∵ 공사대금채권 및 공사에 부수되는 채권은 163조 3호 3년 단기시효, 666조는 공사대금채권을 담보하기 위한 채권적 청구권으로서 공사에 부수되는 채권\n- 건물신축공사 도급계약에서 수급인이 자기 노력·출재로 건물 완성하여 소유권이 수급인에게 귀속되면, 수급인으로부터 공사 일부 도급받은 하수급인도 수급인에 대해 666조 저당권설정청구 O ∵ 666조가 도급인·수급인 특약으로 도급인이 원시취득할 경우를 고려한 규정이므로 → 이 경우 객관적으로 하수급인이 행사할 수 있음을 알 수 있게 된 때부터 소멸시효 진행 ∵ 건물 소유권 귀속은 하수급인 관여 없이 도급인·수급인 사이 체결된 도급계약에 따라 결정, 하수급인이 객관적으로 알 수 없는데 소멸시효 진행하는 것은 정의·형평 反 [2014다211978]\n- 666조 저당권설정청구권 행사에 따라 도급인이 저당권을 설정하는 행위는 사해행위 X ∵ 수급인 지위가 유치권자보다 더 강화되지는 않아서 도급인의 일반채권자들에게 부당하게 불리한 것 X. 공사대금채권 양도되면 저당권설정청구권도 수반하여 함께 이전 O ∵ 저당권설정청구권은 공사대금채권에 부수한 권리 → 수급인으로부터 공사대금채권 양수한 자의 저당권설정청구로 도급인의 저당권설정행위는 사해행위 X [2015다19827]\n\n**도급의 종료**\n- 완성 전 도급인의 해제권(제673조): 완성 전이면 도급인은 손해배상하고 해제 O\n- 일을 완성했다면 인도하지 않았더라도 673조 해제권 X [95다1521]\n- 도급인이 수급인의 채무불이행 이유로 도급계약 해제 의사표시 했으나 실제로 채무불이행 요건 갖추지 못한 경우, 위 의사표시에 673조 임의해제 의사 X ∵ 채무불이행 해제는 손해배상 청구하고 673조 해제는 손해배상을 해줘야 하므로 도급인의 의사와 다름, 수급인은 채무불이행 없으므로 해제 무효라 믿고 일 계속했다가 673조 해제되면 불측 손해 [2022다246757]\n- 도급인이 673조 해제한 경우 수급인에 대한 손해배상 함에 있어서 수급인의 과실을 들어 과실상계 X [2000다37296]\n- 도급인의 파산(제674조)",["§666","§673","§674"],0,"도급"],
  ["채권각론_C066","소비대차 — 의의·대물반환의 예약·준소비대차 (제598조~제608조)","**의의(제598조)**: 금전 기타 대체물의 소유권 이전할 것, 그와 같은 종류·품질·수량으로 반환할 것을 약정. 원칙적 무상(이자는 요소 X), 이자약정 있다면 유상\n\n**반환시기**: 약정이 없을 때 대주는 상당 기간 정하여 반환 최고해야(제603조 제2항), 차주는 언제든지 반환(단서)\n\n**대물반환의 예약(제607, 608조)**: 차용물에 갈음하여 다른 재산권 이전 예약한 경우, 예약 당시 재산 가액은 차용액·이자 합산액 초과 금지 → 편면적 강행규정\n- 선순위근저당권 설정되어 있다면 그 피담보채무액을 뺀 나머지가 재산 가액\n- 재산 가액 산정은 예약 당시 가액을 기준으로 O, 권리이전시 X\n- 차용액은 예약 당시 원금과 약정이자 기준으로 하되, 예약 이후 추가 차용한 경우 포함하여 산정 [87다카992] → 위 규정 적용 가능성 낮아짐\n- 대물반환 예약이 607조, 608조 적용으로 무효인 경우도 특별한 사정이 없는 한 예약당사자 간 소위 '약한 의미의 양도담보계약' 함께 맺은 취지 [68다1654] = 담보 목적 소유권 이전 = 정산형 양도담보약정 → 유효 부분\n正辯: 가담법 위반의 경우 약한 의미의 양도담보계약으로서의 효력도 없다고 한 판례와 구별. 대물반환 예약에 터 잡아 가등기·소유권이전등기 마쳐지면 가담법 적용 O\n\n**준소비대차(제605조)**: 소비대차에 의하지 않고 금전 기타 대체물 지급할 의무 있는 경우 당사자가 소비대차 목적으로 할 것을 약정하면 소비대차 효력 발생 O\n- 경개나 준소비대차는 모두 기존채무 소멸시키고 신채무를 성립시키는 계약인 점에 있어서는 동일 → 경개는 기존채무와 신채무 사이 동일성 X, 준소비대차는 원칙적 동일성 O → 당사자의 의사가 명백하지 않다면 준소비대차 ∵ 경개로 보게 되면 채권자는 담보를, 채무자는 항변을 상실하는 불이익 초래 [89다카2957]\n- 노임채권에 관하여 근로자와 회사 사이 준소비대차 약정 있는 경우 회사가 영업을 위하여 한 상행위 추정되어 소멸시효는 상사시효 5년 적용 O [80다1363]",["§598","§605","§607","§608"],0,"기타전형계약"],
  ["채권각론_C067","사용대차 — 의의·비용상환·존속기간·해지사유 (제609조~제617조)","**의의(제609조)**: 목적물을 무상으로 사용·수익하게 하기 위해 인도할 것, 사용·수익한 후 반환할 것을 약정\n- 계약서 명칭이 사용대차이더라도 사용·수익의 대가 지급한다면 임대차\n\n**비용상환**: 차주는 통상의 필요비는 스스로 부담해야(제611조 제1항) → 특별필요비 및 유익비 상환청구 O(제611조 제2항, 제594조 제2항, 제203조)\n- 매도인 선의인 계약명의신탁 관계에서 수탁자가 등기를 마친 후에 신탁자가 수탁자 용인 아래 그 부동산을 점유·사용해왔다면 수탁자와 신탁자 사이에 묵시적 '사용대차' 계약 인정 → 203조 적용 X [2008다34828]\n正辯: 그 비용상환에 관하여는 611조 2항 등이 적용될 것임(2001다64752 판결 참조)\n\n- 사용대차에서 차주는 유익비상환청구 O (611조 2항, 594조 2항, 203조 2항) → 그러나 종중이 종중원에게 종중 소유 토지를 무상 사용하도록 하는 묵시적 사용대차계약 성립한 경우, 사용·수익에 충분한 기간이 지난 후에 종중의 반환요청을 받은 종중원은 유익비상환청구 포기 묵시적 약정 O ∵ 토지의 장기 무상 사용대차는 종중·종중원 아니라면 매우 이례적, 장기간 토지 사용이익을 향유한 종중원의 유익비상환청구는 형평에 反 [2015다3914]\n\n**임대차에 준용되는 규정(제654조)**: 차주는 계약·목적물성질로 정하여진 용법으로 사용·수익해야(제610조 제1항), 차주의 원상회복의무 및 철거권(제615조), 공동차주의 연대의무(제616조), 계약·성질에 위반한 사용·수익으로 인한 손해배상청구, 차주의 비용상환청구는 물건반환일로부터 6개월 내에(제617조)\n\n**존속기간 만료(제613조)**: 반환시기 정하지 않은 경우 → 계약·성질에 의한 사용·수익 종료한 때 반환 → 사용·수익에 족한 기간 경과했다면 대주는 언제든 해지 가능\n\n**해지사유**: 계약·성질로 정해진 용법에 반한 사용·수익(제610조 제3항, 제1항), 승낙 없이 제3자에게 사용·수익(제610조 제3항, 제2항), 반환시기 약정 없고 사용·수익에 족한 기간 경과(제613조 제2항 단서), 차주 사망·파산선고(제614조)\n- 사용대차의 차주는 특약이 없는 한 대주의 승낙 없이 제3자에게 차용물 사용·수익하게 X(제610조 제2항) ∵ 무상계약은 증여처럼 개인적 관계 중점 → 차주가 규정 위반한 때 대주는 계약 해지 O(제3항), 계약 해지 없이도 제3자에 대해 목적물 인도청구 O, 차주의 권리 양도받은 자는 대주의 승낙 없으면 대주에게 대항할 수 X [2019다202795]",["§609","§610","§611","§613","§615","§617"],0,"기타전형계약"],
  ["채권각론_C068","여행계약 — 의의·여행업자 의무·여행자 권리 (제674조의2~제674조의9)","**의의(제674조의2)**: 운송·숙박·관광 또는 기타 여행 관련 용역 결합하여 제공할 것, 대금 지급 약정 → 도급계약과 유사한 독립계약 성질, 편면적 강행규정. 2015. 2.경 8개 조문 신설하여 2016. 2. 4.부터 시행\n\n**여행업자의 안전배려의무**\n- 여행업자는 우월적 지위로 일방적 결정, 여행자는 안전성 신뢰하고 여행업자 제공 조건에 따라 여행계약체결 → 여행업자는 '기획여행계약' 상대방인 여행자에 대해 신의칙상의 주의의무로서 기획여행계약상 부수의무 O → 여행자 생명·신체·재산 등 안전확보 위해 미리 충분한 조사·검토와 합리적 판단, 위험 사전제거 혹은 여행자에게 고지하여 선택의 기회 제공해야 → 국외여행인솔자는 이행보조자 → 기획여행 여행자가 여행지 놀이시설 이용 중 다른 여행자 과실로 상해 입었다면 여행인솔자 과실 있어 여행업자·국외여행인솔자 손해배상책임 O [98다25061]\n- 甲이 여행업자 乙회사와 해외여행계약 체결 후 여행 중 여행업자의 고의·과실 사고로 정신적 상해 → 甲이 사고 이후 지출한 국내 환자 후송비용, 해외에서의 치료·국내귀환·사고처리 과정에서 추가 지출한 체류비·국제전화요금 등 비용 → 여행업자 乙의 여행계약상 주의의무나 신의칙상 안전배려의무 위반과 상당인과관계 있는 통상손해 O, 설령 특별손해라 해도 예견가능성 O [2018다286550]\n\n**여행자의 해제·해지권**\n- 제674조의3: 여행자는 여행 시작 전에는 언제든지 계약 해제, 다만 손해배상\n- 제674조의4: 각 당사자는 부득 사유 있으면 해지, 다만 부득 사유의 발생에 과실 있는 자는 손해배상 → 계약 해지돼도 계약상 귀환운송의무 있는 주최자는 여행자 귀환운송 → 해지로 인한 추가비용은 해지사유 사정 있는 자, 누구도 아니면 분담\n\n**여행하자에 대한 시정청구·손해배상·해지**\n- 제674조의6: 여행에 하자 있으면 여행자는 여행주최자에게 하자시정이나 대금감액 청구, 다만 지나친 비용 소요나 합리적 기대 어렵다면 시정청구 X → 즉시시정해야 할 경우 아니라면 상당기간 정하여 청구해야 → 여행자는 시정 청구, 감액 청구를 갈음하여 혹은 그와 함께 손해배상청구\n- 제674조의7: 여행에 중대한 하자 있고 시정 않거나 계약내용 이행의 기대 없다면 여행자는 계약해지 → 해지되면 주최자 대금청구권 상실, 다만 여행실행 이익 얻은 여행자는 주최자에게 이익 상환 → 주최자는 계약해지로 필요한 조치해야, 계약상 귀환운송의무 있으면 귀환운송, 상당 이유 있다면 여행자에게 비용 일부청구\n- 제674조의8: 담보책임상의 권리는 여행기간 중에도 행사, 계약에 정한 여행 종료일부터 6개월 내에 행사해야\n- 제674조의9: 3·4·6·7·8 규정 위반 약정으로서 여행자에게 불리한 것은 무효",["§674의2","§674의3","§674의6","§674의7"],0,"기타전형계약"],
  ["채권각론_C069","현상광고 (제675조·제678조) — 우수현상광고와 계약체결의무 위반","**의의(제675조)**: 어느 행위 한 자에 일정한 보수 지급할 의사표시, 응한 자가 광고에 정한 행위 완료함으로써 효력 (지정행위 완료한 때 계약성립) → 유상, 편무, 요물계약\n\n**우수현상광고(제678조)**: 광고 → 응모 → 판정\n\n**계약체결의무 위반의 소멸시효**\n- 우수현상광고 광고자의 당선자에 대한 계약체결의무 위반이라는 채무불이행을 원인으로 한 손해배상청구권의 소멸시효기간은 계약체결로 취득할 이행청구권에 적용될 소멸시효기간 ∵ 계약체결불이행 손해배상청구권은 계약체결로 발생하는 계약상 이행청구권과 실질적·경제적 밀접한 관계 → 설계계약청구권이라면 계약상 이행청구권이 163조 3호 3년 단기시효(∵ 설계에 종사하는 자)이므로 계약체결의무불이행 손해배상청구권의 시효기간도 3년, 채무불이행시로부터 진행 [2002다57119]",["§675","§678","§163"],0,"기타전형계약"],
  ["채권각론_C070","위임 — 의의·수임인의 의무 (제680조~제685조)","**의의(제680조)**: 사무의 처리를 위탁하고 승낙\n- 위임의 무상성 → 무상위임 원칙(686조 1항) → 그러나 변호사·의사와 같이 영업·업무에 속하는 사무라면 보수지급의 묵시적 약정 있는 것 [75다1637]\n\n**변호사 약정 보수액의 감액 — 부당성 입증책임**\n- 변호사와 의뢰인 사이 약정 있는 경우 위임사무 완료한 변호사는 원칙적으로 약정 보수액 전부 청구 O → 다만 사건처리경과·난이도·노력정도·소송물가액·승소이익 등을 고려하여 약정 보수액 부당히 과다하여 신의칙·형평에 반하는 특별한 사정 있다면 예외적으로 적당한 보수액만 청구 → 계약자유 원칙에 대한 예외이므로 합리적 근거 밝혀야 하고 부당성 주장하는 자가 입증책임 [2022다293937]\n\n**수임인의 의무**\nⓐ 위임사무처리의무: 선관의무(제681조, 무상위임 포함), 복임권제한(제682조)\nⓑ 부수의무: 보고의무(제683조), 취득물·과실의 인도·이전의무(제684조, 특약이 없는 한 인도시기는 위임계약이 종료한 때), 금전소비책임(제685조)\n- 수임인은 위임사무 처리로 받은 금전 기타 물건, 수취한 과실을 위임인에게 인도해야(684조 1항) → 인도 시기는 특별한 사정 없는 한 위임계약 종료 시, 반환할 금전 범위도 위임 종료시 기준으로 [2004다64432, 2021다215060]\n正辯: 위임 해지하면 수임인이 받은 금전에 대하여 위임 종료 시(정확히는 다음날, 私見)부터 지연손해금청구 O, 금전지급 청구 시부터 X",["§680","§681","§683","§684","§685"],0,"기타전형계약"],
  ["채권각론_C071","위임 — 수임인의 권리 (제686조~제688조)","**보수청구권(제686조)**: 무상이 원칙\n- 진료채무는 수단채무이므로 주의의무 다했다면 치료되지 않았어도 치료비청구 가능하지만, 주의의무 위반하여 환자 신체기능 회복불가능하게 손상되고 그 후의 치료는 악화방지 정도였다면 치료행위는 진료채무의 본지에 따른 것 아니거나 손해전보의 일환이어서 수술비·치료비 청구 X [92다15031]\n\n**비용선급청구권(제687조), 필요비상환청구권(제688조 제1항)**\n- 소송위임계약에서 위임사무 처리 도중 수임인 귀책사유로 신뢰관계 훼손되어 계약 종료되었더라도 위임인은 수임인이 계약종료 당시까지 이행한 사무처리 부분에 상당한 보수 금액 및 사무처리비용 지급할 의무 O, 688조 1항 O → 수임인이 처리한 사무 정도와 난이도, 사무처리 위한 수임인의 노력 정도, 처리된 사무에 대해 가지는 위임인의 이익 등 여러 사정 참작 [2010다52584, 2016다200538]\n正辯: 아파트 하자보수 관련 소송위임계약에서 변호사가 하자조사보고서 부실 작성하여 해지되었어도 의뢰인은 하자진단비 등을 변호사에게 지급해야\n- 수임인이 위임사무 처리 과정에서 선관주의의무 위반한 사실이 있더라도, 이후 수임인이 선량한 관리자 주의 다하여 위임사무 처리 위한 비용 지출했다면, 선행 선관주의 위반으로 인한 비용 증가 손해배상의무 부담은 별론, 위임인에 대하여 688조 1항의 필요비 상환청구 O → 상환 청구 가능한 필요비는 수임인이 선관주의 다하여 필요하다고 판단하여 지출한 비용 O, 위임인에게 실익 발생 여부나 위임인의 목적 달성 여부는 불문 [2004다69420, 2023다294470]\n\n**대변제청구권·담보제공청구권(제688조 제2항)**: 수임인이 위임사무 처리 위해 필요한 채무 부담한 경우 위임인에게 갈음하여 변제하게 하거나 (변제기 미도래면) 상당한 담보 제공하게\n- 대변제청구권은 통상의 금전채권과 달라서 수임인이 대변제청구권을 보전하기 위해 위임인의 권리(상계권)를 대위행사 함에 위임인의 무자력은 불필요 [2001다52506]\n- 수임인이 위임사무 처리하며 선관주의의무 다하여 자기 이름으로 위임인을 위해 필요한 계약체결 → 그러나 이후 채무이행 X, 위임인에게 보고 등 조치 없이 방치, 상대방 소제기에 제대로 대응 X → 이로 인해 수임인 자신이 상대방에게 부담할 채무액 확대 → 확대된 부분은 688조 2항 '위임사무 처리에 필요한 채무' X, 대변제청구 X ∵ 681조, 683조 [2016다48808]\n\n**손해배상청구권(제688조 제3항)**: 수임인은 위임사무 처리를 위하여 과실 없이 손해 받으면 위임인에 손해배상청구 O\n\ncf. 임치: 701조가 688조 1, 2항만을 준용 → 수치인은 비용선급, 필요비상환, 대변제청구권 O / 그러나 수치인은 688조 3항의 손해배상청구권 X",["§686","§687","§688","§701"],0,"기타전형계약"],
  ["채권각론_C072","위임 — 종료원인·위임종료와 긴급처리의무 (제689조~제691조)","**해지(제689조)**: 각 당사자 언제든지 해지, 부득이한 사유 없이 불리한 시기 해지는 손해배상\n- 해지로 생긴 손해가 아니라 적당한 시기에 해지되었더라면 입지 않았을 손해 [90다18968]\n- 사무처리 완료 조건으로 보수 지급받는 유상위임계약에서는 언제 해지해도 보수청구권 상실되므로 '불리한 시기'란 따로 없고 사무처리 완료 전의 해지라 하여 '불리한 시기 해지'는 아님 [98다64202]\n- 위임계약 당사자가 상대방의 채무불이행을 이유로 해지하였으나 실제로는 그 해지요건 갖추지 못했더라도 689조 1항 임의해지 효력 O [2012다71411]\n- 위임의 689조 1·2항(상호해지자유, 손해배상)은 임의규정 → 당사자 약정으로 위 규정 배제 O → 약정하면 해지의 사유·절차, 손해배상책임은 약정에 따르게 되고, 위임계약을 자유롭게 해지할 수 X [2017다53265]\n\n**당사자 사망·파산, 수임인 성년후견개시심판(제690조)**\n正辯: 위임인 성년후견개시는 종료사유 아닌 점, 민소법상 소송대리인은 당사자의 사망이 소송대리권 소멸 사유 아닌 점(민소법 95조) 등에 유의할 것\n\n**위임종료와 긴급처리의무(제691조)**: 위임종료의 경우 급박한 사정 있다면 수임인 등은 위임인 등이 위임사무 처리할 수 있을 때까지 사무처리 계속하여야 하고, 이 경우 위임 존속과 동일한 효력\n- 민법상 법인과 이사는 위임인과 수임인의 법률관계이므로 이사 임기 만료되면 위임관계 종료됨이 원칙이나 후임이사 선임시까지 법인의 정상적 활동이 중단될 상태라면 691조 급박한 사정 O [95다40915]",["§689","§690","§691"],0,"기타전형계약"],
  ["채권각론_C073","임치 (제693조~제702조) — 의의·해지·소비임치(예금계약)","**의의(제693조)**: 금전이나 유가증권 기타 물건의 보관을 위탁하고 승낙\n\n**해지**\nⓐ 임치기간 약정 있다면 임치인은 언제든지 해지 O, 수치인은 부득이한 사유 없이 만료 전 해지 X(제698조)\nⓑ 임치기간 약정 없다면 각 당사자 언제든지 해지 O(제699조)\n\n**소비임치(제702조)**: 수치인이 임치물 소비하고 동종물 반환 → 소비대차규정 준용. 그러나 반환시기 약정 없으면 임치인은 언제든지 반환청구 ≠ 소비대차(상당기간)\n- 예금계약은 예금자가 예금 의사표시하며 돈 제공하고 금융기관이 돈을 받아 확인하면 성립 → 직원이 받은 돈 입금 않고 횡령해도 예금계약 성립 영향 無 [95다26919]\n\n**예금계약의 이행지체 책임**\n- 예금계약은 은행 등 금융기관을 수치인으로 하는 금전 소비임치 계약 → 만기 정해진 예금계약에서 금융기관의 예금반환채무는 만기 도래하더라도, 임치인이 미리 만기 후 예금 수령방법 지정한 경우처럼 특별한 사정 없는 한, 만기 도래만으로 금융기관인 수치인이 임치인에 대해 예금반환 지연으로 인한 지체책임 부담 X, 정당한 권한 있는 임치인의 지급청구에도 불구하고 수치인이 예금반환 지체한 경우에 지체책임 O [2023다218353]\n\n**착오송금 부당이득반환**\n- 착오송금의 경우 부당이득반환은 수취인을 상대로 O, 수취은행을 상대로 X ∵ 송금의뢰인과 수취인 사이 계좌이체 원인 존부 불문하고 이체와 동시에 수취인과 수취은행 사이 계좌이체 금액 상당의 예금계약이 성립하고, 수취인은 수취은행에 대하여 위 금액 상당 예금채권 취득 → 수취은행은 이익 X [2007다51239]\n\n**공동명의 예금 — 동업자금이면 준합유, 분량적 분할이면 분량적 귀속**\n- 공동명의의 예금이 동업자금이면 준합유 → 예금반환청구는 필수적 공동소송 / 동업 이외 특정 목적 위해 공동명의로 예치하여 목적 달성 전에는 단독 인출 못하도록 방지·감시할 목적이면 예금채권이 분량적 분할되어 각 예금채권자들에게 공동 귀속, 관리처분권도 각자 귀속, 공동반환특약에 따라 은행에 대하여는 모두가 지급청구해야 하겠지만 필수적 공동소송 X →\n① 다른 공동명의의 예금채권자가 협력하지 않을 경우 승낙청구 O, 은행이 정당한 이유 없이 거절하고 미리 청구할 필요 있다면 다른 공동명의의 예금채권자와 은행을 공동피고로 하여 승낙청구 및 승낙조건 예금반환청구 O [93다31825]\n② 공동명의의 예금채권자 중 1인에 대한 채권자가 예금채권에 대하여 압류·추심명령 받았다면 은행은 추심에 응해야 [2003다7319]\n③ 공동명의의 예금채권자 중 1인에 대한 별개 대출금채권 가지는 은행으로서는 그 대출금채권을 자동채권으로 그의 지분 상응 예금반환채권에 대해 상계 O → 공동명의의 예금채권자 중 1인이 다른 명의자의 지분 양수했음을 이유로 은행 상계주장에 대항하려면 예금반환채권 귀속 별도 합의 있거나 채권양도 대항요건 갖춰야 [2002다55908]\n正辯: 만약 동업자금으로 준합유하는 예금이었다면 → ① 예금반환청구는 필공, ② 1인에 대한 채권자는 추심으로 집행 X, ③ 은행도 1인에 대한 대출금채권으로 상계 X\n\n**금융실명법과 예금주**\n- [大判全合] 금융실명법 취지 고려하면 실명확인절차 마친 예금명의자만이 예금주, 그 외 출연자를 예금계약 당사자로 보려면 극히 예외적인 경우에만 [2008다45828]",["§693","§698","§699","§702"],0,"기타전형계약"],
  ["채권각론_C074","조합 — 의의·성립요건·금전출자지체·대내관계·재산관계 (제703조~제709조)","**의의(제703조)**: 2인 이상이 상호 출자하여 공동사업을 경영할 것을 약정. 동업관계, 계, 발기인조합\n\n**성립요건**: ① 복수의 당사자, ② 공동사업의 경영, ③ 출자\n- 특정인의 출자의무가 면제되거나 특정인이 이익분배 받지 않는다면 조합 X [통판]\n\n**금전출자지체의 책임(제705조)**: 조합원이 금전출자 시기 지체한 때에는 연체이자 지급 외에도 손해를 배상해야\n\n**수인의 공동매수 — 공유관계 vs 동업체**\n- 수인이 부동산 공동매수한 경우: 공유관계로 단순한 공동매수인 혹은 수인을 조합원으로 하는 동업체에서 매수한 것 → 동업체의 매수로 보려면 매수한 토지를 동업체 재산 귀속시키고 전원 의사에 기해 전원의 계산으로 처분한 후 이익 분배의 명시적·묵시적 의사합치 있어야 [2005다5140]\n\n**대내관계(제706조)**\n- 조합계약에 없으면 조합원 2/3 찬성으로 업무집행조합원 선임(제1항) → 조합원 출자가액·지분이 아닌 인원수의 2/3 의미, 임의규정 [2008다4247]\n- 업무집행은 업무집행자의 유무에 따라 조합원 또는 업무집행자의 과반수로써 결정하되, 통상사무는 각 조합원 또는 업무집행자가 전행, 그러나 완료 전에 다른 자 이의 있으면 중지(제2, 3항), 업무집행자와 다른 조합원간에는 위임 규정 준용(제681조~제688조), 업무집행조합원 해임은 전원 동의(제708조)\n- 조합 구성원들 사이 내부적 법률관계 규율 약정 있는데 한쪽 당사자 이행하지 않아 상대방에게 손해 발생하면 채무불이행 손해배상 O [2021다284035]\n正辯: 공동수급체(조합) 구성원 1인이 내부규율 약정 불이행하여 다른 1인이 도급인에게 의무 이행하는 손해 발생한 사안\n- 업무집행조합원의 필요비상환청구권(707조, 688조 1항)은 조합채무 O → 조합과 조합원이 계약명의신탁약정 맺고 조합원이 조합 공동사업 필요한 부동산을 선의의 상대방으로부터 매수하는 매매계약 체결하고 조합원 명의 등기 경료로 조합원이 부동산 소유권 취득했어도, 특별한 사정 없는 한 조합원은 조합에 대해 조합업무 집행에 관하여 부동산에 지출한 필요비 상환청구 O [2025다205399]\n正辯: 이어지는 잔여재산분배 내용은 후술하는 해당 파트 정변 멘트 참조\n\n**대외관계(제709조)**: 업무집행자에게 업무집행 대리권 추정, 임의규정\n\n**재산관계 — 조합재산의 합유(제704조)**: 271조~274조 적용(후술), 706조 2항과 272조의 충돌\n- 272조에 따르면 합유물 처분·변경에 합유자 전원 동의 있어야 → 합유물 중에도 조합재산은 처분·변경 행위가 조합 특별사무인 업무집행 O → 706조 2항이 272조에 우선 적용 O → 조합재산의 처분·변경은 업무집행자 없으면 조합원의 과반수로, 업무집행자 수인 있으면 업무집행자의 과반수로, 업무집행자 1인이면 단독으로 각 결정 [95다30345, 2007다18911]\n학설: 1) 업무집행조합원 존부에 따라, 2) 일반합유물인지 조합재산(706조)인지에 따라, 3) 조합업무 중 조합재산처분 업무(272조)인지 다른 조합업무인지에 따라",["§703","§704","§705","§706"],0,"기타전형계약"],
  ["채권각론_C075","조합 — 지분압류·조합의 채권·채무 (제711조~제715조)","**지분에 대한 압류의 효력(제714조)**: 조합원 지분 압류는 장래 이익배당·지분반환청구권에 효력 → 바로 행사할 수 없도록\n- '조합원의 지분'이라 함은 전체로서의 조합재산에 대한 조합원 지분 의미, 조합재산 구성하는 개개 재산에 대한 합유지분은 강제집행 대상 X → 조합원은 언제든지 조합 탈퇴(716조), 탈퇴하면 지분환급청구권(719조), 조합원 지분을 압류한 채권자는 존속기간 등이 정해지지 않은 이상 조합원의 조합 탈퇴 의사표시를 대위행사 O ∵ 탈퇴권은 조합 해지권으로서 재산권 O, 일신전속적 X [2005마1130]\n\n**조합의 채무자는 조합원에 대한 채권과 상계금지(제715조)**: 그 조합원의 지분비율에 한해서도 상계 X\n\n**조합의 채권**\n- 조합의 채권은 조합원 전원에게 합유적 귀속, 조합원 1인이 임의로 조합의 채무자에 대해 출자지분 비율에 따른 급부청구 X → 조합원 중 1인의 채권자가 그 조합원 개인을 집행채무자로 조합의 채권에 대해 강제집행하면, 다른 조합원으로서는 보존행위로서 제3자이의 소 제기 O [97다4401]\n- [大判全合] 공동이행방식의 공동수급체는 민법상 조합 성질 → 공동수급체가 공사 시행하여 도급인에 대해 가지는 채권은 원칙적으로 공동수급체 구성원에게 합유적 귀속 → 구성원 중 1인이 임의로 도급인에 대해 출자지분 비율 급부 청구 X, 구성원 중 1인에 대한 채권으로 구성원 개인을 집행채무자로 공동수급체의 채권에 강제집행 X → 그러나 공동수급체와 도급인이 도급계약 발생 채권을 공동수급체가 아닌 개별 구성원으로 하여금 지분비율에 따라 직접 도급인에 대해 권리를 취득하게 하는 명시적·묵시적 약정 O [2009다105406]\n- 업무집행 조합원의 임무 위배나 권한 남용으로 동업체 목적 달성할 수 없고 조합원이 출자한 동업자금을 허비한 경우 → 손해 입은 주체는 조합 O, 출자한 조합원은 결과적 손해 발생했더라도 조합과 무관한 개인적 손해 X, 조합원 지위로 입은 손해 O → 조합원은 조합관계 벗어난 개인 지위에서 손해배상청구 X [98다60484]\n\n**조합의 채무 — 조합채무의 이중성**\nⓐ 조합원 모두가 공동으로 조합재산으로써 책임, ⓑ 개별 조합원의 채무이기도 하므로 각 조합원의 개인재산으로써 책임 → 두 가지 책임 병존\n- 공동책임: 조합채권자는 조합원 전원에 대한 집행권원 있어야 조합재산에 강제집행 → 조합원 전원에 대한 가압류명령 있어야 조합재산에 가압류집행 가능 [2012다21560]\n- 개별책임: 조합채권자가 비율 알지 못하면 각 조합원에게 균등 비율로 권리 행사(제712조), 변제자력 없는 조합원 부분은 다른 조합원이 균분 변제 책임(제713조)\n- 조합채무는 각 조합원의 채무로서, 불가분채무이거나 연대 특약이 없는 한, 조합채권자는 각 조합원에 대해 지분비율 또는 균등비율로 변제청구 [85다카1499] → 그러나 조합채무가 특히 조합원 전원을 위해 상행위가 되는 행위로 부담하게 된 것이면 상법 제57조 제1항 적용 O, 연대책임 O [91다30705]\n- 조합채무는 모든 조합원에게 합유적 귀속, 조합원 중 1인이 조합채무 면책시키면 그 조합원은 다른 조합원에 대해 425조 1항(연대채무자의 구상권)에 따라 구상권 행사 O → 이러한 구상권은 조합의 해산·청산 시 손실부담과 별개 문제로서 반드시 잔여재산분배 절차에서 행사할 필요는 X [2022다211416]",["§711","§712","§713","§714","§715"],0,"기타전형계약"],
  ["채권각론_C076","조합 — 손익분배 (제711조) · 조합원의 탈퇴 (제716조~제719조)","**손익분배(711조)**: 이익은 모든 조합원에게 분배되어야, 그러나 손실 부담 없는 조합원은 존재 O\n- 공동이행방식 공동수급체의 구성원은 공동수급체(조합)에 출자의무 O, 이익분배청구권 O → 출자의무 이행 않는 구성원에게 이를 이유로 이익분배 자체 거부하거나 이익분배금에서 출자금 공제 X ∵ 별개의 권리·의무 → 다만 두 채권이 상계적상에 있으면 상계는 가능. 계약자유 원칙상 출자의무와 이익분배 연계 특약(출자의무 이행해야 이익분배 받기로 하거나 이익분배금에서 미이행 출자금 '공제' 약정) O, 이러한 약정상 공제는 상계적상이나 의사표시 불필요, 당연공제 O [2015다69990]\n\n**조합원의 탈퇴**\n\nⓐ **임의탈퇴(제716조)**: 언제든 탈퇴, 그러나 부득 사유 없이 불리한 시기 탈퇴 X\n- 임의탈퇴는 다른 조합원 전원에 대한 의사표시로 해야 ∵ 조합계약 해지 성질, 잔존조합원 지위 중대한 영향 [4291민상668]\n- 2인에서 1인 임의탈퇴 O → 조합관계 종료 O, 조합해산 X, 청산 X → 합유재산이 단독소유 되고 탈퇴자·잔존자 사이 계산 O [86다카2484]\n- 탈퇴자는 탈퇴 당시의 조합재산 계산 결과 조합 재산상태가 적자 아닌 경우 지분 환급 O → 탈퇴자는 별도 약정 없는 한 지분 환급을 주장하는 사람에게 조합재산 상태 증명책임 O [2019다207851]\n- 위 경우, 조합채권자는 잔존 조합원에 대하여 조합채무 전부의 이행청구 O [99다1284]\n- 잔존자는 조합의 탈퇴자에 대한 채권을 자동채권으로 탈퇴자 지분 상당 조합재산반환채무와 상계 O [2004다49693]\n- 조합재산이 부동산인 경우에는 잔존 조합원의 단독소유 등기를 해야 소유권 변동 효력 O ∵ 조합관계 탈퇴라는 법률행위에 의한 물권변동 [2008다2807]\n\nⓑ **비임의탈퇴(제717조)**: 사망, 파산, 성년후견개시, 제명(제718조)\n- 조합원 1인 사망하면 당연 탈퇴(717조) → 상속인이 조합원 지위 승계 X [86다카2951]\n- 출자의무 불이행은 제명의 정당한 사유 → 상당기간 최고 불요 [96다29816]\n- 조합원 제명의 정당한 사유는 동업계약상 의무 불이행이나 부정행위 등 귀책사유 명백한 경우는 물론, 특정조합원으로 말미암아 조합원 사이 불화로 신뢰관계 근본적 훼손된 경우도 포함 [2017다200702]\n\n**탈퇴의 효과**: 조합 동일성 유지하며 존속, 조합재산분할청구 X, 지분 계산 O → ⓐ 지분환급청구권은 조합의 채무로서 잔존조합원 모두가 부담, ⓑ 탈퇴조합원 지분은 잔존조합원의 지분비율로 분배(지분의 확대)\n- 조합에서 조합원이 탈퇴하는 경우, 탈퇴자와 잔존자 사이의 탈퇴로 인한 계산은 특별한 사정이 없는 한 719조 1항, 2항에 따라 '탈퇴 당시의 조합재산상태'를 기준으로 평가한 조합재산 중 탈퇴자의 지분에 해당하는 금액을 금전으로 반환해야 → 조합원 지분비율은, 조합청산에서 '실제 출자한 자산가액 비율'로 하는 것과 달리, '조합 내부 손익분배 비율' 기준으로 계산해야 [2022다285523]\n\n**조합 지위 양도**: 다른 조합원 모두의 동의 받아 조합원 지위 양도 가능 [통]\n- 조합계약에 동업지분 제3자 양도 허용 약정 있다면 조합원 전원 동의 없이도 양도할 수 있으나, 그 경우에도 조합원 지위의 '일부' 양도는 다른 조합원 '전원' 동의 있어야 ∵ 의사결정구조 왜곡 우려 → 양수인은 양도비율 따른 자익권(이익분배청구권, 잔여재산분배청구권) 및 별개의 완전한 공익권(업무집행자선임권, 업무집행방법결정권, 통상사무전행권 등) 취득 O [2008다4247]\n\n**탈퇴(716조) vs 해산청구(720조)**\n- 조합계약(동업계약)에서는 해산청구, 조합으로부터 탈퇴, 조합원 제명만 가능할 뿐, 일반계약 같은 조합계약 해제·해지하고 원상회복의무 부담 X\n- 탈퇴(716조)는 특정 조합원이 장래 향하여 조합원 지위 벗어나고 조합 자체는 나머지 조합원에 의해 동일성 유지하며 존속하여 동업사업 계속 유지·존속을 전제로, 반면 해산청구(720조)는 조합 소멸 위하여 목적 사업 수행 적극적 활동 중지하고 조합재산 정리 단계 가는 것 → 조합 당사자 간 불화·대립으로 신뢰관계 깨어지고 특정 조합원의 탈퇴·제명으로도 조합업무 원활한 운영 기대할 수 없는 상황에서 특정 조합원이 다른 조합원에게 해지통고 했다면 조합 소멸하는 조합 해산청구 O [2024다224645]",["§711","§716","§717","§718","§719"],0,"기타전형계약"],
  ["채권각론_C077","조합 — 해산·청산과 잔여재산분배 (제721조~제724조)","**해산·청산 절차의 강행규정성**: 조합의 해산·청산 절차는 강행규정 X (특약으로 달리 정할 수 O) [84다카1921] ∵ 어차피 조합원 개인책임 부담, 조합채권자 보호 위한 것 X\n\n**잔여재산분배는 법인 청산 규정 X → 출자가액 비례하여 분배(제724조 제2항)**\n- 조합이 해산하면 청산절차가 통례이고 청산사무는 총조합원 공동으로 또는 그들이 선임한 자가 집행, 청산인 선임은 조합원 과반수로써(721조) → 그러나 처리할 조합 잔무 없고 잔여재산 분배만 남아있다면 따로 청산절차 필요 X, 별도 특약 없는 한 출자의무 이행한 조합원은 바로 출자재산 반환청구 O → 그렇지 않다면 청산절차 종료되지 않은 상태에서 잔여재산 분배청구 X ∵ 분배할 잔여재산 가액은 청산절차 종료된 때 확정 [90다카26300, 2024다234239]\n\n**간이한 잔여재산 분배 — 채무·채권을 포함한 분배대상액 산출 후 일괄 정산**\n- 잔여재산 분배는 특약 없는 이상 각 조합원 출자가액 비례 분배 → 조합채무 변제사무 미완료라도 채권자가 조합원이면 동업체 자산 보유자가 동업체 자산에서 채권자인 조합원에 대한 조합채무 공제하여 분배대상 잔여재산액 산출한 후 다른 조합원들에게 잔여재산 중 각 조합원 출자가액 비례 몫 반환함과 아울러 채권자인 조합원에게 조합채무 이행함으로써 별도 청산절차 없이 간이한 잔여재산 분배 O → 간이한 방법의 잔여재산 분배는 2인 조합의 조합원 1인을 채무자로 하는 조합채권 추심사무 미완료의 경우에도 일정 요건 하에 허용 O\n- 2인 조합의 1인이 선관주의의무위반·불법행위 등으로 조합에 손해배상책임 지고 그로 인해 조합관계 목적 불능 종료되어 달리 조합 잔여업무 없이 조합재산 분배 청산절차만 남은 경우, 다른 조합원은 손해 입힌 조합원을 상대로 손해배상채권액 중 자기 출자가액 비율 몫을 청구하는 형식으로 잔여재산 분배청구 O → 동업체 자산 보유자는 채무자 조합원에 대한 조합채권 포함하여 분배대상 잔여재산액 산출한 후 잔여재산 중 각 조합원 출자가액 비례 몫을 채무자 조합원 포함한 다른 조합원들에게 반환함과 아울러 채무자 조합원으로부터 조합채권을 이행받는 방법으로 별도 청산절차 없이 간이한 잔여재산 분배 O → 이때 채무자 조합원과의 관계에서 분배할 잔여재산액과 지급받을 조합채권 상계·공제 O → 2인 조합의 1인으로부터 '잔여재산분배청구권'을 양수받은 자가 조합채권의 채무자인 경우도 마찬가지 [2019다205206, 2025다205399]\n正辯: 2025다205399 판결은 甲과 乙이 경매 목적물 매수한 후 개발·매각 사업 공동 진행하여 수익 분배 조합계약 체결, 乙이 경매절차 입찰보증금 납부하고 매각허가결정 받은 후 수협에 근저당권설정등기 마쳐주고 금전 대출받아 나머지 매각대금 납부하고 자신 명의 소이등 경료, 자신의 비용으로 부동산 대출이자·재산세 변제 → 부동산 매각 후 甲·乙이 조합계약 종료 이유로 각각 상대방에게 잔여재산 분배청구 → 조합과 乙은 부동산 상대방 선의의 계약명의신탁약정, 수탁자 乙이 소유권 취득, 조합재산은 부동산 자체가 아닌 매수대금 상당 부당이득반환채권 → 乙의 대출이자·재산세 변제행위는 조합계약 목적 달성 위한 일상적·반복적 사무 O, 조합재산의 처분·변경 X, 통상사무 O, 乙은 단독 집행 O, 선관주의로 필요성 판단·지출한 필요비 O, 乙이 부동산 소유자 되었어도 조합에 대해 707조, 688조 1항 필요비상환청구권 O → 조합관계 종료로 인한 잔여재산 분배단계에서 비용상환채무 존재 고려되어야, 조합이 乙에게 상환채무 부담하지 않는다는 전제로 분배대상 잔여재산액 산출한 원심판단은 법리오해 잘못\n\n**잔여재산 분배 시 출자의무 미이행 조합원의 처리**\n- 잔여재산 분배의 경우, 일부 이행되지 않은 출자금 있더라도 고려하지 않고 잔여재산 범위 확정한 후 각 조합원이 '실제로 출자한 가액 비례하여' 잔여재산 분배 O → 출자의무 이행하지 않은 조합원에게 더 이상 출자의무 이행 청구 X [2016다278579]",["§721","§724"],0,"기타전형계약"],
  ["채권각론_C078","화해 — 의의·창설적 효력·화해와 착오 (제731조~제733조)","**의의(제731조)**: 상호 양보하여 당사자간 분쟁을 종지할 것을 약정\n- 당사자들이 분쟁 인식하지 못한 상태에서 일방이 이행해야 할 채무액에 관해 협의했거나 일방의 채무이행에 대해 상대방이 이의 제기 않았다는 사정만으로는 묵시적 화해계약 성립 X ∵ 화해계약 성립 이후에는 다툴 수 없으므로 그 의사합치는 엄격하게 해석해야 [2016다203933]\n\n**창설적 효력(제732조)**: 양보한 권리 소멸하고 상대방이 취득\n\n**화해와 착오(제733조)**: 화해계약은 착오 이유로 취소 금지, 그러나 '당사자 자격' 또는 '화해의 목적인 분쟁 이외의 사항'(=\"분쟁의 전제·기초 사항\")에 관한 착오는 취소 O\n- 교통사고 가해자 과실 경합됐는데 오로지 피해자 전적 과실로 착오하여 매우 적은 금액 외에 일체 손해배상청구권 포기 → 착오 취소 O [95다48414]\n- 의료과실 사망사고로 잘못 알고 의사가 손해배상금을 지급하며 화해했으나 부검 결과 사인이 치료행위와 무관한 경우는 착오 취소 O [90다카22674]\n- 그러나 동업재산 환급범위 분쟁 중 특정 지분비율로 확정하여 합의한 후 지분비율 잘못 산정 이유로 착오 취소 X ∵ 분쟁의 대상에 관한 착오 [88다카10050]\n- 화해계약은 화해당사자 자격 또는 화해 목적 분쟁 이외 사항에 착오 있는 경우 외에는 착오 이유 취소 X → 그러나 화해계약이 사기로 인해 이뤄진 경우는 화해 목적 분쟁 사항에 착오 있는 경우도 110조로 취소 O [2008다15278]",["§731","§732","§733","§109","§110"],0,"기타전형계약"]

  ["채권각론_P001","99다55601, 2005다5812","분양광고와 청약의 유인 — 선분양·후시공 방식에서 광고 내용의 계약 편입 범위","선분양·후시공 방식 아파트 분양에서 분양광고에 온천, 원목마루 바닥재, 유실수단지, 테마공원, 콘도회원권 등 내용 및 첨단 오락타운 조성, 전문경영인의 위탁경영 통한 일정액 이상 수익 보장, 서울대학교 이전, 도로확장, 전철복선화 등의 내용 포함. 분양계약서에는 외형·재질 등의 구체적 기재 없이 체결됨","상가·아파트 분양광고 내용은 통상 청약의 유인에 불과. '청약'은 이에 대응하는 승낙과 결합하여 일정 내용의 계약을 성립시킬 것을 목적으로 하는 확정적 의사표시지만, '청약의 유인'은 합의 구성하는 의사표시 X → 피유인자가 그에 대응하여 의사표시 하더라도 계약 성립 X, 다시 유인한 자가 승낙 의사표시 해야 계약 성립 O.\n\n단, 선분양·후시공 방식에서 분양계약서에 외형·재질 등 구체적 기재 없으므로 이것이 특정되지 않고 체결된 분양계약은 미완결 상태 → 광고 내용이나 설명 중 구체적 거래조건에 관한 것은 분양계약 내용 O (수분양자가 이행청구 가능).\n\n온천, 원목마루 바닥재, 유실수단지, 테마공원, 콘도회원권 등 광고는 분양계약 내용 O (∵ 아파트 외형·재질, 부대시설이므로).\n\n첨단 오락타운 조성, 전문경영인의 위탁경영 통한 일정액 이상 수익 보장, 서울대학교 이전, 도로확장, 전철복선화 등의 광고는 분양계약 내용 X, 청약의 유인에 불과 (∵ 사회통념상 분양자 이행 기대 X).",["§527"],0,"계약총론","대판 99다55601, 2005다5812","미분류"],
  ["채권각론_P002","2012다29601","선시공·후분양 방식에서 분양광고 내용의 분양계약 편입 여부","선시공·후분양 방식으로 아파트를 분양하면서 준공 전 분양광고를 하고, 실제 시공이 광고 내용과 다르게 이루어진 사안","선시공·후분양 방식에서는 수분양자가 실제 완공된 아파트의 외형·재질 등을 직접 확인하고 분양계약 체결 → 완공된 아파트 자체가 분양계약의 목적물 → 비록 준공 전 분양광고 했고 그 광고내용과 달리 시공되었더라도 분양광고에 표현된 아파트의 외형·재질 등 사항은 분양계약의 내용 X.",["§527"],0,"계약총론","대판 2012다29601","미분류"],
  ["채권각론_P003","2017다275447","광고 내용이 계약 내용이 되는 경우 — 청약의 유인이 청약으로 전환","광고 내용 전제로 청약이 이루어지고 광고주가 승낙하여 계약이 체결된 사안","광고는 통상 '청약의 유인'이지만, 내용이 명확·확정적이고 광고주가 그 내용대로 계약에 구속될 의사가 명백하면 '청약'이 됨 → 청약의 유인에 불과하더라도 이후 광고 내용을 전제로 청약하고, 광고주가 승낙하여 계약이 체결되면 광고 내용이 계약 내용 O.",["§527"],0,"계약총론","대판 2017다275447","미분류"],
  ["채권각론_P004","98다48903","청약자가 기간 내 이의 없으면 승낙 간주한다는 표시의 효력 — 청약의 구속력","청약자가 정한 기간 내에 이의하지 않으면 승낙한 것으로 간주한다는 표시를 한 사안","이는 상대방을 구속하지 못함. 단지 승낙기간의 의미만 있을 뿐. ∴ 상법 53조(상거래관계 영업부류)의 적용 사안이 아닌 이상 청약 상대방에게 청약 회답의무 X.",["§527"],0,"계약총론","대판 98다48903","미분류"],
  ["채권각론_P005","72다384","원시적 불능 — 국가가 타인 소유 농지를 매도한 매매계약과 제535조 신뢰이익 배상","국가가 타인 소유 농지를 목적물로 하는 매매계약을 체결한 사안. 매수인이 원시적 불능을 알았거나 알 수 있었음","국가가 타인 소유 농지를 매도하는 매매계약은 원시적 불능으로 무효. 이때 매수인이 알았거나 알 수 있었다면 제535조에 기한 신뢰이익 배상청구 X.",["§535"],0,"계약총론","대판 72다384","미분류"],

  ["채권각론_P007","2001다53059","계약교섭의 부당파기와 신뢰손해의 범위","계약교섭 단계에서 일방이 정당한 이유 없이 계약 체결을 거부하여 상대방에게 손해가 발생한 사안. 이유 中: 추정 총 제작비 20% 상당 창작비 3억 원 손해배상 청구가 문제됨","일방이 계약 교섭단계에서 확실히 체결되리라는 정당한 기대·신뢰를 부여하여 상대방이 그 신뢰에 따라 행동하였음에도 상당한 이유 없이 계약 체결을 거부하여 손해를 입히면 신의칙에 비추어 계약자유원칙의 한계를 넘는 불법행위 O.\n\n이 경우 '손해'는 계약이 유효하게 체결된다고 믿었던 것에 의하여 입은 손해(=신뢰손해)에 한정됨. 신뢰손해란 계약의 성립을 기대하고 지출한 계약준비비용처럼 그러한 신뢰가 없었더라면 통상 지출하지 않았을 비용상당 손해. 아직 계약체결에 확고한 신뢰가 부여되기 이전에 계약교섭 당사자가 계약체결이 좌절되더라도 어쩔 수 없다고 생각하고 지출한 비용(경쟁입찰에 참가하기 위해 지출한 제안서·견적서 작성비용) 등은 포함 X.\n\n침해행위·피해법익의 유형에 따라 계약교섭 파기의 불법행위가 인격적 법익을 침해함으로써 정신적 고통을 초래한 것이 인정되면 별도로 위자료 배상 O.\n\n추정 총 제작비 20% 상당 창작비 3억 원 손해배상 X ∵ 계약이 정당하게 체결되어 그 이행 결과 얻게 될 이익을 상실한 손해는 계약교섭 중도파기로 인해 결과적으로 계약 체결되지 않은 사안에서 청구할 법적 지위 X.",[],0,"계약총론","대판 2001다53059","미분류"],
  ["채권각론_P008","95다54693","계약 무효·취소 시 상호간 부당이득반환의무의 동시이행관계","계약이 무효 또는 취소된 경우","계약이 무효 또는 취소된 경우에 상호간 부당이득반환의무는 동시이행관계 O.",["§536"],0,"계약총론","대판 95다54693","미분류"],
  ["채권각론_P009","77다1241","임대차계약 종료 시 목적물 인도의무와 보증금 반환의무의 동시이행","임대차계약 종료 후 목적물 인도의무와 보증금 반환의무의 동시이행 여부","임대차계약 종료 시 임차인의 목적물 인도의무와 임대인의 보증금 반환의무는 동시이행관계. 이때 반환되는 보증금의 범위는 '보증금 중 연체차임 등 임대차 관련하여 인도시까지 생긴 임차인의 모든 채무를 공제한 나머지'임.",["§536","§317"],0,"계약총론","대판 77다1241","미분류"],
  ["채권각론_P010","2004다37676","도급에서 하자확대손해 손해배상채무와 공사대금채무의 동시이행","도급계약에서 하자로 인한 확대손해 배상채무와 공사대금채무의 동시이행 여부","도급에서 하자확대손해로 인한 손해배상채무와 공사대금채무는 동시이행관계 O.",["§536","§667"],0,"계약총론","대판 2004다37676","미분류"],
  ["채권각론_P011","2003다22042","전부변제와 채권증서 반환·영수증교부의무의 동시이행 여부","채무자가 채무 전부를 변제한 경우 채권증서 반환청구와의 동시이행관계, 및 영수증교부의무와 변제의 동시이행관계 여부","전부 변제하면 채권증서 반환 청구 가능(제475조). 다만 전부 변제해야 인정됨. 채권증서 반환과 변제는 동시이행관계 X. ≠ 영수증교부의무는 변제와 동시이행관계 O.",["§474","§475","§536"],0,"계약총론","대판 2003다22042","미분류"],
  ["채권각론_P012","2019다215791","동시이행항변권의 대가적 채무 범위 확장 및 불안의 항변권 적용","쌍방 부담 채무가 고유 대가관계 있는 쌍무계약상 채무가 아닌 경우 동시이행항변권 인정 여부, 및 해당 법리가 불안의 항변권(536조 2항)에도 적용되는지","동시이행항변권은 쌍방 부담 각 채무가 고유 대가관계 있는 쌍무계약상 채무 아니더라도 구체적 계약관계의 채무 사이 대가적 의미 있어 이행상 견련관계 인정되면 O. 이러한 법리는 제536조 1항뿐만 아니라 2항의 '불안의 항변권'도 마찬가지로 적용 O.",["§536"],0,"계약총론","대판 2019다215791","미분류"],
  ["채권각론_P013","2006다24049","임의경매 무효 시 소유권이전등기말소청구와 배당금반환청구의 동시이행 여부","임의경매가 무효인 경우 채권자(=근저당권자)가 채무자를 대위하여 경락인에게 하는 소유권이전등기 말소청구와, 경락인이 배당금을 수령한 채권자에게 하는 배당금반환청구가 동시이행관계인지","임의경매 무효인 경우 채권자(=근저당권자)가 채무자를 대위하여 경락인에게 하는 소유권이전등기 말소청구와 경락인이 배당금을 수령한 채권자(=근저당권자)에게 하는 배당금반환청구는 동시이행 X ∵ 서로 이행의 상대방 다름.",["§536"],0,"계약총론","대판 2006다24049","미분류"],
  ["채권각론_P014","2000다8533","매도인 소유권이전등기의무·인도의무와 매수인 잔금지급의무의 동시이행 — 가압류등기말소의무 포함","매매목적물에 가압류등기가 있는 경우 매도인의 가압류등기말소의무와 매수인의 대금지급의무의 동시이행 여부","매도인의 소유권이전등기 및 인도의무와 매수인의 잔금지급의무는 동시이행관계 원칙. 매도인은 제한·부담 없는 완전한 소유권이전등기의무를 부담하는 것이 원칙 → 매매목적물에 가압류등기 있다면 매도인의 가압류등기말소의무도 매수인의 대금지급의무와 동시이행 O.\n\n正辯: 498조 관련, 매도인의 가압류등기말소의무가 구상채무로 변형되어도 여전히 매수인의 매매대금채무와 동시이행관계로서 매수인의 예외적 상계 허용되는 [2000다43819] 판례의 기초법리.",["§536"],0,"계약총론","대판 2000다8533","미분류"],
  ["채권각론_P015","97다30066","이행불능으로 발생한 손해배상채무의 동시이행관계 유지","동시이행관계 쌍방 채무 중 1개가 이행불능이 되어 손해배상채무로 변경된 경우 여전히 동시이행관계인지","동시이행관계 쌍방 채무 중 1개 이행불능 되어 발생한 손해배상채무도 여전히 다른 채무와 동시이행관계 O.",["§536"],0,"계약총론","대판 97다30066","미분류"],
  ["채권각론_P016","91다6368","선이행의무자(중도금) 미이행 후 잔금기일 도과 시 동시이행관계 성립 여부 및 특별한 사정이 있는 경우 예외","[사안①] 매수인이 선이행의무인 중도금을 이행하지 않은 상태에서 계약 해제 없이 잔금기일이 도과된 경우. [사안②] 매도인이 매수인으로부터 중도금을 지급받아 원매도인에게 잔대금 지급하지 않고서는 소유권이전등기서류 제공이 어려운 특별한 사정을 매수인도 알고 계약 체결한 경우","[사안①] 매수인이 선이행의무인 중도금을 이행하지 않았더라도 계약 해제되지 않은 상태에서 잔금과 동시이행관계인 매도인의 등기서류 제공 없이 잔금기일 도과되면, '매수인의 중도금 및 잔금 지급과 매도인의 소유권이전등기 서류 제공은 동시이행관계 O' → 그때부터는 매수인은 중도금에 이행지체 책임 X.\n\n[사안②] 매도인이 매수인으로부터 중도금을 지급받아 원매도인에게 잔대금 지급하지 않고서는 소유권이전등기서류 제공이 어려운 특별한 사정을 매수인도 알고 매매계약 체결했던 경우, 매수인의 중도금 지급의무는 잔금지급기일 도과하더라도 소유권이전등기서류 제공과 동시이행 X.\n\n正辯: 위 사안은 매도인이 등기서류 제공 없더라도 매수인의 중도금 지체는 계속된다는 예외적 판례이며, 매도인이 중도금 수차례 최고하다가 늦춰준 기일까지도 매수인이 지급하지 않은 사안임.",["§536"],0,"계약총론","대판 91다6368","미분류"],
  ["채권각론_P017","90다19930","중도금 미지급 후 잔대금기일 경과 시 중도금·지연손해금과 소유권이전등기의무의 동시이행","매수인이 선이행 할 중도금 지급 않은 채 잔대금기일이 경과한 경우","매수인이 선이행 할 중도금 지급 않은 채 잔대금기일 경과하면, 매수인의 중도금 및 이에 대한 지급일 다음날부터 잔대금기일까지의 지연손해금과 잔대금의 지급채무는 매도인의 소유권이전등기의무와 동시이행관계 O.",["§536"],0,"계약총론","대판 90다19930","미분류"],
  ["채권각론_P018","2017다3222","선이행의무도 이행기 경과 후에는 동시이행관계 성립","매매계약에서 소유권이전의무와 대금지급의무의 관계 — 어느 하나가 선이행의무인 경우","매매계약에서 대가적 의미인 소유권이전의무와 대금지급의무는 다른 약정 없는 한 동시이행관계. 설령 어느 의무가 선이행의무라 해도 이행기 지나면, 이행기 후에도 선이행하기로 약정하는 등 특별한 사정 없는 한, 그 의무 포함하여 매도인·매수인 쌍방 의무는 동시이행관계 O.",["§536"],0,"계약총론","대판 2017다3222","미분류"],
  ["채권각론_P019","2019다215791, 2023다269139","불안의 항변권(제536조 제2항) — 상대방 이행 곤란할 현저한 사유의 의미","아파트 매매계약 당시 임차인이 갱신요구 없이 인도할 것이라 했는데, 잔금 지급일 직전 임차인이 갱신요구권을 행사한 사안 외 재산상태 악화 등 사정변경 사안","제536조 2항 '상대방 이행이 곤란할 현저한 사유'는 상대방의 신용불안이나 재산상태 악화 등 사정변경 생기고 당초 계약 내용 따른 선이행의무 이행케 하는 것이 공평·신의칙 반하게 되는 경우 → 상대방 채무가 아직 이행기에 이르지 않아도 O.\n\n正辯(2023다269139): 아파트 매매계약 당시 임차인이 갱신요구 없이 인도할 것이라 했는데 잔금 지급일 직전 갱신요구권 행사했다면 현실인도의무보다 잔금지급의무가 선이행의무였어도 매수인은 지급 거절 O ∵ 현실인도의무 이행 곤란할 현저한 사정 O, 공평·신의칙.",["§536"],0,"계약총론","대판 2019다215791, 2023다269139","미분류"],
  ["채권각론_P020","2020다290804","동시이행판결 시 반대의무 내용 특정 필요 — 집행개시 요건으로서의 반대의무 이행","동시이행판결의 반대의무 이행·이행제공 방법 및 법원의 특정 의무","동시이행판결의 반대의무 이행·이행제공은 집행개시 요건으로서 채권자의 증명방법에 제한 없음 → 동시이행판결 하는 법원으로서는 반대의무 내용 명확하게 특정해야 ∵ 특정되지 않아 반대의무 이행·이행제공 증명 못할 경우 채권자는 강제집행을 할 수 없어 다시 무익한 소 제기해야.",["§536"],0,"계약총론","대판 2020다290804","미분류"],
  ["채권각론_P021","2024다231391","채권자의 반대의무 이행제공 없음 주장은 동시이행판결에 대한 청구이의사유 아님","동시이행판결에서 채권자의 반대의무 이행·제공이 없었다는 주장을 청구이의의 소로 다툴 수 있는지","채권자의 반대의무 이행·제공이 없었다는 주장은 동시이행판결에 대한 청구이의사유 X ∵ 동시이행판결의 반대의무 이행·제공은 집행개시 요건 O, '집행에 관한 이의신청' 절차에서 주장·심리할 사항 O, 청구이의는 집행권원에 표시된 '청구권'에 관하여 생긴 이의를 주장해야.",["§536"],0,"계약총론","대판 2024다231391","미분류"],
  ["채권각론_P022","2001다9304","도급 하자보수청구권 행사 시 동시이행 항변 가능한 기성공사대금 범위","미지급 공사대금에 비해 하자보수비 등이 매우 적은 편이고 하자보수공사가 완성되어도 공사대금 지급 여부가 불확실한 사안","도급인이 하자보수청구권을 행사하여 동시이행 항변을 할 수 있는 기성공사대금 범위는, 미지급 공사대금에 비해 하자보수비 등이 매우 적은 편이고 하자보수공사가 완성되어도 공사대금 지급 여부가 불확실하다면, 하자 및 손해에 상응하는 금액으로 한정하는 것이 공평과 신의칙 부합.\n\n正辯: 하자 '보수'를 청구하였음에도 특수한 사정이 있으므로 상응하는 부분만 동시이행항변을 긍정한 사안(私見).",["§536","§667"],0,"계약총론","대판 2001다9304","미분류"],
  ["채권각론_P023","66다1174","동시이행항변권 상실을 위한 이행제공 — 계속적 이행제공설","쌍무계약 당사자 일방이 먼저 한 번 현실 제공을 하고 상대방을 수령지체에 빠지게 했으나 이행제공이 계속되지 않은 경우, 상대방의 동시이행항변권 소멸 여부","쌍무계약 당사자 일방이 먼저 한 번 현실 제공을 하고 상대방을 수령지체에 빠지게 했더라도 그 이행제공이 계속되지 않는 경우에는 과거 한 번 이행제공 사실만으로 상대방의 동시이행 항변권 소멸 X → **계속적 이행제공설** [통판].",["§536"],0,"계약총론","대판 66다1174","미분류"],
  ["채권각론_P024","97다54604","동시이행 존재효 — 이행지체 불성립 요건으로 반드시 항변권 행사 요하지 않음","쌍무계약 쌍방 채무가 동시이행관계에 있는 경우 이행지체 성립 여부 및 지체책임을 부정하기 위해 동시이행항변권을 반드시 행사해야 하는지","쌍무계약 쌍방 채무가 동시이행관계 있다면 일방 채무 이행기 도래하여도 상대방 채무 이행제공 있기까지는 이행 않아도 이행지체 X → 지체책임 없다고 주장하는 자가 반드시 동시이행항변권 행사해야 발생하는 건 아님.\n\n正辯: 기록형에서 지연손해금청구의 요건사실에 '원고의 반대채무 이행제공 사실'이 있는 것이 바로 존재효 때문이며, 결국 원고는 지연손해금을 청구하기 위해 피고의 항변이 있기 전부터 '동이항을 깨뜨린 사실'을 주장·증명해야 함.",["§536"],0,"계약총론","대판 97다54604","미분류"],
  ["채권각론_P025","90다카24076","동시이행항변권 행사 중 임차인 점유는 불법점유 아님","임대차 종료 후 임차인이 동시이행항변권 행사하여 임차건물을 계속 점유해 온 경우","임대차 종료 후 임차인이 동시이행항변권 행사하여 임차건물 계속 점유해 온 것이면, 임대인이 보증금반환의무 이행·이행제공 하여 임차인의 건물인도의무가 지체에 빠져 동시이행항변권 상실했다는 주장·입증 없는 이상, 임차인 점유는 불법점유 X (불법행위 X).",["§536"],0,"계약총론","대판 90다카24076","미분류"],
  ["채권각론_P026","95다54693, 2022다228667","동시이행항변권 상실 후 목적물 반환 계속 거부 점유 — 불법행위 성립","임대인이 보증금반환의무 이행·이행제공하여 임차인이 동시이행항변권을 상실했는데도 목적물 반환을 계속 거부하며 점유하는 경우","임대인이 보증금반환의무 이행·이행제공하여 임차인이 동시이행항변권 상실했는데도 목적물 반환 계속 거부하며 점유하면 특별한 사정이 없는 한 임차인은 적어도 과실에 의한 불법행위 → 임대차에 관한 임차인 채무 공제 등으로 동시이행항변권 상실해도 마찬가지, 임차인이 동이항 상실 알 수 있는 때부터의 점유는 과실에 의한 불법행위 O.\n\n正辯(2022다228667): 임대차 종료 직후 보증금반환에 기한 동이항으로 임차인의 점유가 불법행위가 되지 않았더라도, 그 후 계속 발생하는 차임 상당 부당이득금을 공제하다가 보증금 금액이 소진하게 된 순간부터는 사용·수익 멈춰도 불법행위가 될 수 있다는 취지로 보임(私見).",["§536"],0,"계약총론","대판 95다54693, 2022다228667","미분류"],
  ["채권각론_P027","98다15545","동시이행항변권 행사 중 사용·수익으로 얻은 이익은 부당이득반환 의무","임차인이 동시이행항변권에 기하여 임차목적물을 점유 사용·수익한 경우","임차인이 동시이행항변권에 기하여 임차목적물을 점유 사용·수익한 경우 불법점유로 인한 손해배상청구 X → 그러나 사용·수익으로 인하여 실질적으로 얻은 이익 있으면 부당이득반환 O.",["§536"],0,"계약총론","대판 98다15545","미분류"],
  ["채권각론_P028","2025다209893","동시이행항변권의 묵시적 포기 — 잔금 연체료 약정과 이행제공 정도","매수인 매매대금 연체료 약정 및 잔금 지급준비 미비 상태에서 매도인의 이행준비 정도가 문제된 사안","동시이행항변권 포기는 묵시적 O, 묵시적 포기 인정은 엄격·신중해야. 매수인 매매대금 연체료 약정은 손해배상 예정, 지체책임 발생해야 지급의무 발생. 쌍무계약에서 이행제공 정도는 시기와 구체적 상황에 따라 신의성실 원칙 어긋나지 않게 합리적으로 정해야 → 매수인 잔대금 지급준비 되지 않아 소유권이전등기서류 수령할 준비 안 했다면 매도인도 그에 상응한 이행 준비로 족함.\n\n正辯: 잔금지급 지체 시 연체료 발생한다는 약정만으로 매수인이 동시이행항변권 묵시적 포기했다고 볼 수 X → 다만 매수인이 분양계약 해제 통지 및 원상회복 요구, 소 제기하고 그 기간에 잔금 상당액이나 피담보채무 인수하여 잔금과 차액 마련하거나 지급 준비했다는 등 잔금 지급 노력했다고 볼 자료 없고 오히려 잔금지급 자체 거부하면서 매도인의 소이등서류 등을 수령하지 않겠다는 의사를 표시했다면, 매도인도 이에 상응하는 이행 준비로 족하고, 매도인의 이행제공 여부·정도를 살펴 인정된다면 매수인의 연체료 지급의무 인정해야.",["§536"],0,"계약총론","대판 2025다209893","미분류"],
  ["채권각론_P029","2008다98655","쌍방 귀책 없이 매매목적물이 경매매각되어 매매계약 종료된 경우 — 위험부담 법리와 부당이득반환","쌍방 귀책사유 없이 매매목적물이 경매절차에서 매각되어 매매계약이 종료된 사안","쌍방 귀책사유 없이 매매목적물이 경매절차에서 매각되어 매매계약이 종료된 경우 → 매도인은 받은 계약금을, 매수인은 목적물 차임 상당 부당이득을 반환할 의무 O ∵ 위험부담 법리, 537조, 741조.\n\n正辯: 매매목적물을 매수인이 인도받아 점유·사용한 사안에서는 매수인(채권자)도 부당이득반환을 하여야 한다는 점을 숙지해야 함. 한편 매매와 같은 일시적 계약은 통상 '종료'라는 표현을 사용하지 않으나 계속적 채무인 차임 상당 부당이득반환의무가 문제되어 사용한 것으로 보임(私見).",["§537","§741"],0,"계약총론","대판 2008다98655","미분류"],
  ["채권각론_P030","2024다293580","기간 정한 임대차계약에서 일정기간 급부불능의 종국성과 제537조 적용 — 코로나 면세점 사안","코로나 확산으로 국토교통부의 국제선 운항 중단 및 국제공항 국제선 청사 폐쇄에 따라 면세점 운영이 중단된 사안에서 한국공항공사가 해당 기간의 차임을 청구한 경우","제623조 '사용·수익 적합 상태'는 목적물 통상 사용방법, 물리적 사용·수익 가능성뿐 아닌 임대차 목적·유형, 관행, 계약내용, 당사자 의사 종합적 고려해야. 쌍방 귀책사유 없이 채무 이행 불능되면 채무자는 537조로 자기 채무이행의무 면함과 더불어 상대방 이행도 청구 X, 이미 이행한 급부는 부당이득 반환청구 O. '채무 이행 불능'은 절대적·물리적 불능뿐 아니라 사회생활상 경험칙, 거래관념 비춰 채무자 이행 실현 기대 불가한 경우 포함 → 기간 정한 임대차계약 등 계속적 계약에서 어떤 사유로 일정기간 채무 이행 불능인 경우, 계약 목적·유형, 급부 내용·특성·이행방법 등에 따라 채무자 이행 기대할 수 없다면, 해당 기간 급부불능은 일시적 아닌 종국적이므로 537조 적용 O (계약의 존속 여부는 영향 없음).\n\n正辯: 코로나 확산으로 국토교통부의 국제선 운항 중단 및 국제공항 국제선 청사 폐쇄에 따라 면세점 운영 중단 → 해당 기간 한국공항공사가 임대차 목적물을 면세점 용도 사용·수익 가능 상태 유지시킬 의무는 당사자 쌍방 책임 없는 사유로 이행이 불능해짐(임차인의 물리적 점유·사용은 가능했더라도) → 공사는 위 기간의 차임 청구 X, 지급한 차임은 부당이득반환 O (급부불능이 일정 기간 한정된 것이라도 해당 기간은 종국적 불능 O, 임대차계약 종료되지 않았더라도 마찬가지, 537조 적용에 있어 임대차계약 종료·소멸은 필수 전제가 아님).",["§537","§623"],0,"계약총론","대판 2024다293580","미분류"],
  ["채권각론_P031","2001다79013","채권자의 영구적 불수령과 제538조 1항 적용을 위한 이행제공의 필요","A, B가 A의 토지에 매매계약 체결하고 B가 계약금과 1차 중도금 지급한 상태에서 A가 2차 중도금을 청구하자 B는 근거 없이 매매계약 실효 주장하며 대금반환 요청. 몇 년 뒤 토지가 수용된 경우. A가 B의 수령지체 중 귀책사유 없는 불능을 이유로 2차 중도금 및 잔금 청구","채권자지체(400조) 성립 위하여 변제제공(460조) 있어야 하는데 채권자의 수령거절 의사가 확고한 이른바 '영구적 불수령'의 경우 구두 제공조차 필요 없으나 이는 그로써 채무불이행을 면한다는 것에 불과하고(461조), 538조 1항 2문 '수령지체' 중 쌍방 책임 없는 불능을 이유로 채무자가 반대급부를 청구하기 위해서는 현실제공이나 구두제공이 있었어야.\n\nⓐ 구두제공조차 없었다면 538조 1항 X → 537조 적용 → A는 B로부터 받은 계약금·1차 중도금을 B에게 부당이득반환 하여야(741조)\nⓑ 구두제공이라도 했었다면 538조 1항 O → A는 B에 대해 2차 중도금 및 잔금 지급청구 O, 다만 이 경우 538조 2항에 의하여 보상금은 공제되어야.",["§538","§400","§460","§461","§537"],0,"계약총론","대판 2001다79013","미분류"],
  ["채권각론_P032","2008다25824","매수인 귀책으로 낙찰대금 미납 후 제3자 낙찰 — 제538조 1항·2항 적용","甲이 낙찰받을 토지를 乙에게 매도하되 乙이 낙찰대금 대신 납부하기로 했는데 납부하지 않아 丙이 낙찰 받은 경우","타인 권리 매매 담보책임이 문제되나 그렇게 된 것이 오로지 매수인의 귀책사유이므로 甲은 담보책임 부담 X. 이때 乙은 甲에게 매매대금을 지급해야 하고(538조 1항), 다만 대신 납부하려던 낙찰대금은 공제(538조 2항).",["§538"],0,"계약총론","대판 2008다25824","미분류"],
  ["채권각론_P033","2007다8464","부동산 매수인의 근저당 피담보채무 이행인수 후 근저당 실행으로 매도인 소유권 상실 — 제538조 적용","부동산 매수인이 목적물에 설정된 근저당권의 피담보채무를 이행인수한 경우, 매수인이 변제 게을리하여 근저당권 실행됨으로써 매도인이 소유권 상실","매수인이 변제 게을리하여 근저당권 실행됨으로써 매도인이 소유권 상실했다면 오로지 매수인의 귀책사유 O → 538조 적용, 매도인은 매수인에 대해 매매대금청구 O. 다만, 경매로 자신의 채무 소멸하거나 남는 금액 교부받은 것은 538조 2항 소정의 이익이므로 매수인에게 상환해야.\n\n正辯: 576조 담보책임은 포기한 것 ∵ 이행인수.",["§538","§576"],0,"계약총론","대판 2007다8464","미분류"],
  ["채권각론_P034","2002다37405","보증인이 주채무자의 사전구상의무를 면제하는 약정 — 제3자를 위한 계약에 준함","채권자와 보증인이 보증계약을 체결하면서 보증인(낙약자)이 주채무자(제3자)에 대한 사전구상권을 포기함으로써 주채무자의 사전구상의무를 면제해주는 사안","보증인(낙약자)이 주채무자(제3자)에 대한 사전구상권을 포기함으로써 주채무자의 사전구상의무를 면제해주는 것도 제3자를 위한 계약에 준함.",["§539"],0,"계약총론","대판 2002다37405","미분류"],
  ["채권각론_P035","2003다49771","제3자를 위한 계약에서 대가관계와 기본관계의 독립성","제3자를 위한 계약에서 요약자와 수익자 사이 대가관계의 하자가 기본관계에 영향을 미치는지 여부","제3자를 위한 계약의 체결 원인인 요약자와 수익자 사이의 법률관계(이른바 '대가관계')의 효력은 제3자를 위한 계약 자체는 물론 그에 기한 요약자와 낙약자 사이의 법률관계(이른바 '기본관계')의 성립이나 효력에 영향 미치지 X → 대가관계에 관한 항변을 가지고, '낙약자가 수익자에게' 혹은 '요약자가 낙약자에게' 대항 X.",["§539"],0,"계약총론","대판 2003다49771","미분류"],
  ["채권각론_P036","69다1410","낙약자 귀책사유로 이행불능·이행지체 시 요약자의 단독 해제권","제3자를 위한 계약에서 낙약자의 귀책사유로 이행불능·이행지체가 있는 경우","제3자를 위한 계약에서 낙약자의 귀책사유로 인한 이행불능·이행지체가 있을 때 요약자는 제3자의 동의 없이 계약당사자로서 계약을 해제 O.",["§539","§541","§543"],0,"계약총론","대판 69다1410","미분류"],
  ["채권각론_P037","2005다7566, 2010다31860","기본관계 계약 무효·해제 시 낙약자의 원상회복·부당이득반환 청산 상대방 — 요약자 O, 제3자 X","제3자를 위한 계약에서 기본관계(낙약자-요약자)를 이루는 계약이 무효이거나 해제된 경우 낙약자가 이미 제3자에게 급부한 것의 반환 상대방","낙약자가 이미 제3자에게 급부한 것에 관하여서는 요약자를 상대로 원상회복청구나 부당이득반환청구 O, 제3자를 상대로 X ∵ 계약관계의 청산은 계약당사자인 낙약자와 요약자 사이에 이루어져야, 계약상의 위험을 제3자에게 전가시키면 X.\n\n이유 中: 제3자를 위한 계약에서의 제3자는 548조 1항 단서 제3자에 해당 X, 그렇다고 계약해제로 인한 원상회복의무 부담 X, 낙약자가 미지급급부에 대해 지급 거절할 수 있으나(542조), 이는 이미 지급한 급부의 원상회복과는 다른 문제.\n\n正辯: 이 판례들은 수익 의사표시 후에도 요약자의 채무불이행이 있다면 낙약자가 계약을 해제할 수 있음을 전제로 하고 있음.",["§539","§541","§542","§548"],0,"계약총론","대판 2005다7566, 2010다31860","미분류"],
  ["채권각론_P038","2016다255125","생명보험·상해보험 무효·해제 시 보험자의 보험수익자에 대한 반환청구 가부","타인을 위한 생명보험·상해보험이 무효·해제된 경우, 보험자가 보험수익자에게 이미 지급한 보험금의 반환을 보험수익자에게 직접 청구한 사안","타인을 위한 생명보험·상해보험은 '제3자를 위한 계약'의 성질을 가지더라도 보험자는 보험수익자에 대한 자신의 고유한 채무를 이행한 것이므로 보험계약이 무효·해제된 경우 보험자는 보험수익자를 상대로 그에게 이미 급부한 것의 반환청구 O.",["§539"],0,"계약총론","대판 2016다255125","미분류"],
  ["채권각론_P039","2018다244976","제3자를 위한 계약에서 수익자가 548조 1항 단서 제3자에 해당하는 경우","제3자를 위한 계약(기본관계: 함포납품계약)에서 수익자가 요약자와 대가관계(현물변상계약)를 맺고 함포를 인도받아 소유권을 취득한 사안에서 기본관계 해제 시 수익자 보호 여부","제3자를 위한 계약에서 낙약자·요약자 사이 법률관계(기본관계)에 기하여 수익자가 요약자와 원인관계(대가관계) 맺음으로써 해제 전에 새로운 이해관계 갖고 그에 따라 등기·인도 등 완전한 권리 취득했다면 수익자는 548조 1항 단서의 제3자 O.\n\n正辯: 제3자를 위한 계약의 '수익자'는 원칙적으로 해제에서 보호되는 '제3자' 아니지만, 기본관계(함포납품계약)를 '기초로' 대가관계(현물변상계약) 맺고 함포 인도받아(간접점유) 소유권 취득한 수익자는 함포납품계약 해제에 보호되는 548조 1항 단서 제3자 O. 금전이 아닌 동산 인도였으므로 낙약자가 요약자가 아닌 수익자에게도 원상회복 구한 것으로 보이며, 다만 간접점유이므로 만일 인용되었다면 목반청 양도 방식(私見).",["§539","§548"],0,"계약총론","대판 2018다244976","미분류"],
  ["채권각론_P040","92다41559","수익의 의사표시를 한 수익자의 요약자 계약해제 시 낙약자에 대한 손해배상청구권","수익의 의사표시를 한 수익자가 요약자가 계약을 해제한 경우 낙약자에게 손해배상을 청구한 사안","수익의 의사표시를 한 수익자는 요약자가 계약을 해제한 경우에 낙약자에게 하자로 인한 손해배상청구 O.",["§539","§541"],0,"계약총론","대판 92다41559","미분류"],
  ["채권각론_P041","2000다50688","근저당·가압류 있는 부동산 매도인 이행지체 — 이행불능 아니고 최고 필요","매매목적물 부동산에 근저당권설정등기·가압류등기가 있는 경우 매도인 이행의무의 성질","매매목적물 부동산에 근저당권설정등기·가압류등기가 있다면 매도인이 말소하여 완전한 소유권이전등기해줘야 하지만, 말소되지 아니하였더라도 바로 매도인의 소유권이전등기의무가 이행불능으로 되는 것은 X → 매도인이 미리 이행하지 아니할 의사를 표시한 경우가 아닌 한, 매수인이 매도인에게 상당한 기간을 정하여 이행 최고하고 그 기간 내 이행하지 아니한 때 한하여 해제 O.",["§544"],0,"계약총론","대판 2000다50688","미분류"],
  ["채권각론_P042","2001다6053","매도인의 이행장소 서류 보관·계속 수령 최고와 이행제공의 계속성","매도인이 이행장소인 법무사사무실에 서류를 계속 보관시키면서 수령 최고를 반복한 경우 이행제공의 계속성 충족 여부","매도인이 매수인을 이행지체로 되게 하려면 소유권이전등기 필요 서류 등을 현실 제공하거나 그렇지 않더라도 이행장소에 그 서류 등을 준비해두고 매수인에게 그 뜻을 통지하고 수령해갈 것 최고하면 O → 이행장소인 법무사사무실에 그 서류 등 계속 보관시키면서 언제든지 잔금과 상환으로 서류들을 수령할 수 있음을 통지하고 신의칙상 요구되는 상당한 시간 간격 두고 거듭 수령 최고하면 이행 제공을 다한 것 O → 그런 상태가 계속된 기간 동안 매수인은 이행지체 O.\n\n正辯: 판례는 '동시이행 항변권 소멸을 위한 이행제공'에 관하여 '계속적 이행제공설'의 입장인데 이처럼 이행장소에 서류를 계속 보관시키고 어느 정도 간격으로 계속 수령 최고하면 이행제공이 계속되었다고 보는 입장임.",["§544","§536"],0,"계약총론","대판 2001다6053","미분류"],
  ["채권각론_P043","93다47615","과대최고의 효력 — 현저히 과다하고 불수령 의사 분명한 경우 최고 부적법","최고한 금액이 본래 급부보다 현저히 과다하고 청구한 금액 제공하지 않으면 수령하지 않을 의사가 분명한 경우","과대최고는 본래 급부와 차이 적거나 착오에 기한 것이면 본래 급부 범위 내에서 유효. 그러나 과다한 정도가 현저하고 청구한 금액을 제공하지 않으면 수령하지 않을 의사가 분명하면 최고 부적법하고 이에 터잡은 해제 무효.",["§544"],0,"계약총론","대판 93다47615","미분류"],
  ["채권각론_P044","89다카14110","최고기간이 부당히 짧거나 기간을 정하지 않은 경우 — 상당기간 경과 후 해제권 발생","최고기간이 상당한 기간보다 짧거나 기간을 정하지 않은 경우","기간이 상당한 기간보다 짧거나 기간을 정하지 않은 경우에는 상당한 기간이 지나면 해제권 발생.",["§544"],0,"계약총론","대판 89다카14110","미분류"],
  ["채권각론_P045","2002다24942","소장 부본 송달로 최고 효력 인정 — 상당기간 경과 후 해제 가능","매도인이 매수인의 매매대금 미지급 이유로 약정 취소 주장하며 원상회복 구하는 소를 제기한 경우 소장 부본 송달이 최고로서의 효력을 갖는지","매도인이 매수인의 매매대금 미지급 이유로 약정 취소 주장하며 원상회복 구하는 소 제기했다면, 특히 대금수령 거부 취지 포함되지 않은 한, 소장 부본 송달로 매매대금지급 최고 있었던 것 O → 상당기간 경과하도록 대금 지급 않으면 매도인은 매매계약 해제 O.",["§544"],0,"계약총론","대판 2002다24942","미분류"],
  ["채권각론_P046","2020다290804","채무불이행을 이유로 해제하겠다는 통지의 최고로서의 효력","채무자의 급부불이행 사정을 들어 계약 해제하겠다는 통지가 최고로서의 효력을 갖는지","채무자 급부불이행 사정 들어 계약 해제하겠다는 통지했다면, 특별히 급부수령 거부 취지 포함되지 않은 한, 그로써 최고 있었던 것 O → 상당기간 경과하도록 이행되지 않았다면 채권자는 계약 해제 O.",["§544"],0,"계약총론","대판 2020다290804","미분류"],
  ["채권각론_P047","2022다238053","동시이행관계에서 해제를 위해 채권자의 자기 채무 변제제공 필요","동시이행관계인 반대의무를 지는 채권자가 채무자의 변제제공 없음을 이유로 해제할 때 자기 채무를 변제제공 해야 하는지","동시이행관계인 반대의무 지는 채권자는 채무자의 변제제공 없음을 이유로 해제하기 위해 자기 채무 변제제공 하여야.\n\n正辯: 甲회사와 乙은 부동산 매매계약 체결하며 잔금지급과 소이등 동시에 하기로, 의무 이행하지 않으면 서면으로 최고 후 해제할 수 있도록 약정 → 甲이 잔금 지급하지 않자 乙이 다음 날 甲에게 잔금 미지급 이유로 해제한다는 문자메시지 전송. 乙은 잔금기일 이전에 소유권이전등기에 필요한 서류 준비 마치고 공인중개사에게 통지했으며 인도를 위한 준비 마치는 등 甲에게 이행제공 O → 甲은 잔금 지급기일 무렵 이행지체 상태 O → 乙의 문자메시지 해제 통지는 그에 앞선 서면에 의한 이행 최고가 없어 해제 통지 효력 X, 약정사항인 '서면'에 의한 것이 아니어서 최고 효력도 X → 乙의 답변서에 의한 해제 통지는 해제 통지 효력 X, 그러나 특별히 잔금 수령 거부 취지 포함되지 않은 이상 이행 최고 효력 O → 乙의 준비서면이 甲에게 송달된 날 적법하게 해제 O.",["§544","§536"],0,"계약총론","대판 2022다238053","미분류"],
  ["채권각론_P048","88다카132","중도금 자동해제 약정의 효력","중도금을 기일에 지급 못하면 자동해제된다는 약정이 있는 경우","중도금을 기일에 지급 못하면 자동해제된다는 약정은 그대로 O.",["§544"],0,"계약총론","대판 88다카132","미분류"],
  ["채권각론_P049","88다카28891","잔금 자동해제 약정과 동시이행항변권 — 이행지체에 빠진 때 비로소 자동해제","잔금을 기일에 지급하지 못하면 자동해제된다는 약정이 있더라도 매도인이 소유권이전등기 필요 서류 이행제공을 하지 않은 경우","잔금을 기일에 지급하지 못하면 자동해제된다는 약정이 있더라도, 매도인이 잔금지급기일에 소유권이전등기 필요 서류 이행제공을 하여 매수인을 '이행지체에 빠지게 하였을 때 비로소 자동해제' O.\n\n正辯: 중도금 미지급 자동해제 약정은 그대로 효과, 잔금 미지급 자동해제 약정은 동이항을 깨야 효과 → 이를 두고 단순히 '잔금의 경우 판례가 자동해제 부정'했다는 평가는 부당함(私見). 이는 의사해석 문제로, 일반거래에서 '잔금 미지급'이라는 조건은 '잔금 지체'로 해석해야 하고, 잔금에는 통상 등기서류 교부가 동이항으로 붙어있으니 동이항이 깨져야 '채무불이행(이행지체)'이 성립해야 한다는 의미(즉, 동이항만 깨면 '자동해제' O) → 애초 동이항을 배제했거나 가령 중도금 지급 시 이미 등기서류 교부했다면 잔금기일 도과만으로 자동해제 O.",["§544","§536"],0,"계약총론","대판 88다카28891","미분류"],
  ["채권각론_P050","2022다255614","잔금기일 도과로 자동해제되는 특별한 사정 — 매수인의 확약과 자동해제 감수 약정","매도인의 등기서류 구비 불문하고 매수인의 지급기일 도과사실 자체만으로 계약 실효되는 특약을 한 경우 또는 매수인이 자동해제 감수하겠다는 약정을 한 경우","매도인의 등기서류 구비 불문하고 매수인의 지급기일 도과사실 자체만으로 계약 실효되는 특약했거나, 매수인이 여러 번 채무불이행에 책임 느껴 잔금기일 연기 요청하며 새로운 약정기일까지는 반드시 이행할 것 확약하고 자동해제 감수하겠다는 약정했다고 볼 특별한 사정 있다면, 잔금지급기일 도과함으로써 매매계약 자동적 실효 O.",["§544"],0,"계약총론","대판 2022다255614","미분류"],
  ["채권각론_P051","79다1595","위약금·계약금 조항과 자동해제 구분 — 해제권 유보조항으로 해석","매매계약에서 '매도인 위약 시 계약금 배액 배상, 매수인 위약 시 계약금 포기하며 자동 해제된다'는 조항이 있는 경우","매매계약에서 '매도인 위약 시 계약금 배액 배상, 매수인 위약 시 계약금 포기하며 자동 해제된다'는 조항은 위약 당사자가 배액 상환이나 포기하여 계약을 해제할 수 있다는 해제권 유보조항 O → 최고·통지 없는 자동해제 X.\n\n正辯: 자동해제 약정을 계약금의 포기 및 배액상환 약정과 결합한 경우에는 자동해제 효과 부정하는데, 이는 그 문언에도 불구하고 자동해제에 초점을 둔 것이 아니라 채무불이행 시 위약금 약정과 해제권의 부여에 초점을 둔 것으로 해석하는 것임.",["§544","§543"],0,"계약총론","대판 79다1595","미분류"],
  ["채권각론_P052","2019다216817","자동해제 약정 후 계약 부활 합의 — 자동해제약정 효력 상실","자동해제 약정 하에 채무불이행이 있었으나 당사자들이 계약이 여전히 유효함을 전제로 논의를 계속한 경우","자동해제 약정하고 일방 채무불이행 하면 별도 최고나 해제 의사표시 없이 불이행 자체로써 자동해제 O → 그러나 당사자들이 계약 여전히 유효 전제로 논의 계속, 해제 법률효과 주장 않은 채 계약 내용 이행 촉구, 온전한 이행 못 받은 상대방이 이의 없이 급부 중 일부 수령 → 특별한 사정 없는 한 계약당사자들 사이 자동해제약정 효력 상실시키고 자동해제된 계약 부활시키는 합의 O → 채무이행 못 받은 상대방은 새로운 최고 없이 바로 해제 X.",["§544"],0,"계약총론","대판 2019다216817","미분류"],
  ["채권각론_P053","96다35590","최고기간 내 이행 제공의 계속 불필요 — 이행 준비는 필요","이행기에 한 번 이행제공 하여 상대방 지체에 빠뜨린 후 해제 최고를 하는 경우, 최고기간 내 이행제공 계속 필요 여부","'일방이 이행기에 한 번 이행제공 하여 상대방 지체 빠지게 한 경우, 신의칙상 최고하며 최고기간 내 이행제공 계속할 필요 없더라도, 상대방이 최고기간 내에 이행·이행제공을 하면 해제권은 소멸하므로, 상대방 이행을 수령하고 자신의 채무를 이행할 정도의 준비는 필요.' → 매수인이 잔금 이행제공 했음에도 매도인이 이행지체 빠져 매수인이 정지조건부 해제 의사표시 및 최고하면서 현실 제공했던 잔금으로 양도성예금증서 구입·보관하면 이행 준비 O, 적법한 최고 O.\n\n正辯: 판례는 상대방의 동시이행 항변권 상실(=지체책임 계속적 발생)을 위해 계속적 이행제공설을 취했으나, 해제를 위한 최고기간 내에는 계속적 이행제공이 불필요하다는 입장임. 다만 전자의 경우 법무사 사무실에 서류를 맡겨두고 일정 간격 최고로 충분하다는 등 이행제공 행위의 계속이 아닌 일정 상태의 지속만을 요구하고, 후자의 경우 이행제공의 계속은 필요 없으나 이행의 준비는 되어있어야 한다면서 양도성 예금증서(매수인)나 등기서류 일체(매도인)의 준비 상태를 요구하므로, 결국 양자는 실제에 있어서 큰 차이는 없는 상황이라 볼 수도 있음(私見).",["§544","§536"],0,"계약총론","대판 96다35590","미분류"],
  ["채권각론_P054","92다5713","매도인 해제 최고 시 이행제공 정도 — 소유권이전등기 필요 일체 서류 준비","매도인이 매수인의 잔금 지체를 이유로 해제하기 위한 이행제공의 정도","매도인이 매수인의 지체 이유로 해제하려면 매수인의 잔금 미지급만으로는 부족하고, 매도인이 소유권이전등기신청 필요 일체 서류를 수리할 수 있을 정도로 준비하여 그 뜻을 상대방에게 통지하여 수령을 최고해야 → 소유권이전등기신청에 필요한 일체의 서류라 함은 등기권리증·위임장·인감증명서 등 등기신청에 필요한 모든 구비서류 → 매도인은 일체 서류를 발급받아 인감도장·등기권리증과 자신의 집에 소지하고 있음으로써 충분.",["§544","§536"],0,"계약총론","대판 92다5713","미분류"],
  ["채권각론_P055","2012다65867","인감증명서 미발급 상태에서의 이행제공 충분 여부","매도인이 정지조건부 해제 의사표시와 최고를 함에 있어 소유권이전등기 필요 서류를 모두 준비하되 인감증명서만 발급받지 않은 경우","인감증명서는 언제라도 발급받을 수 있으므로 매수인의 불이행 정도에 비추어 매도인은 이행 제공 마친 것이고 해제는 적법 O.\n\n正辯: 판례는 상대방의 동시이행 항변권 상실(=지체책임 계속적 발생)을 위해 계속적 이행제공설을 취했으나, 해제를 위한 최고기간 내에는 계속적 이행제공이 불필요하다는 입장임. 다만 이행제공의 계속은 필요 없으나 이행의 준비는 되어있어야 한다면서 양도성 예금증서(매수인)나 등기서류 일체(매도인)의 준비 상태를 요구하므로, 결국 양자는 실제에 있어서 큰 차이는 없는 상황이라 볼 수도 있음(私見).",["§544","§536"],0,"계약총론","대판 2012다65867","미분류"],
  ["채권각론_P056","80다2381","이행기간 내 vs 이행기일 최고 시 이행제공 계속 여부, 정지조건부 해제 의사표시","[쟁점①] 동시이행관계에서 일방이 상대방 이행지체 이유로 해제권 취득하기 위한 이행청구의 방법. [쟁점②] 기일 내 이행 않으면 해제한다는 이행청구의 법적 성질","[쟁점①] 동시이행관계에서 일방이 상대방 이행지체 이유로 해제권 취득하기 위해, 그 이행청구에 표시된 이행기가 ① 일정 '기간 내'라면 기간 중 이행제공 계속해야, ② 일정한 일시 등 '기일'로 정했다면 그 기일에 이행제공으로 충분 → 상대방 이행제공 없이 위 기간·기일 도과함으로써 해제권 발생.\n\n[쟁점②] '특정 기일 내에 이행하지 않을 경우 계약은 당연히 해제된 것으로 한다'는 이행청구는 이행청구와 동시에 기일 내 이행 없는 것을 정지조건으로 하여 미리 해제의 의사표시를 한 것 O.\n\n正辯: 전술한 것처럼 판례는 한 번 이행제공으로 이미 지체에 빠진 상대방에게 해제를 할 경우 최고기간 내 이행제공 계속할 필요가 없다는 입장 → 위 판결의 쟁점①은 아직 상대방이 '지체에 빠지지 않은 상태(가령 기한 정함 없는 채무)'에서 이행청구를 통해 지체에 빠뜨림(동이항 깨기)과 동시에 해제요건으로서의 최고를 하려는 사안으로 보임. 쟁점②에 대해서는 판례는 최고기간 내 불이행을 정지조건으로 하는 해제 의사표시를 인정 O(私見).",["§544","§543","§536"],0,"계약총론","대판 80다2381","미분류"],
  ["채권각론_P057","2004다31302","사정변경을 이유로 한 해제·해지의 요건","사정변경을 이유로 계약을 해제하는 경우의 요건","사정변경 인한 해제는 ① 계약 성립 당시 당사자 예견할 수 없던 계약 기초인 객관적 사정(주관적 사정 X)의 현저한 사정 변경, ② 해제권 취득 당사자 귀책사유 없을 것, ③ 구속력 인정이 신의칙 현저히 반하는 결과일 것을 요건으로 함.",["§544"],0,"계약총론","대판 2004다31302","미분류"],
  ["채권각론_P058","89다카1381","회사 임원·직원이 퇴사한 경우 계속적 보증계약 사정변경 해지","회사 임원·직원 지위 때문에 회사 요구로 부득이 회사·제3자 사이 계속적 거래에 따른 회사 채무에 보증인이 된 자가 그 후 퇴사한 경우","보증기간 정했더라도 사정변경 이유로 보증계약 해지 O ∵ 계약성립 당시 사정 현저한 변경.",["§544"],0,"계약총론","대판 89다카1381","미분류"],
  ["채권각론_P059","94다46008","특정된 확정채무 보증인의 사임 — 사정변경 해지 불가","특정된 확정채무를 보증한 이사가 사임한 경우","특정된 확정채무 보증한 이사는 사임해도 사정변경 해지 X.",["§544"],0,"계약총론","대판 94다46008","미분류"],
  ["채권각론_P060","2020다254846","견본주택 건축 불능으로 인한 토지 임대차계약 사정변경 해지 인정","甲이 주택건설사업 위한 견본주택 건설 목적으로 임대인 乙과 토지 임대차계약 체결하며 해당 목적을 특약사항에 명시했는데, 지자체장의 축조신고 반려통보로 토지에 견본주택 건축이 불가능하게 된 경우","甲은 임대차계약 해지 및 보증금반환청구 O ∵ 견본주택 건축은 임대차계약 성립 기초사정 O, 甲은 임대차계약 체결 목적 달성 X, 계약을 유지하면 甲·乙 사이에 중대한 불균형 초래.",["§544"],0,"계약총론","대판 2020다254846","미분류"],
  ["채권각론_P061","2020다297430","계속적 계약에서 사정변경 이유 계약 소멸 — 해지만 가능, 해제 불가","임대차계약·고용계약·위임계약 등 계속적 계약에서 일방의 업무 중 여러 부분이 이미 이행되고 상당 기간 흐른 경우 사정변경 이유로 계약 효력을 소멸시키는 방법","임대차계약·고용계약·위임계약 등 계약으로부터 생기는 급부가 일정 기간 계속하여 행해지는 계속적 계약에서 일방의 업무 중 여러 부분이 이미 이행되고 상당 기간 흐른 경우, 상대방이 사정변경 이유로 계약 효력 소멸시키려면 특별한 사정 없는 한 소멸 효과를 장래에 향하여 발생시키는 550조 '해지'만 가능 O, 548조 '해제'는 X.\n\n正辯: 해외이주 알선업체와 미국 비숙련 취업이민 위한 알선업무계약 체결한 사안.",["§544","§548","§550"],0,"계약총론","대판 2020다297430","미분류"],
  ["채권각론_P062","2022다203804","부수적 채무의 불이행으로 계약 해제 불가 — 주된 채무와 부수적 채무 구별","채무불이행을 이유로 계약 해제 시 주된 채무와 부수적 채무의 구별 기준","채무불이행을 이유로 544조에 따라 계약 해제하려면, 당해 채무가 계약목적 달성에 필요불가결하고 이행하지 않으면 계약 목적이 달성되지 않아 체결하지 않았으리라 여겨질 정도의 주된 채무여야. 부수적 채무의 불이행으로 계약 해제 X → 주된 채무와 부수적 채무 구별함에 급부의 독립된 가치와 관계없이, 계약 체결할 때 표명되었거나 당시 상황으로 분명하게 객관적으로 나타난 당사자 합리적 의사로 결정, 계약의 내용·목적·불이행결과 등 여러 사정 고려.\n\n正辯: 甲 회사가 乙에게 휴양 콘도미니엄 분양계약 체결하며 인근 고압선을 지하로 매립하기로 하는 특약 후 특약 이행 X → 주된 채무 여지 O, 해제 O ∵ 분양계약서 명시 등 제반사정.",["§544"],0,"계약총론","대판 2022다203804","미분류"],
  ["채권각론_P063","2021다294674, 2023다221144","청약저축 가입자 사망 시 공동상속인 전원의 해지 의사표시 필요","청약저축 가입자가 사망하여 공동상속인들이 주택공급 신청권을 공동상속한 경우 청약저축 예금계약의 해지","청약저축 가입자가 사망하면 공동상속인들이 주택공급 신청권을 공동상속하여 상속지분비율로 준공유 → 청약저축 예금계약 해지는 금융기관과 특약 등 특별한 사정 없는 한 상속인들 전원이 해지 의사표시해야 ∵ 547조 1항, 청약저축과 주택공급 신청권은 분리될 수 없으므로.",["§547"],0,"계약총론","대판 2021다294674, 2023다221144","미분류"],
  ["채권각론_P064","94다59745","공유자 전원이 하나의 매매계약으로 동일한 매수인에게 매도한 경우 일부 공유자의 해제 가능 여부","공유자 전원이 공유물에 대한 각 소유지분 전부를 형식상 하나의 매매계약에 의하여 동일한 매수인에게 매도하는 경우","특별한 사정 없는 한 실질상 각 공유지분별로 별개 매매계약 성립 O, 일부 공유자가 매수인의 매매대금지급의무 불이행을 원인으로 그 공유지분에 대한 매매계약 해제 O ∵ 하나의 부동산을 수인이 공유하는 경우 각 공유자는 각 그 소유 지분을 자유로이 처분 O.\n\n正辯: 부동산 공유자의 공동매도는 실질상 각 지분의 독립된 매도로서 1:1의 매매계약이 복수로 존재하므로(私見) 547조를 적용할 여지가 없는 것임.",["§547"],0,"계약총론","대판 94다59745","미분류"],
  ["채권각론_P065","2013다22812","매매계약 일방 당사자 사망 후 복수 상속인이 해제 시 전원 의사표시 필요","매매계약 일방 당사자가 사망하고 복수의 상속인이 매매계약을 해제하려는 경우","특별한 사정이 없는 한 상속인들 전원이 해제 의사표시 하여야.\n\n正辯: 위 94다59745 판결과 모순되는 것으로 보이나, 본 판결은 매수인 측 상속인들이었는데, 처음부터 공동 매수한 것이 아니라 사망을 통한 공동상속이 된 점의 차이로 보임(私見).",["§547"],0,"계약총론","대판 2013다22812","미분류"],
  ["채권각론_P066","2019다204593","원채권 시효소멸 후 채무불이행을 이유로 한 해제권·원상회복청구권 행사 불가","채무불이행 해제 의사표시 당시 이미 채무불이행 대상 원채권이 시효소멸 한 경우","소멸시효 주장이 신의칙에 반하여 불허되는 등 특별한 사정 없는 한, 채무불이행 시점이 원채권의 시효완성 전인지 후인지 불문, 채권자는 채무불이행 이유로 해제권·원상회복청구권 X ∵ 법정해제권은 채무불이행의 구제수단이어서 본래 채무 이행불능 이유로 계약 해제하려면 그 이행불능 대상인 본래 채무는 유효하게 존속해야, 167조 소멸시효의 소급효.\n\n正辯: A와 B는 부동산 매매계약(상사) 체결하면서 소유권이전등기와 잔금은 '사업계획승인 후 10일 이내' 이행이라는 불확정기한으로 정함 → B가 중도금·잔금 지급 않고 사업계획승인 못 받기에 A는 K에게 부동산 매도하고 이전등기 경로 → B에 대해 지급명령 확정된 C는 B의 A에 대한 'A의 채무불이행에 따른 매매계약 해제로 인하여 B가 A에 대해 가지는 계약금반환채권'에 압류·추심명령 받아 A에게 송달 → B의 A에 대한 소유권이전등기청구권의 소멸시효기간은 상사 5년, 불확정기한은 사실 발생 불능하게 된 때도 이행기가 도래하므로 B가 A에게 전혀 이행하지 않아 사업계획승인이 이미 불가능한 시점이 기산점 → B의 소이등청구권 소멸시효 완성 후 C의 해제 의사표시가 포함된 압류·추심명령이 A에게 송달되었으므로, B(혹은 B를 대신한 C)는 매매 해제나 원상회복청구 X.",["§544","§167"],0,"계약총론","대판 2019다204593","미분류"],
  ["채권각론_P067","2000다22850, 2008다57746","해제 후 제3자의 의미 — 해제 전 법률관계 가진 제3자는 악의도 보호","해제된 계약으로부터 생긴 법률효과를 기초로 해제 전에 권리를 취득한 제3자의 보호 범위","'해제된 계약으로부터 생긴 법률효과를 기초로 해제 전에 새로운 이해관계 가지고 등기·인도 등 완전한 권리 취득한 자'가 제3자임 [2000다22850]. 일방이 계약 해제한 경우 해제 전에 해제와 양립되지 않는 법률관계 가진 제3자에 대하여는 해제에 따른 법률효과 주장 X → 이는 제3자가 해제 전에 계약 해제될 가능성을 알았거나 알 수 있었어도 마찬가지 [2008다57746].",["§548"],0,"계약총론","대판 2000다22850, 2008다57746","미분류"],
  ["채권각론_P068","2003다12717, 2007다38908","대항력 갖춘 임차인은 해제 제3자 보호 대상 O","주택 매매계약 해제로 소유권을 상실한 임대인으로부터 해제 전에 주택을 임차받아 대항력을 갖춘 임차인, 또는 미등기 매수인으로부터 임차하여 대항력을 갖춘 임차인의 보호","[2003다12717] 주택 매매계약 해제로 소유권 상실한 임대인으로부터 해제 전에 주택 임차받아 인도·주민등록을 마쳐 대항력 갖춘 임차인은 548조 1항 단서 제3자 O → 해제로 소유권 회복한 제3자는 주임법 3조 4항에 의해 임대인 지위 승계 O.\n\n[2007다38908] 주택의 소유자가 아니더라도 적법한 임대권한 있으면 주임법상의 임대차 O → '주택 인도받은 미등기 매수인은 사용·수익할 수 있는 지위에서 적법하게 임대할 수 O' → 이러한 매수인으로부터 해제 전에 주택 임차하고 인도·주민등록 마쳐 주임법 3조 1항 대항요건 갖춘 임차인은 548조 1항 단서 제3자 O → 매매계약 해제되어도 매도인에 대하여 임차권으로 대항 O.",["§548"],0,"계약총론","대판 2003다12717, 2007다38908","미분류"],
  ["채권각론_P069","84다카130, 2005다6341","해제 후 이해관계 가진 제3자도 선의 요함 — 악의 입증책임은 해제 주장 자가 부담","해제 후에도 원상회복등기가 이뤄지기 전에 양립되지 않는 법률관계를 가진 제3자의 보호","'선의' 제3자는 548조 1항 단서 O, 제3자 악의는 계약해제 주장하는 자가 입증책임.\n\n正辯: 해제 후 이해관계 가진 제3자나 사기 취소 후 이해관계 가진 제3자에 대하여 우리 판례는 공히 제3자 보호 규정에 포함시키고 있는바, 이 경우 모두 해제·취소 사실에 대한 '선의'를 요구함으로써 특히 해제의 경우는 원래 선악의를 불문하는 점과 차이가 있다는 점, 이 경우에도 해제의 제3자는 등기·인도 등 완전한 권리를 갖춰야 한다는 점, 이러한 제3자 확대 법리는 합의해제에서도 명시적으로 인정되었다는 점[2005다6341] 등을 숙지해야 함.",["§548"],0,"계약총론","대판 84다카130, 2005다6341","미분류"],
  ["채권각론_P070","98다17930, 2003다29456","채권 가압류 후 발생원인 계약의 합의해제·법정해지 가능","수급인 보수채권에 대한 압류 있어도 도급계약 해지 가능한지 여부 및 채권 가압류 후 계약 합의해제 가능 여부","[98다17930] '채권 가압류는 제3채무자의 채권 지급·소멸·감소 행위로 채권자에게 대항 X, 그러나 채권 발생원인인 법률관계에 대한 처분까지 구속 X' → 아무런 합리적 이유 없이 채권 소멸만을 목적으로 합의해제하는 특별한 경우를 제외하고는, 채권의 발생원인인 법률관계를 합의해제 O, 가압류채권 소멸된 사유로 가압류채권자에게 대항 O.\n\n[2003다29456] [요사] 수급인 보수채권에 대한 압류 있어도 압류채권의 발생원인인 도급계약에 대한 처분까지 구속 X, 채무자·제3채무자는 도급계약 해지 O → 보수채권도 소멸, 이를 대상으로 한 압류명령도 실효 → 도급계약 해지 전에 보수채권에 전부명령 있고 확정되었어도 해지 전에 발생한 보수채권에만 미칠 뿐 해지 이후 제3채무자와 제3자 사이 새로 체결된 공사계약의 보수채권에는 효력 X.\n\n正辯: 대법원은 계약상 채권에 대한 압류·가압류 있은 후 그 채권의 발생원인인 계약에 대하여 당사자의 해제권, 즉 계약 자체에 대한 처분은 구속되지 않고, 특히 법정해제·합의해제를 불문하고 가압류·압류가 실효된다는 입장임. 다만 '해지'의 경우에는 장래효이므로 이미 발생한 계약상 채권에 대한 전부명령의 효력은 유지된다고 보고 있음(私見).",["§548"],0,"계약총론","대판 98다17930, 2003다29456","미분류"],
  ["채권각론_P071","2008다94714","명의신탁 수탁자의 매매계약 해제 시 원상회복청구 가능","실명법상 무효인 명의신탁약정으로 소보등 마친 수탁자가 제3자와 체결한 매매계약이 해제된 경우","실명법상 무효인 명의신탁약정으로 소보등 마친 수탁자가 제3자와 체결한 매매계약 유효 → 매매계약 해제되면 수탁자는 매수인에 대해 원상회복청구 O ∵ 매도인에게 목적물의 소유권 기타 처분권한 없더라도 매매계약 유효.",["§548"],0,"계약총론","대판 2008다94714","미분류"],
  ["채권각론_P072","2013다14675","원상회복 원물반환 불가 시 가액배상 — 처분 당시 시가 상당액","매도인으로부터 목적물 소유권 이전받은 매수인이 매도인의 해제 전 제3자에게 목적물을 처분하여 원물반환이 불가한 경우","원상회복 원물반환 불가하면 '가액배상' → 처분 당시 목적물의 (대가 또는) 시가 상당액과 처분으로 얻은 이익의 이득일부터의 법정이자 가산한 금액.\n\n正辯: 판례는 처분 당시 목적물의 '시가'를 기준으로 하되 통상 '대가'는 시가와 같은 것이라는 판단 하에 대가를 기준으로 한 것으로 보임(私見). 원심은 최초 매매계약 매수인의 등기 시점(매도인의 처분 당시)을 기준으로 시가를 계산하였다가 파기되었음.",["§548"],0,"계약총론","대판 2013다14675","미분류"],
  ["채권각론_P073","2000다9123, 2023다289720","해제 원상회복 금전 이자 — 법정이율 5%, 소촉법 이율 적용 X","해제 원상회복으로 반환할 금전에 대한 이자율 및 소송촉진법 이율 적용 여부","[2000다9123] 부당이득반환 성질을 가지고 이행지체책임이 아니므로 쌍방 동시이행 관계 상관없이 연 5% 법정이자 가산하여야. 이는 '약정해제권' 행사의 경우도 마찬가지.\n\n[2023다289720] 548조 2항 가산 이자에 소송촉진법 이율 적용 X ∵ 위 규정의 이자는 원상회복의무로서 일종의 부당이득반환이고, 이행지체 손해배상 아니므로.",["§548"],0,"계약총론","대판 2000다9123, 2023다289720","미분류"],
  ["채권각론_P074","2011다50509","해제 원상회복 이자율과 지연손해금률의 관계","해제 원상회복 금전의 548조 2항 이자 약정이 없는 경우 이율 및 이행지체 후 지연손해금률","해제 원상회복 금전의 548조 2항 이자는 약정 있으면 약정이율, 약정 없으면 민사·상사 법정이율 → 원상회복의무가 이행지체 빠진 이후 기간은 지연손해금 → ① 가산 이자 약정이율 있으면 지연손해금에도 약정이율 적용하되, 그것이 법정이율보다 낮으면 법정이율 지연손해금으로 ∵ 이자 면제 약정 있어도 지연손해는 법정이율 적용되므로, ② 지연손해금률에 당사자 별도 약정 있으면 그에 따르고, 이때는 그것이 법정이율보다 낮더라도 적용.\n\n正辯: 이러한 법리는 일반 소비대차의 이자, 지연손해금에도 동일하게 적용됨.",["§548"],0,"계약총론","대판 2011다50509","미분류"],
  ["채권각론_P075","2009다18526","미등기전매에서 가처분등기 후 계약 해제 — 원상회복의무 동시이행 관계 부정","미등기전매에서 C의 처분금지가처분등기가 마쳐진 후 매도인 A와 매수인 B 사이 매매계약이 해제된 경우 원상회복의무의 동시이행 관계","원상회복의무인 매도인의 대금반환의무와 매수인의 가처분등기말소의무는 동시이행 X ∵ 가처분등기말소는 매수인의 원상회복의무 X, 가처분등기가 매도인의 이행 X, 매도인만이 가처분이의 등 신청권자.",["§548","§549"],0,"계약총론","대판 2009다18526","미분류"],
  ["채권각론_P076","2002다2539","계약해제와 아울러 손해배상 청구 시 신뢰이익 배상 가부 및 범위","채무불이행 이유로 계약해제와 아울러 손해배상 청구할 경우 이행이익과 신뢰이익 중 어느 것을 청구할 수 있는지","채무불이행 이유로 계약해제와 아울러 손해배상 청구할 경우 계약이행으로 인하여 채권자가 얻을 이익(=이행이익)의 배상 구함이 원칙. 그러나 그에 갈음하여 그 계약이 이행되리라 믿고 채권자가 지출한 비용(=신뢰이익)의 배상 구할 수도 O → 신뢰이익 중 통상의 지출 비용은 통상손해, 초과하여 지출된 비용은 특별손해로 상대방이 알았거나 알 수 있었을 경우만 배상. 신뢰이익은 이행이익 범위 초과 X.\n\n正辯: 92년에는 신뢰이익을 모두 특별손해로 보는 판시를 하였으나 전원합의체 변경 없이 판례가 신뢰이익도 통상손해와 특별손해를 나누어 보는 것으로 변화하였음.",["§551"],0,"계약총론","대판 2002다2539","미분류"],
  ["채권각론_P077","2020다285048, 2017다220416","합의해제·합의해지의 효력 — 채무불이행 손해배상 청구 불가, 특약 유보 시 가능","계약이 합의해제·합의해지된 경우 원래 계약의 위약금·손해배상약정이 적용되는지","계약이 합의해제·합의해지된 경우 채무불이행 손해배상 X → 손해배상하기로 특약했거나 의사표시 유보했다면 이를 주장하는 자가 증명하여 손해배상청구 O → 특약 등의 여부는 합의해제·해지 당시 기준으로 판단해야, 원래의 계약에 있는 위약금·손해배상약정은 특별한 사정 없는 한 합의해제·해지에 적용 X.\n\n正辯(2020다285048): 피트니스센터 위탁운영계약에서 '입주자대표회의는 갑회사의 계약위반 없이 계약 해지될 경우 갑회사의 투자금·손해배상금 변상해야' 조항 → 입주자대표회의가 갑회사에 위탁계약 해지 통보, 갑회사 동의(합의해지) → 합의해지의 경우에도 입주자대표회의는 갑회사에 약정금 지급해야 ∵ 조항이 '채무불이행 이유 해지'로 한정하지 X, 계약기간 만료 전에 해지되면 갑회사는 막대한 경제적 손실 발생.",["§551","§548"],0,"계약총론","대판 2020다285048, 2017다220416","미분류"],
  ["채권각론_P078","2002다73203","상속재산 분할협의의 합의해제와 제3자 보호","상속재산 분할협의가 합의해제된 경우 물권의 복귀 및 제3자 보호","상속재산 분할협의가 합의해제 되면 분할협의의 이행으로 변동된 물권은 당연히 분할협의의 없었던 원상태로 복귀하나, 548조 1항 단서 규정상 이 합의해제를 가지고 해제 전 분할협의로부터 생긴 법률효과를 기초로 새로운 이해관계 가져 등기·인도 등 완전한 권리 취득한 제3자의 권리 해하지 못함.\n\n正辯: 상속재산분할협의의 후 당사자들이 정지조건을 합의로 추가했는데 정지조건이 불성취 되어 분할협의가 실효된 상황을 실질적 합의해제로 본 사안(판결이유 中).",["§548"],0,"계약총론","대판 2002다73203","미분류"],
  ["채권각론_P079","2015다59115","약정해제권 행사 시 손해배상청구에도 귀책사유 필요","채무불이행·귀책사유와 무관한 사유로 '약정해제권'을 행사하는 경우 손해배상청구 가부","법정해제 하면서 551조 손해배상 청구하면 귀책사유 요하고, 약정해제의 경우도 채무불이행·귀책사유와 무관한 사유로 '약정해제권'을 행사하는 경우라 하여도, 손해배상청구는 귀책사유 있어야 ∵ 자기책임의 원칙 → 귀책사유 상관없이 손해배상청구 인정되려면 특별한 사정 있어야.",["§551","§565"],0,"계약총론","대판 2015다59115","미분류"],
  ["채권각론_P080","2013다14972, 2025다216444","약정해제사유의 해석 — 문언 객관적 의미 명확하면 문언대로","처분문서 서면으로 약정해제 사유를 작성한 경우 해석 기준","계약에서 해제·해지사유 약정한 경우 해제 가부·효력은 약정으로 결정 → 일반적 내용 아닌 그 계약 특유의 해제사유 명시했고 쌍방이 아닌 일방의 채무이행에만 관련된 것이거나 최고 무의미한 해제사유 있다면 해석에 있어 고려해야. 처분문서 서면으로 약정해제 사유 작성한 경우, 문언 객관적 의미 명확하면 특별한 사정이 없는 한 문언대로 해석하고, 그와 달리 해석함으로써 당사자 사이 법률관계에 중대한 영향 초래하게 되면 문언 더욱 엄격히 해석해야.\n\n正辯(2025다216444): 오피스텔 분양계약에 '매도인의 귀책사유로 건축물분양법 9조 시정명령 받은 경우' 매수인이 해제할 수 있다는 해제조항 → 시정명령 받게 된 위반사항의 경중과 상관없이 시정명령만 받으면 바로 해제할 수 있다는 의미임이 문언상 객관적 명확함.",["§543","§565"],0,"계약총론","대판 2013다14972, 2025다216444","미분류"],
  ["채권각론_P081","2017다207475","망은행위 556조 1항 1호 범죄행위의 의미 — 형사처벌 받을 필요 없음","알츠하이머 증여자를 위해 건물을 관리하던 수증자가 사문서위조죄로 유죄 선고를 받았다가 무죄 확정된 사안에서 556조 1항 1호 범죄행위 해당 여부","556조 1항 1호의 '범죄행위'는 수증자가 감사의 마음을 가져야 함에도 증여자가 배은망덕하다고 느낄 정도로 둘 사이 신뢰관계 중대하게 침해하여 증여 효과 유지함이 사회통념상 허용되지 않을 정도의 범죄 의미 → 범죄행위의 동기·경위, 피해 정도, 침해 법익 유형, 친밀도 등 종합적 고려해야 → 범죄행위로 수증자가 반드시 형사처벌 받을 필요는 X.\n\n正辯: 증여한 건물을 생전에 계속 관리하기로 한 증여자가 알츠하이머병에 걸려 수증자가 이를 대신 관리하기 위해 동업해지계약서 작성·제출함으로써 사문서위조 및 행사죄로 유죄판결 선고되었다가 무죄판결 확정 → 수증자가 건물 관리하면서 임대수입의 상당 부분을 건물 관리나 증여자 위해 사용 → 556조 1항 1호 범죄행위로 해제 X.",["§556"],0,"계약총론","대판 2017다207475","미분류"],
  ["채권각론_P082","77다834, 2009다37831","부동산 증여에서 '이미 이행'의 의미 — 등기까지 마쳐야 이행 O","부동산 증여에서 인도만 마쳤거나 원인무효 등기가 마쳐진 경우 558조 '이미 이행' 해당 여부","[77다834] 부동산은 등기를 마쳐야 증여의 '이미 이행' O → 부동산 증여에서 인도만으로는 부족하고 소유권이전등기까지 마쳐야 이행 O ∵ 물권변동 형식주의.\n\n[2009다37831] 증여자 의사에 기하지 않은 원인무효 등기 마쳤다면 '이행' X → 증여자가 비서면 증여로 해제할 경우 수증자는 실체관계 부합 주장 X.\n\n正辯: 부동산 증여에서 등기 없이 인도만 마친 상태 혹은 원인무효 등기가 마쳐진 상태에서 비서면 증여로 해제했다면 증여자는 원상회복청구 O.",["§555","§558"],0,"계약총론","대판 77다834, 2009다37831","미분류"],
  ["채권각론_P083","2021다299976","부담부증여에서 수증자가 부담 이행 완료한 경우 비서면 해제 제한","부담부증여에서 증여자가 증여를 미이행했더라도 수증자가 부담을 이행 완료한 경우 비서면 해제 가부","561조는 부담부증여에 '본절 규정 외에' 쌍무계약 규정 적용 → 부담부증여도 비서면이라면 각 당사자 555조 해제 O → 그러나 증여자가 증여 미이행이더라도 수증자가 부담 이행 완료했다면, 실질적으로 부담 없는 증여라는 등 특별한 사정 없는 한, 각 당사자는 비서면 해제 X ∵ 부담부증여는 쌍무계약 준용되고(561조) 부담 한도 담보책임 등 부담 없는 증여와 구별, 555조 비서면 해제에 적용되는 558조 '이미 이행한 부분'에 이행한 부담도 포함되므로 부담 이행했는데 555조로 해제하면 증여자가 부담 이행 이익만 보유하여 부당.",["§555","§558","§561"],0,"계약총론","대판 2021다299976","미분류"],
  ["채권각론_P084","96다47494","매매예약완결권의 제척기간 기산점 — 예약성립일로부터 10년","매매예약에서 기간을 정하지 않은 경우 예약완결권의 제척기간 기산점","계약에서 기간을 정하지 않은 경우는 '예약 성립시로부터 10년'의 제척기간에 걸리고, 그 행사의 '시기'를 따로 정하거나 목적물을 인도받은 경우에도 '예약성립일'로부터 10년.",["§564"],0,"매매","대판 96다47494","미분류"],
  ["채권각론_P085","2010다82530","공동매수인의 매매예약완결권 — 공동 vs 독립 보유 [大判全合]","수인의 채권자가 채권 담보하려고 공동매수인으로 1개 매매예약을 한 경우 매매예약완결권의 공동·독립 보유 여부","매매예약완결권을 공동으로 가지는지 독립적으로 가지는지는 매매예약 내용에 따르고, 명시되지 않았다면 매매예약의 체결 동기·경위·목적, 구체적인 지분권 표시 여부, 지분권 비율과 피담보채권 비율 일치여부 등으로 종합적 고려하여 판단.\n\n正辯: 과거의 판례는 언제나 필수적 공동소송으로 보았으나, 가등기 지분권 비율과 피담보채권 비율이 일치하는 등 독립성 있는 사안에서는 필수적 공동소송 부정함(통공).",["§564"],0,"매매","대판 2010다82530 [大判全合]","미분류"],
  ["채권각론_P086","2007다73611","계약금 일부 지급 시 565조 해약금해제 불가 — 계약금계약 미성립","계약금 일부만 지급하고 잔액을 나중에 지급하기로 약정한 경우 계약금계약의 성립 여부 및 해약금해제 가부","단지 '계약금을 지급하기로 약정만 한 단계'에서는 아직 계약금의 효력 X, 565조 해제 권리 X → 당사자가 계약금 일부만 지급하고 잔액은 나중에 지급하기로 약정한 경우, 나머지 계약금 잔금을 지급하지 않으면 상대방은 계약금 지급의무 이행청구 O, 채무불이행 이유로 계약금약정 해제 O(만일 계약금약정 없었다면 주계약 체결하지 않았을 사정 있으면 주계약도 해제 O), 그러나 계약금 잔금을 지급하지 않는 한 계약금계약 성립 X, 임의로 주계약 해제 X.",["§565"],0,"매매","대판 2007다73611","미분류"],
  ["채권각론_P087","2014다231378","계약금 일부만 지급된 경우 해약금 기준 금원은 약정 계약금","계약금 일부만 지급된 경우 매도인이 해약금 해제를 하려면 반환해야 할 금원의 기준","계약금 일부만 지급된 경우 매도인의 주장과 같이 수령자가 매매계약을 해제할 수 있다고 하더라도 그 해약금의 기준 금원은 '실제 교부받은 계약금'이 아니라 '약정 계약금'이라고 보아야 ∵ 당사자의 계약금 금액 결정 의사 反, 교부된 금액이 소액이면 계약 구속력 약함.\n\n正辯: 위 판결은 '계약금 일부만 지급받아도 해약금 해제가 되는지'에 관하여 2007다73611 판결을 용하여 일단 부정하고, 다만 '매도인의 주장처럼 해제할 수 있다고 하더라도' 기준 금원은 실제 교부받은 계약금이 아니라 약정 계약금이라고 판시한 것에 비추어, ① 기본적으로는 계약금 일부만 받은 단계에서는 계약금계약이 성립하지 않아 매도인이 해약금 해제를 할 수 없다고 새기고(이에 반하는 다른 하급심은 있으나 대법원에서 인정한 적은 없음), ② 만에 하나 해약금 해제가 가능함을 '전제'로 그 상태에서 매도인이 해약금 해제 하려면 얼마를 반환해야 하는지 묻는다면, 수령한 계약금에 약정 계약금을 합한 금액으로 답할 수밖에 없음(위 별개 하급심의 결론이나, 대법원의 명확한 판시가 있기 전까지는 '전제'가 틀렸다는 것이 私見).",["§565"],0,"매매","대판 2014다231378","미분류"],
  ["채권각론_P088","2022다247187","가계약금의 해약금 약정 인정 요건","가계약금에 관하여 해약금 약정이 있었다고 인정하기 위한 기준","가계약금에 관하여 해약금 약정 있었다고 인정하려면 제반사정에 비추어 정식으로 계약을 체결하기 전까지 교부자는 포기, 수령자는 배액 상환하여 계약 체결하지 않기로 약정하였음이 명백하게 인정되어야.",["§565"],0,"매매","대판 2022다247187","미분류"],
  ["채권각론_P089","99다62074, 2007다72274","해약금해제 요건 — 일방의 이행착수 의미","매수인이 중도금 지급한 이후 양 당사자의 해약금해제 가부 및 이행착수의 의미","[99다62074] '일방'은 상대방에만 국한 X → 매수인이 중도금 지급한 이후는 매도인뿐 아니라 매수인도 해약금해제 X.\n\n[2007다72274] '이행의 착수'는 '객관적으로 외부에서 인식할 수 있는 정도로 채무의 이행행위의 일부를 하거나 이행을 위해 필요한 전제행위를 하는 경우 O, 단순히 이행의 준비만으로는 부족', 계약 내용에 들어맞는 이행제공 정도는 불필요 → 이행 최고하고 소송 제기한 것은 '이행착수' X.",["§565"],0,"매매","대판 99다62074, 2007다72274","미분류"],
  ["채권각론_P090","2004다11599, 92다31323, 2022다256624","이행기 전 이행착수와 해약금해제 — 특별한 사정이 있는 경우 예외","이행기 전 이행에 착수한 경우 해약금해제 가부 및 매도인이 해약금 수령 최고를 한 경우의 예외","[2004다11599] 이행기 전 착수 금지 특약 없는 이상, 이행기 전 이행에 착수 O → 이행기 전 이행 착수 있어도 해약금해제 X.\n\n[92다31323] 매도인이 565조 해제한다며 일정 기한까지 해약금 수령 최고하며 기한 넘기면 공탁하겠다고 통지한 경우는, 중도금은 매도인에게도 기한의 이익 有 → 매수인이 이행기 전 착수할 수 없는 특별한 사정이 있으므로, 매수인이 이행기 전에, 더욱이 매도인이 정한 해약금 수령기한 이전에 일방적으로 이행에 착수했어도 매도인은 해약금해제 행사 O.\n\n[2022다256624] 부동산 매매에서 통상 중도금·잔금 지급기일은 계약금에 의한 해제권 유보 기간 의미 → 매매대금 이행기가 매도인을 위해서도 기한의 이익을 부여한 경우는 채무자가 이행기 전에 이행 착수할 수 없는 특별한 사정 O.\n\n正辯: 매매대금 4억 원의 아파트 분양권 매매계약에서 계약 당일 계약금 2,000만원 지급하고 약 2개월 뒤 잔금 지급하되 협의로 앞당길 수 있도록 약정 → 매수인이 계약일로부터 불과 6일 후 아무런 고지도 없이 2,000만원(잔금의 약 5%)을 거래 명목을 '축 생신'으로 기재하여 일방적 송금 → 매도인이 송금 사실 알고 여러 차례 반환 요청하다가 약 한 달 뒤 6,000만원(수령한 계약금 2,000만원의 2배와 기일 전 송금한 2,000만원)을 공탁하며 해제 의사표시 → 해약금 해제 O.",["§565"],0,"매매","대판 2004다11599, 92다31323, 2022다256624","미분류"],
  ["채권각론_P091","2023다227500","매매목적물·대금 미특정 시 매매계약 성립","매매에서 매매목적물과 대금이 계약체결 당시 구체적으로 특정되지 않은 경우 매매계약 성립 여부","매매에서 매매목적물과 대금은 반드시 계약체결 당시에 구체적 특정할 필요 없고 사후에라도 구체적 특정할 방법·기준 정해져 있으면 충분 → 매매대금액수를 일정기간 후 시가에 의해 정하기로 한 사유만으로 매매예약으로 단정 X → 이행시기·이행장소·담보책임 등 합의 없었더라도 매매계약 성립 O.",["§568"],0,"매매","대판 2023다227500","미분류"],
  ["채권각론_P092","96다6554, 96다15596","대금지급거절권 범위 — 근저당권 미말소, 가등기 후 일부 지분 이전 불능","매도인이 목적물의 근저당권을 말소 못한 경우 및 매도인이 제3자에게 일부 지분 이전 후 불능이 된 경우","[96다6554] 매도인이 목적물의 근저당권을 말소 못했다면 매수인은 그 위험의 한도에서 대금지급 거절 O → 매수인이 인도받았더라도 인도일 이후 대금 이자 지급 의무 X(587조 단서) → 거절할 대금은 근저당권 채권최고액, 그러나 매수인이 안다면 확인된 피담보채무액에 한정.\n\n[96다15596] 매도인이 매수인에게 청구권보전 가등기만 해준 것은 전부이행 X → 본등기 전에 매도인이 제3자에게 일부 지분 소유권이전등기 했다면, 설령 매수인이 스스로 과실로 가등기 말소하여 제3자에게 이전된 지분은 이전이 불능해졌더라도, 매도인은 소유권이전의무 다하지 못한 것 → 매수인은 572조 대금감액청구 O.\n\n正辯: 오로지 매수인 귀책사유로 불능이 되어 담보책임 물을 수 없는 [79다564] 판결과 비교할 것.",["§588","§587","§572"],0,"매매","대판 96다6554, 96다15596","미분류"],
  ["채권각론_P093","91다32527, 2004다8210, 93다28928","과실의 귀속 — 미인도·미완납 시 매도인 귀속, 대금 완납 후 매수인 귀속","미인도·미완납 상황에서의 과실 귀속 및 대금 완납 후 미인도 목적물의 과실 귀속","[91다32527] 인도받지 않은 매수인이 소유권이전등기를 마쳤어도 매수인이 대금을 '완납'하지 않은 이상 과실은 매도인 귀속.\n\n[2004다8210] 미인도 및 미완납이라면 매도인 인도의무 이행지체 있더라도 매수인은 손해배상청구 X ∵ '과실'은 매도인 귀속되어야. [80다211] 마찬가지로 매수인 대금 지체하여도 매도인은 손해배상청구 X.\n\n[93다28928] 인도하지 않았으나 매수인이 매매대금 완납했다면 그 이후 목적물 '과실'은 매수인 귀속 (매수인 미등기여도).",["§587"],0,"매매","대판 91다32527, 2004다8210, 93다28928","미분류"],
  ["채권각론_P094","93다37328, 2017다202050","매도인의 담보책임과 채무불이행책임의 경합","타인권리 매매에서 이행불능 및 특정물 매매에서 불완전이행 시 담보책임과 채무불이행책임 경합 여부","[93다37328] 타인 권리 매매에서 매도인의 권리이전의무가 매도인 귀책사유로 불능이 되었다면 (악의) 매수인이 매도인 담보책임으로 손해배상청구 못해도(570조 단서) 채무불이행 일반 규정(546조, 390조)으로 해제 O, 손해배상 O.\n\n[2017다202050] 매매 목적물에 하자 있으면 매수인의 하자담보책임과 채무불이행책임은 별개 권원 경합적 인정 O → 하자 보수 비용이 하자담보책임·채무불이행책임에서의 '손해' → 폐기물처리비용에 대해 매수인은 390조 채무불이행 혹은 580조 1항 하자담보책임으로 손해배상 청구 O.\n\n正辯: 판례는 타인 권리 매매에서 이행불능과, 특정물 매매에서 불완전이행과 각 경합 인정함.",["§570","§580","§390","§546"],0,"매매","대판 93다37328, 2017다202050","미분류"],
  ["채권각론_P095","66다2618 [大判全合]","타인 권리 매매에서 손해배상액 — 불능 당시 시가 기준 이행이익 배상","타인 권리 매매에서 권리이전할 수 없게 된 때 매도인의 선의 매수인에 대한 손해배상 범위","타인 권리 매매에서 권리이전할 수 없게 된 때 매도인은 선의의 매수인에게 '불능 당시 시가를 표준으로 그 계약이 완전히 이행된 것과 동일한 경제적 이익을 배상할 의무' 있음.\n\n正辯: 판례에 따르면 가령 타인 소유 부동산을 서류 위조로 등기 마친 뒤 매도한 경우, 매수인은 매도인에 대하여 타인권리 매매 담보책임 및 이행불능책임을 모두 물을 수 있고, 그 손해배상액은 모두 이행이익, 즉 불능 당시의 시가 상당액을 표준으로 산정할 것임.",["§570"],0,"매매","대판 66다2618 [大判全合]","미분류"],
  ["채권각론_P096","73다1442, 2016다240","타인 권리 매매 담보책임 해제의 원상회복 범위","타인 권리 매매에서 매수인이 담보책임으로 해제한 경우 원상회복의무 범위","[73다1442] 타인 권리 매매에서 매수인의 해제권은 일종의 법정해제권, 행사 효과로서 발생하는 원상회복의무 범위는 548조 2항 O.\n\n[2016다240] 타인 권리 매매에서 매수인이 담보책임으로 해제한 경우 일반적 해제와 같아서 매도인은 매매대금 및 받은 날부터의 이자를, 매수인은 목적물 및 사용이익을 반환할 의무 O → 매도인이 사용이익을 다시 권리자에게 반환할 입장이라 해도 마찬가지 → 다만, 매수인이 진정한 권리자에게 직접 목적물 또는 사용이익을 반환하는 등의 특별한 사정이 있다면 그 한도에서 매도인에게 반환할 의무 X.",["§570","§548"],0,"매매","대판 73다1442, 2016다240","미분류"],
  ["채권각론_P097","2011다10266","하자담보책임 제척기간 경과하지 않아도 소멸시효 완성으로 청구 불가","특정물 하자담보책임에서 제척기간(6월)이 경과하지 않았어도 소멸시효(10년)가 완성된 경우","담보책임에 제척기간 규정 있어도 소멸시효 규정 역시 적용 O (배제 X) → 특정물 하자담보책임으로서 매수인이 하자 안 날로부터 6월이 경과하지 않았어도 매수인이 인도받은 날로부터 10년이 경과했으면 소멸시효 완성되어 결국 청구 X.\n\n正辯: A, B, C 순차매매 있고 C가 토지 지하 매립된 폐기물의 처리비용을 B에게 청구하여 B가 손해배상을 해줌 → B가 A를 상대로 하자담보책임 손해배상(자신이 C에게 지급한 배상금)을 청구 → B가 A로부터 인도받았을 것으로 보이는 소유권이전등기일로부터 10년 경과 후 소를 제기하여 소멸시효 완성.",["§580"],0,"매매","대판 2011다10266","미분류"],
  ["채권각론_P098","2021다220666","공유 권리의 매매 — 569조 적용, 매매계약 유효","매매목적 된 권리가 매도인과 타인의 공유인 경우 매매계약 성립 및 569조 적용 여부","매매목적 된 권리가 매도인과 타인의 공유라 해도 매매계약 체결 O, 569조 적용 O → 매매목적물을 매도인 단독소유로 볼 수 없는 상가건물의 특정 부분으로 정했어도 마찬가지.\n\n正辯: 상가집합건물의 구분점포 매매는 원칙적으로 실제 이용현황과 관계없이 집합건축물대장 등 공부에 따라 구조·위치·면적 확정된 구분점포가 매매 대상 → 그러나 상가집합건물 점포들이 구분소유 등기 되어있더라도 공부상 호수·구조·위치·면적이 실제 이용현황과 일치하지 않고 복원조차 쉽지 않아 공부가 단지 점포 면적비율의 공유지분 표시 역할만 하고 있고 전전매도 되면서 매매 당사자들이 실제 이용현황대로의 점포 매매할 의사 가지고 거래하는 등 특별한 사정 있다면 점포의 구조·위치·면적은 실제 이용현황에 의해 확정됨.",["§569","§570"],0,"매매","대판 2021다220666","미분류"],
  ["채권각론_P099","79다564","오직 매수인의 귀책사유로 이전불능 — 매도인 담보책임 X, 538조 청구 가능","B가 A로부터 대물변제 받은 건물을 C에게 매각하면서 등기서류 교부했는데 C가 등기를 미루다가 A의 채권자가 강제집행하여 C가 건물 취득하지 못한 사안","타인 권리의 이전불능이 오직 '매수인'의 귀책사유에 의한 경우는 매도인이 타인권리매매 담보책임 X.\n\n正辯: 이 경우 매도인 B는 오로지 채권자인 매수인 C의 귀책사유로 후발적 불능이 되었음을 들어 538조에 따라 C에 대해 매매대금 청구 가능할 것임.",["§570","§538"],0,"매매","대판 79다564","미분류"],
  ["채권각론_P100","80다3122, 94다23920","전부 타인권리 매매 손해배상액 — 패소확정 시 시가, 과실상계 유추 적용","원소유자가 매도인 상대로 소유권이전등기 말소소송이 매도인 패소로 확정된 경우 손해배상액 산정 기준 및 하자담보책임에서 과실상계 준용 여부","[80다3122] 원소유자가 매도인 상대로 제기한 소유권이전등기 말소등기소송이 매도인의 패소로 확정된 경우, 매도인의 선의의 매수인에 대한 담보책임의 손해배상액은 패소 확정시의 목적물 시가를 표준으로 산정 → 이행이익.\n\n[94다23920] 580·581조 소정 매도인 하자담보책임은 법정의 무과실책임으로서 396조 과실상계 규정이 준용될 수는 없다 하더라도, 담보책임의 공평의 원칙상 하자의 발생·확대에 가공한 매수인의 잘못을 참작하여 손해배상 정함이 상당.",["§570","§580"],0,"매매","대판 80다3122, 94다23920","미분류"],
  ["채권각론_P101","2002다11151","근저당권 피담보채무 이행인수와 576조 담보책임 면제·포기","매수인이 매매목적물에 관한 근저당권 피담보채무의 인수로 매매대금 지급에 갈음하는 약정을 한 경우 576조 담보책임 성립 여부","매수인이 매매목적물에 관한 근저당권 피담보채무의 인수로 매매대금 지급에 갈음하는 약정을 한 경우(=이행인수)에는 매수인이 매도인에 대하여 576조 1항 담보책임을 '면제'해주었거나 '포기'한 것 O, 576조 담보책임 X.",["§576"],0,"매매","대판 2002다11151","미분류"],
  ["채권각론_P102","92다21784, 2011다1941, 95다55245","가등기·가압류로 소유권 상실 시 576조 준용 및 출재 상환청구권","가등기·가압류 목적이 된 부동산의 매수인이 소유권 상실한 경우 및 저당권 소멸시켜 소유권 보존한 경우의 담보책임","[92다21784, 2011다1941] '가등기' 혹은 '가압류' 목적이 된 부동산의 매수인이 그 후 가등기에 기하여 본등기가 마쳐짐으로써 혹은 가압류에 기한 강제집행으로 인하여 소유권 상실하면 576조 준용 O, 570조 X ∵ 저당권·전세권 행사 유사.\n\n[95다55245] 부동산 매수인이 소유권 보존 위해 출재로 피담보채권 변제함으로써 저당권 소멸시킨 경우, 매수인이 매수 당시에 저당권 설정 여부 선악의 불문하고 576조 2항으로 '매도인'에 대해 출재 상환 청구 O.\n\n正辯: [95다55245] 판결은 [72다982] 판결과 마찬가지로 '미등기 전매'를 타인 권리 매매가 아니라고 판시하였는데, 주류적 판례는 미등기 전매를 타인 권리 매매로 보고 있음. 순차매도에서 C가 A의 채무를 변제한 경우 576조 2항의 상환청구권은 채무자가 아닌 매도인 B에 대하여 청구 O → 위 판결은 C에게 576조 2항을 적용하기 위하여 570조 타인 권리 매매가 아니라고 판시(타인 권리 매매로 보더라도 576조 2항을 적용 못할 것이 아니라는 비판 있음).",["§576"],0,"매매","대판 92다21784, 2011다1941, 95다55245","미분류"],
  ["채권각론_P103","2014다80839","578조 '경매'의 범위 — 국가기관에 의한 매도행위에 한정","578조(580조 2항)의 '경매'가 어떤 경매를 의미하는지","경매는 사법상 효력이 매매와 유사하지만 매도인 지위인 채무자 의사와 무관하게 국가기관에 의해 실행되는 특수성이 있고, 578조(580조 2항) '경매'는 민사집행법 강제집행, 담보권 실행 위한 경매, 국세징수법상 공매 등 국가나 대행기관이 권리자 의사와 무관하게 하는 매도행위만 포함.",["§578"],0,"매매","대판 2014다80839","미분류"],
  ["채권각론_P104","87다카2641","578조 1항 채무자에 임의경매에서의 물상보증인 포함 — 물상보증인설","임의경매에서 578조 1항의 채무자에 물상보증인이 포함되는지","578조 1항 '채무자'에는 임의경매에서 물상보증인도 포함 O → 경락인이 담보책임으로 해제권 행사하면 물상보증인은 경락인에 대하여 원상회복의무 부담 → 물상보증인설.",["§578"],0,"매매","대판 87다카2641","미분류"],
  ["채권각론_P105","2002다70075","채무자가 대항력 있는 임차권 존속 고지하지 않은 경우 578조 3항 손해배상 책임","선순위 근저당권 존재로 후순위 임차권 소멸하는 것으로 알고 경락받았으나, 채무자가 선순위 근저당권 변제로 소멸시키고도 경락인에게 고지하지 않은 사안","채무자는 경락인에게 578조 3항의 손해배상 책임 O ∵ 흠결을 알고 불고지한 것, 경락대금지급 기일 이전에 선순위 저당권이 다른 사유로 소멸하면 임차권은 대항력 소멸하지 않음.",["§578"],0,"매매","대판 2002다70075","미분류"],
  ["채권각론_P106","96그64","가등기 부동산 경락 후 가등기 본등기로 소유권 상실 — 578조·576조 유추적용","가등기된 부동산에 대금 완납한 경락인이 그 후 가등기에 기한 본등기로 소유권 상실한 경우","저당권·전세권 실행과 유사하므로 578조, 576조 유추적용 O, 담보책임 추급 O → 배당실시 전이라면 경락인은 민집법 96조 유추적용하여 집행법원에 대하여 경매에 의한 매매계약 해제 O, 경락대금 반환청구 O ∵ 배당 기다렸다가 별소로 담보책임 묻게 함은 가혹.\n\n正辯: 민집법 96조(당시 민소법 613조)는 권리이전이 애초 '불가능'한 경우 경매를 '취소'하는 것이므로 사안에는 유추적용.",["§578","§576"],0,"매매","결정 96그64","미분류"],
  ["채권각론_P107","91다21640, 92다15574, 2003다59259","경매절차 자체가 무효인 경우 578조 담보책임 인정 여지 없음","집행권원인 약속어음공정증서 위조로 무효인 강제경매, 멸실된 건물의 근저당권등기로 새 건물에 진행된 임의경매, 타인 소유 부동산에 대한 강제경매","578조 경매 담보책임은 경매절차는 유효하게 이뤄졌으나 경매 목적 권리의 하자가 있는 경우 인정되는 것이고, 경매절차 자체가 무효인 경우는 담보책임 인정 여지 X.\n\n正辯: 판례는 '타인 소유 부동산 강제경매'의 경매를 무효로 보나, 타인 소유물 '임의경매'를 유효로 전제한 판례들과 모순된다면서 두 경우 모두 578조, 570조를 적용해야 한다는 비판 있음.",["§578"],0,"매매","대판 91다21640, 92다15574, 2003다59259","미분류"],
  ["채권각론_P108","2005다34018","임차권 매매에서 매도인의 채권 담보책임 X — 별도 특약 없는 한","임차권(임대차보증금반환청구권 포함) 매매에서 매도인이 임대인의 의무이행을 담보하는 특약하지 않은 경우 담보책임 여부","임차권 매매에서 매도인이 임대인의 의무이행을 담보하는 특약하지 않은 이상, 임차권 매매계약 당시 임대차 목적물에 설정되어 있던 근저당권의 실행으로 임대인의 사용·수익하게 할 의무가 이행불능으로 되었거나, 임대인 무자력으로 임대차보증금반환의무가 사실상 이행되지 않더라도, 임차권 매도인은 579조, 576조 담보책임 X = 임차권 교환계약.",["§579","§576"],0,"매매","대판 2005다34018","미분류"],
  ["채권각론_P109","98다18506","하자의 의미 — 법률적 제한·장애도 하자, 매매계약 성립시 기준","주택 신축 목적으로 토지 매매계약 체결 이후 매수인 사업계획 변경으로 아파트 건축·분양하기로 함에 따라 허가 부결된 사안","하자란 '매매 목적물이 거래통념상 기대되는 객관적 성질·성능 결여하거나, 당사자가 예정·보증한 성질 결여한 경우'를 말하고, 매매 토지에 건축허가 받을 수 없는 '법률적 제한·장애는 매매목적물의 하자'이며, '하자 존부는 매매계약 성립시를 기준으로 판단하여야'. 매매계약 체결 당시에는 법적 제한 없었으므로 하자 X.",["§580"],0,"매매","대판 98다18506","미분류"],
  ["채권각론_P110","2012다72582, 2003다20190","완전물급부청구권 제한 — 과도한 경우 거절 가능, '안 날'의 의미","[2012다72582] BMW 자동차 운행 5일 만에 계기판 속도계 작동 안 한 경우 신차 교환 요구. [2003다20190] 표고버섯 종균의 비정상적 발아와 하자 인식 시점","[2012다72582] 하자담보의무 이행이 오히려 공평의 원칙 반하면 완전물급부청구권 X → BMW 자동차 운행 5일 만에 계기판 속도계 작동 안 한 경우, 간단한 수리 가능함에도(140만원) 신차 교환 요구 X.\n\n[2003da20190] '안 날'은 하자로 손해배상 결과 발생 안 것만으로 부족, 그 결과가 목적물의 하자로 인한 것, 즉 하자와 손해발생 사이 인과관계도 알아야 → 표고버섯 종균에 하자 존재 사실 알았다고 하려면 종균의 비정상적 발아 사실 안 것으로 부족하고 그 비정상 발아 원인이 종균의 하자로 인한 것임을 알아야.",["§581","§582"],0,"매매","대판 2012다72582, 2003다20190","미분류"],
  ["채권각론_P111","96다39455","내한성 특수 품질 하자 요건 + 확대손해 배상청구에 매도인 귀책사유 필요","매도인이 공급한 부품이 통상의 품질·성능을 갖추고 있는 경우 내한성이라는 특수 품질 결여를 하자로 인정하기 위한 요건 및 확대손해 배상책임 요건","매도인이 공급한 부품이 통상의 품질·성능을 갖추고 있는 경우에 더 나아가 내한성이라는 특수한 품질·성능 결여가 하자로 인정되려면, 매수인이 매도인에게 완제품 사용환경 설명하며 내한성 요구하고 매도인이 명시·묵시적으로 보증했어야 → 특히 목적물 하자로 확대손해 발생했다는 이유로 매도인에게 확대손해 배상책임 물으려면 하자 있다는 의무위반 외에 매도인의 귀책사유 있어야.\n\n正辯: 위 판결은 ① 하자담보책임의 '하자' 개념 요건, ② 확대손해 배상청구 요건(채무자 귀책사유)의 두 가지 쟁점을 실시함. 귀책사유 필요하다는 것은 채무불이행책임으로 물을 수 있다는 의미.",["§580"],0,"매매","대판 96다39455","미분류"],
  ["채권각론_P112","2023다209045","임대차기간을 영구로 정한 약정 유효","임대차기간을 영구로 정한 약정의 효력","임대차기간을 영구로 정한 약정 유효 O ∵ 계약 자유 원칙, 헌법재판소의 651조 위헌결정 이후 619조 단기임대차 외에는 불허 규정 없음, 소유자의 사용·수익 권능 대세적 포기는 불허되나 특정인에 대한 채권적 사용·수익권 포기는 허용. 영구 임대의 취지는 임차인이 차임연체 등 채무불이행 없는 한 유지 원하는 동안 존속 보장 의미 → 임대인에겐 의무, 임차인에겐 권리 → 임차인은 언제든지 권리 포기 O → 포기하면 기간 정함 없는 임대차 O.\n\n正辯: 영구 임대에서 임차인이 영구적 권리 포기하면서 임대인에게 해지를 통지하면 635조 2항 1호에 따라 통지 후 1개월 지나서 종료할 것임(私見).",["§635"],0,"임대차","대판 2023다209045","미분류"],
  ["채권각론_P113","2024다315046","639조 묵시의 갱신 이의 — 묵시적·조건부 이의 가능하나 엄격 판단","임대인이 전 임대차기간 만료 후 차임증액청구권을 행사한 사정만으로 639조 1항 이의를 했다고 볼 수 있는지","639조 1항의 '이의'는 묵시적으로도 O, 차임 증액 관련 조건부로도 O → 다만 임차인 신뢰 보호 취지에 비추어, 묵시적·조건부 이의 있다고 보려면 더 이상 임대차관계 지속하지 않겠다는 임대인의 의사를 객관적 추단할 사정 있어야. 임대인이 전 임대차기간 만료 후 차임증액청구권 행사한 사정만으로 더 이상 임대차관계 지속 않을 의사로 639조 1항 이의를 했다고 볼 수 X ∵ 628조의 차임증액청구권은 오히려 임대차계약 존속을 전제로 하는 권리.\n\n正辯: 임대인의 묵시적 이의 인정할 수 없으므로 결국 임대차는 묵시적 갱신 O(그러나 임차인이나 임대인이 다시 해지통고는 가능할 것).",["§639","§628"],0,"임대차","대판 2024다315046","미분류"],
  ["채권각론_P114","2024다256116","임대인 의무 불이행 시 임차인의 차임 지급 거절권","임대차계약 유효 성립 후 목적물 미인도 상태에서 차임 지급의무 발생 여부, 임대인 의무 불이행 시 차임 지급 거절 가부","임대인은 임차인에게 목적물 인도하여 사용·수익하게 할 의무, 임차인은 이에 대해 차임 지급할 의무(618조, 623조) → 상대방 의무 이행·이행제공 없어도 임대차계약 유효 성립하면 각 의무 발생 O, 목적물 인도 여부 상관없이 차임 지급의무 발생 O → 다만 서로 대응관계로서 임대인 위 의무 불이행하여 목적물 사용·수익에 지장 있으면 임차인은 지장 한도에서 차임 지급 거절 O.",["§618","§623"],0,"임대차","대판 2024다256116","미분류"],
  ["채권각론_P115","94다54641","임대인이 소유권 없어도 임대차 유효 — 제3자 청구 시 이행불능으로 차임 지급 거절","임대인이 임대차 목적물에 대한 소유권 기타 임대할 권한 없는 경우 임대차계약의 효력 및 진실한 소유자의 청구가 있을 때 임차인의 차임 지급 거절 가부","임대인이 임대차 목적물에 대한 소유권 기타 임대할 권한 없더라도 임대차계약은 유효. 임대인의 임차인에 대한 목적물 완전한 사용·수익케 할 의무가 불능되지 않는 한 임차인은 여전히 임대인에게 차임 지급 의무 有 → 그러나 임차인이 진실한 소유자로부터 목적물 반환청구나 차임 기타 해당액 지급요구 받는 경우는 임대인이 임차인에게 사용·수익케 할 수 없게 되어 임대인의 채무는 이행불능 O, 임차인은 이행불능으로 인한 임대차 종료를 들어 그 이후의 차임지급 거절 O.",["§623"],0,"임대차","대판 94다54641","미분류"],
  ["채권각론_P116","2021다202309","임대인 수선의무 — 귀책사유·하자 인지 여부 불문하고 인정","편의점 가맹계약 양도양수계약 체결하며 신구 임차인이 임대인에게 임차인 변경을 요청한 사안에서 건물용도 변경으로 임차 목적 달성이 어려운 경우 임대인의 수선의무","임대인은 목적물 사용·수익할 수 있도록 목적물을 임차인에게 인도해야(623조 전단), 하자 있으면 임대인은 하자 제거하여 목적물 사용·수익에 아무런 장해 없도록 해야 → 하자 발생에 임대인 귀책사유 없거나 임대인이 하자 발생 몰랐거나 반대로 임차인이 알거나 알 수 있었다 해도 임대인은 임차목적물 사용·수익 상태 유지의무 O.\n\n正辯: 편의점 가맹계약 양도양수계약 체결하며 신구 임차인이 임대인에게 임차인 변경 요청하여 임대인이 응했는데, 건물용도 변경으로 구 임차인 외 다른 사람은 그 건물에서 편의점 및 담배소매업을 하기 어려운 사실을 신 임차인 및 임대인이 모두 알지 못함 → 계약서상 신 임차인이 그 영업 가부를 미리 확인했어야 하더라도, 신 임차인이 임대차계약상 사용·수익에 장해가 발생한 상황이므로, 임대인으로서는 장해 발생의 책임·인지 여부 불문하고 장해 제거 의무 부담 O.",["§623"],0,"임대차","대판 2021다202309","미분류"],
  ["채권각론_P117","2024다261989","621조 임차권등기 말소의무와 임대인 보증금반환의무 동시이행관계","임차인이 621조 임차권등기 마친 경우 임대차 종료 후 보증금반환의무와 임차권등기말소의무의 동시이행 여부","임차인이 621조 임차권등기 마친 경우 다른 약정 없는 한 임대차 종료 후 임대인의 보증금반환의무와 임차인의 임차권등기말소의무는 동시이행관계 O → 임차인은 임차권등기말소의무 이행·이행제공 하여 상대방 이행지체 빠뜨려야 비로소 임차보증금의 지연손해금 청구 O.\n\n正辯: 주택임대차보호법 임차권등기명령에 의한 등기 마쳐진 경우에는 보증금반환의무가 그러한 임차권등기의 말소보다 '선이행'인 점과 구별할 것.",["§621","§536"],0,"임대차","대판 2024다261989","미분류"],
  ["채권각론_P118","2000다65802","622조 차지권 대항력 — 지상건물 등기보다 먼저 토지 물권취득 제3자에게는 대항 불가","토지 임차인의 지상건물 등기보다 먼저 제3자가 토지에 관하여 물권취득 등기를 한 경우 622조 대항력","622조는 건물 소유 토지임차인의 보호를 위해 건물 등기로써 토지임대차 등기에 갈음하는 효력 부여 → 임차인의 지상건물 등기보다 먼저 제3자가 토지에 관하여 물권취득 등기했다면 제3자에게 임대차 효력 X.\n\n正辯: 토지 매수인이 토지에 처분금지가처분결정 기입등기(96년 4월) → 토지 임차인이 지상 건물에 소유권보존등기(96년 7월) → 토지 매수인이 소유권이전등기 본안 승소 확정하여 소유권이전등기(98년 8월) → 토지 임차인은 토지 매수인에게 임차권 대항 X.",["§622"],0,"임대차","대판 2000다65802","미분류"],
