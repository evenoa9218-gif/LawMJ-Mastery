<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LawMJ Mastery</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Backgrounds — Linen + Cloud Dancer ── */
  --bg:#f3f1ee;          /* warm linen */
  --bg2:#e8ecee;         /* cloud dancer */
  --card:#ffffff;
  --border:#cdd8de;      /* powder blue border */
  /* ── Text — Deep Slate ── */
  --text:#243237;        /* deep slate (#243237) */
  --text2:#4e6e7a;       /* steel text */
  --text3:#90b0ba;       /* mist */
  /* ── Primary — Steel Blue ── */
  --primary:#5a8fa0;     /* between #7296a4 & #67869a */
  --primary-light:#e0edf1;
  /* ── Semantic ── */
  --accent:#a07070;      /* dusty rose (for wrong/error) */
  --success:#5a8c7a;     /* sage (for correct) */
  --warning:#9a8060;     /* warm sand */
  --star:#6a9aaa;        /* star = warm caramel */
  /* ── Sidebar — Deep Slate ── */
  --sb-bg:#1c2b34;       /* #243237 darker */
  --sb-text:#9ebecb;     /* sea glass */
  --sb-active:#6fa0b5;   /* steel blue active */
  --sb-hover:#243542;
  --topbar:#ffffff;
  --shadow:0 2px 12px rgba(90,143,160,0.10);
  --radius:10px;
}
[data-theme="dark"] {
  --bg:#1b2830;
  --bg2:#21303a;
  --card:#273542;
  --border:#324858;
  --text:#d5e5ea;
  --text2:#7aacb8;
  --text3:#3d6878;
  --primary:#78b5ca;
  --primary-light:#1a3545;
  --accent:#d09090;
  --success:#6db89e;
  --warning:#c8a878;
  --star:#78b0c5;
  --sb-bg:#141e25;
  --sb-text:#6a9aaa;
  --sb-active:#78b0c5;
  --sb-hover:#1b2830;
  --topbar:#1f2e38;
  --shadow:0 2px 12px rgba(0,0,0,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:252px;min-width:252px;background:var(--sb-bg);display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#2c4552;border-radius:3px}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.sb-logo-sub{font-size:10px;color:#5a6a8a;margin-top:3px}
.sb-module-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;color:var(--sb-text);font-size:10.5px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;transition:background 0.15s}
.sb-module-header:hover{background:var(--sb-hover)}
.sb-module-header .chv{transition:transform 0.2s;font-size:9px;opacity:0.6}
.sb-module-header.open .chv{transform:rotate(90deg)}
.sb-topics{}
.sb-topic{display:flex;align-items:center;gap:7px;padding:7px 16px 7px 26px;cursor:pointer;color:#7080a0;font-size:12px;transition:all 0.15s;border-left:2px solid transparent}
.sb-topic:hover{background:var(--sb-hover);color:#bbc8e8}
.sb-topic.active{background:rgba(90,143,160,0.12);color:#9ebecb;border-left-color:var(--sb-active)}
.sb-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0.5;flex-shrink:0}
.sb-topic.active .sb-dot{opacity:1;background:var(--sb-active)}
.sb-pct{margin-left:auto;font-size:10px;opacity:0.5}
.sb-stats{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);font-size:11px;color:#5a6a8a}
.sb-stats strong{color:#8898bb}

/* MAIN */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--topbar);border-bottom:1px solid var(--border);padding:0 22px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.breadcrumb{flex:1;font-size:12.5px;color:var(--text2);display:flex;align-items:center;gap:5px;overflow:hidden}
.breadcrumb .bc-link{color:var(--primary);cursor:pointer;white-space:nowrap}
.breadcrumb .bc-link:hover{text-decoration:underline}
.breadcrumb .bc-sep{color:var(--text3)}
.breadcrumb strong{color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbtn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:all 0.15s;flex-shrink:0}
.tbtn:hover{background:var(--bg2);color:var(--primary)}
.content{flex:1;overflow-y:auto;padding:22px 24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* HUB */
.hub-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;margin-bottom:5px}
.hub-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.hub-stats{display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap}
.hstat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;min-width:90px;text-align:center;flex:1}
.hstat-num{font-size:22px;font-weight:700;color:var(--primary);font-family:'Noto Serif KR',serif}
.hstat-label{font-size:10.5px;color:var(--text3);margin-top:2px}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mcard:nth-child(1)::before{background:#5a8fa0}
.mcard:nth-child(2)::before{background:#7aa8b8}
.mcard:nth-child(3)::before{background:#86b4ae}
.mcard:nth-child(4)::before{background:#6888a0}
.mcard:nth-child(5)::before{background:#8098b0}
.mcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary)}
.mcard-icon{font-size:26px;margin-bottom:8px}
.mcard-name{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;margin-bottom:4px}
.mcard-topics{font-size:11px;color:var(--text3);margin-bottom:12px}
.mpbar{height:4px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:5px}
.mpbar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.mpbar-text{font-size:10.5px;color:var(--text3)}
.mcard-stats{display:flex;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.mcs{font-size:10.5px;color:var(--text3)}
.mcs strong{color:var(--text2);font-weight:600}

/* TOPIC */
.topic-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;margin-bottom:3px}
.topic-meta{font-size:11.5px;color:var(--text3);margin-bottom:18px}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:9px;padding:3px;margin-bottom:18px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text2);white-space:nowrap;transition:all 0.15s}
.tab-btn:hover{background:var(--card);color:var(--text)}
.tab-btn.active{background:var(--card);color:var(--primary);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1)}

/* CONCEPT */
.concept-list{display:flex;flex-direction:column;gap:14px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.ccard-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.ccard-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b3{background:#f0e3e3;color:#905050}
.b2{background:#ede9e0;color:#9a7050}
.b1{background:#e0edf1;color:#4a8090}
[data-theme="dark"] .b3{background:#3a1818;color:#d09090}
[data-theme="dark"] .b2{background:#302510;color:#c8a870}
[data-theme="dark"] .b1{background:#1a3545;color:#7eb5ca}
.ccard-body{font-size:13.5px;line-height:1.9;color:var(--text2);white-space:pre-wrap}
.atags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.atag{padding:2px 9px;background:var(--primary-light);color:var(--primary);border-radius:4px;font-size:10.5px;font-weight:600;cursor:pointer}
.atag:hover{opacity:0.75}

/* CASE */
.case-filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:11.5px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all 0.15s}
.fbtn:hover{border-color:var(--primary);color:var(--primary)}
.fbtn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.case-grid{display:flex;flex-direction:column;gap:12px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:box-shadow 0.2s}
.pcard:hover{box-shadow:var(--shadow)}
.pcard-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.pcard-no{font-size:11.5px;color:var(--text3);font-family:monospace}
.pcard-stars{color:var(--star);font-size:11px;letter-spacing:-1px}
.pcard-issue{font-weight:700;font-size:14.5px;margin-bottom:9px}
.pcard-sec{margin-bottom:7px}
.pcard-sec-lbl{font-size:9.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.pcard-sec-txt{font-size:13px;line-height:1.75;color:var(--text2)}
.pcard-sig{margin-top:9px;padding:7px 11px;background:#e8f2f5;border-radius:6px;font-size:12px;color:#4a8090;border-left:2px solid var(--primary)}

/* QUIZ */
.qcontrols{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.qprogress{font-size:12px;color:var(--text3);margin-left:auto}
.qwrap{max-width:680px;margin:0 auto}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px 26px;min-height:180px;margin-bottom:14px}
.qcard-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.qbadge{padding:2px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.qb-ox{background:#e0edf1;color:#4a8090}
.qb-mcq{background:#f0e8ea;color:#9a6070}
.qb-case{background:#e0eeea;color:#4a8070}
.qb-blank{background:#ede9e0;color:#8a7050}
[data-theme="dark"] .qb-ox{background:#1a3545;color:#7eb5ca}
[data-theme="dark"] .qb-mcq{background:#381525;color:#d08090}
[data-theme="dark"] .qb-case{background:#153528;color:#7eb5a0}
[data-theme="dark"] .qb-blank{background:#302510;color:#c8a870}
.qstar{color:#6a9aaa;font-size:13px;letter-spacing:1px}
.qfact{background:var(--bg2);border-left:3px solid var(--primary);padding:10px 14px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:14px}
.qquestion{font-size:14.5px;line-height:1.85;color:var(--text);margin-bottom:18px}

/* OX */
.ox-row{display:flex;gap:14px;justify-content:center;margin:4px 0}
.oxbtn{width:76px;height:76px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-size:28px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.oxbtn:hover{transform:scale(1.07)}
.obtn:hover,.obtn.sel-o{border-color:var(--success);background:rgba(90,140,122,0.09)}
.xbtn:hover,.xbtn.sel-x{border-color:var(--accent);background:rgba(160,112,112,0.09)}
.oxbtn.ans-ok{border-color:var(--success)!important;background:rgba(90,140,122,0.13)!important}
.oxbtn.ans-ng{border-color:var(--accent)!important;background:rgba(160,112,112,0.13)!important}

/* MCQ */
.mcq-opts{display:flex;flex-direction:column;gap:7px}
.mopt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:13.5px;line-height:1.7;color:var(--text2);background:var(--card);transition:all 0.15s}
.mopt:hover{border-color:var(--primary);color:var(--text);background:var(--primary-light)}
.mopt.m-correct{border-color:var(--success);background:rgba(90,140,122,0.08);color:var(--text)}
.mopt.m-wrong{border-color:var(--accent);background:rgba(160,112,112,0.08);color:var(--text)}
.mopt-n{font-weight:700;color:var(--primary);flex-shrink:0;width:18px}

/* Explanation */
.qexp{margin-top:12px;padding:12px 14px;background:var(--bg2);border-radius:7px;border-left:3px solid var(--primary);font-size:13px;line-height:1.8;color:var(--text2);display:none}
.qexp.show{display:block}
.qres{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:4px;font-size:11.5px;font-weight:700;margin-bottom:7px}
.qres.ok{background:rgba(90,140,122,0.13);color:var(--success)}
.qres.ng{background:rgba(160,112,112,0.13);color:var(--accent)}

/* BLANK */
.blank-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.blank-inp{flex:1;padding:9px 13px;border:1.5px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);font-size:13.5px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s}
.blank-inp:focus{border-color:var(--primary)}
.blank-inp.ok{border-color:var(--success)}
.blank-inp.ng{border-color:var(--accent)}

/* CASE PROB */
.case-facts{background:var(--bg2);border-left:3px solid #0ca678;padding:12px 15px;border-radius:0 7px 7px 0;margin-bottom:12px;font-size:13.5px;line-height:1.8;color:var(--text2)}
.case-q{font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:14px}
.case-ans-btn{padding:9px 18px;border:1.5px solid var(--success);border-radius:7px;background:transparent;color:var(--success);font-size:12.5px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s}
.case-ans-btn:hover{background:rgba(90,140,122,0.09)}
.case-ans{margin-top:12px;padding:14px 16px;background:rgba(90,140,122,0.07);border:1px solid rgba(90,140,122,0.25);border-radius:7px;font-size:13.5px;line-height:1.85;color:var(--text2);display:none}
.case-ans.show{display:block}

/* NAV */
.qnav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px}
.nbtn{padding:8px 18px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text2);font-size:12.5px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s}
.nbtn:hover{border-color:var(--primary);color:var(--primary)}
.nbtn:disabled{opacity:0.35;cursor:not-allowed}
.nbtn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.nbtn.pri:hover{opacity:0.9;color:#fff}

/* FLASHCARD */
.flash-wrap{max-width:580px;margin:0 auto}
.flash-ctr{font-size:12.5px;color:var(--text3);text-align:center;margin-bottom:6px}
.flash-hint{font-size:11px;color:var(--text3);text-align:center;margin-bottom:14px}
.flash-scene{perspective:1200px;height:270px;margin-bottom:18px;cursor:pointer}
.flash-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.48s cubic-bezier(0.4,0,0.2,1)}
.flash-inner.flipped{transform:rotateY(180deg)}
.flash-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;border:1px solid var(--border);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.flash-front{background:var(--card)}
.flash-back{background:#5a8fa0;transform:rotateY(180deg)}
[data-theme="dark"] .flash-back{background:#1c3a4f}
.flash-face-lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.45;margin-bottom:14px}
.flash-front-text{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;color:var(--text);line-height:1.5}
.flash-back-text{font-size:13.5px;line-height:1.9;color:rgba(255,255,255,0.92);white-space:pre-wrap}
.flash-cat{position:absolute;top:10px;right:12px;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--primary-light);color:var(--primary)}
.flash-back .flash-cat{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.75)}

/* SEARCH */
.soverlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:70px}
.soverlay.show{display:flex}
.sbox{width:580px;max-width:92vw;background:var(--card);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.25);overflow:hidden}
.sinput-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:10px}
.sinput{flex:1;border:none;background:transparent;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none}
.sinput::placeholder{color:var(--text3)}
.sresults{max-height:380px;overflow-y:auto}
.sri{padding:11px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s}
.sri:hover{background:var(--bg2)}
.sri:last-child{border-bottom:none}
.sri-type{font-size:9.5px;color:var(--text3);margin-bottom:2px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase}
.sri-title{font-size:13.5px;color:var(--text);font-weight:500}
.sri-sub{font-size:11.5px;color:var(--text2);margin-top:1px}
.sempty{padding:28px;text-align:center;color:var(--text3);font-size:13px}

/* WRONG NOTE FAB */
.fab{position:fixed;bottom:22px;right:22px;width:50px;height:50px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:18px;box-shadow:0 4px 16px rgba(90,143,160,0.30);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.fab:hover{transform:scale(1.1)}
.fab-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--accent);border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none}
.fab-badge.show{display:flex}

/* EMPTY */
.empty{text-align:center;padding:56px 20px;color:var(--text3)}
.empty-ico{font-size:38px;margin-bottom:10px}
.empty-ttl{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12.5px}

/* PAGE BADGE */
.pbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:4px;background:var(--primary-light);color:var(--primary);font-size:10.5px;font-weight:600;white-space:nowrap;cursor:default;flex-shrink:0}
[data-theme="dark"] .pbadge{background:var(--primary-light);color:var(--primary)}
.pbadge-lg{font-size:12.5px;padding:4px 11px}
.sri-page{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:3px;background:var(--primary-light);color:var(--primary);font-size:10px;font-weight:600;margin-top:3px}
[data-theme="dark"] .sri-page{background:#101830;color:#7a9eff}

/* WRONG NOTE PAGE */
.wn-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.wn-meta{font-size:10.5px;color:var(--text3);margin-bottom:6px}
.wn-q{font-size:13.5px;color:var(--text);margin-bottom:8px;line-height:1.7}
.wn-exp{font-size:12.5px;color:var(--text2);line-height:1.75;padding:8px 11px;background:var(--bg2);border-radius:6px}

/* ── 교과서 페이지 팝업 ── */
.pg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.pg-overlay.show{display:flex}
.pg-modal{background:var(--card);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;max-width:min(720px,96vw);max-height:92vh;box-shadow:0 24px 64px rgba(0,0,0,0.45);width:100%}
.pg-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.pg-hdr-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.pg-hdr-nav{display:flex;align-items:center;gap:6px}
.pg-nbtn{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.15s}
.pg-nbtn:hover{border-color:var(--primary);color:var(--primary)}
.pg-nbtn:disabled{opacity:0.3;cursor:not-allowed}
.pg-body{overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:14px;background:#555;flex:1;min-height:200px}
.pg-body canvas{max-width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.pg-foot{padding:8px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;font-size:11.5px;color:var(--text3)}
/* 파일 선택 상태 */
.pg-pick{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:36px 24px;flex:1}
.pg-pick-lbl{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:24px 32px;border:2px dashed var(--border);border-radius:12px;color:var(--text2);transition:all 0.2s;text-align:center}
.pg-pick-lbl:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.pg-status{font-size:13px;color:var(--text3);text-align:center;padding:40px}
.pbadge{cursor:pointer!important}
.pbadge:hover{opacity:0.78}

/* ── 목차 맵 페이지 ── */
.dday-chip{padding:3px 11px;background:#e0edf1;color:#3a7080;border-radius:6px;font-size:13px;font-weight:700;font-family:'Noto Serif KR',serif;white-space:nowrap;flex-shrink:0;letter-spacing:-0.5px}
[data-theme="dark"] .dday-chip{background:#1a3545;color:#78b5ca}
.map-top{margin-bottom:18px}
.map-dday-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.map-dday-big{font-family:'Noto Serif KR',serif;font-size:36px;font-weight:700;color:#3a7080;letter-spacing:-2px;line-height:1}
[data-theme="dark"] .map-dday-big{color:#78b5ca}
.map-dday-info{font-size:12.5px;color:var(--text2)}
.map-dday-exam{font-weight:700;color:var(--text)}
.map-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;margin-bottom:3px}
.map-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.map-search-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.map-sinp{flex:1;min-width:200px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s}
.map-sinp:focus{border-color:var(--primary)}
.map-filters{display:flex;gap:5px;flex-wrap:wrap}
.map-part-hdr{display:flex;align-items:center;gap:8px;margin:22px 0 10px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.6px;text-transform:uppercase}
.map-part-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.map-part-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:10px}
.mcard2{background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;padding:13px 15px;cursor:pointer;transition:all 0.18s}
.mcard2:hover{border-color:var(--primary);border-left-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-1px)}
.mcard2-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:5px;line-height:1.4}
.mcard2-counts{margin-left:auto;font-size:9.5px;color:var(--text3);font-weight:400;white-space:nowrap;flex-shrink:0}
.map-pbar{height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-bottom:7px}
.map-pbar-fill{height:100%;border-radius:2px;transition:width 0.4s}
.map-tags{display:flex;flex-wrap:wrap;gap:4px}
.mtag{padding:2px 8px;border-radius:4px;font-size:10.5px;cursor:pointer;transition:all 0.13s;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.mtag.has{background:var(--primary-light);color:var(--primary)}
.mtag.has:hover{opacity:0.8}
.mtag.empty{background:var(--bg2);color:var(--text3);font-style:italic;cursor:default}
.map-examdate-row{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11.5px;color:var(--text3)}
.map-examdate-inp{padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);font-size:11.5px;outline:none;width:110px}
.map-examdate-inp:focus{border-color:var(--primary)}

@media(max-width:780px){
  .sidebar{width:220px;min-width:220px;position:fixed;z-index:90;transform:translateX(-100%);transition:transform 0.28s}
  .sidebar.open{transform:translateX(0)}
  .hub-stats{flex-wrap:wrap}
  .hstat{min-width:calc(50% - 6px)}
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-logo" onclick="goMap()" style="cursor:pointer">
    <div class="sb-logo-title">⚖️ LawMJ Mastery</div>
    <div class="sb-logo-sub">민법 교과서 완전학습 플랫폼</div>
  </div>
  <div id="sb-nav"></div>
  <div class="sb-stats" id="sb-stats"></div>
</aside>

<div class="main-wrap">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <span class="dday-chip" id="dday-chip" onclick="goMap()" title="변호사시험 D-day · 클릭하면 목차로" style="cursor:pointer">D-...</span>
    <button class="tbtn" onclick="goMap()" title="목차 맵">🗺️</button>
    <button class="tbtn" onclick="openSearch()" title="검색 (⌘K)">🔍</button>
    <button class="tbtn" onclick="toggleTheme()" id="theme-btn" title="테마 전환">🌙</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="soverlay" id="soverlay" onclick="closeSOverlay(event)">
  <div class="sbox">
    <div class="sinput-row">
      <span style="font-size:16px;color:var(--text3)">🔍</span>
      <input class="sinput" id="sinput" placeholder="조문(§750), 판례번호, 개념, 키워드, 또는 페이지 번호(예: p.145, 200페이지)" oninput="doSearch(this.value)">
      <button class="tbtn" style="border:none" onclick="closeSearch()">✕</button>
    </div>
    <div class="sresults" id="sresults"><div class="sempty">검색어를 입력하세요</div></div>
  </div>
</div>

<button class="fab" id="fab" onclick="showWrongNote()" title="오답노트">📕
  <div class="fab-badge" id="fab-badge">0</div>
</button>



<div class="pg-overlay" id="pg-overlay" onclick="pgOverlayClick(event)">
  <div class="pg-modal" id="pg-modal">
    <div class="pg-hdr">
      <span class="pg-hdr-title" id="pg-title">📄 교과서 페이지</span>
      <div class="pg-hdr-nav">
        <button class="pg-nbtn" id="pg-prev" onclick="pgMove(-1)" disabled>◀ 이전</button>
        <button class="pg-nbtn" id="pg-next" onclick="pgMove(1)" disabled>다음 ▶</button>
        <button class="pg-nbtn" onclick="closePg()">✕</button>
      </div>
    </div>
    <!-- 상태: 파일 미선택 -->
    <div class="pg-pick" id="pg-pick" style="display:none">
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">교과서 PDF를 한 번 선택하면 이후 자동으로 기억합니다</div>
      <label class="pg-pick-lbl" for="pg-file-inp">
        <span style="font-size:36px">📂</span>
        <span style="font-size:14px;font-weight:600">로스쿨 민법의 정석.pdf 선택</span>
        <span style="font-size:11.5px;color:var(--text3)">선택 후 이 브라우저에 영구 저장됩니다</span>
      </label>
      <input type="file" id="pg-file-inp" accept=".pdf" style="display:none" onchange="pgFileSelected(this)">
    </div>
    <!-- 상태: 로딩/렌더링 -->
    <div class="pg-status" id="pg-status" style="display:none">⏳ 로딩 중...</div>
    <!-- 상태: 페이지 표시 -->
    <div class="pg-body" id="pg-body" style="display:none">
      <canvas id="pg-canvas"></canvas>
    </div>
    <div class="pg-foot" id="pg-foot" style="display:none">
      <span id="pg-range" style="flex:1">—</span>
      <label for="pg-file-inp" style="color:var(--primary);cursor:pointer;flex-shrink:0">📂 파일 변경</label>
    </div>
  </div>
</div>

<script>
// ================================================================
// ① 데이터 배열 (아카이빙 시 순차적으로 채움)
// 포맷:
//  CONCEPT:   [id, title, body, article_refs[], importance(1-3), topic, page]
//  CASE:      [id, case_no, issue, holding, significance, article_refs[], stars(1-3), topic, page]
//  QUIZ:      [id, type, question, answer, explanation, topic, page]
//             type → "OX"(answer:true/false) | "MCQ"(answer:"①"~"⑤") | "CASE"(answer:"OPEN") | "BLANK"(answer:string)
//             MCQ question 형식: "질문§①선지1§②선지2§③선지3§④선지4§⑤선지5"
//             공통사실 있을 시: "사실관계§질문§①선지1§..."  / OX: "사실관계§★지문"
//  FLASHCARD: [id, front, back, category, topic, page]
//             category → "concept"|"case"|"article"|"compare"
//
//  page 필드:
//    단일 페이지 → 숫자:       123
//    페이지 범위 → 배열:       [123, 125]
//    페이지 미상 → null 또는 생략
//  예시: ["총칙_C001","법률행위의 의의","...본문...",["§105","§107"],3,"법률행위",145]
// ================================================================

const 채권각론_CONCEPT = [
  ["채권각론_C001","계약의 종류","- 소비대차·위임·임치·종신정기금은 유상인 경우 **쌍무계약**\n- 쌍무계약은 모두 **유상계약**\n- 현상광고는 **편무계약** + 유상계약\n- **요물계약**: 현상광고, 대물변제계약, 계약금계약, 보증계약",["§§527-535"],0,"계약총론"],
  ["채권각론_C002","계약의 성립 — 합의 (객관적 합치·주관적 합치·숨은 불합의)","- 계약 성립요건인 '합의'는 **객관적 합치**(내용의 일치) + **주관적 합치**(당사자의 일치)\n- **숨은 불합의**: 규범적 해석을 통해서도 의사 합치가 없는 경우 → 계약 불성립\n- 착오는 규범적 해석을 통해 합의 성립 인정된 다음 단계의 문제",["§527"],0,"계약총론"],
  ["채권각론_C003","청약과 승낙 — 구속력·존속기간·격지자간 성립시기 (제527조~제534조)","**청약의 구속력(제527조)**: 철회 금지\n\n**청약의 존속기간(제528조, 제529조)** = 구속력 존속기간 = 승낙적격 = 승낙기간\n- 제1항: 승낙기간 정한 청약은 청약자가 그 기간 내 승낙 통지 받지 못하면 실효\n- 제2항: 승낙 통지가 기간 후 도달했지만 보통 기간 내 도달할 발송이라면 청약자는 지체 없이 상대방에게 연착 통지해야 (미리 연착 통지한 것 아닌 이상)\n- 제3항: 청약자가 연착 통지를 지체 없이 하지 않았다면 연착되지 않은 것으로 간주 → 승낙 통지 발송시 계약성립(531조)\n- 제529조: 승낙기간 정하지 않은 청약은 상당한 기간\n\n**격지자간 계약성립시기(제531조)**: 승낙 통지를 발송한 때 성립\n\n**기타 규정**\n- 연착된 승낙(제530조): 새 청약으로 볼 수 있음\n- 변경 가한 승낙(제534조): 승낙자가 청약에 조건·변경 가하여 승낙하면 청약 거절과 동시에 새 청약한 것 간주\n- 의사실현에 의한 계약성립(제532조): 의사표시·관습에 의해 승낙 통지 필요 없다면 승낙 의사표시로 인정되는 사실이 있는 때 성립\n- 교차청약(제533조): 동일 내용의 청약이 상호교차된 경우는 양 청약이 도달한 때 계약성립",["§527","§528","§529","§530","§531","§532","§533","§534"],0,"계약총론"],
  ["채권각론_C004","계약체결상의 과실 (제535조)","**요건**: **원시적·객관적·전부** 불능(=법률행위 내용의 불능)이어서 계약이 무효인 경우 적용\n\n**효과**: 불능에 악의·과실 있는 자는 상대방이 계약의 유효를 믿었음으로 인한 손해배상(=**신뢰이익**의 배상). 그러나 유효함으로 인하여 생길 이익(=이행이익)을 넘을 수 없고, 이때 상대방은 선의·무과실 요함\n\n**535조 확대적용론 부정설** [통판] ∵ 불법행위 일반규정이 있는 우리 민법",["§535"],0,"계약총론"],
  ["채권각론_C005","계약교섭의 부당파기","- 불법행위 성립 요건: 일방이 계약 교섭단계에서 확실히 체결되리라는 정당한 기대·신뢰 부여하여 상대방이 그 신뢰에 따라 행동하였음에도 상당한 이유 없이 계약 체결 거부하여 손해 입힌 경우 → 신의칙에 비추어 계약자유원칙 한계 넘는 불법행위 성립\n- **손해의 범위**: 계약이 유효하게 체결된다고 믿었던 것에 의하여 입은 손해(=**신뢰손해**)에 한정\n  - 신뢰손해란 계약의 성립을 기대하고 지출한 계약준비비용처럼 그러한 신뢰가 없었더라면 통상 지출하지 않았을 비용상당 손해\n  - 아직 계약체결에 확고한 신뢰 부여되기 이전에 계약교섭 당사자가 계약체결이 좌절되더라도 어쩔 수 없다고 생각하고 지출한 비용(경쟁입찰에 참가하기 위해 지출한 제안서·견적서 작성비용) 등은 포함 X\n- 침해행위·피해법익의 유형에 따라 계약교섭 파기의 불법행위가 인격적 법익 침해함으로써 정신적 고통 초래 인정되면 별도로 위자료 배상 O",[],0,"계약총론"],
  ["채권각론_C006","동시이행의 항변권 — 서설 (성질·명문 규정·법정 동시이행관계)","**쌍무계약의 이행상 견련성**에서 유래. 성질: 연기적 항변권, 임의규정.\n\n**명문으로 동시이행 인정되는 규정**\n- **전세권**: 목적물인도·전세권설정등기말소와 전세금반환(§317)\n- **계약해제**: 원상회복(§549)\n- **도급**: 완성된 목적물의 하자로 인한 손해배상과 보수지급(§667조 제3항)\n- **가등기담보**: 청산금지급과 본등기·인도의무(가담법 §4조 제3항)\n\n**법정 동시이행관계 (판례)**\n- 계약이 무효 또는 취소된 경우 상호간 부당이득반환의무 [95다54693]\n- 임대차계약 종료 시: 목적물 인도의무와 '보증금 중 연체차임 등 임대차 관련하여 인도시까지 생긴 임차인의 모든 채무를 공제한 나머지'의 반환의무 [77다1241]\n- 도급에서 하자확대손해로 인한 손해배상채무와 공사대금채무 [2004다37676]\n\n**채권증서 반환·영수증 교부**\n- 변제자는 변제받는 자에게 영수증 청구(§474), 변제자가 채무 전부 변제한 때는 채권증서 반환청구(§475)\n- 전부 변제해야 채권증서 반환 청구 인정, 변제와 동시이행관계 X ≠ 영수증교부의무는 변제와 동시이행관계 O [2003다22042]",["§536","§317","§474","§475","§549","§667"],0,"계약총론"],
  ["채권각론_C007","동시이행의 항변권 — 요건 (제536조 제1항·제2항)","**① 쌍무계약에서 발생한 대가적 채무일 것**\n- 쌍방 부담 각 채무가 고유 대가관계 있는 쌍무계약상 채무 아니더라도 구체적 계약관계의 채무 사이 대가적 의미 있어 이행상 견련관계 인정되면 O [2019다215791]\n- 임의경매 무효인 경우 채권자(=근저당권자)가 채무자를 대위하여 경락인에게 하는 소유권이전등기 말소청구와 경락인이 배당금을 수령한 채권자에게 하는 배당금반환청구는 동시이행 X ∵ 서로 이행의 상대방 다름 [2006다24049]\n- 채권양도·채무인수, 이행불능으로 인한 손해배상채무로 변경, 급부 불능으로 인한 대상청구권 발생 → 동일성 있으므로 여전히 동시이행 O\n\n**② 상대방 채무가 변제기에 있을 것**\n- 매매에서 중도금 지급의무, 도급에서 일의 완성의무처럼 선이행의무인 경우 매수인·수급인은 이러한 의무에 관하여 동이항 X\n- **예외**: 선이행의무자도 이행의 거절 O\n  ⓐ 선이행의무자 이행하지 않는 동안 상대방 채무도 변제기가 도래한 경우\n  ⓑ 선이행의무도 이행기 경과 후에는 동시이행관계 → 설령 어느 의무가 선이행의무라 해도 이행기 지나면, 이행기 후에도 선이행하기로 약정하는 등 특별한 사정 없는 한 동시이행관계 O [2017다3222]\n\n**ⓑ 불안의 항변권(제536조 제2항)**: 상대방의 이행이 곤란할 현저한 사유 있는 경우\n- '상대방 이행이 곤란할 현저한 사유'는 상대방의 신용불안이나 재산상태 악화 등 사정변경 생기고 당초 계약 내용 따른 선이행의무 이행케 하는 것이 공평·신의칙 반하게 되는 경우 → 상대방 채무가 아직 이행기에 이르지 않아도 O [2019다215791, 2023다269139]\n\n**③ 상대방이 채무 이행·이행제공이 없을 것**\n- **가분 v. 가분**: 상응하는 범위만 동이항 행사 O\n  - 도급계약: 도급인이 ⓐ '하자보수(불가분)' 청구하면 공사대금(가분) 전액 거절 O, ⓑ '하자보수에 갈음하는 손해배상(가분)' 청구한다면 공사대금(가분) 중 그에 상응하는 범위만 지급 거절 O, 전액 거절 X\n- **동시이행항변권 상실과 계속적 이행제공설**: 쌍무계약 당사자 일방이 먼저 한 번 현실 제공을 하고 상대방을 수령지체에 빠지게 했더라도 그 이행제공이 계속되지 않는 경우에는 과거 한 번 이행제공 사실만으로 상대방의 동시이행 항변권 소멸 X [66다1174] → **계속적 이행제공설** [통판]\n- 채권자가 미리 받기를 거절한 경우에도 채무자는 구두 제공은 해야 하므로 채권자는 여전히 동시이행항변권 O. 그러나 채권자의 '영구적 불수령'은 구두 제공조차 필요 없으므로 채권자는 동시이행항변권 상실",["§536"],0,"계약총론"],
  ["채권각론_C008","동시이행의 항변권 — 효력 (이행거절·존재효·상환이행판결·상계금지)","**이행거절의 연기적 항변권**\n\n**소송 처리**: 변론주의 → 피고가 항변으로 주장해야 → 인정되면 **상환이행판결**(일부승소) → **집행개시요건** + 집행기관이 심사 [통판] (v. 집행문부여요건 + 법원이 심사)\n- 동시이행판결의 반대의무 이행·이행제공은 집행개시 요건으로서 채권자의 증명방법에 제한 없음 → 동시이행판결 하는 법원으로서는 반대의무 내용 명확하게 특정해야 ∵ 특정되지 않아 반대의무 이행·이행제공 증명 못할 경우 채권자는 강제집행을 할 수 없어 다시 무익한 소 제기해야 [2020다290804]\n- 채권자의 반대의무 이행·제공이 없었다는 주장은 동시이행판결에 대한 청구이의사유 X ∵ 집행개시 요건 O, '집행에 관한 이의신청' 절차에서 주장·심리할 사항 O [2024다231391]\n\n**존재효**: 이행지체 불성립 → 그로 인한 손해배상 X, 해제 X\n- 지체책임 없다고 주장하는 자가 반드시 동시이행항변권 행사해야 발생하는 건 아님 [97다54604]\n\n正辯: 기록형에서 지연손해금청구의 요건사실에 '원고의 반대채무 이행제공 사실'이 있는 것이 바로 존재효 때문이며, 결국 원고는 지연손해금을 청구하기 위해 피고의 항변이 있기 전부터 '동이항을 깨뜨린 사실'을 주장·증명해야 함\n\n**상계금지**: 자동채권에 동시이행 항변권 붙어있는 경우 상계금지(존재효)\n- 다만 자동채권·수동채권이 서로 동시이행 관계면 상계 허용 O\n- 자동채권과 수동채권이 동시이행관계 있어도 서로 현실적으로 이행할 필요 없는 경우라면 특별한 사정 없는 한 상계 허용 O ∵ 상계로 인한 불이익 발생의 우려 없고 오히려 채권채무관계 간명하게 해소하는 상계제도의 목적 부합\n\n**동시이행항변권 포기**: 묵시적 O, 묵시적 포기 인정은 엄격·신중해야 [2025다209893]",["§536"],0,"계약총론"],
  ["채권각론_C009","위험부담 — 의의 (물건의 위험·대가의 위험)","**위험**: 쌍방의 책임 없는 사유로 급부가 후발적 불능이 된 경우의 불이익\n\n**'물건의 위험'**: 불능이 된 급부 자체를 받지 못하는 불이익 → 특정물이거나 종류물이 특정된 이후에는 상대방(채권자) 부담, 해당 채무 소멸\n\n**'대가의 위험'**: 쌍무계약에서 불능이 된 급부의 반대급부도 받지 못하는 불이익 → 채무자 부담, 불능된 급부와 함께 상대방 채무도 소멸하는 것(=존속상 견련성). 쌍무계약에서 '위험부담'은 통상 '대가의 위험' 부담 문제",["§537","§538"],0,"계약총론"],
  ["채권각론_C010","채무자위험부담주의(제537조) — 요건·효과·대상청구권","**요건**: 쌍무계약에서 일방의 채무가 특정 이후 쌍방의 귀책사유 없이 후발적 불능\n\n**효과**: 상대방 채무 소멸 = 채무자는 이행청구 X → 상대방이 이미 이행한 경우는 **제741조** 부당이득반환청구 O → 결국 계약 소멸(해소)\n\n**대상청구권**: 토지수용과 같은 위험부담 법리를 적용할 사안에서도 대상청구권을 인정함으로써 채권자의 대상청구권 행사에 의한 537조 배제 효과 인정 [통판]",["§537","§741"],0,"계약총론"],
  ["채권각론_C011","채권자 귀책사유로 인한 급부불능 (제538조)","**제538조 제1항 제1문**: 채권자의 귀책사유로 불능\n**제538조 제1항 제2문**: 채권자의 수령지체 중에 쌍방 귀책사유 없이 불능\n\n- 수령지체 중 채무자는 고의·중과실 없으면 면책되는 401조를 538조 1항 2문과 통일적 해석 [통] → 수령지체 중 채무자 경과실로 불능되어도 '쌍방 귀책 없는 경우'로 보아 538조 1항 2문 적용 O, 반대급부 청구 O\n\n**제2항**: 채무자가 채무 면함으로써 얻은 **이익**은 채권자에게 **상환**\n- '얻은 이익'은 급부 불능과 인과관계 있어야 하며, ① 운송비·포장비 등 절약된 비용처럼 소극적 이익, ② 불능이 됨으로써 취득한 보상금 등 대체물과 같은 적극적 이익이 있음",["§538","§401"],0,"계약총론"],
  ["채권각론_C012","제3자를 위한 계약 — 서설·성립요건·구조 (제539조~제542조)","**본질**: 제3자에게 계약상 채권을 취득하게 하는 것\n\n**예**: 제3자 명의 예금, 타인을 위한 보험, 변제를 위한 공탁\n- 채무자·인수인 사이의 병존적 채무인수 O, 면책적 채무인수 X, 이행인수 X\n- 구별기준: 제3자에게 직접 채권을 취득하게 할 의사가 있는지 여부\n\n**성립요건**\n- 제3자는 계약 체결 당시 현존 불요 → 태아 O, [判例] 성립 전 법인 O\n- 제3자에게 의무를 지우는 약정 X\n- 제3자 채무를 면제해주는 약정 O\n\n**구조 (3면 관계)**\n- 요약자-수익자: **원**인관계(대가관계)\n- 요약자-낙약자: **보**상관계(기본관계)\n- 낙약자-수익자: 수익관계\n\n**제3자(수익자)의 지위**\n- 수익의 의사표시(형성권)는 채권 취득 요건\n- 계약당사자 X (취소권·해제권 X), 의사표시·해제 규정 보호되는 제3자 X\n- 채무자의 제3자에 대한 최고권(제540조): 확답 없으면 거절 간주\n- 낙약자는 기본관계 기한 항변으로 (수익 의사표시 한) 수익자에게 대항 O(제542조), 이때 수익자는 제3자 보호 규정 주장 X (∵ 보호 규정의 '제3자' X)\n- 낙약자는 요약자에 대한 채권으로 수익자의 급부청구권과 상계 X [통]",["§539","§540","§541","§542"],0,"계약총론"],
  ["채권각론_C013","제3자를 위한 계약 — 효력 (제3자 권리 확정·해제·청산)","**제3자 권리 확정(제541조)**: 수익의 의사표시 이후에 당사자는 권리 변경·소멸 금지 (다만, 당사자 미리 유보했거나 수익자 동의 있으면 가능 [통판])\n- 요약자·낙약자의 기본계약 합의해제 X ∵ 합의해제='변경·소멸' [통]\n- 요약자 혹은 낙약자가 상대방의 채무불이행 이유로 기본계약 법정해제 O [통판] ∵ 법정해제≠'변경·소멸'\n\n正辯: 판례는 수익자의 수익의 의사표시 후에도 요약자나 낙약자의 법정해제를 당연히 인정하면서도 541조의 '변경·소멸' 여부 언급 없음\n\n**해제**\n- 낙약자의 귀책사유로 이행불능·이행지체 시 요약자는 제3자의 동의 없이 계약당사자로서 계약을 해제 O [69다1410]\n- 요약자는 낙약자에 대하여 수익자에게 이행할 것을 청구 O\n- 수익의 의사표시 후 낙약자의 채무불이행으로 인한 손해배상청구권은 수익자에게 귀속, 그러나 해제권은 요약자에게만 귀속 [통판]\n\n**청산 (기본관계 무효·해제 시)**\n- 낙약자가 이미 제3자에게 급부한 것에 관하여서는 요약자를 상대로 원상회복청구나 부당이득반환청구 O, 제3자를 상대로 X ∵ 계약관계의 청산은 계약당사자인 낙약자와 요약자 사이에 이루어져야, 계약상의 위험을 제3자에게 전가시키면 X [2005다7566, 2010다31860]\n\n**대가관계·기본관계 독립성**\n- '대가관계'의 효력은 제3자를 위한 계약 자체 및 '기본관계'의 성립이나 효력에 영향 미치지 X → 대가관계에 관한 항변을 가지고, '낙약자가 수익자에게' 혹은 '요약자가 낙약자에게' 대항 X [2003다49771]",["§539","§541","§542","§548"],0,"계약총론"],
  ["채권각론_C014","이행지체를 이유로 한 해제 (제544조) — 요건·최고 불요 예외","**요건**: ① 이행지체 성립, ② 상당기간 정한 최고, ③ 최고기간 내 이행 아니할 것\n\n**① 이행지체 성립**: 이·가·게·귀·위 검토, 주로 동시이행항변권 문제됨\n\n**② 상당기간을 정한 최고**\n- 과소최고: 최고에 표시된 범위에서만 효력\n- 과대최고: 본래 급부와 차이 적거나 착오에 기한 것이면 본래 급부 범위 내에서 유효. 그러나 과다한 정도가 현저하고 청구한 금액을 제공하지 않으면 수령하지 않을 의사가 분명하면 최고 부적법하고 이에 터잡은 해제 무효 [93다47615]\n- 기간이 상당한 기간보다 짧거나 기간을 정하지 않은 경우에는 상당한 기간이 지나면 해제권 발생 [89다카14110]\n- 소장 부본 송달로 최고 효력 인정 가능 [2002다24942]\n- 해제하겠다는 통지도 특별히 급부수령 거부 취지 포함되지 않은 한 최고로서의 효력 O [2020다290804]\n- 동시이행관계인 반대의무 지는 채권자는 채무자의 변제제공 없음을 이유로 해제하기 위해 자기 채무 변제제공 하여야 [2022다238053]\n\n**③ 최고기간 내 이행하지 아니할 것**\n- 최고기간 동안 이행의 제공이 계속되어야 하는지 → **불요설** [통판]\n- 단, 상대방이 최고기간 내 이행·이행제공을 하면 해제권 소멸하므로 상대방 이행을 수령하고 자신의 채무를 이행할 정도의 준비는 필요 [96다35590]\n\n**최고 불요 예외**\nⓐ 이행기 도래 후 최고 전의 이행거절(제544조 단서). 그러나 '이행기 전 이행거절'은 독자적 채무불이행 유형으로 최고 없이 해제 O\nⓑ 정기행위(제545조): 성질상 일정한 시일 또는 기간 내 이행하지 않으면 목적 달성할 수 없는 경우, 그 시기에 이행 않으면 최고 없이 해제 O\nⓒ 자동해제약정(실권조항)\n- 중도금을 기일에 지급 못하면 자동해제된다는 약정은 그대로 O [88다카132]\n- 잔금을 기일에 지급하지 못하면 자동해제된다는 약정이 있더라도, 매도인이 잔금지급기일에 소유권이전등기 필요 서류 이행제공을 하여 매수인을 '이행지체에 빠지게 하였을 때 비로소 자동해제' O [88다카28891]\n- 자동해제 약정을 계약금 포기·배액상환 약정과 결합한 경우에는 자동해제 효과 부정 → 최고·통지 없는 자동해제 X [79다1595]\n- 자동해제 약정하고 채무불이행 하면 별도 최고나 해제 의사표시 없이 불이행 자체로써 자동해제 O → 그러나 당사자들이 계약 여전히 유효 전제로 논의 계속하고 이행을 촉구하며 상대방이 이의 없이 급부 일부 수령하는 등 특별한 사정 없는 한 계약당사자들 사이 자동해제약정 효력 상실시키고 자동해제된 계약 부활시키는 합의 O → 채무이행 못 받은 상대방은 새로운 최고 없이 바로 해제 X [2019다216817]",["§544","§545","§543"],0,"계약총론"],
  ["채권각론_C015","기타 이유 해제 — 이행불능·사정변경·부수적 채무 불이행","**이행불능(제546조)**: 이행기 기다리거나 반대급부 이행제공·최고 없이 즉시 해제 O\n= **이행거절**: 제544조 단서 혹은 '신의칙'에 근거한 [判例]\n\n**사정변경 의한 해제·해지**\n- 해제: 일정 요건 하에 인정되되, 실제 인정 사례 없음\n- 해지: 계속적 보증, 임대차계약에서 사정변경 해지 인정\n- 요건: ① 계약 성립 당시 당사자 예견할 수 없던 계약 기초인 객관적 사정(주관적 사정 X)의 현저한 사정 변경, ② 해제권 취득 당사자 귀책사유 없을 것, ③ 구속력 인정이 신의칙 현저히 반하는 결과 [2004다31302]\n- 계속적 계약에서 사정변경 이유로 계약 효력 소멸시키려면 특별한 사정 없는 한 소멸 효과를 장래에 향하여 발생시키는 550조 '해지'만 가능 O, 548조 '해제'는 X [2020다297430]\n\n**부수적 채무의 불이행은 해제 X**\n- 분묘이장, 시사회, 전대차 근저당권 사건\n- 주된 채무와 부수적 채무 구별: 급부의 독립된 가치와 관계없이, 계약 체결할 때 표명되었거나 당시 상황으로 분명하게 객관적으로 나타난 당사자 합리적 의사로 결정, 계약의 내용·목적·불이행결과 등 여러 사정 고려 [2022다203804]",["§544","§546","§550"],0,"계약총론"],
  ["채권각론_C016","해제권의 행사 — 불가분성·조건부 의사표시 (제543조·제547조)","**행사 방법**: 상대방에 대한 의사표시로, 철회 X (제543조) / 형성권, 조건·기한 X\n- 단, '특정 기일 내에 이행하지 않을 경우 계약은 당연히 해제된 것으로 한다'는 이행청구는 이행청구와 동시에 기일 내 이행 없는 것을 정지조건으로 하여 미리 해제의 의사표시를 한 것 O [80다2381]\n\n**해제권 불가분성(제547조)**: 당사자 일방·쌍방이 수인인 경우 계약의 해지·해제는 그 전원으로부터 또는 전원에 대하여 하여야",["§543","§547"],0,"계약총론"],
  ["채권각론_C017","해제의 효과 — 법적 구성 (직접효과설·물권적 효과설)","**해제의 법적 구성**\n1) 청산관계설: 해제하면 계약 전 상태로 회복시킬 청산관계로 변경되는 것\n2) **직접효과설** [통판]: 해제하면 계약이 직접적으로 소급하여 소멸 → 548조 1항 단서, 549조, 551조는 소급하여 소멸함에도 불구하고 인정된 특별규정\n\n**계약으로 이전된 물권의 당연 복귀 여부** (직접효과설의 소급효를 전제로 한 논의)\n1) 채권적 효과설: 해제하면 원상회복의 채권만 발생할 뿐\n2) **물권적 효과설** [통판]: 등기·인도 없이 당연히 복귀\n- 우리 법제가 물권행위의 독자성·무인성을 부정하는 점과 548조 1항 단서가 거래안정 위한 특별규정인 점에 비추어 계약 해제되면 물권은 당연히 원 상태로 복귀 [75다1394]",["§548"],0,"계약총론"],
  ["채권각론_C018","해제와 제3자 (제548조 제1항 단서) — 요건·해당·비해당","**제3자의 의미**: '해제된 계약으로부터 생긴 법률효과를 기초로 해제 전에 새로운 이해관계 가지고 등기·인도 등 완전한 권리 취득한 자일 것' [2000다22850]\n(≠ 의사표시 규정의 제3자: ⓐ 선의 요함, ⓑ 등기·인도 등 완전한 권리 불요)\n- 제3자가 해제 전에 계약 해제될 가능성을 알았거나 알 수 있었어도 보호됨 [2008다57746]\n- '해제 후에도 원상회복등기 이뤄지기 전'에 양립되지 않는 법률관계를 가진 '선의' 제3자도 548조 1항 단서 O, 제3자 악의는 계약해제 주장하는 자가 입증책임 [84다카130, 2005다6341]\n\n**제3자 해당 O**\n- 계약 '목적물'에 가압류·압류한 자 [99다40937, 2000다584]\n- 계약 '목적물'에 가등기 한 자 [2013다14569]\n- 주택임대차보호법 상 대항력 갖춘 임차인 [2003다12717, 2007다38908]\n- 부동산 가압류를 한 가압류채권자 O. 단, 가압류에 앞서 전 소유자(매도인)가 말소청구권 보전을 위한 처분금지가처분등기를 마친 다음 매매 해제로 인한 말소청구가 승소 확정되었다면 X ∵ 가압류 말소될 운명 [2003다33004]\n\n**제3자 해당 X**\n- 계약상 '채권'을 양수한 자나 가압류·압류한 자 X [99다51685]\n- 무허가건물관리대장에 소유자로 등재된 자 X ∵ 등기 마치지 않는 한 완전한 권리 X [2011다64782]\n- 토지 매매 해제된 경우 그 지상 신축 건물의 매수인 X [90다카16761]\n  단, 토지 매도인이 계약금 받고 매수인의 건물 신축을 승낙하여 견고한 건물이 신축·분양된 후 토지 매매 해제했다며 수분양자에게 건물 철거 주장 X ∵ 승낙으로 원인 제공했으므로 신의칙 위반 [93다20986]\n\n**채권 가압류와 계약 해제·해지**\n- '채권 가압류는 제3채무자의 채권 지급·소멸·감소 행위로 채권자에게 대항 X, 그러나 채권 발생원인인 법률관계에 대한 처분까지 구속 X' → 아무런 합리적 이유 없이 채권 소멸만을 목적으로 합의해제하는 특별한 경우를 제외하고는 채권의 발생원인인 법률관계를 합의해제 O [98다17930]\n- 소유권이전등기청구권의 가압류 있어도 매매계약 자체 해제 O → 제3채무자가 압류명령 위반하여 소유권이전등기 마친 후 채무자의 대금지급 채무불이행 이유로 매매계약 해제하면 소유권이전등기청구권이 소급적 소멸하고 압류명령도 실효되므로 제3채무자는 불법행위책임 X [99다51685]",["§548"],0,"계약총론"],
  ["채권각론_C019","원상회복의무 (제548조) — 이자 가산·가액배상·시효·동시이행","**성질**: 부당이득반환, 반환범위 특칙 — 선악 불문하고 받은 급부 '전부' 반환\n\n**원물반환 원칙**: 물권은 물권적 효과설에 따라 등기·인도 없이 당연히 복귀\n- 매도인의 원상회복청구는 소유권에 기한 물권적 청구권이라 소멸시효 X\n- 원물반환 불가 시 **가액배상** → 처분 당시 목적물의 시가 상당액과 처분으로 얻은 이익의 이득일부터의 법정이자 가산한 금액 [2013다14675]\n\n**이자 가산(제548조 제2항)**: 금전은 받은 날로부터 이자 가산하여 반환\n- 부당이득반환 성질로 이행지체책임이 아니므로 쌍방 동시이행 관계 상관없이 연 5% 법정이자 가산. 약정해제권 행사의 경우도 마찬가지 [2000다9123]\n- 548조 2항 가산 이자에 소송촉진법 이율 적용 X ∵ 원상회복의무로서 일종의 부당이득반환이고 이행지체 손해배상 아님 [2023다289720]\n- 약정 있으면 약정이율, 없으면 법정이율 → 이행지체 빠진 후에는 지연손해금. ① 가산 이자 약정이율이 법정이율보다 낮으면 법정이율로 지연손해금, ② 지연손해금률에 당사자 별도 약정 있으면 그에 따르고 법정이율보다 낮아도 적용 [2011다50509]\n\n**해제 원상회복 금전반환청구에 지체책임 발생**: 반대채무 이행으로 동시이행관계(549조) 깨뜨리면서 반환을 이행청구 하여야 ∵ 기한 정함 없는 채무\n- 계약해제 원상회복의무로 금전반환 구하는 소송 제기되면 채무자는 소장 송달받은 다음날부터 반환의무 지체책임 부담하며 소송촉진법 이율 적용 O [2001다76298]\n\n**과실·사용이익의 반환**: 규정 없으나 반환할 금전에 붙이는 법정이자에 대응하여, 인도받은 물건으로부터 얻은 과실·사용이익도 반환해야 [통판]\n- 운용이익은 사회통념상 매수인 행위가 개입되지 않았더라도 당연히 취득할 범위가 아닌 한 반환할 사용이익에서 공제 [2006다26328]\n\n**소멸시효 기산점**: 계약 해제시 O(=원상회복청구권 발생시), 해제권 발생시 X [2009다63267]\n\n**동시이행관계(제549조)**: 계약 소급 소멸하나 공평의 원칙상 규정\n- 해제로 인한 원상회복청구권뿐만 아니라 손해배상청구권도 함께 동시이행관계 O [95다25138]",["§548","§549"],0,"계약총론"],
  ["채권각론_C020","해제와 손해배상청구 (제551조) — 합의해제(해제계약)","**해제와 손해배상 양립 O** (제551조), 손해배상액 예정 O [통], 이행이익 원칙\n- 이행불능을 이유로 한 해제: 시가에서 약정 매매대금 공제한 금액이 손해배상액\n- 이행지체를 이유로 한 해제: 해제 이후에는 지연배상이 전보배상으로 변경됨 → 해제한 때까지의 지연배상 + 해제 이후의 전보배상\n\n**합의해제(해제계약)**\n- 묵시적 합의해제 인정 [判例]: '쌍방의 계약실현의사 결여 또는 포기'\n  손해배상의 합의금에 불만 품고 반환하자 이의 없이 수령한 경우, 쌍방 모두 이행제공이나 최고 없이 5년간 방치한 경우, 매도인이 받은 계약금·중도금을 공탁하자 매수인이 이의 없이 수령한 경우\n\n- **합의해제의 효력**: 합의 내용으로 결정, 민법 법정해제 규정 적용 X (원칙)\n  - 반환할 금전에 받은 날부터 이자가산 X [95다16011] → 548조 2항 X\n  - 채무불이행으로 인한 손해배상 청구 X [86다카1147] → 551조 X\n  - 계약이 합의해제·합의해지된 경우 채무불이행 손해배상 X → 손해배상하기로 특약했거나 의사표시 유보했다면 이를 주장하는 자가 증명하여 손해배상청구 O → 특약 등의 여부는 합의해제·해지 당시 기준으로 판단해야, 원래의 계약에 있는 위약금·손해배상약정은 특별한 사정 없는 한 합의해제·해지에 적용 X [2020다285048, 2017다220416]\n- 합의해제로 소유권은 당연히 매도인에게 복귀, 매도인의 원상회복청구권은 소유권에 기한 물권적 청구권으로서 소멸시효 X [80다2968]\n- 합의해제에서도 548조 1항 단서의 제3자 보호 규정 적용 O [79다932, 2005다6341]",["§551","§548"],0,"계약총론"],
  ["채권각론_C021","약정해제권 — 해약금·손해배상 요건·해제사유 약정 해석 (제565조)","**해약금(565조)**: 약정해제권의 유보로 추정, 가장 간편한 계약 해소 수단\n- [判例] 유동적 무효 상태에서 해약금 해제 O\n\n**약정해제권과 손해배상청구**\n- 법정해제 하면서 551조 손해배상 청구하면 귀책사유 요하고, 약정해제의 경우도 채무불이행·귀책사유와 무관한 사유로 '약정해제권'을 행사하는 경우라 하여도, 손해배상청구는 귀책사유 있어야 ∵ 자기책임의 원칙 → 귀책사유 상관없이 손해배상청구 인정되려면 특별한 사정 있어야 [2015다59115]\n\n**약정해제사유의 해석**\n- 계약에서 해제·해지사유 약정한 경우 해제 가부·효력은 약정으로 결정 → 일반적 내용 아닌 그 계약 특유의 해제사유 명시했고 쌍방이 아닌 일방의 채무이행에만 관련된 것이거나 최고 무의미한 해제사유 있다면 해석에 있어 고려해야\n- 처분문서 서면으로 약정해제 사유 작성한 경우, 문언 객관적 의미 명확하면 특별한 사정이 없는 한 문언대로 해석하고, 그와 달리 해석함으로써 당사자 사이 법률관계에 중대한 영향 초래하게 되면 문언 더욱 엄격히 해석해야 [2013다14972, 2014다14429, 2010다26769, 2025다216444]\n\n※ 해지(계속적 계약, 장래효), 해제권 소멸사유(552조 최고권, 553조 목적물 훼손 등, 제척기간 10년[통]) 일독",["§565","§551"],0,"계약총론"],
  ["채권각론_C022","증여 — 의의·성질·증여 특유의 해제 3가지 (제555조~제557조)","**의의·성질**: 낙성·무상·편무계약\n- 증여자는 담보책임 無. 단, ① 하자·흠결을 알고 불고지한 경우, ② 부담부 증여인 경우(부담의 한도에서)에는 담보책임 有 (제559조)\n\n**증여 특유의 해제**\n\nⓐ **비서면해제(제555조)**: 특수한 '철회', 제척기간 無\n- 555조 해제는 형성권 제척기간 적용 없음 ∵ 특수한 철회 O, 본래 의미의 해제 X [2003다1755]\n- 서면 자체는 매매계약서·매도증서로 되어 있더라도 증여의사 표시한 것이면 555조의 '서면' O [91다6160]\n\nⓑ **망은행위(제556조)**\n- 제1항 제1,2호: 증여자나 그 배우자·직계혈족에 대한 범죄행위, 증여자에 대하여 있는 부양의무 불이행\n- 제2항: 안 날 6월 혹은 용서한 경우 소멸\n- 556조 1항 1호의 '범죄행위'는 수증자가 감사의 마음을 가져야 함에도 증여자가 배은망덕하다고 느낄 정도로 둘 사이 신뢰관계 중대하게 침해하여 증여 효과 유지함이 사회통념상 허용되지 않을 정도의 범죄 의미 → 범죄행위의 동기·경위, 피해 정도, 침해 법익 유형, 친밀도 등 종합적 고려해야 → 범죄행위로 수증자가 반드시 형사처벌 받을 필요는 X [2017다207475]\n- 556조 1항 2호의 '부양의무'는 974조 직계혈족·그 배우자·생계 같이 하는 친족 간의 부양의무 가리킴 → 친족 아닌 당사자 사이 약정 부양의무는 X → 556조 2항 제척기간 적용 X, 558조 이행완료 무영향 적용 X → 원상회복 O [95다43358]\n\nⓒ **재산상태변경(제557조)**: 재산상태 변경으로 이행으로 인해 생계에 중대한 영향",["§555","§556","§557","§558","§559"],0,"계약총론"],
  ["채권각론_C023","증여 이행완료의 의미·부담부증여 (제558조·제561조)","**이미 이행 = 인도·등기** (제558조)\n- 부동산은 등기를, 동산은 인도를 마쳐야 증여의 '이미 이행' O → 부동산 증여에서 인도만으로는 부족하고 소유권이전등기까지 마쳐야 이행 O ∵ 물권변동 형식주의 [77다834]\n- 증여자 의사에 기하지 않은 원인무효 등기 마쳤다면 '이행' X → 증여자가 비서면 증여로 해제할 경우 수증자는 실체관계 부합 주장 X [2009다37831]\n- 미등기 매수인이 이를 타인에게 증여하면서 소유권이전등기청구권을 양도하고 매도인에게 통지한 경우 비서면 증여로 해제하더라도 이미 이행이 마쳐진 증여로서 영향 無 [98다22543]\n- 증여자가 생전에 증여의사로 소유권이전등기 필요 서류 제공했다면 증여자 사망 후에 등기 경료되었더라도 증여자의 상속인이 비서면 증여라는 이유로 증여계약 해제해도 영향 無 ∵ 증여자 의사에 따른 증여 이행 O [2001다29643]\n\n**부담부증여(제561조, 제559조)**\n- 부담이 있다고 하여 증여가 유상·쌍무로 변경되는 것은 아니지만, 규정상 부담의 한도에서는 유상·쌍무계약 규정을 적용 O\n- 부담부증여도 비서면이라면 각 당사자 555조 해제 O → 그러나 증여자가 증여 미이행이더라도 수증자가 부담 이행 완료했다면, 실질적으로 부담 없는 증여라는 등 특별한 사정 없는 한, 각 당사자는 비서면 해제 X ∵ 부담부증여는 쌍무계약 준용(561조), 555조 비서면 해제에 적용되는 558조 '이미 이행한 부분'에 이행한 부담도 포함되므로 부담 이행했는데 555조로 해제하면 증여자가 부담 이행 이익만 보유하여 부당 [2021다299976]\n- 561조가 쌍무계약을 준용하므로 쌍무계약에서 이행지체 이유로 해제하고 원상회복 긍정(544조, 548조)",["§555","§558","§559","§561"],0,"계약총론"],
  ["채권각론_C024","매매의 예약 (제564조) — 예약완결권·제척기간","**매매의 일방예약(제564조)**: 매매완결권 행사하면 매매 효력 발생. 예약완결권 기간 정하지 않으면 예약자 상당 기간 확답 최고, 기간 내 확답 받지 못하면 예약 실효\n- 예약완결권을 일방만 가지면 일방예약, 쌍방이 가지면 쌍방예약\n\n**예약완결권** [判例]: 권리자의 일방적 의사표시만으로 매매계약 성립시키는 형성권. 가등기할 수 있고 양도 가능한 재산권이므로 가등기의 부기등기 형식으로 이전 O\n\n**제척기간** [判例]: 계약에서 기간을 정하지 않은 경우는 '예약 성립시로부터 10년'의 제척기간에 걸리고, 그 행사의 '시기'를 따로 정하거나 목적물을 인도받은 경우에도 '예약성립일'로부터 10년 [96다47494]",["§564"],0,"매매"],
  ["채권각론_C025","해약금해제 (제565조) — 계약금의 의의·해약금 추정","**계약금의 의미**: ⓐ 증거금, ⓑ 일부 변제, ⓒ 해약금, ⓓ 위약금의 의미가 있을 수 있음\n- 해약금은 계약금의 교부만으로 추정되나, 위약금은 약정이 있어야 인정됨\n- 위약금 약정이 있을 경우 손해배상액의 예정으로 추정됨\n\n**해약금(제565조)**: 약정해제권의 유보로 추정, 가장 간편한 계약 해소 수단\n- [判例] 유동적 무효 상태에서 해약금 해제 O",["§565"],0,"매매"],
  ["채권각론_C026","해약금해제 요건 (제565조) — ①금전 교부 ②이행착수 전 ③배액 제공","**요건**: ① 금전 기타 유가물의 교부, ② 일방이 이행에 착수하기 전일 것, ③ 교부자는 포기하고 수령자는 배액을 제공할 것\n\n**① 금전 기타 유가물의 교부**\n- 단지 '계약금을 지급하기로 약정만 한 단계'에서는 계약금 효력 X, 565조 해제 권리 X\n- 계약금 일부만 지급하고 잔액은 나중에 지급하기로 약정한 경우: 잔금 미지급 시 상대방은 이행청구 O, 채무불이행 이유로 계약금약정 해제 O. 그러나 계약금 잔금 지급하지 않는 한 계약금계약 성립 X, 임의로 주계약 해제 X [2007다73611]\n- 계약금 일부만 지급된 경우 해약금 기준 금원은 '실제 교부받은 계약금'이 아니라 '약정 계약금' ∵ 당사자의 계약금 금액 결정 의사 反, 교부된 금액이 소액이면 계약 구속력 약함 [2014다231378]\n- 가계약금에 관하여 해약금 약정 있었다고 인정하려면 정식으로 계약 체결하기 전까지 교부자는 포기, 수령자는 배액 상환하여 계약 체결하지 않기로 약정하였음이 명백하게 인정되어야 [2022다247187]\n\n**② 일방이 이행에 착수하기 전일 것**\n- '일방'은 상대방에만 국한 X → 매수인이 중도금 지급한 이후는 매도인뿐 아니라 매수인도 해약금해제 X [99다62074]\n- '이행의 착수': '객관적으로 외부에서 인식할 수 있는 정도로 채무의 이행행위의 일부를 하거나 이행을 위해 필요한 전제행위를 하는 경우 O, 단순히 이행의 준비만으로는 부족', 계약 내용에 들어맞는 이행제공 정도는 불필요 → 이행 최고하고 소송 제기한 것은 '이행착수' X [2007다72274]\n- 이행기 전 착수 금지 특약 없는 이상, 이행기 전 이행에 착수 O → 이행기 전 이행 착수 있어도 해약금해제 X [2004다11599]\n  예외: 매도인이 565조 해제한다며 일정 기한까지 해약금 수령 최고하며 공탁하겠다고 통지한 경우는 중도금은 매도인에게도 기한의 이익 有 → 매수인이 이행기 전 착수할 수 없는 특별한 사정이므로, 매수인이 이행기 전에 일방적으로 이행에 착수했어도 매도인은 해약금해제 행사 O [92다31323]\n- 부동산 매매에서 통상 중도금·잔금 지급기일은 계약금에 의한 해제권 유보 기간 의미 → 매매대금 이행기가 매도인을 위해서도 기한의 이익을 부여한 경우는 채무자가 이행기 전에 이행 착수할 수 없는 특별한 사정 O [2022다256624]\n\n**③ 교부자는 포기하고 수령자는 배액을 제공할 것**\n- 수령자는 반드시 적법한 '제공' 있어야 해제 효과 O, 다만 공탁은 불요 [80다2784]\n\n**효과**: 원상회복의무 발생 X, 손해배상 문제 X(제565조 제2항), 법정해제는 별개\n\n**손해배상액 예정과의 경합**: 계약금이 해약금과 손해배상 예정의 성질 겸유 → 398조 2항에 의한 감액 주장과 동시에 565조 1항 해약금 해제 O [95다33726]",["§565"],0,"매매"],
  ["채권각론_C027","매매계약의 효력 개관 — 권리이전·대금지급·대금지급거절권 (제568조·제587조·제588조)","**권리이전·대금지급의 의무(제568조)**: 매도인은 권리 이전, 매수인은 대금 지급의 각 의무 있고, 동시이행(제2항)\n- 매매에서 매매목적물과 대금은 반드시 계약체결 당시에 구체적 특정할 필요 없고 사후에라도 구체적 특정할 방법·기준 정해져 있으면 충분 → 이행시기·이행장소·담보책임 등 합의 없었더라도 매매계약 성립 O [2023다227500]\n\n**대금지급거절권(제588조)**: 매매 목적물에 권리 주장자 있는 경우 매수인은 권리의 전부·일부 잃을 염려 있다면 위험 한도에서 대금 전부·일부 지급 거절\n- 正辯: 매매계약은 588조와 536조 2항(불안의 항변권)이 경합하는 경우가 많으므로 불안의 항변권 판례들과 함께 숙지하고 만일 출제되면 두 규정 다 기재함\n- 매도인이 목적물의 근저당권을 말소 못했다면 매수인은 그 위험의 한도에서 대금지급 거절 O → 매수인이 인도받았더라도 인도일 이후 대금 이자 지급 의무 X(587조 단서) → 거절할 대금은 근저당권 채권최고액, 그러나 매수인이 안다면 확인된 피담보채무액에 한정 [96다6554]",["§568","§587","§588"],0,"매매"],
  ["채권각론_C028","과실의 귀속과 대금의 이자 (제587조) — 미인도·대금완납 기준","**587조의 취지**: '목적물 사용이익 v. 대금 이자' 상호 등가성 또는 형평. 587조는 매수인의 대금 완납 前을 전제로 한 규정\n\n**제1문**: 매매계약 후 인도 아니한 목적물의 '과실'은 매도인 귀속\n- 인도받지 않은 매수인이 소유권이전등기를 마쳤어도 매수인이 대금을 '완납'하지 않은 이상 과실은 매도인 귀속 [91다32527]\n- 미인도 및 미완납이라면 매도인 인도의무 이행지체 있더라도 매수인은 손해배상청구 X ∵ '과실'은 매도인 귀속되어야 [2004다8210] / 마찬가지로 매수인 대금 지체하여도 매도인은 손해배상청구 X [80다211]\n- 正辯: 결국 미인도 및 미완납 상황에서는 누구든 이행지체를 하더라도 매도인이 '과실'을 수취하고 매수인이 대금의 '이자'를 얻고 있는 것으로 정리할 것이지 따로 지체책임 물을 수 X\n  다만, 587조는 동시이행관계가 유지되어야 적용되므로, 당사자가 중도금지급을 '선이행의무'로 이행기 특약을 한 경우에는 적용 배제됨(즉, 인도하지 않은 매도인도 매수인에게 중도금 지체책임 물을 수 있음) → 그러나 잔금기일 경과하여 중도금이 동이항관계에 들어오면 다시 587조가 적용됨\n\n**제2문**: 인도 받은 날부터 매수인은 대금 '이자' 지급 의무\n- **단서**: 그러나 대금지급에 기한 있으면 '이자' 지급 X\n- 매수인의 대금지급의무와 매도인의 근저당권설정등기·가압류등기 말소의무가 동시이행관계에 있는 등 매수인의 정당한 대금지급 거절사유가 있다면 목적물을 미리 인도받았더라도 이자 지급할 의무 X [2011다98129, 2016다246800]\n- 正辯: 단서는 대금지급에 '기한' 있는 경우에 매수인의 이자 지급의무를 부정하는데, 판례는 매수인에게 '동이항' 있는 경우도 여기에 포함시키는 것으로 해석됨(私見)\n\n**대금 완납 후**: 인도하지 않았으나 매수인이 매매대금 완납했다면 그 이후 목적물 '과실'은 매수인 귀속 [93다28928] (매수인 미등기여도)\n\n- 결국 매매에서는, 매수인이 대금지급 지체해도 매도인이 '인도 완료'해야만, 매도인이 인도 지체해도 매수인이 '대금 완납'해야만, 각 상대방에게 이행지체책임 청구 O\n\n**587조 유추적용**: 쌍무계약 취소되면 선의 매수인은 201조 과실취득권 인정되므로, 선의 매도인 역시 587조 유추적용 하여 대금 법정이자 반환의무 X [92다45025]",["§587"],0,"매매"],
  ["채권각론_C029","매도인의 담보책임 — 서설·법적 성질·채무불이행책임 경합","**유상계약 등가성 실현을 위한 법정의 무과실책임**, 다른 유상계약 준용(567조). 다만 도급은 별도의 규정 有\n- '하자담보책임 규정은 매매라는 유상·쌍무계약에서 급부와 반대급부 사이 등가관계 유지 위하여 민법 지도이념인 공평의 원칙에 입각하여 마련된 것' [2012다72582]\n\n**법적 성질 논의**\n1) 법정책임설: 이행기 현상대로 足, 무과실책임, 신뢰이익\n2) 채무불이행설: 하자 없는 물건 이전의무 有\n  ⓐ 채무불이행책임의 특칙으로: 과실책임, 이행이익\n  ⓑ 채무불이행책임과 별개로: 무과실책임, 신뢰이익\n\n**채무불이행책임과의 경합**\n- 판례는 타인권리 매매, 특정물 매매 사안에서 채무불이행책임과 경합 긍정\n- 타인 권리 매매에서 매도인 귀책사유로 이행불능: (악의) 매수인이 담보책임으로 손해배상청구 못해도(570조 단서) 채무불이행 일반 규정(546조, 390조)으로 해제 O, 손해배상 O [93다37328]\n- 특정물 매매에서 불완전이행: 하자담보책임(580조)과 경합 O [2002다51586]\n- 매매 목적물에 하자 있으면 매수인의 하자담보책임과 채무불이행책임은 별개 권원 경합적 인정 O [2017다202050]",["§570","§580","§390","§546"],0,"매매"],
  ["채권각론_C030","매도인의 담보책임 — 이행이익·신뢰이익 배상 + 유형별 개관","**이행이익 혹은 신뢰이익의 배상**\n- 원칙적 신뢰이익 배상으로 보아야 하지만, 판례는 전부 혹은 일부 타인권리 매매에서 이행이익 배상을 인정함\n- [大判全合] 타인 권리 매매에서 권리이전할 수 없게 된 때 매도인은 선의의 매수인에게 '불능 당시 시가를 표준으로 그 계약이 완전히 이행된 것과 동일한 경제적 이익을 배상할 의무' 있음 [66다2618]\n- 담보책임 손해배상으로 확대손해 X → 채무불이행책임(불완전이행)으로 물어야. 귀책사유 필요 [96다39455]\n\n**유형별 개관 (간략)**\n| 유형 | 조문 | 대금감액 | 해제 | 손해배상 | 특징 |\n|---|---|---|---|---|---|\n| 전부타인 | 570 | — | 선악불문 | 선의, 이행이익 | 제척기간 無 |\n| 일부타인 | 572 | 선악불문 | 선의, 잔존매수아니 | 선의, 이행이익 | — |\n| 수량부족·일부멸실 | 574 | 선의△ | 선의, 잔존매수아니 | 선의 | 제척기간 1년△ |\n| 용익권 제한 | 575 | — | 선의, 목적달성불가 | 선의 | — |\n| 저당권·전세권 행사 | 576 | — | 선악불문 | 선악불문 | 제척기간 無, 출재상환청구권 |\n| 특정물 하자 | 580 | — | 목적달성불가 | 선의·무과실, 6월 | — |\n| 종류물 하자 | 581 | — | 목적달성불가 | 선의·무과실, 6월 | 완전물급부청구권 |\n\n**제척기간**: 권리의 하자는 1년, 물건의 하자는 6월\n- 담보책임에 제척기간 규정 있어도 소멸시효 규정 역시 적용 O (배제 X) → 특정물 하자담보책임으로서 매수인이 하자 안 날로부터 6월이 경과하지 않았어도 인도받은 날로부터 10년이 경과했으면 소멸시효 완성되어 청구 X [2011다10266]",["§570","§572","§574","§575","§576","§580","§581"],0,"매매"],
  ["채권각론_C031","전부 타인 권리 매매 (제570조) — 선의 매도인 특칙 (제571조)","**내용**: 해제(선악불문) / 손해배상(선의, 이행이익) / 제척기간 無\n\n- 타인 권리의 경우 매도인은 취득하여 이전할 의무(제569조) → 매매 유효성\n- 매매목적 된 권리가 매도인과 타인의 공유라 해도 매매계약 체결 O, 569조 적용 O [2021다220666]\n\n**원시적·주관적 불능**\nⓐ 미등기전매: 주류적 판례는 타인 권리 매매로 판시 [81다528, 86다249]\n  ↔ 반대 판례: [72다982, 95다55245]는 타인 권리 매매 부정\nⓑ 등기 위조 등 무권리자 처분행위 사안\nⓒ 매매계약 체결 후 매도인 소유권 취득이 소급 무효가 된 사안\n  ex. 甲-A-B 순차매도에서 ⓑ 매도인 A가 서류 위조했다면 애초 A의 소유 아님, ⓒ 甲이 미성년자라 매매계약 취소한 경우 A의 소유권이 소급 상실 → A-B 매매는 두 경우 모두 타인권리매매\n\n- 타인 권리의 이전불능이 오직 '매수인'의 귀책사유에 의한 경우는 매도인이 타인권리매매 담보책임 X [79다564]\n- 담보책임의 공평의 원칙상 하자의 발생·확대에 가공한 매수인의 잘못을 참작하여 손해배상 정함이 상당 [94다23920]\n- 해제 원상회복: 548조 2항 O [73다1442]. 매도인은 매매대금 및 받은 날부터의 이자를, 매수인은 목적물 및 사용이익을 반환할 의무 O [2016다240]\n\n**선의 매도인 특칙(제571조)**: 타인 권리에 선의인 매도인은 손해배상해주고 해제 O, 매수인이 악의였다면 통지하고 해제 O\n- 571조는 '전부' 타인권리 매매에만 적용 O, 일부 타인권리 매매에는 X [2002다33557]\n- 571조 선의 매도인의 해제권도 효과에 있어 일반적 해제와 같음 → 매도인은 손해배상의무 부담, 목적물 인도받아 사용한 매수인은 목적물 및 사용이익 반환 의무 O → 매도인이 사용이익을 궁극적으로 권리자에게 반환해야 할 입장이어도 마찬가지 [92다25946]",["§569","§570","§571"],0,"매매"],
  ["채권각론_C032","일부 타인 권리 매매 (제572조) · 수량부족·일부멸실 (제574조)","**일부 타인 권리 매매(제572조)**\n- 내용: 대금감액(선악불문) / 해제(선의, 잔존매수아니) / 손해배상(선의, 이행이익)\n- 제척기간(제573조): 안 날(선의) 혹은 계약한 날(악의)로부터 1년\n- 573조 '사실을 안 날'은 단순히 권리 일부가 타인에게 속한 사실을 안 날 X, 매도인의 취득·이전불능이 확실하게 된 사실을 안 날 O [91다27396]\n- 수개 권리 일괄매매 중 일부 권리가 이전불능인 경우에도 572조 O (비율에 따른 대금산출이 불가능한 경우가 아닌 한) [88다카13547]\n- 건물·대지 매매계약에서 건물 일부가 이웃 토지 경계 침범하였고 매도인이 침범 부분 대지 이전불능이라면 572조 담보책임 유추적용 O [2009다33570]\n\n**수량부족·일부멸실(제574조)**\n- 내용: 대금감액(선의△) / 해제(선의, 잔존매수아니) / 손해배상(선의)\n- 제척기간: 안 날로부터 1년만 적용△\n- 수량부족은 수량지정 매매 등이어야 함\n  일부멸실은 원시적·객관적·일부 불능 cf. 원·객·전부 불능은 매매 자체가 무효\n- 574조 '수량지정 매매'는 당사자가 매매 목적물이 일정 수량을 가지는 것에 주안을 두고 대금도 그 수량 기준으로 결정해야 [92다56674]\n- 아파트 분양시 공유대지면적을 지정한 아파트 분양계약은 수량지정매매 O [99다58136]\n- 수량지정 임대차 인정 [94다38342]\n- 실제면적이 계약면적에 미달할 경우, 수량지정매매에 해당할 때 한하여 574조·572조 대금감액청구는 별론, 매매계약이 그 미달 부분만큼 일부 무효라며 부당이득반환청구 X, 미달 부분 원시적 불능 이유로 535조 책임 청구 X [99다47396]",["§572","§573","§574"],0,"매매"],
  ["채권각론_C033","제한물권 등의 제한 (제575조) · 저당권·전세권 행사 (제576조)","**제한물권 등의 제한(제575조)**\n- 내용: 대금감액 X / 해제(선의, 목적달성불가) / 손해배상(선의)\n- 제척기간(제3항): 안 날로부터 1년\n- 지상권·지역권·전세권·질권·유치권·등기된 임차권·지역권부존재 / 주임법·상임법 대항력 갖춘 임차권 O / 건물의 등기 마친 건물 소유 목적 토지 임차권 O\n\n**저당권·전세권 행사로 소유권 취득불가·상실(제576조)**\n- 내용: 해제(선악불문) / 상환청구(선악불문) / 손해배상(선악불문) / 제척기간 無\n- 매수인이 매매목적물에 관한 근저당권 피담보채무의 인수로 매매대금 지급에 갈음하는 약정을 한 경우(=이행인수)에는 매수인이 576조 1항 담보책임을 '면제'해주었거나 '포기'한 것 O, 576조 담보책임 X [2002다11151]\n- '가등기' 혹은 '가압류' 목적이 된 부동산의 매수인이 그 후 가등기에 기하여 본등기가 마쳐짐으로써 혹은 가압류에 기한 강제집행으로 인하여 소유권 상실하면 576조 준용 O, 570조 X ∵ 저당권·전세권 행사 유사 [92다21784, 2011다1941]\n\n**출재 보존 매수인의 상환청구권(제576조 제2항)**: 매수인의 출재로 소유권 보존한 경우 매도인에 대하여 상환청구 O\n- 부동산 매수인이 소유권 보존 위해 출재로 피담보채권 변제함으로써 저당권 소멸시킨 경우, 매수인이 매수 당시에 저당권 설정 여부 선악의 불문하고 576조 2항으로 '매도인'에 대해 출재 상환 청구 O [95다55245]",["§575","§576"],0,"매매"],
  ["채권각론_C034","경매에서의 담보책임 (제578조) · 채권 매도인의 담보책임 (제579조)","**경매에서의 담보책임(제578조)**\n- **제1항**: 경매에서도 전 8조 '권리'의 하자에 대한 담보책임 전체 준용 → '물건'의 하자는 X (제580조 제2항)\n  578조 '경매'는 민사집행법 강제집행, 담보권 실행 위한 경매, 공매 등 국가나 대행기관이 권리자 의사와 무관하게 하는 매도행위만 포함 [2014다80839]\n- **제2항**: 채무자 1차 → (채무자 무자력) 배당 채권자 2차(배당금 전부·일부 반환)\n- **제3항 손해배상**: 흠결 알고 불고지한 채무자, 알고 경매 청구한 채권자만 책임\n  578조 1항 '채무자'에는 임의경매에서 물상보증인도 포함 O [87다카2641]\n- **경매절차 자체 무효** 시에는 578조 담보책임 인정 여지 X [91다21640, 92다15574, 2003다59259]\n- 전 8조의 규정 중 576조는 저당권·전세권이 경매에서 소멸주의이므로 경락인에게 576조 행사 담보책임 여지 X → 다만 576조 준용하는 청구권 보전 가등기가 본등기로 된 경우는 578조 경매에서도 문제될 수 있음\n\n**채권의 매도인의 담보책임(제579조)**\n- 채권 매도인이 채무자 자력을 담보하는 특약을 한 경우에만 자력을 담보한 것\n  이 경우 계약 당시의 자력을, 변제기 미도래 채권이었다면 변제기의 자력을 담보한 것으로 추정",["§578","§579"],0,"매매"],
  ["채권각론_C035","물건의 하자에 대한 담보책임 — 특정물 (제580조) · 종류물 (제581조)","**특정물 하자담보책임(제580조)**\n- 내용: 해제(무과실, 목적달성불가) / 손해배상(무과실)\n- 제척기간(제582조): 안 날로부터 6월\n- 선의·무과실 매수인에게 제한물권 등의 제한(제575조 제1항) 준용\n- **하자의 의미**: '매매 목적물이 거래통념상 기대되는 객관적 성질·성능 결여하거나, 당사자가 예정·보증한 성질 결여한 경우'. 법률적 제한·장애도 매매목적물의 하자. 하자 존부는 **매매계약 성립시**를 기준으로 판단 [98다18506]\n- 법률상 제한 → 물건의 하자 → **경매에는 담보책임 X** (제580조 제2항)\n- 580조 하자담보책임은 채무불이행책임(불완전이행)과 경합 O [2002다51586]\n\n**종류물 하자담보책임(제581조)**\n- 내용: 해제(무과실, 목적달성불가) / 손해배상(무과실) / **완전물급부청구권**(무과실)\n- 제척기간(제582조): 안 날로부터 6월\n- 종류물의 선의·무과실 매수인은 특정 이후 특정물 매매 준용\n- 하자담보의무 이행이 오히려 공평의 원칙 반하면 완전물급부청구권 X [2012다72582]\n- **'안 날'**: 하자로 손해배상 결과 발생 안 것만으로 부족, 그 결과가 목적물의 하자로 인한 것 즉 하자와 손해발생 사이 인과관계도 알아야 [2003다20190]\n- **손해배상**: 원시적 하자가 없을 것으로 믿음으로 인한 신뢰손해 원칙 / 신뢰손해 = 매수대금 — 하자 있는 상태의 시가\n\n※ 담보책임과 동시이행(583조), 담보책임의 면제특약(584조), 환매(590~595조, 환매기간 부동산 5년 및 동산 3년은 연장 불가)",["§580","§581","§582"],0,"매매"],
  ["채권각론_C036","민법상의 임대차 — 존속기간·묵시의 갱신 (제635조·제639조)","**임대차 존속기간**\n- 민법 최단기 無, 최장기 無, 갱신 무제한 (다만, 단기임대차 619조)\n- 임대차기간을 영구로 정한 약정 유효 O ∵ 계약 자유 원칙. 영구 임대의 취지는 임차인이 차임연체 등 채무불이행 없는 한 유지 원하는 동안 존속 보장 의미 → 임대인에겐 의무, 임차인에겐 권리 → 임차인은 언제든지 권리 포기 O → 포기하면 기간 정함 없는 임대차 O [2023다209045]\n\n**묵시의 갱신(제639조)**: 임대차 기간만료 후 임차인이 사용·수익 계속하고 임대인이 상당기간 이의 없으면 → 전 임대차와 동일 조건으로 다시 임대차한 것\n- ① 제635조(기간 약정 없는 임대차)에 의해 언제든지 해지통고 O (제1항 단서)\n- ② 제3자 제공 담보는 소멸 (제2항) → 당사자 제공 담보는 존속함\n- 기간 연장 합의(혹은 자동연장 특약)에 따른 기간연장의 경우에는 639조 2항 적용 X [2004다63293] → 임대차보증금반환채무의 연대보증채무 존속\n- 652조 강행규정에 없으나 묵시 갱신 639조는 강행규정 [통판]\n- 639조 1항의 '이의'는 묵시적으로도 O, 차임 증액 관련 조건부로도 O → 다만 묵시적·조건부 이의 있다고 보려면 더 이상 임대차관계 지속하지 않겠다는 임대인의 의사를 객관적으로 추단할 사정 있어야. 임대인이 전 임대차기간 만료 후 차임증액청구권 행사한 사정만으로 639조 1항 이의를 했다고 볼 수 X ∵ 628조의 차임증액청구권은 오히려 임대차계약 존속을 전제로 하는 권리 [2024다315046]",["§635","§639"],0,"임대차"],
  ["채권각론_C037","임대인의 의무 — 사용·수익하게 할 의무·수선의무 (제623조)","**기간 약정 없는 임대차 해지통고(제635조)**: 기간 약정 없으면 언제든지 해지통고 → 토지·공작물 임대인 해지통고는 6월, 임차인 해지통고는 1월, 동산은 5일 / 편면적 강행규정(제652조)\n\n**목적물 사용·수익하게 할 의무(제623조)**: ① 인도의무, ② 수선의무\n- 목적물 인도 여부 상관없이 임대차계약 유효 성립하면 차임 지급의무 발생 O → 다만 임대인의 위 의무 불이행으로 목적물 사용·수익에 지장 있으면 임차인은 지장 한도에서 차임 지급 거절 O [2024다256116]\n- 임대인이 임대차 목적물에 대한 소유권 기타 임대할 권한 없더라도 임대차계약은 유효. 단, 임차인이 진실한 소유자로부터 목적물 반환청구나 차임 기타 해당액 지급요구 받는 경우 임대인의 채무는 이행불능 O, 임차인은 이행불능으로 인한 임대차 종료를 들어 그 이후의 차임지급 거절 O [94다54641]\n- 통상의 임대차에서 임차인 안전배려나 도난방지 등 보호의무 X [99다10004]\n- 목적물 사용·수익하게 할 의무와 차임지급의무는 상호 대응관계 → 임차인이 목적물 전혀 사용할 수 없다면 차임 전부 지급 거절 O / 사용·수익 부분적 지장 있으면 그 한도 내 차임만 지급 거절, 전부 지급 거절은 X [96다44778]\n\n**수선의무**\n- 임대인은 수선의무(=임대차 목적물을 계약 존속 중 그 사용·수익에 필요한 상태 유지하게 할 의무, 623조) 부담 O\n- 파손·장해가 임차인이 별 비용 들이지 않고도 손쉽게 고칠 사소한 것이어서 사용·수익 방해 정도 아니면 수선의무 X / 수선 않으면 정해진 목적으로 사용·수익할 수 없는 상태면 수선의무 O\n- 임대인 귀책사유 없는 훼손도 수선의무 O\n- 특약으로 임대인 수선의무 면제 O. 그러나 특별한 사정 없는 한 통상 파손 등 소규모 수선만 면제, 대규모 수선은 면제 X (대파손, 건물 주요 구성부분, 기본설비 교체) [2009다96984, 94다34692]\n- 하자 발생에 임대인 귀책사유 없거나 임대인이 하자 발생 몰랐거나 반대로 임차인이 알거나 알 수 있었다 해도 임대인은 임차목적물 사용·수익 상태 유지의무 O [2021다202309]\n\n**담보책임(제567조)**: 매도인 담보책임의 준용",["§623","§635"],0,"임대차"],
  ["채권각론_C038","임차인의 권리 — 대항력 (제621조·제622조)","**사용·수익권(제618조)**: 계약·성질에 의하여 정하여진 용법으로 사용·수익하여야(제654조, 제610조)\n\n**임차권의 대항력**: 목적물이 양도될 경우 제3자에게 임차권으로 대항하는 것\n\n**ⓐ 임대차의 등기(제621조)**: 부동산임차인은 반대약정이 없는 한 임대인에 대해 임대차 등기절차 협력 청구 O, 등기되면 그때부터 제3자에 대하여 효력\n- 임차인이 621조 임차권등기 마친 경우 다른 약정 없는 한 임대차 종료 후 임대인의 보증금반환의무와 임차인의 임차권등기말소의무는 동시이행관계 O [2024다261989]\n\n**ⓑ 건물등기 있는 차지권의 대항력(제622조)**: 건물 소유 목적 토지임대차는 등기하지 않아도 지상건물을 등기한 때 제3자에 대해 효력. 다만 건물이 멸실·후패하면 X\n- 622조 '대항력'의 개념은 임대차 목적물, 즉 '토지'의 소유자 변동의 문제이지, '건물'의 소유자 변동 문제(=임차권 양도 문제)가 아니라는 점을 숙지 [92다24950, 95다29345]\n- 임차인의 지상건물 등기보다 먼저 제3자가 토지에 관하여 물권취득 등기했다면 제3자에게 임대차 효력 X [2000다65802]\n- 대지와 건물을 함께 임차한 자가 그 후 건물만 경락받아 등기한 경우에는 애초 '건물 소유 목적' 토지임대차가 아니었으므로 622조 대항력 X [94다5458]",["§618","§621","§622"],0,"임대차"],
  ["채권각론_C039","임차인의 권리 — 비용상환청구권 (제626조) · 부속물매수청구권 (제646조) · 지상물매수청구권 (제643조)","**비용상환청구권(제626조)**\n- 필요비(제1항): 보존을 위해 투입된 비용, 지출 즉시 청구 O\n- 유익비(제2항): 임차물 객관적 가치 증가 현존하여야, 임대차 종료시 청구. 임대인이 그 지출액·증가액 중 선택하여 상환. '유익비'는 물건 가치를 '객관적'으로 증가시켜야, 임차인의 주관적 이익이나 특정 영업 위한 목적 지출 비용은 X [2005다52719]\n- 비용상환청구권은 목적물에 관하여 생긴 채권이므로 **유치권 O** → 다만 유익비는 법원이 상환기간 허여할 수 있고 허여하면 변제기 미도래로 유치권 소멸\n- 필요비상환의무와 차임지급의무는 동시이행관계: 임차인은 지출한 필요비 금액 한도에서 차임지급 거절 O [2016다227694]\n- 임차인이 목적물 반환하고 6월 내 청구해야(제654조, 제617조)\n- 임의규정 → 원상복구특약으로 임차인이 미리 포기 O [통판]\n\n**부속물매수청구권(제646조)**\n- 요건: ① 건물 기타 공작물의 임차인, ② 사용의 편익을 위하여, ③ 임대인의 동의 얻거나 임대인으로부터 매수, ④ 부속물, ⑤ 임대차 종료\n- 부속물: 임차인 소유이고 구성부분으로는 되지 않은 것으로서 건물 사용에 객관적 편익 가져오는 물건. 오로지 임차인의 특수목적 사용 위해 부속된 것이면 X [93다25738]\n- 건물의 수선, 증·개축 부분은 특별한 사정 없는 한 건물자체의 구성부분 → 부속물매수청구권 대상 X, 유익비상환으로 [80다589]\n- 임차인의 채무불이행으로 해지된 경우는 부속물매수청구 X [88다카7245]\n- 효과: 형성권 → 매매 유사 법률관계 성립. 부속물 매수대금채권으로 유치권 X\n  매수대금은 행사 당시 부속물의 시가. 행사 여부는 임차인 자유이므로 철거권 O (제654조, 제615조) / 편면적 강행규정(제652조)\n- 목적물반환의무와 부속물매매대금지급의무는 동시이행관계 → 부속물매수청구 후 임대인의 상계로 부속물매매대금채권이 상계적상일로 소급 소멸하더라도 동시이행관계가 상계적상 시점으로 소급 소멸하는 것은 X [2024다317332]\n\n**지상물매수청구권(제643조, 제283조)**\n- 요건: ① 토지 임차인(건물 기타 공작물의 소유, 식목·채염·목축 목적), ② 임대차 기간 만료, ③ 지상시설 현존, ④ 임대인이 갱신청구 거절(지매청은 2차적 청구)\n- 매수대상: 무허가건물 O, 기존건물·신축건물 O, 건물 객관적 경제적 가치 여부도 불문, 임대인에게 소용 있는지도 불문 O [2001다42080]",["§626","§646","§643"],0,"임대차"],
  ["채권각론_C040","지상물매수청구권 (제643조) — 요건·상대방·효과 상세","**요건**: ① 토지 임차인(건물 기타 공작물의 소유, 식목·채염·목축 목적), ② 임대차 기간 만료, ③ 지상시설 현존, ④ 임대인이 갱신청구 거절 (지매청은 2차적 청구)\n- 지상물매수청구권은 지상물 소유자에 한하여 행사 O [93다6386] → 건물의 '양도인'은 더 이상 행사 X\n- 임차인의 채무불이행으로 임대차계약 해지된 경우 지상물매수청구권 X [93다44104]\n- 종전 임차인으로부터 미등기 무허가건물을 매수하여 점유하고 있는 '임차인'은 임대인에 대하여 지상물매수청구 O ∵ 행정관청 허가 받은 적법한 건물 아니어도 O, 건물을 점유하는 미등기 매수인은 점유 중인 건물에 대하여 법률상·사실상 처분권 O [2013다48364]\n- 임대 토지 외에 임차인·제3자 소유 토지 위에 걸쳐서 건립된 경우, 임차지 상 건물 중 구분소유 객체 될 수 있는 부분에 한하여 매수청구권 허용 [93다42634]\n\n**행사 상대방**: 원칙적으로 임차권 소멸 당시 토지 소유자인 임대인\n- 임차권 소멸 후 임대인이 토지를 제3자에게 양도하여 소유권 이전되면, 건물에 등기 마쳐 제3자에게 대항할 수 있는 차지권을 가지는 토지임차인은 신 소유자에 대하여 매수청구권 O [75다348, 93다59717, 96다14517]\n- 토지 소유자 아닌 제3자가 토지 임대한 경우 임대인은 특별한 사정 없는 한 지상물매수청구권의 상대방이 될 수 X [2014다72449, 2020다254228]\n\n**매수가격**: 청구권 행사 당시 건물 현존 상태로 평가된 시가 상당액. 근저당권 설정된 경우도 채권최고액·피담보채무액 공제 X [2007다4356]\n\n**효과**: 형성권 → 매매 유사 법률관계 성립\n- 매수청구권 행사 후 임차인은 건물매수대금 받을 때까지 건물 인도 거부 O. 그러나 지상건물 점유·사용으로 부지 계속 점유·사용하는 한 부지 차임 상당의 부당이득 반환의무 O [99다60535]\n\n**편면적 강행규정(제652조)**: 그러나 실질적으로 임차인에게 불리하지 않은 특별한 사정 있다면 강행규정 위반 아님 [96다45443]\n\n- 643조는 건물 소유 목적 토지 전세권에도 유추적용 O [2005다41740]",["§643","§283","§652"],0,"임대차"],
  ["채권각론_C041","임차인의 의무 — 차임지급·사용수익·임차물 반환·원상회복","**차임지급의무**\n- 일부 멸실과 감액청구(제627조), 차임증감청구권(제628조), 차임 지급시기(제633조), 공동임차인의 연대의무(제654조, 제616조), 임대인의 법정담보물권(제649, 650조)\n\n**차임연체와 해지(제640, 제641조)**: 차임 연체 2기 차임액 달하면 임대인 해지권\n- ⓐ 건물 기타 공작물의 임대차 / ⓑ 토지의 임대차 / 강행규정(652조), 주임법에도 적용\n- 해지하면서 상당기간 최고는 불요\n- 임대인 지위가 승계된 경우 이미 발생한 연체차임채권은 따로 채권양도 요건 갖추지 않는 한 승계 X → 승계 이후의 연체차임액으로 달하여야만 비로소 임대차계약 해지 O, 승계 이전의 차임연체 이유로 해지 X [2008다3022]\n\n**사용·수익상의 의무**\n- 계약·성질에 따라 정해진 용법에 따른 사용·수익의무(제654조, 610조)\n- 임차물 보존에 따른 선관의무·통지의무·인용의무(제374조, 제634조, 제624, 625조)\n\n**임차물 반환의무와 원상회복의무**\n- 임차물 반환시 원상회복의무, 부속물 철거 권리(제654조, 제615조)\n- 654조·615조 원상회복의무는, 임차인이 목적물 현상 변경했다면 원칙적으로 변경 부분 철거 등 임대 당시의 상태로 → 그러나 토지 임대 당시 이미 종전 임차인 등이 설치한 가건물 기타 공작물 있었다면 자신이 임차할 당시 상태로 반환 O, 종전 임차인 등이 설치한 부분까지 원상회복할 의무 X [2023다249661]",["§627","§628","§640","§641","§615"],0,"임대차"],
  ["채권각론_C042","임차권 양도 및 임차물 전대 — 제한·무단양도·적법한 양도 (제629조)","**임차권 양도, 전대의 제한(제629조)**: 동의 없었다면 임대인 해지권\n- 629조는 배신적 행위에 대한 임대인 해지권 부여 취지 → 임차인의 행위가 배신적 행위라 인정할 수 없는 특별한 사정이 있다면 해지권 X [92다45308]\n- 건물 소유 목적 토지임차인이 지상건물에 대하여 제3자에게 양도담보 조로 소유권이전등기 마쳐준 경우 건물 부지 '임차권의 양도나 전대' X [94다46428]\n- 임대차보증금반환채권의 양도는 별개 문제이며 동의 불필요\n- 임차권 양도인은 임대인으로부터 동의를 받아줄 의무 부담하며, 불이행하면 양수인은 담보책임 규정으로 해제·손해배상청구 O [2001다16418]\n\n**임차권 무단양도, 무단전대**\n- 임차인 B와 양수인(전차인) C 사이의 계약은 유효, 임차인은 임대인 동의 받아줄 의무 有\n- 임대인 A와 양수인(전차인) C: A가 B와 임대차계약 해지하지 않았더라도, C의 점유는 A에 대해 불법점유로서 A는 물권적 청구권(213, 214조) O\n- 임대차계약이 해지·종료되지 않는 한 임대인은 제3자에 대해 차임 상당 손해배상 X, 부당이득반환 X ∵ 임차인에 대해 여전히 차임청구권 [2006다10323]\n- 임대차계약 종료 이후에는 임대인은 제3자에 대해 차임 상당 손해배상청구 O, 부당이득반환청구 O [2022다296165]\n\n**적법한 임차권 양도(임대인 동의)**\n- 임차인의 연체차임·손해배상채무나 임대차보증금반환채권이 양수인에게 당연히 승계·이전되지는 X\n- 임차권 양도 시 보증금반환채권은 신 임차인에 이전 X. 설령 신 임차인에게 양도한 경우에도 그 이전에 가압류·압류되었다면 위 합의·양도는 압류권자에게 대항 X [96다17202]",["§629","§630","§631"],0,"임대차"],
  ["채권각론_C043","임차물 전대 (제630조) — 전차인의 의무·전차인 보호 특별규정","**제1항**: 전차인은 직접 임대인에 대하여 의무 부담, 전대인에 대한 차임 지급으로써 임대인에게 대항 X\n**제2항**: 임대인의 임차인에 대한 권리 행사에 영향 無\n\n**임대인 A와 전차인 C의 관계**\n- 전차인은 임대인에 대하여 직접 의무 부담 ex. 차임지급, 목적물 보존 및 반환 → 다만 임대차계약상의 의무를 한도로\n- 대항할 수 없는 차임의 범위는 전대차계약상의 차임지급시기를 기준으로 그 전에 전대인에게 지급한 차임에 한정, 그 이후에 지급한 차임은 임대인에게 대항 O [2006다45459]\n- 전대차계약상의 차임지급시기 전에 전대인에게 지급했더라도, 임대인의 차임청구 전에 차임지급시기 도달했다면 임대인에게 대항 O [2018다200518]\n- 전차인이 임대인에 대하여 권리 주장 X ex. 비용상환청구권 X, 수선청구권 X\n\n**전차인 보호 특별규정**\n- 합의해지로 전차인 권리 소멸하지 않고(제631조)\n- 임대차가 해지통고로 종료된 경우 전차인에게 통지해야 일정 기간 후 효력 생기고(제638조)\n  단, 임차인의 차임연체액이 2기로 640조 '해지'할 경우는 전차인에게 통지 않더라도 해지로 대항 O [2012다55860]\n- 임대청구권·지상물매수청구권(제644조), 부속물매수청구권(제647조) 규정",["§630","§631","§638"],0,"임대차"],
  ["채권각론_C044","보증금 — 당연공제·소멸시효·동시이행관계","**임대차보증금에서 당연공제되는 것**: 의무위반 **손**해배상채무, **연**체차임, 차임 상당 **부**당이득, **소**송비용, **원**상복구비용\n\n**당연공제의 시기**\n- 임대차관계 계속되는 동안에는 연체차임 등의 임대차보증금 충당 여부 자유로이 선택, 임대차 종료 전에는 별도의 의사표시 없이 당연 공제는 X [2011다49608]\n- 연체차임 등 피담보채무 상당액은 임대차가 종료하여 목적물 반환될 때에 특별한 사정이 없는 한 별도의 의사표시 없이 보증금에서 당연 공제 O [99다50729, 2013다77225]\n- 임대차계약이 종료되었다 하더라도 목적물이 인도되지 않았다면 임차인은 보증금이 있음을 이유로 연체차임 지급을 거절할 수 X [99다24881]\n\n**소멸시효**\n- 임대차 존속 중 차임채권의 소멸시효 완성된 경우, 시효 완성 전 임대인이 임대차보증금반환채무에 관한 기한의 이익을 실제 포기했다는 특별한 사정 없는 한 상계적상 X → 다만 임대인·임차인의 신뢰·묵시적 의사 감안하면, 이미 시효 소멸한 연체차임도 495조 유추적용 O, 보증금에서 공제 O [2016다211309, 2024다302217]\n- 임대차 종료 후 임차인이 보증금반환받기 위해 목적물 점유하면 보증금반환채권 권리행사 O, 소멸시효 진행 X → 임차인이 점유하지 않거나 동시이행항변권 상실하면 소멸시효 진행 O [2016다244224]\n\n**동시이행관계(大判全合)**\n- '임차인의 목적물반환의무와 임대인의 보증금 중 연체차임 등 당해 임대차에 관하여 인도시까지 생긴 임차인의 모든 채무를 공제한 나머지를 반환할 의무는 동시이행 O' [77다1241]\n\n**전부명령·압류와 당연공제**\n- 임차보증금반환채권에 대한 전부명령이 있더라도 임대차 종료 후 명도시에 연체차임 등 임차인의 모든 피담보채무를 공제한 잔액에 관하여만 전부명령 유효 [87다카1315]\n- 차임채권에 대한 압류 및 추심명령 있더라도 임대차계약 종료되어 목적물 반환될 때는 그때까지 추심되지 않고 잔존한 차임채권 상당액도 임대차보증금에서 당연히 공제 O [2004다56554]",["§618"],0,"임대차"],
  ["채권각론_C045","임대차 해지사유 + 임대인 지위 양도","**법정 해지사유**\n- 임차인 의사反 임대인 보존행위(제625조)\n- 임차인 과실 없이 일부 멸실되고 잔존부분으로 임차 목적 달성 불가(제627조 제2항)\n- 무단 양도·전대(제629조 제2항)\n- 차임연체 2기 이상(제640, 641조)\n\n**임대인 지위 양도**\n- 임대인과 신 소유자의 계약만으로 임대인 지위 양도 O ∵ 임대인이 누구인지는 이행방법 특별히 다르지 않음 → 그러나 이 경우 임차인이 원하지 않으면 임대차의 승계 강요 X → 공평·신의칙에 따라 임차인이 곧 이의 제기함으로써 승계되는 임대차관계 구속을 면할 수 O, 임대차약 해지 O [98마100]",["§625","§627","§629","§640"],0,"임대차"],
  ["채권각론_C046","주택임대차보호법 — 적용범위","**적용 O**: 주택 일부가 주거 외, 주택 일부에서 영업, 미등기 주택\n**적용 X**: 비주거용 건물 일부를 주거 목적 사용, 사용대차\n\n- 기존 채권 우선변제 목적으로 주택임대차계약의 형식을 빌려 대항력 취득한 것처럼 외관 만들었을 뿐 실제 주택을 주거용으로 사용·수익할 목적 없었다면 → 주택임대차계약은 통정허위표시 무효, 주임법상 대항력 X [2000다24184]\n- 주택의 소유자가 아니어도 적법한 임대권한 있으면 주임법 O [2007다38908]\n- 주택에 대한 부동산담보신탁약정 체결한 경우 임대권한은 수탁자에게 있지만, 위탁자가 수탁자 동의 없이 임대차계약 체결한 후 수탁자로부터 소유권을 회복했다면 주임법 적용 O [2018다44879]",["§주임법3"],0,"주임법"],
  ["채권각론_C047","주임법 대항력 취득 — 인도·주민등록 (주임법 제3조 제1항)","**취득 요건**: 인도 + 주민등록(전입신고) → '다음 날' 0시부터 대항력\n- 주택의 인도: 현실인도·간이인도·점유개정·목반청양도\n\n**존속요건**: 인도·주민등록은 대항력 유지를 위해 존속해야\n- 임차인이 대항력 취득했어도 **주택 점유 상실 시 대항력 소멸**, 그 후 임차권등기명령 따른 임차권등기 마치더라도 대항력 소급 부활 X, 임차권등기 시에 그것과 동일성 없는 새로운 대항력 발생 O [2024다326398]\n\n**주민등록 유효성 판례**\n- 배우자 명의로 전입신고해도 대항력 O [88다카143]\n- 가족 주민등록은 그대로 두고 임차인만 일시 다른 곳으로 옮겼다면 대항력 유지 O ∵ '전체적으로나 종국적으로 주민등록 이탈 X' [88다카143]\n- 연립주택·아파트는 동 호수 표시 없거나 잘못 표시하고 지번만 기재한 것은 X [95다48421]\n- 다가구용 단독주택은 지번만 기재한 전입신고 O [97다47828]\n- 애초 다가구용 단독주택으로 소보등 마친 건물 일부 임차한 임차인이 지번만 기재하여 전입신고 O → 그 후 다세대 주택으로 변경되어도 이미 취득한 대항력 상실되지 X [2006다70516]\n- 귀책사유 없이 제3자에 의하여 임의 이전된 경우, 직권 말소되고 이의절차에 따라 회복된 경우 → 대항력 소급 유지, 다만 선의의 제3자에게 주장 X [2002다20957]\n- 일시 퇴거했다가 다시 전입한 경우 저당권자에게 대항 X [97da43468]\n\n**주민등록 공시기능 요건**: '주민등록에 의해 표상되는 점유관계가 임차권을 매개로 하는 점유임을 제3자가 인식할 수 있는 정도' 되어야\n- 甲이 자기 명의 소이등·전입신고 마치고 거주하던 주택을 乙에게 매도함과 동시에 임차하여 계속 거주 → 乙 명의 소이등 경료일 이후 대항력 O [98다32939]\n- 대항력 갖춘 임차인이 해당 주택을 양수하여 소유권이전등기 마친 후에는 그 주민등록이 유효한 대항력 공시방법 X, 소유권 취득 시 대항력 소멸 [2025다213466]",["§주임법3"],0,"주임법"],
  ["채권각론_C048","주임법 — 임대인 지위 승계 (주임법 제3조 제4항)","**임차주택의 양수인은 임대인 지위 승계**\n- 임대차보증금반환채무도 주택 소유권과 결합하여 일체로서 양수인에게 이전 O, 양도인의 임대인 지위나 보증금반환채무 소멸 O [95다35616]\n- 질권설정 승낙 후 주택이 양도된 경우에도 임대인은 주임법 3조 4항에 의해 임대차관계에서 탈퇴, 보증금반환채무를 면함 [2018다201610]\n\n**요건**: 임차인이 '대항력 갖추고 있음'이 요건\n- 경매절차에서 경락인의 소유권 취득 전에 임차인이 전출함으로써 대항력을 상실했다면 경락인은 임대인 지위 승계 X, 임대인이 보증금반환의무 O [2020다276914]\n\n**양수인의 범위**: 증여·경매·상속·공용징수 등으로 임차주택 소유권 취득한 자 O. 그러나 양도담보권자 X ∵ '주택 소유권이 확정적·종국적으로 이전되지 X' [93다4083]\n\n**공동임차인**: 공동임차인 중 1인이라도 대항력 요건 갖추면 임대차 전체에 대항력 O → 임차건물 양도되면 공동임대인에 대한 보증금반환채무 전부가 양수인에게 이전 O [2021다238650]\n\n**특수 사안**\n- 매매계약 해제로 소유권 회복한 매도인도 주임법 3조 4항에 의해 임대인 지위 승계 O [2003da12717]\n- 계약명의신탁에서 수탁자로부터 임차하여 대항력 갖춘 임차인은 실명법 4조 3항의 제3자 O → 신탁자가 주임법 3조 4항에 따라 임대인 지위 승계 O [2021다210720]\n- 전부명령 확정으로 임대차보증금반환채권이 이전된 후 임대인이 주택 매도하면 주임법 3조 4항에 의해 전부채권자에 대한 보증금지급의무 면하게 됨 [2005다23773]",["§주임법3"],0,"주임법"],
  ["채권각론_C049","보증금반환채권 가압류와 임대인 지위 승계 [大判全合] · 면책적 채무인수","**가압류된 보증금반환채권과 임대인 지위 양도**\n- '임대차보증금반환채권이 가압류되면 제3채무자의 지위는 임대인의 지위와 분리 X' → 임대주택 양도로 임대인 지위가 일체로 양수인에게 이전되면 채권가압류의 제3채무자 지위도 임대인 지위와 함께 이전 O, 가압류권자도 주택의 양도인이 아니라 양수인에 대하여만 가압류 효력 주장 O ∵ 임대차보증금 우선변제는 주택의 매각대금으로 [2011다49523, 大判全合]\n- 反대의견: 양수인이 임차인에게 보증금을 반환한 경우 이중지급 위험 우려. 補충의견: 채권의 준점유자(470조) 법리로 보호 가능\n\n**매수인의 보증금반환채무 인수 — 면책적 채무인수 신중**\n- 매수인이 목적물에 관한 임대차보증금반환채무를 인수하며 그 채무액을 매매대금에서 공제하기로 약정한 경우, 특별한 사정 없는 이상 면책적 채무인수 X ∵ 면책적 채무인수는 병존적 채무인수나 이행인수와 달리 기존 채무자 면책되므로 인정에 신중해야 → 설령 매도인·매수인 사이 보증금반환채무 면책적 인수 약정 있었더라도 효력이 생기려면 채권자인 임차인의 명시적·묵시적 승낙 있어야 → 보증금반환채무 회수 가능성 등이 의문시되는 상황이면 임차인의 어떤 행위를 묵시적 승낙으로 쉽게 단정 X [2024다215542]\n\n**임차인의 이의제기로 승계 면제**\n- 임차 주택의 양수인에게 대항할 수 있는 임차권자라도 스스로 임대차관계 승계 원하지 않을 때는 승계되는 임대차관계 구속 면할 수 O. 임대차기간 만료 전 경매될 경우 임대차계약 해지·종료시켜 우선변제청구 O, 해지통고 즉시 효력 O(∵ 공평, 신의칙) or 임차인이 임차주택 양도 안 때로부터 상당 기간 내 이의 제기함으로써 → 이때 양도인의 보증금반환채무 소멸 X [94다37646, 2001다64615, 2021다251929]",["§주임법3"],0,"주임법"],
  ["채권각론_C050","보증금 회수 — 서설·우선변제권 (주임법 제3조의2)","**보증금 회수 방법**: ① 임대인 상대로 임대차보증금반환청구의 소 제기, ② 임차주택에 경매 개시될 경우 우선변제권 행사(배당요구 채권)\n→ 주택임차인은 경매신청권 X → 위 ①로서 집행권원 취득해야. 강제경매 신청할 경우 반대급부 이행 제공은 집행개시 요건 X(주임법 3조의2 1항): 주택의 인도 없이도 강제경매 신청 O\n\n**우선변제권(주임법 제3조의2 제2항)**: 대항력 + 확정일자 → 임차주택 + 대지 포함 환가대금에서 우선변제 O\n- 인도·주민등록 마친 당일 또는 그 전에 확정일자 갖춘 경우라면 인도·주민등록을 마친 '다음 날' 0시가 우선변제권 기준일 [98다26002]\n- 인도·주민등록보다 확정일자가 뒤이면 확정일자 부여일이 기준일\n- 지위 강화 방편으로 따로 전세권설정계약서 작성하고 등기관 접수인 찍혀있다면 임대차계약증서에 확정일자 있는 것 O [2001다51725]\n- 우선변제권 인정 위해 계약 당시 임차보증금 전액 지급 불필요 → 일부를 나중에 지급했더라도 대항요건 및 확정일자 갖춘 때를 기준으로 우선변제권 O [2017다212194]\n\n**행사 범위**\n- 임차주택 인도하지 않으면 보증금 받을 수 X (3조의2 3항): 동시이행. 그러나 경매신청할 때 주택의 인도가 집행개시 요건은 X (1항)\n- 주택임차인은 배당요구 채권자 → 배당요구 종기까지 배당요구하지 않으면 추후 부당이득반환청구 X → 그러나 스스로 경매신청하면 우선변제권 선택·행사한 것으로서 별도 배당요구 불필요 [2013다27831]\n- 임차권과 분리해서 보증금반환채권만 양수한 채권양수인은 우선변제권 X [2010다10276]\n- 대항요건·확정일자 갖춘 주택임차인은 우선변제권 있으나 선순위 가압류채권자와는 평등배당 관계 [92다30597]\n- 대항요건·확정일자 갖춘 임차인·소액임차인은 임차주택과 별도로 대지만이 경매될 경우도 대지 환가대금에 우선변제권 O [2004다26133]\n- 우선변제권 선택하여 배당요구 했으나 순위 늦어 보증금 전액 배당받지 못했다면 나머지 반환받을 때까지 경락인에게 대항하여 임대차관계의 존속 주장 O [98다2754]\n- 주임법 3조의2 7항의 금융기관이 임차인으로부터 보증금반환채권을 계약으로 양수하면 양수금액 범위의 우선변제권 승계, 대항력 존속하는 한 보증금 잔액 받을 때까지 양수인이 주택 양수인 상대로 임대차관계 존속 주장 O [2022다255126]",["§주임법3"],0,"주임법"],
  ["채권각론_C051","임차권등기명령 (주임법 제3조의3) · 보증금 중 일정액의 보호 (주임법 제8조)","**임차권등기명령(주임법 제3조의3)**: 이사갈 경우 인도 요건 상실 막고자 임차주택 소재지 관할 법원에 임차권등기명령 신청 → 퇴거해도 대항력·우선변제권 유지\n- 임차권등기명령에 따른 임차권등기가 첫 경매개시결정기입등기 전에 경료된 임차인은 배당요구 불필요(집행법 148조 4호 참조)\n- 임차권등기명령에 의한 등기는 이미 이행지체에 빠진 임대인에 대한 것으로서 보증금반환의무가 임차권등기 말소의무보다 선이행의무 [2005다4529]\n- 임차권등기 마쳐진 주택을 그 후 임차한 임차인도 소액보증금 최우선변제권을 제외한 대항력·우선변제권 O ∵ 주임법 3조의3 6항은 '임차권등기명령 집행 따른 임차권등기 끝난 주택을 그 후 임차한 임차인은 8조 우선변제권이 없다'고 규정하는데 8조는 소액보증금 최우선변제 규정, 대항력·우선변제권 규정에는 선순위 임차권 내지 임차권등기 존재를 소극적 요건으로 정하고 있지 않음 [2022다246610]\n- 주택임차인은 임차권등기명령 신청비용 및 임차권등기비용을 임대인에 대하여 민사소송으로 청구하거나 상계 자동채권으로 행사 O ∵ 3조의3 3항·8항에 불구하고 비용청구의 방법·절차에 관한 별도 규정 없으므로 [2024다221455]\n\n**보증금 중 일정액의 보호(주임법 제8조)**\n- 요건: ① 보증금이 일정액 이하일 것(시행령 11조: 서울시 1억 6,500만원 등), ② 주택의 '경매신청 등기 전'에 대항력 갖출 것(=경매개시결정등기 의미), ③ '배당요구의 종기'까지 대항력 계속 존속할 것, 배당요구시까지는 X ∵ 등기된 담보물권자보다 우선하는 점, 공시방법 불안정, 배당요구에 의하는 점, 새로운 임차인 등장 혼란 [95다44597]\n- 효과: 주택(대지 포함) 가액의 1/2 한도로 서울시 5,500만원 등 이하로 최우선변제권 O (시행령 10조)\n- [大判全合] 3조의2, 8조 우선변제권은 미등기 주택에도 적용 O → 8조 1항 '주택에 대한 경매신청의 등기 전'은 대항요건 구비시기의 제한일 뿐, 반드시 임차주택과 대지 함께 경매하여 주택에 경매신청 등기되어야 한다는 의미 X → 미등기 주택이라도 '대지'에 대한 경매신청 등기 전에 대항요건을 갖추면 충분 [2004다26133]\n- 대지에 저당권 설정 후 주택 신축하여 임대차 이뤄진 경우 '대지' 환가대금에서 우선변제 X, 대지의 저당권 설정 당시에 이미 지상 주택이 존재할 것 요함 ∵ 저당권자 예측할 수 없는 손해 [99다25532]\n- 소액보증금반환청구권은 법정담보물권, 대지·건물 모두로부터 배당받아 공동저당권자와 유사한 지위 ∴ 대지·건물 동시 배당시 368조 1항 유추적용으로 경매대가에 비례 [2001다66291]\n- 대항요건·확정일자 갖추고 소액임차인 지위도 가지면 먼저 소액임차인으로서 일정액 배당받고 나머지 임차보증금채권액은 확정일자 갖춘 순위에 따라 [2007다45562]\n- 주된 목적이 주택 사용·수익인 이상 임대차계약 체결 당시 소액임차인 해당하지 않았더라도 그 후 새로운 계약으로 정당하게 보증금 감액하여 소액임차인 해당하게 되었다면 보호 [2007다23203]",["§주임법3","§주임법8"],0,"주임법"],
  ["채권각론_C052","주임법 — 존속기간·묵시적 갱신·갱신요구권 (제4조·제6조·제6조의3)","**최단존속기간(주임법 제4조 제1항)**: 2년 (≠ 상임법 1년, 민법 건물전세권 1년)\n- 편면적 강행규정 → 단서: 임차인은 2년 미만 주장 O\n\n**임대차 종료와 대항력 존속 의제(주임법 제4조 제2항)**\n\n**묵시적 갱신(주임법 제6조, 제6조의2)**: 임대인 또는 임차인이 임대차 종료하기 6월 전부터 2월 전까지 기간에 갱신거절이나 변경 않으면 갱신 없다는 통지 안 하면 동일 조건 다시 임대차 간주(단, 2기 이상 차임 연체하거나 임차인 의무 현저 위반하면 묵시적 갱신 X) → 묵시 갱신되면 존속기간은 2년 (≠ 민법: 기간 약정 없는 것) → 다만 임차인은 언제든 해지 통지 O, 임대인이 통지 받은 후 3개월 경과되면 효력\n\n**갱신요구권(주임법 제6조의3)**\n- 임차인이 1회에 한하여 임대차 종료 6월 전부터 2월 전까지의 기간에 갱신을 요구하면 임대인은 정당한 사유 없이 거절할 수 없음 → 동일 조건 다시 계약 간주, 다만 존속기간은 최단기간 2년 → 갱신요구 후에도 임차인은 언제든지 해지 통지 가능, 통지 받은 후 3개월 경과되면 효력\n- **갱신요구권 부정 사유(제1항 단서)**: ① 2기 차임액 연체, ② 거짓·기타 부정한 방법으로 임차, ③ 합의하여 상당한 보상 제공, ④ 전부·일부의 무단전대, ⑤ 고의·중과실 파손, ⑥ 임차주택 멸실로 임대차 목적 달성 불능, ⑦ 임대인이 임대차계약 체결 당시 공사시기·기간 등 포함한 철거·재건축 계획을 임차인에게 구체적 고지했거나 건물 노후·훼손 등 안전사고 우려가 있거나 다른 법령에 따라 철거·재건축 이뤄질 경우로서 주택의 전부·대부분을 철거·재건축하기 위해 주택의 점유 회복 필요한 경우, ⑧ 임대인(직계존속·직계비속 포함)이 주택에 실제 거주하려는 경우, ⑨ 기타 임차인 의무 현저 위반이나 임대차 계속하기 어려운 중대한 사유 있는 경우\n- 임대인이 8호(임대인 등 거주)로 거절했으나 정당한 사유 없이 제3자에게 임대한 경우 임차인에 대해 갱신거절로 인한 손해배상 → '거절 당시 환산월차임 3개월분', '제3자에게 임대하여 얻은 환산월차임과 갱신거절 당시 환산월차임 간 차액의 2년분', '갱신거절로 임차인이 입은 손해' 중 가장 큰 금액(제5·6항)\n- 갱신요구권 행사로 갱신될 경우도 차임·보증금은 제7조 제한(1년, 5%) 받음\n- 부칙: 개정법 시행 당시 존속 중인 임대차에도 적용 O. 다만 개정법 시행 전에 임대인이 갱신 거절하고 제3자와 임대차계약 체결한 경우는 적용 X\n\n**갱신요구권 행사 효력**\n- 6조의3 4항이 준용하는 6조의2(묵시갱신) 1항에 따라 임차인이 계약갱신 요구하면 갱신거절사유 없는 한 갱신요구 도달 시에 갱신 효력 발생하고, 갱신 효력 발생 후 임차인은 언제든지 해지통지 O, 그로부터 3개월 지나면 효력 발생 → 계약해지 통지가 갱신된 임대차계약 기간 개시 전에 임대인에게 도달했더라도 마찬가지 [2023다258672]",["§주임법4","§주임법6"],0,"주임법"],
  ["채권각론_C053","주임법 갱신요구권 — 부칙 적용 + 8호 실제거주 사유 판단","**부칙 적용**\n- 2020. 7. 31. 신설된 6조의3(갱신요구권) 부칙 2조 1항은 개정법 시행 당시 존속 중인 임대차에도 적용 O → 8.15. 종료되는 임대차계약도 개정법 적용 O → 그러나 6조 1항 전단의 기간, 즉 임대차기간 끝나기 6개월 전부터 1개월 전까지 기간 이내에 계약갱신 요구해야 [2021다263229]\n- 2020. 7. 31. 개정 신설된 6조의3 갱신요구권 및 거절사유 취지는 임차인 주거생활 안정 위한 갱신요구권 보장과 동시에 임대인 재산권 보호 조화 → 임대인이 8호 임대인(직계존·비속 포함) 실제 거주 의사 증명책임 있고, 단순한 의사 표명한 사정으로 바로 인정은 X, 내심의 장래 계획이란 특성상 통상 진정성을 수긍할 사정으로 존재 추인 O → 임대인 주거상황, 임대인·가족의 직장·학교, 실제 거주 의사 경위, 갱신요구 거절 전후 임대인 사정, 실제 거주 의사와 배치·모순되는 언동 유무, 이사 준비 유무·내용 등 여러 사정 종합 [2022다279795]\n- 주임법 3조 4항으로 임대인 지위 승계한 '주택 양수인'도 주택에 실제 거주하려는 경우에는 임차인의 갱신요구에 대해 6조 1항 기간 내에 8호 사유로 갱신 거절 O [2021다266631]\n\n**차임·보증금 증액 제한(주임법 제7조)**: 1/20, 1년 이내\n- 차임 등 증액 제한 규정은 임대차계약 '존속 중'에 '일방'이 청구한 경우만 적용 O, '임대차 종료 후 재계약' 혹은 '합의로 증액'할 경우에는 위 규정 적용 X, 1/20 초과 증액 가능 [93다30532]\n- 위 판결 당시 주임법 7조는 '존속 중 일방이 청구'할 때만 적용되었지만, 최근 개정으로 갱신요구권 행사 시에도 적용됨을 유의\n\n- 2기 이상 연체 → 해지권(민법 적용), 주택임차권의 승계(주임법 제9조)",["§주임법6","§주임법7"],0,"주임법"],
  ["채권각론_C054","상가건물임대차보호법 — 적용범위·대항력·우선변제권·존속기간(의제)","**적용범위**: 대통령령으로 정하는 보증금액을 초과하면 상임법 적용 X (상임법 제2조 제1항 단서, 시행령 제2조 → 2019.4. 개정): 서울시 9억, 과밀억제 6.9억, 광역시 등 5.4억, 그 밖 3.7억 (시행 이후 체결·갱신되는 계약부터 적용)\n환산보증금 = 보증금액 + (차임 × 100)\n- 그러나 보증금액 초과하더라도 상임법 규정 중 **대항력**(3조), **권리금**(10조의3~7), **차임연체 해지**(10조의8), **갱신요구권**(10조 1~3항)은 모든 상가임대차 적용 O\n- 따라서 상임법 규정 중 우선변제권(5조), 임차권등기명령(6조), 최단기간(9조), 묵시갱신·해지통고(10조 4, 5항), 차임증감청구권(11조), 일정액 보호(14조)는 일정 금액 이하의 상가임대차에만 적용 O\n- 사업자등록신청서에 첨부한 임대차계약서·등록사항현황서에 기재되어 공시된 임대차보증금 및 차임에 따라 환산된 보증금액이 구 상임법 적용대상 되기 위한 보증금액 한도 초과하는 경우는, 실제 임대차계약의 내용에 따라 환산된 보증금액이 기준을 충족하더라도 구 상임법상 대항력 주장 X [2013다215676]\n- 상임법 적용 상가건물은 사업자등록 대상 건물, 목적 건물을 영업용으로 사용하는 임대차, 독립 부동산 건물은 토지 정착물로서 최소 기둥·지붕·주벽 있어야 → 토지로부터 쉽게 분리되거나 기둥·지붕·주벽 없다면 건물 X → 요건을 못 갖춘 구조물은 토지 정착물인 건물이 아닌 동산 → 상임법 적용 X [2024다293016]\n\n**대항력, 우선변제권, 존속기간(의제)**\n- 대항력: 인도 + 사업자등록신청 '다음 날' 0시, 임대인 지위 승계\n- 사업자등록은 존속요건이므로 배당요구 종기까지 갖추어야 하며, 휴업하거나 전대차 등으로 사실상 폐업을 하게 되면 대항력 X [2005다64002]\n- 상가건물 대항력·우선변제권 취득 이후 건물이 양도되었는데, 임차인이 새로운 소유자와 종전 임대차계약의 효력을 소멸시키고 새로운 임대차계약을 체결했다면 종전 임대차계약으로 발생했던 대항력·우선변제권도 함께 소멸 [2013다211919]\n- 우선변제권: 대항력 + 확정일자 / 임차상가 + '임대인 소유' 대지 환가대금에서\n- 최단기간(제9조 제1항): 1년 / 종료해도 보증금 반환받을 때까지 존속 의제(제2항)\n- 상임법 적용되는 임대차 종료하고 보증금 반환받을 때까지 목적물 계속 점유·사용·수익한 임차인은 종전 임대차계약의 차임 지급의무 부담할 뿐, 시가에 따른 차임 상당 부당이득반환의무 X ∵ 9조 2항 입법취지(보증금반환 실질 보장), 종료 후 의제되는 임대차관계의 법적 성격 [2023다257600]",["§상임법2","§상임법3","§상임법9"],0,"상임법"],
  ["채권각론_C055","상임법 — 갱신요구권·묵시의 갱신 (제10조)","**갱신요구권(상임법 제10조 제1~3항)**\n- 제1항: 상가건물 임차인이 기간 만료 전 6월 전부터 1월 전까지 사이에 계약갱신 요구하면 정당한 사유(1호: 3기 이상 연체, 4호: 무단전대 등) 없는 한 임대인은 거절 불가\n- 제2항: 전체 임대차기간 10년(2018. 10. 개정) 초과 금지\n- 제3항: 전 임대차와 동일한 조건으로 간주, 다만 차임·보증금 증감청구\n\n**주임법·상임법 갱신요구권 차이점**\n① 주임법은 회수 1회 및 기간 2년 제한, 상임법은 전체기간 10년 제한\n② 주임법은 만료 2월 전까지, 상임법은 만료 1월 전까지\n③ 갱신되면 주임법은 2년 보장, 상임법은 기존과 동일한 기간\n④ 갱신 이후 주임법은 묵시적 갱신처럼 임차인이 언제든지 해지 통지, 상임법은 묵시적 갱신과 달리 임차인의 해지 통지 규정 없음\n⑤ 갱신요구권 부정 사유로 주임법은 임대인(직계존비속 포함)의 실제 거주 사유 있으나 상임법은 유사한 규정 없음\n⑥ 주임법은 거짓 갱신거절에 대한 손해배상 규정 있으나 상임법은 없음\n\n- [2020다241017] 개정 상임법 10조 2항 의무임대차기간 10년 적용 X (시행 이전 사안)\n- [2020다255429] 임대기간 중 어느 때든 3기분 달하도록 차임 연체된 사실 있다면 임대인은 임차인의 갱신요구 거절 O(10조 1항 1호) ∵ 10조 1항 1호 갱신요구 거절사유는 '3기 차임액 해당 금액 이르도록 차임 연체한 사실 있는 경우'로 규정하여 10조의8 차임연체 계약해지 요건 '차임연체액이 3기 차임액 달하는 때'와 문언 다름, 임차인과의 계약관계 연장 수용할 신뢰 깨짐 → 임차인 갱신요구권 행사 당시에 3기 차임액 연체되어 있어야 하는 것은 X\n- [2021다233730] 상임법 9조 1항(기간 정하지 않으면 1년 간주)은 환산보증금 초과하는 상가임대차에 적용 X(동법 2조 1항 단서) → 보증금 초과하고 임대기간 정하지 않으면 민법 적용 O, 임대인은 언제든지 해지통고 O, 6개월 지나면 효력(민법 635조 1항, 2항 1호) → 이 경우는 10조 1항 갱신요구권 적용 여지 X ∵ 갱신요구권은 임대기간 정해져 있음을 전제로 함\n\n**묵시의 갱신(10조 제4항)**: 임대인이 기간 만료 전 6월 전부터 1월 전까지 사이에 갱신거절이나 변경 않으면 갱신 없다는 통지 안 하면 동일 조건으로 다시 임대차 간주 → 묵시갱신 존속기간은 최단 존속기간(제9조 제1항)인 1년 → 다만 임차인은 언제든지 해지통지(임대인이 통지받고 3개월 경과 효력)\n- [요사] 상가 임차인이 임대기간 만료 1개월 전부터 만료일 사이 갱신거절 통지한 경우에도 묵시적 갱신 X, 임대차기간 만료일에 종료 O. 만료일 6월부터 1월 전까지 사이에 임차인 별다른 조치 없다고 만료 전 1개월 경과로 묵시 갱신 X ∵ 기간 정한 임대차는 기간만료로 종료 원칙, 민법 639조는 만료 후 상당 기간 이의 없어야 하고 만료 전 갱신거절 통지하면 묵시갱신 X, 상임법 10조 1항은 임차인의 갱신요구권 인정할 뿐 임차인의 '갱신거절 통지'는 기간 제한 없음, 4항은 묵시적 갱신 규정하면서 '임대인'의 갱신거절·조건변경 통지기간 제한했을 뿐 '임차인'에 대해서는 기간 제한 규정 없음(≠ 주임법 6조 1항 후문은 '임차인'도 종료 2월 전이라는 갱신거절 통지기간 제한 있는 것과 차이), 규정 없는 이상 상가의 임차인의 갱신거절 통지기간은 제한 없음, 문언해석, 임차인 보호 입법취지 [2023다307024]\n- 묵시의 갱신에는 갱신요구권에서의 10조 2항 5년(현행은 10년) 초과금지 규정이 적용되지 X → 전체 기간 5년 넘어도 묵시 갱신 O [2009다64307]\n\n正辯: 상임법 묵시 갱신은 주임법과 달리 차임 연체 등 의무 위반 임차인 배제 규정 없음",["§상임법9","§상임법10"],0,"상임법"],
  ["채권각론_C056","상임법 — 차임연체와 해지·차임증감청구권 (제10조의8·제11조)","**차임연체와 해지**: 차임 3기 이상 연체하면 임대인 해지권(제10조의8) ≠ 민법·주임법은 2기\n- 해지권 행사 당시 3기 연체 상태 유지되어야 해지 O\n\n**코로나19 특례기간과 법정충당**\n- 상임법 10조의9는 코로나19 여파 임차인 구제하고자 특례기간(2020. 9. 29.부터 6개월 동안)의 연체 차임액을 '계약갱신 거절사유(10조 1항 1호)', '권리금 회수기회 제외사유(10조의4 제1항 단서)', '계약 해지사유(10조의8)'의 연체 차임액에서 제외 → 임차인 변제제공이 연체 전액 미치지 못하면 임차인은 476조 1항 지정충당 O, 임대인의 476조 2항 지정충당은 상임법 10조의9에 반할 경우 적용되지 X, 임차인 변제제공 당시 기준 477조 법정충당 O ∵ 변제충당 규정은 임의규정으로서 상임법 위반하여 임차인에게 불리하면 무효(상임법 15조) → 결국 임차인의 변제제공이 특례기간 포함하여 전후 연체 차임액 전부에 미치지 못하면, 합의충당이나 임차인 지정충당 등 특별한 사정 없는 한, 477조 법정충당에 따라 변제제공 시점에 이행기 도래한 연체차임에 먼저 충당(1호), 그중 상가임대차법 10조의9 특례기간의 연체차임은 임대인의 갱신거절권·해지권 등 권리행사 제한되어 변제이익 적으므로 이행기 도래한 다른 연체차임보다 후순위로 충당(2호) [2022다309337]\n\n**차임증감청구권(제11조)**\n- 상임법 제11조 제1항, 동 시행령 14조 소정의 증액 비율(5%)을 초과하여 지급하기로 한 차임 약정은 증액비율을 초과한 범위 내에서 무효 → 임차인은 초과 지급된 차임에 대하여 부당이득반환청구 O [2013다35115]",["§상임법10","§상임법11"],0,"상임법"],
  ["채권각론_C057","상임법 — 권리금 (제10조의3~제10조의4)","**권리금(제10조의3)**: 임대차 목적물인 상가건물에서 영업을 하는 또는 하려는 자가 영업시설·비품·거래처·신용·노하우·위치에 따른 영업상 이점 등 유·무형의 재산적 가치의 양도 또는 이용대가로서 임대인·임차인에게 보증금·차임 이외에 지급하는 금전 등의 대가\n- 일정기간 이상 임차권 보장 약정하며 임차인이 임대인에게 권리금 지급한 경우 보장기간 이용 유효하게 이뤄진 이상 임대인은 권리금 반환의무 X → 다만 임대인 사정으로 임대차계약 중도 해지됨으로써 당초 보장기간 동안 이용 불가능했던 특별한 사정 있다면 임대인은 권리금반환의무 O → 임대차계약 종료될 때까지 기간 대응 부분 공제한 잔존기간 대응 부분만 반환의무 O [2002다25013]\n\n**권리금 회수기회 보호 등(제10조의4)**\n- 임대인은 임대기간 종료 6개월 전부터 종료 시까지 임차인이 주선한 신규임차인이 되려는 자로부터 권리금 지급받는 것 방해 금지(단, 3기 이상 차임연체 등의 경우에는 예외) → 신규임차인 되려는 자에게 권리금 요구·수수, 임차인에게 권리금 지급 못하게 하는 행위, 정당한 이유 없는 임대차계약 체결 거절행위(신규임차인의 무자력, 의무위반 우려 등은 제외) → 임대인이 권리금 지급 방해로 임차인에게 손해 발생케 한 경우 손해배상책임(신규임차인이 지급하기로 한 권리금과 임대차 종료 시 권리금 중 낮은 금액 초과 금지, 임대차 종료일로부터 3년의 소멸시효)\n- 전대차에는 권리금 규정 적용 X(상임법 13조 참조)\n- 상임법 10조 2항에 따라 전체 임대차기간이 5년(현행 10년)을 초과하여 갱신요구권을 행사할 수 없는 경우에도 임대인은 10조의4 1항의 권리금 회수기회 보호의무를 부담해야 [2017다225312]\n- 학교법인이 임차인이 주선한 신규임차인이 되려는 자와 임대차계약 체결하는 것이 사립학교법 등이 규정한 경쟁입찰 방법으로 선정할 법령상 의무 위반이라면 학교법인이 그러한 사정 들어 임대차계약 체결 거절 O, 상임법 10조의4 1항 4호가 규정한 '정당한 사유' O [2019다296172]",["§상임법10"],0,"상임법"],
