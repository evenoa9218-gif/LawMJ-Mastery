  ["채권각론_P119","2005다52719","유익비 상환청구의 상대방 — 지출 당시 소유자에게 청구해야","대항력 없는 임대차의 임차목적물 소유권이 이전된 경우 유익비 상환청구 상대방","임대차의 '유익비'는 임차목적물 개량 위하여 지출되어 물건 가치를 '객관적'으로 증가시켜야, 임차인의 주관적 이익이나 특정 영업 위한 목적 지출된 비용은 X. 대항력 없는 임대차의 임차목적물 소유권 이전되면 전소유자와의 관계에서 지출한 유익비는 전소유자에게 비용상환청구 해야, 신소유자에게 X.\n\n正辯: 석재가공공장 운영 위한 개인적 필요로 설치한 경우 객관적 가치 증가 X. 후술하는 93다25738 판결은, 건물에 삼계탕집을 경영하기 위한 보일러·온돌방·방문틀·주방내부·점포장식·가스·실내전등·계단전기·페인트도색 등은 건물의 본래 용도 및 이용실태 등에 비추어 건물 보전 위한 것 X, 객관적 가치 증가시킨 것 X, 필요비 X, 유익비 X.",["§626"],0,"임대차","대판 2005다52719","미분류"],
  ["채권각론_P120","2016다227694","필요비상환의무와 차임지급의무 동시이행관계","임대인의 필요비상환의무와 임차인의 차임지급의무의 동시이행관계 성립 여부","임대인의 필요비상환의무는 특별한 사정 없는 한 임차인의 차임지급의무와 서로 대응관계 → 임차인은 지출한 필요비 금액 한도에서 차임지급 거절 O.\n\n正辯: 임차인이 사용·수익 지장 한도에서 차임지급을 거절하는 것과 마찬가지 법리로, 필요비상환의무와 차임지급의무의 동시이행관계를 인정한 판례.",["§626","§536"],0,"임대차","대판 2016다227694","미분류"],
  ["채권각론_P121","94다44705, 98다31462","비용상환청구권 포기 약정의 유효성 및 포기 범위","건물 임차인이 비용 들여 증축한 부분을 임대인 소유로 귀속시키는 약정의 효력, 및 임대차계약서에 비용상환청구권을 전부 포기한다는 기재의 해석","[94다44705] '건물 임차인이 비용 들여 증축한 부분을 임대인 소유로 귀속시키는 약정'은 임차인 원상회복의무 면하는 대신 투입비용의 변상·권리주장 포기하는 것으로 유효 → 부속물매수청구권 포기 약정으로서 강행규정 반하여 무효라 할 수 없음, 유익비 상환도 청구할 수 X.\n\n[98다31462] 임야 상태의 토지를 임차하여 대지 조성 후 건물 건축하여 음식점을 경영할 목적으로 임대차계약 체결한 경우, 임대차계약서에 비용상환청구권은 용도를 묻지 않고 전부 포기한다고 기재하였어도 계약당사자 의사는 대지 조성 후의 투입비용만 포기한 것이고, 대지조성비는 상환청구권 포기 X.",["§626"],0,"임대차","대판 94다44705, 98다31462","미분류"],
  ["채권각론_P122","2024다317332","부속물매수청구 후 임대인 상계와 동시이행관계 — 상계 소급효로 동시이행 소급 소멸 않음","임차인의 부속물매수청구권 행사 후 임대인이 불법점유 손해배상채권을 자동채권으로 상계한 경우 목적물반환의무와 부속물매매대금지급의무의 동시이행관계 유지 여부","부속물매매대금 이행제공 하지 않는 한, 적법한 부속물매수청구권 행사 후 임차인의 목적물 계속 점유는 불법점유 X, 손해배상의무 X ∵ 목적물반환의무와 부속물매매대금지급의무는 동시이행관계. 임차인의 부속물매수청구 후에 임대인의 상계로 부속물매매대금채권이 상계적상일로 소급하여 소멸하더라도 상계적상 시점부터 부속물매매채무와 동시이행관계 소멸하여 임차인이 이행지체·불법점유로 되는 것은 X ∵ 상계 소급효(493조 2항)는 양 채권 및 이자·지연손해금 정산 기준시기 소급할 뿐, 상계 의사표시 전 이미 발생한 사실 복멸시키지 X.\n\n正辯: 임대인 甲이 임차인 乙을 상대로 임대차 종료로 인한 인도청구 및 불법점유 손해배상 예정액(월차임 1.3배) 지급청구 → 乙이 준비서면으로 부속물매수청구권 행사 → 甲이 준비서면으로 불법점유 손해배상채권을 자동채권으로 부속물매매대금채권과 상계권 행사. 乙의 부매청 행사로 매매계약이 된 이후는 甲이 부속물매매대금 이행제공 하여 동이항 상실시키지 않는 한 乙의 점유는 불법점유 X, 甲이 상계하여 부속물매매대금채권을 소멸시켰더라도 정산 기준시기 소급할 뿐 부속물매매대금무와 동시이행관계가 상계적상 시점으로 소급 소멸하는 것은 아님.",["§646","§493","§536"],0,"임대차","대판 2024다317332","미분류"],
  ["채권각론_P123","93다6386, 93다44104, 2013다48364","지상물매수청구권 행사자 요건 — 지상물 소유자·채무불이행 시 X·무허가건물 매수인 O","지상물매수청구권을 행사할 수 있는 자의 범위 및 요건","[93다6386] 643조 지상물매수청구권은 지상물 소유자에 한하여 행사 O. 건물의 '양도인'은 더 이상 행사 X.\n\n[93다44104] 건물 소유 목적 토지 임대차에서 임차인의 차임연체 등 채무불이행을 이유로 임대차계약 해지되었다면 임차인은 지상물매수청구권 X → 갱신청구 여지 없으므로.\n\n[2013다48364] 종전 임차인으로부터 미등기 무허가건물을 매수하여 점유하고 있는 '임차인'은 임대인에 대하여 지상물매수청구 O ∵ 지상물매수청구권 제도 취지상 행정관청 허가 받은 적법한 건물 아니어도 O, 건물을 점유하는 미등기 매수인은 점유 중인 건물에 대하여 법률상·사실상 처분권 O.",["§643"],0,"임대차","대판 93다6386, 93다44104, 2013다48364","미분류"],
  ["채권각론_P124","75다348, 93다59717, 96다14517","임차권 소멸 후 토지 양도된 경우 대항력 갖춘 임차인의 지상물매수청구 상대방 — 신 소유자","임차권 소멸 후에 임대인이 그 토지를 제3자에게 양도하여 소유권이 이전된 경우 지상물매수청구권 행사의 상대방","건물 소유 목적 토지임차인의 건물매수청구권 행사의 상대방은 통상 '임차권 소멸 당시 토지소유자인 임대인' → 임차권 소멸 후에 임대인이 그 토지를 제3자에게 양도하여 소유권 이전되면, 건물에 등기 마쳐 제3자에게 대항할 수 있는 차지권을 가지는 토지임차인은 신 소유자에 대하여 매수청구권 O, 이때 토지 소유권을 상실한 임대인에 대하여 매수청구권 X.\n\n正辯: 임차권에 대항력이 있는 상태에서 임대차 목적물인 토지 소유권이 양도되면 토지 양수인이 임대인 지위까지 승계하여 건물매수청구권 행사의 상대방이 될 것인데, 판례는 임차권 '소멸' 후에 토지가 양도된 경우에도 대항력을 갖추고 있던 임차인이라면 토지 양수인에 대하여 건물매수청구권 행사할 수 있다고 판시함.",["§643"],0,"임대차","대판 75다348, 93다59717, 96다14517","미분류"],
  ["채권각론_P125","93다42634, 2021다260671","임대 토지 외 걸쳐 건립된 건물의 매수청구권 — 구분소유 가능 부분만 허용·지나친 제약 시 X","임차인 소유 건물이 임대 토지 외에 제3자 소유 토지 위에 걸쳐서 건립된 경우 지상물매수청구 가부","[93다42634] [大判全合] 임차인 소유 건물이 임대 토지 외에 임차인·제3자 소유 토지 위에 걸쳐서 건립된 경우, 임차지 상 건물 중 구분소유 객체 될 수 있는 부분에 한하여 매수청구권 허용 ∵ 임대인 매수 후에 철거의무·손해배상의무 생겨 강요할 수 없고, 면적비율로 공유하더라도 공유에 따른 제약.\n\n[2021다260671] [요사] 토지임차인이 매수청구권 행사한 건물이 임차인의 불법 증축으로 절반 이상이 임대차계약 목적 토지 아닌 토지를 무단 침범하여 건립되었고 절반 가까이 지목이 '전'이어서 건물 전체 철거가 불가피한 상황 → 지상물매수청구 X ∵ 토지 소유자는 위 건물과 부지를 자유롭게 사용·처분할 수 없어 재산권 행사에 지나친 제약.",["§643"],0,"임대차","대판 93다42634, 2021다260671","미분류"],
  ["채권각론_P126","2007다4356, 2023다309020","지상물매수청구권 매수가격 — 시가 기준, 근저당권 채무액 공제 X","건물에 근저당권이 설정된 경우 지상물매수청구권 행사 시 매수가격 산정 방법 및 법원의 직권 증감 가부","[2007다4356] 643조 건물매수청구권의 매수가격은 여러 사정을 종합적 고려하여 청구권 행사 당시 건물 현존 상태로 평가된 시가 상당액 → 건물에 근저당권 설정된 경우도 채권최고액·피담보채무액 공제 X, 다만 근저당권 말소 않는다면 토지소유자는 588조에 의해 말소될 때까지 채권최고액 상당 대금 지급 거절.\n\n[2023다309020] 지상물매수청구 대상 건물의 매수가격에 당사자 의사합치 없다면 법원은 여러 사정 종합하여 매수청구권 행사 당시 건물 시가를 매매대금으로 매매계약 성립했음을 인정해야, 법원이 해당 시가를 임의 증감하여 매매대금 직권 결정 X ∵ 지상물매수청구권은 형성권으로서 행사로써 곧바로 행사 당시 시가를 대금으로 매매계약 체결된 효과 발생.",["§643"],0,"임대차","대판 2007다4356, 2023다309020","미분류"],
  ["채권각론_P127","2008다3022, 2023다249661","임대인 지위 승계 시 연체차임채권 미승계 + 임차물 원상회복 범위","임대인 지위가 승계된 경우 이미 발생한 연체차임채권의 승계 여부 및 임차물 반환 시 원상회복 범위","[2008다3022] 임대인 지위가 승계된 경우 이미 발생한 연체차임채권은 따로 채권양도 요건 갖추지 않는 한 승계 X → 승계 이후의 연체차임액으로 달하여야만 비로소 임대차계약 해지 O, 승계 이전의 차임연체 이유로 해지 X.\n\n[2023다249661] 654조·615조 원상회복의무는, 임차인이 목적물 현상 변경했다면 원칙적으로 변경 부분 철거 등 임대 당시의 상태로 → 그러나 토지 임대 당시 이미 종전 임차인 등이 설치한 가건물 기타 공작물 있었다면 자신이 임차할 당시 상태로 반환 O, 종전 임차인 등이 설치한 부분까지 원상회복할 의무 X.",["§640","§641","§615"],0,"임대차","대판 2008다3022, 2023다249661","미분류"],
  ["채권각론_P128","94다46428, 92다45308","임차권 양도·전대 제한과 배신행위 판단","건물 소유 목적 토지임차인의 양도담보 설정이 임차권 양도·전대인지 여부, 및 임차권 양수인이 임차인과 부부로 동거하는 경우 배신행위 예외","[94다46428] 건물 소유 목적 토지임차인이 지상건물에 대하여 제3자에게 양도담보 조로 소유권이전등기 마쳐준 경우 건물 부지 '임차권의 양도나 전대' X → 임대인은 자신의 동의가 없었다는 이유로 629조 해지 X ∵ 양도담보는 채권담보 위하여 신탁적으로 소유권 이전될 뿐 확정적·종국적 이전 X, 양도담보권자 건물 사용수익권 X.\n\n[92다45308] 629조는 배신적 행위에 대한 임대인 해지권 부여 취지 → 임차인의 행위가 임대인에 대한 배신적 행위라 인정할 수 없는 특별한 사정이 있다면 해지권 X → 임차권 양수인이 임차인과 부부, 임차건물에 동거하며 함께 가구점 경영하는 사정은 특별한 사정 O, 배신적 행위 X, 임대인 629조 해지권 X.",["§629"],0,"임대차","대판 94다46428, 92다45308","미분류"],
  ["채권각론_P129","2019다202573, 2006다10323, 2022다296165","무단전대 후 이행불능 시 전차인 의무 면제 + 임대인의 양수인에 대한 청구권","무단전대 후 임차인이 전차인에게 사용·수익하게 할 수 없게 된 경우 및 임대차계약 존속 중·종료 후 임대인의 양수인에 대한 차임청구 가부","[2019다202573] 임차인이 임차물 전대한 후 임대차계약 종료되고 전차인이 임대인으로부터 목적물 반환청구나 차임 상당액 지급요구 받는 등 이유로 임차인이 전차인으로 하여금 목적물 사용·수익하게 할 수 없게 된 경우 → 전차인은 이행불능으로 인한 계약 종료를 이유로 그 이후의 차임지급·부당이득반환 의무 면함.\n\n[2006다10323] 임차인이 임대인 동의 없이 제3자에게 임차권 양도나 전대로 사용·수익하게 해도, 임대차계약이 해지·종료되지 않는 한 임대인은 제3자에 대해 차임 상당 손해배상 X, 부당이득반환 X ∵ 임차인에 대해 여전히 차임청구권.\n\n[2022다296165] 임대차계약 종료 이후에는 임차물 소유자 임대인은 제3자에 대해 차임 상당 손해배상청구 O, 부당이득반환청구 O.",["§629","§630"],0,"임대차","대판 2019다202573, 2006다10323, 2022da296165","미분류"],
  ["채권각론_P130","96다17202","임차권 양도 시 임대차보증금반환채권의 신 임차인에 당연 이전 X — 가압류·압류 있으면 대항 불가","임대차보증금반환채권이 가압류·압류된 후 임차권이 양도된 경우 임대인이 임차권 양도 승낙하면 구 임차인의 보증금반환채권의 귀속과 신 임차인의 연체차임 공제 가부","임대인이 임차권 양도 승낙하면 구 임차인과의 임대차관계는 종료, 구 임차인의 임대차보증금반환채권은 임대인의 임차권 양도 승낙시에 이행기 도달 O → 임대차보증금반환채권 양도 등 특별한 사정 없는 한 임대차보증금반환채권은 신 임차인에 이전 X → 설령 신 임차인에게 임대차보증금반환채권을 양도한 경우에도 그 이전에 임대차보증금반환채권이 제3자에 의해 가압류·압류되었다면 위 합의·양도는 압류권자에게 대항 X → 신 임차인이 차임지급 연체 등 새로운 채무 부담하게 되었더라도 그 연체차임 등을 구 임차인에게 반환할 임대차보증금에서 공제 X.\n\n正辯: 임차권 양도에 보증금반환채권의 채권양도가 당연히 수반되지 않으며, 설령 채권양도가 있었더라도 동일 채권에 대한 선행하는 가압류·압류에 대항할 수 없다는 판결. 한편 판례 대부분이 '임대차보증금에서의 차임 공제'를 어떤 상황에서는 매우 강력하게 인정하고 있는 것에 비하여 이 판례는 '신 임차인'의 연체차임은 공제 X.",["§629","§630"],0,"임대차","대판 96다17202","미분류"],
  ["채권각론_P131","2014다52933","포괄적 양도 계약 시 임대차보증금반환채권 확정일자 없으면 가압류 채권자에 대항 불가","임대차계약상 지위 및 권리의무 포괄적 양도가 있는 경우에도 임대차보증금반환채권의 양도 부분은 확정일자 있어야 가압류 채권자에게 대항 가능한지","임대차계약상 지위 및 권리의무 포괄적 양도가 있는 경우에도 임대차보증금반환채권의 양도 부분은 확정일자 있어야(포괄적 양도계약에 확정일자가 있거나 보증금반환채권 양도의 통지·승낙에 확정일자 있어야) 임대차보증금반환채권에 가압류 등을 받은 채권자에게 대항 가능 → 따로 확정일자 받지 않았다면 가압류한 채권자에 대항 X.\n\n正辯: 본 판결은 단순한 '임차권 양도'를 넘어서 '임차인 지위의 양수', 즉 '계약인수'라는 점이 다름.",["§629","§630"],0,"임대차","대판 2014다52933","미분류"],
  ["채권각론_P132","2006다45459, 2018다200518","전차인의 전대차 차임 지급과 임대인 대항 — 전대차 차임지급시기 기준","전차인이 전대인에게 차임을 지급한 경우 임대인에게 대항할 수 있는 범위 기준","[2006다45459] 630조 1항 2문의 대항할 수 없는 차임의 범위는 전대차계약상의 차임지급시기를 기준으로 그 전에 전대인에게 지급한 차임에 한정, 그 이후에 지급한 차임은 임대인에게 대항 O → 결국 전대차계약상 차임 지급시기가 임대차계약상 지급시기보다 앞선 경우에는 전대인에게 지급하고 대항 O, 임대차 차임 시기가 전대차 차임 시기보다 앞서거나 동시인데 전대차 차임 지급시기 전에 전대인에게 지급한 것만 임대인에게 대항 X.\n\n[2018다200518] 전대차계약상의 차임지급시기 전에 전대인에게 지급했더라도, 임대인의 차임청구 전에 차임지급시기 도달했다면 임대인에게 대항 O. 임대차종료 후 전차인이 임대인에게 반환할 차임 상당 부당이득액 산정 시 변경된 감액 차임을 기준으로 O.",["§630"],0,"임대차","대판 2006다45459, 2018다200518","미분류"],
  ["채권각론_P133","2012다55860","638조 전차인 통지 의무 — 차임연체 해지는 통지 없이도 대항 가능","임대차가 차임연체를 이유로 해지된 경우 638조의 전차인 통지 의무 적용 여부","638조 1항·2항, 635조 2항은 임대차계약이 '해지통고'로 종료된 경우 임대물 적법 전대되었을 때 임대인은 전차인에게 통지 아니하면 해지로 대항 X → 임차인의 차임연체액이 2기로 640조 '해지'할 경우는 전차인에게 통지 않더라도 해지로 대항 O, 해지 의사표시가 임차인 도달 즉시 임대차관계 종료.",["§638","§640"],0,"임대차","대판 2012다55860","미분류"],
  ["채권각론_P134","2011다49608, 99다50729, 2013다77225","보증금 당연공제 — 임대차 종료 전후 구분","임대차 존속 중과 종료 후의 보증금 당연공제 여부","[2011다49608] 임대인은 임대차관계 계속되는 동안에는 연체차임 등의 임대차보증금 충당 여부 자유로이 선택, 임대차 종료 전에는 별도의 의사표시 없이 당연 공제는 X.\n\n[99다50729, 2013da77225] 연체차임 등 피담보채무 상당액은 임대차가 종료하여 목적물 반환될 때에 특별한 사정이 없는 한 별도의 의사표시 없이 보증금에서 당연 공제 O → 차임채권 양도되었어도 임차인은 임대차 종료로 목적물 반환할 때 연체 차임 상당액을 보증금에서 공제 주장 O.",["§618"],0,"임대차","대판 2011다49608, 99다50729","미분류"],
  ["채권각론_P135","87다카1315, 2004다56554","임차보증금반환채권 전부명령·압류와 당연공제의 한계","임차보증금반환채권에 대한 전부명령 또는 차임채권에 대한 압류·추심명령이 있는 경우 임대차 종료 후 피담보채무 당연공제 가부","[87다카1315] 임차보증금반환채권에 대한 전부명령이 있더라도 임대차 종료 후 명도시에 연체차임 등 임차인의 모든 피담보채무를 공제한 잔액에 관하여만 전부명령 유효 ∵ 전부명령이 있더라도 제3채무자인 임대인은 임차인에게 대항할 수 있는 사유로서 전부채권자에게 대항 O, 임대차보증금반환채권은 종료 후 명도시 모든 피담보채무를 공제한 잔액이 있을 것으로 조건으로 그 잔액에 관하여 발생하는 채권.\n\n[2004다56554] 차임채권에 대한 압류 및 추심명령 있더라도 임대차계약 종료되어 목적물 반환될 때는 그때까지 추심되지 않고 잔존한 차임채권 상당액도 임대차보증금에서 당연히 공제 O.",["§618"],0,"임대차","대판 87다카1315, 2004다56554","미분류"],
  ["채권각론_P136","2016다218874","건물 양수인의 임대인 지위 승계 시 보증금 처리 — 승계 전 연체차임도 당연공제","건물 양수인이 임대인 지위를 승계한 경우 승계 전 발생한 연체차임·관리비의 귀속 및 보증금 공제 여부","상임법 3조 2항 임차건물 양수인의 임대인 지위 승계는 소유권 변동 원인이 법률행위든 법률의 규정이든 불문. 건물 양수인이 임대인 지위를 승계하면 임차인에게 임대차보증금반환의무 부담, 임차인은 양수인에게 차임지급의무 부담 → 그러나 '임차건물 소유권 이전되기 전에 이미 발생한 연체차임·관리비는 별도 채권양도절차 없는 한 양수인에게 이전되지 X', 임대인만이 임차인에게 청구. 임차건물 양수인이 건물 소유권 취득한 후 임대차관계 종료되어 임차인에게 보증금 반환할 때 '임대인 지위 승계 전까지 발생한 연체차임·관리비 등도 임대차보증금에서 당연히 공제 O'.",["§618"],0,"임대차","대판 2016다218874","미분류"],
  ["채권각론_P137","2016다211309, 2024다302217","임대차 존속 중 차임채권 소멸시효 완성 시에도 보증금에서 공제 가능 — 495조 유추적용","임대차 존속 중 차임채권의 소멸시효가 완성된 경우 임대차 종료 시 보증금에서 공제 가부","임대차 존속 중 차임채권의 소멸시효 완성된 경우, 시효 완성 전 임대인이 임대차보증금반환채무에 관한 기한의 이익을 실제 포기했다는 특별한 사정 없는 한 상계적상 X, 495조 적용 어려움 → 다만 위 '임대인·임차인의 신뢰·묵시적 의사 감안하면, 이미 시효 소멸한 연체차임도 495조 유추적용 O, 보증금에서 공제 O'. 차임 상당기간 연체되었음에도 임대인이 해지 않고 임차인도 담보 충분함에 의지하여 임대차관계 지속한 경우는 소멸시효 상관없이 담보된다고 신뢰, '장차 보증금에서 충당 공제됨을 용인한 묵시적 의사 O'.\n\n正辯: 전술한 것처럼 2025년 판례는 '상계' 주장에 '공제' 주장이 포함된 것으로 보고 있음.",["§618","§495"],0,"임대차","대판 2016다211309, 2024다302217","미분류"],
  ["채권각론_P138","2016다244224","임대차 종료 후 목적물 점유로 보증금반환채권 소멸시효 진행 않음","임대차 종료 후 임차인이 보증금반환을 위해 목적물을 점유하는 경우 보증금반환채권의 소멸시효 진행 여부","임대차 종료 후 임차인이 보증금반환받기 위해 목적물 점유하면 보증금반환채권 권리행사 O, 소멸시효 진행 X ∵ 채권의 다른 여러 권능 행사만으로도 채권 행사 O, 임대차 종료 후 동시이행항변권 근거로 목적물 계속 점유함은 보증금반환채권에 기초한 권능 행사 O, 보증금 반환받으려는 계속적 권리행사 모습 분명히 표시 O. 이러한 소멸시효 진행 예외는 임대차 종료 후 임차인이 목적물을 '적법하게' 점유하는 기간에 한정 → 임차인이 점유하지 않거나 동시이행항변권 상실하면 소멸시효 진행 O.\n\n正辯: 해당 판결은 '채권자가 동이항 행사를 위해 자신의 반대채무 이행을 거절하는 것만으로도 자신의 채권의 소멸시효가 중단되는지'의 문제에 대해 긍정 → 그러나 논거 대부분이 '임차인의 보증금반환채권'의 특징들이므로 이는 임차인의 보호를 위한 판결로서 일반화하기는 어려울 것으로 보임(私見).",["§618","§166"],0,"임대차","대판 2016다244224","미분류"],
  ["채권각론_P139","98마100, 2024다209769","임대인 지위 양도와 임차인 승계 거부 + 분쟁 중 임대차관계 유지 특약의 해석","임대인과 신 소유자 계약만으로 임대인 지위 양도 가능 여부 및 판결 전까지 임대차관계 유지 특약의 의미","[98마100] 임대인과 신 소유자의 계약만으로 임대인 지위 양도 O ∵ 임대인이 누구인지는 이행방법 특별히 다르지 않음 → 그러나 이 경우 임차인이 원하지 않으면 임대차의 승계 강요 X → 공평·신의칙에 따라 임차인이 곧 이의 제기함으로써 승계되는 임대차관계 구속을 면할 수 O, 임대차약 해지 O. 正辯: 이 경우 임차인은 구 임대인을 상대로 보증금반환을 구해야.\n\n[2024다209769] 상가건물 임대차계약서에 '계약의 해지 성부에 쌍방 간 이견 있을 경우 법원의 판결에 따르되 최종 판결 전까지 임대인과 임차인의 권리·의무는 유지되는 것으로 한다.'는 특약은 → 임대차 해지 원인 임대차관계 청산 구하는 소송에서 임대차 적법 해지되었음을 이유로 청산 명하는 판결 선고되더라도 판결 확정될 때까지는 기존 임대차 관계 유지하되 확정 후에 판결을 집행한다는 의미로 해석해야.",["§618"],0,"임대차","결정 98마100, 대판 2024다209769","미분류"],
  ["채권각론_P140","2024다326398","주택 점유 상실 시 대항력 소멸 — 임차권등기로 소급 부활 X","임차인이 이사한 후 임차권등기명령에 따른 임차권등기가 경료된 경우 대항력 소급 부활 여부","주임법 3조 1항 인도·주민등록으로 인한 대항력은 물권에 버금가는 강력한 것, 공시방법이 없으므로 인도·주민등록은 대항력 유지를 위해 존속해야 → 임차인이 대항력 취득했어도 주택 점유 상실 시 대항력 소멸, 그 후 임차권등기명령 따른 임차권등기 마치더라도 대항력 소급 부활 X, 임차권등기 시에 그것과 동일성 없는 새로운 대항력 발생 O ∵ 주임법 3조의3 제5항(임차권등기명령 집행으로 임차권등기 마치면 대항력·우선변제권 취득).\n\n正辯: 임차인 甲의 인도·주민등록 이후 乙이 근저당권설정등기 → 기간만료 후 甲이 이사하고 보험회사 丙이 甲을 대위하여 임차권등기명령 신청, 임차권등기는 甲이 이사한 후에 경료 → 丁이 강제경매로 주택 매수 → 甲이 이사할 때 대항력 소멸하고 임차권등기로 새로운 대항력 취득 → 乙의 근저당권이 甲의 임차권보다 선순위 → 경매절차에서 근저당권 소멸로 임차권도 함께 소멸(소멸주의) → 丁은 주임법 3조 4항 임차주택 양수인 X, 甲은 丁에게 임차권 효력 주장 X.",["§주임법3"],0,"주임법","대판 2024다326398","미분류"],
  ["채권각론_P141","98다32939, 2000다58026, 2018다44879","소유자 아닌 자의 주민등록이 임차권 공시기능 수행 — 임대인이 임대권한 취득하는 소이등 마친 즉시 대항력","甲이 매도함과 동시에 임차(98다32939), 乙이 분양받아 소이등 후 甲과 임대차(2000다58026), 신탁재산 귀속원인 소이등 시(2018다44879)의 대항력 취득 시점","[98다32939] 甲이 자기 명의 소이등·전입신고 마치고 거주하던 주택을 乙에게 매도함과 동시에 임차하여 계속 거주 → 제3자가 甲의 주민등록이 소유권 아닌 임차권을 매개 점유임을 인식할 수 있는 乙 명의 소이등 경료일 이후 대항력 O.\n\n[2000다58026] 甲이 丙 소유 아파트의 임차인 乙로부터 임차하여 전입신고 마치고 거주하던 중, 乙이 丙으로부터 아파트 분양받아 소이등 마친 후 근저당권 설정 → 乙이 甲과 임대차계약 체결한 후 & 甲의 전입신고 후에 비로소 소유권 취득했더라도, 甲은 乙 명의 소이등 마친 '즉시' 임차권 대항력 취득 O.\n\n[2018다44879] 甲 회사 소유 주택을 乙 신탁회사와 부동산담보신탁계약, 乙 명의 소이등 → 甲은 수탁자 乙 승낙 없이 丙과 임대차계약, 丙은 인도 및 전입신고 → 甲이 신탁재산 귀속 원인 소이등, 같은 날 丁이 근저당권등기 → 丙은 甲이 소이등 마친 '즉시' 대항력 취득 → 丁의 근저당권보다 앞섬.\n\n正辯: ⓑ·ⓒ의 경우 기존 주민등록이 이미 공시 기능을 수행하고 있었으므로(소유자 아닌 자의 주민등록) 임대인이 임대권한 취득하는 소이등 마친 '즉시' 대항력 취득하는 것이 차이점.",["§주임법3"],0,"주임법","대판 98다32939, 2000다58026, 2018da44879","미분류"],
  ["채권각론_P142","2025다213466","임차인이 임차주택 양수하여 소유권이전등기 마친 후 대항력 소멸","대항력 갖춘 임차인이 해당 주택을 양수하여 소유권이전등기 마친 후 주민등록의 공시기능 유효 여부","대항력 갖춘 임차인이 해당 주택을 양수하여 소유권이전등기 마친 후에는 그 주민등록이 유효한 대항력 공시방법 X, 소유권 취득 시 대항력 소멸 ∵ ① 주민등록 표상 점유관계가 임차권 매개임을 제3자 인식 가능해야, ② 물권 버금가는 강력한 대항력 부여 취지로 보아 인도·주민등록은 존속요건.\n\n正辯: 은행이 임차인에게 전세금안심대출 실행할 때 담보로 교부받은 주택도시보증공사 발행 대출보증서의 보증약관에 '주채무자 대항력·우선변제권 상실'을 면책사유로 규정 → 주임법상 대항력·우선변제권 갖춘 임차인이 임대차기간 중 임차주택을 매수하여 소유권이전등기 마친 후 대출금 상환하지 않음 → 소유권 취득 시 대항력·우선변제권 상실하였으므로 보증공사는 약관에 따라 보증채무 면책됨.",["§주임법3"],0,"주임법","대판 2025다213466","미분류"],
  ["채권각론_P143","95다35616, 2020다276914, 93다4083","임대인 지위 승계 — 요건·효과·양수인 범위","대항력 갖춘 임차주택이 양도된 경우 임대인 지위 승계의 요건과 효과 및 양도담보권자 제외","[95da35616] 주택 임차인 대항력 갖춘 후 임대주택 소유권 양도되어 그 양수인이 주임법 3조 1항·4항에 의해 임대인 지위를 승계한 경우, 임대차보증금반환채무도 주택 소유권과 결합하여 일체로서 임대인 지위를 승계한 양수인에게 이전 O, 양도인의 임대인 지위나 보증금반환채무 소멸 O.\n\n[2020다276914] 주임법 3조 4항에 따라 임차주택 양수인이 임대인 지위 승계하는 것은 임차인이 '대항력 갖추고 있음'을 요건으로 → 경매절차에서 경락인의 소유권 취득 전에 임차인이 전출함으로써 대항력을 상실했다면 경락인은 임대인 지위 승계 X, 임대인이 보증금반환의무 O.\n\n[93다4083] 주임법 3조 4항의 '임차주택 양수인'은 증여·경매·상속·공용징수 등으로 임차주택 소유권 취득한 자 O. 그러나 주택의 양도담보권자 X ∵ '주택 소유권이 확정적·종국적으로 이전되지 X', 채권담보 위해 신탁적으로 이전될 뿐이어서 양도담보권자가 주택의 사용수익권도 X.",["§주임법3"],0,"주임법","대판 95다35616, 2020다276914, 93다4083","미분류"],
  ["채권각론_P144","2021다210720","계약명의신탁 임차인은 실명법 제4조 제3항의 제3자 해당 — 신탁자가 임대인 지위 승계","매도인이 악의인 계약명의신탁에서 수탁자로부터 임차하여 주임법상 대항력 갖춘 임차인의 지위","매도인이 악의인 계약명의신탁에서 수탁자로부터 명의신탁 목적물인 주택 임차하여 인도·주민등록 마쳐 주임법 3조 1항 대항력 갖춘 임차인은 부동산 실명법 4조 3항의 제3자에 해당 O → 임차인은 수탁자 소유권등기 말소되어 등기명의 회복한 매도인, 매도인으로부터 소유권이전등기 마친 신탁자에 대해 임차권을 대항 O, 신탁자가 주임법 3조 4항에 따라 임대인 지위 승계 O ∵ 주임법 입법 목적 및 3조 4항 개정 취지가 임차인 보호.\n\n正辯: 해당 사안은 계약명의신탁임에도 신탁자가 매도인에 대해 별도의 소이등청구권이 있어 마치 3자간 명의신탁처럼 신탁자가 매도인을 대위하여 수탁자를 상대로 말소를 구하고 이어서 매도인을 상대로 소이등을 구한 사건이었음.",["§주임법3"],0,"주임법","대판 2021다210720","미분류"],
  ["채권각론_P145","2011다49523 [大判全合]","임대차보증금반환채권 가압류 후 임대주택 양도 시 가압류의 제3채무자 지위도 양수인에게 이전","임대차보증금반환채권에 가압류 있은 후 임대주택이 양도되어 임대인 지위가 이전된 경우 가압류의 제3채무자 지위 귀속","임대차보증금반환채권이 가압류되면 제3채무자의 지위는 임대인의 지위와 분리 X. 임대주택 양도로 임대인 지위가 일체로 양수인에게 이전되면 채권가압류의 제3채무자 지위도 임대인 지위와 함께 이전 O, 가압류권자도 주택의 양도인이 아니라 양수인에 대하여만 가압류 효력 주장 O ∵ 임대차보증금 우선변제는 주택의 매각대금으로.\n\n正辯: 위 전합에는 가압류 본질에 내재한 현상보전 효력을 고려할 때 당사자의 처분행위로 집행법원이 발령한 명령의 수범자가 달라질 수 없다는 〈반대의견〉이 있었음. 한편 〈반대의견〉은 주택 양수인이 임차인에게 보증금을 반환한 경우 이중지급 위험 우려를 들고 있으나, 〈보충의견〉은 채권의 준점유자(470조) 법리로 보호할 수 있다고 함.",["§주임법3"],0,"주임법","대판 2011다49523 [大判全合]","미분류"],
  ["채권각론_P146","2024다215542","임차주택 매매대금에서 보증금 공제 약정 — 면책적 채무인수 신중, 임차인 묵시적 승낙 쉽게 단정 X","매수인이 목적물에 관한 임대차보증금반환채무를 인수하며 그 채무액을 매매대금에서 공제하기로 약정한 경우 면책적 채무인수 인정 여부","매수인이 목적물에 관한 임대차보증금반환채무를 인수하며 그 채무액을 매매대금에서 공제하기로 약정한 경우, 특별한 사정 없는 이상 면책적 채무인수 X ∵ 면책적 채무인수는 병존적 채무인수나 이행인수와 달리 기존 채무자가 면책되므로 인정에 신중해야 → 설령 매도인·매수인 사이 보증금반환채무 면책적 인수 약정 있었더라도 효력이 생기려면 채권자인 임차인의 명시적·묵시적 승낙이 있어야 → 보증금반환채무 회수 가능성 등이 의문시되는 상황이면 임차인의 어떤 행위를 묵시적 승낙으로 쉽게 단정 X.\n\n正辯: 임차인이 한국전력공사로서 원칙적으로 주임법 보호받을 수 없는 법인인 사안이었는데, 만약 주임법 대항력 적용되는 임차인이었다면 법리상 면책적 채무인수였을 것임(私見).",["§454"],0,"주임법","대판 2024다215542","미분류"],
  ["채권각론_P147","94다37646, 2001다64615, 2021다251929","임차인의 승계 거부권 — 이의제기로 양도인의 보증금반환채무 존속","임차인이 임대차관계 승계를 원하지 않는 경우 양도인의 임대차보증금반환채무 존속 여부 및 이의제기의 시기","임차 주택의 양수인에게 대항할 수 있는 임차권자라도 스스로 임대차관계 승계 원하지 않을 때는 승계되는 임대차관계 구속을 면할 수 O. 임대차기간 만료 전 경매될 경우 임대차계약 해지·종료시켜 우선변제청구 O, 해지통고 즉시 효력 O(∵ 공평, 신의칙) or 임차인이 임차주택 양도 안 때로부터 상당 기간 내 이의 제기함으로써 → 이때 양도인의 보증금반환채무 소멸 X.\n\n正辯: 임차인이 경매 진행 중에 임대인에게 '해지' 통지했고 경락 이후 기존 임대인에게 임대차보증금 '반환' 요구했더라도, 경매절차에서 배당요구 않았다면 위와 같은 '이의제기'로 볼 수 X ∵ 주임법 4조 2항 존속의제 조항, 해지 의사표시는 매각 전에 이뤄진 점, 배당요구는 하지 않은 점 등에 비추어 → 사안은 결국 대항력 선택한 것이어서 임대인 지위 승계되므로 경락인에게 보증금반환 구해야.",["§주임법3"],0,"주임법","대판 94다37646, 2001다64615, 2021다251929","미분류"],
  ["채권각론_P148","86다카1936, 98마1031","후순위저당권 실행으로 선순위저당권 소멸 시 대항력 함께 소멸 및 예외","후순위저당권 실행으로 경락되어 선순위저당권이 함께 소멸하는 경우 임차권의 대항력 존속 여부","[86다카1936] 후순위저당권 실행으로 경락되어 선순위저당권이 함께 소멸하면 비록 후순위저당권자에게 대항할 수 있는 임차권이더라도 선순위저당권보다 대항력이 늦은 이상 임차권은 함께 소멸 ∵ 선순위저당권의 담보가치 보장 → 임차인은 경락인에 대해 임차권 주장 X.\n\n[98마1031] 근저당권 소멸 및 경락인 소유권 취득 시점인 경락대금지급기일 전에 선순위근저당권이 다른 사유로 소멸하면, 임차권 대항력 유지.",["§주임법3"],0,"주임법","대판 86다카1936, 결정 98마1031","미분류"],
  ["채권각론_P149","93다10552, 2010마900, 2009다40790","전세권자 지위와 주임법상 대항력 갖춘 임차인 지위 함께 가지는 경우의 처리","전세권자 지위와 주임법상 대항력 갖춘 임차인 지위를 함께 가지는 경우 양 지위 및 그 행사 효과","판례는 전세권자 지위와 주임법상 대항력 갖춘 임차인 지위를 함께 가지는 경우(지위 강화 방편) 양자는 별개의 권리.\n① 'A 주임법상 대항력—B 저당권등기—A 전세권등기' 순서인 경우 B가 경매신청하여 A의 전세권은 소멸하더라도 A의 주택임차권 대항력 존속(전세권설정등기를 한 이유가 주임법 임차인의 대항력 갖추었지만 지위 강화 위한 것이었다면)\n② 전세권자로서 배당요구 하고 못 받은 나머지 보증금으로 임차권에 기한 대항력 주장할 때 주택 매수인이 임대인 지위 승계 O\n③ 임차인으로서 배당요구 했어도 전세권이 저당권에 대항할 수 있다면 전세권은 경락인에게 인수 O.",["§주임법3"],0,"주임법","대판 93다10552, 결정 2010마900, 대판 2009다40790","미분류"],
  ["채권각론_P150","98다26002, 2001다51725, 2017다212194","우선변제권 기준일 — 인도·주민등록 다음날 0시 + 확정일자 갖추는 방법","주임법상 우선변제권의 기준일 및 확정일자 인정 방법, 보증금 일부 후지급 시 우선변제권 기준","[98다26002] 인도·주민등록 마친 당일 또는 그 전에 확정일자 갖춘 경우라면 인도·주민등록을 마친 '다음 날' 0시가 우선변제권 기준일.\n\n[2001다51725] 주택임차인이 지위 강화 방편으로 따로 전세권설정계약서 작성하고 전세권설정계약서가 첨부된 등기권리증에 등기관 접수인 찍혀있다면 임대차계약증서에 확정일자가 있는 것 O.\n\n[2017다212194] 주임법 우선변제권 인정 위해 계약 당시 임차보증금 전액 지급 불필요 → 임차인이 임대차보증금 일부를 계약 이후 나중에 지급했더라도 대항요건 및 확정일자 갖춘 때를 기준으로 우선변제권 O.",["§주임법3"],0,"주임법","대판 98다26002, 2001다51725, 2017다212194","미분류"],
  ["채권각론_P151","2013다27831, 2010다10276, 92다30597, 2004다26133, 98다2754","우선변제권 행사 범위 — 배당요구·양수인·평등배당·대지환가대금·잔액반환","주택임차인의 배당요구 필요성, 보증금반환채권만 양수한 자의 우선변제권, 선순위 가압류와의 관계, 대지만 경매되는 경우, 잔액 미배당 시 대항력 주장 가부","[2013다27831] 주택임차인은 배당요구 채권자 → 배당요구 종기까지 배당요구하지 않으면 추후 부당이득반환청구 X → 그러나 주택임차인이 집행권원 얻어 스스로 경매신청하면 우선변제권 선택·행사한 것으로서 별도로 배당요구 불필요.\n\n[2010다10276] 임차권과 분리해서 보증금반환채권만 양수한 채권양수인은 우선변제권 X ∵ 주임법 입법목적과 보증금 우선변제권 제도 취지, 주임법 문언.\n\n[92다30597] 주임법상 대항요건·확정일자 갖춘 주택임차인은 우선변제권 있으나 선순위 가압류채권자와는 평등배당 관계, 즉 주택임차인 = 저당권자.\n\n[2004다26133] 대항요건·확정일자 갖춘 임차인·소액임차인은 임차주택과 별도로 대지만이 경매될 경우도 대지 환가대금에 우선변제권 O, 임대차 성립 당시 임대인의 소유였던 대지가 타인에게 양도되어 주택과 대지의 소유자가 서로 달라지게 된 경우도 마찬가지.\n\n[98다2754] 주임법상 대항력과 우선변제권의 두 권리 겸유한 임차인이 먼저 우선변제권 선택하여 경매절차에서 배당요구 했으나 순위 늦어 보증금 전액을 배당받을 수 없었다면 나머지 반환받을 때까지 경락인에게 대항하여 임대차관계의 존속 주장 O.\n\n正辯: 상임법의 규정(임대인 소유의 대지를 포함한다)과는 차이가 있는 주임법 규정(대지를 포함한다)에 관한 판례.",["§주임법3"],0,"주임법","대판 2013다27831, 2010다10276, 92다30597, 2004다26133, 98다2754","미분류"],
  ["채권각론_P152","2022다255126, 2005다4529, 2022다246610, 2024다221455","임차권등기명령 — 보증금반환채권 양수한 금융기관의 존속 주장, 등기 말소의무와 보증금반환의무 선후, 후속 임차인의 대항력, 등기비용 청구","주임법 3조의2 7항 금융기관의 우선변제권 승계, 임차권등기명령에 의한 등기 후 보증금반환의무와 등기말소의무의 선후관계, 임차권등기 마쳐진 주택을 그 후 임차한 임차인의 보호, 임차권등기명령 비용 청구 방법","[2022다255126] 주임법 3조의2 7항의 금융기관이 임차인으로부터 보증금반환채권을 계약으로 양수함으로써 양수금액 범위의 우선변제권 승계하고 경매절차에서 배당요구로 보증금 중 일부 배당받은 경우도 마찬가지 → 대항력 존속하는 한 임차인은 보증금반환채권 양수한 금융기관이 보증금 잔액 반환받을 때까지 주택 양수인을 상대로 임대차관계 존속 주장 O.\n\n[2005다4529] 임차권등기명령에 의한 등기는 이미 이행지체에 빠진 임대인에 대한 것으로서 보증금반환의무가 임차권등기 말소의무보다 선이행의무.\n\n[2022다246610] 임차권등기 마쳐진 주택을 임차한 임차인도 소액보증금 최우선변제권을 제외한 대항력·우선변제권 O ∵ 주임법 3조의3 6항은 '임차권등기명령 집행 따른 임차권등기 끝난 주택을 그 후 임차한 임차인은 8조 우선변제권이 없다'고 규정하는데 8조는 소액보증금 최우선변제 규정, 대항력·우선변제권 규정에는 선순위 임차권 내지 임차권등기 존재를 소극적 요건으로 정하고 있지 않음.\n\n[2024다221455] 주택임차인은 임차권등기명령 신청비용 및 임차권등기비용을 임대인에 대하여 민사소송으로 청구하거나 상계 자동채권으로 행사 O ∵ 주임법 3조의3 제3항(임차권등기명령 신청 재판절차 및 집행 등에 민사집행법상 가압류 절차규정 일부 준용)과 제8항(임차인은 위 신청 및 등기 비용을 임대인에게 청구)에 불구하고 비용 청구의 방법·절차에 관한 별도 규정 없으므로.\n\n正辯: 위 2005다4529 사안은 보증금반환채권에 동이항이 부착된 것이 아니므로 임차인이 임대차보증금반환채권을 자동채권으로 상계를 함에 장애가 없음.",["§주임법3"],0,"주임법","대판 2022다255126, 2005다4529, 2022다246610, 2024다221455","미분류"],
  ["채권각론_P153","95다44597, 99다25532, 2001다66291, 2007다45562, 2007다23203","소액보증금 일정액 보호 — 존속요건·대지환가대금 우선변제 요건·공동저당 비례·소액임차인 인정시점","주임법 8조 보호의 존속요건, 대지에 저당권 설정 후 주택 신축한 경우 대지 우선변제 요건, 소액보증금반환청구권의 성격, 소액임차인과 확정일자 임차인 동시 보유 시 배당, 계약 후 보증금 감액으로 소액임차인 해당하게 된 경우","[95다44597] 주임법 8조 보호는 '배당요구의 종기'까지 대항력 계속 존속할 것, 배당요구시까지는 X ∵ 등기된 담보물권자보다 우선하는 점, 공시방법 불안정, 배당요구에 의하는 점, 새로운 임차인 등장 혼란.\n\n[99다25532] 대지에 저당권 설정 후 주택 신축하여 임대차 이뤄진 경우 '대지' 환가대금에서 우선변제 X, 대지 환가대금에서 우선변제 받으려면 대지의 저당권 설정 당시에 이미 지상 주택이 존재할 것 ∵ 저당권자가 예측할 수 없는 손해.\n\n[2001다66291] 소액보증금반환청구권은 일종의 법정담보물권, 대지·건물 모두로부터 배당받아 공동저당권자와 유사한 지위 ∴ 대지·건물 동시 배당시 368조 1항 유추적용으로 경매대가에 비례.\n\n[2007다45562] 대항요건과 확정일자 갖추고 소액임차인 지위도 가지면 먼저 소액임차인으로서 일정액 배당받고 나머지 임차보증금채권액은 확정일자 갖춘 순위에 따라.\n\n[2007다23203] 주된 목적이 주택 사용·수익인 이상 임대차계약 체결 당시 소액임차인 해당하지 않았더라도 그 후 새로운 계약으로 정당하게 보증금을 감액하여 소액임차인에 해당하게 되었다면 소액임차인 보호.",["§주임법8"],0,"주임법","대판 95다44597, 99다25532, 2001다66291, 2007다45562, 2007다23203","미분류"],
  ["채권각론_P154","2021다263229","개정 주임법 6조의3 갱신요구권 부칙 적용 — 7.31 종료 갱신요구는 기간 경과로 효력 X","2020. 8. 15. 종료될 임대차계약의 임차인이 2020. 7. 9. 및 7. 31. 임대인에게 계약갱신요구한 경우 6조의3 부칙 적용 여부 및 효력","2020. 7. 31. 법률 제17470호로 개정된 주임법 신설 6조의3(갱신요구권) 부칙 2조 1항은 개정법 시행 당시 존속 중인 임대차에도 적용 O → 8. 15. 종료되는 임대차계약도 개정법 적용 O → 그러나 6조 1항 전단의 기간, 즉 임대차기간 끝나기 6개월 전부터 1개월 전까지 기간 이내에 계약갱신 요구해야 → ① 甲의 7. 31.자 갱신요구는 위 기간 경과하여 효력 X, ② 甲의 7. 9.자 갱신요구는 개정법 시행 전의 사실행위로서 개정법상 갱신요구 X.",["§주임법6"],0,"주임법","대판 2021다263229","미분류"],
  ["채권각론_P155","2023다258672","갱신요구권 행사 시 갱신 효력 발생 시점 — 갱신요구 도달 시","주임법 6조의3 갱신요구권 행사에 따른 갱신 효력 발생 시점 및 갱신 후 임차인의 해지통지 효력","주임법 6조의3 4항이 준용하는 6조의2(묵시갱신) 1항에 따라 임차인이 계약갱신 요구하면 갱신거절사유 없는 한 갱신요구 도달 시에 갱신 효력 발생하고, 갱신 효력 발생 후 임차인은 언제든지 해지통지 O, 그로부터 3개월 지나면 효력 발생 → 계약해지 통지가 갱신된 임대차계약 기간 개시 전에 임대인에게 도달했더라도 마찬가지.",["§주임법6"],0,"주임법","대판 2023다258672","미분류"],
  ["채권각론_P156","2022다279795, 2021다266631","갱신요구권 거절사유 8호 — 임대인 실제 거주 의사 증명책임 및 양수인의 거절권","임대인(직계존비속 포함)이 8호 임대인 등 거주 사유로 갱신요구 거절하기 위한 입증 정도 및 임대인 지위 승계한 양수인의 거절 가부","[2022다279795] 2020. 7. 31. 개정 신설된 주임법 6조의3 갱신요구권 및 거절사유 취지는 임차인 주거생활 안정 위한 갱신요구권 보장과 동시에 임대인 재산권 보호 조화 → 임대인이 8호 임대인(직계존·비속 포함) 실제 거주 의사 증명책임 있고, 단순한 의사 표명한 사정으로 바로 인정은 X, 내심의 장래 계획이란 특성상 통상 진정성을 수긍할 사정으로 존재 추인 O → 임대인 주거상황, 임대인·가족의 직장·학교, 실제 거주 의사 경위, 갱신요구 거절 전후 임대인 사정, 실제 거주 의사와 배치·모순되는 언동 유무, 이사 준비 유무·내용 등 여러 사정 종합.\n\n正辯: A 아파트 임대인은 기간만료 전에는 본인·배우자·자녀가, 소장에서는 본인이나 부모가 거주할 예정이라고 주장 바뀐 점, 임대인은 인근 B 아파트와 다른 지역 C 주택 소유하는데 거절 무렵 자녀 교육 위해 C 주택 거주 중이었고 배우자는 직업상 B 아파트 거주 중이었던 점, 다른 지역 생활 청산이나 전학·이사 준비 없었던 점 등을 종합하여 갱신요구의 거절을 불허한 사안.\n\n[2021다266631] 주임법 3조 4항으로 임대인 지위 승계한 '주택 양수인'도 주택에 실제 거주하려는 경우에는 임차인의 갱신요구에 대해 6조 1항 기간 내에 8호 사유로 갱신 거절 O.",["§주임법6"],0,"주임법","대판 2022다279795, 2021다266631","미분류"],
  ["채권각론_P157","93다30532","차임 등 증액 제한 — 존속 중 일방 청구 시만 적용, 종료 후 재계약·합의증액은 적용 X","주임법 7조 차임 등 증액 제한 규정이 임대차 종료 후 재계약 또는 합의에 의한 증액에도 적용되는지","차임 등 증액 제한 규정은 임대차계약 '존속 중'에 '일방'이 청구한 경우만 적용 O, '임대차 종료 후 재계약' 혹은 '합의로 증액'할 경우에는 위 규정 적용 X, 1/20 초과 증액 가능.\n\n正辯: 위 판결 당시 주임법 7조는 '존속 중 일방이 청구'할 때만 적용되었지만, 최근 개정으로 갱신요구권 행사 시에도 적용됨을 유의.",["§주임법7"],0,"주임법","대판 93다30532","미분류"],
  ["채권각론_P158","2013다215676, 2024다293016","상임법 적용범위 — 환산보증금 초과 시 대항력 부정 및 건물의 정착물 요건","사업자등록상 환산 보증금액이 적용대상 보증금액 한도를 초과하는 경우 대항력 주장 가부, 및 상임법상 '건물'의 정착물 요건","[2013다215676] 사업자등록신청서에 첨부한 임대차계약서·등록사항현황서에 기재되어 공시된 임대차보증금 및 차임에 따라 환산된 보증금액이 구 상임법 적용대상 되기 위한 보증금액 한도를 초과하는 경우는, 실제 임대차계약의 내용에 따라 환산된 보증금액이 기준을 충족하더라도, 구 상임법상 대항력 주장 X.\n\n[2024다293016] 상임법 적용 상가건물은 사업자등록 대상 건물, 목적 건물을 영업용으로 사용하는 임대차, 독립 부동산 건물은 토지 정착물로서 최소 기둥·지붕·주벽 있어야 → 토지로부터 쉽게 분리되거나 기둥·지붕·주벽 없다면 건물 X → 요건을 못 갖춘 구조물은 토지 정착물인 건물이 아닌 동산 → 상임법 적용 X.\n\n正辯: 컨테이너·가설건축물은 영업시설로 이용되더라도 고정적 부착되지 않아 상임법 적용 X.",["§상임법2","§상임법3"],0,"상임법","대판 2013다215676, 2024다293016","미분류"],
  ["채권각론_P159","2005다64002, 2013다211919, 2023다257600","상임법 대항력 존속요건·신규임대차계약 시 대항력 소멸·종료 후 점유 차임의무","사업자등록 존속요건, 새로운 임대차계약 체결 시 종전 대항력 소멸 여부, 상임법 9조 2항 의제 임대차에서 부당이득반환의무","[2005다64002] 사업자등록은 존속요건이므로 배당요구 종기까지 갖추어야 하며, 휴업하거나 전대차 등으로 사실상 폐업을 하게 되면 대항력 X.\n\n[2013다211919] 상가건물 대항력·우선변제권 취득 이후 건물이 양도되었는데, 임차인이 새로운 소유자와 종전 임대차계약의 효력을 소멸시키고 새로운 임대차계약을 체결했다면 종전 임대차계약으로 발생했던 대항력·우선변제권도 함께 소멸.\n\n[2023다257600] 상임법 적용되는 임대차 종료하고 보증금 반환받을 때까지 목적물 계속 점유·사용·수익한 임차인은 종전 임대차계약의 차임 지급의무 부담할 뿐, 시가 따른 차임 상당 부당이득반환의무 X ∵ 상임법 9조 2항 입법취지(보증금반환 실질 보장), 종료 후 의제되는 임대차관계의 법적 성격.",["§상임법3","§상임법9"],0,"상임법","대판 2005다64002, 2013다211919, 2023다257600","미분류"],
  ["채권각론_P160","2020다241017, 2020다255429, 2021다233730","상임법 갱신요구권 — 의무임대차기간 적용시기·연체사유 판단시점·환산보증금 초과시 적용 배제","개정 상임법 10조 2항 의무임대차기간 10년의 시행 전 적용 여부, 10조 1항 1호 연체사유의 판단 시점, 환산보증금 초과 상가임대차에 9조 1항·10조 적용 여부","[2020다241017] 개정 상임법 10조 2항 의무임대차기간 10년 적용 X (시행 이전 사안).\n\n[2020다255429] 임대기간 중 어느 때든 3기분 달하도록 차임 연체된 사실 있다면 임대인은 임차인의 갱신요구 거절 O(상임법 10조 1항 1호) ∵ 10조 1항 1호 갱신요구 거절사유는 '3기 차임액 해당 금액 이르도록 차임 연체한 사실 있는 경우'로 규정하여 10조의8 차임연체 계약해지 요건 '차임연체액이 3기 차임액 달하는 때'와 문언 다름, 임차인과의 계약관계 연장 수용할 신뢰 깨짐 → 임차인 갱신요구권 행사 당시에 3기 차임액 연체되어 있어야 하는 것은 X.\n\n[2021다233730] 상임법 9조 1항(기간 정하지 않으면 1년 간주)은 환산보증금 초과하는 상가임대차에 적용 X(동법 2조 1항 단서) → 보증금 초과하고 임대기간 정하지 않으면 민법 적용 O, 임대인은 언제든지 해지통고 O, 6개월 지나면 효력(민법 635조 1항, 2항 1호) → 이 경우는 10조 1항 갱신요구권 적용 여지 X ∵ 갱신요구권은 임대기간 정해져 있음을 전제로 하는 권리.\n\n正辯: 위 2020다255429 법리는 상임법과 연체금액만 2기로서 다르고, 규정 형식이 동일한 주임법에도 그대로 적용될 것으로 보임(私見).",["§상임법9","§상임법10"],0,"상임법","대판 2020다241017, 2020다255429, 2021다233730","미분류"],
  ["채권각론_P161","2023다307024, 2009다64307","상임법 묵시의 갱신 — 임차인 갱신거절 통지 기간 제한 없음, 5년(현행 10년) 초과 적용 X","상가 임차인이 임대기간 만료 1개월 전부터 만료일 사이 갱신거절 통지한 경우 묵시적 갱신 여부, 묵시갱신에 10조 2항 초과금지 규정 적용 여부","[2023다307024] [요사] 상가 임차인이 임대기간 만료 1개월 전부터 만료일 사이 갱신거절 통지한 경우에도 묵시적 갱신 X, 임대차기간 만료일에 종료 O. 만료일 6월부터 1월 전까지 사이에 임차인 별다른 조치 없다고 만료 전 1개월 경과로 묵시 갱신 X ∵ 기간 정한 임대차는 기간만료로 종료 원칙, 민법 639조는 만료 후 상당 기간 이의 없어야 하고 만료 전 갱신거절 통지하면 묵시갱신 X, 상임법 10조 1항은 임차인의 갱신요구권 인정할 뿐 임차인의 '갱신거절 통지'는 기간 제한 없음, 4항은 묵시적 갱신 규정하면서 '임대인'의 갱신거절·조건변경 통지기간 제한했을 뿐 '임차인'에 대해서는 기간 제한 규정 없음(≠ 주임법 6조 1항 후문은 '임차인'도 종료 2월 전이라는 갱신거절 통지기간 제한 있는 것과 차이), 규정 없는 이상 상가의 임차인의 갱신거절 통지기간은 제한 없음, 문언해석, 임차인 보호 입법취지.\n\n[2009다64307] 묵시의 갱신에는 갱신요구권에서의 10조 2항 5년(현행은 10년) 초과금지 규정이 적용되지 X → 전체 기간 5년 넘어도 묵시 갱신 O.\n\n正辯: 상임법 묵시 갱신은 주임법과 달리 차임 연체 등 의무 위반 임차인 배제 규정 없음.",["§상임법10","§639"],0,"상임법","대판 2023다307024, 2009다64307","미분류"],
  ["채권각론_P162","2022다309337","코로나19 특례기간 연체차임 충당 순서 — 변제이익 적은 특례기간부터 후순위 법정충당","상임법 10조의9 코로나19 특례기간의 연체 차임액에 대한 변제충당 방법","상임법 10조의9(코로나19 여파 임차인 구제하고자 특례기간 2020. 9. 29.부터 6개월 동안의 연체 차임액을 갱신요구 거절사유(10조 1항 1호), 권리금 회수기회제외사유(10조의4 제1항 단서), 계약 해지사유(10조의8)의 연체 차임액에서 제외) → 임차인 변제제공이 연체 전액 미치지 못하면 임차인은 476조 1항 지정충당 O, 임대인의 476조 2항 지정충당은 상임법 10조의9에 반할 경우 적용되지 X → 결국 코로나 특례기간 포함하여 전후 연체 차임액 전부에 미치지 못하면 합의충당이나 임차인 지정충당 등 특별한 사정 없는 한 477조 법정충당에 따라 변제제공 시점에 이행기 도래한 연체차임에 먼저 충당(1호), 그중 상가임대차법 10조의9 특례기간의 연체차임은 임대인의 갱신거절권·해지권 등 권리행사 제한되어 변제이익 적으므로 이행기 도래한 다른 연체차임보다 후순위로 충당(2호).",["§상임법10","§476","§477"],0,"상임법","대판 2022다309337","미분류"],
  ["채권각론_P163","2013다35115","상임법 차임 증액 비율 초과 약정 — 초과부분 무효, 부당이득반환청구 O","상임법 11조 1항, 시행령 14조 소정의 증액 비율(5%)을 초과하여 지급하기로 한 차임 약정의 효력","상임법 제11조 제1항, 동 시행령 14조 소정의 증액 비율(5%)을 초과하여 지급하기로 한 차임 약정은 증액비율을 초과한 범위 내에서 무효 → 임차인은 초과 지급된 차임에 대하여 부당이득반환청구 O.",["§상임법11"],0,"상임법","대판 2013다35115","미분류"],
  ["채권각론_P164","2002다25013","권리금 보장기간 이용 후 해지 — 임대인의 권리금 반환의무 잔존기간 한정","일정기간 이상 임차권 보장 약정하며 임차인이 임대인에게 권리금을 지급한 경우, 임대인의 사정으로 임대차계약이 중도 해지된 경우 권리금 반환의무","일정기간 이상 임차권 보장 약정하며 임차인이 임대인에게 권리금 지급한 경우 보장기간 이용 유효하게 이뤄진 이상 임대인은 권리금 반환의무 X → 다만 임대인 사정으로 임대차계약 중도 해지됨으로써 당초 보장기간 동안 이용 불가능했던 특별한 사정 있다면 임대인은 권리금반환의무 O → 임대차계약 종료될 때까지 기간 대응 부분 공제한 잔존기간 대응 부분만 반환의무 O.",["§상임법10"],0,"상임법","대판 2002다25013","미분류"],
  ["채권각론_P165","2017다225312, 2019다296172","권리금 회수기회 보호의무 — 갱신요구권 행사 불가능해도 부담, 학교법인의 경쟁입찰 의무 위반은 정당한 사유","전체 임대차기간이 5년(현행 10년)을 초과하여 갱신요구권 행사 불가능한 경우 권리금 회수기회 보호의무 부담 여부 및 학교법인의 임대차계약 체결 거절의 정당성","[2017다225312] 상임법 10조 2항에 따라 전체 임대차기간이 5년(현행 10년)을 초과하여 갱신요구권을 행사할 수 없는 경우에도 임대인은 10조의4 1항의 권리금 회수기회 보호의무를 부담해야.\n\n[2019다296172] 학교법인이 임차인이 주선한 신규임차인이 되려는 자와 임대차계약 체결하는 것이 사립학교법 등이 규정한 경쟁입찰 방법으로 선정할 법령상 의무 위반이라면 학교법인이 그러한 사정 들어 임대차계약 체결 거절 O, 상임법 10조의4 1항 4호가 규정한 '정당한 사유' O.",["§상임법10"],0,"상임법","대판 2017다225312, 2019다296172","미분류"],
  ["채권각론_P166","2019다285257, 2021다272346","권리금 회수방해 정당한 사유(2항 3호) — 거절 사유와 1년 6개월 미사용의 인과관계 + 소유권변동 시 합산","상임법 10조의4 2항 3호 '1년 6개월 이상 영리목적 미사용'의 정당한 사유 인정 요건 및 소유권 변동 시 비영리 사용기간 합산 가부","[2019다285257] 상임법 10조의4 2항 3호 '상가건물을 1년 6개월 이상 영리목적으로 사용하지 않은 경우'로 정당한 사유 있으려면, 임대인이 임대차 종료 시 임차인이 주선한 자와 신규 임대차계약 체결을 그 사유로 거절하고 실제 1년 6개월 동안 영리목적 사용하지 않아야 → 다른 사유로 거절하고 사후적으로 1년 6개월 동안 영리목적 사용하지 않았다는 사정은 정당한 사유 X.\n\n[2021다272346] 종전소유자 임대인이 임대차 종료 후 상가건물을 영리목적으로 사용하지 않은 기간이 1년 6개월에 미달한 사이에 소유권 변동되어도, 임대인이 영리목적 사용 않는 상태가 새로운 소유자 소유기간에도 계속 유지될 것 전제로 처분하고, 실제 새로운 소유자가 그 기간 중 영리목적 사용 않으며, 임대인과 새로운 소유자의 비영리 사용기간을 합쳐서 1년 6개월 이상 되는 경우라면, 위 3호의 정당한 사유 O.",["§상임법10"],0,"상임법","대판 2019다285257, 2021다272346","미분류"],
  ["채권각론_P167","2018다252441, 2018다284226, 2018다239608","권리금 회수방해 4호 정당한 사유 부정 및 손해배상 요건 — 권리금계약 미체결 불요","임대인 자신의 영업계획 이유만으로 거절하는 것이 정당한 사유인지, 임차인이 신규임차인을 주선하지 않았더라도 손해배상 책임이 인정되는지, 권리금계약 체결 필요 여부","[2018다252441, 2024다305605] 임대인 스스로 영업할 계획이라는 이유만으로 임차인이 주선한 신규임차인 되려는 자와 임대차계약 체결을 거절하는 것은 4호 '정당한 사유' X.\n\n[2018다284226, 2022다202498, 2024다305605] 임차인이 신규임차인을 주선하지 않았더라도 임대인이 정당한 사유 없이 신규 임차인 주선하여도 임대차계약 체결하지 않겠다는 의사를 확정적으로 표시했다면 임차인이 실제로 신규 임차인 주선하지 않았더라도 위 손해배상책임 O.\n\n[2018다239608] 상임법 10조의4를 위해 반드시 임차인과 신규임차인 되려는 자 사이 권리금계약이 미리 체결돼 있을 필요 X ∵ 규정 문언상 권리금계약 체결을 전제로 하지 않음, 3항은 '임대차종료 당시 권리금'으로 손해배상 정할 수 있도록, 임대인이 권리금계약 체결에 이르지 못하게 하는 방해행위도 포함되므로.",["§상임법10"],0,"상임법","대판 2018다252441, 2018다284226, 2018다239608","미분류"],
  ["채권각론_P168","2018다242727, 2022다260586","권리금 손해배상 — 목적물반환의무와 동시이행 X + 종료일 다음날부터 지체책임","임차목적물반환의무와 권리금 회수 방해 손해배상의무의 동시이행관계 여부 및 손해배상채무의 이행기·지체책임 발생시점","[2018다242727] 동시이행관계는 쌍무계약 고유 대가관계 채무 아니더라도 대가적 의미 있거나 공평의 관점에서 인정 가능 → 임차목적물반환의무와 권리금 회수 방해로 인한 손해배상의무는 공평 관점에서도 동시이행관계 X ∵ 전자는 임대차계약 종료로, 후자는 상임법의 권리금 회수기회 보호의무 위반으로 발생.\n\n[2022다260586] 상임법상 임대인의 권리금 회수기회 방해로 인한 손해배상채무는 특별한 법정책임이며, 임대차 종료한 날 이행기 도래 O, 그 다음날부터 지체책임 O ∵ 손해배상이 종료 당시 권리금 넘지 않도록 규정한 점, 그 소멸시효 기산일이 임대차 종료한 날인 점 등.\n\n正辯: 목적물 미반환 상태에서도 권리금 회수 방해 손배채권을 자동채권으로 상계 O.",["§상임법10"],0,"상임법","대판 2018다242727, 2022다260586","미분류"],
  ["채권각론_P169","86다카2446, 2010다56685","제작물공급계약의 성질 — 부대체물은 도급으로 취급","제작물공급계약에서 대체물·부대체물 구분에 따른 적용 법리 — 자동포장기 제작공급계약 및 승강기 제작설치 공사계약","[86다카2446] '주문에서 제시한 도안·규격에 맞는 茶의 자동포장기 제작·공급계약' → 도급 → 상법 69조 1항 적용 X.\n\n[2010다56685] '신축 건물에 맞추어 일정 사양으로 특정된 승강기 제작설치 공사계약' → 도급 → 승강기제작자의 대금채권은 163조 3호 공사 관한 채권 3년 단기시효.\n\n正辯: 제작물공급계약은 제작 측면은 도급, 공급 측면은 매매 → 매매·도급 성질을 함께 가짐 → 대체물이면 매매로, 부대체물이면 도급으로 보아 각 규정을 적용.",["§664","§163"],0,"도급","대판 86다카2446, 대판 2010다56685","미분류"],
  ["채권각론_P170","92다41559","난지도 쓰레기처리장 건설공사 — 도급계약 해제효과가 기성고부분에 미치지 않는 경우","건설공사 완공 후 도급계약이 해제된 경우 토목 및 건축공사 기성고부분에 해제 효력이 미치는지","난지도 쓰레기처리장 건설공사 완공 후 도급계약 해제된 경우, 기계 및 전기공사부분에만 효력 미치고, 토목 및 건축공사 기성고부분에는 해제 효력 X ∵ 668조 단서 취지, 신의칙, 수급인 과대 손실, 사회경제적 손실.",["§668"],0,"도급","대판 92다41559","미분류"],
  ["채권각론_P171","2001다82545","수급인의 이행보조자·이행대행자 사용과 계약불이행 여부","공사도급계약에서 수급인이 이행보조자·이행대행자를 사용한 경우 계약불이행 여부","공사도급계약에서 특약 있거나 일의 성질상 수급인 자신이 해야 할 경우 등 특별한 사정 없는 한 반드시 수급인 자신이 직접 일 완성해야 하는 것은 아님 → 이행보조자·이행대행자 사용하더라도 계약불이행 X.",["§664"],0,"도급","대판 2001다82545","미분류"],
  ["채권각론_P172","95다18376, 95다11436, 96다21393, 88다카15901","지체상금의 시기·종기 및 도급계약 기한 전 해제와 최고 요건","공사도급계약 지체상금의 발생 기간 제한, 수급인 공사중단·지연 시 도급인의 기한 전 해제 요건, 도급계약 해제 후 지체상금 발생 여부","[95다18376, 95다11436] 지체상금 발생 始期는 약정 준공일, 終期는 건물준공시까지 무한 계속 X → '공사중단 등 해제사유로 도급인이 해제할 수 있었을 때(실제로 해제한 때 X)부터 도급인이 다른 업자에 의뢰하여 같은 건물을 완성할 수 있었던 시점까지'로 제한(수급인 책임질 수 없는 사유로 공사 지연된 경우는 그 기간만큼 공제).\n\n[96다21393] 공사도급계약에서 수급인의 공사중단·공사지연으로 약정된 기한 내의 공사 완공 불가능함이 명백해졌다면 도급인은 기한 도래 전에도 해제 O, 단 그에 앞서 수급인에 대해 공사기한으로부터 상당 기간 내 완공할 것을 '최고'해야 → 예외적으로 수급인이 미리 이행하지 않을 의사 표시했다면 최고 불요.\n\n[88다카15901] 공사 도중 도급계약 해제되어 수급인이 공사 중단하면 지체상금 논할 여지 X.",["§664"],0,"도급","대판 95다18376, 95다11436, 96다21393, 88다카15901","미분류"],
  ["채권각론_P173","2011다67323, 2013다81224","도급 — 지체상금채권과 공사대금채권 동시이행 X, 도급인 자신의 이행지체로 인한 지연손해금","분양 아파트 하자 관련 도급인의 지연손해금과 수급인 채무불이행의 인과관계, 지체상금채권과 공사대금채권의 동시이행 여부","[2011다67323] 분양한 아파트의 하자와 관련하여 도급인이 구분소유자에게 손해배상금 및 지연손해금 지급 → 지연손해금은 수급인의 도급계약상 채무불이행과 인과관계 X, 도급인 자신의 이행지체에 따라 발생한 것.\n\n[2013다81224] 지체상금채권과 공사대금채권은 특별한 사정 없는 한 동시이행 X.\n\n正辯: 본 사안은 하도급법에 따른 직접지급청구권의 발생시기와 상계 가부에 관한 것인데, 민법에서는 공사대금채권의 채권양도·지급금지명령이 있고 그 통지도달일·명령송달일보다 늦게 지체상금채권이 발생한 사례로 변형 가능 → 451조2항·498조 규정상 상계 요건 갖추지 못함 → 서로 동이항 관계면 예외적 허용되나 동이항 관계 아니므로 최종적으로 상계 불허.",["§664","§536"],0,"도급","대판 2011다67323, 2013다81224","미분류"],
  ["채권각론_P174","80다1014, 91다14116","수급인의 신축건물 원시취득 — 도급인 인도 전까지 소유권은 수급인에게","수급인이 자기 재료·노력으로 건물을 건축한 경우 소유권 귀속 및 건물 기성부분에 대한 유치권 성립 여부","[80다1014] 수급인이 자기 재료·노력으로 건물 건축하면 특별한 의사표시 없는 한 도급인이 대금 지급하고 건물 인도 받기까지는 소유권은 수급인에게.\n\n[91다14116] 수급인의 재료·노력으로 건축된 독립한 건물 기성부분에 수급인은 유치권 X ∵ 건물은 수급인 소유이고 유치권은 타물권이므로.",["§664","§320"],0,"도급","대판 80다1014, 91다14116","미분류"],
  ["채권각론_P175","91다25505","채무담보 목적 건축허가명의와 신축건물 소유권 — 채무자 원시취득 후 채권자에 담보목적 이전","채무담보 위해 채무자가 자기 비용·노력으로 신축하는 건물의 건축허가명의를 채권자 명의로 한 경우 소유권 귀속","단지 채무담보 위해 채무자가 자기 비용·노력으로 신축하는 건물의 건축허가명의를 채권자 명의로 한 경우, 이는 완성될 건물의 담보제공 합의 O → 완성된 건물의 소유권은 일단 채무자가 원시취득한 후, 채권자 명의로 소유권보존등기를 마침으로써 담보목적 범위 내에서 채권자에게 소유권 이전 O.\n\n正辯: 매매대금채무 담보 사안이었으며, 가담법 적용되는 대여금채무 담보 목적인 경우에 관하여는 비전형담보에서 후술하는 최신판례 참조.",["§664"],0,"도급","대판 91다25505","미분류"],
  ["채권각론_P176","2000다16350","건축주 명의와 무관하게 자기 비용·노력으로 신축한 자가 소유권 원시취득","건축허가의 타인 명의로 자기 비용·노력으로 건물을 신축한 경우 소유권 귀속, 건축주 사정으로 공사 중단된 미완성 건물을 인도받아 완공한 경우의 소유권","자기 비용·노력으로 건물 신축한 자는 건축허가의 타인 명의 여부에 관계없이 소유권 원시취득 ∵ 건축허가는 일반적 금지 해제, 건축허가서는 실체적 권리득실변경 공시방법 X, 추정력 X, 건축허가서상 건축주가 건물 소유권 취득 X → 건축주 사정으로 공사 중단된 미완성 건물 인도받아 나머지 공사 마쳐 완공한 경우, 공사 중단된 시점에서 이미 사회통념상 독립한 건물(지붕·주벽·기둥)이라면 원래의 건축주가 건물 소유권 원시취득 O.",["§664"],0,"도급","대판 2000다16350","미분류"],
  ["채권각론_P177","97다44768, 80다923","건물 신축공사의 미완성과 하자 구별 기준 및 하자보수비 산정 기준일","건물 신축공사가 '미완성'인지 '하자'인지 구별하는 기준 및 하자보수비 산정 시점","[97다44768] 건물 신축공사의 '미완성'과 '하자'를 구별 기준은, 공사가 도중에 중단되어 예정된 최후 공정 종료하지 못한 경우는 '미완성', 당초 예정된 최후 공정까지 일단 종료하고 그 주요 구조 부분이 약정대로 시공되어 사회통념상 건물로서 완성되고 다만 불완전하여 보수 필요하면 완성되었으나 '하자' → 당해 신축공사 도급계약의 구체적 내용과 신의성실 원칙에 비추어 객관적으로 판단해야.\n\n[80다923] 하자보수비는 하자보수청구시 또는 보수 갈음 손해배상청구시를 기준으로 산정하여야.",["§667"],0,"도급","대판 97다44768, 80다923","미분류"],
  ["채권각론_P178","97다54376, 95다30345, 2014다31691","667조 1항 단서 — 하자가 중요하지 않은 경우와 중요한 경우의 손해배상 범위","667조 1항 단서에 따라 하자가 중요하지 않고 보수에 과다한 비용이 드는 경우 및 하자가 중요한 경우의 손해배상 범위","[97다54376] 667조 1항 단서 하자가 중요하지 않고 보수 과다 비용 요하면 하자 보수 X, 보수 갈음 손해배상 X, '하자로 인해 입은' 손해배상 O = 하자 없이 시공한 목적물 교환가치와 하자 있는 현재 상태 '교환가치 차액', 다만 교환가치 차액 산출 불가능한 경우 두 경우의 '시공비용 차액'으로 배상.\n\n[95다30345] 하자가 중요하다면 보수에 과다한 비용 들더라도 보수에 갈음하는 비용, 즉 실제로 보수에 필요한 비용 모두 손해배상 포함 O.\n\n[2014다31691] 완성된 건물에 중대한 하자가 있어 무너질 위험성 있고 보수 불가능하여 다시 건축할 수밖에 없다면 철거 및 재건축 비용 상당액 손해배상 O.",["§667"],0,"도급","대판 97다54376, 95다30345, 2014다31691","미분류"],
  ["채권각론_P179","91다33056, 2001다9304","수급인 담보책임과 보수지급청구권의 동시이행 — 도급인의 명료한 청구 필요·기성공사대금 한정","목적물 하자가 있다는 이유만으로 도급인이 보수지급을 거절할 수 있는지, 기성고 분할지급 약정 시 동시이행 대상이 되는 공사대금의 범위","[91다33056] 완성된 목적물 하자 있을 경우 하자보수청구권, 갈음·함께 손해배상청구권 있는데 이들은 특별한 사정 없는 한 보수지급청구권과 동시이행 O → 목적물 하자 있다는 이유로 도급인이 하자보수나 손해배상 청구 없이 막바로 보수지급 거절 X → 도급인이 보수지급 거절하려면 먼저 하자보수청구권, 손해배상청구권, 함께 청구 등 명료하게 해야.\n正辯: 도급인의 담보책임 청구 내용이 무엇인지 확정하지 않고 수급인의 보수지급청구 기각한 원심판결을 법리오해 및 석명의무 위반으로 파기함. 담보책임 중에서도 하자보수청구권과 손해배상청구권이 동시이행 관계를 보이는 양상이 다르고, 또 수급인의 입장에서 어떤 책임을 지는지 알아야 반대급부 이행이 가능하기 때문으로 보임(私見).\n\n[2001다9304] 기성고에 따른 공사대금 분할지급 약정을 한 경우라도 특별한 사정 없는 한 '하자보수의무'와 동시이행관계에 있는 '공사대금지급채무'는 당해 하자 발생 부분의 기성공사대금에 한정되지 X ∵ 도급인이 하자발생사실을 모른 채 하자 발생 부분의 기성공사대금 지급하고 난 후 뒤늦게 하자 발견하면 공평에 반함. 미지급 공사대금(약 54억)에 비해 하자보수비(약 7억) 매우 적고, 하자보수공사가 완성되어도 공사대금 지급 여부 불확실한 경우(도급인이 기성공사대금 전혀 지급하지 않았고 현재 무자력), 도급인이 '하자보수청구권'으로 동시이행항변 할 수 있는 기성공사대금 범위는 하자 및 손해 상응 금액 한정 ∵ 공평, 신의칙.\n正辯: 앞의 요지는 기성고별 공사대금이 분할 지급으로 분리되어 있어도 도급인이 하자보수청구하며 거절할 수 있는 공사대금이 해당 하자의 기성부분 공사대금에 한정되지 않는다는 취지로서, 단순히 하자보수청구권을 행사할 경우 공사대금 전액을 거절할 수 있다는 불가분성[통] 논의와는 차원이 다름(私見). 뒤의 요지는 하자보수청구권을 행사하는 경우도 도급인의 무자력 등을 이유로 공사대금 전액 지급 거절할 수 없고 하자·손해에 상응하는 부분만의 거절을 인정한 것인데, 하자보수청구는 전액 지급을 거절할 수 있다는 통설을 전제로 하면 예외적 판례에 해당하게 됨.",["§667","§536"],0,"도급","대판 91다33056, 2001다9304","미분류"],
  ["채권각론_P180","95다12798","손해배상청구 시 동시이행 범위 — 손해배상액 상응하는 보수액만 지급거절 가능","완성된 목적물 하자로 도급인이 하자보수 갈음 손해배상청구를 한 경우 도급인의 보수지급 거절 범위","완성된 목적물 하자로 도급인이 하자보수 갈음 '손해배상청구'를 한 경우에 도급인은 그 손해배상액 상응하는 보수액만 지급 거절 O, 나머지는 지급 거절 X → 공사대금채권 중 손해배상채권과 동액의 채권만 동시이행관계.\n\n正辯: 한편 '하자보수청구권과 갈음·함께 손해배상청구권은 공사대금채권과 동시이행관계로서, 도급인이 위 권리 보유·행사하는 한 공사대금채무는 이행지체 빠지지 않고, 손해배상채권(자동채권)으로 공사잔금채권(수동채권)과 상계 의사표시를 한 다음날 비로소 지체'라는 96다7250 판결은, 위 95다12798 판결과 모순되는 측면이 있으나 따로 익혀둘 것(수업시간 설명 참조).",["§667","§536"],0,"도급","대판 95다12798","미분류"],
  ["채권각론_P181","2004다37676","하자확대손해로 인한 수급인의 채무불이행 손해배상채무도 공사대금채무와 동시이행","하자확대손해로 인한 수급인의 채무불이행 손해배상채무가 공사대금채무와 동시이행관계에 있는지","하자확대손해로 인한 수급인의 (채무불이행) 손해배상채무도 공사대금채무와 동시이행 O ∵ '비록 쌍무계약관계 고유의 대가관계는 없더라도 이행상 견련성 인정할 사정이 있다면 동시이행 항변권 인정', 667조 3항의 536조 준용으로 하자 손해배상채권이 동시이행관계인 점.",["§667","§536"],0,"도급","대판 2004다37676","미분류"],
  ["채권각론_P182","2000다35771, 2000다17810","계약보증금·하자보수보증금의 법적 성질 — 위약벌 인정에는 특별한 사정 필요","도급계약에서 지체상금 외에 계약보증금이 규정된 경우 위약벌 인정 여부 및 하자보수보증금의 성격","[2000다35771] 도급계약서에 계약보증금 외에 지체상금도 규정되어 있다는 점만을 이유로 계약보증금을 위약벌로 볼 수는 X ∵ 위약금은 손해배상액 예정으로 추정되어(398조 4항) 위약벌로 해석되려면 특별한 사정 주장·입증되어야.\n正辯: 이와 저촉되어 보이는 95다11436 판결은 더 최근에 선고된 2000다35771 판결로 실질적 변경되었다는 해석이 일반적임. 즉, '계약이행보증금' 역시 지체상금 규정이 별도로 있는지 여부를 떠나 원칙적으로는 손해배상액 예정이며 예외적으로만 위약벌임.\n\n[2000다17810] '하자보수보증금은 특수성상 실손해가 이를 초과한다면 입증하여 그 외 따로 손해배상 받을 수 있는 특수한 손해배상액의 예정'.",["§398"],0,"도급","대판 2000다35771, 2000다17810","미분류"],
  ["채권각론_P183","2001다70337","액젓 저장탱크 균열 사안 — 보수비용은 하자담보책임, 변질손해는 별개 채무불이행책임","액젓 저장탱크 제작·설치공사 도급계약에서 완성된 저장탱크에 균열 발생하여 변질손해가 발생한 경우의 책임 구성","액젓 저장탱크 제작·설치공사 도급계약에서 완성된 저장탱크에 균열 발생한 경우 → ⓐ 보수비용은 667조 2항 수급인의 하자담보책임 중 하자보수에 갈음하는 손해배상, ⓑ 액젓 변질로 인한 손해배상은 '위 하자담보책임을 넘어서 수급인이 도급계약상 의무를 제대로 이행하지 못함으로써 도급인의 신체·재산에 발생한 손해에 대한 배상' → 양자는 별개 권원에 의하여 경합적 인정.\n正辯: '보수비용'은 담보책임으로 물을 수 있으나, '액젓변질손해(확대손해)'는 담보책임으로 물을 수 없어 채무불이행책임(불완전이행)으로 구성한 판례이며, 위 각 손해는 별개로 모두 배상받아야 하는 것이므로 위 판례가 '경합적'으로 인정한다고 표현한 것은 잘못으로 생각됨(私見). 이와 달리 매도인 담보책임(570조, 580조)과 채무불이행책임의 경합을 인정한 판례(전술), 수급인 담보책임과 채무불이행책임의 경합을 인정한 아래의 2020다201156 판결은 진정한 의미에서의 '경합'.",["§667","§390"],0,"도급","대판 2001다70337","미분류"],
  ["채권각론_P184","2020다201156, 2021다210195","도급 완성물 하자 — 하자담보책임과 채무불이행책임 진정한 경합 + 부가가치세·소멸시효","도급계약 완성물 하자에 대한 하자담보책임과 채무불이행책임의 경합 및 부가가치세 손해배상 가부, 상행위 도급의 소멸시효 기산점","[2020다201156] 도급계약의 완성물에 하자 있는 경우, 수급인의 하자담보책임과 채무불이행책임은 별개 권원에 의해 경합적 인정 O → 도급인은 하자보수비용을 667조 2항 하자담보책임으로도, 390조 채무불이행으로도 구할 수 O → 채무불이행으로 구할 경우 이행보조자 규정 적용 O, 계약특수조건에 하자보수보증기간 경과했어도 채무불이행책임(불완전이행) 손해배상책임 주장 O.\n\n도급인이 보수공사에 부가가치세 부담해야 한다면 수급인에 대한 하자보수 갈음 손해배상청구에 포함시켜 청구 O → 그러나 도급인이 부가가치세 과세사업자로서 매출세액에서 공제·환급받을 수 있다면 부가가치세 상당 손해배상청구 X.\n\n[2021다210195] 건설공사 도급계약이 상행위라면 수급인의 하자담보책임은 상법 64조 본문에 의해 소멸시효기간 5년, 민법 166조 1항에 따라 하자 발생 시점부터 진행함이 원칙 → 그러나 하자가 건물 인도 당시부터 이미 존재하고 있었다면 하자보수 갈음 손해배상채권의 소멸시효는 건물 인도한 날부터 진행.",["§667","§390"],0,"도급","대판 2020다201156, 2021다210195","미분류"],
  ["채권각론_P185","93다25080, 91다42630, 88다카32470, 2022다289174, 2020다210860","공작물 미완성 해제 시 기성고 비율 보수청구권 + 예외적 보수청구권 인정 요건","건축도급계약에서 미완성부분이 있어도 해제 시 기성부분에 대한 보수청구권 인정 여부 및 산정 방법, 설계·사양 변경 시 적용 기준","[93다25080, 91다42630, 88다카32470] 건축도급계약에서 '미완성부분 있더라도 공사가 상당 정도 진척되어 그 원상회복이 중대한 사회·경제적 손실 초래하고 완성된 부분이 도급인에게 이익이 되는 경우, 수급인의 채무불이행을 이유로 도급인이 도급계약 해제해도 미완성부분만 도급계약 실효' → 수급인은 해제한 때 상태로 도급인에게 인도, 도급인은 완성부분 상당한 보수(약정총공사비에 중단 당시 공사기성고비율 곱한 금액) 지급해야 O, 수급인이 실제로 지출한 비용 X → 여기서 '기성고비율'은 완성된 부분 소요비용에 미시공 부분 소요비용을 합친 전체공사비 중 완성된 부분 소요비용이 차지하는 비율 → 도급인의 채무불이행으로 해제된 경우도 마찬가지 O → 합의해제 사안에도 같은 법리 적용.\n\n[2022다289174] 도급계약에서 보수는 완성물 인도와 동시에 지급해야, 인도 요하지 않는 경우 완성 후 지체없이 지급해야 → 도급인은 완성물 인도제공이나 완성 있을 때까지 보수지급 거절 O → 일의 완성 전에 계약 해제된 경우는 수급인 보수청구 X. 다만 수급인 일부 미완성 부분 있더라도 해제 이유로 전부 원상회복함이 신의칙 등에 비추어 공평·타당하지 않은 특별한 경우는 예외적으로 완성된 부분에 수급인의 보수청구권 인정 O → 도급인·수급인 관계, 도급계약 목적·성질, 도급인 관여 여부, 이행 결과 정도 및 그로 인해 도급인 얻을 실질적 이익 존부, 해제 따른 원상회복 시 사회적·경제적 손실 발생 여부 등을 종합적 고려해야.\n正辯: 기존 판례의 '공사가 상당 정도 진척되어 원상회복이 중대한 사회·경제적 손실 초래하고 완성 부분이 도급인에게 이익되는 경우'와 유사한 판결.\n\n[2020다210860] 미완공 상태로 해제되어 기성고 공사비 정산할 경우, 설계·사양 '변경' 있으면 공사대금 변경하는 특약 있었고, 변경된 설계·사양으로 공사 진행되다가 중단되었다면, 변경된 공사대금에 기성고 비율 적용.",["§668","§548"],0,"도급","대판 93다25080, 91다42630, 88다카32470, 2022다289174, 2020다210860","미분류"],
  ["채권각론_P186","2016다267067","선급금 보증계약 체결 후 예외적 정산약정 — 보증인에게 효력 X","건설공제조합이 선급금 보증계약 체결한 후 발주자·수급인·하수급인 사이 직불합의에 따른 예외적 정산약정이 이루어진 경우 보증인의 책임 범위","선급금반환 보증계약 체결한 보증인의 책임 범위도 도급계약 당사자 사이 약정에 따라 결정하되 보증계약 체결 당시의 도급계약상 약정을 기준으로 판단해야 → 선급금 보증계약 체결 '후' 도급인 직접 지급 합의하고 하도급대금을 선급금 충당 대상에서 제외하는 예외적 정산약정을 하여 선급금 보증인의 책임 가중된다면 그 범위 내에서는 보증 효력 X.\n\n正辯: 직접 지급사유 발생한 하도급대금을 선급금 충당 대상인 기성공사대금 내역에서 제외하는 예외적 정산약정 → 건설공제조합이 선급금 보증계약 체결 → 하도급법상 직불합의 → 직불합의에 직불합의 대상(하도급대금)을 선급금 충당 대상 기성공사대금 내역에서 제외하는 예외적 정산약정도 포함된 것 O → 보증계약 체결 '이후' 이뤄진 발주자·수급인·하수급인 사이 직불합의에 따른 예외적 정산약정은 그들 사이에서만 효력, 선급금 보증인에게는 효력 X → 도급인은 보증인에게 직접지급사유 발생한 하도급대금의 선급금 충당 제외 항변 X, 건설공제조합(보증인)은 하도급대금을 선급금으로 충당하고 남은 선급금만 보증책임.",["§428"],0,"도급","대판 2016다267067","미분류"],
  ["채권각론_P187","2014다211978, 2015다19827","666조 저당권설정청구권 — 하수급인의 행사·소멸시효 및 채권양도 시 부수 이전","건물신축공사에서 하수급인의 666조 저당권설정청구권 인정 여부와 소멸시효 진행 시점, 공사대금채권 양도 시 저당권설정청구권의 부수성","[2014다211978] 건물신축공사 도급계약에서 수급인이 자기 노력·출재로 건물 완성하여 소유권이 수급인에게 귀속되면, 수급인으로부터 공사 일부 도급받은 하수급인도 수급인에 대해 666조 저당권설정청구 O ∵ 666조가 도급인·수급인 특약으로 도급인이 원시취득할 경우를 고려한 규정이므로 → 이 경우 객관적으로 하수급인이 행사할 수 있음을 알 수 있게 된 때부터 소멸시효 진행 ∵ 건물 소유권 귀속은 하수급인 관여 없이 도급인·수급인 사이 체결된 도급계약에 따라 결정, 하수급인이 객관적으로 알 수 없는데 소멸시효 진행하는 것은 정의·형평 反.\n\n[2015다19827] 666조 저당권설정청구권 행사에 따라 도급인이 저당권을 설정하는 행위는 사해행위 X ∵ 수급인 지위가 유치권자보다 더 강화되지는 않아서 도급인의 일반채권자들에게 부당하게 불리한 것 X. 공사대금채권 양도되면 저당권설정청구권도 수반하여 함께 이전 O ∵ 저당권설정청구권은 공사대금채권에 부수한 권리 → 수급인으로부터 공사대금채권 양수한 자의 저당권설정청구로 도급인의 저당권설정행위는 사해행위 X.",["§666","§163"],0,"도급","대판 2014다211978, 2015다19827","미분류"],
  ["채권각론_P188","95다1521, 2022다246757","673조 완성 전 도급인 해제권 — 일완성하면 해제권 X, 채무불이행 요건 미비 시 임의해제 의사 X","일을 완성했다면 인도하지 않았더라도 673조 해제권을 행사할 수 있는지, 도급인이 채무불이행을 이유로 한 도급계약 해제 의사표시가 실제로는 채무불이행 요건을 갖추지 못한 경우 673조 임의해제 의사로 볼 수 있는지","[95다1521] 일을 완성했다면 인도하지 않았더라도 673조 해제권 X.\n\n[2022다246757] 도급인이 수급인의 채무불이행 이유로 도급계약 해제 의사표시 했으나 실제로 채무불이행 요건 갖추지 못한 경우, 위 의사표시에 673조 임의해제 의사 X ∵ 채무불이행 해제는 손해배상 청구하고 673조 해제는 손해배상을 해줘야 하므로 도급인의 의사와 다름, 수급인은 채무불이행 없으므로 해제 무효라 믿고 일 계속했다가 673조 해제되면 불측 손해.",["§673"],0,"도급","대판 95다1521, 2022다246757","미분류"],
  ["채권각론_P189","2000다37296","도급인의 673조 해제 시 손해배상에서 수급인 과실로 과실상계 불가","도급인이 673조 임의해제한 경우 수급인에 대한 손해배상에서 수급인의 과실을 들어 과실상계할 수 있는지","도급인이 673조 해제한 경우 수급인에 대한 손해배상 함에 있어서 수급인의 과실을 들어 과실상계 X.",["§673","§396"],0,"도급","대판 2000다37296","미분류"],
  ["채권각론_P190","87다카992, 68다1654","대물반환의 예약(607·608조) — 차용액 산정 기준 및 무효 시 약한 의미의 양도담보로서 효력","대물반환 예약에서 차용액 산정의 기준 시점 및 607·608조 적용으로 예약이 무효인 경우 양도담보계약으로서의 효력","[87다카992] 차용액은 예약 당시 원금과 약정이자 기준으로 하되, 예약 이후 추가 차용한 경우 포함하여 산정.\n\n[68다1654] 대물반환 예약이 607조, 608조 적용으로 무효인 경우도 특별한 사정이 없는 한 예약당사자 간 소위 '약한 의미의 양도담보계약' 함께 맺은 취지 = 담보 목적 소유권 이전 = 정산형 양도담보약정 → 유효 부분.\n\n正辯: 가담법 위반의 경우 약한 의미의 양도담보계약으로서의 효력도 없다고 한 판례와 구별. 대물반환 예약에 터 잡아 가등기·소유권이전등기 마쳐지면 가담법 적용 O.",["§607","§608"],0,"기타전형계약","대판 87다카992, 68다1654","미분류"],
  ["채권각론_P191","89다카2957, 80다1363","경개와 준소비대차의 구별 — 동일성 유지 여부 및 노임채권 준소비대차의 상사시효 적용","경개와 준소비대차의 구별 기준 및 노임채권에 관한 준소비대차 약정의 소멸시효","[89다카2957] 경개나 준소비대차는 모두 기존채무 소멸시키고 신채무를 성립시키는 계약인 점에 있어서는 동일 → 경개는 기존채무와 신채무 사이 동일성 X, 준소비대차는 원칙적 동일성 O → 당사자의 의사가 명백하지 않다면 준소비대차 ∵ 경개로 보게 되면 채권자는 담보를, 채무자는 항변을 상실하는 불이익 초래.\n\n[80다1363] 노임채권에 관하여 근로자와 회사 사이 준소비대차 약정 있는 경우 회사가 영업을 위하여 한 상행위 추정되어 소멸시효는 상사시효 5년 적용 O.",["§605","§500"],0,"기타전형계약","대판 89다카2957, 80다1363","미분류"],
  ["채권각론_P192","2008다34828, 2015다3914","사용대차의 묵시적 성립 — 명의신탁 부동산 점유 및 종중 토지의 유익비상환청구 포기","계약명의신탁 관계에서 신탁자의 부동산 점유·사용 시 묵시적 사용대차 인정 여부, 종중 소유 토지를 무상 사용한 종중원의 유익비상환청구 포기 묵시적 약정 여부","[2008다34828] 매도인 선의인 계약명의신탁 관계에서 수탁자가 등기를 마친 후에 신탁자가 수탁자 용인 아래 그 부동산을 점유·사용해왔다면 수탁자와 신탁자 사이에 묵시적 '사용대차' 계약 인정 → 203조 적용 X.\n正辯: 그 비용상환에 관하여는 611조 2항 등이 적용될 것임(2001다64752 판결 참조).\n\n[2015다3914] 사용대차에서 차주는 유익비상환청구 O (611조 2항, 594조 2항, 203조 2항) → 그러나 종중이 종중원에게 종중 소유 토지를 무상 사용하도록 하는 묵시적 사용대차계약 성립한 경우, 사용·수익에 충분한 기간이 지난 후에 종중의 반환요청을 받은 종중원은 유익비상환청구 포기 묵시적 약정 O ∵ 토지의 장기 무상 사용대차는 종중·종중원 아니라면 매우 이례적, 장기간 토지 사용이익을 향유한 종중원의 유익비상환청구는 형평에 反.",["§609","§611","§203"],0,"기타전형계약","대판 2008다34828, 2015다3914","미분류"],
  ["채권각론_P193","2019다202795","사용대차 차주의 무단 사용·수익 — 대주의 해지권 및 차주의 권리를 양도받은 자의 지위","사용대차의 차주가 대주의 승낙 없이 제3자에게 차용물을 사용·수익하게 한 경우 대주의 해지권 및 차주의 권리를 양도받은 자의 대항력","사용대차의 차주는 특약이 없는 한 대주의 승낙 없이 제3자에게 차용물 사용·수익하게 X(제610조 제2항) ∵ 무상계약은 증여처럼 개인적 관계 중점 → 차주가 규정 위반한 때 대주는 계약 해지 O(제3항), 계약 해지 없이도 제3자에 대해 목적물 인도청구 O, 차주의 권리 양도받은 자는 대주의 승낙 없으면 대주에게 대항할 수 X.",["§610"],0,"기타전형계약","대판 2019다202795","미분류"],
  ["채권각론_P194","98다25061, 2018다286550","여행계약 — 여행업자의 안전배려의무 및 사고 후 발생한 비용의 통상손해 인정","여행업자의 신의칙상 안전배려의무 인정 범위, 여행 중 사고로 발생한 후송비·치료비·체류비 등의 손해배상 범위","[98다25061] 여행업자는 우월적 지위로 일방적 결정, 여행자는 안전성 신뢰하고 여행업자 제공 조건에 따라 여행계약체결 → 여행업자는 '기획여행계약' 상대방인 여행자에 대해 신의칙상의 주의의무로서 기획여행계약상 부수의무 O → 여행자 생명·신체·재산 등 안전확보 위해 미리 충분한 조사·검토와 합리적 판단, 위험 사전제거 혹은 여행자에게 고지하여 선택의 기회 제공해야 → 국외여행인솔자는 이행보조자 → 기획여행 여행자가 여행지 놀이시설 이용 중 다른 여행자 과실로 상해 입었다면 여행인솔자 과실 있어 여행업자·국외여행인솔자 손해배상책임 O.\n\n[2018다286550] 甲이 여행업자 乙회사와 해외여행계약 체결 후 여행 중 여행업자의 고의·과실 사고로 정신적 상해 → 甲이 사고 이후 지출한 국내 환자 후송비용, 해외에서의 치료·국내귀환·사고처리 과정에서 추가 지출한 체류비·국제전화요금 등 비용 → 여행업자 乙의 여행계약상 주의의무나 신의칙상 안전배려의무 위반과 상당인과관계 있는 통상손해 O, 설령 특별손해라 해도 예견가능성 O.",["§674의2","§390"],0,"기타전형계약","대판 98다25061, 2018다286550","미분류"],
  ["채권각론_P195","2002다57119","우수현상광고 계약체결의무 위반 손해배상청구권의 소멸시효 — 계약상 이행청구권 시효 따라야","우수현상광고 광고자의 당선자에 대한 계약체결의무 위반 손해배상청구권의 소멸시효기간","우수현상광고 광고자의 당선자에 대한 계약체결의무 위반이라는 채무불이행을 원인으로 한 손해배상청구권의 소멸시효기간은 계약체결로 취득할 이행청구권에 적용될 소멸시효기간 ∵ 계약체결불이행 손해배상청구권은 계약체결로 발생하는 계약상 이행청구권과 실질적·경제적 밀접한 관계 → 설계계약청구권이라면 계약상 이행청구권이 163조 3호 3년 단기시효(∵ 설계에 종사하는 자)이므로 계약체결의무불이행 손해배상청구권의 시효기간도 3년, 채무불이행시로부터 진행.",["§678","§163"],0,"기타전형계약","대판 2002다57119","미분류"],
  ["채권각론_P196","75다1637, 2022다293937","위임의 보수지급 묵시적 약정 및 변호사 약정보수의 감액 — 부당성 입증책임은 청구인이 아닌 주장하는 자","변호사·의사처럼 영업·업무에 속하는 사무에서 보수지급 약정의 묵시적 인정 여부 및 약정 보수액이 부당히 과다한 경우 감액의 입증책임","[75다1637] 위임의 무상성 원칙(686조 1항)에도 불구하고 변호사·의사와 같이 영업·업무에 속하는 사무라면 보수지급의 묵시적 약정 있는 것.\n\n[2022다293937] 변호사와 의뢰인 사이 약정 있는 경우 위임사무 완료한 변호사는 원칙적으로 약정 보수액 전부 청구 O → 다만 사건처리경과·난이도·노력정도·소송물가액·승소이익 등을 고려하여 약정 보수액 부당히 과다하여 신의칙·형평에 반하는 특별한 사정 있다면 예외적으로 적당한 보수액만 청구 → 계약자유 원칙에 대한 예외이므로 합리적 근거 밝혀야 하고 부당성 주장하는 자가 입증책임.",["§686"],0,"기타전형계약","대판 75다1637, 2022다293937","미분류"],
  ["채권각론_P197","2004다64432, 2021다215060","수임인의 취득물 인도의무 — 인도시기·반환범위는 위임 종료시 기준","위임계약 종료에 따른 수임인의 취득물 인도의무에서 인도시기 및 반환할 금전의 범위를 정하는 기준 시점","수임인은 위임사무 처리로 받은 금전 기타 물건, 수취한 과실을 위임인에게 인도해야(684조 1항) → 인도 시기는 특별한 사정 없는 한 위임계약 종료 시, 반환할 금전 범위도 위임 종료시 기준으로.\n\n正辯: 위임 해지하면 수임인이 받은 금전에 대하여 위임 종료 시(정확히는 다음날, 私見)부터 지연손해금청구 O, 금전지급 청구 시부터 X.",["§684"],0,"기타전형계약","대판 2004다64432, 2021다215060","미분류"],
  ["채권각론_P198","92다15031","진료채무는 수단채무 — 주의의무 위반과 진료채무 본지 이탈 시 치료비 청구 불가","의료사고에서 의사의 진료채무 성격 및 주의의무 위반으로 인한 손상 이후 치료에 대한 치료비 청구 가부","진료채무는 수단채무이므로 주의의무 다했다면 치료되지 않았어도 치료비청구 가능하지만, 주의의무 위반하여 환자 신체기능 회복불가능하게 손상되고 그 후의 치료는 악화방지 정도였다면 치료행위는 진료채무의 본지에 따른 것 아니거나 손해전보의 일환이어서 수술비·치료비 청구 X.",["§686","§390"],0,"기타전형계약","대판 92다15031","미분류"],
  ["채권각론_P199","2010다52584, 2016다200538, 2004다69420, 2023다294470","위임사무 중도 종료 시 사무처리비용 청구 및 선관주의 위반 후 추가 지출 비용의 필요비상환","소송위임계약이 수임인 귀책사유로 도중에 종료된 경우 비용청구 가부, 및 선관주의의무 위반 사실이 있었더라도 이후 선관주의 다해 지출한 비용의 필요비상환청구 가부","[2010다52584, 2016다200538] 소송위임계약 위임사무 처리 도중 수임인 귀책사유로 신뢰관계 훼손되어 계약 종료되었더라도 위임인은 수임인이 계약종료 당시까지 이행한 사무처리 부분에 상당한 보수 금액 및 사무처리비용 지급할 의무 O, 688조 1항 O → 수임인이 처리한 사무 정도와 난이도, 사무처리 위한 수임인의 노력 정도, 처리된 사무에 대해 가지는 위임인의 이익 등 여러 사정 참작.\n正辯: 아파트 하자보수 관련 소송위임계약에서 변호사가 하자조사보고서 부실 작성하여 해지되었어도 의뢰인은 하자진단비 등을 변호사에게 지급해야.\n\n[2004다69420, 2023다294470] 수임인이 위임사무 처리 과정에서 선관주의의무 위반한 사실이 있더라도, 이후 수임인이 선량한 관리자 주의 다하여 위임사무 처리 위한 비용 지출했다면, 선행 선관주의 위반으로 인한 비용 증가 손해배상의무 부담은 별론, 위임인에 대하여 688조 1항의 필요비 상환청구 O → 상환 청구 가능한 필요비는 수임인이 선관주의 다하여 필요하다고 판단하여 지출한 비용 O, 위임인에게 실익 발생 여부나 위임인의 목적 달성 여부는 불문.",["§688"],0,"기타전형계약","대판 2010다52584, 2016다200538, 2004다69420, 2023다294470","미분류"],
  ["채권각론_P200","2001다52506, 2016다48808","대변제청구권 보전을 위한 위임인 권리 대위행사 — 무자력 불요, 및 선관주의 위반으로 확대된 채무는 대변제청구 대상 X","수임인의 대변제청구권을 보전하기 위해 위임인의 상계권을 대위행사 함에 위임인의 무자력이 필요한지, 수임인의 사후 방치로 확대된 채무액이 688조 2항의 '위임사무 처리에 필요한 채무'에 해당하는지","[2001다52506] 대변제청구권은 통상의 금전채권과 달라서 수임인이 대변제청구권을 보전하기 위해 위임인의 권리(상계권)를 대위행사 함에 위임인의 무자력은 불필요.\n\n[2016다48808] 수임인이 위임사무 처리하며 선관주의의무 다하여 자기 이름으로 위임인을 위해 필요한 계약체결 → 그러나 이후 채무이행 X, 위임인에게 보고 등 조치 없이 방치, 상대방 소제기에 제대로 대응 X → 이로 인해 수임인 자신이 상대방에게 부담할 채무액 확대 → 확대된 부분은 688조 2항 '위임사무 처리에 필요한 채무' X, 대변제청구 X ∵ 681조, 683조.",["§688","§681","§683"],0,"기타전형계약","대판 2001다52506, 2016다48808","미분류"],
  ["채권각론_P201","90다18968, 98다64202, 2012다71411, 2017다53265","위임 해지 — 손해배상 범위·유상위임에서 불리한 시기 판단·임의해지의 잔존효력·임의규정 배제","위임계약 해지에 따른 손해배상의 범위, 유상위임에서 '불리한 시기'의 의미, 채무불이행 해지요건 미비 시 임의해지 효력, 689조의 임의규정성","[90다18968] 689조 부득이한 사유 없이 불리한 시기 해지로 인한 손해배상은 해지로 생긴 손해가 아니라 적당한 시기에 해지되었더라면 입지 않았을 손해.\n\n[98다64202] 사무처리 완료 조건으로 보수 지급받는 유상위임계약에서는 언제 해지해도 보수청구권 상실되므로 '불리한 시기'란 따로 없고 사무처리 완료 전의 해지라 하여 '불리한 시기 해지'는 아님.\n\n[2012다71411] 위임계약 당사자가 상대방의 채무불이행을 이유로 해지하였으나 실제로는 그 해지요건 갖추지 못했더라도 689조 1항 임의해지 효력 O.\n\n[2017다53265] 위임의 689조 1·2항(상호해지자유, 손해배상)은 임의규정 → 당사자 약정으로 위 규정 배제 O → 약정하면 해지의 사유·절차, 손해배상책임은 약정에 따르게 되고, 위임계약을 자유롭게 해지할 수 X.",["§689"],0,"기타전형계약","대판 90다18968, 98다64202, 2012다71411, 2017다53265","미분류"],
  ["채권각론_P202","95다40915","법인 이사 임기만료와 위임종료의 긴급처리의무 적용","민법상 법인 이사 임기 만료된 경우 691조 위임종료의 긴급처리의무 적용 여부","민법상 법인과 이사는 위임인과 수임인의 법률관계이므로 이사 임기 만료되면 위임관계 종료됨이 원칙이나 후임이사 선임시까지 법인의 정상적 활동이 중단될 상태라면 691조 급박한 사정 O.\n\n正辯: 위임인 성년후견개시는 종료사유 아닌 점, 민소법상 소송대리인은 당사자의 사망이 소송대리권 소멸 사유 아닌 점(민소법 95조) 등에 유의할 것.",["§690","§691"],0,"기타전형계약","대판 95다40915","미분류"],
  ["채권각론_P203","95다26919, 2023다218353","예금계약의 성립 — 직원의 횡령 무영향 및 만기 도래만으로 지체책임 발생 X","직원이 받은 예금을 입금하지 않고 횡령한 경우 예금계약 성립 여부, 만기 도래만으로 금융기관에 예금반환 지체책임이 발생하는지","[95다26919] 예금계약은 예금자가 예금 의사표시하며 돈 제공하고 금융기관이 돈을 받아 확인하면 성립 → 직원이 받은 돈 입금 않고 횡령해도 예금계약 성립 영향 無.\n\n[2023다218353] 예금계약은 은행 등 금융기관을 수치인으로 하는 금전 소비임치 계약 → 만기 정해진 예금계약에서 금융기관의 예금반환채무는 만기 도래하더라도, 임치인이 미리 만기 후 예금 수령방법 지정한 경우처럼 특별한 사정 없는 한, 만기 도래만으로 금융기관인 수치인이 임치인에 대해 예금반환 지연으로 인한 지체책임 부담 X, 정당한 권한 있는 임치인의 지급청구에도 불구하고 수치인이 예금반환 지체한 경우에 지체책임 O.",["§702","§598"],0,"기타전형계약","대판 95다26919, 2023다218353","미분류"],
  ["채권각론_P204","2007다51239","착오송금 — 부당이득반환은 수취인 상대, 수취은행은 이익 없어 상대방 X","착오로 송금된 경우 부당이득반환의 상대방이 수취인인지 수취은행인지","착오송금의 경우 부당이득반환은 수취인을 상대로 O, 수취은행을 상대로 X ∵ 송금의뢰인과 수취인 사이 계좌이체 원인 존부 불문하고 이체와 동시에 수취인과 수취은행 사이 계좌이체 금액 상당의 예금계약이 성립하고, 수취인은 수취은행에 대하여 위 금액 상당 예금채권 취득 → 수취은행은 이익 X.",["§741","§702"],0,"기타전형계약","대판 2007다51239","미분류"],
  ["채권각론_P205","93다31825, 2003다7319, 2002다55908, 2008다45828 [大判全合]","공동명의 예금 — 동업자금 준합유 vs 분량적 분할귀속 + 예금주는 명의자","공동명의 예금이 동업자금인 경우와 단순 감시목적인 경우의 예금채권 귀속 및 행사 방법, 금융실명법상 예금주 판단 기준","공동명의의 예금이 동업자금이면 준합유 → 예금반환청구는 필수적 공동소송 / 동업 이외 특정 목적 위해 공동명의로 예치하여 목적 달성 전에는 단독 인출 못하도록 방지·감시할 목적이면 예금채권이 분량적 분할되어 각 예금채권자들에게 공동 귀속, 관리처분권도 각자 귀속, 공동반환특약에 따라 은행에 대하여는 모두가 지급청구해야 하겠지만 필수적 공동소송 X → ① [93다31825] 다른 공동명의의 예금채권자가 협력하지 않을 경우 승낙청구 O, 은행이 정당한 이유 없이 거절하고 미리 청구할 필요 있다면 다른 공동명의의 예금채권자와 은행을 공동피고로 하여 승낙청구 및 승낙조건 예금반환청구 O. ② [2003다7319] 공동명의의 예금채권자 중 1인에 대한 채권자가 예금채권에 대하여 압류·추심명령 받았다면 은행은 추심에 응해야. ③ [2002다55908] 공동명의의 예금채권자 중 1인에 대한 별개 대출금채권 가지는 은행으로서는 그 대출금채권을 자동채권으로 그의 지분 상응 예금반환채권에 대해 상계 O → 공동명의의 예금채권자 중 1인이 다른 명의자의 지분 양수했음을 이유로 은행 상계주장에 대항하려면 예금반환채권 귀속 별도 합의 있거나 채권양도 대항요건 갖춰야.\n正辯: 만약 동업자금으로 준합유하는 예금이었다면 → ① 예금반환청구는 필공, ② 1인에 대한 채권자는 추심으로 집행 X, ③ 은행도 1인에 대한 대출금채권으로 상계 X.\n\n[2008다45828 大判全合] 금융실명법 취지 고려하면 실명확인절차 마친 예금명의자만이 예금주, 그 외 출연자를 예금계약 당사자로 보려면 극히 예외적인 경우에만.",["§702","§271","§492"],0,"기타전형계약","대판 93다31825, 2003다7319, 2002다55908, 2008다45828 [大判全合]","미분류"],
  ["채권각론_P206","2005다5140, 2008다4247","수인의 공동매수와 동업체 인정 요건 + 업무집행조합원 선임의 의미","수인이 부동산을 공동매수한 경우 동업체로 인정되기 위한 요건 및 706조 1항 '조합원 2/3'의 의미","[2005다5140] 수인이 부동산 공동매수한 경우: 공유관계로 단순한 공동매수인 혹은 수인을 조합원으로 하는 동업체에서 매수한 것 → 동업체의 매수로 보려면 매수한 토지를 동업체 재산 귀속시키고 전원 의사에 기해 전원의 계산으로 처분한 후 이익 분배의 명시적·묵시적 의사합치 있어야.\n\n[2008다4247] 조합계약에 없으면 조합원 2/3 찬성으로 업무집행조합원 선임(706조 제1항) → 조합원 출자가액·지분이 아닌 인원수의 2/3 의미, 임의규정.",["§703","§706"],0,"기타전형계약","대판 2005다5140, 2008다4247","미분류"],
  ["채권각론_P207","2021다284035, 2025다205399","조합 내부규율 약정 위반 손해배상 + 명의신탁 부동산 필요비의 조합채무 인정","조합 구성원 간 내부 약정 위반으로 인한 채무불이행 손해배상, 및 조합원이 계약명의신탁으로 취득한 부동산에 지출한 필요비의 조합 상환의무","[2021다284035] 조합 구성원들 사이 내부적 법률관계 규율 약정 있는데 한쪽 당사자 이행하지 않아 상대방에게 손해 발생하면 채무불이행 손해배상 O.\n正辯: 공동수급체(조합) 구성원 1인이 내부규율 약정 불이행하여 다른 1인이 도급인에게 의무 이행하는 손해 발생한 사안.\n\n[2025다205399] 업무집행조합원의 필요비상환청구권(707조, 688조 1항)은 조합채무 O → 조합과 조합원이 계약명의신탁약정 맺고 조합원이 조합 공동사업 필요한 부동산을 선의의 상대방으로부터 매수하는 매매계약 체결하고 조합원 명의 등기 경료로 조합원이 부동산 소유권 취득했어도, 특별한 사정 없는 한 조합원은 조합에 대해 조합업무 집행에 관하여 부동산에 지출한 필요비 상환청구 O.\n正辯: 이어지는 잔여재산분배 내용은 후술하는 해당 파트 정변 멘트 참조.",["§706","§707","§688"],0,"기타전형계약","대판 2021다284035, 2025다205399","미분류"],
  ["채권각론_P208","95다30345, 2007다18911","조합재산 합유물 처분·변경 — 706조 2항이 272조에 우선 적용","조합재산인 합유물의 처분·변경에 272조 전원동의가 적용되는지, 706조 2항과의 관계","272조에 따르면 합유물 처분·변경에 합유자 전원 동의 있어야 → 합유물 중에도 조합재산은 처분·변경 행위가 조합 특별사무인 업무집행 O → 706조 2항이 272조에 우선 적용 O → 조합재산의 처분·변경은 업무집행자 없으면 조합원의 과반수로, 업무집행자 수인 있으면 업무집행자의 과반수로, 업무집행자 1인이면 단독으로 각 결정.\n\n학설: 1) 업무집행조합원 존부에 따라, 2) 일반합유물인지 조합재산(706조)인지에 따라, 3) 조합업무 중 조합재산처분 업무(272조)인지 다른 조합업무인지에 따라.",["§272","§704","§706"],0,"기타전형계약","대판 95다30345, 2007다18911","미분류"],
  ["채권각론_P209","2005마1130","조합원 지분 압류와 탈퇴 의사표시 대위행사","조합원 지분을 압류한 채권자가 조합원의 조합 탈퇴 의사표시를 대위행사할 수 있는지 및 압류의 효력 범위","'조합원의 지분'이라 함은 전체로서의 조합재산에 대한 조합원 지분 의미, 조합재산 구성하는 개개 재산에 대한 합유지분은 강제집행 대상 X → 조합원은 언제든지 조합 탈퇴(716조), 탈퇴하면 지분환급청구권(719조), 조합원 지분을 압류한 채권자는 존속기간 등이 정해지지 않은 이상 조합원의 조합 탈퇴 의사표시를 대위행사 O ∵ 탈퇴권은 조합 해지권으로서 재산권 O, 일신전속적 X.",["§714","§716","§719","§404"],0,"기타전형계약","결정 2005마1130","미분류"],
  ["채권각론_P210","97다4401, 2009다105406 [大判全合], 98다60484","조합의 채권 — 합유적 귀속과 강제집행 제한, 개별구성원 직접취득 약정, 동업자금 허비 시 손해 주체","조합 채권의 합유적 귀속, 조합원 1인 채권자의 강제집행 가능 여부, 공동수급체 구성원의 개별 권리취득 약정, 동업자금 허비로 인한 손해의 귀속 주체","[97다4401] 조합의 채권은 조합원 전원에게 합유적 귀속, 조합원 1인이 임의로 조합의 채무자에 대해 출자지분 비율에 따른 급부청구 X → 조합원 중 1인의 채권자가 그 조합원 개인을 집행채무자로 조합의 채권에 대해 강제집행하면, 다른 조합원으로서는 보존행위로서 제3자이의 소 제기 O.\n\n[2009다105406 大判全合] 공동이행방식의 공동수급체는 민법상 조합 성질 → 공동수급체가 공사 시행하여 도급인에 대해 가지는 채권은 원칙적으로 공동수급체 구성원에게 합유적 귀속 → 구성원 중 1인이 임의로 도급인에 대해 출자지분 비율 급부 청구 X, 구성원 중 1인에 대한 채권으로 구성원 개인을 집행채무자로 공동수급체의 채권에 강제집행 X → 그러나 공동수급체와 도급인이 도급계약 발생 채권을 공동수급체가 아닌 개별 구성원으로 하여금 지분비율에 따라 직접 도급인에 대해 권리를 취득하게 하는 명시적·묵시적 약정 O.\n\n[98다60484] 업무집행 조합원의 임무 위배나 권한 남용으로 동업체 목적 달성할 수 없고 조합원이 출자한 동업자금을 허비한 경우 → 손해 입은 주체는 조합 O, 출자한 조합원은 결과적 손해 발생했더라도 조합과 무관한 개인적 손해 X, 조합원 지위로 입은 손해 O → 조합원은 조합관계 벗어난 개인 지위에서 손해배상청구 X.",["§704","§706"],0,"기타전형계약","대판 97다4401, 2009다105406 [大判全合], 98다60484","미분류"],
  ["채권각론_P211","2012다21560, 85다카1499, 91다30705, 2022다211416","조합의 채무 — 공동책임과 개별책임의 이중성·상행위 시 연대책임·면책 조합원의 구상권","조합채권자의 조합재산 강제집행 요건, 조합채무에 대한 균등비율 변제청구 및 상행위인 경우 연대책임, 조합채무 면책 시 다른 조합원에 대한 구상권 행사 시기","[2012다21560] 공동책임: 조합채권자는 조합원 전원에 대한 집행권원 있어야 조합재산에 강제집행 → 조합원 전원에 대한 가압류명령 있어야 조합재산에 가압류집행 가능.\n\n[85다카1499] 조합채무는 각 조합원의 채무로서, 불가분채무이거나 연대 특약이 없는 한, 조합채권자는 각 조합원에 대해 지분비율 또는 균등비율로 변제청구.\n\n[91다30705] 그러나 조합채무가 특히 조합원 전원을 위해 상행위가 되는 행위로 부담하게 된 것이면 상법 제57조 제1항 적용 O, 연대책임 O.\n\n[2022다211416] 조합채무는 모든 조합원에게 합유적 귀속, 조합원 중 1인이 조합채무 면책시키면 그 조합원은 다른 조합원에 대해 425조 1항(연대채무자의 구상권)에 따라 구상권 행사 O → 이러한 구상권은 조합의 해산·청산 시 손실부담과 별개 문제로서 반드시 잔여재산분배 절차에서 행사할 필요는 X.",["§712","§713","§714","§715","§425"],0,"기타전형계약","대판 2012다21560, 85다카1499, 91다30705, 2022다211416","미분류"],
  ["채권각론_P212","2015다69990","공동수급체 구성원의 출자의무와 이익분배의 연계 — 별개 권리이나 약정에 의한 당연공제는 가능","공동이행방식 공동수급체에서 출자의무 미이행을 이유로 이익분배를 거부하거나 출자금을 공제할 수 있는지 및 연계 약정의 효력","공동이행방식 공동수급체의 구성원은 공동수급체(조합)에 출자의무 O, 이익분배청구권 O → 출자의무 이행 않는 구성원에게 이를 이유로 이익분배 자체 거부하거나 이익분배금에서 출자금 공제 X ∵ 별개의 권리·의무 → 다만 두 채권이 상계적상에 있으면 상계는 가능. 계약자유 원칙상 출자의무와 이익분배 연계 특약(출자의무 이행해야 이익분배 받기로 하거나 이익분배금에서 미이행 출자금 '공제' 약정) O, 이러한 약정상 공제는 상계적상이나 의사표시 불필요, 당연공제 O.",["§711"],0,"기타전형계약","대판 2015다69990","미분류"],
  ["채권각론_P213","4291민상668, 86다카2484, 2019다207851","임의탈퇴 — 다른 조합원 전원에 대한 의사표시 필요 및 2인 조합 1인 탈퇴 시 합유재산 단독소유","임의탈퇴의 의사표시 방법 및 2인 조합에서 1인이 탈퇴한 경우 조합재산의 귀속, 지분 환급 청구 시 증명책임","[4291민상668] 임의탈퇴는 다른 조합원 전원에 대한 의사표시로 해야 ∵ 조합계약 해지 성질, 잔존조합원 지위 중대한 영향.\n\n[86다카2484] 2인에서 1인 임의탈퇴 O → 조합관계 종료 O, 조합해산 X, 청산 X → 합유재산이 단독소유 되고 탈퇴자·잔존자 사이 계산 O.\n\n[2019다207851] 위의 경우, 탈퇴자는 탈퇴 당시의 조합재산 계산 결과 조합 재산상태가 적자 아닌 경우 지분 환급 O → 탈퇴자는 별도 약정 없는 한 지분 환급을 주장하는 사람에게 조합재산 상태 증명책임 O.",["§716","§719"],0,"기타전형계약","대판 4291민상668, 86다카2484, 2019다207851","미분류"],
  ["채권각론_P214","99다1284, 2004다49693, 2008다2807","2인 조합에서 1인 탈퇴 후 잔존 조합원의 조합채무 전부 이행책임 및 부동산 합유재산의 단독소유 등기","2인 조합에서 1인이 탈퇴한 경우 조합채권자가 잔존 조합원에게 조합채무 전부의 이행을 청구할 수 있는지, 잔존자의 탈퇴자에 대한 채권으로 상계 가부, 조합재산이 부동산인 경우 소유권 변동의 효력 발생 요건","[99다1284] 위의 경우, 조합채권자는 잔존 조합원에 대하여 조합채무 전부의 이행청구 O.\n\n[2004다49693] 잔존자는 조합의 탈퇴자에 대한 채권을 자동채권으로 탈퇴자 지분 상당 조합재산반환채무와 상계 O.\n\n[2008다2807] 조합재산이 부동산인 경우에는 잔존 조합원의 단독소유 등기를 해야 소유권 변동 효력 O ∵ 조합관계 탈퇴라는 법률행위에 의한 물권변동.",["§716","§719","§492"],0,"기타전형계약","대판 99다1284, 2004다49693, 2008다2807","미분류"],
  ["채권각론_P215","86다카2951, 96다29816, 2017다200702","비임의탈퇴 — 조합원 사망과 상속인의 지위 비승계, 출자의무 불이행과 제명 사유","조합원이 사망한 경우 상속인의 조합원 지위 승계 여부 및 출자의무 불이행·신뢰관계 훼손이 제명의 정당한 사유에 해당하는지","[86다카2951] 조합원 1인 사망하면 당연 탈퇴(717조) → 상속인이 조합원 지위 승계 X.\n\n[96다29816] 출자의무 불이행은 제명의 정당한 사유 → 상당기간 최고 불요.\n\n[2017다200702] 조합원 제명의 정당한 사유는 동업계약상 의무 불이행이나 부정행위 등 귀책사유 명백한 경우는 물론, 특정조합원으로 말미암아 조합원 사이 불화로 신뢰관계 근본적 훼손된 경우도 포함.",["§717","§718"],0,"기타전형계약","대판 86다카2951, 96다29816, 2017다200702","미분류"],
  ["채권각론_P216","2022다285523, 2024다224645","탈퇴 시 계산 기준 — 손익분배비율 기준 산정 및 탈퇴·제명만 가능한 동업계약에서 해산청구 인정 요건","조합원 탈퇴 시 지분 계산의 기준 비율 및 동업계약에서 조합계약 해지·원상회복이 아닌 해산청구가 인정되는 경우","[2022다285523] 조합에서 조합원이 탈퇴하는 경우, 탈퇴자와 잔존자 사이의 탈퇴로 인한 계산은 특별한 사정이 없는 한 719조 1항, 2항에 따라 '탈퇴 당시의 조합재산상태'를 기준으로 평가한 조합재산 중 탈퇴자의 지분에 해당하는 금액을 금전으로 반환해야 → 조합원 지분비율은, 조합청산에서 '실제 출자한 자산가액 비율'로 하는 것과 달리, '조합 내부 손익분배 비율' 기준으로 계산해야.\n\n[2024다224645] 조합계약(동업계약)에서는 해산청구, 조합으로부터 탈퇴, 조합원 제명만 가능할 뿐, 일반계약 같은 조합계약 해제·해지하고 원상회복의무 부담 X. 탈퇴(716조)는 특정 조합원이 장래 향하여 조합원 지위 벗어나고 조합 자체는 나머지 조합원에 의해 동일성 유지하며 존속하여 동업사업 계속 유지·존속을 전제로, 반면 해산청구(720조)는 조합 소멸 위하여 목적 사업 수행 적극적 활동 중지하고 조합재산 정리 단계 가는 것 → 조합 당사자 간 불화·대립으로 신뢰관계 깨어지고 특정 조합원의 탈퇴·제명으로도 조합업무 원활한 운영 기대할 수 없는 상황에서 특정 조합원이 다른 조합원에게 해지통고 했다면 조합 소멸하는 조합 해산청구 O.",["§716","§719","§720"],0,"기타전형계약","대판 2022다285523, 2024다224645","미분류"],
  ["채권각론_P217","84다카1921, 90다카26300, 2024다234239","조합 해산·청산절차의 강행규정성 부정 및 청산절차 종료 전 잔여재산분배청구 불가","조합의 해산·청산 절차가 강행규정인지 여부, 청산절차 종료 전에 잔여재산 분배를 청구할 수 있는지","[84다카1921] 조합의 해산·청산 절차는 강행규정 X (특약으로 달리 정할 수 O) ∵ 어차피 조합원 개인책임 부담, 조합채권자 보호 위한 것 X.\n\n[90다카26300, 2024다234239] 조합이 해산하면 청산절차가 통례이고 청산사무는 총조합원 공동으로 또는 그들이 선임한 자가 집행, 청산인 선임은 조합원 과반수로써(721조) → 그러나 처리할 조합 잔무 없고 잔여재산 분배만 남아있다면 따로 청산절차 필요 X, 별도 특약 없는 한 출자의무 이행한 조합원은 바로 출자재산 반환청구 O → 그렇지 않다면 청산절차 종료되지 않은 상태에서 잔여재산 분배청구 X ∵ 분배할 잔여재산 가액은 청산절차 종료된 때 확정.",["§721","§724"],0,"기타전형계약","대판 84다카1921, 90다카26300, 2024다234239","미분류"],
  ["채권각론_P218","2019다205206, 2025다205399, 2024다295135, 2016다278579","간이한 잔여재산 분배 — 채권·채무를 일괄 정산하는 방법 및 출자 미이행 조합원의 처리","2인 조합에서 별도 청산절차 없이 채권·채무를 함께 정산하여 잔여재산을 분배하는 방법, 손해배상책임을 진 조합원에 대한 잔여재산 분배 방식, 출자의무 미이행 조합원의 잔여재산 분배 처리","[2019다205206, 2025다205399] 잔여재산 분배는 특약 없는 이상 각 조합원 출자가액 비례 분배 → 조합채무 변제사무 미완료라도 채권자가 조합원이면 동업체 자산 보유자가 동업체 자산에서 채권자인 조합원에 대한 조합채무 공제하여 분배대상 잔여재산액 산출한 후 다른 조합원들에게 잔여재산 중 각 조합원 출자가액 비례 몫 반환함과 아울러 채권자인 조합원에게 조합채무 이행함으로써 별도 청산절차 없이 간이한 잔여재산 분배 O → 간이한 방법의 잔여재산 분배는 2인 조합의 조합원 1인을 채무자로 하는 조합채권 추심사무 미완료의 경우에도 일정 요건 하에 허용 O.\n\n[2024다295135] 조합원 선관주의위반·불법행위로 조합에 손해배상책임 질 경우, 조합관계 종료되고 잔무 없는 상황에서 조합재산 분배라는 청산절차만 남았다면, 다른 조합원은 조합에 손해 가한 조합원을 상대로 손해배상채권액 중 자신의 출자가액 비율에 의한 몫 해당하는 돈을 청구하는 형식으로 잔여재산 분배청구 O.\n\n[2016다278579] 잔여재산 분배의 경우, 일부 이행되지 않은 출자금 있더라도 고려하지 않고 잔여재산 범위 확정한 후 각 조합원이 '실제로 출자한 가액 비례하여' 잔여재산 분배 O → 출자의무 이행하지 않은 조합원에게 더 이상 출자의무 이행 청구 X.",["§721","§724"],0,"기타전형계약","대판 2019다205206, 2025다205399, 2024다295135, 2016다278579","미분류"],
  ["채권각론_P219","2016다203933, 95다48414, 90다카22674, 88다카10050, 2008다15278","화해계약 — 묵시적 화해 인정의 엄격성 및 착오 취소의 범위","묵시적 화해계약 성립의 엄격한 인정 기준, 화해의 전제·기초에 관한 착오 취소 인정 사례 및 분쟁대상 자체에 관한 착오의 취소 부정","[2016다203933] 당사자들이 분쟁 인식하지 못한 상태에서 일방이 이행해야 할 채무액에 관해 협의했거나 일방의 채무이행에 대해 상대방이 이의 제기 않았다는 사정만으로는 묵시적 화해계약 성립 X ∵ 화해계약 성립 이후에는 다툴 수 없으므로 그 의사합치는 엄격하게 해석해야.\n\n[95다48414] 교통사고 가해자 과실 경합됐는데 오로지 피해자 전적 과실로 착오하여 매우 적은 금액 외에 일체 손해배상청구권 포기 → 착오 취소 O.\n\n[90다카22674] 의료과실 사망사고로 잘못 알고 의사가 손해배상금을 지급하며 화해했으나 부검 결과 사인이 치료행위와 무관한 경우는 착오 취소 O.\n\n[88다카10050] 그러나 동업재산 환급범위 분쟁 중 특정 지분비율로 확정하여 합의한 후 지분비율 잘못 산정 이유로 착오 취소 X ∵ 분쟁의 대상에 관한 착오.\n\n[2008다15278] 화해계약은 화해당사자 자격 또는 화해 목적 분쟁 이외 사항에 착오 있는 경우 외에는 착오 이유 취소 X → 그러나 화해계약이 사기로 인해 이뤄진 경우는 화해 목적 분쟁 사항에 착오 있는 경우도 110조로 취소 O.",["§731","§733","§109","§110"],0,"기타전형계약","대판 2016다203933, 95다48414, 90다카22674, 88다카10050, 2008다15278","미분류"]
]
const 채권각론_QUIZ = [
  ["채권각론_Q001","CASE","[제10회 2문3-1] 甲이 A회사의 여행패키지 광고 이메일에 '승마체험 무료'가 포함된 것으로 보고 계약 체결. 그러나 계약서·확인서에는 해당 내용 없음. 이 경우 광고 내용이 계약에 편입되는지 甲과 A회사가 주장할 수 있는 논거를 서술하시오. (15점)",[],0,"甲 측 논거: 광고가 청약의 유인이더라도 광고 내용이 계약의 내용으로 편입될 수 있음. 광고 이메일이 계약 체결을 유도하는 수단으로서 구체적·확정적 조건을 제시했고 甲이 이를 믿고 계약 체결 → 계약 내용으로 편입(사기적 광고의 경우 취소도 가능). A회사 측 논거: 최종 계약서·확인서에 해당 내용 없으므로 계약서가 최종 의사표시 → 광고는 계약 내용 아님. 계약 체결 시 계약서 확인 의무 있음.","",2,"계약총론"],
  ["채권각론_Q002","CASE","[제14회 2문1-1] 甲이 乙을 상대로 '乙의 수령지체 중 X건물이 강제수용되어 이행불능이 된 것은 ① 乙의 귀책사유, 또는 ② 수령지체 중 쌍방 귀책 없는 사유로 발생'이라며 매매잔대금 1억 7천만 원(잔금 6억 - 수용보상금 4억 3천만) 청구. 인용 가부? (10점)",[],0,"① 乙의 귀책사유로 인한 이행불능: 乙이 잔금 지급을 거부하고 계약이 실효됐다고 주장 → 이행 거절에 가까우나 수령지체 성립 여부 선결. 수령지체는 채권자가 협력의무 불이행 시 성립. 甲이 소유권이전서류 제공 없이 잔금만 청구했으므로 동시이행 항변 가능 → 수령지체 불성립. ② 수령지체 중 쌍방 귀책 없는 사유: 수령지체 불성립 → 이 주장도 배척. 결론: 甲의 이행불능은 甲측 귀책(동시이행의무 불이행) → 대상청구권 행사 가능하나 잔대금 청구는 기각. 단, 수용보상금에 대한 대상청구권 검토.","",3,"계약총론"],
  ["채권각론_Q003","CASE","[제14회 2문1-2] 乙이 '매매계약이 강제수용으로 종료되었다'며 계약금 1억+중도금 3억 반환청구. 법원은 어떤 판단을 해야 하는가? (결론+근거) (10점)",[],0,"강제수용은 매매계약의 이행불능 사유. 이행불능이 누구의 귀책인지 또는 쌍방 귀책 없는 사유인지에 따라 위험부담(민§537) 적용. 甲의 협력의무(병원 용도변경) 불이행이 인과관계 있으면 甲 귀책. 甲 귀책 이행불능 시: 乙은 해제권 행사 + 기지급 계약금·중도금 반환 청구 가능(민§546). 해제 없이 반환 청구만 하면: 위험부담(민§537) 적용 → 채권자(乙)의 반대급부(잔금 지급) 의무 소멸 + 이미 지급한 계약금·중도금 반환 청구 가능(부당이득). 결론: 계약금 1억+중도금 3억 반환 인용.","",2,"계약총론"],
  ["채권각론_Q004","CASE","[제14회 2문1-3] 丙이 乙을 대위하여 甲을 상대로 X건물 소유권이전등기 및 인도 청구. 甲은 '乙이 공탁금을 공탁 취지에 따라 수령하여 계약이 적법 해제됐다'고 항변. 타당한가? (10점)",[],0,"공탁금 수령과 해제 합의: 甲이 '원상회복 이유로 중도금만 공탁'했고 乙이 이의 없이 수령 → 이는 해제에 대한 묵시적 합의(합의해제)로 볼 수 있음. 그러나 가처분이 있는 경우 가처분 채권자의 동의 없이 임의로 해제할 수 없음(채권자취소 유사 논리). 丙이 乙을 대위하여 가처분까지 받은 상황 → 甲과 乙의 합의해제는 丙에게 대항 불가. 결론: 甲의 항변 부당 → 丙의 청구 인용.","",2,"채권자대위"],
  ["채권각론_Q005","CASE","[제13회 2문3] 甲이 2012년 乙로부터 X토지 매수 후 점유. 2023년 굴착공사 중 乙이 1995년에 매립한 쓰레기·오염물질 발견. 甲이 변호사에게 ① 소유권에 기한 방해배제, ② 하자담보·불법행위 손해배상 구제수단 각각의 인용 가능성 검토 요청. (30점)",[],0,"① 소유권에 기한 방해배제(민§214): 소유자가 방해자에게 방해 제거 청구. 乙이 매립 행위의 주체이나 이미 소유권 이전 → 甲이 소유자. 현재 오염 물질이 X토지에 존재하는 것 자체가 방해. 乙에게 방해배제 청구 가능. 소멸시효 없음(물권적 청구권). | ② 하자담보(민§580): 매매 시 하자가 숨어 있어 甲이 알 수 없었던 경우 담보책임. 매수 2012년 → 담보책임 제척기간 1년(안 날부터). 2023년에 발견 → 제척기간 기산 가능. 단, 하자 있음을 몰랐고 알 수 없었던 경우 → 해제 또는 손해배상. | ③ 불법행위(민§750): 乙의 쓰레기 매립 행위 자체가 불법행위. 소멸시효 3년(안 날부터)/10년(행위일부터). 1995년 행위일로부터 10년 → 2005년 시효 완성 가능. 甲이 2012년 매수 당시 몰랐다면 3년 시효 기산은 2023년부터.","",3,"매매"],
  ["채권각론_Q006","CASE","[제10회 2문1-1] 甲이 乙 소유 X토지를 임차하여 Y건물 신축+소유권보존등기. 乙이 5기 차임 연체로 토지임대차 해지. ① 乙의 철거+인도 청구에 甲이 민§643+§283의 매수청구권 행사. ② 乙이 丙(Y건물 임차인)에게 퇴거+부당이득 청구. 각 주장의 타당성은? (20점)",[],0,"① 지상물 매수청구권(민§643+§283): 임대차가 기간만료 또는 해지로 종료된 경우 지상물 소유자인 토지임차인이 임대인에게 지상물 매수 청구 가능. 이행지체로 인한 해지의 경우에도 임차인에게 귀책이 있어도 매수청구권 인정 여부 → 귀책 있는 해지의 경우 인정 가능(판례 인정). 매수청구권 행사 시 乙의 철거+인도 청구는 기각(동시이행). | ② 乙→丙 퇴거 청구+부당이득: 丙은 Y건물의 임차인으로 건물 임차권자. 乙은 Y건물 소유자(甲)에게 퇴거 청구해야 함. Y건물을 통한 X토지 사용에 대한 부당이득은 X토지 소유자 乙이 Y건물 소유자 甲에게 청구하는 것이 원칙. 丙에게 직접 청구는 부당(丙은 정당 권원인 건물임차권 보유).","",3,"임대차"],
  ["채권각론_Q007","CASE","[제10회 2문1-2] 乙이 임대차 종료 후 Y건물 인도. 乙이 임대차기간 만료일에 보증금 1억 반환 요구. 甲의 주장: ① 乙이 미인도(잠금)로 3개월분 차임 공제, ② Y건물 인도와 동시에 공제 후 8,500만 지급. 丙의 청구 및 甲의 주장은 타당한가? (20점)",[],0,"① 임대차 종료 후 임차물 미반환시 부당이득 또는 차임 상당 손해배상 공제 가능. 乙이 창고 문 잠그고 물건 방치 → 미반환 상태. ② 동시이행: 보증금반환채무와 임차물반환의무는 동시이행관계(판례). 甲의 주장 ②는 타당. | 2020.10.1.~2021.1.1. 3개월간 차임 100만×3=300만 공제 → 9,700만 인용. 甲의 동시이행항변도 인정.","",2,"임대차"],
  ["채권각론_Q008","CASE","[제15회 2문3] 甲과 乙이 丙으로부터 X토지 공동 임차(보증금 5억, 월 차임 240만). 2019.7.부터 차임 미납. 丙이 甲에 한해 월 160만 면제. 乙이 丙에게 보증금 5억+지연이자 청구. 丙의 주장: ① 丁의 전부명령, ② 차임 상계, ③ 차임 당연 공제. 예상 판결은? (30점)",[],0,"공동임차인의 보증금: 연대채무 or 분할채무. 판례는 보증금반환채권을 원칙적 분할채권으로 봄(지분=1/2씩). | ① 丁의 전부명령: 甲 지분(2.5억)에만 효력 → 乙 지분(2.5억)은 乙이 직접 청구 가능. | ② 연체 차임 상계: 丙의 甲·乙에 대한 차임채권이 자동채권. 丙이 甲에 대해 160만 면제 → 연대채무 면제는 그 채무자 부분에 한해 효력(민§419): 甲 면제분이 다른 공동채무자(乙)에게 영향 없음(분할채무 시 독립). 乙에 대한 차임: 총 차임 중 乙 부담 비율 산정 후 상계. | ③ 당연 공제: 보증금에서 차임 당연 공제 불가 → 상계 의사표시 필요. | 예상: 乙 지분 2.5억에서 乙의 연체차임 상계분 공제 후 인용.","",3,"임대차"],
  ["채권각론_Q009","CASE","[제13회 1문4-2] 하자보수에 갈음하는 손해배상청구(민§667②)를 채무불이행 손해배상에 선택적 병합. 항소심이 임의로 하자보수 청구를 선택하여 심리하고 제1심과 같은 결론에 이르러 항소 기각. 이 판결이 타당한가? (10점)",[],0,"선택적 청구 병합 시 법원의 심리 방법: 선택적 병합에서 법원은 어느 청구를 먼저 심리할지 선택 재량 있음. 한 청구가 이유 있으면 다른 청구 판단 불요. 그러나 항소심에서 새로 추가된 선택적 청구를 심리하면서 제1심과 동일한 결론(항소 기각)에 이른 경우 → 실질적으로 乙에게 불이익한 판단이 아니면 문제 없음. 단, 항소심이 법원 주도로 청구 선택 → 처분권주의 위반 여부 검토 필요. 결론: 선택적 병합에서 법원의 임의 선택은 허용되나, 선택한 청구만 판단하고 나머지 누락 시 판결 누락 여부 문제.","",2,"도급"],
  ["채권각론_Q010","CASE","[제13회 2문1-1] 乙이 甲의 X토지에 대한 서류를 위조하여 소유권이전등기(2002). 丙이 乙로부터 매수(2004)+등기. 16년 이상 점유. 甲이 2020년 사실 알고 2024.1. 乙에게 '丙으로부터 받은 매매대금 1억'에 대한 부당이득반환 청구. 법원의 판단은? (15점)",[],0,"등기부취득시효 완성 여부(민§245②): 丙이 2004년부터 평온·공연·선의·무과실로 점유 → 10년 경과(2014년) 시 등기부취득시효 완성. 따라서 X토지 소유권은 丙에게 귀속. | 甲의 乙에 대한 부당이득반환청구: 乙이 무권리자로서 丙에게 매도한 대가(1억)는 甲의 손실에 기한 부당이득에 해당. 그러나 丙의 취득시효 완성으로 甲의 소유권 상실 확정 후 乙의 이득은 甲 손실과 인과관계 있는가 → 인과관계 인정. 단, 소멸시효(10년, 또는 3년) 완성 여부 확인. 결론: 청구 인용 또는 시효 완성 여부에 따라 기각.","",2,"부당이득"],
  ["채권각론_Q011","CASE","[제14회 1문4-2] 甲이 乙과 甲 소유 X토지 매매계약 체결에 대리권 표시(민§125). 乙이 甲의 이익을 위해 저가(시가 2억→1억)로 매각. 乙이 대금 1억을 甲에게 전달 않고 채권자 戊에게 변제. 甲이 乙·戊에 대해 금전지급을 청구할 수 있는 모든 권원과 근거는? (단, 이 설문에서는 丙이 乙의 배임 사실 모름) (20점)",[],0,"丙이 선의인 경우(배임 사실 모름) 표현대리 유효 → 매매계약 유효. | 甲의 乙에 대한 청구: ① 수임인의 수취금 인도의무(위임민§683): 1억 원. ② 배임행위로 인한 손해배상(민§681 수임인 주의의무 위반): 시가 1억 손해. ③ 불법행위 손해배상(민§750): 乙의 고의 배임행위. | 甲의 戊에 대한 청구: ① 부당이득반환(민§741): 戊가 자신의 채무 변제 받음 = 乙이 甲에게 전달해야 할 돈. 단, 戊가 乙의 배임 사실 알았으면 악의의 수익자(민§748②) → 이자까지 반환. ② 불법행위 손해배상(민§750): 戊가 배임 사실 알고 수령.","",3,"부당이득"],
  ["채권각론_Q012","CASE","[제10회 2문3-2] 甲이 A회사의 여행패키지에서 승마체험 신청. A회사가 독립적 승마업자 乙에게 위탁. 乙의 안전조치 불이행으로 甲이 말에서 떨어져 부상. 甲이 A에게 채무불이행+불법행위로 손해배상 청구 가능한가? (20점)",[],0,"① 채무불이행(이행보조자 민§391): A가 여행계약에 따른 승마체험 이행을 乙에게 맡겼으므로 乙은 A의 이행보조자. 乙의 안전조치 해태는 A의 채무불이행. A는 이행보조자 과실에 대해 책임. | ② 불법행위 사용자책임(민§756): 乙이 A의 사용관계에 있는지 여부. 독립사업자인 乙은 A의 지시·감독 아래 있지 않으므로 사용자 관계 부정 가능성. | 결론: 채무불이행으로는 청구 가능. 불법행위 사용자책임은 乙의 독립성에 따라 판단.","",2,"불법행위"],
  ["채권각론_Q013","CASE","[제11회 2문1-2] A종중의 신임 대표 乙이 2019.10.1. 전 대표 甲의 비위(공사대금 부풀리기, 뒷돈 수수) 사실 발견. A종중이 2021.10.1. 甲에게 불법행위 손해배상 청구. 甲은 5년 전 발생한 것이어서 시효 소멸 주장. 법원의 판단은? (15점)",[],0,"불법행위 소멸시효(민§766): 피해자 또는 법정대리인이 '손해 및 가해자를 안 날'부터 3년. 법인의 경우 '법인이 안 날' = 대표기관이 안 날. 전임 대표 甲이 가해자인 경우 → 종중의 인식은 비위 사실을 정상적으로 알 수 있는 다른 기관(현임 대표 또는 이사)이 안 날. 신임 대표 乙이 2019.10.1. 발견 → 2022.10.1.까지 소멸시효(3년). 2021.10.1. 소 제기는 기간 내 → 시효 미완성. 결론: 甲의 항변 배척, 청구 인용.","",2,"불법행위"],
  ["채권각론_Q014","CASE","[제13회 1문5] 甲(골프장 운영)이 乙에게 상호 사용+회원권 판매 허락. 乙이 丙에게 매대금 2억 편취. 丙이 甲에게 사용자책임(민§756) 주장. ① 甲의 사용자책임 부정 논거를 甲 변호사 입장에서 서술. ② 화해권고결정 후 甲의 乙에 대한 구상금청구에서 乙이 '불법행위책임을 인정할 수 없어 구상 응할 수 없다'는 주장의 타당성. (10점+10점)",[],0,"① 사용자책임 부정 논거: i) 고용관계 없고 수수료 기반 독립 중개인. ii) 甲의 지시·감독 없음. iii) 계약서 이례적 조항(회원권 특정 없음, 고율 위약금)으로 일반인이 주의하면 의심 가능. iv) 丙이 매대금을 시가보다 40% 낮게 지급하고 명의개서 전 전액 개인계좌로 → 丙의 과실. v) 乙이 수사에서 비자금 목적 고지 주장. | ② 구상금 청구에서 乙의 항변: 甲이 丙에게 화해권고결정으로 배상 → 소송고지로 乙에게 참가 기회 부여. 乙이 불참 → 소송고지의 효력으로 乙은 화해권고결정의 내용이 잘못됐다는 주장 제한됨(민소§84). 따라서 乙의 항변 배척.","",3,"불법행위"],
  ["채권각론_Q015","CASE","[제13회 2문1-2] 甲과 丁이 '甲 사망 시 甲의 모든 재산을 丁에게 준다'는 증여계약서 체결. 甲이 이를 일방적으로 해제·철회하고자 함. 가능한가? (10점)",[],0,"사인증여(민§562): 증여자의 사망으로 효력이 발생하는 증여. 유증(§1065 이하)에 관한 규정을 준용(민§562 단서). | 해제 가능성: 일반 증여의 경우 이행 전에는 해제 가능(민§555). 사인증여는 이미 계약이 성립했으나 효력 발생이 사망시로 미뤄진 것 → 이행 전이므로 해제 가능(§555). | 철회 가능성: 유언 준용 → 유언 철회 자유(§1108). 단, 사인증여는 계약이므로 상대방 있는 행위 → 유언 철회 조항 그대로 적용할지 논의 있음. 다수설: 사인증여도 계약이므로 일방적 철회 원칙적 불가, 다만 해제 가능(§555). 결론: 이행 전이므로 해제 가능.","",2,"기타계약"]

const 총칙_QUIZ = [
  ["총칙_Q001","CASE","[제11회 1문1] 乙이 甲의 인장·서류를 이용해 위임장 만들고 甲의 대리인으로서 X건물을 丙에게 매도. 법원이 乙의 장기 관리+서류 보관 사실을 들어 甲에게 표현대리(민§125) 인정. ① 丙의 피고추가신청(乙 추가) 적법성, ② 법원의 판결은? (20점)",[],0,"① 피고추가신청: 표현대리 책임(甲 주위적)+무권대리인 책임(乙 §135 예비적) → 예비적 공동소송으로 피고추가 가능. 원고가 예비적 공동소송 취지를 밝히면 적법. | ② 판결: 甲에 대해 표현대리 성립 → 소유권이전등기 청구 인용. 乙에 대한 §135 예비적 청구는 주위적 청구 인용으로 기각.","",3,"대리"],
  ["총칙_Q002","CASE","[제12회 2문3-2] 乙이 甲(남편) 부재 중 甲의 인감도장 무단 사용하여 X토지를 丁에게 매도. 丁은 '乙과 중개인이 남편 인감도장+등기필정보 소지' 설명 들음. 丁의 주장: ① 일상가사대리(민§827), ② 표현대리(민§125). 타당한가? (25점)",[],0,"① 일상가사대리(민§827): 부동산 처분은 일상가사 범위 초과 → 부정. | ② 표현대리(민§125): 甲이 乙에게 대리권 수여 표시를 해야 함. 인감도장·등기필정보 보관 + 중개인 설명 → 대리권 표시의 외관 형성. 丁이 과실 없이 대리권 있다고 믿었는가 검토: 甲에게 직접 확인하지 않은 점 등 고려. 과실 없으면 표현대리 인정, 과실 있으면 부정.","",3,"대리"],
  ["총칙_Q003","CASE","[제14회 1문4-1] 甲이 乙에게 X토지 매도 위임(대리권 추단할 수 있는 직함 허락 → 민§125). 乙이 甲의 이익에 반하여 저가(시가 2억→1억)로 丙에게 매각. 丙은 乙의 배임 의도 알았음. 甲이 丙·丁(선의 전득자) 명의 등기 각 말소 청구. 법원의 판단? (25점)",[],0,"① 丙 명의 등기: 甲→乙 대리권 표시(민§125) → 표현대리 성립 가능. 그러나 乙의 배임적 대리 + 丙이 배임 의도 인지 → 대리행위 효력 부인(권리남용 또는 공서양속 위반). 甲→丙 계약 무효 → 丙 등기 말소 인용. | ② 丁 명의 등기: 丁은 선의·무과실. 丙→丁 양도는 甲→丙 무효에도 불구하고 丁 보호 필요. 부동산에서 선의취득 없음 → 원칙적으로 丁 등기도 말소. 단, 甲의 표현대리 효과가 丁까지 미친다면 보호 가능. 결론: 丁의 선의+무과실 인정 시 표현대리 효과로 丁 명의 등기 유효 → 말소 청구 기각.","",3,"대리"],
  ["총칙_Q004","CASE","[제10회 1문1] 甲회사 30억 공사대금 확정판결(2007.3.10.) 취득. 강제집행 없이 2017.3.15. 후소 제기. 乙이 2017.2.10. 30억 전액 변제(증명됨). ① 후소가 시효완성 후 재소라 부적법 항변, ② 변제로 채권 소멸 항변. 후소 법원의 판단? (15점)",[],0,"확정판결 채권의 소멸시효: 10년(민§165②). 2007.3.10.~2017.3.10. = 딱 10년 → 2017.3.15. 소 제기는 시효 완성(2017.3.10.) 후. | 시효완성 후 재소의 소의 이익: 확정판결 후 재소가 소의 이익 있는지. 판례는 확정판결 채권의 시효중단 위한 재소는 소의 이익 있음. 시효 완성 후라도 소의 이익 인정(채무자의 변제 등 본안 항변 판단 위해). | 乙의 변제 항변: 시효완성 이전(2017.2.10.)에 변제로 채권 소멸 → 본안 판단에서 청구 기각.","",2,"소멸시효"],
  ["총칙_Q005","CASE","[제12회 1문4-1] 甲이 乙에게 공사잔대금 3억 청구 소 제기(2021.11.1.) → 乙의 답변서 제출 전 소취하(2021.11.25.). 소취하서 乙에게 송달(2021.12.5.). 甲이 2022.5.28. 재소 제기. 乙이 공사잔대금 시효 소멸 항변. 타당한가? (15점)",[],0,"소취하와 시효중단(민§170): 소취하 시 소급하여 시효중단 효력 소멸. 단, 소취하 후 6개월 내 재소 제기 시 최초 소 제기 시에 시효중단 효력 인정(민§170②). | 기산: 소취하서 송달일(2021.12.5.)? vs 소취하서 제출일(2021.11.25.)? → 소취하의 효력 발생은 소취하서 제출 시. 6개월 = 2022.5.25. 재소 제기: 2022.5.28. → 6개월(2022.5.25.) 경과 → 시효중단 효력 없음. 결론: 乙의 시효 완성 항변 타당 → 공사잔대금채권(상사 3년 or 민 10년) 완성 여부 확인.","",3,"소멸시효"],
  ["총칙_Q006","CASE","[제14회 1문1] 甲이 불법행위(2020.5.1.) 손해 900만 중 600만 소 제기(2022.4.1.). '나머지에 관하여는 일부청구임을 명백히' 했음. 2024.6.1. 소극적 손해 200만 추가 청구. 乙의 소멸시효 완성 항변. 법원의 판단? (25점)",[],0,"불법행위 소멸시효 3년(민§766). 2020.5.1. 사건 → 2023.5.1. 만료. | 일부청구와 시효중단: 일부청구 소 제기 시 나머지 부분에 대한 시효중단 효력 인정되려면 소장에 '전체 청구의 일부임을 명백히' 해야 함. 이 사건은 명백히 일부 청구임을 표시 → 판례상 나머지 부분(포함된 소극적 손해 200만)에도 시효중단 효력 인정 가능. 따라서 2022.4.1. 소 제기로 나머지 손해에도 시효중단. 2024.6.1. 청구변경 적법. 결론: 시효 완성 항변 배척 → 추가 청구 인용.","",3,"소멸시효"],
