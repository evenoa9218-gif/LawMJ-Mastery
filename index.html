    return`<div class="mopt ${cls}" onclick="${ans===null?`ansMcq('${sym}','${cor}','${escA(q[0])}')`:''}"><span class="mopt-n">${sym}</span><span>${esc(o.replace(/^[①②③④⑤]\s*/,''))}</span></div>`;
  }).join('');
  return `<div class="qcard">
    <div class="qcard-top"><span class="qbadge qb-mcq">객관식</span>${starN>0?`<span class="qstar">${'★'.repeat(starN)}</span>`:''}<span style="flex:1"></span>${pageBadge(q[6])}</div>

}

function openSearch(){document.getElementById('soverlay').classList.add('show');setTimeout(()=>document.getElementById('sinput').focus(),40)}

function closeSearch(){document.getElementById('soverlay').classList.remove('show');document.getElementById('sinput').value='';document.getElementById('sresults').innerHTML='<div class="sempty">검색어를 입력하세요</div>'}
function searchByAtag(a){openSearch();document.getElementById('sinput').value=a;doSearch(a)}

function doSearch(q){
  q=q.trim();
  const r=document.getElementById('sresults');
  if(!q){r.innerHTML='<div class="sempty">검색어를 입력하세요</div>';return}
  const lq=q.toLowerCase();
  const res=[];

  // ── 페이지 번호 검색 패턴 감지
  // 지원 형식: "p.145" / "p145" / "pp.123" / "123페이지" / "145p" / 순수 숫자(50 이상)
  const pgPat=/^(?:pp?\.?\s*|페이지\s*)?(\d{2,4})\s*(?:페이지|p|쪽)?$/i;
  const pgMatch=q.match(pgPat);
  const pageTarget=pgMatch?parseInt(pgMatch[1]):null;

  MODULES.forEach(m=>{
    // ── CONCEPT 검색
    m.con.forEach(c=>{
      const hit=
        (c[1]+c[2]).toLowerCase().includes(lq)||
        c[3].some(a=>a.replace(/[§\s]/g,'').includes(q.replace(/[§\s]/g,'')))||
        (pageTarget!==null&&pageInRange(c[6],pageTarget));
      if(hit)res.push({type:'개념',title:c[1],sub:c[3].join(' · ')||'',mk:m.key,tk:c[5],page:c[6],mod:m.name});
    });
    // ── CASE 검색 (사건번호, 쟁점, 판시, 조문, 페이지)
    m.cas.forEach(c=>{
      const hit=
        (c[1]+c[2]+c[3]).toLowerCase().includes(lq)||
        c[5].some(a=>a.replace(/[§\s]/g,'').includes(q.replace(/[§\s]/g,'')))||
        (pageTarget!==null&&pageInRange(c[8],pageTarget));
      if(hit)res.push({type:'판례',title:c[2],sub:c[1],mk:m.key,tk:c[7],page:c[8],stars:c[6],mod:m.name});
    });
    // ── QUIZ 검색 (문제 본문, 페이지)
    m.qui.forEach(c=>{
      const hit=
        c[2].toLowerCase().includes(lq)||c[4].toLowerCase().includes(lq)||
        (pageTarget!==null&&pageInRange(c[6],pageTarget));
      if(hit){
        const tl={OX:'OX',MCQ:'객관식',CASE:'사례',BLANK:'빈칸'}[c[1]]||c[1];
        const titleRaw=c[2].replace(/§.*$/,'').replace(/^★\s*/,'');
        res.push({type:tl,title:titleRaw.length>60?titleRaw.substring(0,60)+'…':titleRaw,sub:'',mk:m.key,tk:c[5],page:c[6],mod:m.name});
      }
    });
  });

  if(!res.length){
    const hint=pageTarget?`교과서 ${pageTarget}페이지 근처 내용이 없습니다. 아직 아카이빙되지 않은 범위일 수 있습니다.`:`"${esc(q)}"에 대한 결과 없음`;
    r.innerHTML=`<div class="sempty">${hint}</div>`;
    return;
  }

  // 페이지 검색이면 페이지 오름차순 정렬, 아니면 판례 > 개념 > 문제 순
  if(pageTarget){
    res.sort((a,b)=>{
      const pa=a.page==null?9999:(Array.isArray(a.page)?a.page[0]:a.page);
      const pb=b.page==null?9999:(Array.isArray(b.page)?b.page[0]:b.page);
      return pa-pb;
    });
  }

  const typeIcon={개념:'📖',판례:'⚖️',OX:'🔘',객관식:'📋',사례:'📝',빈칸:'✏️'};
  r.innerHTML=res.slice(0,30).map(x=>{
    const pt=pageText(x.page);
    const starsHtml=x.stars?`<span style="color:var(--star);font-size:10px">${'★'.repeat(x.stars)}</span>`:'';
    return`<div class="sri" onclick="goTopic('${x.mk}','${x.tk}');closeSearch()">
      <div class="sri-type">${typeIcon[x.type]||''} ${x.type} &nbsp;·&nbsp; ${x.mod}</div>
      <div class="sri-title">${esc(x.title)} ${starsHtml}</div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap">
        ${x.sub?`<span class="sri-sub">${esc(x.sub)}</span>`:''}
        ${pt?`<span class="sri-page">📄 ${pt}</span>`:''}
      </div>
    </div>`;
  }).join('');

  if(res.length>30){
    r.innerHTML+=`<div class="sempty" style="font-size:11px;padding:10px">외 ${res.length-30}건 더 있음 — 검색어를 더 구체적으로 입력하세요</div>`;
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function escA(s){return String(s||'').replace(/'/g,"\\'")}
function empty(ico,ttl,sub){return`<div class="empty"><div class="empty-ico">${ico}</div><div class="empty-ttl">${ttl}</div><div class="empty-sub">${sub}</div></div>`}

// page: 숫자(123) 또는 배열([123,125]) 또는 null
function pageText(p){
  if(p==null||p===undefined)return null;
  return Array.isArray(p)?`pp.${p[0]}–${p[1]}`:`p.${p}`;
}
// pageBadge → PDF 팝업 JS 섹션으로 이동
// 페이지 범위 포함 여부: 검색 target 페이지가 항목의 page 범위 내에 있는지
function pageInRange(itemPage, target){
  if(itemPage==null||itemPage===undefined)return false;
  if(Array.isArray(itemPage))return target>=itemPage[0]&&target<=itemPage[1];
  return Math.abs(itemPage-target)<=2; // ±2 페이지 허용
}

// ================================================================
// PDF 단일 페이지 팝업 + IndexedDB 영구 저장
// ================================================================
const PDF_IDB='lawmj_pdf_v1', PDF_STORE='pdf', PDF_KEY='book';
let pgDoc=null, pgCurPage=1, pgAnchor=1, pgRendering=false, pgPending=null, pgTargetAfterLoad=null;
const PG_RANGE=20;

// ── IndexedDB 헬퍼
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(PDF_IDB,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(PDF_STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=rej;
  });
}
async function idbSave(buf){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(PDF_STORE,'readwrite');
    tx.objectStore(PDF_STORE).put(buf,PDF_KEY);
    tx.oncomplete=res; tx.onerror=rej;
  });
}
async function idbLoad(){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(PDF_STORE,'readonly');
    const r=tx.objectStore(PDF_STORE).get(PDF_KEY);
    r.onsuccess=()=>res(r.result||null); r.onerror=rej;
  });
}

// ── PDF.js 초기화 + IDB에서 자동 로드
async function pgInit(){
  if(typeof pdfjsLib==='undefined')return;
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  try{
    const buf=await idbLoad();
    if(buf){await pgLoadBuf(buf);}
  }catch(e){}
}

async function pgLoadBuf(buf){
  pgDoc=await pdfjsLib.getDocument({data:buf}).promise;
  document.getElementById('pg-prev').disabled=false;
  document.getElementById('pg-next').disabled=false;
}

// ── 파일 선택 시
async function pgFileSelected(input){
  const file=input.files[0]; if(!file)return;
  pgSetState('status','⏳ PDF 저장 중...');
  const buf=await file.arrayBuffer();
  await idbSave(buf.slice(0)); // IDB 저장
  await pgLoadBuf(buf);        // 문서 로드
  if(pgTargetAfterLoad!=null){
    pgRender(pgTargetAfterLoad);
    pgTargetAfterLoad=null;
  } else {
    pgRender(pgCurPage);
  }
}

// ── 팝업 열기 (페이지 번호 지정)
function openPage(pageNum){
  document.getElementById('pg-overlay').classList.add('show');
  pgCurPage=parseInt(pageNum)||1;
  pgAnchor=pgCurPage; // 앵커 설정 — 이 페이지 기준 ±20
  document.getElementById('pg-title').textContent=`📄 교과서 p.${pgCurPage}`;
  if(!pgDoc){
    pgTargetAfterLoad=pgCurPage;
    pgSetState('pick');
  } else {
    pgRender(pgCurPage);
  }
}

function closePg(){
  document.getElementById('pg-overlay').classList.remove('show');
}
function pgOverlayClick(e){
  if(e.target===document.getElementById('pg-overlay'))closePg();
}

// ── 페이지 렌더
async function pgRender(num){
  if(!pgDoc)return;
  num=Math.min(Math.max(1,num),pgDoc.numPages);
  if(pgRendering){pgPending=num;return}
  pgRendering=true;
  pgCurPage=num;
  pgSetState('status','⏳ 렌더링 중...');
  document.getElementById('pg-title').textContent=`📄 교과서 p.${num}`;
  const page=await pgDoc.getPage(num);
  const modal=document.getElementById('pg-body');
  const w=Math.min(modal.clientWidth-28,680);
  const vp0=page.getViewport({scale:1});
  const scale=Math.max(0.6,Math.min(2.5,w/vp0.width));
  const vp=page.getViewport({scale});
  const canvas=document.getElementById('pg-canvas');
  const ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(vp.width*dpr);
  canvas.height=Math.floor(vp.height*dpr);
  canvas.style.width=Math.floor(vp.width)+'px';
  canvas.style.height=Math.floor(vp.height)+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  pgSetState('page');
  // 버튼 활성화 상태 업데이트
  pgUpdateNav();
  pgRendering=false;
  if(pgPending!==null){const q=pgPending;pgPending=null;pgRender(q)}
}

function pgUpdateNav(){
  const minP=Math.max(1, pgAnchor-PG_RANGE);
  const maxP=Math.min(pgDoc?pgDoc.numPages:9999, pgAnchor+PG_RANGE);
  document.getElementById('pg-prev').disabled = pgCurPage<=minP;
  document.getElementById('pg-next').disabled = pgCurPage>=maxP;
  // 푸터에 범위 표시
  const foot=document.getElementById('pg-foot');
  const rangeEl=document.getElementById('pg-range');
  if(rangeEl) rangeEl.textContent=`p.${minP} — p.${maxP} 범위 (현재 p.${pgCurPage})`;
}

function pgMove(d){
  if(!pgDoc)return;
  const minP=Math.max(1, pgAnchor-PG_RANGE);
  const maxP=Math.min(pgDoc.numPages, pgAnchor+PG_RANGE);
  const n=Math.min(Math.max(pgCurPage+d, minP), maxP);
  if(n!==pgCurPage) pgRender(n);
}

// ── UI 상태 전환
function pgSetState(state,msg){
  const ids=['pg-pick','pg-status','pg-body','pg-foot'];
  ids.forEach(id=>document.getElementById(id).style.display='none');
  if(state==='pick'){
    document.getElementById('pg-pick').style.display='flex';
  } else if(state==='status'){
    const el=document.getElementById('pg-status');
    el.textContent=msg||'⏳';
    el.style.display='block';
  } else if(state==='page'){
    document.getElementById('pg-body').style.display='flex';
    document.getElementById('pg-foot').style.display='flex';
  }
}

// ── pageBadge 클릭 가능하게 (openPage 연동)
function pageBadge(p,lg){
  const t=pageText(p);
  if(!t)return'';
  const pg=Array.isArray(p)?p[0]:p;
  return`<span class="pbadge${lg?' pbadge-lg':''}" onclick="openPage(${pg})" title="교과서 ${t} 보기">📄 ${t}</span>`;
}

// ── 키보드: Esc로 팝업 닫기
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('pg-overlay').classList.contains('show')){
    closePg();
  }
});

// ================================================================
// 목차 맵 + D-day
// ================================================================
const EXAM_DATE_KEY = 'lawmj_examdate';
const DEFAULT_EXAM  = '2027-01-12'; // 제16회 변호사시험
let mapFilter = 'all';

function calcDday(dateStr) {
  const exam = new Date(dateStr || localStorage.getItem(EXAM_DATE_KEY) || DEFAULT_EXAM);
  const today = new Date(); today.setHours(0,0,0,0); exam.setHours(0,0,0,0);
  return Math.ceil((exam - today) / (1000*60*60*24));
}
function updateDdayChip() {
  const d = calcDday();
  const el = document.getElementById('dday-chip');
  if(!el) return;
  el.textContent = d > 0 ? `D-${d}` : d === 0 ? 'D-Day' : `D+${Math.abs(d)}`;
}

function goMap() {
  S.modKey=null; S.topicKey=null;
  renderSB(); renderBC('map');
  renderMap();
}

function renderMap() {
  const d = calcDday();
  const examDateVal = localStorage.getItem(EXAM_DATE_KEY) || DEFAULT_EXAM;
  const examDate = new Date(examDateVal);
  const examStr = `${examDate.getFullYear()}.${String(examDate.getMonth()+1).padStart(2,'0')}.${String(examDate.getDate()).padStart(2,'0')}`;

  let html = `
    <div class="map-top">
      <div class="map-dday-row">
        <span class="map-dday-big">${d>0?'D-'+d:d===0?'D-Day':'D+'+ Math.abs(d)}</span>
        <div>
          <div class="map-dday-exam">변호사시험 ${examStr}</div>
          <div class="map-dday-info">로스쿨 민법의 정석 9판 · 채권총론 → 채권각론 → 민법총칙 → 물권법</div>
        </div>
      </div>
      <div class="map-examdate-row">
        시험 날짜 변경:
        <input class="map-examdate-inp" type="date" value="${examDateVal}"
          onchange="localStorage.setItem('${EXAM_DATE_KEY}',this.value);updateDdayChip();renderMap()">
      </div>
    </div>
    <div class="map-search-row">
      <input class="map-sinp" id="map-sinp" placeholder="쟁점·조문 검색 (예: 상계, 366, 포현대리)" oninput="mapSearch(this.value)">
      <div class="map-filters">
        <button class="fbtn ${mapFilter==='all'?'active':''}" onclick="setMapFilter('all')">전체</button>
        <button class="fbtn ${mapFilter==='star'?'active':''}" onclick="setMapFilter('star')">★ 약점</button>
        <button class="fbtn ${mapFilter==='done'?'active':''}" onclick="setMapFilter('done')">✓ 완료</button>
        <button class="fbtn ${mapFilter==='none'?'active':''}" onclick="setMapFilter('none')">미학습</button>
      </div>
    </div>
    <div id="map-body">`;

  MODULES.forEach((mod, mi) => {
    html += `
      <div class="map-part-hdr">
        <span class="map-part-dot" style="background:${mod.color}"></span>
        Part ${mi+1} · ${mod.name}
      </div>
      <div class="map-grid">`;

    mod.topics.forEach(t => {
      const cons  = mod.con.filter(c => c[5]===t.key);
      const cases = mod.cas.filter(c => c[7]===t.key);
      const quizs = mod.qui.filter(q => q[5]===t.key);
      const pct   = topicPct(mod, t.key);
      const total = cons.length + cases.length + quizs.length;

      // 필터 적용
      if(mapFilter==='none' && total>0) return;
      if(mapFilter==='done' && pct<100) return;
      if(mapFilter==='star') {
        const p=getP(t.key);
        const hasWrong=[...p.ox_ng,...p.mcq_ng,...p.blank_ng].some(id=>quizs.find(q=>q[0]===id));
        if(!hasWrong) return;
      }

      // 태그: TOPIC_TAGS 소제목 우선, 없으면 아카이빙 예정
      const topicTagList = TOPIC_TAGS[t.key] || [];
      const tagHtml = topicTagList.length > 0
        ? topicTagList.map(tag => {
            const hasData = cons.some(c=>c[1].includes(tag.replace(/\(.*?\)/g,'').trim().substring(0,6)))
                         || cases.some(c=>c[2].includes(tag.replace(/\(.*?\)/g,'').trim().substring(0,6)));
            return `<span class="mtag ${total>0?'has':'empty'}" onclick="event.stopPropagation();goTopic('${mod.key}','${t.key}')">${esc(tag)}</span>`;
          }).join('')
        : `<span class="mtag empty">소제목 미등록</span>`;

      const borderColor = total > 0 ? mod.color : 'var(--border)';
      html += `
        <div class="mcard2" style="border-left-color:${borderColor}" onclick="goTopic('${mod.key}','${t.key}')">
          <div class="mcard2-title">
            ${esc(t.label)}
            <span class="mcard2-counts">개념${cons.length}·판례${cases.length}·문제${quizs.length}</span>
          </div>
          ${pct>0?`<div class="map-pbar"><div class="map-pbar-fill" style="width:${pct}%;background:${mod.color}"></div></div>`:''}
          <div class="map-tags">${tagHtml}</div>
        </div>`;
    });
    html += '</div>';
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function setMapFilter(f) {
  mapFilter = f;
  renderMap();
}

function mapSearch(q) {
  q = q.trim().toLowerCase();
  if(!q) { renderMap(); return; }
  // 맵에서 검색: 매칭 카드만 하이라이트 (간단 구현 — 전체 검색창과 별개)
  document.querySelectorAll('.mcard2').forEach(card => {
    const txt = card.textContent.toLowerCase();
    card.style.opacity = txt.includes(q) ? '1' : '0.25';
  });
}

// breadcrumb에 맵 상태 추가
function renderBC(mode) {
  const bc = document.getElementById('breadcrumb');
  if(mode==='map'||(!S.modKey&&!S.topicKey)) {
    bc.innerHTML='<span class="bc-link" onclick="goMap()">🗺️ 목차</span>';
    return;
  }
  if(!S.modKey) {
    bc.innerHTML='<span class="bc-link" onclick="goMap()">🗺️ 목차</span>';
    return;
  }
  const m=MODULES.find(x=>x.key===S.modKey);
  const t=m&&m.topics.find(x=>x.key===S.topicKey);
  bc.innerHTML=`
    <span class="bc-link" onclick="goMap()">🗺️ 목차</span>
    <span class="bc-sep">›</span>
    <span class="bc-link" onclick="goTopic('${m.key}','${m.topics[0].key}')">${m.name}</span>
    ${t?`<span class="bc-sep">›</span><strong>${t.label}</strong>`:''}`;
}
