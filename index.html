<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LawMJ Mastery</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Backgrounds — Linen + Cloud Dancer ── */
  --bg:#f3f1ee;          /* warm linen */
  --bg2:#e8ecee;         /* cloud dancer */
  --card:#ffffff;
  --border:#cdd8de;      /* powder blue border */
  /* ── Text — Deep Slate ── */
  --text:#243237;        /* deep slate (#243237) */
  --text2:#4e6e7a;       /* steel text */
  --text3:#90b0ba;       /* mist */
  /* ── Primary — Steel Blue ── */
  --primary:#5a8fa0;     /* between #7296a4 & #67869a */
  --primary-light:#e0edf1;
  /* ── Semantic ── */
  --accent:#a07070;      /* dusty rose (for wrong/error) */
  --success:#5a8c7a;     /* sage (for correct) */
  --warning:#9a8060;     /* warm sand */
  --star:#6a9aaa;        /* star = warm caramel */
  /* ── Sidebar — Deep Slate ── */
  --sb-bg:#1c2b34;       /* #243237 darker */
  --sb-text:#9ebecb;     /* sea glass */
  --sb-active:#6fa0b5;   /* steel blue active */
  --sb-hover:#243542;
  --topbar:#ffffff;
  --shadow:0 2px 12px rgba(90,143,160,0.10);
  --radius:10px;
}
[data-theme="dark"] {
  --bg:#1b2830;
  --bg2:#21303a;
  --card:#273542;
  --border:#324858;
  --text:#d5e5ea;
  --text2:#7aacb8;
  --text3:#3d6878;
  --primary:#78b5ca;
  --primary-light:#1a3545;
  --accent:#d09090;
  --success:#6db89e;
  --warning:#c8a878;
  --star:#78b0c5;
  --sb-bg:#141e25;
  --sb-text:#6a9aaa;
  --sb-active:#78b0c5;
  --sb-hover:#1b2830;
  --topbar:#1f2e38;
  --shadow:0 2px 12px rgba(0,0,0,0.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:252px;min-width:252px;background:var(--sb-bg);display:flex;flex-direction:column;height:100vh;overflow-y:auto;overflow-x:hidden;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#2c4552;border-radius:3px}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.sb-logo-sub{font-size:10px;color:#5a6a8a;margin-top:3px}
.sb-module-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;user-select:none;color:var(--sb-text);font-size:10.5px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;transition:background 0.15s}
.sb-module-header:hover{background:var(--sb-hover)}
.sb-module-header .chv{transition:transform 0.2s;font-size:9px;opacity:0.6}
.sb-module-header.open .chv{transform:rotate(90deg)}
.sb-topics{}
.sb-topic{display:flex;align-items:center;gap:7px;padding:7px 16px 7px 26px;cursor:pointer;color:#7080a0;font-size:12px;transition:all 0.15s;border-left:2px solid transparent}
.sb-topic:hover{background:var(--sb-hover);color:#bbc8e8}
.sb-topic.active{background:rgba(90,143,160,0.12);color:#9ebecb;border-left-color:var(--sb-active)}
.sb-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0.5;flex-shrink:0}
.sb-topic.active .sb-dot{opacity:1;background:var(--sb-active)}
.sb-pct{margin-left:auto;font-size:10px;opacity:0.5}
.sb-stats{margin-top:auto;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);font-size:11px;color:#5a6a8a}
.sb-stats strong{color:#8898bb}

/* MAIN */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--topbar);border-bottom:1px solid var(--border);padding:0 22px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.breadcrumb{flex:1;font-size:12.5px;color:var(--text2);display:flex;align-items:center;gap:5px;overflow:hidden}
.breadcrumb .bc-link{color:var(--primary);cursor:pointer;white-space:nowrap}
.breadcrumb .bc-link:hover{text-decoration:underline}
.breadcrumb .bc-sep{color:var(--text3)}
.breadcrumb strong{color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbtn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:all 0.15s;flex-shrink:0}
.tbtn:hover{background:var(--bg2);color:var(--primary)}
.content{flex:1;overflow-y:auto;padding:22px 24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* HUB */
.hub-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;margin-bottom:5px}
.hub-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.hub-stats{display:flex;gap:12px;margin-bottom:26px;flex-wrap:wrap}
.hstat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;min-width:90px;text-align:center;flex:1}
.hstat-num{font-size:22px;font-weight:700;color:var(--primary);font-family:'Noto Serif KR',serif}
.hstat-label{font-size:10.5px;color:var(--text3);margin-top:2px}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mcard:nth-child(1)::before{background:#5a8fa0}
.mcard:nth-child(2)::before{background:#7aa8b8}
.mcard:nth-child(3)::before{background:#86b4ae}
.mcard:nth-child(4)::before{background:#6888a0}
.mcard:nth-child(5)::before{background:#8098b0}
.mcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--primary)}
.mcard-icon{font-size:26px;margin-bottom:8px}
.mcard-name{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;margin-bottom:4px}
.mcard-topics{font-size:11px;color:var(--text3);margin-bottom:12px}
.mpbar{height:4px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-bottom:5px}
.mpbar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.mpbar-text{font-size:10.5px;color:var(--text3)}
.mcard-stats{display:flex;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.mcs{font-size:10.5px;color:var(--text3)}
.mcs strong{color:var(--text2);font-weight:600}

/* TOPIC */
.topic-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;margin-bottom:3px}
.topic-meta{font-size:11.5px;color:var(--text3);margin-bottom:18px}
.tabs{display:flex;gap:2px;background:var(--bg2);border-radius:9px;padding:3px;margin-bottom:18px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 12px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text2);white-space:nowrap;transition:all 0.15s}
.tab-btn:hover{background:var(--card);color:var(--text)}
.tab-btn.active{background:var(--card);color:var(--primary);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1)}

/* CONCEPT */
.concept-list{display:flex;flex-direction:column;gap:14px}
.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.ccard-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.ccard-title{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b3{background:#f0e3e3;color:#905050}
.b2{background:#ede9e0;color:#9a7050}
.b1{background:#e0edf1;color:#4a8090}
[data-theme="dark"] .b3{background:#3a1818;color:#d09090}
[data-theme="dark"] .b2{background:#302510;color:#c8a870}
[data-theme="dark"] .b1{background:#1a3545;color:#7eb5ca}
.ccard-body{font-size:13.5px;line-height:1.9;color:var(--text2);white-space:pre-wrap}
.atags{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.atag{padding:2px 9px;background:var(--primary-light);color:var(--primary);border-radius:4px;font-size:10.5px;font-weight:600;cursor:pointer}
.atag:hover{opacity:0.75}

/* CASE */
.case-filters{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:var(--card);cursor:pointer;font-size:11.5px;color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all 0.15s}
.fbtn:hover{border-color:var(--primary);color:var(--primary)}
.fbtn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.case-grid{display:flex;flex-direction:column;gap:12px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:box-shadow 0.2s}
.pcard:hover{box-shadow:var(--shadow)}
.pcard-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.pcard-no{font-size:11.5px;color:var(--text3);font-family:monospace}
.pcard-stars{color:var(--star);font-size:11px;letter-spacing:-1px}
.pcard-issue{font-weight:700;font-size:14.5px;margin-bottom:9px}
.pcard-sec{margin-bottom:7px}
.pcard-sec-lbl{font-size:9.5px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.pcard-sec-txt{font-size:13px;line-height:1.75;color:var(--text2)}
.pcard-sig{margin-top:9px;padding:7px 11px;background:#e8f2f5;border-radius:6px;font-size:12px;color:#4a8090;border-left:2px solid var(--primary)}

/* QUIZ */
.qcontrols{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.qprogress{font-size:12px;color:var(--text3);margin-left:auto}
.qwrap{max-width:680px;margin:0 auto}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px 26px;min-height:180px;margin-bottom:14px}
.qcard-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.qbadge{padding:2px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.qb-ox{background:#e0edf1;color:#4a8090}
.qb-mcq{background:#f0e8ea;color:#9a6070}
.qb-case{background:#e0eeea;color:#4a8070}
.qb-blank{background:#ede9e0;color:#8a7050}
[data-theme="dark"] .qb-ox{background:#1a3545;color:#7eb5ca}
[data-theme="dark"] .qb-mcq{background:#381525;color:#d08090}
[data-theme="dark"] .qb-case{background:#153528;color:#7eb5a0}
[data-theme="dark"] .qb-blank{background:#302510;color:#c8a870}
.qstar{color:#6a9aaa;font-size:13px;letter-spacing:1px}
.qfact{background:var(--bg2);border-left:3px solid var(--primary);padding:10px 14px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:14px}
.qquestion{font-size:14.5px;line-height:1.85;color:var(--text);margin-bottom:18px}

/* OX */
.ox-row{display:flex;gap:14px;justify-content:center;margin:4px 0}
.oxbtn{width:76px;height:76px;border-radius:50%;border:2px solid var(--border);background:var(--card);font-size:28px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.oxbtn:hover{transform:scale(1.07)}
.obtn:hover,.obtn.sel-o{border-color:var(--success);background:rgba(90,140,122,0.09)}
.xbtn:hover,.xbtn.sel-x{border-color:var(--accent);background:rgba(160,112,112,0.09)}
.oxbtn.ans-ok{border-color:var(--success)!important;background:rgba(90,140,122,0.13)!important}
.oxbtn.ans-ng{border-color:var(--accent)!important;background:rgba(160,112,112,0.13)!important}

/* MCQ */
.mcq-opts{display:flex;flex-direction:column;gap:7px}
.mopt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:13.5px;line-height:1.7;color:var(--text2);background:var(--card);transition:all 0.15s}
.mopt:hover{border-color:var(--primary);color:var(--text);background:var(--primary-light)}
.mopt.m-correct{border-color:var(--success);background:rgba(90,140,122,0.08);color:var(--text)}
.mopt.m-wrong{border-color:var(--accent);background:rgba(160,112,112,0.08);color:var(--text)}
.mopt-n{font-weight:700;color:var(--primary);flex-shrink:0;width:18px}

/* Explanation */
.qexp{margin-top:12px;padding:12px 14px;background:var(--bg2);border-radius:7px;border-left:3px solid var(--primary);font-size:13px;line-height:1.8;color:var(--text2);display:none}
.qexp.show{display:block}
.qres{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:4px;font-size:11.5px;font-weight:700;margin-bottom:7px}
.qres.ok{background:rgba(90,140,122,0.13);color:var(--success)}
.qres.ng{background:rgba(160,112,112,0.13);color:var(--accent)}

/* BLANK */
.blank-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.blank-inp{flex:1;padding:9px 13px;border:1.5px solid var(--border);border-radius:7px;background:var(--card);color:var(--text);font-size:13.5px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s}
.blank-inp:focus{border-color:var(--primary)}
.blank-inp.ok{border-color:var(--success)}
.blank-inp.ng{border-color:var(--accent)}

/* CASE PROB */
.case-facts{background:var(--bg2);border-left:3px solid #0ca678;padding:12px 15px;border-radius:0 7px 7px 0;margin-bottom:12px;font-size:13.5px;line-height:1.8;color:var(--text2)}
.case-q{font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:14px}
.case-ans-btn{padding:9px 18px;border:1.5px solid var(--success);border-radius:7px;background:transparent;color:var(--success);font-size:12.5px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s}
.case-ans-btn:hover{background:rgba(90,140,122,0.09)}
.case-ans{margin-top:12px;padding:14px 16px;background:rgba(90,140,122,0.07);border:1px solid rgba(90,140,122,0.25);border-radius:7px;font-size:13.5px;line-height:1.85;color:var(--text2);display:none}
.case-ans.show{display:block}

/* NAV */
.qnav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px}
.nbtn{padding:8px 18px;border:1px solid var(--border);border-radius:7px;background:var(--card);color:var(--text2);font-size:12.5px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all 0.15s}
.nbtn:hover{border-color:var(--primary);color:var(--primary)}
.nbtn:disabled{opacity:0.35;cursor:not-allowed}
.nbtn.pri{background:var(--primary);color:#fff;border-color:var(--primary)}
.nbtn.pri:hover{opacity:0.9;color:#fff}

/* FLASHCARD */
.flash-wrap{max-width:580px;margin:0 auto}
.flash-ctr{font-size:12.5px;color:var(--text3);text-align:center;margin-bottom:6px}
.flash-hint{font-size:11px;color:var(--text3);text-align:center;margin-bottom:14px}
.flash-scene{perspective:1200px;height:270px;margin-bottom:18px;cursor:pointer}
.flash-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.48s cubic-bezier(0.4,0,0.2,1)}
.flash-inner.flipped{transform:rotateY(180deg)}
.flash-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;border:1px solid var(--border);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.flash-front{background:var(--card)}
.flash-back{background:#5a8fa0;transform:rotateY(180deg)}
[data-theme="dark"] .flash-back{background:#1c3a4f}
.flash-face-lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.45;margin-bottom:14px}
.flash-front-text{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;color:var(--text);line-height:1.5}
.flash-back-text{font-size:13.5px;line-height:1.9;color:rgba(255,255,255,0.92);white-space:pre-wrap}
.flash-cat{position:absolute;top:10px;right:12px;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--primary-light);color:var(--primary)}
.flash-back .flash-cat{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.75)}

/* SEARCH */
.soverlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:70px}
.soverlay.show{display:flex}
.sbox{width:580px;max-width:92vw;background:var(--card);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.25);overflow:hidden}
.sinput-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);gap:10px}
.sinput{flex:1;border:none;background:transparent;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none}
.sinput::placeholder{color:var(--text3)}
.sresults{max-height:380px;overflow-y:auto}
.sri{padding:11px 18px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s}
.sri:hover{background:var(--bg2)}
.sri:last-child{border-bottom:none}
.sri-type{font-size:9.5px;color:var(--text3);margin-bottom:2px;font-weight:700;letter-spacing:0.4px;text-transform:uppercase}
.sri-title{font-size:13.5px;color:var(--text);font-weight:500}
.sri-sub{font-size:11.5px;color:var(--text2);margin-top:1px}
.sempty{padding:28px;text-align:center;color:var(--text3);font-size:13px}

/* WRONG NOTE FAB */
.fab{position:fixed;bottom:22px;right:22px;width:50px;height:50px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:18px;box-shadow:0 4px 16px rgba(90,143,160,0.30);z-index:50;display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.fab:hover{transform:scale(1.1)}
.fab-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--accent);border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none}
.fab-badge.show{display:flex}

/* EMPTY */
.empty{text-align:center;padding:56px 20px;color:var(--text3)}
.empty-ico{font-size:38px;margin-bottom:10px}
.empty-ttl{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:5px}
.empty-sub{font-size:12.5px}

/* PAGE BADGE */
.pbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:4px;background:var(--primary-light);color:var(--primary);font-size:10.5px;font-weight:600;white-space:nowrap;cursor:default;flex-shrink:0}
[data-theme="dark"] .pbadge{background:var(--primary-light);color:var(--primary)}
.pbadge-lg{font-size:12.5px;padding:4px 11px}
.sri-page{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:3px;background:var(--primary-light);color:var(--primary);font-size:10px;font-weight:600;margin-top:3px}
[data-theme="dark"] .sri-page{background:#101830;color:#7a9eff}

/* WRONG NOTE PAGE */
.wn-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.wn-meta{font-size:10.5px;color:var(--text3);margin-bottom:6px}
.wn-q{font-size:13.5px;color:var(--text);margin-bottom:8px;line-height:1.7}
.wn-exp{font-size:12.5px;color:var(--text2);line-height:1.75;padding:8px 11px;background:var(--bg2);border-radius:6px}

/* ── 교과서 페이지 팝업 ── */
.pg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.pg-overlay.show{display:flex}
.pg-modal{background:var(--card);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;max-width:min(720px,96vw);max-height:92vh;box-shadow:0 24px 64px rgba(0,0,0,0.45);width:100%}
.pg-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.pg-hdr-title{font-size:13px;font-weight:600;color:var(--text);flex:1}
.pg-hdr-nav{display:flex;align-items:center;gap:6px}
.pg-nbtn{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text2);cursor:pointer;font-size:12px;transition:all 0.15s}
.pg-nbtn:hover{border-color:var(--primary);color:var(--primary)}
.pg-nbtn:disabled{opacity:0.3;cursor:not-allowed}
.pg-body{overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:14px;background:#555;flex:1;min-height:200px}
.pg-body canvas{max-width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.pg-foot{padding:8px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;font-size:11.5px;color:var(--text3)}
/* 파일 선택 상태 */
.pg-pick{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:36px 24px;flex:1}
.pg-pick-lbl{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:24px 32px;border:2px dashed var(--border);border-radius:12px;color:var(--text2);transition:all 0.2s;text-align:center}
.pg-pick-lbl:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.pg-status{font-size:13px;color:var(--text3);text-align:center;padding:40px}
.pbadge{cursor:pointer!important}
.pbadge:hover{opacity:0.78}

/* ── 목차 맵 페이지 ── */
.dday-chip{padding:3px 11px;background:#e0edf1;color:#3a7080;border-radius:6px;font-size:13px;font-weight:700;font-family:'Noto Serif KR',serif;white-space:nowrap;flex-shrink:0;letter-spacing:-0.5px}
[data-theme="dark"] .dday-chip{background:#1a3545;color:#78b5ca}
.map-top{margin-bottom:18px}
.map-dday-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.map-dday-big{font-family:'Noto Serif KR',serif;font-size:36px;font-weight:700;color:#3a7080;letter-spacing:-2px;line-height:1}
[data-theme="dark"] .map-dday-big{color:#78b5ca}
.map-dday-info{font-size:12.5px;color:var(--text2)}
.map-dday-exam{font-weight:700;color:var(--text)}
.map-title{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;margin-bottom:3px}
.map-sub{font-size:12px;color:var(--text3);margin-bottom:18px}
.map-search-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.map-sinp{flex:1;min-width:200px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.15s}
.map-sinp:focus{border-color:var(--primary)}
.map-filters{display:flex;gap:5px;flex-wrap:wrap}
.map-part-hdr{display:flex;align-items:center;gap:8px;margin:22px 0 10px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.6px;text-transform:uppercase}
.map-part-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.map-part-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:10px}
.mcard2{background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;padding:13px 15px;cursor:pointer;transition:all 0.18s}
.mcard2:hover{border-color:var(--primary);border-left-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-1px)}
.mcard2-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:5px;line-height:1.4}
.mcard2-counts{margin-left:auto;font-size:9.5px;color:var(--text3);font-weight:400;white-space:nowrap;flex-shrink:0}
.map-pbar{height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-bottom:7px}
.map-pbar-fill{height:100%;border-radius:2px;transition:width 0.4s}
.map-tags{display:flex;flex-wrap:wrap;gap:4px}
.mtag{padding:2px 8px;border-radius:4px;font-size:10.5px;cursor:pointer;transition:all 0.13s;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
.mtag.has{background:var(--primary-light);color:var(--primary)}
.mtag.has:hover{opacity:0.8}
.mtag.empty{background:var(--bg2);color:var(--text3);font-style:italic;cursor:default}
.map-examdate-row{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11.5px;color:var(--text3)}
.map-examdate-inp{padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);font-size:11.5px;outline:none;width:110px}
.map-examdate-inp:focus{border-color:var(--primary)}

@media(max-width:780px){
  .sidebar{width:220px;min-width:220px;position:fixed;z-index:90;transform:translateX(-100%);transition:transform 0.28s}
  .sidebar.open{transform:translateX(0)}
  .hub-stats{flex-wrap:wrap}
  .hstat{min-width:calc(50% - 6px)}
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-logo" onclick="goMap()" style="cursor:pointer">
    <div class="sb-logo-title">⚖️ LawMJ Mastery</div>
    <div class="sb-logo-sub">민법 교과서 완전학습 플랫폼</div>
  </div>
  <div id="sb-nav"></div>
  <div class="sb-stats" id="sb-stats"></div>
</aside>

<div class="main-wrap">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"></div>
    <span class="dday-chip" id="dday-chip" onclick="goMap()" title="변호사시험 D-day · 클릭하면 목차로" style="cursor:pointer">D-...</span>
    <button class="tbtn" onclick="goMap()" title="목차 맵">🗺️</button>
    <button class="tbtn" onclick="openSearch()" title="검색 (⌘K)">🔍</button>
    <button class="tbtn" onclick="toggleTheme()" id="theme-btn" title="테마 전환">🌙</button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="soverlay" id="soverlay" onclick="closeSOverlay(event)">
  <div class="sbox">
    <div class="sinput-row">
      <span style="font-size:16px;color:var(--text3)">🔍</span>
      <input class="sinput" id="sinput" placeholder="조문(§750), 판례번호, 개념, 키워드, 또는 페이지 번호(예: p.145, 200페이지)" oninput="doSearch(this.value)">
      <button class="tbtn" style="border:none" onclick="closeSearch()">✕</button>
    </div>
    <div class="sresults" id="sresults"><div class="sempty">검색어를 입력하세요</div></div>
  </div>
</div>

<button class="fab" id="fab" onclick="showWrongNote()" title="오답노트">📕
  <div class="fab-badge" id="fab-badge">0</div>
</button>



<div class="pg-overlay" id="pg-overlay" onclick="pgOverlayClick(event)">
  <div class="pg-modal" id="pg-modal">
    <div class="pg-hdr">
      <span class="pg-hdr-title" id="pg-title">📄 교과서 페이지</span>
      <div class="pg-hdr-nav">
        <button class="pg-nbtn" id="pg-prev" onclick="pgMove(-1)" disabled>◀ 이전</button>
        <button class="pg-nbtn" id="pg-next" onclick="pgMove(1)" disabled>다음 ▶</button>
        <button class="pg-nbtn" onclick="closePg()">✕</button>
      </div>
    </div>
    <!-- 상태: 파일 미선택 -->
    <div class="pg-pick" id="pg-pick" style="display:none">
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">교과서 PDF를 한 번 선택하면 이후 자동으로 기억합니다</div>
      <label class="pg-pick-lbl" for="pg-file-inp">
        <span style="font-size:36px">📂</span>
        <span style="font-size:14px;font-weight:600">로스쿨 민법의 정석.pdf 선택</span>
        <span style="font-size:11.5px;color:var(--text3)">선택 후 이 브라우저에 영구 저장됩니다</span>
      </label>
      <input type="file" id="pg-file-inp" accept=".pdf" style="display:none" onchange="pgFileSelected(this)">
    </div>
    <!-- 상태: 로딩/렌더링 -->
    <div class="pg-status" id="pg-status" style="display:none">⏳ 로딩 중...</div>
    <!-- 상태: 페이지 표시 -->
    <div class="pg-body" id="pg-body" style="display:none">
      <canvas id="pg-canvas"></canvas>
    </div>
    <div class="pg-foot" id="pg-foot" style="display:none">
      <span id="pg-range" style="flex:1">—</span>
      <label for="pg-file-inp" style="color:var(--primary);cursor:pointer;flex-shrink:0">📂 파일 변경</label>
    </div>
  </div>
</div>

<script>
// ================================================================
// ① 데이터 배열 (아카이빙 시 순차적으로 채움)
// 포맷:
//  CONCEPT:   [id, title, body, article_refs[], importance(1-3), topic, page]
//  CASE:      [id, case_no, issue, holding, significance, article_refs[], stars(1-3), topic, page]
//  QUIZ:      [id, type, question, answer, explanation, topic, page]
//             type → "OX"(answer:true/false) | "MCQ"(answer:"①"~"⑤") | "CASE"(answer:"OPEN") | "BLANK"(answer:string)
//             MCQ question 형식: "질문§①선지1§②선지2§③선지3§④선지4§⑤선지5"
//             공통사실 있을 시: "사실관계§질문§①선지1§..."  / OX: "사실관계§★지문"
//  FLASHCARD: [id, front, back, category, topic, page]
//             category → "concept"|"case"|"article"|"compare"
//
//  page 필드:
//    단일 페이지 → 숫자:       123
//    페이지 범위 → 배열:       [123, 125]
//    페이지 미상 → null 또는 생략
//  예시: ["총칙_C001","법률행위의 의의","...본문...",["§105","§107"],3,"법률행위",145]
// ================================================================

const 총칙_CONCEPT = [
]
const 총칙_CASE = [
]
const 총칙_QUIZ = [
]
const 총칙_FLASHCARD = [
]

const 물권_CONCEPT = [
]
const 물권_CASE = [
]
const 물권_QUIZ = [
]
const 물권_FLASHCARD = [
]

const 채권총론_CONCEPT = [
  ["채권총론_C001", "채권의 의의", "채권은 특정인이 다른 특정인에게 특정의 행위를 청구할 수 있는 권리.\n채권은 채무자의 행위를 목적으로 하며, 청구를 하였으나 이행하지 않으면 강제적으로 실현할 수 있음.", [], 0, "채권일반서론", 3],
  ["채권총론_C002", "채무의 분류 — 급부의무·부수적 주의의무·보호의무", "① **급부의무**: ㉠ 주된 급부의무, ㉡ 종된 급부의무\n② **부수적 주의의무**: 급부를 제대로 실현하기 위해 신의칙상 요구되는 부수적 의무\n③ **보호의무**: 채무의 범주에 넣을 것인지 논의 있으나 불법행위로 해결 [통]\n\n**부수적 의무 예시**: 토지매매계약에서 분묘이장의무, 영상물 제작공급계약에서 시사회 준비의무, 전대차계약에서 전차보증금반환채무 담보 위한 근저당권설정의무 → 모두 주된 급부이행과정에서의 **부수적 의무**, 그 위반만으로 계약 해제 × [74다2151, 96다14364, 2001다20394]\n\n**보호의무 예시**: 숙박계약 고객의 안전 배려의무, 입원환자에 대한 병원의 도난방지의무, 건강보조식품 판매자의 보호의무 → 채무불이행(불완전이행)·불법행위로 손해배상 O [93다43590, 2002다63275, 2022다211089]", [], 0, "채권일반서론", 3],
  ["채권총론_C003", "채권의 기본적 효력 — 불완전채무", "채권의 기본적 효력: **청구력**, **급부보유력**, **강제력**\n\n**강제력 없는 채권(= 불완전채무)**\n① **자연채무**: 소구력 ×, 집행력 × → ex. 부제소특약, 채권자 패소확정판결\n② **책임 없는 채무**: 소구력 O, 집행력 × → ex. 부집행특약\n\n`cf.` **채무 없는 책임**: 물상보증인, 제3취득자", [], 0, "채권일반서론", 3],
  ["채권총론_C004", "특정물채권 ① — 선관주의의무(§374)", "특정물 채무자는 인도하기까지 **선관주의의무**(§374). 추상적 과실을 의미하며 위반하면 채무불이행.\n\n> '인도하기까지'의 의미 [통]: 이행기 이후는 통상 이행지체·수령지체로 책임 가중(§392) 또는 감경(§401)되므로, '이행기 이후이면서 실제 인도할 때까지' 선관주의의무를 부담하려면 이행지체도 수령지체도 아닌 경우에 해당해야\n→ ex. 유치권·동시이행항변권 행사 중", ["§374", "§392", "§401"], 0, "채권목적", 4],
  ["채권총론_C005", "특정물채권 ② — 이행기의 현상대로(§462)", "특정물 채무자는 **이행기의 현상대로** 인도하여야(§462). '이행기'는 '실제 인도할 때'를 의미 [통].\n\n변질·훼손돼도 그 상태로 인도하면 됨 → 채권자가 거절하면 수령지체\n동일성 상실되면 인도의무 소멸 → 채무불이행 문제 아님\n멸실 등이 채무자 과실(선관의무 위반)이면 채무불이행 책임은 **별개 문제**", ["§462"], 0, "채권목적", 4],
  ["채권총론_C006", "종류채권(§375) — 특정의 요건", "종류채권이 특정되려면 채무자가 **'이행에 필요한 행위를 완료'**해야 ≒ 변제제공(§460) 기준으로 판단.\n\n① **지참채무 → 현실제공**: 채권자 주소에 도달하여 채권자가 언제든지 수령할 수 있는 상태에 놓인 때 (미리 거절 시 구두제공으로 족함)\n② **추심채무 → 구두제공**: 목적물 분리하여 변제준비 완료를 통지하고 수령을 최고한 때\n\n> 정해: 구두제공은 '준·통·수'이고, 특정은 거기에 **분리**까지 요한다는 것이 일반적\n\n채권자 동의 없이 지정권 미행사 시 → 선택채권 규정(§381) 준용하여 **지정권이 채권자에게 이전** [2000다24856]", ["§375", "§460", "§381"], 0, "채권목적", 4],
  ["채권총론_C007", "종류채권 — 특정의 효과", "특정으로 **'물건의 위험'이 채권자에게 이전**:\n- 특정 **이전** 멸실 → 채무자는 **조달의무 O**\n- 특정 **이후** 멸실 → 채무자는 **채무 소멸** (단, 채무불이행책임은 별개 가능)", ["§375"], 0, "채권목적", 5],
  ["채권총론_C008", "외화채권(§378) — 대용급부권·환산시기", "**대용급부권**(§378): '지급할 때' 이행지의 환금시가로 우리나라 통화로 변제 가능.\n\n**환산시기 ('지급할 때'):**\n\n① **채무자가 대용권 행사**: 현실로 이행할 때 O [大判全合 90다2147]\n- 변제충당 → 변제충당할 당시 [99다56512]\n- 집행법원 배당 → 배당기일 당시 [2010다103642]\n\n② **채권자가 대용권 행사**: 채무자가 현실로 이행할 때에 가장 가까운 **사실심 변론종결시** O [大判全合 90다2147]\n→ 채무자만 항소·항소이유 없어도 항소심 변론종결 당시 기준으로 재환산, 불이익변경금지 위반하지 않는 한 일부 인용 [2006다72765]", ["§378"], 0, "채권목적", 5],
  ["채권총론_C009", "이자채권 — 의의·이자제한법", "**이자**: 금전 기타 대체물의 **사용대가**로서 원본액·사용기간에 비례하여 지급되는 것. 지연이자 ×, 지료 ×, 차임 ×\n\n- 민사 법정이율: 연 **5%**(§379), 상사: 연 **6%**(상법 §54)\n\n**이자제한법 최고이자율 (금전대차 약정이자):**\n- ① 2018. 2. 8. 전: 연 25%\n- ② 2018. 2. 8. ~ 2021. 7. 7.: 연 24%\n- ③ 2021. 7. 7. 이후: **연 20%** (현행)\n→ 초과 부분 약정 **무효**, 초과 지급분 **원본 충당**\n\n**중도상환수수료** → 이자제한법상 간주이자 × [大判全合2025 2023다221885]\n**위약벌** → 이자제한법 적용 × [2016다259769]\n\n**기본적 이자채권** vs **지분적 이자채권(변제기 도래)**: 후자는 독립성 있어 분리 양도 가능, 소멸시효 별도 §163①호 단기 3년 적용", ["§379", "§163"], 0, "채권목적", [5, 6]],
  ["채권총론_C010", "선택채권(§380~§386)", "**선택채권 기본 구조**\n- 규정·약정 없으면 **채무자**가 선택권(§380)\n\n**선택권의 이전(§381, §384):**\n- 선택권 행사기간 내 미행사 → 상당기간 최고 후 **상대방**에게 이전\n- 행사기간 없는 경우, 기한 도래 후 → 상당기간 최고 후 **상대방**에게 이전\n- 선택권자가 제3자인 경우 → 채권자·채무자가 최고 후 **채무자**에게 이전\n\n**선택권 행사 후 철회**: 상대방 동의 없이 철회 불가(§382 ②)\n**선택의 효력**: 소급효(§386)\n\n**불능으로 인한 특정(§385):**\n- 선택권자의 과실로 불능 → **잔존급부로 특정**\n- **선택권 없는 자**의 과실로 불능 → **선택권 존속**\n  → ex. 乙(채권자·선택권 없음)의 과실로 A 멸실 → 甲(채무자)은 여전히 A 선택 가능, 甲은 乙에게 매매대금청구 O (§538 ① 1문, 채권자 귀책사유로 불능)", ["§380", "§381", "§382", "§384", "§385", "§386", "§538"], 0, "채권목적", 7],
  ["채권총론_C011", "채무불이행의 공통요건", "두 가지 공통요건\n① **귀책사유**: 고의·과실(추상적 경과실)\n② **위법성**: 주로 위법성조각사유가 문제됨(동시이행 항변권, 유치권)\n\n⚠️ 위법성조각사유(동시이행항변권·유치권)가 있으면 채불 × 불법행위 ×", [], 1, "채무불이행", 8],
  ["채권총론_C012", "채무불이행 입증책임", "① **채권자**: '채무 내용에 좇은 이행이 아닌 사실'을 입증해야\n② **채무자**: '귀책사유 없음'을 입증해야\n\n> ㉮ ≠불법행위: 피해자(채권자)가 가해자의 **고의·과실**을 입증해야\n> [② 채무자 입증 ↔ ㉮ 불법행위 입증 — 대조]\n\n> ㉯ **금전채무불이행**은 무과실 입증해도 면책 × ∵ 무과실책임(§397 ②)\n\n⚠️ 사례에서 금전채무(≠매매대금·중도금 지연손해약정)인지 꼭 확인", ["§397"], 2, "채무불이행", 8],
  ["채권총론_C013", "임대차 목적물 화재 이행불능 — 임차인 채무불이행 [대판(전합) 2012다86895]", "**임대차 목적물이 화재로 소멸되어 임차인의 목적물반환의무가 이행불능 된 경우**\n\n**원칙**: 임차인은 귀책사유 없음을 입증하지 못하는 한 이행불능 손해배상책임\n→ 화재의 구체적 발생원인이 밝혀지지 않은 경우도 마찬가지\n→ 멸실(이행불능)뿐 아니라 **훼손(불완전이행)** 된 경우에도 마찬가지\n\n**예외**: 화재가 **임대인의 지배·관리 영역 존재 하자**로 발생 추단되면, 임차인이 그 하자를 미리 알았거나 알 수 있었다는 등 특별한 사정 없는 한 → 임차인 이행불능 손해배상책임 ×\n\n正辯: 종래 대법원은 '구조상 불가분 일체'이면 임차인이 귀책사유 없음 증명 못하는 한 임차 외 건물 부분도 채무불이행 책임 → **변경·폐기됨**\n\n`cf.` 아래 〈쟁점〉(임차 외 건물부분 손해 요건)도 동일 판결에서 판시", ["§623", "§374", "§654", "§615"], 2, "채무불이행", 8],
  ["채권총론_C014", "〈쟁점〉 임차 외 건물부분 손해와 임차인 채무불이행 — 의·상·범 [동일 판결]", "〈쟁점〉 건물 일부 임대차에서 임차건물 부분 화재로 '임차 외 건물' 부분까지 손해 발생 → 임차인에게 채무불이행책임을 묻기 위해서는 **임대인**이 아래를 모두 주장·증명해야\n\n① 화재 발생에 임차인의 계약상 **의**무 위반 있고\n② 의무 위반과 임차 외 건물 부분 손해 사이 **상**당인과관계 있으며\n③ 임차 외 건물 부분 손해가 의무 위반에 따른 통상손해 혹은 임차인이 알았거나 알 수 있는 특별손해의 **범**위에 해당\n\n[대판(전합) 2012다86895 — 위 C013과 동일 판결 내 쟁점]\n[암기키워드: **의·상·범**] [10회 기록]", [], 1, "채무불이행", 8],
  ["채권총론_C015", "임대차 목적물 훼손 시 귀책사유 입증책임 + 숙박계약 특칙 — [判例2023] 2023다244895", "**∴ 멸실(이행불능)뿐 아니라 훼손(불완전이행)된 경우에도 마찬가지**\n\n[判例2023] 위 법리(임차인 귀책사유 없는 점 증명책임)는 목적물 반환의무가 **이행불능은 아니지만 훼손되어 손해배상을 구할 때**도 마찬가지 적용\n→ §623·§374·§654·§615에 따라 인도받아 사용·수익하는 동안 **임차인이 목적물 직접 지배로 추단 O**\n\n**그러나 숙박계약에는 위 법리 적용 ×** [2023다244895]\n- 숙박계약은 '일시사용 임대차계약'으로 임대차와 유사하면서도 다른 요소 존재\n- 숙박업자는 고객 안전배려 보호의무 및 공법적 의무 부담\n- 숙박기간 중에도 **고객이 아닌 숙박업자가 객실 비롯한 숙박시설 점유·지배 O**\n→ 원인미상 화재 손해는 특별한 사정 없는 한 **숙박업자 부담** [로사정 1]", ["§623", "§374", "§654", "§615"], 2, "채무불이행", 9],
  ["채권총론_C016", "이행보조자(§391) — 의의·요건·유형", "**이행보조자**: ① 채무자의 법정대리인이 채무자를 위하여, ② 채무자가 타인을 사용하여 채무를 이행하는 경우\n→ 법정대리인·피용자의 **고의·과실 = 채무자의 고의·과실 간주**\n→ **채무자의 채무불이행 책임**을 묻기 위한 제도\n\n⚠️ 이행보조자는 **채무불이행 영역**에만 적용 — 이행보조자 자신은 불법행위 책임(§750) 가능, **부당이득 절대 ×**\n\n**요건**: 채무자의 **의사관여 있으면 충분**, 지시감독관계·종속성 불문\n→ 도급, 호의관계도 이행보조자 가능\n\n**복이행보조자**: 채무자의 묵시적 승낙·동의 있으면 복이행보조자 과실에 대해 채무자 책임 O [2011다1330]\n\n**동의 있는 전대차의 전차인**: 이행보조자로 보는 견해 v. 선임·감독 귀책사유 있는 경우만 책임진다는 견해", ["§391", "§750"], 1, "채무불이행", 9],
  ["채권총론_C017", "이행지체(§387) — 가. 요건 5가지 + 이행지체 시점", "**① 이행기 도래 ② 이행 가능 ③ 이행을 게을리 함 ④ 귀책사유 ⑤ 위법성**\n\n**이행지체의 시점(§387)**: 엄밀히는 그 '다음 날'부터 지체책임\n\n㉮ **확정기한**: 기한 도래한 때\n\n★ ⊙ **불확정기한**: 기한 도래함을 **알게 된 때** (≠소멸시효: 기한 객관적 도래한 때)\n\n★ ㉯ **기한 정함 없는 채무**: 이행청구를 받은 때 (≠소멸시효: 채권 발생한 때)\n  → ex. 부당이득반환채무, 지연손해금채무(손해배상채무)\n\n★★ ㉰ **반환시기 정함 없는 소비대차**: 상당 기간 정하여 최고 후 **상당 기간 경과한 때** (∵ §603 2항)\n\n`특수`:\n- **채권자취소소송·이혼소송(형성판결)**의 가액배상·재산분할: 판결확정일 다음날부터 민법 연 5%\n- **불법행위채무**: 불법행위일 **당일**부터 지체책임 [74다1393]", ["§387", "§603"], 2, "채무불이행", 10],
  ["채권총론_C018", "이행지체 나. 효과 + 기한이익상실(§388)", "**이행지체의 효과**\n① 강제이행\n★ ② 손해배상: **지연배상** 원칙. 단, 예외적 **전보배상(§395)**\n  → ⓐ 지체 후 상당기간 최고해도 기간 내 이행 없는 경우, ⓑ 지체 후의 이행이 채권자에게 이익 없는 때\n③ 해제(§544조) 요건: **지·최·아** (지체 + 최고 + 아직 불이행)\n④ **책임가중(§392)**: 채무자는 이행지체 중에 생긴 손해는 과실이 없어도 배상책임\n  → 이행불능책임 [통] → 단, 이행기에 이행했어도 손해 면할 수 없는 경우는 배상책임 × (단서)\n★ 正辯: 물건 채무자가 '이행지체'하다가 멸실된 경우의 문제 ↔ 물건 채권자가 '수령지체'하다가 멸실된 경우는 §538 1항의 문제\n\n**기한의 이익 상실(§388)**\n① 법정 상실사유: 담보 손상·감소·멸실·제공불이행\n② 특약: [判例] 기한이익 상실 특약이 '정지조건부'인지 '형성권적'인지 불분명한 경우 채권자에게 유리한 **형성권적 기한이익 상실특약**으로 추정 [97다12990]", ["§395", "§392", "§544", "§388"], 1, "이행지체", 12],
  ["채권총론_C019", "이행불능(4.) — 가. 개념", "**이행불능**: 채권성립 후 채무자 귀책사유로 불능하게 된 경우\n\n**후발적·사회통념상 불능** [96다14616]\n\"채무의 이행불능이라는 것은 단순히 절대적·물리적 불능이 아니라 사회생활 경험법칙이나 거래상 관념에 비추어 채권자가 채무자의 이행의 실현을 기대할 수 없는 경우\"\n正辯: 원시적 불능 vs 후발적 불능 구별, 원시적 불능에서는 객관적/주관적 불능에 따라, 후발적 불능에서는 각 귀책사유에 따라 각 어떤 법리가 전개되는지 개관할 수 있어야\n\n**이중매매와 이행불능** [65다947, 66다1565]\n★ 이중매매 후 제2매수인에게 등기 이전되면 → 제1매매에 **이행불능** O\n  → 그러나 제2매수인 **적극가담**인 경우는 예외적으로 제2매매계약 및 제2매수인 등기 무효, 제1매수인은 **채권자대위** 방법으로 제2매수인 등기 말소한 후 매매 소이등 O\n\n★ 매매목적물에 **가등기·가압류·가처분**만으로는 이행불능 × [91다8104, 99다11045, 2000다47361]\n  → 그러나 매도인이 변제자력 없거나 강제집행으로 소유권 잃은 경우는 이행불능 O\n  → 미등기전매에서 소유권이전등기청구권이 가압류·처분금지가처분된 경우+매도인 무자력이면 이행불능 O [2005다39211]\n\n★ [요사] 제3자에게 **지상권설정등기 및 저당권설정등기**를 한 경우 매도인의 소유권이전등기의무는 이행불능 O [73다1133]\n\n★★ **임대인의 소유권 상실**: 바로 이행불능은 × [93다37977]\n  → 그러나 임차인이 진실한 소유자로부터 목적물 반환청구나 차임 상당액 지급청구 받으면 이행불능 O [94다54641]\n  → 임차인은 임대차 당연종료 이유로 차임지급 거절 O\n\n★ **강박으로 소유권이전등기** 마친 후 제3자에게 이전등기 → 아직 이행불능 × → 피강박자가 등기명의인 상대로 말소등기청구소송 제기하여 패소확정된 때 이행불능 O [2005다29474] ≠ 2010다28604 전원합의체(후술)", ["§387"], 2, "이행불능", 13],
  ["채권총론_C020", "이행불능 나. 효과 + 다. 대상청구권 개요", "**나. 효과**\n① **전보배상**: 본래 급부청구권 소멸, 그에 갈음한 손해배상청구권\n  → 원채권의 변경으로서 동일성, 해제 않는 한 동시이행 항변권·담보도 존속 O\n  → 일부 이행불능: 잔존급부 청구, 불능 부분 일부 전보배상 O\n  → 그러나 불능 부분 제외한 나머지만의 이행으로는 계약 목적 달성할 수 없다면 전부 이행불능으로 보아야 → 전부 해제 혹은 전부 전보배상 O\n★ [95다5929]: 분양계약+착공 않은 채 부도→소유권이전등기 이행불능이면 대지지분권 이전도 이행불능 ∵ 토지·지상건물 법률적 운명 같이함, 집합건물에서 대지지분권 불가분 관계\n\n② **해제(§546조)**: 최고·이행제공 없이 곧바로 해제 O\n\n**다. 대상청구권**\n- 인정: 명문 규정 없으나 일반적 법원칙·계약 구속력 근거로 인정 [통판]\n  \"우리 민법에 대상청구권 규정 없으나, 해석상 부정할 이유가 없다.\" [92다4581]\n★ 대상 범위: 손해배상금, 수용보상금, 보험금청구권, 매매대금채권 포함 O\n- 요건: ① 급부의무, ② 후발적 불능, ③ 채무자가 대상 취득, ④ 불능·대상취득 사이 상당인과관계, (⑤ 반대급부 이행 가능: 교환계약)\n★★ 성질: 대상청구권 행사는 계약 '유지' 의사 → 계약 해제되거나 무효라면 × [2008다54877]\n★★ 효과·행사방법: 채권적 청구권, 행사해야 효력 발생. 채무자 취득 권리의 **양도(채권양도)** 또는 **금전지급** 구하는 것\n★★★ 행사범위: 무제한설 vs 제한설\n  → [2013다7769] 화재보험금 전부에 대해 대상청구권 O, 매매대금 한도 내로 제한 ×", ["§546", "§537"], 2, "이행불능", [13, 14]],
  ["채권총론_C021", "대상청구권 — 유형별 판례 정리", "★★★ **행사범위**: 채권자의 손해 한도로 제한될 것인지 논의\n1) 무제한설 v. 2) 제한설\n→ [2013다7769] 화재보험금 전부에 대해 대상청구권 O, 매매대금 상당액 한도로 제한 × ∴ 대법원은 **무제한설** 입장에 가까움\n\n**유형별 판례**:\n① **토지수용**: 수용보상금에 대상청구권 O [92다4581]\n  → 수용 사안에 대상청구권 행사 → §537 위험부담 법리 배제\n  → 채권자가 대상청구권 행사하면 반대급부 이행의무 존속\n  ★ 正辯: 최초 판례 = 귀책사유 없는 토지수용(위험부담), 이후 이중매매(귀책사유 있는 이행불능)에서도 대상청구권 인정\n\n⊙ **취득시효 완성 토지**: 수용 혹은 이행불능 된 경우 대상청구권 O\n  단, 불능 전에 취득시효 권리주장 혹은 등기청구 했어야 [94다25025, 94다43825]\n\n㉯ **교환계약**: 쌍방 각각 이행불능 된 경우 일방의 대상청구권 × ∵ 반대급부 이행 가능해야 [95다6601]\n\n★★ ㉰ **근저당권설정 사해행위취소**: 사해행위취소·근저당권등기말소 승소 확정 후 임의경매 경락으로 이행불능 → 대상청구권 행사로서 수익자 받은 배당금반환청구 O [2010다71431]", [], 3, "이행불능", 15],
  ["채권총론_C022", "이행거절(5.) — 개념·이행기 전후·요건·효과", "**개념**: 채무자가 채무 이행이 가능함에도 이행할 의사가 없음을 진지하고 종국적으로 위법하게 표시하여 채무자의 임의 이행을 더 이상 기대할 수 없는 상태\n\n**이행기 후의 이행거절(§544조 단서)**:\n이행지체 전제, 명문의 규정상 최고 없이 해제 O\n[92다9463]: 매수인이 이행기 도과 후 과다한 채무 이행 요구 → 매도인 자기 채무 이행제공이나 최고 없이도 계약 해제 O\n\n★★ **이행기 전의 이행거절**: 명문 규정 없어 독자적 채무불이행 인정 여부 논의\n1) 부정설: 이행지체 하부유형, §544조 단서 유추\n2) 긍정설 [통판]: 이행 가능하므로 불능과 다르고 이행기 전이므로 이행지체와 다름, **§390 일반·포괄조항** 근거로 인정\n[2014다227225]: 채무자가 이행하지 않을 의사 명백히 표시한 경우 이행기 전에도 최고 없이 해제·손해배상청구 O. 단, 이행거절이 인정되려면 **채무자의 이행 거절 표시가 위법**해야\n\n★★ [判例2021 2018다214210]: §390은 채무불이행 일반조항주의 채택. §544조에 따라 이행지체 상태에서 이행거절의사 표시하면 최고 없이 해제 O → 이행 않을 의사 명백히 표시하면 이행기 '전'이라도 최고 없이 이행거절 이유로 해제 O, 손해배상 O → **이행거절의사는 명백하고 종국적이어야**\n\n★ **쌍무계약**에서 자기 채무 이행기 도래 않은 시점에:\nⓐ 근거 없는 계약의 불성립·무효 주장, ⓑ 채권자로서의 수령거절 → 모두 자기 채무 이행거절 O\n\n★★ **효과**: ① 강제이행, ② 전보배상, ③ 해제\n★ 이행거절이 있었어도 **'철회'** 되면 이행거절 종료, 그 후는 이행지체 법리로만 해제 [88다1516]", ["§390", "§544", "§546"], 2, "이행거절", [16, 17]],
  ["채권총론_C023", "불완전이행(6.) — 개념·모습·효과·보호의무", "**개념**: 이행을 했으나 채무 내용 따르지 않아 불완전한 경우(적극적 채권침해)\n**모습**: 이행이 불완전한 경우, 불완전 이행으로 부가적·확대손해 준 경우\n**효과**: ① 완전이행청구권(추완청구권), ② 손해배상청구권, ③ 해제\n\n★★ **숙박계약과 보호의무** [93다43590]:\n숙박계약은 일시사용 위한 임대차계약, 통상의 임대차와 같이 단순히 여관의 객실·관련시설 제공·사용수익하게 할 의무에 더하여 \"신의칙상 부수적 의무로서 고객에게 안전·편안한 객실·관련시설 제공하여 고객의 안전을 배려할 **보호의무**\"를 부담 O (≠통상의 임대차: 안전배려의무 ×)\n→ 숙박업자가 이를 위반하여 고객의 생명·신체 침해하여 손해 입히면 \"불완전이행의 채무불이행책임 O\"\n正辯: 성질상 확대손해이며, 불법행위책임도 경합 가능\n\n매도인·수급인의 담보책임과 불완전이행의 경합 판례 (후술)", ["§390"], 2, "불완전이행", 17],
  ["채권총론_C024", "손해배상 — 1.구제수단 개관 + 2.손해의 개념·분류", "**1. 채무불이행에 대한 구제**\n① 강제이행: ㉮ 주는 채무 직접강제, ⊙ 대체적 작위채무(건물철거·운송) 대체집행, ㉯ 부대체적 작위채무(증권서명·감정·정정보도) 간접강제, ㉰ 의사표시할 의무 → 판결문 도달로써\n② 손해배상 ③ 해제·해지\n\n**2. 손해의 개념·분류**\n★ **개념** [차액설·통판]: \"위법행위 없었다면 존재했을 이익과 위법행위 있은 후 현재 이익의 차이\"\n正辯: 채무불이행 = '이행이익' 기준, 불법행위 = '이행이익' 개념 ×\n\n**재산적 손해**\n① 적극적 손해 (기존재산 멸실·감소)\n② 소극적 손해 (장래 얻을 이익 = 일실이익)\n③ 정신적 손해 (위자료) → 손해 3분설 [통판]\n\n[2005다213]: 재산적 손해 배상만으로 회복될 수 없는 정신적 고통 + 상대방이 알았거나 알 수 있었을 경우에 한해 위자료 인정\n\n**이행이익 vs 신뢰이익**\n㉮ **이행이익**: 채무가 이행되었으면 있었을 이익 ex. 전매차익\n⊙ **신뢰이익**: 일정한 사태에 대한 신뢰에 기해 행한 재산적 결정이 그대로 적절한 것이 되는 이익\n  - 계약 '유효'를 믿음 → 계약준비비용\n  - 계약 '체결'을 믿음 → 계약교섭 부당파기(불법행위로 구성 O)\n  - 계약 '이행'을 믿음 → 채무불이행으로 해제하며 이행이익에 갈음, 이행 믿고 지출한 비용청구 O [통판]\n  - 목적물 '하자 없음'을 믿음 → 하자담보책임 ('매수대금 - 하자 있는 상태의 시가')\n  → **신뢰이익은 이행이익을 한도로 함** [통판] ∵ §535 1항 단서\n\n[2023다223171·223188]: 이행이익과 신뢰이익 함께 청구 시 일실이익은 제반비용 공제한 순이익에 한정 ∵ 중복배상 방지\n\n**통상손해 vs 특별손해**\n㉮ 통상손해: 채무불이행 있으면 일반적으로 발생하는 손해\n⊙ 특별손해: 통상손해가 아닌 특별한 손해 ex. 전매차익\n\n**손해배상청구권**: 본래의 채권과 동일성, 소멸시효 기간 동일, 기산점은 채무불이행시부터 [통판]", ["§393", "§394", "§535"], 1, "손해배상", 18],
  ["채권총론_C025", "손해배상의 범위(§393) — 통상손해·특별손해·예견가능성", "**§393**\n1항 통상손해 → 채무자는 항상 배상\n2항 특별손해 → 채무자가 알았거나 알 수 있었어야 배상\n\n**★ 특별손해 예견가능성 기준시기**: 1) 계약체결시설 v. 2) 채무불이행시설 [통판: 채무불이행시]\n[84다카1532]: §393 2항 특별손해 배상에서 채무자 예견가능성 기준시기 = **계약체결 당시 아닌 채무 이행기까지**를 기준\n\n**판례의 통상손해 판단:**\n- 물건 인도 이행지체 손해 = 차임 상당액 통상손해 [94다44774]\n- 휴업손해 = 통상손해 [大判全合 2001다82507]\n- 이행불능 당시 시가 = 통상손해 (가격 등귀분은 특별손해) [94다61359]\n- 전매차익 = 특별손해 (매도인이 전매 사실 알았다면 배상) [67다466]\n- 제3자와의 별도 계약으로 인한 손해 = 대부분 특별손해 [판례 태도]\n\n**손해액 산정 시기** ★\n① 이행지체로 인한 전보배상(§395): **최고 후 상당기간 경과한 당시의 시가**\n② 이행불능으로 인한 전보배상: **이행불능 당시의 시가**\n③ 이행거절로 인한 전보배상: **이행거절 당시의 시가** [2005다63337]\n\n**★★★ [80다417]**: 매도인·매수인 소유권이전등기 말소의무가 원소유자 말소등기청구소송에서 확정 → 매도인의 이행불능 손해배상액 산정 = **패소확정시 기준 O, 등기말소시 ×**", ["§393", "§395"], 2, "손해배상", [18, 19, 20, 21]],
  ["채권총론_C026", "과실상계(§396·§763) — 요건·효과·외측설·적용범위·유추적용", "**요건**: ① 채권자(피해자)의 과실 ② 과실능력 있을 것(통상 7~8세) ③ 인과관계\n**효과**: 법원 직권으로 반드시 참작 [96다30113]\n\n★ **일부청구와 과실상계** [외측설·통판]:\n\"손해 전액에서 과실비율 감액 → 잔액이 청구액 초과 시 청구 전액 / 잔액이 청구액 미만 시 잔액\" [75다819]\n= 일부청구와 상계: 소구채권 전액에서 상계 → 잔·청·초·청 / 잔·청·않·잔 [83다323]\n\n★ **과실상계 먼저, 손익상계 나중** [80다3277]\n손익상계: 위법행위 없었다면 지출했을 비용을 손해배상액에서 공제 (인과관계 필요)\nex. 의료과오 사망 환자 생활비 공제 O / 부의금 ×\n\n**과실상계 적용 ×** 경우:\n- 손해배상액 예정 [72다108]\n- 해제 원상회복 [2013다34143]\n- 피해자 부주의 이용한 **고의 불법행위** [99다50538 등]\n- 표현대리 [95다49554]\n- 본래의 급부이행 [96다8468]\n- §673조 책임 [2000다37296]\n\n**무과실책임과 과실상계**: §580·§581(담보책임) = 법정 무과실책임 → §396 직접 준용 × 但, 공평 원칙상 유추적용하여 잘못 참작 상당 [94다23920, 80다923]\n\n**과실상계 유추적용**:\n- 피해자의 심인적·체질적 소인이 기여한 경우 [91다2977, 98다50586]\n\n**피해자측 과실이론** [98다31868]: \"신분상·사회생활상 일체를 이루는 관계\"에 있는 자의 과실도 피해자 과실로 인정 (호의동승 운전자 과실은 × [97다35344])\n\n**공동불법행위 과실상계** [2017다16747]: 피해자 과실비율 달라도 전원에 대해 전체적 평가 但 부진정연대채무 관계(비공동불법행위)에서는 채무자 전원에 대해 전체적 평가 ×", ["§396", "§763"], 1, "손해배상", [21, 22]],
  ["채권총론_C027", "금전채무불이행 특칙(§397) + 손해배상액 예정(§398) 개요", "**다. §397 금전채무불이행 특칙**\n제1항: 법정이율, 그러나 법령 제한 내 **약정이율 먼저**\n[2009다85342]: §397 1항 단서는 약정이율이 법정이율 이상인 경우만 적용, 법정이율보다 낮은 경우 본문으로 돌아가 법정이율로 지연손해금 산정 (무이자약정인 경우도 법정이율로 청구 가능)\n[2011다50509]: 지연손해금률 자체를 따로 약정했다면 법정이율보다 낮더라도 약정 지연손해금률 적용\n\n제2항: 채권자 손해증명 불요, 채무자 과실 없음 항변 불가 (=무과실책임)\n금전=가치 자체, 개성 없음 ∴ 특정 ×, 이행불능 ×, 점유=소유\n\n**5. §398 손해배상액 예정 — 가. 규정 및 판례**\n제1항: 채무불이행 손해배상액 예정할 수 있다.\n제2항: 부당히 과다하면 법원은 적당히 **감액**할 수 있다.\n- [99다57126] ① 채권자 과실 들어 따로 감액할 필요 × ∵ 과실상계 ×\n- [2000다35771] ② 과다 여부·감액 범위 판단 기준시기 = **사실심 변론종결 당시**\n- [99다38637] ③ 법원은 당사자 주장 없더라도 **직권 감액 O**\n- [95다33658] ④ 법원은 실제 손해액 구체적으로 심리·확정 불요, 다만 채무자는 실제 손해액이 예정액에 미치지 못함을 입증할(실제상) 필요 있음\n- [91다11490] ⑤ 법원이 감액한 부분은 **처음부터 무효**\n- [判例2023 2017다8876·2022다227619] ⑥ 부당성 = 경제적 약자에게 부당한 압박·공정성 없는 결과 초래하는 경우. 배상액 예정이 없더라도 받을 수 있던 금액보다 적은 금액으로 감액하면 ×. 사실심 전권 사항 O, 형평 원칙에 비추어 현저히 불합리하면 불허\n\n제3항: 손해배상액 예정은 이행청구·해제에 영향 없다.\n제4항: **위약금 약정은 손해배상액 예정으로 추정**한다.", ["§397", "§398"], 0, "손해배상", [23, 24]],
  ["채권총론_C028", "손해배상액 예정(§398) — 위약벌 구별 + 예정배상액 청구", "**§398 4항 위약금 → 손해배상액 예정 추정**\n위약금이 위약벌로 되려면 특별한 사정 주장·입증 필요, 위약벌의 경우 §398 2항 감액 × [92다46905]\n\n[大判全合2022 2018다248855]: 위약금이 손해배상액 예정인지 위약벌인지 = 계약서 내용·체결 경위·목적 등 구체적·개별적 판단\n→ **손해배상액 예정 추정(§398 4항)**\n→ But \"하나의 계약에 손해배상액 예정 조항 따로 있거나 실손해 배상 전제로 조항 있고 별도로 위약금 조항 있다면 위약벌로 보아야\" ∵ 이중배상\n→ 위약벌은 §398 2항 유추적용으로 감액 × (현재 판례 유지)\n→ 위약벌은 103조 위반 무효로 통제 가능\n\n**나. 예정배상액의 청구**\n채권자 = 손해 발생·금액 입증 불요 But '채무불이행 사실' 및 '배상액 예정의 존재·내용'은 입증해야\n\n① **손해발생 불요설** [통판]: [92다41719]\n② **귀책사유 필요설** [통판]: \"채무자의 귀책사유를 불문한다는 약정이 없는 한, 채무자는 귀책사유 없음 주장·입증하여 예정배상액 지급책임 면할 수 O\" [2006다9408]\n   正辯: 금전채무 불이행 손해배상액 예정이라면 금전=원래 예외적 무과실책임(§397 2항)이므로 귀책사유 불요\n③ **특별손해 포함설** [86다카2375]\n④ **과실상계 적용 부정설** [72다108]", ["§398", "§103"], 0, "손해배상", [23, 24, 25]],
  ["채권총론_C029", "채권자지체(§400) — 법적 성질·요건·효과", "**채권자지체(§400)**: 채권자가 이행 받을 수 없거나 받지 아니한 때는 이행 제공 있는 때로부터 지체책임\n\n**법적 성질** ★★\n1) 채무불이행설 [소]: 채권자 귀책사유를 요함, 효과는 손해배상·해제 O\n2) **법정책임설 [통판]**: 채권자 귀책사유는 불요, 효과는 §401~403조, §538조 1항 2문만 적용, 손해배상·해제 ×\n→ 쌍무계약이면 채권자지체는 동시에 채무불이행일 수 있어 법정책임설 타당\n→ 법정책임설 따르면 '변제제공' = '채권자지체' 효과 동일하게\n\n★★★ [判例2021 2019다293036]: §400 채권자지체 성립에 채권자 귀책사유 필요 × → 채권자지체 효과는 §401·402·403·538조 1항만 인정, 채무불이행 같은 손해배상 ×, 해제 × → 그러나 계약 당사자가 채권자의 급부수령의무나 이행협력의무 약정했거나 신의칙상 그러한 의무 인정될 특별한 사정 있다면, 의무위반에 따른 채권자 책임 O → 채권자의 수령의무·협력의무 불이행으로 계약 목적 달성 불능하면 채무자는 해제 O\n\n**요건**: ① 채권자 협력 있어야 변제결과 나오는 채무, ② 채무 내용에 좋은 이행제공, ③ 채권자 수령불능·수령거절\n\n**효과**:\n① **변제제공의 효과**: ⓐ 채무불이행 책임 면함(§461조), ⓑ 공탁 가능(§487조)\n② **채권자지체 자체의 효과**: ⓒ 주의의무 경감(§401조), ⓓ 이자 지급의무 면제(§402조), ⓔ 증가비용 부담(§403조), ⓕ 대가 위험 이전(§538조 1항 2문: 수령지체 中 쌍방 귀책없는 불능시 반대급부 청구 O)", ["§400", "§401", "§402", "§403", "§538"], 2, "채권자지체", [26, 27]],
  ["채권총론_C030", "채권자대위권(§404) — 요건 개요 + 피보전채권", "**제5절 책임재산의 보전**\n책임재산 = 일반재산 = 채권자들의 공동담보 = 모든 채권의 만족 담보 = 자력 = 잠재적 집행 대상\n\n**1. 채권자대위권 요건(§404)**:\n① 피보전채권(이행기) 존재 → **각하사유**\n② 보전의 필요성 → **각하사유**\n③ 채무자 권리 불행사 → **각하사유**\n④ 피대위권리(비일신전속성) 존재 → **기각사유**\n\n**가. 피보전채권**\n- **이행기 도래**할 것 (미도래 예외: ① 법원 허가, ② 피대위권리가 보존행위)\n- 원칙적으로 채권일 것\n  \n★★ [判例 2006다82700]: **물권적 청구권 보전을 위한 채권자대위권 행사 O**\n→ 토지 소유권에 근거하여 지상 건물의 임차인 상대로 '건물퇴거' 청구할 수 있더라도, 건물 임대인을 대위하여 임차인에게 임대차 '해지통고' 및 '건물인도' 청구 O\n∵ 퇴거청구와 해지통고·건물인도 대위청구는 요건·효과 달라 퇴거청구 가능성이 보전 필요성 부정되지 않음, 임대차계약 해지권은 행사상 일신전속권 ×\n正辯: 피보전권리가 물권적 청구권인 건물철거청구권이었음 [사례형]\n\n★★ [判例2021 2020다300893]: 피대위자인 채무자가 **실존인물 아니거나 사망한 사람**이면 대위소송은 당사자적격 없어 부적법 각하 ∵ 피보전채권 ×", ["§404"], 2, "채권자대위권", 27],
  ["채권총론_C031", "채권자대위권 나. 보전의 필요성 — 요건 + 구조 + 비금전/금전 구별", "**보전의 필요성 요건** [2013다71784]\n\"피보전채권과 피대위권리가 밀접한 관련 있고, 피보전채권의 현실적 이행의 유효·적절한 확보 위해 대위행사가 필요하면(적극적 요건), 채무자 재산관리 자유에 부당한 간섭되는 등 특별한 사정 없는 한(소극적 요건)\"\n\n**① 비금전채권**: 통상 보전의 필요성 인정, 무자력은 문제되지 않음\n\n**★ '피보전채권—피대위권리' 구조**:\n㉮ 소이등—소이등 (ex. 순차매도, 시효완성자로부터 매수인)\n★ ⊙ 소이등—말소 (ex. 반사회적 이중매매, 중간생략등기형 명의신탁, 불법등기)\n㉯ 인도—인도 (ex. 임차인·미등기매수인·취시완성자가 불법점유자 상대 청구)\n\n★ [2010다43597] 공동매수인 1인이 자기 매수지분 범위 내에서만 대위 O, 자기 지분 초과 부분은 보전의 필요성 × (일부각하)\n★★ [2013다25217] 취득시효 완성자의 공동상속인 1인이 소유자에 대한 소유권이전등기청구권을 피보전채권으로 무효등기 명의자를 상대로 소유자의 말소등기청구권을 대위행사할 경우, 자신의 지분 범위 내에서만 대위 O, 자기 지분 초과 부분 보전 필요성 × (일부각하). 단 법원 석명의무 있음\n\n**② 금전채권**: 채무자 무자력 요건[통판]\n★★ [75다1086] 피보전채권이 금전채권이라면 변론종결 당시 채무자 무자력 사실을 채권자가 주장·입증해야\n\n**금전채권임에도 예외적 무자력 불요** (밀·현·간 O):\n★★ ⊙ 임대차보증금반환채권 양수인 [88다카4253]: 피보전채권과 피대위권리가 동시이행관계이므로 밀·현·간 O → 임대인 자력 무관\nⓓ 수임인의 대변제청구권 [2001다52506]: 통상의 금전채권과 달라 무자력 불요\n\n★ [大判全合2022 2019다229202] 보험자가 피보험자를 대위하여 요양기관에 부당이득반환채권 행사 시 채무자 자력 있다면 보전의 필요성 × (밀접관련성도 ×)\n\n★ [大判全合2020 2018다879] 금전채권 보전 위한 부동산 공유물분할청구권 대위행사 = 보전 필요성 × (극히 예외적으로만 인정)", ["§404"], 2, "채권자대위권", [28, 29]],
  ["채권총론_C032", "채권자대위권 다. 채무자의 권리 불행사 + 라. 피대위권리", "**다. 채무자의 권리 불행사**\n★ [2018다210539] 비법인사단이 총회결의 없이 제기한 소 = 소제기 의사결정 없음 → 각하 확정 시 채무자 스스로 권리 행사 × → 채권자의 대위소송은 적법 O\n\n채무자의 동의 불필요, 채무자가 반대해도 대위권 행사 O\n\n**라. 피대위권리** — 행사상 일신전속권이 아닐 것\n가족법상 권리 ×: 친생부인권·이혼청구권·부양청구권·상속의 승인·포기\n\n★ [判例2022 2022스613] 이혼 재산분할청구권은 채권자대위 ×, 파산재단 × ∵ 행사상 일신전속성 + 협의·심판으로 구체적 내용 형성 전에는 구체적 권리 아니어서 책임재산 ×\n\n[2009다93992] 유류분반환청구권은 확정적 권리행사 의사 인정 안 된 한 채권자대위 ×\n\n위자료청구권: 귀속상 일신전속권 아님 → 상속 O [69다268]\n그러나 행사상 일신전속권이므로 대위 × → 합의·판결로 내용 구체적 확정되면 대위 O [통]\n\n채권적 청구권에 한하지 않음:\n- 형성권(상계권, 해제·해지권, 환매권, 공유물분할청구권) O [2006다82700]\n- 물권적 청구권 O\n- 채권자대위권, 채권자취소권 O\n- 소멸시효 주장 대위 O [2011다109500]\n- 소송법상 권리 O → 단 채무자·제3채무자 사이 소송계속 이후의 소송상 행위 ×\n\n[2022다230165] 공공임대주택에서 임차인의 중도 해지권 = 행사상 일신전속권 → 채권자 대위 ×", ["§404"], 1, "채권자대위권", [30, 31]],
  ["채권총론_C033", "채권자대위권 2. 행사 — 가. 행사방법 (직접청구 원칙·예외) [判例2024]", "**채권자는 자기 이름으로 채무자의 권리를 행사**\n\n★★★ [判例2024] 채권자대위권 행사방법:\n- 원칙: 제3채무자에 대해 **채무자에게** 일정한 급부행위를 하라고 청구\n- 예외(직접청구 O): 급부수령 필요한 **금전지급·물건인도·등기말소** 의 경우 채권자에게도 급부 수령권한 O, 채권자에게 행한 급부 효과가 채무자에게 귀속 O\n- ⚠️ 예외(직접청구 ×): 채무자가 제3채무자에게 **채권양도 구할 권리**를 채권자가 대위행사할 경우 = 직접청구 예외 ×, 제3채무자에 대해 '채무자에게' 채권양도절차 이행하도록 청구해야", ["§404"], 3, "채권자대위권", 31]

  ["채권총론_C034","손해의 개념·분류 — 차액설·3분설","**손해의 개념** [통판, **차액설**] : \"위법행위 없었다면 존재했을 이익과 위법행위 있은 후 현재 이익의 차이\"\n\n> **正辯** : 채무불이행·불법행위 공히 차액설을 취하지만, 채무불이행은 이행해야 할 채무를 이행하지 않았으니 '이행이익' 개념이 생겼고, 불법행위는 단순한 위법행위로 발생한 손해이므로 '이행이익' 개념 ✗\n\n**발생원인** : 법률행위(계약), 법률의 규정(채무불이행, 불법행위 등)\n\n**재산적 손해 3분설** [통판]\n- ① **적극적 손해** = 기존재산 멸실·감소\n- ② **소극적 손해** = 장래 얻을 이익, 일실이익\n- ③ **정신적 손해** = 위자료",["§390","§750","§751"],1,"손해배상"],
  ["채권총론_C035","이행이익 vs 신뢰이익","**이행이익** : 채무가 이행되었으면 있었을 이익 *ex. 전매차익*\n\n**신뢰이익** : 일정한 사태에 대한 신뢰에 기하여 행한 재산적 결정이 그대로 적절한 것이 되는 이익\n- ⓐ 계약 '유효'를 믿음 → 계약준비비용\n- ⓑ 계약 '체결'을 믿음 → 계약교섭 부당파기(→ 불법행위 구성)\n- ⓒ 계약 '이행'을 믿음 → 이행이익에 갈음하여 이행믿고 지출한 비용청구 O [통판]\n- ⓓ 목적물 '하자 없음'을 믿음 → 하자담보책임, '매수대금 - 하자 있는 상태의 시가'\n\n→ **신뢰이익은 이행이익을 한도로 함** [통판] ∵ §535조 1항 단서",["§535"],0,"손해배상"],
  ["채권총론_C036","통상손해·특별손해·소멸시효","**통상손해** : 채무불이행 있으면 일반적으로 발생하는 손해\n**특별손해** : 통상손해가 아닌 특별한 손해 *ex. 전매차익*\n\n**손해배상청구권 소멸시효** [통판]\n- 본래의 채권과 동일성(확장 또는 변경) 있음\n- 본래의 채권과 소멸시효 기간 동일\n- 기산점은 **채무불이행시부터** 진행",["§393","§166"],0,"손해배상"],
  ["채권총론_C037","§393 손해배상의 범위 — 통상손해·특별손해·예견가능성","**393조 구조** : 1항 통상손해 / 2항 특별손해는 채무자 알았거나 알 수 있어야 배상\n\n**특별손해 예견가능성 기준시기** ★\n- 학설 : 계약체결시설 vs **채무불이행시설**\n- [통판] → **채무불이행시설** (채무 이행기까지를 기준으로 판단)\n\n> **判例** [84다카1532] : 기준 시기는 계약체결당시가 아니라 채무 이행기까지를 기준으로 판단해야",["§393"],1,"손해배상"],
  ["채권총론_C038","손해배상액 산정 시기 — 이행지체·이행불능·이행거절","- **이행지체** → 지연배상\n- **이행불능·이행거절** → 전보배상\n\n**전보배상액 산정 시기 3유형** [2005다63337] ★\n① **이행지체** 인한 전보배상(§395) : 본래 의무이행 최고했던 **상당 기간 경과한 당시의 시가**\n② **이행불능** 인한 전보배상 : **이행불능 당시의 시가**\n③ **이행거절** 인한 전보배상 : **이행거절 당시의 시가**",["§393","§395"],1,"손해배상"],
  ["채권총론_C039","과실상계(§396) — 요건·효과·일부청구 외측설","**요건**\n① 채권자(피해자)의 과실 존재\n② 과실능력 있을 것 (통상 7~8세 정도)\n③ 그 과실이 손해 발생·확대에 인과관계 있을 것\n\n**효과** : 법원은 **직권**으로 판단하여 반드시 참작하여야 [96다30113]\n\n**일부청구와 과실상계 — 외측설** [75다819] ★ [통판]\n\"손해 전액에서 과실비율 감액 → 잔액이 청구액 초과 시 **청구 전액** / 잔액이 청구액 미달 시 **잔액**\"\n*v.* 안분설",["§396","§763"],1,"손해배상"],
  ["채권총론_C040","과실상계 배제 사유 / 과실상계·손익상계 순서","**과실상계 배제** [判例]\n- 손해배상액 **예정** [72다108]\n- 해제 **원상회복** [2013다34143]\n- 피해자 **부주의 이용한 고의 불법행위** (사기·횡령·배임 등 영득·위조행위) [99다50538, 2007다36445, 2012다1146]\n- **표현대리** [95다49554]\n- **본래의 급부이행** [96다8468]\n- **673조 책임** [2000다37296]\n\n**과실상계 → 손익상계 순서** [80다3277] ★ : 과실상계 **먼저** → 손익상계 **나중**\n- 손익상계 : 위법행위 없었다면 채권자가 지출했을 비용을 손해배상액에서 공제 (인과관계 필요)\n  *ex.* 의료과오 사망 환자의 생활비 공제 O / 유족이 받은 부의금 X",["§396"],0,"손해배상"],
  ["채권총론_C041","과실상계 유추적용·피해자측 과실이론","**유추적용 O**\n① 피해자의 **심인적·체질적 소인**이 손해 발생·확대에 기여 → 공평의 원칙상 과실상계 유추적용 [91다2977, 98다50586]\n② 통상적 의학·법적 조치 취하지 않은 잘못\n> **正辯** : 판결문 실무에서는 '**책임제한**'이라는 용어 사용\n\n**피해자측 과실이론** [98다31868]\n- \"신분상·사회생활상 일체를 이루는 관계\"에 있는 자의 과실도 피해자 과실로 인정\n- 다방 종업원 차 배달: **부정** [98다23232] — 사용자(다방주인) 운전, 피용자 피해 구조였기 때문\n- 호의동승 차량 운전자 과실: 동승차량 **운행자** 상대 청구 시 피해자측 과실로 참작 **X** [97다35344]",["§396","§763"],0,"손해배상"],

  ["채권총론_C042","§397 금전채무불이행 특칙","**제1항** : 법정이율, 그러나 법령 제한 내 약정이율 먼저\n- [判例] 397조 1항 단서는 약정이율이 법정이율 이상인 경우만 적용 → 법정이율보다 낮은 경우는 본문으로 돌아가 법정이율로 지연손해금 산정 ∴ 무이자약정인 경우도 이행지체 지연손해금은 법정이율로 청구 가능 [2009다85342]\n- [判例] 지연손해금률 자체를 따로 약정했다면 법정이율보다 낮더라도 약정 지연손해금률 그대로 적용 [2011다50509]\n\n**제2항** : 채권자 손해증명 불요, 채무자 과실 없음 항변 불가(= **무과실책임**)\n\n**금전의 특성** : 금전 = 가치 자체, 개성 없음 ∴ 특정 **X**, 이행불능 **X**, 점유 = 소유",["§397"],0,"손해배상"],
  ["채권총론_C043","§398 손해배상액의 예정 — 구조·감액 원칙","**제1항** : 채무불이행 손해배상액 예정할 수 있다\n**제2항** : 부당히 과다하면 법원은 적당히 감액할 수 있다\n- 채권자 과실 들어 따로 감액 불필요 ∵ 과실상계 X [99다57126]\n- 감액 판단 기준시기 : 사실심 변론종결 당시 [2000다35771]\n- 법원은 당사자 주장 없더라도 **직권 감액 O** [99다38637]\n- 실제 손해액 심리·확정 불필요, 채무자는 실제 손해액이 예정액에 미치지 못함을 입증할 (실제상) 필요 있음 [95다33658]\n- 법원이 감액한 부분은 **처음부터 무효** [91다11490]\n\n**제3항** : 손해배상액 예정은 이행청구·해제에 영향 없다\n**제4항** : 위약금 약정은 손해배상액 예정으로 **추정**한다",["§398"],0,"손해배상"],
  ["채권총론_C044","§398 손해배상액의 예정 — 위약금·위약벌 구별 [大判全合2022]","**위약벌** : 실손해 배상과는 별도로 받는 제재금 → 되려면 특별한 사정 주장·입증해야\n- 위약벌의 경우 398조 2항 감액 **X** → 다만 과도하면 103조 위반 무효 여지 O [92다46905]\n\n**[大判全合2022 2018다248855]** 위약금 약정이 손해배상액 예정인지 위약벌인지 판단:\n→ 계약서 내용·체결 경위·목적 등 종합하여 구체적·개별적 판단\n→ **손배예정 추정**(398조 4항)이 원칙\n→ 단, \'하나의 계약에 손해배상액 예정 조항 따로 있거나 실손해 배상 전제 조항 있고 별도로 위약금 조항 있다면 위약벌로 보아야\' ∵ 손배예정으로 해석하면 이중배상\n→ 위약벌은 398조 2항 유추적용 감액 **X** (현재 판례 유지)\n\n**위약벌과 손배예정 겸유** 인정 O [2017다275270]",["§398","§103"],0,"손해배상"],
  ["채권총론_C045","예정배상액의 청구 — 요건·특성","**청구 요건** : 손해 발생 및 금액 입증 불필요, 다만 '채무불이행' 사실 및 '배상액 예정의 존재·내용'은 입증해야\n\n**4가지 특성** [통판]\n① **손해발생 불요설** [통판]\n② **귀책사유 필요설** [통판]\n③ **특별손해 포함설** [86다카2375]\n④ **과실상계 적용 부정설** [72다108]\n\n> **正辯** : 손해배상액 예정 적용하려면 모든 '손해배상'이 원칙적으로 과실책임인 점에 비추어 귀책사유 필요 → 단, 금전채무 불이행(§397 2항)은 금전은 원래 예외적 무과실책임이므로 그 손배 예정도 귀책사유 불요",["§398"],0,"손해배상"],
  ["채권총론_C046","§398 손해배상액 예정 — 적용 범위·해제 효과","**해제·해지와 예정** [判例2022]: 채권자가 채무불이행 이유로 계약 해제·해지해도 원칙적으로 손해배상액 예정은 실효 **X**, 전보배상도 예정액으로 결정 ∵ §398 1·3항, §551조 문언·내용, 계약당사자 일반적 의사 → 다만 계약 유지를 전제로 정한 약정이라는 등 특별한 사정이 있다면 실효 O [2019다292736]\n\n**적용 범위 제한**\n- 일방 위약금약정 → 상대방 귀책 해제에는 적용 X [2007다40765]\n- 타인 권리매매 담보책임까지 예상한 것 X [76다1699]\n- 계약 관련 불법행위상 손해까지 예정한 것 X [98다48033]\n- 계약금은 §398 손배예정 + §565 해약금 **겸유** [91다2151]",["§398","§551","§565"],0,"손해배상"],
  ["채권총론_C047","채권자지체(§400) — 법적 성질·요건","**§400 채권자지체** : 채권자가 이행 받을 수 없거나 받지 아니한 때는 이행 제공 있는 때로부터 지체책임\n\n**법적 성질 ★★** [通判 = 법정책임설]\n- 채무불이행설 [소]: 채권자 귀책사유 요함, 효과 손해배상·해제 O\n- **법정책임설** [통판]: 채권자 귀책사유 **불요**, 효과는 §401~403조, §538조 1항 2문만 적용, 손해배상·해제 **X** ∵ 채권자는 권리자\n→ 쌍무계약이면 채권자지체는 동시에 채무불이행일 수 있어 법정책임설 타당\n→ 법정책임설 따르면 '변제제공' = '채권자지체' 효과 동일\n\n**요건**\n① 채권자 협력 있어야 변제결과 나오는 채무일 것\n② 채무 내용에 좋은 이행제공 있을 것\n③ 채권자 **수령불능·수령거절**",["§400","§401","§402","§403"],2,"채권자지체"],
  ["채권총론_C048","채권자지체 효과 — 변제제공 효과 + 채권자지체 자체 효과","**변제제공의 효과 (§461)**\nⓐ 채무불이행 책임 면함 ('영구적 불수령'의 경우 구두제공조차 불필요)\nⓑ 공탁 가능 (§487조)\n\n**채권자지체 자체의 효과**\nⓒ 주의의무 **경감** (§401조, 경과실 불능책임 면책)\nⓓ 이자 지급의무 **면제** (§402조)\nⓔ 증가비용 채권자 **부담** (§403조)\nⓕ 대가 **위험 이전** (§538조 1항 2문, 수령지체 中 쌍방 귀책없는 불능시 반대급부 청구 O)\n\n> [判例] 채권자 '영구적 불수령'의 경우 구두제공 불필요 → 그러나 §538조 1항 2문에서 반대급부 청구하는 측면에서는 영구적 불수령이어도 현실제공이나 구두제공 있었어야 [2001다79013]",["§400","§401","§402","§403","§461","§487","§538"],0,"채권자지체"],
  ["채권총론_C049","책임재산의 보전 / 채권자대위권 요건(§404)","**책임재산** = 일반재산 = 채권자들의 공동담보 = 모든 채권의 만족을 담보하는 수단 = 자력 = 잠재적 집행의 대상 재산\n\n**채권자대위권 요건 (§404)**\n① **피보전채권(이행기) 존재** → 각하사유\n② **보전의 필요성** → 각하사유\n③ **채무자 권리 불행사** → 각하사유\n④ **피대위권리(비일신전속성) 존재** → 기각사유\n\n> **正辯** : 피대위권리의 문제라 하더라도 가령 등기말소청구를 등기명의자 아닌 자에게 청구하는 대위소송이라면 대위소송 각하가 결론임을 주의",["§404"],0,"채권자대위"],
  ["채권총론_C050","채권자대위권 — 피보전채권 요건","**이행기 도래할 것** (미도래 예외적 허용: ① 법원 허가, ② 피대위권리가 보존행위)\n\n**원칙적으로 채권일 것** → 그러나 **물권적 청구권 보전을 위한 채권자대위권 행사 O** [通判 ★★]\n→ 토지 소유권에 근거하여 지상 건물의 임차인 상대로 '건물퇴거' 청구할 수 있더라도, 건물 임대인을 **대위**하여 임차인에게 임대차 '해지통고' 및 '건물인도' 청구 O ∵ 퇴거청구와 대위청구는 요건·효과 달라 퇴거청구 가능성이 보전 필요성 부정되지 않음, 임대차계약 해지권은 행사상 일신전속권 X [2006다82700]\n\n**피보전채권의 이행기 미도래 시 보전 필요성 불요** (보존행위에는 이행기 미도래도 허용)\n\n**피대위자인 채무자가 실존인물 아니거나 사망한 사람이면** 대위소송은 당사자적격 없어 부적법 각하 ∵ 피보전채권 X [2020다300893 ★★]",["§404"],2,"채권자대위"],
]

  ["채권총론_P001", "대판 74다2151; 96다14364; 2001다20394", "부수적 의무 위반과 계약 해제 가부", "토지매매계약에서 분묘이장의무, 영상물 제작공급계약에서 시사회 준비의무, 전대차계약에서 전차보증금반환채무 담보 위한 근저당권설정의무는 모두 주된 급부이행과정에서의 부수적 의무이므로, 그 위반을 이유로 계약 해제 ×", "부수적 의무는 주된 급부의무가 아니어서 그 위반만으로는 계약 해제 사유가 되지 않는다는 원칙을 확립한 판례군", [], 0, "채권일반서론", 3, "미분류"],
  ["채권총론_P002", "대판 93다43590; 2002다63275; 2022다211089", "신의칙상 보호의무·부수적 주의의무의 인정 범위", "숙박계약 고객의 안전 배려의무, 입원환자에 대한 병원의 도난방지의무, 건강보조식품 판매자의 위험 초래 조언·잘못된 정보로 비합리적 판단 이르지 않도록 고객을 보호할 주의의무 → 채무불이행(불완전이행) 또는 불법행위로 손해배상 O", "신의칙상 인정되는 보호의무를 채무불이행·불법행위로 구성하여 손해배상을 인정한 판례군. 2022다211089는 건강보조식품 판매자의 정보제공 의무까지 확장", [], 0, "채권일반서론", 3, "미분류"],
  ["채권총론_P003", "대판 2014다37040", "종류채무의 이행불능 성부 — 주식반환의무", "주식반환의무는 종류채무이므로, 보유하던 주식이 제3자에게 매도되어 보유하고 있지 않다는 사정만으로 주식반환의무가 이행불능이 되지는 않는다", "종류채무는 특정 전에는 원칙적으로 이행불능이 인정되지 않는다는 원칙 확인. 주식 등 종류물에 관한 반환의무 사안에서 자주 인용", ["§375"], 0, "채권목적", 4, "미분류"],
  ["채권총론_P004", "대판 2000다24856", "종류채권 특정 — 채무자 지정권 미행사 시 지정권 이전", "합의가 없고 채무자가 지정권을 행사하지 않을 경우, 선택채권에 관한 §381을 준용하여 지정권이 채권자에게 이전된다", "종류채권 특정에서 채무자가 지정권을 행사하지 않는 경우의 처리 방법을 선택채권 규정의 유추적용으로 해결한 판례", ["§375", "§381"], 0, "채권목적", 4, "미분류"],
  ["채권총론_P005", "대판(전합) 90다2147", "외화채권 환산시기 — 채무자·채권자 대용권 행사", "① 채무자가 대용급부권을 행사하는 경우: 환산시기는 현실로 이행할 때\n② 채권자가 대용권을 행사하는 경우: 채무자가 현실로 이행할 때에 가장 가까운 사실심 변론종결시", "외화채권 환산시기에 관한 핵심 전원합의체 판결. 채무자 대용권 행사 시와 채권자 대용권 행사 시를 나누어 판시하며, 이후 99다56512·2006다72765 등 많은 관련 판례의 기초", ["§378"], 0, "채권목적", 5, "미분류"],
  ["채권총론_P006", "대판 99다56512", "외화채권 환산시기 — 변제충당", "변제충당할 경우의 외화채권 환산시기는 변제충당할 당시를 기준으로 한다", "90다2147 전합 판결의 구체적 적용 사례", ["§378"], 0, "채권목적", 5, "미분류"],
  ["채권총론_P007", "대판 2010다103642", "외화채권 환산시기 — 집행법원의 배당", "집행법원에서 배당하는 경우의 외화채권 환산시기는 배당기일 당시를 기준으로 한다", "90다2147 전합 판결의 구체적 적용 사례 — 집행 단계에서의 환산시기", ["§378"], 0, "채권목적", 5, "미분류"],
  ["채권총론_P008", "대판 2006다72765", "외화채권 — 채무자만 항소 시 불이익변경금지와 환산", "채무자만 항소하였고 항소이유가 없더라도, 법원은 항소심 변론종결 당시 기준으로 다시 환산하여 불이익변경금지에 위반하지 않는 한 채무자의 항소를 일부 인용해야 한다", "채무자 단독 항소 시 외화채권 재환산과 불이익변경금지 원칙의 조화를 다룬 판례", ["§378"], 0, "채권목적", 5, "미분류"],
  ["채권총론_P009", "대판 2020다300473", "이자제한법 — 약정 지연손해에 대한 최고이자율 적용", "약정지연손해(약정 지연이자)에 대해서도 이자제한법 최고이자율이 적용된다", "이자제한법의 적용 범위를 약정지연이자까지 확장한 판례. 기존 63다1212 판결과의 관계를 정리", [], 0, "채권목적", [5, 6], "미분류"],
  ["채권총론_P010", "대판(전합) 2023다221885 (大判全合2025)", "중도상환수수료 — 이자제한법상 간주이자 해당 여부", "중도상환수수료는 이자제한법상 간주이자에 해당하지 않는다(×). 중도상환수수료는 중도상환 시 손해배상액 예정이고 본래 의미의 금전대차 대가가 아니기 때문이다. 이자제한법 적용 ×", "2025년 전원합의체 판결. 중도상환수수료의 법적 성질을 손해배상액 예정으로 파악하여 이자제한법 간주이자 해당을 부정. 실무상 금융기관의 중도상환수수료 규제 논의와 직결", [], 0, "채권목적", [5, 6], "미분류"],
  ["채권총론_P011", "대판 2016다259769", "이자제한법 — '위약벌'에 대한 적용 여부", "이자제한법상 최고이자율은 금전대차 계약상 '이자'에만 적용되고, '위약벌'에는 적용되지 않는다", "이자와 위약벌을 구분하여 이자제한법 적용 여부를 달리 판단한 판례. 금전대차계약에서 위약벌 약정의 유효성 판단 기준", [], 0, "채권목적", [5, 6], "미분류"],
  ["채권총론_P012", "대판(전합) 2012다86895", "임대차 목적물 화재 이행불능 — 임차인 귀책사유 입증책임 + 임차 외 건물부분 손해요건", "① 임대차 목적물이 화재로 소멸되어 임차인의 목적물반환의무가 이행불능 된 경우, 임차인은 귀책사유 없음을 입증하지 못하는 한 이행불능 손해배상책임(화재의 구체적 발생원인이 밝혀지지 않은 경우도 마찬가지). 다만 화재가 임대인의 지배·관리 영역 존재 하자로 발생 추단되면 임차인 책임 부정 가능.\n② 임차 외 건물부분 손해에 관해 임차인에게 채무불이행책임을 묻기 위해서는, ㉠ 화재 발생에 임차인의 계약상 의무 위반, ㉡ 의무 위반과 손해 사이 상당인과관계, ㉢ 통상손해 또는 특별손해 범위에 해당하는 사실을 모두 임대인이 주장·증명해야", "종래 '구조상 불가분 일체' 법리(임차인이 귀책사유 없음 증명 못하면 임차 외 건물 부분도 책임) 변경·폐기. 임차 외 건물부분 손해에는 의·상·범 모두 임대인 입증 필요. [10회 기록 / 사례 대비]", ["§623", "§374", "§654", "§615"], 2, "채무불이행", 8, "사례"],
  ["채권총론_P013", "대판 2023다244895 [判例2023]", "임대차 목적물 훼손 시 귀책사유 입증책임 + 숙박계약 특칙", "① 위 법리(임차인 귀책사유 없는 점 증명책임)는 목적물 반환의무가 이행불능은 아니지만 훼손되어 손해배상을 구할 때도 마찬가지로 적용됨. ② 그러나 숙박계약에는 위 법리 적용 ×. 숙박계약 고객이 객실 사용수익하던 중 원인미상 화재로 발생한 손해는 특별한 사정 없는 한 숙박업자 부담. ∵ 숙박계약은 임대차와 유사하면서도 숙박업자가 숙박기간 중에도 객실 등 숙박시설을 점유·지배하는 특수성이 있음", "멸실=이행불능, 훼손=불완전이행에도 귀책 입증책임 동일 확인. 임대차 화재 법리의 숙박계약 부적용 — 숙박업자 점유·지배 특수성 강조. [로사정 1 / 객+사례 대비]", ["§623", "§374", "§654", "§615"], 2, "채무불이행", 9, "객+사례"],
  ["채권총론_P014", "대판 2001다44338", "이행보조자 — 도급관계에서의 적용", "§391의 피용자는 채무자의 의사관여 있으면 충분하고 지시감독관계·종속성은 불문. 임대인이 임차인과의 약정 이행 위해 제3자에게 도급주어 시설물 설치 중 수급인 과실로 화재 발생하면 임대인이 임차인에게 채무불이행책임 O", "§391 '피용자' 개념의 광범위한 해석 — 도급관계도 이행보조자 해당 확인", ["§391"], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P015", "대판 2017다275447", "이행보조자 — 호의관계에서의 적용", "제3자가 단순히 호의로 행위한 경우에도 채무자의 용인 아래 이뤄졌으면 이행보조자 O", "종속관계 없어도 이행보조자 인정 — 호의관계도 포함. §391 피용자 개념 최대한 확장", ["§391"], 0, "채무불이행", 9, "미분류"],
  ["채권총론_P016", "대판 94다22446", "이행보조자의 책임과 채무자의 채무불이행책임 — 부진정연대채무", "임대인의 관리인이 임차인의 임차점포 출입을 봉쇄하여 사용·수익 못하게 한 경우, 임대인은 §391에 의한 채무불이행책임, 이행보조자(관리인)는 §750에 의한 불법행위책임. 양자의 책임은 부진정연대채무관계", "동일 목적 채무자 수인 → 반드시 수인 채권관계 검토 (연대채무관계 발견 + 소멸시효·부담부분 논의). [객+사례 대비]", ["§391", "§750"], 1, "채무불이행", 9, "객+사례"],
  ["채권총론_P017", "대판 2011다1330", "복이행보조자 — 채무자의 묵시적 동의와 책임", "이행보조자가 채무 이행 위해 제3자를 '복이행보조자'로서 사용하는 경우, 채무자가 묵시적 승낙·동의했다면 §391에 의해 복이행보조자의 고의·과실에 관하여 채무자가 책임 부담 O", "복이행보조자 제도의 근거 — 채무자의 묵시적 승낙으로 족함", ["§391"], 1, "채무불이행", 9, "미분류"],
  ["채권총론_P018", "대판 2022다258248", "상행위 지연손해금 이행청구 → 상사이율(연 6%) 적용", "상행위로 인한 원본채권 및 그 지연손해금 지급 명하는 이행판결 확정된 경우, 채권자가 그 '지연손해금'을 이행청구 하면 채무자는 상법 54조 상사법정이율 연 6%의 지연손해금 O. ∵ 원본채권이 상행위로 인한 채권이면 지연손해도 상행위로 인한 채권 O, 판결로 그러한 실체적 내용 바뀌지 않음, 채권자의 확정된 지연손해금 이행청구로 지체책임 발생", "이행판결 확정된 지연손해금에 대한 재청구 시에도 상사이율이 적용됨을 확인", ["§387"], 1, "채무불이행", 10, "미분류"],
  ["채권총론_P019", "대판 80다1037", "동시이행관계에서 이행기 경과 후 '기한 없는 채무'로의 전환", "매매계약 목적물상 담보권설정등기 말소할 의무와 잔대금 지급의무는 특별한 사정 없는 한 동시이행관계 → 쌍방이 이행기에 이행하지 않으면 그 이후 쌍방 채무는 기한의 정함 없는 동시이행 관계. 따라서 확정기한부 채권도 쌍방 이행기 경과하면 모두 기한 정함 없는 채무로 되어, 일방이 자기 채무 이행제공 하면서 이행 최고해야 상대방이 그 다음날부터 지체책임", "동시이행관계에서의 지체책임 특수성 — 이행기 경과 후에도 최고 + 이행제공 필요", ["§387", "§536"], 1, "채무불이행", 10, "미분류"],
  ["채권총론_P020", "대판 74다1393", "불법행위채무의 이행지체 기산점 — 불법행위일 당일", "불법행위 손해배상채무는 불법행위일 '당일'부터 지체책임", "불법행위채무는 기한 없는 채무이나, 소멸시효 기산점과 달리 이행지체는 불법행위일 당일부터 (※ 판결확정 불요)", ["§387", "§750"], 1, "채무불이행", 10, "미분류"],
  ["채권총론_P021", "대판 2015다239508", "차임증액청구의 이행기 — 청구 도달시 (법원결정시 ×)", "628조 차임증액청구에 협의 불성립하여 법원이 차임 결정한 경우, 증액된 차임은 증액청구 도달시가 이행기 (법원결정시 ×)", "임대차 차임증액의 이행기 기준 — 사법상 청구 시점(도달시) vs 법원 결정시 구분", ["§387", "§628"], 1, "채무불이행", 10, "미분류"],

  ["채권총론_Q019", "OX", "★★ 추심명령이 제3채무자에게 송달된 때부터 제3채무자는 압류채권자에 대해 지체책임을 진다.", false, "▸ [2010다47117] 추심명령 송달 ≠ 지체책임 발생. 제3채무자는 압류채권자로부터 추심금 청구를 받은 다음날부터 지체책임. ∵ 추심명령은 추심 권능 수여에 그칠 뿐 기한을 정하는 것 ×.", "채무불이행", 10],

  ["채권총론_Q038", "CASE", "甲은 乙에게 자신의 토지를 매도했다. 乙은 그 토지 위에 건물을 신축하겠다는 사실을 甲에게 알렸고, 甲도 이를 인지하였다. 그런데 甲이 제3자 丙에게도 동일한 토지를 이중매도하여 소유권이전등기를 해줌으로써 乙에 대한 소유권이전등기의무가 이행불능이 되었다. 乙이 청구할 수 있는 손해배상 범위는?§[사례 대비 / 92다2028·94다61359]", "OPEN", "▸ 【통상손해】이행불능 당시 토지 시가 상당액 [94다61359]\n\n【특별손해】건물철거로 인한 손해 [92다2028]\n→ 甲은 乙의 건물신축 사실을 알았으므로, 건물철거 손해에 대한 예견가능성 O\n→ §393 2항 특별손해 요건 충족 → 甲이 배상 O\n\n⚠️ 특별손해 예견가능성 기준시기 = 채무 이행기까지 [84다카1532]", "손해배상", 20],

  ["채권총론_Q040", "OX", "★★★ 채권자지체가 성립하면 채무자는 그 불이행을 이유로 계약을 해제할 수 없다.", false, "▸ [判例2021 2019다293036] 원칙은 해제 × (법정책임설). 그러나 계약 당사자가 채권자의 급부수령의무나 이행협력의무를 약정했거나 신의칙상 그러한 의무 인정될 특별한 사정이 있다면, 채권자의 의무 불이행으로 계약 목적 달성 불능 시 채무자는 해제 O [객+사례]", "채권자지체", 26],
  ["채권총론_Q041", "MCQ", "★★ 위약금에 관한 다음 설명 중 옳지 않은 것은?§[객 대비]§①§위약금 약정은 손해배상액 예정으로 추정한다.§②위약벌로 되려면 특별한 사정을 주장·입증해야 한다.§③위약벌에도 §398 2항을 유추적용하여 법원이 감액할 수 있다.§④위약벌이 지나치게 과중하면 §103조 위반으로 무효가 될 수 있다.§⑤하나의 계약에 손해배상액 예정 조항이 별도로 있고 추가적으로 위약금 조항이 있다면 위약벌로 볼 수 있다.", "③", "▸ ③ 오답: [大判全合2022 2018다248855] 위약벌에 §398 2항 유추적용 감액 × (현재 판례 유지). ①②④⑤ 모두 옳음. [객 대비]", "손해배상", 24],
  ["채권총론_Q042", "OX", "★★ 토지 소유자는 그 토지 위 건물의 임대인을 대위하여 임차인에게 임대차 해지통고 및 건물인도를 청구할 수 있다.", true, "▸ [2006다82700] 물권적 청구권(건물철거·퇴거청구권) 보전을 위한 채권자대위 O. 퇴거청구와 해지통고·건물인도 청구는 요건·효과 달라 퇴거청구 가능성이 보전 필요성을 부정하지 않음. [사례형]", "채권자대위권", 27],
  ["채권총론_Q043", "CASE", "甲은 乙에게 부동산을 매도하는 계약을 체결하고, 乙이 잔금을 지급하면 甲이 소유권이전등기를 해주기로 하였다. 乙이 잔금 지급일에 잔금을 준비하여 이행제공을 하였으나, 甲이 수령을 거절하였다. 이 경우 채권자지체의 효과로서 乙이 주장할 수 있는 것은?§★★ [사례 대비 / 2019다293036]", "OPEN", "▸ 【채권자지체 법적 성질】 법정책임설(통판) 채택 [判例2021 2019다293036]\n\n【변제제공의 효과(§461조)】\n- 乙: 이행지체 면함\n- 공탁 가능(§487조)\n\n【채권자지체 자체의 효과】\n- §401조: 주의의무 경감 (경과실 불능 면책)\n- §402조: 이자 지급의무 면제\n- §403조: 증가비용 甲 부담\n- §538조 1항 2문: 대가 위험 이전 (수령지체 중 쌍방 귀책없는 불능 시 乙은 반대급부 청구 O)\n\n【원칙적 손해배상·해제 ×】\n∵ 채권자 귀책사유 불요하므로 채무불이행 같은 효과는 인정 ×\n\n⚠️ BUT 甲에게 수령의무·협력의무 약정 or 신의칙상 인정될 경우:\n→ 의무위반에 따른 甲 책임 O\n→ 계약 목적 달성 불능 시 乙은 계약 해제 O", "채권자지체", 26],
  ["채권총론_Q044", "OX", "★★ 피보전채권이 금전채권인 경우, 채무자의 무자력은 보전의 필요성 요건으로서 채권자가 주장·입증해야 한다.", true, "▸ [75다1086] 금전채권 피보전의 경우 변론종결 당시 채무자 무자력 사실을 채권자가 주장·입증해야. [객 대비]", "채권자대위권", 28],
  ["채권총론_Q045", "OX", "★★ 임대차보증금반환채권을 양수한 양수인이 임대인을 대위하여 임차인에게 목적물인도청구를 하는 경우, 임대인(채무자)의 무자력을 입증해야 한다.", false, "▸ [88다카4253] 피보전채권(보증금반환채권)과 피대위권리(인도청구권)가 동시이행관계 → 밀·현·간 O → 무자력 불요. [사례 대비]", "채권자대위권", 29],
  ["채권총론_Q046", "OX", "★ 공유물분할청구권은 행사상 일신전속권이 아니므로 채권자가 금전채권 보전을 위해 이를 대위행사할 수 있다.", false, "▸ [全合2020 2018다879] 공유물분할청구권은 피대위권리 O이나, 금전채권 보전 위한 대위행사는 보전 필요성 × (극히 예외적으로만 인정). [객 대비]", "채권자대위권", 29],
  ["채권총론_Q047", "OX", "★ 이혼 재산분할청구권은 행사상 일신전속권이므로 채권자가 대위행사할 수 없다.", true, "▸ [判例2022 2022스613] 이혼 재산분할청구권 = 행사상 일신전속성 + 협의·심판으로 내용 형성 전에는 구체적 권리 아님 → 채권자대위 × + 파산재단 ×. [객 대비]", "채권자대위권", 30],
  ["채권총론_Q048", "OX", "★★★ 채권자가 채권자대위권을 행사하여 제3채무자에게 금전지급을 청구하는 경우, 채권자는 자신에게 직접 지급할 것을 청구할 수 있다.", true, "▸ [判例2024] 금전지급·물건인도·등기말소 = 예외적으로 채권자에게 직접 급부 청구 O. 급부 효과는 채무자에게 귀속. [사례·기록 대비]", "채권자대위권", 31],
  ["채권총론_Q049", "OX", "★★★ 채권자가 채권자대위권을 행사하여 채무자가 제3채무자에게 채권양도를 구할 권리를 대위행사하는 경우, 채권자는 자신에게 직접 채권을 양도할 것을 청구할 수 있다.", false, "▸ [判例2024] 채권양도 대위 = 직접청구 예외 ×. 채권자는 제3채무자에게 '채무자에게' 채권양도 이행하도록 청구해야. 직접 '자신에게' 양도 청구 ×.", "채권자대위권", 31],
  ["채권총론_Q050", "CASE", "임대인 甲이 임차인 乙에게 보증금을 반환하였고, 乙은 甲에 대한 보증금반환채권을 丙에게 양도하였다. 丙이 甲에게 양수금을 청구하자 甲은 임대차 목적물 미반환을 이유로 동시이행항변권을 행사하였다. 丙이 乙을 대위하여 목적물 인도청구를 하려는 경우, 甲(채무자)의 무자력을 입증해야 하는가?§★★ [사례 대비 / 88다카4253]", "OPEN", "▸ 【쟁점】 임대차보증금반환채권 양수인의 대위시 금전채권 무자력 요건 적용 여부\n\n【금전채권 원칙】 금전채권 피보전 = 채무자 무자력 주장·입증 필요 [75다1086]\n\n【예외 — 밀·현·간 O → 무자력 불요 [88다카4253]】\n- 丙의 피보전채권(양수금) = 甲에 대한 임대차보증금반환채권 (채권양도의 동일성)\n- 甲의 임대인으로서 동시이행항변 → 피보전채권과 피대위권리(목적물인도청구권)가 동시이행관계\n→ 밀접관련 O, 현실적 이행 유효·적절 확보 O, 간접적으로 만족 O\n→ **임대인(甲, 채무자)의 무자력 입증 불요**\n\n【결론】 丙은 무자력 입증 없이 대위소송 가능", "채권자대위권", 29]

  ["채권총론_Q051","MCQ","손해의 개념에 관한 차액설의 내용으로 옳은 것은?",["위법행위 없었다면 존재했을 이익과 위법행위 있은 후 현재 이익의 차이","피해자가 실제로 지출한 비용 전액","위법행위로 인해 얻은 이익 전부","이행이 되었더라면 채권자가 얻었을 이익","법원이 공평의 원칙상 산정하는 금액"],0,"차액설은 '위법행위 없었다면 존재했을 이익과 위법행위 있은 후 현재 이익의 차이'를 손해로 파악. [통판] 채무불이행과 불법행위 공히 차액설 취함.","채권총론_C034",1,"손해배상"],
  ["채권총론_Q052","MCQ","신뢰이익과 이행이익의 관계에 관한 설명으로 옳은 것은?",["신뢰이익은 이행이익보다 항상 많다","신뢰이익은 이행이익을 한도로 한다","이행이익은 신뢰이익을 한도로 한다","신뢰이익과 이행이익은 별개 독립적이다","신뢰이익은 청구 불가하다"],1,"신뢰이익은 이행이익을 한도로 함 [통판]. §535조 1항 단서가 근거. 일실이익과 신뢰이익을 함께 청구 시 중복배상 방지를 위해 일실이익은 제반비용 공제한 순이익으로 한정 [2023다223171].","채권총론_C035",0,"손해배상"],
  ["채권총론_Q053","MCQ","§393조 2항 특별손해의 예견가능성 판단 기준시기에 관하여 판례가 취하는 입장은?",["계약 체결 당시를 기준으로 한다","채무 이행기까지를 기준으로 한다","손해 발생 당시를 기준으로 한다","소 제기 당시를 기준으로 한다","판결 선고 당시를 기준으로 한다"],1,"★ 판례 [84다카1532]: 특별손해 예견가능성 기준시기는 계약체결당시가 아니라 채무 이행기까지를 기준으로 판단해야. [통판] 채무불이행시설 채택.","채권총론_P103",1,"손해배상"],
  ["채권총론_Q054","MCQ","다음 중 이행지체로 인한 전보배상액의 산정 기준 시기로 옳은 것은?",["이행기 도과 당시","불법행위 발생 당시","본래 의무이행 최고 후 상당 기간 경과한 당시","소 제기 당시","판결 선고 당시"],2,"★ [2005다63337]: 이행지체로 인한 전보배상(§395)은 본래 의무이행을 최고했던 상당 기간 경과한 당시의 시가. 이행불능→이행불능 당시, 이행거절→이행거절 당시.","채권총론_P110",1,"손해배상"],
  ["채권총론_Q055","MCQ","불법행위로 물건이 훼손된 경우 통상손해 산정에 관한 설명으로 틀린 것은?",["수리 가능한 경우는 수리비","수리 불가능한 경우는 교환가치 감소액","수리 후에도 일부 수리 불가능 부분이 남는 경우 수리비+수리불능 교환가치 감소액","건물 훼손 사용·수리 불가능 시 교환가치(시가)에 철거비용 포함","물건 완전 멸실 시 교환가치 전액"],3,"[2009다91828]: 건물 훼손으로 사용·수리 불가능한 경우 통상손해인 교환가치(시가)에 철거비용은 포함되지 않음. ③은 [2016다248806]의 올바른 내용.","채권총론_P102",0,"손해배상"],
  ["채권총론_Q056","MCQ","과실상계에 관한 설명으로 옳은 것은?",["법원은 당사자가 주장하는 경우에만 과실상계를 할 수 있다","과실상계는 손해배상액 예정이 있는 경우에도 적용된다","법원은 직권으로 판단하여 반드시 참작하여야 한다","과실상계는 이행청구권에도 준용된다","표현대리의 경우에도 과실상계를 적용할 수 있다"],2,"[96다30113]: 법원은 직권으로 판단하여 반드시 참작. ①X(직권참작), ②X(예정에는 과실상계 배제[72다108]), ④X(손해담보약정상 이행청구권에 과실상계 준용·유추적용 X[2000다72572]), ⑤X(표현대리 과실상계 X[95다49554]).","채권총론_P112",0,"손해배상"],
  ["채권총론_Q057","MCQ","손해 일부청구와 과실상계의 처리 방법에 관하여 통설·판례가 취하는 외측설의 내용으로 옳은 것은?",["청구액에서 과실비율만큼 감액한다","손해 전액에서 과실비율 감액 후 잔액이 청구액 초과 시 청구 전액, 잔액이 청구액 미달 시 잔액을 인용한다","손해 전액에서 과실비율 감액 후 그 비율만큼 청구액도 감액한다","청구액과 손해액 중 작은 금액에서 과실비율을 감액한다","과실상계를 먼저 하지 않고 청구액 전액을 인용한다"],1,"★ [75다819] 외측설 [통판]: 손해 전액에서 과실비율 감액 → 잔액이 청구액 초과 시 청구 전액 / 잔액이 청구액 미달 시 잔액. v. 안분설.","채권총론_P113",1,"손해배상"],
  ["채권총론_Q058","MCQ","과실상계와 손익상계의 순서에 관한 판례의 입장으로 옳은 것은?",["손익상계를 먼저 하고 과실상계를 한다","과실상계와 손익상계는 동시에 한다","과실상계를 먼저 하고 손익상계를 한다","순서는 사안에 따라 법원이 재량으로 결정한다","손익상계는 과실상계와 무관하게 별도로 한다"],2,"★ [80다3277]: 과실상계 먼저(ㄱ) → 손익상계 나중(ㅅ). 손익상계는 위법행위 없었다면 채권자가 지출했을 비용을 손해배상액에서 공제(인과관계 필요).","채권총론_P114",1,"손해배상"],
  ["채권총론_Q059","MCQ","피해자의 심인적·체질적 소인이 손해 발생·확대에 기여한 경우 법원의 처리 방법으로 옳은 것은?",["소인을 이유로 청구를 기각한다","과실상계 법리를 유추적용한다","손해 전액을 배상하게 한다","과실상계 법리를 직접 적용한다","소인 기여분만큼 가해자 책임을 면제한다"],1,"[91다2977, 98다50586]: 법원은 공평의 원칙상 과실상계 법리 유추적용 O. 正辯: 판결문 실무에서는 '책임제한'이라는 용어를 사용.","채권총론_P117",0,"손해배상"],
  ["채권총론_Q060","MCQ","피해자측 과실이론에 관한 설명으로 옳은 것은?",["피해자와 같은 차량에 탑승한 운전자의 과실은 항상 피해자측 과실이다","피해자와 신분상·사회생활상 일체를 이루는 관계에 있는 자의 과실은 피해자 과실로 인정될 수 있다","다방 종업원 차 배달 사건에서 판례는 피해자측 과실을 인정했다","호의동승 차량 운전자의 과실은 동승차량 운행자에 대한 청구에서 피해자측 과실로 참작된다","모든 동승자의 피해는 운전자 과실을 피해자측 과실로 본다"],1,"[98다31868]: '신분상·사회생활상 일체를 이루는 관계'에 있는 자의 과실을 피해자 과실로 인정. ①③ 다방 종업원 사건: 부정[98다23232]. ④[97다35344]: 운전자 과실은 운행자 손해배상 채무의 성립요건일 뿐 피해자측 과실 참작 X.","채권총론_P118",0,"손해배상"],
  ["채권총론_Q061","MCQ","공동불법행위에서 과실상계 방법에 관한 설명으로 옳은 것은?",["가해자별로 피해자 과실비율을 개별적으로 산정한다","가해자들이 공동으로 한 불법행위에서 피해자 과실비율이 달라도 전원에 대해 전체적으로 평가한다","부진정연대채무 관계에서도 전체적 평가를 한다","공동불법행위에서는 과실상계가 적용되지 않는다","과실비율이 가장 높은 가해자의 비율을 기준으로 한다"],1,"[2017다16747]: 공동불법행위 → 피해자 과실비율 달라도 전원에 전체적 평가. But 부진정연대채무(별개 원인의 독립 채무가 동일 경제적 목적)에서는 전체적 평가 X.","채권총론_P119",0,"손해배상"],
  ["채권총론_Q062","MCQ","다음 중 과실상계가 적용되지 않는 경우를 모두 고른 것은?\nㄱ. 손해배상액 예정 ㄴ. 해제 후 원상회복 ㄷ. 피해자의 부주의를 이용한 가해자의 고의 불법행위 ㄹ. 표현대리",["ㄱ만","ㄱ, ㄴ","ㄱ, ㄴ, ㄷ","ㄱ, ㄴ, ㄷ, ㄹ 모두","ㄷ, ㄹ만"],3,"과실상계 배제: ① 손해배상액 예정[72다108] ② 해제 원상회복[2013다34143] ③ 고의 불법행위(가해자가 이익 최종 보유하면 공평·신의칙에 반하는 경우)[99다50538] ④ 표현대리[95다49554] ⑤ 본래 급부이행[96다8468] ⑥ §673조 책임[2000다37296]","채권총론_C040",0,"손해배상"],
  ["채권총론_Q063","MCQ","재산적 손해 3분설(통판)에 해당하지 않는 것은?",["적극적 손해 — 기존재산 멸실·감소","소극적 손해 — 장래 얻을 이익(일실이익)","정신적 손해 — 위자료","신뢰손해 — 신뢰이익의 침해","이행이익 — 채무가 이행되었으면 있었을 이익"],3,"재산적 손해 3분설[통판]: 적극적 손해·소극적 손해·정신적 손해. '신뢰손해'는 독립된 3분설 항목이 아님. 이행이익·신뢰이익은 손해 분류가 아니라 배상범위 개념.","채권총론_C034",0,"손해배상"],
  ["채권총론_Q064","MCQ","손해배상청구권의 소멸시효에 관한 설명으로 옳은 것은?",["채무불이행일로부터 독립적인 단기소멸시효가 적용된다","본래의 채권과 소멸시효 기간이 동일하며, 기산점은 채무불이행시부터 진행한다","채권 성립일부터 진행한다","손해를 안 날로부터 3년의 단기소멸시효만 적용된다","불법행위 손해배상청구권과 동일한 시효규정을 적용한다"],1,"[통판]: 손해배상청구권은 본래 채권과 동일성이 있으므로 소멸시효 기간 동일, 기산점은 채무불이행시부터 진행.","채권총론_C036",0,"손해배상"],
  ["채권총론_Q065","MCQ","대판(전합) 2001다82507에서 영업용 물건 멸실·손상 시 영업손해(휴업손해)를 어떻게 판단했는가?",["특별손해로서 채무자가 알아야만 배상한다","통상손해에 해당한다","영업손해는 손해배상 대상이 아니다","물건 가액의 범위로 제한된다","법원이 재량으로 인정 여부를 결정한다"],1,"[大判全合 2001다82507]: 영업용 물건 멸실 시 '대체 물건 마련에', 손괴 시 '수리에' 합리적으로 필요한 기간의 영업이익 = 통상손해 O.","채권총론_P107",0,"손해배상"],

  ["채권총론_Q066","MCQ","§397조 1항에서 약정이율과 법정이율의 관계에 관한 설명으로 옳은 것은?",["약정이율이 법정이율보다 낮은 경우에도 단서가 적용된다","약정이율이 법정이율 이상인 경우에만 단서가 적용되고, 낮은 경우는 법정이율로 산정한다","무이자약정인 경우 지연손해금을 청구할 수 없다","약정이율이 없으면 항상 법정이율의 절반으로 산정한다","법정이율은 약정이율에 우선한다"],1,"[2009다85342]: §397조 1항 단서는 약정이율이 법정이율 이상인 경우만 적용, 낮은 경우는 본문으로 돌아가 법정이율로 산정 → 무이자약정인 경우도 이행지체 지연손해금은 법정이율로 청구 가능.","채권총론_P120",0,"손해배상"],
  ["채권총론_Q067","MCQ","§397조의 금전채무의 특성에 관한 설명으로 틀린 것은?",["금전은 가치 자체이므로 개성이 없다","금전채무는 특정이 불가능하다","금전채무는 이행불능이 될 수 없다","금전의 점유는 소유를 의미한다","금전채무불이행에서 채무자는 과실 없음을 입증하여 책임을 면할 수 있다"],4,"§397조 2항: 금전채무불이행의 경우 채무자는 과실 없음을 항변으로 제출하지 못함 (= 무과실책임). 금전 = 가치 자체, 개성 없음 ∴ 특정 X, 이행불능 X, 점유=소유.","채권총론_C042",0,"손해배상"],
  ["채권총론_Q068","MCQ","손해배상액의 예정(§398)에 관한 설명으로 옳은 것은?",["법원은 당사자가 주장하는 경우에만 예정액을 감액할 수 있다","감액 판단의 기준시기는 계약 체결 당시이다","과실상계 규정이 준용되어 채권자의 과실도 고려해야 한다","법원은 실제 손해액을 심리·확정할 필요가 없다","법원이 감액한 부분은 장래를 향하여 효력을 잃는다"],3,"[95다33658]: 법원은 실제 손해액을 구체적으로 심리·확정할 필요는 없음. ①X([99다38637]직권 감액 O), ②X(변론종결 당시[2000다35771]), ③X([99다57126]과실상계 X), ⑤X([91다11490]처음부터 무효).","채권총론_C043",0,"손해배상"],
  ["채권총론_Q069","MCQ","위약금 약정이 위약벌에 해당하려면?",["약정서에 '위약벌'이라는 문구가 있어야 한다","위약벌 약정은 별도의 입증 없이 법원이 직권으로 인정한다","위약벌로 되려면 특별한 사정이 있음을 당사자가 주장·입증해야 한다","위약금 약정은 항상 위약벌로 추정된다","법원이 위약벌도 §398조 2항에 의해 감액할 수 있다"],2,"[92다46905]: 위약금이 위약벌로 되려면 특별한 사정 주장·입증 필요. ①X(문구 무관), ②X(추정은 손배예정), ④X(§398조 4항: 위약금 = 손해배상액 예정으로 추정), ⑤X(위약벌은 §398조 2항 감액 X, 다만 103조 무효는 가능).","채권총론_P128",0,"손해배상"],
  ["채권총론_Q070","MCQ","[大判全合2022] 위약금 약정이 위약벌에 해당하는 경우로 옳은 것은?",["위약금 약정에 '위약벌'이라는 문언이 명시된 경우","하나의 계약에 손해배상액 예정 조항 따로 있거나 실손해 배상 전제 조항 있고 별도로 위약금 조항이 있는 경우","계약 체결 시 당사자가 위약벌 의사를 구두로 표명한 경우","계약금의 몰취·배액상환 약정이 있는 경우","계약의 이행을 강제하기 위한 목적으로 약정한 경우"],1,"[大判全合2022 2018다248855]: '하나의 계약에 손배예정 조항 따로 있거나 실손해 배상 전제 조항 있고 별도로 위약금 조항 있다면 위약벌로 보아야' ∵ 손배예정으로 해석하면 이중배상.","채권총론_P129",0,"손해배상"],
  ["채권총론_Q071","MCQ","채권자가 채무불이행을 이유로 계약을 해제한 경우 손해배상액 예정의 효력은?",["항상 실효된다","원칙적으로 실효되지 않으며, 전보배상도 예정액으로 결정한다","이행청구권은 소멸하지만 예정액 청구는 가능하다","해제의 효력이 발생하는 시점부터 실효된다","당사자 합의 없이는 예정액을 청구할 수 없다"],1,"[2019다292736 判例2022]: 해제·해지해도 원칙적으로 손배예정은 실효 X, 전보배상도 예정액으로 결정 ∵ §398 1·3항, §551조. 단, 계약 유지를 전제로 정한 약정 등 특별한 사정이 있다면 실효 O.","채권총론_P133",0,"손해배상"],
  ["채권총론_Q072","MCQ","채권자지체(§400)의 법적 성질에 관한 통설·판례의 입장으로 옳은 것은?",["채권자의 귀책사유를 요하는 채무불이행이다","채권자의 귀책사유가 필요 없는 법정책임이다","채권자지체가 성립하면 채무자는 항상 손해배상을 청구할 수 있다","채권자지체가 성립하면 채무자는 계약을 해제할 수 있다","채권자지체는 채권자의 고의·과실이 있는 경우에만 성립한다"],1,"★★ 법정책임설 [통판]: 채권자 귀책사유 불요, 효과는 §401~403조, §538조 1항 2문만 인정, 손해배상·해제 X ∵ 채권자는 권리자. [2019다293036 判例2021 ★★★] 확인.","채권총론_C047",2,"채권자지체"],
  ["채권총론_Q073","MCQ","[判例2021 2019다293036] 채권자지체에 관한 판례의 내용으로 옳지 않은 것은?",["§400조 채권자지체 성립에 채권자 귀책사유는 필요 없다","채권자지체의 효과는 원칙적으로 §401~403조, §538조 1항만 인정된다","채권자지체가 성립하면 원칙적으로 채무자는 채무불이행을 이유로 한 손해배상청구가 가능하다","채권자의 수령의무가 약정된 경우 의무위반에 따른 채권자 책임 인정 O","채권자의 수령의무 불이행으로 계약 목적 달성 불능하면 채무자는 해제 O"],2,"★★★ [2019다293036 判例2021]: 원칙적으로 채무불이행 같은 손해배상 X, 해제 X. 단, 수령의무·협력의무 약정 또는 신의칙상 인정 + 불이행 시 예외적으로 채권자 책임 O, 계약 목적 달성 불능 시 해제 O.","채권총론_P138",3,"채권자지체"],

// ================================================================

const STORE = 'lawmj_v1';
let P = {};
function loadP(){try{P=JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){P={}}}
function saveP(){localStorage.setItem(STORE,JSON.stringify(P))}
function getP(tk){return P[tk]||(P[tk]={ox_ok:[],ox_ng:[],mcq_ok:[],mcq_ng:[],blank_ok:[],blank_ng:[],con_done:[],cas_done:[],fla_done:[]}),P[tk]}

function recordOx(id,ok){const p=getP(S.topicKey);if(ok){p.ox_ok=[...new Set([...p.ox_ok,id])];p.ox_ng=p.ox_ng.filter(x=>x!==id)}else{p.ox_ng=[...new Set([...p.ox_ng,id])]};saveP()}
function recordMcq(id,ok){const p=getP(S.topicKey);if(ok){p.mcq_ok=[...new Set([...p.mcq_ok,id])];p.mcq_ng=p.mcq_ng.filter(x=>x!==id)}else{p.mcq_ng=[...new Set([...p.mcq_ng,id])]};saveP()}
function recordBlank(id,ok){const p=getP(S.topicKey);if(ok){p.blank_ok=[...new Set([...p.blank_ok,id])];p.blank_ng=p.blank_ng.filter(x=>x!==id)}else{p.blank_ng=[...new Set([...p.blank_ng,id])]};saveP()}

function modPct(mod){
  let tot=0,done=0;
  mod.topics.forEach(t=>{
    const p=getP(t.key);
    const ox=mod.qui.filter(q=>q[5]===t.key&&q[1]==='OX');
    const mcq=mod.qui.filter(q=>q[5]===t.key&&q[1]==='MCQ');
    tot+=ox.length+mcq.length;
    done+=p.ox_ok.filter(id=>ox.find(q=>q[0]===id)).length+p.mcq_ok.filter(id=>mcq.find(q=>q[0]===id)).length;
  });
  return tot===0?0:Math.min(100,Math.round(done/tot*100));
}
function topicPct(mod,tk){
  const p=getP(tk);
  const items=mod.qui.filter(q=>q[5]===tk);
  if(!items.length)return 0;
  const done=[...p.ox_ok,...p.mcq_ok,...p.blank_ok].filter(id=>items.find(q=>q[0]===id)).length;
  return Math.min(100,Math.round(done/items.length*100));
}
function allWrong(){
  const w=[];
  MODULES.forEach(m=>m.qui.forEach(q=>{
    const p=getP(q[5]);
    const ng=q[1]==='OX'?p.ox_ng:q[1]==='MCQ'?p.mcq_ng:p.blank_ng;
    if(ng.includes(q[0]))w.push({q,mod:m});
  }));
  return w;
}

function switchTab(k){

function renderTC(){

function renderConTab(m){
  const items=m.con.filter(x=>x[5]===S.topicKey);
  if(!items.length)return empty('📖','개념 정리 준비 중','교과서 아카이빙 후 이 단원의 개념이 표시됩니다.');
  const IL={3:'★★★ 핵심',2:'★★ 중요',1:'★ 기본'};
  const IC={3:'b3',2:'b2',1:'b1'};
  return '<div class="concept-list">'+items.map(c=>`
    <div class="ccard">
      <div class="ccard-hdr">
        <div class="ccard-title">${esc(c[1])}</div>
        <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
          ${pageBadge(c[6])}
          <span class="badge ${IC[c[4]]||'b1'}">${IL[c[4]]||''}</span>
        </div>
      </div>
      <div class="ccard-body">${fmtBody(c[2])}</div>
      ${c[3]&&c[3].length?`<div class="atags">${c[3].map(a=>`<span class="atag" onclick="searchByAtag('${esc(a)}')">${esc(a)}</span>`).join('')}</div>`:''}
    </div>`).join('')+'</div>';

function fmtBody(s){
  if(!s)return'';
  return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')

    .replace(/^&gt; (.+)/gm,'<blockquote style="border-left:3px solid var(--primary);padding:7px 12px;margin:6px 0;background:var(--bg2);border-radius:0 5px 5px 0;color:var(--text2)">$1</blockquote>');
}

// ================================================================

// ================================================================
function getQList(m,type){
  const all=m.qui.filter(q=>q[5]===S.topicKey&&q[1]===type);
  if(S.qFilter==='star')return all.filter(q=>q[2].startsWith('★')||q[2].includes('§★'));
  if(S.qFilter==='wrong'){
    const p=getP(S.topicKey);
    const ng=[...p.ox_ng,...p.mcq_ng,...p.blank_ng];
    return all.filter(q=>ng.includes(q[0]));
  }
  return all;
}
function renderQuizTab(m,type){
  const all=m.qui.filter(q=>q[5]===S.topicKey&&q[1]===type);
  const labels={OX:'OX 퀴즈',MCQ:'객관식',CASE:'사례문제',BLANK:'빈칸채우기'};
  if(!all.length)return empty('📝',`${labels[type]} 준비 중`,'이 단원의 문제가 곧 추가됩니다.');
  const list=getQList(m,type);
  const p=getP(S.topicKey);
  const ngAll=[...p.ox_ng,...p.mcq_ng,...p.blank_ng].filter(id=>all.find(q=>q[0]===id));
  const starAll=all.filter(q=>q[2].startsWith('★')||q[2].includes('§★'));
  const ctrl=`<div class="qcontrols">
    <button class="fbtn ${S.qFilter==='all'?'active':''}" onclick="setQF('all','${type}')">전체 (${all.length})</button>
    ${starAll.length?`<button class="fbtn ${S.qFilter==='star'?'active':''}" onclick="setQF('star','${type}')">⭐ 중요 (${starAll.length})</button>`:''}
    ${ngAll.length?`<button class="fbtn ${S.qFilter==='wrong'?'active':''}" onclick="setQF('wrong','${type}')">❌ 오답 (${ngAll.length})</button>`:''}
    <span class="qprogress">${Math.min(S.qIdx+1,list.length||1)} / ${list.length}</span>
  </div>`;
  if(!list.length)return ctrl+empty('✅','해당 조건의 문제 없음','다른 필터를 선택해보세요.');
  const idx=Math.min(S.qIdx,list.length-1);
  const q=list[idx];
  let card='';
  if(type==='OX')card=renderOX(q);
  else if(type==='MCQ')card=renderMCQ(q);
  else if(type==='CASE')card=renderCASE(q);
  else if(type==='BLANK')card=renderBLANK(q);
  return `<div class="qwrap">${ctrl}${card}
    <div class="qnav">
      <button class="nbtn" onclick="prevQ()" ${idx===0?'disabled':''}>← 이전</button>
      <span style="font-size:11.5px;color:var(--text3)">${idx+1} / ${list.length}</span>
      <button class="nbtn" onclick="nextQ('${type}')" ${idx>=list.length-1?'disabled':''}>다음 →</button>
    </div>
  </div>`;
}

function renderOX(q){
  const starM=q[2].match(/^(★+)/); const starN=starM?starM[1].length:0;
  let fact='',qtext=q[2];
  if(q[2].includes('§')){const p=q[2].split('§');fact=`<div class="qfact">${esc(p[0])}</div>`;qtext=p.slice(1).join('§')}
  const ans=S.qAnswered;
  const cor=q[3];
  return `<div class="qcard">
    <div class="qcard-top"><span class="qbadge qb-ox">OX</span>${starN>0?`<span class="qstar">${'★'.repeat(starN)}</span>`:''}<span style="flex:1"></span>${pageBadge(q[6])}</div>
    ${fact}<div class="qquestion">${esc(qtext.replace(/^★+\s*/,''))}</div>
    <div class="ox-row">
      <button class="oxbtn obtn ${ans!==null?(cor===true?'ans-ok':(ans===true?'ans-ng':'')):'sel-o'}" onclick="${ans===null?`ansOx(true,${q[3]},'${escA(q[0])}')`:''}">○</button>
      <button class="oxbtn xbtn ${ans!==null?(cor===false?'ans-ok':(ans===false?'ans-ng':'')):'sel-x'}" onclick="${ans===null?`ansOx(false,${q[3]},'${escA(q[0])}')`:''}">✕</button>
    </div>

function renderMCQ(q){
  const starM=(q[2].startsWith('★')||q[2].includes('§★'))?q[2].replace(/§.*/,'').match(/^(★+)/):null;
  const starN=starM?starM[1].length:0;
  const pts=q[2].split('§');
  let fact='',qline,opts;
  // 두 번째 요소가 선지(①로 시작)이면 첫 요소가 질문. 아니면 첫 요소가 사실관계.
  if(pts.length>1&&pts[1].trim().startsWith('①')){

    fact=pts.length>1?`<div class="qfact">${esc(pts[0])}</div>`:'';

  }
  const SYMS=['①','②','③','④','⑤'];
  const ans=S.qAnswered;
  const cor=q[3];
  const optH=opts.map((o,i)=>{
    const sym=SYMS[i];
    let cls='';
