  ["채권총론_P362", "2006다46278", "“계약의 일방이 상대방의 지시에 좇아", "[判例] “계약의 일방이 상대방의 지시에 좇아\n\n급부과정 단축하여 상대방과 다른 계약관계 맺은 제3자에게 직접 급부하면 이로써\n급부한 자의 상대방에 대한 급부뿐 아니라 상대방의 제3자에 대한 급부도 이뤄짐\n\n（‘C …> A’ = ‘C …> B’ + ‘B •••► A’） — B-C 사이 계약이 무효 - 취소 • 해제된 경우 C는\n\nA가 아닌 B 상대로 부당이득반환• 원상회복 청구 V A에 대한 반환청구를 긍정하면\n자기 책임으로 체결된 계약 위험을 제3자에게 전가하여 계약법 원리 위반, 제3자가\n상대방에 대해 가지는 항변권 침해” - 이 경우 A가 급부 수령 당시 B-C 사이 원인\n관계에 무효 등 흠이 있음을 알고 있었다고 하더라도 마찬가지 [2006다46278]", "", [], 0, "채권소멸변제", 77, "미분류"],
  ["채권총론_P363", "2004다41194", "선의• 무과실은변제자가 입증책임 [2004다41194]", "[判例] 선의• 무과실은변제자가 입증책임 [2004다41194]", "", [], 0, "채권소멸변제", 77, "미분류"],
  ["채권총론_P364", "98다61593", "채권의 준점유자 변제 유효 요건인 ‘선의’는 변제수령 권한 없음 알지 못한", "[判例] 채권의 준점유자 변제 유효 요건인 ‘선의’는 변제수령 권한 없음 알지 못한\n것뿐만 아니라 적극적으로 진정한 권리자라고 믿었음을 필요로 [98다61593]", "", [], 0, "채권소멸변제", 77, "미분류"],
  ["채권총론_P365", "87다카2015; 78다1292,87다카546", "채권 압류나 가압류가 경합된 경우 1인 전부명령은 무효, 그러나 제3채무자", "[判例] 채권 압류나 가압류가 경합된 경우 1인 전부명령은 무효, 그러나 제3채무자\n가 선의 • 무과실로 전부채권자에게 변제하면 채권의 준점유자에 대한 변제로 유효\n\n（이 경우 일반적으로 선의 • 무과실） [87다카2015] — 제3채무자는 다른 압류채권자에\n대하여 이중변제 의무 X — 제3채무자가 전부채권자에 대하여 전부명령의 무효를\n주장하여 부당이 득반환청구 X, 경합압류채권자는 전부채권자에 대하여 자기가 배당\n\n받을 범위 안에서 부당이득반환청구 O, 이러한 경합압류채권자의 배당받을 금액에\n대하여 제3채무자는 변제할 이해관계 X [78다1292, 87다카546]", "", [], 0, "채권소멸변제", 77, "미분류"],
  ["채권총론_P366", "87다카546", "제3채무자가 전부금 변제함에 선의 • 무과실이 아니었다면 변제 무효,", "[判例] 제3채무자가 전부금 변제함에 선의 • 무과실이 아니었다면 변제 무효,\n\n경합압류채권자에 대한 불법행위 O [87다카546]", "", [], 0, "채권소멸변제", 78, "미분류"],
  ["채권총론_P367", "93다32200", "혼인 외 子의 생부가 사망하고 혼인 외 자가 인지청구 소를 제기하였더라도", "[判例] 혼인 외 子의 생부가 사망하고 혼인 외 자가 인지청구 소를 제기하였더라도\n인지판결 확정 전에 당시의 정당한 상속인이 채무자에 대하여 승소판결 받았다면 채\n무자의 표현상속인에 대한 변제는 특별한 사정이 없는 한 선의 • 무과실이고 채권의\n준점유자에 대한 변제로 유효 O V 인지판결 확정되면 소급하여 지위 상실함을 들\n어 권리행사 거부할 수는 X [93다32200]", "", [], 0, "채권소멸변제", 78, "미분류"],
  ["채권총론_P368", "2010다32214,2013다17117,2017다278729", "‘이익을 받은 경우’란 @ 수령자가 채권자에게 전달, ® 채권자가 사후", "[判例2021] ‘이익을 받은 경우’란 @ 수령자가 채권자에게 전달, ® 채권자가 사후\n추인, © 수령자가 채권자의 자신 • 제3자에 대한 채무에 충당 • 변제하여 기존 채무\n\n소멸시킨 경우 포함 O, 그러나 수령자가 자신의 채권자에 대한 채무 변제한 경우는 X\n\nV 채권자에게 실질적 이익 X [2010다32214, 2013다17117, 2017다278729]\n\n正辯 : [2021 년 선고 2017다278729 판결 사안] A가 B에 대한 채권®를 집행채권으로 B의 으에\n대한 물품대금채권에 압류 및 전부명령 서 C는 이를 간과한 채 B에게 물품대금채권을 변제함 一", "", [], 0, "채권소멸변제", 78, "미분류"],
  ["채권총론_P369", "2020다4261776", "동일 당사자 사이에 수 개의 채권관계가 성립되어 있는 경우, 채무자가", "[判例2021] 동일 당사자 사이에 수 개의 채권관계가 성립되어 있는 경우, 채무자가\n\n특정채무 지정하여 변제하면 그 변제액수가 지정한 특정채무 액수를 초과하더라도,\n초과액수 상당의 채권이 부당이득관계에 따라 다른 채권에 대한 상계의 자동채권이\n\n될 수 있음은 별론, 당사자 사이에 다른 채권 변제에 충당 • 공제 대상으로 삼는 합의\n가 있는 등 특별한 사정이 없는 한, 초과액수가 다른 채권의 변제에 당연 충당\n공제\n\nX,\n\nX [2020다4261776]\n\n正辯 : 그간 편의상 변제자의 ‘지정’이라는 용어를 항상 변제충당의 ‘지정충당’을 의미하는 것으로\n사용하기도 했으나, 위 판결 선고 이후에는 변제자의 단순한 ‘지정’은 특정 채무만을 변제하겠다는", "", [], 0, "채권소멸변제", 79, "미분류"],
  ["채권총론_P370", "2024다258921", "‘변제’의 증명책임 있는 채무자는 채권자에게 ① 급부한 점, ② 급부가", "[判例2024] ‘변제’의 증명책임 있는 채무자는 채권자에게 ① 급부한 점, ② 급부가\n\n특정채무의 변제로서 이뤄졌다는 점 증명해야 一 채무자가 객관적으로 특정채무 내\n용에 적합한 급부 했다면 특별한 사정 없는 한 그 채무 변제로 인정\n\n여러 채무 부담하는 채무자의 급부가 동시에 여러 채무 내용 적합하나 채무 전부\n소멸시키기 부족한 경우 ‘변제충당’ 문제됨 一 채무자가 그중 특정채무 ‘변제’로서\n\n급부했다고 주장함에 대해, 채권자가 수령한 사실 인정하면서 다른 채무 변제에\n‘충당’했다고 주장할 경우, 채권자는 ① 다른 채권 존재 사실, ② 다른 채권에 변제\n\n충당 합의, 지정, 법정충당 우선순위 있었던 사실 주장•증명해야 [2024다258921]", "", [], 0, "채권소멸변제", 79, "미분류"],
  ["채권총론_P371", "2007다77712", "回겨 477조 4호의 안분비례 법정충당과 달리 그 법률효과 이상으로", "[判例2021] 回겨 477조 4호의 안분비례 법정충당과 달리 그 법률효과 이상으로\n자신에게 유리한 합의충당 또는 지정충당 또는 우선적 법정충당으로 특정 채무에\n\n전액 변제충당 되었다고 주장하는 자는 이를 주장•증명할 책임 부담 一 주장자가\n합의, 지정, 우선적 법정충당 부분 증명 못하면 각 채무액 안분비례 법정충당 •••\n법정충당 순위 동일하면 477조 4호 적용 [2007다77712, 2021 다247937]\n\n正辯 : 피고의 변제항변에 대한 원고의 변제충당 재항변과 관련된 판결로서, 원고가 별개의 채권\n존재는 증명했으나 합의 등 우선충당 사유를 증명하지 못한 경우에는 청구 전부기각이 아닌 일부", "", [], 0, "채권소멸변제", 79, "미분류"],
  ["채권총론_P372", "2002다12871", "합의 없는 상태에서 비 • 이 • 원 법정 순서와 다르게 당사자가 일방적 지정함에", "[判例] 합의 없는 상태에서 비 • 이 • 원 법정 순서와 다르게 당사자가 일방적 지정함에\n\n대하여 상대방이 지체없이 이의 아니했다면 묵시적 합의 충당 O [2002다12871]", "", [], 0, "채권소멸변제", 79, "미분류"],
  ["채권총론_P373", "95다55504", "경매에서는 합의충당", "[判例] 경매에서는 합의충당\n\nX— 획일적으로 가장 공평 타당한 477조 법정충당 O\n\n[95다55504]", "", [], 0, "채권소멸변제", 79, "미분류"],
  ["채권총론_P374", "99다25938", "약관규제법 위반한 충당합의는 무효 [99다25938] —»可Q 피고의 재재항변", "[判例] 약관규제법 위반한 충당합의는 무효 [99다25938] —»可Q 피고의 재재항변", "", [], 0, "채권소멸변제", 80, "미분류"],
  ["채권총론_P375", "98다27517; 2018다204787", "미리 채권자• 채무자 사이에 ‘채권자가 적당하다고 인정하는 순서 • 방법에 의", "[判例] 미리 채권자• 채무자 사이에 ‘채권자가 적당하다고 인정하는 순서 • 방법에 의\n하여 충당하기로’ 약정했다면, 변제수령권자 스스로 정한 순서 - 방법으로 변제충당 O\n\n— 이 경우 채무자가 변제하면서 지정충당 X [98다27517]\n② 비용 • 이자 • 원본（제479조） : 합의충당이 없는 한 지정충당보다 우선 적용\n\n[判例202이 비용•이자•원본 충당 법정순서（479조）와 달리 당사자 일방적 지정\n\nX\n\n••• 479조에는 476조 지정충당 준용 X — 479조 변제충당에서 지연손해금은 이자와\n같이 보아 원본보다 먼저 충당 [2018다204787]", "", ["제479조"], 0, "채권소멸변제", 80, "미분류"],
  ["채권총론_P376", "2004재다818", "비용에는 변제비용 • 집행비용 • 소송비용 O [2004재다818]", "[判例] 비용에는 변제비용 • 집행비용 • 소송비용 O [2004재다818]\n\n—", "", [], 0, "채권소멸변제", 80, "미분류"],
  ["채권총론_P377", "2024다257812", "가집행선고로 인한 강제집행 면하기 위해 채무자가 지급한 가지급금의", "[判例2024] 가집행선고로 인한 강제집행 면하기 위해 채무자가 지급한 가지급금의\n액수가 정당한 금원（최종적 확정 금원）인 원본 및 지연손해금 합계액에 미치지 못\n했다면, 특별한 사정 없는 한, 민법 소정 변제충당 법리에 따라 지연손해금, 원본\n의 순서로 충당되어야 一 가집행 근거 판결 소송물이 복수의 금전청구가 객관적 병\n\n합된 것인 경우에도 마찬가지 [2024다257812]", "", [], 0, "채권소멸변제", 80, "미분류"],
  ["채권총론_P378", "2019다29013", "부진정연대채무자 중 소액채무자가 일부 변제하면, 다액채무자와 공동", "[判例2024] 부진정연대채무자 중 소액채무자가 일부 변제하면, 다액채무자와 공동\n\n부담 부분에 변제충당 일반원칙에 따라 지연손해금, 원본 순서로 소멸하고, 부진정\n연대채무에서 변제의 절대효에 따라 다액채무자 채무도 지연손해금과 원금이 같은\n\n범위에서 소멸 [2019다29013]\n\n正辯 : 소액채무자가 원금 70, 지연손해 70| 있고. 다액채무자가 원금 100. 지연손해 10이 있는 경\n우에, 소액채무자가 “17”을 변제하면, 소액채무자는 먼저 “지연손해 7”을 소멸시키고 나머지 10으", "", [], 0, "채권소멸변제", 80, "미분류"],
  ["채권총론_P379", "", "여러 연대채무자• 연대보증인에 대하여 따로따로 소송 제기되어 판결로 확정", "[判例] 여러 연대채무자• 연대보증인에 대하여 따로따로 소송 제기되어 판결로 확정\n\n된 원본 • 지연손해금의 금액 • 이율 서로 다른 경우 1인의 채무자가 일부 변제하면 공\n\n동 부담 부분이 아닌 채무부터 우선 충당\n③ 지정충당（제476조） : 변제자 一 수령자 一 （변제자 즉시 이의하면） 법정충당 [통]\n\n④ 법정충당（제477조） : 도래한（제1호） 一 변제이익 많은（제2호） 一 먼저 도래（제3호）\n\n— 채무액 비례（제4호） 順\n변제기 관하여 기한의 정함이 없는 채무는 채권이 성립한 때 도래한 것 [통]", "", ["제476조", "제477조"], 0, "채권소멸변제", 80, "미분류"],
  ["채권총론_P380", "99다22281", "법정충당 순위 정함에 있어 변제 유예가 있는 채무는 유예기까지 변제기가", "[判例] 법정충당 순위 정함에 있어 변제 유예가 있는 채무는 유예기까지 변제기가\n도래하지 않은 것으로 보아야 （유예기=변제기） [99다22281]", "", [], 0, "채권소멸변제", 80, "미분류"],
  ["채권총론_P381", "99다68652", "보증인으로서 부담하는 보증채무（연대보증채무 포함）는 변제자 자신의 채무", "[判例] 보증인으로서 부담하는 보증채무（연대보증채무 포함）는 변제자 자신의 채무\n에 비하여 변제이익이 적음 [99다68652]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P382", "2013다8250", "보증인이 있는 채무와 없는 채무, 물상보증인 제공 물적 담보가 있는 채무와", "[判例] 보증인이 있는 채무와 없는 채무, 물상보증인 제공 물적 담보가 있는 채무와\n없는 채무는 변제이익 차이가 없고 동일함 [2013다8250]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P383", "99다22281", "제3자가 담보로 발행 or 배서한 약속어음 교부된 채무와 다른 채무 사이에", "[判例] 제3자가 담보로 발행 or 배서한 약속어음 교부된 채무와 다른 채무 사이에\n\n변제이익 차이 없고 동일 一 그러나 변제하는 자가 발행 or 배서한 어음으로 담보\n되는 채무는 다른 채무보다 변제이익 많음 [99다22281]\n\n正辯 : 채무자가 자기 소유 부동산을 담보로 제공한 채무와 그렇지 않은 채무 사이 변제이익에 관\n한 명시적인 판례는 없음（물보 소유라면 변제이익 차이 없고, 부동산이 아니라 약속어음이라면 담", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P384", "2014다71712", "법정변제충당의 순서는 변제제공 당시를 기준으로 판단 [2014다71712]", "[判例] 법정변제충당의 순서는 변제제공 당시를 기준으로 판단 [2014다71712]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P385", "94다38106", "변제에 의한 대위（대위변제）는 제3자나 공동채무자 1인이 채무자나 다른", "[判例] 변제에 의한 대위（대위변제）는 제3자나 공동채무자 1인이 채무자나 다른\n공동채무자에 대해 가지는 구상권의 실현 확보를 목적으로 하는 제도 一 구상권이\n\n없으면 대위는 성립 X — 불가채무자 • 연대채무자 • 보증인 • 물상보증인 • 제3취득자 •\n후순위담보권자의 구상권은 규정상 명백, 채무자 부탁으로 제3자가 채무자를 위해\n\n변제한 경우는 688조（위임 비용상환청구권） 규정에 의해, 제3자가 사무관리에 의해\n채무자를 위해 변제한 경우는 739조（사무관리 비용상환청구권） 규정에 의해 각각 구\n\n상권 취득 O [94다38106]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P386", "97다1556,2013다214970", "물상보증인（연대채무자 1인）이 채무자（다른 연대채무자）를 위해 변제한 경", "[判例] 물상보증인（연대채무자 1인）이 채무자（다른 연대채무자）를 위해 변제한 경\n\n우 구상권을 가짐과 동시에 당연히 채권자를 대위 一 구상권과 변제자대위권은 원\n\n본• 변제기 • 이자• 지연손해금 유무 등에 있어 내용이 다른 별개의 권리, 행사자 선택\n의 자유 [97다1556, 2013다214970]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P387", "2019다270217", "변제자대위에 의한 원채권 및 담보권 행사 범위는 구상권 범위로 한정됨", "[判例2020] 변제자대위에 의한 원채권 및 담보권 행사 범위는 구상권 범위로 한정됨\n\n‘•• 변제자대위는 제3자•공동채무자의 구상권 확보 위한 제도 [2019다270217]", "", [], 0, "채권소멸변제", 81, "미분류"],
  ["채권총론_P388", "2008마109", "“469조 2항의 ‘이해관계’나 481조의 ‘변제할 정당한 이익’이 있는 자는 변제", "[判例] “469조 2항의 ‘이해관계’나 481조의 ‘변제할 정당한 이익’이 있는 자는 변제\n\n하지 않으면 채권자로부터 집행을 받거나 채무자에 대한 자기 권리 잃게 되는 지위\n이기 때문에 변제함으로써 당연히 대위의 보호 받아야 할 법률상 이익 있는 자”를 말\n하며, 단지 사실상 이해관계 가진 자 X [2008마109]", "", [], 0, "채권소멸변제", 82, "미분류"],
  ["채권총론_P389", "2016다232597", "채무자 위해 변제한 자는 변제와 동시에 채권자 승낙 얻어 채권자를", "[判例2021] 채무자 위해 변제한 자는 변제와 동시에 채권자 승낙 얻어 채권자를\n\n대위（480조 1항） 一 취득한 구상권 범위 내에서 종래 채권자가 가지던 채권 및 그\n담보 관한 권리는 동일성 유지한 채 법률상 당연히 변제자에게 이전 一 종래의\n\n채권자가 배당요구 없이 당연히 배당받을 수 있었던 경우는 대위변제자는 따로\n배당요구 없이 배당 O [2016다232597]\n\n正辯 : 담보가등기권자가 청산절차 없이 본등기 마쳤고, 제3자가 채권자의 승낙 얻어 가등기의 피", "", [], 0, "채권소멸변제", 82, "미분류"],
  ["채권총론_P390", "88다카1797", "변제할 정당한 이익이 있는 자가 채무자를 위하여 일부를 대위변제한 경우", "[判例] 변제할 정당한 이익이 있는 자가 채무자를 위하여 일부를 대위변제한 경우\n채권자는 대위변제자에게 저당권 일부이전의 부기등기 해주어야 하나, 이 경우에도\n채권자는 일부 대위변제자보다 우선변제권 [88다카1797]", "", [], 0, "채권소멸변제", 83, "미분류"],
  ["채권총론_P391", "2009다80460", "다만 일부 대위변제자와 채권자 사이 변제 순위를 따로 약정（우선회수특약）", "[判例] 다만 일부 대위변제자와 채권자 사이 변제 순위를 따로 약정（우선회수특약）\n을 했다면 그에 따르고, 그러나 일부 대위변제자의 채무자에 대한 구상채권에 대해 보\n\n증한 자가 보증채무 변제하여 다시 대위할 경우에는 우선회수특약상의 권리까지 당연히\n대위 • 이전하지\n\nX V 채권 및 담보에 관한 권리만 이전될 뿐 [2009다80460]", "", [], 0, "채권소멸변제", 83, "미분류"],
  ["채권총론_P392", "2015다206973", "우선회수특약은 부수적 약정으로서 일부 대위변제자는 자신을 다시 대위하는", "[判例] 우선회수특약은 부수적 약정으로서 일부 대위변제자는 자신을 다시 대위하는\n변제자가 특약을 승계 받도록 절차를 해줄 의무가 있고, 이를 위반하면 손해배상책\n\n임 O V 484조, 485조의 협조 • 보존의무 [2015다206973]", "", [], 0, "채권소멸변제", 83, "미분류"],
  ["채권총론_P393", "2011다9013", "수인이 시기 달리하여 채권 일부씩 대위변제하면 각 일부 대위변제자로서 변", "[判例] 수인이 시기 달리하여 채권 일부씩 대위변제하면 각 일부 대위변제자로서 변\n\n제한 가액에 비례하여 근저당권 준공유 O, 이때 채권자는 일부 대위변제자들에 대\n하여 우선변제권 o. 그 후 일부 대위변제자들끼리 남은 한도액 안분배당, 여기서 채\n권자와 특정 일부 대위변제자 사이 변제 순위 따로 약정할 수 있으나 일부 대위변제\n자들 사이 안분 배당받을 권리는 침해\n\nX — 먼저 채권자 근저당권 최고액 범위 내에\n\n서 채권자에게 잔존 채권액 우선 배당 一 나머지 한도액을 일부 대위변제자들에게\n각 대위변제액에 비례하여 안분 배당 — 약정 당사자인 채권자와 일부 대위변제자\n\n사이에 배당액 조정 [2011다9013]", "", [], 0, "채권소멸변제", 83, "미분류"],
  ["채권총론_P394", "20이다53929", "‘근저당권’의 피담보채권 확정 전（=거래관계 종료 전）에 그 채권의 일부를", "[判例] ‘근저당권’의 피담보채권 확정 전（=거래관계 종료 전）에 그 채권의 일부를\n\n양도 • 대위변제한 경우 근저당권이 양수인 • 대위변제자에게 이전할 여지\n\nX, 그러나\n\n피담보채권 확정되면 최고액 초과하지 않는 한 ‘근저당권’이나 ‘경락대금에 대한 권리’\n\n중 그 피담보채권액을 담보하고 남는 부분은 저당권의 일부이전 부기등기의 경료 여부\n와 관계없이 대위변제자에게 법률상 당연히 이전 O [20이다53929]\n-", "", [], 0, "채권소멸변제", 83, "미분류"],
  ["채권총론_P395", "2021다262189", "법정대위권자가 근저당권 피담보채무 일부를 대위변제한 경우 채권자", "[判例2024] 법정대위권자가 근저당권 피담보채무 일부를 대위변제한 경우 채권자\n가 대위변제자에 대해 가지는 우선변제권은 피담보채권액 한도로 보유 잔존 채권액\n\n전액에 o •- 이는 채무자에 대한 회생절차개시 전 채무자의 근저당권 피담보채무\n중 일부를 대위변제한 자와 채권자 사이도 마찬가지 O - 채무자 회생절차에서도\n채권자는 잔존 채권액 및 피담보채권액 한도에서 일부 대위변제자보다 우선하여\n\n회생담보권 행사 O, 일부 대위변제자는 후순위 회생담보권 [2021다262189]", "", [], 0, "채권소멸변제", 83, "미분류"],
  ["채권총론_P396", "2015다65042", "물상보증인의 면책은 피담보채무에 관한 물상보증인의 책임 소멸 의미, 채무", "[判例] 물상보증인의 면책은 피담보채무에 관한 물상보증인의 책임 소멸 의미, 채무\n자의 피담보채무 자체 소멸 의미\n\nx [2015다65042]", "", [], 0, "채권소멸변제", 84, "미분류"],
  ["채권총론_P397", "99다13669", "485조의 ‘담보’는 인적 •물적 담보 포함 O, 담보의 상실 • 감소의 예시는", "[判例] 485조의 ‘담보’는 인적 •물적 담보 포함 O, 담보의 상실 • 감소의 예시는\n보증채무 면제, 담보물권의 포기나 불리한 순위로의 변경, 담보물의 훼손 • 반환 등이\n\n모두 포함 O [99다13669]", "", [], 0, "채권소멸변제", 84, "미분류"],
  ["채권총론_P398", "2009다60527", "약정한 가등기담보권의 설정의 보전 • 집행 조치 취하지 않다가 제3자가 당해", "[判例] 약정한 가등기담보권의 설정의 보전 • 집행 조치 취하지 않다가 제3자가 당해\n\n부동산을 압류 • 가압류하여 권리 확보 못한 경우도 O [2009다60527]", "", [], 0, "채권소멸변제", 84, "미분류"],
  ["채권총론_P399", "2001다42677", "담보권 행사는 채권자의 선택이므로, 법정대위자가 있다고 하더라도 채권자가", "[判例] 담보권 행사는 채권자의 선택이므로, 법정대위자가 있다고 하더라도 채권자가\n\n자신의 채권이나 담보권을 성실히 행사할 의무 X, 채권 • 담보권의 불행사• 포기가 485\n\n조 면책이 적용되는 것은 별론으로 해도 불법행위는 X [2001다42677]", "", [], 0, "채권소멸변제", 84, "미분류"],
  ["채권총론_P400", "2017다261882", "그러나 채권자가 제3자에 대해 담보권 성실 보존•행사 의무 부담하는", "[判例2022] 그러나 채권자가 제3자에 대해 담보권 성실 보존•행사 의무 부담하는\n\n특별한 사정 있다면 담보권 포기 행위가 예외적 불법행위\n\nO\n\n물상보증인 甲, 채무자 江, 그 공유토지에 공동근저당권자 因 一 甲 지분 먼저 경매\n\n개시되어 경락인 완납 - 因이 江 지분의 근저당권등기 말소해줌 一 위 경매 배당절\n차에서 內의 신고채권액 전부 배당받는 배당표 작성 一 內은 甲에 대해 자신의 담보\n권 성실 보존• 행사할 의무 부담함에도 곧 변제자대위 대상이 될 채무자 지분의 근저\n\n당권설정등기 말소해준 저당권 포기행위는 750조 불법행위 O ••• 변제자대위로 취\n득한 권리 침해에 준함, 因에게 배당 이뤄지면 물상보증인 甲은 481조*2조 변제자\n\n대위 할 수 있는 정당한 기대 [2017다261882]\n\n正辯 : 공동저당과 485조 문제 정리 : ① 채무자 소유물 저당권 말소해주고 물보 소유물 경매되면", "", [], 0, "채권소멸변제", 84, "미분류"],
  ["채권총론_P401", "96다35774", "채권자가 일부 대위변제자에게 그 변제 비율을 넘어 근저당권 전부 이전해준", "[判例] 채권자가 일부 대위변제자에게 그 변제 비율을 넘어 근저당권 전부 이전해준\n경우, 다른 보증인은 보증채무 이행하면 저당권 실행으로 배당받을 수 있었던 금액\n\n범위에서 보증채무 면함 [96다35774]", "", [], 0, "채권소멸변제", 85, "미분류"],
  ["채권총론_P402", "2010다11651", "연대보증인 A의 변제 기타 출재로 공동면책 된 경우 그에게 자기 부담부분에", "[判例] 연대보증인 A의 변제 기타 출재로 공동면책 된 경우 그에게 자기 부담부분에\n관하여 상환하는 다른 연대보증인 B는 상환액을 다시 주채무자에 대하여 구상할 수\n\n있고 이 구상권 범위 내에서 공동면책시킨 연대보증인 A가 당초 채권자를 대위하여\n가지는 권리를 다시 대위취득 一 공동면책시킨 연대보증인 A가 주채무에 대한 담보\n를 상실 • 감소시키면 다른 연대보증인 B는 485조를 들어 상환받을 수 없는 한도 내\n\n에서 A에 대한 구상채무 면함 V 485조의 채권자는 당초 채권자뿐 아니라 장래 대위\n로 채권자로 되는 자 포함 O, 연대보증인 상호간에도 485조 ‘채권자’와 ‘법정대위할\n자’의 관계가 될 수 O [2010다11651]", "", [], 0, "채권소멸변제", 85, "미분류"],
  ["채권총론_P403", "2001다42677", "485조의 법정대위자 면책 여부는 담보가 상실•감소된 시점을 표준시점으로", "[判例] 485조의 법정대위자 면책 여부는 담보가 상실•감소된 시점을 표준시점으로\n\n— 그 이후 시점 고려\n\nX —> 제2근저당권 말소 당시 그 담보가치가 전혀 없었다면\n\n485조 적용 X [2001다42677]", "", [], 0, "채권소멸변제", 85, "미분류"],
  ["채권총론_P404", "2017다292756", "채무자 및 물상보증인 각 소유 부동산의 공동근저당권자가 채무자 소유 부동", "[判例] 채무자 및 물상보증인 각 소유 부동산의 공동근저당권자가 채무자 소유 부동\n\n산 담보를 상실 • 감소케 하면, 물상보증인은 그로 인해 상환받을 수 없는 한도에서\n면책 O （••• 물상보증인의 변제자대위 기대권은 485조로 보호되어야） —\n\n물보 소유 부동산 경매절차에서, 공동근저당권자는 위 물보의 면책 주장 한도에서\n물보 소유 부동산의 후순위 근저당권자에 우선하여 배당 X [2017다292756]\n\n正辯 : 결국 물보 소유 부동산 경매에서 위와 같은 점을 고려하지 않고 공동근저당권자에게 전액\n우선 배당된 것에 대하여 그 후순위저당권자는 배당이의 주장 o", "", [], 0, "채권소멸변제", 85, "미분류"],
  ["채권총론_P405", "2019다222041", "제3취득자가 목적부동산 권리 취득한 ‘후’ 채무 변제한 보증인은 대위", "[判例2020] 제3취득자가 목적부동산 권리 취득한 ‘후’ 채무 변제한 보증인은 대위\n의 부기등기 없이도 대위 O ••• 482조 2항 1호는 제3취득자를 예측 불허 손해로부터\n\n보호, 보증인 변제 전 권리 취득한 제3자는 등기부상 저당권 존재 알고 권리 취득하\n여 불측 손해 염려\n\nX [2019다222041]", "", [], 0, "채권소멸변제", 85, "미분류"],
  ["채권총론_P406", "2011다50233", "482조 2항에 ‘물상보증인’과 ‘제3취득자’ 상호간 변제자대위에 관하여", "[大判全合] 482조 2항에 ‘물상보증인’과 ‘제3취득자’ 상호간 변제자대위에 관하여\n\n규정 無.\n\n물상보증인이 채무 변제나 담보권 실행으로 소유권 잃은 때에는 보증인과\n\n마찬가지로 제3취득자에 대하여 구상권 범위 내 채권자를 대위 O, 그러나 제3취득자는\n채무 변제나 담보권 실행으로 소유권 잃더라도 물상보증인에 대하여 채권자를 대위\n\nX\n\nV 370조 .341 조는 물상보증인에게 보증인의 구상권 준용 인정, 482조 2항 5호는 보증\n인 •물상보증인을 인원수 비례로 대위하게 하여 우열 X, 만일 물상보증인 • 제3취득자\n\n상호간 각 부동산 가액 비례로 대위하게 하면 우연한 사정으로 뜻밖의 손해 • 이익을\n주어 부당, 482조 2항 1, 2호 [2011다50233]\n\n正辯 : 이 경우에도 물상보증인은 미리 대위의 부기등기 해두어야 제3취득자에 대하여 채권자를 대위 O\n\n-", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P407", "2012다48855", "저당 부동산에 대하여 후순위 저당권을 취득한 제3자는 제3취득자 X —‘ 보증", "[判例] 저당 부동산에 대하여 후순위 저당권을 취득한 제3자는 제3취득자 X —‘ 보증\n\n인은 미리 대위 부기 등기 없었어도 후순위 저당권자에 대하여 대위 O, 후순위 저당\n권자도 보증인에 대하여 대위 O V 저당부동산에 소유권 • 지상권 • 전세권을 취득한\n제3취득자는 364조, 367조 등 이 익 보호 규정 있으므로 482조 2항 1, 2호가 제3취득\n\n자보다 보증인을 보호한 취지 였는데, 후순위저당권자는 이익 보호 규정 無 [2012다48855]\n다만", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P408", "2011다30666", "는 예외적으로 선순위 저당권등기 ‘불법 말소’ 후 새로 저당권 취득한 자", "[判例]는 예외적으로 선순위 저당권등기 ‘불법 말소’ 후 새로 저당권 취득한 자\n는 제3취득자에 포함시키는 해석을 하였음 [2011다30666]", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P409", "2001다21854", "공동저당 목적 수인의 물상보증인 소유 부동산 중 일부 먼저 경매될 경우도,", "[判例] 공동저당 목적 수인의 물상보증인 소유 부동산 중 일부 먼저 경매될 경우도,\n채무자 및 물보 소유 사안에서 물보 소유 부동산 먼저 경매되어 물상보증인이 변제\n자대위권（481•482조） 취득하고 물보 소유 부동산 후순위 저당권자가 물상대위하는\n\n법리가 마찬가지로 적용 - 물상보증인들 사이 변제자대위 관계는 482조 2항 4호, 3\n\n호（부동산 가액 비례 대위） - 경매되지 않은 부동산의 1번 저당권등기에 대해서는\n말소청구 X [2001다21854]\n\n-", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P410", "2023다26642", "수인의 물상보증인 또는 그로부터 목적물 소유권 등 취득한 제3취득자", "[判例2024] 수인의 물상보증인 또는 그로부터 목적물 소유권 등 취득한 제3취득자\n중 1인이 채무 변제하거나 담보권 실행으로 소유권 잃으면 다른 물상보증인 또는\n\n그로부터의 제3취득자에 대해 구상권 범위 내에서 채권자를 대위하여 채권 및 그\n\n담보권 행사 O, 물상보증인 상호 간 대위 규정한 482조 2항 3호, 4호에 따라 각\n부동산 가액 비례 O ••• 481조, 482조 1항, 2항（3, 4호） 규정 종합 [2023다26642이\n\n正辯 : 법정대위자 상호간 관계에서 ‘제3취득자 from 물상보증인’의 지위는 ‘물상보증인’과 동일하\n게 보아야 하고, 482조 2항 1. 2호 등 제3취득자 규정은 대부분 ‘제3취득자 from 채무자’만을 의미\n\n한다는 설명（단. 미리 대위 부기 등기 필요하다는 점은 두 유형 공통임）이 이번 판례에서 직접적으", "", [], 0, "채권소멸변제", 86, "미분류"],
  ["채권총론_P411", "90다카10305", "공동저당에서 자기 소유 부동산이 먼저 경매된 물상보증인이 다른 부동산에", "[判例] 공동저당에서 자기 소유 부동산이 먼저 경매된 물상보증인이 다른 부동산에\n미리 대위의 부기등기를 하지 않은 사이에 제3취득자가 부동산을 취득하면 482조 2항\n\n5호 단서가 적용되어 대위 X [90다카10305]\n\n正辯 : 판례는 5호의 보증인에도 물상보증인을 포함시키는 해석을 하고 있음\n-", "", [], 0, "채권소멸변제", 87, "미분류"],
  ["채권총론_P412", "2007다61113", "보증인, 물상보증인이 여럿 있고 이 중 보증인 •물상보증인 지위를 겸하는 자", "[判例] 보증인, 물상보증인이 여럿 있고 이 중 보증인 •물상보증인 지위를 겸하는 자\n\n가 있는 경우 인원수 산정에 있어 1인으로 O ••• 482조 2항 4, 5호가 보증인과 물상보\n증인 상호간에는 자력이나 재산 가액 일체 고려하지 않고 형식적으로 인원수 비례 평\n\n등 대위를 규정한 것은 서로 성질이 달라 합리적 기준 결정 곤란하고 공평하고 간명\n한 법률관계 처리 위한 것이므로\n\n正辯 : 여기서 겸하는 자를 1 인으로 보더라도 그를 다시 물상보증인으로 볼 것인지（물상보증인설 :\n다시 재산 가액 비례）, 보증인으로 볼 것인지（보증인설 : 재산 가액 무관하게 인원수로 1：1 계산） 견\n\n해가 대립되나, 위 판례는 물상보증인 1인, 연대보증인 겸 물상보증인 3인이 있는 사안에서 모두\n\n1：1：1：1로 계산하여 보증인설을 취함\n한편 보증인과 물상보증인이 여럿 있는 경우 누구라도 위 방식으로 산정한 각자의\n부담 부분을 ‘넘는’ 대위변제 하지 않으면 다른 보증인 • 물상보증인 상대로 대위 X\n\n••• 미달한 대위변제자가 대위하게 하면 먼저 대위한 자의 부당한 이득 취득, 상호간 대\n\n위 계속 반복 우려 있어 5호의 취지에 반함 [2007다61113]\n\n-", "", [], 0, "채권소멸변제", 87, "미분류"],
  ["채권총론_P413", "2017다278187", "채무자 아닌 제3자인 위탁자가 채권자를 우선수익자로 부동산담보신탁", "[判例2022] 채무자 아닌 제3자인 위탁자가 채권자를 우선수익자로 부동산담보신탁\n한 경우에 채권자의 우선수익권이 481조, 482조 1항으로 보증채무 이행한 보증인이\n\n법정대위할 ‘담보에 관한 권리’에 해당한다고 하더라도, 우선수익권에 대한 보증인\n의 변제자대위는 보증인과 물상보증인 상호간 관계와 마찬가지로 인원수 비례 O,\n\n전액 X •/ 대위자 상호간 합리적 •통상적 기대에 부합, 482조 4호•5호가 자력 • 가액\n고려 없이 형식적 인원수 비례 평등하게 한 취지 [2017다278187]\n\n正辯 : 신탁법상 부동산 담보신탁에서 우선수익권은 금전채권과 독립한 별개 권리로 담보물권 X,\n제3자인 위탁자는 물상보증인 x — 단, 보증인이 우선수익권에 대하여 변제자대위를 할 경우는", "", [], 0, "채권소멸변제", 87, "미분류"],
  ["채권총론_P414", "86다카1755", "대물변제는 본래 채무 이행 갈음하여 다른 급여를 현실적으로 한 때 성립하는", "[判例] 대물변제는 본래 채무 이행 갈음하여 다른 급여를 현실적으로 한 때 성립하는\n요물계약, 다른 급여가 부동산 소유권이전이면 등기 완료되어야 대물변제 성립되어\n기존채무 소멸 一 대물변제계약 효력 발생 전에 채무 본지 따른 이행으로 기존채무\n\n소멸하고 나면, 대물변제 예약 당사자간 예약된 대물변제계약으로 소이등청구 X [86다카1755]", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P415", "2022다276789", "대물변제도 유상계약 O, 목적물에 흐＞자 있다면 매도인의 담보책임 규", "[判例2023] 대물변제도 유상계약 O, 목적물에 흐＞자 있다면 매도인의 담보책임 규\n정 준용 O [2022다276789]\n\n正辯 : 甲회사가 다세대주택 신축공사 전기공사를 己회사에 하도급 주면서 공사대금을 다세대주", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P416", "91다9503", "대물변제 하였으나 본래의 채무 부존재였다면 대물변제는 무효, 소유권이전", "[判例] 대물변제 하였으나 본래의 채무 부존재였다면 대물변제는 무효, 소유권이전\n효과생기지 x [91다9503]\n-", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P417", "95다25060", "기존 채무 이행에 관해 채무자가 채권자에게 어음 교부했다면 당사자 의사는", "[判例] 기존 채무 이행에 관해 채무자가 채권자에게 어음 교부했다면 당사자 의사는\n기존 원인채무의 @ ‘지급에 갈음하여’（기존 원인채무 소멸）, ® ‘지급을 위하여’, ©\n‘담보를 위하여’ — 특별한 의사표시 없으면 ‘지급을 위하여’나 ‘담보를 위하여’ 교부\n된 것 추정, 기존 원인채무 소멸 X, 어음상 채무와 병존 O [95다25060]", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P418", "95다13371", "채무자가 채권자에게 채무변제와 관련하여 다른 채권을 양도하는 것은 특단", "[判例] 채무자가 채권자에게 채무변제와 관련하여 다른 채권을 양도하는 것은 특단\n의 사정이 없는 한 채무변제를 위한 담보 또는 변제의 방법으로 양도되는 것으로 추\n\n정, 채무변제에 갈음한 것 X, 원래의 채권 소멸 X [95다13371]", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P419", "92다1988", "채무 관련하여 채무자 소유 부동산이 채권자 앞으로 소유권이전등기 마쳐진 경", "[判例] 채무 관련하여 채무자 소유 부동산이 채권자 앞으로 소유권이전등기 마쳐진 경\n\n우, 대물변제조로 이전된 것인지 담보를 위한 것（양도담보）인지 당사자 의사해석 문제\n\n이나, 담보 목적임을 주장하는 측에 입증책임 [92다1988이\n\n正辯 : 소유권이전등기는 ‘대물변제’로 추정한다는 취지로 보이며. 다만 본 사안은 채무가 3.000만\n원임에 비하여 등기를 마친 부동산의 총 시가가 2억 원이 넘는 상황이어서 대물변제가 아닌 양도\n담보로 보았음", "", [], 0, "채권소멸기타", 88, "미분류"],
  ["채권총론_P420", "98다5122", "607, 608조 위반하면 대물변제 예약으로서는 무효", "[判例] 607, 608조 위반하면 대물변제 예약으로서는 무효\n\n이나, ‘약한 의미의 양도담보’ 설정 약정으로는 유효, 채권자는 양도담보 약정을 원\n인으로 소유권이전등기청구 O, 아직 등기 마치지 않았다면 가담법은 적용 X [98다5122이 羊 가담법\n（준）소비대차로 인한 채무일 것（=가담법） 一 매매 등 대금채무 담보라면 적용 X\n\n2. 공탁（제487조）\n— 변제공탁의 원인 : ① 채권자가 변제 받지 않거나 받을 수 없는 때, ② 변제자가 과실\n\n없이 채권자를 알 수 없는 때 ex 동일 채권에 채권양도• 가압류 • 압류가 동시에 도\n달한 경우,\n\n채권양도금지특약에 위반한 채권양도", "", ["제487조"], 0, "채권소멸기타", 89, "미분류"],
  ["채권총론_P421", "2000다55904", "487조 후단 채권자 불확지의 ‘과실 없이 채권자 알 수 없는 경우’는 객관적", "[判例] 487조 후단 채권자 불확지의 ‘과실 없이 채권자 알 수 없는 경우’는 객관적\n으로 채권자• 변제수령권자 존재하나 채무자가 선량한 관리자 주의 다해도 채권자\n\n가 누구인지 알 수 없는 경우 一 채권양도금지특약이 붙은 채권이 양도된 경우 O\n\nV 양수인의 선악의 • 중과실 등에 따라 채권양도 효력 좌우 [2000다55904]", "", [], 0, "채권소멸기타", 89, "미분류"],
  ["채권총론_P422", "93다42276", "채권자 태도로 보아 채무자가 설사 채무 이행제공 했더라도 수령 거절했을", "[判例] 채권자 태도로 보아 채무자가 설사 채무 이행제공 했더라도 수령 거절했을\n것이 명백한 경우, 채무자는 이행제공 없이 바로 변제공탁 O [93다42276]\n\n正辯 : 영구적 불수령의 경우 변제제공 없이도 채무불이행 면츠取460조）, 곧바로 공탁（487조） 가능,\n그러나 변제제공 하지 않은 상태에서 이후 쌍방 귀책사유 없이 불능이 된 경우 반대급부청구（538\n\n조 1항 2문）는 불가", "", [], 0, "채권소멸기타", 89, "미분류"],
  ["채권총론_P423", "2014다4207245", "공탁은 현존 확정채무여야, 장래 채무 X, 불확정채무 X [2014다4207245]", "[判例] 공탁은 현존 확정채무여야, 장래 채무 X, 불확정채무 X [2014다4207245]\n\n正辯 : 일부공탁이 무효임을 생각하면 금액도 확정되지 않은 채무가 공탁 불허됨은 당연\n-", "", [], 0, "채권소멸기타", 89, "미분류"],
  ["채권총론_P424", "2005다37208", "= 일부공탁 X — 전부무효 O, 채무 일부소멸 효과도 없음 [2005다37208] —", "[判例] = 일부공탁 X — 전부무효 O, 채무 일부소멸 효과도 없음 [2005다37208] —", "", [], 0, "채권소멸기타", 89, "미분류"],
  ["채권총론_P425", "83다카88", "그러나 금액 다툼 있는 채권에 대하여 채무자가 전액임을 밝히고", "[判例] 그러나 금액 다툼 있는 채권에 대하여 채무자가 전액임을 밝히고\n공탁했는데 채권자가 일부로서 수령한다는 명시 •묵시적 유보 의사표시 없이 수령했\n다면 전부공탁 효력 O, 채무 전부소멸 O [83다카88]", "", [], 0, "채권소멸기타", 89, "미분류"],
  ["채권총론_P426", "2020다239366", "일부만 변제공탁 했으나 그 후 부족분을 추가로 공탁하면 그때부터는", "[判例2022] 일부만 변제공탁 했으나 그 후 부족분을 추가로 공탁하면 그때부터는\n\n모든 채무액에 유효한 공탁 O [2020다239366]", "", [], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P427", "91다27594", "건물인도와 동시이행관계인 임차보증금의 변제공탁을 하면서 건물 인도했", "[判例] 건물인도와 동시이행관계인 임차보증금의 변제공탁을 하면서 건물 인도했\n다는 확인서 첨부를 반대급부조건으로 붙이면 변제공탁은 변제 효력\n\nx ••• 인도의\n\n선이행을 조건으로 하였으므로 [91다27594]\n\n-", "", [], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P428", "2014다29971", "수인의 공탁자가 공탁하면서 각자의 공탁금액을 나누어 기재하지 않고 공동", "[判例] 수인의 공탁자가 공탁하면서 각자의 공탁금액을 나누어 기재하지 않고 공동\n으로 하나의 공탁금액 기재한 경우 공탁자들은 균등 비율로 공탁한 것, 그들 내부 실\n\n질적 분담금액 달라도 그것은 내부 문제 V 공탁의 내용은 공탁의 기재에 의하여 형\n식적으로 결정 [2014다29971]\n\n—", "", [], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P429", "2018마5697", "변제공탁 적법하면 채권자 출급 여부 관계없이 공탁한 때 변제 효력 발", "[判例2020] 변제공탁 적법하면 채권자 출급 여부 관계없이 공탁한 때 변제 효력 발\n생 一 그러나 제3자（피공탁자 포함）가 공탁자에 대해 가지는 별도 채권의 집행권원\n\n으로써 공탁자의 공탁물 회수청구권에 대해 압류•추심명령 받아 그 집행으로 공탁\n물 회수하면 채권소멸 효력은 소급하여 없어짐\n\n부적법 변제공탁으로 변제 효력 발생 않았더라도 피공탁자는 수락하여 출급청구 하는\n대신 공탁자에 대한 다른 채권에 기해 공탁자의 회수청구권에 압류•추심명령 받아\n그 집행으로 공탁물 회수 O\n\n출급청구권에 대한 압류는 회수청구권에 아무런 영향 x\n\n••• 공탁물 ‘출급청구권’과\n\n‘회수청구권’은 서로 독립한 별개 청구권 [2018마5697]\n\n-", "", [], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P430", "2012다52526", "공탁은 반드시 법령에 근거해야 하고, 집행법상 집행공탁 요건 구비 여부를", "[判例] 공탁은 반드시 법령에 근거해야 하고, 집행법상 집행공탁 요건 구비 여부를\n불문하고 당사자의 ‘약정’에 기한 공탁청구는 불허 [2012다52526]\n-", "", [], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P431", "96다2583", "변제공탁 및 집행공탁 사유가 모두 있는 공탁을 하였다면 변제공탁 관련 채", "[判例] 변제공탁 및 집행공탁 사유가 모두 있는 공탁을 하였다면 변제공탁 관련 채\n\n권양수인에 대해서는 ‘변제공탁’으로서, 집행공탁에 관련된 압류채권자에 대해서는\n‘집행공탁’으로서 각 효력 O [96다2583]", "", [], 0, "채권소멸기타", 90, "미분류"],
  ["채권총론_P432", "96다16612", "채권양도인지 경개인지 불분명한 경우 채권양도로 [96다16612]", "[判例] 채권양도인지 경개인지 불분명한 경우 채권양도로 [96다16612]", "", [], 0, "채권소멸기타", 91, "미분류"],
  ["채권총론_P433", "2002다31803", "준소비대차인지 경개인지 불분명한 경우 준소비대차로 [2002다31803]", "[判例] 준소비대차인지 경개인지 불분명한 경우 준소비대차로 [2002다31803]", "", [], 0, "채권소멸기타", 91, "미분류"],
  ["채권총론_P434", "2002다62333", "경개계약은 신채권 성립, 구채권 소멸시키는 처분행위 - 신채권 성립되면", "[判例] 경개계약은 신채권 성립, 구채권 소멸시키는 처분행위 - 신채권 성립되면\n효과 완결, 경개계약 자체 이행 문제 발생 X — 신채무 불이행을 이유로 경개계약\n\n해제 X — 그러나 경개계약 성립 후 당사자 사이 합의해제 O ••• 계약자유 [2002다62333]", "", [], 0, "채권소멸기타", 91, "미분류"],
  ["채권총론_P435", "2011다59445", "증여받은 자가 소이등 않던 중 소유자 사망으로 상속 개시된 후 점유자 취", "[判例] 증여받은 자가 소이등 않던 중 소유자 사망으로 상속 개시된 후 점유자 취\n득시효 완성 一 점유자는 상속인들에 대해 각 상속지분 따라 취득시효 완성 원인\n소이등청구권 취득 一 그러나 취득시효 완성 후 수증자 앞으로 증여 원인 소이등\n되면 완성 후 새로운 이해관계인 O —> 다만 수증자가 상속인 중 1인이라면, 그의\n\n피상속인에 대한 증여 원인 소이등청구권은 상속지분 범위에서 상속 의한 혼동으\n\n로 소멸, 점유자에 대해 취득시효 완성 원인 소이등의무 부담 一 그 상속인이 부동\n\n산 전체 증여 원인 소이등 마쳤더라도 적어도 자기 상속지분 범위 내에서는 새로\n운 이해관계인 X, 점유자에 대해 취시 소이등의무 부담 [2011다59445]", "", [], 0, "채권소멸기타", 91, "미분류"],
  ["채권총론_P436", "2019다272855", "지명채권 양수인이 ‘양도되는 채권의 채무자’인 경우 채권양도에 따른 처", "[判例2022] 지명채권 양수인이 ‘양도되는 채권의 채무자’인 경우 채권양도에 따른 처\n분행위 시에 507조 본문에 따라 채권이 혼동으로 소멸함 [2019다272855]\n-", "", [], 0, "채권소멸기타", 92, "미분류"],
  ["채권총론_P437", "2000다41653", "자동차 운행 교통사고와 상속 사안의 혼동 여부", "[判例] 자동차 운행 교통사고와 상속 사안의 혼동 여부\n자동차 운행 중 교통사고로 운행자나 동승한 친족이 사망하여 자배법 3조에 의한\n\n손해배상채권과 채무가 상속으로 동일인에게 귀속된 경우에 피해자의 보험회사\n에 대한 직접청구권의 전제인 자배법 3조 피해자의 운행자에 대한 손해배상청구권은\n\n상속에 의한 혼동에 의해 소멸되지 X ••• 피해자에게 책임보험 혜택 부여하여 보호할\n\n사회적 필요성 동일, 보험자는 이미 보험료를 받았고 혼동이라는 자신과 무관한\n우연한 사정으로 보상책임 면할 합리적 이유 無 / But 가해자가 피해자의 상속인이\n\n되는 등 특별한 경우에는 피해자의 상속인에 대한 손해배상청구권은 혼동으로 소멸 O\n\n[93448373, 2000다41653] — 운행자 父의 차량을 가해자 母가 운전하다가 동승한\n피해자 子가 사망한 경우, 父가 子로부터 상속한 직접청구권을 보험회사에 대하여 행\n\n사하는 것은 O（v 운행자책임과는 혼동으로 소멸 X）, 그러나 母는 상속한 子의 직접\n청구", "", [], 0, "채권소멸기타", 92, "미분류"],
  ["채권총론_P438", "", "유사한 사안에서 母가 ‘상속을 포기’한 경우에는 신의칙에 반한다 할 수 없고,", "[判例] 유사한 사안에서 母가 ‘상속을 포기’한 경우에는 신의칙에 반한다 할 수 없고,\n결국 父는 보험회사에 대하여 子의 직접청구권 전부를 행사 o ••• 상속포기는 소급효\n\n있으므로 소급하여 소멸하지 않았던 것으로, ‘가해자가 피해자의 상속인이 되는 등\n특별한 경우’에 해당하지 않는 것으로 되므로\n\n제5절 상계\n\n싸 상계 슈\n\n1 .서설\n— 채무자의 단독행위.\n\n조건 • 기한 X. 수동채권의 존재 자체가 담보적 기능\n\n‘상계계약’은 상계금지사유 등 요건 적용 X （당사자 합의로 결정）\n\n-", "", [], 0, "채권소멸기타", 92, "미분류"],
  ["채권총론_P439", "2017다225978", "상계계약은 당사자 사이 서로 대립하는 채권 유효 존재 전제로 서로 채무", "[判例] 상계계약은 당사자 사이 서로 대립하는 채권 유효 존재 전제로 서로 채무\n\n를 대등액 또는 대등 평가액에 관해 면제시키는 계약 一 두 채권의 소멸은 서로 인과\n\n관계 一 한쪽 채권 불성립. 무효로서 그 면제 무효라면 상대방의 면제도 당연 무효\n— 상대방 채권 유효 존재하는 한 그 채무자는 이행의무 0, 이행하지 않고 있더라\n도 법률상 원인 없이 채무 면하는 이익 얻은 것은 X —‘ 그러나 상대방 채권도 불성\n립 •무효로서 역시 그 면제가 무효라면 채무자는 이행의무 X, 채무 면하는 이익\n\nX\n\n[2017다225978]\n—", "", [], 0, "상계", 93, "미분류"],
  ["채권총론_P440", "2024다227699", "복수 채권• 채무 상호 정산을 내용으로 하는 채권소멸 원인이라는 점에", "[判例2024] 복수 채권• 채무 상호 정산을 내용으로 하는 채권소멸 원인이라는 점에\n서 ‘공제’와 ‘상계’는 유사 一 그러나 공제는 상계적상, 상계금지 • 제한, 상계 기판력\n\n등 상계 법률 규정이 원칙적으로 적용되지 않는 점, 임대차관계 등 특정 법률관계에\n서는 일정 사유가 발생하면 원칙적 공제 의사표시 없이도 당연히 공제 이뤄진다고\n\n보는 점 등에서 상계와 구별, 제3자에 우선하여 채권 실질적 만족 얻게 하는 점에서\n상계보다 강한 담보적 효력 ■— 공제 •상계 요건 설정, 시점, 의사표시 요부 등은 자유\n\n롭게 약정 O [2024다227699]", "", [], 0, "상계", 93, "미분류"],
  ["채권총론_P441", "2022다254154", "상속채권자가 상속인에 대해 채무 부담하는데 상속 개시되면 상계적상 O", "[判例2022] 상속채권자가 상속인에 대해 채무 부담하는데 상속 개시되면 상계적상 O\n— 한정승인 하면 상속개시된 때부터 상속재산과 고유재산 분리되므로（1031조） 상속\n채권자의 피상속인에 대한 채권과 상속인에 대한 채무 사이 상계는 제3자의 상계로\n서 상계 X — 상계 후 한정승인 있으면 상계는 소급하여 효력 상실, 자동채권 및\n\n수동채권 부활 [2022다254154]\n\n正辯 : 한정승인은 상속포기와 달리 권리 의무 자체는 포괄적 승계하지만（주의） 한정승인 제도의\n상속재산 •고유재산 분리 취지를 고려하여 상계를 불허한 것이고. ‘자동채권의 예외’ 부정한 것\n-", "", [], 0, "상계", 94, "미분류"],
  ["채권총론_P442", "2022다218271", "국세징수법에 의한 채권압류 후 압류채권자는 피압류채권을 자동채권", "[判例2022] 국세징수법에 의한 채권압류 후 압류채권자는 피압류채권을 자동채권\n\n으로 제3채무자의 압류채권자에 대한 채권과 상계 X, 이중압류.배분요구 등 없더\n라도 마찬가지 V 법률규정 등 특별한 사정 없는 한 자동채권은 상계자가 상대방에\n\n대해 가지는 채권이어야（제3자가 상대방에 대해 가지는 채권은 X）, 압류채권자는\n\n추심권 취득할 뿐 피압류채권이 압류채권자에게 이전 • 귀속되지 않으므로 이는 압류\n\n채권자가 제3채무자에 대해 가지는 채권 X, 상계적상 X [2022다218271]\n\n正辯 : 자동채권의 예외는 규정이 있어야 인정되기 때문. 본 판결은 체납처분압류 사안이지만 통상\n의 압류 및 ‘추심명령’의 경우도 같은 논리가 적용되어 추심채권자가 피압류채권으로 제3채무자의", "", [], 0, "상계", 94, "미분류"],
  ["채권총론_P443", "2010다101394", "유치권자 있는 아파트의 경락인은 유치권자에 대한 차임 상당 부당이득반환", "[判例] 유치권자 있는 아파트의 경락인은 유치권자에 대한 차임 상당 부당이득반환\n\n채권을 자동채권으로 하고 유치권자의 종전 소유자에 대한 유익비상환채권（피담보\n\n채권）을 수동채권으로 하여 상계 X V 수동채권으로 상대방의 상계자에 대한 채권\n이 아닌 제3자에 대한 채권을 허용하면 상대방이 제3자로부터 현실급부 받을 이익\n\n침해, 상계자만 독점 만족을 주어 부당 [2010다101394]\n\n正辯 : 요건을 ‘자동채권의 변제기가 도래할 것’으로 쓰지 않을 것을 권함", "", [], 0, "상계", 94, "미분류"],
  ["채권총론_P444", "2015다252501", "임대차보증금반환채무는 임대차계약종료시점에 이행기 도달, 임대인은 임대차계", "[判例] 임대차보증금반환채무는 임대차계약종료시점에 이행기 도달, 임대인은 임대차계\n\n약 존속 중 그 기한 이 익 포기하고 차임채권 등과 상계 O [2015다252501]\n—", "", [], 0, "상계", 95, "미분류"],
  ["채권총론_P445", "67다1166", "이행기 정함 없는 채권（부당이득반환채권）은 그 성립과 동시에 이행기", "[判例2022] 이행기 정함 없는 채권（부당이득반환채권）은 그 성립과 동시에 이행기\n\n- 채권 성립 일에 상계적상의 ‘이행기’ 도래한 것 [67다1166, 2021 다287515]\n\n-", "", [], 0, "상계", 95, "미분류"],
  ["채권총론_P446", "81다카10", "492조 1항 ‘이행기가 도래한 때’라 함은 이행지체 의미 X [81다카10]", "[判例] 492조 1항 ‘이행기가 도래한 때’라 함은 이행지체 의미 X [81다카10]", "", [], 0, "상계", 95, "미분류"],
  ["채권총론_P447", "2001다81245", "수탁보증인은 W조 사전구상권을 자동채권으로 상계 X V 사전구상권에는", "[判例] 수탁보증인은 W조 사전구상권을 자동채권으로 상계 X V 사전구상권에는\n주채무자의 443조 면책청구권이 항변권으로 부착 [2001다81245]", "", [], 0, "상계", 95, "미분류"],
  ["채권총론_P448", "93다52808", "496조를 ‘중과실’ 불법행위 손해배상채권에 유추•확장 적용 X V 496조 입법", "[判例] 496조를 ‘중과실’ 불법행위 손해배상채권에 유추•확장 적용 X V 496조 입법\n취지는 사회적 정의관념 , 상계 허용하면 보복적 불법행위 유발 우려, 피해자가 현실\n\n변제 받도록 하려는 것이므로 대법원 [93다52808]\n—", "", [], 0, "상계", 95, "미분류"],
  ["채권총론_P449", "2001다52506; 2014다19783", "부당이득의 원인이 고의 불법행위에 기인, 불법행위로 인한 손해배상채권과", "[判例] 부당이득의 원인이 고의 불법행위에 기인, 불법행위로 인한 손해배상채권과\n부당이 득반환채권이 경합한 경우, 피해자가 부당이 득반환채권만 청구한 경우에도\n\n496조 유추적용 O, 수익자（가해자）의 상계 X ■■• 청구의 실질적 이유는 고의 불법\n행위, 손해배상채권이 현실적 만족 받아야 한다는 취지 동일 [2001다52506]\n\n[判例」] 496조는 고의의 불법행위에 적용, 고의 채무불이행에는 적용 X — 그러나 고\n의 행위가 불법행위 및 채무불이행을 구성하여 양 손해배상채권이 경합한 경우는 고\n의 채무불이행으로 인한 손해배상채권을 수동채권으로 해도 유추적용 O, 채무자의\n\n상계 X V 손해배상채권이 현실적 만족 받아야 하는 취지 동일 [2014다19783]\n\n正辯 : 상계금지사유 예외로 작용함", "", [], 0, "상계", 95, "미분류"],
  ["채권총론_P450", "2024다204696", "상대방 기망으로 소비대차계약 체결한 자가 불법행위 손해배상청구 하", "[判例2024] 상대방 기망으로 소비대차계약 체결한 자가 불법행위 손해배상청구 하\n지 않고 계약상 채권 따른 대여금•이자 지급 구하면 4%조 유추적용 X V 계약상\n\n채권은 기망행위 아닌 쌍방 계약 기초 발생 권리로서 급부이행이 지향하는 경제적\n이익이 불법행위 손해배상채권과 달라 양자 경합 X, 496조 취지（보복적 불법행위\n\n지양, 피해자 현실 변제받도록, 고의 불법행위자 제재로 발생 억지, 사회적 정의 관\n념）, 실질적 고의 불법행위 채권과 마찬가지로 볼 수 X [2024다204696]\n\n正辯 : ‘유추적용’은 법적 규율 없는 사안에 유사한 사안 법규범 적용하는 것이어서 사안 사이에 공\n통점•유사점 있어야 하나 이것만으로 유추적용 X. 법규범 체계와 입법 의도•목적에 비추어 유추\n적용 정당하다고 평가되는 경우에 비로소 유추적용 O\n\n-", "", [], 0, "상계", 96, "미분류"],
  ["채권총론_P451", "2011다898", "고의 불법행위로 인한 손해배상채권이 양도되어도 채무자는 양수인에 대하여", "[判例] 고의 불법행위로 인한 손해배상채권이 양도되어도 채무자는 양수인에 대하여\n상계로 대항 X（496조, 451조 2항）, 그러나 채권양도가 사해행위 해당하면 불법행\n\n위 손해배상채권의 채무자（가해자）도 양도인에 대한 별도의 채권자 지위에서 양수인\n에 대하여 채권자취소권 행사 O, 사해행위 취소 및 직접 가액배상 O, 이것 자체는\n\n496조 취지 반하지 X [2011다898이\n\n正辯 : 채권양수인（수익자）이 이미 양수금채권을 집행하여 채무자（불법행위자）의 특정 채권을 압\n류•추심하여 추심을 받았기에, 채무자가 별도 채권을 보전하기 위해 채권양도를 사해행위로 취소\n하면서 양수인（수익자）로부터 직접 가액배상（원물반환 불능）을 받았던 사건\n\n-", "", [], 0, "상계", 96, "미분류"],
  ["채권총론_P452", "2004다63019", "피용자의 고의 불법행위로 인하여 사용자책임 성립하는 경우 사용자에게도", "[判例] 피용자의 고의 불법행위로 인하여 사용자책임 성립하는 경우 사용자에게도\n\n4%조 적용 O, 사용자도 상계 X V 756조 사용자책임은 대체적 책임, 단서를 봐도\n사용자의 과실은 직접 가해행위 아닌 선임 • 감독 관련 과실 [2004다63019]\n\n正辯 : 피용자가 피해자의 부주의 이용한 고의 불법행위한 경우, 사용자의 ‘과실상계’ 주장을 허용\n하는 법리와 구별해야 함", "", [], 0, "상계", 96, "미분류"],
  ["채권총론_P453", "2015다51968", "이사• 대표이사의 보수청구권 • 퇴직연금채권은 합리적 범위 내의 것만 상계", "[判例] 이사• 대표이사의 보수청구권 • 퇴직연금채권은 합리적 범위 내의 것만 상계\n\n금지 [2015다51968]", "", [], 0, "상계", 96, "미분류"],
  ["채권총론_P454", "82다카200", "가압류명령 받은 제3채무자가 가압류채무자에 대한 반대채권을 가지고", "[大判全合] 가압류명령 받은 제3채무자가 가압류채무자에 대한 반대채권을 가지고\n\n있는 경우 상계로써 가압류채권자에게 대항하려면, “® 가압류 효력 발생 당시에 양\n\n채권이 상계적상 있거나, ® 당시 자동채권이 변제기에 이르지 않았다면 수동채권\n\n（피압류채권）의 변제기와 동시에 또는 보다 먼저 변제기 도달하는 경우여야” [82다카200, 2011 다45521] —소위 ‘변제기 선도래설’\n\n正辯 : 판례는 결국 지급금지명령 송달 당시까지 자동채권 변제기가 반드시 도래할 필요는 없다\n는 취지임. 관련하여 ① 송달 당시 자동채권 변제기가 이미 도래한 상태였다면 변제기를 비교할 필", "", [], 0, "상계", 97, "미분류"],
  ["채권총론_P455", "2017다274703", "수탁보증인에게 （면책행위로） 사후구상권 발생한 후에도 사전구상권은 소멸", "[判例] 수탁보증인에게 （면책행위로） 사후구상권 발생한 후에도 사전구상권은 소멸\n하지 않고 병존 （목적달성으로 일방 소멸하면 타방 소멸하는 관계）\n수탁보증인의 주채무자에 대한 사전구상권（442조）에는 담보제공청구권（443조）이 항\n\n변권으로 부착되어 있으므로 이를 자동채권으로 상계 원칙적 불허\n제3채무자（수탁보증인）가 압류채무자에 대한 사전구상권을 가지고 있는 경우에\n상계로써 압류채권자에게 대항하려면, ① 압류 효력 발생 당시 사전구상권에 부착된\n\n담보제공청구 항변권이 소멸（=보증채무 변제）하여 피압류채권과 상계적상에 있거\n나, ② 압류 당시 여전히 사전구상권에 항변권이 부착돼 있다면 제3채무자의 면책행\n위 등으로 항변권 소멸시켜 사전구상권을 통한 상계가 가능하게 된 시점이 피압류채\n\n권의 변제기보다 먼저 도래해야 [2017다274703]\n\n正辯 : 498조에 관한 기존 판례 법리（변제기 선도래설）가 채권압류명령 받은 제3채무자 겸 보증인", "", [], 0, "상계", 97, "미분류"],
  ["채권총론_P456", "2000다43819", "금전채권에 대한 가압류가 본압류로 전이하는 압류•추심명령 있는 때에는", "[判例] 금전채권에 대한 가압류가 본압류로 전이하는 압류•추심명령 있는 때에는\n\n제3채무자는 채권 가압류 전에 압류채무자에게 대항할 수 있는 사유로 압류채권자\n\n에게 대항 O - 제3채무자의 압류채무자에 대한 자동채권이 수동채권（피압류채권）과\n서로 동시이행 관계면 가압류명령 송달（=가압류 효력 발생） 이후 생긴 자동채권이어\n\n도 제3채무자는 동시이행 항변 O - 그 상계로써 압류채권자에게 대항 O\n••• 이 경우 “자동채권 발생 기초 원인은 수동채권 가압류 전에 이미 성립 •존재하\n\n고 있었으므로, 그 자동채권은 498조의 ‘지급금지명령을 받은 후에 취득한 채권’ X”\n\nPART 1\n\n채권총론 • 상계 • 97\n\n[2000다43819]", "", [], 0, "상계", 97, "미분류"],
  ["채권총론_P457", "2007다35152", "도급인 소유 토지에 수급인 자금 대출받도록 근저당권설정 했다가 도급인이", "[判例] 도급인 소유 토지에 수급인 자금 대출받도록 근저당권설정 했다가 도급인이\n대신 변제하여 발생한 구상금채권도 그 발생 전 가압류된 공사대금채권과 “고유한\n대가관계 아니나 이행상 견련관계” — 도급인 동이항 O, 상계 O [2007다35152]", "", [], 0, "상계", 98, "미분류"],
  ["채권총론_P458", "2000다50596", "채권의 일부양도 있으면 각 분할된 부분에 독립한 분할채권 성립 一 채무자", "[判例] 채권의 일부양도 있으면 각 분할된 부분에 독립한 분할채권 성립 一 채무자\n\n는 양도인에 대한 반대채권으로 양도인을 비롯한 각 분할채권자 누구든 상대방으로\n삼아 상계 o — 분할채권자인 양수인이 대항요건을 갖추었다고 하더라도 다른 부분\n에 먼저 상계 혹은 비율에 따라 상계되어야 한다는 이의 X [2000다50596]\n\n正辯 : 채권의 일부에 압류 • 전부명령 있는 경우에도 동일한 판례 있음", "", [], 0, "상계", 98, "미분류"],
  ["채권총론_P459", "2005다8125", "상계적상 시점까지 수동채권의 약정이자 • 지연손해금 계산하여 자동채권으로써", "[判例] 상계적상 시점까지 수동채권의 약정이자 • 지연손해금 계산하여 자동채권으로써\n\n먼저 수동채권의 약정이자 • 지 연손해금 소각하고 잔액으로 원본 소각 [2005다8125]", "", [], 0, "상계", 98, "미분류"],
  ["채권총론_P460", "2024다317332", "상계의 소급효（493조 2항）는 양 채권 및 이자• 지연손해금 정산 기준시기", "[判例2025] 상계의 소급효（493조 2항）는 양 채권 및 이자• 지연손해금 정산 기준시기\n\n를 소급하는 것일 뿐, 상계 의사표시 전 이미 발생한 사실 복멸시키지\nX\n\n임차인의 부속물매수청구 후에 임대인의 상계로 부속물매 매대금채권이 상계적상일\n（부속물매매대금채권의 발생일）로 소급하여 소멸하더라도 상계적상 시점부터 부속물\n\n매매대금채무와 동시이행관계 소멸하여 임차인이 이행지체 •불법점유로 되는 것은 X\n\n[2024다317332]\n\n正辯 : 임대차 단원에서 추가 서술하는 내용 참조\n\n-", "", [], 0, "상계", 98, "미분류"],
  ["채권총론_P461", "2022다200089", "채권양수인이 양수채권을 자동채권으로 채무자가 채권양수인에 대해", "[判例2022] 채권양수인이 양수채권을 자동채권으로 채무자가 채권양수인에 대해\n가진 기존 채권과 상계한 경우, 상계적상일은 채권양도 전에 이미 도래한 양 채권\n의 변제기\n\nX, 채권양도 대항요건 갖춘 시점 O ••• 493조 2항 ‘각 채무가 상계할\n\n수 있는 때’에 비추어 상계적상은 자동채권과 수동채권이 상호 대립하는 때에 비로\n소 발생, 채권양수인은 채권양도 대항요건이 갖춰진 때 비로소 자동채권 행사 가능\n\n[2022다200089]\n\n正辯 : 채권양도 아닌 전부명령이었다면 제3채무자 송달일이 상계적상일（私見）. 한편 본 판결 사안\n은 기존의 ‘채권양도와 상계（451조 2항）’ 논의와 명백히 다름에 유의", "", [], 0, "상계", 99, "미분류"],
  ["채권총론_P462", "2011다24814", "자동채권이 여러 개이고 수동채권 원리금이 자동채권 원리금 합계에 못 미칠", "[判例] 자동채권이 여러 개이고 수동채권 원리금이 자동채권 원리금 합계에 못 미칠\n경우, 우선 자동채권의 채권자（=상계자, ‘채무자’）가 상계 대상인 자동채권을 지정\n\n— 다음으로 자동채권의 채무자（=피상계자, ‘채권자’）가 지정 一 모두 지정하지 않으\n면 법정충당 [2011다24814]", "", [], 0, "상계", 99, "미분류"],
  ["채권총론_P463", "2018다25946", "492조 1항 ‘채무 이행기 도래한 때’는 채권자가 청구를 할 수 있는 시기", "[判例2021] 492조 1항 ‘채무 이행기 도래한 때’는 채권자가 청구를 할 수 있는 시기\n도래했음 의미 O, 채무자 이행지체에 빠지는 시기\n\nX [2018다25946]\n\n正辯 : 매매대금반환채권에 압류• 전부명령 받은 후 전부금 지급 구하자 제3채무자（매도인）가 사용\n\n正辯 : 임대차 단원에서 추가 서술하는 내용 참조", "", [], 0, "상계", 99, "미분류"],
  ["채권총론_P464", "2018다255648", "BD 매도인 •수급인의 담보책임 기초한 매수인 •도급인의 손해배상채권이", "[判例] BD 매도인 •수급인의 담보책임 기초한 매수인 •도급인의 손해배상채권이\n제척기간 지난 경우도 495조 유추적용 O — 매수인•도급인은 제척기간 경과 전에\n\n상대방 채권과 상계할 수 있었다면 제척기간 경과 후에도 상계 O V 당사자들이 채\n권 • 채무 정산을 기대한 신뢰보호 필요는 소멸시효와 동일 [2018다255648]", "", [], 0, "상계", 100, "미분류"],
  ["채권총론_P465", "2016다211309,2024다302217", "임대차보증금반환채무는 임대차계약 종료된 때 이행기 도달 一 임대차", "[判例2025] 임대차보증금반환채무는 임대차계약 종료된 때 이행기 도달 一 임대차\n존속 중 차임채권 소멸시효 완성된 경우, 시효완성 전 임대인이 보증금반환채권의\n\n기한 이익 실제로 포기했다는 등 특별한 사정 없는 한 상계적상 X — 임대인은 495조\n\n의한 상계 X — 다만, “495조 유추적용 의한 공제 O” ••' 임대인 신뢰, 임차인 묵시\n의사 [2016다211309, 2024다302217]\n\n正辯 : 2025년 판례는 기존 법리 재확인 후 원심이 임대인 ‘상계’ 주장을 불허하면서도 ‘공제’ 여부\n를 판단하지 않은 것을 위법으로 봄 一 상계와 공제는 다르지만 유사성에 비추어 당사자의 ‘상계’", "", [], 0, "상계", 100, "미분류"],
  ["채권총론_P466", "2017다258787", "@0 유익비상환채권은 임대차계약 종료한 때 비로소 발생 一 임대차 존", "[判例2021] @0 유익비상환채권은 임대차계약 종료한 때 비로소 발생 一 임대차 존\n속 중 임대인 구상금채권（약정상 임차인이 내기로 한 공과금을 임대인이 대신 납부）\n\n소멸시효 완성된 경우, 구상금채권과 유익비상환채권은 상계적상 X - 임대인은\n\n495조 의한상계 X [2017다258787]\n\n正辯 : 판례는 495조의 ‘상계적상’ 판단에 있어 시효소멸 당시 자동채권뿐 아니라 수동채권도 변제", "", [], 0, "상계", 100, "미분류"],
  ["채권총론_P467", "", ": ① 공동매수인이 지분권에 기해 가지는 소유권이전등기청구권,", "[判例] : ① 공동매수인이 지분권에 기해 가지는 소유권이전등기청구권,\n② 공유물에 대한 제3자의 불법행위 • 부당이득에 관한 공유자들의 손해배상청구권 우\n\n부당이득반환청구권（각자 지분 비율로 가지는 채권을 행사하게 됨）\n\n- 분할채무", "", [], 0, "상계", 101, "미분류"],
  ["채권총론_P468", "", ": ① 공동불법행위자 1인에게 복수의 공동불법행위자들이 부담하", "[判例] : ① 공동불법행위자 1인에게 복수의 공동불법행위자들이 부담하\n는 구상채무（다만 구상권자인 공동불법행위자의 과실비율 0인 경우는 부진정연대채\n무）,\n\n②금전채무가 상속된경우\n\nPART 1\n\n채권총론 • 서론. 분할채권관계. 불가분채권관계 •\n\n101\n\n3. 불가분채권관계\n가. 불가분채권（제409, 410조）\n- 절대효 : 청구, 이행 （그에 의한 시효중단• 이행지체, 변제 • 변제제공 • 채권자지체 O）\n\n- 불가분채권자 중 1인과 채무자간 경개 • 면제 一 전부 이행받은 다른 채권자는 그 1인\n이 권리 잃지 않았으면 분급할 이익을 채무자에게 상환해야（410조 2항）\n\n-", "", [], 0, "상계", 101, "미분류"],
  ["채권총론_P469", "2021다264253", "불가분채권자 중 1인을 집행채무자로 압류•전부명령 있어도 다른 불가", "[判例2023] 불가분채권자 중 1인을 집행채무자로 압류•전부명령 있어도 다른 불가\n분채권자는 모든 채권자 위해 불가분채권 전부의 이행청구 O, 채무자도 모든 채권\n\n자 위해 다른 불가분채권자에게 전부를 이행 O, 이는 금전채권 일부에만 압류• 전부\n\n명령 내려져도 마찬가지 O V 전부명 령으로 집행채무자인 불가분채권자의 채권은\n\n전부채권자에게 이전되나 다른 불가분채권자에게는 효력\n\nX [2021다264253]\n\n正辯 : 2011다95861 판결과 마찬가지로 ‘공동임차인’의 ‘임대차보증금반환채권’이 원칙적으로\n‘불가분채권’이라는 취지의 판시（조합을 결성한 준합유로 보기 힘들다는 이유） 一 다만 후술하는", "", [], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P470", "98다43137,2024다312566; 80다2587; 80다756", "불가분채무로 인정한 3가지", "[判例] 불가분채무로 인정한 3가지\n① 건물공유자가 공동임대（공동전세권설정）하고 수령한 보증금（전세금） 반환채무 [98다43137, 2024다312566]\n② 수인이 공동으로 법률상 원인 없이 타인 재산 사용 부당이득반환채무 [80다2587]\n③ 공동상속인들의 건물철거의무 “각자 그 지분의 한도 내에서 건물 전체에 대한 철거\n\n의무” [80다756] 正辯 : 금전채무（①, ②）와 달리 필공 아니라는 의미\n\n（/", "", [], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P471", "2011다76747", "직접점유자• 간접점유자의 점유 • 사용 부당이득반환채무는 부진정연대채무", "[判例] 직접점유자• 간접점유자의 점유 • 사용 부당이득반환채무는 부진정연대채무\n[2011다76747]", "", [], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P472", "2018다243133", "페 미등기건물의 원시취득자와 양수인（사실상 처분권자）의 부지", "[判例2022] 페 미등기건물의 원시취득자와 양수인（사실상 처분권자）의 부지\n점유 • 사용 부당이득반환채무는 부진정 연대채무 [2018다243133]\n\n-", "", [], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P473", "2020다208195", "불가분채무자가 변제 기타 자기 출재로 공동면책 얻으면 다른 불가분채", "[判例2020] 불가분채무자가 변제 기타 자기 출재로 공동면책 얻으면 다른 불가분채\n무자의 부담부분에 대해 구상권 행사 O, 이때 부담부분은 균등 추정 원칙이나 특약\n\n있거나 수익 비율이 다르면 그에 따라 부담부분 결정 ••• 411조, 425조 1항, 424조, 연\n대채무자 사이에 관한 2012다97420 판결 [2020다208195]\n\n正辯 : 위 판결을 근거로 ‘공유물매매의 계약금반환의무는 불가분채무’라 보는 견해가 있으나（가령", "", [], 0, "다수당사자채권", 102, "미분류"],
  ["채권총론_P474", "2023다31885", "상가임대차법 3조 1, 2항으로 임대인 지위 공동승계한 ‘공동임대인들’의", "[判例2024] 상가임대차법 3조 1, 2항으로 임대인 지위 공동승계한 ‘공동임대인들’의\n임차보증금반환채무는 ‘불가분 채무’ — 불가분 채무자인 공동상속인 1인의 변제 등\n\n으로 공동면책 얻어 부담부분에 구상할 때 다른 공동상속인을 상대로 ‘법정상속분’\n에 따라 구상 O '.' 1007조（각자의 상속분에 응하여 피상속인 권리 • 의무 승계）에서\n\n상속분은 법정상속분을 의미 [2023다31885刀\n\nPART 1\n\n채권총론 - 서론. 분할채권관계. 불가분채권관계 • 103\n\n제4절 연대채무\n\n쏘 연대채무 슈\n\n1. 서설, 대외관계\n- 수인이 전부를 각자 이행할 의무, 1인의 이행으로 다른 채무자 의무 면함（제413조）\n— 각 채무 독립성 : 조건 • 기한 • 이행기 • 이행지 • 보증인유무 다를 수 있음\n어느 연대채무자의 법률행위 무효 • 취소는 다른 연대채무자에게 영향 無（제415조）\n\n- 성립 : 법률행위（계약）, 법률의 규정 一 제616조. 제654조（수인의 사용차주,\n\n正辯 : 위 판결을 근거로 ‘공유물매매의 계약금반환의무는 불가분채무’라 보는 견해가 있으나（가령", "", ["제413조", "제415조", "제616조", "제654조"], 0, "다수당사자채권", 103, "미분류"],
  ["채권총론_P475", "2019다216435", "채권자가 연대채무자 중 1인 채무를 ‘일부’ 면제한 경우도 특별한 사정", "[判例] 채권자가 연대채무자 중 1인 채무를 ‘일부’ 면제한 경우도 특별한 사정\n이 없는 한 면제된 부담부분에 한하여 419조 면제 절대적 효력 O — 피면제자의 잔존\n채무액이 부담부분 초과한다면 다른 연대채무자는 채무 전액 부담 •/ 피면제자\n\n의 부담부분 감소 없으므로 / 피면제자의 잔존 채무액이 부담부분보다 적다면 그\n\n차액（= 부담부분 - 잔존 채무액） 범위에서 면제의 절대적 효력 발생하여 다른 연대\n채무자의 채무가 차액만큼 감소 O [2019다216435]\n\n正辯 : 연대채무는 언제나 소멸시효 규정과 연계성 숙지（제416조, 제421조）\n\n正辯 : 연대채무에서 ‘청구’에 의한 시효중단의 절대효에 관하여, 불완전한 최고만 포함하는 견해도", "", [], 0, "다수당사자채권", 104, "미분류"],
  ["채권총론_P476", "94다4825", "공동불법행위자간（응소의 소송비용 포함） [94다4825刀", "[判例] 공동불법행위자간（응소의 소송비용 포함） [94다4825刀", "", [], 0, "다수당사자채권", 105, "미분류"],
  ["채권총론_P477", "2022다211416", "조합채무 변제한 조합원이 다른 조합원에게 구상 [2022다211416]", "[判例2022] 조합채무 변제한 조합원이 다른 조합원에게 구상 [2022다211416]\n\n正辯 : A, B 사이에서는 B의 甲에 대한 90만원 변제만 유효하므로 B는 A에게 30만원 구상 O.\n그러나 상대효이므로 C에 대하여는 A만이 30만원 구상 O, 이때 B는 A가 C로부터 받은 30만원에", "", [], 0, "다수당사자채권", 105, "미분류"],
  ["채권총론_P478", "2006다47677", ": “서로 별개 원인으로 발생한 독립된 채무라 하더라도 동일한 경제적", "[判例]: “서로 별개 원인으로 발생한 독립된 채무라 하더라도 동일한 경제적\n\n목적 가지는 채무”, 양 채무의 발생원인 • 액수 등이 다를 수 있음 [2006다47677]", "", [], 0, "다수당사자채권", 106, "미분류"],
  ["채권총론_P479", "", "채무자와 391조 이행보조자 사이", "[判例] 채무자와 391조 이행보조자 사이", "", [], 0, "다수당사자채권", 106, "미분류"],
  ["채권총론_P480", "2005다19378", "도난사건에서 경비용역 업체와도둑 [2005다19378]", "[判例] 도난사건에서 경비용역 업체와도둑 [2005다19378]\n-", "", [], 0, "다수당사자채권", 106, "미분류"],
  ["채권총론_P481", "2009다32409", "병존적 채무인수가 ‘부탁 없이’ 이루어진 경우 채무자와 인수인 사이 [2009다32409]", "[判例] 병존적 채무인수가 ‘부탁 없이’ 이루어진 경우 채무자와 인수인 사이 [2009다32409]\n\n-", "", [], 0, "다수당사자채권", 106, "미분류"],
  ["채권총론_P482", "2018다243133", "回9 미등기건물의 원시취득자와 양수인（사실상 처분권자）의 부지", "[判例2022] 回9 미등기건물의 원시취득자와 양수인（사실상 처분권자）의 부지\n점유 • 사용 부당이득반환채무 [2018다243133]", "", [], 0, "다수당사자채권", 106, "미분류"],
  ["채권총론_P483", "2008다97218", "“부진정연대채무자 중 1인이 채권자에 대한 반대채권으로 상계한 경우", "[大判全合] “부진정연대채무자 중 1인이 채권자에 대한 반대채권으로 상계한 경우\n채무소멸 효력은 다른 부진정연대채무자에게 미침（절대효） v 변제 • 대물변제 • 공탁과\n동일하게 채권은 현실적 만족 얻어 목적 달성” - 다른 채무자의 악의 여부 불문, 1인\n이 ‘상계계약’한 경우도 마찬가지 [2008다97218]", "", [], 0, "다수당사자채권", 106, "미분류"],
  ["채권총론_P484", "93다21521", "부진정연대채무에서 1인의 상계가 다른 부진정연대채무자에게 절대적 효력", "[判例] 부진정연대채무에서 1인의 상계가 다른 부진정연대채무자에게 절대적 효력\n있는 것과는 별론으로, 부진정연대채무자 1인이 채권자와 상계할 채권 가지고 있음\n\n에도 상계하지 않음을 이유로 다른 부진정연대채무자가 그 채권으로 상계할 수 X,\n\n418조 2항은 부진정연대채무에는 적용 X ••• 부진정연대채무자 사이에는 고유 의미\n의 부담부분 없으므로（418조 2항은 부담부분 존재를 전제로） [93다21521]\n\n正辯 : 안분설은 학설적으로 ‘채무액’ 비율로 소멸하는 것인데 판례는 ‘과실비율설’이라는 용어로\n‘소액채무자의 과실비율에 상응하는 만큼 소멸한다’는 표현을 쓰고 있음. 판례가 쓰는 표현으로 답안", "", [], 0, "다수당사자채권", 106, "미분류"],
  ["채권총론_P485", "2012다74236; 99다67376", "“금액이 서로 다른 부진정연대채무에서 다액채무자가 일부 변제할 경우", "[大判全合] “금액이 서로 다른 부진정연대채무에서 다액채무자가 일부 변제할 경우\n\n먼저 소멸하는 부분은 다액채무자 단독 부담 부분（외측설） ••• 당사자의 의사와 채무\n전액 지급 확실히 확보하려는 부진정연대채무 제도의 취지에 비추어” - 이는 사용\n자책임에서 피용자가 일부 변제할 경우（사용자 손해배상액이 피해자 과실 참작한 과\n실상계로 피용자 손해배상액과 달라진 경우）, 공동불법행위자들 중 다액채무자가 일\n부 변제할 경우（피해자에 대한 과실비율이 달라 손해배상액이 달라진 경우）에도 모두\n\n적용 O [2012다74236]\n\n正辯 : 종래 대법원은 사안에 따라 외측설 혹은 과실비율설（사용자책임 사안）의 입장이었으나, 본\n전원합의체 판결로 과실비율설은 모두 폐기되고 외측설로 통일되었음.\n\n한편 이 쟁점은 변제가 부진정연대채무에서 절대효를 가지는 것을 전제로만 논의할 수 있고. 결국\n다액채무자가 일부를 ‘상계’한 경우 동일한 논의가 가능할 것으로 생각됨（私見）. 실제 기존 판례 중\n다액채무자가 일부 채무에 대하여 변제 및 상계를 한사안이 있음[99다67376]", "", [], 0, "다수당사자채권", 107, "미분류"],
  ["채권총론_P486", "99다67376", "회사 자금 입출금 업무 담당 재무과장이 제3자를 위한 회사 명의 근보증서", "[判例] 회사 자금 입출금 업무 담당 재무과장이 제3자를 위한 회사 명의 근보증서\n등 서류 위조하여 금융기관에 제출하고 이를 믿은 금융기관이 제3자에게 대출함으\n\n로써 손해 입었다면, 회사의 사용자책임\n\nO, 금융기관도 대출규정 지키지 않았고\n\n보증계약 진위를 회사에 직접 확인하지 않은 30% 과실상계 O\n\n금액이 다른 부진정연대 관계에서 다액채무 일부가 변제 등으로 소멸하면 그 중\n\n먼저 소멸하는 부분은 단독 부담 부분（외측설） [99다67376]\n\n正辯 : 甲회사 재무과장 己이 內회사가 丁은행으로부터 대출받음에 있어 甲회사가 보증하는 것", "", [], 0, "다수당사자채권", 107, "미분류"],
  ["채권총론_P487", "2016다236131", "금융기관 임직원이 채무자에 대한 신용조사 거치지 않고 규정 위반하여 충분", "[判例] 금융기관 임직원이 채무자에 대한 신용조사 거치지 않고 규정 위반하여 충분\n한 담보 없이 대출 一 임직원의 금융기관에 대한 손해배상채무와 대출금채무자의 금\n\n융기관에 대한 대출금채무는 서로 동일한 내용의 급부에 각자 독립하여 전부를 급부\n할 의무 부담하는 부진정 연대채무 一 외측설 적용 [2016다236131]", "", [], 0, "다수당사자채권", 107, "미분류"],
  ["채권총론_P488", "96다50896", "공동불법행위자는 내부관계에서 과실 정도에 따라 일정한 부담부분이 있고,", "[判例] 공동불법행위자는 내부관계에서 과실 정도에 따라 일정한 부담부분이 있고,\n공동불법행위자 중 1인이 자기 부담부분 이상을 변제하여 공동면책 얻게 했다면 다\n른 공동불법행위자에게 그 부담부분 비율에 따라 구상권 O [96다50896]", "", [], 0, "다수당사자채권", 108, "미분류"],
  ["채권총론_P489", "2005다19378", "부진정연대채무의 내부관계도 형평의 원칙상 일정한 부담부분 있을 수 있고", "[判例] 부진정연대채무의 내부관계도 형평의 원칙상 일정한 부담부분 있을 수 있고\n각자 고의 • 과실 정도에 따라 결정, 부진정 연대채무자 1인이 자기 부담부분 이상을\n\n변제하여 공동면책 얻게 했다면 다른 부진정연대채무자에게 부담부분 비율에 따라\n구상권 O [2005다19378]", "", [], 0, "다수당사자채권", 108, "미분류"],
  ["채권총론_P490", "98다5777", "부진정연대채무에 있어서는 상호간 통지의무 X, 426조 유추적용 X V 426조", "[判例] 부진정연대채무에 있어서는 상호간 통지의무 X, 426조 유추적용 X V 426조\n는 연대채무자 상호간 주관적 연관관계에서 기인한 것인데 부진정 연대채무에서는 주\n\n관적 연관관계 없이 단지 채권만족이라는 목적만 공통 [98다5777]", "", [], 0, "다수당사자채권", 108, "미분류"],
  ["채권총론_P491", "2004다20265", "보증채무 이행 당시에는 주채무 유효하게 존속했더라도 그 후 주계약 해제", "[判例] 보증채무 이행 당시에는 주채무 유효하게 존속했더라도 그 후 주계약 해제\n로 소급적 소멸하면 보증인은 변제 수령한 채권자를 상대로 부당이득반환청구 O\n\n••• 보증인의 주채무 소멸 행위는 주채무의 존재를 전제로 하므로 [2004다20265]", "", [], 0, "다수당사자채권", 109, "미분류"],
  ["채권총론_P492", "2005다50041", "주채무 발생원인 기본계약이 반드시 보증계약보다 먼저 체결될 필요 없고,", "[判例] 주채무 발생원인 기본계약이 반드시 보증계약보다 먼저 체결될 필요 없고,\n보증계약 체결 당시 보증 대상 될 주채무 발생원인 • 내용 어느 정도 확정되어 있다\n면 ‘장래 채무’에 대해서도 유효하게 보증계약 O [2005다50041]", "", [], 0, "다수당사자채권", 109, "미분류"],
  ["채권총론_P493", "75다110", "주채무자에 대한 채권양도 통지 갖추면 보증인에게도 효력 O [75다110이", "[判例] 주채무자에 대한 채권양도 통지 갖추면 보증인에게도 효력 O [75다110이\n나. 보증인 관련 2016년 개정 시행 내용 - 보증인 보호\n@ 방식（제428조의2） : 보증은 보증인 기명날인 • 서명 있는 서면으로 표시되어야 효력,\n\n전자적 형태 X,\n\n보증인에게 불리한 변경도 마찬가지,\n\n이미 이행한 부분은 서면이\n\n아니 라고 무효 주장 X\n\n-", "", ["제428조의2"], 0, "다수당사자채권", 109, "미분류"],
  ["채권총론_P494", "2021다29612", "근저당권설정계약서가 보증인보호법상 ‘보증의사 표시된 서면’인지 여부", "[判例2022] 근저당권설정계약서가 보증인보호법상 ‘보증의사 표시된 서면’인지 여부\n는 엄격 판단해야 ••• 보증인보호법 및 민법 428조의2 규정의 입법목적 • 경과, 보증인\n의 기명날인•서명 있는 서면으로 보증의사 표시되지 않으면 무효로 하는 강행규정,\n\n근저당권설정 계약서는 근저당권설정등기의 등기 원인 증명서면, 등기 신청서에 첨부\n\n하기 위해 작성 , 물상보증으로서 근저당권설정 계약과 인적 보증으로서 연대보증계약\n은 별개의 계약 [2021다29612이\n\n正辯 : 부동산을 담보로 제공한 자（채무자 A의 아내 B）에게 따로 각서 등 어떠한 문서도 요구하지\n않은 점을 들어 B의 보증 사실을 부정한 사안", "", [], 0, "다수당사자채권", 109, "미분류"],
  ["채권총론_P495", "2018다282473", "BH 428조의2 1항 ‘보증은 그 의사가 보증인의 기명날인 또는 서명", "[判例] BH 428조의2 1항 ‘보증은 그 의사가 보증인의 기명날인 또는 서명\n있는 서면으로 표시돼야 효력 발생’ 규정의 ‘보증인 서명’은 타인이 대신할 수\n\nX,\n\n그러나 ‘보증인 기명날인’은 타인 대행 방법으로도 O — 428조의3 1항에서 불확\n\n정한 다수 채무에 대한 보증은 ‘채무 최고액을 서면으로 특정’해야 한다는 규정\n은 입법취지상 최고액 명시 기재 않더라도 얼마인지 객관적으로 알 수 있을 만큼\n\n구체적 기재 필요 一 현재 및 장래 부담할 레미콘 대금지급채무 연대보증에서 단가\n등은 기재되었으나 공급량• 최고액 기재 없으면 최고액 특정\n\nX [2018다282473]", "", [], 0, "다수당사자채권", 110, "미분류"],
  ["채권총론_P496", "기다1474", "타인간 계약 보증한 보증인은 피보증인 채무불이행으로 계약 해제되었음으로", "[判例] 타인간 계약 보증한 보증인은 피보증인 채무불이행으로 계약 해제되었음으로\n인한 피보증인의 원상회복의무도 책임 O [기다1474]", "", [], 0, "다수당사자채권", 110, "미분류"],
  ["채권총론_P497", "2016다2840,2002다34017", "연대보증인이 주채무자 채무 중 일정 범위를 보증을 한 경우（일부보증）, 주채무", "[判例] 연대보증인이 주채무자 채무 중 일정 범위를 보증을 한 경우（일부보증）, 주채무\n자가 일부변제를 하면 주채무자 채무 전부를 대상으로 변제충당 일반원칙에 따라 충\n당되고, 충당 후 주채무가 남아있는 한 연대보증인은 보증채무 면할 수 없고 보증 범\n위 내에서 보증책임 부담 [2016다2840, 2002다34017] = 외측설", "", [], 0, "다수당사자채권", 110, "미분류"],
  ["채권총론_P498", "2001다29803", "보증채무는 주채무와 별개 채무 一 보증채무 자체의 이행지체로 인한 지연손", "[判例] 보증채무는 주채무와 별개 채무 一 보증채무 자체의 이행지체로 인한 지연손\n해금은 보증한도액과 별도로 부담 O — 보증채무 연체이율의 특별한 약정 있으면\n약정에 따라, 특별한 약정 없으면 거래행위 성질에 따라 상법 • 민법 법정이율 적용,\n\n주채무에 약정 연체이율 당연 적용은 X [2001다29803]", "", [], 0, "다수당사자채권", 110, "미분류"],
  ["채권총론_P499", "77다796", "채권자 고의로 채권 추심을 하지 않아 채권이 확대된 경우 보증안은 확대된", "[判例] 채권자 고의로 채권 추심을 하지 않아 채권이 확대된 경우 보증안은 확대된\n부분에 대하여는 보증책임\nX [77다796]", "", [], 0, "다수당사자채권", 110, "미분류"],
  ["채권총론_P500", "2010다51192", "보증채무 시효 중단되었더라도 주채무 소멸시효 완성하면 주채무 당연 소멸하", "[判例] 보증채무 시효 중단되었더라도 주채무 소멸시효 완성하면 주채무 당연 소멸하\n고 부종성에 따라 보증채무 역시 당연 소멸 O — 주채무 소멸시효가 완성되어 보증채\n무 소멸된 상태에서 “보증인이 보증채무 이행 • 승인하였더라도 주채무자가 아닌 보증인\n의 행위로 주채무 소멸시효 이익 포기 효과 X, 주채무 시효소멸에도 불구하고 보증채무\n\n이행하겠다는 의사표시 등 부종성 부정할 특별한 사정이 없는 한, 보증인은 여전히 주\n\n채무 시효소멸 이유로 보증채무 소멸 주장 O” [2010다51192]\n\n正辯 : 주채무 시효완성 소멸된 상태에서 채권자가 보증인 소유 부동산에 강제경매 신청하여 배당\n받음에 보증인이 아무런 이의 않았어도 부종성 부정할 특별한 이유 없다는 판결", "", [], 0, "다수당사자채권", 111, "미분류"],
  ["채권총론_P501", "2016다21162", "특별한 사정 인정하여 보증채무 본질인 부종성을 부정하려면 보증인이 주", "[判例] 특별한 사정 인정하여 보증채무 본질인 부종성을 부정하려면 보증인이 주\n채무 시효소멸에 불구하고 보증채무 이행하겠다는 의사를 표시하거나 채권자와\n\n그러한 약정했어야 一 단지 보증인이 주채무 시효소멸에 원인을 제공한 것만으로는\n부종성 부정\n\nX [2016다21162이\n\n나. 주채무자 상계권의 행사（제434조）\n보증인은 주채무자의 채권에 의한 상계로 채권자에게 대항 O\n\n보증인 자신의 채권자에 대한 채권으로는 당연히 상계\n\nO", "", ["제434조"], 0, "다수당사자채권", 111, "미분류"],
  ["채권총론_P502", "2015다209347", "채권자가 주채무자와 상계적상에 있음에도 상계하지 않았다고 보증인이 이를", "[判例] 채권자가 주채무자와 상계적상에 있음에도 상계하지 않았다고 보증인이 이를\n이유로 보증채무 이행 거절할 수 X\n\n••• 상계자 의사 자유 [2015다209347]\n\n正辯 : 434조는 주채무자의 상계적상 갖춘 상계권을 보증인이 대신 행사하는 것이고, 위 판례는 채\n권자가 상계적상 갖춘 상계권을 행사하지 않는 상황（즉, 434조와는 무관한 상황으로 주채무자가", "", [], 0, "다수당사자채권", 111, "미분류"],
  ["채권총론_P503", "94다3825", "보증인은 주채무자의 채무불이행 손해배상채무도 보증책임 지지만 보증인의", "[判例] 보증인은 주채무자의 채무불이행 손해배상채무도 보증책임 지지만 보증인의\n관여 없이 채무자와 채권자 사이 합의한 손해배상 예정액에 대하여 보증인으로서는\n채무자 부담 손해배상 책임 범위 초과 않는 한도에서만 보증책임 •■• 보증인 의무는\n\n보증계약 후 채무자의 법률행위로 확장 • 가중될 수 X [94다3825이", "", [], 0, "다수당사자채권", 112, "미분류"],
  ["채권총론_P504", "98다22918", "보증인이 임대인의 임대차보증금반환채무를 보증한 후 임대인과 임차인 간에", "[判例] 보증인이 임대인의 임대차보증금반환채무를 보증한 후 임대인과 임차인 간에\n임대차계약과 관계없는 다른 채권으로써 연체차임 상계 약정하는 것은 보증인에게\n\n불리한 것으로 보증인에게 효력\n\nX [98다22918]\n\n正辯 : 보증금은 그 ‘속성상’ 연체차임이 ‘당연히’ 공제되어야 하는데 연체차임채권이 전혀 상관없\n는 채권과 상계됨으로써 보증인이 부담하는 보증금반환채무에서 당연공제될 기회 박탈되어 결과", "", [], 0, "다수당사자채권", 112, "미분류"],
  ["채권총론_P505", "95다49141", "주채무 변제기 연장은 보증인에게 효력 O V 보증인 책임 가중 아님 [95다49141]", "[判例] 주채무 변제기 연장은 보증인에게 효력 O V 보증인 책임 가중 아님 [95다49141]", "", [], 0, "다수당사자채권", 112, "미분류"],
  ["채권총론_P506", "2005다35554", "주채무자에 대한 압류 • 가압류 • 가처분이라고 하더라도 보증인에게 통지 없이", "[判例] 주채무자에 대한 압류 • 가압류 • 가처분이라고 하더라도 보증인에게 통지 없이\n보증인 시효 중단 O [2005다35554]", "", [], 0, "다수당사자채권", 112, "미분류"],
  ["채권총론_P507", "93다47431", "회사정리법이 보증채무의 부종성을 배", "[判例] 회사정리법이 보증채무의 부종성을 배\n제하고 있으나 440조는 적용 [93다47431]）", "", [], 0, "다수당사자채권", 112, "미분류"],
  ["채권총론_P508", "86다카1569", "주채무자 상대로 승소판결 확정되어 시효기간 10년으로 연장되어도（165조） 보", "[判例] 주채무자 상대로 승소판결 확정되어 시효기간 10년으로 연장되어도（165조） 보\n증인에게 시효기간 연장효과 X [86다카1569]", "", [], 0, "다수당사자채권", 112, "미분류"],
  ["채권총론_P509", "2003다3773", "채권자와 보증인 사이에 보증인이 주채무 중첩적 인수하는 약정하더라도 종", "[判例] 채권자와 보증인 사이에 보증인이 주채무 중첩적 인수하는 약정하더라도 종\n전 보증인 지위 유지되므로 주채무자와 보증인 사이 구상관계 동일 [2003다3773이\n\n正辯 : 수탁보증인이었다면 사전구상권도 여전히 행사할 수 있음\n\n-", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P510", "2017다206922", "주채무자의 부탁으로 보증인이 된 경우 양자는 위임관계, 이러한 보증의 위임", "[判例] 주채무자의 부탁으로 보증인이 된 경우 양자는 위임관계, 이러한 보증의 위임\n은묵시적 O [2017다206922]", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P511", "2024다252305", "수탁보증인（물상보증인 포함）의 구상권이 발생하기 위한 변제 기타 출재", "[判例2024] 수탁보증인（물상보증인 포함）의 구상권이 발생하기 위한 변제 기타 출재\n는 반드시 주채무 변제기 도래 후에 면책행위 할 것 요구되지 않고, 이해관계 있는\n제3자인 수탁보증인도 468조에 따라 변제기 전에 변제 O, 다만 이때는 주채무의\n\n변제기 도래할 때까지 주채무자에 대해 사후구상권 행사할 수 X, 수탁보증인 출재\n\n에 과실 있다면 그와 인과관계 있는 범위만 구상권 발생 X\n\n보증인이 주채무자에게 통지하지 않고 변제 기타 출재로 주채무 소멸하게 한 경우\n주채무자가 채권자에게 대항할 사유 있었다면 보증인에게 대항하는데（445조 1항）,\n\n구체적 대항 효과는 주채무자의 채권자에 대한 대항사유로 결정 [2024다252305]", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P512", "2003다46758", "사전구상권 범위는 주채무 원금, 사전구상 응할 때까지 이미 발생한 이자 및", "[判例] 사전구상권 범위는 주채무 원금, 사전구상 응할 때까지 이미 발생한 이자 및\n지연손해금, 피할 수 없는 비용 기타 손해\n\nO — 주채무 원금 완제일까지 지연손해\n\n금 X, 수탁보증인이 아직 지출 않은금원의 지연손해금 X [2003다46758]", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P513", "2004다466834", "사전구상권은 수탁보증인 자신의 부담 확정된 채무 전액 O — 면책비용에", "[判例] 사전구상권은 수탁보증인 자신의 부담 확정된 채무 전액 O — 면책비용에\n대한 법정이자 X , 장래 도래할 이행기까지 이자 X [2004다466834]", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P514", "2001다55222", "수탁보증인은 사전구상권을 자동채권으로 주채무자와 상계 X V 사전구상권에", "[判例] 수탁보증인은 사전구상권을 자동채권으로 주채무자와 상계 X V 사전구상권에\n는 443조 주채무자의 면책청구권이 항변권으로 부착 [2001다55222]", "", [], 0, "다수당사자채권", 113, "미분류"],
  ["채권총론_P515", "2020다283578", "수탁보증인이 주채무자의 443조 담보제공청구에 응하여 구상금액 상당", "[判例2023] 수탁보증인이 주채무자의 443조 담보제공청구에 응하여 구상금액 상당\n한 담보 특정하여 제공할 의사 표시하면 법원은 주채무자가 수탁보증인으로부터 그\n\n특정한 담보 제공받음과 동시에 442조 사전구상의무 이행해야 한다고 판결해야 一\n수탁보증인이 주채무자의 담보제공청구 거절하거나 상당한 담보 제공 의사를 표시하\n지 않는다면 법원은 수탁보증인의 사전구상금 청구 기각 판결 [2020다283578]\n\n-", "", [], 0, "다수당사자채권", 114, "미분류"],
  ["채권총론_P516", "91다37553", "사후구상권과 사전구상권의 소멸시효는 각각 별도 진행, 사후구상권의 소멸", "[判例] 사후구상권과 사전구상권의 소멸시효는 각각 별도 진행, 사후구상권의 소멸\n시효는 사전구상권 발생 여부 상관없이 사후구상권이 발생하여 행사할 수 있는 때로\n\n부터 진행 ••• 양자는 발생원인 • 법적 성질 달리하는 별개 독립 권리 [91다37553]", "", [], 0, "다수당사자채권", 114, "미분류"],
  ["채권총론_P517", "2006다22715", "수탁보증인은 주채무 변제기 연장 불문 본래 변제기 도래하면 사전구상권 O", "[判例] 수탁보증인은 주채무 변제기 연장 불문 본래 변제기 도래하면 사전구상권 O\n（442조 2항） 一 수탁보증인이 본래 변제기 도래 후 과실 없이 변제 기타 출재로\n주채무 소멸시킨 후 주채무자에 통지했다면 주채무자는 통지 받은 후 채권자와의\n변제기 연장 합의로서 수탁보증인의 사후구상권에 대항 X（445조 1항） [2006다22715]\n\n正辯 : 442조 2항에 의해 주채무자는 채권자와의 변제기 연장 합의로 수탁보증인의 사전구상권\n에 대항할 수 없는데, 나아가 수탁보증인의 ‘사후통지’를 받은 주채무자는 그 후 채권자와 변제기\n연장 합의했더라도 이로써 수탁보증인의 ‘사후구상권’에도 대항할 수 없다고 판시한 판례", "", [], 0, "다수당사자채권", 114, "미분류"],
  ["채권총론_P518", "", "수탁보증에서 주채무자가 면책행위 하고도 보증인에게 사후통지 않던 중에", "[判例] 수탁보증에서 주채무자가 면책행위 하고도 보증인에게 사후통지 않던 중에\n보증인도 사전통지 아니하고 이중의 면책행위 한 경우, 보증인은 주채무자에 대해\n\n446조에 의한 자기 면책행위 유효 주장 X - “이중변제의 기본 원칙으로 돌아가\n\n먼저 이뤄진 주채무자의 면책행위 유효, 보증인의 면책행위 무효, 보증인은 주채무자\n에게 구상권 X ••• 446조는 445조 1항을 전제로, 사전통지 않은 보증인까지 보호하려는\n취지\n\nX ’ [95446265] - 보증인은 채권자를 상대로 부당이득반환청구 O\n\n라. 주채무자 수인인 경우\n- 주채무가 연대채무 • 불가분채무일 때 그 중 1인을 위한 보증인이 변제하면 다른\n\n연대 • 불가분채무자에 대해 그 부담부분에 한하여 구상 O （제447조） : 결제 간편 취지\n\n正辯 : 이때는 주채무자가 사전통지 할 필요는 없음（주채무자는 애초에 사전통지의무 없음）", "", ["제447조"], 0, "다수당사자채권", 114, "미분류"],
  ["채권총론_P519", "95다47176", "공동불법행위자 1인 위한 보증인이 손해배상채무 변제한 경우, 그 보증인은", "[判例] 공동불법행위자 1인 위한 보증인이 손해배상채무 변제한 경우, 그 보증인은\n피보증인 아닌 다른 공동불법행위자에 대하여 그 부담부분에 한하여 구상 O, 다만\n다른 공동불법행위자 부담부분 없으면 구상 • 부당이득반환청구 X [95다47176]\n\n正辯 : 위 판결은 부진정연대채무임에도 참조조문에 447조가 명시되어 있음\n\n-", "", [], 0, "다수당사자채권", 115, "미분류"],
  ["채권총론_P520", "90다20244", "공동불법행위에서 손해배상책임은 부진정연대 채무이나 구상권 행사 있어서", "[判例] 공동불법행위에서 손해배상책임은 부진정연대 채무이나 구상권 행사 있어서\n연대채무 규정 준용 O — 425조 1항 구상권 행사 상대방은 공동면책된 다른 연대채\n무자에 한함, 다른 연대채무자의 채무에 대한 연대보증인을 상대로 구상\n\nX [90다20244]\n\n正辯 : 그러나 변제한 공동불법행위자가 결국 채권자의 채권을 변제자대위로 취득하여 행사하게\n되면' 여지 O", "", [], 0, "다수당사자채권", 115, "미분류"],
  ["채권총론_P521", "91다3062", "연대채무자 수인 모두를 위한 연대보증인은 모두에 대해 구상권 O, 반대로", "[判例] 연대채무자 수인 모두를 위한 연대보증인은 모두에 대해 구상권 O, 반대로\n연대채무자 중 1인이 채무 변제한 경우는 자신의 연대보증인도 겸한 연대보증인에\n\n대하여 대위\n\nX [91다3062]\n\n正辯 : 각 보증인이 채권자에게 부담하는 채무액의 문제 一 분별의 이익은 ‘대외관계’의 문제", "", [], 0, "다수당사자채권", 115, "미분류"],
  ["채권총론_P522", "91다37553", "채권자가 연대보증인 1인의 채무를 면제하여도, 연대보증인들 사이 연대관계", "[判例] 채권자가 연대보증인 1인의 채무를 면제하여도, 연대보증인들 사이 연대관계\n의 특약이 없는 한, 다른 연대보증인에 효력 X [91다37553]\n\n正辯 : ‘연대보증인들 사이 연대관계의 특약’이란 ‘보증연대’를 의미하는 것으로 보이며, 연대보증은\n어디까지나 주채무자와의 연대이므로, 연대채무에서 면제의 절대효에 관한 규정은 보증인들 사이에", "", [], 0, "다수당사자채권", 116, "미분류"],
  ["채권총론_P523", "2007다70155,2024다232066", "연대보증인은 분별의 이 익 없으나, 연대보증인들 상호 내부관계는 주채무", "[判例2024] 연대보증인은 분별의 이 익 없으나, 연대보증인들 상호 내부관계는 주채무\n에 대한 출재 분담의 일정 부담부분 O, 특약 없으면 평등 비율 一 연보 1인이 자기\n\n부담부분 초과 변제하면 다른 연보에게 구상, 그러나 연보 중 이미 자기 부담부분\n\n변제한 사람에게는 구상 X - 변제한 연대보증인의 구상 가부 및 부담부분은 일단\n연대보증 성립 당시 주채무액 분담비율 적용하여 산출한 금액으로 정하되, 그 후\n\n주채무자의 변제（각 연보는 부담부분 비율로 소멸）나 다른 연보의 변제（변제액만큼\n그의 부담부분 소멸） 있다면 고려해야 -‘ ① 연보 A의 변제시까지 발생한 주채무\n총액에 분담비율 적용하여 A의 부담부분 총액 산출, ② 주채무자 변제 등으로 감\n소한 부담부분 있다면 공제하여 A의 부담부분 확정, ③ 변제액이 확정된 부담부분\n\n을 초과하는지 여부로 판단하여야 一 연보 B가 A의 구상권 행사 대상에서 제외되는\n지 여부도 같은 방식으로 확정된 B의 부담부분을 기준으로 판단해야 [2007다70155,\n\n2024다232066]", "", [], 0, "다수당사자채권", 116, "미분류"],
  ["채권총론_P524", "2009다46873", "연대보증인 1인이 전액 대위변제하고 주채무자로부터 일부만 구상받은 경우,", "[判例] 연대보증인 1인이 전액 대위변제하고 주채무자로부터 일부만 구상받은 경우,\n\n자기 부담부분은 다른 연대보증인들로부터는 구상받을 수 X, 오로지 주채무자로부\n\n터만 구상받아야 하므로 주채무자의 변제금을 자기 부담부분에 먼저 충당할 정당한\n이익 有 一 주채무자의 구상금 일부 변제액은 대위변제한 연대보증인 부담부분에 상\n\n응하는 주채무자의 구상채무를 먼저 감소시킴, 그 부담부분 넘을 때까지 다른 연대보\n증인들이 부담하는 구상채무는 감소되지 않음 •一 주채무자의 구상금 일부 변제액이\n\n그 부담부분 초과하면 그 초과부분은 ‘주채무자의 구상채무’와 ‘다른 연대보증인들의\n각 부담비율 상응한 구상채무’를 동시에 감소시킴 [2009다46873]", "", [], 0, "다수당사자채권", 116, "미분류"],
  ["채권총론_P525", "2002다47631", "금융기관 대출받음에 제3자가 자기 명의 사용을 허락한 경우 그가 채권자에", "[判例] 금융기관 대출받음에 제3자가 자기 명의 사용을 허락한 경우 그가 채권자에\n대해 주채무자로서 책임지는 여부와 관계없이 ‘내부관계’에서는 연대보증책임 이행\n한 연대보증인에 대하여 당연히 주채무자로서의 구상의무 부담하는 것은 X, 그 연대\n\n보증인이 제3자가 실질적 주채무자라고 믿고 보증 혹은 이행했고 그 믿은 데에 제3자\n에게 귀책사유 있는 경우에 한하여 주채무자로서 전액 구상의무 부담 一 다만 제3자\n가 실질적 주채무자 아닌 걸 알면서 연대보증인이 보증 혹은 이행한 경우에도, 제3자\n가 실질상의 주채무자를 연대보증한 것으로 인정된다면（주채무자 명의 사용을 허락\n했다면 최소한 연대보증 의사는 인정될 것임） 제3자는 이행한 연대보증인에 대하여\n공동보증인 간 구상의무는 부담 O [2002다47631]\n\n- 공동보증인과 일부보증", "", [], 0, "다수당사자채권", 117, "미분류"],
  ["채권총론_P526", "2001다59071", "각 연대보증인 일부보증 한 경우 연대보증인 1인 변제로 주채무 감소시켰더", "[判例] 각 연대보증인 일부보증 한 경우 연대보증인 1인 변제로 주채무 감소시켰더\n라도 주채무 남은 금액이 다른 연대보증인 책임한도 초과하면 그 다른 연대보증인은\n\n한도금액 전부 보증책임 그대로 O 면책된 부분 X — 채무 변제한 연대보증인이 다\n른 연대보증인에게 구상 X [2001다59071]", "", [], 0, "다수당사자채권", 117, "미분류"],
  ["채권총론_P527", "2004다42104", "위 경우 보증인 1인이 자기 부담부분 이상 변제하여 다른 보증인 책임한도 줄", "[判例] 위 경우 보증인 1인이 자기 부담부분 이상 변제하여 다른 보증인 책임한도 줄\n어들어 공동면책 되면 부담부분에 한하여 구상 O 이때 부담부분은 다른 특약 없으\n\n면 각자 보증한도액 비율 [2004다42104]", "", [], 0, "다수당사자채권", 117, "미분류"],
  ["채권총론_P528", "94다10337", "보증책임 한도액 • 보증기간에 아무런 정함 없는 경우 여러 사정 종합하여 예", "[判例] 보증책임 한도액 • 보증기간에 아무런 정함 없는 경우 여러 사정 종합하여 예\n외적으로 문언과 달리 보증책임 범위를 일정 범위로 제한 O V 당사자 의사 [94다10337]", "", [], 0, "다수당사자채권", 117, "미분류"],
  ["채권총론_P529", "94다40444", "주채무 액수가 보증 당시 예상 범위 훨씬 상회하고 채권자가 주채무자 재산상", "[判例] 주채무 액수가 보증 당시 예상 범위 훨씬 상회하고 채권자가 주채무자 재산상\n태 악화 알거나 중과실로 모르고 보증인에게 통보 없의 고의로 거래규모 확대하여 주\n\n채무 과다 발생할 경우 ‘신의칙’ 의하여 보증인 책임 합리적 범위 내 제한 O [94다40444]", "", [], 0, "다수당사자채권", 117, "미분류"],

  ["채권총론_P531", "99다26481", "旦S 계속적 채권관계인 주계약상 불확정 채무 보증한 경우, 주채무자", "[判例2021] 旦S 계속적 채권관계인 주계약상 불확정 채무 보증한 경우, 주채무자\n\n와는 거래기간 연장되었으나 보증인과 보증기간（3년） 연장되지 않아 보증계약관계\n종료되면 보증채무 확정 一 보증인은 그 당시 주계약상 채무만 책임, 그 후의 채무\n는 책임\n\nX - 보증기간 중 채무와 보증기간 종료 후 채무는 변제이익 차이 없으므\n\n로 주채무자 변제액은 변제기 먼저 도래한 채무부터 법정충당 / ‘주채무 거래기간 연\n\n장시 연대보증기간 자동연장’ 약관은 약관법 9조 5호 위반 무효 [99다26481, 2019다\n\n207141]\n\n正辯 : 계속적 보증에서 주채무 거래기간 연장은 보증인에게 효력이 없음을 전제로 하고 있음\ncf.", "", [], 0, "다수당사자채권", 118, "미분류"],
  ["채권총론_P532", "", "확정채무의 연대보증인은 자신의 동의 없는 이행기 연장도 효과 받음", "[判例] 확정채무의 연대보증인은 자신의 동의 없는 이행기 연장도 효과 받음\n\n- 계속적 보증과 사정변경 해지권", "", [], 0, "다수당사자채권", 118, "미분류"],

  ["채권총론_Q001","CASE","[제13회 2문1-1] 乙은 甲에게 전기자동차 50대를 도급받고, 丙으로부터 전자브레이크를 납품받았으며 丁(丙의 하도급)의 과실로 금속부품 파열→소음 발생. 乙은 ① 丁·丙이 자신의 지시·감독 아래 있지 않으므로 책임 없고, ② 하자가 도급인 甲의 지시에 기인하므로 민법 제669조에 따라 면책된다고 주장. 乙의 각 주장의 당부를 서술하시오. (20점)",[],0,"① 이행보조자 책임(민§391): 채무자가 채무 이행을 위해 사용한 자는 독립적 사업자라도 이행보조자에 해당. 乙이 이행에 丙·丁을 이용하고 丁에게 고의·과실이 있으므로 乙은 민§391에 따라 책임 부담. 乙의 ①주장 배척. | ② 도급인 지시 면책(민§669): 하자가 도급인의 지시에 기인할 경우 수급인 면책 가능하나, 수급인이 지시의 부당함을 알면서 고지하지 않은 경우 면책 불가. 甲 지시에 기인 가능성이 높다 해도, 乙이 부당성 고지의무 위반 시 면책 부정. 乙의 ②주장도 원칙적으로 배척.","",3,"채무불이행"],

  ["채권총론_Q003","CASE","[제11회 1문5-4] 乙이 채무초과 상태에서 丙에게 Y토지(시가 1억) 매도+이전등기. Y토지에 丁의 근저당(5천만), 戊의 가압류(3천만) 있었는데 丙이 취득 후 모두 변제·말소. 甲이 '전부 취소+소유권이전등기 말소'만 청구하였고 丙의 악의 여부는 불명. 법원은? (25점)",[],0,"① 수익자 악의 추정(민§407): 丙의 악의는 추정되므로 丙이 선의임을 증명해야 함. 불명 → 증명 실패 → 악의 인정. ② 취소 범위: 사해행위취소 시 피보전채권 범위를 초과하는 사해 부분만 취소 가능. 담보물권이 소멸한 경우 원물반환 불가 → 가액반환이 원칙. ③ 처분 방식의 제한: 甲이 전부취소+원물반환만 청구하고 가액반환 청구를 추가하지 않았다면, 법원은 직권으로 가액반환으로 변경 불가(처분권주의). → 일부 인용(담보 공제 후 가액 한도 내) 판단 또는 청구 기각.","",3,"사해행위취소"],

  ["채권총론_Q005","CASE","[제12회 1문6-1] 甲이 乙로부터 X토지 임차 후 임대차보증금반환채권(5억 중 3억)에 A은행 질권 설정+확정일자 있는 乙의 승낙(2019.3.). 이후 丙이 보증금반환채권 5억 전부에 압류·전부명령(2019.5. 확정). 임대차 종료 시 乙이 5억을 丙에게 지급. A은행이 丙에게 3억 부당이득반환청구. 타당한가? (20점)",[],0,"채권질권과 압류·전부명령의 우열: 채권에 대한 질권이 확정일자 있는 승낙으로 제3자 대항요건을 갖춘 날(2019.3.)이 전부명령 확정일(2019.5.)보다 앞선 경우, 질권이 우선. 따라서 전부명령은 질권의 목적인 3억 부분에는 효력 없음. 乙이 丙에게 5억 전부 지급했다면 3억 부분에 대해서는 丙이 법률상 원인 없이 취득 → A은행의 부당이득반환청구 인용.","",3,"채권양도"],
  ["채권총론_Q006","CASE","[제13회 2문2-1] 임대차계약에서 양도금지특약 체결. 乙이 丙에게 보증금반환채권 양도+통지. 甲의 항변: ① 양도금지특약으로 丙에게 보증금 반환 불가, ② 乙이 丙에게 대여금 1.5억 중 5천만 상환했으므로 공제. 법원의 판단은? (15점 내)",[],0,"① 채권양도금지특약(민§449②): 특약을 선의의 제3자에게는 대항 불가. 丙의 악의 미증명 → 선의 추정 → 양도 유효. ② 채권양도 후 양도인의 일부 변제: 채권양도의 대항요건 구비 후 양도인이 채무자에게 변제해도 이는 채무자의 제3자(양수인)에 대한 이중변제이므로 양수인에게 대항 불가. 2억 전액 인용.","",2,"채권양도"],
  ["채권총론_Q007","CASE","[제12회 2문2] 乙이 甲의 A에 대한 1억 원 대여금 채무 보증. 甲이 乙 소유 X토지 매수계약 후 착오취소(2022.5.). 丙이 甲의 乙에 대한 부당이득반환채권 압류·추심(2022.6.). 乙이 2022.7. A에게 1억 변제. 丙의 추심금 청구소송에서 乙이 사전구상권(자동채권)·사후구상권(자동채권)으로 상계 주장. 타당한가? (30점)",[],0,"① 사전구상권(민§442)으로 상계: 사전구상권은 주채무 변제 전 발생하나, 그 시기적 성질상 수동채권(부당이득반환채권)의 이행기(압류 시 확정)보다 후에 이행기가 도래. 또한 압류(2022.6.) 이전에 자동채권이 발생해야 상계 가능한데, 사전구상권은 압류 전 이미 존재하나 아직 행사 불가 상태. → 상계 불가. ② 사후구상권(민§441)으로 상계: 2022.7. 乙이 변제 후 발생. 압류(2022.6.) 후에 취득한 자동채권이므로 민§498에 의해 추심채권자 丙에게 대항 불가. → 상계 불가.","",3,"상계"],
  ["채권총론_Q008","CASE","[제11회 2문2] 甲은 임대인, 乙은 임차인. 甲이 X토지 세금을 대납(2001.7.~2011.6. 총 3천만, 2011.7.~2021.7. 총 7천만). 2011.6.30. 최고(3천만 구상금). 乙이 유익비(1억) 상환 청구 → 甲이 구상금채권 1억으로 상계 주장. 乙이 3천만 부분 소멸시효 완성 재항변. 소멸시효 완성 후 상계 가부? (30점)",[],0,"민§495(소멸시효 완성 후 상계): 소멸시효 완성 전에 자동채권과 수동채권 간에 상계적상이 이미 있었다면, 시효 완성 후에도 상계 가능. | 甲의 구상금 3천만(2011.6.30. 이행기 도래) vs 乙의 유익비상환청구권(임대차 종료 2021.7.1. 이행기 도래): 구상금 이행기(2011.6.30.)는 유익비청구권 이행기(2021.7.1.)보다 앞서므로 상계적상은 2021.7.1. 성립. 이 시점에 구상금 3천만의 시효가 완성됐는지 여부: 2011.6.30. 최고 후 6개월 이내 소 미제기 → 시효 중단 효력 없음. 10년 시효(민§163적용 여부 검토) → 2021.6.30. 완성. 상계적상(2021.7.1.) 이전에 시효 완성(2021.6.30.) → 상계 적상 전 소멸 → 민§495 적용 불가.","",3,"상계"],
  ["채권총론_Q009","CASE","[제15회 2문3] 甲과 乙이 丙으로부터 X토지 공동 임차, 보증금 5억. 丙이 甲에 대해서만 차임 중 월 160만 면제(월 80만만 청구). 임대차 종료 후 丁이 甲의 보증금반환채권을 전부명령으로 취득. 乙이 丙에게 보증금 5억 청구. 丙의 항변: ① 전부명령으로 乙에게 지급 불가, ② 연체 차임 상계, ③ 차임 당연 공제. 타당성 검토.",[],0,"① 전부명령: 丁의 전부명령은 '甲의' 보증금반환채권에 대한 것. 공동임차인의 보증금반환채권은 성질상 분할채권(공동임차인 각자의 지분 범위)이 원칙. 따라서 甲의 지분(1/2)에만 전부명령 효력 → 乙의 지분(1/2) 2.5억은 乙에게 지급 가능. ② 상계(차임 채권): 丙의 차임 채권으로 乙의 보증금반환채권에 상계 가능한지 → 연대채무 상계 규정(민§418) 유추. 乙에 대한 차임면제가 있었으면 그 부분은 공동임차인 전체에 효력(민§418①) → 丙의 상계 가능한 차임 범위 계산. ③ 당연 공제: 차임 연체가 있으면 임대차보증금에서 당연 공제 주장은 판례상 불인정; 상계로 처리.","",3,"상계"],
  ["채권총론_Q010","CASE","[제14회 1문1] 甲이 乙에 대한 불법행위 손해배상 소송 계속 중(총 900만 원 중 600만 청구), 항소심에서 甲이 정신적 손해 100만 원을 추가로 청구. 乙이 항소를 취하한 경우 법원의 처리는? (항소 취하의 효력, 추가 청구의 취급) (30점)",[],0,"① 乙의 항소취하: 항소인이 피항소인의 동의 없이도 항소를 취하할 수 있으나, 항소심 구두변론 후에는 피항소인의 동의 필요(민소§393). 이 사건에서 甲이 청구변경 신청서를 제출한 것이 구두변론인지 확인 필요. 동의 없이 취하 불가능한 경우 취하 무효. ② 항소취하 유효 시: 제1심 판결이 확정 → 항소심에서의 청구변경(추가 100만)은 효력 없음 → 추가청구에 대한 소가 소멸. ③ 일부청구와 소멸시효: 나머지 300만(소극100+정신100+아직 미청구분100) 중 추가로 청구된 100만의 시효 완성 여부 검토(불법행위 3년).","",3,"다수당사자채권"]

// ================================================================
// ④ PROGRESS (localStorage)
// ================================================================
const STORE = 'lawmj_v1';
let P = {};
function loadP(){try{P=JSON.parse(localStorage.getItem(STORE)||'{}')}catch(e){P={}}}
function saveP(){localStorage.setItem(STORE,JSON.stringify(P))}
function getP(tk){return P[tk]||(P[tk]={ox_ok:[],ox_ng:[],mcq_ok:[],mcq_ng:[],blank_ok:[],blank_ng:[],con_done:[],cas_done:[],fla_done:[]}),P[tk]}

function recordOx(id,ok){const p=getP(S.topicKey);if(ok){p.ox_ok=[...new Set([...p.ox_ok,id])];p.ox_ng=p.ox_ng.filter(x=>x!==id)}else{p.ox_ng=[...new Set([...p.ox_ng,id])]};saveP()}
function recordMcq(id,ok){const p=getP(S.topicKey);if(ok){p.mcq_ok=[...new Set([...p.mcq_ok,id])];p.mcq_ng=p.mcq_ng.filter(x=>x!==id)}else{p.mcq_ng=[...new Set([...p.mcq_ng,id])]};saveP()}
function recordBlank(id,ok){const p=getP(S.topicKey);if(ok){p.blank_ok=[...new Set([...p.blank_ok,id])];p.blank_ng=p.blank_ng.filter(x=>x!==id)}else{p.blank_ng=[...new Set([...p.blank_ng,id])]};saveP()}

function modPct(mod){
  let tot=0,done=0;
  mod.topics.forEach(t=>{
    const p=getP(t.key);
    const ox=mod.qui.filter(q=>q[5]===t.key&&q[1]==='OX');
    const mcq=mod.qui.filter(q=>q[5]===t.key&&q[1]==='MCQ');
    tot+=ox.length+mcq.length;
    done+=p.ox_ok.filter(id=>ox.find(q=>q[0]===id)).length+p.mcq_ok.filter(id=>mcq.find(q=>q[0]===id)).length;
  });
  return tot===0?0:Math.min(100,Math.round(done/tot*100));
}
function topicPct(mod,tk){
  const p=getP(tk);
  const items=mod.qui.filter(q=>q[5]===tk);
  if(!items.length)return 0;
  const done=[...p.ox_ok,...p.mcq_ok,...p.blank_ok].filter(id=>items.find(q=>q[0]===id)).length;
  return Math.min(100,Math.round(done/items.length*100));
}
function allWrong(){
  const w=[];
  MODULES.forEach(m=>m.qui.forEach(q=>{
    const p=getP(q[5]);
    const ng=q[1]==='OX'?p.ox_ng:q[1]==='MCQ'?p.mcq_ng:p.blank_ng;
    if(ng.includes(q[0]))w.push({q,mod:m});
  }));
  return w;
}

  const nFlash=m.fla.filter(x=>x[4]===S.topicKey).length;

    {k:'flash',  label:`🃏 플래시카드 (${nFlash})`},

function switchTab(k){

function renderTC(){

}

function renderConTab(m){
  const items=m.con.filter(x=>x[5]===S.topicKey);
  if(!items.length)return empty('📖','개념 정리 준비 중','교과서 아카이빙 후 이 단원의 개념이 표시됩니다.');
  const IL={3:'★★★ 핵심',2:'★★ 중요',1:'★ 기본'};
  const IC={3:'b3',2:'b2',1:'b1'};
  return '<div class="concept-list">'+items.map(c=>`
    <div class="ccard">
      <div class="ccard-hdr">
        <div class="ccard-title">${esc(c[1])}</div>
        <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
          ${pageBadge(c[6])}
          <span class="badge ${IC[c[4]]||'b1'}">${IL[c[4]]||''}</span>
        </div>
      </div>
      <div class="ccard-body">${fmtBody(c[2])}</div>

function fmtBody(s){
  if(!s)return'';

    .replace(/^&gt; (.+)/gm,'<blockquote style="border-left:3px solid var(--primary);padding:7px 12px;margin:6px 0;background:var(--bg2);border-radius:0 5px 5px 0;color:var(--text2)">$1</blockquote>');
}

// ================================================================
// ⑪ QUIZ ENGINE
// ================================================================
function getQList(m,type){
  const all=m.qui.filter(q=>q[5]===S.topicKey&&q[1]===type);
  if(S.qFilter==='star')return all.filter(q=>q[2].startsWith('★')||q[2].includes('§★'));
  if(S.qFilter==='wrong'){
    const p=getP(S.topicKey);
    const ng=[...p.ox_ng,...p.mcq_ng,...p.blank_ng];
    return all.filter(q=>ng.includes(q[0]));
  }
  return all;
}
function renderQuizTab(m,type){
  const all=m.qui.filter(q=>q[5]===S.topicKey&&q[1]===type);
  const labels={OX:'OX 퀴즈',MCQ:'객관식',CASE:'사례문제',BLANK:'빈칸채우기'};
  if(!all.length)return empty('📝',`${labels[type]} 준비 중`,'이 단원의 문제가 곧 추가됩니다.');
  const list=getQList(m,type);
  const p=getP(S.topicKey);
  const ngAll=[...p.ox_ng,...p.mcq_ng,...p.blank_ng].filter(id=>all.find(q=>q[0]===id));
  const starAll=all.filter(q=>q[2].startsWith('★')||q[2].includes('§★'));
  const ctrl=`<div class="qcontrols">
    <button class="fbtn ${S.qFilter==='all'?'active':''}" onclick="setQF('all','${type}')">전체 (${all.length})</button>
    ${starAll.length?`<button class="fbtn ${S.qFilter==='star'?'active':''}" onclick="setQF('star','${type}')">⭐ 중요 (${starAll.length})</button>`:''}
    ${ngAll.length?`<button class="fbtn ${S.qFilter==='wrong'?'active':''}" onclick="setQF('wrong','${type}')">❌ 오답 (${ngAll.length})</button>`:''}
    <span class="qprogress">${Math.min(S.qIdx+1,list.length||1)} / ${list.length}</span>
  </div>`;
  if(!list.length)return ctrl+empty('✅','해당 조건의 문제 없음','다른 필터를 선택해보세요.');
  const idx=Math.min(S.qIdx,list.length-1);
  const q=list[idx];
  let card='';
  if(type==='OX')card=renderOX(q);
  else if(type==='MCQ')card=renderMCQ(q);
  else if(type==='CASE')card=renderCASE(q);
  else if(type==='BLANK')card=renderBLANK(q);
  return `<div class="qwrap">${ctrl}${card}
    <div class="qnav">
      <button class="nbtn" onclick="prevQ()" ${idx===0?'disabled':''}>← 이전</button>
      <span style="font-size:11.5px;color:var(--text3)">${idx+1} / ${list.length}</span>
      <button class="nbtn" onclick="nextQ('${type}')" ${idx>=list.length-1?'disabled':''}>다음 →</button>
    </div>
  </div>`;
}

function renderOX(q){
  const starM=q[2].match(/^(★+)/); const starN=starM?starM[1].length:0;
  let fact='',qtext=q[2];
  if(q[2].includes('§')){const p=q[2].split('§');fact=`<div class="qfact">${esc(p[0])}</div>`;qtext=p.slice(1).join('§')}
  const ans=S.qAnswered;
  const cor=q[3];
  return `<div class="qcard">
    <div class="qcard-top"><span class="qbadge qb-ox">OX</span>${starN>0?`<span class="qstar">${'★'.repeat(starN)}</span>`:''}<span style="flex:1"></span>${pageBadge(q[6])}</div>
    ${fact}<div class="qquestion">${esc(qtext.replace(/^★+\s*/,''))}</div>
    <div class="ox-row">
      <button class="oxbtn obtn ${ans!==null?(cor===true?'ans-ok':(ans===true?'ans-ng':'')):'sel-o'}" onclick="${ans===null?`ansOx(true,${q[3]},'${escA(q[0])}')`:''}">○</button>
      <button class="oxbtn xbtn ${ans!==null?(cor===false?'ans-ok':(ans===false?'ans-ng':'')):'sel-x'}" onclick="${ans===null?`ansOx(false,${q[3]},'${escA(q[0])}')`:''}">✕</button>
    </div>
    ${ans!==null?`<div class="qexp show"><div class="qres ${ans===cor?'ok':'ng'}">${ans===cor?'✓ 정답':'✗ 오답'} · 정답: ${cor?'O':'X'}</div><div>${esc(q[4])}</div></div>`:''}
  </div>`;
}
function ansOx(sel,cor,id){S.qAnswered=sel;recordOx(id,sel===cor);renderTC()}

function renderMCQ(q){
  const starM=(q[2].startsWith('★')||q[2].includes('§★'))?q[2].replace(/§.*/,'').match(/^(★+)/):null;
  const starN=starM?starM[1].length:0;
  const pts=q[2].split('§');
  let fact='',qline,opts;
  // 두 번째 요소가 선지(①로 시작)이면 첫 요소가 질문. 아니면 첫 요소가 사실관계.
  if(pts.length>1&&pts[1].trim().startsWith('①')){
    qline=pts[0].replace(/^★\s*/,'');opts=pts.slice(1);
  } else {
    fact=pts.length>1?`<div class="qfact">${esc(pts[0])}</div>`:'';
    qline=(pts[1]||pts[0]).replace(/^★\s*/,'');opts=pts.slice(pts.length>1?2:1);
  }

function openSearch(){document.getElementById('soverlay').classList.add('show');setTimeout(()=>document.getElementById('sinput').focus(),40)}

function closeSearch(){document.getElementById('soverlay').classList.remove('show');document.getElementById('sinput').value='';document.getElementById('sresults').innerHTML='<div class="sempty">검색어를 입력하세요</div>'}
function searchByAtag(a){openSearch();document.getElementById('sinput').value=a;doSearch(a)}

function doSearch(q){
  q=q.trim();
  const r=document.getElementById('sresults');
  if(!q){r.innerHTML='<div class="sempty">검색어를 입력하세요</div>';return}
  const lq=q.toLowerCase();
  const res=[];

  // ── 페이지 번호 검색 패턴 감지
  // 지원 형식: "p.145" / "p145" / "pp.123" / "123페이지" / "145p" / 순수 숫자(50 이상)
  const pgPat=/^(?:pp?\.?\s*|페이지\s*)?(\d{2,4})\s*(?:페이지|p|쪽)?$/i;
  const pgMatch=q.match(pgPat);
  const pageTarget=pgMatch?parseInt(pgMatch[1]):null;

  MODULES.forEach(m=>{
    // ── CONCEPT 검색
    m.con.forEach(c=>{
      const hit=
        (c[1]+c[2]).toLowerCase().includes(lq)||
        c[3].some(a=>a.replace(/[§\s]/g,'').includes(q.replace(/[§\s]/g,'')))||
        (pageTarget!==null&&pageInRange(c[6],pageTarget));
      if(hit)res.push({type:'개념',title:c[1],sub:c[3].join(' · ')||'',mk:m.key,tk:c[5],page:c[6],mod:m.name});
    });
    // ── CASE 검색 (사건번호, 쟁점, 판시, 조문, 페이지)
    m.cas.forEach(c=>{
      const hit=
        (c[1]+c[2]+c[3]).toLowerCase().includes(lq)||
        c[5].some(a=>a.replace(/[§\s]/g,'').includes(q.replace(/[§\s]/g,'')))||
        (pageTarget!==null&&pageInRange(c[8],pageTarget));
      if(hit)res.push({type:'판례',title:c[2],sub:c[1],mk:m.key,tk:c[7],page:c[8],stars:c[6],mod:m.name});
    });
    // ── QUIZ 검색 (문제 본문, 페이지)
    m.qui.forEach(c=>{
      const hit=
        c[2].toLowerCase().includes(lq)||c[4].toLowerCase().includes(lq)||
        (pageTarget!==null&&pageInRange(c[6],pageTarget));
      if(hit){
        const tl={OX:'OX',MCQ:'객관식',CASE:'사례',BLANK:'빈칸'}[c[1]]||c[1];
        const titleRaw=c[2].replace(/§.*$/,'').replace(/^★\s*/,'');
        res.push({type:tl,title:titleRaw.length>60?titleRaw.substring(0,60)+'…':titleRaw,sub:'',mk:m.key,tk:c[5],page:c[6],mod:m.name});
      }
    });
  });

  if(!res.length){
    const hint=pageTarget?`교과서 ${pageTarget}페이지 근처 내용이 없습니다. 아직 아카이빙되지 않은 범위일 수 있습니다.`:`"${esc(q)}"에 대한 결과 없음`;
    r.innerHTML=`<div class="sempty">${hint}</div>`;
    return;
  }

  // 페이지 검색이면 페이지 오름차순 정렬, 아니면 판례 > 개념 > 문제 순
  if(pageTarget){
    res.sort((a,b)=>{
      const pa=a.page==null?9999:(Array.isArray(a.page)?a.page[0]:a.page);
      const pb=b.page==null?9999:(Array.isArray(b.page)?b.page[0]:b.page);
      return pa-pb;
    });
  }

  const typeIcon={개념:'📖',판례:'⚖️',OX:'🔘',객관식:'📋',사례:'📝',빈칸:'✏️'};
  r.innerHTML=res.slice(0,30).map(x=>{
    const pt=pageText(x.page);
    const starsHtml=x.stars?`<span style="color:var(--star);font-size:10px">${'★'.repeat(x.stars)}</span>`:'';
    return`<div class="sri" onclick="goTopic('${x.mk}','${x.tk}');closeSearch()">
      <div class="sri-type">${typeIcon[x.type]||''} ${x.type} &nbsp;·&nbsp; ${x.mod}</div>
      <div class="sri-title">${esc(x.title)} ${starsHtml}</div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap">
        ${x.sub?`<span class="sri-sub">${esc(x.sub)}</span>`:''}
        ${pt?`<span class="sri-page">📄 ${pt}</span>`:''}
      </div>
    </div>`;
  }).join('');

  if(res.length>30){
    r.innerHTML+=`<div class="sempty" style="font-size:11px;padding:10px">외 ${res.length-30}건 더 있음 — 검색어를 더 구체적으로 입력하세요</div>`;
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function escA(s){return String(s||'').replace(/'/g,"\\'")}
function empty(ico,ttl,sub){return`<div class="empty"><div class="empty-ico">${ico}</div><div class="empty-ttl">${ttl}</div><div class="empty-sub">${sub}</div></div>`}

// page: 숫자(123) 또는 배열([123,125]) 또는 null
function pageText(p){
  if(p==null||p===undefined)return null;
  return Array.isArray(p)?`pp.${p[0]}–${p[1]}`:`p.${p}`;
}
// pageBadge → PDF 팝업 JS 섹션으로 이동
// 페이지 범위 포함 여부: 검색 target 페이지가 항목의 page 범위 내에 있는지
function pageInRange(itemPage, target){
  if(itemPage==null||itemPage===undefined)return false;
  if(Array.isArray(itemPage))return target>=itemPage[0]&&target<=itemPage[1];
  return Math.abs(itemPage-target)<=2; // ±2 페이지 허용
}

// ================================================================
// PDF 단일 페이지 팝업 + IndexedDB 영구 저장
// ================================================================
const PDF_IDB='lawmj_pdf_v1', PDF_STORE='pdf', PDF_KEY='book';
let pgDoc=null, pgCurPage=1, pgAnchor=1, pgRendering=false, pgPending=null, pgTargetAfterLoad=null;
const PG_RANGE=20;

// ── IndexedDB 헬퍼
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(PDF_IDB,1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(PDF_STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=rej;
  });
}
async function idbSave(buf){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(PDF_STORE,'readwrite');
    tx.objectStore(PDF_STORE).put(buf,PDF_KEY);
    tx.oncomplete=res; tx.onerror=rej;
  });
}
async function idbLoad(){
  const db=await idbOpen();
  return new Promise((res,rej)=>{
    const tx=db.transaction(PDF_STORE,'readonly');
    const r=tx.objectStore(PDF_STORE).get(PDF_KEY);
    r.onsuccess=()=>res(r.result||null); r.onerror=rej;
  });
}

// ── PDF.js 초기화 + IDB에서 자동 로드
async function pgInit(){
  if(typeof pdfjsLib==='undefined')return;
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  try{
    const buf=await idbLoad();
    if(buf){await pgLoadBuf(buf);}
  }catch(e){}
}

async function pgLoadBuf(buf){
  pgDoc=await pdfjsLib.getDocument({data:buf}).promise;
  document.getElementById('pg-prev').disabled=false;
  document.getElementById('pg-next').disabled=false;
}

// ── 파일 선택 시
async function pgFileSelected(input){
  const file=input.files[0]; if(!file)return;
  pgSetState('status','⏳ PDF 저장 중...');
  const buf=await file.arrayBuffer();
  await idbSave(buf.slice(0)); // IDB 저장
  await pgLoadBuf(buf);        // 문서 로드
  if(pgTargetAfterLoad!=null){
    pgRender(pgTargetAfterLoad);
    pgTargetAfterLoad=null;
  } else {
    pgRender(pgCurPage);
  }
}

// ── 팝업 열기 (페이지 번호 지정)
function openPage(pageNum){
  document.getElementById('pg-overlay').classList.add('show');
  pgCurPage=parseInt(pageNum)||1;
  pgAnchor=pgCurPage; // 앵커 설정 — 이 페이지 기준 ±20
  document.getElementById('pg-title').textContent=`📄 교과서 p.${pgCurPage}`;
  if(!pgDoc){
    pgTargetAfterLoad=pgCurPage;
    pgSetState('pick');
  } else {
    pgRender(pgCurPage);
  }
}

function closePg(){
  document.getElementById('pg-overlay').classList.remove('show');
}
function pgOverlayClick(e){
  if(e.target===document.getElementById('pg-overlay'))closePg();
}

// ── 페이지 렌더
async function pgRender(num){
  if(!pgDoc)return;
  num=Math.min(Math.max(1,num),pgDoc.numPages);
  if(pgRendering){pgPending=num;return}
  pgRendering=true;
  pgCurPage=num;
  pgSetState('status','⏳ 렌더링 중...');
  document.getElementById('pg-title').textContent=`📄 교과서 p.${num}`;
  const page=await pgDoc.getPage(num);
  const modal=document.getElementById('pg-body');
  const w=Math.min(modal.clientWidth-28,680);
  const vp0=page.getViewport({scale:1});
  const scale=Math.max(0.6,Math.min(2.5,w/vp0.width));
  const vp=page.getViewport({scale});
  const canvas=document.getElementById('pg-canvas');
  const ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(vp.width*dpr);
  canvas.height=Math.floor(vp.height*dpr);
  canvas.style.width=Math.floor(vp.width)+'px';
  canvas.style.height=Math.floor(vp.height)+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  pgSetState('page');
  // 버튼 활성화 상태 업데이트
  pgUpdateNav();
  pgRendering=false;
  if(pgPending!==null){const q=pgPending;pgPending=null;pgRender(q)}
}

function pgUpdateNav(){
  const minP=Math.max(1, pgAnchor-PG_RANGE);
  const maxP=Math.min(pgDoc?pgDoc.numPages:9999, pgAnchor+PG_RANGE);
  document.getElementById('pg-prev').disabled = pgCurPage<=minP;
  document.getElementById('pg-next').disabled = pgCurPage>=maxP;
  // 푸터에 범위 표시
  const foot=document.getElementById('pg-foot');
  const rangeEl=document.getElementById('pg-range');
  if(rangeEl) rangeEl.textContent=`p.${minP} — p.${maxP} 범위 (현재 p.${pgCurPage})`;
}

function pgMove(d){
  if(!pgDoc)return;
  const minP=Math.max(1, pgAnchor-PG_RANGE);
  const maxP=Math.min(pgDoc.numPages, pgAnchor+PG_RANGE);
  const n=Math.min(Math.max(pgCurPage+d, minP), maxP);
  if(n!==pgCurPage) pgRender(n);
}

// ── UI 상태 전환
function pgSetState(state,msg){
  const ids=['pg-pick','pg-status','pg-body','pg-foot'];
  ids.forEach(id=>document.getElementById(id).style.display='none');
  if(state==='pick'){
    document.getElementById('pg-pick').style.display='flex';
  } else if(state==='status'){
    const el=document.getElementById('pg-status');
    el.textContent=msg||'⏳';
    el.style.display='block';
  } else if(state==='page'){
    document.getElementById('pg-body').style.display='flex';
    document.getElementById('pg-foot').style.display='flex';
  }
}

// ── pageBadge 클릭 가능하게 (openPage 연동)
function pageBadge(p,lg){
  const t=pageText(p);
  if(!t)return'';
  const pg=Array.isArray(p)?p[0]:p;
  return`<span class="pbadge${lg?' pbadge-lg':''}" onclick="openPage(${pg})" title="교과서 ${t} 보기">📄 ${t}</span>`;
}
